<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -25 906 593" width="800" height="524" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-f08c00" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f08c00"/>
    </marker>
  </defs>
  <text x="220" y="39.0" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Per-Channel Parameter Layout: Broadcasting in QConv2d</text>
  <text x="30" y="81.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Weight tensor:  shape (32, 1, 5, 5)  =  32 filters × 1 × 25 weights each</text>
  <rect x="30" y="100" width="110" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="40" y="132.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">filter 0</text>
  <text x="40" y="146.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(1, 5, 5)</text>
  <rect x="155" y="100" width="110" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="165" y="132.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">filter 1</text>
  <text x="165" y="146.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(1, 5, 5)</text>
  <rect x="280" y="100" width="110" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="290" y="132.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">filter 2</text>
  <text x="290" y="146.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(1, 5, 5)</text>
  <text x="410" y="143.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">···  ···</text>
  <rect x="480" y="100" width="110" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="488" y="132.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">filter 31</text>
  <text x="488" y="146.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(1, 5, 5)</text>
  <text x="30" y="211.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">Exponent e:  shape (32, 1, 1, 1)  — one scalar per filter</text>
  <rect x="55" y="225" width="60" height="40" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="63" y="250.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#f08c00" text-anchor="start">e₀=-8.0</text>
  <rect x="180" y="225" width="60" height="40" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="188" y="250.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#f08c00" text-anchor="start">e₁=-8.0</text>
  <rect x="305" y="225" width="60" height="40" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="313" y="250.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#f08c00" text-anchor="start">e₂=-8.0</text>
  <text x="400" y="258.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">···</text>
  <rect x="505" y="225" width="60" height="40" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="510" y="250.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#f08c00" text-anchor="start">e₃₁=-8.0</text>
  <text x="30" y="316.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Bit-width b:  shape (32, 1, 1, 1)  — one scalar per filter</text>
  <rect x="55" y="330" width="60" height="40" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="65" y="355.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b₀=2.0</text>
  <rect x="180" y="330" width="60" height="40" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="190" y="355.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b₁=2.0</text>
  <rect x="305" y="330" width="60" height="40" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="315" y="355.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b₂=2.0</text>
  <text x="400" y="363.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">···</text>
  <rect x="505" y="330" width="60" height="40" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="515" y="355.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b₃₁=2.0</text>
  <path d="M 85.0 217.0 L 85.0 168.0" fill="none" stroke="#f08c00" stroke-width="1" stroke-dasharray="8 4" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <path d="M 210.0 217.0 L 210.0 168.0" fill="none" stroke="#f08c00" stroke-width="1" stroke-dasharray="8 4" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <path d="M 335.0 217.0 L 335.0 168.0" fill="none" stroke="#f08c00" stroke-width="1" stroke-dasharray="8 4" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <path d="M 535.0 217.0 L 535.0 168.0" fill="none" stroke="#f08c00" stroke-width="1" stroke-dasharray="8 4" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <text x="30" y="426.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">After training — emergent mixed precision:</text>
  <rect x="30" y="440" width="90" height="50" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="38" y="465.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">ch 0</text>
  <text x="38" y="479.8" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b=2.5 bits</text>
  <rect x="135" y="440" width="90" height="50" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="143" y="465.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">ch 1</text>
  <text x="143" y="479.8" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b=3.2 bits</text>
  <rect x="240" y="440" width="90" height="50" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="245" y="464.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#e03131" text-anchor="start">ch 2</text>
  <text x="245" y="477.4" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#e03131" text-anchor="start">b=-0.006 ≈0</text>
  <text x="248" y="482.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">PRUNED</text>
  <rect x="345" y="440" width="90" height="50" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="353" y="465.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">ch 3</text>
  <text x="353" y="479.8" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b=2.3 bits</text>
  <text x="448" y="481.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">···</text>
  <rect x="500" y="440" width="90" height="50" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="507" y="465.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">ch 31</text>
  <text x="507" y="479.8" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">b=3.5 bits</text>
  <text x="30" y="525.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Mixed precision emerges: important channels keep higher b, unimportant ones are driven to 0 (pruned).</text>
</svg>
