  <text x="50" y="444.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#6c6c6c" text-anchor="start">Smaller e = more grid lines = finer precision = more bits needed</text>
  <text x="200" y="66.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Bit-width b controls number of distinct values (range = 2^b)</text>
