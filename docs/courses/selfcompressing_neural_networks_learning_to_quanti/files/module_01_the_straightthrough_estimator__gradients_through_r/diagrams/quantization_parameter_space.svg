  <text x="215" y="483.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Self-compression goal: learn the (e, b) per channel that minimizes task loss + compression penalty.</text>
  <text x="215" y="505.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">STE makes both e and b differentiable → gradient descent finds the optimal grid per channel.</text>
