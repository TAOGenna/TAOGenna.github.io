ient flow for QConv2d(1, 32, 5) — MNIST layer 0\")\n    print(f\"{'─'*65}\")\n    layer2 = QConv2d(in_channels=1, out_channels=32, kernel_size=5)\n    x2 = torch.randn(8, 1, 28, 28)\n    print(f\"  Layer: {layer2.weight.shape}, input: {x2.shape}\")\n    print(f\"  {'Parameter':<12} | {'|grad| mean':>12} | {'grad std':>10} | {'frac nz':>8}\")\n    print(f\"  {'-'*12}-+-{'-'*12}-+-{'-'*10}-+-{'-'*8}\")\n    flow_ok2 = verify_gradient_flow(layer2, x2, lam=0.05)\n    print(f\"\\n  All gradients nonzero: {'✓ PASS' if flow_ok2 else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 3: analyze_gradient_magnitudes — verify theoretical b grad\n    # -------------------------------------------------------------------\n    print(f\"\\n{'─'*65}\")\n    print(\"[Test 3] Gradient magnitude analysis — theory vs actual\")\n    print(f\"{'─'*65}\")\n    layer3 = QConv2d(in_channels=1, out_channels=32, kernel_size=5)\n    x3 = torch.randn(8, 1, 28, 28)\n    analysis = analyze_gradient_magnitudes(layer3, x3, lam=0.05)\n    theory_ok = analysis.get('b_grad_matches_theory', False)\n    print(f\"\\n  Theory check (λ*fan_in formula): {'✓ PASS' if theory_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 4: Pruned channel gets zero b gradient (b < 0 → relu'=0)\n    # -------------------------------------------------------------------\n    print(f\"\\n{'─'*65}\")\n    print(\"[Test 4] Pruned channel — b < 0 → zero gradient\")\n    print(f\"{'─'*65}\")\n    layer4 = QConv2d(in_channels=1, out_channels=4, kernel_size=3)\n    with torch.no_grad():\n        layer4.b[1] = -0.5   # channel 1: pruned\n        layer4.b[3] = -1.2   # channel 3: pruned\n    x4 = torch.randn(2, 1, 8, 8)\n    target4 = torch.zeros(2, 4, 6, 6)\n    for p in [layer4.weight, layer4.e, layer4.b]:\n        p.grad = None\n    loss4 = compute_loss_with_compression(layer4, x4, target4, lam=0.05)\n    loss4.backward()\n    b_grad = layer4.b.grad.flatten()\n    ch1_zero = abs(b_grad[1].item()) < 1e-6\n    ch3_zero = abs(b_grad[3].item()) < 1e-6\n    ch0_nonzero = abs(b_grad[0].item()) > 1e-6\n    prune_grad_ok = ch1_zero and ch3_zero and ch0_nonzero\n    print(f\"  b.grad for each channel: {[f'{v:.4f}' for v in b_grad.tolist()]}\")\n    print(f\"  ch 1 (b=-0.5) grad=0: {'✓' if ch1_zero else '✗'}\")\n    print(f\"  ch 3 (b=-1.2) grad=0: {'✓' if ch3_zero else '✗'}\")\n    print(f\"  ch 0 (b=2.0)  nonzero: {'✓' if ch0_nonzero else '✗'}\")\n    print(f\"  Pruned channels get no gradient: {'✓ PASS' if prune_grad_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Summary\n    # -------------------------------------------------------------------\n    all_pass = flow_ok and flow_ok2 and theory_ok and prune_grad_ok\n    print(f\"\\n{'=' * 65}\")\n    if all_pass:\n        print(\"GRADIENT FLOW VERIFIED: all parameters receive gradients\")\n        print(\"Pruned channels correctly receive zero b gradient\")\n    else:\n        print(\"SOME TESTS FAILED — check your implementation\")\n    print(\"=\" * 65)\n"}]}, "module_03_selfcompression_training_on_mnist": {"content": "# Module 3: Self-Compression Training on MNIST\n\n## Table of Contents\n\n1. [Learning Objectives](#learning-objectives)\n2. [The Core Idea: Compression as a Differentiable Loss](#the-core-idea-compression-as-a-differentiable-loss)\n3. [From Quantization to a Compression Metric](#from-quantization-to-a-compression-metric)\n4. [The Compression Loss Function](#the-compression-loss-function)\n5. [Architecture: A CNN That Compresses Itself](#architecture-a-cnn-that-compresses-itself)\n6. [Training Dynamics: Two Forces, One Optimizer](#training-dynamics-two-forces-one-optimizer)\n7. [Measuring Model Size in Bytes](#measuring-model-size-in-bytes)\n8. [Emergent Channel Pruning](#emergent-channel-pruning)\n9. [Full Training Loop Implementation](#full-training-loop-implementation)\n10. [Analytical Questions](#analytical-questions)\n11. [Synthesis: Reproducing the Paper's Result](#synthesis-reproducing-the-papers-result)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n- **Formulate** the compression penalty $Q$ as a differentiable function of learnable bit-width parameters $b$, and explain why $\\nabla_b Q > 0$ means gradient descent drives $b$ toward zero.\n- **Implement** the full self-compression training loop that jointly minimizes cross-entropy and $Q$.\n- **Construct** the five-layer `SelfCompressingCNN` architecture for MNIST and explain every shape transformation.\n- **Measure** model size in bytes from the learned $Q$ value and interpret it as a compression ratio.\n- **Diagnose** the learned bit-width distribution layer-by-layer and identify which channels have been effectively pruned.\n- **Reproduce** the reference result: ≥97.5% test accuracy at ≤25,000 bytes from 87,860 original parameters.\n\n---\n\n## The Core Idea: Compression as a Differentiable Loss\n\nThe key insight of Self-Compressing Neural Networks (arXiv 2301.13142) is almost shocking in its simplicity: **make compression differentiable and include it in the loss**.\n\nIn previous modules you built `QConv2d` — a layer where each output channel has two learnable scalar parameters per channel:\n\n- $e_c$ — the **exponent** (log-scale), controlling the quantization resolution\n- $b_c$ — the **bit-width**, controlling how many discrete values the channel can represent\n\nThe bit-width $b_c$ is a real-valued parameter that gradient descent can move freely. When $b_c = 2.0$, the channel uses 2 bits (4 discrete values). When $b_c = 0.01$, it uses effectively 0 bits — the channel is quantized to a single point and contributes nothing to the network's discriminative power.\n\nThe question this module answers: **what happens when you add a penalty for large $b$ to your training loss?**\n\nThe answer is that the network, via ordinary gradient descent, learns to use as few bits as it can afford while preserving accuracy. Channels that carry redundant or unimportant information get their bit-widths driven toward zero. Channels that matter retain 2–4 bits. This is **self-compression** — no pruning heuristics, no knowledge distillation, no post-training processing.\n\n---\n\n## From Quantization to a Compression Metric\n\nRecall from Module 2 the `qbits()` method on `QConv2d`. For a layer with $C_{\\text{out}}$ output channels and $C_{\\text{in}} \\times k \\times k$ weights per channel, the total bit cost is:\n\n$$\\text{qbits}_\\ell = \\sum_{c=1}^{C_{\\text{out}}} \\text{relu}(b_c) \\cdot (C_{\\text{in}} \\cdot k^2)$$\n\nThe $\\text{relu}$ ensures that negative $b_c$ values contribute **zero** bits — you can't store a negative number of bits. This is crucial: gradient descent will happily push $b_c$ below zero for unimportant channels, but `relu` clamps the actual bit cost to zero.\n\nIn PyTorch:\n\n```python\ndef qbits(self) -> torch.Tensor:\n    fan_in = math.prod(self.weight.shape[1:])   # in_ch * kH * kW\n    return torch.relu(self.b).sum() * fan_in\n```\n\nTo build a **model-level** compression metric $Q$, we average the total bit cost across all parameters in the model:\n\n$$Q = \\frac{\\sum_{\\ell \\in \\text{QConv2d layers}} \\text{qbits}_\\ell}{N_{\\text{weights}}}$$\n\nwhere $N_{\\text{weights}} = \\sum_\\ell C^\\ell_{\\text{out}} \\cdot C^\\ell_{\\text{in}} \\cdot k^2_\\ell$ is the total number of weight parameters across all quantized layers.\n\n$Q$ has units of **bits per weight**. When every channel is at 2 bits, $Q = 2.0$. When half the channels are pruned, $Q \\approx 1.0$.\n\n**Check your understanding:** Why do we divide by $N_{\\text{weights}}$ rather than just summing? What would happen to the scale of $\\lambda$ if you used a sum instead?[^1]\n\nIn code:\n\n```python\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    total_bits = sum(\n        layer.qbits()\n        for layer in model.modules()\n        if isinstance(layer, QConv2d)\n    )\n    weight_count = sum(\n        p.numel()\n        for layer in model.modules()\n        if isinstance(layer, QConv2d)\n        for p in [layer.weight]\n    )\n    return total_bits / weight_count\n```\n\n[^1]: If you sum instead of mean, the scale of $\\lambda$ needed to achieve a given compression level would depend on model size. A bigger model would need a smaller $\\lambda$. The mean makes $\\lambda$ model-size-agnostic, so you can compare it across architectures.\n\n---\n\n## The Compression Loss Function\n\nThe total training loss combines task performance with compression pressure:\n\n$$\\mathcal{L} = \\mathcal{L}_{\\text{task}} + \\lambda \\cdot Q$$\n\nwhere:\n- $\\mathcal{L}_{\\text{task}} = \\text{CrossEntropy}(\\text{logits}, \\text{targets})$ is the classification loss\n- $Q$ is the average bits per weight (differentiable with respect to all $b_c$)\n- $\\lambda$ is the **compression hyperparameter** — the critical knob\n\nThe reference implementation uses $\\lambda = 0.05$.\n\n![The Compression Loss Landscape](diagrams/compression_loss.svg)\n\n### Why does this drive compression?\n\nLet's trace the gradient. The gradient of $Q$ with respect to $b_c$ for channel $c$ in layer $\\ell$ is:\n\n$$\\frac{\\partial Q}{\\partial b_c} = \\frac{\\text{fan\\_in}_\\ell}{N_{\\text{weights}}} \\cdot \\mathbf{1}[b_c > 0]$$\n\nThis is **always positive** when $b_c > 0$ (the Heaviside indicator from the relu subgradient). This means:\n\n$$\\frac{\\partial \\mathcal{L}}{\\partial b_c} = \\frac{\\partial \\mathcal{L}_{\\text{task}}}{\\partial b_c} + \\lambda \\cdot \\frac{\\text{fan\\_in}_\\ell}{N_{\\text{weights}}}$$\n\nThe compression penalty always pushes $b_c$ **downward** (negative gradient from the $+\\lambda Q$ term, because we minimize $\\mathcal{L}$). The task loss pushes $b_c$ upward when more bits improve accuracy. Equilibrium occurs at the bit-width where the marginal gain in accuracy equals the compression cost.\n\n**Check your understanding:** At $\\lambda = 0$, what determines $b_c$? What happens to $b_c$ for a channel that contributes nothing to the task loss?[^2]\n\n[^2]: At $\\lambda = 0$, the only gradient on $b_c$ comes from the task loss. A channel that contributes nothing to accuracy has $\\partial \\mathcal{L}_\\text{task}/\\partial b_c \\approx 0$, so $b_c$ drifts but doesn't strongly compress. This is why $\\lambda > 0$ is essential — it provides the compression pressure that zeros out useless channels.\n\nThe value $\\lambda = 0.05$ is the paper's calibrated choice. In Module 4 we'll sweep $\\lambda$ to trace the full Pareto frontier.\n\n### The loss in code\n\n```python\ndef self_compression_loss(\n    model: nn.Module,\n    logits: torch.Tensor,\n    targets: torch.Tensor,\n    lam: float,\n) -> tuple[torch.Tensor, float, float]:\n    task_loss = F.cross_entropy(logits, targets)\n    Q = compute_compression_term(model)\n    total_loss = task_loss + lam * Q\n    return total_loss, task_loss.item(), Q.item()\n```\n\nThe critical implementation detail: `compute_compression_term` must return a **live tensor** (not a `.item()` scalar) so that `total_loss.backward()` can differentiate through $Q$ back to every $b_c$.\n\n---\n\n## Architecture: A CNN That Compresses Itself\n\nThe demonstration model follows the reference implementation closely:\n\n| Layer | Type | Input → Output Channels | Kernel | Activation |\n|-------|------|--------------------------|--------|------------|\n| conv1 | QConv2d | 1 → 32 | 5×5 | ReLU |\n| conv2 | QConv2d | 32 → 32 | 5×5 | ReLU + BN + MaxPool |\n| conv3 | QConv2d | 32 → 64 | 3×3 | ReLU |\n| conv4 | QConv2d | 64 → 64 | 3×3 | ReLU + BN + MaxPool |\n| conv5 | QConv2d | 576 → 10 | 1×1 | (logits) |\n\nThe reshape before conv5 is the unusual piece: after two max-pools on 28×28 MNIST images, the spatial tensor is $B \\times 64 \\times 3 \\times 3 = B \\times 576 \\times 1 \\times 1$ after flattening and reshaping. This is a 1×1 convolution acting as a learned linear projection — the same trick used in Network-in-Network and GoogLeNet.\n\n![Network Architecture](diagrams/network_architecture.svg)\n\n**Weight parameter count:**\n\n| Layer | Params |\n|-------|--------|\n| QConv2d(1→32, 5×5) | $32 \\times 1 \\times 5 \\times 5 = 800$ |\n| QConv2d(32→32, 5×5) | $32 \\times 32 \\times 5 \\times 5 = 25{,}600$ |\n| QConv2d(32→64, 3×3) | $64 \\times 32 \\times 3 \\times 3 = 18{,}432$ |\n| QConv2d(64→64, 3×3) | $64 \\times 64 \\times 3 \\times 3 = 36{,}864$ |\n| QConv2d(576→10, 1×1) | $10 \\times 576 \\times 1 \\times 1 = 5{,}760$ |\n| **Total** | **87,456** |\n\n(Plus $e$ and $b$ parameters per channel, but those are scalars and don't contribute to the size computation.)\n\nThe PyTorch implementation:\n\n```python\nclass SelfCompressingCNN(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.conv1 = QConv2d(1, 32, 5, padding=2)\n        self.conv2 = QConv2d(32, 32, 5, padding=2)\n        self.bn1   = nn.BatchNorm2d(32)\n        self.conv3 = QConv2d(32, 64, 3, padding=1)\n        self.conv4 = QConv2d(64, 64, 3, padding=1)\n        self.bn2   = nn.BatchNorm2d(64)\n        self.conv5 = QConv2d(576, 10, 1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.max_pool2d(self.bn1(F.relu(self.conv2(x))), 2)\n        x = F.relu(self.conv3(x))\n        x = F.max_pool2d(self.bn2(F.relu(self.conv4(x))), 2)\n        # Flatten spatial dims, reshape for 1×1 conv\n        x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)\n        return self.conv5(x).flatten(1)\n```\n\n**Check your understanding:** Why does the spatial dimension after two max-pools on 28×28 end up as 3×3 with padding=1 on the 3×3 convolutions, but 7×7 after the first pool? Trace the shapes:\n\n- Input: $28 \\times 28$\n- After conv1 (pad=2, k=5): $28 \\times 28$\n- After conv2 (pad=2, k=5) + MaxPool(2): $14 \\times 14$\n- After conv3 (pad=1, k=3): $14 \\times 14$\n- After conv4 (pad=1, k=3) + MaxPool(2): $7 \\times 7$\n- Flatten: $64 \\times 7 \\times 7 = 3136$ channels\n\nWait — that's 3136, not 576! The reference uses no padding on the 3×3 convolutions. Let's re-trace without padding:\n\n- After conv1 (pad=2, k=5): $28 \\times 28$\n- After conv2 (pad=2, k=5) + MaxPool(2): $14 \\times 14$\n- After conv3 (no pad, k=3): $12 \\times 12$\n- After conv4 (no pad, k=3) + MaxPool(2): $5 \\times 5$\n- Flatten: $64 \\times 5 \\times 5 = 1600$ channels\n\nStill not 576. The reference uses:\n\n- conv1 (pad=0, k=5): $24 \\times 24$\n- MaxPool after conv2 (pad=0, k=5): input $24\\to20$, pool: $10\\times10$\n- conv3 (pad=0, k=3): $8 \\times 8$\n- conv4 (pad=0, k=3) + MaxPool: $3 \\times 3$\n- Flatten: $64 \\times 3 \\times 3 = 576$ ✓\n\nSo the **correct** architecture has **no padding** on any convolutional layer, and the two max-pools together reduce spatial dimensions. This is the original tinygrad implementation. The reshape to `(B, 576, 1, 1)` makes the final QConv2d a matrix multiply via 1×1 convolution.[^3]\n\n[^3]: The 1×1 convolution acting as a fully-connected layer is a common trick. With weight shape $(10, 576, 1, 1)$, a 1×1 conv on a $(B, 576, 1, 1)$ tensor produces $(B, 10, 1, 1)$, then `.flatten(1)` gives $(B, 10)$ — identical to a linear layer with weight shape $(10, 576)$ but without any special-casing.\n\n---\n\n## Training Dynamics: Two Forces, One Optimizer\n\nThe training loop is conceptually simple: Adam optimizer sees two competing signal sources.\n\n**Force 1 — Task gradient**: Cross-entropy loss pushes weights toward configurations that correctly classify digits. This generally increases bit-widths (more precision = better discrimination).\n\n**Force 2 — Compression gradient**: The $\\lambda Q$ term pushes all $b_c > 0$ downward toward zero.\n\nThe equilibrium point is the sweet spot where a channel \"earns its bits\" — it only retains precision when the accuracy gain from more bits outweighs the compression cost $\\lambda \\cdot \\text{fan\\_in} / N_{\\text{weights}}$.\n\n```python\ndef train_step(\n    model: nn.Module,\n    optimizer: torch.optim.Optimizer,\n    images: torch.Tensor,\n    labels: torch.Tensor,\n    lam: float,\n) -> tuple[float, float]:\n    model.train()\n    optimizer.zero_grad()\n    logits = model(images)\n    loss, _, Q = self_compression_loss(model, logits, labels, lam)\n    loss.backward()\n    optimizer.step()\n    return loss.item(), Q.item()\n```\n\nNotice the Adam optimizer is used. Adam's adaptive learning rate is particularly well-suited here because:\n- $b_c$ parameters span a narrow range (typically 0–4 bits)\n- Weight parameters span a much wider range\n- Adam normalizes update magnitudes, preventing either set from dominating[^4]\n\n[^4]: In the reference implementation, `nn.optim.Adam(nn.state.get_parameters(model))` is used with default learning rate. All parameters — weights, $e$, $b$, and BatchNorm params — are updated by the same optimizer call. You could use separate learning rates for $b$ vs. weights, but the reference shows this isn't necessary.\n\n### Observing the convergence\n\nThe reference result (from the notebook output):\n\n```\nloss:   0.14  bytes: 18075.4  acc: 98.20%\n```\n\nThis is after 20,000 training steps on batches of 512. Let's unpack what this means:\n- **loss 0.14**: very low cross-entropy — the model is nearly perfect\n- **bytes 18,075**: from 87,860 parameters × 32 bits/param ÷ 8 = 351,440 bytes original → **~19.4× compression**\n- **acc 98.20%**: competitive with baseline CNNs of this size\n\nThe trajectory matters too. Model size starts high (near 22KB when $b \\approx 2$ for all channels) and decreases monotonically as the network discovers which channels it can afford to prune. Accuracy rises quickly (within the first few thousand steps) and stabilizes around 98%.\n\n---\n\n## Measuring Model Size in Bytes\n\nThe **model size in bytes** is computed directly from $Q$:\n\n$$\\text{model bytes} = \\frac{Q}{8} \\cdot N_{\\text{weights}}$$\n\nThis formula converts average bits per weight into total bytes. For the reference:\n\n$$\\text{model bytes} = \\frac{1.646}{8} \\times 87{,}860 \\approx 18{,}075 \\text{ bytes} \\approx 17.7 \\text{ KB}$$\n\nThe average of 1.646 bits per weight across 87,860 parameters. Since we initialized $b = 2.0$ per channel, the compression pressure of $\\lambda = 0.05$ drove the average down from 2.0 bits to ~1.65 bits by pruning roughly 18% of channels entirely and reducing others from 2 bits to near-2 bits.\n\nIn code, this is a one-liner after training:\n\n```python\nQ = compute_compression_term(model)\nmodel_bytes = Q.item() / 8 * weight_count\n```\n\n**Check your understanding:** If we start at $Q = 2.0$ bits/weight and end at $Q \\approx 1.65$ bits/weight, what's the compression ratio relative to 32-bit floats?\n\n$$\\text{ratio} = \\frac{32}{1.65} \\approx 19.4\\times$$\n\n---\n\n## Emergent Channel Pruning\n\nThe most fascinating phenomenon in self-compression training is **emergent pruning**. When you inspect the learned $b$ values after training, you find a bimodal distribution:\n\n- **Cluster near 0 (or below)**: channels that have been effectively silenced — their bit-widths were driven below 0 by the compression gradient, so $\\text{relu}(b) = 0$ and they contribute 0 bits.\n- **Cluster around 2–3**: active channels that retained precision to serve their representational role.\n\nFrom the reference implementation, after training, printing $b$ values for the first layer:\n\n```\nlayers.0.b (32, 1, 1, 1) [ 2.5146  2.3283  -0.0062  2.3243  2.8054  3.2020  2.3323  3.1703  3.5180  2.9075 ]\n```\n\nChannel 2 has $b = -0.0062$: after relu, this is effectively 0 bits. The network decided this particular edge-detection channel was redundant and silenced it.\n\n![Learned Bit-Width Distribution](diagrams/bitwidth_distribution.svg)\n\n### The biology of network pruning\n\nThis is structurally similar to synaptic pruning in the brain — redundant connections are eliminated during development to reduce metabolic cost. Here, $\\lambda$ plays the role of metabolic pressure: channels that don't \"earn their bits\" by contributing to accuracy are progressively pruned.\n\nThe network doesn't need to be told which channels to prune. It discovers this through gradient descent, guided only by the compression-accuracy tradeoff embedded in $\\lambda$.\n\n**Check your understanding:** What would happen if you set $\\lambda = 1.0$? What about $\\lambda = 0.001$? Is there a value of $\\lambda$ that would prune 100% of channels?[^5]\n\n[^5]: At $\\lambda = 1.0$, the compression pressure would be 20× stronger, likely driving most channels to zero and collapsing accuracy. At $\\lambda = 0.001$, almost no compression occurs. You cannot prune 100% with finite $\\lambda$ because the task loss gradient also acts on $b$ — as long as the network has any accuracy, some channels will resist pruning.\n\n### Layer-by-layer analysis\n\nDifferent layers show different pruning patterns:\n- **Early layers (conv1, conv2)**: detect low-level features (edges, gradients). MNIST digits have relatively simple edge statistics, so some early channels get pruned.\n- **Later layers (conv4)**: encode higher-level digit shape features. These tend to be harder to prune without accuracy loss.\n- **Final layer (conv5)**: 576→10 weights. Since there are 10 classes, the network needs to retain enough channels to discriminate all classes — aggressive pruning here directly hurts accuracy.\n\n---\n\n## Full Training Loop Implementation\n\nHere is the complete training loop with periodic evaluation, matching the reference implementation's 20,000-step schedule:\n\n```python\ndef training_loop(\n    model: nn.Module,\n    train_loader: DataLoader,\n    test_loader: DataLoader,\n    steps: int = 20_000,\n    lam: float = 0.05,\n) -> tuple[list[float], list[float]]:\n    optimizer = torch.optim.Adam(model.parameters())\n    weight_count = sum(\n        p.numel() for m in model.modules()\n        if isinstance(m, QConv2d) for p in [m.weight]\n    )\n\n    test_accs, bytes_used = [], []\n    test_acc = float('nan')\n\n    train_iter = iter(train_loader)\n\n    for step in tqdm(range(steps), desc=\"Training\"):\n        # Refill iterator when exhausted\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(train_loader)\n            images, labels = next(train_iter)\n\n        loss, Q = train_step(model, optimizer, images, labels, lam)\n        model_bytes = Q / 8 * weight_count\n\n        # Evaluate every 10 steps\n        if step % 10 == 9:\n            test_acc = get_test_accuracy(model, test_loader)\n\n        test_accs.append(test_acc)\n        bytes_used.append(model_bytes)\n\n    return test_accs, bytes_used\n```\n\n**Implementation note on DataLoader**: The reference uses random sampling with replacement (sampling indices, not a DataLoader). A DataLoader with `shuffle=True` is equivalent and more Pythonic. The batch size of 512 follows the reference exactly.\n\n---\n\n## Analytical Questions\n\n### Question 1 — Compression Term Analysis\n\nThe compression term $Q = \\text{total bits} / N_{\\text{weights}}$ divides by the weight count, not the channel count. For a layer with large $\\text{fan\\_in}$ (e.g., the $576 \\to 10$ final layer has fan_in = 576), pruning a single channel saves $576 \\times \\lambda / N_\\text{weights}$ loss units. For the first layer ($1 \\to 32$, fan_in = 25), pruning a channel saves only $25 \\times \\lambda / N_\\text{weights}$. **Does this asymmetry make later-layer pruning more aggressive?** Show mathematically why or why not.\n\n### Question 2 — STE and Continuous Bit-Widths\n\nThe STE is used to pass gradients through `round()` in the forward pass. But $Q$ is computed from $\\text{relu}(b)$ **before** rounding — $b$ is a continuous parameter, not rounded. Could you instead quantize $b$ to integer bit-widths during training? What would the gradient look like, and why does keeping $b$ continuous matter?\n\n### Question 3 — Adam Gradient Trajectory\n\nThe reference uses Adam with default parameters (learning rate $10^{-3}$). The $b$ parameters start at 2.0 and end around 2.5 for active channels or below 0 for pruned ones. Sketch the expected Adam gradient trajectory for a $b_c$ that ultimately gets pruned. How does Adam's momentum term affect the speed of pruning? Would SGD with momentum behave differently?\n\n### Question 4 — Decoupling Quantization from Training\n\nSelf-compression adds $\\lambda Q$ to the loss at training time, but inference uses the quantized weights. The model's test accuracy is measured on the quantized network. Could you decouple this — train without quantization in the forward pass but still optimize $b$? What would break, and what would the learned $b$ values represent?\n\n---\n\n## Synthesis: Reproducing the Paper's Result\n\nYou now have all the pieces of the Self-Compressing Neural Networks paper:\n\n- **Module 0** gave you the foundation of fixed-point quantization: how to map floats to integers with an exponent scale $e$ and bit-width $b$.\n- **Module 1** gave you the Straight-Through Estimator: the mathematical trick that lets gradients flow through the non-differentiable `round()` operation.\n- **Module 2** assembled these into the `QConv2d` layer: a drop-in replacement for `Conv2d` with quantization baked in.\n- **Module 3** (this module) connects the full training loop: the compression loss $\\lambda Q$, the architecture, and the optimization dynamic that causes emergent channel pruning.\n\nThe result you're targeting: from 87,860 × 32 = 2.81 megabits (351 KB) of original floating-point parameters, the self-compressing training loop produces a model representing the same function to ~98.2% accuracy using only ~18,075 bytes = 144,600 bits. That's **~19.4× compression**, achieved without any manual design choices about which channels to prune or what bit-widths to use.\n\nThe beauty is that the compression structure is **fully learned**: the network decides how many bits each channel needs to do its job, and channels that aren't needed are silenced automatically.\n\nIn Module 4 you'll explore the **Pareto frontier**: by sweeping $\\lambda$ from 0.01 to 0.5, you'll trace the curve of (accuracy, model size) pairs and observe that emergent pruning leaves certain channels with bit-widths exactly at 0 — a discrete \"phase transition\" in the compression-accuracy tradeoff.\n\n---\n\n### Key Formulas Reference\n\n| Formula | Meaning |\n|---------|---------|\n| $\\text{qbits}_\\ell = \\sum_c \\text{relu}(b_c) \\cdot \\text{fan\\_in}$ | Total bits for layer $\\ell$ |\n| $Q = \\sum_\\ell \\text{qbits}_\\ell / N_\\text{weights}$ | Average bits per weight |\n| $\\mathcal{L} = \\mathcal{L}_\\text{task} + \\lambda Q$ | Training loss |\n| $\\text{model bytes} = Q/8 \\cdot N_\\text{weights}$ | Model size in bytes |\n| $\\partial Q / \\partial b_c = \\text{fan\\_in} / N_\\text{weights} \\cdot \\mathbf{1}[b_c > 0]$ | Compression gradient |\n\n---\n\n*Next: [Module 4 — The Pareto Frontier & Emergent Pruning](../module_04_the_pareto_frontier_emergent_pruning/README.md)*\n", "exercises": [{"filename": "ex01_the_compression_loss.py", "content": "\"\"\"\nExercise 1: The Compression Loss\n=================================\nModule 3 — Self-Compression Training on MNIST\n\nThe core training objective of Self-Compressing Neural Networks:\n\n    L = L_task + lambda * Q\n\nwhere Q = avg bits per weight (differentiable w.r.t. each channel's b parameter).\n\nThe compression term Q is computed by summing qbits() across all QConv2d layers\nand dividing by the total weight count. Because relu(b) appears in the computation,\nQ is differentiable: d(Q)/d(b_c) = fan_in / N_weights when b_c > 0.\n\nThis creates NEGATIVE pressure on b during minimization:\n  * At lambda=0  : b only moves if task loss gradient drives it\n  * At lambda>0  : b is pushed toward 0 (cheaper to store)\n  * At lambda=1.0: strong compression pressure, most channels pruned\n\nYour tasks:\n  1. compute_compression_term(model) — compute Q = total_bits / total_weights\n  2. self_compression_loss(model, logits, targets, lam) — combine task + Q\n  3. verify_compression_gradient(model, lam_values) — test gradient directions\n\"\"\"\n\nimport math\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom typing import List\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# QConv2d — from Module 2 (provided, do NOT modify)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    \"\"\"Straight-Through Estimator for rounding.\n\n    Forward:  x.round()\n    Backward: gradient flows as if round() was identity\n    \"\"\"\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-Aware Conv2d with per-channel learnable bit-widths.\n\n    Parameters per output channel:\n      e  (float): log-scale exponent, controls quantization resolution\n      b  (float): bit-width, controls range (number of discrete values)\n\n    Both are learnable nn.Parameters updated by gradient descent.\n    \"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride = stride\n        self.padding = padding\n        self.kernel_size = kernel_size\n\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale = 1.0 / math.sqrt(fan_in)\n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        \"\"\"Quantized weight (pre-STE, continuous).\"\"\"\n        eff_b = torch.relu(self.b)\n        lower = -(2 ** (eff_b - 1))\n        upper =  (2 ** (eff_b - 1)) - 1\n        return torch.clamp(2 ** (-self.e) * self.weight, lower, upper)\n\n    def qbits(self) -> torch.Tensor:\n        \"\"\"Total bits needed to store this layer's weights.\n\n        Returns\n        -------\n        torch.Tensor\n            Scalar, differentiable w.r.t. self.b.\n            = relu(b).sum() * fan_in\n        \"\"\"\n        fan_in = math.prod(self.weight.shape[1:])\n        return torch.relu(self.b).sum() * fan_in\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w = ste_round(qw)\n        dw = (2 ** self.e) * w\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Small test model (2 QConv2d layers)\n# ──────────────────────────────────────────────────────────────────────────────\n\nclass TinyQModel(nn.Module):\n    \"\"\"Two-layer QConv2d model for testing the compression loss.\n\n    Architecture: conv(1→8, k=3) → relu → conv(8→4, k=1) → global avg → logits\n    \"\"\"\n\n    def __init__(self, num_classes: int = 10):\n        super().__init__()\n        self.conv1 = QConv2d(1, 8, 3, padding=1)\n        self.conv2 = QConv2d(8, 4, 1)\n        self.fc    = nn.Linear(4, num_classes)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.relu(self.conv2(x))\n        x = x.mean(dim=[2, 3])   # global average pool\n        return self.fc(x)\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# YOUR CODE — implement the three functions below\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    \"\"\"Compute the average bits per weight Q across all QConv2d layers.\n\n    Q = (sum of qbits() for each QConv2d layer) / (total weight parameters)\n\n    This is the compression metric from the paper. It is differentiable\n    with respect to each layer's b parameter (via relu in qbits()).\n\n    Parameters\n    ----------\n    model : nn.Module\n        A model containing one or more QConv2d layers.\n\n    Returns\n    -------\n    torch.Tensor\n        Scalar tensor Q (avg bits/weight). Gradient flows back to all b params.\n\n    Notes\n    -----\n    - Use model.modules() to iterate over all submodules recursively.\n    - Divide total bits by weight_count (not channel count!) to normalize.\n    - weight_count = sum of layer.weight.numel() for each QConv2d layer.\n    - Do NOT call .item() — this breaks the gradient graph.\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 8-12 lines                                             #\n    #                                                                         #\n    # Hint: collect two sums:                                                 #\n    #   1. total_bits = sum of layer.qbits() for each QConv2d                #\n    #   2. weight_count = sum of layer.weight.numel() for each QConv2d       #\n    # Then return total_bits / weight_count                                   #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\ndef self_compression_loss(\n    model: nn.Module,\n    logits: torch.Tensor,\n    targets: torch.Tensor,\n    lam: float,\n) -> tuple[torch.Tensor, float, float]:\n    \"\"\"Compute the combined self-compression training loss.\n\n    L = L_task + lambda * Q\n\n    where:\n      L_task = F.cross_entropy(logits, targets)   (classification loss)\n      Q      = compute_compression_term(model)     (avg bits per weight)\n      lambda = lam                                 (compression strength)\n\n    Parameters\n    ----------\n    model : nn.Module\n        The model (for computing Q via its QConv2d layers).\n    logits : torch.Tensor\n        Shape (B, num_classes). Raw classification scores.\n    targets : torch.Tensor\n        Shape (B,). Integer class labels.\n    lam : float\n        Compression regularization strength. Paper uses 0.05.\n\n    Returns\n    -------\n    tuple[torch.Tensor, float, float]\n        (total_loss, task_loss_value, Q_value)\n        total_loss : differentiable Tensor for .backward()\n        task_loss_value : float (for logging)\n        Q_value : float (avg bits per weight, for logging)\n\n    Notes\n    -----\n    - Return Q as a float in the tuple (Q.item()), but the total_loss tensor\n      must remain live (no .item() on it!) for backward() to work.\n    - lam * Q must be added BEFORE converting anything to float.\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 6-8 lines                                              #\n    #                                                                         #\n    # 1. task_loss = F.cross_entropy(logits, targets)                         #\n    # 2. Q = compute_compression_term(model)                                  #\n    # 3. total_loss = task_loss + lam * Q                                     #\n    # 4. return (total_loss, task_loss.item(), Q.item())                      #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\ndef verify_compression_gradient(\n    model: nn.Module,\n    lam_values: List[float],\n) -> None:\n    \"\"\"For each lambda, compute the full loss and inspect b.grad.\n\n    This function demonstrates that:\n      - At lam=0: b.grad direction is controlled by task loss only\n      - At lam>0: b.grad has a NEGATIVE component (compression pushes b down)\n      - Higher lam → more negative b.grad → stronger compression pressure\n\n    Parameters\n    ----------\n    model : nn.Module\n        A TinyQModel (or any model with QConv2d layers).\n    lam_values : list[float]\n        List of lambda values to test. E.g. [0.0, 0.01, 0.05, 0.1, 1.0].\n\n    Returns\n    -------\n    None\n        Prints a table: lambda | Q | task_loss | total_loss | mean(b.grad)\n        Ends with: 'Compression gradient verified: higher lambda -> stronger b reduction pressure'\n\n    Notes\n    -----\n    - You need fresh random data each iteration (or reuse — doesn't matter).\n    - IMPORTANT: zero all parameter gradients before each backward() call\n      using model.zero_grad(). Otherwise gradients accumulate.\n    - Access b.grad from QConv2d layers via model.modules().\n    - Collect all b.grad tensors from all QConv2d layers into one list,\n      then compute the mean of their concatenated values.\n    - The 'mean b.grad' should become more negative as lam increases.\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 10-15 lines                                            #\n    #                                                                         #\n    # Setup: create random input (B=16, C=1, H=8, W=8) and targets (B=16)   #\n    # For each lam in lam_values:                                             #\n    #   1. model.zero_grad()                                                  #\n    #   2. logits = model(x)                                                  #\n    #   3. loss, task_val, Q_val = self_compression_loss(model, logits, y, l) #\n    #   4. loss.backward()                                                    #\n    #   5. Collect b.grad from each QConv2d in model.modules()               #\n    #   6. Compute mean_b_grad = mean of all b gradients                     #\n    #   7. Print: f\"lam={lam:.3f} | Q={Q_val:.3f} | task={task_val:.3f} | \" #\n    #             f\"total={loss.item():.3f} | mean_b.grad={mean_b_grad:.4f}\" #\n    # After the loop, print the verification message                          #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Main test harness — DO NOT MODIFY\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    torch.manual_seed(42)\n\n    print(\"=\" * 65)\n    print(\"Exercise 1: The Compression Loss\")\n    print(\"=\" * 65)\n\n    model = TinyQModel(num_classes=10)\n\n    # ── Sanity check: Q at initialization ───────────────────────────────────\n    print(\"\\n[1] Compression term at initialization (b=2.0 everywhere):\")\n    Q_init = compute_compression_term(model)\n    print(f\"    Q = {Q_init.item():.4f} bits/weight  (expected ~2.0)\")\n    assert abs(Q_init.item() - 2.0) < 0.1, \\\n        f\"Expected Q ≈ 2.0, got {Q_init.item():.4f}\"\n\n    # ── Sanity check: Q is differentiable ───────────────────────────────────\n    print(\"\\n[2] Verifying Q is differentiable w.r.t. b:\")\n    Q = compute_compression_term(model)\n    Q.backward()\n    for name, layer in model.named_modules():\n        if isinstance(layer, QConv2d):\n            assert layer.b.grad is not None, f\"b.grad is None for {name}!\"\n            print(f\"    {name}.b.grad shape: {layer.b.grad.shape}, \"\n                  f\"mean: {layer.b.grad.mean().item():.4f}  ✓\")\n    model.zero_grad()\n\n    # ── Test self_compression_loss ───────────────────────────────────────────\n    print(\"\\n[3] Testing self_compression_loss with lambda=0.05:\")\n    x = torch.randn(16, 1, 8, 8)\n    y = torch.randint(0, 10, (16,))\n    logits = model(x)\n    loss, task_val, Q_val = self_compression_loss(model, logits, y, lam=0.05)\n    print(f\"    task_loss={task_val:.4f}, Q={Q_val:.4f}, total_loss={loss.item():.4f}\")\n    assert loss.requires_grad, \"total_loss must be a live tensor (requires_grad=True)\"\n    assert abs(loss.item() - (task_val + 0.05 * Q_val)) < 0.01, \\\n        \"total_loss != task_loss + 0.05 * Q\"\n    print(\"    ✓ loss composition verified\")\n\n    # ── Main gradient table ──────────────────────────────────────────────────\n    print(\"\\n[4] Gradient direction vs lambda:\")\n    print(f\"    {'lambda':>7} | {'Q':>6} | {'task':>8} | {'total':>8} | {'mean b.grad':>12}\")\n    print(\"    \" + \"-\" * 55)\n    verify_compression_gradient(model, lam_values=[0.0, 0.01, 0.05, 0.1, 1.0])\n\n    print(\"\\n✓ All checks passed!\")\n"}, {"filename": "ex02_train_the_selfcompressing_cnn.py", "content": "\"\"\"\nExercise 2: Train the Self-Compressing CNN\n==========================================\nModule 3 — Self-Compression Training on MNIST\n\nImplement the full self-compression training loop that jointly optimizes:\n  - Test accuracy on MNIST (via cross-entropy task loss)\n  - Model compression (via the lambda * Q compression penalty)\n\nReference result (from the paper's notebook):\n  loss:   0.14  bytes: 18075.4  acc: 98.20%\n\nAfter 20,000 steps you should see:\n  - Test accuracy >= 97.5%\n  - Model size <= 25,000 bytes\n  - A dual-axis plot showing accuracy rising and bytes decreasing over time\n\nKey implementation details:\n  - Architecture: 5 QConv2d layers (1->32->32->64->64->10)\n  - NO padding on any conv layer (gives 3x3 spatial after two pools)\n  - Reshape: x.flatten(1).reshape(B, 576, 1, 1) before the final 1x1 conv\n  - Batch size: 512  |  Optimizer: Adam (default lr=1e-3)\n  - lambda = 0.05  |  Steps: 20,000\n\"\"\"\n\nimport math\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import DataLoader\nimport torchvision\nimport torchvision.transforms as transforms\nfrom tqdm import tqdm\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport os\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# QConv2d + compression loss (provided — matches Exercise 1)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-Aware Conv2d with per-channel learnable (e, b) parameters.\"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride = stride\n        self.padding = padding\n        self.kernel_size = kernel_size\n\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale = 1.0 / math.sqrt(fan_in)\n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        eff_b = torch.relu(self.b)\n        lower = -(2 ** (eff_b - 1))\n        upper =  (2 ** (eff_b - 1)) - 1\n        return torch.clamp(2 ** (-self.e) * self.weight, lower, upper)\n\n    def qbits(self) -> torch.Tensor:\n        fan_in = math.prod(self.weight.shape[1:])\n        return torch.relu(self.b).sum() * fan_in\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w = ste_round(qw)\n        dw = (2 ** self.e) * w\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n\n\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    total_bits = torch.tensor(0.0)\n    weight_count = 0\n    for layer in model.modules():\n        if isinstance(layer, QConv2d):\n            total_bits = total_bits + layer.qbits()\n            weight_count += layer.weight.numel()\n    return total_bits / weight_count\n\n\ndef self_compression_loss(model, logits, targets, lam):\n    task_loss = F.cross_entropy(logits, targets)\n    Q = compute_compression_term(model)\n    total_loss = task_loss + lam * Q\n    return total_loss, task_loss.item(), Q.item()\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: Data loading\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef get_mnist_loaders(batch_size: int = 512, data_dir: str = \"/tmp/mnist\"):\n    \"\"\"Download MNIST and return (train_loader, test_loader).\n\n    Parameters\n    ----------\n    batch_size : int\n        Training batch size. Paper uses 512.\n    data_dir : str\n        Where to cache the dataset.\n\n    Returns\n    -------\n    tuple[DataLoader, DataLoader]\n        (train_loader, test_loader)\n    \"\"\"\n    transform = transforms.Compose([\n        transforms.ToTensor(),\n        transforms.Normalize((0.1307,), (0.3081,)),\n    ])\n    train_ds = torchvision.datasets.MNIST(data_dir, train=True,  download=True, transform=transform)\n    test_ds  = torchvision.datasets.MNIST(data_dir, train=False, download=True, transform=transform)\n    train_loader = DataLoader(train_ds, batch_size=batch_size, shuffle=True,  num_workers=0, pin_memory=False)\n    test_loader  = DataLoader(test_ds,  batch_size=2000,       shuffle=False, num_workers=0, pin_memory=False)\n    return train_loader, test_loader\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: Evaluation and plotting\n# ──────────────────────────────────────────────────────────────────────────────\n\n@torch.no_grad()\ndef get_test_accuracy(model: nn.Module, test_loader: DataLoader) -> float:\n    \"\"\"Evaluate test accuracy on the full MNIST test set.\n\n    Parameters\n    ----------\n    model : nn.Module\n    test_loader : DataLoader\n\n    Returns\n    -------\n    float\n        Accuracy in percent (0-100).\n\n    Note: Model stays in train() mode since BatchNorm uses track_running_stats=False,\n    matching the tinygrad reference (batch stats are always used).\n    \"\"\"\n    model.train()   # BatchNorm uses batch stats regardless (track_running_stats=False)\n    correct = total = 0\n    for images, labels in test_loader:\n        logits = model(images)\n        correct += (logits.argmax(1) == labels).sum().item()\n        total += labels.size(0)\n    return 100.0 * correct / total\n\n\ndef plot_training_dynamics(\n    test_accs: list[float],\n    bytes_used: list[float],\n    save_path: str = \"training_dynamics.png\",\n) -> None:\n    \"\"\"Dual-axis plot: model size (bytes) and test accuracy vs training steps.\n\n    Parameters\n    ----------\n    test_accs : list[float]\n        Test accuracy per step (NaN for steps without evaluation).\n    bytes_used : list[float]\n        Model bytes per step.\n    save_path : str\n        Where to save the PNG.\n    \"\"\"\n    fig, ax1 = plt.subplots(figsize=(12, 5))\n    ax1.plot(bytes_used, color=\"red\", alpha=0.8, label=\"Model bytes\")\n    ax1.set_ylabel(\"Model Size (bytes)\", color=\"red\")\n    ax1.tick_params(axis=\"y\", labelcolor=\"red\")\n    ax1.set_xlabel(\"Training step\")\n\n    ax2 = ax1.twinx()\n    ax2.plot(test_accs, color=\"blue\", alpha=0.8, label=\"Test accuracy\")\n    ax2.set_ylabel(\"Test Accuracy (%)\", color=\"blue\")\n    ax2.tick_params(axis=\"y\", labelcolor=\"blue\")\n    ax2.set_ylim(80, 100)\n\n    plt.title(\"Self-Compressing CNN: Accuracy vs Model Size over Training\")\n    fig.tight_layout()\n    plt.savefig(save_path, dpi=120)\n    plt.close()\n    print(f\"    Saved: {save_path}\")\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# YOUR CODE — implement the three components below\n# ──────────────────────────────────────────────────────────────────────────────\n\nclass SelfCompressingCNN(nn.Module):\n    \"\"\"Five-layer CNN for MNIST using QConv2d layers throughout.\n\n    Architecture (NO padding on any layer — spatial dims reduce):\n      Input:        (B, 1, 28, 28)\n      conv1 (k=5):  (B, 32, 24, 24)  <- 28-5+1=24\n      conv2 (k=5):  (B, 32, 20, 20)  <- 24-5+1=20\n      BN + MaxPool: (B, 32, 10, 10)  <- 20//2=10\n      conv3 (k=3):  (B, 64,  8,  8)  <- 10-3+1=8\n      conv4 (k=3):  (B, 64,  6,  6)  <- 8-3+1=6\n      BN + MaxPool: (B, 64,  3,  3)  <- 6//2=3\n      Flatten+Reshape: (B, 576, 1, 1)   <- 64*3*3=576\n      conv5 (k=1):  (B, 10,  1,  1)\n      Flatten:      (B, 10)\n\n    Total weight parameters:\n      32*1*5*5 + 32*32*5*5 + 64*32*3*3 + 64*64*3*3 + 10*576*1*1\n      = 800 + 25600 + 18432 + 36864 + 5760 = 87456\n\n    BatchNorm is used WITHOUT learnable affine params (affine=False) to\n    avoid interference with the quantized weights.\n    \"\"\"\n\n    def __init__(self):\n        super().__init__()\n        ###########################################################################\n        # YOUR CODE HERE — 10-15 lines                                            #\n        #                                                                         #\n        # Define these attributes (in order):                                     #\n        #   self.conv1 = QConv2d(1,   32, 5)    # no padding                    #\n        #   self.conv2 = QConv2d(32,  32, 5)                                     #\n        #   self.bn1   = nn.BatchNorm2d(32, affine=False,                        #\n        #                               track_running_stats=False)               #\n        #   self.conv3 = QConv2d(32,  64, 3)                                     #\n        #   self.conv4 = QConv2d(64,  64, 3)                                     #\n        #   self.bn2   = nn.BatchNorm2d(64, affine=False,                        #\n        #                               track_running_stats=False)               #\n        #   self.conv5 = QConv2d(576, 10, 1)    # 1x1 conv as linear layer      #\n        #                                                                         #\n        # NOTE: track_running_stats=False matches the tinygrad reference where   #\n        # BatchNorm always uses batch statistics (no EMA running mean/var).      #\n        ###########################################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################################\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"Forward pass through the self-compressing CNN.\n\n        Parameters\n        ----------\n        x : torch.Tensor\n            Shape (B, 1, 28, 28). MNIST images (normalized).\n\n        Returns\n        -------\n        torch.Tensor\n            Shape (B, 10). Logits (unnormalized class scores).\n\n        Notes\n        -----\n        Follow this exact sequence:\n          1. relu(conv1(x))\n          2. max_pool2d(bn1(relu(conv2(...))), kernel_size=2)\n          3. relu(conv3(...))\n          4. max_pool2d(bn2(relu(conv4(...))), kernel_size=2)\n          5. x.flatten(1).reshape(B, 576, 1, 1)\n          6. conv5(x).flatten(1)\n        \"\"\"\n        ###########################################################################\n        # YOUR CODE HERE — 8-10 lines                                             #\n        #                                                                         #\n        # Hint: The reshape step is:                                              #\n        #   x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)                     #\n        # After conv4+bn2+pool, x has shape (B, 64, 3, 3).                      #\n        # flatten(1) gives (B, 576), then reshape gives (B, 576, 1, 1).         #\n        ###########################################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################################\n\n\ndef train_step(\n    model: nn.Module,\n    optimizer: torch.optim.Optimizer,\n    images: torch.Tensor,\n    labels: torch.Tensor,\n    lam: float,\n) -> tuple[float, float]:\n    \"\"\"Single training step: forward, loss, backward, update.\n\n    Parameters\n    ----------\n    model : nn.Module\n        SelfCompressingCNN (or any nn.Module with QConv2d layers).\n    optimizer : torch.optim.Optimizer\n        Adam optimizer (or any optimizer).\n    images : torch.Tensor\n        Shape (B, 1, 28, 28). Training batch.\n    labels : torch.Tensor\n        Shape (B,). Integer class labels.\n    lam : float\n        Compression strength. Reference: 0.05.\n\n    Returns\n    -------\n    tuple[float, float]\n        (total_loss_value, Q_value)\n        Both are plain floats (use .item()).\n\n    Notes\n    -----\n    - Call model.train() at the start.\n    - Zero gradients BEFORE forward pass (optimizer.zero_grad()).\n    - Return loss.item() and Q_val (already float from self_compression_loss).\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 8-12 lines                                             #\n    #                                                                         #\n    # 1. model.train()                                                        #\n    # 2. optimizer.zero_grad()                                                #\n    # 3. logits = model(images)                                               #\n    # 4. loss, _, Q_val = self_compression_loss(model, logits, labels, lam)  #\n    # 5. loss.backward()                                                      #\n    # 6. optimizer.step()                                                     #\n    # 7. return loss.item(), Q_val                                            #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\ndef training_loop(\n    model: nn.Module,\n    train_loader: DataLoader,\n    test_loader: DataLoader,\n    steps: int = 20_000,\n    lam: float = 0.05,\n) -> tuple[list[float], list[float]]:\n    \"\"\"Full training loop for self-compression training.\n\n    Parameters\n    ----------\n    model : nn.Module\n        SelfCompressingCNN instance.\n    train_loader : DataLoader\n        Infinite-ish training data (will cycle through as needed).\n    test_loader : DataLoader\n        MNIST test set for periodic evaluation.\n    steps : int\n        Total training steps. Reference: 20,000.\n    lam : float\n        Compression hyperparameter. Reference: 0.05.\n\n    Returns\n    -------\n    tuple[list[float], list[float]]\n        (test_accs, bytes_used)\n        test_accs : float per step (NaN except every 10 steps)\n        bytes_used : bytes per step\n\n    Notes\n    -----\n    - Create Adam optimizer: torch.optim.Adam(model.parameters())\n    - Compute weight_count once: sum(layer.weight.numel() for QConv2d layers)\n    - model_bytes = Q / 8 * weight_count  (from Q, the avg bits/weight)\n    - Evaluate accuracy every 10 steps (when step % 10 == 9)\n    - Use tqdm for the progress bar with step description showing:\n        f\"loss: {loss:.4f}  bytes: {model_bytes:.0f}  acc: {test_acc:.2f}%\"\n    - Cycle through train_loader: use iter() + next(), reset iter on StopIteration\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 20-30 lines                                            #\n    #                                                                         #\n    # Skeleton:                                                                #\n    #   optimizer = torch.optim.Adam(model.parameters())                     #\n    #   weight_count = sum(l.weight.numel() for l in model.modules()         #\n    #                      if isinstance(l, QConv2d))                        #\n    #   test_accs, bytes_used = [], []                                        #\n    #   test_acc = float('nan')                                               #\n    #   train_iter = iter(train_loader)                                       #\n    #   for step in tqdm(range(steps)):                                       #\n    #       try: images, labels = next(train_iter)                            #\n    #       except StopIteration: train_iter = ...; images, labels = ...      #\n    #       loss_val, Q_val = train_step(model, optimizer, images, labels, l) #\n    #       model_bytes = Q_val / 8 * weight_count                           #\n    #       if step % 10 == 9: test_acc = get_test_accuracy(model, test_ldr)  #\n    #       test_accs.append(test_acc)                                        #\n    #       bytes_used.append(model_bytes)                                    #\n    #   return test_accs, bytes_used                                          #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Main — DO NOT MODIFY\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n\n    print(\"=\" * 65)\n    print(\"Exercise 2: Train the Self-Compressing CNN\")\n    print(\"=\" * 65)\n\n    # Architecture sanity check\n    print(\"\\n[1] Architecture shape check:\")\n    dummy_model = SelfCompressingCNN()\n    dummy_input = torch.randn(4, 1, 28, 28)\n    dummy_out = dummy_model(dummy_input)\n    assert dummy_out.shape == (4, 10), \\\n        f\"Expected output shape (4, 10), got {dummy_out.shape}\"\n    print(f\"    Input:  {dummy_input.shape}\")\n    print(f\"    Output: {dummy_out.shape}  ✓\")\n\n    weight_count = sum(\n        l.weight.numel() for l in dummy_model.modules() if isinstance(l, QConv2d)\n    )\n    print(f\"    Weight parameters: {weight_count:,}\")\n    print(f\"    At 32-bit floats: {weight_count * 4 / 1024:.1f} KB\")\n\n    # Load MNIST\n    print(\"\\n[2] Loading MNIST...\")\n    train_loader, test_loader = get_mnist_loaders(batch_size=512)\n    print(f\"    Train batches: {len(train_loader)},  Test batches: {len(test_loader)}\")\n\n    # Train — default 25 steps for fast structural check (set TRAIN_STEPS=20000 for\n    # the reference result: 98.2% accuracy @ ~18 KB on GPU)\n    TRAIN_STEPS = int(os.environ.get(\"TRAIN_STEPS\", \"25\"))\n    print(f\"\\n[3] Training for {TRAIN_STEPS} steps (lambda=0.05)...\")\n    print(f\"    (TRAIN_STEPS=20000 → 98.2% accuracy @ ~18 KB per reference)\")\n    model = SelfCompressingCNN()\n    test_accs, bytes_used = training_loop(\n        model, train_loader, test_loader, steps=TRAIN_STEPS, lam=0.05\n    )\n\n    # Final evaluation\n    final_acc = get_test_accuracy(model, test_loader)\n    final_Q   = compute_compression_term(model).item()\n    final_bytes = final_Q / 8 * weight_count\n    compression_ratio = (weight_count * 4) / (final_bytes / 1)   # vs float32\n\n    print(f\"\\n[4] Final results:\")\n    print(f\"    Final — accuracy: {final_acc:.2f}%, model size: {final_bytes:.1f} bytes, \"\n          f\"compression: {compression_ratio:.1f}x\")\n\n    # Structural validation: verify compression is active and code is correct\n    init_bytes = 2.0 / 8 * weight_count   # Q=2.0 bits/weight at initialization\n    assert not (final_acc != final_acc), \"accuracy is NaN — check forward pass\"\n    assert final_bytes <= init_bytes + 1.0, \\\n        \"Model bytes unexpectedly grew during training — check compression loss\"\n    print(f\"    ✓ compression active: {final_bytes:.0f} bytes (init: {init_bytes:.0f})\")\n    print(f\"    ✓ accuracy in output (run TRAIN_STEPS=20000 for target >= 97.5%)\")\n\n    # Save plot\n    plot_path = os.path.join(os.path.dirname(__file__), \"training_dynamics.png\")\n    plot_training_dynamics(test_accs, bytes_used, save_path=plot_path)\n    print(f\"\\n✓ Training complete!\")\n"}, {"filename": "ex03_analyze_learned_bitwidth_distributions.py", "content": "\"\"\"\nExercise 3: Analyze Learned Bit-Width Distributions\n=====================================================\nModule 3 — Self-Compression Training on MNIST\n\nAfter training the self-compressing CNN (Exercise 2), we inspect the learned\nbit-width parameters to understand HOW the network compressed itself.\n\nKey insight: The learned bit-width distribution is NON-UNIFORM:\n  - Some channels get pruned (b driven below 0, relu(b) = 0 bits)\n  - Active channels retain 2-4 bits depending on their importance\n  - The final classifier layer (576→10) resists pruning — accuracy depends on it\n  - The distribution is bimodal: cluster near 0 (pruned) + cluster at 2-3 (active)\n\nFrom the reference notebook (layers.0.b values after training):\n  [ 2.5146  2.3283  -0.0062  2.3243  2.8054  3.2020  2.3323  3.1703  3.5180  2.9075 ]\n  Channel 2 has b = -0.0062 → relu(b) = 0 → effectively PRUNED\n\nYour tasks:\n  1. extract_bit_widths(model) — extract relu(b) from each QConv2d layer\n  2. compute_layer_stats(bit_widths_dict) — compute pruned/active/mean/max per layer\n  3. visualize_bit_distributions(bit_widths_dict) — multi-panel histogram\n\nThis exercise can run in two modes:\n  a) Standalone: trains a short model (5,000 steps, lower accuracy) for quick analysis\n  b) Load saved model from Exercise 2 (if trained_model.pt exists in _solutions/)\n\"\"\"\n\nimport math\nimport os\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import DataLoader\nimport torchvision\nimport torchvision.transforms as transforms\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nfrom typing import Dict\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# QConv2d + model (provided — same as Exercise 2)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-Aware Conv2d with per-channel learnable (e, b) parameters.\"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride = stride\n        self.padding = padding\n        self.kernel_size = kernel_size\n\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale = 1.0 / math.sqrt(fan_in)\n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        eff_b = torch.relu(self.b)\n        lower = -(2 ** (eff_b - 1))\n        upper =  (2 ** (eff_b - 1)) - 1\n        return torch.clamp(2 ** (-self.e) * self.weight, lower, upper)\n\n    def qbits(self) -> torch.Tensor:\n        fan_in = math.prod(self.weight.shape[1:])\n        return torch.relu(self.b).sum() * fan_in\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w = ste_round(qw)\n        dw = (2 ** self.e) * w\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n\n\nclass SelfCompressingCNN(nn.Module):\n    \"\"\"Five-layer QConv2d CNN for MNIST (same architecture as Exercise 2).\"\"\"\n\n    def __init__(self):\n        super().__init__()\n        self.conv1 = QConv2d(1,   32, 5)\n        self.conv2 = QConv2d(32,  32, 5)\n        self.bn1   = nn.BatchNorm2d(32, affine=False, track_running_stats=False)\n        self.conv3 = QConv2d(32,  64, 3)\n        self.conv4 = QConv2d(64,  64, 3)\n        self.bn2   = nn.BatchNorm2d(64, affine=False, track_running_stats=False)\n        self.conv5 = QConv2d(576, 10, 1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.max_pool2d(self.bn1(F.relu(self.conv2(x))), 2)\n        x = F.relu(self.conv3(x))\n        x = F.max_pool2d(self.bn2(F.relu(self.conv4(x))), 2)\n        x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)\n        return self.conv5(x).flatten(1)\n\n\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    total_bits = torch.tensor(0.0)\n    weight_count = 0\n    for layer in model.modules():\n        if isinstance(layer, QConv2d):\n            total_bits = total_bits + layer.qbits()\n            weight_count += layer.weight.numel()\n    return total_bits / weight_count\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: Quick training for standalone mode\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef quick_train(model: nn.Module, steps: int = 5_000, lam: float = 0.05) -> None:\n    \"\"\"Train for a reduced number of steps for quick analysis.\n\n    Note: 5,000 steps achieves ~95% accuracy and partial compression.\n    For the full reference result, run Exercise 2 first and load its model.\n    \"\"\"\n    from tqdm import tqdm\n    transform = transforms.Compose([\n        transforms.ToTensor(),\n        transforms.Normalize((0.1307,), (0.3081,)),\n    ])\n    ds = torchvision.datasets.MNIST(\"/tmp/mnist\", train=True, download=True, transform=transform)\n    loader = DataLoader(ds, batch_size=512, shuffle=True, num_workers=2)\n\n    optimizer = torch.optim.Adam(model.parameters())\n    train_iter = iter(loader)\n\n    for step in tqdm(range(steps), desc=f\"Quick training ({steps} steps)\"):\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(loader)\n            images, labels = next(train_iter)\n\n        model.train()\n        optimizer.zero_grad()\n        logits = model(images)\n        task_loss = F.cross_entropy(logits, labels)\n        Q = compute_compression_term(model)\n        loss = task_loss + lam * Q\n        loss.backward()\n        optimizer.step()\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# YOUR CODE — implement the three analysis functions below\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef extract_bit_widths(model: nn.Module) -> Dict[str, np.ndarray]:\n    \"\"\"Extract effective bit-widths (relu(b)) from all QConv2d layers.\n\n    IMPORTANT: Use relu(b), not raw b. Negative b values are treated as 0 bits\n    because relu clamps them. Plotting raw b would show negative values which\n    have no physical meaning as bit-widths.\n\n    Parameters\n    ----------\n    model : nn.Module\n        A trained SelfCompressingCNN (or any model with QConv2d layers).\n\n    Returns\n    -------\n    dict[str, np.ndarray]\n        Keys: layer names (e.g. 'conv1', 'conv2', ...)\n        Values: 1D numpy arrays of effective bit-widths per output channel.\n                Shape: (out_channels,). Values >= 0 (relu applied).\n\n    Notes\n    -----\n    - Use model.named_modules() to get (name, layer) pairs.\n    - Only include QConv2d layers (isinstance check).\n    - layer.b has shape (out_channels, 1, 1, 1). Call .flatten() then .numpy().\n    - Apply relu: np.maximum(b_vals, 0) or use F.relu before .detach().numpy().\n    - Wrap in torch.no_grad() to avoid tracking gradients.\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 8-12 lines                                             #\n    #                                                                         #\n    # bit_widths = {}                                                          #\n    # with torch.no_grad():                                                   #\n    #     for name, layer in model.named_modules():                           #\n    #         if isinstance(layer, QConv2d):                                  #\n    #             b_vals = layer.b.flatten()   # shape: (out_channels,)       #\n    #             eff_b  = torch.relu(b_vals).numpy()   # shape: (out_ch,)   #\n    #             bit_widths[name] = eff_b                                    #\n    # return bit_widths                                                        #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\ndef compute_layer_stats(\n    bit_widths_dict: Dict[str, np.ndarray]\n) -> Dict[str, dict]:\n    \"\"\"Compute per-layer statistics about learned bit-width distributions.\n\n    Parameters\n    ----------\n    bit_widths_dict : dict[str, np.ndarray]\n        From extract_bit_widths(). Keys: layer names, values: bit-width arrays.\n\n    Returns\n    -------\n    dict[str, dict]\n        For each layer name, a dict with:\n          'num_channels'   : int   — total output channels\n          'num_pruned'     : int   — channels with eff_b <= 0.01 (effectively 0)\n          'num_active'     : int   — channels with eff_b > 0.01\n          'mean_bits'      : float — mean eff_b over all channels\n          'max_bits'       : float — maximum eff_b\n          'compression_ratio' : float — 32 / mean_bits  (vs float32 baseline)\n\n    Notes\n    -----\n    - A channel is \"pruned\" if its effective bit-width <= 0.01 (not strictly 0\n      because floating-point b may be tiny but not exactly 0 after relu).\n    - compression_ratio = 32 / mean_bits tells you how much smaller this layer\n      is vs storing weights in float32. Use mean_bits in the denominator.\n    - If mean_bits == 0 (all pruned), set compression_ratio = float('inf').\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 10-15 lines                                            #\n    #                                                                         #\n    # stats = {}                                                               #\n    # for name, eff_b in bit_widths_dict.items():                             #\n    #     num_channels = len(eff_b)                                           #\n    #     num_pruned   = int(np.sum(eff_b <= 0.01))                          #\n    #     num_active   = num_channels - num_pruned                            #\n    #     mean_bits    = float(np.mean(eff_b))                                #\n    #     max_bits     = float(np.max(eff_b))                                 #\n    #     comp_ratio   = 32 / mean_bits if mean_bits > 0 else float('inf')   #\n    #     stats[name]  = {...}                                                 #\n    # return stats                                                             #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\ndef visualize_bit_distributions(\n    bit_widths_dict: Dict[str, np.ndarray],\n    save_path: str = \"bitwidth_distributions.png\",\n) -> None:\n    \"\"\"Create a multi-panel histogram of bit-width distributions per layer.\n\n    One subplot per QConv2d layer. Each histogram shows:\n      - X axis: effective bit-width (0 to max_bits+0.5)\n      - Y axis: number of channels\n      - Red bars: pruned channels (eff_b <= 0.01)\n      - Blue bars: active channels (eff_b > 0.01)\n      - Title: layer name + (N_pruned pruned / N_active active)\n\n    Parameters\n    ----------\n    bit_widths_dict : dict[str, np.ndarray]\n    save_path : str\n        Where to save the figure.\n\n    Notes\n    -----\n    - Use plt.subplots(1, n_layers, figsize=(4*n_layers, 4))\n    - For each layer, plot a single histogram using ax.hist(eff_b, bins=20, ...)\n    - Color channels by whether they are pruned or active:\n        pruned_mask = eff_b <= 0.01\n        ax.hist(eff_b[pruned_mask], bins=10, color='red', label='pruned')\n        ax.hist(eff_b[~pruned_mask], bins=20, color='royalblue', label='active')\n    - Add ax.axvline(x=0.01, color='gray', linestyle='--') threshold line\n    - Add labels: ax.set_xlabel('Effective bits'), ax.set_ylabel('# channels')\n    \"\"\"\n    ###########################################################################\n    # YOUR CODE HERE — 15-20 lines                                            #\n    #                                                                         #\n    # n = len(bit_widths_dict)                                                 #\n    # fig, axes = plt.subplots(1, n, figsize=(4*n, 4), sharey=False)         #\n    # if n == 1: axes = [axes]                                                #\n    # for ax, (name, eff_b) in zip(axes, bit_widths_dict.items()):           #\n    #     pruned_mask = eff_b <= 0.01                                         #\n    #     if pruned_mask.any():                                               #\n    #         ax.hist(eff_b[pruned_mask], bins=10, color='red', alpha=0.7,   #\n    #                 label=f'{pruned_mask.sum()} pruned')                    #\n    #     ax.hist(eff_b[~pruned_mask], bins=20, color='royalblue', alpha=0.7,#\n    #             label=f'{(~pruned_mask).sum()} active')                     #\n    #     ax.axvline(x=0.01, color='gray', linestyle='--', alpha=0.5)        #\n    #     ax.set_title(name); ax.set_xlabel('Effective bits')                 #\n    #     ax.legend(fontsize=8)                                               #\n    # plt.suptitle('Learned Bit-Width Distributions per Layer')              #\n    # plt.tight_layout(); plt.savefig(save_path, dpi=120); plt.close()       #\n    ###########################################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Main — DO NOT MODIFY\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    torch.manual_seed(42)\n\n    print(\"=\" * 65)\n    print(\"Exercise 3: Analyze Learned Bit-Width Distributions\")\n    print(\"=\" * 65)\n\n    # Load or train model\n    model = SelfCompressingCNN()\n    saved_model_path = os.path.join(os.path.dirname(__file__), \"_solutions\", \"trained_model.pt\")\n\n    if os.path.exists(saved_model_path):\n        print(f\"\\n[1] Loading trained model from: {saved_model_path}\")\n        model.load_state_dict(torch.load(saved_model_path, weights_only=True))\n        print(\"    Loaded  ✓\")\n    else:\n        print(\"\\n[1] No saved model found — training for 5,000 steps (quick mode).\")\n        print(\"    For full reference results, run Exercise 2 first.\")\n        quick_train(model, steps=5_000, lam=0.05)\n\n    model.eval()\n\n    # Extract bit-widths\n    print(\"\\n[2] Extracting learned bit-widths from each QConv2d layer:\")\n    bit_widths = extract_bit_widths(model)\n\n    assert isinstance(bit_widths, dict), \"extract_bit_widths must return a dict\"\n    assert len(bit_widths) == 5, f\"Expected 5 QConv2d layers, got {len(bit_widths)}\"\n    for name, bw in bit_widths.items():\n        assert isinstance(bw, np.ndarray), f\"{name}: expected np.ndarray\"\n        assert (bw >= 0).all(), f\"{name}: bit-widths must be >= 0 (relu applied)\"\n        print(f\"    {name}: {len(bw)} channels, \"\n              f\"range [{bw.min():.3f}, {bw.max():.3f}] bits\")\n\n    # Compute stats\n    print(\"\\n[3] Per-layer statistics:\")\n    stats = compute_layer_stats(bit_widths)\n\n    total_pruned = 0\n    total_channels = 0\n    for name, s in stats.items():\n        n_ch = s['num_channels']\n        n_pr = s['num_pruned']\n        n_ac = s['num_active']\n        mean = s['mean_bits']\n        maxi = s['max_bits']\n        ratio = s['compression_ratio']\n        total_pruned += n_pr\n        total_channels += n_ch\n        ratio_str = f\"{ratio:.1f}x\" if ratio != float('inf') else \"∞\"\n        print(f\"    {name}: {n_ch} channels, \"\n              f\"{n_pr} pruned, {n_ac} active, \"\n              f\"mean_bits={mean:.2f}, max_bits={maxi:.2f}, \"\n              f\"compression={ratio_str}\")\n\n    active_bws = []\n    for name, bw in bit_widths.items():\n        active_bws.extend(bw[bw > 0.01].tolist())\n    avg_active_bits = np.mean(active_bws) if active_bws else 0.0\n\n    print(f\"\\n    Network learned to prune {total_pruned} of {total_channels} channels, \"\n          f\"averaging {avg_active_bits:.2f} bits/weight for remaining channels\")\n\n    # Visualize\n    print(\"\\n[4] Generating bit-width distribution plots...\")\n    plot_path = os.path.join(os.path.dirname(__file__), \"bitwidth_distributions.png\")\n    visualize_bit_distributions(bit_widths, save_path=plot_path)\n    print(f\"    Saved: {plot_path}\")\n\n    # Overall Q\n    Q = compute_compression_term(model).item()\n    weight_count = sum(l.weight.numel() for l in model.modules() if isinstance(l, QConv2d))\n    model_bytes = Q / 8 * weight_count\n    print(f\"\\n[5] Overall compression: Q={Q:.4f} bits/weight, \"\n          f\"model size={model_bytes:.1f} bytes\")\n\n    print(\"\\n✓ Analysis complete!\")\n"}]}, "module_04_the_pareto_frontier__emergent_pruning": {"content": "# Module 4: The Pareto Frontier & Emergent Pruning\n\n## Table of Contents\n\n1. [Learning Objectives](#learning-objectives)\n2. [The Compression–Accuracy Tradeoff: A First Look](#the-compressionaccuracy-tradeoff-a-first-look)\n3. [What Is a Pareto Frontier?](#what-is-a-pareto-frontier)\n4. [Mapping the Frontier: The Lambda Sweep](#mapping-the-frontier-the-lambda-sweep)\n5. [Self-Compression vs. Post-Training Quantization](#self-compression-vs-post-training-quantization)\n6. [Emergent Channel Pruning](#emergent-channel-pruning)\n7. [The Anatomy of a Pruned Channel](#the-anatomy-of-a-pruned-channel)\n8. [Analytical Questions](#analytical-questions)\n9. [Synthesis: What We've Built](#synthesis-what-weve-built)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n- Explain what a Pareto frontier means in the context of model compression and why it is the right unit of analysis\n- Derive the relationship between the regularization hyperparameter $\\lambda$ and a point on the size–accuracy tradeoff curve\n- Identify the \"knee\" of the Pareto curve and explain why small changes in $\\lambda$ near the knee produce disproportionately large changes in model size\n- Articulate why quantization-aware training (QAT) outperforms post-training quantization (PTQ) at low bit-widths, and trace the mechanism to the gradient signal\n- Explain emergent channel pruning as a consequence of bit-width optimization, not a separate algorithm, and identify which channels the network chooses to prune\n\n---\n\n## The Compression–Accuracy Tradeoff: A First Look\n\nIn Module 3, you trained a self-compressing CNN with $\\lambda = 0.05$ and obtained roughly **98.2% accuracy** at a model size of **~18 KB** — a 20× compression from
