y in convolutional networks. Pruning research consistently shows that channels (not individual weights) are the right unit for structured compression — removing an entire channel removes a row from the weight matrix, keeps the computation graph intact, and produces a strictly smaller network. Self-compression arrives at the same conclusion organically: when a channel's `b_i` is driven to zero by the compression penalty, that channel is effectively pruned.[^1]\n\n[^1]: The paper calls this \"emergent channel pruning\" — the network discovers which channels are expendable without any explicit pruning algorithm. After training, some channels have `b ≈ -0.009`, which through `relu(b) = 0` contributes exactly zero bits. We see this clearly in the reference output: `layers.2.b [2.39, 2.32, 2.32, -0.009, -0.007, ...]` — four channels in the second conv layer are effectively pruned.\n\n---\n\n## The Parameter Layout: Broadcasting Through Shape {#parameter-layout}\n\nThe weight tensor of `QConv2d(1, 32, 5)` has shape:\n\n$$W \\in \\mathbb{R}^{(32,\\ 1,\\ 5,\\ 5)}$$\n\nWe need parameters $e$ and $b$ to be **per-channel** — one value per output channel. But we also need them to broadcast cleanly when we compute `e * W` (element-wise scaling).\n\nThe trick is to give `e` and `b` shape `(out_channels, 1, 1, 1)`:\n\n$$e \\in \\mathbb{R}^{(32,\\ 1,\\ 1,\\ 1)}, \\quad b \\in \\mathbb{R}^{(32,\\ 1,\\ 1,\\ 1)}$$\n\nWhen PyTorch broadcasts `(32, 1, 1, 1)` against `(32, 1, 5, 5)`, it replicates the single value across all `1 × 5 × 5 = 25` weight positions in each channel. Channel `i`'s exponent $e_i$ applies uniformly to all 25 weights in that filter.\n\n![Per-channel parameter broadcasting layout](diagrams/perchannel_params.svg)\n\nIn code:\n\n```python\nself.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\nself.b = nn.Parameter(torch.full((out_channels, 1, 1, 1), 2.0))\n```\n\n**Initialization choices matter here.** The reference sets `e = -8.0` and `b = 2.0`:\n\n- `b = 2.0` means we start with 2 bits per weight — a very aggressive starting point. The network will learn whether to *increase* precision (raise `b`) for important channels or *decrease* it (lower `b`) for unimportant ones.\n- `e = -8.0` means the initial scale factor is $2^{-(-8)} = 2^8 = 256$. So the initial quantization grid has resolution $2^e = 2^{-8} = 1/256$. This is fine-grained enough that a 2-bit quantizer can represent weights in a reasonable range.[^2]\n\n[^2]: With `e = -8.0` and `b = 2.0`, the initial quantized integers are in $[-2, 1]$, and dequantized weights are in $[-2 \\cdot 2^{-8},\\ 1 \\cdot 2^{-8}] = [-1/128,\\ 1/256]$. This overlaps with Kaiming uniform initialization for `(1, 32, 5, 5)`, which initializes weights in $\\pm 1/\\sqrt{25} \\approx \\pm 0.2$. The quantization grid will quickly adapt during training as `e` learns.\n\n**Check your understanding:** What shape would `e` need to be for *per-weight* quantization (each scalar weight has its own exponent)? What about *per-layer* quantization? Which extreme produces the most flexible model? Which is computationally cheapest?\n\n---\n\n## The Quantized Weight Formula {#quantized-weight-formula}\n\nThis is the core computation of the entire paper. Let's derive it step by step.\n\n### Step 1: The Effective Bit-Width\n\nWe cannot allow negative bit-widths — that's physically meaningless. But during gradient descent, `b` can drift below zero. We gate it:\n\n$$b_{\\text{eff},i} = \\text{ReLU}(b_i) = \\max(0, b_i)$$\n\nThis is a smooth, differentiable function that clamps the *effective* bit-width at zero. When $b_i < 0$, we have $b_{\\text{eff},i} = 0$ and the channel contributes zero bits — it is pruned.\n\n### Step 2: The Quantization Bounds\n\nA signed integer with $b_{\\text{eff}}$ bits can represent values in:\n\n$$\\left[-2^{b_{\\text{eff}}-1},\\ \\ 2^{b_{\\text{eff}}-1} - 1\\right]$$\n\nFor example, with `b_eff = 2.0`:\n- Lower bound: $-2^{2-1} = -2^1 = -2$\n- Upper bound: $2^{2-1} - 1 = 2 - 1 = 1$\n\nSo 2-bit signed integers represent $\\{-2, -1, 0, 1\\}$ — four distinct values, as expected.\n\nWith `b_eff = 3.0`:\n- Lower: $-4$, Upper: $3$ → $\\{-4, -3, -2, -1, 0, 1, 2, 3\\}$ — eight values.\n\nNote the asymmetry: the lower bound is more negative by one. This is standard two's-complement signed integer convention.[^3]\n\n[^3]: In 8-bit two's complement, the range is $[-128, 127]$, not $[-128, 128]$. The asymmetry exists because zero occupies one slot in the positive range. Self-compression inherits this convention directly, though in practice the slight asymmetry rarely matters for learned quantization.\n\n### Step 3: Scaling the Weights\n\nBefore clamping, we scale the raw weights by $2^{-e_i}$:\n\n$$\\tilde{w}_{i,j} = 2^{-e_i} \\cdot w_{i,j}$$\n\nThis maps continuous floating-point weights into the integer domain. The exponent $e_i$ controls the resolution: a large negative $e$ (like $-8$) means $2^{-e} = 256$, so weights are magnified by 256 before rounding — capturing very fine-grained differences. A large positive $e$ means coarse quantization.\n\n### Step 4: Clamping to the Quantization Range\n\nWe clamp the scaled weights to the integer-representable range:\n\n$$q_{i,j} = \\text{clip}\\!\\left(2^{-e_i} \\cdot w_{i,j},\\ -2^{b_{\\text{eff},i}-1},\\ 2^{b_{\\text{eff},i}-1} - 1\\right)$$\n\nIn full notation, the complete `qweight` formula is:\n\n$$\\boxed{q_{i,j} = \\min\\!\\left(\\max\\!\\left(2^{-e_i} \\cdot w_{i,j},\\ -2^{b_{\\text{eff},i}-1}\\right),\\ 2^{b_{\\text{eff},i}-1} - 1\\right)}$$\n\nwhere $b_{\\text{eff},i} = \\text{ReLU}(b_i)$.\n\nThis is exactly the key excerpt from the reference implementation (translated from tinygrad to PyTorch):\n\n```python\ndef qweight(self) -> torch.Tensor:\n    eff_b = torch.relu(self.b)              # (out_ch, 1, 1, 1) — non-negative bits\n    lower = -(2 ** (eff_b - 1))             # (out_ch, 1, 1, 1)\n    upper =  (2 ** (eff_b - 1)) - 1        # (out_ch, 1, 1, 1)\n    scaled = (2 ** (-self.e)) * self.weight # (out_ch, in_ch, kH, kW) — broadcast\n    return torch.minimum(torch.maximum(scaled, lower), upper)\n```\n\n**Note:** We use `torch.minimum`/`torch.maximum` (element-wise) rather than `torch.clamp` (scalar bounds). This is essential because `lower` and `upper` have shape `(out_channels, 1, 1, 1)` — per-channel, not a single scalar.\n\n![The quantization pipeline: weight → qweight → STE round → dequantize → conv2d](diagrams/qconv2d_pipeline.svg)\n\n### The Pruning Mechanism Emerges from the Math\n\nWhat happens when $b_i \\to 0^-$ (the channel is being driven toward pruning)?\n\n- $b_{\\text{eff},i} = \\text{ReLU}(b_i) = 0$\n- Lower bound: $-2^{0-1} = -2^{-1} = -0.5$\n- Upper bound: $2^{0-1} - 1 = 0.5 - 1 = -0.5$\n- So lower = upper = $-0.5$, and $q_{i,j} = -0.5$ for all $j$\n\nAfter rounding (in the forward pass): $\\text{round}(-0.5) = 0$ in Python/PyTorch's banker's rounding. The entire channel becomes zero. The channel is pruned.\n\nAs $b_i$ decreases further below zero, `relu(b_i)` stays at zero — the pruning is stable. The compression penalty keeps pushing `b_i` more negative, but the effective behavior doesn't change. This is elegant: pruning is a continuous limit of quantization.[^4]\n\n[^4]: Technically, Python's `round(0.5)` uses banker's rounding (round half to even), so `round(-0.5)` could be `0` or `-1` depending on implementation. PyTorch's `torch.round` also uses banker's rounding. In practice the distinction is irrelevant because the weights are not exactly -0.5; they converge near that value and the gradient pushes them toward zero.\n\n**Check your understanding:** What happens to `qweight()` if you forget the `relu()` on `b` and `b` drops to `-3.0`? Compute the lower and upper bounds. What does `torch.minimum(torch.maximum(scaled, lower), upper)` return when lower > upper?\n\n---\n\n## The Forward Pass: Quantize → STE → Dequantize → Convolve {#forward-pass}\n\nThe `forward` method chains four operations:\n\n### Operation 1: Compute Quantized Weights\n```python\nqw = self.qweight()   # shape: (out_ch, in_ch, kH, kW), values in integer range\n```\n\nAt this point, `qw` contains continuous floating-point values in the integer range $[-2^{b_{\\text{eff}}-1}, 2^{b_{\\text{eff}}-1}-1]$. They are *in* the integer range but not yet *rounded to* integers.\n\n### Operation 2: Apply the Straight-Through Estimator\n\nFrom Module 1, the STE trick is:\n\n$$\\text{ste\\_round}(x) = (x.\\text{round}() - x).\\text{detach()} + x$$\n\nIn the **forward pass**, this equals `x.round()` — we get truly discrete integer values.  \nIn the **backward pass**, the gradient of `ste_round(x)` with respect to `x` is **1** — as if rounding never happened.\n\n```python\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    return (x.round() - x).detach() + x\n\nw = ste_round(qw)     # forward: integer values; backward: identity gradient\n```\n\n### Operation 3: Dequantize\n\nThe rounded integers are still in the quantized integer space. To get back to the weight space that convolution expects, we multiply by $2^{e_i}$:\n\n$$\\hat{w}_{i,j} = 2^{e_i} \\cdot \\text{round}(q_{i,j})$$\n\n```python\ndw = (2 ** self.e) * w   # shape: (out_ch, in_ch, kH, kW), back in weight units\n```\n\nThis is the *dequantized weight* — a discrete approximation to the original weight, lying on the quantization grid. The grid spacing is $2^{e_i}$: nearby representable values are $\\{\\ldots, -2 \\cdot 2^{e_i}, -2^{e_i}, 0, 2^{e_i}, 2 \\cdot 2^{e_i}, \\ldots\\}$.\n\n### Operation 4: Standard Convolution\n\n```python\nreturn F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n```\n\nThe convolution is completely standard — no modification. The quantization is entirely in the *weight preparation*, not in the conv operation itself.\n\n**The complete forward pass in four lines:**\n\n```python\ndef forward(self, x: torch.Tensor) -> torch.Tensor:\n    qw = self.qweight()           # (1) quantize weights to integer range\n    w  = ste_round(qw)            # (2) round + STE for differentiability\n    dw = (2 ** self.e) * w        # (3) dequantize back to weight space\n    return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n```\n\n**Check your understanding:** In the expression `(2 ** self.e) * w`, is this multiplication applied *before* or *after* the STE? Why does the order matter? What would change if you wrote `ste_round((2 ** self.e) * qw)` instead?\n\n### Why the Two-Step Scale?\n\nYou might wonder: why not just use a single scale parameter instead of separating $e$ (applied *before* rounding) and then again $2^e$ (applied *after* rounding)?\n\nThe key insight is that $e$ controls the *resolution* of the quantization grid. Applying $2^{-e}$ before rounding determines *what granularity* we round to. Applying $2^{e}$ after rounding undoes this transformation so that the convolution receives weights in the correct scale.\n\nIf you changed $e$ from $-8$ to $-4$, you'd go from a grid with spacing $2^{-8} = 0.0039$ to a coarser grid with spacing $2^{-4} = 0.0625$. The same bit-width $b$ covers the same number of values, but each value is 16× larger. This is how $e$ and $b$ together control the *accuracy* of the approximation — $b$ controls how many distinct values exist, $e$ controls how finely spaced they are.\n\n---\n\n## Counting Bits: The qbits() Method {#counting-bits}\n\nThe `qbits()` method computes **how many total bits** the current channel bit-widths would require to store the weights of this layer.\n\n### Derivation\n\nFor a single output channel $i$ with effective bit-width $b_{\\text{eff},i} = \\text{relu}(b_i)$:\n\n- The channel has `fan_in = in_channels × kH × kW` weights\n- Each weight needs $b_{\\text{eff},i}$ bits to store\n- This channel's bit count: $b_{\\text{eff},i} \\times \\text{fan\\_in}$\n\nSumming over all output channels:\n\n$$Q_{\\text{layer}} = \\sum_{i=1}^{C_{\\text{out}}} \\text{relu}(b_i) \\times \\text{fan\\_in} = \\text{fan\\_in} \\times \\sum_{i=1}^{C_{\\text{out}}} \\text{relu}(b_i)$$\n\nThe second form factors out `fan_in` because all channels in a given layer have the same input structure.\n\nIn the paper's notation (Equation from Section 3.1):\n\n$$z_l = I_l \\cdot H_l \\cdot W_l \\cdot \\sum_{i=1}^{O_l} b_{l,i}$$\n\nwhere $I_l, H_l, W_l$ are the input channel count and kernel dimensions of layer $l$, and $O_l$ is the output channel count.\n\nIn PyTorch:\n\n```python\ndef qbits(self) -> torch.Tensor:\n    fan_in = math.prod(self.weight.shape[1:])   # in_ch * kH * kW\n    return torch.relu(self.b).sum() * fan_in\n```\n\n![Bit counting: how qbits() aggregates per-channel bits across the layer](diagrams/bits_counting.svg)\n\n### Why relu(b) and Not Just b?\n\nThis is the most important design choice in the entire `qbits()` method. Without `relu`, a channel with $b_i = -2$ would contribute $-2 \\times \\text{fan\\_in}$ to the total — *negative* bits. That's physically meaningless and would *reduce* the compression penalty instead of increasing it.\n\nWith `relu(b)`:\n- When $b_i > 0$: channel contributes $b_i \\times \\text{fan\\_in}$ bits (normal)\n- When $b_i = 0$: channel contributes 0 bits (zero-bit precision = pruned)\n- When $b_i < 0$: channel contributes 0 bits (still pruned, just \"more pruned\")\n\nThis means the gradient of `qbits()` with respect to $b_i$ is:\n\n$$\\frac{\\partial Q_{\\text{layer}}}{\\partial b_i} = \\begin{cases} \\text{fan\\_in} & \\text{if } b_i > 0 \\\\ 0 & \\text{if } b_i < 0 \\end{cases}$$\n\nThe gradient is zero for already-pruned channels ($b_i < 0$) — the compression loss doesn't push them even more negative, it simply has no effect. The gradient is `fan_in` for active channels — a constant that says \"reducing this channel's bit-width by 1 saves `fan_in` bits.\"\n\n**Check your understanding:** With `fan_in = 25` (5×5 kernel, 1 input channel), if `b` for a channel is `2.0`, what is `qbits()` for that channel? What if `b` drops to `0.001`? What if it drops to `-1.0`?\n\n---\n\n## Measuring Model Size {#measuring-model-size}\n\nFrom `qbits()` per layer, we can compute the overall model's compression ratio and size in bytes.\n\n### Average Bits Per Weight\n\nDefine the average bits per weight across the entire model:\n\n$$Q = \\frac{\\sum_l Q_{\\text{layer},l}}{\\text{weight\\_count}}$$\n\nwhere `weight_count` is the total number of parameters (including `e` and `b` parameters, consistent with the reference implementation's counting: $87{,}860$).\n\nIn PyTorch:\n\n```python\ndef compute_avg_bits_per_weight(model, qconv_layers):\n    total_bits = sum(layer.qbits() for layer in qconv_layers)\n    weight_count = sum(p.numel() for p in model.parameters())\n    return total_bits / weight_count\n```\n\n### Model Size in Bytes\n\n$$\\text{model\\_bytes} = \\frac{Q}{8} \\times \\text{weight\\_count}$$\n\nAt initialization with `b = 2.0` for all channels:\n- Each channel contributes `2.0 × fan_in` bits\n- For the MNIST model: $Q_0 \\approx 2.0$ bits/weight\n- Model bytes: $2.0 / 8 \\times 87{,}860 \\approx 21{,}965$ bytes $\\approx 21.5$ KB\n\nAfter training with $\\lambda = 0.05$ compression penalty:\n- $Q_{\\text{final}} \\approx 1.64$ bits/weight  \n- Model bytes: $1.64 / 8 \\times 87{,}860 \\approx 18{,}075$ bytes $\\approx 18.0$ KB\n\nThis 18 KB model achieves **98.2% test accuracy on MNIST**. For comparison, a standard 32-bit float model with the same architecture would be $87{,}860 \\times 4 = 351{,}440$ bytes ≈ 343 KB. **The self-compressed model is ~19× smaller.**\n\n```python\ndef compute_model_bytes(Q: float, weight_count: int) -> float:\n    return (Q / 8) * weight_count\n```\n\n---\n\n## Gradient Flow: All Three Parameters Must Learn {#gradient-flow}\n\nSelf-compression only works if all three parameter groups receive meaningful gradients during training. Let's trace where each gradient comes from.\n\n### Weight Gradients\n\nThe weight tensor `self.weight` participates in the computation via:\n\n$$\\text{output} = \\text{conv2d}(x,\\ 2^e \\cdot \\text{ste\\_round}(\\text{clip}(2^{-e} \\cdot w,\\ \\ldots)))$$\n\nThrough the STE, the gradient of the loss with respect to `w` is:\n\n$$\\frac{\\partial \\mathcal{L}}{\\partial w_{i,j}} \\approx 2^{-e_i} \\cdot \\frac{\\partial \\mathcal{L}}{\\partial \\text{dw}_{i,j}}$$\n\nThis is the standard convolution gradient, scaled by $2^{-e_i}$. These gradients drive task performance — they adjust weights to minimize cross-entropy loss.\n\n### Exponent Gradients\n\nThe exponent $e_i$ appears twice: as $2^{-e_i}$ (scale before rounding) and $2^{e_i}$ (scale after). Through the STE, the net gradient is:\n\n$$\\frac{\\partial \\mathcal{L}}{\\partial e_i} = \\ln(2) \\cdot 2^{e_i} \\cdot \\sum_j \\text{round}(q_{i,j}) \\cdot \\frac{\\partial \\mathcal{L}}{\\partial \\text{dw}_{i,j}}$$\n\nThe exponent adapts the scale of the quantization grid to minimize reconstruction error — it learns the right resolution for each channel's weight distribution.\n\n### Bit-Width Gradients\n\nThe bit-width $b_i$ appears in the compression loss and in the clamping bounds of `qweight()`. From the compression loss $\\lambda \\cdot Q$:\n\n$$\\frac{\\partial (\\lambda Q)}{\\partial b_i} = \\lambda \\cdot \\text{fan\\_in} \\cdot \\mathbf{1}[b_i > 0]$$\n\nThis is a constant gradient of magnitude $\\lambda \\cdot \\text{fan\\_in}$ that **always pushes `b_i` downward** (toward pruning). When $b_i > 0$, every gradient step applies compression pressure.\n\nFrom the task loss (through the clamping bounds): the gradient is nonzero when weights are *at* the bounds. If many weights are clamped, increasing `b_i` would \"un-clamp\" them and reduce task loss — so the task loss pushes `b_i` upward for useful channels.\n\nThe equilibrium: **`b_i` settles at the value where compression pressure exactly balances task accuracy pressure.**\n\n### Gradient Magnitude Intuition\n\nIn practice:\n- `weight.grad` has the largest magnitude — it's the primary driver\n- `e.grad` is moderate — the scale adapts relatively slowly\n- `b.grad` is small but nonzero — the compression signal is always present\n\nIf `b.grad` is zero for all channels, self-compression cannot work. Exercise 4 verifies this condition explicitly.\n\n**Check your understanding:** Suppose you accidentally wrote `qbits()` using raw `b` instead of `relu(b)`. Would `b.grad` be correct? What if `b < 0` — would the gradient push `b` toward or away from pruning?\n\n---\n\n## The Complete QConv2d Implementation {#complete-implementation}\n\nPutting everything together, here is the complete `QConv2d` in PyTorch. Study this carefully — it is the core building block of the entire course.\n\n```python\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport math\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    \"\"\"Straight-through estimator for rounding.\n    \n    Forward pass: rounds x to nearest integer.\n    Backward pass: gradient flows through as if rounding never happened.\n    \"\"\"\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-aware convolutional layer with per-channel learnable bit-widths.\n    \n    Each output channel has its own exponent e and bit-width b parameters.\n    During training, the compression loss drives b toward zero for unimportant\n    channels, effectively pruning them. Important channels retain higher bit-widths.\n    \n    Parameters\n    ----------\n    in_channels  : int — number of input feature map channels\n    out_channels : int — number of output feature map channels (filters)\n    kernel_size  : int or tuple — spatial extent of each filter\n    stride       : int — convolution stride (default 1)\n    padding      : int — zero-padding (default 0)\n    \"\"\"\n    \n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride  = stride\n        self.padding = padding\n        \n        # Kaiming uniform initialization (He initialization)\n        # scale = 1 / sqrt(fan_in) where fan_in = in_channels * kH * kW\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale  = 1.0 / math.sqrt(fan_in)\n        \n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        # Per-channel quantization parameters — shape (out_ch, 1, 1, 1) for broadcasting\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n    \n    def qweight(self) -> torch.Tensor:\n        \"\"\"Compute per-channel clamped quantized weights (integer range, float dtype).\n        \n        Applies relu to b to ensure non-negative effective bit-widths, then\n        scales weights by 2^(-e) and clamps to the signed integer range.\n        \n        Returns\n        -------\n        torch.Tensor — shape (out_ch, in_ch, kH, kW), values in integer range\n        \"\"\"\n        eff_b  = torch.relu(self.b)                          # non-negative bits\n        lower  = -(2 ** (eff_b - 1))                         # min representable integer\n        upper  =  (2 ** (eff_b - 1)) - 1                     # max representable integer\n        scaled = (2 ** (-self.e)) * self.weight              # map to integer domain\n        return torch.minimum(torch.maximum(scaled, lower), upper)\n    \n    def qbits(self) -> torch.Tensor:\n        \"\"\"Total bits required to store this layer's weights at current bit-widths.\n        \n        Returns\n        -------\n        torch.Tensor (scalar) — total bits: sum(relu(b)) * fan_in\n        \"\"\"\n        fan_in = math.prod(self.weight.shape[1:])   # in_ch * kH * kW\n        return torch.relu(self.b).sum() * fan_in\n    \n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"Quantized forward pass with straight-through estimator.\n        \n        Steps: quantize → STE round → dequantize → conv2d\n        \n        Parameters\n        ----------\n        x : torch.Tensor — shape (N, in_ch, H, W)\n        \n        Returns\n        -------\n        torch.Tensor — shape (N, out_ch, H', W')\n        \"\"\"\n        qw = self.qweight()            # integer-range floats\n        w  = ste_round(qw)             # rounded integers (STE keeps grad flowing)\n        dw = (2 ** self.e) * w         # dequantize: back to weight space\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n```\n\nThis is ~50 lines. Every line does something essential. There is no dead code.\n\n---\n\n## Analytical Questions {#analytical-questions}\n\nWork through these before moving to the exercises. They test understanding, not recall.\n\n### Question 1 — Pruning Stability\n\nAfter training, a channel has $b_i = -0.009$ (as seen in the reference output). The compression gradient keeps pushing $b_i$ more negative each step. Does `qweight()` for this channel change meaningfully as $b_i$ goes from $-0.009$ to $-1.0$ to $-10.0$? Trace the values of `eff_b`, `lower`, `upper`, and `qw` at each value of $b_i$. What does this tell you about the stability of the pruned state?\n\n### Question 2 — Exponent Learning Dynamics\n\nSuppose a channel has $e_i = -8$ (fine grid, resolution $2^{-8}$) but the weights are very large — say $w_{i,j} \\approx 0.5$. With $b_i = 2$, the quantization range is $[-2, 1]$, meaning the scaled weight $2^{-(-8)} \\cdot 0.5 = 128$ is immediately clamped to $1$. What direction will $e_i$'s gradient point? Will it increase $e_i$ (coarser grid) or decrease it (finer grid)?\n\n### Question 3 — Compression-Accuracy Tradeoff\n\nThe training loss is $\\mathcal{L} = \\mathcal{L}_{\\text{CE}} + \\lambda \\cdot Q$. With $\\lambda = 0.05$ and `fan_in = 25`, a single channel's compression gradient magnitude is $|{∂(\\lambda Q)}/{\\partial b_i}| = 0.05 \\times 25 = 1.25$ per step. Compare this to the typical magnitude of task gradients for weight parameters in early training. What does this suggest about how quickly self-compression acts relative to task learning?\n\n### Question 4 — Scale Invariance\n\nIn the formula $\\hat{w} = 2^e \\cdot \\text{round}(2^{-e} \\cdot w)$, what happens if both $w$ and $e$ are simultaneously multiplied by a constant? Is the forward pass output invariant to this joint scaling? What does this imply about the optimization landscape for $e$?\n\n---\n\n## Synthesis: The Module as a Compression Unit {#synthesis}\n\nThe `QConv2d` layer is simultaneously:\n\n1. **A standard convolutional layer** — it performs `F.conv2d` with learned weights\n2. **A quantizer** — it discretizes its own weights to integer grids via `qweight()`\n3. **A compression meter** — it reports its own bit cost via `qbits()`\n4. **A self-pruner** — channels with $b_i \\to 0$ fade out of existence\n\nWhat makes this elegant is the unification of these four roles into a single differentiable computation graph. There are no separate \"compress,\" \"prune,\" or \"quantize\" phases. Everything happens simultaneously via gradient descent on a joint loss.\n\nThe architecture decision to place parameters at **per-channel granularity** is the key structural choice that enables emergent pruning. If we had used per-layer bit-widths, we couldn't selectively prune individual channels. If we had used per-weight bit-widths, we'd have 87,860 additional scalar parameters competing with the weights themselves.\n\nPer-channel quantization hits the sweet spot: enough granularity to capture the heterogeneous importance of different filters, but coarse enough to keep the number of quantization parameters manageable.\n\nIn Module 3, we will wire multiple `QConv2d` layers into the MNIST model and train the joint loss. The compression we measure there — **18,075 bytes, 98.2% accuracy** — emerges entirely from the layer we built in this module. The `qbits()` method will be called once per layer per training step to compute the compression penalty. The `forward()` method will be called once per batch. The gradients we verified in exercise 4 will flow through 20,000 training steps, gradually driving unimportant channels to zero.\n\nWhen you run that training loop and watch `bytes_used` drop from ~22 KB toward ~18 KB while `test_acc` climbs past 98%, you will be watching the four exercises from this module operate in concert.\n\n---\n\n## Key Formulas Reference\n\n| Formula | Expression | Purpose |\n|---------|-----------|---------|\n| Effective bits | $b_{\\text{eff},i} = \\text{relu}(b_i)$ | Prevents negative bit-widths |\n| Lower bound | $-2^{b_{\\text{eff}}-1}$ | Min representable integer |\n| Upper bound | $2^{b_{\\text{eff}}-1} - 1$ | Max representable integer |\n| Quantized weight | $q_{i,j} = \\text{clip}(2^{-e_i} w_{i,j}, \\text{lower}_i, \\text{upper}_i)$ | Integer-domain representation |\n| STE round | $\\text{ste\\_round}(x) = (x.\\text{round}() - x).\\text{detach}() + x$ | Differentiable rounding |\n| Dequantized weight | $\\hat{w}_{i,j} = 2^{e_i} \\cdot \\text{round}(q_{i,j})$ | Back to weight space |\n| Layer bits | $Q_l = \\text{fan\\_in} \\cdot \\sum_i \\text{relu}(b_i)$ | Compression cost per layer |\n| Model avg bits | $Q = \\sum_l Q_l / N_{\\text{params}}$ | Bits per parameter |\n| Model bytes | $\\text{bytes} = Q/8 \\cdot N_{\\text{params}}$ | Estimated storage size |\n\n---\n\n*Next: Module 3 — Self-Compression Training on MNIST (wiring multiple QConv2d layers into a full model and training with the joint compression-accuracy loss).*\n", "exercises": [{"filename": "ex01_perchannel_quantized_weights_qweight.py", "content": "\"\"\"\nExercise 1: Per-Channel Quantized Weights — qweight()\n======================================================\nModule 2: Building the QConv2d Layer — Learnable Quantization\n\nIn this exercise you implement the core quantization formula of the\nSelf-Compressing Neural Networks paper. The `qweight()` method takes the\nraw floating-point weight tensor and maps it to an integer-valued\nrepresentation using two per-channel parameters:\n\n  - e  (exponent): controls the scale / resolution of the quantization grid\n  - b  (bit-width): controls the range (how many distinct values)\n\nThe result is NOT rounded yet — that happens in the forward pass via the\nstraight-through estimator (Exercise 2). Here we produce the *clamped*\nrepresentation: values in the correct integer range, stored as floats.\n\nReference formula (from the paper, tinygrad original):\n    qweight = clip(2^(-e) * w, -2^(relu(b)-1), 2^(relu(b)-1) - 1)\n\nLearning goal:\n    Understand WHY relu(b) is essential and HOW the bounds produce\n    emergent channel pruning when b falls below zero during training.\n\"\"\"\n\nimport torch\nimport torch.nn as nn\nimport math\n\n\n# ---------------------------------------------------------------------------\n# Helper: Kaiming uniform initialization matching the reference implementation\n# ---------------------------------------------------------------------------\n\ndef _kaiming_uniform_like_ref(out_channels: int, in_channels: int,\n                               kH: int, kW: int) -> torch.Tensor:\n    \"\"\"Initialize weights with Kaiming uniform (same formula as reference).\n\n    The reference uses scale = 1/sqrt(in_channels * kH * kW), not PyTorch's\n    default which uses a different fan_in calculation.\n\n    Parameters\n    ----------\n    out_channels : int\n    in_channels  : int\n    kH, kW       : int — kernel spatial dimensions\n\n    Returns\n    -------\n    torch.Tensor — shape (out_channels, in_channels, kH, kW)\n    \"\"\"\n    fan_in = in_channels * kH * kW\n    scale  = 1.0 / math.sqrt(fan_in)\n    return torch.empty(out_channels, in_channels, kH, kW).uniform_(-scale, scale)\n\n\n# ---------------------------------------------------------------------------\n# QConv2d — skeleton (you implement qweight below)\n# ---------------------------------------------------------------------------\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-aware Conv2d with per-channel learnable bit-widths.\n\n    Each output channel has its own scalar exponent (e) and bit-width (b)\n    parameter, stored as tensors of shape (out_channels, 1, 1, 1). This\n    shape broadcasts cleanly against the weight tensor (out_ch, in_ch, kH, kW).\n\n    Parameters\n    ----------\n    in_channels  : int — number of input feature map channels\n    out_channels : int — number of output channels (filters)\n    kernel_size  : int or tuple — spatial size of each convolutional kernel\n    stride       : int — convolution stride (default 1)\n    padding      : int — zero-padding added to both sides (default 0)\n\n    Attributes\n    ----------\n    weight : nn.Parameter, shape (out_ch, in_ch, kH, kW)\n        Raw floating-point weights, Kaiming-uniform initialized.\n    e      : nn.Parameter, shape (out_ch, 1, 1, 1), init -8.0\n        Per-channel exponent. Controls quantization grid resolution.\n        Grid spacing = 2^e. Smaller e → finer grid (more precision).\n    b      : nn.Parameter, shape (out_ch, 1, 1, 1), init 2.0\n        Per-channel bit-width. Controls how many distinct integer values\n        are representable in each channel.\n    \"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride   = stride\n        self.padding  = padding\n        self.kernel_size = kernel_size\n\n        # Weight tensor — Kaiming uniform, matching reference implementation\n        self.weight = nn.Parameter(\n            _kaiming_uniform_like_ref(out_channels, in_channels, *kernel_size)\n        )\n\n        # Per-channel quantization parameters — shape (out_ch, 1, 1, 1)\n        # Broadcasting: each scalar e_i / b_i applies to all weights in filter i\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        \"\"\"Compute per-channel clamped quantized weights.\n\n        Maps raw floating-point weights to the signed integer range\n        determined by the effective bit-width relu(b). Weights are scaled\n        into the integer domain by 2^(-e), clamped to the representable\n        range, then returned as floats (rounding happens in the forward pass).\n\n        The formula (from the paper):\n            eff_b  = relu(b)                           # non-negative effective bits\n            lower  = -2^(eff_b - 1)                   # min signed integer\n            upper  =  2^(eff_b - 1) - 1               # max signed integer\n            scaled = 2^(-e) * weight                   # map to integer domain\n            qw     = clip(scaled, lower, upper)        # clamp to range\n\n        Key insight: when b_i < 0, relu(b_i) = 0, making lower = upper = -0.5.\n        After rounding (in Exercise 2), this forces the entire channel to zero\n        — emergent channel pruning without any explicit pruning algorithm.\n\n        Parameters\n        ----------\n        (uses self.weight, self.e, self.b — all shape-compatible)\n\n        Returns\n        -------\n        torch.Tensor — shape (out_ch, in_ch, kH, kW)\n            Values are in the signed integer range for the current b,\n            stored as float32. NOT yet rounded to integers.\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE — 8-12 lines                              #\n        #                                                          #\n        # Step 1: Compute eff_b = relu(self.b)                    #\n        #         Shape: (out_ch, 1, 1, 1)                         #\n        # tness\n    # -------------------------------------------------------------------\n    layer = QConv2d(in_channels=3, out_channels=16, kernel_size=3)\n    qw = layer.qweight()\n\n    expected_shape = layer.weight.shape  # (16, 3, 3, 3)\n    shape_ok = qw.shape == expected_shape\n    print(f\"\\n[Test 1] Shape check\")\n    print(f\"  weight.shape : {layer.weight.shape}\")\n    print(f\"  qweight shape: {qw.shape}\")\n    print(f\"  Match        : {'✓ PASS' if shape_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 2: With b=2.0, values should be in [-2, 1]\n    # -------------------------------------------------------------------\n    qw_min = qw.min().item()\n    qw_max = qw.max().item()\n    # At b=2.0: eff_b=2, lower=-2^(2-1)=-2, upper=2^(2-1)-1=1\n    range_ok = (qw_min >= -2.01) and (qw_max <= 1.01)\n    print(f\"\\n[Test 2] Range check (b=2.0 → integer range [-2, 1])\")\n    print(f\"  qweight min  : {qw_min:.4f}  (expected >= -2.0)\")\n    print(f\"  qweight max  : {qw_max:.4f}  (expected <=  1.0)\")\n    print(f\"  In range     : {'✓ PASS' if range_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 3: After rounding, values should be exact integers\n    # -------------------------------------------------------------------\n    rounded = qw.round()\n    are_integer_valued = (qw - rounded).abs().max().item() < 0.5\n    # The clamped values should be between integers (fractional parts present)\n    # but WITHIN the integer bounds — not necessarily integers themselves yet\n    print(f\"\\n[Test 3] Values are within integer bounds (pre-round)\")\n    print(f\"  Max deviation from nearest int: {(qw - rounded).abs().max().item():.4f}\")\n    print(f\"  All within ±0.5 of an integer : {'✓ PASS' if are_integer_valued else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 4: Per-channel statistics\n    # -------------------------------------------------------------------\n    print(f\"\\n[Test 4] Per-channel statistics (first 4 of 16 channels)\")\n    print(f\"  {'ch':>3}  {'min':>8}  {'max':>8}  {'mean':>8}  {'unique':>7}\")\n    for ch in range(4):\n        ch_vals = qw[ch]\n        ch_unique = ch_vals.round().unique().numel()\n        print(f\"  {ch:>3}  {ch_vals.min().item():>8.4f}  \"\n              f\"{ch_vals.max().item():>8.4f}  \"\n              f\"{ch_vals.mean().item():>8.4f}  \"\n              f\"{ch_unique:>7}\")\n\n    # -------------------------------------------------------------------\n    # Test 5: Pruning behavior — set b < 0 for one channel\n    # -------------------------------------------------------------------\n    layer2 = QConv2d(in_channels=1, out_channels=4, kernel_size=3)\n    with torch.no_grad():\n        layer2.b[2] = -1.0   # channel 2: effectively pruned\n    qw2 = layer2.qweight()\n    # When b_eff = relu(-1.0) = 0:\n    #   lower = -2^(-1) = -0.5\n    #   upper =  2^(-1) - 1 = -0.5\n    # So all weights in channel 2 should equal -0.5\n    ch2_vals = qw2[2]\n    ch2_const = (ch2_vals - ch2_vals[0, 0, 0]).abs().max().item()\n    ch2_val   = ch2_vals.mean().item()\n    prune_ok  = abs(ch2_val - (-0.5)) < 0.01\n    print(f\"\\n[Test 5] Pruning behavior (b=-1.0 → channel forced to -0.5)\")\n    print(f\"  channel 2 mean value : {ch2_val:.4f}  (expected -0.5)\")\n    print(f\"  channel 2 is constant: {'yes' if ch2_const < 1e-6 else 'no'}\")\n    print(f\"  Pruning works        : {'✓ PASS' if prune_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Summary\n    # -------------------------------------------------------------------\n    all_pass = shape_ok and range_ok and are_integer_valued and prune_ok\n    print(f\"\\n{'=' * 60}\")\n    if all_pass:\n        print(\"qweight shape: correct, range: correct, unique values per channel: ~4\")\n        print(\"ALL TESTS PASSED ✓\")\n    else:\n        print(\"SOME TESTS FAILED — check your implementation\")\n    print(\"=\" * 60)\n"}, {"filename": "ex02_qconv2d_forward_pass_with_ste.py", "content": "\"\"\"\nExercise 2: QConv2d Forward Pass with Straight-Through Estimator\n=================================================================\nModule 2: Building the QConv2d Layer — Learnable Quantization\n\nBuilding on Exercise 1 (qweight is already implemented), you now wire up\nthe complete forward pass. The key challenge: rounding is non-differentiable,\nbut we need gradients to flow through it so all three parameters (weight, e, b)\ncan be updated via backprop.\n\nThe Straight-Through Estimator (STE) from Module 1 solves this:\n\n    Forward:  ste_round(qw) == qw.round()      (discrete integer)\n    Backward: d/d(qw) ste_round(qw) == 1       (as if no rounding)\n\nImplemented as:  (qw.round() - qw).detach() + qw\n\nAfter rounding, the dequantized weight is: dw = 2^e * round(qw)\nThis maps the discrete integer back to the continuous weight space.\nThe convolution then runs on dw — a standard F.conv2d call.\n\nImportant: the order matters.\n    CORRECT:   dw = 2^e * ste_round(qw)   → round first, then scale\n    INCORRECT: dw = ste_round(2^e * qw)   → changes the quantization grid\n\nReference (tinygrad):\n    qw = self.qweight()\n    w  = (qw.round() - qw).detach() + qw   # STE\n    return x.conv2d(2**self.e * w)\n\"\"\"\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport math\n\n\n# ---------------------------------------------------------------------------\n# STE round — provided (from Module 1)\n# ---------------------------------------------------------------------------\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    \"\"\"Straight-through estimator for integer rounding.\n\n    Forward pass: equivalent to x.round() — returns discrete integer values.\n    Backward pass: gradient of output w.r.t. input is 1 everywhere — the\n    rounding operation is treated as an identity for gradient computation.\n\n    The trick: (x.round() - x).detach() has gradient 0 (detached from graph),\n    so the gradient of the whole expression comes entirely from the final +x.\n\n    Parameters\n    ----------\n    x : torch.Tensor — any shape, float dtype\n\n    Returns\n    -------\n    torch.Tensor — same shape as x, rounded to nearest integer (forward pass)\n    \"\"\"\n    return (x.round() - x).detach() + x\n\n\n# ---------------------------------------------------------------------------\n# Helper (from Exercise 1 — provided)\n# ---------------------------------------------------------------------------\n\ndef _kaiming_uniform_like_ref(out_channels: int, in_channels: int,\n                               kH: int, kW: int) -> torch.Tensor:\n    fan_in = in_channels * kH * kW\n    scale  = 1.0 / math.sqrt(fan_in)\n    return torch.empty(out_channels, in_channels, kH, kW).uniform_(-scale, scale)\n\n\n# ---------------------------------------------------------------------------\n# QConv2d — qweight() provided from Exercise 1, you implement forward()\n# ---------------------------------------------------------------------------\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-aware Conv2d with per-channel learnable bit-widths.\n\n    Parameters\n    ----------\n    in_channels  : int\n    out_channels : int\n    kernel_size  : int or tuple\n    stride       : int (default 1)\n    padding      : int (default 0)\n\n    Attributes\n    ----------\n    weight : nn.Parameter, shape (out_ch, in_ch, kH, kW) — raw float weights\n    e      : nn.Parameter, shape (out_ch, 1, 1, 1), init=-8.0 — exponent\n    b      : nn.Parameter, shape (out_ch, 1, 1, 1), init=2.0  — bit-width\n    \"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride      = stride\n        self.padding     = padding\n        self.kernel_size = kernel_size\n\n        self.weight = nn.Parameter(\n            _kaiming_uniform_like_ref(out_channels, in_channels, *kernel_size)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        \"\"\"Compute per-channel clamped quantized weights (from Exercise 1).\n\n        Returns\n        -------\n        torch.Tensor — shape (out_ch, in_ch, kH, kW)\n            Values in signed integer range [−2^(eff_b−1), 2^(eff_b−1)−1],\n            stored as float32 (NOT yet rounded).\n        \"\"\"\n        eff_b  = torch.relu(self.b)\n        lower  = -(2 ** (eff_b - 1))\n        upper  =  (2 ** (eff_b - 1)) - 1\n        scaled = (2 ** (-self.e)) * self.weight\n        return torch.minimum(torch.maximum(scaled, lower), upper)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"Quantized forward pass with straight-through estimator.\n\n        Steps:\n            1. Compute quantized (integer-range, float) weights via qweight()\n            2. Apply STE rounding: ste_round(qw) — discrete in forward,\n               gradient=1 in backward\n            3. Dequantize: multiply rounded integers by 2^e to get weights\n               back in the original float scale\n            4. Run standard F.conv2d with the dequantized weights\n\n        Why dequantize AFTER rounding (not before)?\n            Applying 2^e before rounding would change the quantization grid.\n            The grid spacing is 2^e. We want to round to multiples of 2^e,\n            which means scaling by 2^(-e) first (in qweight), rounding, then\n            scaling back by 2^e.\n\n        Parameters\n        ----------\n        x : torch.Tensor — shape (N, in_ch, H, W), float32, requires_grad=True\n\n        Returns\n        -------\n        torch.Tensor — shape (N, out_ch, H', W') where\n            H' = (H - kH + 2*padding) // stride + 1\n            W' = (W - kW + 2*padding) // stride + 1\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE — 6-10 lines                              #\n        #                                                          #\n        # Step 1: Get quantized weights from qweight()             #\n        #         qw = ...   shape: (out_ch, in_ch, kH, kW)        #\n        #                                                          #\n        # Step 2: Apply STE rounding                               #\n        #         w = ste_round(qw)                                #\n        #         Forward: same as qw.round() — discrete integers  #\n        #         Backward: gradient flows through as identity      #\n        #                                                          #\n        # Step 3: Dequantize — scale integers back to weight space #\n        #         dw = (2 ** self.e) * w                           #\n        #         self.e has shape (out_ch, 1, 1, 1) → broadcasts  #\n        #                                                          #\n        # Step 4: Apply standard convolution                       #\n        #         return F.conv2d(x, dw,                           #\n        #                         stride=self.stride,              #\n        #                         padding=self.padding)            #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__ — validation harness (do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n\n    print(\"=\" * 60)\n    print(\"Exercise 2: QConv2d Forward Pass with STE\")\n    print(\"=\" * 60)\n\n    # -------------------------------------------------------------------\n    # Test 1: Output shape for MNIST-like input\n    # -------------------------------------------------------------------\n    layer = QConv2d(in_channels=1, out_channels=32, kernel_size=5)\n    x = torch.randn(8, 1, 28, 28, requires_grad=True)   # batch of 8 MNIST images\n    out = layer(x)\n\n    expected_shape = (8, 32, 24, 24)   # 28-5+1=24\n    shape_ok = tuple(out.shape) == expected_shape\n    print(f\"\\n[Test 1] Output shape\")\n    print(f\"  Input  : {tuple(x.shape)}\")\n    print(f\"  Output : {tuple(out.shape)}\")\n    print(f\"  Expected: {expected_shape}\")\n    print(f\"  Shape  : {'✓ PASS' if shape_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 2: Output requires_grad (critical — gradients must flow)\n    # -------------------------------------------------------------------\n    grad_ok = out.requires_grad\n    print(f\"\\n[Test 2] Output requires_grad (gradient computation enabled)\")\n    print(f\"  out.requires_grad: {out.requires_grad}\")\n    print(f\"  Grad flows      : {'✓ PASS' if grad_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 3: Output statistics (finite, non-trivial values)\n    # -------------------------------------------------------------------\n    out_mean = out.mean().item()\n    out_std  = out.std().item()\n    out_finite = torch.isfinite(out).all().item()\n    out_nonzero = (out.abs() > 1e-8).any().item()\n    stats_ok = out_finite and out_nonzero\n    print(f\"\\n[Test 3] Output statistics\")\n    print(f\"  mean  : {out_mean:.4f}\")\n    print(f\"  std   : {out_std:.4f}\")\n    print(f\"  finite: {out_finite}\")\n    print(f\"  nonzero: {out_nonzero}\")\n    print(f\"  Stats : {'✓ PASS' if stats_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 4: Dequantized weights are on the quantization grid\n    # -------------------------------------------------------------------\n    # The dequantized weight should be 2^e * round(qw)\n    # Check that dw / 2^e is close to an integer\n    with torch.no_grad():\n        qw = layer.qweight()\n        # When b=2.0, qweight values should already be in [-2, 1]\n        # After rounding, the unique values should be at most {-2,-1,0,1}\n        rounded_qw = qw.round()\n        unique_vals = rounded_qw.unique()\n        grid_ok = len(unique_vals) <= 4\n    print(f\"\\n[Test 4] Quantization grid\")\n    print(f\"  Unique integer values in qw.round(): {sorted(unique_vals.tolist())}\")\n    print(f\"  Count (<= 4 for 2-bit)              : {'✓ PASS' if grid_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 5: Backward pass — all params get gradients\n    # -------------------------------------------------------------------\n    loss = out.mean()\n    loss.backward()\n    w_grad  = layer.weight.grad is not None and layer.weight.grad.abs().sum() > 0\n    e_grad  = layer.e.grad is not None and layer.e.grad.abs().sum() > 0\n    b_grad  = layer.b.grad is not None and layer.b.grad.abs().sum() > 0\n    backprop_ok = w_grad and e_grad and b_grad\n    print(f\"\\n[Test 5] Backward pass (all parameters receive gradients)\")\n    print(f\"  weight.grad nonzero: {w_grad}\")\n    print(f\"  e.grad nonzero     : {e_grad}\")\n    print(f\"  b.grad nonzero     : {b_grad}\")\n    print(f\"  All grads flow     : {'✓ PASS' if backprop_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 6: stride and padding\n    # -------------------------------------------------------------------\n    layer_padded = QConv2d(in_channels=1, out_channels=8, kernel_size=3,\n                            stride=1, padding=1)\n    x2 = torch.randn(2, 1, 28, 28)\n    out2 = layer_padded(x2)\n    pad_ok = tuple(out2.shape) == (2, 8, 28, 28)   # padding=1 preserves spatial size\n    print(f\"\\n[Test 6] Stride/padding (kernel=3, stride=1, padding=1 → same size)\")\n    print(f\"  Output shape: {tuple(out2.shape)}\")\n    print(f\"  Same spatial: {'✓ PASS' if pad_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Summary\n    # -------------------------------------------------------------------\n    all_pass = shape_ok and grad_ok and stats_ok and backprop_ok and pad_ok\n    print(f\"\\n{'=' * 60}\")\n    if all_pass:\n        print(\"QConv2d forward pass: PASSED\")\n        print(f\"Output shape {tuple(out.shape)}, mean={out_mean:.4f}, std={out_std:.4f}\")\n    else:\n        print(\"SOME TESTS FAILED — check your implementation\")\n    print(\"=\" * 60)\n"}, {"filename": "ex03_counting_bits_the_qbits_method.py", "content": "\"\"\"\nExercise 3: Counting Bits — The qbits() Method and Model Size\n=============================================================\nModule 2: Building the QConv2d Layer — Learnable Quantization\n\nNow that QConv2d's forward pass works, we need a way to measure how\ncompressed the model is. That's the job of `qbits()` and related helpers.\n\nThe compression penalty in the training loss (Module 3) is:\n    L = L_task + λ * Q\n\nwhere Q is the average bits per weight across all layers:\n    Q = sum_layers(layer.qbits()) / total_weight_count\n\nAnd qbits() for a single layer:\n    Q_layer = relu(b).sum() * fan_in      (paper equation: z_l = I_l*H_l*W_l * sum_i b_{l,i})\n\nwhere fan_in = in_channels * kH * kW is the number of weights per output channel.\n\nIn this exercise you implement:\n    1. QConv2d.qbits()          — bits for one layer\n    2. compute_avg_bits(model)  — average Q across all QConv2d layers\n    3. compute_model_bytes(Q, n) — bytes from Q and parameter count\n\nReference numbers to reproduce:\n    - At init (b=2.0 everywhere): Q ≈ 2.0 bits/weight, model ≈ 21.5 KB\n    - After training (reference): Q ≈ 1.64 bits/weight, model ≈ 18.1 KB\n\"\"\"\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport math\nfrom typing import List\n\n\n# ---------------------------------------------------------------------------\n# STE + QConv2d (complete from Exercises 1 & 2 — provided)\n# ---------------------------------------------------------------------------\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    \"\"\"Straight-through estimator rounding.\"\"\"\n    return (x.round() - x).detach() + x\n\n\ndef _kaiming_uniform_like_ref(out_channels, in_channels, kH, kW):\n    fan_in = in_channels * kH * kW\n    scale  = 1.0 / math.sqrt(fan_in)\n    return torch.empty(out_channels, in_channels, kH, kW).uniform_(-scale, scale)\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantization-aware Conv2d (complete implementation from Exercises 1 & 2).\n\n    Parameters\n    ----------\n    in_channels  : int\n    out_channels : int\n    kernel_size  : int or tuple\n    stride       : int (default 1)\n    padding      : int (default 0)\n    \"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride      = stride\n        self.padding     = padding\n        self.kernel_size = kernel_size\n\n        self.weight = nn.Parameter(\n            _kaiming_uniform_like_ref(out_channels, in_channels, *kernel_size)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        \"\"\"Clamped quantized weights (integer range, float dtype).\"\"\"\n        eff_b  = torch.relu(self.b)\n        lower  = -(2 ** (eff_b - 1))\n        upper  =  (2 ** (eff_b - 1)) - 1\n        scaled = (2 ** (-self.e)) * self.weight\n        return torch.minimum(torch.maximum(scaled, lower), upper)\n\n    def qbits(self) -> torch.Tensor:\n        \"\"\"Total bits required to store this layer's weights at current bit-widths.\n\n        Each output channel contributes relu(b_i) * fan_in bits, where\n        fan_in = in_channels * kH * kW (weights per output channel).\n\n        Summing over all output channels:\n            qbits = sum_i(relu(b_i)) * fan_in\n                  = relu(b).sum() * fan_in\n\n        Key: use relu(b), NOT raw b. Channels with b < 0 are pruned\n        (contribute 0 bits). Using raw b would give negative bit counts,\n        which would decrease the compression penalty — the opposite of what\n        we want.\n\n        The gradient of qbits w.r.t. b_i is fan_in when b_i > 0, and 0\n        otherwise. This constant-magnitude gradient is what pushes each\n        channel's bit-width down during training (via the λ*Q term in the loss).\n\n        Returns\n        -------\n        torch.Tensor — scalar (0-d tensor)\n            Total bits for this layer. Differentiable w.r.t. self.b.\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE — 4-6 lines                               #\n        #                                                          #\n        # Step 1: Compute fan_in — product of all weight dims      #\n        #         EXCEPT the first (output channel) dimension.     #\n        #         self.weight.shape = (out_ch, in_ch, kH, kW)     #\n        #         fan_in = in_ch * kH * kW                         #\n        #         Use: math.prod(self.weight.shape[1:])            #\n        #                                                          #\n        # Step 2: Sum the effective bit-widths over output channels #\n        #         torch.relu(self.b).sum()                         #\n        #         Result is scalar-like (shape: (), or (1,))       #\n        #                                                          #\n        # Step 3: Multiply by fan_in and return                    #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w  = ste_round(qw)\n        dw = (2 ** self.e) * w\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n\n\n# ---------------------------------------------------------------------------\n# Model-level compression metrics — YOU IMPLEMENT THESE\n# ---------------------------------------------------------------------------\n\ndef compute_avg_bits(model: nn.Module) -> torch.Tensor:\n    \"\"\"Compute average bits per parameter across all QConv2d layers.\n\n    Iterates over all modules in the model, sums qbits() from every QConv2d,\n    then divides by the total parameter count (all parameters, including\n    weight, e, and b tensors — matching the reference implementation).\n\n    This is the Q used in the training loss: L = L_task + λ * Q\n\n    Parameters\n    ----------\n    model : nn.Module — any model containing QConv2d layers\n\n    Returns\n    -------\n    torch.Tensor — scalar, average bits per parameter\n        At initialization (b=2.0): Q ≈ 2.0\n        After self-compression training: Q ≈ 1.64 (reference result)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 8-12 lines                              #\n    #                                                          #\n    # Step 1: Collect all QConv2d instances from the model     #\n    #         Use model.modules() which iterates recursively   #\n    #         Filter with isinstance(m, QConv2d)              #\n    #                                                          #\n    # Step 2: Sum qbits() from each QConv2d layer             #\n    #         Use functools.reduce or a loop with accumulation  #\n    #         Handle the edge case: no QConv2d layers          #\n    #                                                          #\n    # Step 3: Count total parameters in the model              #\n    #         sum(p.numel() for p in model.parameters())       #\n    #         This counts weight + e + b for each QConv2d,    #\n    #         matching the reference: 87,860 total params       #\n    #                                                          #\n    # Step 4: Return total_bits / total_param_count            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compute_model_bytes(Q: float, weight_count: int) -> float:\n    \"\"\"Convert average bits per weight to total model size in bytes.\n\n    Given Q bits per parameter and a total parameter count, compute\n    the number of bytes required to store all weights at that precision.\n\n    Parameters\n    ----------\n    Q            : float — average bits per parameter (e.g. 2.0 at init, 1.64 trained)\n    weight_count : int   — total number of parameters (e.g. 87,860)\n\n    Returns\n    -------\n    float — model size in bytes\n        At Q=2.0, weight_count=87860: 87860 * 2 / 8 = 21965 bytes ≈ 21.5 KB\n        At Q=1.64, weight_count=87860: 87860 * 1.64 / 8 = 18017 bytes ≈ 17.6 KB\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 2-3 lines                               #\n    #                                                          #\n    # Formula: model_bytes = Q / 8 * weight_count             #\n    # This converts bits to bytes (8 bits per byte)           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Reference MNIST model architecture (matches the paper exactly)\n# ---------------------------------------------------------------------------\n\nclass MNISTModel(nn.Module):\n    \"\"\"Self-compressing CNN for MNIST — reference architecture from the paper.\n\n    Architecture: 5 QConv2d layers + BatchNorm + max pooling\n        Layer 0: QConv2d(1,   32, 5) → relu\n        Layer 2: QConv2d(32,  32, 5) → relu → BatchNorm → MaxPool\n        Layer 6: QConv2d(32,  64, 3) → relu\n        Layer 8: QConv2d(64,  64, 3) → relu → BatchNorm → MaxPool\n        Layer 13: QConv2d(576, 10, 1) → flatten (classifier)\n\n    Total weight parameters: 87,860 (including e and b for all layers)\n    \"\"\"\n\n    def __init__(self):\n        super().__init__()\n        self.conv1 = QConv2d(1,   32, 5)\n        self.conv2 = QConv2d(32,  32, 5)\n        self.bn1   = nn.BatchNorm2d(32, affine=False, track_running_stats=False)\n        self.conv3 = QConv2d(32,  64, 3)\n        self.conv4 = QConv2d(64,  64, 3)\n        self.bn2   = nn.BatchNorm2d(64, affine=False, track_running_stats=False)\n        self.conv5 = QConv2d(576, 10, 1)   # classifier (applied after flatten+reshape)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = torch.relu(self.conv1(x))          # (N, 32, 24, 24)\n        x = torch.relu(self.conv2(x))          # (N, 32, 20, 20)\n        x = self.bn1(x)\n        x = F.max_pool2d(x, 2)                 # (N, 32, 10, 10)\n        x = torch.relu(self.conv3(x))          # (N, 64,  8,  8)\n        x = torch.relu(self.conv4(x))          # (N, 64,  6,  6)\n        x = self.bn2(x)\n        x = F.max_pool2d(x, 2)                 # (N, 64,  3,  3) → 576 flat\n        x = x.flatten(1).reshape(-1, 576, 1, 1)\n        x = self.conv5(x)                       # (N, 10, 1, 1)\n        return x.flatten(1)                     # (N, 10)\n\n\n# ---------------------------------------------------------------------------\n# __main__ — validation harness (do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    torch.manual_seed(42)\n\n    print(\"=\" * 65)\n    print(\"Exercise 3: Counting Bits — qbits() and Model Size\")\n    print(\"=\" * 65)\n\n    # -------------------------------------------------------------------\n    # Test 1: qbits() for a single QConv2d(1, 32, 5)\n    # -------------------------------------------------------------------\n    layer = QConv2d(in_channels=1, out_channels=32, kernel_size=5)\n    qb = layer.qbits()\n    # fan_in = 1 * 5 * 5 = 25, sum(relu(b)) = 32 * 2.0 = 64, total = 1600\n    expected_qbits = 1600.0\n    qbits_ok = abs(qb.item() - expected_qbits) < 1.0\n    print(f\"\\n[Test 1] Single layer qbits() — QConv2d(1, 32, 5), b=2.0\")\n    print(f\"  fan_in = 1*5*5 = 25, sum(relu(b)) = 32*2.0 = 64.0\")\n    print(f\"  Expected qbits: {expected_qbits:.1f}\")\n    print(f\"  Got     qbits: {qb.item():.1f}\")\n    print(f\"  Result        : {'✓ PASS' if qbits_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 2: qbits() for QConv2d(32, 64, 3) — larger layer\n    # -------------------------------------------------------------------\n    layer2 = QConv2d(in_channels=32, out_channels=64, kernel_size=3)\n    qb2 = layer2.qbits()\n    # fan_in = 32 * 3 * 3 = 288, sum(relu(b)) = 64 * 2.0 = 128, total = 36864\n    expected_qbits2 = 36864.0\n    qbits2_ok = abs(qb2.item() - expected_qbits2) < 1.0\n    print(f\"\\n[Test 2] Layer qbits() — QConv2d(32, 64, 3), b=2.0\")\n    print(f\"  fan_in = 32*3*3 = 288, sum(relu(b)) = 64*2.0 = 128.0\")\n    print(f\"  Expected qbits: {expected_qbits2:.1f}\")\n    print(f\"  Got     qbits: {qb2.item():.1f}\")\n    print(f\"  Result        : {'✓ PASS' if qbits2_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 3: qbits() with one pruned channel (b < 0)\n    # -------------------------------------------------------------------\n    layer3 = QConv2d(in_channels=1, out_channels=4, kernel_size=3)\n    with torch.no_grad():\n        layer3.b[2] = -0.5   # channel 2: pruned\n    qb3 = layer3.qbits()\n    # fan_in = 9, sum(relu(b)) = 3 * 2.0 + relu(-0.5) = 6.0 + 0 = 6.0\n    # total = 6.0 * 9 = 54.0\n    expected_qbits3 = 54.0\n    qbits3_ok = abs(qb3.item() - expected_qbits3) < 0.1\n    print(f\"\\n[Test 3] qbits() with pruned channel (b=-0.5 for ch 2)\")\n    print(f\"  Expected: 3 active * 2.0 * 9 = {expected_qbits3:.1f}\")\n    print(f\"  Got     : {qb3.item():.4f}\")\n    print(f\"  Result  : {'✓ PASS' if qbits3_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 4: Full MNIST model — avg bits per weight and model size\n    # -------------------------------------------------------------------\n    model = MNISTModel()\n    total_params = sum(p.numel() for p in model.parameters())\n    print(f\"\\n[Test 4] Full MNIST model metrics\")\n    print(f\"  Total parameters: {total_params:,}\")\n\n    Q = compute_avg_bits(model)\n    Q_val = Q.item() if hasattr(Q, 'item') else float(Q)\n    q_ok = abs(Q_val - 2.0) < 0.05   # at init, b=2.0 → Q≈2.0\n\n    model_bytes = compute_model_bytes(Q_val, total_params)\n    # Note: Q is slightly below 2.0 because total_params includes e and b\n    # (which don't count toward qbits but do count toward the denominator).\n    # So model_bytes will be slightly below total_params * 2 / 8.\n    bytes_ok = abs(model_bytes - Q_val * total_params / 8) < 1.0\n\n    print(f\"  Q (bits/weight) : {Q_val:.4f}  (expected ~2.0 at init)\")\n    print(f\"  Q correct       : {'✓ PASS' if q_ok else '✗ FAIL'}\")\n    print(f\"  Model bytes     : {model_bytes:.1f}  ({model_bytes/1024:.2f} KB)\")\n    print(f\"  Bytes correct   : {'✓ PASS' if bytes_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 5: Per-layer breakdown table\n    # -------------------------------------------------------------------\n    print(f\"\\n[Test 5] Per-layer breakdown\")\n    print(f\"  {'Layer':<18}  {'out_ch':>6}  {'fan_in':>7}  {'qbits':>8}  {'bits/w':>7}\")\n    print(f\"  {'-'*18}  {'-'*6}  {'-'*7}  {'-'*8}  {'-'*7}\")\n    for name, m in model.named_modules():\n        if isinstance(m, QConv2d):\n            fan_in = math.prod(m.weight.shape[1:])\n            out_ch = m.weight.shape[0]\n            bits   = m.qbits().item()\n            bpw    = bits / (out_ch * fan_in)\n            print(f\"  {name:<18}  {out_ch:>6}  {fan_in:>7}  {bits:>8.0f}  {bpw:>7.4f}\")\n\n    # -------------------------------------------------------------------\n    # Test 6: qbits() is differentiable (gradient w.r.t. b)\n    # -------------------------------------------------------------------\n    layer4 = QConv2d(in_channels=3, out_channels=8, kernel_size=3)\n    qb4 = layer4.qbits()\n    qb4.backward()\n    b_grad = layer4.b.grad\n    # Gradient of relu(b).sum() * fan_in w.r.t. b_i is fan_in when b_i > 0\n    expected_grad = float(math.prod(layer4.weight.shape[1:]))   # 27\n    grad_ok = (b_grad.abs() - expected_grad).abs().max().item() < 0.01\n    print(f\"\\n[Test 6] qbits() is differentiable w.r.t. b\")\n    print(f\"  Expected grad magnitude: {expected_grad}\")\n    print(f\"  Actual grad (sample)   : {b_grad.flatten()[0].item():.4f}\")\n    print(f\"  Gradient correct       : {'✓ PASS' if grad_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Summary\n    # -------------------------------------------------------------------\n    all_pass = qbits_ok and qbits2_ok and qbits3_ok and q_ok and bytes_ok and grad_ok\n    print(f\"\\n{'=' * 65}\")\n    if all_pass:\n        print(f\"Model size: ~{model_bytes/1024:.1f} KB at {Q_val:.1f} bits/weight\")\n        print(f\"bits/weight: {Q_val:.4f}\")\n        print(\"ALL TESTS PASSED ✓\")\n    else:\n        print(\"SOME TESTS FAILED — check your implementation\")\n    print(\"=\" * 65)\n"}, {"filename": "ex04_gradient_flow_verification.py", "content": "\"\"\"\nExercise 4: Gradient Flow Verification\n=======================================\nModule 2: Building the QConv2d Layer — Learnable Quantization\n\nSelf-compression only works if ALL THREE parameter groups (weight, e, b)\nreceive meaningful gradients during training:\n\n    weight.grad → drives task performance (cross-entropy minimization)\n    e.grad      → adapts quantization scale (finds right resolution per channel)\n    b.grad      → drives compression (compression penalty pushes b toward 0)\n\nIf any one of these is zero or None, a crucial feedback loop is broken.\nThis exercise is about verifying — and understanding — these gradient flows.\n\nThe training loss is:\n    L = L_task + λ * Q\nwhere Q = compute_avg_bits(model) uses relu(b).sum() * fan_in per layer.\n\n    ∂L/∂weight_i ≈ 2^(-e_i) * conv_gradient    (task signal)\n    ∂L/∂e_i      = ln(2) * 2^(e_i) * Σ_j round(q_ij) * conv_grad_ij\n    ∂L/∂b_i      = λ * fan_in * 𝟙[b_i > 0]     (pure compression pressure)\n\nA key insight: ∂L/∂b comes primarily from the λ*Q term, NOT from the\ntask loss (the task loss's gradient through the clamp bounds is usually\nsmall). This means b's gradient is approximately λ * fan_in — constant,\nalways pointing in the compression direction.\n\nIn this exercise you analyze these gradients concretely.\n\"\"\"\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport math\n\n\n# ---------------------------------------------------------------------------\n# Complete QConv2d (from Exercises 1-3 — provided)\n# ---------------------------------------------------------------------------\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    \"\"\"Straight-through estimator for rounding.\"\"\"\n    return (x.round() - x).detach() + x\n\n\ndef _kaiming_uniform_like_ref(out_channels, in_channels, kH, kW):\n    fan_in = in_channels * kH * kW\n    scale  = 1.0 / math.sqrt(fan_in)\n    return torch.empty(out_channels, in_channels, kH, kW).uniform_(-scale, scale)\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Complete QConv2d layer.\n\n    Attributes\n    ----------\n    weight : nn.Parameter, shape (out_ch, in_ch, kH, kW)\n    e      : nn.Parameter, shape (out_ch, 1, 1, 1), init=-8.0\n    b      : nn.Parameter, shape (out_ch, 1, 1, 1), init=2.0\n    \"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride      = stride\n        self.padding     = padding\n        self.kernel_size = kernel_size\n        self.weight = nn.Parameter(\n            _kaiming_uniform_like_ref(out_channels, in_channels, *kernel_size)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        eff_b  = torch.relu(self.b)\n        lower  = -(2 ** (eff_b - 1))\n        upper  =  (2 ** (eff_b - 1)) - 1\n        scaled = (2 ** (-self.e)) * self.weight\n        return torch.minimum(torch.maximum(scaled, lower), upper)\n\n    def qbits(self) -> torch.Tensor:\n        fan_in = math.prod(self.weight.shape[1:])\n        return torch.relu(self.b).sum() * fan_in\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w  = ste_round(qw)\n        dw = (2 ** self.e) * w\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n\n\n# ---------------------------------------------------------------------------\n# Compression-aware loss helper (provided)\n# ---------------------------------------------------------------------------\n\ndef compute_loss_with_compression(layer: QConv2d, x: torch.Tensor,\n                                   target: torch.Tensor,\n                                   lam: float = 0.05) -> torch.Tensor:\n    \"\"\"Compute combined task + compression loss for a single layer.\n\n    L = MSE(output, target) + lam * Q\n    where Q = layer.qbits() / layer.weight.numel()\n\n    Parameters\n    ----------\n    layer  : QConv2d\n    x      : torch.Tensor — input, shape (N, in_ch, H, W)\n    target : torch.Tensor — target output, same shape as layer(x)\n    lam    : float — compression penalty strength (default 0.05)\n\n    Returns\n    -------\n    torch.Tensor — scalar loss\n    \"\"\"\n    out = layer(x)\n    task_loss = F.mse_loss(out, target)\n    Q = layer.qbits() / layer.weight.numel()\n    return task_loss + lam * Q\n\n\n# ---------------------------------------------------------------------------\n# YOUR IMPLEMENTATIONS\n# ---------------------------------------------------------------------------\n\ndef verify_gradient_flow(layer: QConv2d,\n                          x: torch.Tensor,\n                          lam: float = 0.05) -> bool:\n    \"\"\"Run a forward-backward pass and verify all three parameters get gradients.\n\n    Computes the combined task + compression loss, calls .backward(), then\n    inspects the .grad attribute of each parameter. Reports statistics for\n    each gradient tensor and checks that all are nonzero.\n\n    Parameters\n    ----------\n    layer : QConv2d — the layer to inspect (must have requires_grad=True for all params)\n    x     : torch.Tensor — a single batch of random input, shape (N, in_ch, H, W)\n    lam   : float — compression penalty coefficient (default 0.05)\n\n    Returns\n    -------\n    bool — True if all three parameters have nonzero gradients, False otherwise\n\n    Side effects\n    ------------\n    Prints a gradient report table:\n        \"param    | mean      | std       | frac_nonzero\"\n        For weight, e, and b.\n    Zeroes out any existing .grad before the backward pass.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 18-25 lines                             #\n    #                                                          #\n    # Step 1: Zero any existing gradients on weight, e, b      #\n    #         Use param.grad = None (cleaner than zero_grad)   #\n    #                                                          #\n    # Step 2: Create a target tensor with same shape as output  #\n    #         output = layer(x), but we need target shape first #\n    #         Use torch.no_grad() to get the shape, then make  #\n    #         a random target of that shape.                   #\n    #         OR: compute output, detach() it, add small noise  #\n    #                                                          #\n    # Step 3: Compute combined loss using compute_loss_with_compression() #\n    #         loss = compute_loss_with_compression(layer, x, target, lam) #\n    #                                                          #\n    # Step 4: loss.backward()                                  #\n    #                                                          #\n    # Step 5: For each of [layer.weight, layer.e, layer.b]:    #\n    #   - Check .grad is not None                              #\n    #   - Compute mean abs value: grad.abs().mean().item()     #\n    #   - Compute std: grad.std().item()                       #\n    #   - Compute fraction nonzero: (grad != 0).float().mean() #\n    #   - Print a formatted row                                #\n    #                                                          #\n    # Step 6: Return True if ALL three gradients are nonzero   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef analyze_gradient_magnitudes(layer: QConv2d,\n                                 x: torch.Tensor,\n                                 lam: float = 0.05) -> dict:\n    \"\"\"Compare relative gradient magnitudes of weight, e, and b.\n\n    Runs the same forward-backward as verify_gradient_flow but focuses\n    on comparing the RELATIVE magnitude of each parameter's gradient.\n    This is relevant for learning rate tuning: if b.grad is 1000x smaller\n    than weight.grad, we might need a larger learning rate for b.\n\n    Also verifies the theoretical gradient magnitude for b:\n        ∂(λ*Q)/∂b_i ≈ λ * fan_in  (when b_i > 0)\n\n    Parameters\n    ----------\n    layer : QConv2d\n    x     : torch.Tensor — input batch\n    lam   : float — compression penalty (default 0.05)\n\n    Returns\n    -------\n    dict with keys:\n        'weight_grad_norm' : float — L2 norm of weight.grad\n        'e_grad_norm'      : float — L2 norm of e.grad\n        'b_grad_norm'      : float — L2 norm of b.grad\n        'b_theoretical'    : float — expected L2 norm from λ*fan_in formula\n        'b_grad_matches_theory' : bool — actual vs theoretical within 20%\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 8-12 lines                              #\n    #                                                          #\n    # Step 1: Zero grads, compute loss, call backward()        #\n    #         (same setup as verify_gradient_flow)             #\n    #                                                          #\n    # Step 2: Compute L2 norms for each gradient              #\n    #         norm = grad.norm().item()                        #\n    #                                                          #\n    # Step 3: Compute theoretical b gradient norm              #\n    #         The compression term ∂(λ*Q)/∂b_i ≈ λ * fan_in  #\n    #         for each of out_channels channels where b_i > 0  #\n    #         b_theoretical = λ * fan_in * sqrt(out_channels)  #\n    #         (sqrt because L2 norm of a constant vector)      #\n    #                                                          #\n    # Step 4: Check if actual b_grad_norm ≈ theoretical        #\n    #         Within 50% is fine (task loss also contributes)  #\n    #                                                          #\n    # Step 5: Print a report and return the dict               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__ — validation harness (do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    torch.manual_seed(7)\n\n    print(\"=\" * 65)\n    print(\"Exercise 4: Gradient Flow Verification\")\n    print(\"=\" * 65)\n\n    # -------------------------------------------------------------------\n    # Test 1: verify_gradient_flow — small layer, single batch\n    # -------------------------------------------------------------------\n    print(f\"\\n{'─'*65}\")\n    print(\"[Test 1] Gradient flow for QConv2d(1, 16, 5)\")\n    print(f\"{'─'*65}\")\n    layer1 = QConv2d(in_channels=1, out_channels=16, kernel_size=5)\n    x1 = torch.randn(4, 1, 12, 12, requires_grad=True)   # small input\n    print(f\"  Layer: {layer1.weight.shape}, input: {x1.shape}\")\n    print(f\"  {'Parameter':<12} | {'|grad| mean':>12} | {'grad std':>10} | {'frac nz':>8}\")\n    print(f\"  {'-'*12}-+-{'-'*12}-+-{'-'*10}-+-{'-'*8}\")\n    flow_ok = verify_gradient_flow(layer1, x1, lam=0.05)\n    print(f\"\\n  All gradients nonzero: {'✓ PASS' if flow_ok else '✗ FAIL'}\")\n\n    # -------------------------------------------------------------------\n    # Test 2: verify_gradient_flow — MNIST first layer\n    # -------------------------------------------------------------------\n    print(f\"\\n{'─'*65}\")\n    print(\"[Test 2] Grad
