the 32-bit float baseline of ~345 KB. That single data point is impressive, but it raises an immediate question: *what are we trading for it?*\n\nThe training loss is:\n\n$$\\mathcal{L} = \\mathcal{L}_{\\text{task}} + \\lambda \\cdot Q$$\n\nwhere $Q$ is the average number of bits per weight and $\\lambda$ is a scalar you choose before training. If you increase $\\lambda$, the compression term gets more weight and the network compresses harder — at the expense of accuracy. If you decrease $\\lambda$ toward zero, the network barely compresses at all and approaches the accuracy of a full-precision model.\n\nThis makes $\\lambda$ a *dial* that traces out a curve in the (model size, accuracy) plane. One run gives you one point. To understand the full landscape, you need to sweep $\\lambda$ over several orders of magnitude and record where each run lands.\n\nThe paper samples $\\lambda$ (written as $\\gamma$ in the original) log-uniformly from the interval $[10^{-3},\\, 10^{-0.5}]$[^1], which spans roughly three orders of magnitude. A log-uniform sweep makes sense because the compression pressure is multiplicative: doubling $\\lambda$ doesn't add a fixed number of bytes, it changes the ratio of compression vs. task gradient.\n\n[^1]: The original paper calls this parameter $\\gamma$, referring to the \"compression factor.\" In the reference notebook it appears directly as the scalar in front of $Q$. Throughout this module we use $\\lambda$ to match our PyTorch implementation.\n\n```python\nimport numpy as np\n\n# Log-uniform sweep from 1e-3 to 10^-0.5 ≈ 0.316\nlam_values = np.logspace(-3, -0.5, num=8)\nprint(lam_values)\n# [0.001, 0.002, 0.004, 0.010, 0.022, 0.050, 0.112, 0.316]\n```\n\nEach value of `lam_values` will produce a different point on the tradeoff curve. You'll implement the sweep in Exercise 1.\n\n---\n\n## What Is a Pareto Frontier?\n\n![The Pareto Frontier of Size vs. Accuracy](diagrams/pareto_frontier.svg)\n\nGiven a set of (model size, accuracy) pairs from different $\\lambda$ values, a point $(s_i, a_i)$ is **Pareto-optimal** if there is no other point that is simultaneously smaller *and* more accurate. In other words, you cannot improve on both objectives at once — you must sacrifice one to gain the other.\n\nFormally, point $(s_i, a_i)$ is dominated by $(s_j, a_j)$ if:\n\n$$s_j \\leq s_i \\quad \\text{AND} \\quad a_j \\geq a_i \\quad \\text{AND} \\quad (s_j, a_j) \\neq (s_i, a_i)$$\n\nThe Pareto frontier is the set of non-dominated points. In code:\n\n```python\ndef find_pareto_optimal(results):\n    \"\"\"\n    results: list of dicts with keys 'lambda', 'accuracy', 'model_bytes'\n    Returns: list of results that are Pareto-optimal\n    \"\"\"\n    pareto = []\n    for i, r in enumerate(results):\n        dominated = False\n        for j, other in enumerate(results):\n            if i == j:\n                continue\n            # other dominates r if other is smaller AND more accurate\n            if other['model_bytes'] <= r['model_bytes'] and other['accuracy'] >= r['accuracy']:\n                if other['model_bytes'] < r['model_bytes'] or other['accuracy'] > r['accuracy']:\n                    dominated = True\n                    break\n        if not dominated:\n            pareto.append(r)\n    return pareto\n```\n\n**Why the frontier is concave.** As $\\lambda$ increases from near zero, the first bits to be shed are from channels that were contributing little to accuracy anyway. These are \"free\" compressions — the model gives up almost nothing in accuracy to save significant space. Eventually, you've pruned all the slack channels and the remaining bits are load-bearing: removing them costs accuracy rapidly. This gives the curve its characteristic concave shape — steep accuracy loss at high compression, gentle loss at moderate compression.\n\n**The key result from the paper:** The network achieves floating-point accuracy with as few as **3% of the bits** and **18% of the weights** remaining. That is not a linear tradeoff — it is a highly non-linear one, where careful allocation of bits across channels extracts far more value than uniform quantization could.\n\n**Check your understanding:** If we plotted the Pareto frontier with *model bytes* on the x-axis and *accuracy* on the y-axis, which direction on the x-axis means \"better compression\"? What would it mean if the frontier were convex instead of concave?\n\n---\n\n## Mapping the Frontier: The Lambda Sweep\n\nThe sweep procedure is straightforward but has some subtle pitfalls. Each $\\lambda$ value requires training a **fresh model from a random initialization** — reusing weights from a different $\\lambda$ run would bias the comparison, because the network's internal representations adapt to the regularization strength it was trained with.\n\n```python\ndef train_self_compressing(lam: float, steps: int = 5_000):\n    \"\"\"Train a fresh SelfCompressingCNN with the given lambda, return (accuracy, model_bytes).\"\"\"\n    torch.manual_seed(42)     # reproducible but fresh init every call\n    model = SelfCompressingCNN()\n    train_loader, test_loader = get_mnist_loaders(batch_size=512)\n    optimizer = torch.optim.Adam(model.parameters())\n    \n    weight_count = sum(l.weight.numel() for l in model.modules() if isinstance(l, QConv2d))\n    train_iter = iter(train_loader)\n    \n    for step in range(steps):\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(train_loader)\n            images, labels = next(train_iter)\n        \n        optimizer.zero_grad()\n        logits = model(images)\n        task_loss = F.cross_entropy(logits, labels)\n        Q = compute_compression_term(model)\n        loss = task_loss + lam * Q\n        loss.backward()\n        optimizer.step()\n    \n    # Final evaluation\n    final_acc = get_test_accuracy(model, test_loader)\n    final_Q = compute_compression_term(model).item()\n    final_bytes = final_Q / 8 * weight_count\n    return final_acc, final_bytes\n```\n\nA few observations about convergence behavior:\n\n- **High $\\lambda$** (e.g., 0.3): the compression term dominates and the network may not fully learn the task. These runs sometimes converge to a local minimum that is heavily compressed but poorly accurate. They may need *more* training steps, not fewer, because the optimizer is navigating a harder landscape.\n- **Low $\\lambda$** (e.g., 0.001): essentially unregularized. The network achieves high accuracy but barely compresses. The Pareto curve is nearly flat here — you can gain significant compression by increasing $\\lambda$ slightly with almost no accuracy penalty.\n- **The \"knee\"** (near $\\lambda = 0.05$): the inflection point where the curve bends. This is the most interesting region — small changes in $\\lambda$ produce large changes in model size while accuracy remains high.\n\n**Check your understanding:** The paper's reference result uses $\\lambda = 0.05$ and achieves ~98.2% at ~18 KB. If you doubled $\\lambda$ to 0.10, would you expect the model size to halve? Why or why not?\n\nExpected results from a sweep with 5,000 steps per run:\n\n| $\\lambda$ | Accuracy (%) | Model bytes | Pareto-optimal? |\n|-----------|-------------|-------------|-----------------|\n| 0.001 | ~98.5 | ~35,000 | Yes |\n| 0.005 | ~98.3 | ~25,000 | Yes |\n| 0.020 | ~98.1 | ~20,000 | Yes |\n| 0.050 | ~97.8 | ~18,000 | Yes |\n| 0.100 | ~96.5 | ~14,000 | Yes |\n| 0.200 | ~93.0 | ~10,000 | Yes |\n| 0.316 | ~85.0 | ~7,000 | Maybe |\n\nMost points will be Pareto-optimal because the curve is monotone — higher $\\lambda$ produces both smaller and less accurate models. Non-optimal points only appear if two runs accidentally produce the same model size with different accuracies.\n\n---\n\n## Self-Compression vs. Post-Training Quantization\n\n![Self-Compression vs PTQ Comparison](diagrams/qat_vs_ptq.svg)\n\nWhy does self-compression do better than simply training a full-precision network and then quantizing it afterward? The answer is in the gradient signal.\n\n### Post-Training Quantization (PTQ)\n\nIn PTQ, you:\n1. Train a full-precision model to convergence\n2. Quantize weights (and optionally activations) to low bit-widths\n3. Optionally calibrate scale factors on a small dataset\n\nThe core problem: the network's weights were optimized for **continuous, high-precision arithmetic**. The loss surface around the optimum is shaped by the assumption that small perturbations to weights produce correspondingly small changes in loss. Quantization introduces **discrete jumps** — replacing each weight with the nearest grid point. Near the full-precision optimum, this can push the model into a significantly worse region of the loss surface.\n\nAt 8 bits (256 levels per weight), the quantization error is small enough that the model rarely leaves the basin of attraction of the original optimum. At 4 bits (16 levels), the error starts to matter. At 2 bits (4 levels — $\\{-2, -1, 0, 1\\}$ for 2-bit signed), the error is catastrophic for most networks: accuracy falls dramatically.\n\nFor our 87,860-parameter network at 2-bit uniform quantization, you would expect:\n- **Per-layer optimal exponent**: minimize MSE between the original weight and the quantized grid\n- **Uniform bit-width**: every weight gets exactly 2 bits\n- **Result**: ~85–92% accuracy (from the exercise benchmark)\n\n### Quantization-Aware Training (QAT) via Self-Compression\n\nIn QAT, quantization is integrated into training from the start. The key mechanism is the **Straight-Through Estimator (STE)**: the forward pass sees quantized weights (integers), but the backward pass treats rounding as identity. This allows the optimizer to:\n\n1. **Adapt weight values** to lie near quantization grid points (reducing the quantization error of each individual weight)\n2. **Adapt the network's representations** to compensate for quantization noise (downstream layers learn to ignore or work around the imprecision)\n3. **Allocate bits non-uniformly** based on each channel's importance for the task\n\nPoint 3 is the key advantage over uniform PTQ. Let's see why it matters mathematically.\n\nThe compression term $Q$ in self-compression is:\n\n$$Q = \\frac{1}{W} \\sum_{\\ell} \\sum_{c} \\text{relu}(b_{\\ell,c}) \\cdot f_{\\ell}$$\n\nwhere $W$ is the total weight count, $b_{\\ell,c}$ is the learned bit-width for channel $c$ in layer $\\ell$, and $f_{\\ell} = C_{\\text{in}} \\cdot k^2$ is the number of weights per channel (fan-in times kernel area). This is differentiated with respect to $b_{\\ell,c}$:\n\n$$\\frac{\\partial Q}{\\partial b_{\\ell,c}} = \\frac{f_{\\ell}}{W} \\cdot \\mathbf{1}[b_{\\ell,c} > 0]$$\n\nThe gradient is constant and equal for all active channels in a given layer — there is no signal about *which* channels deserve more bits from $Q$ alone. The signal comes from the **task loss**: channels whose weights make a large contribution to the cross-entropy gradient will resist having their bits reduced (the gradient of the task loss with respect to $b_{\\ell,c}$ will push back against the compression). Channels that are effectively ignored by downstream layers will have small task-loss gradients and their $b_{\\ell,c}$ will drift toward zero.\n\nThis is the mechanism of emergent pruning — we return to it in the next section.\n\n### Implementing Uniform PTQ\n\nTo implement the PTQ baseline fairly, the key design choice is to use **per-layer** (not per-channel) quantization. Per-channel PTQ gives an unfair advantage because it's essentially a different algorithm — the comparison should be apples-to-apples. The PTQ procedure:\n\n```python\ndef uniform_quantize_model(model, num_bits):\n    \"\"\"Apply uniform per-layer post-training quantization.\n    \n    For each weight tensor, finds the optimal scale factor (exponent e)\n    that minimizes MSE between original and quantized weights, then\n    quantizes all weights in that layer at num_bits precision.\n    \n    Modifies model weights in-place.\n    \"\"\"\n    with torch.no_grad():\n        for name, param in model.named_parameters():\n            if 'weight' not in name:\n                continue\n            w = param.data\n            # Optimal scale: minimize ||w - Q(w)||^2\n            # For symmetric quantization: max |w| determines the range\n            max_val = w.abs().max()\n            # Scale such that max_val maps to 2^(num_bits-1) - 1\n            scale = max_val / (2**(num_bits - 1) - 1)\n            if scale < 1e-8:\n                continue\n            # Quantize: round to nearest grid point\n            w_q = torch.round(w / scale) * scale\n            # Clamp to representable range\n            limit = (2**(num_bits - 1) - 1) * scale\n            param.data.copy_(w_q.clamp(-limit, limit))\n```\n\nThe model size for $k$-bit uniform PTQ is simply $k \\cdot W / 8$ bytes. So:\n- 1-bit: $W/8$ bytes = ~10.9 KB for our network\n- 2-bit: $W/4$ bytes = ~21.9 KB\n- 4-bit: $W/2$ bytes = ~43.9 KB\n- 8-bit: $W$ bytes = ~87.9 KB\n\nCompare this to self-compression at $\\lambda = 0.05$: ~18 KB at ~98.2% accuracy. The self-compressing model achieves **sub-2-bit average precision** while uniform 2-bit PTQ drops to ~85–92% accuracy. That gap — roughly 6–13 percentage points at the same model size — is the quantitative advantage of QAT over PTQ.\n\n**Check your understanding:** If you applied per-channel PTQ (finding an optimal exponent $e$ per channel), why would the comparison be unfair? What property of self-compression does per-channel PTQ not capture?\n\n---\n\n## Emergent Channel Pruning\n\n![Emergent Channel Pruning: b-values across layers](diagrams/emergent_pruning.svg)\n\nThe most striking result in the paper is not the overall compression ratio — it is the *structure* of the learned bit-widths. From the reference notebook output:\n\n```\nlayers.2.b (32, 1, 1, 1) [ 2.3977  2.3232  2.3248  -0.0090  -0.0067  2.3268  2.3121  -0.0070  -0.0092  2.8098 ]\nlayers.6.b (64, 1, 1, 1) [ 2.3293  3.5319  2.8099  -0.0055  -0.0076  -0.0065  1.5823  2.3227  -0.0030  3.2326 ]\nlayers.8.b (64, 1, 1, 1) [ 2.3381  2.3230  2.3606  2.3272  2.3935  2.3335  -0.0092  -0.0098  -0.0097  2.3220 ]\n```\n\nNotice the values: most channels have $b \\approx 2.3$–$3.5$, but some channels have $b \\approx -0.009$. After applying $\\text{relu}(b)$, these negative values become exactly zero. According to the paper[^2]:\n\n> When $b = 0$, the quantization output always equals zero, meaning weights become zero-bit representations and can be removed without changing network output. By sharing quantization parameters across entire channels, zero-bit channels can be pruned.\n\n[^2]: This is the key theoretical justification for why structured pruning emerges from bit-width optimization. The paper (arXiv:2301.13142) discusses this in Section 3.\n\nThis is remarkable: the network has discovered, through gradient descent on the joint loss, that certain entire channels are unnecessary. It did not use a separate pruning algorithm, a magnitude threshold, or explicit sparsity constraints. The regularization on $Q$ created the incentive, and the gradient did the rest.\n\n### The Math of a Zero-Bit Channel\n\nLet's trace through what happens when $b_c \\to 0^-$ for channel $c$:\n\n1. $\\text{relu}(b_c) = 0$\n2. The quantized weight range becomes $[-(2^{-1}), 2^{-1} - 1] = [-0.5, -0.5]$... wait, that's not right.\n\nLet's be more careful. The quantized weight (before applying scale) is:\n\n$$\\hat{w} = \\text{clip}\\!\\left(2^{-e} \\cdot w,\\; -2^{b-1},\\; 2^{b-1} - 1\\right)$$\n\nWhen $\\text{relu}(b) = 0$:\n- Lower bound: $-2^{0-1} = -2^{-1} = -0.5$\n- Upper bound: $2^{0-1} - 1 = -0.5$\n\nSo both bounds equal $-0.5$ and the clip forces $\\hat{w} = -0.5$. After rounding: $\\text{round}(-0.5) = 0$ (banker's rounding in Python) or $-1$ (hardware rounding), depending on implementation. In the tinygrad reference, rounding of $-0.5$ yields $0$, making the dequantized weight exactly zero.\n\nIn our PyTorch implementation: `torch.round(-0.5)` → `0.0` (rounds to even)[^3]. So the effective weight is $2^e \\cdot 0 = 0$ for any value of $e$.\n\n[^3]: PyTorch (like Python) uses banker's rounding (round-half-to-even). `torch.round(torch.tensor(-0.5))` → `0.0`. `torch.round(torch.tensor(0.5))` → `0.0`. This means a zero-bit channel always produces zero weights regardless of the exponent.\n\n```python\nimport torch\n\n# Simulate a zero-bit channel\nb = torch.tensor(0.0)\ne = torch.tensor(-8.0)\nw = torch.randn(25)   # some random weights\n\neff_b = torch.relu(b)                         # 0.0\nlower = -(2 ** (eff_b - 1))                   # -0.5\nupper =  (2 ** (eff_b - 1)) - 1              # -0.5\nqw = torch.clamp(2**(-e) * w, lower, upper)  # all -0.5\nrounded = qw.round()                          # all 0.0\ndequantized = (2**e) * rounded               # all 0.0\n\nprint(f\"All weights zero: {(dequantized == 0).all()}\")   # True\n```\n\nThis means that when a channel's $b$ value is driven to zero (or below), the entire channel's contribution to the next layer's activations is exactly zero. The channel has been **structurally pruned** — not by zeroing weights (unstructured sparsity), but by eliminating the channel's output entirely (structured sparsity).\n\nStructured pruning is architecturally important: you can physically remove the pruned channels from the network and reduce both memory and compute proportionally. With unstructured sparsity (sparse weights), you need special hardware or software to exploit the sparsity.\n\n---\n\n## The Anatomy of a Pruned Channel\n\nWhat distinguishes a channel that gets pruned from one that survives? Two mechanisms:\n\n**1. Low weight magnitude.** A channel whose weights are small was contributing little signal to begin with. The loss surface is nearly flat with respect to this channel's weights, meaning the task gradient provides almost no resistance to compression. The channel gets pruned because the compression gradient ($\\partial Q / \\partial b_c = f_\\ell / W > 0$) is uncontested.\n\n**2. Redundancy.** A channel that is highly correlated with other active channels can be removed without information loss — the other channels already carry the same signal. In this case, the network is effectively deduplicating feature detectors.\n\nWe can detect redundancy using **cosine similarity** between channel weight tensors. For two channels $c$ and $c'$ in the same layer:\n\n$$\\cos(w_c, w_{c'}) = \\frac{w_c \\cdot w_{c'}}{{\\|w_c\\|} \\cdot {\\|w_{c'}\\|}}$$\n\nA high cosine similarity ($> 0.8$) between a pruned channel $c$ and some active channel $c'$ suggests the pruned channel was redundant — the network was computing roughly the same feature twice, and found it could eliminate one copy.\n\n```python\ndef compute_channel_similarity(layer: QConv2d) -> torch.Tensor:\n    \"\"\"Compute pairwise cosine similarity between output channels.\n    \n    Each channel's weight tensor has shape (C_in, kH, kW).\n    We flatten it to a vector and compute pairwise cosine similarity.\n    \n    Returns: (C_out, C_out) similarity matrix\n    \"\"\"\n    # weight shape: (C_out, C_in, kH, kW) -> (C_out, C_in*kH*kW)\n    W = layer.weight.data.flatten(1)      # (C_out, fan_in)\n    W_norm = F.normalize(W, dim=1)        # unit vectors\n    similarity = W_norm @ W_norm.T        # (C_out, C_out)\n    return similarity\n```\n\n**Check your understanding:** Why do we use cosine similarity rather than Euclidean distance for the redundancy check? What would high Euclidean distance between two weight vectors tell us that cosine similarity would not?\n\n### Which Layers Prune More?\n\nFrom the reference implementation, the bit-width distributions across layers tell a clear story:\n\n- **conv1** ($32$ channels, $5\\times5$ kernels, $1$ input channel): Very few pruned channels — it's the first layer, and each channel learns a distinct edge detector or basic texture. There's little redundancy.\n- **conv2** ($32$ channels, $5\\times5$ kernels, $32$ input channels): Several pruned channels — more complex features built from 32 inputs, higher chance of redundancy.\n- **conv3 / conv4** ($64$ channels): Moderate pruning — deeper features, some redundancy.\n- **conv5** (classification head, $10$ channels): Very few or no pruned channels — each of the 10 channels corresponds to a digit class, and pruning any would directly harm classification.\n\nThe pattern reveals the network's implicit understanding of its own information flow: early layers maintain diversity, deeper layers tolerate redundancy, but the classification head is sacrosanct.\n\n---\n\n## Analytical Questions\n\nThese questions are meant to stretch beyond what the exercises test. Work through them before looking at the next module.\n\n### Question 1 — Pareto Analysis\n\nThe paper reports achieving floating-point accuracy with as few as 3% of the bits. If the full-precision model uses $32 \\cdot W$ total bits and the self-compressing model uses $Q \\cdot W$ bits, what value of $Q$ corresponds to 3%? Given that $W = 87{,}860$, how many *bytes* is this? Does this match the ~18 KB result? What does this imply about the non-uniformity of the bit allocation?\n\n$$Q_{\\text{target}} = 0.03 \\times 32 = 0.96 \\text{ bits/weight}$$\n\n$$\\text{bytes} = Q_{\\text{target}} \\cdot W / 8 = 0.96 \\times 87{,}860 / 8 \\approx 10{,}543 \\text{ bytes}$$\n\nThe ~18 KB result corresponds to $Q \\approx 1.64$ bits/weight, not 0.96. The \"3% of bits\" claim likely refers to an extreme point on the Pareto frontier (very high $\\lambda$), not the default $\\lambda = 0.05$ result. This is a key distinction: *where* on the frontier you operate is a choice.\n\n### Question 2 — Gradient Signal\n\nThe compression gradient $\\partial Q / \\partial b_c = f_\\ell / W$ is the same for all channels in a given layer. Yet different channels end up at very different bit-widths. Trace the mechanism: what is $\\partial \\mathcal{L}_{\\text{task}} / \\partial b_c$, and why does it differ across channels? Use the chain rule through the STE.\n\n*Hint:* $\\mathcal{L}_{\\text{task}}$ depends on $b_c$ through the quantized weight $\\hat{w}_c = \\text{clip}(2^{-e_c} w_c, \\ldots)$ and the STE. The magnitude of this gradient depends on how much the task loss would change if the precision of channel $c$ were reduced.\n\n### Question 3 — Initialization Sensitivity\n\nBoth $e$ and $b$ are initialized to specific values: $e_0 = -8.0$, $b_0 = 2.0$. What happens if you initialize $b_0 = 8.0$ instead? Would the network still learn to prune? What about $b_0 = 0.0$?\n\n*Analysis:* With $b_0 = 8.0$, the initial quantization range is $[-128, 127]$ — essentially full precision for typical weight magnitudes. The compression penalty starts large ($Q \\approx 8$ bits/weight vs. $Q \\approx 2$ bits/weight at $b_0 = 2.0$), giving a stronger initial compression gradient. Whether this helps or hurts depends on whether the optimizer can reduce $b$ fast enough without oscillating. With $b_0 = 0.0$, all channels start pruned — the network must \"earn back\" bits it needs, which is a more adversarial initialization.\n\n### Question 4 — Architectural Scaling\n\nThe reference uses a fixed 5-layer CNN. How would you expect the Pareto frontier to change if you doubled the number of channels in each layer (4× more parameters)? Would the compression ratio increase, decrease, or stay the same? Would the pruning fraction change?\n\n*Analysis:* With more channels, there is more redundancy for the network to discover and prune. We would expect a *higher* pruning fraction (more channels eliminated) and a similar or better point on the Pareto frontier — the network could achieve the same accuracy with a higher compression ratio by pruning the redundant channels. This is the key insight: self-compression scales naturally with overparameterization.\n\n---\n\n## Synthesis: What We've Built\n\nLet's trace the full arc of this course against the paper's central claim: *a neural network that learns its own compression during training*.\n\n**Module 0** established the mathematical foundation: what quantization means, why it works, and how scale (exponent $e$) and range (bit-width $b$) parametrize the quantization grid.\n\n**Module 1** solved the core technical problem: how to backpropagate through a non-differentiable operation (rounding). The STE — `(x.round() - x).detach() + x` — is three tokens of code that enable the entire self-compression machinery.\n\n**Module 2** wrapped these ideas into the `QConv2d` layer: a drop-in replacement for `Conv2d` that carries learnable $e$ and $b$ parameters per output channel. The `qbits()` method reports the layer's contribution to $Q$.\n\n**Module 3** wired up the training loop: the joint loss $\\mathcal{L} = \\mathcal{L}_{\\text{task}} + \\lambda \\cdot Q$, the full CNN architecture, 20,000 training steps, and the reference result: 98.2% accuracy at 18,075 bytes.\n\n**Module 4** (this module) reveals the full picture:\n\n- The $\\lambda$ hyperparameter is a dial that sweeps a smooth, concave **Pareto frontier** in the (size, accuracy) plane\n- **QAT outperforms PTQ** at low bit-widths because the model adapts its representations during training — an advantage that grows as bit-widths decrease\n- The network discovers **structured pruning** as an emergent consequence of bit-width optimization — channels with $b \\to 0^-$ are physically eliminated without any explicit pruning algorithm\n- The pruned channels are interpretable: they are either low-magnitude (small contribution) or redundant (correlated with active channels)\n\nThe paper's key insight — that quantization parameters can be made differentiable and jointly optimized with task performance — turns out to have implications far beyond simple compression. The same idea could apply to:\n\n- **Architecture search**: let the network learn which layers and channels it needs\n- **Adaptive inference**: at test time, use the learned $b$ values to skip zero-bit channels entirely\n- **Knowledge distillation**: the bit-width distribution reveals which parts of a large teacher network the student actually needs\n\nThe Pareto frontier is not just a performance metric — it is a window into the network's understanding of its own redundancy. Points on the frontier correspond to different equilibria between accuracy and efficiency, each one the result of a different trade that the optimizer negotiated during training. The fact that the frontier is smooth and concave tells us that this negotiation is well-behaved: there are no discontinuities, no phase transitions, just a graceful curve through the space of possible models.\n\nYou have now implemented the complete system from scratch. The next step is yours: can you extend this to a harder task (CIFAR-10, ImageNet), a larger architecture (ResNet, ViT), or a different compression target (activations, not just weights)?\n\n---\n\n*The exercises for this module explore each of these themes experimentally. Work through them in order — Exercise 1 generates the Pareto frontier, Exercise 2 compares against PTQ, and Exercise 3 performs the deep dive into emergent pruning.*\n", "exercises": [{"filename": "ex01_map_the_sizeaccuracy_pareto_frontier.py", "content": "\"\"\"\nExercise 1: Map the Size-Accuracy Pareto Frontier\n==================================================\nModule 4 — The Pareto Frontier & Emergent Pruning\n\nThe training loss of our self-compressing CNN is:\n    L = L_task + λ · Q\nwhere Q is the average bits-per-weight and λ controls compression strength.\n\nDifferent values of λ sweep out a curve in (model_bytes, accuracy) space —\nthe Pareto frontier. Your job is to:\n  1. Sweep λ over a log-uniform range\n  2. Train a fresh model for each λ\n  3. Identify which configurations are Pareto-optimal\n  4. Plot the frontier\n\nReference from the paper:\n  λ=0.05 → ~98.2% accuracy @ ~18,075 bytes (20× compression from float32)\n  The full frontier spans 3% to 100% of bits from 80% to 99% accuracy.\n\"\"\"\n\nimport math\nimport os\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import DataLoader\nimport torchvision\nimport torchvision.transforms as transforms\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nfrom tqdm import tqdm\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# QConv2d + SelfCompressingCNN (provided — same as Module 3)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    \"\"\"Straight-Through Estimator for rounding.\"\"\"\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    \"\"\"Quantized Conv2d with per-channel learnable exponent e and bit-width b.\"\"\"\n\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride = stride\n        self.padding = padding\n        self.kernel_size = kernel_size\n\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale = 1.0 / math.sqrt(fan_in)\n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        eff_b = torch.relu(self.b)\n        lower = -(2 ** (eff_b - 1))\n        upper =  (2 ** (eff_b - 1)) - 1\n        return torch.clamp(2 ** (-self.e) * self.weight, lower, upper)\n\n    def qbits(self) -> torch.Tensor:\n        fan_in = math.prod(self.weight.shape[1:])\n        return torch.relu(self.b).sum() * fan_in\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w = ste_round(qw)\n        dw = (2 ** self.e) * w\n        return F.conv2d(x, dw, stride=self.stride, padding=self.padding)\n\n\nclass SelfCompressingCNN(nn.Module):\n    \"\"\"5-layer QConv2d CNN for MNIST. 87,860 weight parameters.\"\"\"\n\n    def __init__(self):\n        super().__init__()\n        self.conv1 = QConv2d(1,   32, 5)\n        self.conv2 = QConv2d(32,  32, 5)\n        self.bn1   = nn.BatchNorm2d(32, affine=False, track_running_stats=False)\n        self.conv3 = QConv2d(32,  64, 3)\n        self.conv4 = QConv2d(64,  64, 3)\n        self.bn2   = nn.BatchNorm2d(64, affine=False, track_running_stats=False)\n        self.conv5 = QConv2d(576, 10, 1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.max_pool2d(self.bn1(F.relu(self.conv2(x))), 2)\n        x = F.relu(self.conv3(x))\n        x = F.max_pool2d(self.bn2(F.relu(self.conv4(x))), 2)\n        x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)\n        return self.conv5(x).flatten(1)\n\n\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    \"\"\"Average bits-per-weight across all QConv2d layers.\"\"\"\n    total_bits = torch.tensor(0.0)\n    weight_count = 0\n    for layer in model.modules():\n        if isinstance(layer, QConv2d):\n            total_bits = total_bits + layer.qbits()\n            weight_count += layer.weight.numel()\n    return total_bits / weight_count\n\n\ndef get_mnist_loaders(batch_size: int = 512, data_dir: str = \"/tmp/mnist\"):\n    transform = transforms.Compose([\n        transforms.ToTensor(),\n        transforms.Normalize((0.1307,), (0.3081,)),\n    ])\n    train_ds = torchvision.datasets.MNIST(data_dir, train=True,  download=True, transform=transform)\n    test_ds  = torchvision.datasets.MNIST(data_dir, train=False, download=True, transform=transform)\n    return (DataLoader(train_ds, batch_size=batch_size, shuffle=True,  num_workers=0),\n            DataLoader(test_ds,  batch_size=2000,       shuffle=False, num_workers=0))\n\n\n@torch.no_grad()\ndef get_test_accuracy(model: nn.Module, test_loader: DataLoader) -> float:\n    model.train()  # keep BatchNorm in batch-stats mode\n    correct = total = 0\n    for images, labels in test_loader:\n        logits = model(images)\n        correct += (logits.argmax(1) == labels).sum().item()\n        total   += labels.size(0)\n    return 100.0 * correct / total\n\n\ndef train_self_compressing(lam: float, steps: int = 3_000,\n                           seed: int = 42) -> tuple[float, float]:\n    \"\"\"Train a fresh SelfCompressingCNN with the given lambda.\n\n    Parameters\n    ----------\n    lam : float\n        Compression regularization strength (λ in L = L_task + λ·Q).\n    steps : int\n        Number of training steps (gradient updates).\n    seed : int\n        Random seed for reproducible but independent initializations.\n\n    Returns\n    -------\n    tuple[float, float]\n        (accuracy_pct, model_bytes) — final test accuracy and model size.\n    \"\"\"\n    torch.manual_seed(seed)\n    model = SelfCompressingCNN()\n    train_loader, test_loader = get_mnist_loaders(batch_size=512)\n    optimizer = torch.optim.Adam(model.parameters())\n\n    weight_count = sum(l.weight.numel() for l in model.modules() if isinstance(l, QConv2d))\n\n    train_iter = iter(train_loader)\n    for step in range(steps):\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(train_loader)\n            images, labels = next(train_iter)\n\n        optimizer.zero_grad()\n        logits = model(images)\n        task_loss = F.cross_entropy(logits, labels)\n        Q = compute_compression_term(model)\n        loss = task_loss + lam * Q\n        loss.backward()\n        optimizer.step()\n\n    final_acc   = get_test_accuracy(model, test_loader)\n    final_Q     = compute_compression_term(model).item()\n    model_bytes = final_Q / 8 * weight_count\n    return final_acc, model_bytes\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# YOUR CODE — 3 functions to implement\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef sweep_lambda(lam_values: list[float],\n                 steps_per_run: int = 3_000) -> list[dict]:\n    \"\"\"Train a fresh model for each lambda value and record the results.\n\n    Each lambda value should produce an independent run: fresh random init,\n    fresh optimizer. Use train_self_compressing() for each run.\n\n    Parameters\n    ----------\n    lam_values : list[float]\n        Lambda values to sweep (compression regularization strengths).\n    steps_per_run : int\n        Training steps per lambda value.\n\n    Returns\n    -------\n    list[dict]\n        One dict per lambda with keys: 'lambda', 'accuracy', 'model_bytes'.\n        Dicts should be sorted by model_bytes ascending (smallest model first).\n\n    Example\n    -------\n    >>> results = sweep_lambda([0.01, 0.05, 0.1], steps_per_run=1000)\n    >>> results[0].keys()\n    dict_keys(['lambda', 'accuracy', 'model_bytes'])\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-18 lines                            #\n    #                                                         #\n    # Hint: iterate over lam_values, call train_self_         #\n    # compressing(lam, steps=steps_per_run) for each.        #\n    # Print progress. Sort results by model_bytes ascending.  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef find_pareto_optimal(results: list[dict]) -> list[dict]:\n    \"\"\"Identify Pareto-optimal configurations from sweep results.\n\n    A configuration is Pareto-optimal if no other configuration has\n    BOTH smaller model_bytes AND higher accuracy.\n\n    Parameters\n    ----------\n    results : list[dict]\n        Output from sweep_lambda(): list of dicts with 'lambda',\n        'accuracy', 'model_bytes'.\n\n    Returns\n    -------\n    list[dict]\n        The subset of results that are Pareto-optimal.\n\n    Notes\n    -----\n    Since the sweep is monotone (higher lambda → smaller model AND lower\n    accuracy), most points will be Pareto-optimal. Non-optimal points\n    only occur if two runs accidentally flip the monotone ordering.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # Hint: for each result r, check if any OTHER result      #\n    # dominates it: other.bytes <= r.bytes AND other.acc >=   #\n    # r.acc, with at least one strict inequality.             #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef plot_pareto_frontier(results: list[dict],\n                         pareto: list[dict],\n                         save_path: str = \"pareto_frontier.png\") -> None:\n    \"\"\"Scatter plot of model_bytes (x) vs accuracy (y), annotated with lambda.\n\n    Parameters\n    ----------\n    results : list[dict]\n        All sweep results (lambda, accuracy, model_bytes).\n    pareto : list[dict]\n        Pareto-optimal subset (for highlighting and connecting with a line).\n    save_path : str\n        Output filename for the saved figure.\n\n    Notes\n    -----\n    Plot layout:\n      - All points as scatter (grey or colored by lambda)\n      - Pareto-optimal points highlighted (different color/marker)\n      - Connect Pareto points with a line (sorted by model_bytes)\n      - Annotate each point with its lambda value\n      - x-axis: model size in bytes, y-axis: accuracy (%)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-15 lines                            #\n    #                                                         #\n    # Hint: use plt.scatter() for all points, then            #\n    # plt.scatter() again for pareto-optimal with different   #\n    # color. Sort pareto by model_bytes before plotting line. #\n    # Use ax.annotate() to label lambda values.               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Main — provided, do not modify\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    OUT_DIR = os.path.dirname(__file__)\n\n    print(\"=\" * 65)\n    print(\"Exercise 1: Map the Size-Accuracy Pareto Frontier\")\n    print(\"=\" * 65)\n\n    # Lambda sweep: log-uniform from 1e-3 to ~0.3\n    # Paper samples gamma log-uniformly from [10^-3, 10^-0.5]\n    LAM_VALUES = list(np.logspace(-3, -0.5, num=7))\n    STEPS = int(os.environ.get(\"PARETO_STEPS\", \"2000\"))\n\n    print(f\"\\n[1] Sweeping λ over {len(LAM_VALUES)} values: \"\n          f\"{[f'{v:.4f}' for v in LAM_VALUES]}\")\n    print(f\"    Steps per run: {STEPS}\")\n    print(f\"    (Set PARETO_STEPS=5000 for smoother results)\")\n\n    results = sweep_lambda(LAM_VALUES, steps_per_run=STEPS)\n\n    assert isinstance(results, list), \"sweep_lambda must return a list\"\n    assert len(results) == len(LAM_VALUES), \"One result per lambda value\"\n    assert all('lambda' in r and 'accuracy' in r and 'model_bytes' in r\n               for r in results), \"Each result needs lambda, accuracy, model_bytes\"\n\n    print(\"\\n[2] Results table:\")\n    print(f\"  {'lambda':>8} | {'accuracy (%)':>12} | {'model_bytes':>11} | pareto_optimal\")\n    print(\"  \" + \"-\" * 58)\n\n    pareto = find_pareto_optimal(results)\n    pareto_set = {r['lambda'] for r in pareto}\n\n    for r in results:\n        flag = \"✓\" if r['lambda'] in pareto_set else \"\"\n        print(f\"  {r['lambda']:>8.4f} | {r['accuracy']:>12.2f} | \"\n              f\"{r['model_bytes']:>11.1f} | {flag}\")\n\n    pareto_strs = [f\"lambda={r['lambda']:.4f}\" for r in pareto]\n    print(f\"\\n[3] Pareto-optimal configurations: {pareto_strs}\")\n    assert len(pareto) > 0, \"Should find at least one Pareto-optimal point\"\n\n    # Check that lambda=0.05 (or closest) achieves reasonable compression\n    closest_idx = min(range(len(LAM_VALUES)), key=lambda i: abs(LAM_VALUES[i] - 0.05))\n    ref = results[closest_idx]\n    print(f\"\\n[4] Reference λ≈0.05 result:\")\n    print(f\"    λ={ref['lambda']:.4f}: accuracy={ref['accuracy']:.2f}%, \"\n          f\"model_bytes={ref['model_bytes']:.1f}\")\n\n    print(\"\\n[5] Plotting Pareto frontier...\")\n    plot_path = os.path.join(OUT_DIR, \"pareto_frontier.png\")\n    plot_pareto_frontier(results, pareto, save_path=plot_path)\n    print(f\"    Saved: {plot_path}\")\n\n    # Summary\n    best_acc  = max(r['accuracy']    for r in results)\n    best_size = min(r['model_bytes'] for r in results)\n    float32_bytes = 87860 * 4\n    print(f\"\\n[6] Summary:\")\n    print(f\"    Best accuracy: {best_acc:.2f}%  (λ={min(LAM_VALUES):.4f})\")\n    print(f\"    Smallest model: {best_size:.1f} bytes  (λ={max(LAM_VALUES):.4f})\")\n    print(f\"    Max compression vs float32: {float32_bytes/best_size:.1f}x\")\n    print(f\"\\n✓ Pareto frontier mapped! ({len(pareto)} Pareto-optimal configurations)\")\n"}, {"filename": "ex02_selfcompression_vs_uniform_posttraining_quantizati.py", "content": "\"\"\"\nExercise 2: Self-Compression vs. Uniform Post-Training Quantization\n====================================================================\nModule 4 — The Pareto Frontier & Emergent Pruning\n\nSelf-compression (QAT) achieves ~98.2% accuracy at ~18KB.\nHow does this compare to training a standard CNN and then quantizing it\nwith uniform post-training quantization (PTQ)?\n\nThis exercise quantifies the gap, which is the core advantage of QAT:\nthe model ADAPTS to quantization errors during training, allocates bits\nnon-uniformly across channels, and prunes dispensable channels entirely.\n\nKey question: At equal model size (~18KB ≈ ~1.64 bits/weight), what is\nthe accuracy difference between self-compression and uniform PTQ?\n\"\"\"\n\nimport copy\nimport math\nimport os\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import DataLoader\nimport torchvision\nimport torchvision.transforms as transforms\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nfrom tqdm import tqdm\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Standard CNN (float32, no quantization — PTQ baseline)\n# ──────────────────────────────────────────────────────────────────────────────\n\nclass StandardCNN(nn.Module):\n    \"\"\"Identical architecture to SelfCompressingCNN but with plain Conv2d.\n    No quantization parameters — standard float32 training.\n    \"\"\"\n\n    def __init__(self):\n        super().__init__()\n        self.conv1 = nn.Conv2d(1,   32, 5)\n        self.conv2 = nn.Conv2d(32,  32, 5)\n        self.bn1   = nn.BatchNorm2d(32, affine=False, track_running_stats=False)\n        self.conv3 = nn.Conv2d(32,  64, 3)\n        self.conv4 = nn.Conv2d(64,  64, 3)\n        self.bn2   = nn.BatchNorm2d(64, affine=False, track_running_stats=False)\n        self.conv5 = nn.Conv2d(576, 10, 1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.max_pool2d(self.bn1(F.relu(self.conv2(x))), 2)\n        x = F.relu(self.conv3(x))\n        x = F.max_pool2d(self.bn2(F.relu(self.conv4(x))), 2)\n        x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)\n        return self.conv5(x).flatten(1)\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# QConv2d + SelfCompressingCNN (for the QAT reference point)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride = stride\n        self.padding = padding\n        self.kernel_size = kernel_size\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale = 1.0 / math.sqrt(fan_in)\n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        eff_b = torch.relu(self.b)\n        lower = -(2 ** (eff_b - 1))\n        upper =  (2 ** (eff_b - 1)) - 1\n        return torch.clamp(2 ** (-self.e) * self.weight, lower, upper)\n\n    def qbits(self) -> torch.Tensor:\n        return torch.relu(self.b).sum() * math.prod(self.weight.shape[1:])\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w = ste_round(qw)\n        return F.conv2d((2 ** self.e) * w, x if False else None,\n                        stride=self.stride, padding=self.padding) if False else \\\n               F.conv2d(x, (2 ** self.e) * w, stride=self.stride, padding=self.padding)\n\n\nclass SelfCompressingCNN(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.conv1 = QConv2d(1,   32, 5)\n        self.conv2 = QConv2d(32,  32, 5)\n        self.bn1   = nn.BatchNorm2d(32, affine=False, track_running_stats=False)\n        self.conv3 = QConv2d(32,  64, 3)\n        self.conv4 = QConv2d(64,  64, 3)\n        self.bn2   = nn.BatchNorm2d(64, affine=False, track_running_stats=False)\n        self.conv5 = QConv2d(576, 10, 1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.max_pool2d(self.bn1(F.relu(self.conv2(x))), 2)\n        x = F.relu(self.conv3(x))\n        x = F.max_pool2d(self.bn2(F.relu(self.conv4(x))), 2)\n        x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)\n        return self.conv5(x).flatten(1)\n\n\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    total_bits, weight_count = torch.tensor(0.0), 0\n    for layer in model.modules():\n        if isinstance(layer, QConv2d):\n            total_bits = total_bits + layer.qbits()\n            weight_count += layer.weight.numel()\n    return total_bits / weight_count\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Data and evaluation utilities (provided)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef get_mnist_loaders(batch_size: int = 512, data_dir: str = \"/tmp/mnist\"):\n    transform = transforms.Compose([\n        transforms.ToTensor(),\n        transforms.Normalize((0.1307,), (0.3081,)),\n    ])\n    train_ds = torchvision.datasets.MNIST(data_dir, train=True,  download=True, transform=transform)\n    test_ds  = torchvision.datasets.MNIST(data_dir, train=False, download=True, transform=transform)\n    return (DataLoader(train_ds, batch_size=batch_size, shuffle=True,  num_workers=0),\n            DataLoader(test_ds,  batch_size=2000,       shuffle=False, num_workers=0))\n\n\n@torch.no_grad()\ndef get_test_accuracy(model: nn.Module, test_loader: DataLoader) -> float:\n    \"\"\"Evaluate test accuracy. Keeps BatchNorm in training mode (batch-stats).\"\"\"\n    model.train()\n    correct = total = 0\n    for images, labels in test_loader:\n        logits = model(images)\n        correct += (logits.argmax(1) == labels).sum().item()\n        total   += labels.size(0)\n    return 100.0 * correct / total\n\n\ndef train_standard_cnn(model: nn.Module, train_loader: DataLoader,\n                       steps: int = 3_000) -> nn.Module:\n    \"\"\"Train the StandardCNN with cross-entropy (no compression loss).\n\n    Parameters\n    ----------\n    model : nn.Module\n        Freshly initialized StandardCNN.\n    train_loader : DataLoader\n        MNIST training loader.\n    steps : int\n        Number of gradient update steps.\n\n    Returns\n    -------\n    nn.Module\n        The trained model (same object, in-place).\n    \"\"\"\n    optimizer = torch.optim.Adam(model.parameters())\n    train_iter = iter(train_loader)\n    for step in tqdm(range(steps), desc=\"Training baseline CNN\"):\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(train_loader)\n            images, labels = next(train_iter)\n        optimizer.zero_grad()\n        loss = F.cross_entropy(model(images), labels)\n        loss.backward()\n        optimizer.step()\n    return model\n\n\ndef train_self_compressing(lam: float = 0.05, steps: int = 3_000,\n                           seed: int = 42) -> tuple[SelfCompressingCNN, float, float]:\n    \"\"\"Train a fresh SelfCompressingCNN and return (model, accuracy, model_bytes).\"\"\"\n    torch.manual_seed(seed)\n    model = SelfCompressingCNN()\n    train_loader, test_loader = get_mnist_loaders(batch_size=512)\n    optimizer = torch.optim.Adam(model.parameters())\n    weight_count = sum(l.weight.numel() for l in model.modules() if isinstance(l, QConv2d))\n    train_iter = iter(train_loader)\n    for _ in tqdm(range(steps), desc=f\"Training self-compressing (λ={lam})\"):\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(train_loader)\n            images, labels = next(train_iter)\n        optimizer.zero_grad()\n        logits = model(images)\n        loss = F.cross_entropy(logits, labels) + lam * compute_compression_term(model)\n        loss.backward()\n        optimizer.step()\n    acc   = get_test_accuracy(model, test_loader)\n    Q     = compute_compression_term(model).item()\n    return model, acc, Q / 8 * weight_count\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# YOUR CODE — 3 functions to implement\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef uniform_quantize_model(model: nn.Module, num_bits: int) -> nn.Module:\n    \"\"\"Apply uniform per-layer post-training quantization (in-place).\n\n    For each Conv2d weight tensor:\n      1. Find the per-layer optimal scale = max(|w|) / (2^(num_bits-1) - 1)\n         This minimizes MSE for symmetric quantization.\n      2. Round weights to the nearest grid point: round(w / scale) * scale\n      3. Clamp to representable range: [-limit, limit]\n\n    Uses PER-LAYER scale (not per-channel) for fair comparison with\n    self-compression, which uses per-channel parameters.\n\n    Parameters\n    ----------\n    model : nn.Module\n        The trained StandardCNN (or a copy of it). Modified in-place.\n    num_bits : int\n        Bit-width to quantize to (1, 2, 4, or 8).\n\n    Returns\n    -------\n    nn.Module\n        The same model with quantized weights (in-place).\n\n    Notes\n    -----\n    Only quantize parameters named 'weight' (not biases or BN stats).\n    Skip if max |w| < 1e-8 (avoid divide-by-zero for zero-weight layers).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-18 lines                            #\n    #                                                         #\n    # Hint: iterate model.named_parameters(). For each param  #\n    # whose name contains 'weight':                           #\n    #   max_val = param.data.abs().max()                      #\n    #   scale = max_val / (2**(num_bits-1) - 1 + 1e-8)       #\n    #   w_q = torch.round(param.data / scale) * scale         #\n    #   limit = (2**(num_bits-1) - 1) * scale                 #\n    #   param.data.copy_(w_q.clamp(-limit, limit))            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef evaluate_uniform_quantization(\n    baseline_model: nn.Module,\n    test_loader: DataLoader,\n    bit_widths: list[int],\n    weight_count: int,\n) -> list[dict]:\n    \"\"\"Evaluate PTQ at multiple bit-widths and compute model sizes.\n\n    For each bit-width: clone the baseline model, apply uniform quantization,\n    evaluate accuracy, compute model size (bit_width * weight_count / 8 bytes).\n\n    Parameters\n    ----------\n    baseline_model : nn.Module\n        Trained StandardCNN (float32, not modified).\n    test_loader : DataLoader\n        MNIST test set.\n    bit_widths : list[int]\n        Bit-widths to evaluate (e.g. [1, 2, 4, 8]).\n    weight_count : int\n        Total number of weight parameters (for model size calculation).\n\n    Returns\n    -------\n    list[dict]\n        One dict per bit-width: {'bits', 'accuracy', 'model_bytes'}.\n        Sorted by model_bytes ascending.\n\n    Notes\n    -----\n    IMPORTANT: clone the model before quantizing — never modify baseline_model.\n    Model size = num_bits * weight_count / 8.0  (bytes)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-15 lines                            #\n    #                                                         #\n    # Hint: for each bits in bit_widths:                      #\n    #   quantized = copy.deepcopy(baseline_model)             #\n    #   uniform_quantize_model(quantized, bits)               #\n    #   acc = get_test_accuracy(quantized, test_loader)       #\n    #   model_bytes = bits * weight_count / 8.0               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef plot_comparison(\n    self_compress_results: list[dict],\n    uniform_results: list[dict],\n    save_path: str = \"compression_comparison.png\",\n) -> None:\n    \"\"\"Overlay self-compression Pareto curve and PTQ curve on one plot.\n\n    Parameters\n    ----------\n    self_compress_results : list[dict]\n        List of {'accuracy', 'model_bytes', 'lambda'} from self-compression sweep.\n        If not available, pass a single-point list from the default λ=0.05 run.\n    uniform_results : list[dict]\n        List of {'bits', 'accuracy', 'model_bytes'} from evaluate_uniform_quantization.\n    save_path : str\n        Output filename.\n\n    Notes\n    -----\n    - Blue line/markers: self-compression (QAT)\n    - Red line/markers: uniform PTQ\n    - Annotate self-compression points with λ values\n    - Annotate PTQ points with bit-widths\n    - Label axes: x = model size (bytes), y = accuracy (%)\n    - Include legend\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-15 lines                            #\n    #                                                         #\n    # Hint: two separate plt.plot() calls, one per method.    #\n    # Sort both by model_bytes before plotting.               #\n    # Use annotate() to label each point.                     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Main — provided, do not modify\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    torch.manual_seed(0)\n    OUT_DIR = os.path.dirname(__file__)\n\n    print(\"=\" * 65)\n    print(\"Exercise 2: Self-Compression vs. Uniform PTQ\")\n    print(\"=\" * 65)\n\n    STEPS = int(os.environ.get(\"TRAIN_STEPS\", \"2000\"))\n    train_loader, test_loader = get_mnist_loaders(batch_size=512)\n    weight_count = 87860  # total QConv2d / Conv2d weights in this architecture\n\n    # ── Step 1: Train baseline (float32, no compression) ──\n    print(f\"\\n[1] Training baseline StandardCNN ({STEPS} steps)...\")\n    torch.manual_seed(0)\n    baseline = StandardCNN()\n    train_standard_cnn(baseline, train_loader, steps=STEPS)\n    baseline_acc = get_test_accuracy(baseline, test_loader)\n    print(f\"    Baseline accuracy (float32): {baseline_acc:.2f}%\")\n\n    # ── Step 2: Evaluate PTQ at multiple bit-widths ──\n    print(\"\\n[2] Evaluating uniform PTQ at 1, 2, 4, 8 bits...\")\n    uniform_results = evaluate_uniform_quantization(\n        baseline, test_loader,\n        bit_widths=[1, 2, 4, 8],\n        weight_count=weight_count,\n    )\n\n    assert isinstance(uniform_results, list)\n    assert len(uniform_results) == 4\n    print(f\"\\n    {'bits':>4} | {'accuracy (%)':>12} | {'model_bytes':>11}\")\n    print(\"    \" + \"-\" * 35)\n    for r in uniform_results:\n        print(f\"    {r['bits']:>4} | {r['accuracy']:>12.2f} | {r['model_bytes']:>11.1f}\")\n\n    # ── Step 3: Run self-compression at λ=0.05 (single reference point) ──\n    print(f\"\\n[3] Training self-compressing CNN (λ=0.05, {STEPS} steps)...\")\n    sc_model, sc_acc, sc_bytes = train_self_compressing(lam=0.05, steps=STEPS, seed=1)\n    sc_results = [{'accuracy': sc_acc, 'model_bytes': sc_bytes, 'lambda': 0.05}]\n    print(f\"    Self-compression: accuracy={sc_acc:.2f}%, model_bytes={sc_bytes:.1f}\")\n\n    # ── Step 4: Find comparable PTQ result ──\n    # Find the PTQ result with closest model size to sc_bytes\n    closest_ptq = min(uniform_results, key=lambda r: abs(r['model_bytes'] - sc_bytes))\n    gap = sc_acc - closest_ptq['accuracy']\n    print(f\"\\n[4] Comparison at similar model size:\")\n    print(f\"    Self-compression:  acc={sc_acc:.2f}%  @ {sc_bytes:.0f} bytes\")\n    print(f\"    Uniform PTQ {closest_ptq['bits']}-bit:  acc={closest_ptq['accuracy']:.2f}%  \"\n          f\"@ {closest_ptq['model_bytes']:.0f} bytes\")\n    print(f\"    Self-compression outperforms uniform PTQ by {gap:.1f}% accuracy \"\n          f\"at comparable model size\")\n\n    assert \"outperforms\" in (\n        f\"Self-compression outperforms uniform PTQ by {gap:.1f}% accuracy\"\n    )\n\n    # ── Step 5: Plot ──\n    print(\"\\n[5] Plotting comparison...\")\n    plot_path = os.path.join(OUT_DIR, \"compression_comparison.png\")\n    plot_comparison(sc_results, uniform_results, save_path=plot_path)\n    print(f\"    Saved: {plot_path}\")\n\n    print(f\"\\n✓ Comparison complete!\")\n    print(f\"  Self-compression outperforms uniform PTQ by {gap:.1f}% at {sc_bytes:.0f} bytes\")\n"}, {"filename": "ex03_emergent_channel_pruning_deep_dive.py", "content": "\"\"\"\nExercise 3: Emergent Channel Pruning Deep Dive\n==============================================\nModule 4 — The Pareto Frontier & Emergent Pruning\n\nAfter training, examine WHICH channels the network chose to prune and WHY.\nThe self-compressing network drives some channels' bit-widths b to negative\nvalues. After relu(b)=0, the channel contributes exactly zero to all outputs —\nstructurally pruned without any explicit pruning algorithm.\n\nReference output from the paper's notebook (layers.2.b, first 10 values):\n    [ 2.3977  2.3232  2.3248  -0.0090  -0.0067  2.3268  2.3121  -0.0070  -0.0092  2.8098 ]\n\nKey question: Are pruned channels pruned because they are (a) low-magnitude\n(small weights, little contribution) or (b) redundant (highly similar to\nanother active channel)?\n\"\"\"\n\nimport math\nimport os\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import DataLoader\nimport torchvision\nimport torchvision.transforms as transforms\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nfrom typing import Dict, List\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# QConv2d + SelfCompressingCNN\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef ste_round(x: torch.Tensor) -> torch.Tensor:\n    return (x.round() - x).detach() + x\n\n\nclass QConv2d(nn.Module):\n    def __init__(self, in_channels: int, out_channels: int, kernel_size,\n                 stride: int = 1, padding: int = 0):\n        super().__init__()\n        if isinstance(kernel_size, int):\n            kernel_size = (kernel_size, kernel_size)\n        self.stride = stride\n        self.padding = padding\n        self.kernel_size = kernel_size\n        fan_in = in_channels * kernel_size[0] * kernel_size[1]\n        scale = 1.0 / math.sqrt(fan_in)\n        self.weight = nn.Parameter(\n            torch.empty(out_channels, in_channels, *kernel_size).uniform_(-scale, scale)\n        )\n        self.e = nn.Parameter(torch.full((out_channels, 1, 1, 1), -8.0))\n        self.b = nn.Parameter(torch.full((out_channels, 1, 1, 1),  2.0))\n\n    def qweight(self) -> torch.Tensor:\n        eff_b = torch.relu(self.b)\n        lower = -(2 ** (eff_b - 1))\n        upper =  (2 ** (eff_b - 1)) - 1\n        return torch.clamp(2 ** (-self.e) * self.weight, lower, upper)\n\n    def qbits(self) -> torch.Tensor:\n        return torch.relu(self.b).sum() * math.prod(self.weight.shape[1:])\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        qw = self.qweight()\n        w = ste_round(qw)\n        return F.conv2d(x, (2 ** self.e) * w, stride=self.stride, padding=self.padding)\n\n\nclass SelfCompressingCNN(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.conv1 = QConv2d(1,   32, 5)\n        self.conv2 = QConv2d(32,  32, 5)\n        self.bn1   = nn.BatchNorm2d(32, affine=False, track_running_stats=False)\n        self.conv3 = QConv2d(32,  64, 3)\n        self.conv4 = QConv2d(64,  64, 3)\n        self.bn2   = nn.BatchNorm2d(64, affine=False, track_running_stats=False)\n        self.conv5 = QConv2d(576, 10, 1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        x = F.relu(self.conv1(x))\n        x = F.max_pool2d(self.bn1(F.relu(self.conv2(x))), 2)\n        x = F.relu(self.conv3(x))\n        x = F.max_pool2d(self.bn2(F.relu(self.conv4(x))), 2)\n        x = x.flatten(1).reshape(x.shape[0], 576, 1, 1)\n        return self.conv5(x).flatten(1)\n\n\ndef compute_compression_term(model: nn.Module) -> torch.Tensor:\n    total_bits, weight_count = torch.tensor(0.0), 0\n    for layer in model.modules():\n        if isinstance(layer, QConv2d):\n            total_bits = total_bits + layer.qbits()\n            weight_count += layer.weight.numel()\n    return total_bits / weight_count\n\n\ndef get_mnist_loaders(batch_size: int = 512, data_dir: str = \"/tmp/mnist\"):\n    transform = transforms.Compose([\n        transforms.ToTensor(),\n        transforms.Normalize((0.1307,), (0.3081,)),\n    ])\n    train_ds = torchvision.datasets.MNIST(data_dir, train=True,  download=True, transform=transform)\n    test_ds  = torchvision.datasets.MNIST(data_dir, train=False, download=True, transform=transform)\n    return (DataLoader(train_ds, batch_size=batch_size, shuffle=True,  num_workers=0),\n            DataLoader(test_ds,  batch_size=2000,       shuffle=False, num_workers=0))\n\n\ndef quick_train(model: nn.Module, steps: int = 5_000, lam: float = 0.05) -> None:\n    \"\"\"Quick training loop for when no saved model exists.\"\"\"\n    train_loader, _ = get_mnist_loaders(batch_size=512)\n    optimizer = torch.optim.Adam(model.parameters())\n    train_iter = iter(train_loader)\n    from tqdm import trange\n    for _ in trange(steps, desc=f\"Training ({steps} steps)\"):\n        try:\n            images, labels = next(train_iter)\n        except StopIteration:\n            train_iter = iter(train_loader)\n            images, labels = next(train_iter)\n        optimizer.zero_grad()\n        logits = model(images)\n        loss = F.cross_entropy(logits, labels) + lam * compute_compression_term(model)\n        loss.backward()\n        optimizer.step()\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# YOUR CODE — 3 functions to implement\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef identify_pruned_channels(model: nn.Module) -> Dict[str, dict]:\n    \"\"\"For each QConv2d layer, identify pruned and active channels.\n\n    A channel is pruned if relu(b) ≤ 0.01 (effectively zero bits).\n\n    Parameters\n    ----------\n    model : nn.Module\n        Trained SelfCompressingCNN.\n\n    Returns\n    -------\n    dict[str, dict]\n        Keys: layer names (e.g. 'conv1', 'conv2', ...).\n        Values: dicts with:\n          - 'pruned_indices': list[int] — indices of pruned output channels\n          - 'active_indices': list[int] — indices of active output channels\n          - 'b_values': np.ndarray shape (C_out,) — raw b values (not relu'd)\n          - 'n_pruned': int\n          - 'n_active': int\n\n    Notes\n    -----\n    b has shape (out_channels, 1, 1, 1) — flatten it before indexing.\n    The prune threshold is 0.01 (relu(b) = 0 exactly, but float imprecision\n    means we use a small epsilon).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # Hint: use model.named_modules() to iterate QConv2d      #\n    # layers. For each layer:                                 #\n    #   b_flat = layer.b.detach().flatten()                   #\n    #   pruned_indices = (b_flat <= 0.01).nonzero()...        #\n    # Return a dict keyed by layer name.                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef analyze_pruning_pattern(\n    model: nn.Module,\n    pruning_info: Dict[str, dict],\n) -> Dict[str, dict]:\n    \"\"\"For each layer, analyze WHY channels were pruned.\n\n    Two hypotheses:\n      H1 (low magnitude): pruned channels have smaller weight L2 norms\n      H2 (redundancy):    pruned channels are highly correlated with active channels\n\n    For redundancy, compute the maximum cosine similarity between each pruned\n    channel's weight vector and ALL active channel weight vectors. If this max\n    similarity > 0.8, the pruned channel is \"redundant.\"\n\n    Parameters\n    ----------\n    model : nn.Module\n        Trained SelfCompressingCNN.\n    pruning_info : dict\n        Output of identify_pruned_channels().\n\n    Returns\n    -------\n    dict[str, dict]\n        Per-layer analysis with keys:\n          - 'pruned_mean_norm': float — mean L2 norm of pruned channel weights\n          - 'active_mean_norm': float — mean L2 norm of active channel weights\n          - 'redundant_count': int    — number of pruned channels with max cosine > 0.8\n          - 'max_similarities': list[float] — max cosine sim per pruned channel\n\n    Notes\n    -----\n    weight shape: (C_out, C_in, kH, kW). For channel c, use weight[c] flattened.\n    Cosine similarity: dot(u, v) / (||u|| * ||v||). Use F.normalize() and matmul.\n    Skip layers with zero pruned channels.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 20-30 lines                            #\n    #                                                         #\n    # Hint: for each layer in pruning_info:                   #\n    #   Get weight tensor (C_out, ...), flatten to (C_out, D) #\n    #   pruned_w = weight[pruned_indices]  shape: (N_pr, D)   #\n    #   active_w = weight[active_indices]  shape: (N_ac, D)   #\n    #   Compute norms: pruned_w.norm(dim=1), active_w.norm... #\n    #   Cosine sim: normalize then matmul                      #\n    #   max_sim per pruned channel = max along active axis     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef visualize_pruning(\n    model: nn.Module,\n    pruning_info: Dict[str, dict],\n    save_path: str = \"pruning_analysis.png\",\n) -> None:\n    \"\"\"Multi-panel visualization of channel pruning.\n\n    Panel layout (1 row, 3 panels):\n      1. Bar chart: b-values per channel in conv2 (color: red=pruned, blue=active)\n      2. Histogram: weight L2 norms for pruned vs active channels (all layers pooled)\n      3. Similarity matrix: pairwise cosine similarity between ALL channels in conv2\n\n    Parameters\n    ----------\n    model : nn.Module\n        Trained SelfCompressingCNN.\n    pruning_info : dict\n        Output of identify_pruned_channels().\n    save_path : str\n        Output filename.\n\n    Notes\n    -----\n    Panel 1: x-axis = channel index, y-axis = b value, red bars for pruned.\n    Panel 2: overlapping histograms (blue=active, red=pruned).\n    Panel 3: imshow of (C_out, C_out) cosine similarity matrix for conv2.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 15-20 lines                            #\n    #                                                         #\n    # Hint: fig, axes = plt.subplots(1, 3, figsize=(15, 5))  #\n    # Panel 1: use conv2 info from pruning_info['conv2']      #\n    # Panel 2: pool norms from all layers                     #\n    # Panel 3: compute cosine similarity for conv2.weight     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# Main — provided, do not modify\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    torch.manual_seed(42)\n    OUT_DIR = os.path.dirname(__file__)\n\n    print(\"=\" * 65)\n    print(\"Exercise 3: Emergent Channel Pruning Deep Dive\")\n    print(\"=\" * 65)\n\n    # Load or train model\n    model = SelfCompressingCNN()\n    # Look for model saved by Module 3's exercise 2\n    module3_path = os.path.join(\n        os.path.dirname(__file__), \"..\",\n        \"module_03_selfcompression_training_on_mnist\",\n        \"_solutions\", \"trained_model.pt\"\n    )\n    local_path = os.path.join(OUT_DIR, \"trained_model.pt\")\n\n    if os.path.exists(local_path):\n        print(f\"\\n[1] Loading model from: {local_path}\")\n        model.load_state_dict(torch.load(local_path, weights_only=True))\n    elif os.path.exists(module3_path):\n        print(f\"\\n[1] Loading model from Module 3: {module3_path}\")\n        model.load_state_dict(torch.load(module3_path, weights_only=True))\n    else:\n        STEPS = int(os.environ.get(\"TRAIN_STEPS\", \"5000\"))\n        print(f\"\\n[1] No saved model found — training for {STEPS} steps...\")\n        quick_train(model, steps=STEPS, lam=0.05)\n        torch.save(model.state_dict(), local_path)\n        print(f\"    Saved: {local_path}\")\n\n    model.train()  # keep BN in batch-stats mode\n\n    # ── Identify pruned channels ──\n    print(\"\\n[2] Identifying pruned channels per layer:\")\n    pruning_info = identify_pruned_channels(model)\n\n    assert isinstance(pruning_info, dict), \"identify_pruned_channels must return a dict\"\n    total_pruned = 0\n    total_channels = 0\n    for name, info in pruning_info.items():\n        n_pr = info['n_pruned']\n        n_ac = info['n_active']\n        total_pruned   += n_pr\n        total_channels += n_pr + n_ac\n        b_min = info['b_values'].min()\n        b_max = info['b_values'].max()\n        print(f\"    {name}: {n_pr}/{n_pr+n_ac} pruned channels, \"\n              f\"b range=[{b_min:.4f}, {b_max:.4f}]\")\n\n    print(f\"\\n    Total pruned channels: {total_pruned}/{total_channels} \"\n          f\"({100*total_pruned/total_channels:.1f}%)\")\n\n    # ── Analyze pruning pattern ──\n    print(\"\\n[3] Analyzing WHY channels are pruned:\")\n    analysis = analyze_pruning_pattern(model, pruning_info)\n\n    assert isinstance(analysis, dict), \"analyze_pruning_pattern must return a dict\"\n    for name, stats in analysis.items():\n        n_pruned = pruning_info[name]['n_pruned']\n        n_redund = stats['redundant_count']\n        print(f\"    {name}:\")\n        print(f\"      Pruned channels avg weight norm:  {stats['pruned_mean_norm']:.4f}\")\n        print(f\"      Active channels avg weight norm:  {stats['active_mean_norm']:.4f}\")\n        print(f\"      Redundant (cosine_sim > 0.8):    \"\n              f\"{n_redund}/{n_pruned} pruned channels\")\n\n    # ── Print key finding ──\n    print(\"\\n[4] Summary — pruned channels are either:\")\n    print(\"    (a) Low-magnitude: small weights = small gradient signal\")\n    print(\"    (b) Redundant: high cosine similarity with an active channel\")\n    print()\n    print(\"    The network prunes channels that are either low-magnitude or\")\n    print(\"    redundant with other channels, achieving structured sparsity\")\n    print(\"    as an emergent property of bit-width optimization.\")\n\n    # ── Visualize ──\n    print(\"\\n[5] Generating pruning visualizations...\")\n    plot_path = os.path.join(OUT_DIR, \"pruning_analysis.png\")\n    visualize_pruning(model, pruning_info, save_path=plot_path)\n    print(f\"    Saved: {plot_path}\")\n\n    # ── Overall compression check ──\n    Q = compute_compression_term(model).item()\n    w_count = sum(l.weight.numel() for l in model.modules() if isinstance(l, QConv2d))\n    model_bytes = Q / 8 * w_count\n    print(f\"\\n[6] Overall: Q={Q:.4f} bits/weight, \"\n          f\"model_bytes={model_bytes:.1f} bytes\")\n    print(f\"    Float32 baseline: {w_count * 4} bytes ({w_count * 4 / model_bytes:.1f}x compression)\")\n\n    print(f\"\\n✓ Pruning analysis complete! Found {total_pruned} pruned channels \"\n          f\"out of {total_channels} total.\")\n"}]}}}</script>
