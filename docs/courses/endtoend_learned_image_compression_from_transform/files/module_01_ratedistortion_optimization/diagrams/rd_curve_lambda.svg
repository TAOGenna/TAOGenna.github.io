<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 1292 630" width="800" height="390" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1e1e1e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <text x="400" y="46.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">The Rate-Distortion Tradeoff: Each λ Picks a Point on the Curve</text>
  <path d="M 80.0 540.0 L 180.0 540.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <path d="M 80.0 540.0 L 180.0 540.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <text x="870" y="567.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Rate R (bits/pixel)</text>
  <text x="20" y="114.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Distortion</text>
  <text x="20" y="133.4" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">D (MSE)</text>
  <text x="55" y="551.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#555555" text-anchor="start">0</text>
  <rect x="82" y="200" width="620" height="338" rx="0" fill="#e9ecef" stroke="#adb5bd" stroke-width="2" opacity="0.4" filter="url(#handdrawn)"/>
  <text x="350" y="435.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">achievable (R, D) pairs</text>
  <text x="350" y="451.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">(any parameter setting)</text>
  <path d="M 130.0 200.0 L 150.0 225.0 L 175.0 255.0 L 210.0 290.0 L 260.0 325.0 L 320.0 358.0 L 400.0 395.0 L 500.0 435.0 L 620.0 470.0 L 700.0 520.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <text x="680" y="506.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">R-D frontier</text>
  <text x="680" y="523.6" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(convex hull)</text>
  <ellipse cx="195.0" cy="277.0" rx="7.0" ry="7.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="130" y="267.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">λ = 0.01</text>
  <text x="90" y="281.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">low rate,</text>
  <text x="90" y="295.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">high distortion</text>
  <ellipse cx="360.0" cy="352.0" rx="7.0" ry="7.0" fill="#f08c00" stroke="#f08c00" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="350" y="335.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">λ = 0.1</text>
  <ellipse cx="575.0" cy="422.0" rx="7.0" ry="7.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="568" y="405.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">λ = 1.0</text>
  <text x="568" y="451.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">high rate,</text>
  <text x="568" y="465.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">low distortion</text>
  <path d="M 100.0 180.0 L 350.0 370.0" fill="none" stroke="#e03131" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="200" y="169.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">slope = −1/λ₁ = −100</text>
  <text x="105" y="175.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">R + λ₁D = const</text>
  <path d="M 230.0 120.0 L 650.0 440.0" fill="none" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="570" y="126.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">slope = −1/λ₃ = −1</text>
  <text x="500" y="141.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">R + λ₃D = const</text>
  <text x="88" y="76.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#495057" text-anchor="start">KEY INSIGHT: Each value of λ defines a different compression model,</text>
  <text x="88" y="93.6" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#495057" text-anchor="start">living at a different point on the curve. Slope at that point = −1/λ.</text>
  <rect x="700" y="60" width="200" height="110" rx="0" fill="#fff3bf" stroke="#f08c00" stroke-width="1.5" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="710" y="82.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">λ controls quality:</text>
  <text x="710" y="96.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start"></text>
  <text x="710" y="111.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Small λ → low rate</text>
  <text x="710" y="125.6" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">  (≈ JPEG low quality)</text>
  <text x="710" y="140.0" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start"></text>
  <text x="710" y="154.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Large λ → low distortion</text>
  <text x="710" y="168.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">  (≈ JPEG high quality)</text>
  <text x="88" y="209.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#868e96" text-anchor="start">D_max</text>
  <path d="M 80.0 200.0 L 90.0 200.0" fill="none" stroke="#868e96" stroke-width="1" filter="url(#handdrawn)"/>
  <text x="87" y="543.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">↑ optimal: compress more</text>
  <text x="87" y="556.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">but quality suffers</text>
  <text x="560" y="543.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">↑ optimal: compress less</text>
  <text x="560" y="556.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">but quality preserved</text>
</svg>
