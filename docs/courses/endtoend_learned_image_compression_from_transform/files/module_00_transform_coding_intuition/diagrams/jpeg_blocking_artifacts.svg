<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -25 1120 470" width="800" height="336" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="300" y="43.8" font-size="24" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Why JPEG Blocking Artifacts Appear</text>
  <text x="30" y="76.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">STEP 1: JPEG splits image into 8×8 blocks and applies DCT independently</text>
  <rect x="30" y="85" width="340" height="170" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="40" y="108.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Image region (16×8 pixels, two adjacent blocks)</text>
  <rect x="40" y="115" width="155" height="125" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="50" y="138.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Block A (8×8)</text>
  <text x="50" y="158.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">pixel avg = 120</text>
  <text x="50" y="171.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DCT[0,0] = 960</text>
  <text x="50" y="184.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DCT[1,0] = 45</text>
  <text x="50" y="197.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">(smooth region,</text>
  <text x="50" y="211.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start"> few non-zero</text>
  <text x="50" y="224.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start"> coefficients)</text>
  <rect x="205" y="115" width="155" height="125" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="215" y="138.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Block B (8×8)</text>
  <text x="215" y="158.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">pixel avg = 140</text>
  <text x="215" y="171.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DCT[0,0] = 1120</text>
  <text x="215" y="184.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DCT[1,0] = 38</text>
  <text x="215" y="197.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">(adjacent region,</text>
  <text x="215" y="211.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start"> different average!)</text>
  <text x="390" y="101.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">STEP 2: Each block quantized INDEPENDENTLY with same Q-table</text>
  <rect x="390" y="115" width="155" height="125" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="400" y="143.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Block A quantized:</text>
  <text x="400" y="156.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DCT[0,0] = 960</text>
  <text x="400" y="169.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">÷ Q[0,0]=16 → 60</text>
  <text x="400" y="182.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">× 16 → 960</text>
  <text x="400" y="196.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">(roundtrip OK)</text>
  <rect x="555" y="115" width="155" height="125" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="565" y="143.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Block B quantized:</text>
  <text x="565" y="156.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DCT[0,0] = 1120</text>
  <text x="565" y="169.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">÷ Q[0,0]=16 → 70</text>
  <text x="565" y="182.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">× 16 → 1120</text>
  <text x="565" y="196.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">(roundtrip OK)</text>
  <text x="730" y="101.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">STEP 3: Boundary — the PROBLEM</text>
  <rect x="730" y="115" width="340" height="125" rx="0" fill="#fff9db" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="740" y="130" width="155" height="95" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="750" y="158.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Block A pixels</text>
  <text x="750" y="171.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">near boundary:</text>
  <text x="750" y="184.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">~118, 119, 120</text>
  <rect x="905" y="130" width="155" height="95" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="915" y="158.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Block B pixels</text>
  <text x="915" y="171.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">near boundary:</text>
  <text x="915" y="184.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">~140, 141, 142</text>
  <path d="M 897.0 125.0 L 997.0 125.0" fill="none" stroke="#e03131" stroke-width="3" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="868" y="262.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">visible JUMP</text>
  <text x="868" y="276.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">~20 pixel values!</text>
  <text x="30" y="290.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">The reconstructed image has sudden brightness jumps at every 8-pixel boundary —</text>
  <text x="30" y="310.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">this is the 'blocking artifact'. The DCT basis functions are localized to each block,</text>
  <text x="30" y="330.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">so quantizing them independently creates discontinuities at block edges.</text>
  <rect x="30" y="340" width="1020" height="65" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="45" y="371.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">LEARNED SOLUTION: Nonlinear transform g_a processes the WHOLE image (not blocks).</text>
  <text x="45" y="392.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Ballé et al.: 'our method appears to progressively simplify contours... effectively concealing the underlying quantization'</text>
  <text x="450" y="261.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">no block boundaries</text>
  <text x="450" y="274.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">between A and B</text>
  <text x="450" y="287.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">to cause artifacts</text>
</svg>
