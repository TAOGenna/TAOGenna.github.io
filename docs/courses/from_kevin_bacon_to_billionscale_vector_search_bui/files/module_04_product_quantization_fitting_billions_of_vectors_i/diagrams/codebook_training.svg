<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -30 1072 575" width="800" height="429" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="250" y="36.4" font-size="22" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Codebook Training: k-means on Each Subspace Independently</text>
  <text x="10" y="73.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Training corpus: N=10,000 vectors, each 128D</text>
  <rect x="10" y="75" width="600" height="30" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="215" y="98.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">10,000 vectors × 128 dims (float32) = 5.12 MB total</text>
  <text x="10" y="138.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Split into M=8 subspaces (contiguous chunks of 16 dims)</text>
  <rect x="10" y="145" width="70" height="220" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="15" y="165.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Subspace 0</text>
  <text x="15" y="179.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 0–15</text>
  <text x="15" y="192.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">10,000 × 16D</text>
  <text x="15" y="207.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">subvectors</text>
  <ellipse cx="30.0" cy="218.0" rx="10.0" ry="8.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="53.0" cy="231.0" rx="8.0" ry="6.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="34.0" cy="247.0" rx="9.0" ry="7.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="57.0" cy="262.0" rx="7.0" ry="7.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="38.0" cy="287.0" rx="8.0" ry="7.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="15" y="317.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">k-means:</text>
  <text x="15" y="330.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">256 centroids</text>
  <text x="15" y="342.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">trained here</text>
  <text x="15" y="357.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">↓ Codebook 0</text>
  <rect x="90" y="145" width="70" height="220" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="95" y="165.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">Subspace 1</text>
  <text x="95" y="179.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 16–31</text>
  <text x="95" y="192.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">10,000 × 16D</text>
  <ellipse cx="109.0" cy="217.0" rx="9.0" ry="7.0" fill="#f08c00" stroke="#f08c00" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="132.0" cy="236.0" rx="7.0" ry="6.0" fill="#ffec99" stroke="#f08c00" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="118.0" cy="258.0" rx="10.0" ry="8.0" fill="#f08c00" stroke="#f08c00" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="128.0" cy="277.0" rx="8.0" ry="7.0" fill="#ffec99" stroke="#f08c00" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="95" y="317.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">k-means:</text>
  <text x="95" y="330.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">256 centroids</text>
  <text x="95" y="342.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">trained here</text>
  <text x="95" y="357.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">↓ Codebook 1</text>
  <rect x="170" y="145" width="70" height="220" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="175" y="165.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Subspace 2</text>
  <text x="175" y="179.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 32–47</text>
  <text x="175" y="192.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">10,000 × 16D</text>
  <ellipse cx="195.0" cy="223.0" rx="10.0" ry="8.0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="209.0" cy="247.0" rx="9.0" ry="7.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="186.0" cy="267.0" rx="8.0" ry="7.0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="175" y="317.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">k-means:</text>
  <text x="175" y="330.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">256 centroids</text>
  <text x="175" y="342.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">trained here</text>
  <text x="175" y="357.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">↓ Codebook 2</text>
  <text x="250" y="215.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#888888" text-anchor="start">... 5 more subspaces ...</text>
  <text x="250" y="294.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#888888" text-anchor="start">Each trains its OWN</text>
  <text x="250" y="308.8" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#888888" text-anchor="start">k-means independently</text>
  <rect x="380" y="145" width="70" height="220" rx="0" fill="#99e9f2" stroke="#0c8599" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="385" y="165.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">Subspace 7</text>
  <text x="385" y="179.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 112–127</text>
  <text x="385" y="192.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">10,000 × 16D</text>
  <ellipse cx="405.0" cy="228.0" rx="10.0" ry="8.0" fill="#0c8599" stroke="#0c8599" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="423.0" cy="252.0" rx="8.0" ry="7.0" fill="#99e9f2" stroke="#0c8599" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="399.0" cy="272.0" rx="9.0" ry="7.0" fill="#0c8599" stroke="#0c8599" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="385" y="317.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">k-means:</text>
  <text x="385" y="330.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">256 centroids</text>
  <text x="385" y="342.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">trained here</text>
  <text x="385" y="357.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">↓ Codebook 7</text>
  <text x="10" y="403.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Result: 8 codebooks, each with 256 centroids of 16D vectors</text>
  <rect x="10" y="410" width="460" height="50" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="20" y="432.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">Total codebook storage: 8 × 256 × 16 dims × 4 bytes = 131 KB  (fits in L2 cache!)</text>
  <text x="20" y="451.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">Expressiveness: 256^8 = 18,446,744,073,709,551,616 possible vector representations</text>
  <text x="10" y="484.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">WHY INDEPENDENT SUBSPACES? If one codebook covered all 128D: need 256 centroids in 128D space → poor coverage.</text>
  <text x="10" y="502.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Splitting into 8×16D subspaces: each cluster covers a MUCH smaller region, far better reconstruction accuracy.</text>
</svg>
