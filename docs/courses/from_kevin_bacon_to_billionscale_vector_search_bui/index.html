ee_bound.\n          Run robust_prune(vector, all_neighbors, candidate_vecs, degree_bound).\n          Call storage.stats.record_compaction().\n          Rewrite base with storage.put(..., is_delta=False).\n          Delete the delta key with storage.delete(make_delta_key(node_id)).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # 1. vector, all_nbrs = merge_neighbors(storage, node_id) #\n    # 2. if vector is None: return (nothing to compact)       #\n    # 3. if len(all_nbrs) <= max_degree_bound: return early   #\n    # 4. pruned = robust_prune(vector, all_nbrs,              #\n    #                          candidate_vecs, degree_bound)  #\n    # 5. storage.stats.record_compaction()                    #\n    # 6. data = serialize_entry(vector, pruned)               #\n    # 7. storage.put(make_base_key(node_id), data, False)     #\n    # 8. storage.delete(make_delta_key(node_id))              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── Main harness (DO NOT MODIFY) ─────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    N_NODES = 100 if VERIFY else 2000    # total nodes to insert\n    N_BACKEDGE = 8 if VERIFY else DEGREE_BOUND  # backedges per insert\n    rng = np.random.default_rng(42)\n\n    print(\"=\" * 65)\n    print(\"Exercise 2: Backedge Deltas vs Naive Rewrite\")\n    print(\"=\" * 65)\n    print(f\"\\nParameters: N={N_NODES}, DIM={DIM}, M={DEGREE_BOUND}, \"\n          f\"M_max={MAX_DEGREE_BOUND}\")\n\n    # Pre-generate all vectors (simulates a corpus)\n    all_vecs_np = rng.standard_normal((N_NODES, DIM)).astype(np.float32)\n    all_vecs = {i: all_vecs_np[i] for i in range(N_NODES)}\n\n    # ── Naive strategy ──────────────────────────────────────────────────────\n    print(\"\\n[NAIVE] Inserting nodes with immediate full rewrites...\")\n    storage_naive = TrackedStorage()\n\n    # Seed with first few nodes (no backedges needed for seed)\n    seed_n = min(10, N_NODES // 4)\n    for i in range(seed_n):\n        # Create initial node with no neighbors\n        data = serialize_entry(all_vecs[i], [])\n        storage_naive.put(make_base_key(i), data, is_delta=False)\n\n    for i in range(seed_n, N_NODES):\n        # Insert node i: store it first\n        data = serialize_entry(all_vecs[i], [])\n        storage_naive.put(make_base_key(i), data, is_delta=False)\n\n        # Add backedges to N_BACKEDGE random existing nodes\n        neighbor_ids = rng.choice(i, size=min(N_BACKEDGE, i), replace=False).tolist()\n        for nbr_id in neighbor_ids:\n            insert_naive_backedge(storage_naive, nbr_id, i, all_vecs[i],\n                                  all_vecs, DEGREE_BOUND)\n\n    naive_stats = storage_naive.stats\n\n    # ── Delta strategy ──────────────────────────────────────────────────────\n    print(\"[DELTA] Inserting nodes with backedge deltas...\")\n    storage_delta = TrackedStorage()\n\n    for i in range(seed_n):\n        data = serialize_entry(all_vecs[i], [])\n        storage_delta.put(make_base_key(i), data, is_delta=False)\n\n    for i in range(seed_n, N_NODES):\n        data = serialize_entry(all_vecs[i], [])\n        storage_delta.put(make_base_key(i), data, is_delta=False)\n\n        neighbor_ids = rng.choice(i, size=min(N_BACKEDGE, i), replace=False).tolist()\n        for nbr_id in neighbor_ids:\n            insert_backedge_delta(storage_delta, nbr_id, i)\n            # Check for compaction after each delta insert\n            maybe_compact(storage_delta, nbr_id, all_vecs, MAX_DEGREE_BOUND, DEGREE_BOUND)\n\n    delta_stats = storage_delta.stats\n\n    # ── Merge correctness check ─────────────────────────────────────────────\n    check_node = seed_n + 2\n    vec_naive, nbrs_naive = deserialize_entry(\n        storage_naive.get(make_base_key(check_node)))\n    vec_delta, nbrs_delta = merge_neighbors(storage_delta, check_node)\n    neighbor_overlap = len(set(nbrs_naive) & set(nbrs_delta))\n\n    # ── Query overhead estimate ─────────────────────────────────────────────\n    # Delta approach needs two reads (base + delta) vs. naive's one read\n    extra_read_bytes = DIM * 4 + 4 + DEGREE_BOUND * 4   # ~full entry\n    delta_overhead_bytes = DEGREE_BOUND * 4              # ~delta bytes\n    overhead_ms = 0.02  # simulated: ~20 microseconds for one extra small read\n\n    # ── Report ──────────────────────────────────────────────────────────────\n    wa_reduction = naive_stats.total_bytes_written / max(delta_stats.total_bytes_written, 1)\n    backedge_inserts = (N_NODES - seed_n) * N_BACKEDGE\n\n    print(\"\\n\" + \"─\" * 65)\n    print(\"RESULTS\")\n    print(\"─\" * 65)\n    print(f\"Naive:            {N_NODES} inserts, \"\n          f\"{naive_stats.full_rewrites:,} neighbor list rewrites, \"\n          f\"{naive_stats.mb():.1f} MB written\")\n    print(f\"                  {naive_stats.compactions} RobustPrune compactions triggered\")\n    print()\n    print(f\"Backedge deltas:  {N_NODES} inserts, \"\n          f\"{delta_stats.full_rewrites:,} base writes + \"\n          f\"{delta_stats.delta_writes:,} delta writes + \"\n          f\"{delta_stats.compactions} compactions, \"\n          f\"{delta_stats.mb():.1f} MB written\")\n    print()\n    print(f\"Write amplification reduction: {wa_reduction:.0f}x\")\n    print(f\"Query overhead from merging: +{overhead_ms:.2f}ms per hop\")\n    print(f\"Neighbor overlap (correctness): {neighbor_overlap} common neighbors\")\n\n    # Assertions\n    assert naive_stats.full_rewrites > delta_stats.full_rewrites, \\\n        \"Naive should have far more full rewrites\"\n    assert delta_stats.delta_writes > 0, \\\n        \"Delta approach must have delta writes\"\n    assert naive_stats.total_bytes_written > delta_stats.total_bytes_written, \\\n        \"Naive must write more total bytes\"\n    assert wa_reduction >= 3.0, \\\n        f\"Expected at least 3x write amplification reduction, got {wa_reduction:.1f}x\"\n    print(\"\\n✓ All assertions passed!\")\n"}]}}}</script>
