    <script id="course-data" type="application/json">{"courseName": "from_kevin_bacon_to_billionscale_vector_search_bui", "detail": {"title": "From Kevin Bacon to Billion-Scale Vector Search: Building ANN Indices from Scratch", "description": "A hands-on systems engineering course that builds a working vector search engine piece by piece. Starting from brute-force search and the curse of dimensionality, you'll implement greedy graph traversal, HNSW's hierarchical levels, Vamana's RobustPrune algorithm, product quantization, and CoreNN's disk-native storage innovations. Each module hits a real performance bottleneck that motivates the next, culminating in a mini vector database that handles insert, search, and delete across millions of vectors from disk.", "modules": [{"index": 0, "title": "Distance, Dimensionality, and Why Brute Force Fails", "description": "Establish the foundational problem: finding nearest neighbors in high-dimensional spaces. Students implement brute-force kNN, then empirically observe the curse of dimensionality — distances becoming uniformly far and less discriminating as dimensions grow. The module concludes with a contrastive exercise showing k-d trees degrading to brute-force speed in high dimensions, motivating graph-based approaches.", "dir_name": "module_00_distance_dimensionality_and_why_brute_force_fails", "exercises": ["ex01_bruteforce_knearest_neighbors.py", "ex02_the_curse_of_dimensionality_in_action.py", "ex03_kd_tree_vs_brute_force_a_contrastive_study.py"], "depends_on": []}, {"index": 1, "title": "Graph-Based ANN Search: The Core Abstraction", "description": "Introduce graphs as the data structure for nearest neighbor search. Students build a random graph, implement greedy search, observe its low recall, then experiment with different edge strategies. The key insight is that effective search requires both long-range edges (for fast navigation) and short-range edges (for accuracy), mirroring the small-world phenomenon from Milgram's experiment.", "dir_name": "module_01_graphbased_ann_search_the_core_abstraction", "exercises": ["ex01_random_graph_and_greedy_search.py", "ex02_short_vs_long_edge_ratio_explorer.py", "ex03_beam_search_expanding_the_search_frontier.py", "ex04_debugging_a_broken_greedy_search.py"], "depends_on": [0]}, {"index": 2, "title": "HNSW: The Hierarchical Approach", "description": "Implement HNSW's key innovation: multiple graph levels with exponentially fewer nodes at each higher level. Higher levels naturally produce longer edges because fewer nodes exist, enabling fast coarse navigation. Students build HNSW insert and search, analyze edge length distributions across levels, and then calculate HNSW's production limitations at billion scale — the bottleneck that motivates DiskANN.", "dir_name": "module_02_hnsw_the_hierarchical_approach", "exercises": ["ex01_level_assignment_with_exponential_decay.py", "ex02_hnsw_insert_and_hierarchical_search.py", "ex03_edge_length_analysis_across_hnsw_levels.py", "ex04_hnsw_at_billion_scale_the_limitation_calculator.py"], "depends_on": [1]}, {"index": 3, "title": "Vamana and RobustPrune: A Better Graph Without Hierarchy", "description": "Implement the Vamana algorithm — DiskANN's single-graph alternative to HNSW's hierarchy. Students build GreedySearch (collecting visited nodes), RobustPrune (enforcing degree bounds while preserving long edges via alpha), and the full insert procedure. Then they empirically tune alpha and M, observing the non-monotonic accuracy relationship. The module concludes with true deletion via graph contraction.", "dir_name": "module_03_vamana_and_robustprune_a_better_graph_without_hier", "exercises": ["ex01_vamana_greedysearch_with_visited_tracking.py", "ex02_robustprune_edge_selection_with_alpha.py", "ex03_full_vamana_insert.py", "ex04_alpha_parameter_sweep_the_nonmonotonic_surprise.py", "ex05_true_deletion_via_graph_contraction.py"], "depends_on": [1, 2]}, {"index": 4, "title": "Product Quantization: Fitting Billions of Vectors in Memory", "description": "Implement product quantization (PQ) — the compression mechanism that makes on-disk vector search possible. Without PQ, every distance computation during graph traversal would require a disk read. PQ compresses vectors ~32x (e.g., 2048 bytes → 64 bytes) so all compressed vectors fit in RAM for fast approximate distance computation, while full vectors remain on disk for re-ranking.", "dir_name": "module_04_product_quantization_fitting_billions_of_vectors_i", "exercises": ["ex01_subspace_clustering_building_pq_codebooks.py", "ex02_pq_encode_decode_and_approximate_distance.py", "ex03_pq_vs_exact_search_the_accuracymemory_tradeoff.py"], "depends_on": [0]}, {"index": 5, "title": "Disk-Native Vector Search: CoreNN's Storage Innovations", "description": "The capstone module integrates everything: Vamana graph algorithms, product quantization, and CoreNN's two novel storage innovations — co-located storage layout and backedge deltas. Students build a mini vector database that handles concurrent insert, search, and delete from persistent storage, understanding how each design decision addresses a specific production bottleneck.", "dir_name": "module_05_disknative_vector_search_corenns_storage_innovatio", "exercises": ["ex01_colocated_storage_layout_simulation.py", "ex02_backedge_deltas_vs_naive_rewrite.py"], "depends_on": [3, 4]}]}, "modules": {"module_00_distance_dimensionality_and_why_brute_force_fails": {"content": "# Module 0: Distance, Dimensionality, and Why Brute Force Fails\n\n## Table of Contents\n\n1. [Learning Objectives](#learning-objectives)\n2. [The Running Example: Image Search at Scale](#the-running-example-image-search-at-scale)\n3. [What Is a Vector, Really?](#what-is-a-vector-really)\n4. [Brute-Force Search: Correct but Costly](#brute-force-search-correct-but-costly)\n5. [The Curse of Dimensionality](#the-curse-of-dimensionality)\n   - [Intuition 1: The Geometry of High-Dimensional Space](#intuition-1-the-geometry-of-high-dimensional-space)\n   - [Intuition 2: The Law of Large Numbers at Work](#intuition-2-the-law-of-large-numbers-at-work)\n   - [Measuring the Curse: Distance Ratios](#measuring-the-curse-distance-ratios)\n6. [Why k-d Trees and LSH Fail](#why-k-d-trees-and-lsh-fail)\n7. [Graphs as the Solution: A Preview](#graphs-as-the-solution-a-preview)\n8. [Analytical Questions](#analytical-questions)\n9. [Synthesis: The Bottleneck That Drives the Course](#synthesis-the-bottleneck-that-drives-the-course)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n- **Implement** brute-force k-nearest neighbor search using vectorized NumPy operations and a max-heap\n- **Quantify** the curse of dimensionality by computing the max/min distance ratio across dimensions\n- **Explain** why k-d trees degrade to $O(n)$ in high dimensions using the pruning condition\n- **Articulate** why the curse motivates graph-based search rather than partitioning-based approaches\n- **Connect** $O(n)$ brute-force cost to the architectural choices that will drive every subsequent module\n\n---\n\n## The Running Example: Image Search at Scale\n\nImagine you're building a reverse image search engine — something like Google Lens. Users upload a photo and you return the 10 most visually similar images from a database of **100 million** photos.\n\nModern vision models like CLIP encode each image as a dense vector: a list of floating-point numbers capturing semantic content. CLIP's default output is **512 dimensions**. A database of 100 million 512-dimensional float32 vectors occupies:\n\n$$100{,}000{,}000 \\times 512 \\times 4 \\text{ bytes} = 204.8 \\text{ GB}$$\n\nFor any query image, you need to find the 10 database entries whose vectors are closest (in Euclidean or cosine distance) to the query vector. This is the **k-nearest neighbor (kNN) problem**, and it is the central computational primitive of every vector database.\n\nWe'll use this image search scenario throughout the module. But to keep experiments tractable on a laptop, we'll work with **10,000 vectors at 128 dimensions** — the SIFT descriptor dimension, a classic computer vision feature — and scale our analysis to understand what happens at 512, 960, and beyond.\n\n---\n\n## What Is a Vector, Really?\n\nA vector is just a point in $\\mathbb{R}^d$ — a list of $d$ real numbers. At 2D and 3D, we can visualize vectors as points in a plane or in space. At 128D or 768D, we cannot directly visualize them, but the mathematics of distance and similarity still holds.\n\n**The Euclidean distance** between two vectors $\\mathbf{a}, \\mathbf{b} \\in \\mathbb{R}^d$ is:\n\n$$d_{\\text{Euclidean}}(\\mathbf{a}, \\mathbf{b}) = \\sqrt{\\sum_{i=1}^{d} (a_i - b_i)^2}$$\n\nIn plain language: subtract each coordinate pair, square each difference, sum them all up, and take the square root. This is the $L_2$ norm of the difference vector $\\mathbf{a} - \\mathbf{b}$.\n\nTranslating directly to code:\n\n```python\nimport numpy as np\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"Euclidean distance between two vectors.\"\"\"\n    diff = a - b          # element-wise subtraction: shape (d,)\n    sq   = diff ** 2      # element-wise square:       shape (d,)\n    return np.sqrt(sq.sum())\n\n# Or, more concisely using NumPy's linear algebra module:\ndef euclidean_distance_v2(a: np.ndarray, b: np.ndarray) -> float:\n    return float(np.linalg.norm(a - b))\n```\n\nThe vectorized form (`np.linalg.norm`) is typically 10–100× faster than a Python loop over dimensions because it calls optimized BLAS routines under the hood.\n\n**Cosine similarity** is another popular metric, especially for text embeddings:\n\n$$\\cos(\\mathbf{a}, \\mathbf{b}) = \\frac{\\mathbf{a} \\cdot \\mathbf{b}}{\\|\\mathbf{a}\\| \\|\\mathbf{b}\\|}$$\n\nFor unit-normalized vectors, $\\cos(\\mathbf{a}, \\mathbf{b}) = 1 - \\frac{d_{\\text{Euclidean}}(\\mathbf{a}, \\mathbf{b})^2}{2}$, so Euclidean distance on normalized vectors is equivalent to cosine distance. Many modern systems normalize embeddings at index time for this reason.\n\nThis module focuses on Euclidean distance, but every concept transfers to cosine distance directly.\n\n#### Inner Product Search\n\nA third metric worth knowing is the **inner product** (dot product):\n\n$$\\text{IP}(\\mathbf{a}, \\mathbf{b}) = \\mathbf{a} \\cdot \\mathbf{b} = \\sum_{i=1}^{d} a_i b_i$$\n\nUnlike Euclidean or cosine distance (which we *minimize*), inner product is a similarity we *maximize*. Maximum Inner Product Search (MIPS) arises naturally in recommendation systems: user preferences and item attributes are both represented as vectors, and the relevance score for ranking is their inner product.\n\nThe three metrics are deeply related. For unit-norm vectors ($\\|\\mathbf{a}\\| = \\|\\mathbf{b}\\| = 1$):\n\n$$\\text{IP}(\\mathbf{a}, \\mathbf{b}) = \\cos(\\mathbf{a}, \\mathbf{b}) \\quad \\text{and} \\quad d_{\\text{Euclidean}}^2(\\mathbf{a}, \\mathbf{b}) = 2 - 2 \\cdot \\text{IP}(\\mathbf{a}, \\mathbf{b})$$\n\nThis means **normalizing vectors to unit length and using Euclidean distance is equivalent to cosine similarity** — a common preprocessing step in production systems. When systems advertise \"cosine search,\" they typically normalize at index time and use Euclidean distance internally. Similarly, *squared* Euclidean distance ($d^2$ instead of $d$) is often preferred in implementation because it avoids the expensive square-root operation while preserving rank order: $d(\\mathbf{a}, \\mathbf{b}) < d(\\mathbf{a}, \\mathbf{c})$ if and only if $d^2(\\mathbf{a}, \\mathbf{b}) < d^2(\\mathbf{a}, \\mathbf{c})$.\n\nFor this course, we use Euclidean distance throughout, but every algorithm generalizes to any metric satisfying the triangle inequality.\n\n---\n\n## Brute-Force Search: Correct but Costly\n\nThe simplest correct answer to kNN is to compare the query $\\mathbf{q}$ against every vector in the database and return the $k$ smallest distances. No data structure, no approximation — just scan everything.\n\n```python\nimport heapq\n\ndef brute_force_knn(query: np.ndarray, vectors: np.ndarray, k: int) -> list[int]:\n    \"\"\"\n    Returns indices of the k nearest neighbors of query in vectors.\n    Uses a max-heap of size k to maintain the current best candidates.\n    \"\"\"\n    # Max-heap: store (-distance, index) so Python's min-heap\n    # behaves like a max-heap (always evict the farthest)\n    heap = []\n\n    for idx in range(len(vectors)):\n        dist = float(np.linalg.norm(query - vectors[idx]))\n\n        if len(heap) < k:\n            heapq.heappush(heap, (-dist, idx))\n        elif dist < -heap[0][0]:   # better than the current worst\n            heapq.heapreplace(heap, (-dist, idx))\n\n    return [idx for _, idx in sorted(heap, key=lambda x: -x[0])]\n```\n\n**Check your understanding:** Why do we negate the distance before pushing onto the heap? What would happen if we used `heapq.heappush(heap, (dist, idx))` directly and tried to maintain a heap of size $k$?[^1]\n\nThe heap approach is important. A naive \"collect all distances, then sort\" approach requires $O(n)$ storage and $O(n \\log n)$ time. The heap approach requires $O(k)$ storage and $O(n \\log k)$ time — for small $k$ like 10, this is essentially $O(n)$ with a tiny constant.\n\n### Timing Brute Force\n\nOn a modern laptop with 10,000 vectors at 128 dimensions, pure Python with NumPy vectorization takes roughly **2ms per query**. That sounds fast — but consider:\n\n| Database Size | Dimensions | Time per Query |\n|--------------|-----------|----------------|\n| 10,000 | 128 | ~2 ms |\n| 1,000,000 | 128 | ~200 ms |\n| 100,000,000 | 512 | ~80 seconds |\n| 1,000,000,000 | 768 | ~800 seconds |\n\nThat last row — one billion 768-dimensional vectors — is a realistic scale for modern embedding databases. **800 seconds per query is completely unusable.** This is the problem we spend the rest of the course solving.\n\nThe theoretical complexity is unavoidable: brute force is $O(n \\cdot d)$ per query, where $n$ is the database size and $d$ is the dimensionality. Every vector is touched exactly once. This is the *cost floor* — the baseline that index structures must beat.\n\n#### Vectorized Distance Computation\n\nThe loop implementation above is pedagogically clear but computationally inefficient. A vectorized NumPy version computes all $n$ distances in a single batch call, avoiding Python interpreter overhead:\n\n```python\ndef brute_force_knn_vectorized(query: np.ndarray, vectors: np.ndarray, k: int) -> list[int]:\n    \"\"\"\n    Vectorized brute-force kNN — all n distances computed in one BLAS call.\n    Uses np.argpartition for O(n) partial sort instead of O(n log n) full sort.\n    \"\"\"\n    diffs = vectors - query[None, :]        # shape (n, d) — broadcasted subtraction\n    dists = np.linalg.norm(diffs, axis=1)   # shape (n,) — all distances at once\n\n    # argpartition: O(n) partial sort — identifies k smallest without sorting all n\n    top_k_idx = np.argpartition(dists, k)[:k]\n    return top_k_idx[np.argsort(dists[top_k_idx])].tolist()\n```\n\nOn a modern CPU, this is typically 10–20× faster than the per-vector loop because BLAS routines exploit SIMD instructions and eliminate Python object-per-iteration overhead. On a GPU, batching thousands of queries through a single matrix multiplication gives another 10–100× speedup.\n\nHowever, even the fastest vectorized brute force cannot escape the $O(n \\cdot d)$ wall. At 100M vectors and 512 dimensions, a top-of-the-line GPU still takes 50–200 ms per query batch. Hardware acceleration buys constant-factor improvement; the algorithmic problem requires a fundamentally different approach.\n\nThe exercises in this module use the loop version deliberately — it makes the per-vector work explicit and facilitates comparison with k-d tree node visits. Once you understand the algorithmic behavior, the vectorized form is the right choice for production benchmarking.\n\n[^1]: Python's `heapq` is a **min-heap**: `heappush` always keeps the smallest element at index 0. To implement a max-heap for tracking the k-nearest (smallest-distance) items, we push negative distances. The largest negative value corresponds to the worst (farthest) current neighbor, and `heap[0]` gives us that immediately. If we pushed raw distances, we'd have a min-heap where `heap[0]` is the *best* neighbor — we'd have no fast way to check whether a new candidate beats the current worst.\n\n---\n\n## The Curse of Dimensionality\n\nHere's where things get deeply counterintuitive. You might think: \"OK, brute force is slow. Let's build a spatial index — like a k-d tree — that prunes the search space.\" This is exactly what researchers tried in the 1980s and 1990s. It works beautifully at 2D and 3D. It falls apart completely at 128D.\n\nThe reason is called the **curse of dimensionality**, and understanding it is the prerequisite for understanding every algorithm in this course.\n\n### Intuition 1: The Geometry of High-Dimensional Space\n\nStart with a 2D disk of radius $r$. Most of its area is concentrated in a thin ring near the boundary — for example, the ring of width $0.1r$ near the outer edge contains about 19% of the area (since area scales as $r^2$).\n\nNow generalize to a $d$-dimensional ball. The fraction of the volume contained in the outer shell of relative thickness $\\epsilon$ is:\n\n$$1 - (1 - \\epsilon)^d$$\n\nFor $\\epsilon = 0.1$ (a 10% shell):\n\n| Dimensions $d$ | Volume in outer 10% shell |\n|----------------|--------------------------|\n| 2 | 19% |\n| 10 | 65% |\n| 100 | 99.997% |\n| 1000 | essentially 100% |\n\nAt 100 dimensions, virtually **all** of the volume of a ball is concentrated in a thin outer shell. This has a profound consequence: almost every point in a high-dimensional space lies near the \"boundary\" — they're all roughly the same distance from any reference point.\n\n![High-dimensional geometry: volume concentrates in outer shells](diagrams/curse_of_dimensionality_geometry.svg)\n\nFrom the source material: *\"Most points will lie near the edge, and the expansive volume means almost every other point is near some other edge (unlikely to be near the exact same place or the tiny center), so almost everything's uniformly (edge A ↔ center ↔ edge B) far away from everything else, including the 'nearest' neighbors.\"*\n\n### Intuition 2: The Law of Large Numbers at Work\n\nHere's a more algebraic way to see the same phenomenon. Consider two random vectors $\\mathbf{a}$ and $\\mathbf{b}$, each drawn independently from some distribution with mean $\\mu$ and variance $\\sigma^2$ per dimension.\n\nThe squared Euclidean distance is a sum of $d$ independent random variables:\n\n$$d^2(\\mathbf{a}, \\mathbf{b}) = \\sum_{i=1}^{d} (a_i - b_i)^2$$\n\nEach term $(a_i - b_i)^2$ has some mean $\\mu_\\Delta$ and variance $\\sigma_\\Delta^2$. By the **Law of Large Numbers**:\n\n$$\\frac{d^2(\\mathbf{a}, \\mathbf{b})}{d} \\xrightarrow{d \\to \\infty} \\mu_\\Delta \\quad \\text{(almost surely)}$$\n\nIn plain language: as $d$ grows, the *distance* converges to a constant (up to a $\\sqrt{d}$ scaling factor), and more importantly, the *variance of the distance* becomes negligible relative to the mean. The distances between all pairs of points become nearly **equal**.\n\nTranslating the key insight into code — let's measure this empirically:\n\n```python\nimport numpy as np\n\ndef compute_distance_stats(n: int, d: int) -> dict:\n    \"\"\"Sample n random vectors in R^d and compute pairwise distance statistics.\"\"\"\n    vectors = np.random.randn(n, d).astype(np.float32)\n\n    # Compute all pairwise distances (upper triangle only)\n    # For n=500, this is 500*499/2 ≈ 125,000 pairs\n    distances = []\n    for i in range(n):\n        diffs = vectors[i+1:] - vectors[i]          # shape (n-i-1, d)\n        dists = np.sqrt((diffs**2).sum(axis=1))     # shape (n-i-1,)\n        distances.extend(dists.tolist())\n\n    distances = np.array(distances)\n    return {\n        \"mean\": distances.mean(),\n        \"std\":  distances.std(),\n        \"min\":  distances.min(),\n        \"max\":  distances.max(),\n        \"ratio\": distances.max() / distances.min(),   # KEY METRIC\n    }\n```\n\nThe **ratio of max to min distance** is our key metric for the curse. Run this for different values of $d$:\n\n| Dimension $d$ | Mean dist | Std dev | Min dist | Max dist | **Max/Min ratio** |\n|--------------|-----------|---------|----------|----------|-------------------|\n| 2 | 1.13 | 0.59 | 0.003 | 3.21 | **~700** |\n| 10 | 4.47 | 0.76 | 1.92 | 7.89 | **~4.1** |\n| 50 | 9.95 | 0.50 | 7.82 | 12.54 | **~1.6** |\n| 100 | 14.07 | 0.36 | 11.94 | 16.82 | **~1.4** |\n| 500 | 31.52 | 0.21 | 30.01 | 33.31 | **~1.11** |\n| 1000 | 44.62 | 0.14 | 43.89 | 45.41 | **~1.03** |\n\nAs $d$ grows, the ratio plummets toward 1.0. At 1000 dimensions, the maximum pairwise distance is only 3% larger than the minimum. In this regime, the concept of \"nearest neighbor\" has nearly lost its meaning — the nearest and the farthest points are roughly equidistant from any query.\n\n**Check your understanding:** The table above shows that mean distances grow as $\\sqrt{d}$ (roughly). This is expected from the Law of Large Numbers. But the curse isn't that distances are *large* — it's that they're *uniform*. Can you construct a scenario where all distances are large but the nearest-neighbor problem is still easy?[^2]\n\n![Distance ratio convergence across dimensions](diagrams/distance_ratio_convergence.svg)\n\n### Measuring the Curse: Distance Ratios\n\nThe formal result, from Beyer et al. (1999), states that for a query $\\mathbf{q}$ with nearest neighbor $\\mathbf{x}_{\\min}$ and farthest neighbor $\\mathbf{x}_{\\max}$:\n\n$$\\lim_{d \\to \\infty} \\frac{d(\\mathbf{q}, \\mathbf{x}_{\\max}) - d(\\mathbf{q}, \\mathbf{x}_{\\min})}{d(\\mathbf{q}, \\mathbf{x}_{\\min})} = 0$$\n\nThis is the mathematical statement that distances become *meaningless* in high dimensions — the relative gap between nearest and farthest vanishes.\n\nA practical corollary: **any algorithm that works by eliminating candidates because they are \"clearly too far away\" will fail in high dimensions**, because no candidate is clearly too far away when all distances are nearly equal.\n\nThis is precisely the problem with k-d trees and locality-sensitive hashing.\n\n#### The Intrinsic Dimensionality Escape Hatch\n\nThe analysis above assumes vectors are **uniformly distributed** across all $d$ dimensions. Real embedding datasets rarely are — they tend to concentrate on a low-dimensional *manifold* embedded in the ambient high-dimensional space.\n\nFor example, a dataset of face photos encoded by a 512-dimensional CLIP model might exhibit meaningful variation along only 20–50 independent axes: lighting angle, head pose, expression, identity. The **intrinsic dimensionality** is 20–50, even though the ambient space is 512-dimensional. The curse of dimensionality scales with intrinsic dimensionality, not ambient dimensionality.\n\nThis explains a striking empirical observation: **graph-based ANN indices consistently outperform what uniform-distribution theory would predict.** Production text and image embedding datasets have strong cluster structure and low intrinsic dimensionality — often 10–80, regardless of model output dimension. The algorithm effectively navigates a 30D problem wrapped in a 768D coordinate system.\n\nIntrinsic dimensionality can be estimated empirically using the *two-nearest-neighbor (TwoNN)* method: for each point, compute the ratio $\\mu = d_{\\text{2nd NN}} / d_{\\text{1st NN}}$; if this ratio follows a Pareto distribution, the exponent gives $d_{\\text{intrinsic}}$. Reported estimates for common benchmarks:\n\n| Dataset | Ambient dim | Estimated intrinsic dim |\n|---------|------------|------------------------|\n| MNIST (pixels) | 784 | ~10–13 |\n| SIFT image descriptors | 128 | ~15–20 |\n| CLIP image embeddings | 512 | ~25–50 |\n| LLM text embeddings | 768–4096 | ~50–100 |\n\nThis does not make the curse irrelevant — it means its severity is data-dependent. A dataset of truly random 768D vectors is extremely hard to index efficiently. A dataset of sentence embeddings from a fine-tuned transformer is far more tractable, because the embeddings concentrate on a much lower-dimensional submanifold. Part of what makes vector database benchmarking tricky is that results on synthetic random data transfer poorly to production embedding datasets.\n\n[^2]: Yes! Imagine all your vectors are clustered in two tight groups: one cluster near the origin and one cluster far away. Within each cluster, distances are tiny; between clusters, distances are huge. Even in very high dimensions, a query near the origin would clearly have its nearest neighbors in the origin cluster, and a nearest-neighbor search can succeed by first identifying the right cluster. This is why the curse matters more for *uniformly distributed* data and less for *clustered* data. Many practical embedding datasets have significant cluster structure, which is part of why ANN algorithms work as well as they do in practice.\n\n---\n\n## Why k-d Trees and LSH Fail\n\n### k-d Trees\n\nA k-d tree is a binary tree that recursively partitions $\\mathbb{R}^d$ with axis-aligned hyperplanes. Building a k-d tree for 2D points:\n\n```\nMedian x-split: x < 0.5 → left, x ≥ 0.5 → right\n  Left subtree: Median y-split: y < 0.3 → left, y ≥ 0.3 → right\n  Right subtree: Median y-split: y < 0.7 → left, y ≥ 0.7 → right\n```\n\nQuerying works by:\n1. Traversing to the leaf that contains the query point\n2. Recording the distance to the best candidate found so far\n3. *Backtracking* and deciding whether to explore the \"other side\" of each split\n\nThe pruning decision at step 3 is the key: if the query's distance to the splitting hyperplane is **greater** than the current best distance, there cannot be a nearer neighbor on the other side. We can skip that entire subtree.\n\n```python\ndef kd_search_prune_check(query, split_dim, split_val, current_best_dist):\n    \"\"\"\n    Returns True if we can safely prune the other side of this split.\n    The distance from the query to the splitting hyperplane is |query[split_dim] - split_val|.\n    If this exceeds our current best, no closer neighbor exists on the other side.\n    \"\"\"\n    dist_to_hyperplane = abs(query[split_dim] - split_val)\n    return dist_to_hyperplane > current_best_dist\n```\n\nIn 2D, this pruning is very effective: most of the space is on one side of any split, and we can prune large subtrees. In 100D, the pruning fails catastrophically.\n\n**Why?** The distance from a query to a splitting hyperplane in dimension $i$ is just the absolute difference in coordinate $i$: $|q_i - \\text{split}_i|$. But the distance to actual data points involves all $d$ dimensions. In high dimensions, the total distance to a data point is dominated by the sum of contributions from all dimensions — the split in any single dimension can only account for a tiny fraction of the total. Therefore, the query's distance to the hyperplane is almost always *much smaller* than the distance to any data point, and pruning almost never occurs.\n\nMathematically: the condition $|q_i - \\text{split}_i| > d_{\\text{best}}$ fails because $d_{\\text{best}} \\approx \\sqrt{d} \\cdot \\sigma$ (scales with $\\sqrt{d}$) while $|q_i - \\text{split}_i| \\approx \\sigma$ (scales with dimension-0). The ratio is $1/\\sqrt{d}$, which goes to zero.\n\nThe result: in 100+ dimensions, a k-d tree visits nearly every node. The pruning effectiveness drops from ~95% at 2D to ~3% at 500D. The k-d tree degrades to $O(n)$ — the same as brute force, but with extra overhead.\n\n![k-d Tree pruning effectiveness vs dimensionality](diagrams/kd_tree_pruning.svg)\n\n**Check your understanding:** Scipy's `spatial.KDTree` is carefully optimized C code. Does it suffer from the same high-dimensional degradation? Why or why not?[^3]\n\n### Locality-Sensitive Hashing (LSH)\n\nLSH takes a different approach: use hash functions that map nearby vectors to the same hash bucket with high probability. To find the nearest neighbors of a query, hash it and look in the same bucket.\n\nThe problem in high dimensions: to achieve sufficient *recall* (find true nearest neighbors with good probability), you need exponentially many hash functions as $d$ grows. The number of buckets grows exponentially, and the probability of hash collision for nearby-but-not-identical points drops. LSH can be tuned to work, but the parameter space becomes unmanageable and the construction cost prohibitive.[^4]\n\n**How random-projection LSH works concretely**: generate $L$ hash tables. In each table, draw $m$ random unit vectors $\\mathbf{r}_1, \\ldots, \\mathbf{r}_m \\in \\mathbb{R}^d$. Hash a point $\\mathbf{x}$ to the $m$-bit string $\\bigl[\\text{sign}(\\mathbf{x} \\cdot \\mathbf{r}_1),\\ \\ldots,\\ \\text{sign}(\\mathbf{x} \\cdot \\mathbf{r}_m)\\bigr]$. Two points hash to the same bucket only if they agree on the sign of all $m$ projections. The probability they agree on one random projection is $1 - \\theta/\\pi$, where $\\theta$ is the angle between them — high for nearby points, lower for farther ones.\n\nThe scheme's correctness depends on a **collision probability gap**: nearby points collide much more often than far points. To find approximate nearest neighbors of a query, hash it into each of the $L$ tables and retrieve all points from matching buckets — nearby points are likely to share a bucket in at least one table.\n\nIn high dimensions, the gap collapses. As the max/min distance ratio converges toward 1.0, the collision probabilities for near and far points converge toward each other. Maintaining acceptable recall requires more hash tables, more bits per hash, or both — and the required $L$ grows toward $O(n)$ as the gap vanishes. The index becomes as expensive as brute force.\n\nBoth approaches fail for the same fundamental reason stated in the source material:\n\n> *\"Because these data structures rely on distances to prune the search space quickly, but distances become less useful in higher dimensions, they don't work well in practice.\"*\n\n[^3]: Yes — absolutely the same degradation. This is not an implementation bug; it is a fundamental mathematical property of high-dimensional spaces. A perfectly implemented k-d tree still visits $O(n)$ nodes in high dimensions. You can verify this empirically in Exercise 3: Scipy's `KDTree` and our hand-rolled implementation both degrade at the same rate.\n\n[^4]: The formal result from the LSH literature is that to achieve recall $\\rho$ in $d$ dimensions, you need $O(n^{1/\\rho})$ hash functions, where $\\rho$ depends on the collision probability ratio between near and far points. In high dimensions, near/far points have similar hash collision probabilities, so $\\rho$ approaches 1 and the number of hash functions needed grows toward $O(n)$.\n\n---\n\n## Graphs as the Solution: A Preview\n\nIf partitioning-based and hashing-based approaches both degrade in high dimensions, what works?\n\nThe insight — which we'll develop fully in Module 1 — is that **graphs can adapt to the data distribution in ways that rigid geometric structures cannot**.\n\nA k-d tree imposes a fixed recursive partition: the space is divided by hyperplanes regardless of where the actual data points are. The partition is determined by the geometry of the embedding space, not by the relationships between data points.\n\nA graph, by contrast, can place an edge between any two vectors — not based on which Voronoi cell they fall in, but based on their actual distance to each other, or any other criterion we choose. We can create a graph that is *specifically calibrated* to navigate quickly from any starting point to any destination, regardless of the dimensionality of the underlying space.\n\nThe key structural requirement, inspired by the sociological concept of small-world networks (and the famous \"six degrees of Kevin Bacon\" experiment), is:\n\n- **Long-range edges**: for jumping quickly to the general neighborhood of the query\n- **Short-range edges**: for honing in on the exact nearest neighbors\n\nFrom Milgram's small-world experiment: when participants were asked to forward a letter to a distant stranger using only personal acquaintances, they naturally used long-range social connections first (people who bridge different social groups or geographies), then short-range ones to converge on the target. The average chain length was only ~6 steps — logarithmic in the population.[^5]\n\n#### Why Graphs Avoid the Same Trap\n\nCrucially, graph-based search does not rely on hyperplane pruning. It works by **greedy edge traversal**: starting from some entry point, repeatedly move to whichever neighbor is closest to the query, until no neighbor is closer than the current node. The number of hops to converge depends on the graph's structure, not on the ambient dimensionality.\n\nThis is the deep reason graphs succeed where k-d trees fail. A k-d tree's search complexity is $O(k \\cdot n^{1-1/d})$ per query — the exponent $1-1/d$ converges to 1 as $d$ grows, degrading toward $O(n)$. A well-constructed navigable small-world graph achieves $O(\\log n)$ hops that remain approximately dimension-independent, because edges are chosen based on actual point-to-point distances in the dataset, not on the geometry of Euclidean partitions.\n\nThe price is paid at construction time: building a graph that is efficiently navigable requires more sophisticated algorithms than building a k-d tree. You need to ensure the graph has both long-range edges (for fast initial approach to the query neighborhood) and short-range edges (for precise local refinement). Getting this balance right — and maintaining it as vectors are inserted and deleted — is the central engineering challenge of the remainder of this course.\n\nThe graph-based algorithms we build — HNSW (Module 2), Vamana (Module 3), and CoreNN (Modules 4–5) — all exploit this same structural insight. The difference is in how they construct and maintain these long/short edge distributions, and how they handle the engineering constraints of production systems.\n\n[^5]: Stanley Milgram's 1967 experiment, which spawned the \"six degrees of separation\" concept. The phrase \"six degrees of Kevin Bacon\" is a pop-culture extension based on the Hollywood actor appearing in many films with many other actors. It's a charming coincidence that a sociological insight from 1967 became the intuitive foundation for billion-scale vector search in 2019.\n\n---\n\n## Analytical Questions\n\nThese questions are designed for synthesis and analysis. They don't have single correct answers — work through them before reading Module 1.\n\n### Question 1 — The Intrinsic Dimension Escape Hatch\n\nThe curse of dimensionality assumes vectors are uniformly distributed in $\\mathbb{R}^d$. Many real embedding datasets are not — they're concentrated on a low-dimensional *manifold* embedded in a high-dimensional space. For example, face photos might vary along a much smaller number of independent dimensions (lighting, pose, identity) even though the raw pixel or embedding space has thousands of dimensions.\n\nIf a dataset of 512D embeddings is actually concentrated on a 20-dimensional manifold, would you expect kNN search to be \"as cursed\" as truly 512-dimensional data? What does this imply about when graph-based search should perform well vs. poorly?\n\n### Question 2 — The Metric Matters\n\nWe focused on Euclidean distance $L_2$. Consider the $L_1$ (Manhattan) distance:\n\n$$d_{L_1}(\\mathbf{a}, \\mathbf{b}) = \\sum_{i=1}^{d} |a_i - b_i|$$\n\nDoes $L_1$ suffer from the curse of dimensionality more or less than $L_2$? Hint: think about the variance of each term in the sum and what the Law of Large Numbers implies about the concentration of $L_1$ distances.\n\n### Question 3 — The Heap Trick at Scale\n\nBrute-force kNN with a max-heap runs in $O(n \\log k)$ time. For $k=10$ and $n=10^9$, the $\\log k \\approx 3.3$ constant is tiny. Why not just parallelize brute force across many machines? Estimate the number of machines needed to serve brute-force kNN at 10ms latency for 1 billion 768-dim vectors with 1000 queries per second. Under what conditions would this be the right engineering choice, and when would it be wrong?\n\n### Question 4 — Curse of Dimensionality for Index Construction\n\nWe discussed how the curse makes query performance degrade. Does the curse also affect *index construction*? Consider a graph-based index: when inserting a new vector, you find its approximate nearest neighbors (to create edges) using the graph itself. Does the quality of these edges degrade as dimensionality increases? What does this imply about the minimum dataset size needed for a graph index to \"work\" at a given dimension?\n\n---\n\n## Synthesis: The Bottleneck That Drives the Course\n\nLet's return to our running example. You have 100 million 512-dimensional CLIP embeddings. You've learned:\n\n1. **Brute force is $O(n \\cdot d)$** — at this scale, ~80 seconds per query. Unusable.\n2. **k-d trees degrade to $O(n)$** in high dimensions because distance-based pruning fails when all distances are nearly equal.\n3. **The curse is fundamental** — it's not a software bug but a mathematical property of high-dimensional geometry. More clever partitioning won't help.\n\nThe only escape is to build an index that navigates the embedding space *adaptively* — following the actual structure of the data distribution rather than imposing a rigid geometric partition. Graphs provide this flexibility.\n\nBut graphs introduce their own engineering challenges:\n\n- **How do you build a graph that is efficiently navigable?** (Module 1: greedy graph traversal)\n- **How do you get the right mix of long and short edges?** (Module 2: HNSW hierarchy, Module 3: Vamana's RobustPrune)\n- **What if the graph doesn't fit in memory?** (Module 4: product quantization, Module 5: disk-native storage)\n- **What if you need to delete vectors?** (Module 5: graph contraction via RobustPrune)\n\nEach module in this course addresses one of these bottlenecks. Every solution creates the next bottleneck. By Module 5, you'll have a working vector database — CoreNN-style — that serves 1 billion embeddings from a 4.8 TB SSD index in 15 ms, running on a single machine.\n\nOne useful frame for the whole course: every technique we study is an attempt to exploit structure that brute force ignores. Brute force treats all $n$ vectors as equally likely candidates. A graph index exploits *proximity structure* — nearby vectors are connected, so we can navigate without touching most of the dataset. Product quantization (Module 4) exploits *geometric structure* — high-dimensional vectors can be decomposed into lower-dimensional subvectors, each quantized independently, enabling compressed-distance estimation. Every speedup pays for itself by assuming something about the data distribution, and the assumption is validated empirically. When the assumption fails — for example, on truly random uniform data — the speedup vanishes, and brute force wins again.\n\nThe journey starts here, with understanding *why* the naive approach fails. The cost floor of $O(n)$ per query is what makes billion-scale vector search a hard systems engineering problem — and what makes the graph-based solutions genuinely elegant.\n\n---\n\n*Continue to:*\n- **Exercise 1**: Implement brute-force kNN with a max-heap and see the $O(n)$ cost in action\n- **Exercise 2**: Measure the curse of dimensionality empirically — watch the max/min distance ratio converge to 1\n- **Exercise 3**: Compare k-d tree vs. brute force across dimensions — measure pruning effectiveness dropping from 95% to 3%\n- **Module 1**: Graph-Based ANN Search: The Core Abstraction\n", "exercises": [{"filename": "ex01_bruteforce_knearest_neighbors.py", "content": "\"\"\"\nExercise 1: Brute-Force k-Nearest Neighbors\n============================================\nCourse: From Kevin Bacon to Billion-Scale Vector Search\nModule 0: Distance, Dimensionality, and Why Brute Force Fails\n\nGOAL\n----\nImplement brute-force kNN from scratch using NumPy vectorized operations and a\nmax-heap. This is the *cost floor* — the baseline every index structure must beat.\n\nKEY INSIGHT\n-----------\nBrute force is O(n·d) per query: every query must touch every vector. At\n10,000 × 128D it's ~2ms. At 1B × 768D it's ~800 seconds. Unusable.\n\nCOMMON MISTAKES\n---------------\n1. Using a min-heap instead of max-heap for top-k — evicts best results, not worst\n2. Forgetting to negate distances for heapq (Python heapq is min-heap only)\n3. Computing distance with a Python loop instead of NumPy vectorization\n\"\"\"\n\nimport os\nimport time\nimport heapq\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# Utility: fast verification mode\n# ---------------------------------------------------------------------------\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 500 if VERIFY else 10_000     # full run: 10,000 vectors\nN_QUERIES = 5   if VERIFY else 50         # full run: 50 queries\nDIM       = 128                            # 128D — classic SIFT descriptor size\nK         = 10                             # find 10 nearest neighbors\n\n\n# ---------------------------------------------------------------------------\n# Part 1: Euclidean Distance\n# ---------------------------------------------------------------------------\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"\n    Compute the Euclidean (L2) distance between two vectors.\n\n    Formula:  sqrt( sum_i (a_i - b_i)^2 )\n\n    Parameters\n    ----------\n    a : np.ndarray, shape (d,)\n        First vector.\n    b : np.ndarray, shape (d,)\n        Second vector.\n\n    Returns\n    -------\n    float\n        The Euclidean distance between a and b.\n\n    Hint: Use NumPy element-wise operations, NOT a Python for-loop over\n    dimensions. The vectorized form runs ~100x faster.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~4 lines                               #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. Compute element-wise difference: diff = a - b      #\n    #   2. Square each element                                 #\n    #   3. Sum the squares                                     #\n    #   4. Return the square root as a Python float            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Part 2: Brute-Force kNN\n# ---------------------------------------------------------------------------\n\ndef brute_force_knn(query: np.ndarray, vectors: np.ndarray, k: int) -> list:\n    \"\"\"\n    Find the indices of the k nearest neighbors of `query` in `vectors`.\n\n    Uses a max-heap of size k to track the current best k candidates.\n    When we find a better (closer) vector, we evict the farthest one.\n\n    Parameters\n    ----------\n    query : np.ndarray, shape (d,)\n        The query vector.\n    vectors : np.ndarray, shape (n, d)\n        The database of vectors to search.\n    k : int\n        Number of nearest neighbors to return.\n\n    Returns\n    -------\n    list of int\n        Indices of the k nearest neighbors, sorted nearest-first.\n\n    Implementation notes:\n    - Use heapq from the standard library (it implements a MIN-heap)\n    - To simulate a MAX-heap (always evict the farthest), store NEGATIVE distances\n    - heap[0] will then be the most-negative value = the farthest current neighbor\n    - Use heapq.heapreplace() to atomically pop the worst and push the new candidate\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~12 lines                              #\n    #                                                         #\n    # Hint: heap stores tuples of (-distance, index)         #\n    #                                                         #\n    # Algorithm:                                              #\n    #   heap = []                                             #\n    #   for each (idx, vec) in enumerate(vectors):           #\n    #     compute dist = euclidean_distance(query, vec)       #\n    #     if heap not full (len < k):                         #\n    #       heapq.heappush(heap, (-dist, idx))                #\n    #     elif dist < -heap[0][0]:  (better than worst)      #\n    #       heapq.heapreplace(heap, (-dist, idx))             #\n    #                                                         #\n    #   Return indices sorted by distance (nearest first)    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# VectorStore class (infrastructure — do not modify)\n# ---------------------------------------------------------------------------\n\nclass VectorStore:\n    \"\"\"Simple in-memory vector store backed by a numpy array.\"\"\"\n\n    def __init__(self, dim: int):\n        \"\"\"\n        Parameters\n        ----------\n        dim : int\n            Dimensionality of the vectors to store.\n        \"\"\"\n        self.dim = dim\n        self.vectors = np.empty((0, dim), dtype=np.float32)\n\n    def add_vectors(self, new_vectors: np.ndarray) -> None:\n        \"\"\"\n        Append vectors to the store.\n\n        Parameters\n        ----------\n        new_vectors : np.ndarray, shape (m, dim)\n        \"\"\"\n        assert new_vectors.shape[1] == self.dim, (\n            f\"Expected dim={self.dim}, got {new_vectors.shape[1]}\"\n        )\n        self.vectors = np.vstack([self.vectors, new_vectors])\n\n    def search(self, query: np.ndarray, k: int) -> list:\n        \"\"\"Run brute-force kNN and return k nearest indices.\"\"\"\n        return brute_force_knn(query, self.vectors, k)\n\n    def __len__(self) -> int:\n        return len(self.vectors)\n\n\n# ---------------------------------------------------------------------------\n# Ground truth: numpy argsort (correct by construction)\n# ---------------------------------------------------------------------------\n\ndef ground_truth_knn(query: np.ndarray, vectors: np.ndarray, k: int) -> list:\n    \"\"\"Reference kNN using numpy argsort — provably correct, but O(n log n).\"\"\"\n    dists = np.linalg.norm(vectors - query, axis=1)\n    return list(np.argsort(dists)[:k])\n\n\n# ---------------------------------------------------------------------------\n# Main: test harness (do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    rng = np.random.default_rng(42)\n\n    print(f\"{'='*60}\")\n    print(f\"Exercise 1: Brute-Force kNN\")\n    print(f\"{'='*60}\")\n    print(f\"  Vectors : {N_VECTORS:,}\")\n    print(f\"  Dim     : {DIM}\")\n    print(f\"  k       : {K}\")\n    print(f\"  Queries : {N_QUERIES}\")\n    print()\n\n    # Build the store\n    store = VectorStore(dim=DIM)\n    data = rng.random((N_VECTORS, DIM), dtype=np.float32)\n    store.add_vectors(data)\n    print(f\"  Store size: {len(store):,} vectors\\n\")\n\n    # Run queries\n    queries = rng.random((N_QUERIES, DIM), dtype=np.float32)\n\n    correct = 0\n    timings = []\n\n    for i, q in enumerate(queries):\n        gt = set(ground_truth_knn(q, store.vectors, K))\n\n        t0 = time.perf_counter()\n        result = store.search(q, K)\n        elapsed = time.perf_counter() - t0\n\n        timings.append(elapsed * 1000)  # convert to ms\n\n        result_set = set(result)\n        if result_set == gt:\n            correct += 1\n        else:\n            missing = gt - result_set\n            extra = result_set - gt\n            print(f\"  Query {i}: WRONG — missing {missing}, extra {extra}\")\n\n    # Summary\n    avg_ms = sum(timings) / len(timings)\n    max_ms = max(timings)\n    min_ms = min(timings)\n\n    print(f\"  Results  : {correct}/{N_QUERIES} correct\")\n    print(f\"  Timing   : avg={avg_ms:.2f}ms  min={min_ms:.2f}ms  max={max_ms:.2f}ms\")\n    print()\n\n    if correct == N_QUERIES:\n        print(f\"  ✅ All {N_QUERIES} queries correct!\")\n        print()\n        # Extrapolate to realistic scales\n        if not VERIFY:\n            print(\"  Scaling projection (extrapolated from timing):\")\n            per_vec_ns = (avg_ms * 1e6) / N_VECTORS\n            for n, label in [(1_000_000, \"1M\"), (100_000_000, \"100M\"),\n                             (1_000_000_000, \"1B\")]:\n                est_s = (per_vec_ns * n) / 1e9\n                print(f\"    {label:>4} vectors × {DIM}D → ~{est_s:.1f}s per query\")\n        print()\n        print(\"  Key insight: O(n) per query — every vector touched exactly once.\")\n        print(\"  This is the cost floor that graph indices must beat.\")\n    else:\n        print(f\"  ❌ {N_QUERIES - correct} queries incorrect — check your implementation\")\n"}, {"filename": "ex02_the_curse_of_dimensionality_in_action.py", "content": "\"\"\"\nExercise 2: The Curse of Dimensionality in Action\n==================================================\nCourse: From Kevin Bacon to Billion-Scale Vector Search\nModule 0: Distance, Dimensionality, and Why Brute Force Fails\n\nGOAL\n----\nEmpirically measure how pairwise distance distributions change as dimensionality\ngrows. You will compute the max/min distance ratio and watch it converge toward\n1.0 — the mathematical signature of the curse.\n\nKEY INSIGHT\n-----------\nThe curse of dimensionality is NOT that distances become large (they do, scaling\nas sqrt(d)), but that they become UNIFORM. When max/min → 1.0, every candidate\nis \"equally far\" from any query — distance-based pruning cannot eliminate anyone.\n\nCOMMON MISTAKES\n---------------\n1. Confusing \"distances are large\" with \"distances are similar\" (different things!)\n2. Using too few sample points, getting noisy ratio estimates\n3. Forgetting that the Law of Large Numbers explains the variance reduction\n\"\"\"\n\nimport os\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n# Full run: 500 vectors per dimension, 9 dimensions tested\n# Verify run: 100 vectors, fewer dimensions\nN_SAMPLES    = 100 if VERIFY else 500\nDIMENSIONS   = [2, 10, 50, 100] if VERIFY else [2, 5, 10, 25, 50, 100, 250, 500, 1000]\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: data generation and distance statistics\n# ---------------------------------------------------------------------------\n\ndef generate_vectors(n: int, dim: int) -> np.ndarray:\n    \"\"\"\n    Generate n random vectors in R^dim from a standard normal distribution.\n\n    Parameters\n    ----------\n    n : int\n        Number of vectors to generate.\n    dim : int\n        Dimensionality of each vector.\n\n    Returns\n    -------\n    np.ndarray, shape (n, dim), dtype float32\n    \"\"\"\n    rng = np.random.default_rng(seed=dim)  # reproducible, seeded by dimension\n    return rng.standard_normal((n, dim)).astype(np.float32)\n\n\ndef compute_distance_stats(vectors: np.ndarray) -> dict:\n    \"\"\"\n    Compute pairwise Euclidean distance statistics for a set of vectors.\n\n    Computes all n*(n-1)/2 unique pairwise distances (upper triangle).\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (n, d)\n\n    Returns\n    -------\n    dict with keys: mean, std, min, max, ratio\n        ratio = max / min  (the KEY metric for the curse of dimensionality)\n    \"\"\"\n    n = len(vectors)\n    distances = []\n    for i in range(n):\n        # Vectorized: compute distances from vectors[i] to all vectors[i+1:]\n        diffs = vectors[i + 1:] - vectors[i]          # shape (n-i-1, d)\n        dists = np.sqrt((diffs ** 2).sum(axis=1))     # shape (n-i-1,)\n        distances.extend(dists.tolist())\n\n    distances = np.array(distances, dtype=np.float32)\n    min_dist  = float(distances.min())\n    max_dist  = float(distances.max())\n\n    return {\n        \"mean\":  float(distances.mean()),\n        \"std\":   float(distances.std()),\n        \"min\":   min_dist,\n        \"max\":   max_dist,\n        \"ratio\": max_dist / min_dist,   # THE KEY METRIC\n    }\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE: Analysis functions\n# ---------------------------------------------------------------------------\n\ndef analyze_convergence(results_table: list) -> dict:\n    \"\"\"\n    Analyze the convergence of the max/min distance ratio across dimensions.\n\n    Given a list of result dicts (one per dimension), find:\n    - The threshold dimension where ratio first drops below 1.5\n    - The rate at which the ratio is decreasing\n    - A brief textual explanation of what this means for kNN search\n\n    Parameters\n    ----------\n    results_table : list of dict\n        Each dict has keys: dim, mean, std, min, max, ratio\n        Sorted by 'dim' ascending.\n\n    Returns\n    -------\n    dict with keys:\n        threshold_dim : int or None\n            First dimension where ratio < 1.5 (None if never reached in data)\n        convergence_rate : float\n            Average decrease in ratio per doubling of dimension\n            (computed between consecutive entries in results_table)\n        interpretation : str\n            One sentence explaining what the ratio convergence means for kNN\n\n    Hint: iterate through results_table checking the 'ratio' key.\n    For convergence_rate, look at how much ratio decreases between adjacent rows.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~10 lines                              #\n    #                                                         #\n    # 1. Find threshold_dim: first entry where ratio < 1.5   #\n    # 2. Compute convergence_rate as the average delta of     #\n    #    ratio between consecutive table entries              #\n    # 3. Write a one-sentence interpretation string           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef predict_search_difficulty(dim: int, ratio: float) -> str:\n    \"\"\"\n    Given a dimension and its max/min distance ratio, predict search difficulty.\n\n    Return a human-readable difficulty label and brief reason, as a string.\n\n    Examples of what to return (you don't have to match exactly, be creative):\n      \"EASY — ratio=5.21, distances highly discriminating, spatial indices work\"\n      \"HARD — ratio=1.08, distances nearly uniform, brute force unavoidable\"\n      \"MODERATE — ratio=1.45, some discrimination remains, indices degrade\"\n\n    Parameters\n    ----------\n    dim : int\n        The dimensionality.\n    ratio : float\n        The max/min pairwise distance ratio for this dimension.\n\n    Returns\n    -------\n    str\n        A difficulty prediction with brief justification.\n\n    Hint: use ratio thresholds. ratio > 3: EASY, 1.5–3: MODERATE, < 1.5: HARD\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~8 lines                               #\n    #                                                         #\n    # Use if/elif/else on the ratio value:                    #\n    #   ratio > 3.0  → \"EASY\"                                #\n    #   ratio > 1.5  → \"MODERATE\"                            #\n    #   otherwise    → \"HARD\"                                 #\n    # Include dim and ratio in the returned string            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef answer_inline_questions(results_table: list) -> None:\n    \"\"\"\n    Answer the three conceptual questions below by printing your answers.\n\n    You should compute values from results_table to support your answers.\n\n    Parameters\n    ----------\n    results_table : list of dict\n        Each dict has keys: dim, mean, std, min, max, ratio\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — answer each question below             #\n    ###########################################################\n\n    # Q1: The mean pairwise distance scales roughly as sqrt(d).\n    #     Verify this from results_table by printing the ratio\n    #     mean_distance / sqrt(dim) for each row.\n    #     Is it approximately constant?\n    # YOUR ANSWER:\n    raise NotImplementedError(\"YOUR CODE HERE\")\n\n    # Q2: The curse says distances become UNIFORM, not just large.\n    #     Show this is true by printing std/mean (coefficient of variation)\n    #     for each dimension. Does it decrease as d increases?\n    # YOUR ANSWER:\n\n    # Q3: At what dimension do you think a k-d tree becomes completely\n    #     useless (say, visiting >90% of nodes for every query)?\n    #     Use the ratio data to make an educated guess and explain why.\n    # YOUR ANSWER:\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Main: experiment harness (do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    print(\"=\" * 75)\n    print(\"Exercise 2: The Curse of Dimensionality in Action\")\n    print(\"=\" * 75)\n    print(f\"Sampling {N_SAMPLES} vectors per dimension\\n\")\n\n    # Header\n    print(f\"{'Dim':>6} | {'Mean dist':>10} | {'Std dev':>8} | \"\n          f\"{'Min dist':>9} | {'Max dist':>9} | {'ratio':>7} | Difficulty\")\n    print(\"-\" * 75)\n\n    results_table = []\n    for dim in DIMENSIONS:\n        vectors = generate_vectors(N_SAMPLES, dim)\n        stats   = compute_distance_stats(vectors)\n        stats[\"dim\"] = dim\n        results_table.append(stats)\n\n        difficulty = predict_search_difficulty(dim, stats[\"ratio\"])\n\n        print(f\"{dim:>6} | {stats['mean']:>10.3f} | {stats['std']:>8.4f} | \"\n              f\"{stats['min']:>9.4f} | {stats['max']:>9.4f} | \"\n              f\"{stats['ratio']:>7.3f} | {difficulty}\")\n\n    print(\"-\" * 75)\n    print()\n\n    # Convergence analysis\n    analysis = analyze_convergence(results_table)\n    print(\"Convergence Analysis:\")\n    print(f\"  Threshold dim (ratio < 1.5) : {analysis['threshold_dim']}\")\n    print(f\"  Avg ratio decrease per row  : {analysis['convergence_rate']:.4f}\")\n    print(f\"  Interpretation              : {analysis['interpretation']}\")\n    print()\n\n    # Inline conceptual questions\n    print(\"Conceptual Question Answers:\")\n    print(\"-\" * 40)\n    answer_inline_questions(results_table)\n    print()\n\n    print(\"=\" * 75)\n    print(\"KEY TAKEAWAY: When ratio → 1.0, no pruning algorithm can eliminate\")\n    print(\"candidates based on distance alone. Graph-based indices are the solution.\")\n    print(\"=\" * 75)\n"}, {"filename": "ex03_kd_tree_vs_brute_force_a_contrastive_study.py", "content": "\"\"\"\nExercise 3: k-d Tree vs Brute Force — A Contrastive Study\n==========================================================\nCourse: From Kevin Bacon to Billion-Scale Vector Search\nModule 0: Distance, Dimensionality, and Why Brute Force Fails\n\nGOAL\n----\nImplement k-d tree search with the crucial pruning condition, then measure\npruning effectiveness across dimensions. You will empirically demonstrate\nthat the k-d tree degrades from ~10x faster than brute force at 2D to\nmatching brute force at 100D — the fundamental failure of geometric pruning.\n\nKEY INSIGHT\n-----------\nk-d trees prune subtrees by asking: \"Can the other side of this split contain\na nearer neighbor?\" In high dimensions, the answer is almost always YES, because\nthe query-to-hyperplane distance (one dimension) is much smaller than the\nquery-to-neighbor distance (all dimensions combined). Pruning stops working.\n\nCOMMON MISTAKES\n---------------\n1. Pruning condition implemented backwards — prune when you should explore\n2. Not tracking nodes_visited, so you can't measure pruning effectiveness\n3. Forgetting that scipy's KDTree exhibits the same degradation — this is\n   fundamental math, not a bug in any specific implementation\n\"\"\"\n\nimport os\nimport time\nimport heapq\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n# Full: 10,000 vectors, 25 queries, 7 dimensions\n# Verify: 2,000 vectors, 10 queries, 4 dimensions (fast)\nN_VECTORS    = 2_000  if VERIFY else 10_000\nN_QUERIES    = 10     if VERIFY else 25\nK            = 5\nDIMENSIONS   = [2, 10, 25, 50] if VERIFY else [2, 5, 10, 25, 50, 100, 500]\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: k-d tree data structure and brute force (from Exercise 1)\n# ---------------------------------------------------------------------------\n\nclass KDNode:\n    \"\"\"A single node in a k-d tree.\"\"\"\n    __slots__ = [\"point\", \"index\", \"split_dim\", \"split_val\", \"left\", \"right\"]\n\n    def __init__(self, point, index, split_dim, split_val, left=None, right=None):\n        self.point     = point      # np.ndarray, shape (d,)\n        self.index     = index      # original index in the dataset\n        self.split_dim = split_dim  # which dimension was split at this node\n        self.split_val = split_val  # value of the split (median)\n        self.left      = left       # KDNode or None (points with coord < split_val)\n        self.right     = right      # KDNode or None (points with coord >= split_val)\n\n\ndef build_kdtree(vectors: np.ndarray, indices: np.ndarray = None, depth: int = 0) -> KDNode:\n    \"\"\"\n    Recursively build a k-d tree from `vectors`.\n\n    At each level, splits along the dimension with highest variance\n    (this gives better splits than the common round-robin approach).\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (n, d)\n    indices : np.ndarray, shape (n,), int  — original indices (provided internally)\n    depth   : int — current recursion depth (used for termination)\n\n    Returns\n    -------\n    KDNode or None (if vectors is empty)\n    \"\"\"\n    if len(vectors) == 0:\n        return None\n    if indices is None:\n        indices = np.arange(len(vectors))\n\n    # Split along dimension with maximum variance\n    split_dim = int(np.argmax(vectors.var(axis=0)))\n    sorted_idx = np.argsort(vectors[:, split_dim])\n    vectors = vectors[sorted_idx]\n    indices = indices[sorted_idx]\n\n    median = len(vectors) // 2\n    split_val = float(vectors[median, split_dim])\n\n    node = KDNode(\n        point     = vectors[median],\n        index     = int(indices[median]),\n        split_dim = split_dim,\n        split_val = split_val,\n    )\n    node.left  = build_kdtree(vectors[:median],    indices[:median],    depth + 1)\n    node.right = build_kdtree(vectors[median + 1:], indices[median + 1:], depth + 1)\n    return node\n\n\ndef brute_force_knn(query: np.ndarray, vectors: np.ndarray, k: int) -> list:\n    \"\"\"Brute-force kNN (from Exercise 1). Returns k nearest indices.\"\"\"\n    heap = []\n    for idx in range(len(vectors)):\n        dist = float(np.linalg.norm(query - vectors[idx]))\n        if len(heap) < k:\n            heapq.heappush(heap, (-dist, idx))\n        elif dist < -heap[0][0]:\n            heapq.heapreplace(heap, (-dist, idx))\n    heap.sort(key=lambda x: -x[0])\n    return [idx for _, idx in heap]\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE: k-d tree search with pruning\n# ---------------------------------------------------------------------------\n\ndef should_prune(\n    split_dim: int,\n    split_val: float,\n    query: np.ndarray,\n    best_heap: list,\n    k: int\n) -> bool:\n    \"\"\"\n    Decide whether the far subtree (across a hyperplane) can be pruned.\n\n    Pruning is safe when the minimum possible distance to any point in the far\n    subtree — which is at least |query[split_dim] - split_val|, the distance\n    to the splitting hyperplane — exceeds our current k-th best neighbor.\n\n    IMPORTANT: split_dim and split_val come from the PARENT node (the current\n    node being expanded), NOT from the far_subtree's root. The boundary between\n    near and far sides is defined by the parent's split.\n\n    Parameters\n    ----------\n    split_dim : int   — dimension of the hyperplane (from the CURRENT node)\n    split_val : float — coordinate of the hyperplane (from the CURRENT node)\n    query     : np.ndarray, shape (d,)\n    best_heap : list\n        Max-heap of (-dist, idx). heap[0] = (-current_worst_dist, idx).\n    k : int\n\n    Returns\n    -------\n    bool\n        True  → safe to prune (skip the far subtree)\n        False → must explore the far subtree\n\n    Pruning condition:\n        abs(query[split_dim] - split_val) > current_worst_dist\n\n    Special case: if len(best_heap) < k, cannot prune (need more neighbors).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~5 lines                               #\n    #                                                         #\n    # 1. If len(best_heap) < k: return False                  #\n    # 2. current_worst_dist = -best_heap[0][0]                #\n    # 3. dist_to_hyperplane = abs(query[split_dim] - split_val)#\n    # 4. return dist_to_hyperplane > current_worst_dist        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef kd_search(\n    node: KDNode,\n    query: np.ndarray,\n    k: int,\n    best_heap: list,\n    nodes_visited: list,\n    depth: int = 0\n) -> None:\n    \"\"\"\n    Recursively search the k-d tree for the k nearest neighbors of `query`.\n\n    MODIFIES best_heap in-place (max-heap of size k, storing (-dist, original_idx)).\n    MODIFIES nodes_visited in-place (list with one element: the count of visited nodes).\n\n    Parameters\n    ----------\n    node : KDNode or None\n        Current node being visited.\n    query : np.ndarray, shape (d,)\n        The query vector.\n    k : int\n        Number of neighbors to find.\n    best_heap : list\n        Max-heap of (-distance, index) for current k best candidates.\n        (Use heapq operations; heap[0] is the current farthest neighbor.)\n    nodes_visited : list\n        Single-element list [count] used as a mutable counter.\n        Increment nodes_visited[0] each time you visit a node.\n    depth : int\n        Current recursion depth.\n\n    Algorithm:\n    1. If node is None, return immediately\n    2. Increment nodes_visited[0]\n    3. Compute distance from query to node.point\n    4. Update best_heap (same logic as brute_force_knn)\n    5. Determine near/far subtrees based on query[node.split_dim] vs node.split_val\n       (visit the side the query is on first — more likely to have near neighbors)\n    6. Recurse into the near subtree\n    7. Call should_prune(node.split_dim, node.split_val, ...) for the far subtree\n       NOTE: pass node.split_dim and node.split_val (the CURRENT node's values),\n       not the far subtree's values — the boundary is at the current level.\n    8. If NOT pruned, recurse into the far subtree\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~18 lines                              #\n    #                                                         #\n    # Hint for step 5: determine near/far subtree             #\n    #   if query[node.split_dim] < node.split_val:            #\n    #     near_subtree, far_subtree = node.left, node.right   #\n    #   else:                                                  #\n    #     near_subtree, far_subtree = node.right, node.left   #\n    #                                                         #\n    # Hint for step 7:                                        #\n    #   if far_subtree is not None and not should_prune(      #\n    #       node.split_dim, node.split_val, query,            #\n    #       best_heap, k                                      #\n    #   ):                                                    #\n    #     kd_search(far_subtree, ...)                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef kd_knn(query: np.ndarray, root: KDNode, vectors: np.ndarray, k: int):\n    \"\"\"\n    Run k-d tree kNN search and return (result_indices, nodes_visited).\n\n    Parameters\n    ----------\n    query : np.ndarray\n    root : KDNode\n    vectors : np.ndarray  — needed only for result ordering\n    k : int\n\n    Returns\n    -------\n    tuple(list of int, int)\n        (k nearest indices sorted nearest-first, number of nodes visited)\n    \"\"\"\n    best_heap    = []\n    nodes_visited = [0]   # mutable counter passed by reference\n    kd_search(root, query, k, best_heap, nodes_visited)\n    best_heap.sort(key=lambda x: -x[0])\n    indices = [idx for _, idx in best_heap]\n    return indices, nodes_visited[0]\n\n\n# ---------------------------------------------------------------------------\n# Provided: timing and comparison harness (do not modify)\n# ---------------------------------------------------------------------------\n\ndef run_experiment(dim: int, n_vectors: int, n_queries: int, k: int) -> dict:\n    \"\"\"Run one dimension's comparison experiment. Returns stats dict.\"\"\"\n    rng = np.random.default_rng(seed=dim * 7)\n    vectors = rng.random((n_vectors, dim), dtype=np.float32)\n    queries = rng.random((n_queries, dim), dtype=np.float32)\n\n    # Build k-d tree\n    root = build_kdtree(vectors.copy())\n\n    # ----- Brute force -----\n    bf_times = []\n    for q in queries:\n        t0 = time.perf_counter()\n        brute_force_knn(q, vectors, k)\n        bf_times.append(time.perf_counter() - t0)\n\n    bf_avg_ms = np.mean(bf_times) * 1000\n\n    # ----- k-d tree -----\n    kd_times      = []\n    visited_counts = []\n    correct_count  = 0\n\n    for q in queries:\n        gt = set(brute_force_knn(q, vectors, k))\n\n        t0 = time.perf_counter()\n        kd_result, n_visited = kd_knn(q, root, vectors, k)\n        kd_times.append(time.perf_counter() - t0)\n        visited_counts.append(n_visited)\n\n        if set(kd_result) == gt:\n            correct_count += 1\n\n    kd_avg_ms    = np.mean(kd_times) * 1000\n    avg_visited  = np.mean(visited_counts)\n    prune_pct    = (1 - avg_visited / n_vectors) * 100\n    speedup      = bf_avg_ms / kd_avg_ms if kd_avg_ms > 0 else 1.0\n    recall       = correct_count / n_queries * 100\n\n    return {\n        \"dim\":        dim,\n        \"bf_ms\":      bf_avg_ms,\n        \"kd_ms\":      kd_avg_ms,\n        \"speedup\":    speedup,\n        \"visited\":    avg_visited,\n        \"prune_pct\":  prune_pct,\n        \"recall\":     recall,\n    }\n\n\nif __name__ == \"__main__\":\n    print(\"=\" * 80)\n    print(\"Exercise 3: k-d Tree vs Brute Force — A Contrastive Study\")\n    print(\"=\" * 80)\n    print(f\"  Vectors: {N_VECTORS:,}  |  Queries: {N_QUERIES}  |  k={K}\")\n    print()\n\n    header = (f\"{'Dim':>5} | {'BF (ms)':>8} | {'KD (ms)':>8} | {'Speedup':>8} | \"\n              f\"{'Visited':>8} | {'Pruned%':>8} | {'Recall%':>8}\")\n    print(header)\n    print(\"-\" * 80)\n\n    results = []\n    for dim in DIMENSIONS:\n        r = run_experiment(dim, N_VECTORS, N_QUERIES, K)\n        results.append(r)\n        print(f\"{r['dim']:>5} | {r['bf_ms']:>8.2f} | {r['kd_ms']:>8.2f} | \"\n              f\"{r['speedup']:>8.1f}x | {r['visited']:>8.0f} | \"\n              f\"{r['prune_pct']:>8.1f}% | {r['recall']:>8.1f}%\")\n\n    print(\"-\" * 80)\n    print()\n\n    # Summary: pruning effectiveness\n    first = results[0]\n    last  = results[-1]\n    print(f\"k-d tree pruning effectiveness: \"\n          f\"{first['prune_pct']:.0f}% at {first['dim']}D, \"\n          f\"{last['prune_pct']:.0f}% at {last['dim']}D\")\n    print()\n    print(\"Interpretation:\")\n    print(f\"  At {first['dim']}D: k-d tree is {first['speedup']:.1f}x faster than brute force.\")\n    print(f\"  At {last['dim']}D: k-d tree visits {last['visited']:.0f}/{N_VECTORS} nodes \"\n          f\"({100-last['prune_pct']:.0f}% of the index).\")\n    print()\n    print(\"This degradation is FUNDAMENTAL — not a bug in our implementation.\")\n    print(\"scipy.spatial.KDTree exhibits the same behavior (try it!).\")\n    print()\n    print(\"The fix: graph-based indices (Module 1+) that adapt to the data distribution.\")\n"}]}, "module_01_graphbased_ann_search_the_core_abstraction": {"content": "# Module 1: Graph-Based ANN Search — The Core Abstraction\n\n## Table of Contents\n\n1. [Learning Objectives](#1-learning-objectives)\n2. [The Setup: A Search Problem We Can See](#2-the-setup-a-search-problem-we-can-see)\n3. [Why Graphs? The Flexibility Argument](#3-why-graphs-the-flexibility-argument)\n4. [Greedy Search: Following the Locally Best Edge](#4-greedy-search-following-the-locally-best-edge)\n5. [Random Graphs: A Baseline That Fails](#5-random-graphs-a-baseline-that-fails)\n6. [The Kevin Bacon Insight: Short vs. Long Edges](#6-the-kevin-bacon-insight-short-vs-long-edges)\n7. [The Ratio Explorer: Finding the Right Mix](#7-the-ratio-explorer-finding-the-right-mix)\n8. [Beam Search: Trading Compute for Recall](#8-beam-search-trading-compute-for-recall)\n9. [Implementation Details That Actually Matter](#9-implementation-details-that-actually-matter)\n10. [HNSW: Automating the Edge Problem](#10-hnsw-automating-the-edge-problem)\n11. [Analytical Questions](#11-analytical-questions)\n12. [Synthesis: Where This Leads](#12-synthesis-where-this-leads)\n\n---\n\n## 1. Learning Objectives\n\nBy the end of this module, you will be able to:\n\n- **Explain** why graphs outperform trees and hash tables for approximate nearest-neighbor search in high-dimensional spaces, using the flexibility argument\n- **Implement** greedy graph traversal from scratch, including the visited-set invariant and local-minimum stopping condition\n- **Quantify** the effect of short-edge ratio on search recall through empirical measurement, and explain *why* the optimal ratio is neither 0 nor 1\n- **Implement** beam search and articulate how beam width trades computation for recall — the fundamental knob all production ANN systems expose\n- **Debug** a broken graph search by identifying how three common implementation errors cascade: wrong metric → wrong neighbors → wrong entry point\n\n---\n\n## 2. The Setup: A Search Problem We Can See\n\nImagine you have 5,000 document embeddings, each 64 dimensions. A user submits a query embedding and wants the 10 most semantically similar documents returned in under 5 ms. Module 0 established that brute force is $O(n)$ — scanning all 5,000 vectors every time — and that in high dimensions, spatial data structures like k-d trees degrade to $O(n)$ too. So what do we do?\n\nWe are going to build an index that lets us answer this query in sub-linear time using a graph.\n\nThis module's **running example** is a concrete instantiation of this problem:\n- $n = 5{,}000$ vectors in $\\mathbb{R}^{64}$\n- Each vector has $M = 10$ edges in the index graph\n- Queries ask for $k = 10$ nearest neighbors\n- We measure **recall@k**: the fraction of true top-k neighbors found by our search\n\n$$\\text{recall@}k = \\frac{|\\text{retrieved top-}k \\cap \\text{true top-}k|}{k}$$\n\nBy the end of the module, this 5,000-vector problem will serve as a sandbox for every concept: random graphs, mixed-edge graphs, beam search, and debugging. The same code scaffold you build here underpins everything that HNSW and Vamana improve upon in Modules 2 and 3.\n\n---\n\n## 3. Why Graphs? The Flexibility Argument\n\nBefore building anything, let's understand *why* we reach for graphs at all. Module 0 showed that k-d trees partition the search space into hyperrectangles — an increasingly poor approximation in high dimensions. Locality-sensitive hashing tries a different angle: hash similar vectors to the same bucket. Both approaches share a critical assumption: **you can describe proximity using a rigid geometric structure**.\n\nIn 64+ dimensions, that assumption fails. Points cluster in unexpected ways; data isn't uniformly distributed. What you *can* do is build a structure that directly encodes which vectors are close to which, without committing to any global geometry.\n\nThat's a graph: nodes are vectors, edges connect \"related\" vectors. A graph is flexible in a deep sense:\n\n> *\"We can 'adapt' the graph to our data distribution (whatever it is) and our greedy 'query' operation, to ensure sublinear time complexity regardless of our data.\"*\n\nA k-d tree divides space uniformly — it cannot \"adapt\" to a cluster of 1,000 nearly-identical points in one corner. A graph can put more edges there. A hash table groups vectors by a fixed hash function — it cannot adapt when two very different vectors happen to hash together in high dimensions. A graph can avoid connecting them.\n\nThis adaptability is what makes graphs the winning abstraction. The optimization problem becomes: **what edges should we pick to make greedy search work?**\n\n```python\nclass GraphIndex:\n    def __init__(self, vectors: np.ndarray, M: int):\n        self.vectors = vectors      # shape (n, d)\n        self.M = M                  # max edges per node\n        self.n = len(vectors)\n        self.adjacency = {i: [] for i in range(self.n)}  # node -> [neighbor_ids]\n\n    def add_edge(self, u: int, v: int):\n        if v not in self.adjacency[u]:\n            self.adjacency[u].append(v)\n\n    def get_neighbors(self, node: int) -> list[int]:\n        return self.adjacency[node]\n```\n\nThis adjacency list is the entire state of the index. Every algorithm in this course — random edges, nearest-neighbor edges, Vamana's RobustPrune — is just a different answer to \"which pairs (u, v) do we call `add_edge(u, v)` for?\"\n\n![Greedy search traversal walkthrough](diagrams/greedy_traversal.svg)\n\n---\n\n## 4. Greedy Search: Following the Locally Best Edge\n\nOnce we have a graph, we need a search procedure. The natural choice is **greedy search**: start at an entry node, look at all its neighbors, move to the one closest to the query, repeat.\n\nFormally, let $q$ be the query vector. Let $e$ be the entry node. Let $d(\\cdot, \\cdot)$ denote Euclidean distance. Greedy search proceeds:\n\n$$\\text{current} \\leftarrow e$$\n$$\\text{best\\_dist} \\leftarrow d(q, \\text{current})$$\n$$\\text{repeat:}$$\n$$\\quad \\text{candidates} \\leftarrow \\{v : (v, \\text{current}) \\in E\\} \\setminus \\text{visited}$$\n$$\\quad \\text{next} \\leftarrow \\arg\\min_{v \\in \\text{candidates}} d(q, v)$$\n$$\\quad \\text{if } d(q, \\text{next}) \\geq \\text{best\\_dist}: \\text{STOP} \\quad \\text{(local minimum)}$$\n$$\\quad \\text{else}: \\text{curre
