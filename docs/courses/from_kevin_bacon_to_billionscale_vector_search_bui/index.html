nt} \\leftarrow \\text{next}, \\quad \\text{best\\_dist} \\leftarrow d(q, \\text{next})$$\n\nThe stopping condition is critical: **we stop when we can't improve by following any edge from the current node**. This is a local minimum in the graph — no neighbor is closer to $q$ than we currently are.\n\nWhy does this work? The hope is that the graph is structured so that local minima *coincide* with global minima — the true nearest neighbor. Whether that hope is realized depends entirely on the edge structure.\n\n```python\nimport heapq\n\ndef greedy_search(graph: GraphIndex, query: np.ndarray, entry_node: int, k: int):\n    \"\"\"Single-candidate greedy search. Returns (distances, node_ids).\"\"\"\n    visited = set()\n    current = entry_node\n    best_dist = euclidean_distance(query, graph.vectors[current])\n    path = [current]\n\n    while True:\n        visited.add(current)\n        neighbors = graph.get_neighbors(current)\n\n        # Find closest unvisited neighbor\n        best_neighbor = None\n        best_neighbor_dist = float('inf')\n        for nb in neighbors:\n            if nb not in visited:\n                d = euclidean_distance(query, graph.vectors[nb])\n                if d < best_neighbor_dist:\n                    best_neighbor_dist = d\n                    best_neighbor = nb\n\n        # Local minimum: no neighbor is closer than current\n        if best_neighbor is None or best_neighbor_dist >= best_dist:\n            break\n\n        current = best_neighbor\n        best_dist = best_neighbor_dist\n        path.append(current)\n\n    return current, path\n```\n\n**Check your understanding:** What happens if we *don't* maintain a `visited` set? Consider a graph where node A connects to B and B connects back to A, with both closer to $q$ than any other node. *(The search oscillates between A and B forever — an infinite loop. The visited set is the invariant that guarantees termination.)*\n\n**Check your understanding:** What if the entry node happens to already be the true nearest neighbor? *(We immediately check its neighbors, find none closer, and return the entry node. That's correct and efficient — one \"iteration\" with no movement.)*\n\n---\n\n## 5. Random Graphs: A Baseline That Fails\n\nThe simplest possible graph: assign $M$ random neighbors to each node. No spatial structure whatsoever. Let's see why this fails.\n\n```python\ndef build_random_graph(vectors: np.ndarray, M: int) -> GraphIndex:\n    n = len(vectors)\n    graph = GraphIndex(vectors, M)\n    for i in range(n):\n        # Sample M distinct random neighbors (not self)\n        candidates = list(range(n))\n        candidates.remove(i)\n        chosen = random.sample(candidates, min(M, n - 1))\n        for j in chosen:\n            graph.add_edge(i, j)\n    return graph\n```\n\nWhen you run Exercise 1, you'll find recall@1 is typically 0.30–0.50. Why does it fail?\n\n**The zig-zag problem.** A random graph has no spatial coherence. Following an edge from node $A$ might take you to node $Z$ — a node in a completely unrelated region of the vector space. The next edge from $Z$ might take you back toward the original region, or to yet another random location. The search path has no directional momentum; it bounces around the space until it happens to land near the query.\n\nIn 64 dimensions, the *expected* distance between two random nodes is large (Module 0's concentration-of-measure result). So random edges are long — not *usefully* long edges that cross cluster boundaries, but *arbitrarily* long edges that point in random directions.\n\n![Short vs long edges: why the mix matters](diagrams/edge_mix.svg)\n\n**The local minimum problem.** When greedy search stops, it has found a local minimum in the *graph distance to query*. In a random graph, the entry node's immediate neighbors are essentially random samples of the dataset. Moving to the closest one doesn't necessarily move you toward the query — it moves you to whoever was lucky enough to be assigned as a neighbor. The local minimum you reach bears no reliable relationship to the true nearest neighbor.\n\nHere's the intuition as a metaphor: imagine navigating a city where street signs point in random directions rather than toward destinations. You could walk forever and never reliably reach your target, stopping only when every pointing arrow leads further away than where you already are.\n\n**Why does it sometimes work?** In small datasets (our 5,000 vectors), the density of points is high enough that random edges occasionally point toward the right neighborhood, and the true nearest neighbor might be only a few hops from wherever we land. In billion-scale datasets with 768-dimensional embeddings, this lucky coincidence essentially never happens — random graphs would degrade to near-zero recall.\n\n---\n\n## 6. The Kevin Bacon Insight: Short vs. Long Edges\n\nThe sociologist Stanley Milgram conducted an experiment in the 1960s: could a letter reach a target person in Boston starting from strangers in Nebraska, using only personal acquaintances as intermediaries? On average, it took **6 intermediaries**. Milgram called this \"six degrees of separation\"; the internet knows it as the Kevin Bacon game.\n\nThe insight for ANN graphs: people navigated successfully by using **long-range connections first** (friends who bridge social groups or geographies), then **short-range connections** at the end (neighbors in the target's local community). This mirrors how transportation networks work: highways get you to the right city, avenues to the right neighborhood, streets to the right block.\n\nFor vector search:\n\n| Edge type | Role | Analogy |\n|-----------|------|---------|\n| **Long edges** (random, or cross-cluster) | Navigate to the general area quickly | Highways |\n| **Short edges** (nearest-neighbor) | Hone in on the exact neighbor | Side streets |\n\nWithout long edges, a purely short-edge graph creates disconnected clusters: each vector is only connected to its immediate neighborhood. A query that starts outside a cluster may never reach the right cluster — the graph is locally navigable but globally disconnected.\n\nWithout short edges, a purely long-edge (random) graph takes zig-zag paths: we can traverse the global space but never converge on the precise local minimum.\n\n$$\\text{The ideal graph} = \\underbrace{\\alpha \\cdot \\text{short edges}}_{\\text{local accuracy}} + \\underbrace{(1-\\alpha) \\cdot \\text{long edges}}_{\\text{global reachability}}$$\n\nwhere $\\alpha \\in [0, 1]$ is the short-edge ratio we'll tune empirically.\n\nThis is the fundamental principle that every advanced algorithm in this course builds on. HNSW (Module 2) achieves long edges via uniform subsampling across levels. Vamana (Module 3) achieves them via the `alpha` parameter in `RobustPrune`. Product Quantization (Module 4) and disk-native storage (Module 5) add efficiency on top of this graph structure.\n\n**Check your understanding:** Suppose your data is perfectly clustered — 50 tight clusters of 100 vectors each, with large inter-cluster distances. What edge ratio would work best? What would happen with 100% short edges? *(100% short edges: each vector connects only within its cluster, so queries starting in the wrong cluster can never reach the target cluster. Recall → 0 if the query starts in the wrong cluster, which happens ~98% of the time.)*\n\n---\n\n## 7. The Ratio Explorer: Finding the Right Mix\n\nLet's make the short-vs-long intuition concrete with a `build_mixed_graph` function:\n\n```python\nimport math\n\ndef build_mixed_graph(vectors: np.ndarray, M: int, short_ratio: float) -> GraphIndex:\n    \"\"\"\n    Build a graph with floor(M * short_ratio) nearest-neighbor edges\n    and the remaining M - floor(M * short_ratio) random edges.\n    \"\"\"\n    n, d = vectors.shape\n    n_short = math.floor(M * short_ratio)\n    n_long = M - n_short\n    graph = GraphIndex(vectors, M)\n\n    # Compute nearest-neighbor edges (expensive but instructive)\n    for i in range(n):\n        dists = [euclidean_distance(vectors[i], vectors[j]) for j in range(n) if j != i]\n        sorted_neighbors = sorted(range(n - 1), key=lambda idx: dists[idx])\n        actual_neighbors = [j for j in range(n) if j != i]\n        nn_neighbors = [actual_neighbors[idx] for idx in sorted_neighbors[:n_short]]\n        for nb in nn_neighbors:\n            graph.add_edge(i, nb)\n\n        # Random (long) edges\n        remaining = [j for j in range(n) if j != i and j not in nn_neighbors]\n        long_neighbors = random.sample(remaining, min(n_long, len(remaining)))\n        for nb in long_neighbors:\n            graph.add_edge(i, nb)\n\n    return graph\n```\n\nExercise 2 sweeps `short_ratio` across `[0.0, 0.2, 0.4, 0.5, 0.6, 0.8, 1.0]` and measures recall@10. The expected results look roughly like:\n\n| short_ratio | recall@10 | reachability |\n|-------------|-----------|--------------|\n| 0.0 (all long) | 0.35 | 1.00 |\n| 0.2 | 0.52 | 1.00 |\n| 0.4 | 0.71 | 0.98 |\n| **0.5–0.6** | **0.82** | **0.95** |\n| 0.8 | 0.73 | 0.82 |\n| 1.0 (all short) | 0.44 | 0.61 |\n\nNotice: the graph with 100% short edges has the *lowest reachability*. This is exactly the disconnected-cluster problem. Graph reachability is measured by BFS from the entry node:\n\n$$\\text{reachability} = \\frac{|\\text{nodes reachable from entry}|}{n}$$\n\nWhen reachability drops, some queries start in the wrong connected component and are guaranteed to fail regardless of the search algorithm. This explains the recall collapse at `short_ratio = 1.0`.\n\nThe peak around 0.5–0.6 confirms the source insight:\n\n> *\"Adding structure by connecting neighbors increases accuracy, up to a point, before local minimas prevent reachability too often.\"*\n\n**Check your understanding:** Why does recall@10 peak at 0.5–0.6 rather than at 0.8 or higher? *(As short_ratio increases beyond ~0.6, the graph starts losing its long-range connections. Queries that need to cross cluster boundaries can't find a path. The long edges that remain are fewer and less effective, so the search gets stuck in wrong neighborhoods more often.)*\n\n---\n\n## 8. Beam Search: Trading Compute for Recall\n\nGreedy search maintains exactly **one candidate** at a time — it always moves to the single best neighbor. This is fast but fragile: a single wrong step can send the search to a dead end. Beam search generalizes this by maintaining a **sorted list of $L$ candidates** simultaneously:\n\n$$\\mathcal{C} = \\{(d(q, v_1), v_1), (d(q, v_2), v_2), \\ldots, (d(q, v_L), v_L)\\}$$\n\nAt each step, we expand the *closest unvisited candidate* — the one with the smallest distance to $q$ among candidates we haven't yet processed. We add all its neighbors to $\\mathcal{C}$, keeping only the $L$ closest overall. We stop when all candidates in $\\mathcal{C}$ have been visited.\n\nThe algorithm:\n\n```python\nimport heapq\n\ndef beam_search(graph: GraphIndex, query: np.ndarray, entry_node: int,\n                k: int, beam_width: int) -> list[int]:\n    \"\"\"\n    Beam search with candidate list of size beam_width.\n    Returns top-k node ids by distance to query.\n    \"\"\"\n    visited = set()\n    entry_dist = euclidean_distance(query, graph.vectors[entry_node])\n\n    # Min-heap: (distance, node_id)\n    candidates = [(entry_dist, entry_node)]\n    all_seen = {entry_node: entry_dist}\n\n    results = []  # (distance, node_id) for best nodes found\n\n    while candidates:\n        dist, node = heapq.heappop(candidates)\n        if node in visited:\n            continue\n        visited.add(node)\n        results.append((dist, node))\n\n        for nb in graph.get_neighbors(node):\n            if nb not in all_seen:\n                nb_dist = euclidean_distance(query, graph.vectors[nb])\n                all_seen[nb] = nb_dist\n                heapq.heappush(candidates, (nb_dist, nb))\n\n        # Trim candidate list to beam_width\n        if len(candidates) > beam_width:\n            candidates = heapq.nsmallest(beam_width, candidates)\n            heapq.heapify(candidates)\n\n    results.sort()\n    return [node for _, node in results[:k]]\n```\n\n![Beam search expanding the frontier](diagrams/beam_search.svg)\n\n**The beam width knob.** Exercise 3 sweeps `beam_width` across `[1, 10, 25, 50, 100, 200]` and measures recall@10. The expected pattern:\n\n| beam_width | recall@10 | nodes_visited |\n|------------|-----------|---------------|\n| 1 | ~0.50 | ~12 |\n| 10 | ~0.68 | ~45 |\n| 25 | ~0.78 | ~95 |\n| 50 | ~0.85 | ~175 |\n| 100 | ~0.91 | ~320 |\n| 200 | ~0.95 | ~580 |\n\nTwo things to notice:\n\n1. **Sublinear nodes visited.** Even `beam_width=200` visits only ~580 of 5,000 nodes (~11.6%). We achieve 95% recall while examining less than 12% of the dataset. This is the core ANN promise.\n\n2. **Diminishing returns.** Going from `beam_width=1` to `beam_width=10` gives +18 recall points. Going from `beam_width=100` to `beam_width=200` gives only +4 recall points. The first few additional candidates eliminate the worst failures; the last few are chasing rare edge cases.\n\nIn production systems, `beam_width` (often called `ef_search` in HNSW, or `L` in DiskANN) is the primary latency knob. When your SLA demands lower latency, you reduce beam width and accept slightly lower recall. When your product requires higher accuracy, you increase it. This single parameter governs the recall-latency tradeoff.\n\n**Check your understanding:** If you double `beam_width`, does latency double? *(Not necessarily — in a well-connected graph, doubling beam_width means you visit roughly twice as many nodes, but each node visit is a distance computation and edge traversal. In practice, the relationship is superlinear when cache misses dominate, and near-linear for in-memory graphs. On disk (Module 5), each node visit is a random 4K SSD read, making this tradeoff dramatically more expensive.)*\n\n---\n\n## 9. Implementation Details That Actually Matter\n\nANN implementations have a reputation for being delicate. Exercise 4 embeds three real bugs that each break the system in a distinct way:\n\n### Bug 1: Wrong Distance Metric\n\n```python\n# BUG: Manhattan distance instead of Euclidean\ndef bad_distance(a: np.ndarray, b: np.ndarray) -> float:\n    return np.sum(np.abs(a - b))  # L1 norm\n\n# CORRECT:\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    return np.sqrt(np.sum((a - b) ** 2))  # L2 norm\n```\n\nThe graph was *built* using Euclidean distance to select nearest-neighbor edges. Querying with Manhattan distance means we're navigating a graph optimized for one geometry using a different geometry. The \"best neighbor\" from the query's perspective (Manhattan) might not be the \"best neighbor\" in the graph's local structure (Euclidean). Practically, using L1 instead of L2 drops recall from ~0.82 to ~0.35.\n\nThe deeper lesson: **the distance metric used at query time must match the metric used at index-build time.** In production systems where the index is built once and served for months, a mismatch — perhaps introduced by a library upgrade that changed the default metric — can silently degrade recall without any error messages.\n\n### Bug 2: Visited Set Check in Wrong Order\n\n```python\n# BUG: Check visited AFTER expanding neighbors\nwhile candidates:\n    node = candidates.pop()\n    # ... expand ALL neighbors, THEN mark visited\n    visited.add(node)   # ← too late\n\n# CORRECT: Check visited BEFORE expanding\nwhile candidates:\n    node = candidates.pop()\n    if node in visited:    # ← check first\n        continue\n    visited.add(node)\n    # ... expand neighbors\n```\n\nWhen the check happens after expanding, a node can be expanded multiple times — each time adding its neighbors to the candidate list again. This creates an exponential blowup in nodes_visited for dense graphs. Worse, it can cause *oscillation*: nodes A and B repeatedly add each other to candidates, consuming compute without making progress.\n\nThe symptom is subtle: recall improves slightly (we explore more), but runtime explodes, and in pathological cases, the search loops without terminating.\n\n### Bug 3: Always Using Node 0 as Entry Point\n\n```python\n# BUG: Fixed entry node\nENTRY_NODE = 0\nresult = greedy_search(graph, query, ENTRY_NODE, k)\n\n# CORRECT: Medoid or centroid-based entry\ndef find_medoid(vectors: np.ndarray) -> int:\n    \"\"\"Find the node whose average distance to all others is smallest.\"\"\"\n    centroid = vectors.mean(axis=0)\n    dists = np.linalg.norm(vectors - centroid, axis=1)\n    return int(np.argmin(dists))\n```\n\nNode 0 is the first inserted node — it's wherever it happens to land in the data distribution. In the worst case (sorted data), node 0 is in the extreme corner of the space and every query requires traversing the entire diameter of the graph.\n\nThe medoid (or centroid-nearest node) is the node that minimizes average distance to all others — it's in the \"middle\" of the data distribution. Starting from the medoid means the first hop is always in a productive direction regardless of where the query lands.\n\nThe effect is striking: bug alone causes recall@10 to drop from ~0.82 to ~0.61. The remaining 21 percentage points are \"wasted\" on traversals that start far from the query and waste hops just getting to the right region.\n\n**Check your understanding:** For a dataset with 10 well-separated clusters, what's the worst-case behavior of node-0 entry? Best case? *(Worst case: node 0 is in cluster 1, all queries target cluster 10; every search must traverse ~9 cluster boundaries to reach the target. Best case: node 0 is in a central cluster; queries targeting any cluster take at most a few boundary-crossing hops.)*\n\n---\n\n## 10. HNSW: Automating the Edge Problem\n\nWe've established that the ideal graph needs a mix of long and short edges. Exercise 2 found an empirical optimum around 50–60% short edges. But this raises a problem: **how do we pick *which* long edges?**\n\nRandom long edges (the approach we've been using) are statistically long in high dimensions but not *usefully* long. A useful long edge connects two nodes that are in the same \"direction\" relative to typical queries — it bridges a cluster boundary that queries frequently need to cross.\n\nHNSW's insight: you don't need to pick useful long edges explicitly. Instead, build **multiple levels** of the graph where each higher level has exponentially fewer nodes:\n\n- Level 0: all $n$ nodes, short edges\n- Level 1: $n/e \\approx 0.37n$ randomly sampled nodes, medium edges\n- Level 2: $n/e^2 \\approx 0.14n$ randomly sampled nodes, long edges\n- Level $\\ell$: $n/e^\\ell$ nodes\n\nAt higher levels, edges are naturally longer because fewer nodes exist — any node's \"nearest neighbors\" at level $k$ are farther away than its nearest neighbors at level 0.\n\nThe level assignment probability uses exponential decay: a node gets assigned to level $\\ell$ with probability $e^{-\\ell/m_L}$ where $m_L$ is a normalization constant. HNSW uses $m_L = 1/\\ln(M)$.\n\nA query traverses:\n1. Entry at the top level, greedy search until local minimum\n2. Drop to level below at the same node, repeat\n3. Continue until level 0\n\nThis is Module 2's territory — we'll implement it in full detail there. The key takeaway here: **HNSW is solving the same short-vs-long edge problem we explored in Exercise 2, just with a more principled mechanism.**\n\n[^1]: HNSW was published by Malkov and Yashunin in 2018. The name \"Hierarchical Navigable Small World\" directly references the small-world phenomenon from sociology — the algorithm's authors were explicit about this intellectual lineage.\n\n[^2]: The exponential decay probability in HNSW means the expected number of levels is $O(\\log n)$, which is why the total query time is $O(\\log n)$ — each level halves the remaining candidates.\n\n---\n\n## 11. Analytical Questions\n\nThese questions require synthesis across multiple concepts. Good answers cite trade-offs rather than single \"correct\" solutions.\n\n### Q1: The Disconnection Trap (Analysis)\n\nExercise 2 shows that 100% short edges give worse recall than 50% short edges, primarily due to disconnected clusters. But consider this: in the limit of *infinite* edges per node (M → ∞), 100% short edges would eventually connect all nodes. At what value of M does the disconnection problem \"disappear\"? How does this interact with the curse of dimensionality?\n\n*Think about:* In $d$ dimensions with $n$ points, the number of neighbors within radius $r$ scales as $r^d$. For a graph to be connected via short edges alone, you need M to scale with...\n\n### Q2: The Entry Point Problem at Scale (Synthesis)\n\nWe found that a medoid entry point improves recall significantly over a random fixed entry. But computing the true medoid requires $O(n^2)$ distance computations. For $n = 1{,}000{,}000$ points, this is too expensive. Propose two alternative entry-point selection strategies that are $O(n)$ or $O(n \\log n)$ and analyze their expected quality.\n\n*Think about:* What properties does a good entry point need? Can you approximate the medoid? Does the entry point matter as much at large $n$ when the graph is well-connected?\n\n### Q3: Beam Width and Disk I/O (Evaluation)\n\nIn Exercise 3, going from `beam_width=50` to `beam_width=100` costs roughly 145 additional node visits. In memory, each visit is a distance computation — cheap. On an NVMe SSD where each node visit is a random 4K read taking 20,000 ns, what is the *latency cost* of doubling the beam width from 50 to 100? How does this change the recall-latency tradeoff compared to the in-memory case?\n\n*Hint:* Memory latency ≈ 100 ns. SSD latency ≈ 20,000 ns. The 200× gap changes the calculus significantly.\n\n### Q4: Graph Quality vs. Search Quality (Synthesis)\n\nWe've treated graph *quality* (recall) and search *algorithm* (beam search) as independent variables. But they interact: a better graph might allow greedy search (beam_width=1) to achieve the recall of a worse graph with beam_width=100. \n\nGiven a fixed compute budget of \"at most $X$ nodes visited per query\", how should you allocate effort between (a) building a better graph and (b) using a larger beam width? Is there a general principle, or does it depend on the data distribution?\n\n---\n\n## 12. Synthesis: Where This Leads\n\nYou've built the entire foundation of graph-based ANN search from scratch in this module:\n\n| Concept | Implementation | Lesson |\n|---------|----------------|--------|\n| Random graph | `build_random_graph()` | Structure is necessary; randomness fails |\n| Mixed edge graph | `build_mixed_graph(short_ratio)` | Both long and short edges are required |\n| Greedy search | `greedy_search()` | Local optima work when graph is well-structured |\n| Beam search | `beam_search(beam_width)` | The fundamental recall-latency knob |\n| Entry point | Medoid vs. node 0 | Starting position matters as much as traversal |\n| Distance metric | L2 vs. L1 | Build-time and query-time metrics must match |\n\nThe graph-based approach works because of a key structural insight: **we can encode the data distribution directly into the graph topology**. By choosing edges that reflect actual proximity relationships in the high-dimensional space, we create a structure where local greedy decisions reliably lead to global optima.\n\nWhat we haven't solved: how do we *automatically* choose the right edges without manually tuning a short-edge ratio? The answer in Module 2 (HNSW) uses hierarchical levels; Module 3 (Vamana) uses the `RobustPrune` algorithm with an `alpha` parameter. Both are more principled answers to the question: \"which pairs of nodes should be connected?\"\n\nAnd the deeper problem — how do we serve this graph from disk rather than memory, enabling billion-scale indices without terabytes of RAM — is the subject of Modules 4 and 5. The graph structure itself doesn't change; what changes is where the vectors and adjacency lists live, and how we navigate the 200× latency penalty of SSD reads.\n\nFor now: you have a working ANN index. It's not HNSW, it's not Vamana, and it won't scale to a billion vectors. But every search, every edge, every beam-width tradeoff you've implemented here appears — in more sophisticated form — in the CoreNN system that handles 1 billion Reddit comment embeddings in 15 ms.\n\n[^3]: The 15 ms figure for CoreNN on 1 billion vectors is from the author's production deployment. The comparison point is HNSW on 3 TB of RAM across a cluster — the same index, fundamentally, served from $40×$–$100×$ cheaper storage.\n\n[^4]: All distance computations in this module use Euclidean distance ($L_2$ norm). Modern embedding models are often trained with cosine similarity ($1 - \\text{cos}(a, b)$). For unit-normalized vectors, $\\|a - b\\|^2 = 2(1 - a \\cdot b)$, so ranking by $L_2$ distance is equivalent to ranking by cosine similarity when vectors are normalized — a fact production systems exploit to avoid the extra division step.\n\n[^5]: The visited set in greedy search is sometimes called the \"tabu list\" in combinatorial optimization literature, where it prevents revisiting already-explored states. The graph-search application is identical: without it, you revisit nodes that can no longer improve the result, wasting compute and risking oscillation.\n\n---\n\n## Exercises\n\nThis module includes four exercises that build on each other:\n\n| Exercise | File | Core skill |\n|----------|------|------------|\n| 1 | `ex01_random_graph_and_greedy_search.py` | Implement random graph + greedy search, measure recall |\n| 2 | `ex02_short_vs_long_edge_ratio_explorer.py` | Empirically find optimal short-edge ratio |\n| 3 | `ex03_beam_search_expanding_the_search_frontier.py` | Implement beam search, measure recall-latency tradeoff |\n| 4 | `ex04_debugging_a_broken_greedy_search.py` | Debug three cascading bugs in a broken implementation |\n\nSolutions are in `_solutions/`.\n\n**Prerequisite check:** This module assumes you can:\n- Index and slice NumPy arrays\n- Use Python's `heapq` module for a min-heap\n- Understand what $O(n)$, $O(n \\log n)$, and $O(n^2)$ mean in practice\n\nIf you haven't done Module 0 yet, do it first — it establishes why brute force is $O(n)$ and why dimensionality makes spatial partitioning fail.\n", "exercises": [{"filename": "ex01_random_graph_and_greedy_search.py", "content": "\"\"\"\nExercise 1: Random Graph and Greedy Search\n==========================================\nModule 1 — Graph-Based ANN Search: The Core Abstraction\n\nIn this exercise you will implement the two foundational pieces of\ngraph-based ANN search:\n\n  1. build_random_graph   — assign M random edges to each node (no spatial structure)\n  2. greedy_search        — traverse the graph greedily until a local minimum\n\nAfter completing both, the __main__ block will:\n  - Generate 5,000 random 64-D vectors\n  - Build your random graph with M=10 edges per node\n  - Run 200 queries with ground-truth labels from brute force\n  - Print recall@1, recall@10, average path length, and a few example paths\n\nExpected milestone output:\n  Random graph recall@1:  0.XX   (typically 0.30–0.50)\n  Random graph recall@10: 0.XX   (typically 0.20–0.45)\n  Average path length:    X.X hops\n\nThe low recall is expected — it demonstrates WHY random graphs fail\nand motivates the structured approaches in Exercises 2–4.\n\nKey insight: random edges have no spatial coherence, so greedy search\nzig-zags across the space and gets stuck at local minima far from the\ntrue nearest neighbor.\n\"\"\"\n\nimport os\nimport random\nimport time\nimport heapq\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# FAST VERIFICATION MODE\n# ---------------------------------------------------------------------------\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 200 if VERIFY else 5_000     # full: 5000 vectors\nN_QUERIES = 20  if VERIFY else 200      # full: 200 queries\nDIM       = 16  if VERIFY else 64       # full: 64-dimensional\nM         = 6   if VERIFY else 10       # full: 10 edges per node\nK         = 10                          # number of neighbors to retrieve\n\n\n# ---------------------------------------------------------------------------\n# GraphIndex — provided, do not modify\n# ---------------------------------------------------------------------------\n\nclass GraphIndex:\n    \"\"\"\n    Adjacency-list graph over a fixed set of vectors.\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (n, d)\n        The indexed vectors.\n    M : int\n        Target number of outgoing edges per node.\n    \"\"\"\n\n    def __init__(self, vectors: np.ndarray, M: int):\n        self.vectors = vectors\n        self.M = M\n        self.n = len(vectors)\n        self.adjacency: dict[int, list[int]] = {i: [] for i in range(self.n)}\n\n    def add_edge(self, u: int, v: int) -> None:\n        \"\"\"Add a directed edge u → v (no duplicates).\"\"\"\n        if v not in self.adjacency[u]:\n            self.adjacency[u].append(v)\n\n    def get_neighbors(self, node: int) -> list[int]:\n        \"\"\"Return all nodes reachable from `node` in one hop.\"\"\"\n        return self.adjacency[node]\n\n\n# ---------------------------------------------------------------------------\n# Helper — provided, do not modify\n# ---------------------------------------------------------------------------\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"Compute the Euclidean (L2) distance between two vectors.\"\"\"\n    return float(np.sqrt(np.sum((a - b) ** 2)))\n\n\ndef brute_force_knn(vectors: np.ndarray, query: np.ndarray, k: int) -> list[int]:\n    \"\"\"\n    Return the indices of the k nearest vectors to `query` (exact).\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (n, d)\n    query   : np.ndarray, shape (d,)\n    k       : int\n\n    Returns\n    -------\n    list[int] — k indices sorted nearest-first\n    \"\"\"\n    dists = np.sqrt(np.sum((vectors - query) ** 2, axis=1))\n    return list(np.argsort(dists)[:k])\n\n\n# ---------------------------------------------------------------------------\n# TODO 1: build_random_graph\n# ---------------------------------------------------------------------------\n\ndef build_random_graph(vectors: np.ndarray, M: int) -> GraphIndex:\n    \"\"\"\n    Build a graph where each node has exactly M randomly chosen neighbors.\n\n    No spatial structure — neighbors are drawn uniformly at random from all\n    other nodes. This is our baseline to show why structure matters.\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (n, d)\n        The indexed vectors.\n    M : int\n        Number of outgoing edges per node (neighbors drawn without replacement).\n\n    Returns\n    -------\n    GraphIndex with M random outgoing edges per node.\n\n    Hints\n    -----\n    - Create a GraphIndex(vectors, M) first.\n    - For each node i, sample M distinct neighbors from [0, n-1] \\ {i}.\n    - Use random.sample(population, k) for sampling without replacement.\n    - Call graph.add_edge(i, j) for each chosen neighbor j.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~10 lines                              #\n    #                                                         #\n    # Hint: build the candidate list for each node as         #\n    #   candidates = [j for j in range(n) if j != i]         #\n    # then sample M from it.                                  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2: greedy_search\n# ---------------------------------------------------------------------------\n\ndef greedy_search(\n    graph: GraphIndex,\n    query: np.ndarray,\n    entry_node: int,\n    k: int,\n) -> tuple[list[int], list[int]]:\n    \"\"\"\n    Single-candidate greedy traversal of a graph toward `query`.\n\n    At each step, move to the unvisited neighbor closest to `query`.\n    Stop when no unvisited neighbor improves the current best distance\n    (i.e., we are at a local minimum).\n\n    Parameters\n    ----------\n    graph      : GraphIndex\n    query      : np.ndarray, shape (d,)\n    entry_node : int — starting node id\n    k          : int — number of results to return\n\n    Returns\n    -------\n    (results, path)\n      results : list[int] — up to k node ids found, nearest-first\n      path    : list[int] — sequence of nodes visited (for path-length analysis)\n\n    Common mistakes to avoid\n    ------------------------\n    - Forgetting the visited set → infinite loops on cyclic graphs\n    - Checking visited AFTER expanding neighbors → wasted hops + oscillation\n    - Stopping when candidates is empty rather than when no neighbor improves\n      best_dist → may miss the local minimum condition\n\n    Hints\n    -----\n    - Maintain a visited set and a `best_dist` variable.\n    - At each step, iterate over get_neighbors(current); skip visited nodes.\n    - Compute distance to each unvisited neighbor; track the closest one.\n    - If the closest unvisited neighbor's distance >= best_dist: STOP.\n    - Otherwise, move to that neighbor and update best_dist.\n    - Collect all visited nodes; sort by distance to query; return top k.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~18 lines                              #\n    #                                                         #\n    # Skeleton:                                               #\n    #   visited = set()                                       #\n    #   current = entry_node                                  #\n    #   best_dist = euclidean_distance(query, vectors[entry]) #\n    #   path = [entry_node]                                   #\n    #   while True:                                           #\n    #       visited.add(current)                              #\n    #       ... find best unvisited neighbor ...              #\n    #       if no improvement: break                          #\n    #       current = best_neighbor                           #\n    #       path.append(current)                              #\n    #   sort visited nodes by distance, return top-k          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Evaluation helpers — provided, do not modify\n# ---------------------------------------------------------------------------\n\ndef compute_recall(retrieved: list[int], ground_truth: list[int], k: int) -> float:\n    \"\"\"Fraction of true top-k neighbors found in retrieved list.\"\"\"\n    return len(set(retrieved[:k]) & set(ground_truth[:k])) / k\n\n\ndef evaluate(\n    graph: GraphIndex,\n    queries: np.ndarray,\n    ground_truth: list[list[int]],\n    entry_node: int,\n    k: int,\n) -> dict:\n    \"\"\"Run all queries and collect recall + path-length statistics.\"\"\"\n    recalls_at_1  = []\n    recalls_at_k  = []\n    path_lengths  = []\n    example_paths = []\n\n    for i, (q, gt) in enumerate(zip(queries, ground_truth)):\n        results, path = greedy_search(graph, q, entry_node, k)\n        recalls_at_1.append(compute_recall(results, gt, 1))\n        recalls_at_k.append(compute_recall(results, gt, k))\n        path_lengths.append(len(path))\n        if i < 3:\n            example_paths.append(path)\n\n    return {\n        \"recall@1\":       float(np.mean(recalls_at_1)),\n        \"recall@k\":       float(np.mean(recalls_at_k)),\n        \"avg_path_len\":   float(np.mean(path_lengths)),\n        \"example_paths\":  example_paths,\n    }\n\n\n# ---------------------------------------------------------------------------\n# __main__ — provided, do not modify\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    rng = np.random.default_rng(42)\n    random.seed(42)\n\n    print(\"=\" * 60)\n    print(\"Exercise 1: Random Graph and Greedy Search\")\n    print(\"=\" * 60)\n    print(f\"  Vectors: {N_VECTORS}  |  dim: {DIM}  |  M={M}  |  k={K}\")\n    if VERIFY:\n        print(\"  [FAST VERIFY MODE — using small params]\")\n    print()\n\n    # Generate dataset and queries\n    vectors = rng.standard_normal((N_VECTORS, DIM)).astype(np.float32)\n    query_vectors = rng.standard_normal((N_QUERIES, DIM)).astype(np.float32)\n\n    # Ground truth via brute force\n    print(\"Computing ground truth (brute force)...\")\n    ground_truth = [brute_force_knn(vectors, q, K) for q in query_vectors]\n\n    # Pick entry node: centroid-nearest (gives a fair comparison)\n    centroid = vectors.mean(axis=0)\n    dists_to_centroid = np.linalg.norm(vectors - centroid, axis=1)\n    entry_node = int(np.argmin(dists_to_centroid))\n    print(f\"Entry node: {entry_node} (centroid-nearest)\")\n\n    # Build random graph\n    print(f\"\\nBuilding random graph (M={M})...\")\n    t0 = time.perf_counter()\n    graph = build_random_graph(vectors, M)\n    build_time = time.perf_counter() - t0\n    print(f\"  Build time: {build_time:.2f}s\")\n\n    # Evaluate\n    print(\"\\nRunning greedy search on all queries...\")\n    t0 = time.perf_counter()\n    stats = evaluate(graph, query_vectors, ground_truth, entry_node, K)\n    query_time = time.perf_counter() - t0\n\n    # Print results\n    print()\n    print(f\"Random graph recall@1:  {stats['recall@1']:.2f}\")\n    print(f\"Random graph recall@10: {stats['recall@k']:.2f}\")\n    print(f\"Average path length:    {stats['avg_path_len']:.1f} hops\")\n    print(f\"Total query time:       {query_time*1000:.1f} ms for {N_QUERIES} queries\")\n    print()\n    print(\"Example search paths (showing zig-zag behavior):\")\n    for i, path in enumerate(stats[\"example_paths\"]):\n        # Show first 8 nodes of path to keep output short\n        display = path[:8]\n        suffix = \"...\" if len(path) > 8 else \"\"\n        print(f\"  Query {i}: {display}{suffix}  ({len(path)} hops)\")\n\n    print()\n    print(\"Key observation:\")\n    print(\"  Low recall on a random graph is expected — random edges\")\n    print(\"  have no spatial coherence, causing zig-zag paths and\")\n    print(\"  local minima far from the true nearest neighbor.\")\n    print(\"  Exercise 2 will show why a MIX of short+long edges fixes this.\")\n"}, {"filename": "ex02_short_vs_long_edge_ratio_explorer.py", "content": "\"\"\"\nExercise 2: Short vs. Long Edge Ratio Explorer\n===============================================\nModule 1 — Graph-Based ANN Search: The Core Abstraction\n\nThis exercise explores the key insight from Milgram's six-degrees-of-separation\nexperiment applied to vector search: effective ANN graphs need BOTH short edges\n(for local accuracy) and long edges (for global reachability).\n\nThe provided build_mixed_graph() function creates a graph with:\n  - floor(M * short_ratio) nearest-neighbor edges  (structure)\n  - M - floor(M * short_ratio) random edges        (long range)\n\nYou will implement:\n  1. analyze_results(results)      — identify the optimal ratio and explain the tradeoff\n  2. compute_reachability(graph)   — BFS from entry node to measure connected fraction\n  3. explain_failure_modes(...)    — compare behavior at extremes (0.0 vs 1.0)\n\nExpected milestone output:\n  A table of recall@10 and reachability for each short_ratio,\n  with the optimal ratio clearly identified.\n  Output must contain: \"optimal ratio\"\n\"\"\"\n\nimport os\nimport math\nimport random\nimport time\nfrom collections import deque\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 300  if VERIFY else 3_000   # full: 3000 vectors\nN_QUERIES = 20   if VERIFY else 150     # full: 150 queries\nDIM       = 16   if VERIFY else 64      # full: 64-dimensional\nM         = 8    if VERIFY else 10      # full: 10 edges per node\nK         = 10                          # neighbors to retrieve\n\nSHORT_RATIOS = [0.0, 0.2, 0.4, 0.5, 0.6, 0.8, 1.0]\n\n\n# ---------------------------------------------------------------------------\n# GraphIndex — provided\n# ---------------------------------------------------------------------------\n\nclass GraphIndex:\n    def __init__(self, vectors: np.ndarray, M: int):\n        self.vectors = vectors\n        self.M = M\n        self.n = len(vectors)\n        self.adjacency: dict[int, list[int]] = {i: [] for i in range(self.n)}\n\n    def add_edge(self, u: int, v: int) -> None:\n        if v not in self.adjacency[u]:\n            self.adjacency[u].append(v)\n\n    def get_neighbors(self, node: int) -> list[int]:\n        return self.adjacency[node]\n\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    return float(np.sqrt(np.sum((a - b) ** 2)))\n\n\ndef brute_force_knn(vectors: np.ndarray, query: np.ndarray, k: int) -> list[int]:\n    dists = np.sqrt(np.sum((vectors - query) ** 2, axis=1))\n    return list(np.argsort(dists)[:k])\n\n\n# ---------------------------------------------------------------------------\n# build_mixed_graph — provided, do not modify\n# ---------------------------------------------------------------------------\n\ndef build_mixed_graph(vectors: np.ndarray, M: int, short_ratio: float) -> GraphIndex:\n    \"\"\"\n    Build a graph with a mix of short (nearest-neighbor) and long (random) edges.\n\n    Parameters\n    ----------\n    vectors     : np.ndarray, shape (n, d)\n    M           : int — total edges per node\n    short_ratio : float in [0, 1] — fraction of edges that are nearest-neighbor\n\n    Returns\n    -------\n    GraphIndex with floor(M * short_ratio) NN edges + remaining random edges.\n    \"\"\"\n    n = len(vectors)\n    n_short = math.floor(M * short_ratio)\n    n_long  = M - n_short\n    graph   = GraphIndex(vectors, M)\n\n    for i in range(n):\n        # -- Short edges: connect to n_short nearest neighbors --\n        if n_short > 0:\n            dists = np.sqrt(np.sum((vectors - vectors[i]) ** 2, axis=1))\n            dists[i] = float('inf')              # exclude self\n            nn_indices = list(np.argsort(dists)[:n_short])\n            for j in nn_indices:\n                graph.add_edge(i, j)\n        else:\n            nn_indices = []\n\n        # -- Long edges: random nodes not already chosen --\n        if n_long > 0:\n            remaining = [j for j in range(n) if j != i and j not in nn_indices]\n            chosen_long = random.sample(remaining, min(n_long, len(remaining)))\n            for j in chosen_long:\n                graph.add_edge(i, j)\n\n    return graph\n\n\n# ---------------------------------------------------------------------------\n# greedy_search — provided (from Exercise 1 solution), do not modify\n# ---------------------------------------------------------------------------\n\ndef greedy_search(\n    graph: GraphIndex,\n    query: np.ndarray,\n    entry_node: int,\n    k: int,\n) -> tuple[list[int], list[int]]:\n    visited = set()\n    current = entry_node\n    best_dist = euclidean_distance(query, graph.vectors[current])\n    path = [current]\n    seen: dict[int, float] = {current: best_dist}\n\n    while True:\n        visited.add(current)\n        neighbors = graph.get_neighbors(current)\n        best_neighbor = None\n        best_neighbor_dist = float('inf')\n        for nb in neighbors:\n            if nb in visited:\n                continue\n            d = euclidean_distance(query, graph.vectors[nb])\n            seen[nb] = d\n            if d < best_neighbor_dist:\n                best_neighbor_dist = d\n                best_neighbor = nb\n        if best_neighbor is None or best_neighbor_dist >= best_dist:\n            break\n        current = best_neighbor\n        best_dist = best_neighbor_dist\n        path.append(current)\n\n    sorted_nodes = sorted(seen.items(), key=lambda x: x[1])\n    return [node for node, _ in sorted_nodes[:k]], path\n\n\n# ---------------------------------------------------------------------------\n# TODO 1: compute_reachability\n# ---------------------------------------------------------------------------\n\ndef compute_reachability(graph: GraphIndex, entry_node: int) -> float:\n    \"\"\"\n    Measure what fraction of the graph is reachable from `entry_node`\n    via directed edges (BFS).\n\n    A graph with low reachability means some nodes are unreachable from\n    the entry point, guaranteeing that queries targeting those nodes fail.\n\n    Parameters\n    ----------\n    graph      : GraphIndex\n    entry_node : int\n\n    Returns\n    -------\n    float in [0, 1] — reachable_count / graph.n\n\n    Hints\n    -----\n    - Use a deque as your BFS queue, starting with entry_node.\n    - Maintain a visited set to avoid revisiting nodes.\n    - For each node dequeued, enqueue all unvisited neighbors.\n    - At the end: return len(visited) / graph.n\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~12 lines                              #\n    #                                                         #\n    # Template:                                               #\n    #   visited = set()                                       #\n    #   queue = deque([entry_node])                           #\n    #   visited.add(entry_node)                               #\n    #   while queue:                                          #\n    #       node = queue.popleft()                            #\n    #       for nb in graph.get_neighbors(node):              #\n    #           if nb not in visited:                         #\n    #               visited.add(nb)                           #\n    #               queue.append(nb)                          #\n    #   return len(visited) / graph.n                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2: analyze_results\n# ---------------------------------------------------------------------------\n\ndef analyze_results(results: list[dict]) -> str:\n    \"\"\"\n    Identify the optimal short_ratio and explain the short/long edge tradeoff.\n\n    Parameters\n    ----------\n    results : list[dict], each dict has keys:\n        'short_ratio'   : float\n        'recall@10'     : float\n        'reachability'  : float\n\n    Returns\n    -------\n    str — a multi-line analysis identifying:\n        1. Which ratio produced the best recall (the \"optimal ratio\")\n        2. Why pure short edges fail (reachability collapses)\n        3. Why pure long edges fail (recall stays low even though reachable)\n        4. The sweet spot and its characteristics\n\n    Hints\n    -----\n    - Find the dict with the highest recall@10 — that's your optimal.\n    - Compare reachability at short_ratio=1.0 vs short_ratio=0.0.\n    - Reference actual numbers from the results list.\n    - The output MUST contain the phrase \"optimal ratio\".\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~8 lines                              #\n    #                                                         #\n    # Hint: use max(results, key=lambda r: r['recall@10'])    #\n    # to find the best row, then format a string with the     #\n    # actual values from the results.                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3: explain_failure_modes\n# ---------------------------------------------------------------------------\n\ndef explain_failure_modes(\n    low_ratio_stats: dict,\n    high_ratio_stats: dict,\n) -> str:\n    \"\"\"\n    Explain in plain language why both extremes of short_ratio fail.\n\n    Parameters\n    ----------\n    low_ratio_stats  : dict with 'short_ratio', 'recall@10', 'reachability'\n                       (the short_ratio=0.0 row — all random/long edges)\n    high_ratio_stats : dict with 'short_ratio', 'recall@10', 'reachability'\n                       (the short_ratio=1.0 row — all nearest-neighbor edges)\n\n    Returns\n    -------\n    str — explanation of why each extreme fails, referencing actual numbers.\n\n    Hints\n    -----\n    - All-long (low_ratio): connected but no local precision → low recall\n    - All-short (high_ratio): locally precise but globally disconnected\n    - Reference 'reachability' for the disconnection point\n    - Reference 'recall@10' for the accuracy point\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~6 lines                              #\n    #                                                         #\n    # Format a multi-line string explaining:                  #\n    # 1. All-long edges: high reachability but zig-zag search #\n    # 2. All-short edges: precise locally but disconnected    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Evaluation + __main__ — provided, do not modify\n# ---------------------------------------------------------------------------\n\ndef compute_recall(retrieved: list[int], gt: list[int], k: int) -> float:\n    return len(set(retrieved[:k]) & set(gt[:k])) / k\n\n\ndef evaluate_graph(\n    graph: GraphIndex,\n    queries: np.ndarray,\n    ground_truth: list[list[int]],\n    entry_node: int,\n    k: int,\n) -> float:\n    recalls = []\n    for q, gt in zip(queries, ground_truth):\n        results, _ = greedy_search(graph, q, entry_node, k)\n        recalls.append(compute_recall(results, gt, k))\n    return float(np.mean(recalls))\n\n\nif __name__ == \"__main__\":\n    rng = np.random.default_rng(42)\n    random.seed(42)\n\n    print(\"=\" * 60)\n    print(\"Exercise 2: Short vs. Long Edge Ratio Explorer\")\n    print(\"=\" * 60)\n    print(f\"  Vectors: {N_VECTORS}  |  dim: {DIM}  |  M={M}  |  k={K}\")\n    if VERIFY:\n        print(\"  [FAST VERIFY MODE — using small params]\")\n    print()\n\n    vectors = rng.standard_normal((N_VECTORS, DIM)).astype(np.float32)\n    queries = rng.standard_normal((N_QUERIES, DIM)).astype(np.float32)\n\n    print(\"Computing ground truth...\")\n    ground_truth = [brute_force_knn(vectors, q, K) for q in queries]\n\n    centroid = vectors.mean(axis=0)\n    entry_node = int(np.argmin(np.linalg.norm(vectors - centroid, axis=1)))\n\n    # Sweep short_ratio values\n    print(\"\\nSweeping short_ratio values (this may take a moment)...\\n\")\n    results = []\n    header = f\"{'short_ratio':>12}  {'recall@10':>10}  {'reachability':>13}\"\n    print(header)\n    print(\"-\" * len(header))\n\n    for sr in SHORT_RATIOS:\n        graph = build_mixed_graph(vectors, M, sr)\n        recall = evaluate_graph(graph, queries, ground_truth, entry_node, K)\n        reach  = compute_reachability(graph, entry_node)\n        row = {\"short_ratio\": sr, \"recall@10\": recall, \"reachability\": reach}\n        results.append(row)\n        print(f\"       {sr:>6.1f}  {recall:>10.3f}  {reach:>13.3f}\")\n\n    print()\n\n    # Student analysis\n    analysis = analyze_results(results)\n    print(\"=== Analysis ===\")\n    print(analysis)\n    print()\n\n    low_ratio_stats  = results[0]   # short_ratio = 0.0\n    high_ratio_stats = results[-1]  # short_ratio = 1.0\n    failure_explanation = explain_failure_modes(low_ratio_stats, high_ratio_stats)\n    print(\"=== Failure Modes ===\")\n    print(failure_explanation)\n"}, {"filename": "ex03_beam_search_expanding_the_search_frontier.py", "content": "\"\"\"\nExercise 3: Beam Search — Expanding the Search Frontier\n========================================================\nModule 1 — Graph-Based ANN Search: The Core Abstraction\n\nGreedy search maintains exactly ONE candidate at a time. This is fast\nbut fragile: a single wrong step can strand the search in a dead-end\nlocal minimum with no recovery.\n\nBeam search maintains a sorted list of L candidates simultaneously.\nAt each step, the closest UNVISITED candidate is expanded — its\nneighbors are added to the candidate list (keeping only the top L).\nThis provides multiple recovery paths when the greedy choice fails.\n\nYou will implement:\n  beam_search(graph, query, entry_node, k, beam_width)\n\nThen the __main__ block will compare greedy (beam_width=1) against\nlarger beam widths and show the recall-vs-nodes-visited tradeoff.\n\nExpected milestone output table with \"beam_width\" in the header:\n  beam_width | recall@10 | nodes_visited\n  ---------  | --------- | -------------\n  1          | ~0.50     | ~12\n  50         | ~0.85     | ~175\n  200        | ~0.95     | ~580\n\nThe sublinear nodes_visited is the whole point: 95% recall while\nexamining less than 12% of the dataset.\n\"\"\"\n\nimport os\nimport math\nimport random\nimport heapq\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 300  if VERIFY else 3_000   # full: 3000 vectors\nN_QUERIES = 20   if VERIFY else 150     # full: 150 queries\nDIM       = 16   if VERIFY else 64      # full: 64-dimensional\nM         = 8    if VERIFY else 10      # full: 10 edges per node\nK         = 10\n\nBEAM_WIDTHS = [1, 10, 25, 50, 100, 200]\n\n\n# ---------------------------------------------------------------------------\n# GraphIndex + helpers — provided\n# ---------------------------------------------------------------------------\n\nclass GraphIndex:\n    def __init__(self, vectors: np.ndarray, M: int):\n        self.vectors = vectors\n        self.M = M\n        self.n = len(vectors)\n        self.adjacency: dict[int, list[int]] = {i: [] for i in range(self.n)}\n\n    def add_edge(self, u: int, v: int) -> None:\n        if v not in self.adjacency[u]:\n            self.adjacency[u].append(v)\n\n    def get_neighbors(self, node: int) -> list[int]:\n        return self.adjacency[node]\n\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    return float(np.sqrt(np.sum((a - b) ** 2)))\n\n\ndef brute_force_knn(vectors: np.ndarray, query: np.ndarray, k: int) -> list[int]:\n    dists = np.sqrt(np.sum((vectors - query) ** 2, axis=1))\n    return list(np.argsort(dists)[:k])\n\n\ndef build_mixed_graph(vectors: np.ndarray, M: int, short_ratio: float) -> GraphIndex:\n    \"\"\"Build a graph with a mix of NN (short) and random (long) edges.\"\"\"\n    n = len(vectors)\n    n_short = math.floor(M * short_ratio)\n    n_long  = M - n_short\n    graph   = GraphIndex(vectors, M)\n    for i in range(n):\n        if n_short > 0:\n            dists = np.sqrt(np.sum((vectors - vectors[i]) ** 2, axis=1))\n            dists[i] = float('inf')\n            nn_indices = list(np.argsort(dists)[:n_short])\n            for j in nn_indices:\n                graph.add_edge(i, j)\n        else:\n            nn_indices = []\n        if n_long > 0:\n            remaining = [j for j in range(n) if j != i and j not in nn_indices]\n            for j in random.sample(remaining, min(n_long, len(remaining))):\n                graph.add_edge(i, j)\n    return graph\n\n\n# Greedy (beam_width=1) for comparison — provided\ndef greedy_search(graph, query, entry_node, k):\n    visited = set()\n    current = entry_node\n    best_dist = euclidean_distance(query, graph.vectors[current])\n    path = [current]\n    seen = {current: best_dist}\n    while True:\n        visited.add(current)\n        best_nb, best_nb_dist = None, float('inf')\n        for nb in graph.get_neighbors(current):\n            if nb in visited:\n                continue\n            d = euclidean_distance(query, graph.vectors[nb])\n            seen[nb] = d\n            if d < best_nb_dist:\n                best_nb_dist = d\n                best_nb = nb\n        if best_nb is None or best_nb_dist >= best_dist:\n            break\n        current = best_nb\n        best_dist = best_nb_dist\n        path.append(current)\n    sorted_nodes = sorted(seen.items(), key=lambda x: x[1])\n    return [node for node, _ in sorted_nodes[:k]], len(path)\n\n\n# ---------------------------------------------------------------------------\n# TODO: beam_search\n# ---------------------------------------------------------------------------\n\ndef beam_search(\n    graph: GraphIndex,\n    query: np.ndarray,\n    entry_node: int,\n    k: int,\n    beam_width: int,\n) -> tuple[list[int], int]:\n    \"\"\"\n    Beam search: maintain a candidate list of up to `beam_width` nodes.\n\n    At each step:\n      1. Pop the closest UNVISITED candidate from the list.\n      2. Mark it visited.\n      3. Add all its unvisited neighbors to the candidate list\n         (computing their distances to query).\n      4. If the candidate list exceeds beam_width, keep only the\n         beam_width closest nodes.\n      5. Stop when all candidates are visited (list is empty or all seen).\n\n    Parameters\n    ----------\n    graph      : GraphIndex\n    query      : np.ndarray, shape (d,)\n    entry_node : int\n    k          : int — number of results to return\n    beam_width : int — maximum number of active candidates (L parameter)\n\n    Returns\n    -------\n    (results, nodes_visited)\n      results       : list[int] — top-k node ids, nearest-first\n      nodes_visited : int — number of distinct nodes expanded\n\n    Common mistakes to avoid\n    ------------------------\n    - Inserting ALL neighbors without a size limit → memory explosion\n    - Not deduplicating with all_seen → computing distances redundantly\n    - Confusing beam_width (search effort) with k (result count)\n    - Stopping when the heap is empty instead of when all candidates\n      in the heap have been visited\n\n    Hints\n    -----\n    - Use a min-heap (heapq) on (distance, node_id) for the candidate list.\n    - Maintain an `all_seen` dict: node_id → distance (avoids re-computing).\n    - Maintain a `visited` set for nodes already expanded.\n    - After popping a node, skip it if already in `visited`.\n    - Trim heap to beam_width using heapq.nsmallest + heapify.\n    - At the end, sort all_seen by distance and return top k.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~22 lines                              #\n    #                                                         #\n    # Template:                                               #\n    #   entry_dist = euclidean_distance(query, vectors[entry])#\n    #   candidates = [(entry_dist, entry_node)]    # min-heap #\n    #   all_seen = {entry_node: entry_dist}                   #\n    #   visited = set()                                       #\n    #   nodes_visited = 0                                     #\n    #                                                         #\n    #   while candidates:                                     #\n    #       dist, node = heapq.heappop(candidates)            #\n    #       if node in visited: continue                      #\n    #       visited.add(node)                                 #\n    #       nodes_visited += 1                                #\n    #                                                         #\n    #       for nb in graph.get_neighbors(node):              #\n    #           if nb not in all_seen:                        #\n    #               nb_dist = euclidean_distance(...)         #\n    #               all_seen[nb] = nb_dist                    #\n    #               heapq.heappush(candidates, (nb_dist, nb)) #\n    #                                                         #\n    #       # Trim to beam_width                              #\n    #       if len(candidates) > beam_width:                  #\n    #           candidates = heapq.nsmallest(beam_width, ...) #\n    #           heapq.heapify(candidates)                     #\n    #                                                         #\n    #   sorted_nodes = sorted(all_seen.items(), key=...)      #\n    #   results = [node for node, _ in sorted_nodes[:k]]     #\n    #   return results, nodes_visited                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__ — provided, do not modify\n# ---------------------------------------------------------------------------\n\ndef compute_recall(retrieved: list[int], gt: list[int], k: int) -> float:\n    return len(set(retrieved[:k]) & set(gt[:k])) / k\n\n\nif __name__ == \"__main__\":\n    rng = np.random.default_rng(42)\n    random.seed(42)\n\n    print(\"=\" * 60)\n    print(\"Exercise 3: Beam Search — Expanding the Search Frontier\")\n    print(\"=\" * 60)\n    print(f\"  Vectors: {N_VECTORS}  |  dim: {DIM}  |  M={M}  |  k={K}\")\n    if VERIFY:\n        print(\"  [FAST VERIFY MODE — using small params]\")\n    print()\n\n    vectors = rng.standard_normal((N_VECTORS, DIM)).astype(np.float32)\n    queries = rng.standard_normal((N_QUERIES, DIM)).astype(np.float32)\n\n    print(\"Computing ground truth...\")\n    ground_truth = [brute_force_knn(vectors, q, K) for q in queries]\n\n    # Use the best ratio from Exercise 2 (~0.5-0.6)\n    SHORT_RATIO = 0.55\n    print(f\"Building mixed graph (short_ratio={SHORT_RATIO})...\")\n    graph = build_mixed_graph(vectors, M, SHORT_RATIO)\n\n    centroid = vectors.mean(axis=0)\n    entry_node = int(np.argmin(np.linalg.norm(vectors - centroid, axis=1)))\n\n    print(f\"\\nComparing greedy vs beam search for k={K}\\n\")\n    header = f\"{'beam_width':>12} | {'recall@10':>10} | {'avg_nodes_visited':>18} | {'% of total':>10}\"\n    print(header)\n    print(\"-\" * len(header))\n\n    for bw in BEAM_WIDTHS:\n        recalls = []\n        nodes_visited_list = []\n        for q, gt in zip(queries, ground_truth):\n            results, nv = beam_search(graph, q, entry_node, K, bw)\n            recalls.append(compute_recall(results, gt, K))\n            nodes_visited_list.append(nv)\n        avg_recall = float(np.mean(recalls))\n        avg_nodes  = float(np.mean(nodes_visited_list))\n        pct        = 100.0 * avg_nodes / N_VECTORS\n        print(f\"{bw:>12} | {avg_recall:>10.3f} | {avg_nodes:>18.1f} | {pct:>9.1f}%\")\n\n    print()\n    print(\"Key observations:\")\n    print(f\"  1. Sublinear visits: beam_width=200 visits < {100*200/N_VECTORS:.0f}% of nodes.\")\n    print(  \"  2. Diminishing returns: biggest recall gains come from first few beam slots.\")\n    print(  \"  3. beam_width is the recall-latency knob — production systems expose this\")\n    print(  \"     as ef_search (HNSW) or L (DiskANN). Larger = better recall, higher cost.\")\n    print()\n    print(\"This is the core ANN promise: high recall in sublinear time.\")\n"}, {"filename": "ex04_debugging_a_broken_greedy_search.py", "content": "\"\"\"\nExercise 4: Debugging a Broken Greedy Search\n=============================================\nModule 1 — Graph-Based ANN Search: The Core Abstraction\n\nThis exercise contains a complete GraphIndex with three subtle bugs.\nEach bug independently degrades recall; together they cause catastrophic failure.\n\nYour job: find and fix all three bugs, measuring recall before and after each fix.\n\nExpected output (after all fixes):\n  Bug 1 fixed: recall 0.08 -> 0.35\n  Bug 2 fixed: recall 0.35 -> 0.61\n  Bug 3 fixed: recall 0.61 -> 0.82\n  ...\n  Bug 3 fixed\n\nKey lesson: Small implementation details — distance metric, visited-set ordering,\nentry point selection — have outsized effects on graph search quality.\nDebugging ANN systems requires understanding the algorithm's invariants.\n\nHOW TO FIND THE BUGS:\n  Search for \"# BUG\" comments in this file. Each bug location has:\n    # BUG N: symptom description\n  Right below each BUG comment is the broken code.\n  Below the broken code is a hint comment and a NotImplementedError.\n  Replace the broken code with the correct implementation.\n\n  There are exactly 3 bugs. Fix them in order (Bug 1 → Bug 2 → Bug 3)\n  to see the progressive recall improvement.\n\"\"\"\n\nimport os\nimport math\nimport random\nimport heapq\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 300  if VERIFY else 3_000   # full: 3000 vectors\nN_QUERIES = 20   if VERIFY else 150     # full: 150 queries\nDIM       = 16   if VERIFY else 64      # full: 64-dimensional\nM         = 8    if VERIFY else 10      # full: 10 edges per node\nK         = 10\n\n\n# ---------------------------------------------------------------------------\n# GraphIndex — provided, do not modify\n# ---------------------------------------------------------------------------\n\nclass GraphIndex:\n    def __init__(self, vectors: np.ndarray, M: int):\n        self.vectors = vectors\n        self.M = M\n        self.n = len(vectors)\n        self.adjacency: dict[int, list[int]] = {i: [] for i in range(self.n)}\n\n    def add_edge(self, u: int, v: int) -> None:\n        if v not in self.adjacency[u]:\n            self.adjacency[u].append(v)\n\n    def get_neighbors(self, node: int) -> list[int]:\n        return self.adjacency[node]\n\n\ndef brute_force_knn(vectors: np.ndarray, query: np.ndarray, k: int) -> list[int]:\n    dists = np.sqrt(np.sum((vectors - query) ** 2, axis=1))\n    return list(np.argsort(dists)[:k])\n\n\ndef compute_recall(retrieved: list[int], gt: list[int], k: int) -> float:\n    return len(set(retrieved[:k]) & set(gt[:k])) / k\n\n\ndef build_mixed_graph(vectors: np.ndarray, M: int, short_ratio: float = 0.55) -> GraphIndex:\n    n = len(vectors)\n    n_short = math.floor(M * short_ratio)\n    n_long  = M - n_short\n    graph   = GraphIndex(vectors, M)\n    for i in range(n):\n        if n_short > 0:\n            dists = np.sqrt(np.sum((vectors - vectors[i]) ** 2, axis=1))\n            dists[i] = float('inf')\n            nn_indices = list(np.argsort(dists)[:n_short])\n            for j in nn_indices:\n                graph.add_edge(i, j)\n        else:\n            nn_indices = []\n        if n_long > 0:\n            remaining = [j for j in range(n) if j != i and j not in nn_indices]\n            for j in random.sample(remaining, min(n_long, len(remaining))):\n                graph.add_edge(i, j)\n    return graph\n\n\n# ---------------------------------------------------------------------------\n# The Broken Implementation\n# (contains 3 bugs — your task is to find and fix each one)\n# ---------------------------------------------------------------------------\n\n# BUG 1: Wrong distance metric\n# Symptom: recall@10 is extremely low (~0.08) even on a well-structured graph.\n#          The graph was BUILT with Euclidean distance, but queries use a different metric.\n#          Two different metrics = navigating a map with the wrong coordinate system.\n\ndef buggy_distance(a: np.ndarray, b: np.ndarray) -> float:\n    ###########################################################\n    # YOUR CODE HERE — ~2 lines                               #\n    # Fix: this function currently computes Manhattan (L1)    #\n    # distance but should compute Euclidean (L2) distance.    #\n    # The graph was built with L2 — queries must use L2 too.  #\n    ###########################################################\n    return float(np.sum(np.abs(a - b)))   # BUG: L1 (Manhattan), should be L2\n    ###########################################################\n\n\ndef broken_greedy_search(\n    graph: GraphIndex,\n    query: np.ndarray,\n    entry_node: int,\n    k: int,\n) -> tuple[list[int], int]:\n    \"\"\"Greedy search with BUG 2 (visited check in wrong place).\"\"\"\n    visited: set[int] = set()\n    current = entry_node\n    best_dist = buggy_distance(query, graph.vectors[current])\n    seen: dict[int, float] = {current: best_dist}\n\n    while True:\n        # BUG 2: Visited check happens AFTER expanding neighbors\n        # Symptom: nodes are expanded multiple times. Each expansion adds neighbors\n        #          again, causing exponential blowup in visited nodes and oscillation.\n        #          The correct place to check is BEFORE expanding.\n        neighbors = graph.get_neighbors(current)\n        visited.add(current)   # BUG: should be checked at the TOP of the loop\n\n        best_nb, best_nb_dist = None, float('inf')\n        for nb in neighbors:\n            ###########################################################\n            # YOUR CODE HERE — ~3 lines                               #\n            # Fix: Add a check here to skip neighbors already in      #\n            # `visited` BEFORE computing their distances.             #\n            # Without this check, the loop will re-expand nodes and   #\n            # the search can oscillate between already-visited nodes.  #\n            ###########################################################\n            # Missing visited check! (BUG 2 location)\n            d = buggy_distance(query, graph.vectors[nb])\n            seen[nb] = d\n            if d < best_nb_dist:\n                best_nb_dist = d\n                best_nb = nb\n\n        if best_nb is None or best_nb_dist >= best_dist:\n            break\n        current = best_nb\n        best_dist = best_nb_dist\n\n    sorted_nodes = sorted(seen.items(), key=lambda x: x[1])\n    return [node for node, _ in sorted_nodes[:k]], len(visited)\n\n\ndef evaluate(\n    graph: GraphIndex,\n    queries: np.ndarray,\n    ground_truth: list[list[int]],\n    entry_node: int,\n    k: int,\n    search_fn,\n) -> float:\n    \"\"\"Evaluate a search function, return mean recall@k.\"\"\"\n    recalls = []\n    for q, gt in zip(queries, ground_truth):\n        results, _ = search_fn(graph, q, entry_node, k)\n        recalls.append(compute_recall(results, gt, k))\n    return float(np.mean(recalls))\n\n\n# ---------------------------------------------------------------------------\n# Fixed versions — implement these after identifying each bug\n# ---------------------------------------------------------------------------\n\ndef fixed_distance(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"\n    TODO: Fix Bug 1 here.\n    Replace the Manhattan distance with Euclidean distance.\n\n    Hint: Euclidean distance = sqrt(sum((a - b)^2))\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~2 lines                               #\n    ###########################################################\n    raise NotImplementedError(\"Fix Bug 1: use Euclidean (L2) distance\")\n    ###########################################################\n\n\ndef fixed_search_bug2(\n    graph: GraphIndex,\n    query: np.ndarray,\n    entry_node: int,\n    k: int,\n) -> tuple[list[int], int]:\n    \"\"\"\n    TODO: Fix Bug 2 here (visited check ordering).\n    Use fixed_distance (from Bug 1 fix) and correct visited check placement.\n\n    The visited check must happen at the TOP of the while loop body,\n    BEFORE calling get_neighbors(current).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~15 lines                              #\n    #                                                         #\n    # Copy the structure from broken_greedy_search, but:      #\n    # 1. Use fixed_distance() instead of buggy_distance()     #\n    # 2. Move visited.add(current) to the TOP of the loop     #\n    # 3. Check `if nb in visited: continue` inside the loop   #\n    ###########################################################\n    raise NotImplementedError(\"Fix Bug 2: move visited check to top of loop\")\n    ###########################################################\n\n\ndef find_entry_node(vectors: np.ndarray) -> int:\n    \"\"\"\n    TODO: Fix Bug 3 here — compute a better entry node.\n\n    Bug 3: The code below always uses node 0 as the entry point.\n    Node 0 is arbitrary — it could be at the extreme corner of the\n    data distribution. Queries targeting the opposite corner must\n    traverse the full graph diameter just to get started.\n\n    Fix: Compute the medoid — the node closest to the centroid.\n    This minimizes average distance to all other nodes, making it\n    a better universal starting point for any query.\n\n    Hint:\n      centroid = vectors.mean(axis=0)\n      dists_to_centroid = np.linalg.norm(vectors - centroid, axis=1)\n      return int(np.argmin(dists_to_centroid))\n    \"\"\"\n    # BUG 3: always returns node 0 regardless of data distribution\n    return 0  # BUG: should be the centroid-nearest node\n    ###########################################################\n    # YOUR CODE HERE — ~3 lines                               #\n    # Fix: compute and return the centroid-nearest node       #\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__ — provided, do not modify\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    rng = np.random.default_rng(42)\n    random.seed(42)\n\n    print(\"=\" * 60)\n    print(\"Exercise 4: Debugging a Broken Greedy Search\")\n    print(\"=\" * 60)\n    print(f\"  Vectors: {N_VECTORS}  |  dim: {DIM}  |  M={M}  |  k={K}\")\n    if VERIFY:\n        print(\"  [FAST VERIFY MODE — using small params]\")\n    print()\n\n    vectors = rng.standard_normal((N_VECTORS, DIM)).astype(np.float32)\n    queries = rng.standard_normal((N_QUERIES, DIM)).astype(np.float32)\n\n    print(\"Computing ground truth (brute force)...\")\n    ground_truth = [brute_force_knn(vectors, q, K) for q in queries]\n\n    print(\"Building graph (mixed edges, correct metric)...\")\n    graph = build_mixed_graph(vectors, M)\n    print()\n\n    # --- Baseline: all bugs present ---\n    buggy_entry = 0  # Bug 3: always node 0\n    recall_buggy = evaluate(graph, queries, ground_truth, buggy_entry, K,\n                            broken_greedy_search)\n    print(f\"Baseline (all bugs):      recall@10 = {recall_buggy:.2f}\")\n    print()\n\n    # --- After Bug 1 fix (distance metric) ---\n    # We test this by making a search that uses fixed_distance but still\n    # has Bug 2 (wrong visited check order) and Bug 3 (node 0 entry).\n    # Since fixed_search_bug2 already uses fixed_distance, use it here\n    # but still with the buggy entry node.\n    try:\n        recall_fix1 = evaluate(graph, queries, ground_truth, buggy_entry, K,\n                               fixed_search_bug2)\n        print(f\"Bug 1 fixed (L2 dist):    recall@10 = {recall_buggy:.2f} -> {recall_fix1:.2f}\")\n    except NotImplementedError:\n        print(\"Bug 1 fix: NotImplementedError — implement fixed_distance()\")\n        recall_fix1 = recall_buggy\n\n    # --- After Bug 2 fix (visited check) ---\n    # fixed_search_bug2 has both Bug 1 and Bug 2 fixed. Still buggy entry.\n    try:\n        recall_fix2 = evaluate(graph, queries, ground_truth, buggy_entry, K,\n                               fixed_search_bug2)\n        print(f\"Bug 2 fixed (visited):    recall@10 = {recall_fix1:.2f} -> {recall_fix2:.2f}\")\n    except NotImplementedError:\n        print(\"Bug 2 fix: NotImplementedError — implement fixed_search_bug2()\")\n        recall_fix2 = recall_fix1\n\n    # --- After Bug 3 fix (entry point) ---\n    try:\n        good_entry = find_entry_node(vectors)\n        recall_fix3 = evaluate(graph, queries, ground_truth, good_entry, K,\n                               fixed_search_bug2)\n        print(f\"Bug 3 fixed (entry):      recall@10 = {recall_fix2:.2f} -> {recall_fix3:.2f}\")\n        print()\n        print(f\"Final recall@10 = {recall_fix3:.2f}  (started at {recall_buggy:.2f})\")\n        print()\n        print(\"Bug 3 fixed: all three bugs corrected!\")\n    except NotImplementedError:\n        print(\"Bug 3 fix: NotImplementedError — implement find_entry_node()\")\n\n    print()\n    print(\"Summary of bugs and their impact:\")\n    print(\"  Bug 1 — L1 vs L2 distance: navigating with the wrong metric\")\n    print(\"          breaks the graph's spatial assumptions.\")\n    print(\"  Bug 2 — visited check after expand: causes node re-expansion,\")\n    print(\"          exponential blowup, and oscillation.\")\n    print(\"  Bug 3 — node 0 as entry: arbitrary start, worst-case paths\")\n    print(\"          traverse the full graph diameter before converging.\")\n"}]}, "module_02_hnsw_the_hierarchical_approach": {"content": "# Module 2: HNSW — The Hierarchical Approach\n\n## Table of Contents\n\n1. [Learning Objectives](#learning-objectives)\n2. [Where We Left Off: The Graph Abstraction](#where-we-left-off-the-graph-abstraction)\n3. [The Small-World Inspiration](#the-small-world-inspiration)\n4. [The Core Insight: Long and Short Edges](#the-core-insight-long-and-short-edges)\n5. [HNSW's Elegant Trick: The Hierarchy](#hnsws-elegant-trick-the-hierarchy)\n6. [Level Assignment: The Exponential Decay](#level-assignment-the-exponential-decay)\n7. [HNSW Insert: Building the Multi-Level Graph](#hnsw-insert-building-the-multi-level-graph)\n8. [HNSW Search: Dropping Down the Levels](#hnsw-search-dropping-down-the-levels)\n9. [Edge Length Analysis: The Emergent Property](#edge-length-analysis-the-emergent-property)\n10. [HNSW at Billion Scale: The Three Fatal Limitations](#hnsw-at-billion-scale-the-three-fatal-limitations)\n11. [Analytical Questions](#analytical-questions)\n12. [Synthesis: Why HNSW Set the Stage](#synthesis-why-hnsw-set-the-stage)\n\n---\n\n## Learning Objectives\n\nBy the end of this module, you will be able to:\n\n1. **Explain** why the small-world phenomenon from sociology directly inspired HNSW's architecture\n2. **Implement** HNSW's exponential-decay level assignment and verify the distribution empirically\n3. **Implement** the full HNSW insert and hierarchical search algorithms from scratch\n4. **Measure** the emergent property of longer edges at higher levels — and explain *why* it emerges without being explicitly programmed\n5. **Quantify** HNSW's three fatal limitations at billion-scale (memory, deletions, storage) and understand exactly why they prevent cost-effective deployment\n\n**Running example throughout this module:** We'll build a HNSW index over 5,000 vectors in 64-dimensional space — small enough to reason about, large enough to see real behavior. By the end, we'll extrapolate to the billion-vector regime and see the walls we hit.\n\n---\n\n## Where We Left Off: The Graph Abstraction\n\nIn Module 1, we established that the graph is the right data structure for ANN search. The key insight: model vectors as nodes, connect related vectors with edges, then traverse greedily from an entry node toward a query, stopping when we reach a local minimum.\n\nWe also saw that a *random* graph doesn't work well. Paths are zig-zagged, local minima trap searches far from the true answer, and the number of hops needed scales poorly. The question we left open: **what edges should we pick?**
