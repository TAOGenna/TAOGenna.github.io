\n\nThe naive answer — connect every node to its $k$ nearest neighbors — gives accurate *short-range* navigation but no *long-range* acceleration. You're stuck exploring the immediate neighborhood of the entry point forever before the query can \"teleport\" to the right region of the embedding space.\n\nThe right answer requires borrowing from an unexpected source: sociology.\n\n---\n\n## The Small-World Inspiration\n\nIn 1967, sociologist Stanley Milgram ran an experiment. He mailed 160 packages to random people in Omaha, Nebraska, asking them to forward the package to a target person in Boston using only personal connections — they could only pass it to someone they knew by first name. The result: most packages arrived in just **5-6 hops**.[^1]\n\nThis is the \"six degrees of separation\" phenomenon. Its mathematical structure is what HNSW exploits:\n\n- The average path length between any two people is **logarithmic** in the population size\n- People achieve this by *first* using long-range connections (acquaintances who bridge different social groups, cities, industries), *then* using short-range connections to converge on the exact target\n\nThink about how you physically travel: highways take you from city to city in the right general direction, then avenues narrow the area, then streets deliver you to the exact doorstep. No single road type does everything.\n\nThe formal translation to our ANN graph:\n\n> **We need long-range edges to navigate to the right region of embedding space quickly, and short-range edges to home in on the exact nearest neighbor accurately.**\n\nThe question is: how do we pick these long-range edges without knowing in advance where all queries will come from?\n\n[^1]: Milgram's actual result was more nuanced — only ~25% of packages arrived, with an average of 5.2 hops for those that did. The \"six degrees\" number comes from later mathematical modeling. The sociological insight remains valid: *logarithmic path lengths emerge from the structure of networks*, not from global knowledge.\n\n---\n\n## The Core Insight: Long and Short Edges\n\nBefore HNSW, one might try an obvious approach: give each node some fraction of \"short\" edges (to nearby vectors) and some fraction of \"random\" edges (likely long-range, since most nodes are definitionally far apart in high-dimensional space). Let's call this the \"mixed edges\" baseline.\n\nThis partially works. But there's a fundamental problem: the random long edges are *truly* random — they might jump to a useful intermediate region, or they might jump somewhere completely irrelevant. Worse, you have no control over whether the graph will have the right *density* of long edges at every scale.\n\nWhat you really want is: **long edges that are long *relative to the local density* of the embedding space, and that collectively provide coverage of the full space at every scale.**\n\nThis is subtle. In an embedding space where 90% of vectors cluster in one small corner, \"long\" should mean \"reaching outside that cluster\" — but after you're inside the cluster, \"long\" should mean \"crossing the cluster quickly.\" A globally fixed edge-length threshold fails for heterogeneous data distributions.\n\nHNSW solves this with a beautiful indirect approach. Instead of explicitly choosing where to put long edges, it **creates the conditions where long edges emerge naturally** from a simple \"connect to nearest neighbors\" rule, applied at multiple scales.\n\n---\n\n## HNSW's Elegant Trick: The Hierarchy\n\nHere is the core idea, stated as simply as possible:\n\n> **Build the same graph multiple times, each time with exponentially fewer nodes. Edges between fewer nodes are naturally longer. Start search at the sparsest level and progressively descend.**\n\nConcretely:\n- **Level 0** contains *all* nodes. Edges connect nearest neighbors — these are short-range.\n- **Level 1** contains a random ~37% of nodes. Edges still connect nearest neighbors at this level — but with fewer nodes, the nearest level-1 neighbor is *farther away* in absolute terms than the nearest level-0 neighbor. So edges are longer.\n- **Level 2** contains ~14% of nodes. Even longer edges.\n- And so on.\n\n![HNSW hierarchy: long edges at top, short at bottom](diagrams/hnsw_hierarchy.svg)\n\nThe magic: **we never explicitly chose longer edges**. We applied the identical \"connect to nearest neighbor\" rule at every level. The longer edges at higher levels are an *emergent property* of having fewer nodes — because when there are only 50 nodes covering the same space as 10,000 nodes, any given node's nearest level-50 neighbor is likely far away.\n\nThis is the $H$ in HNSW: Hierarchical. And it's what makes HNSW work.\n\n**Check your understanding:** Why does uniform random sampling preserve the data distribution at each level? If 80% of vectors cluster in one region, what fraction of level-1 nodes will be in that region? Why does this matter for query accuracy?\n\n---\n\n## Level Assignment: The Exponential Decay\n\nHow do we decide which nodes get assigned to higher levels? HNSW uses **exponential decay**:\n\n$$\\ell = \\lfloor -\\ln(\\text{uniform}(0, 1)) \\cdot m_L \\rfloor$$\n\nLet's unpack this formula step by step.\n\n### Step 1: Draw a uniform random number\n\n$u \\sim \\text{Uniform}(0, 1)$\n\n### Step 2: Take the negative natural log\n\n$-\\ln(u)$\n\nThe natural log of a uniform random variable gives an **exponentially distributed** random variable. Since $u \\in (0, 1)$, $\\ln(u) \\in (-\\infty, 0)$, so $-\\ln(u) \\in (0, \\infty)$. The probability that $-\\ln(u) > t$ is $e^{-t}$.[^2]\n\n### Step 3: Scale by $m_L$\n\n$-\\ln(u) \\cdot m_L$\n\nThe parameter $m_L$ controls the \"decay rate\" — how quickly the probability of being in higher levels drops off. Larger $m_L$ means more nodes per level (slower decay); smaller $m_L$ means fewer nodes at high levels (faster decay).\n\nIn practice, HNSW typically sets $m_L = \\frac{1}{\\ln(M)}$ where $M$ is the degree bound (max edges per node).\n\n### Step 4: Take the floor\n\n$\\ell = \\lfloor -\\ln(u) \\cdot m_L \\rfloor$\n\nThe floor converts the continuous exponential to a discrete level index. Node with level $\\ell$ gets inserted into levels $0, 1, \\ldots, \\ell$.\n\n### The resulting distribution\n\nFor level $\\ell \\geq 0$, the probability that a node is assigned to *at least* level $\\ell$ is:\n\n$$P(\\ell_{\\text{node}} \\geq \\ell) = e^{-\\ell / m_L}$$\n\nThis means the number of nodes at level $\\ell$ is approximately $N \\cdot e^{-\\ell / m_L}$.\n\n| Level | Fraction of nodes | For $N=100{,}000$, $m_L = 1/\\ln(M)$, $M=16$ |\n|-------|------------------|---------------------------------------------|\n| 0 | 1.0 | 100,000 |\n| 1 | $e^{-1/m_L}$ | ~6,250 |\n| 2 | $e^{-2/m_L}$ | ~391 |\n| 3 | $e^{-3/m_L}$ | ~24 |\n\nEach level has roughly $1/M$ times as many nodes as the level below. This is why the graph has $O(\\log N)$ levels — and why search runs in $O(\\log N)$ time.\n\n### Translating to code\n\n```python\nimport math\nimport random\n\ndef assign_level(mL: float) -> int:\n    \"\"\"\n    Draw a level from the HNSW exponential distribution.\n    \n    Args:\n        mL: decay rate parameter, typically 1/ln(M)\n    \n    Returns:\n        Level index (0 = base level, higher = sparser)\n    \"\"\"\n    # -ln(uniform) is exponentially distributed\n    return int(-math.log(random.uniform(0, 1)) * mL)\n```\n\nNotice that `random.uniform(0, 1)` can return exactly 0 in Python (extremely unlikely, probability $\\approx 2^{-53}$), which would make `math.log(0)` undefined. In production, you'd use `random.uniform(1e-10, 1)` or check for this edge case.\n\n[^2]: This transformation — $X = -\\ln(U)$ where $U \\sim \\text{Uniform}(0,1)$ — is the *inverse CDF method* for generating exponential random variables. Since the CDF of an exponential distribution with rate $\\lambda=1$ is $F(x) = 1 - e^{-x}$, we have $F^{-1}(u) = -\\ln(1-u)$. Using $-\\ln(u)$ instead of $-\\ln(1-u)$ works because $1-U$ and $U$ have the same distribution when $U$ is uniform.\n\n**Check your understanding:** What happens to the level distribution if you set $m_L = 0$? Every node gets level 0 — you've collapsed HNSW into a flat graph. What about $m_L \\to \\infty$? Every node gets an astronomically high level — the hierarchy becomes useless because every node appears at every level.\n\n---\n\n## HNSW Insert: Building the Multi-Level Graph\n\nInsertion in HNSW is where the hierarchy gets built. The algorithm:\n\n```\nINSERT(node I, vector v):\n    L_I = assign_level(mL)          # this node's level\n    \n    ep = current_entry_point        # start here\n    \n    # Phase 1: Navigate from top to L_I+1 using beam width 1\n    for level from L_MAX down to L_I + 1:\n        ep = greedy_search(level, query=v, entry=ep, beam_width=1)\n    \n    # Phase 2: At levels L_I down to 0, search AND connect\n    for level from L_I down to 0:\n        neighbors = beam_search(level, query=v, entry=ep, beam_width=ef_construction)\n        \n        # Add bidirectional edges\n        for n in select_neighbors(neighbors, M):\n            add_edge(level, I, n)\n            add_edge(level, n, I)\n            # Trim n's edges to M if it exceeds the bound\n            if degree(level, n) > M:\n                trim_edges(level, n, M)\n        \n        ep = nearest(neighbors)     # descend to next level from here\n    \n    # Update global entry point if I was assigned a higher level\n    if L_I > L_MAX:\n        entry_point = I\n        L_MAX = L_I\n```\n\nLet's trace through a concrete example. Say we have 100 nodes already in the index, and we're inserting node 101 at level 2 (which means it appears at levels 0, 1, and 2). The current entry point is node 42, at level 3.\n\n1. **Phase 1, Level 3:** Greedy search from node 42 at level 3, find the nearest level-3 node to our query. Say we land on node 17.\n2. **Phase 1, Level 3 → Level 2:** Drop to level 2 at node 17.\n3. **Phase 2, Level 2:** Beam search from node 17. Find 20 candidates. Select the $M=16$ best. Add edges: node 101 ↔ those 16 nodes. Trim any that now exceed $M$ edges.\n4. **Phase 2, Level 2 → Level 1:** Drop to the nearest neighbor found at level 2.\n5. **Phase 2, Level 1:** Repeat. With more nodes at level 1, we find more candidates. Add $M$ edges at level 1.\n6. **Phase 2, Level 0:** Repeat. With all nodes, we find the true local neighborhood. Add $M$ final, shortest-range edges.\n\nThe crucial detail: **the node is inserted at all levels from its assigned level *down to 0*, not just at its assigned level.** Forgetting this is the most common implementation mistake.\n\n![HNSW insert: tracing a single node through multiple levels](diagrams/hnsw_insert_trace.svg)\n\n### Common Mistakes\n\n**Mistake 1: Using the same `ef` at all levels.** During search, HNSW uses `beam_width=1` at levels above 0 (just find the approximate nearest to use as the entry point for the next level), and `beam_width=ef` at level 0 (do a thorough search). Using a large beam width at all levels wastes computation; using beam width 1 at level 0 gives poor recall.\n\n**Mistake 2: Forgetting to update the entry point.** If node 101 gets level 5 and the previous max level was 3, the new entry point should be node 101 at level 5. If you don't update this, future searches start at level 3 and completely miss the level-4 and level-5 structure.\n\n**Mistake 3: Not trimming edges bidirectionally.** When you add node I → neighbor N, you also add N → I. This might push N's degree over $M$. You must trim N's edges to $M$ as well, or the graph's degree bound is violated.\n\n---\n\n## HNSW Search: Dropping Down the Levels\n\nSearch mirrors insertion's structure:\n\n```\nSEARCH(query q, k, ef):\n    ep = entry_point\n    \n    # Phase 1: Navigate from L_MAX down to level 1 with beam_width=1\n    for level from L_MAX down to 1:\n        ep = greedy_search(level, query=q, entry=ep, beam_width=1)\n    \n    # Phase 2: Thorough search at level 0\n    candidates = beam_search(level=0, query=q, entry=ep, beam_width=ef)\n    \n    return top_k(candidates, k)\n```\n\nThe `ef` parameter (short for `ef_search` or \"expansion factor\") controls the trade-off between accuracy and speed:\n- **Small `ef`** (e.g., 10): Fast but lower recall — the beam at level 0 is small, so you might miss some true neighbors\n- **Large `ef`** (e.g., 200): Slow but higher recall — you explore more of the level-0 graph\n\nIn Exercise 2, you'll verify that `ef=50` achieves recall@10 > 0.80 on 5,000 vectors in 64D. In production (1M+ vectors, 768D), you'd use `ef` between 64 and 512 depending on your latency budget.\n\n**Check your understanding:** Why does using `beam_width=1` above level 0 make sense? Think about what these levels provide: coarse navigation to the right region. Once you've found the nearest node at level 2, you don't need to exhaustively explore level 2 — you just need a good starting point for level 1.\n\n---\n\n## Edge Length Analysis: The Emergent Property\n\nLet's now verify the key claim empirically: higher HNSW levels have longer edges, even though we never explicitly chose longer edges.\n\nAfter building an HNSW index, we can compute the mean edge length at each level:\n\n```python\ndef compute_edge_stats(hnsw, level):\n    \"\"\"Compute edge length statistics for a given HNSW level.\"\"\"\n    distances = []\n    for node_id, neighbors in hnsw.graph[level].items():\n        v1 = hnsw.vectors[node_id]\n        for neighbor_id in neighbors:\n            v2 = hnsw.vectors[neighbor_id]\n            dist = np.linalg.norm(v1 - v2)\n            distances.append(dist)\n    return {\n        'mean': np.mean(distances),\n        'median': np.median(distances),\n        'std': np.std(distances),\n        'count': len(distances)\n    }\n```\n\nOn a typical run with 10,000 vectors in 128D (as in Exercise 3), you'll see something like:\n\n```\nLevel 0: mean=12.3, median=11.8, std=2.1,  edges=49,832\nLevel 1: mean=18.7, median=17.2, std=4.3,  edges=6,241\nLevel 2: mean=24.1, median=22.8, std=6.8,  edges=391\nLevel 3: mean=31.5, median=28.9, std=9.2,  edges=24\nEdge length ratio L1/L0: 1.52\nEdge length ratio L2/L1: 1.29\nConclusion: Higher levels have longer edges: VERIFIED\n```\n\nThe ratio of mean edge lengths between consecutive levels is roughly constant at 1.3–1.6, which makes intuitive sense: each level has roughly $1/M$ of the nodes ($M \\approx 16$), so the nearest level-neighbor is approximately $M^{1/d}$ times farther away in $d$-dimensional space.[^3]\n\n![Edge length distributions across HNSW levels](diagrams/edge_length_analysis.svg)\n\n### The Data Distribution Preservation Caveat\n\nThe source material makes a subtle but important point:\n\n> \"It's important to note that we're not *intentionally* picking spread-out nodes. It's still uniform sampling, so the data distribution is still the same.\"\n\nThis matters. Consider a dataset where 90% of vectors cluster in one small region and 10% are spread across the rest of the space. In an ideal long-edge scheme, you might be tempted to put only \"representative\" nodes from each cluster at higher levels. But HNSW doesn't do this — it randomly samples.\n\nThe result: the dense cluster still has many representatives at level 1 (about 90% × 37% = 33% of level-1 nodes are in that cluster). This means level-1 edges within that cluster are still relatively short. But that's actually correct behavior — when you're navigating through the dense cluster, you still need finer-grained navigation than if you're navigating across the sparse region.\n\n**Check your understanding:** Suppose you have two clusters: one dense (1,000 vectors in a small ball) and one sparse (100 vectors spread over a large region). After uniform sampling for level 1, roughly how many nodes from each cluster end up at level 1? Will the mean edge length within the dense cluster be shorter or longer than the mean edge length within the sparse cluster at level 1?\n\n[^3]: This $M^{1/d}$ scaling comes from the fact that in $d$ dimensions, the nearest neighbor distance scales as $n^{-1/d}$ where $n$ is the number of points. Going from $n$ to $n/M$ points makes the nearest neighbor approximately $(n/(n/M))^{1/d} = M^{1/d}$ times farther. For $M=16$ and $d=128$, this is $16^{1/128} \\approx 1.022$ — quite small! This is the curse of dimensionality striking again: even reducing the node count by 16x barely changes nearest-neighbor distances in high dimensions. Yet HNSW still works empirically because the *navigability* improvement from fewer nodes matters more than the absolute edge length change.\n\n---\n\n## HNSW at Billion Scale: The Three Fatal Limitations\n\nHNSW works remarkably well for moderate-scale indices. But as we scale to billions of vectors — which real production search engines require — three fundamental design decisions become dealbreakers.\n\n### Limitation 1: Memory-Only Design\n\nHNSW was designed with the assumption that the entire index lives in RAM. The official `hnswlib` library saves and loads the index via memory dumps — essentially `memcpy` to disk and back.\n\nThe arithmetic is brutal. For 1 billion 768-dimensional embeddings using float32:\n\n$$\\text{Vector storage} = 10^9 \\times 768 \\times 4 \\text{ bytes} = 3.072 \\text{ TB}$$\n\nAdd graph edge storage (each node has up to $M$ edges, each stored as a 4-byte integer ID):\n\n$$\\text{Edge storage} = 10^9 \\times M \\times 4 \\text{ bytes} \\approx 64 \\text{ GB for } M=16$$\n\nAdd overhead (allocator fragmentation, metadata, level structure) of ~20%:\n\n$$\\text{Total} \\approx 3.072 \\text{ TB} \\times 1.2 \\approx 3.7 \\text{ TB RAM}$$\n\nThe source material cites **2.8 TB** — consistent with this estimate using the 768-dim case.[^4] \n\nThe cost implications: a single machine with 3 TB RAM costs roughly $50/hour to rent on AWS (High Memory instances). A cluster of such machines for a production system, with redundancy, runs easily into hundreds of dollars per hour.\n\nWhy can't you just use disk? The source material is blunt:\n\n> \"It takes around 100 ns to read memory, and 20,000 ns to read a random 4K SSD page. This is a 200x increase — differences of this magnitude break the assumptions that algorithms build around; one could perform multiple queries from in-memory HNSW before even a single node read request returns.\"\n\nEach hop in the graph requires reading the neighbor list of the current node. With 200x slower random reads from SSD, a search that does 50 hops in memory now takes 50 × 20,000 ns = 1 ms just in disk I/O — before any distance computation. That's already at the latency budget for many use cases, and doesn't account for the computation cost.\n\n### Limitation 2: No True Deletions\n\nThe original HNSW paper provides no deletion mechanism. The official `hnswlib` library implements \"soft deletes\" — marking nodes as deleted and filtering them from results at query time.\n\nThe problem compounds over time. If you delete 10% of your index:\n- 10% of every search path visits \"ghost\" nodes (deleted but still in the graph)\n- These ghosts still occupy memory, still have edges, and still get followed during traversal\n- The effective recall on non-deleted nodes drops because the search budget gets wasted on ghosts\n\nFor a system with continuous updates (a web crawler, a social platform, a product catalog with inventory changes), deletions are unavoidable. At 10% deletion rate:\n\n$$\\text{Wasted search time} \\approx 10\\% \\times \\text{search hops} = 10\\% \\times 50 \\text{ hops} = 5 \\text{ wasted hops per query}$$\n\nAt scale, this 10% performance degradation is unacceptable, and it only grows as more deletions accumulate.\n\nUpdates are equally broken: you can't simply change a vector's values, because all the edges were optimized for the *old* vector position. The correct approach is delete-then-insert, but deletion is already broken.\n\n### Limitation 3: Monolithic Storage Format\n\nBecause `hnswlib` saves the index as a memory dump, any mutation requires:\n\n1. Load the entire index into RAM\n2. Make the mutation (insert/delete/update)\n3. Dump the entire index back to disk\n\nFor a 250 GB index, inserting 10 new vectors (< 1 MB of actual data) requires:\n- 250 GB read from disk into RAM\n- 250 GB write back to disk\n- Total: 500 GB of I/O for < 1 MB of actual change\n\nAt typical SSD write speeds of ~2 GB/s, this is **125 seconds of I/O** for a 10-vector insert. This completely breaks incremental indexing workflows.\n\n### The Combined Cost\n\nLet's put numbers on the alternative. If we could serve the index from SSD instead of RAM:\n\n$$\\text{SSD storage cost} = 3.7 \\text{ TB} \\times \\$0.023\\text{/GB/month} \\approx \\$85\\text{/month}$$\n\n$$\\text{RAM cost} = 3.7 \\text{ TB} \\times \\$8\\text{/GB/month} \\approx \\$29,600\\text{/month}$$\n\nThe ratio: **RAM costs ~350× more than SSD storage** for the same capacity. Even after accounting for the 4-8 servers you'd need for SSD-based serving (due to the 200x latency increase requiring more parallelism), disk-based approaches are roughly **40× cheaper** — exactly the figure cited in the source material for DiskANN vs. HNSW.\n\n**Check your understanding:** Why does the 200x memory/SSD latency gap \"break the assumptions that algorithms build around\"? What assumptions does HNSW make that hold in memory but fail on SSD? Hint: think about how many graph hops a typical HNSW search performs, and what latency budget each hop can afford.\n\n---\n\n## Analytical Questions\n\nThese questions require analysis and synthesis, not just recall. Work through them carefully.\n\n### Question 1: The Hierarchy Depth Trade-off\n\nHNSW has $O(\\log N)$ levels. For $N = 10^9$ vectors with $m_L = 1/\\ln(16) \\approx 0.36$, there will be roughly $\\frac{\\ln(N)}{(1/m_L)} = m_L \\cdot \\ln(N) \\approx 0.36 \\times \\ln(10^9) \\approx 7.5$ levels.\n\nNow consider: what happens if you double $m_L$? The number of levels doubles, but each level has more nodes. Is this better or worse for query time? Construct an argument for why the specific choice $m_L = 1/\\ln(M)$ is near-optimal.\n\n### Question 2: The Density Paradox\n\nSuppose you have a dataset where vectors are clustered into 100 tight groups, with 1,000 vectors per group. When HNSW samples level-1 nodes uniformly, each group contributes ~370 nodes. Within a group, level-1 edges are shorter than level-0 edges (fewer nodes, but the cluster is small so there's less room for edges to grow). This means navigation *within* a cluster at level 1 may not be much faster than at level 0.\n\nVamana's RobustPrune (Module 3) takes a different approach: explicitly preserve edges that are long *relative to what's reachable*. Explain why RobustPrune's design might produce better intra-cluster navigation than HNSW's hierarchy, even without multiple levels.\n\n### Question 3: The Soft-Delete Compounding Effect\n\nModel the following: you start with $N = 10^6$ vectors. Each week, 5% of vectors are deleted (soft-deleted in HNSW) and 5% are inserted. After 20 weeks, what fraction of the HNSW graph consists of deleted \"ghost\" nodes? What is the effective recall@10 if each ghost node wastes one search hop (assume 50 total hops per search, and each hop wasted on a ghost reduces recall by 0.1%)? At what point does the index become operationally unacceptable?\n\n### Question 4: The ef Trade-off Curve\n\nIn Exercise 2, you'll observe that increasing `ef` improves recall but increases latency. The relationship is approximately:\n\n$$\\text{recall}(ef) \\approx 1 - c \\cdot e^{-ef / \\tau}$$\n\nfor some constants $c$ and $\\tau$ that depend on the dataset and index. Sketch the shape of this curve. At what `ef` does the marginal recall improvement per unit of compute drop below 1%? How does this `ef` change as the dataset size grows from 5,000 to 5,000,000 vectors?\n\n---\n\n## Synthesis: Why HNSW Set the Stage\n\nLet's step back and appreciate what HNSW achieved, and why it's still widely used despite its limitations.\n\n### What HNSW Got Right\n\n**The hierarchy solves the long-edge problem elegantly.** By building multiple graphs with exponentially fewer nodes, HNSW gets long-range edges *for free* — no complex optimization, no explicit edge-length objective, just the same nearest-neighbor rule applied at multiple scales. This is an example of **emergent structure**: the system-level property you want (long edges) arising from simple local rules (connect to nearest neighbors at each level).\n\n**The exponential decay is provably optimal for query time.** The $O(\\log N)$ levels with exponentially decreasing node counts gives $O(\\log N)$ search time per level and $O(\\log N)$ levels for $O(\\log^2 N)$ total work — the best achievable by a hierarchical graph-based scheme.\n\n**It empirically works extremely well.** HNSW indices built with $M=16$ and $ef=200$ routinely achieve recall@10 > 0.99 on standard benchmarks like SIFT1M (1 million 128D vectors from SIFT image descriptors) with search times under 1ms on a single CPU core.\n\n### What HNSW Got Wrong (at Scale)\n\nThe three limitations — memory-only, no true deletions, monolithic storage — aren't bugs in HNSW's design per se. They're **inherent consequences of the hierarchical memory-centric design**:\n\n1. **Memory-only follows from the hierarchy**: The multi-level structure requires maintaining separate adjacency lists per level, with complex pointer relationships. This doesn't map cleanly to a disk-friendly layout (where you want each node's data to be contiguous and cache-friendly).\n\n2. **No true deletions follows from graph optimality**: HNSW's edges are chosen to make the graph optimally navigable with the current node set. Removing a node isn't just removing a point — it removes all the navigational shortcuts that ran through that node. HNSW has no algorithm to repair this efficiently.\n\n3. **Monolithic storage follows from the in-memory model**: If you're loading the entire index into RAM anyway, saving/loading as a memory dump is perfectly reasonable. The monolithic format is a symptom of the memory assumption, not a separate design flaw.\n\n### The Path Forward: DiskANN and Vamana\n\nThe next two modules attack HNSW's limitations directly:\n\n- **Module 3 (Vamana/DiskANN):** Vamana's single-graph design with RobustPrune is simpler, disk-friendly (degree bound avoids excessive disk reads), supports true deletion, and empirically builds higher-quality graphs than HNSW with the same number of edges per node.\n\n- **Module 4 (Product Quantization):** Even on disk, you need in-memory distance computation to guide traversal without reading every candidate's full vector. PQ compresses 768D vectors from 3072 bytes to 64 bytes (48× compression), letting you fit 1 billion compressed vectors in ~64 GB of RAM.\n\nThe full DiskANN system achieves what HNSW cannot at billion scale: **1 billion 768D vectors searched in ~15ms from disk, on a single machine with 96 GB RAM, at 40× lower cost than equivalent HNSW clusters**.\n\nThat's the goal we're building toward. The hierarchy was the first great idea. Now we'll see why it's not the last one needed.\n\n---\n\n## Exercises in This Module\n\n| Exercise | Concept | What You Build |\n|----------|---------|----------------|\n| **ex01** | Exponential decay level assignment | `assign_level()`, distribution verification |\n| **ex02** | HNSW insert and hierarchical search | Full `hnsw_insert()` and `hnsw_search()`, recall@10 > 0.80 |\n| **ex03** | Edge length analysis | Per-level stats, ratio verification, analytical questions |\n| **ex04** | Billion-scale limitation calculator | Memory/cost/deletion overhead quantification |\n\nWork through them in order — each exercise builds on the intuition from the previous one, and Exercise 4's numbers ground all three limitations in concrete arithmetic you compute yourself.\n\n---\n\n*Next module: Vamana and RobustPrune — A Better Graph Without Hierarchy. We'll see why a single flat graph with the right pruning algorithm can beat HNSW's hierarchy, and how RobustPrune creates the disk-friendly degree bounds that make billion-scale disk-native search possible.*\n", "exercises": [{"filename": "ex01_level_assignment_with_exponential_decay.py", "content": "\"\"\"\nExercise 1: Level Assignment with Exponential Decay\n====================================================\nModule 2 — HNSW: The Hierarchical Approach\n\nHNSW assigns each inserted node to a maximum level using an exponential decay\ndistribution. The formula is:\n\n    level = floor(-ln(uniform(0, 1)) * mL)\n\nwhere mL is the decay rate parameter (typically 1/ln(M), M = degree bound).\n\nThis produces exponentially fewer nodes at each successive level, giving HNSW\nits O(log N) search time: exponentially narrowing the \"cone of visibility\" as\nwe descend through levels.\n\nYour tasks:\n  1. Implement assign_level(mL) — the core exponential draw (~5 lines)\n  2. Implement build_level_distribution(n_nodes, mL) — assign levels to n nodes (~8 lines)\n  3. Implement verify_distribution(counts, mL, n_nodes) — compare actual vs expected (~6 lines)\n\nLearning objective: Internalize that the level distribution is NOT uniform.\nBy the time you've verified the numbers, the exponential decay should feel\nvisceral — ~63% of nodes live ONLY at level 0, ~23% reach level 1, etc.\n\"\"\"\n\nimport math\nimport random\nfrom collections import defaultdict\nfrom typing import Dict, List, Tuple\nimport os\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n\n# ---------------------------------------------------------------------------\n# Core HNSW skeleton (structure only — you implement the level logic below)\n# ---------------------------------------------------------------------------\n\nclass HNSWIndex:\n    \"\"\"\n    Minimal HNSW skeleton focusing on level assignment.\n\n    Parameters\n    ----------\n    M : int\n        Maximum number of edges per node (degree bound).\n    mL : float\n        Level decay rate. Typically set to 1/ln(M).\n        Controls how quickly node density drops at higher levels.\n    \"\"\"\n\n    def __init__(self, M: int = 16, mL: float = None):\n        self.M = M\n        self.mL = mL if mL is not None else 1.0 / math.log(M)\n        # Maps node_id -> assigned maximum level\n        self.level_for_node: Dict[int, int] = {}\n\n    def assign_level(self) -> int:\n        \"\"\"\n        Draw a random level from the HNSW exponential distribution.\n\n        Uses the inverse CDF method: -ln(uniform) is exponentially distributed.\n        The floor converts the continuous exponential to a discrete level index.\n\n        Returns\n        -------\n        int\n            Level index >= 0. Level 0 is the base (densest) level.\n            Higher levels are exponentially less probable.\n\n        Hint:\n            Use math.log and random.uniform(1e-10, 1.0) to avoid log(0).\n            Remember: mL is stored as self.mL.\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~5 lines                               #\n        #                                                         #\n        # Step 1: Draw u = random.uniform(1e-10, 1.0)            #\n        # Step 2: Compute -ln(u) * self.mL                       #\n        # Step 3: Return the floor as int                         #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\ndef build_level_distribution(n_nodes: int, mL: float) -> Dict[int, int]:\n    \"\"\"\n    Assign levels to n_nodes nodes and count how many land at each level.\n\n    Creates a temporary HNSWIndex with the given mL and calls assign_level()\n    for each node, accumulating counts in a dictionary.\n\n    Parameters\n    ----------\n    n_nodes : int\n        Total number of nodes to assign levels to.\n    mL : float\n        Decay rate for the exponential distribution.\n\n    Returns\n    -------\n    Dict[int, int]\n        Maps level -> count of nodes assigned to AT LEAST that level.\n        e.g., {0: 100000, 1: 23254, 2: 5402, 3: 1254, ...}\n\n    Note:\n        A node assigned level L appears in levels 0, 1, ..., L.\n        So the count at level 0 equals n_nodes (every node is at level 0).\n        The count at level k is the number of nodes with assigned level >= k.\n\n    Hint:\n        Use defaultdict(int). For each node, call index.assign_level(),\n        then increment counts for ALL levels from 0 up to the assigned level.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~8 lines                               #\n    #                                                         #\n    # 1. Create an HNSWIndex with the given mL               #\n    # 2. For each of n_nodes nodes:                           #\n    #    a. assigned_level = index.assign_level()             #\n    #    b. for lv in range(assigned_level + 1):              #\n    #         counts[lv] += 1                                 #\n    # 3. Return counts                                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef verify_distribution(\n    counts: Dict[int, int],\n    mL: float,\n    n_nodes: int,\n    tolerance: float = 0.02\n) -> Tuple[bool, float]:\n    \"\"\"\n    Compare actual level distribution against expected exponential distribution.\n\n    Expected count at level k: n_nodes * exp(-k / mL)\n\n    Parameters\n    ----------\n    counts : Dict[int, int]\n        Actual counts from build_level_distribution().\n    mL : float\n        Decay rate used to generate counts.\n    n_nodes : int\n        Total number of nodes.\n    tolerance : float\n        Maximum allowed relative error (default: 2%).\n\n    Returns\n    -------\n    Tuple[bool, float]\n        (passed, max_relative_error)\n        passed = True if all levels have relative error < tolerance.\n        max_relative_error = the worst case relative error observed.\n\n    Hint:\n        For each level k in counts (skip level 0 since it's always n_nodes):\n          expected = n_nodes * math.exp(-k / mL)\n          rel_error = abs(counts[k] - expected) / expected\n        Track the maximum rel_error across all levels.\n        Return (max_rel_error < tolerance, max_rel_error)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~6 lines                               #\n    #                                                         #\n    # Loop over all levels k > 0 in counts.                  #\n    # Compute expected = n_nodes * math.exp(-k / mL)         #\n    # Compute relative error, track maximum.                  #\n    # Return (max_error < tolerance, max_error)               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__: distribution histogram and verification\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    random.seed(42)\n\n    # In verify mode: tiny N to check code runs\n    # In student mode: 100,000 nodes for meaningful statistics\n    N_NODES = 100_000  # 100k nodes runs in ~30ms — same in verify and full mode\n    M = 16\n    mL = 1.0 / math.log(M)\n\n    print(f\"{'='*60}\")\n    print(f\"HNSW Level Distribution (N={N_NODES:,}, M={M}, mL={mL:.4f})\")\n    print(f\"{'='*60}\")\n\n    # Build the distribution\n    counts = build_level_distribution(N_NODES, mL)\n\n    # Print histogram with expected values\n    print(f\"\\n{'Level':<8} {'Actual':>10} {'Expected':>10} {'Rel Error':>10}  Bar\")\n    print(f\"{'-'*70}\")\n\n    max_level = max(counts.keys())\n    for level in range(max_level + 1):\n        actual = counts.get(level, 0)\n        expected = N_NODES * math.exp(-level / mL)\n        rel_error = abs(actual - expected) / max(expected, 1)\n        bar_len = min(40, int(actual / N_NODES * 40))\n        bar = \"█\" * bar_len\n        print(f\"Level {level:<2}  {actual:>10,}  {expected:>10,.0f}  {rel_error:>9.1%}  {bar}\")\n\n    # Verify the distribution\n    print(f\"\\n{'='*60}\")\n    passed, max_error = verify_distribution(counts, mL, N_NODES)\n\n    if passed:\n        print(f\"Distribution verified: max error < 2%  (actual max: {max_error:.1%})\")\n    else:\n        print(f\"Distribution FAILED: max error = {max_error:.1%} (threshold: 2%)\")\n        print(\"Check your exponential distribution formula.\")\n\n    # Show the key insight\n    print(f\"\\nKey insight: Level 0 has ALL {N_NODES:,} nodes.\")\n    if 1 in counts:\n        ratio = counts[0] / counts[1]\n        print(f\"Level 0 / Level 1 ratio: {ratio:.1f}x  (expected ~{math.exp(1/mL):.1f}x)\")\n    print(\"Each level has ~1/M times as many nodes as the level below.\")\n    print(f\"With M={M}: each level should have ~{1/M:.0%} of the nodes below it.\")\n"}, {"filename": "ex02_hnsw_insert_and_hierarchical_search.py", "content": "\"\"\"\nExercise 2: HNSW Insert and Hierarchical Search\n================================================\nModule 2 — HNSW: The Hierarchical Approach\n\nIn this exercise you'll implement the two core HNSW algorithms:\n  1. hnsw_insert(node_id, vector) — builds the multi-level graph\n  2. hnsw_search(query, k, ef) — hierarchical beam search\n\nKey insight to keep in mind: HNSW doesn't explicitly choose long edges.\nIt creates them *implicitly* by applying the same nearest-neighbor rule\nat multiple levels with exponentially fewer nodes. You'll verify this\nempirically when you see that recall@10 > 0.80 with ef=50 — despite\nnever choosing a single edge by length.\n\nYour tasks:\n  1. hnsw_insert(node_id, vector, ef_construction=32) — ~22 lines\n  2. hnsw_search(query, k, ef=50) — ~25 lines\n\"\"\"\n\nimport math\nimport random\nimport heapq\nimport time\nimport numpy as np\nfrom collections import defaultdict\nfrom typing import Dict, List, Set, Optional, Tuple\nimport os\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Distance utilities (provided)\n# ---------------------------------------------------------------------------\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"Compute L2 (Euclidean) distance between two vectors.\"\"\"\n    diff = a - b\n    return float(np.dot(diff, diff) ** 0.5)\n\n\n# ---------------------------------------------------------------------------\n# Provided helpers\n# ---------------------------------------------------------------------------\n\ndef select_neighbors(\n    candidates: List[Tuple[float, int]],\n    M: int\n) -> List[Tuple[float, int]]:\n    \"\"\"\n    Select the M nearest neighbors from a candidate list.\n\n    Parameters\n    ----------\n    candidates : List[Tuple[float, int]]\n        (distance, node_id) pairs.\n    M : int\n        Maximum neighbors to select.\n\n    Returns\n    -------\n    List[Tuple[float, int]]\n        The M closest (distance, node_id) pairs.\n    \"\"\"\n    return sorted(candidates)[:M]\n\n\ndef beam_search_level(\n    hnsw: \"HNSW\",\n    query: np.ndarray,\n    entry_id: int,\n    level: int,\n    beam_width: int\n) -> List[Tuple[float, int]]:\n    \"\"\"\n    Beam search at a single HNSW level.\n\n    Maintains a max-heap of size beam_width (best candidates so far)\n    and a min-heap of unvisited candidates to expand.\n\n    Parameters\n    ----------\n    hnsw : HNSW\n        The HNSW index.\n    query : np.ndarray\n        Query vector.\n    entry_id : int\n        Node to start search from.\n    level : int\n        Which level to search.\n    beam_width : int\n        How many candidates to maintain (ef parameter).\n\n    Returns\n    -------\n    List[Tuple[float, int]]\n        All candidates in the beam, as (distance, node_id) pairs.\n    \"\"\"\n    visited: Set[int] = set()\n    entry_dist = euclidean_distance(query, hnsw.vectors[entry_id])\n\n    # candidates: min-heap of (dist, node_id) to expand\n    candidates = [(entry_dist, entry_id)]\n    # results: max-heap of (neg_dist, node_id) — we keep beam_width best\n    results = [(-entry_dist, entry_id)]\n    visited.add(entry_id)\n\n    while candidates:\n        dist, node_id = heapq.heappop(candidates)\n\n        # If the closest unvisited candidate is farther than our worst result,\n        # we're done (can't improve).\n        worst_result_dist = -results[0][0]\n        if dist > worst_result_dist and len(results) >= beam_width:\n            break\n\n        # Expand this node's neighbors at the current level\n        for neighbor_id in hnsw.graph[level].get(node_id, []):\n            if neighbor_id in visited:\n                continue\n            visited.add(neighbor_id)\n            neighbor_dist = euclidean_distance(query, hnsw.vectors[neighbor_id])\n\n            if len(results) < beam_width or neighbor_dist < worst_result_dist:\n                heapq.heappush(candidates, (neighbor_dist, neighbor_id))\n                heapq.heappush(results, (-neighbor_dist, neighbor_id))\n                if len(results) > beam_width:\n                    heapq.heappop(results)  # remove worst\n\n    return [(abs(neg_d), nid) for neg_d, nid in results]\n\n\n# ---------------------------------------------------------------------------\n# HNSW class\n# ---------------------------------------------------------------------------\n\nclass HNSW:\n    \"\"\"\n    HNSW index for approximate nearest neighbor search.\n\n    Attributes\n    ----------\n    M : int\n        Max edges per node per level.\n    mL : float\n        Level decay rate (1/ln(M)).\n    vectors : Dict[int, np.ndarray]\n        Node ID -> vector.\n    graph : Dict[int, Dict[int, List[int]]]\n        graph[level][node_id] = list of neighbor node IDs at that level.\n    entry_point : Optional[int]\n        Current highest-level entry node ID.\n    max_level : int\n        Current maximum level in the graph.\n    \"\"\"\n\n    def __init__(self, M: int = 16, mL: float = None):\n        self.M = M\n        self.mL = mL if mL is not None else 1.0 / math.log(M)\n        self.vectors: Dict[int, np.ndarray] = {}\n        # graph[level] is a dict mapping node_id -> list of neighbor node_ids\n        self.graph: Dict[int, Dict[int, List[int]]] = defaultdict(\n            lambda: defaultdict(list)\n        )\n        self.entry_point: Optional[int] = None\n        self.max_level: int = -1\n\n    def _assign_level(self) -> int:\n        \"\"\"Draw a random level from the exponential distribution.\"\"\"\n        u = random.uniform(1e-10, 1.0)\n        return int(-math.log(u) * self.mL)\n\n    def _add_edge(self, level: int, u: int, v: int) -> None:\n        \"\"\"Add a bidirectional edge between u and v at the given level.\"\"\"\n        if v not in self.graph[level][u]:\n            self.graph[level][u].append(v)\n        if u not in self.graph[level][v]:\n            self.graph[level][v].append(u)\n\n    def _trim_edges(self, level: int, node_id: int, max_edges: int) -> None:\n        \"\"\"Trim node_id's neighbor list to max_edges by keeping nearest neighbors.\"\"\"\n        neighbors = self.graph[level][node_id]\n        if len(neighbors) <= max_edges:\n            return\n        v = self.vectors[node_id]\n        # Keep only the max_edges nearest neighbors\n        scored = sorted(neighbors, key=lambda n: euclidean_distance(v, self.vectors[n]))\n        self.graph[level][node_id] = scored[:max_edges]\n\n    def hnsw_insert(self, node_id: int, vector: np.ndarray, ef_construction: int = 32) -> None:\n        \"\"\"\n        Insert a new node into the HNSW index.\n\n        Algorithm:\n          1. Assign a random level L_I using exponential decay.\n          2. Store the vector.\n          3. If index is empty: set as entry point and return.\n          4. Phase 1 (greedy descent): from L_MAX down to L_I+1,\n             find the single nearest node at each level (beam_width=1).\n             This moves the entry point close to where we'll insert.\n          5. Phase 2 (insert): from L_I down to 0:\n             a. Beam search at this level with beam_width=ef_construction.\n             b. Select the M nearest as neighbors for node_id at this level.\n             c. Add bidirectional edges, trim any neighbor that exceeds M edges.\n             d. Use the nearest found as entry point for next (lower) level.\n          6. Update entry_point and max_level if L_I > current max_level.\n\n        Parameters\n        ----------\n        node_id : int\n            Unique identifier for this node.\n        vector : np.ndarray\n            The vector to index.\n        ef_construction : int\n            Beam width for neighbor search during construction.\n\n        Common mistakes:\n          - Inserting at only level L_I instead of ALL levels 0..L_I\n          - Using a large beam at ALL levels (should be 1 above L_I)\n          - Not updating entry_point when L_I > max_level\n          - Not trimming edges bidirectionally\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~22 lines                              #\n        #                                                         #\n        # Step 1: assigned_level = self._assign_level()          #\n        # Step 2: self.vectors[node_id] = vector                 #\n        # Step 3: Handle empty index (set entry point, return)   #\n        # Step 4: ep = self.entry_point                          #\n        #   for lv in range(self.max_level, assigned_level, -1): #\n        #     results = beam_search_level(..., beam_width=1)      #\n        #     ep = min(results, key=lambda x: x[0])[1]           #\n        # Step 5:                                                 #\n        #   for lv in range(assigned_level, -1, -1):             #\n        #     neighbors = beam_search_level(..., ef_construction) #\n        #     selected = select_neighbors(neighbors, self.M)      #\n        #     for (_, nbr_id) in selected:                        #\n        #         self._add_edge(lv, node_id, nbr_id)            #\n        #         self._trim_edges(lv, nbr_id, self.M)           #\n        #     if selected: ep = min(selected)[1]                  #\n        # Step 6: Update entry_point and max_level if needed     #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def hnsw_search(self, query: np.ndarray, k: int = 10, ef: int = 50) -> List[Tuple[float, int]]:\n        \"\"\"\n        Search the HNSW index for k approximate nearest neighbors.\n\n        Algorithm:\n          1. Start at self.entry_point.\n          2. Phase 1 (greedy descent): from max_level down to level 1,\n             use beam_search_level with beam_width=1 to navigate quickly.\n             Update entry point to the nearest found at each level.\n          3. Phase 2 (thorough search): at level 0, use beam_search_level\n             with beam_width=ef for high recall.\n          4. Return the top k results.\n\n        Parameters\n        ----------\n        query : np.ndarray\n            Query vector.\n        k : int\n            Number of nearest neighbors to return.\n        ef : int\n            Beam width for level-0 search. Larger = higher recall, slower.\n\n        Returns\n        -------\n        List[Tuple[float, int]]\n            Top k (distance, node_id) pairs, sorted by distance ascending.\n\n        Common mistakes:\n          - Using ef at ALL levels (should be 1 above level 0)\n          - Forgetting to update ep between levels\n          - Returning more than k results\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~15 lines                              #\n        #                                                         #\n        # Handle edge cases: empty index, or index with 1 node.  #\n        # ep = self.entry_point                                   #\n        # Phase 1: for lv in range(self.max_level, 0, -1):       #\n        #   results = beam_search_level(..., beam_width=1)        #\n        #   ep = min(results, key=lambda x: x[0])[1]             #\n        # Phase 2: results = beam_search_level(lv=0, ef)         #\n        # Return sorted(results)[:k]                              #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__: build index and evaluate recall@10\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    random.seed(42)\n    np.random.seed(42)\n\n    # In verify mode: 300 vectors, 2 queries — just checks code runs\n    # In student mode: 5000 vectors, 200 queries — meaningful recall evaluation\n    N_VECTORS = 300 if VERIFY else 5_000\n    N_QUERIES = 2 if VERIFY else 200\n    DIM = 64\n    K = 10\n    M = 16\n    EF_CONSTRUCTION = 32\n    EF_SEARCH = 50\n\n    print(f\"Building HNSW index: {N_VECTORS} vectors, {DIM}D, M={M}\")\n    print(f\"ef_construction={EF_CONSTRUCTION}, ef_search={EF_SEARCH}\")\n    print()\n\n    # Generate random vectors\n    data = np.random.randn(N_VECTORS, DIM).astype(np.float32)\n    queries = np.random.randn(N_QUERIES, DIM).astype(np.float32)\n\n    # Build index\n    hnsw = HNSW(M=M)\n    t_start = time.time()\n    for i, vec in enumerate(data):\n        hnsw.hnsw_insert(i, vec, ef_construction=EF_CONSTRUCTION)\n    build_time = time.time() - t_start\n    print(f\"Index built in {build_time:.2f}s\")\n    print(f\"Max level: {hnsw.max_level}\")\n    print(f\"Nodes per level: \" + \", \".join(\n        f\"L{lv}={len(hnsw.graph[lv])}\"\n        for lv in range(hnsw.max_level + 1)\n    ))\n    print()\n\n    # Compute brute-force ground truth\n    def brute_force_knn(query: np.ndarray, data: np.ndarray, k: int):\n        dists = np.linalg.norm(data - query, axis=1)\n        top_k_idx = np.argpartition(dists, k)[:k]\n        return set(top_k_idx.tolist())\n\n    # Evaluate recall@10\n    t_search = time.time()\n    recalls = []\n    for q in queries:\n        gt = brute_force_knn(q, data, K)\n        results = hnsw.hnsw_search(q, k=K, ef=EF_SEARCH)\n        found = {nid for _, nid in results}\n        recalls.append(len(found & gt) / K)\n    search_time = time.time() - t_search\n\n    avg_recall = sum(recalls) / len(recalls)\n    avg_query_ms = (search_time / N_QUERIES) * 1000\n\n    print(f\"HNSW recall@{K}: {avg_recall:.4f} (target: > 0.80 with ef={EF_SEARCH})\")\n    print(f\"Search time: {search_time:.3f}s total, {avg_query_ms:.2f}ms per query\")\n\n    if avg_recall >= 0.70:  # relaxed for verify mode with tiny data\n        print(f\"\\nResult: PASS (recall={avg_recall:.2%})\")\n    else:\n        print(f\"\\nResult: FAIL — recall too low ({avg_recall:.2%})\")\n        print(\"Hints:\")\n        print(\"  - Did you insert at ALL levels 0..L_I?\")\n        print(\"  - Did you use ef_construction at levels 0..L_I?\")\n        print(\"  - Did you update the entry point when L_I > max_level?\")\n"}, {"filename": "ex03_edge_length_analysis_across_hnsw_levels.py", "content": "\"\"\"\nExercise 3: Edge Length Analysis Across HNSW Levels\n====================================================\nModule 2 — HNSW: The Hierarchical Approach\n\nIn this exercise you'll empirically verify HNSW's key emergent property:\n  \"Higher levels have longer edges — even though we never explicitly chose\n   long edges. It's a consequence of having fewer nodes.\"\n\nYou'll build an HNSW index, then analyze the edge length distribution\nat each level to confirm the relationship.\n\nYour tasks:\n  1. compute_edge_stats(hnsw, level) — compute mean/median/std of edge lengths (~10 lines)\n  2. analyze_level_progression(stats_by_level) — compute ratios and verify monotonicity (~8 lines)\n  3. Answer 3 analytical questions in docstring comments (~3 lines each)\n\"\"\"\n\nimport math\nimport random\nimport heapq\nimport numpy as np\nfrom collections import defaultdict\nfrom typing import Dict, List, Set, Optional, Tuple\nimport os\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n\n# ---------------------------------------------------------------------------\n# Reuse HNSW from Exercise 2 (abbreviated, provided in full)\n# ---------------------------------------------------------------------------\n\ndef euclidean_distance(a: np.ndarray, b: np.ndarray) -> float:\n    diff = a - b\n    return float(np.dot(diff, diff) ** 0.5)\n\n\ndef beam_search_level(hnsw, query, entry_id, level, beam_width):\n    visited = set()\n    entry_dist = euclidean_distance(query, hnsw.vectors[entry_id])\n    candidates = [(entry_dist, entry_id)]\n    results = [(-entry_dist, entry_id)]\n    visited.add(entry_id)\n    while candidates:\n        dist, node_id = heapq.heappop(candidates)\n        worst = -results[0][0]\n        if dist > worst and len(results) >= beam_width:\n            break\n        for nbr in hnsw.graph[level].get(node_id, []):\n            if nbr in visited:\n                continue\n            visited.add(nbr)\n            d = euclidean_distance(query, hnsw.vectors[nbr])\n            if len(results) < beam_width or d < worst:\n                heapq.heappush(candidates, (d, nbr))\n                heapq.heappush(results, (-d, nbr))\n                if len(results) > beam_width:\n                    heapq.heappop(results)\n    return [(abs(nd), nid) for nd, nid in results]\n\n\nclass HNSW:\n    def __init__(self, M=16, mL=None):\n        self.M = M\n        self.mL = mL or 1.0 / math.log(M)\n        self.vectors = {}\n        self.graph = defaultdict(lambda: defaultdict(list))\n        self.entry_point = None\n        self.max_level = -1\n\n    def _assign_level(self):\n        return int(-math.log(random.uniform(1e-10, 1.0)) * self.mL)\n\n    def _add_edge(self, lv, u, v):\n        if v not in self.graph[lv][u]:\n            self.graph[lv][u].append(v)\n        if u not in self.graph[lv][v]:\n            self.graph[lv][v].append(u)\n\n    def _trim_edges(self, lv, node_id, max_edges):\n        nbrs = self.graph[lv][node_id]\n        if len(nbrs) <= max_edges:\n            return\n        v = self.vectors[node_id]\n        self.graph[lv][node_id] = sorted(nbrs, key=lambda n: euclidean_distance(v, self.vectors[n]))[:max_edges]\n\n    def insert(self, node_id, vector, ef_construction=32):\n        lv_assigned = self._assign_level()\n        self.vectors[node_id] = vector\n        if self.entry_point is None:\n            self.entry_point = node_id\n            self.max_level = lv_assigned\n            return\n        ep = self.entry_point\n        for lv in range(self.max_level, lv_assigned, -1):\n            results = beam_search_level(self, vector, ep, lv, 1)\n            ep = min(results, key=lambda x: x[0])[1]\n        for lv in range(lv_assigned, -1, -1):\n            nbrs = beam_search_level(self, vector, ep, lv, ef_construction)\n            selected = sorted(nbrs)[:self.M]\n            for (_, nid) in selected:\n                self._add_edge(lv, node_id, nid)\n                self._trim_edges(lv, nid, self.M)\n            if selected:\n                ep = min(selected)[1]\n        if lv_assigned > self.max_level:\n            self.entry_point = node_id\n            self.max_level = lv_assigned\n\n\n# ---------------------------------------------------------------------------\n# Analysis functions — YOUR CODE HERE\n# ---------------------------------------------------------------------------\n\ndef compute_edge_stats(hnsw: HNSW, level: int) -> Dict:\n    \"\"\"\n    Compute statistics about edge lengths at a given HNSW level.\n\n    For each edge (u, v) at this level, compute the Euclidean distance\n    between vectors[u] and vectors[v]. Collect all edge distances and\n    compute summary statistics.\n\n    IMPORTANT: Each undirected edge appears twice in the adjacency list\n    (once as u->v and once as v->u). You should count each edge only once.\n    Use a `seen` set of frozenset({u, v}) pairs to deduplicate.\n\n    Parameters\n    ----------\n    hnsw : HNSW\n        A built HNSW index.\n    level : int\n        Which level to analyze.\n\n    Returns\n    -------\n    Dict with keys:\n        'mean'   : float — mean edge distance\n        'median' : float — median edge distance\n        'std'    : float — standard deviation of edge distances\n        'count'  : int   — number of unique edges at this level\n\n    Hint:\n        Iterate over hnsw.graph[level].items() to get (node_id, neighbors).\n        For each neighbor, create edge_key = frozenset({node_id, neighbor_id}).\n        Only compute distance if edge_key not in seen. Add to seen after.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # distances = []                                          #\n    # seen = set()                                            #\n    # for node_id, neighbors in hnsw.graph[level].items():   #\n    #     for nbr_id in neighbors:                            #\n    #         key = frozenset({node_id, nbr_id})             #\n    #         if key in seen: continue                        #\n    #         seen.add(key)                                   #\n    #         d = euclidean_distance(...)                     #\n    #         distances.append(d)                             #\n    # return {'mean': ..., 'median': ..., 'std': ..., ...}   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef analyze_level_progression(stats_by_level: Dict[int, Dict]) -> Dict:\n    \"\"\"\n    Analyze how edge lengths change across levels.\n\n    Compute the ratio of mean edge length at each level to the level below it.\n    Verify that the ratio is > 1.0 at each step (higher levels have longer edges).\n\n    Parameters\n    ----------\n    stats_by_level : Dict[int, Dict]\n        Maps level -> stats dict from compute_edge_stats().\n        Level 0 is the densest; higher levels are sparser.\n\n    Returns\n    -------\n    Dict with keys:\n        'ratios'    : Dict[str, float]  — e.g. {'L1/L0': 1.52, 'L2/L1': 1.29}\n        'verified'  : bool             — True if ALL ratios > 1.0\n        'max_ratio' : float            — largest ratio observed\n        'min_ratio' : float            — smallest ratio observed\n\n    Hint:\n        Iterate over sorted levels. For consecutive (lv, lv+1) pairs,\n        ratio = stats_by_level[lv+1]['mean'] / stats_by_level[lv]['mean']\n        Label as f'L{lv+1}/L{lv}'.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~8 lines                              #\n    #                                                         #\n    # ratios = {}                                             #\n    # levels = sorted(stats_by_level.keys())                 #\n    # for i in range(len(levels) - 1):                       #\n    #     lv, lv_next = levels[i], levels[i+1]               #\n    #     ratio = stats_by_level[lv_next]['mean'] /           #\n    #             stats_by_level[lv]['mean']                  #\n    #     ratios[f'L{lv_next}/L{lv}'] = ratio                #\n    # verified = all(r > 1.0 for r in ratios.values())       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Analytical questions — answer in comments below\n# ---------------------------------------------------------------------------\n\n\"\"\"\nANALYTICAL QUESTION 1:\nWhy do higher HNSW levels have longer edges, even though the same\n\"connect to nearest neighbor\" rule is used at every level?\n\nYOUR ANSWER (~2-3 sentences):\n# [YOUR ANSWER HERE]\n\n\nANALYTICAL QUESTION 2:\nIf you doubled the size of your dataset (20,000 → 40,000 vectors) but kept\nthe same mL (so each level still has the same *fraction* of nodes),\nwould you expect the mean edge length at level 1 to increase, decrease,\nor stay the same? Why?\n\nYOUR ANSWER (~2-3 sentences):\n# [YOUR ANSWER HERE]\n\n\nANALYTICAL QUESTION 3:\nHNSW preserves the data distribution at every level (no intentional\nspread-out sampling). Suppose 80% of vectors cluster in a small ball.\nAt level 1, what fraction of level-1 nodes will be in that ball?\nHow does this affect the edge lengths WITHIN the ball at level 1?\n\nYOUR ANSWER (~2-3 sentences):\n# [YOUR ANSWER HERE]\n\"\"\"\n\n\n# ---------------------------------------------------------------------------\n# __main__: build index and run analysis\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    random.seed(42)\n    np.random.seed(42)\n\n    # In verify mode: small index for fast execution\n    # In student mode: 10,000 vectors in 128D for meaningful statistics\n    N_VECTORS = 200 if VERIFY else 10_000\n    DIM = 128 if not VERIFY else 32\n    M = 16\n\n    print(f\"Building HNSW index: {N_VECTORS} vectors, {DIM}D, M={M}\")\n    data = np.random.randn(N_VECTORS, DIM).astype(np.float32)\n\n    hnsw = HNSW(M=M)\n    for i, vec in enumerate(data):\n        hnsw.insert(i, vec)\n\n    print(f\"Built. Max level: {hnsw.max_level}\")\n    print()\n\n    # Compute stats per level\n    stats_by_level = {}\n    print(f\"{'Level':<8} {'Mean':>8} {'Median':>8} {'Std':>8} {'Edges':>8}\")\n    print(\"-\" * 50)\n\n    for lv in range(hnsw.max_level + 1):\n        if len(hnsw.graph[lv]) < 2:\n            continue\n        stats = compute_edge_stats(hnsw, lv)\n        stats_by_level[lv] = stats\n        print(f\"Level {lv:<2}  {stats['mean']:>8.3f}  {stats['median']:>8.3f}  \"\n              f\"{stats['std']:>8.3f}  {stats['count']:>8,}\")\n\n    # Analyze progression\n    print()\n    progression = analyze_level_progression(stats_by_level)\n    for label, ratio in sorted(progression['ratios'].items()):\n        print(f\"Edge length ratio {label}: {ratio:.2f}x\")\n\n    print()\n    if progression['verified']:\n        print(\"Higher levels have longer edges: VERIFIED\")\n    else:\n        print(\"WARNING: Some levels have shorter edges than lower levels.\")\n        print(\"         Check your analysis or try with more data.\")\n\n    print()\n    print(f\"Min ratio: {progression['min_ratio']:.2f}x, \"\n          f\"Max ratio: {progression['max_ratio']:.2f}x\")\n    print(\"Expected: all ratios > 1.0 (longer edges at higher levels)\")\n"}, {"filename": "ex04_hnsw_at_billion_scale_the_limitation_calculator.py", "content": "\"\"\"\nExercise 4: HNSW at Billion Scale — The Limitation Calculator\n=============================================================\nModule 2 — HNSW: The Hierarchical Approach\n\nIn this exercise you'll compute concrete numbers that illustrate HNSW's\nthree fatal limitations at billion-scale:\n  1. Memory-only design   → terabytes of RAM required\n  2. No true deletions    → wasted query work from ghost nodes\n  3. Monolithic storage   → full index rewrite for any mutation\n\nThen you'll compute the cost of the disk-based alternative to show\n*why* DiskANN achieves ~40x cost reduction.\n\nYour tasks:\n  1. compute_memory_gb(n, dim, dtype_bytes, M) — vector + edge storage (~8 lines)\n  2. compute_deletion_overhead(n, deletion_rate, avg_hops) — wasted work fraction (~6 lines)\n  3. compute_rewrite_cost(index_size_gb, mutation_rate) — daily I/O for mutations (~5 lines)\n  4. compare_to_disk(memory_gb, ssd_cost_per_tb, ram_cost_per_tb) — cost ratio (~4 lines)\n\"\"\"\n\nimport os\nfrom typing import Dict, Tuple\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n\nclass HNSWCostModel:\n    \"\"\"\n    Cost model for HNSW at billion-scale.\n\n    Parameters\n    ----------\n    n_vectors : int\n        Total number of vectors in the index.\n    dimensions : int\n        Vector dimensionality.\n    M : int\n        HNSW degree bound (max edges per node).\n    dtype_bytes : int\n        Bytes per scalar (4 for float32, 2 for float16).\n    deletion_rate : float\n        Fraction of index that has been soft-deleted (0.0 to 1.0).\n    avg_query_hops : int\n        Average number of graph hops per search query.\n    ssd_cost_per_tb : float\n        Monthly cost per TB of SSD storage ($).\n    ram_cost_per_tb : float\n        Monthly cost per TB of RAM ($).\n    \"\"\"\n\n    def __init__(\n        self,\n        n_vectors: int,\n        dimensions: int,\n        M: int = 16,\n        dtype_bytes: int = 4,\n        deletion_rate: float = 0.10,\n        avg_query_hops: int = 50,\n        ssd_cost_per_tb: float = 100.0,   # ~$100/TB/month for cloud NVMe SSD\n        ram_cost_per_tb: float = 4_000.0, # ~$4,000/TB/month for cloud high-memory RAM\n    ):\n        self.n = n_vectors\n        self.dim = dimensions\n        self.M = M\n        self.dtype_bytes = dtype_bytes\n        self.deletion_rate = deletion_rate\n        self.avg_query_hops = avg_query_hops\n        self.ssd_cost_per_tb = ssd_cost_per_tb\n        self.ram_cost_per_tb = ram_cost_per_tb\n\n    def compute_memory_gb(self) -> Dict[str, float]:\n        \"\"\"\n        Calculate total RAM required to serve the HNSW index.\n\n        Components:\n          1. Vector storage: n * dim * dtype_bytes bytes\n          2. Graph edge storage: n * M * 4 bytes (each neighbor is a 4-byte int ID)\n             NOTE: bidirectional edges are counted once per direction in\n             the adjacency list, so total edge entries = n * M\n          3. Overhead: add 20% for allocator fragmentation, metadata, etc.\n\n        Parameters (from self):\n            self.n, self.dim, self.dtype_bytes, self.M\n\n        Returns\n        -------\n        Dict with keys:\n            'vector_gb'     : GB for raw vector data\n            'edge_gb'       : GB for graph edge lists\n            'overhead_gb'   : GB for metadata / allocator overhead (20%)\n            'total_gb'      : total GB required\n            'total_tb'      : total_gb / 1024\n\n        Hint:\n            1 GB = 1024^3 bytes = 1,073,741,824 bytes.\n            Or use: bytes_to_gb = lambda b: b / (1024 ** 3)\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~8 lines                               #\n        #                                                         #\n        # bytes_to_gb = lambda b: b / (1024 ** 3)                #\n        # vector_bytes = self.n * self.dim * self.dtype_bytes     #\n        # edge_bytes = self.n * self.M * 4  # 4 bytes per ID     #\n        # subtotal = vector_bytes + edge_bytes                    #\n        # overhead = subtotal * 0.20                              #\n        # total = subtotal + overhead                             #\n        # return {all keys...}                                    #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def compute_deletion_overhead(self) -> Dict[str, float]:\n        \"\"\"\n        Estimate fraction of query work wasted due to soft-deleted nodes.\n\n        Model:\n          - deletion_rate fraction of graph nodes are \"ghost\" nodes\n          - Each query hop has a deletion_rate probability of landing on a ghost\n          - Expected wasted hops = avg_query_hops * deletion_rate\n          - Effective recall penalty: each wasted hop reduces effective coverage\n\n        Parameters (from self):\n            self.deletion_rate, self.avg_query_hops\n\n        Returns\n        -------\n        Dict with keys:\n            'ghost_fraction'  : float — fraction of index that is ghost nodes\n            'wasted_hops'     : float — expected wasted hops per query\n            'useful_hops'     : float — expected productive hops per query\n            'overhead_pct'    : float — extra latency percentage (wasted/useful * 100)\n\n        Hint:\n            wasted_hops = avg_query_hops * deletion_rate\n            useful_hops = avg_query_hops - wasted_hops\n            overhead_pct = (wasted_hops / useful_hops) * 100\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~6 lines                               #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def compute_rewrite_cost(self, daily_mutation_rate: float = 0.001) -> Dict[str, float]:\n        \"\"\"\n        Estimate daily I/O cost from full index rewrites for mutations.\n\n        Since hnswlib saves via memory dumps, every mutation (insert/delete/update)\n        requires: read full index (memory_gb bytes) + write full index (memory_gb bytes).\n\n        Model:\n          - daily_mutation_rate: fraction of index mutated daily (e.g. 0.1% = 0.001)\n          - mutations_per_day = n * daily_mutation_rate\n          - Each mutation triggers a full read + write of the index\n            (in practice you'd batch, but worst case is one rewrite per mutation)\n          - Assume SSD throughput of 2 GB/s sequential\n\n        Parameters (from self):\n            self.n, self.compute_memory_gb()\n\n        Parameters\n        ----------\n        daily_mutation_rate : float\n            Fraction of index mutated per day (default: 0.1%).\n\n        Returns\n        -------\n        Dict with keys:\n            'mutations_per_day'   : int   — number of mutations daily\n            'rewrite_tb_per_day'  : float — total TB of I/O per day (read + write)\n            'rewrite_hours'       : float — hours of I/O at 2 GB/s throughput\n\n        Hint:\n            Assume one batch rewrite per 1000 mutations (batching).\n            batches_per_day = max(1, mutations_per_day / 1000)\n            Each batch: 2 * memory_gb GB of I/O (read + write).\n            total_io_gb = batches_per_day * 2 * memory_gb\n            rewrite_hours = total_io_gb / 2.0 / 3600  # 2 GB/s throughput\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~5 lines                               #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def compare_to_disk(self) -> Dict[str, float]:\n        \"\"\"\n        Compare the monthly cost of RAM-based vs SSD-based index serving.\n\n        RAM cost: memory_gb * ram_cost_per_tb / 1024 (per month)\n        SSD cost: total_gb * ssd_cost_per_tb / 1024 (per month)\n          (same storage size, different media)\n\n        Returns\n        -------\n        Dict with keys:\n            'ram_cost_per_month'  : float — monthly $ for RAM\n            'ssd_cost_per_month'  : float — monthly $ for SSD\n            'cost_ratio'          : float — RAM cost / SSD cost\n            'cheaper_label'       : str   — e.g. \"40x cheaper\"\n\n        Hint:\n            cost_ratio = ram_cost / ssd_cost\n            cheaper_label = f\"{cost_ratio:.0f}x cheaper\"\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - ~4 lines                               #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# __main__: run the scaling scenarios\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    print(\"=\" * 70)\n    print(\"HNSW Billion-Scale Limitation Calculator\")\n    print(\"=\" * 70)\n    print()\n\n    # Scenarios: 1M, 10M, 100M, 1B vectors at 768D float32\n    SCENARIOS = [\n        (1_000_000,     \"1M\"),\n        (10_000_000,    \"10M\"),\n        (100_000_000,   \"100M\"),\n        (1_000_000_000, \"1B\"),\n    ] if not VERIFY else [\n        (1_000_000, \"1M\"),\n        (1_000_000_000, \"1B\"),\n    ]\n\n    DIM = 768\n    M = 16\n    DELETION_RATE = 0.10  # 10% soft-deleted\n\n    print(f\"{'Scale':<6} {'RAM (GB)':>10} {'RAM (TB)':>10} {'RAM $/mo':>12} \"\n          f\"{'SSD $/mo':>10} {'Ratio':>8}\")\n    print(\"-\" * 70)\n\n    last_model = None\n    for n, label in SCENARIOS:\n        model = HNSWCostModel(\n            n_vectors=n,\n            dimensions=DIM,\n            M=M,\n            dtype_bytes=4,\n            deletion_rate=DELETION_RATE,\n        )\n        mem = model.compute_memory_gb()\n        costs = model.compare_to_disk()\n\n        print(f\"{label:<6} {mem['total_gb']:>10,.1f} {mem['total_tb']:>10.2f} \"\n              f\"${costs['ram_cost_per_month']:>10,.0f} \"\n              f\"${costs['ssd_cost_per_month']:>8,.0f} \"\n              f\"{costs['cost_ratio']:>6.0f}x\")\n        last_model = model\n\n    # Deletion overhead analysis\n    print()\n    print(f\"Deletion overhead analysis (deletion_rate={DELETION_RATE:.0%}):\")\n    deletion = last_model.compute_deletion_overhead()\n    print(f\"  Ghost fraction: {deletion['ghost_fraction']:.0%} of index is soft-deleted\")\n    print(f\"  Wasted hops per query: {deletion['wasted_hops']:.1f} of {last_model.avg_query_hops}\")\n    print(f\"  Overhead: {deletion['overhead_pct']:.1f}% extra latency wasted on ghosts\")\n\n    # Rewrite cost\n    print()\n    rewrite = last_model.compute_rewrite_cost(daily_mutation_rate=0.001)\n    print(f\"Mutation I/O cost (0.1% daily mutations, 1B vectors):\")\n    print(f\"  Mutations/day: {rewrite['mutations_per_day']:,.0f}\")\n    print(f\"  I/O per day: {rewrite['rewrite_tb_per_day']:.1f} TB\")\n    print(f\"  At 2 GB/s: {rewrite['rewrite_hours']:.1f} hours of I/O per day\")\n\n    # The headline number\n    print()\n    costs_1b = HNSWCostModel(\n        n_vectors=1_000_000_000,\n        dimensions=DIM,\n        M=M,\n    ).compare_to_disk()\n    ratio = costs_1b['cost_ratio']\n    print(f\"Bottom line: SSD alternative is {costs_1b['cheaper_label']} than RAM\")\n    if ratio >= 30:\n        print(\"This matches the real-world DiskANN result: 40x cheaper than HNSW clusters.\")\n    print()\n    print(\"=> The case for DiskANN is clear. See Module 3 for how Vamana makes it work.\")\n"}]}, "module_03_vamana_and_robustprune_a_better_graph_without_hier": {"content": "# Module 3: Vamana and RobustPrune — A Better Graph Without Hierarchy\n\n## Table of Contents\n\n1. [Learning Objectives](#learning-objectives)\n2. [Motivation: Why Fix HNSW?](#motivation-why-fix-hnsw)\n3. [The Core Idea: One Graph to Rule Them All](#the-core-idea-one-graph-to-rule-them-all)\n4. [GreedySearch: The Foundation](#greedysearch-the-foundation)\n5. [Vamana Insert: Getting Long Edges for Free](#vamana-insert-getting-long-edges-for-free)\n6. [RobustPrune: Enforcing the Degree Bound Intelligently](#robustprune-enforcing-the-degree-bound-intelligently)\n7. [The Alpha Parameter: A Non-Monotonic Surprise](#the-alpha-parameter-a-non-monotonic-surprise)\n8. [The Degree Bound M: How Many Edges Is Enough?](#the-degree-bound-m-how-many-edges-is-enough)\n9. [True Deletion via Graph Contraction](#true-deletion-via-graph-contraction)\n10. [Vamana vs HNSW: An Empirical Comparison](#vamana-vs-hnsw-an-empirical-comparison)\n11. [Analytical Questions](#analytical-questions)\n12. [Synthesis: Where This Takes Us](#synthesis-where-this-takes-us)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n- Explain the three production limitations of HNSW that motivate Vamana\n- Implement `GreedySearch` and understand why it returns the full **visited set** $V$, not just the top-$k$ results\n- Implement `RobustPrune` with the $\\alpha$ parameter and articulate the exact pruning condition\n- Trace through a full Vamana insert, explaining how long edges emerge without a hierarchy\n- Explain why the $\\alpha$–recall relationship is non-monotonic and predict behavior at extremes\n- Implement true deletion via graph contraction and compare it to HNSW's soft-delete approach\n\n---\n\n## Motivation: Why Fix HNSW?\n\nIn Module 2 you built HNSW: a hierarchical navigable small world that achieves excellent recall through its multi-level structure. HNSW is genuinely impressive — it achieves sub-linear query time with high recall by naturally creating long-range edges at higher levels and short-range edges at lower ones.\n\nBut at the scale of a production vector database, three cracks appear that grow into chasms.\n\n### Crack 1: Memory-Only by Design\n\nHNSW was [designed with memory operations in mind](https://github.com/nmslib/hnswlib/issues/47#issuecomment-411877629). Reading a 4K SSD page takes approximately 20,000 ns, while a memory read takes roughly 100 ns — a **200× gap**[^1]. HNSW performs dozens of random node reads per query; moving each of those to disk would make even simple queries take tens of milliseconds. The algorithm's structure gives you no way to batch those reads.\n\nThe consequence: **you must load the entire index into RAM before issuing a single query.** For 1 billion 768-dimensional float32 embeddings, that means 2.8 TB of RAM. Serving this requires a cluster of expensive high-memory machines. One engineer who encountered this problem ended up running a cluster totaling 3 TB of RAM across multiple servers — all just for a vector index.\n\n[^1]: These numbers come from Google's [Latency Numbers Every Programmer Should Know](https://static.googleusercontent.com/media/sre.google/en//static/pdf/rule-of-thumb-latency-numbers-letter.pdf). The 200× figure is why DiskANN needs completely different algorithmic assumptions: one memory-resident HNSW query could complete before a single SSD read even *returns*.\n\n### Crack 2: Fake Deletions\n\nHNSW was not designed with a true delete mechanism. The official `hnswlib` library still lacks a delete API. Instead, nodes are marked as \"deleted\" and **filtered out at query time** — a soft delete. This is a tombstone approach.\n\nThe problem compounds over time. In a production system where users update their embeddings (an update is a delete + re-insert), deleted nodes accumulate. Every query now wastes time visiting tombstoned nodes, degrades as the \"useful\" fraction of the graph shrinks, and grows the index beyond its actual size. There is no way to reclaim that space.\n\n### Crack 3: Monolithic Storage\n\n`hnswlib` saves its index by dumping the raw memory layout to disk. This is fast to load — but inserting even 10 new vectors into a 250 GB index requires: loading 250 GB into memory, performing the insert, then writing 250 GB back. The format is binary and monolithic with no record-level update capability.\n\
