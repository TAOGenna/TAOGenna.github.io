n**Check your understanding:** HNSW uses a hierarchical structure to create long-range edges at higher levels. If we flatten all HNSW levels into a single graph (merging all edges per node), what property would we lose? What property would survive?\n\n> *You'd lose the implicit edge-length stratification — higher levels naturally had longer edges because fewer nodes existed. What survives: the graph is still navigable, and empirically GreedySearch on the flattened HNSW graph still works. In fact, we'll see later that Vamana's GreedySearch often *outperforms* HNSW's own search algorithm run on the HNSW graph.*\n\n---\n\n## The Core Idea: One Graph to Rule Them All\n\nMicrosoft Research's 2019 DiskANN paper introduces **Vamana**: a single-level graph algorithm that solves all three problems. The key insight is:\n\n> HNSW uses a hierarchy to create diverse edge lengths. Vamana gets the same diversity for free from the insert algorithm itself.\n\nRecall from Module 2 why diverse edge lengths matter: you need long edges to navigate across the space quickly (like highways), and short edges to hone in on the exact neighborhood (like local streets). HNSW buys these with an exponential decay level assignment. Vamana gets them from a different source: **the order in which nodes are visited during the search that precedes each insert.**\n\nThe Vamana graph has two algorithm primitives:\n\n1. **GreedySearch** — returns the top-$k$ nearest nodes *and* the full set of visited nodes $V$\n2. **RobustPrune** — selects at most $M$ edges for a node while preserving graph quality via an $\\alpha$ parameter\n\nLet's build up each one.\n\n---\n\n## GreedySearch: The Foundation\n\nGreedySearch is conceptually the same beam search we discussed in Module 1 and used in HNSW: maintain a priority queue of candidates sorted by distance to the query, repeatedly expand the closest unvisited candidate by adding its neighbors to the queue, stop when you've visited all $L$ candidates.\n\nThe critical Vamana-specific feature: **return the full visited set $V$**, not just the top-$k$ results.\n\n$$\\text{GreedySearch}(G, q, s, k, L) \\rightarrow (\\text{top-}k \\text{ nodes}, V)$$\n\nwhere:\n- $G$ = the graph adjacency list\n- $q$ = query vector  \n- $s$ = entry node (start)\n- $k$ = number of results to return\n- $L$ = size of the candidate list (beam width, $L \\geq k$)\n- $V$ = every node we touched during the traversal\n\nHere's the algorithm step by step:\n\n**Step 1.** Initialize: candidates $C = \\{s\\}$, visited $V = \\emptyset$.\n\n**Step 2.** While there exists a node in $C$ that is not in $V$:\n   - Let $c^* = \\arg\\min_{c \\in C \\setminus V} \\text{dist}(q, c)$ (closest unvisited candidate)\n   - Add all neighbors of $c^*$ to $C$ (if not already in $V$)\n   - Add $c^*$ to $V$\n   - Truncate $C$ to keep only the $L$ closest nodes\n\n**Step 3.** Return (top-$k$ nodes from $C$, $V$)\n\nIn code:\n\n```python\nimport heapq\n\ndef greedy_search(graph, vectors, query, entry_node, k, L):\n    \"\"\"\n    graph: dict mapping node_id -> list of neighbor node_ids\n    vectors: array of shape (N, D)\n    query: array of shape (D,)\n    Returns: (top_k_ids, visited_set)\n    \"\"\"\n    dist = lambda u: float(np.sum((vectors[u] - query) ** 2))\n    \n    # candidates: min-heap of (distance, node_id)\n    candidates = [(dist(entry_node), entry_node)]\n    visited = set()\n    \n    while True:\n        # Find closest unvisited in candidates\n        unvisited = [(d, n) for d, n in candidates if n not in visited]\n        if not unvisited:\n            break\n        d_best, best = min(unvisited)\n        \n        visited.add(best)\n        # Expand: add unseen neighbors\n        for neighbor in graph.get(best, []):\n            if neighbor not in visited:\n                candidates.append((dist(neighbor), neighbor))\n        \n        # Truncate to L closest\n        candidates = sorted(set(candidates))[:L]\n    \n    top_k = [n for d, n in sorted(candidates)[:k]]\n    return top_k, visited\n```\n\n### Why the Visited Set $V$ Is Everything\n\nHere is the key insight that separates Vamana from standard beam search: **$V$ contains nodes at all distances from the target location.**\n\n- Nodes visited **early** in the traversal are far from the final destination — they are the long-range \"highway\" nodes that guided us across the space.\n- Nodes visited **late** are close to the target — they are the local \"neighborhood\" nodes.\n\nWhen we insert a new vector $I$, we will add edges from every node in $V$ to $I$. This means:\n- The early-visited, far-away nodes get a **long edge** pointing to $I$'s location.\n- The late-visited, close nodes get **short edges** refining the local neighborhood.\n\nThis is the entire mechanism by which Vamana creates diverse edge lengths — **without any hierarchy**. HNSW needs exponential decay and multiple levels; Vamana gets the same effect from a single traversal.\n\n![GreedySearch visited set creates diverse edges](diagrams/greedy_search_visited_set.svg)\n\n**Check your understanding:** What would happen to edge diversity if we set $L = k$ (the beam width equals the number of results)?\n\n> *When $L = k$, we only ever keep $k$ nodes in the candidate list. The search terminates very quickly because the list fills up with the $k$ nearest nodes and stops expanding. Most of the graph never gets visited, so $V$ is tiny. The inserted node would get very few edges, mostly short-range ones — losing the long-range navigation structure. Query performance on the resulting index would be poor.*\n\n---\n\n## Vamana Insert: Getting Long Edges for Free\n\nThe full insert operation for a new node $I$ with vector $\\mathbf{v}_I$:\n\n**Step 1.** Run `GreedySearch` starting from the entry node. Collect all visited nodes $V$.\n\n**Step 2.** Add **forward edges** $I \\rightarrow v$ for the best neighbors among $V$. This is done via `RobustPrune(I, V, \\alpha, M)`.\n\n**Step 3.** Add **backward edges** $v \\rightarrow I$ for each neighbor selected in Step 2. This is the crucial part: every node that gets an edge *from* $I$ should also get an edge *to* $I$.\n\n**Step 4.** For any node $v$ that now exceeds the degree bound $M$ (because it received a new backedge), run `RobustPrune(v, \\text{neighbors}(v) \\cup \\{I\\}, \\alpha, M)` to trim it back down.\n\nIn pseudocode:\n\n```python\ndef vamana_insert(index, node_id, vector, alpha, degree_bound, L):\n    # Step 1: search and collect visited set\n    results, visited = greedy_search(\n        index.graph, index.vectors, vector,\n        index.entry_node, k=degree_bound, L=L\n    )\n    \n    # Step 2: select forward edges using RobustPrune\n    forward_neighbors = robust_prune(\n        node_id, list(visited), alpha, degree_bound, index.vectors\n    )\n    index.graph[node_id] = forward_neighbors\n    \n    # Step 3 & 4: add backedges, prune over-degree nodes\n    for neighbor in forward_neighbors:\n        existing = index.graph.get(neighbor, [])\n        candidates = list(set(existing + [node_id]))\n        if len(candidates) > degree_bound:\n            index.graph[neighbor] = robust_prune(\n                neighbor, candidates, alpha, degree_bound, index.vectors\n            )\n        else:\n            index.graph[neighbor] = candidates\n```\n\n![Vamana insert: long edges emerge from visited set](diagrams/vamana_insert_long_edges.svg)\n\nThe beauty here is subtle. When you insert node $I$, the path to find it naturally passes through both far-away nodes (at the beginning of the traversal) and close nodes (at the end). By connecting all of them to $I$, you create a rich mixture of edge lengths. This works because the graph is searched greedily — the entry node is always far from any given target, so early-visited nodes are always long-range.\n\n**Check your understanding:** After inserting 100 nodes, should we update the entry node? Under what criterion?\n\n> *Yes — a common heuristic is to use the \"medoid\" of the dataset (the node with minimum average distance to all others) as the entry node, since this minimizes the expected first-hop distance for any query. In practice, we can periodically update the entry node or choose it as the node closest to the dataset centroid after building. Using a bad entry node (e.g., the first node inserted, which might be an outlier) hurts recall because every query starts from a poor position.*\n\n---\n\n## RobustPrune: Enforcing the Degree Bound Intelligently\n\nWithout a degree bound, the graph would grow without limit. More edges means more computation per hop — and critically for disk-based systems, more disk reads per node expansion. The degree bound $M$ caps this.\n\nThe naive approach: keep the $M$ closest neighbors. This is exactly what kills graph quality. If all edges from a node point to its $M$ nearest neighbors, the node is only connected to its tight local cluster. It can't route traffic through it to distant parts of the graph.\n\nRobustPrune uses a smarter selection rule: **prune a candidate if there already exists a selected neighbor that acts as a \"relay\" — i.e., going through that relay to reach the candidate is at least as efficient.**\n\n### The Pruning Condition\n\nFormally, given a node $p$ (the node whose edges we're selecting), a set of candidates $C$ (nodes that could become neighbors of $p$), and parameters $\\alpha \\geq 1.0$ and degree bound $M$:\n\n$$\\text{RobustPrune}(p, C, \\alpha, M):$$\n\n1. Initialize result set $R = \\emptyset$, working set $C' = C \\setminus \\{p\\}$ sorted by distance to $p$\n2. While $|R| < M$ and $C' \\neq \\emptyset$:\n   a. Let $c^* = \\arg\\min_{c \\in C'} \\text{dist}(p, c)$ — the closest remaining candidate\n   b. Add $c^*$ to $R$\n   c. **Remove from $C'$ all** $q$ such that $\\text{dist}(p, q) \\geq \\alpha \\cdot \\text{dist}(c^*, q)$\n3. Return $R$\n\nStep 2c is the heart of it. We remove candidate $q$ from consideration if:\n\n$$\\text{dist}(p, q) \\geq \\alpha \\cdot \\text{dist}(c^*, q)$$\n\nIn plain English: *if we can reach $q$ from $c^*$ in a distance that's at most $\\frac{1}{\\alpha}$ times the direct distance from $p$ to $q$, then the edge $p \\rightarrow q$ is redundant — a query at $p$ would find $q$ via $c^*$ anyway.*\n\nWhen $\\alpha = 1.0$: we prune $q$ if $\\text{dist}(p, q) \\geq \\text{dist}(c^*, q)$. This is aggressive — any candidate reachable more efficiently via an already-selected neighbor gets cut.\n\nWhen $\\alpha > 1.0$: we add slack. We only prune $q$ if the detour via $c^*$ is at most $\\alpha$ times longer than going directly. This slack allows some longer direct edges to survive even when a shorter relay exists.\n\n```python\ndef robust_prune(node_id, candidates, alpha, degree_bound, vectors):\n    \"\"\"\n    Select at most degree_bound edges for node_id from candidates.\n    \"\"\"\n    p = vectors[node_id]\n    \n    # Sort candidates by distance to node, exclude self\n    remaining = sorted(\n        [c for c in candidates if c != node_id],\n        key=lambda c: np.sum((vectors[c] - p) ** 2)\n    )\n    \n    result = []\n    while remaining and len(result) < degree_bound:\n        # Pick closest remaining candidate\n        best = remaining[0]\n        result.append(best)\n        remaining = remaining[1:]\n        \n        # Remove all candidates \"covered\" by best\n        best_vec = vectors[best]\n        remaining = [\n            q for q in remaining\n            if np.sum((p - vectors[q]) ** 2) < alpha * np.sum((best_vec - vectors[q]) ** 2)\n        ]\n    \n    return result\n```\n\n![RobustPrune: alpha controls long-edge preservation](diagrams/robust_prune_alpha.svg)\n\n### Intuition via a Concrete Example\n\nImagine node $p$ at position $(0, 0)$ in 2D space. Candidate $c^*$ is at $(1, 0)$ — the closest. Candidate $q$ is at $(2, 0)$.\n\n- $\\text{dist}(p, q) = 2$\n- $\\text{dist}(c^*, q) = 1$\n\n**With $\\alpha = 1.0$:** We check $2 \\geq 1.0 \\times 1 = 1$. True! So we prune $q$. The edge $p \\rightarrow q$ is cut because the path $p \\rightarrow c^* \\rightarrow q$ is just as efficient.\n\n**With $\\alpha = 1.5$:** We check $2 \\geq 1.5 \\times 1 = 1.5$. True — prune $q$ still.\n\n**With $\\alpha = 2.5$:** We check $2 \\geq 2.5 \\times 1 = 2.5$. False! So $q$ **survives**. We keep the long edge $p \\rightarrow q$ despite $c^*$ being available as a relay.\n\nNow extend this to high-dimensional space with thousands of candidates, and you see how $\\alpha$ systematically controls how aggressively long edges are pruned.\n\n**Check your understanding:** What is the common mistake of implementing the pruning condition as $\\text{dist}(p, q) \\leq \\alpha \\cdot \\text{dist}(c^*, q)$? What would this prune instead?\n\n> *The flipped condition prunes candidates $q$ where the **direct** edge is **shorter** than $\\alpha$ times the relay. This removes short edges (close candidates) and keeps long ones — the exact opposite of what we want! You'd end up with a graph that has only very long edges, which is terrible for local precision search. The condition must use $\\geq$ to prune candidates reachable via a relay.*\n\n---\n\n## The Alpha Parameter: A Non-Monotonic Surprise\n\nHere's the experiment you'll run in Exercise 4, and the result is genuinely surprising. We sweep $\\alpha \\in \\{1.0, 1.05, 1.1, 1.15, 1.2, 1.3, 1.5, 2.0, 4.0\\}$ on a dataset, measuring recall@10 at each setting.\n\nYou might expect a monotonic improvement: more $\\alpha$ → more long edges → better long-range navigation → higher recall. **This is wrong.**\n\nWhat actually happens on the GIST1M dataset (960 dimensions, 1M vectors) is:\n\n| $\\alpha$ | Recall@10 | Edge behavior |\n|----------|-----------|---------------|\n| 1.0 | ~0.72 | Aggressively short edges, poor navigation |\n| 1.05 | ~0.81 | Slight improvement |\n| **1.1** | **~0.89** | **Peak — balanced mix** |\n| 1.2 | ~0.85 | Slight decline |\n| 1.5 | ~0.79 | Noticeable decline |\n| 2.0 | ~0.78 | Declining |\n| 4.0 | ~0.61 | Dramatic decline |\n\nThe relationship peaks at $\\alpha \\approx 1.1$ then drops — a non-monotonic response[^2].\n\n[^2]: This empirical result comes from the DiskANN blog post analysis of GIST1M. The specific peak at $\\alpha = 1.1$ is dataset-dependent. For other datasets, the peak might shift. This is why the paper emphasizes that $\\alpha$ must be evaluated per dataset — there is no universal optimal value.\n\n### Why Does High Alpha Hurt?\n\nAt $\\alpha = 4.0$, almost no candidates are pruned. The graph ends up with edges that span enormous distances — great for initial navigation, terrible for local refinement. When a query arrives in the neighborhood of its target, it can't find the precise nearest neighbors because the graph's edges all \"overshoot\" the local area.\n\nThink of it like a transportation network: if every road is a transcontinental highway, you can cross countries quickly but can't navigate your neighborhood. The optimal network has highways *and* local streets. Vamana with $\\alpha = 1.1$ achieves this balance. Vamana with $\\alpha = 4.0$ only builds highways.\n\n### Why Does Alpha=1.0 Also Hurt?\n\nAt $\\alpha = 1.0$, the pruning is maximally aggressive. Every candidate that has *any* relay through an already-selected neighbor gets cut. The result: very tight local clusters of edges, almost like a $k$-NN graph. There are no long-range edges to navigate across the space. A query starting at the entry node makes slow, plodding progress toward the target, visiting many intermediate nodes.\n\nThe key lesson: **$\\alpha$ must be evaluated empirically for your specific dataset.** There is no closed-form optimum. The DiskANN paper sets $\\alpha = 1.2$ as a reasonable default for many benchmarks, but empirical tuning is essential.\n\n---\n\n## The Degree Bound M: How Many Edges Is Enough?\n\nThe degree bound $M$ determines how many neighbors each node can have. Unlike $\\alpha$, the $M$–recall relationship is monotone (more edges always helps — up to a point where you're doing too much computation per hop).\n\nAnalysis on GIST1M shows:\n\n$$\\text{recall increases with } M \\text{, with diminishing returns past } M \\approx 150$$\n\nMore importantly, there's an **optimal minimum below which both accuracy and query time degrade**:\n\n$$M < 32 \\implies \\text{both inaccuracy AND slow convergence}$$\n\nThis is the curse of dimensionality at work again. In high-dimensional spaces, many different vectors can be \"similar\" — the discriminating power of any single neighbor is low. You need more edges to reliably navigate toward the true nearest neighbors.\n\nFor disk-based systems, $M$ has a direct cost: each node expansion reads $M$ neighbor IDs from disk, plus (for RobustPrune compatibility) their distance computations. Higher $M$ → more disk I/O per query hop. The tradeoff:\n\n$$\\text{disk reads per query} = \\text{num\\_hops} \\times M$$\n\nIncreasing $M$ reduces `num_hops` (better graph) but increases the per-hop cost. The optimal $M$ for disk-based systems is lower than for memory-based systems because you're paying more per hop.\n\n**A practical rule of thumb:** Start with $M = 32$–$64$ for on-disk systems, $M = 48$–$128$ for in-memory. Tune via eval on your dataset.\n\n---\n\n## True Deletion via Graph Contraction\n\nIn Module 2, we noted HNSW's soft-delete limitation. Vamana provides a principled solution: **graph contraction** followed by `RobustPrune`.\n\nThe problem with simply removing a node $d$ from the graph:\n\nSuppose the search path to node $t$ goes through $d$: \n\n$$s \\rightarrow a \\rightarrow d \\rightarrow t$$\n\nIf we remove $d$, the path is severed. Node $t$ becomes unreachable from $s$ via this route. More generally, any node whose *only* path from the entry node passes through $d$ becomes disconnected.\n\n### The Contraction Solution\n\n**Step 1.** Find all *incoming* neighbors of $d$ (nodes that have an edge pointing to $d$). Call them $N^{\\text{in}}(d)$.\n\n**Step 2.** Find all *outgoing* neighbors of $d$ (nodes that $d$ points to). Call them $N^{\\text{out}}(d)$.\n\n**Step 3.** For each $u \\in N^{\\text{in}}(d)$: add all nodes in $N^{\\text{out}}(d)$ as candidates for $u$'s neighbor list. This creates a path $u \\rightarrow v$ for each $v \\in N^{\\text{out}}(d)$, bypassing the deleted node.\n\n**Step 4.** Run `RobustPrune` on each $u \\in N^{\\text{in}}(d)$ to trim back to the degree bound $M$.\n\n**Step 5.** Remove $d$ from the graph.\n\n```python\ndef vamana_delete(index, node_id, alpha, degree_bound):\n    outgoing = index.graph.get(node_id, [])\n    incoming = index.get_incoming_neighbors(node_id)  # reverse adj lookup\n    \n    # Step 3: bridge the gap — connect all incoming to all outgoing\n    for u in incoming:\n        existing = index.graph.get(u, [])\n        candidates = list(set(existing + outgoing) - {node_id})\n        index.graph[u] = robust_prune(\n            u, candidates, alpha, degree_bound, index.vectors\n        )\n    \n    # Step 5: remove the deleted node\n    del index.graph[node_id]\n    for u in incoming:\n        index.graph[u] = [v for v in index.graph[u] if v != node_id]\n```\n\n![True deletion via graph contraction](diagrams/deletion_contraction.svg)\n\n### Comparing Hard vs Soft Delete\n\nThe difference becomes stark after deleting 10–20% of nodes:\n\n**Soft delete (HNSW approach):** \n- Recall stays high initially\n- But 10% of nodes are tombstones → ~10% of hops are wasted visiting dead nodes\n- These waste both CPU cycles and (for disk systems) disk reads\n- As deletions accumulate, the overhead compounds\n\n**Hard delete (graph contraction):**\n- Recall drops slightly immediately after deletion (~2–4%) because some paths are pruned\n- But every visited node during a query is a live, useful node\n- No wasted computation\n- Recall remains stable as more deletions happen\n\nFor a production system running continuously, the soft-delete approach degrades over time to effectively a fraction of its original performance. The hard-delete approach maintains consistent performance.\n\n**Check your understanding:** What is the computational complexity of deleting a node $d$ if it has $M$ outgoing neighbors and $M$ incoming neighbors? How does this compare to soft-delete?\n\n> *Hard delete requires running `RobustPrune` on $M$ nodes. Each `RobustPrune` runs in $O(M^2)$ (sort + linear scan per selected neighbor). So deletion is $O(M^3)$. For $M = 64$: $64^3 \\approx 262,000$ operations. Soft-delete is $O(1)$ — just flip a bit. The tradeoff is amortized over future queries: every subsequent query saves ~10% wasted hops (at 10% deletion rate). At high QPS over months, the delete cost is tiny vs the cumulative savings.*\n\n---\n\n## Vamana vs HNSW: An Empirical Comparison\n\nBuilding both algorithms on the GIST1M dataset with comparable parameters reveals:\n\n### Edge Distribution\n\nBoth HNSW and Vamana produce similar edge *distance* distributions — a mix of short and long edges. But Vamana has more edges total, because it enforces a strict upper bound while **utilizing it more fully**.\n\nHNSW node edge count distribution: many nodes have far fewer than $M$ edges (especially at higher levels where fewer nodes exist).\n\nVamana node edge count distribution: most nodes are at or near the degree bound $M$. The graph is denser and more uniform.\n\n### Convergence Speed\n\nOn GIST1M, Vamana finds more ground-truth nearest neighbors per query iteration compared to HNSW. In other words: after visiting the same number of nodes, Vamana has higher recall. Vamana \"converges faster\" to the true neighborhood.\n\nThe reason: RobustPrune enforces a **strict upper bound** on edges, which turns out to also enforce better *edge quality*. HNSW's greedy edge selection can produce redundant edges (multiple edges pointing in the same direction); RobustPrune's coverage-based pruning avoids this.\n\n### Migration Path\n\nBecause Vamana's `GreedySearch` works on any navigable graph, you can flatten an existing HNSW index (merge all levels) and immediately use it with Vamana's search algorithm. Empirically, `GreedySearch` on a flattened HNSW graph often **exceeds** the recall of HNSW's own search algorithm on the same graph. This provides a migration path: no expensive reindex needed.\n\n---\n\n## Analytical Questions\n\nThese questions require synthesis across the module. Think carefully before checking the discussion below.\n\n**Q1. The RobustPrune condition uses distance to remove candidates. But Vamana builds the graph using Euclidean distance, while the actual optimal search structure depends on the data distribution. Under what conditions would RobustPrune's coverage-based pruning be *incorrect* — i.e., prune edges that are actually necessary for navigability?**\n\n*Discussion: Consider a \"donut\" shaped distribution where points lie on a ring. A selected neighbor $c^*$ might be on the opposite side of the ring from candidate $q$, even though $\\text{dist}(c^*, q)$ is small (straight-line distance cutting through the hole). The pruning condition would remove the edge $p \\rightarrow q$ even though navigating the ring requires going around it. In general, RobustPrune assumes Euclidean space is a good proxy for navigation distance. When the intrinsic geometry differs from Euclidean (manifolds, constrained spaces), this assumption breaks down. In practice, for embedding spaces from neural networks this is usually fine because embeddings are designed to have Euclidean-friendly geometry.*\n\n**Q2. Vamana's insert order affects graph quality. In the original paper, vectors are inserted in a random order. Would a non-random order — say, inserting clustered data in cluster-by-cluster order — hurt or help graph quality? Propose an experiment to test this.**\n\n*Discussion: Inserting cluster-by-cluster likely hurts. When you insert an entire cluster before any cross-cluster edges exist, each insertion only finds nearby nodes in the same cluster. Cross-cluster long edges are built much later when other clusters finally exist. The resulting graph has excellent local structure but poor global navigation. An experiment: build two Vamana indices on the same dataset — one with random order, one sorted by cluster membership — measure recall@10 for both. Measure also the edge length distribution to confirm long-edge scarcity in the clustered case.*\n\n**Q3. The degree bound $M$ creates a tension between query performance (higher $M$ = better steps) and disk I/O (higher $M$ = more reads per hop). Derive the optimal $M$ as a function of the dataset size $N$ and disk read latency $\\tau$, given that traversal requires approximately $O(\\log N)$ hops.**\n\n*Discussion: Total query latency $= O(\\log N) \\times M \\times \\tau + O(\\log N) \\times \\text{dist\\_compute}(M)$. The disk term is $\\Theta(M \\log N \\tau)$ and the compute term is $\\Theta(M \\log N)$. Both scale linearly in $M$, so latency is linear in $M$ given fixed dataset size. But recall improves sub-linearly with $M$ (diminishing returns). Therefore the optimal $M$ is where the marginal recall gain per additional edge equals the marginal latency cost — this is dataset-dependent, but empirically falls around $M = 48$–$64$ for on-disk systems with NVMe SSDs ($\\tau \\approx 20\\mu s$).*\n\n**Q4. CoreNN uses \"backedge deltas\" instead of FreshDiskANN's temporary in-memory graph approach. The backedge delta approach stores additional neighbors at a separate DB key, merged at query time. What is the recall impact of having nodes with more than $M$ total neighbors (base + delta)? Is there an asymptotic guarantee that accuracy never degrades below the fully pruned version?**\n\n*Discussion: Having more than $M$ neighbors per node can only improve recall — you're adding edges, not removing them. The question is whether the un-pruned extra edges cause \"overconverging\" (spending too many hops in the wrong area). In practice, the `max_degree_bound` threshold (e.g., $2M$) is reached before RobustPrune runs, so the degree stays bounded. The asymptotic guarantee: a node with $\\leq$ `max_degree_bound` edges is never worse than the pruned version, because the pruned version is a subset of the current neighbors — we've only added edges. Once RobustPrune runs, we're back to exactly $M$ optimized edges.*\n\n---\n\n## Synthesis: Where This Takes Us\n\nLet's step back and see what Vamana accomplishes in the arc of this course.\n\nIn Module 0, we established why brute force fails: $O(N \\cdot D)$ is too slow at scale. In Module 1, we saw that graph traversal with the right edge structure achieves sub-linear search. In Module 2, HNSW achieved this via a hierarchy — but with three production limitations.\n\nVamana eliminates those limitations while *improving* algorithmic quality:\n\n| Property | HNSW | Vamana |\n|----------|------|--------|\n| Long-range edges | Via hierarchy | Via visited set during insert |\n| Degree bound | Soft (per-level) | Hard (global, strict) |\n| True deletion | No | Yes (graph contraction) |\n| On-disk suitability | Poor | Designed for it |\n| Recall (GIST1M, same params) | Baseline | Higher convergence speed |\n\nBut Vamana alone doesn't solve the disk problem. The core issue: even with $M = 64$ edges per node, expanding every neighbor requires computing distances to all $M$ candidates. For billion-scale indices, those vectors live on disk. That's $64$ disk reads per hop × $\\log(N)$ hops × 20,000 ns per read = **potentially seconds per query**.\n\nThis is exactly why Module 4 introduces **Product Quantization**: a compression scheme that lets you keep approximate (quantized) versions of all vectors in RAM, perform distance computations in memory, and only read full-precision vectors from disk when absolutely necessary. Vamana builds the graph structure; PQ makes it viable to traverse that structure from disk.\n\nThe full DiskANN strategy you'll complete in Modules 4 and 5:\n\n1. **Vamana graph** (this module): efficient graph structure with tunable long edges and true deletion\n2. **Product Quantization** (Module 4): compress all vectors into RAM, compute distances fast\n3. **Disk-native storage** (Module 5): co-locate full vectors with neighbor lists, exploit 4K page reads, use RocksDB for mutable record-level updates\n\nTogether these reduce the cost of serving 1 billion vectors from a 3 TB RAM cluster to a single 96 GB machine — a 40× cost reduction while maintaining high recall.\n\n---\n\n*References: [DiskANN paper (Jayaram Subramanya et al., NeurIPS 2019)](https://suhasjs.github.io/files/diskann_neurips19.pdf) · [CoreNN blog post by Wilson Lin](https://blog.wilsonl.in/diskann/) · [FreshDiskANN (Singh et al., 2021)](https://arxiv.org/abs/2105.09613)*\n", "exercises": [{"filename": "ex01_vamana_greedysearch_with_visited_tracking.py", "content": "\"\"\"\nExercise 1: Vamana GreedySearch with Visited Tracking\n======================================================\nModule 3 — Vamana and RobustPrune: A Better Graph Without Hierarchy\n\nThe core difference between Vamana's GreedySearch and a standard top-k\nbeam search: GreedySearch returns the FULL VISITED SET V in addition to\nthe top-k results.\n\nWhy does this matter? During Vamana insert, V is used to determine which\nnodes get edges to the newly inserted node. Nodes visited early are far\nfrom the insertion point (long edges), nodes visited late are close\n(short edges). This is how Vamana creates diverse edge lengths without\nany hierarchy — the traversal path naturally spans all distances.\n\nYour task: implement greedy_search() that tracks visited nodes correctly.\n\nKey algorithm (from DiskANN paper):\n    \"Repeatedly expand the closest unvisited node in the search list\n     (starting from the entry node) by inserting its neighbors into\n     the search list. Stop once there are no more unvisited nodes.\"\n\"\"\"\n\nimport os\nimport heapq\nimport random\nimport numpy as np\nfrom typing import Dict, List, Set, Tuple\n\n# ── Reproducibility ───────────────────────────────────────────────────────────\nSEED = 42\nrandom.seed(SEED)\nnp.random.seed(SEED)\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 200 if VERIFY else 5_000   # tiny vs full\nN_DIM     = 32  if VERIFY else 128\nN_QUERIES = 5   if VERIFY else 100\n\n\n# ── Distance helper ───────────────────────────────────────────────────────────\n\ndef sq_dist(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"Squared Euclidean distance between vectors a and b.\"\"\"\n    diff = a - b\n    return float(np.dot(diff, diff))\n\n\n# ── VamanaIndex data structure ────────────────────────────────────────────────\n\nclass VamanaIndex:\n    \"\"\"\n    A simple Vamana-style graph index.\n\n    Attributes\n    ----------\n    vectors : np.ndarray\n        Shape (N, D). All stored vectors.\n    graph : dict[int, list[int]]\n        Adjacency list. graph[i] = list of neighbor node IDs for node i.\n    entry_node : int\n        The node used as the starting point for all searches.\n    \"\"\"\n\n    def __init__(self, vectors: np.ndarray):\n        self.vectors = vectors\n        n = len(vectors)\n        self.graph: Dict[int, List[int]] = {i: [] for i in range(n)}\n        self.entry_node: int = 0\n\n    def add_edge(self, src: int, dst: int) -> None:\n        \"\"\"Add a directed edge src → dst (avoids self-loops and duplicates).\"\"\"\n        if src != dst and dst not in self.graph[src]:\n            self.graph[src].append(dst)\n\n    def num_nodes(self) -> int:\n        return len(self.vectors)\n\n    def greedy_search(\n        self,\n        query: np.ndarray,\n        k: int,\n        L: int,\n    ) -> Tuple[List[int], Set[int]]:\n        \"\"\"\n        Run GreedySearch from self.entry_node.\n\n        Parameters\n        ----------\n        query : np.ndarray\n            Query vector of shape (D,).\n        k : int\n            Number of nearest neighbors to return.\n        L : int\n            Candidate list size (beam width). Must satisfy L >= k.\n\n        Returns\n        -------\n        top_k : list[int]\n            The k nearest node IDs found (sorted by distance to query).\n        visited : set[int]\n            Every node expanded during the search. CRITICAL for insert:\n            - Early nodes in visited → far from query → will become long edges\n            - Late nodes in visited → close to query → will become short edges\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - 20-25 lines                            #\n        #                                                         #\n        # Hint: Use a list of (distance, node_id) tuples as your  #\n        #   candidate set. At each step:                          #\n        #   1. Find the closest node in candidates that is NOT    #\n        #      in visited                                         #\n        #   2. If none exists, we are done — break                #\n        #   3. Mark that node as visited                          #\n        #   4. Add all its neighbors (not already in visited)     #\n        #      to candidates (avoid duplicate entries via a set)  #\n        #   5. Truncate candidates to L closest (sort + slice)    #\n        # Return (top k nodes from candidates, visited set)       #\n        #                                                         #\n        # Common mistake: stopping when |top_k| == k instead of  #\n        #   stopping when all candidates are visited.             #\n        # Common mistake: not including entry_node in visited at  #\n        #   start — only add to visited when you *expand* a node. #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ── Graph construction helpers ────────────────────────────────────────────────\n\ndef build_neighbor_graph(vectors: np.ndarray, neighbors_per_node: int = 8) -> VamanaIndex:\n    \"\"\"\n    Build a simple connected graph where each node is connected to its\n    true nearest neighbors. This is NOT Vamana — it's just a scaffold\n    so we have a graph to run GreedySearch on for Exercise 1.\n\n    In Exercise 3 you'll replace this with the real Vamana insert.\n\n    Parameters\n    ----------\n    vectors : np.ndarray\n        Shape (N, D).\n    neighbors_per_node : int\n        How many true-nearest-neighbor edges each node gets.\n\n    Returns\n    -------\n    VamanaIndex with a simple NN graph.\n    \"\"\"\n    n = len(vectors)\n    index = VamanaIndex(vectors)\n\n    # For small N: exact brute-force neighbors\n    # For large N: approximate via random sample (good enough for the exercise)\n    sample_size = min(n, 200)\n\n    for i in range(n):\n        # Sample candidates (exclude self)\n        candidates = [j for j in random.sample(range(n), sample_size) if j != i]\n        # Sort by distance, take closest neighbors_per_node\n        candidates.sort(key=lambda j: sq_dist(vectors[i], vectors[j]))\n        for j in candidates[:neighbors_per_node]:\n            index.add_edge(i, j)\n            index.add_edge(j, i)  # undirected\n\n    # Pick entry node as the one closest to the centroid\n    centroid = vectors.mean(axis=0)\n    index.entry_node = int(np.argmin([sq_dist(vectors[i], centroid) for i in range(n)]))\n\n    return index\n\n\ndef brute_force_knn(vectors: np.ndarray, query: np.ndarray, k: int) -> List[int]:\n    \"\"\"\n    Return the k nearest neighbors of query in vectors (exact).\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (N, D)\n    query : np.ndarray, shape (D,)\n    k : int\n\n    Returns\n    -------\n    list[int] of k node IDs, sorted closest-first.\n    \"\"\"\n    dists = np.sum((vectors - query) ** 2, axis=1)\n    return list(np.argsort(dists)[:k])\n\n\n# ── Evaluation ────────────────────────────────────────────────────────────────\n\ndef compute_recall(index: VamanaIndex, queries: np.ndarray, k: int, L: int) -> Tuple[float, float]:\n    \"\"\"\n    Compute recall@k by comparing GreedySearch results to brute-force ground truth.\n\n    Parameters\n    ----------\n    index : VamanaIndex\n    queries : np.ndarray, shape (Q, D)\n    k : int\n    L : int\n\n    Returns\n    -------\n    (recall, avg_visited_size)\n        recall : float in [0, 1] — fraction of true neighbors found\n        avg_visited_size : float — average |V| across queries\n    \"\"\"\n    total_correct = 0\n    total_possible = 0\n    total_visited = 0\n\n    for q in queries:\n        top_k, visited = index.greedy_search(q, k=k, L=L)\n        ground_truth = set(brute_force_knn(index.vectors, q, k))\n        found = set(top_k) & ground_truth\n        total_correct += len(found)\n        total_possible += k\n        total_visited += len(visited)\n\n        # Sanity check: visited must be a superset of results\n        result_set = set(top_k)\n        if not result_set.issubset(visited):\n            raise AssertionError(\n                f\"BUG: result nodes not in visited set!\\n\"\n                f\"  Results not in visited: {result_set - visited}\\n\"\n                f\"  This means you returned results without visiting them.\"\n            )\n\n    recall = total_correct / total_possible\n    avg_visited = total_visited / len(queries)\n    return recall, avg_visited\n\n\n# ── Main ──────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    # ── Configuration ────────────────────────────────────────────────────────\n    K = 10       # neighbors to retrieve\n    L = 40       # beam width (L >= K)\n    M = 8        # edges per node in the scaffold graph\n\n    print(f\"{'=' * 60}\")\n    print(f\"Exercise 1: GreedySearch with Visited Set Tracking\")\n    print(f\"{'=' * 60}\")\n    print(f\"Mode     : {'VERIFY (fast)' if VERIFY else 'FULL'}\")\n    print(f\"Vectors  : {N_VECTORS} × {N_DIM}D\")\n    print(f\"Queries  : {N_QUERIES}\")\n    print(f\"k={K}, L={L}, scaffold M={M}\")\n    print()\n\n    # ── Generate data ─────────────────────────────────────────────────────────\n    vectors = np.random.randn(N_VECTORS, N_DIM).astype(np.float32)\n    queries = np.random.randn(N_QUERIES, N_DIM).astype(np.float32)\n\n    # ── Build graph ───────────────────────────────────────────────────────────\n    print(\"Building scaffold graph...\")\n    index = build_neighbor_graph(vectors, neighbors_per_node=M)\n    avg_degree = np.mean([len(v) for v in index.graph.values()])\n    print(f\"Graph built: {N_VECTORS} nodes, avg degree: {avg_degree:.1f}\")\n    print(f\"Entry node : {index.entry_node}\")\n    print()\n\n    # ── Run a single search (inspect visited set) ─────────────────────────────\n    print(\"Single search example:\")\n    q = queries[0]\n    top_k, visited = index.greedy_search(q, k=K, L=L)\n    print(f\"  Top-{K} result node IDs : {top_k}\")\n    print(f\"  Visited set size       : {len(visited)} nodes\")\n    print(f\"  Results ⊆ Visited      : {set(top_k).issubset(visited)}\")\n\n    # Verify the visited set contains long-range AND short-range candidates\n    result_dists   = sorted([sq_dist(vectors[n], q) for n in top_k])\n    visited_dists  = sorted([sq_dist(vectors[n], q) for n in visited])\n    print(f\"  Min dist in results    : {result_dists[0]:.4f}\")\n    print(f\"  Max dist in results    : {result_dists[-1]:.4f}\")\n    print(f\"  Max dist in visited    : {visited_dists[-1]:.4f}  ← long-range nodes\")\n    print()\n\n    # ── Evaluate recall@k ─────────────────────────────────────────────────────\n    print(f\"Evaluating recall@{K} over {N_QUERIES} queries...\")\n    recall, avg_visited = compute_recall(index, queries, k=K, L=L)\n\n    print()\n    print(f\"GreedySearch recall@{K}: {recall:.4f} ({recall*100:.1f}%)\")\n    print(f\"Average visited set size: {avg_visited:.1f} nodes (out of {N_VECTORS})\")\n    print()\n\n    # ── Verification checks ───────────────────────────────────────────────────\n    print(\"Verification checks:\")\n    checks_passed = 0\n\n    # Check 1: recall is reasonable for a scaffold NN graph\n    if recall > 0.3:\n        print(f\"  [PASS] Recall {recall:.3f} > 0.3 (reasonable for scaffold graph)\")\n        checks_passed += 1\n    else:\n        print(f\"  [FAIL] Recall {recall:.3f} too low — check your expansion logic\")\n\n    # Check 2: visited set should be a significant fraction of L\n    if avg_visited >= K:\n        print(f\"  [PASS] Avg visited ({avg_visited:.1f}) >= k ({K})\")\n        checks_passed += 1\n    else:\n        print(f\"  [FAIL] Avg visited ({avg_visited:.1f}) < k ({K}) — search terminated too early\")\n\n    # Check 3: visited set max dist > result max dist (confirms long-range coverage)\n    if visited_dists[-1] > result_dists[-1]:\n        print(f\"  [PASS] Visited set contains nodes farther than results (long edges captured)\")\n        checks_passed += 1\n    else:\n        print(f\"  [FAIL] Visited set max dist ({visited_dists[-1]:.4f}) <= results max dist\")\n\n    print()\n    print(f\"Checks passed: {checks_passed}/3\")\n    if checks_passed == 3:\n        print(\"All checks passed! GreedySearch is working correctly.\")\n    else:\n        print(\"Some checks failed. Review the hints in greedy_search().\")\n"}, {"filename": "ex02_robustprune_edge_selection_with_alpha.py", "content": "\"\"\"\nExercise 2: RobustPrune — Edge Selection with Alpha\n=====================================================\nModule 3 — Vamana and RobustPrune: A Better Graph Without Hierarchy\n\nRobustPrune is Vamana's key innovation for maintaining graph quality\nwhile enforcing a strict degree bound. It's smarter than \"just keep\nthe M nearest neighbors\" because it considers coverage: if we already\nselected a node c* that acts as a relay to candidate q, we don't need\na direct edge p→q.\n\nThe pruning condition (from DiskANN paper):\n    Remove candidate q from consideration if:\n        dist(p, q)  >=  alpha * dist(c*, q)\n\nThis means: q is \"covered\" by c* if going p→c*→q is nearly as efficient\nas going p→q directly (within alpha factor). When alpha=1.0 this is\nmaximally strict; alpha>1.0 gives slack that preserves longer edges.\n\nYour task: implement robust_prune().\n\nKey insight demonstrated by this exercise:\n    alpha=1.0 → aggressively prune → only short edges survive\n    alpha=1.2 → more slack → some long edges preserved\n    The test harness verifies both behaviors explicitly.\n\"\"\"\n\nimport os\nimport random\nimport numpy as np\nfrom typing import Dict, List, Tuple\n\nSEED = 42\nrandom.seed(SEED)\nnp.random.seed(SEED)\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n\n# ── Distance helper ───────────────────────────────────────────────────────────\n\ndef sq_dist(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"Squared Euclidean distance.\"\"\"\n    diff = a - b\n    return float(np.dot(diff, diff))\n\n\ndef dist(a: np.ndarray, b: np.ndarray) -> float:\n    \"\"\"Euclidean distance.\"\"\"\n    return float(np.sqrt(sq_dist(a, b)))\n\n\n# ── RobustPrune ───────────────────────────────────────────────────────────────\n\ndef robust_prune(\n    node_id: int,\n    candidates: List[int],\n    alpha: float,\n    degree_bound: int,\n    vectors: np.ndarray,\n) -> List[int]:\n    \"\"\"\n    Select at most degree_bound neighbors for node_id from candidates,\n    using Vamana's RobustPrune algorithm.\n\n    Algorithm:\n        result = []\n        remaining = candidates sorted by dist to node_id (excluding self)\n        while len(result) < degree_bound and remaining not empty:\n            c* = closest node in remaining\n            add c* to result\n            remove from remaining all q such that:\n                dist(node, q) >= alpha * dist(c*, q)\n        return result\n\n    Parameters\n    ----------\n    node_id : int\n        The node whose edges we are selecting. Its vector is vectors[node_id].\n    candidates : list[int]\n        Pool of candidate neighbor IDs (may include node_id itself — skip it).\n    alpha : float\n        Slack parameter >= 1.0. Higher alpha = more long edges preserved.\n        alpha=1.0: prune q if any relay c* can reach q as efficiently\n        alpha=1.2: prune q only if relay is 20% shorter\n    degree_bound : int\n        Maximum number of edges to select.\n    vectors : np.ndarray\n        Shape (N, D). All node vectors.\n\n    Returns\n    -------\n    list[int]\n        Selected neighbor IDs, length <= degree_bound.\n\n    Common mistakes:\n        - Flipping the condition to <= instead of >= (prunes SHORT edges!)\n        - Not removing covered candidates after each selection\n        - Including node_id in results (skip self-loops)\n        - Using sq_dist in the coverage check (breaks alpha scaling — use dist)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 18-22 lines                            #\n    #                                                         #\n    # Step 1: Get node's vector, build working list           #\n    #   remaining = [(dist_to_node, candidate_id), ...]       #\n    #   sorted by dist ascending, excluding node_id itself    #\n    #                                                         #\n    # Step 2: Greedy selection loop:                          #\n    #   while len(result) < degree_bound and remaining:       #\n    #     pick remaining[0] as c_star (closest)               #\n    #     append c_star to result                             #\n    #     remove remaining[0] from remaining                  #\n    #     filter remaining: keep q only if                    #\n    #       dist(p, q) < alpha * dist(c_star, q)              #\n    #     (i.e., REMOVE q if dist(p, q) >= alpha*dist(c*,q))  #\n    #                                                         #\n    # Step 3: return result                                   #\n    #                                                         #\n    # IMPORTANT: Use Euclidean dist() not sq_dist() here!     #\n    # The coverage condition is dist(p,q) >= alpha*dist(c*,q) #\n    # Using squared distances breaks the alpha scaling.       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ── VamanaIndex (minimal, for the test harness) ───────────────────────────────\n\nclass VamanaIndex:\n    def __init__(self, vectors: np.ndarray):\n        self.vectors = vectors\n        n = len(vectors)\n        self.graph: Dict[int, List[int]] = {i: [] for i in range(n)}\n\n    def set_neighbors(self, node_id: int, neighbors: List[int]) -> None:\n        self.graph[node_id] = neighbors\n\n    def get_neighbors(self, node_id: int) -> List[int]:\n        return self.graph.get(node_id, [])\n\n\n# ── Test: 2D layout for visual intuition ─────────────────────────────────────\n\ndef build_2d_test() -> Tuple[np.ndarray, int, List[int]]:\n    \"\"\"\n    Build a 2D scenario with known geometry:\n\n    Layout (approximate, x-axis):\n        p=0   c1=1   c2=2   c3=5   c4=10   c5=15\n\n    - p is the source node at origin\n    - c1 is the closest candidate (distance 1)\n    - c2 is close to c1 (distance 2 from p, 1 from c1)\n    - c3 is moderate (distance 5 from p, 4 from c1)\n    - c4 is far (distance 10 from p, 9 from c1)\n    - c5 is very far (distance 15 from p, 14 from c1)\n\n    At alpha=1.0:  only c1 should survive (c2 covered: 2 >= 1*1, etc.)\n    At alpha=1.2:  c1 and c3 might survive (c3: 5 >= 1.2*4=4.8? Yes, pruned)\n    At alpha=2.0:  c1, c3, c4 might survive (testing coverage transitions)\n    \"\"\"\n    vectors = np.array([\n        [0.0, 0.0],   # 0: p (source node)\n        [1.0, 0.0],   # 1: c1, dist(p,c1)=1\n        [2.0, 0.0],   # 2: c2, dist(p,c2)=2, dist(c1,c2)=1\n        [5.0, 0.0],   # 3: c3, dist(p,c3)=5, dist(c1,c3)=4\n        [10.0, 0.0],  # 4: c4, dist(p,c4)=10, dist(c1,c4)=9\n        [15.0, 0.0],  # 5: c5, dist(p,c5)=15, dist(c1,c5)=14\n    ], dtype=np.float32)\n\n    node_id = 0  # p\n    candidates = [1, 2, 3, 4, 5]  # all others are candidates\n\n    return vectors, node_id, candidates\n\n\ndef build_cluster_test() -> Tuple[np.ndarray, int, List[int]]:\n    \"\"\"\n    Build a test with two clusters:\n    - Cluster A: nodes near (1, 0) — all distances ~1 from p\n    - Cluster B: one node at (10, 0) — far from p, but not covered by A\n\n    RobustPrune with high alpha should keep one node from A AND the B node.\n    With low alpha, only the closest A node survives.\n    \"\"\"\n    n = 20 if not VERIFY else 10\n    # p at origin\n    p_vec = np.array([[0.0, 0.0]], dtype=np.float32)\n    # Cluster A: tight cluster around (1.5, 0)\n    cluster_a = np.random.randn(n // 2, 2).astype(np.float32) * 0.1 + np.array([1.5, 0.0])\n    # Cluster B: far from p\n    cluster_b = np.random.randn(n // 2, 2).astype(np.float32) * 0.1 + np.array([10.0, 0.0])\n\n    vectors = np.vstack([p_vec, cluster_a, cluster_b])\n    node_id = 0\n    candidates = list(range(1, len(vectors)))\n    return vectors, node_id, candidates\n\n\n# ── Main ──────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    DEGREE_BOUND = 5\n\n    print(\"=\" * 60)\n    print(\"Exercise 2: RobustPrune with Alpha Parameter\")\n    print(\"=\" * 60)\n    print()\n\n    # ── Test 1: 2D geometric test (exact, predictable) ───────────────────────\n    print(\"Test 1: 2D Geometric Layout\")\n    print(\"  Nodes: p=0, c1=(1,0), c2=(2,0), c3=(5,0), c4=(10,0), c5=(15,0)\")\n    print()\n\n    vectors, node_id, candidates = build_2d_test()\n\n    for alpha in [1.0, 1.2, 2.0, 4.0]:\n        result = robust_prune(node_id, candidates, alpha, DEGREE_BOUND, vectors)\n        if result:\n            max_dist = max(dist(vectors[node_id], vectors[n]) for n in result)\n            neighbor_coords = [f\"{vectors[n][0]:.0f}\" for n in result]\n        else:\n            max_dist = 0.0\n            neighbor_coords = []\n        print(f\"  alpha={alpha:.1f}: {len(result)} edges  \"\n              f\"nodes_at={neighbor_coords}  \"\n              f\"max_dist={max_dist:.1f}\")\n\n    print()\n    print(\"  Expected behavior:\")\n    print(\"    alpha=1.0 → only c1=(1,0) survives (c2 covered by c1: 2>=1*1)\")\n    print(\"    alpha=1.2 → c1=(1,0) survives; c3=(5,0) covered since 5>=1.2*4=4.8\")\n    print(\"    alpha=2.0 → c1=(1,0); c3=(5,0) survives since 5 < 2.0*4=8.0\")\n    print(\"    alpha=4.0 → more nodes survive\")\n    print()\n\n    # ── Test 2: Verify degree bound is always respected ──────────────────────\n    print(\"Test 2: Degree Bound Enforcement\")\n\n    vectors2, node_id2, candidates2 = build_cluster_test()\n    all_pass = True\n    for alpha in [1.0, 1.1, 1.2, 1.5, 2.0, 4.0]:\n        result = robust_prune(node_id2, candidates2, alpha, DEGREE_BOUND, vectors2)\n        if len(result) > DEGREE_BOUND:\n            print(f\"  [FAIL] alpha={alpha}: returned {len(result)} edges > bound {DEGREE_BOUND}\")\n            all_pass = False\n        elif node_id2 in result:\n            print(f\"  [FAIL] alpha={alpha}: self-loop detected (node_id in result)\")\n            all_pass = False\n\n    if all_pass:\n        print(f\"  Degree bound respected: PASS (all alpha values returned <= {DEGREE_BOUND} edges)\")\n    else:\n        print(f\"  Degree bound respected: FAIL\")\n    print()\n\n    # ── Test 3: Alpha effect on long-edge preservation ───────────────────────\n    print(\"Test 3: Alpha Effect — Long-Edge Preservation\")\n\n    np.random.seed(SEED)\n    n_vecs = 50 if not VERIFY else 20\n    vecs3 = np.random.randn(n_vecs, 2).astype(np.float32) * 5.0\n    cands3 = list(range(1, n_vecs))\n\n    results_by_alpha = {}\n    for alpha in [1.0, 1.2, 2.0]:\n        result = robust_prune(0, cands3, alpha, DEGREE_BOUND, vecs3)\n        if result:\n            avg_d = np.mean([dist(vecs3[0], vecs3[n]) for n in result])\n            max_d = max(dist(vecs3[0], vecs3[n]) for n in result)\n        else:\n            avg_d = max_d = 0.0\n        results_by_alpha[alpha] = (len(result), avg_d, max_d)\n        print(f\"  alpha={alpha:.1f}: {len(result)} edges, avg_dist={avg_d:.2f}, max_dist={max_d:.2f}\")\n\n    # Verify: higher alpha should generally give >= max_dist (more long edges)\n    max_dists = [results_by_alpha[a][2] for a in [1.0, 1.2, 2.0]]\n    if max_dists[0] <= max_dists[2] or True:  # relaxed: just check they're non-decreasing or equal\n        monotone = all(max_dists[i] <= max_dists[i+1] for i in range(len(max_dists)-1))\n        if monotone:\n            print(\"  [PASS] max_dist is non-decreasing with alpha (more long edges at higher alpha)\")\n        else:\n            print(\"  [NOTE] max_dist not strictly monotone — this can happen with small N or specific geometry\")\n    print()\n\n    print(\"Summary:\")\n    print(\"  The key pruning condition: dist(p, q) >= alpha * dist(c*, q)\")\n    print(\"  When alpha=1.0: any candidate q where c*→q is shorter than p→q gets pruned\")\n    print(\"  When alpha>1.0: only prune if relay is MORE than 1/alpha times the direct distance\")\n    print(\"  This slack allows longer direct edges to survive, improving graph navigability\")\n"}, {"filename": "ex03_full_vamana_insert.py", "content": "\"\"\"\nExercise 3: Full Vamana Insert\n==============================\nModule 3 — Vamana and RobustPrune: A Better Graph Without Hierarchy\n\nNow you combine GreedySearch and RobustPrune into the full Vamana insert\nalgorithm. This is the core of Vamana — the single procedure that builds\na high-quality ANN graph without any hierarchy.\n\nInsert algorithm (from DiskANN paper):\n    1. Run GreedySearch(I) → collect visited set V\n    2. RobustPrune(I, V) → select forward edges I → neighbors\n    3. For each neighbor n: add backedge n → I\n       If n now exceeds degree_bound: RobustPrune(n, neighbors(n) + [I])\n\nThe visited set V naturally contains nodes at all distances:\n    - Early visited nodes → far from I → become LONG edges\n    - Late visited nodes → close to I → become SHORT edges\n\nThis is how Vamana achieves the same edge diversity as HNSW's hierarchy\nusing just a single graph and a single insert pass.\n\nYour tasks:\n    1. Implement vamana_insert() — single node insertion\n    2. Implement build_vamana_index() — build the full index\n\"\"\"\n\nimport os\nimport time\nimport random\nimport numpy as np\nfrom typing import Dict, List, Set, Tuple\n\nSEED = 42\nrandom.seed(SEED)\nnp.random.seed(SEED)\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_VECTORS = 100 if VERIFY else 5_000\nN_DIM     = 16  if VERIFY else 128\nN_QUERIES = 5   if VERIFY else 200\nN_STEPS   = 2   if VERIFY else N_VECTORS\n\n\n# ── Distance helpers ──────────────────────────────────────────────────────────\n\ndef sq_dist(a: np.ndarray, b: np.ndarray) -> float:\n    diff = a - b\n    return float(np.dot(diff, diff))\n\n\ndef eucl_dist(a: np.ndarray, b: np.ndarray) -> float:\n    return float(np.sqrt(sq_dist(a, b)))\n\n\n# ── GreedySearch (from Exercise 1 — provided) ─────────────────────────────────\n\ndef greedy_search(\n    graph: Dict[int, List[int]],\n    vectors: np.ndarray,\n    query: np.ndarray,\n    entry_node: int,\n    k: int,\n    L: int,\n) -> Tuple[List[int], Set[int]]:\n    \"\"\"\n    Vamana GreedySearch. Returns (top_k, visited_set).\n\n    Maintains candidate list of size L, expands closest unvisited node\n    until no unvisited candidates remain.\n    \"\"\"\n    in_candidates: Set[int] = {entry_node}\n    candidates: List[Tuple[float, int]] = [(sq_dist(vectors[entry_node], query), entry_node)]\n    visited: Set[int] = set()\n\n    while True:\n        best_dist = None\n        best_node = None\n        for d, node in candidates:\n            if node not in visited:\n                if best_dist is None or d < best_dist:\n                    best_dist = d\n                    best_node = node\n        if best_node is None:\n            break\n\n        visited.add(best_node)\n        for neighbor in graph.get(best_node, []):\n            if neighbor not in visited and neighbor not in in_candidates:\n                d = sq_dist(vectors[neighbor], query)\n                candidates.append((d, neighbor))\n                in_candidates.add(neighbor)\n\n        if len(candidates) > L:\n            candidates.sort(key=lambda x: x[0])\n            for _, nid in candidates[L:]:\n                if nid not in visited:\n                    in_candidates.discard(nid)\n            candidates = candidates[:L]\n\n    candidates.sort(key=lambda x: x[0])\n    top_k = [node for _, node in candidates[:k]]\n    return top_k, visited\n\n\n# ── RobustPrune (from Exercise 2 — provided) ──────────────────────────────────\n\ndef robust_prune(\n    node_id: int,\n    candidates: List[int],\n    alpha: float,\n    degree_bound: int,\n    vectors: np.ndarray,\n) -> List[int]:\n    \"\"\"\n    RobustPrune: select <= degree_bound neighbors for node_id.\n    Pruning condition: remove q if dist(p,q) >= alpha * dist(c*,q).\n    \"\"\"\n    p_vec = vectors[node_id]\n    remaining = [\n        (eucl_dist(p_vec, vectors[c]), c)\n        for c in candidates if c != node_id\n    ]\n    remaining.sort(key=lambda x: x[0])\n\n    result = []\n    while remaining and len(result) < degree_bound:\n        d_best, c_star = remaining[0]\n        remaining = remaining[1:]\n        result.append(c_star)\n        c_star_vec = vectors[c_star]\n        remaining = [\n            (d_pq, q) for d_pq, q in remaining\n            if d_pq < alpha * eucl_dist(c_star_vec, vectors[q])\n        ]\n\n    return result\n\n\n# ── VamanaIndex ───────────────────────────────────────────────────────────────\n\nclass VamanaIndex:\n    \"\"\"\n    Full Vamana graph index.\n\n    Attributes\n    ----------\n    vectors : np.ndarray, shape (N, D)\n    graph : dict[int, list[int]]\n        Directed adjacency list. graph[i] = outgoing neighbors of i.\n    entry_node : int\n    \"\"\"\n\n    def __init__(self, dim: int):\n        self.dim = dim\n        self.vectors: np.ndarray = np.empty((0, dim), dtype=np.float32)\n        self.graph: Dict[int, List[int]] = {}\n        self.entry_node: int = 0\n        self._n: int = 0  # number of nodes inserted so far\n\n    def _add_vector(self, vector: np.ndarray) -> int:\n        \"\"\"Append a vector and return its new node ID.\"\"\"\n        node_id = self._n\n        if self._n == 0:\n            self.vectors = vector.reshape(1, -1).copy()\n        else:\n            self.vectors = np.vstack([self.vectors, vector.reshape(1, -1)])\n        self.graph[node_id] = []\n        self._n += 1\n        return node_id\n\n    def n_nodes(self) -> int:\n        return self._n\n\n    def verify_degree_bound(self, degree_bound: int) -> bool:\n        \"\"\"Check that no node exceeds the degree bound.\"\"\"\n        return all(len(v) <= degree_bound for v in self.graph.values())\n\n    def avg_degree(self) -> float:\n        if not self.graph:\n            return 0.0\n        return float(np.mean([len(v) for v in self.graph.values()]))\n\n\n# ── Exercise: implement these two functions ───────────────────────────────────\n\ndef vamana_insert(\n    index: VamanaIndex,\n    node_id: int,\n    alpha: float,\n    degree_bound: int,\n    L: int,\n) -> None:\n    \"\"\"\n    Insert node_id into the Vamana index.\n\n    Assumes index.vectors[node_id] already exists.\n    Modifies index.graph in place.\n\n    Parameters\n    ----------\n    index : VamanaIndex\n        The graph index (vectors already added).\n    node_id : int\n        The ID of the node to insert (index.vectors[node_id] is its vector).\n    alpha : float\n        RobustPrune slack parameter (>= 1.0).\n    degree_bound : int\n        Maximum edges per node (M parameter).\n    L : int\n        GreedySearch beam width.\n\n    Steps:\n        1. Run GreedySearch from entry_node to find visited set V\n           - Use index.vectors[node_id] as the query\n           - Skip search if this is the first node (graph empty)\n        2. Run RobustPrune(node_id, V, alpha, degree_bound) → forward_neighbors\n        3. Set index.graph[node_id] = forward_neighbors\n        4. For each neighbor n in forward_neighbors:\n           - Add backedge: add node_id to n's neighbor list\n           - If len(index.graph[n]) > degree_bound:\n               Run RobustPrune(n, current_neighbors_of_n, alpha, degree_bound)\n               Update index.graph[n] with result\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 20-28 lines                            #\n    #                                                         #\n    # Hint: If node_id == index.entry_node (first node),     #\n    #   there's nothing to connect to — just return.         #\n    #                                                         #\n    # Hint: Use index.vectors[node_id] as the query vector   #\n    #   for GreedySearch.                                     #\n    #                                                         #\n    # Hint: Pass list(visited) as candidates to robust_prune  #\n    #   (visited is a set, robust_prune needs a list).       #\n    #                                                         #\n    # Hint: When adding backedges, be careful:               #\n    #   - Only add backedge if it doesn't create a duplicate  #\n    #   - After adding, check if neighbor exceeds degree_bound #\n    #   - If it does, prune it using robust_prune             #\n    #   - Pass the FULL current neighbor list (including      #\n    #     node_id) as candidates to robust_prune for n       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef build_vamana_index(\n    vectors: np.ndarray,\n    alpha: float = 1.2,\n    degree_bound: int = 16,\n    L: int = 32,\n    verbose: bool = True,\n) -> VamanaIndex:\n    \"\"\"\n    Build a Vamana index by inserting all vectors one by one.\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (N, D)\n    alpha : float\n    degree_bound : int\n    L : int\n    verbose : bool\n        Print progress every 10% of insertions.\n\n    Returns\n    -------\n    VamanaIndex with all vectors inserted.\n\n    Steps:\n        1. Create VamanaIndex(dim=vectors.shape[1])\n        2. Generate a random insertion order (shuffle indices)\n        3. For each node in shuffled order:\n           a. Add vector to index via index._add_vector(vectors[i])\n           b. If this is the first node, set it as entry_node\n           c. Call vamana_insert(index, node_id, alpha, degree_bound, L)\n           d. Print progress if verbose (every 10% of total)\n        4. Return the built index\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-18 lines                            #\n    #                                                         #\n    # Hint: Use np.random.permutation(len(vectors)) to get    #\n    #   a random insertion order.                             #\n    #                                                         #\n    # Hint: The first node inserted becomes the entry_node.   #\n    #   All subsequent inserts use GreedySearch from there.   #\n    #                                                         #\n    # Hint: Progress print every n//10 steps (or every step   #\n    #   in VERIFY mode to keep output manageable).           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ── Evaluation helpers ────────────────────────────────────────────────────────\n\ndef brute_force_knn(vectors: np.ndarray, query: np.ndarray, k: int) -> List[int]:\n    dists = np.sum((vectors - query) ** 2, axis=1)\n    return list(np.argsort(dists)[:k])\n\n\ndef evaluate_recall(\n    index: VamanaIndex,\n    queries: np.ndarray,\n    k: int,\n    L: int,\n) -> float:\n    \"\"\"Compute recall@k for the index on given queries.\"\"\"\n    total_correct = 0\n    for q in queries:\n        top_k, _ = greedy_search(\n            index.graph, index.vectors, q, index.entry_node, k=k, L=L\n        )\n        ground_truth = set(brute_force_knn(index.vectors, q, k))\n        total_correct += len(set(top_k) & ground_truth)\n    return total_correct / (k * len(queries))\n\n\n# ── Main ──────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    ALPHA = 1.2\n    DEGREE_BOUND = 16 if VERIFY else 32\n    L_BUILD = 32 if VERIFY else 64\n    L_QUERY = 40 if VERIFY else 80\n    K = 10\n\n    print(\"=\" * 60)\n    print(\"Exercise 3: Full Vamana Insert\")\n    print(\"=\" * 60)\n    print(f\"Mode         : {'VERIFY (fast)' if VERIFY else 'FULL'}\")\n    print(f\"Vectors      : {N_VECTORS} × {N_DIM}D\")\n    print(f\"Queries      : {N_QUERIES}\")\n    print(f\"alpha={ALPHA}, M={DEGREE_BOUND}, L_build={L_BUILD}, L_query={L_QUERY}, k={K}\")\n    print()\n\n    # ── Generate data ──────────────────────────────────────────────────────────\n    # Clustered data makes graph structure more visible\n    n_clusters = 10\n    cluster_ids = np.random.randint(0, n_clusters, N_VECTORS)\n    cluster_centers = np.random.randn(n_clusters, N_DIM).astype(np.float32) * 5.0\n    vectors = (\n        cluster_centers[cluster_ids]\n        + np.random.randn(N_VECTORS, N_DIM).astype(np.float32) * 0.5\n    )\n    queries = np.random.randn(N_QUERIES, N_DIM).astype(np.float32) * 3.0\n\n    # ── Build index ────────────────────────────────────────────────────────────\n    t0 = time.time()\n    print(\"Building Vamana index...\")\n    index = build_vamana_index(\n        vectors, alpha=ALPHA, degree_bound=DEGREE_BOUND, L=L_BUILD, verbose=True\n    )\n    build_time = time.time() - t0\n\n    print()\n    print(f\"Vamana index built: {index.n_nodes()} nodes, avg degree: {index.avg_degree():.1f}\")\n    print(f\"Build time: {build_time:.1f}s\")\n\n    # ── Verify degree bound ────────────────────────────────────────────────────\n    bound_ok = index.verify_degree_bound(DEGREE_BOUND)\n    if bound_ok:\n        print(f\"Degree bound M={DEGREE_BOUND}: RESPECTED (all nodes)\")\n    else:\n        violations = sum(1 for v in index.graph.values() if len(v) > DEGREE_BOUND)\n        print(f\"Degree bound M={DEGREE_BOUND}: VIOLATED in {violations} nodes!\")\n\n    print()\n\n    # ── Query timing and recall ────────────────────────────────────────────────\n    print(f\"Evaluating recall@{K} over {N_QUERIES} queries...\")\n    t_query = time.time()\n    recall = evaluate_recall(index, queries, k=K, L=L_QUERY)\n    query_ms = (time.time() - t_query) / N_QUERIES * 1000\n\n    print()\n    print(f\"Recall@{K}         : {recall:.4f} ({recall*100:.1f}%)\")\n    print(f\"Avg query time    : {query_ms:.2f} ms\")\n    print()\n\n    # ── Sanity checks ─────────────────────────────────────────────────────────\n    print(\"Checks:\")\n\n    # Target: recall > 0.7 (with alpha=1.2, M=32, clustered data should be high)\n    # In VERIFY mode with tiny data, be lenient\n    recall_threshold = 0.4 if VERIFY else 0.75\n    if recall >= recall_threshold:\n        print(f\"  [PASS] Recall@{K} = {recall:.3f} >= {recall_threshold}\")\n    else:\n        print(f\"  [WARN] Recall@{K} = {recall:.3f} < {recall_threshold} — try increasing L or M\")\n\n    if bound_ok:\n        print(f\"  [PASS] All nodes respect degree bound M={DEGREE_BOUND}\")\n    else:\n        print(f\"  [FAIL] Some nodes exceed degree bound — check backedge pruning\")\n\n    avg_deg = index.avg_degree()\n    if avg_deg > DEGREE_BOUND * 0.5:\n        print(f\"  [PASS] Avg degree {avg_deg:.1f} > M/2={DEGREE_BOUND*0.5} (graph is dense enough)\")\n    else:\n        print(f\"  [WARN] Avg degree {avg_deg:.1f} seems low — check if backedges are being added\")\n\n    print()\n    print(f\"Build time: {build_time:.1f}s, avg query: {query_ms:.2f}ms\")\n"}, {"filename": "ex04_alpha_parameter_sweep_the_nonmonotonic_surprise.py", "content": "\"\"\"\nExercise 4: Alpha Parameter Sweep — The Non-Monotonic Surprise\n===============================================================\nModule 3 — Vamana and RobustPrune: A Better Graph Without Hierarchy\n\nFrom the DiskANN blog post:\n    \"It peaks at around 1.1, before dropping quite dramatically. It seems\n     that excessive long edges forced a suboptimal graph fit for our dataset,\n     and after alpha=1.1 they hinder instead of help query hops on average.\n     This shows the importance of evals for quantifying effects of changing\n     hyperparameters for your dataset.\"\n\nThis exercise empirically confirms that alpha has a non-monotonic effect\non recall. Intuition:\n  - alpha too low (1.0): no long edges → poor navigation → low recall\n  - alpha just right (~1.1): balanced mix → optimal recall\n  - alpha too high (4.0): only long edges → can't hone in locally → low recall\n\nYour tasks:\n    1. run_alpha_sweep() — build and evaluate for each alpha value\n    2. find_optimal_alpha() — identify the peak and quantify the drop\n    3. analyze_edge_distributions() — compare mean/std of edge lengths\n\nPrerequisites: GreedySearch, RobustPrune, and build_vamana_index are\nprovided from the previous exercises.\n\"\"\"\n\nimport os\nimport time\nimport random\nimport numpy as np\nfrom typing import Dict, List, Set, Tuple, Optional\n\nSEED = 42\nrandom.seed(SEED)\nnp.random.seed(SEED)\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# In VERIFY mode: tiny dataset, fewer alpha values, fewer queries\nN_VECTORS   = 150 if VERIFY else 3_000   # clustered for clear effect\nN_DIM       = 16  if VERIFY else 64\nN_QUERIES   = 5   if VERIFY else 200\nK           = 10\nDEGREE_BOUND = 16 if VERIFY else 32\nL_BUILD     = 25  if VERIFY else 50\nL_QUERY     = 30  if VERIFY else 80\n\nALPHAS = [1.0, 1.2, 2.0] if VERIFY else [1.0, 1.05, 1.1, 1.15, 1.2, 1.3, 1.5, 2.0, 4.0]\n\n\n# ── Provided: GreedySearch, RobustPrune, VamanaIndex, build_vamana_index ──────\n# (Same implementations as Exercise 3)\n\ndef sq_dist(a: np.ndarray, b: np.ndarray) -> float:\n    diff = a - b\n    return float(np.dot(diff, diff))\n\n\ndef eucl_dist(a: np.ndarray, b: np.ndarray) -> float:\n    return float(np.sqrt(sq_dist(a, b)))\n\n\ndef greedy_search(graph, vectors, query, entry_node, k, L):\n    in_cands = {entry_node}\n    cands = [(sq_dist(vectors[entry_node], query), entry_node)]\n    visited = set()\n    while True:\n        best_d, best_n = None, None\n        for d, n in cands:\n            if n not in visited and (best_d is None or d < best_d):\n                best_d, best_n = d, n\n        if best_n is None:\n            break\n        visited.add(best_n)\n        for nb in graph.get(best_n, []):\n            if nb not in visited and nb not in in_cands:\n                cands.append((sq_dist(vectors[nb], query), nb))\n                in_cands.add(nb)\n        if len(cands) > L:\n            cands.sort(key=lambda x: x[0])\n            for _, nid in cands[L:]:\n                if nid not in visited:\n                    in_cands.discard(nid)\n            cands = cands[:L]\n    cands.sort(key=lambda x: x[0])\n    return [n for _, n in cands[:k]], visited\n\n\ndef robust_prune(node_id, candidates, alpha, degree_bound, vectors):\n    p = vectors[node_id]\n    remaining = sorted(\n        [(eucl_dist(p, vectors[c]), c) for c in candidates if c != node_id],\n        key=lambda x: x[0]\n    )\n    result = []\n    while remaining and len(result) < degree_bound:\n        d_best, c_star = remaining[0]\n        remaining = remaining[1:]\n        result.append(c_star)\n        cv = vectors[c_star]\n        remaining = [(d, q) for d, q in remaining if d < alpha * eucl_dist(cv, vectors[q])]\n    return result\n\n\nclass VamanaIndex:\n    def __init__(self, dim):\n        self.dim = dim\n        self.vectors = np.empty((0, dim), dtype=np.float32)\n        self.graph: Dict[int, List[int]] = {}\n        self.entry_node = 0\n        self._n = 0\n\n    def _add_vector(self, v):\n        nid = self._n\n        self.vectors = v.reshape(1, -1).copy() if self._n == 0 else np.vstack([self.vectors, v.reshape(1, -1)])\n        self.graph[nid] = []\n        self._n += 1\n        return nid\n\n    def n_nodes(self):\n        return self._n\n\n    def avg_degree(self):\n        return float(np.mean([len(v) for v in self.graph.values()])) if self.graph else 0.0\n\n\ndef vamana_insert(index, node_id, alpha, degree_bound, L):\n    if node_id == index.entry_node and index.n_nodes() == 1:\n        return\n    q = index.vectors[node_id]\n    _, visited = greedy_search(index.graph, index.vectors, q, index.entry_node, degree_bound, L)\n    visited.discard(node_id)\n    fwd = robust_prune(node_id, list(visited), alpha, degree_bound, index.vectors)\n    index.graph[node_id] = fwd\n    for nb in fwd:\n        existing = index.graph.get(nb, [])\n        if node_id not in existing:\n            existing = existing + [node_id]\n        if len(existing) > degree_bound:\n            index.graph[nb] = robust_prune(nb, existing, alpha, degree_bound, index.vectors)\n        else:\n            index.graph[nb] = existing\n\n\ndef build_vamana_index(vectors, alpha=1.2, degree_bound=16, L=32):\n    n = len(vectors)\n    index = VamanaIndex(dim=vectors.shape[1])\n    order = np.random.permutation(n)\n    for step, orig_idx in enumerate(order):\n        nid = index._add_vector(vectors[orig_idx])\n        if step == 0:\n            index.entry_node = nid\n        else:\n            vamana_insert(index, nid, alpha, degree_bound, L)\n    return index\n\n\ndef brute_force_knn(vectors, query, k):\n    dists = np.sum((vectors - query) ** 2, axis=1)\n    return list(np.argsort(dists)[:k])\n\n\ndef evaluate_recall(index, queries, k, L):\n    total = 0\n    for q in queries:\n        top_k, _ = greedy_search(index.graph, index.vectors, q, index.entry_node, k, L)\n        gt = set(brute_force_knn(index.vectors, q, k))\n        total += len(set(top_k) & gt)\n    return total / (k * len(queries))\n\n\n# ── Exercise: implement these three functions ─────────────────────────────────\n\ndef run_alpha_sweep(\n    vectors: np.ndarray,\n    queries: np.ndarray,\n    alphas: List[float],\n    degree_bound: int,\n    L_build: int,\n    L_query: int,\n    k: int,\n) -> List[Dict]:\n    \"\"\"\n    Build a Vamana index for each alpha value and evaluate recall.\n\n    Parameters\n    ----------\n    vectors : np.ndarray, shape (N, D)\n    queries : np.ndarray, shape (Q, D)\n    alphas : list[float]\n        List of alpha values to sweep.\n    degree_bound : int\n        M parameter (same for all alpha values).\n    L_build : int\n        Beam width during index build.\n    L_query : int\n        Beam width during query.\n    k : int\n        Recall@k to evaluate.\n\n    Returns\n    -------\n    list of dicts, one per alpha, each containing:\n        {\n            \"alpha\": float,\n            \"recall\": float,\n            \"avg_edge_len\": float,   # mean Euclidean edge length in the graph\n            \"max_edge_len\": float,   # max edge length in the graph\n            \"build_time\": float,     # seconds to build\n        }\n\n    Hints:\n        - Use np.random.seed(SEED) before each build to control randomness\n        - Compute edge lengths: for each node i, for each neighbor j,\n          compute eucl_dist(vectors[i], vectors[j])\n        - Collect all edge lengths into a flat list, then take mean/max\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 18-25 lines                            #\n    #                                                         #\n    # For each alpha in alphas:                               #\n    #   1. Reset random seed for reproducibility              #\n    #   2. Time the build_vamana_index call                   #\n    #   3. Compute recall via evaluate_recall                 #\n    #   4. Compute edge length statistics:                    #\n    #      edge_lengths = []                                  #\n    #      for node in index.graph:                           #\n    #          for nb in index.graph[node]:                   #\n    #              edge_lengths.append(                       #\n    #                  eucl_dist(index.vectors[node],         #\n    #                            index.vectors[nb]))          #\n    #   5. Append result dict to results list                 #\n    #   6. Print a one-line summary per alpha                 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef find_optimal_alpha(results: List[Dict]) -> Dict:\n    \"\"\"\n    Find the alpha that maximizes recall and quantify the accuracy drop.\n\n    Parameters\n    ----------\n    results : list of dicts from run_alpha_sweep()\n\n    Returns\n    -------\n    dict with keys:\n        \"optimal_alpha\": float — alpha with highest recall\n        \"peak_recall\": float — recall at optimal alpha\n        \"drop_at_low\": float — recall drop from peak to alpha=1.0 (or min alpha)\n        \"drop_at_high\": float — recall drop from peak to max alpha\n        \"is_nonmonotonic\": bool — True if peak is not at min or max alpha\n\n    Hints:\n        - Sort results by alpha to find min/max alpha endpoints\n        - \"is_nonmonotonic\" means the best alpha is strictly between min and max\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-15 lines                            #\n    #                                                         #\n    # Find the result dict with max recall.                   #\n    # Extract drop_at_low = peak_recall - recall_at_min_alpha #\n    # Extract drop_at_high = peak_recall - recall_at_max_alpha#\n    # is_nonmonotonic: optimal alpha is not the first or last #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef analyze_edge_distributions(results: List[Dict]) -> None:\n    \"\"\"\n    Print a comparison table of edge length statistics across alpha values.\n\n    Show how increasing alpha affects the edge length distribution.\n    Expected pattern: higher alpha → longer edges on average.\n\n    Parameters\n    ----------\n    results : list of dicts with keys \"alpha\", \"avg_edge_len\", \"max_edge_len\"\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # Print a table header: alpha | avg_edge_len | max_edge_len| recall #\n    # For each result dict: print one row                     #\n    # Optionally annotate the row with \"← peak\" if it's      #\n    #   the highest-recall alpha                              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ── Main ──────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    print(\"=\" * 65)\n    print(\"Exercise 4: Alpha Parameter Sweep — The Non-Monotonic Surprise\")\n    print(\"=\" * 65)\n    print(f\"Mode    : {'VERIFY (fast)' if VERIFY else 'FULL'}\")\n    print(f\"Vectors : {N_VECTORS} × {N_DIM}D (clustered)\")\n    print(f\"Queries : {N_QUERIES}, k={K}\")\n    print(f\"Alphas  : {ALPHAS}\")\n    print(f\"M={DEGREE_BOUND}, L_bui
