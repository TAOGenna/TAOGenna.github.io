vectors[c_star]\n        remaining = [(d, q) for d, q in remaining\n                     if d < alpha * float(np.sqrt(sq_dist(c_vec, vectors[q])))]\n    return result\n\nclass VamanaIndex:\n    def __init__(self, dim):\n        self.dim = dim\n        self.vectors = np.empty((0, dim), dtype=np.float32)\n        self.graph: Dict[int, List[int]] = {}\n        self.entry_node = 0\n        self._n = 0\n\n    def _add_vector(self, v):\n        nid = self._n\n        if self._n == 0:\n            self.vectors = v.reshape(1, -1).copy()\n        else:\n            self.vectors = np.vstack([self.vectors, v.reshape(1, -1)])\n        self.graph[nid] = []\n        self._n += 1\n        return nid\n\ndef vamana_insert(index, node_id, alpha, degree_bound, L):\n    if node_id == index.entry_node and index._n == 1:\n        return\n    query = index.vectors[node_id]\n    _, visited = greedy_search(index.graph, index.vectors, query,\n                                index.entry_node, k=degree_bound, L=L)\n    visited.discard(node_id)\n    fwd = robust_prune(node_id, list(visited), alpha, degree_bound, index.vectors)\n    index.graph[node_id] = fwd\n    for nb in fwd:\n        existing = index.graph.get(nb, [])\n        if node_id not in existing:\n            existing = existing + [node_id]\n        if len(existing) > degree_bound:\n            index.graph[nb] = robust_prune(nb, existing, alpha, degree_bound, index.vectors)\n        else:\n            index.graph[nb] = existing\n\ndef build_vamana_index(vectors, alpha=1.2, degree_bound=16, L=32):\n    idx = VamanaIndex(dim=vectors.shape[1])\n    order = np.random.permutation(len(vectors))\n    for step, oi in enumerate(order):\n        nid = idx._add_vector(vectors[oi])\n        if step == 0:\n            idx.entry_node = nid\n        else:\n            vamana_insert(idx, nid, alpha, degree_bound, L)\n    return idx\n\n# ── PQ building blocks (from Exercises 1 & 2) ────────────────────────────────\ndef train_codebooks(vectors, n_subspaces, n_clusters):\n    N, D = vectors.shape\n    d = D // n_subspaces\n    cb = np.zeros((n_subspaces, n_clusters, d), dtype=np.float32)\n    for m in range(n_subspaces):\n        km = MiniBatchKMeans(n_clusters=n_clusters, random_state=42, n_init=3,\n                             batch_size=min(1000, N))\n        km.fit(vectors[:, m*d:(m+1)*d])\n        cb[m] = km.cluster_centers_.astype(np.float32)\n    return cb\n\ndef pq_encode(vector, codebooks):\n    M, K, d = codebooks.shape\n    code = np.empty(M, dtype=np.uint8)\n    for m in range(M):\n        sub = vector[m*d:(m+1)*d]\n        code[m] = np.argmin(np.sum((codebooks[m] - sub)**2, axis=1))\n    return code\n\ndef build_distance_table(query, codebooks):\n    M, K, d = codebooks.shape\n    table = np.empty((M, K), dtype=np.float32)\n    for m in range(M):\n        sub = query[m*d:(m+1)*d]\n        table[m] = np.sum((codebooks[m] - sub)**2, axis=1)\n    return table\n\ndef pq_distance(code, table):\n    return float(table[np.arange(len(code)), code].sum())\n\ndef brute_force_knn(vectors, query, k):\n    return list(np.argsort(np.sum((vectors - query)**2, axis=1))[:k])\n\n\n# ── Functions YOU implement ──────────────────────────────────────────────────\n\ndef search_with_pq(\n    index: VamanaIndex,\n    query: np.ndarray,\n    k: int,\n    L: int,\n    pq_codes: np.ndarray,\n    codebooks: np.ndarray,\n) -> List[int]:\n    \"\"\"\n    Graph traversal using PQ lookup-table distances for candidate scoring.\n\n    This is the memory-efficient search: pq_codes are tiny (M bytes each)\n    and fit in RAM even for billion-scale indices. The graph is navigated\n    using APPROXIMATE distances — close enough for good recall.\n\n    Parameters\n    ----------\n    index     : VamanaIndex  — the built graph\n    query     : np.ndarray, shape (D,)\n    k         : int          — return top-k results\n    L         : int          — search list size (beam width)\n    pq_codes  : np.ndarray, shape (N, M) uint8 — all compressed codes\n    codebooks : np.ndarray, shape (M, K, subspace_dim)\n\n    Returns\n    -------\n    top_k : List[int]  — node IDs of approximate nearest neighbors\n\n    Key insight\n    -----------\n    Precompute the distance table ONCE per query (M × K lookups),\n    then use pq_distance() for every candidate — M lookups per candidate.\n\n    Common mistakes\n    ---------------\n    - Recomputing build_distance_table() inside the inner loop (very slow!)\n    - Using sq_dist() directly on pq_codes (those are uint8 indices, not floats!)\n    - Not maintaining a pruned top-L list (missing the beam search)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # Structure:                                              #\n    # 1. dist_table = build_distance_table(query, codebooks) #\n    # 2. candidates = dict mapping node_id → pq_approx_dist  #\n    # 3. visited = set()                                      #\n    # 4. Start with entry_node                               #\n    # 5. While there are unvisited candidates:               #\n    #    a. Find unvisited node with min pq distance          #\n    #    b. Mark as visited                                   #\n    #    c. For each neighbor: compute pq_distance, add to cands #\n    #    d. Prune candidates to top L (keep min distances)    #\n    # 6. Return sorted candidates[:k]                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef search_with_rerank(\n    index: VamanaIndex,\n    query: np.ndarray,\n    k: int,\n    L: int,\n    pq_codes: np.ndarray,\n    codebooks: np.ndarray,\n    full_vectors: np.ndarray,\n) -> List[int]:\n    \"\"\"\n    PQ graph traversal + exact distance re-ranking of top-L candidates.\n\n    This is the DiskANN strategy:\n      Phase 1: Navigate with PQ (fast, approximate) — O(L × M) distance ops\n      Phase 2: Re-rank final L candidates with exact L2 — O(L × D) ops\n               (in on-disk mode, these full vectors are read \"for free\"\n                from the same SSD page as the neighbor list)\n\n    Parameters\n    ----------\n    index        : VamanaIndex\n    query        : np.ndarray, shape (D,)\n    k            : int\n    L            : int\n    pq_codes     : np.ndarray, shape (N, M) uint8\n    codebooks    : np.ndarray, shape (M, K, subspace_dim)\n    full_vectors : np.ndarray, shape (N, D) float32\n\n    Returns\n    -------\n    top_k : List[int]\n\n    Common mistakes\n    ---------------\n    - Re-ranking ALL visited nodes instead of just top-L final candidates\n      (defeats the purpose — too many \"disk reads\" in the on-disk model)\n    - Using PQ distances for the FINAL ranking (loses the re-rank benefit)\n    - Passing k instead of L to search_with_pq (need L candidates to re-rank)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # Phase 1: Use search_with_pq to get top-L candidates    #\n    #   candidates = search_with_pq(..., k=L, ...)           #\n    #                                                         #\n    # Phase 2: Re-rank with exact distances                   #\n    #   For each candidate in candidates:                     #\n    #     exact_d = np.sum((full_vectors[c] - query)**2)      #\n    #   Sort by exact_d, return top k                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compare_methods(results: dict) -> str:\n    \"\"\"\n    Format a comparison table of search methods.\n\n    Parameters\n    ----------\n    results : dict mapping method_name → dict with keys:\n        recall    : float in [0, 1]\n        mem_mb    : float — memory for vectors in MB\n        latency_ms: float — average query latency\n\n    Returns\n    -------\n    table : str — formatted comparison table\n\n    Common mistakes\n    ---------------\n    - Dividing recall by K again (it's already normalized to [0, 1])\n    - Reporting raw latency instead of per-query average\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # Hint: iterate results.items(), format each row          #\n    # Format: \"Method: recall=X.XX, mem=X.XMB, lat=X.Xms\"   #\n    # You can use f-strings. Return the full table as a string #\n    # or just print directly and return a summary line        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ── Main harness (DO NOT MODIFY) ─────────────────────────────────────────────\nif __name__ == \"__main__\":\n    rng = np.random.default_rng(42)\n    np.random.seed(42)\n\n    # Generate clustered data (queries from same distribution as training data)\n    n_clusters_true = 15\n    centers = rng.standard_normal((n_clusters_true, N_DIM)).astype(np.float32) * 4.0\n    cids = rng.integers(0, n_clusters_true, N_VECTORS)\n    vectors = (centers[cids] +\n               rng.standard_normal((N_VECTORS, N_DIM)).astype(np.float32) * 0.6)\n    q_cids = rng.integers(0, n_clusters_true, N_QUERIES)\n    queries = (centers[q_cids] +\n               rng.standard_normal((N_QUERIES, N_DIM)).astype(np.float32) * 0.8)\n\n    print(\"=\" * 65)\n    print(\"Exercise 3: PQ vs Exact Search — Accuracy–Memory Tradeoff\")\n    print(\"=\" * 65)\n    print(f\"Mode     : {'VERIFY (fast)' if VERIFY else 'FULL'}\")\n    print(f\"Vectors  : {N_VECTORS} × {N_DIM}D  |  Queries: {N_QUERIES}  |  k={K}\")\n    print()\n\n    # Build Vamana index\n    print(\"Building Vamana index (using full-precision vectors)...\")\n    t0 = time.time()\n    index = build_vamana_index(vectors, alpha=1.2, degree_bound=16 if VERIFY else 32,\n                                L=32 if VERIFY else 64)\n    build_time = time.time() - t0\n    print(f\"  Built in {build_time:.1f}s  |  avg degree: \"\n          f\"{sum(len(v) for v in index.graph.values()) / len(index.graph):.1f}\")\n    print()\n\n    # IMPORTANT: after build_vamana_index, node IDs index into index.vectors\n    # (vectors were inserted in random order). Use index.vectors for all lookups.\n    db_vectors = index.vectors   # shape (N, D) — matches graph node IDs\n\n    # Train PQ codebooks\n    print(\"Training PQ codebooks...\")\n    t0 = time.time()\n    codebooks = train_codebooks(db_vectors, N_SUBSPACES, N_CLUSTERS)\n    print(f\"  Done in {time.time()-t0:.1f}s | shape: {codebooks.shape}\")\n\n    # Encode all vectors (using db_vectors, not original vectors!)\n    pq_codes = np.stack([pq_encode(v, codebooks) for v in db_vectors])  # (N, M)\n\n    # Memory comparison\n    mem_full_mb = db_vectors.nbytes / 1e6\n    mem_pq_mb   = pq_codes.nbytes / 1e6\n    print(f\"  Full vectors: {mem_full_mb:.2f} MB  →  PQ codes: {mem_pq_mb:.2f} MB\")\n    print(f\"  Compression : {mem_full_mb / mem_pq_mb:.0f}x\")\n    print()\n\n    # Ground truth\n    print(\"Computing ground truth (brute force)...\")\n    ground_truth = [set(brute_force_knn(db_vectors, q, K)) for q in queries]\n\n    # ── Run all three methods ─────────────────────────────────────────────────\n    results = {}\n\n    # Method 1: Exact search (graph with exact float32 distances)\n    print(\"\\n[1/3] Exact graph search...\")\n    t0 = time.time()\n    exact_results = []\n    for q in queries:\n        r, _ = greedy_search(index.graph, db_vectors, q, index.entry_node, k=K, L=L_SEARCH)\n        exact_results.append(set(r))\n    latency_exact = (time.time() - t0) / N_QUERIES * 1000\n    recall_exact = np.mean([len(r & gt) / K for r, gt in zip(exact_results, ground_truth)])\n    results[\"Exact\"] = {\"recall\": recall_exact, \"mem_mb\": mem_full_mb, \"latency_ms\": latency_exact}\n\n    # Method 2: PQ-only search\n    print(\"[2/3] PQ-only graph search...\")\n    t0 = time.time()\n    pq_results = []\n    for q in queries:\n        r = search_with_pq(index, q, k=K, L=L_SEARCH, pq_codes=pq_codes, codebooks=codebooks)\n        pq_results.append(set(r))\n    latency_pq = (time.time() - t0) / N_QUERIES * 1000\n    recall_pq = np.mean([len(r & gt) / K for r, gt in zip(pq_results, ground_truth)])\n    results[\"PQ only\"] = {\"recall\": recall_pq, \"mem_mb\": mem_pq_mb, \"latency_ms\": latency_pq}\n\n    # Method 3: PQ + rerank\n    print(\"[3/3] PQ + rerank search...\")\n    t0 = time.time()\n    rerank_results = []\n    for q in queries:\n        r = search_with_rerank(index, q, k=K, L=L_SEARCH, pq_codes=pq_codes,\n                                codebooks=codebooks, full_vectors=db_vectors)\n        rerank_results.append(set(r))\n    latency_rerank = (time.time() - t0) / N_QUERIES * 1000\n    recall_rerank = np.mean([len(r & gt) / K for r, gt in zip(rerank_results, ground_truth)])\n    results[\"PQ+rerank\"] = {\"recall\": recall_rerank, \"mem_mb\": mem_pq_mb, \"latency_ms\": latency_rerank}\n\n    # ── Print comparison ──────────────────────────────────────────────────────\n    print()\n    print(\"=\" * 65)\n    table = compare_methods(results)\n    print(table)\n    print(\"=\" * 65)\n\n    # Memory reduction analysis\n    mem_reduction = mem_full_mb / mem_pq_mb\n    recall_gap = recall_exact - recall_rerank\n    print(f\"\\nSummary:\")\n    print(f\"  Memory reduction  : {mem_reduction:.0f}x (full → PQ compressed)\")\n    print(f\"  Recall loss       : {recall_gap*100:.1f}% (exact vs PQ+rerank)\")\n    print(f\"  DiskANN strategy  : 'approximate fast, exact rarely'\")\n    print()\n\n    # Checks\n    print(\"Checks:\")\n    if recall_exact > 0.5:\n        print(f\"  [PASS] Exact recall = {recall_exact:.3f} > 0.5\")\n    else:\n        print(f\"  [WARN] Exact recall = {recall_exact:.3f} (try larger L_SEARCH)\")\n\n    if recall_rerank >= recall_pq:\n        print(f\"  [PASS] PQ+rerank ({recall_rerank:.3f}) >= PQ-only ({recall_pq:.3f})\")\n    else:\n        print(f\"  [FAIL] PQ+rerank ({recall_rerank:.3f}) < PQ-only ({recall_pq:.3f}) — check reranking\")\n\n    if abs(recall_exact - recall_rerank) < abs(recall_exact - recall_pq) + 0.01:\n        print(f\"  [PASS] Reranking recovers accuracy vs PQ-only\")\n    else:\n        print(f\"  [INFO] Recall: exact={recall_exact:.3f}, PQ+rerank={recall_rerank:.3f}, PQ={recall_pq:.3f}\")\n\n    print(f\"  [INFO] Memory: {mem_full_mb:.2f}MB → {mem_pq_mb:.2f}MB ({mem_reduction:.0f}x reduction)\")\n"}]}, "module_05_disknative_vector_search_corenns_storage_innovatio": {"content": "# Module 5: Disk-Native Vector Search — CoreNN's Storage Innovations\n\n## Table of Contents\n\n1. [Learning Objectives](#learning-objectives)\n2. [The Scaling Crisis: Where We Left Off](#the-scaling-crisis)\n3. [The Running Example: A Billion Reddit Comment Embeddings](#running-example)\n4. [SSD Physics vs. RAM Physics: A 200× Gap](#ssd-physics)\n5. [CoreNN's Architecture: Two Stages, One Format](#two-stages)\n6. [Storage Layout: The 4K Page Secret](#storage-layout)\n7. [Backedge Deltas: Solving Write Amplification](#backedge-deltas)\n8. [Product Quantization in the On-Disk Stage](#product-quantization-in-the-on-disk-stage)\n9. [True Deletion via Graph Contraction](#true-deletion)\n10. [The In-Memory → On-Disk Transition](#transition)\n11. [Analytical Questions](#analytical-questions)\n12. [Synthesis: Closing the Loop](#synthesis)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n- Explain why HNSW fails at billion-vector scale (RAM cost, no true deletion, monolithic storage)\n- Describe how CoreNN's co-located storage layout exploits SSD page physics to get full-precision re-ranking at zero extra I/O\n- Implement the backedge-delta pattern that avoids FreshDiskANN's write amplification spike\n- Trace the two-stage lifecycle (in-memory → on-disk) and explain why the same DB format makes the transition zero-cost\n- Derive the write amplification of naive backedge insertion and quantify the savings from the delta approach\n- Connect all prior modules (graph traversal, HNSW, Vamana/RobustPrune, Product Quantization) into a single working vector database architecture\n\n---\n\n## The Scaling Crisis: Where We Left Off\n\nIn Module 2 you built HNSW. It was elegant — hierarchical levels giving logarithmic traversal, long edges at the top collapsing large distances in single hops. In Module 3 you replaced that hierarchy with Vamana's single flat graph and RobustPrune, getting a cleaner degree bound and surprisingly better graph quality. In Module 4 you compressed vectors 32× with Product Quantization, making billions of compressed representations fit in memory.\n\nYet there's a problem none of those modules solved: the full-precision vectors and the graph itself still have to live *somewhere*. Let's do the arithmetic for a representative production workload.\n\n**The billion-vector arithmetic:**\n\n- 1 billion vectors\n- 768 dimensions each (BERT/OpenAI embedding size)\n- 4 bytes per float32 dimension\n\n$$\\text{RAM required} = 10^9 \\times 768 \\times 4 \\text{ bytes} = 3{,}072 \\text{ GB} \\approx 3 \\text{ TB}$$\n\nA high-memory cloud instance with 3 TB of RAM costs roughly $50,000–$100,000/month. The author of CoreNN had exactly this problem: a web search engine generating billions of embeddings, previously served from a *cluster* of sharded HNSW indices totalling 3 TB of RAM across many machines. CoreNN collapsed that into a **single 96 GB RAM machine** — a 31× reduction in RAM, with a 4.8 TB on-disk index.\n\n**The three HNSW failure modes at scale:**\n\n1. **Memory-only design.** Every vector, every edge, every node must live in RAM simultaneously. There is no disk-spill mechanism. When RAM runs out, you shard across more machines, adding network latency and operational complexity.\n\n2. **No true deletions.** HNSW uses *soft-deletes* (tombstones): the node stays in the graph with a \"deleted\" flag. Queries filter these nodes out after the fact. Over time, deleted nodes bloat the index, waste traversal hops, and slowly degrade recall. To truly reclaim space, you must rebuild the entire index from scratch.\n\n3. **Monolithic storage format.** HNSW serializes its entire in-memory graph as a memory dump. Any mutation (index rebuild, compaction) requires a full rewrite — a multi-hour operation during which your index is stale or offline.\n\nThese aren't theoretical concerns. They're the reason production teams run complicated sharding, scheduled rebuilds, and version-management pipelines just to keep an HNSW index healthy. CoreNN aims to solve all three.\n\n---\n\n## The Running Example: A Billion Reddit Comment Embeddings\n\nThroughout this module we'll ground every concept in one concrete example: **a vector database of 1 billion Reddit comment embeddings**, each 768 dimensions, searched in 15 ms end-to-end from a single machine with a 4.8 TB on-disk index. This is an actual CoreNN benchmark, not a toy.\n\nThe key parameters we'll use:\n\n| Parameter | Value | Explanation |\n|-----------|-------|-------------|\n| $N$ | 1 billion | Number of vectors |\n| $d$ | 768 | Embedding dimensions |\n| $M$ (degree bound) | 50 | Max edges per node |\n| $M_{\\max}$ (max degree bound) | 75 | Before compaction triggers |\n| PQ subspaces | 96 | Each covering 8 dimensions |\n| PQ centroids/subspace | 256 | 1 byte per subspace |\n| Compressed vector size | 96 bytes | (vs. 3072 bytes full-precision) |\n| SSD minimum page | 4096 bytes | Physics, not a choice |\n\nWe'll build up to a complete picture of how a single query hop executes — what bytes are read, from where, how distances are computed, and how the result is refined.\n\n---\n\n## SSD Physics vs. RAM Physics: A 200× Gap\n\nBefore diving into CoreNN's design, you need to internalize one physical fact that governs every decision in this module:\n\n$$\\text{Random 4K SSD read} \\approx 20{,}000 \\text{ ns} \\quad \\text{vs.} \\quad \\text{Random RAM read} \\approx 100 \\text{ ns}$$\n\n**That's a 200× latency gap.** Every algorithmic choice in DiskANN/CoreNN exists because of this number. Let's stress-test your intuition with some arithmetic:\n\nIn Vamana's GreedySearch with degree bound $M = 50$, each hop expands one node and evaluates distances to all its neighbors. If each neighbor's vector requires a separate disk read:\n\n$$\\text{I/O per hop} = M \\times 20{,}000 \\text{ ns} = 1{,}000{,}000 \\text{ ns} = 1 \\text{ ms}$$\n\nA search with 20 hops would take 20 ms just in I/O — before any computation. But NVMe SSDs have a crucial property: they're **massively parallel**. Multiple outstanding reads can proceed simultaneously across separate internal queues. CoreNN exploits this with concurrent I/O, issuing reads for all M neighbors of a node at once rather than sequentially.\n\n**The 4K minimum page read:** SSDs don't actually read individual bytes. The minimum quantum of a read is 4096 bytes (one SSD page). Even if you request 1 byte, you pay the cost of transferring 4K. This is the physics fact that drives CoreNN's most important design decision, which we'll examine next.\n\n[^1]: NVMe SSDs have separate read and write pipelines — read IOPS and write IOPS are largely independent. This means insert-driven writes don't compete with query-driven reads as severely as they would on spinning disk. CoreNN's design exploits this by being write-heavy on insert (many small delta writes) while remaining read-heavy on query.\n\n**Check your understanding:** If a neighbor list for $M=50$ neighbors takes 200 bytes (4 bytes per node ID), and a full-precision vector takes 3072 bytes, how many SSD pages does each entry occupy? What if they're stored together? What if stored separately?\n\n*Answer: together, 3272 bytes fits in one 4K page. Separately, the 200-byte list occupies one 4K page, and the 3072-byte vector occupies another — two pages, 8K of I/O for the same logical data.*\n\n---\n\n## CoreNN's Architecture: Two Stages, One Format\n\nCoreNN uses **RocksDB** as its backing store — a battle-tested key-value database used as the storage engine for production systems at Facebook, LinkedIn, and Uber. Unlike SQLite (row-oriented) or PostgreSQL (page-based), RocksDB is a log-structured merge-tree (LSM) designed for high write throughput and configurable memory/disk trade-offs.\n\nThe index transitions through two stages as data grows:\n\n**Stage 1: In-Memory**\nAll nodes and full-precision vectors are cached in memory. Queries read from this in-memory cache. Performance is equivalent to an in-memory HNSW but with full durability (RocksDB persists every write to disk). As vectors are inserted, they simultaneously go into the in-memory cache *and* are written to RocksDB.\n\n**Stage 2: On-Disk**\nWhen available RAM is exhausted, only the *compressed* vectors (PQ-encoded, ~96 bytes each) remain in memory. The full-precision vectors and graph topology live entirely on disk. Queries:\n1. Compute distances using compressed in-memory vectors (fast, approximate)\n2. Read neighbor lists from disk to know which nodes to expand next\n3. Read full-precision vectors \"for free\" (co-located with neighbor lists, see next section) for accurate re-ranking\n\nThe critical insight from the source:\n\n> *\"Using the same DB format means transitioning between in-memory and on-disk require no mass rewrites or deletes; we simply evict from memory and instantly begin using the disk, already optimally laid out.\"*\n\nThis is architecturally profound. The data doesn't move. The graph doesn't change. The RocksDB entries that were being read from memory are now read from disk — same key, same value format, different source.\n\n![Two-stage architecture: in-memory vs on-disk](diagrams/two_stage_architecture.svg)\n\n---\n\n## Storage Layout: The 4K Page Secret\n\nThis is the central design decision in CoreNN and the reason it outperforms naive disk-based approaches.\n\n### The Naive Approach: Separate Storage\n\nImagine storing the graph and vectors in two separate files (or RocksDB namespaces):\n- `vectors[node_id]` → float32 array, shape `(768,)`, 3072 bytes\n- `neighbors[node_id]` → int32 array, shape `(M,)`, ~200 bytes\n\nDuring a query hop, you expand node $v$ and need its neighbor list. You do **one disk read** for the neighbor list (paying for a full 4K page). Now you want to re-rank using full-precision vectors for accuracy — you need `vectors[v]`. That's a **second disk read**, paying for another 4K page.\n\nTotal: 2 disk reads = 8K of I/O transferred, for what is logically one piece of work.\n\n### CoreNN's Co-Located Approach\n\nCoreNN stores the full vector *and* neighbor list in **a single RocksDB entry**:\n\n```\nKey:   [0x01] [node_id as 4-byte binary integer]  <- type prefix + compact binary key\nValue: [full-precision vector: 768 × 4 bytes = 3072 bytes]\n       [neighbor count: 4 bytes]\n       [neighbor IDs: M × 4 bytes ≈ 200 bytes]\n```\n\nTotal entry size: ~3280 bytes. This fits within a **single 4K SSD page**.\n\nWhen a query hop needs to expand node $v$:\n1. One disk read fetches the 4K page containing the entry\n2. From that single read, you get **both** the neighbor list (to know which nodes come next) **and** the full-precision vector (to compute accurate distances to $v$ itself)\n\nThe full-precision vector is read \"for free\" — no extra I/O cost[^2].\n\n[^2]: \"For free\" means within the same SSD page read that you'd have to do anyway. The transfer cost is slightly higher (3280 bytes vs. 200 bytes, both fitting in one 4K page), but the I/O *operation count* — what actually dominates latency on SSDs — is identical.\n\n### Key Format Details\n\nThe key design follows directly from the source material:\n\n```python\nimport struct\n\nKEY_TYPE_NODE = 0x01\nKEY_TYPE_DELTA = 0x02  # used for backedge deltas (Section 6)\n\ndef make_node_key(node_id: int) -> bytes:\n    # 1-byte type prefix + 4-byte binary integer (big-endian for ordered iteration)\n    return struct.pack(\">BI\", KEY_TYPE_NODE, node_id)\n\ndef make_delta_key(node_id: int) -> bytes:\n    return struct.pack(\">BI\", KEY_TYPE_DELTA, node_id)\n```\n\nWhy binary keys instead of string keys like `\"node_123456\"`? Three reasons:\n1. **Compactness**: 5 bytes vs. 12+ bytes per key, multiplied by 1 billion entries\n2. **Ordering**: Big-endian binary integers sort correctly in RocksDB, enabling range scans\n3. **Prefix iteration**: All `0x01` keys can be scanned together without parsing\n\n### Serializing an Entry\n\n```python\nimport struct\nimport numpy as np\n\ndef serialize_node(vector: np.ndarray, neighbors: list[int]) -> bytes:\n    \"\"\"Pack [float32 vector | neighbor_count | neighbor_ids] into bytes.\"\"\"\n    vec_bytes = vector.astype(np.float32).tobytes()          # d * 4 bytes\n    n = len(neighbors)\n    count_bytes = struct.pack(\"<I\", n)                        # 4-byte little-endian count\n    neighbor_bytes = struct.pack(f\"<{n}I\", *neighbors)       # n * 4 bytes\n    return vec_bytes + count_bytes + neighbor_bytes\n\ndef deserialize_node(data: bytes, dim: int) -> tuple[np.ndarray, list[int]]:\n    \"\"\"Unpack bytes into (vector, neighbors).\"\"\"\n    vec_end = dim * 4\n    vector = np.frombuffer(data[:vec_end], dtype=np.float32).copy()\n    n = struct.unpack_from(\"<I\", data, vec_end)[0]\n    neighbors = list(struct.unpack_from(f\"<{n}I\", data, vec_end + 4))\n    return vector, neighbors\n```\n\n**Check your understanding:** If $d = 768$ and $M = 50$, what's the entry size in bytes? Does it fit in one 4K page? What's the maximum $M$ that still fits in one page alongside a 768-dim float32 vector?\n\n*Answer: $768 \\times 4 + 4 + 50 \\times 4 = 3076 + 200 = 3276$ bytes. Yes, fits in one 4K page. Maximum M where $768 \\times 4 + 4 + M \\times 4 \\leq 4096$: $M \\leq (4096 - 3076)/4 = 255$. So up to M=255 is achievable with 768-dim vectors.*\n\n![Co-located storage layout and 4K page exploitation](diagrams/storage_layout.svg)\n\n### Re-ranking: Accuracy Without Extra I/O\n\nDuring on-disk graph traversal, the query uses **compressed PQ vectors** (in memory) to compute distances to unexpanded neighbor candidates — these are cheap and fast. When a node is actually expanded (its neighbor list read from disk), the co-located full-precision vector is also retrieved. CoreNN uses this to **re-rank the expanded node's distance** with full precision.\n\nThis is subtly different from re-ranking all candidates at the end of search. We're doing per-hop re-ranking of just the current expanded node — not all M of its neighbors. This is critical: re-ranking all M neighbors would require M additional disk reads per hop, multiplying I/O by $M+1$.\n\n---\n\n## Backedge Deltas: Solving Write Amplification\n\nThis is CoreNN's most novel contribution. To understand it, we need to revisit Vamana's insert algorithm.\n\n### Vamana Insert Recap (from Module 3)\n\nWhen inserting a new node $I$ into the Vamana graph:\n1. Run GreedySearch from the entry point, collecting visited nodes $\\mathcal{V}$\n2. Run RobustPrune on $\\mathcal{V}$ to select neighbors for $I$ (outgoing edges: $I \\to v_j$)\n3. For each selected neighbor $v_j$: add $I$ to $v_j$'s neighbor list (incoming backedge: $v_j \\to I$)\n4. If $v_j$'s neighbor count exceeds degree bound $M$: run RobustPrune on $v_j$\n\nStep 3 is the problem. Each backedge requires modifying an existing node's neighbor list.\n\n### The Write Amplification Problem\n\nWith degree bound $M = 50$, each insertion creates approximately $M = 50$ backedges. Each backedge modifies an existing node's RocksDB entry. The entry contains:\n\n$$3072 \\text{ (vector)} + 4 \\text{ (count)} + M \\times 4 \\text{ (neighbors)} = 3276 \\text{ bytes}$$\n\nTo add one new neighbor ID (4 bytes), we must **rewrite 3276 bytes**. That's a write amplification factor of:\n\n$$\\text{WA} = \\frac{3276 \\text{ bytes written}}{4 \\text{ bytes useful data}} = 819 \\times$$\n\nAnd this happens for every backedge, so for one insert with $M$ backedges:\n\n$$\\text{Total extra writes per insert} = M \\times 3276 \\text{ bytes} \\approx 163{,}800 \\text{ bytes} \\approx 160 \\text{ KB}$$\n\nAt 1000 inserts/second, that's 160 MB/s of pure write amplification — burning SSD write endurance and IOPS budget for no useful work.\n\n### FreshDiskANN's Solution (And Its Problem)\n\nThe FreshDiskANN paper sidesteps this by using a **temporary in-memory index**. New inserts go into a fresh in-memory Vamana graph. Once this reaches a threshold size, it's frozen and snapshotted to disk. When enough snapshots accumulate, `StreamingMerge` runs: all vectors from frozen snapshots are re-inserted into the main on-disk index, coalescing many small writes into fewer large ones.\n\nThe fatal flaw: **all computation optimizing those temporary in-memory graphs is thrown away**. You spent CPU time building a well-optimized Vamana graph in memory, then during merge you rebuild the same connections in the on-disk index from scratch. During StreamingMerge, the machine runs hot on CPU, query throughput (QPS) drops sharply, and the SLA degrades for the duration.\n\nThere's another problem: the latest unfrozen temporary index only exists in memory. If the process crashes, that snapshot hasn't been written to disk yet — you must rebuild it from your insert log, making recovery slow.\n\n### CoreNN's Backedge Delta Approach\n\nCoreNN observes the root cause: the problem is that each backedge causes an immediate full rewrite of the existing node's RocksDB entry. The solution: **don't rewrite. Append separately.**\n\nInstead of modifying the existing node entry, CoreNN writes the new backedge to a **separate \"delta\" key**:\n\n```python\n# Naive approach (causes write amplification):\ndef insert_backedge_naive(db, neighbor_id, new_node_id, degree_bound):\n    key = make_node_key(neighbor_id)\n    vec, neighbors = deserialize_node(db.get(key), dim=768)\n    neighbors.append(new_node_id)\n    if len(neighbors) > degree_bound:\n        neighbors = robust_prune(vec, neighbors, degree_bound)\n    db.put(key, serialize_node(vec, neighbors))  # FULL 3276-BYTE REWRITE\n\n# CoreNN approach (backedge delta):\ndef insert_backedge_delta(db, neighbor_id, new_node_id):\n    delta_key = make_delta_key(neighbor_id)\n    existing_delta = db.get(delta_key) or b''\n    # append just the 4-byte node ID to the delta list\n    db.put(delta_key, existing_delta + struct.pack(\"<I\", new_node_id))\n```\n\nThe delta write is tiny: just 4 bytes of new neighbor ID appended to a small delta entry. No rewriting the 3072-byte vector. No rewriting the existing optimized neighbor list.\n\n**At query time**, when expanding node $v$, we merge its base neighbors and delta neighbors:\n\n```python\ndef get_all_neighbors(db, node_id, dim):\n    # Read base entry (full vector + RobustPruned neighbors)\n    base_key = make_node_key(node_id)\n    vector, base_neighbors = deserialize_node(db.get(base_key), dim)\n    \n    # Read delta entry (additional neighbors added since last compaction)\n    delta_key = make_delta_key(node_id)\n    delta_data = db.get(delta_key)\n    delta_neighbors = []\n    if delta_data:\n        n_delta = len(delta_data) // 4\n        delta_neighbors = list(struct.unpack(f\"<{n_delta}I\", delta_data))\n    \n    return vector, base_neighbors + delta_neighbors\n```\n\n![Backedge deltas vs. naive rewrite: write amplification comparison](diagrams/backedge_deltas.svg)\n\n### The `max_degree_bound` Threshold\n\nWithout compaction, delta lists grow unboundedly. A node that's a hub (many insertions pass near it) could accumulate hundreds of delta neighbors, making query-time merging expensive and graph traversal slow.\n\nCoreNN introduces `max_degree_bound` ($M_{\\max}$): the threshold at which compaction triggers:\n\n```python\ndef maybe_compact(db, node_id, max_degree_bound, degree_bound, dim, alpha):\n    \"\"\"Trigger RobustPrune and rewrite when delta list grows too large.\"\"\"\n    vector, all_neighbors = get_all_neighbors(db, node_id, dim)\n    if len(all_neighbors) <= max_degree_bound:\n        return  # no compaction needed yet\n    \n    # Run RobustPrune to reduce back to degree_bound\n    pruned_neighbors = robust_prune(vector, all_neighbors, degree_bound, alpha)\n    \n    # Rewrite base entry with pruned neighbors\n    base_key = make_node_key(node_id)\n    db.put(base_key, serialize_node(vector, pruned_neighbors))\n    \n    # Clear the delta (now incorporated into base)\n    delta_key = make_delta_key(node_id)\n    db.delete(delta_key)\n```\n\n**The amortization math:** With $M = 50$ and $M_{\\max} = 75$, compaction triggers when a node accumulates 25 delta neighbors (after $M=50$ from initial RobustPrune). One compaction rewrites the full entry, but that rewrite serves the next $\\approx 25$ backedge insertions before another compaction is needed.\n\n$$\\text{Compaction cost per backedge} = \\frac{3276 \\text{ bytes}}{25} \\approx 131 \\text{ bytes/backedge}$$\n\nCompare to naive: 3276 bytes per backedge. **That's a 25× reduction in write amplification from compaction alone.**\n\nIn practice the savings are even larger: nodes touched during an average insert are random (most nodes are far from the new insertion point), so most nodes accumulate deltas slowly. The measured reduction in Exercise 2 is approximately **15× fewer bytes written**.\n\n**Check your understanding:** What happens to graph quality when you use backedge deltas? Does adding delta neighbors (without pruning) hurt recall?\n\n*Answer: No — delta neighbors add additional edges to consider during search. More edges means more paths to explore, which can only help or be neutral for recall. What it hurts is query latency (more candidates to evaluate per hop). That's the trade-off: slightly more compute per hop in exchange for dramatically fewer disk writes during insert.*\n\n[^3]: RocksDB compacts small values efficiently through its LSM-tree design. Many small delta writes are batched together in RocksDB's write buffer before being flushed to disk, then compacted in the background. This makes the small delta writes even cheaper than they appear at the application level.\n\n---\n\n## Product Quantization in the On-Disk Stage\n\nYou built PQ from scratch in Module 4. Here we focus on how it fits into the on-disk query pipeline.\n\n### The Distance Computation Bottleneck\n\nDuring on-disk graph traversal, when node $v$ is expanded, its neighbor list reveals $M$ new candidate nodes. We need to compute the distance from the query $q$ to each candidate to decide which ones to expand next.\n\nIf all vectors were on disk, each distance computation would require a disk read:\n\n$$M \\times 20{,}000 \\text{ ns} = 1 \\text{ ms per hop}$$\n\nUnacceptable for a 15 ms total query budget with 20+ hops.\n\n### PQ Distances from Memory\n\nIn the on-disk stage, CoreNN keeps all PQ-compressed vectors in memory — 96 bytes each for our 768-dim example:\n\n$$\\text{Memory for 1B compressed vectors} = 10^9 \\times 96 \\text{ bytes} = 96 \\text{ GB}$$\n\nFits on a 96 GB RAM machine! This is exactly the 31× RAM reduction CoreNN achieved.\n\nComputing distance from query $q$ to candidate $c$ using PQ:\n\n```python\ndef pq_distance(query_pq_table: np.ndarray, candidate_code: np.ndarray) -> float:\n    \"\"\"\n    Asymmetric Distance Computation (ADC).\n    \n    query_pq_table: shape (n_subspaces, n_centroids) — precomputed distances\n                    from query to each centroid in each subspace\n    candidate_code: shape (n_subspaces,) — PQ code for this candidate\n    \n    Returns: approximate squared L2 distance\n    \"\"\"\n    # Look up precomputed distance for each subspace, sum them\n    return sum(query_pq_table[i, candidate_code[i]] \n               for i in range(len(candidate_code)))\n```\n\nThe ADC lookup table `query_pq_table` is computed once per query:\n\n$$\\text{Precomputation cost} = n_{\\text{subspaces}} \\times n_{\\text{centroids}} \\times d_{\\text{sub}} = 96 \\times 256 \\times 8 \\text{ multiplications}$$\n\nThen each distance lookup is just $n_{\\text{subspaces}} = 96$ table lookups — extremely fast (nanoseconds).\n\n### Re-ranking With Full Precision\n\nWhen node $v$ is expanded (its disk entry read), the co-located full-precision vector is available. CoreNN computes the *exact* distance from $q$ to $v$'s vector and uses this to correct the candidate ranking for $v$. This per-hop re-ranking dramatically improves accuracy compared to PQ-only distances throughout.\n\nThe algorithm:\n\n1. **Candidate evaluation:** Use PQ distances (from memory) for all unexpanded neighbors\n2. **Selection:** Pick the best candidate by PQ distance — call it $v$\n3. **Expansion:** Read $v$'s disk entry → get neighbor list + full-precision vector\n4. **Re-rank:** Compute exact distance to $v$, update its position in the candidate set\n5. **Goto 1** with $v$'s neighbors added as new candidates\n\nStep 4 happens \"for free\" in terms of disk I/O — the vector is already in the page we read for step 3.\n\n---\n\n## True Deletion via Graph Contraction\n\nHNSW soft-deletes are corrosive: as deleted nodes accumulate, the graph develops \"holes.\" Traversal hops land on deleted nodes, wasting time. Over months of production use with 20–30% churn, recall degrades measurably and graph rebuilds become necessary.\n\nCoreNN implements **true deletion via graph contraction**, a technique from the DiskANN paper:\n\n### The Graph Contraction Algorithm\n\nTo delete node $D$:\n1. Find all nodes with outgoing edges pointing *to* $D$ (the \"incoming neighborhood\" of $D$)\n2. Find all nodes $D$ points to (its \"outgoing neighborhood\")\n3. For each incoming node $u$: add all of $D$'s outgoing neighbors to $u$'s neighbor list (connecting $u$ around $D$)\n4. Run RobustPrune on each affected $u$ to prune back to degree bound $M$\n5. Remove $D$'s entry from RocksDB entirely\n\nVisually: $u \\to D \\to w$ becomes $u \\to w$ directly, preserving navigability.\n\n```python\ndef delete_node(db, graph, node_id, degree_bound, dim, alpha):\n    \"\"\"True deletion via graph contraction.\"\"\"\n    # Step 1-2: Find incoming and outgoing neighbors\n    incoming = graph.incoming_edges[node_id]  # nodes pointing to node_id\n    outgoing_vec, outgoing = deserialize_node(db.get(make_node_key(node_id)), dim)\n    \n    # Step 3-4: Reconnect incoming nodes around the deleted node\n    for u in incoming:\n        u_vec, u_neighbors = get_all_neighbors(db, u, dim)\n        # Remove the deleted node from u's neighbors\n        u_neighbors = [n for n in u_neighbors if n != node_id]\n        # Add deleted node's outgoing neighbors as candidates\n        u_neighbors_extended = list(set(u_neighbors + outgoing))\n        # Prune back to degree bound\n        pruned = robust_prune(u_vec, u_neighbors_extended, degree_bound, alpha)\n        db.put(make_node_key(u), serialize_node(u_vec, pruned))\n    \n    # Step 5: Remove the deleted node\n    db.delete(make_node_key(node_id))\n    db.delete(make_delta_key(node_id))\n```\n\nThis is fundamentally different from soft-delete: the node's storage is reclaimed immediately, and the graph remains navigable to all previously-reachable regions. No ghost nodes accumulate over time.\n\n**The entry point edge case:** If the deleted node happens to be the graph's entry point (the start of all searches), you must update the entry point. A reasonable heuristic: set the new entry point to the deleted node's nearest remaining neighbor.\n\n---\n\n## The In-Memory → On-Disk Transition\n\nThis is where CoreNN's \"same DB format\" design pays off in the most concrete way.\n\n### What Changes During Transition\n\n| Aspect | In-Memory Stage | On-Disk Stage |\n|--------|-----------------|---------------|\n| Distance computation | Full-precision (from RAM cache) | PQ approximate (from RAM) |\n| Node expansion | Read from RAM cache | Read from RocksDB (disk) |\n| Re-ranking | N/A (already full-precision) | Full-precision from co-located disk entry |\n| Entry point | From RAM | From RAM |\n| PQ codes | In RAM | In RAM |\n\n### What Does NOT Change\n\n- **RocksDB entries:** Identical format. Not modified.\n- **Graph topology:** Not modified.\n- **Search algorithm:** Same GreedySearch, just different data sources.\n\nThe transition procedure:\n\n```python\ndef transition_to_disk(index):\n    \"\"\"Switch from in-memory to on-disk mode.\"\"\"\n    # 1. Build PQ codebook on current in-memory vectors\n    pq = ProductQuantizer(n_subspaces=96, n_centroids=256)\n    pq.fit(index.all_vectors())\n    \n    # 2. Encode all vectors to PQ codes — these go into RAM\n    pq_codes = {node_id: pq.encode(vec) \n                for node_id, vec in index.all_vectors().items()}\n    \n    # 3. Evict full-precision vectors from RAM cache\n    index.memory_cache.clear()\n    \n    # 4. Switch mode flag — subsequent queries use disk reads\n    index.mode = \"on_disk\"\n    index.pq = pq\n    index.pq_codes = pq_codes\n    \n    # RocksDB entries were already there — no mass rewrite needed!\n```\n\nThe \"no mass rewrite\" part is crucial. In a system where the in-memory format differs from the disk format, transition would require reading every entry, transforming it, and writing it back — potentially hours of work for a billion-entry index. CoreNN avoids this entirely.\n\n---\n\n## Analytical Questions\n\nThese questions require synthesis across multiple concepts. Work through them before looking at the exercises.\n\n**Q1: Write Amplification Trade-off Analysis**\n\nConsider two systems:\n- System A: Naive backedge insertion (immediate rewrite, no deltas)\n- System B: CoreNN backedges (deltas + compaction at $M_{\\max} = 1.5M$)\n\nBoth serve 1000 inserts/second with $M = 50$ and 768-dim float32 vectors.\n\na) Compute total bytes written per second for each system.\nb) A typical NVMe SSD has a write endurance of 1 drive write per day (DWPD). For a 4.8 TB SSD, how long does System A's write amplification take to exhaust the SSD endurance? What about System B?\nc) How does increasing $M_{\\max}$ (the compaction threshold) affect: write amplification, query latency, and graph recall? Is there a Pareto-optimal $M_{\\max}$?\n\n**Q2: PQ Dimensionality and the Accuracy-Memory Trade-off**\n\nFor 768-dim vectors with PQ using $n_s$ subspaces of 256 centroids each:\n- Each subspace covers $768/n_s$ dimensions\n- Compression ratio = $(768/n_s \\times 4) / 1 = 768 \\times 4 / n_s$ bytes saved per vector\n\na) Derive the formula for total RAM required for PQ codes as a function of $n_s$ and $N$ (number of vectors).\nb) For $N = 10^9$, what $n_s$ minimizes RAM while keeping $> 90\\%$ recall? (Hint: PQ recall is roughly proportional to the number of dimensions per subspace — more dimensions captured per code = better precision.)\nc) Why does PQ work better for text embeddings than for image embeddings at the same compression ratio? (Hint: think about the structure of the embedding spaces.)\n\n**Q3: Graph Contraction Correctness**\n\nWhen deleting node $D$ via graph contraction:\n\na) Prove that every region of the graph reachable from the entry point *before* deletion remains reachable *after* deletion, assuming $D$'s outgoing neighbors are all still in the graph.\nb) What happens if $D$ is the *only* path between two clusters of the graph? Is this possible in a well-constructed Vamana graph? Why or why not?\nc) After running RobustPrune on affected nodes following deletion, is it guaranteed that recall remains unchanged? If not, when does recall drop?\n\n**Q4: The FreshDiskANN vs. CoreNN Design Space**\n\nThe CoreNN author argues that \"it's easier and cheaper to add another SSD than to double CPU core count.\" \n\na) Make this quantitative. If an additional NVMe SSD costs $200 and provides 500K write IOPS, versus a high-end CPU upgrade costing $2000 and providing 2× throughput for RobustPrune — which is more economical for handling 1M insert/day?\nb) CoreNN's backedge deltas increase *read* cost (must read both base and delta keys per node expansion). FreshDiskANN's streaming merge eliminates this overhead but has write spikes. Sketch a cost model that decides which approach wins for a given ratio of reads-to-writes.\nc) Under what workload characteristics would FreshDiskANN actually be preferable to CoreNN's delta approach?\n\n---\n\n## Synthesis: Closing the Loop\n\nLet's trace the journey from Module 0 to here, because this module is where everything snaps into place.\n\n**Module 0** showed you that brute force $O(N \\cdot d)$ search is unusable at scale, and that high-dimensional geometry breaks tree-based approaches.\n\n**Module 1** introduced graph-based search: model vectors as nodes, traverse greedily from entry point to local minimum. Works surprisingly well because graph edges don't have to respect geometric constraints — they can reflect semantic proximity.\n\n**Module 2** gave you HNSW's hierarchical answer to \"how do you start far away and home in precisely?\" — long edges at high levels, short edges at low levels, exponential level decay ensuring logarithmic average hops.\n\n**Module 3** showed that Vamana achieves the same logarithmic behavior in a *flat* graph via RobustPrune's $\\alpha$ parameter — no hierarchy needed, and with a strict per-node degree bound that's critical for disk-based storage.\n\n**Module 4** gave you Product Quantization: 32× vector compression, keeping all compressed codes in memory while full-precision vectors live on disk. The key insight was Asymmetric Distance Computation — compute the PQ lookup table once per query, then each distance is just $n_s$ table lookups.\n\n**Module 5** (this module) solves the remaining three problems:\n\n1. **Where do full-precision vectors live on disk?** Co-located with neighbor lists in a single RocksDB entry, exploiting 4K SSD pages to get re-ranking for free.\n\n2. **How do you insert into a disk-resident graph without catastrophic write amplification?** Backedge deltas: write additions separately, merge at read time, compact lazily when `max_degree_bound` is reached.\n\n3. **How do you transition from in-memory to on-disk gracefully?** Same RocksDB format throughout — just evict the memory cache and let reads fall through to disk.\n\nThe result: searching 1 billion Reddit comment embeddings in **15 ms** on a **single machine** with **96 GB RAM** and a **4.8 TB SSD** — no sharding, no scheduled rebuilds, no downtime during scale-up, and true deletion that preserves recall rather than accumulating bloat.\n\nThis is the power of co-designing algorithms with storage physics. The choice of 4K SSD pages isn't incidental — it drives the co-location layout. The characteristic of RocksDB as a high-write-throughput LSM store isn't incidental — it makes small delta writes cheap. The choice of Vamana over HNSW isn't incidental — Vamana's strict per-node degree bound means entries have predictable size, making it possible to guarantee they fit in a single SSD page.\n\nEvery design decision in CoreNN follows from a physical constraint. That's what separates a production system from an academic algorithm.\n\n---\n\n## Exercises\n\n**Exercise 1:** [Co-located Storage Layout Simulation](ex01_colocated_storage_layout_simulation.py) — Implement the binary key format and co-located serialization, then measure I/O operations for co-located vs. separate storage across 1,000 simulated query hops.\n\n**Exercise 2:** [Backedge Deltas vs Naive Rewrite](ex02_backedge_deltas_vs_naive_rewrite.py) — Implement both insertion strategies and measure write amplification across 2,000 inserts. Verify the 15× reduction in bytes written.\n\n**Exercise 3:** [Mini Vector Database: The Full Pipeline](ex03_mini_vector_database_the_full_pipeline/) — Assemble all pieces into a working VectorDB with insert, search, delete, and mode transition. All 15 tests must pass.\n\n---\n\n*Next: This is the final module. You now have all the pieces to build, operate, and reason about production-scale vector search systems.*\n", "exercises": [{"filename": "ex01_colocated_storage_layout_simulation.py", "content": "\"\"\"\nExercise 1: Co-located Storage Layout Simulation\n=================================================\nCoreNN stores each node's full vector + neighbor list in a single RocksDB entry\nso that a single 4K SSD page read retrieves both the neighbor list (needed to\nknow where to go next) and the full-precision vector (needed for re-ranking).\n\nYour task: implement the storage helpers and simulate I/O costs for two layouts:\n  - Co-located: vector + neighbors in one binary entry (one I/O op per hop)\n  - Separate:   vector and neighbors stored at different keys (two I/O ops per hop)\n\nKey facts:\n  - SSD minimum read unit = 4096 bytes (one \"page\")\n  - A 768-dim float32 vector = 3072 bytes\n  - 50 neighbor IDs × 4 bytes = 200 bytes\n  - Together = 3272 bytes → fits in ONE 4K page\n  - Separately → 200-byte entry reads 4K, 3072-byte entry reads another 4K\n\nRun the __main__ block to verify your implementation:\n  python ex01_colocated_storage_layout_simulation.py\n\"\"\"\n\nimport os\nimport struct\nimport numpy as np\nfrom dataclasses import dataclass, field\nfrom typing import Optional\n\n# ─── Constants ────────────────────────────────────────────────────────────────\nSSD_PAGE_SIZE = 4096        # bytes — minimum SSD read unit\nDIM = 768                   # embedding dimensions\nM = 50                      # degree bound (neighbors per node)\n\nKEY_TYPE_NODE = 0x01        # type prefix for co-located entries\nKEY_TYPE_VECTOR = 0x02      # type prefix for separate vector entries\nKEY_TYPE_NEIGHBORS = 0x03   # type prefix for separate neighbor entries\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ─── Storage Simulator ────────────────────────────────────────────────────────\n\n@dataclass\nclass IOStats:\n    \"\"\"Tracks I/O operations and bytes transferred.\"\"\"\n    ops: int = 0          # number of disk read operations\n    bytes_read: int = 0   # total bytes transferred (rounded up to page boundary)\n\n    def record_read(self, data_size: int):\n        \"\"\"Record one disk read: one op, data_size rounded up to SSD_PAGE_SIZE bytes.\"\"\"\n        self.ops += 1\n        # SSDs read in minimum page-size chunks\n        pages = (data_size + SSD_PAGE_SIZE - 1) // SSD_PAGE_SIZE\n        self.bytes_read += pages * SSD_PAGE_SIZE\n\n    def mb(self) -> float:\n        return self.bytes_read / (1024 * 1024)\n\n\nclass StorageSimulator:\n    \"\"\"\n    Simulates a key-value store with I/O tracking.\n\n    Keys are bytes objects. Values are bytes objects.\n    Every get() simulates a disk read (rounded up to SSD_PAGE_SIZE).\n    \"\"\"\n\n    def __init__(self):\n        self._store: dict[bytes, bytes] = {}\n        self.stats: dict[str, IOStats] = {}\n\n    def put(self, key: bytes, value: bytes):\n        self._store[key] = value\n\n    def get(self, key: bytes, layout_name: str = \"default\") -> Optional[bytes]:\n        \"\"\"Retrieve value and record simulated I/O.\"\"\"\n        value = self._store.get(key)\n        if value is not None:\n            if layout_name not in self.stats:\n                self.stats[layout_name] = IOStats()\n            self.stats[layout_name].record_read(len(value))\n        return value\n\n    def contains(self, key: bytes) -> bool:\n        return key in self._store\n\n\n# ─── Key helpers ──────────────────────────────────────────────────────────────\n\ndef make_colocated_key(node_id: int) -> bytes:\n    \"\"\"\n    Build the binary key for a co-located node entry.\n    Format: [type_prefix: 1 byte][node_id: 4 bytes big-endian]\n    \"\"\"\n    return struct.pack(\">BI\", KEY_TYPE_NODE, node_id)\n\n\ndef make_vector_key(node_id: int) -> bytes:\n    \"\"\"Key for separate vector storage.\"\"\"\n    return struct.pack(\">BI\", KEY_TYPE_VECTOR, node_id)\n\n\ndef make_neighbors_key(node_id: int) -> bytes:\n    \"\"\"Key for separate neighbor storage.\"\"\"\n    return struct.pack(\">BI\", KEY_TYPE_NEIGHBORS, node_id)\n\n\n# ─── Separate layout (provided for comparison) ────────────────────────────────\n\ndef store_node_separate(storage: StorageSimulator, node_id: int,\n                        vector: np.ndarray, neighbors: list[int]):\n    \"\"\"Store vector and neighbors at DIFFERENT keys (naive, causes 2 reads per hop).\"\"\"\n    vec_bytes = vector.astype(np.float32).tobytes()\n    storage.put(make_vector_key(node_id), vec_bytes)\n\n    n = len(neighbors)\n    nbr_bytes = struct.pack(f\"<I{n}I\", n, *neighbors)\n    storage.put(make_neighbors_key(node_id), nbr_bytes)\n\n\ndef load_node_separate(storage: StorageSimulator, node_id: int,\n                       layout_name: str) -> tuple[np.ndarray, list[int]]:\n    \"\"\"Load from separate storage — costs TWO disk reads.\"\"\"\n    vec_data = storage.get(make_vector_key(node_id), layout_name)\n    vector = np.frombuffer(vec_data, dtype=np.float32).copy()\n\n    nbr_data = storage.get(make_neighbors_key(node_id), layout_name)\n    n = struct.unpack_from(\"<I\", nbr_data, 0)[0]\n    neighbors = list(struct.unpack_from(f\"<{n}I\", nbr_data, 4))\n    return vector, neighbors\n\n\n# ─── TODO: Co-located layout ──────────────────────────────────────────────────\n\ndef store_node_colocated(storage: StorageSimulator, node_id: int,\n                         vector: np.ndarray, neighbors: list[int]):\n    \"\"\"\n    Store vector + neighbors in a SINGLE binary entry at the co-located key.\n\n    Entry format:\n        [float32 vector: DIM × 4 bytes]\n        [neighbor_count: 4 bytes, little-endian uint32]\n        [neighbor_ids: neighbor_count × 4 bytes, little-endian uint32 each]\n\n    Key format: make_colocated_key(node_id) — see above.\n\n    Parameters\n    ----------\n    storage   : StorageSimulator to write to\n    node_id   : integer node identifier\n    vector    : numpy array of shape (DIM,) and dtype float32\n    neighbors : list of neighbor node IDs (ints)\n\n    Hint: use vector.astype(np.float32).tobytes() for the vector bytes,\n          struct.pack(\"<I\", n) for the count, struct.pack(f\"<{n}I\", *neighbors)\n          for the neighbor IDs, then concatenate all three and call storage.put().\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Convert vector to float32 bytes                      #\n    # 2. Pack neighbor count as 4-byte little-endian uint32   #\n    # 3. Pack neighbor IDs as n × 4-byte little-endian uint32 #\n    # 4. Concatenate: vec_bytes + count_bytes + nbr_bytes     #\n    # 5. Call storage.put(make_colocated_key(node_id), data)  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef load_node_colocated(storage: StorageSimulator, node_id: int,\n                        layout_name: str) -> tuple[np.ndarray, list[int]]:\n    \"\"\"\n    Load a co-located node entry — one disk read yields BOTH vector and neighbors.\n\n    Parameters\n    ----------\n    storage     : StorageSimulator to read from\n    node_id     : integer node identifier\n    layout_name : passed to storage.get() for I/O tracking\n\n    Returns\n    -------\n    (vector, neighbors) : (np.ndarray of shape (DIM,), list of ints)\n\n    Hint: call storage.get(make_colocated_key(node_id), layout_name) to get\n          the raw bytes, then unpack DIM*4 bytes as float32, then unpack the\n          4-byte count, then unpack count neighbor IDs starting at offset DIM*4+4.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Get raw bytes via storage.get()                      #\n    # 2. Parse vector: np.frombuffer(data[:DIM*4], dtype=...) #\n    # 3. Parse count: struct.unpack_from(\"<I\", data, DIM*4)   #\n    # 4. Parse neighbors: struct.unpack_from(\"<{n}I\", ...)    #\n    # 5. Return (vector.copy(), list(neighbors))              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── TODO: Query hop simulation ───────────────────────────────────────────────\n\ndef simulate_query_hop_colocated(storage: StorageSimulator,\n                                 node_id: int,\n                                 query: np.ndarray) -> tuple[list[int], float]:\n    \"\"\"\n    Simulate one graph traversal hop using co-located storage.\n\n    A hop:\n      1. Load the node (vector + neighbors) — ONE disk read\n      2. Compute L2 distance from query to the node's vector (for re-ranking)\n      3. Return (neighbors, rerank_distance) so the caller knows where to go next\n         and has the full-precision distance for this node\n\n    Parameters\n    ----------\n    storage : StorageSimulator\n    node_id : the node being expanded this hop\n    query   : float32 numpy array, shape (DIM,)\n\n    Returns\n    -------\n    (neighbors, rerank_distance) : (list[int], float)\n\n    Hint: call load_node_colocated(..., layout_name=\"colocated\"), then compute\n          squared L2 distance: float(np.sum((query - vector)**2))\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~8 lines                               #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Call load_node_colocated(storage, node_id, \"colocated\") #\n    # 2. Compute squared L2 distance: np.sum((query - vec)**2) #\n    # 3. Return (neighbors, float(distance))                  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef simulate_query_hop_separate(storage: StorageSimulator,\n                                node_id: int,\n                                query: np.ndarray) -> tuple[list[int], float]:\n    \"\"\"\n    Simulate one graph traversal hop using separate storage.\n\n    With separate storage:\n      1. Load neighbors — ONE disk read (to know where to go next)\n      2. Load vector — ANOTHER disk read (to re-rank this node's distance)\n    Both reads are tracked by the storage simulator.\n    \"\"\"\n    vector, neighbors = load_node_separate(storage, node_id, \"separate\")\n    distance = float(np.sum((query - vector) ** 2))\n    return neighbors, distance\n\n\n# ─── TODO: Layout comparison ──────────────────────────────────────────────────\n\ndef compare_layouts(stats_colocated: IOStats,\n                    stats_separate: IOStats) -> dict:\n    \"\"\"\n    Compute comparison metrics between the two layouts.\n\n    Parameters\n    ----------\n    stats_colocated : IOStats from co-located simulation\n    stats_separate  : IOStats from separate simulation\n\n    Returns\n    -------\n    dict with keys:\n      'io_ops_saved'        : int, how many fewer disk ops co-located uses\n      'io_ops_reduction_pct': float, percentage reduction in disk ops\n      'mb_saved'            : float, MB saved by co-located layout\n      'reranking_free'      : bool, True (co-located always enables re-ranking at no extra I/O)\n\n    Hint: io_ops_saved = stats_separate.ops - stats_colocated.ops\n          io_ops_reduction_pct = io_ops_saved / stats_separate.ops * 100\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~8 lines                               #\n    #                                                         #\n    # Compute:                                                #\n    # - io_ops_saved                                          #\n    # - io_ops_reduction_pct (as a float percentage)         #\n    # - mb_saved = stats_separate.mb() - stats_colocated.mb()#\n    # - reranking_free = True                                 #\n    # Return a dict with these four keys                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── Main harness (DO NOT MODIFY) ─────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    # Fast verification params vs. full student defaults\n    N_NODES = 50 if VERIFY else 500       # nodes in graph\n    N_HOPS = 20 if VERIFY else 1000       # query hops to simulate\n    rng = np.random.default_rng(42)\n\n    print(\"=\" * 60)\n    print(\"Exercise 1: Co-located Storage Layout Simulation\")\n    print(\"=\" * 60)\n\n    # Build two storage simulators: one for each layout\n    storage_colocated = StorageSimulator()\n    storage_separate = StorageSimulator()\n\n    # Populate both storages with the same synthetic graph\n    print(f\"\\nBuilding synthetic graph ({N_NODES} nodes, DIM={DIM}, M={M})...\")\n    vectors = rng.standard_normal((N_NODES, DIM)).astype(np.float32)\n    all_neighbors = []\n    for i in range(N_NODES):\n        # Random neighbors (in a real graph these come from RobustPrune)\n        nbr_count = min(M, N_NODES - 1)\n        candidates = list(range(N_NODES))\n        candidates.remove(i)\n        neighbors = rng.choice(candidates, size=nbr_count, replace=False).tolist()\n        all_neighbors.append(neighbors)\n\n        store_node_colocated(storage_colocated, i, vectors[i], neighbors)\n        store_node_separate(storage_separate, i, vectors[i], neighbors)\n\n    # Verify entry sizes\n    test_key = make_colocated_key(0)\n    test_val = storage_colocated._store[test_key]\n    expected_size = DIM * 4 + 4 + M * 4\n    print(f\"\\nEntry size check:\")\n    print(f\"  Co-located entry: {len(test_val)} bytes (expected ~{expected_size})\")\n    print(f\"  Fits in one 4K page: {len(test_val) <= SSD_PAGE_SIZE}\")\n\n    # Simulate query hops\n    print(f\"\\nSimulating {N_HOPS} query hops...\")\n    query = rng.standard_normal(DIM).astype(np.float32)\n    rerank_distances_colocated = []\n    rerank_distances_separate = []\n\n    for hop in range(N_HOPS):\n        node_id = rng.integers(0, N_NODES)\n        nbrs_c, dist_c = simulate_query_hop_colocated(storage_colocated, node_id, query)\n        nbrs_s, dist_s = simulate_query_hop_separate(storage_separate, node_id, query)\n        rerank_distances_colocated.append(dist_c)\n        rerank_distances_separate.append(dist_s)\n\n    # Verify distances match (same vectors, same query)\n    dist_match = np.allclose(rerank_distances_colocated, rerank_distances_separate, rtol=1e-4)\n\n    # Get stats and compare\n    stats_c = storage_colocated.stats.get(\"colocated\", IOStats())\n    stats_s = storage_separate.stats.get(\"separate\", IOStats())\n    comparison = compare_layouts(stats_c, stats_s)\n\n    print(\"\\n\" + \"─\" * 60)\n    print(\"RESULTS\")\n    print(\"─\" * 60)\n    print(f\"Co-located:  {N_HOPS} hops, {stats_c.ops} I/O ops, {stats_c.mb():.1f} MB read\")\n    print(f\"Separate:    {N_HOPS} hops, {stats_s.ops} I/O ops, {stats_s.mb():.1f} MB read\")\n    print(f\"\\nI/O ops saved:        {comparison['io_ops_saved']} ({comparison['io_ops_reduction_pct']:.0f}% reduction)\")\n    print(f\"MB saved:             {comparison['mb_saved']:.2f} MB\")\n    print(f\"Distances match:      {dist_match}\")\n    print(f\"\\nCo-located saves {comparison['io_ops_reduction_pct']:.0f}% I/O operations \"\n          f\"and enables free re-ranking\")\n\n    # Assertions\n    assert stats_c.ops == N_HOPS, f\"Co-located should use exactly {N_HOPS} I/O ops (one per hop)\"\n    assert stats_s.ops == N_HOPS * 2, f\"Separate should use {N_HOPS * 2} I/O ops (two per hop)\"\n    assert comparison[\"io_ops_saved\"] == N_HOPS, \"Should save exactly N_HOPS ops\"\n    assert comparison[\"reranking_free\"] is True\n    assert dist_match, \"Re-ranking distances must match between layouts\"\n    print(\"\\n✓ All assertions passed!\")\n"}, {"filename": "ex02_backedge_deltas_vs_naive_rewrite.py", "content": "\"\"\"\nExercise 2: Backedge Deltas vs Naive Rewrite\n============================================\nWhen inserting a new node into a Vamana graph, each of the new node's M neighbors\nneeds a \"backedge\" pointing back to the new node. Naive implementation: immediately\nrewrite the neighbor's full RocksDB entry. CoreNN's approach: write a tiny 4-byte\ndelta at a separate key, merge at query time, and compact lazily when the delta\nlist exceeds max_degree_bound.\n\nExercise 1 showed that co-located entries are 3272 bytes each (768-dim, 49 neighbors).\nFor 768-dim with M=32, each entry is 3072 + 4 + 32*4 = 3204 bytes.\nA backedge adds just 4 bytes of useful data — writing 3204 bytes for 4 bytes useful\ndata is 801x write amplification!\n\nYour task: implement both strategies and measure the difference.\n\nRun the solution:\n  python ex02_backedge_deltas_vs_naive_rewrite.py\n\"\"\"\n\nimport os\nimport struct\nimport numpy as np\nfrom dataclasses import dataclass, field\nfrom typing import Optional\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ─── Constants ────────────────────────────────────────────────────────────────\nDIM = 128             # smaller dim for faster simulation\nDEGREE_BOUND = 16     # M: target degree after RobustPrune\nMAX_DEGREE_BOUND = 24 # M_max: compact when total neighbors exceed this\nALPHA = 1.1           # RobustPrune slack parameter\n\nKEY_TYPE_BASE = 0x01\nKEY_TYPE_DELTA = 0x02\n\n# ─── Storage with write tracking ──────────────────────────────────────────────\n\n@dataclass\nclass WriteStats:\n    \"\"\"Tracks write amplification metrics.\"\"\"\n    total_bytes_written: int = 0\n    full_rewrites: int = 0         # number of complete entry rewrites\n    delta_writes: int = 0          # number of small delta writes\n    compactions: int = 0           # number of RobustPrune compactions triggered\n\n    def record_put(self, data_size: int, is_delta: bool = False):\n        self.total_bytes_written += data_size\n        if is_delta:\n            self.delta_writes += 1\n        else:\n            self.full_rewrites += 1\n\n    def record_compaction(self):\n        self.compactions += 1\n\n    def mb(self) -> float:\n        return self.total_bytes_written / (1024 * 1024)\n\n\nclass TrackedStorage:\n    \"\"\"Key-value store that tracks writes with separate stats per strategy.\"\"\"\n\n    def __init__(self):\n        self._store: dict[bytes, bytes] = {}\n        self.stats = WriteStats()\n\n    def put(self, key: bytes, value: bytes, is_delta: bool = False):\n        self._store[key] = value\n        self.stats.record_put(len(value), is_delta=is_delta)\n\n    def get(self, key: bytes) -> Optional[bytes]:\n        return self._store.get(key)\n\n    def delete(self, key: bytes):\n        self._store.pop(key, None)\n\n    def contains(self, key: bytes) -> bool:\n        return key in self._store\n\n\n# ─── Key helpers ──────────────────────────────────────────────────────────────\n\ndef make_base_key(node_id: int) -> bytes:\n    return struct.pack(\">BI\", KEY_TYPE_BASE, node_id)\n\ndef make_delta_key(node_id: int) -> bytes:\n    return struct.pack(\">BI\", KEY_TYPE_DELTA, node_id)\n\n\n# ─── Serialization helpers (provided) ─────────────────────────────────────────\n\ndef serialize_entry(vector: np.ndarray, neighbors: list[int]) -> bytes:\n    \"\"\"Pack [float32 vector | count | neighbor IDs] into bytes.\"\"\"\n    vec_bytes = vector.astype(np.float32).tobytes()\n    n = len(neighbors)\n    return vec_bytes + struct.pack(f\"<I{n}I\", n, *neighbors)\n\n\ndef deserialize_entry(data: bytes) -> tuple[np.ndarray, list[int]]:\n    \"\"\"Unpack bytes into (vector, neighbors).\"\"\"\n    vec_end = DIM * 4\n    vector = np.frombuffer(data[:vec_end], dtype=np.float32).copy()\n    n = struct.unpack_from(\"<I\", data, vec_end)[0]\n    neighbors = list(struct.unpack_from(f\"<{n}I\", data, vec_end + 4))\n    return vector, neighbors\n\n\ndef serialize_delta(additional_neighbors: list[int]) -> bytes:\n    \"\"\"Pack a list of additional neighbor IDs into bytes (4 bytes each).\"\"\"\n    if not additional_neighbors:\n        return b''\n    return struct.pack(f\"<{len(additional_neighbors)}I\", *additional_neighbors)\n\n\ndef deserialize_delta(data: bytes) -> list[int]:\n    \"\"\"Unpack delta bytes into a list of node IDs.\"\"\"\n    if not data:\n        return []\n    n = len(data) // 4\n    return list(struct.unpack(f\"<{n}I\", data))\n\n\n# ─── RobustPrune (provided — from Module 3) ───────────────────────────────────\n\ndef robust_prune(center_vec: np.ndarray,\n                 candidates: list[int],\n                 candidate_vecs: dict[int, np.ndarray],\n                 degree_bound: int,\n                 alpha: float = ALPHA) -> list[int]:\n    \"\"\"\n    Prune candidate neighbor list to at most degree_bound edges.\n    Removes edge center→v if there exists v' already selected such that\n    dist(center, v) >= alpha * dist(v', v) — meaning going through v' is\n    just as good or better.\n    \"\"\"\n    if len(candidates) <= degree_bound:\n        return candidates[:]\n\n    # Sort by distance to center\n    dists = {v: float(np.sum((center_vec - candidate_vecs[v]) ** 2))\n             for v in candidates}\n    sorted_cands = sorted(candidates, key=lambda v: dists[v])\n\n    selected = []\n    for v in sorted_cands:\n        if len(selected) >= degree_bound:\n            break\n        # Check if any already-selected v' makes this edge redundant\n        dominated = False\n        for vp in selected:\n            dist_vp_v = float(np.sum((candidate_vecs[vp] - candidate_vecs[v]) ** 2))\n            if dists[v] >= alpha * dist_vp_v:\n                dominated = True\n                break\n        if not dominated:\n            selected.append(v)\n\n    return selected\n\n\n# ─── TODO: Naive backedge insertion ───────────────────────────────────────────\n\ndef insert_naive_backedge(storage: TrackedStorage,\n                          neighbor_id: int,\n                          new_node_id: int,\n                          new_node_vec: np.ndarray,\n                          candidate_vecs: dict[int, np.ndarray],\n                          degree_bound: int):\n    \"\"\"\n    Naive approach: immediately rewrite the neighbor's full entry.\n\n    Steps:\n      1. Load the existing entry for neighbor_id\n      2. Append new_node_id to its neighbor list\n      3. If len(neighbors) > degree_bound: run RobustPrune to trim it back\n         (must run RobustPrune every time we exceed degree_bound)\n      4. Rewrite the FULL entry (vector + pruned neighbors) back to storage\n         This causes massive write amplification: ~(DIM*4 + 4 + degree_bound*4)\n         bytes written just to add 4 bytes of new data\n\n    Parameters\n    ----------\n    storage        : TrackedStorage\n    neighbor_id    : the existing node receiving the backedge\n    new_node_id    : the newly inserted node\n    new_node_vec   : vector of the new node (needed for RobustPrune distance)\n    candidate_vecs : dict mapping node_id → vector (for all nodes in current graph)\n    degree_bound   : max edges allowed after pruning\n\n    Hint: load with deserialize_entry(storage.get(make_base_key(neighbor_id)))\n          serialize the updated entry with serialize_entry(vector, neighbors)\n          call storage.put(key, data, is_delta=False)\n          call storage.stats.record_compaction() when RobustPrune runs\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # 1. Get raw bytes from storage.get(make_base_key(...))   #\n    # 2. deserialize_entry to get (vector, neighbors)         #\n    # 3. Append new_node_id to neighbors                      #\n    # 4. If len(neighbors) > degree_bound:                    #\n    #      call robust_prune(vector, neighbors, cand_vecs,    #\n    #                        degree_bound, ALPHA)             #\n    #      call storage.stats.record_compaction()             #\n    # 5. serialize_entry(vector, neighbors)                   #\n    # 6. storage.put(make_base_key(neighbor_id), data, False) #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── TODO: Delta backedge insertion ───────────────────────────────────────────\n\ndef insert_backedge_delta(storage: TrackedStorage,\n                          neighbor_id: int,\n                          new_node_id: int):\n    \"\"\"\n    CoreNN approach: append new_node_id to a separate tiny delta entry.\n\n    Does NOT touch the base entry at all.\n    Writes only the 4-byte node ID (as an append to the delta list).\n\n    Steps:\n      1. Read existing delta for neighbor_id (may not exist yet)\n      2. Append new_node_id to the delta list\n      3. Write updated delta at make_delta_key(neighbor_id)\n         Use storage.put(..., is_delta=True) for correct stats tracking\n\n    Parameters\n    ----------\n    storage     : TrackedStorage\n    neighbor_id : the existing node receiving the backedge\n    new_node_id : the newly inserted node ID\n\n    Hint: get existing delta with storage.get(make_delta_key(neighbor_id)) or b''\n          deserialize_delta() to parse, append node_id, serialize_delta() to pack,\n          then storage.put(make_delta_key(neighbor_id), new_bytes, is_delta=True)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~8 lines                               #\n    #                                                         #\n    # 1. existing = storage.get(make_delta_key(neighbor_id))  #\n    # 2. delta_neighbors = deserialize_delta(existing or b'') #\n    # 3. delta_neighbors.append(new_node_id)                  #\n    # 4. new_delta = serialize_delta(delta_neighbors)         #\n    # 5. storage.put(make_delta_key(neighbor_id), new_delta,  #\n    #                is_delta=True)                           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── TODO: Merge base + delta at query time ───────────────────────────────────\n\ndef merge_neighbors(storage: TrackedStorage,\n                    node_id: int) -> tuple[np.ndarray, list[int]]:\n    \"\"\"\n    At query time, merge base neighbors and delta neighbors.\n\n    Returns the vector and the combined neighbor list.\n    The ordering: base neighbors first (already RobustPruned), deltas appended.\n\n    Parameters\n    ----------\n    storage : TrackedStorage\n    node_id : node to retrieve\n\n    Returns\n    -------\n    (vector, all_neighbors) : (np.ndarray, list[int])\n\n    Note: this does NOT record I/O (we're simulating just the merge logic;\n          the actual read cost would be tracked separately).\n    Hint: read base key without going through tracked I/O — use storage.get()\n          directly for both base and delta, deserialize both, concatenate.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # 1. base_data = storage.get(make_base_key(node_id))      #\n    # 2. If base_data is None, return (None, [])              #\n    # 3. vector, base_nbrs = deserialize_entry(base_data)     #\n    # 4. delta_data = storage.get(make_delta_key(node_id))    #\n    # 5. delta_nbrs = deserialize_delta(delta_data or b'')    #\n    # 6. return (vector, base_nbrs + delta_nbrs)              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── TODO: Compaction (lazy RobustPrune) ──────────────────────────────────────\n\ndef maybe_compact(storage: TrackedStorage,\n                  node_id: int,\n                  candidate_vecs: dict[int, np.ndarray],\n                  max_degree_bound: int,\n                  degree_bound: int):\n    \"\"\"\n    If total neighbors (base + delta) exceed max_degree_bound, run RobustPrune\n    and rewrite the base entry. Then clear the delta.\n\n    This amortizes the expensive rewrite: instead of rewriting on every backedge\n    (naive approach), we wait until max_degree_bound is exceeded — roughly\n    (max_degree_bound - degree_bound) backedges per compaction cycle.\n\n    Parameters\n    ----------\n    storage         : TrackedStorage\n    node_id         : node to possibly compact\n    candidate_vecs  : dict mapping node_id → vector\n    max_degree_bound: threshold for triggering compaction\n    degree_bound    : target degree after RobustPrune\n\n    Hint: call merge_neighbors(storage, node_id) to get all current neighbors.\n          Only compact if len(all_neighbors) > max_degr
