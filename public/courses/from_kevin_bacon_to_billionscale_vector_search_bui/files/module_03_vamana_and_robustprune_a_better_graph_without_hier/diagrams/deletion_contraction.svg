<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 -25 1049 598" width="800" height="456" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1971c2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="ah-2f9e44" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9e44"/>
    </marker>
    <marker id="ah-e03131" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131"/>
    </marker>
  </defs>
  <text x="250" y="39.0" font-size="20" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">True Deletion via Graph Contraction vs. Soft Delete</text>
  <text x="50" y="79.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">HARD DELETE (graph contraction)</text>
  <text x="680" y="79.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">SOFT DELETE (HNSW tombstone)</text>
  <ellipse cx="85.0" cy="145.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="77" y="156.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">A</text>
  <ellipse cx="205.0" cy="115.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="197" y="126.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">B</text>
  <ellipse cx="317.5" cy="157.5" rx="27.5" ry="27.5" fill="#ffc9c9" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="304" y="166.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">D</text>
  <text x="278" y="113.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">DELETE</text>
  <text x="278" y="126.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">THIS</text>
  <ellipse cx="425.0" cy="125.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="417" y="136.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">C</text>
  <ellipse cx="425.0" cy="215.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="417" y="226.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">E</text>
  <path d="M 118.0 146.8 L 282.1 155.6" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 235.9 126.7 L 284.3 145.0" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 351.5 147.2 L 393.4 134.5" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 348.8 174.2 L 395.9 199.4" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <text x="60" y="214.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">STEP 1: Connect A,B → C,E</text>
  <text x="60" y="228.8" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">(cross-edges bypass D)</text>
  <ellipse cx="85.0" cy="315.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="77" y="326.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">A</text>
  <ellipse cx="205.0" cy="285.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="197" y="296.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">B</text>
  <ellipse cx="375.0" cy="295.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="367" y="306.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">C</text>
  <ellipse cx="375.0" cy="385.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="367" y="396.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">E</text>
  <path d="M 117.9 312.7 L 342.1 297.3" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#ah-2f9e44)" filter="url(#handdrawn)"/>
  <path d="M 117.1 322.7 L 342.9 377.3" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#ah-2f9e44)" filter="url(#handdrawn)"/>
  <path d="M 237.9 286.9 L 342.1 293.1" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#ah-2f9e44)" filter="url(#handdrawn)"/>
  <path d="M 233.4 301.7 L 346.6 368.3" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#ah-2f9e44)" filter="url(#handdrawn)"/>
  <text x="60" y="444.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">STEP 2: RobustPrune trims A,B back to M edges</text>
  <text x="60" y="458.8" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">STEP 3: D removed from graph entirely</text>
  <text x="60" y="473.2" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Result: navigability preserved, no wasted hops!</text>
  <path d="M 545.0 60.0 L 645.0 60.0" fill="none" stroke="#1e1e1e" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <ellipse cx="645.0" cy="145.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="637" y="156.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">A</text>
  <ellipse cx="765.0" cy="115.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="757" y="126.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">B</text>
  <ellipse cx="877.5" cy="157.5" rx="27.5" ry="27.5" fill="#ffc9c9" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="864" y="168.6" font-size="18" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">D</text>
  <text x="855" y="206.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">✗ tombstone</text>
  <ellipse cx="985.0" cy="125.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="977" y="136.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">C</text>
  <ellipse cx="985.0" cy="215.0" rx="25.0" ry="25.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="977" y="226.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">E</text>
  <path d="M 678.0 146.8 L 842.1 155.6" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 795.9 126.7 L 844.3 145.0" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 911.5 147.2 L 953.4 134.5" fill="none" stroke="#e03131" stroke-width="2" stroke-dasharray="2 4" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <path d="M 908.8 174.2 L 955.9 199.4" fill="none" stroke="#e03131" stroke-width="2" stroke-dasharray="2 4" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <text x="620" y="274.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Graph unchanged. D still visited every query.</text>
  <text x="620" y="288.8" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">A→D→C path still traversed, D filtered at end.</text>
  <text x="620" y="303.2" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">10% deleted = 10% queries visiting D wasted.</text>
  <text x="620" y="374.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">After 30% deletions:</text>
  <text x="620" y="388.8" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">30% of every query path is garbage.</text>
  <text x="620" y="403.2" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Latency grows. Accuracy degraded by bloat.</text>
  <text x="620" y="417.6" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">No way to reclaim space.</text>
  <text x="60" y="505.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Hard delete cost: O(M³) once per deletion  |  Hard delete benefit: 0% wasted hops forever after</text>
  <text x="60" y="530.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Soft delete cost: O(1) per deletion  |  Soft delete hidden cost: every query wastes % time proportional to deleted fraction</text>
</svg>
