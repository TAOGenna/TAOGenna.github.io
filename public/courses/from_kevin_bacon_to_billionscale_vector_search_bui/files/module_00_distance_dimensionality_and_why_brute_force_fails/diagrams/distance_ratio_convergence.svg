<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 -20 951 508" width="800" height="428" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="250" y="44.0" font-size="20" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Max/Min Distance Ratio Converges to 1.0 as Dimensions Grow</text>
  <text x="80" y="75.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Ratio &gt;&gt; 1 = distances</text>
  <text x="80" y="91.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">are discriminating</text>
  <text x="80" y="106.8" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">(kNN easy)</text>
  <text x="80" y="145.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Ratio → 1.0 = distances</text>
  <text x="80" y="161.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">are all the same</text>
  <text x="80" y="176.8" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">(kNN meaningless)</text>
  <rect x="200" y="80" width="60" height="10" rx="0" fill="#1971c2" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="89.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">d=2: ratio ≈ 700  (distances wildly different)</text>
  <rect x="200" y="110" width="55" height="10" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="119.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">d=5: ratio ≈ 15</text>
  <rect x="200" y="140" width="48" height="10" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="149.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">d=10: ratio ≈ 4.1</text>
  <rect x="200" y="170" width="40" height="10" rx="0" fill="#f08c00" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="179.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">d=25: ratio ≈ 2.2</text>
  <rect x="200" y="200" width="30" height="10" rx="0" fill="#f08c00" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="209.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">d=50: ratio ≈ 1.6</text>
  <rect x="200" y="230" width="22" height="10" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="239.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">d=100: ratio ≈ 1.4  ← spatial indices start failing here</text>
  <rect x="200" y="260" width="14" height="10" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="269.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">d=250: ratio ≈ 1.15</text>
  <rect x="200" y="290" width="9" height="10" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="299.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">d=500: ratio ≈ 1.11</text>
  <rect x="200" y="320" width="5" height="10" rx="0" fill="#9c36b5" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="270" y="329.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">d=1000: ratio ≈ 1.03  ← nearest ≈ farthest, kNN breaks down</text>
  <rect x="190" y="65" width="15" height="280" rx="0" fill="none" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="85" y="371.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Why this matters: any algorithm using 'this candidate is too far away to matter' fails.</text>
  <text x="85" y="396.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">When ratio ≈ 1.03, ALL candidates are 'nearly the same distance' from any query.</text>
  <text x="85" y="420.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">k-d tree pruning condition: |q_i - split_i| &gt; d_best  →  almost NEVER true at high d.</text>
  <text x="85" y="445.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Result: k-d tree visits all n nodes → O(n) per query, same as brute force!</text>
  <rect x="75" y="345" width="870" height="100" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="750" y="235.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">Real embeddings:</text>
  <text x="750" y="251.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">CLIP 512D</text>
  <text x="750" y="266.8" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">BERT 768D</text>
  <text x="750" y="282.4" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">GIST 960D</text>
  <text x="750" y="298.0" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">All in the</text>
  <text x="750" y="313.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">'cursed' zone!</text>
  <rect x="740" y="210" width="150" height="120" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
</svg>
