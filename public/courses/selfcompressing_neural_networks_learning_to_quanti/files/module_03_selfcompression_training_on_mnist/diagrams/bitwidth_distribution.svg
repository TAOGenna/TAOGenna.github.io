  <text x="215" y="209.0" font-size="10" font-family="Cascadia Code, Fira Code, monospace" fill="#1971c2" text-anchor="start">bits</text>
  <text x="208" y="228.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">~5 pruned (b≤0)</text>
  <text x="208" y="243.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">27 active: 2-3 bits</text>
