  <text x="563" y="228.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">0 pruned (all kept!)</text>
  <text x="563" y="243.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">10 active: 2-4 bits</text>
  <text x="30" y="280.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">KEY INSIGHT: Bimodal distribution — channels either survive at 2-4 bits or get pruned to 0.</text>
  <text x="30" y="300.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Final classifier layer (conv5) retains ALL channels — pruning it directly hurts accuracy.</text>
  <rect x="30" y="295" width="15" height="15" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="50" y="311.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Pruned cluster (b ≈ 0)</text>
