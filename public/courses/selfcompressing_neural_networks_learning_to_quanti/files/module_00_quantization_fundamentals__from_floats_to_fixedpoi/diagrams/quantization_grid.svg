  <text x="30" y="291.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">More bits → more levels → finer grid → lower reconstruction error</text>
  <text x="30" y="321.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">Formula:  q(x, b, e) = 2^e · round( clamp( 2^(-e)·x,  −2^(b−1),  2^(b−1)−1 ) )</text>
  <text x="30" y="355.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">Example: w=0.19, b=3, e=-3  →  scaled=1.52  →  clamped=1.52  →  rounded=2  →  ŵ=0.25</text>
