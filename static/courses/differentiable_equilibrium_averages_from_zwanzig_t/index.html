_cov < threshold:\n        print(f\"\\nμVT identity verified on truncated model\")\n    else:\n        print(f\"\\nWARNING: rel_err_cov = {rel_err_cov:.4f} > threshold {threshold}\")\n        print(\"Check: is the sampler drawing from joint (N, q^N)?\")\n        print(\"Check: is dU/dθ = Σq² (not N·q²)?\")\n"}, {"filename": "ex03_why_pathwise_gradients_fail_contrastive_against_a.py", "content": "\"\"\"\nExercise 3: Why Pathwise Gradients Fail — Contrastive Against a Naive Gumbel-Softmax Attempt\n==============================================================================================\n\nThis exercise demonstrates that the score-function estimator is the only\nviable gradient estimator for jump processes like GCMC particle insertion.\n\nThree approaches are compared:\n  A) Score-function (REINFORCE/Zwanzig): always unbiased\n  B) Pathwise hard (straight-through): gives exactly 0 — catastrophically wrong\n  C) Gumbel-softmax at temperature τ: consistent for Bernoulli (bias→0 as τ→0),\n     but the τ→0 limit gives a SINGULAR gradient for any jump process\n\nThe punchline: pathwise works only when you have a CATEGORICAL random variable\nwith a known finite support (Gumbel-max trick). For GCMC, N follows a jump\nprocess from a Markov chain — there is no latent categorical variable to relax.\n\nToy model\n---------\nSingle-site Bernoulli insertion:\n    N ~ Bernoulli(p(θ)),   p(θ) = σ(θ) = 1 / (1 + exp(-θ))\n    ⟨N⟩ = σ(θ)\n    d⟨N⟩/dθ = σ(θ)(1 - σ(θ))\n\nThis is the SIMPLEST possible \"jump process\": one step, one particle, one site.\nEven here, pathwise-hard gives exactly 0 and Gumbel-softmax has finite-τ bias.\nFor real GCMC (N up to ~100, thousands of accept/reject moves), pathwise is\ncompletely inapplicable.\n\nYour task\n---------\n1. score_function_grad(theta, n_samples, rng)\n   — E[N · (N - σ(θ))]  (REINFORCE for Bernoulli)\n2. pathwise_hard_grad(theta, n_samples, rng)\n   — differentiate through 1[u < σ(θ)] → returns 0.0 always\n3. gumbel_softmax_grad(theta, tau, n_samples, rng)\n   — Gumbel-softmax relaxation: E[∂σ((θ + g1 - g0)/τ)/∂θ]\n4. bias_sweep(tau_values, n_samples, rng)\n   — compare all three at each τ\n5. print_verdict(pathwise_bias, sf_bias)\n   — emit the conclusion\n\"\"\"\n\nimport os\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# Provided: toy Bernoulli model\n# ---------------------------------------------------------------------------\n\nTHETA_TRUE = 1.0\n\n\ndef sigmoid(x):\n    \"\"\"Numerically stable sigmoid.\"\"\"\n    return np.where(\n        x >= 0,\n        1.0 / (1.0 + np.exp(-x)),\n        np.exp(x) / (1.0 + np.exp(x)),\n    )\n\n\ndef closed_form_mean(theta: float) -> float:\n    \"\"\"⟨N⟩ = σ(θ).\"\"\"\n    return float(sigmoid(theta))\n\n\ndef closed_form_grad(theta: float) -> float:\n    \"\"\"d⟨N⟩/dθ = σ(θ)(1 - σ(θ)).\"\"\"\n    p = sigmoid(theta)\n    return float(p * (1.0 - p))\n\n\ndef bernoulli_samples(theta: float, n: int, rng: np.random.Generator) -> np.ndarray:\n    \"\"\"Draw N ∈ {0,1} from Bernoulli(σ(θ)). Returns (n,) array.\"\"\"\n    return rng.binomial(1, sigmoid(theta), size=n).astype(float)\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: score-function gradient\n# ---------------------------------------------------------------------------\n\ndef score_function_grad(\n    theta: float,\n    n_samples: int,\n    rng: np.random.Generator,\n) -> float:\n    \"\"\"\n    Estimate d⟨N⟩/dθ using the score-function (REINFORCE) identity:\n\n        d⟨N⟩/dθ = E[N · ∂log p(N;θ)/∂θ]\n\n    For Bernoulli(p), ∂log p(N;θ)/∂θ = N − σ(θ)  (the score of log p).\n\n    So:   d⟨N⟩/dθ = E[N · (N - σ(θ))] = E[N²] - σ(θ)·E[N]\n                   = σ(θ) - σ(θ)²  = σ(θ)(1-σ(θ)) ✓  (since N²=N for Bernoulli)\n\n    Parameters\n    ----------\n    theta     : float\n    n_samples : int\n    rng       : np.random.Generator\n\n    Returns\n    -------\n    grad_estimate : float — unbiased estimate of d⟨N⟩/dθ\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-8 lines                              #\n    #                                                         #\n    # 1. Draw N_arr = bernoulli_samples(theta, n_samples, rng) #\n    # 2. Compute score_arr = N_arr - sigmoid(theta)            #\n    #    (this is ∂log p(N;θ)/∂θ = N - p per sample)         #\n    # 3. Return mean(N_arr * score_arr)                       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: pathwise hard gradient (should return 0)\n# ---------------------------------------------------------------------------\n\ndef pathwise_hard_grad(\n    theta: float,\n    n_samples: int,\n    rng: np.random.Generator,\n) -> float:\n    \"\"\"\n    Attempt to compute d⟨N⟩/dθ by differentiating through the hard\n    threshold reparameterization:\n\n        N(u; θ) = 1[u < σ(θ)]    where u ~ Uniform(0, 1)\n\n    The 'pathwise' gradient would be:\n        ∂N(u;θ)/∂θ = ∂/∂θ  1[u < σ(θ)]\n                   = δ(u - σ(θ)) · σ'(θ)     (derivative of a step function)\n\n    In practice, this is a Dirac delta at a single point — zero everywhere\n    except at u = σ(θ) exactly. For finite samples, P(u = σ(θ)) = 0.\n    So the pathwise gradient is exactly 0 almost surely.\n\n    This function should return 0.0 to demonstrate this failure mode.\n\n    Parameters\n    ----------\n    theta, n_samples, rng : same as score_function_grad\n\n    Returns\n    -------\n    0.0 : float — the pathwise-hard gradient is zero almost everywhere\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 5-7 lines                              #\n    #                                                         #\n    # 1. Draw u_arr = rng.uniform(0, 1, n_samples)           #\n    # 2. Compute threshold = sigmoid(theta)                   #\n    # 3. Compute ∂N/∂θ = δ(u - threshold) · σ'(θ)           #\n    #    For continuous u, δ(u - threshold) = 0 a.s.          #\n    #    → gradient is 0 for all samples                      #\n    # 4. Return 0.0 (or mean of zeros)                        #\n    #                                                         #\n    # Do NOT actually compute N_arr = (u < threshold).        #\n    # The point is that ∂N/∂θ = 0 a.s. regardless of samples #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: Gumbel-softmax gradient\n# ---------------------------------------------------------------------------\n\ndef gumbel_softmax_grad(\n    theta: float,\n    tau: float,\n    n_samples: int,\n    rng: np.random.Generator,\n) -> float:\n    \"\"\"\n    Estimate d⟨N⟩/dθ via the Gumbel-softmax reparameterization.\n\n    The Gumbel-max trick: N = 1[log σ(θ) + g1 > log(1-σ(θ)) + g0]\n    where g0, g1 ~ Gumbel(0,1) i.i.d. This is equivalent to Bernoulli(σ(θ)).\n\n    The Gumbel-SOFTMAX relaxation at temperature τ:\n        N_soft = softmax([(log(1-σ(θ)) + g0)/τ, (log σ(θ) + g1)/τ])[1]\n               = σ((log σ(θ) - log(1-σ(θ)) + g1 - g0) / τ)\n               = σ((θ + g1 - g0) / τ)     [since logit(σ(θ)) = θ]\n\n    The pathwise gradient:\n        ∂N_soft/∂θ = N_soft(1 − N_soft) · (1/τ)\n\n    This DOES converge to the correct gradient as τ → 0 (for the Bernoulli model).\n    But:\n      - At finite τ > 0, there is a systematic bias\n      - For GCMC, N is NOT a single Bernoulli; it emerges from a Markov chain\n        where each step is a min(1, exp(-βΔU)) acceptance. There is no single\n        latent (g0, g1) pair to annealed — the chain has T steps each with its\n        own proposal and noise.\n\n    Parameters\n    ----------\n    theta     : float\n    tau       : float — Gumbel-softmax temperature (smaller → less biased)\n    n_samples : int\n    rng       : np.random.Generator\n\n    Returns\n    -------\n    grad_estimate : float — E[∂N_soft/∂θ]\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-14 lines                            #\n    #                                                         #\n    # 1. Sample Gumbel noise: u = rng.uniform(0,1,(n,2))     #\n    #    gumbel = -log(-log(u + 1e-20))  shape (n_samples, 2) #\n    # 2. Compute N_soft = σ((θ + gumbel[:,1] - gumbel[:,0]) / τ) #\n    # 3. Compute ∂N_soft/∂θ = N_soft · (1 − N_soft) · (1/τ) #\n    # 4. Return mean(∂N_soft/∂θ)                              #\n    #                                                         #\n    # Note: as τ→0, this estimator IS consistent for Bernoulli #\n    # (bias → 0). The failure for GCMC is structural, not     #\n    # numerical: there is no latent (g0,g1) for the chain.    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 4: bias sweep\n# ---------------------------------------------------------------------------\n\ndef bias_sweep(\n    tau_values: np.ndarray,\n    n_samples: int,\n    rng: np.random.Generator,\n) -> tuple[np.ndarray, np.ndarray, float]:\n    \"\"\"\n    Sweep over τ values and compute biases for pathwise-hard, Gumbel, and SF.\n\n    Returns\n    -------\n    gumbel_bias   : (K,) array — |gumbel_grad(τ) - cf| for each τ\n    sf_bias       : (K,) float — mean |sf_grad - cf| over all runs\n    hard_bias     : float — |pathwise_hard_grad - cf| (constant, always |cf|)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-16 lines                            #\n    #                                                         #\n    # 1. Get cf = closed_form_grad(THETA_TRUE)                #\n    # 2. Compute hard_bias = abs(pathwise_hard_grad(...) - cf) #\n    #    (should be abs(0.0 - cf) = |cf|)                     #\n    # 3. For each tau in tau_values:                          #\n    #    a. gumbel_est = gumbel_softmax_grad(THETA_TRUE, tau, n, rng) #\n    #    b. sf_est = score_function_grad(THETA_TRUE, n, rng)  #\n    #    c. Record biases                                      #\n    # 4. Return gumbel_bias array, mean(sf_bias), hard_bias   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 5: verdict\n# ---------------------------------------------------------------------------\n\ndef print_verdict(gumbel_bias: np.ndarray, sf_bias: float, hard_bias: float) -> None:\n    \"\"\"\n    Print the key comparison and the required conclusion line.\n\n    The conclusion must contain:\n    \"Jump processes have no pathwise surrogate.\"\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-8 lines                             #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: __main__ harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    N_SAMPLES  = 1_000 if VERIFY else 10_000\n    # VERIFY: 3 τ values; full: 10 values logspace(-2, 1)\n    TAU_VALUES = np.array([0.1, 0.5, 1.0]) if VERIFY else np.logspace(-2, 1, 10)\n\n    SEED = 7\n    rng  = np.random.default_rng(SEED)\n\n    print(\"=\" * 70)\n    print(\"Exercise 3: Pathwise vs Score-Function for a Jump Process\")\n    print(f\"  θ = {THETA_TRUE},  S = {N_SAMPLES}\")\n    print(f\"  True d⟨N⟩/dθ = {closed_form_grad(THETA_TRUE):.6f}\")\n    print(f\"  True ⟨N⟩     = {closed_form_mean(THETA_TRUE):.6f}\")\n    print(\"=\" * 70)\n\n    gumbel_bias, sf_bias, hard_bias = bias_sweep(TAU_VALUES, N_SAMPLES, rng)\n\n    cf = closed_form_grad(THETA_TRUE)\n    print(f\"\\n  Pathwise-hard gradient = 0.000000  (bias = {hard_bias:.4f}  ← always |d⟨N⟩/dθ|)\")\n    print(f\"  Score-function mean bias = {sf_bias:.4f}  (MC noise ~1/√S)\")\n    print()\n    print(f\"{'τ':>8} | {'Gumbel grad':>12} | {'Gumbel bias':>12} | {'Note'}\")\n    print(\"-\" * 68)\n    for i, tau in enumerate(TAU_VALUES):\n        rng_i = np.random.default_rng(SEED + i + 100)\n        g_est = gumbel_softmax_grad(THETA_TRUE, tau, N_SAMPLES, rng_i)\n        note = \"← near 0, gradient collapses\" if tau < 0.05 else (\"← bias large\" if tau > 1.0 else \"\")\n        print(f\"{tau:>8.4f} | {g_est:>12.6f} | {abs(g_est-cf):>12.4f} | {note}\")\n\n    print()\n    print_verdict(gumbel_bias, sf_bias, hard_bias)\n"}, {"filename": "ex04_difftre_in_one_page_reweighting_for_nvt_forcefield.py", "content": "\"\"\"\nExercise 4: DiffTRe in One Page — Reweighting for NVT Force-Field Fitting\n==========================================================================\n\nDiffTRe (Thaler & Zavadlav, Nat. Commun. 2021) computes gradients of NVT\nensemble averages WITHOUT re-running MD/MCMC at each parameter value.\nIt does this by evaluating the Zwanzig identity under a REWEIGHTED distribution.\n\nThe core idea\n-------------\nGiven samples from a reference ensemble at θ₀, estimate ⟨A⟩ and d⟨A⟩/dθ\nat a nearby θ using importance reweighting:\n\n    ⟨A⟩_θ ≈ Σᵢ wᵢ(θ) Aᵢ / Σᵢ wᵢ(θ)\n\nwhere the importance weights are:\n    wᵢ(θ) = exp(-β(U(xᵢ;θ) − U(xᵢ;θ₀)))    (Boltzmann re-weight)\n\nThe gradient (Zwanzig identity under the reweighted distribution):\n    d⟨A⟩_θ/dθ = -β · Cov_w(A, ∂U/∂θ)\n\nwhere Cov_w is the WEIGHTED covariance using wᵢ as weights.\n\nWhen θ = θ₀: wᵢ = 1 for all i, and this reduces to the standard Zwanzig identity.\n\nThe reweighting window\n----------------------\nReweighting works only when the overlap between p(x;θ₀) and p(x;θ) is\nsufficient. The Effective Sample Size (ESS) measures this:\n    ESS = (Σwᵢ)² / Σwᵢ²    (Kish approximation)\n    ESS/S ∈ [0, 1],  ESS/S → 1 when θ = θ₀, ESS/S → 0 as θ moves away.\n\nThis is the REASON we need fractional-coordinate reparameterization for\nlattice parameters (Module 3): Var(βΔU) ∝ V·(δa/a)² → ESS → 0 for any\nmacroscopic lattice change if we use naive reweighting.\n\nToy NVT model\n-------------\n1D harmonic oscillator: U(x; k) = 0.5 k x²\nEquilibrium distribution at spring constant k₀ (β=1):\n    p(x; k₀) = √(k₀/2π) exp(-k₀x²/2)  →  x ~ N(0, 1/k₀)\n\nObservable: A(x) = x²\nClosed form:  ⟨x²⟩_k = 1/k\n              d⟨x²⟩/dk = -1/k²\n\nYour task\n---------\n1. log_weights(samples, k0, k, beta) — importance log-weights Δ(−βU)\n2. reweighted_mean(samples, A_vals, log_w) — ESS-monitored weighted mean\n3. diffTRe_grad(samples, k0, k, beta) — Zwanzig under reweighted distribution\n4. ess_fraction(log_w) — Kish ESS / S\n\"\"\"\n\nimport os\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# Provided: NVT toy model\n# ---------------------------------------------------------------------------\n\nBETA = 1.0\nK0   = 1.0    # reference spring constant\n\n\ndef sample_nvt(k: float, n_samples: int, rng: np.random.Generator) -> np.ndarray:\n    \"\"\"Draw x ~ N(0, 1/k) from the NVT ensemble at spring constant k.\"\"\"\n    return rng.normal(loc=0.0, scale=1.0 / np.sqrt(k), size=n_samples)\n\n\ndef U(x: np.ndarray, k: float) -> np.ndarray:\n    \"\"\"Potential energy: U(x; k) = 0.5 k x².\"\"\"\n    return 0.5 * k * x ** 2\n\n\ndef dU_dk(x: np.ndarray) -> np.ndarray:\n    \"\"\"∂U/∂k = 0.5 x²  for U = 0.5 k x².\"\"\"\n    return 0.5 * x ** 2\n\n\ndef A_obs(x: np.ndarray) -> np.ndarray:\n    \"\"\"Observable A(x) = x².\"\"\"\n    return x ** 2\n\n\ndef closed_form_mean(k: float) -> float:\n    \"\"\"⟨x²⟩ = 1/k.\"\"\"\n    return 1.0 / k\n\n\ndef closed_form_grad(k: float) -> float:\n    \"\"\"d⟨x²⟩/dk = −1/k².\"\"\"\n    return -1.0 / k ** 2\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: log importance weights\n# ---------------------------------------------------------------------------\n\ndef log_weights(\n    samples: np.ndarray,\n    k0: float,\n    k: float,\n    beta: float,\n) -> np.ndarray:\n    \"\"\"\n    Compute log importance weights for reweighting from k₀ to k:\n        log wᵢ = −β (U(xᵢ; k) − U(xᵢ; k₀))\n               = −β · 0.5 · (k − k₀) · xᵢ²\n\n    Parameters\n    ----------\n    samples : (S,) array — samples drawn from p(x; k₀)\n    k0      : float — reference spring constant\n    k       : float — target spring constant\n    beta    : float — inverse temperature\n\n    Returns\n    -------\n    log_w : (S,) array of log-weights (not normalized)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 4-5 lines                              #\n    #                                                         #\n    # log wᵢ = -β (U(xᵢ; k) - U(xᵢ; k₀))                   #\n    # Use the U() function defined above.                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: ESS fraction\n# ---------------------------------------------------------------------------\n\ndef ess_fraction(log_w: np.ndarray) -> float:\n    \"\"\"\n    Compute ESS / S using the Kish approximation:\n        ESS = (Σwᵢ)² / Σwᵢ²\n\n    Parameters\n    ----------\n    log_w : (S,) array of log-weights\n\n    Returns\n    -------\n    ess_frac : float ∈ [0, 1]\n\n    Notes\n    -----\n    Work in log-space to avoid overflow: use scipy or manual log-sum-exp.\n    Numerically: normalise log_w by its max first.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-8 lines                              #\n    #                                                         #\n    # Normalize: log_w_norm = log_w - max(log_w)              #\n    # w = exp(log_w_norm)                                     #\n    # ESS = (Σw)² / Σw²                                      #\n    # ESS_frac = ESS / len(w)                                 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: reweighted mean\n# ---------------------------------------------------------------------------\n\ndef reweighted_mean(\n    samples: np.ndarray,\n    A_vals: np.ndarray,\n    log_w: np.ndarray,\n) -> float:\n    \"\"\"\n    Compute the self-normalized importance-weighted mean:\n        ⟨A⟩_θ ≈ Σᵢ wᵢ Aᵢ / Σᵢ wᵢ\n\n    Parameters\n    ----------\n    samples : (S,) array (unused here but passed for API consistency)\n    A_vals  : (S,) array — observable evaluated at each sample\n    log_w   : (S,) array — log importance weights\n\n    Returns\n    -------\n    mean_est : float\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 5-6 lines                              #\n    #                                                         #\n    # Normalize weights: w = softmax(log_w) = exp(log_w - logsumexp(log_w)) #\n    # mean_est = sum(w * A_vals)                              #\n    # Use log-sum-exp for numerical stability.                 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 4: DiffTRe gradient\n# ---------------------------------------------------------------------------\n\ndef diffTRe_grad(\n    samples: np.ndarray,\n    k0: float,\n    k: float,\n    beta: float,\n) -> float:\n    \"\"\"\n    Compute d⟨A⟩/dk at parameter k using DiffTRe:\n        d⟨A⟩_θ/dθ = -β · Cov_w(A, ∂U/∂k)\n\n    where Cov_w is the WEIGHTED covariance under importance weights w(k₀→k).\n\n    The weighted covariance is:\n        Cov_w(A, B) = ⟨AB⟩_w − ⟨A⟩_w · ⟨B⟩_w\n\n    where ⟨·⟩_w denotes the self-normalized weighted mean.\n\n    Parameters\n    ----------\n    samples : (S,) array — drawn from p(x; k₀)\n    k0      : float — reference spring constant\n    k       : float — target spring constant\n    beta    : float\n\n    Returns\n    -------\n    grad_est : float — estimate of d⟨x²⟩/dk at parameter k\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-15 lines                            #\n    #                                                         #\n    # 1. Compute log_w = log_weights(samples, k0, k, beta)    #\n    # 2. Compute normalized weights: w = softmax(log_w)       #\n    # 3. Compute A_vals = A_obs(samples)  (= x²)              #\n    # 4. Compute dU_vals = dU_dk(samples) (= x²/2)            #\n    # 5. Weighted means: mean_A = sum(w * A), mean_dU = sum(w * dU_vals) #\n    # 6. Weighted covariance: Cov_w = sum(w * (A - mean_A) * (dU - mean_dU)) #\n    # 7. Return -beta * Cov_w                                  #\n    #                                                         #\n    # Note: use sum(w * ...) not np.cov() because we're doing #\n    # WEIGHTED covariance, not equal-weight.                   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: __main__ harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    N_SAMPLES = 3_000 if VERIFY else 5_000\n    # VERIFY: 5 k values; full: 16 values\n    K_GRID = np.linspace(0.5, 2.0, 5) if VERIFY else np.linspace(0.5, 2.0, 16)\n    SEED   = 3\n\n    rng = np.random.default_rng(SEED)\n\n    print(\"=\" * 70)\n    print(\"Exercise 4: DiffTRe — Reweighted Gradients for NVT Force-Field Fitting\")\n    print(f\"  β = {BETA},  k₀ = {K0},  S = {N_SAMPLES}\")\n    print(f\"  Reweighting from k₀={K0} to grid k ∈ [{K_GRID[0]:.1f}, {K_GRID[-1]:.1f}]\")\n    print(\"=\" * 70)\n\n    # Draw reference samples ONCE at k₀\n    samples = sample_nvt(K0, N_SAMPLES, rng)\n\n    # Evaluate DiffTRe and direct sampling at each k\n    print(f\"\\n{'k':>6} | {'<x²> CF':>9} | {'<x²> rw':>9} | {'d<x²>/dk CF':>12} | {'d<x²>/dk rw':>12} | {'ESS%':>6}\")\n    print(\"-\" * 70)\n\n    window_ok = True\n    first_bad_k = None\n\n    for k in K_GRID:\n        log_w = log_weights(samples, K0, k, BETA)\n        ess   = ess_fraction(log_w)\n        A_vals = A_obs(samples)\n\n        mean_rw = reweighted_mean(samples, A_vals, log_w)\n        grad_rw = diffTRe_grad(samples, K0, k, BETA)\n\n        mean_cf = closed_form_mean(k)\n        grad_cf = closed_form_grad(k)\n\n        ess_pct = 100 * ess\n        flag = \"\" if ess_pct > 20 else \" ← ESS low!\"\n\n        print(f\"{k:>6.3f} | {mean_cf:>9.4f} | {mean_rw:>9.4f} | {grad_cf:>12.5f} | {grad_rw:>12.5f} | {ess_pct:>5.1f}%{flag}\")\n\n        if ess_pct < 20 and window_ok:\n            window_ok = False\n            first_bad_k = k\n\n    print()\n    # Check whether reweighting works within |k - k0| ≲ 0.3\n    k_safe_grid = K_GRID[np.abs(K_GRID - K0) <= 0.35]\n    all_close = True\n    for k in k_safe_grid:\n        log_w  = log_weights(samples, K0, k, BETA)\n        grad_rw = diffTRe_grad(samples, K0, k, BETA)\n        grad_cf = closed_form_grad(k)\n        rel_err = abs(grad_rw - grad_cf) / abs(grad_cf)\n        if rel_err > 0.10:   # allow 10% in VERIFY mode (small S)\n            all_close = False\n\n    if all_close:\n        print(\"DiffTRe window acceptable; outside, importance weights degenerate —\")\n        print(\"this is why the μVT extension needs fractional coordinates for lattice.\")\n    else:\n        print(\"WARNING: DiffTRe errors exceed threshold even within the window.\")\n        print(\"Check: is weighted covariance computed correctly?\")\n"}]}, "module_01_minimal_gcmc_sampler_and_the_gradient_estimator_on": {"content": "# Module 1: Minimal GCMC Sampler and the Gradient Estimator On Top\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Setup: What Are We Actually Computing?](#the-setup-what-are-we-actually-computing)\n- [Grand-Canonical Monte Carlo: The Sampling Engine](#grand-canonical-monte-carlo-the-sampling-engine)\n  - [The μVT Ensemble From First Principles](#the-vt-ensemble-from-first-principles)\n  - [The Three Move Types](#the-three-move-types)\n  - [Acceptance Probabilities: Where the Ensemble Lives](#acceptance-probabilities-where-the-ensemble-lives)\n- [The Stateless Propagator: A Design Choice With Consequences](#the-stateless-propagator-a-design-choice-with-consequences)\n  - [Why (key, state) → state' Is the Right Abstraction](#why-key-state--state-is-the-right-abstraction)\n  - [Bitwise Reproducibility Is Not Just Cosmetic](#bitwise-reproducibility-is-not-just-cosmetic)\n- [The Classical Sidecar: Analytic Gradients Over LJ Energy](#the-classical-sidecar-analytic-gradients-over-lj-energy)\n  - [Lennard-Jones: The Function and Its Derivatives](#lennard-jones-the-function-and-its-derivatives)\n  - [Minimum-Image Convention and Why It Matters](#minimum-image-convention-and-why-it-matters)\n  - [Why You Only Need ∂U/∂θ, Not Forces](#why-you-only-need-u-not-forces)\n- [The Gradient Estimator as a Propagator Decorator](#the-gradient-estimator-as-a-propagator-decorator)\n  - [Score-Function Identity: Quick Recap](#score-function-identity-quick-recap)\n  - [Online Covariance Accumulation: O(1) Overhead](#online-covariance-accumulation-o1-overhead)\n  - [Wiring the Estimator on Top of GCMC](#wiring-the-estimator-on-top-of-gcmc)\n- [Finite-Difference Validation: The 3% Sanity Gate](#finite-difference-validation-the-3-sanity-gate)\n  - [The Bias-Variance Crossover in Finite Differences](#the-bias-variance-crossover-in-finite-differences)\n  - [What \"3% Agreement\" Actually Tests](#what-3-agreement-actually-tests)\n- [Analytical Questions](#analytical-questions)\n  - [Question 1 — What Breaks if N Is Treated as Continuous?](#question-1--what-breaks-if-n-is-treated-as-continuous)\n  - [Question 2 — The Score-Function Estimator vs a Naive Monte Carlo Ratio](#question-2--the-score-function-estimator-vs-a-naive-monte-carlo-ratio)\n  - [Question 3 — When Does the Covariance Vanish and What Does That Mean?](#question-3--when-does-the-covariance-vanish-and-what-does-that-mean)\n  - [Question 4 — Why Is the (key, state) → state' Discipline Non-Negotiable for CRN?](#question-4--why-is-the-key-state--state-discipline-non-negotiable-for-crn)\n- [Synthesis: What You Now Have and What Comes Next](#synthesis-what-you-now-have-and-what-comes-next)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Write a minimal JAX GCMC sampler with insert/delete/translate moves whose acceptance ratios you can derive from scratch.\n2. Explain why stateless `(key, state) → state'` propagators enable bitwise-reproducible trajectories — and why that matters for Common Random Numbers in Module 2.\n3. Implement the score-function gradient estimator as an **online running-sum decorator** on top of any GCMC chain, with O(1) per-sample overhead.\n4. Compute analytic $\\partial U/\\partial \\varepsilon$ and $\\partial U/\\partial \\sigma$ for a Lennard-Jones pair sum and verify against `jax.grad` to within $10^{-10}$.\n5. Run a finite-difference sanity check and reproduce the paper's \"3% agreement\" criterion.\n\n---\n\n## The Setup: What Are We Actually Computing?\n\nLet's anchor everything in a concrete scenario that we'll carry through the whole module.\n\nYou have a metal-organic framework (MOF) — think of it as a rigid sponge with nanometer-sized pores. CO₂ molecules can enter those pores at high pressure and leave when pressure drops. The engineering question is: **how much CO₂ can we squeeze in and squeeze out per cycle?** This is the *working capacity* $\\Delta N$. We want to maximize it by tuning the MOF's force-field parameters $\\theta$ — things like the depth $\\varepsilon$ and radius $\\sigma$ of the Lennard-Jones interaction between a framework atom and a CO₂ molecule.\n\nThe catch is that $\\Delta N$ is not a simple function. It is a *thermodynamic average* — an expectation value over an entire equilibrium distribution of CO₂ configurations inside the pore. To optimize it, we need $\\partial \\Delta N / \\partial \\theta$.\n\nModule 0 gave you the identity:\n\n$$\\frac{\\partial \\langle N \\rangle_{\\beta\\mu,\\theta}}{\\partial \\theta} = -\\beta \\cdot \\text{Cov}_{\\beta\\mu,\\theta}\\!\\left(N,\\, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\nThis module turns that formula into running code. The plan is:\n\n1. Build a working GCMC sampler that correctly samples the $\\mu VT$ ensemble.\n2. Implement analytic $\\partial U/\\partial\\theta$ for a classical Lennard-Jones pair sum.\n3. Wire the gradient estimator on top as an **online covariance accumulator**.\n4. Validate against finite differences.\n\n---\n\n## Grand-Canonical Monte Carlo: The Sampling Engine\n\n### The μVT Ensemble From First Principles\n\nIn the grand-canonical ($\\mu VT$) ensemble, the system exchanges particles with a reservoir at fixed chemical potential $\\mu$, volume $V$, and temperature $T$. The key notation:\n\n| Symbol | Meaning |\n|--------|---------|\n| $\\beta$ | Inverse temperature, $\\beta = 1/(k_B T)$ |\n| $\\mu$ | Chemical potential of the gas reservoir |\n| $z$ | Fugacity, $z = e^{\\beta\\mu}$ |\n| $N$ | Number of gas molecules currently in the box |\n| $U(q^N; \\theta)$ | Potential energy of configuration $q^N$ with parameters $\\theta$ |\n| $V$ | Box volume |\n| $L$ | Box side length, $V = L^3$ for a cubic box |\n\nThe grand-canonical partition function is:\n\n$$\\Xi(\\beta, \\mu, V) = \\sum_{N=0}^{\\infty} \\frac{z^N}{\\Lambda^{3N} N!} \\int_V d^{3N}q \\; e^{-\\beta U(q^N;\\theta)}$$\n\nwhere $\\Lambda$ is the thermal de Broglie wavelength. The factor $\\Lambda^{3N} N!$ handles quantum indistinguishability and momentum integration; for our purposes it will cancel out of acceptance ratios.\n\n**Check your understanding:** Why does $N$ appear in the sum rather than being fixed? What physical process does the $N=0$ term represent?\n\nThe equilibrium probability of finding the system in configuration $(N, q^N)$ is:\n\n$$P(N, q^N) \\propto \\frac{z^N}{\\Lambda^{3N} N!} e^{-\\beta U(q^N;\\theta)}$$\n\nGCMC samples from this distribution by proposing random moves and accepting them with a Metropolis-Hastings ratio that maintains detailed balance.\n\n### The Three Move Types\n\nClassical GCMC uses three move types, each proposed with equal probability $1/3$:\n\n**Figure 1: How GCMC explores configuration space with three distinct moves**\n\n```\nCurrent state: N=4 molecules at positions {q₁, q₂, q₃, q₄}\nBox: L=20Å cube\n\nMOVE TYPE 1 — INSERTION (propose N→N+1)\n─────────────────────────────────────────────────────────\n ┌──────────────────┐      ┌──────────────────┐\n │  ●    ●          │      │  ●    ●          │\n │        ●         │ →?→  │        ●         │\n │            ●    │      │    ★       ●    │\n └──────────────────┘      └──────────────────┘\n  N=4, U = U₄              N=5 proposed, ★ is new\n                            ΔU = U₅ - U₄\n                            acc ∝ z·V / (N+1) · e^{-βΔU}\n                               ← fugacity factor! easy to forget\n\nMOVE TYPE 2 — DELETION (propose N→N-1)\n─────────────────────────────────────────────────────────\n ┌──────────────────┐      ┌──────────────────┐\n │  ●    ●          │      │  ●    ●          │\n │        ●         │ →?→  │                  │\n │            ●    │      │            ●    │\n └──────────────────┘      └──────────────────┘\n  N=4, pick random ●        N=3 proposed\n                            acc ∝ N / (z·V) · e^{-βΔU}\n                               ← inverse of insertion!\n\nMOVE TYPE 3 — TRANSLATION (propose q_i → q_i + δ)\n─────────────────────────────────────────────────────────\n ┌──────────────────┐      ┌──────────────────┐\n │  ●    ●          │      │  ●    ●          │\n │        ●         │ →?→  │          ●      │\n │            ●    │      │            ●    │\n └──────────────────┘      └──────────────────┘\n  N=4, ●₃ displaced          N=4, same\n  max displacement = δ_max   acc ∝ e^{-βΔU}\n                               ← standard Metropolis\n```\n\n### Acceptance Probabilities: Where the Ensemble Lives\n\nLet's derive the acceptance probabilities from scratch. The Metropolis-Hastings acceptance ratio must satisfy detailed balance:\n\n$$P(s) \\cdot T(s \\to s') \\cdot A(s \\to s') = P(s') \\cdot T(s' \\to s) \\cdot A(s' \\to s)$$\n\nwhere $P(s)$ is the equilibrium probability of state $s$, $T$ is the proposal probability, and $A$ is the acceptance probability.\n\n**Insertion:** We propose inserting at a uniformly random position in $V$. The proposal probability is $T(\\text{insert}) = 1/V$. The reverse (deletion of that specific molecule) has $T(\\text{delete}) = 1/N'$ where $N' = N+1$. Substituting into detailed balance:\n\n$$\\frac{z^N e^{-\\beta U_N}}{N!} \\cdot \\frac{1}{V} \\cdot A_{\\text{ins}} = \\frac{z^{N+1} e^{-\\beta U_{N+1}}}{(N+1)!} \\cdot \\frac{1}{1} \\cdot A_{\\text{del,rev}}$$\n\nApplying $A_{\\text{del,rev}} \\leq 1$ and solving in Metropolis fashion:\n\n$$A_{\\text{ins}} = \\min\\!\\left(1,\\; \\frac{z \\cdot V}{N+1} \\cdot e^{-\\beta \\Delta U}\\right)$$\n\n**Deletion:** By symmetry (reverse the argument above):\n\n$$A_{\\text{del}} = \\min\\!\\left(1,\\; \\frac{N}{z \\cdot V} \\cdot e^{-\\beta \\Delta U}\\right) \\quad \\text{where } \\Delta U = U_{N-1} - U_N < 0 \\text{ typically}$$\n\n**Translation:** Standard Metropolis on a fixed number of particles:\n\n$$A_{\\text{trans}} = \\min\\!\\left(1,\\; e^{-\\beta \\Delta U}\\right)$$\n\n**Check your understanding:** Where does the factor $V/(N+1)$ come from in the insertion acceptance? If you forgot it, would $\\langle N \\rangle$ be biased high or low?\n\nThe crucial Jacobian factor $z \\cdot V/(N+1)$ is the most commonly mis-implemented piece of GCMC. It arises because:\n- The fugacity $z = e^{\\beta\\mu}$ contributes one factor of $z$ per molecule from the partition function.\n- The proposal is uniform over $V$, but the reverse (deletion) picks uniformly among $N+1$ molecules.\n- The factorial ratio $(N+1)!/N! = N+1$ accounts for indistinguishability.\n\n[^1]: The thermal de Broglie wavelength $\\Lambda = h/\\sqrt{2\\pi m k_B T}$ tracks momentum integration and cancels between the forward and reverse moves — you never need to compute it explicitly in acceptance ratios.\n\n---\n\n## The Stateless Propagator: A Design Choice With Consequences\n\n### Why (key, state) → state' Is the Right Abstraction\n\nThe kUPS framework enforces a single interface for every operation in a simulation:\n\n$$\\text{propagate}: (\\text{key},\\; \\text{state}) \\to \\text{state}'$$\n\nEvery propagator — an integrator, a thermostat, a Monte Carlo move, a force field evaluation — has this signature. Nothing else is needed or permitted.\n\n![The kUPS propagator interface: every operation takes a random key and a state, returns a new state](images/kups_propagator_interface.png)\n\n*Figure: The shared propagator signature in kUPS. An integrator, a thermostat, a GCMC insertion move, and a gradient estimator all look the same from the outside — which is what makes them composable.*\n\nThis composability extends across ensembles. NVE chains a `Potential` and an `Integrator`. NVT wraps those with a `Thermostat`. For $\\mu VT$ GCMC, you add insertion/deletion moves as additional propagators in the chain — they share the same interface.\n\n![kUPS composable ensembles: NVE, NVT, and NPT built from the same reusable propagators](images/kups_composable_ensembles.png)\n\n*Figure: All three simulations use the same building blocks — just composed differently. The gradient estimator we build in this module is yet another propagator that decorates any of these chains.*\n\nIn JAX, this translates to a purely functional style. The GCMC state is a pytree — a data structure JAX can trace through — and each move is a function:\n\n```python\n@jax.jit\ndef gcmc_step(key: jax.Array, state: GCmcState) -> GcmcState:\n    \"\"\"One GCMC step: randomly pick insert/delete/translate.\"\"\"\n    key, subkey = jax.random.split(key)\n    move_type = jax.random.randint(subkey, (), 0, 3)  # 0, 1, or 2\n    \n    key, subkey = jax.random.split(key)\n    new_state = jax.lax.switch(\n        move_type,\n        [try_insert, try_delete, try_translate],\n        subkey, state\n    )\n    return new_state\n```\n\nThe entire chain can be driven by `jax.lax.scan` over a sequence of keys:\n\n```python\ndef run_chain(initial_key: jax.Array, initial_state: GcmcState, n_steps: int):\n    keys = jax.random.split(initial_key, n_steps)\n    # scan: (carry, x) -> (new_carry, output)\n    # carry = state, x = per-step key\n    final_state, trajectory = jax.lax.scan(\n        lambda state, key: (gcmc_step(key, state), state),\n        initial_state,\n        keys\n    )\n    return final_state, trajectory\n```\n\n### Bitwise Reproducibility Is Not Just Cosmetic\n\nThe source material states this directly:\n\n> *\"Simulations are bitwise reproducible, because replaying the same sequence of keys from a given state always yields identical trajectories.\"*\n\nWhy is this the *technical foundation* for what we'll build in Module 2 (Common Random Numbers), not just a nice-to-have?\n\n**Figure 2: How identical key streams make CRN possible between two chains**\n\n```\nTwo chains: μ_H (high pressure) and μ_L (low pressure)\nSame initial key, same key-splitting schedule — different μ only.\n\nStep 1:  key₁ = split(key₀)[0]\n         key₂ = split(key₀)[1]\n\nChain_H:                        Chain_L:\n insert at pos=(3.2, 7.1, 1.4)  insert at pos=(3.2, 7.1, 1.4)  ← SAME\n ΔU_H = +1.3 kT                 ΔU_L = +1.1 kT\n u_thresh = 0.41                u_thresh = 0.41  ← SAME uniform draw\n accept if u < min(1, acc_H)    accept if u < min(1, acc_L)\n \n ONLY DIFFERENCE: z_H vs z_L shifts acc, so acceptance differs.\n The POSITION PROPOSAL and THRESHOLD DRAW are identical.\n \n When you subtract ∂U_H/∂θ - ∂U_L/∂θ, configuration noise CANCELS\n because both chains visit nearly the same positions.\n\nWITHOUT CRN (independent random streams):\n Chain_H inserts at (3.2, 7.1, 1.4)\n Chain_L inserts at (8.9, 2.3, 6.7)  ← DIFFERENT — noise doesn't cancel\n Variance of (∂U_H - ∂U_L)/∂θ ≈ Var(∂U_H/∂θ) + Var(∂U_L/∂θ)\n                                                  ↑ both contribute\n\nWITH CRN (shared key stream):\n Variance of (∂U_H - ∂U_L)/∂θ ≈ Var(∂U_H/∂θ - ∂U_L/∂θ)\n                               ≪  Var(∂U_H/∂θ) + Var(∂U_L/∂θ)\n                               because ∂U/∂θ is smooth in μ\n```\n\nThe (key, state) → state' discipline makes this possible under `jit`. Since JAX traces the computation graph ahead of time, two calls with the same keys but different $\\mu$ values will follow the same code path and generate the same proposal positions from the same keys. This is not a coincidence — it's a consequence of the design.\n\n[^2]: In NumPy-style imperative code, global random state would be mutated at different rates by the two chains (depending on different accept/reject branching), making key synchronization impossible. JAX's functional random number system sidesteps this entirely.\n\n---\n\n## The Classical Sidecar: Analytic Gradients Over LJ Energy\n\n### Lennard-Jones: The Function and Its Derivatives\n\nThe running example for all four exercises in this module is the Lennard-Jones pair potential between a framework atom and a CO₂ molecule:\n\n$$U_{\\text{LJ}}(r;\\varepsilon,\\sigma) = 4\\varepsilon \\left[\\left(\\frac{\\sigma}{r}\\right)^{12} - \\left(\\frac{\\sigma}{r}\\right)^{6}\\right]$$\n\nFor a system of $N$ molecules in a box, the total potential is the sum over all pairs $(i, j)$ with $i < j$:\n\n$$U(q^N; \\varepsilon, \\sigma) = \\sum_{i < j} U_{\\text{LJ}}(r_{ij}; \\varepsilon, \\sigma)$$\n\nwhere $r_{ij} = |\\mathbf{q}_i - \\mathbf{q}_j|_{\\text{MIC}}$ is the minimum-image distance.\n\n| Symbol | Meaning |\n|--------|---------|\n| $\\varepsilon$ | Well depth (energy units, e.g., K·$k_B$) |\n| $\\sigma$ | Zero-crossing distance (length units, e.g., Å) |\n| $r_{ij}$ | Minimum-image distance between molecules $i$ and $j$ |\n| $N$ | Current number of gas molecules |\n\n**Stage 1 — Intuition:** The LJ potential has two regimes. At $r \\ll \\sigma$, the $r^{-12}$ term dominates: infinite repulsion, modeling hard-core exclusion. At $r \\approx 2^{1/6}\\sigma$, the energy is $-\\varepsilon$ — the minimum, modeling van der Waals attraction. At large $r$, everything decays to zero.\n\nWe need $\\partial U/\\partial \\varepsilon$ and $\\partial U/\\partial \\sigma$. Let's derive them.\n\n**Stage 3 — Derivation:**\n\nDefine the reduced distance $x = \\sigma/r$ so that $U_{\\text{LJ}} = 4\\varepsilon(x^{12} - x^6)$.\n\nFor $\\partial U/\\partial \\varepsilon$: the potential is linear in $\\varepsilon$, so:\n\n$$\\frac{\\partial U_{\\text{LJ}}}{\\partial \\varepsilon} = 4\\left(x^{12} - x^6\\right) = 4\\left[\\left(\\frac{\\sigma}{r}\\right)^{12} - \\left(\\frac{\\sigma}{r}\\right)^{6}\\right] = \\frac{U_{\\text{LJ}}}{\\varepsilon}$$\n\nSumming over pairs:\n\n$$\\frac{\\partial U}{\\partial \\varepsilon} = \\sum_{i<j} \\frac{\\partial U_{\\text{LJ}}(r_{ij})}{\\partial \\varepsilon} = \\frac{1}{\\varepsilon} \\sum_{i<j} U_{\\text{LJ}}(r_{ij}) = \\frac{U}{\\varepsilon}$$\n\nSimple! The $\\varepsilon$-derivative is just $U/\\varepsilon$. This makes sense: $\\varepsilon$ is a global rescaling of the potential.\n\nFor $\\partial U/\\partial \\sigma$: this is where the chain rule matters.\n\n$$\\begin{aligned}\n\\frac{\\partial U_{\\text{LJ}}}{\\partial \\sigma} &= 4\\varepsilon \\cdot \\frac{\\partial}{\\partial \\sigma}\\left[x^{12} - x^6\\right] & \\scriptstyle{\\text{where } x = \\sigma/r} \\\\\n&= 4\\varepsilon \\left[12 x^{11} \\cdot \\frac{1}{r} - 6 x^5 \\cdot \\frac{1}{r}\\right] & \\scriptstyle{\\text{chain rule: } \\partial x/\\partial\\sigma = 1/r} \\\\\n&= 4\\varepsilon \\left[\\frac{12\\sigma^{11}}{r^{12}} - \\frac{6\\sigma^{5}}{r^{6}}\\right] & \\scriptstyle{\\text{expanding } x^n = \\sigma^n/r^n} \\\\\n&= \\frac{1}{\\sigma}\\left[4\\varepsilon\\left(12 x^{12} - 6 x^6\\right)\\right] & \\scriptstyle{\\text{factor out } 1/\\sigma} \\\\\n&= \\frac{4\\varepsilon}{\\sigma}\\left[12 \\left(\\frac{\\sigma}{r}\\right)^{12} - 6 \\left(\\frac{\\sigma}{r}\\right)^{6}\\right]\n\\end{aligned}$$\n\n**Stage 4 — Interpretation:**\n\nNotice:\n\n$$\\underbrace{\\frac{\\partial U_{\\text{LJ}}}{\\partial \\sigma}}_{\\text{parameter gradient}} = \\frac{4\\varepsilon}{\\sigma}\\left[12 \\left(\\frac{\\sigma}{r}\\right)^{12} - 6 \\left(\\frac{\\sigma}{r}\\right)^{6}\\right]$$\n\nThe $r^{-12}$ term dominates at small separations (repulsive wall shifts outward when $\\sigma$ increases) and the $r^{-6}$ term dominates at the minimum (well depth shifts). Increasing $\\sigma$ makes the effective molecular radius larger — it pushes the repulsive wall out and shifts the attractive minimum to a larger separation.\n\nIn code:\n\n```python\ndef dU_dsigma(q: jax.Array, L: float, eps: float, sigma: float) -> float:\n    \"\"\"Analytic ∂U/∂σ for a Lennard-Jones pair sum.\n    \n    Args:\n        q: positions, shape (N, 3) in Angstroms\n        L: box side length in Angstroms\n        eps: well depth in energy units\n        sigma: zero-crossing distance in Angstroms\n    Returns:\n        scalar: ∂U_total/∂σ\n    \"\"\"\n    N = q.shape[0]\n    # Build all i<j pairs using broadcasting\n    qi = q[:, None, :]   # (N, 1, 3)\n    qj = q[None, :, :]   # (1, N, 3)\n    dr = minimum_image_distance(qi, qj, L)  # (N, N, 3)\n    r = jnp.sqrt(jnp.sum(dr**2, axis=-1))  # (N, N)\n    \n    # Only sum i < j to avoid double-counting\n    # Mask diagonal and upper triangle\n    mask = jnp.tril(jnp.ones((N, N), dtype=bool), k=-1)  # lower triangle\n    r = jnp.where(mask, r, jnp.inf)  # set upper triangle to inf → contributes 0\n    \n    x = sigma / r  # (N, N), inf entries give x=0\n    dU_pair = (4 * eps / sigma) * (12 * x**12 - 6 * x**6)\n    return jnp.sum(dU_pair)\n```\n\n**Check your understanding:** In the code above, why do we set `r = inf` for $i \\geq j$ entries rather than removing them from the sum? What happens to `x**12` when `r = inf`?\n\n**Stage 5 — Active questions:**\n\n**Fill in the step:** We derived $\\partial U_{\\text{LJ}}/\\partial \\varepsilon = U_{\\text{LJ}}/\\varepsilon$. Can you use this to show that if $\\varepsilon \\to 0$, the gradient $\\partial\\langle N\\rangle/\\partial\\varepsilon$ also vanishes? What does this mean physically — should the number of adsorbed molecules change if there are no interactions?\n\n**Numerical sanity check:** For $N=20$ molecules with $\\varepsilon = 100\\,K$ and $\\sigma = 3.4\\,\\text{Å}$ in a $10\\,\\text{Å}$ box, roughly what order of magnitude do you expect for $\\partial U/\\partial\\varepsilon$? (Hint: $U \\approx N_{\\text{pairs}} \\cdot \\varepsilon$ at typical densities, and $N_{\\text{pairs}} = N(N-1)/2$.)\n\n### Minimum-Image Convention and Why It Matters\n\nFor a periodic box of side length $L$, the minimum-image distance in 1D between two coordinates $x_i$ and $x_j$ is:\n\n$$\\Delta x_{\\text{MIC}} = \\Delta x - L \\cdot \\text{round}(\\Delta x / L)$$\n\nwhere $\\Delta x = x_i - x_j$. In 3D, applied component-wise. In JAX:\n\n```python\ndef minimum_image_distance(qi: jax.Array, qj: jax.Array, L: float) -> jax.Array:\n    \"\"\"Minimum-image displacement vector(s), shape (..., 3).\"\"\"\n    dr = qi - qj\n    return dr - L * jnp.round(dr / L)\n```\n\n**Gotcha:** This must be applied consistently to both the energy computation and its derivatives. If you compute $U$ with MIC but forget it in $\\partial U/\\partial \\theta$, you'll get gradient errors that depend on system size in a confusing way.\n\n[^3]: The minimum-image convention is valid only when the cutoff radius $r_c < L/2$. If molecules are large or the box is small, you need Ewald summation for the electrostatic part (Module 3 covers the cell-derivative version of this for lattice gradients).\n\n### Why You Only Need ∂U/∂θ, Not Forces\n\nThis is the conceptual core of the \"classical sidecar\" design. The score-function estimator requires:\n\n$$\\frac{\\partial U(q^N; \\theta)}{\\partial \\theta} \\bigg|_{\\theta = \\theta_0}$$\n\nevaluated at the **same configurations** that the sampler produced. This is a gradient with respect to *force-field parameters* — things like $\\varepsilon$ and $\\sigma$ — not with respect to particle positions $\\mathbf{q}_i$.\n\nThe forces that drive MD are $\\mathbf{F}_i = -\\partial U/\\partial \\mathbf{q}_i$. These are *not* needed. \n\nThis separation unlocks the MLFF strategy described in the source:\n\n> *\"MLFFs don't expose $\\partial U/\\partial \\mathbf{q}_i$ or $\\partial U/\\partial \\sigma_X$ — but the estimator only needs $\\partial U_{\\text{total}}/\\partial \\theta$ for $\\theta$ in the classical sidecar, which is an analytic derivative of a pair sum. Expensive sampling, cheap exact gradient.\"*\n\nIn practice: sample configurations with MACE (a neural network potential that gives more accurate geometries), but evaluate $\\partial U/\\partial \\varepsilon$ and $\\partial U/\\partial \\sigma$ using the analytic LJ formula on those configurations. The two operations are decoupled:\n\n```\nMACE samples configurations {q^N_1, q^N_2, ..., q^N_M}\n                │\n                │  These are just coordinates.\n                │  MACE doesn't need to expose any gradient API.\n                ▼\nAnalytic LJ sidecar evaluates ∂U_LJ/∂ε, ∂U_LJ/∂σ\n                │  at those coordinates.\n                │  This is a simple pair sum — 10 lines of JAX.\n                ▼\nScore-function estimator accumulates Cov(N, ∂U/∂θ)\n```\n\nIn Exercise 1, you'll implement this classical sidecar from scratch and verify it against `jax.grad`.\n\n---\n\n## The Gradient Estimator as a Propagator Decorator\n\n### Score-Function Identity: Quick Recap\n\nFrom Module 0, we have:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\cdot \\underbrace{\\left[\\langle N \\cdot \\partial_\\theta U \\rangle - \\langle N \\rangle \\cdot \\langle \\partial_\\theta U \\rangle\\right]}_{\\text{Cov}(N,\\, \\partial_\\theta U)}$$\n\nLet's label the three quantities we need:\n\n$$\\underbrace{\\langle N \\rangle}_{\\bar{N}}, \\quad \\underbrace{\\langle \\partial_\\theta U \\rangle}_{\\overline{\\partial_\\theta U}}, \\quad \\underbrace{\\langle N \\cdot \\partial_\\theta U \\rangle}_{\\overline{N \\partial_\\theta U}}$$\n\nGiven $M$ samples $(N_1, q^{N_1}), \\ldots, (N_M, q^{N_M})$ from the GCMC chain, we estimate:\n\n$$\\hat{\\bar{N}} = \\frac{1}{M}\\sum_{t=1}^M N_t, \\quad \\widehat{\\overline{\\partial_\\theta U}} = \\frac{1}{M}\\sum_{t=1}^M \\partial_\\theta U(q^{N_t}_t), \\quad \\widehat{\\overline{N\\partial_\\theta U}} = \\frac{1}{M}\\sum_{t=1}^M N_t \\cdot \\partial_\\theta U(q^{N_t}_t)$$\n\nThen the gradient estimate is:\n\n$$\\widehat{\\frac{\\partial\\langle N\\rangle}{\\partial\\theta}} = -\\beta\\left[\\widehat{\\overline{N\\partial_\\theta U}} - \\hat{\\bar{N}} \\cdot \\widehat{\\overline{\\partial_\\theta U}}\\right]$$\n\n**Check your understanding:** What is the estimator's variance for a single sample ($M=1$)? Is it zero, infinite, or something finite? What happens as $M \\to \\infty$ by the Central Limit Theorem?\n\n### Online Covariance Accumulation: O(1) Overhead\n\nThe key implementation insight is that you don't need to store the entire trajectory. You only need three running sums that accumulate online during the MCMC chain:\n\n$$S_N = \\sum_{t=1}^M N_t, \\quad S_{\\partial\\theta} = \\sum_{t=1}^M \\partial_\\theta U_t, \\quad S_{N\\partial\\theta} = \\sum_{t=1}^M N_t \\cdot \\partial_\\theta U_t$$\n\nAt the end, compute:\n\n$$\\text{Cov} = \\frac{S_{N\\partial\\theta}}{M} - \\frac{S_N}{M} \\cdot \\frac{S_{\\partial\\theta}}{M}$$\n\nPer-sample work: evaluate $\\partial_\\theta U$ (one pair-sum pass, $O(N^2)$ in brute force), multiply by $N_t$, and add to three accumulators. **This is O(1) extra work per sample on top of the GCMC chain itself** — the claim in the source material.\n\nThe source material confirms:\n\n> *\"Score-function covariance estimator implemented as a running sum over a sampler trajectory: accumulate $\\langle N \\rangle$, $\\langle \\partial_\\theta U \\rangle$, and $\\langle N \\cdot \\partial_\\theta U \\rangle$ online, then combine to get the covariance. O(1) per-sample overhead on top of the GCMC chain.\"*\n\n**Common mistake:** Computing the covariance as a batch operation at the end — `jnp.cov(N_array, dU_array)` — forces you to store a length-$M$ trajectory in memory. For $M = 10^6$ samples and $|\\theta| = 24$ parameters, that's 24 million floats = ~96 MB. The running-sum approach uses 3 scalars regardless of chain length.\n\nIn JAX with `lax.scan`, this looks like:\n\n```python\nfrom typing import NamedTuple\nimport jax\nimport jax.numpy as jnp\n\nclass RunningStats(NamedTuple):\n    \"\"\"Accumulator for online covariance computation.\"\"\"\n    sum_N: float       # Σ N_t\n    sum_dU: float      # Σ ∂U/∂θ_t\n    sum_NdU: float     # Σ N_t · ∂U/∂θ_t\n    n_samples: int\n\ndef estimator_step(\n    key: jax.Array,\n    state: GcmcState,\n    stats: RunningStats,\n    beta: float,\n) -> tuple[GcmcState, RunningStats]:\n    \"\"\"One GCMC step + one estimator update. Pure function — no hidden state.\"\"\"\n    # 1. Advance the sampler\n    new_state = gcmc_step(key, state)\n    \n    # 2. Evaluate ∂U/∂ε at the new configuration\n    N_t = new_state.n_molecules\n    dU_t = dU_deps(new_state.positions, new_state.box_L, eps, sigma)\n    \n    # 3. Update running sums\n    new_stats = RunningStats(\n        sum_N=stats.sum_N + N_t,\n        sum_dU=stats.sum_dU + dU_t,\n        sum_NdU=stats.sum_NdU + N_t * dU_t,\n        n_samples=stats.n_samples + 1,\n    )\n    return new_state, new_stats\n\ndef combine_to_gradient(stats: RunningStats, beta: float) -> float:\n    \"\"\"Combine running sums into the gradient estimate.\"\"\"\n    M = stats.n_samples\n    mean_N = stats.sum_N / M\n    mean_dU = stats.sum_dU / M\n    mean_NdU = stats.sum_NdU / M\n    cov = mean_NdU - mean_N * mean_dU\n    return -beta * cov\n```\n\n### Wiring the Estimator on Top of GCMC\n\nThe estimator is exactly a propagator decorator. It takes any `(key, state) → state'` propagator and wraps it with gradient accumulation:\n\n**Figure 3: The gradient estimator as a decorator — it consumes whatever samples the underlying propagator produces**\n\n```\nAny propagator chain:                 Decorated with estimator:\n                                      \n  key₁ → [GCMC step] → state₁          key₁ → [GCMC step] → state₁\n  key₂ → [GCMC step] → state₂    →            └→ ∂U/∂θ(state₁) → S_1\n  key₃ → [GCMC step] → state₃          key₂ → [GCMC step] → state₂\n  ...                                          └→ ∂U/∂θ(state₂) → S_2\n                                        ...\n  Result: trajectory                    Result: gradient estimate\n  Memory: O(M × N)                      Memory: O(1)   ← only 3 scalars\n                                        Overhead: ~5% of GCMC step cost\n```\n\nThis is the design the paper commits to as `ObservableWithGradient`:\n\n> *\"The estimator is literally a decorator — it consumes whatever samples the underlying propagator produces. This is the shape the paper commits to as 'ObservableWithGradient composes with any Propagator/Potential/Table chain.'\"*\n\n**The sampler doesn't need to know the estimator exists.** The estimator doesn't need to know the sampler internals. They compose freely because they share the `(key, state) → state'` interface.\n\nIn Exercise 3, you'll implement `ObservableWithGradient.__call__` and `combine_running_sums`, then verify that the overhead is < 5% compared to a bare GCMC chain.\n\n---\n\n## Finite-Difference Validation: The 3% Sanity Gate\n\n### The Bias-Variance Crossover in Finite Differences\n\nBefore we trust the gradient estimator, we need a ground-truth comparison. Finite differences provide one:\n\n$$\\left.\\frac{\\partial \\langle N \\rangle}{\\partial \\varepsilon}\\right|_{\\text{FD}} \\approx \\frac{\\langle N \\rangle_{\\varepsilon + \\delta} - \\langle N \\rangle_{\\varepsilon - \\delta}}{2\\delta}$$\n\nEach of $\\langle N \\rangle_{\\varepsilon \\pm \\delta}$ is estimated from an independent GCMC chain at slightly perturbed $\\varepsilon$. The centered finite difference has error:\n\n$$\\text{error} = \\underbrace{\\frac{\\delta^2}{6} \\frac{\\partial^3 \\langle N \\rangle}{\\partial \\varepsilon^3}}_{\\text{truncation bias}} + \\underbrace{\\frac{\\text{SE}_{\\langle N \\rangle}}{\\delta}}_{\\text{statistical noise amplification}}$$\n\nwhere $\\text{SE}_{\\langle N \\rangle} \\sim 1/\\sqrt{M}$ is the standard error of the Monte Carlo mean. This creates a bias-variance crossover:\n\n**Figure 4: The FD bias-variance crossover — why you want the direct estimator**\n\n```\nError of FD gradient estimate vs step size δ\n(schematic, log-log scale)\n\nlog(error)\n│\n│    statistical noise ∝ 1/δ       truncation bias ∝ δ²\n│         ╲                         ╱\n│          ╲                       ╱\n│           ╲    optimal δ       ╱\n│            ╲     ★           ╱\n│             ╲   ╱╲          ╱\n│              ╲ ╱  ╲        ╱\n│               V    ╲      ╱ \n│                     ╲────╱\n│                           \n└─────────────────────────────── log(δ)\n                ↑\n         optimal δ ≈ SE^(1/3)\n         \nAt fixed chain length M, minimum FD error ≈ M^{-1/3}.\nOur estimator achieves error ∝ M^{-1/2}  ← better by M^{1/6}\n```\n\nThe optimal $\\delta$ satisfies $\\delta^2 \\cdot \\partial^3_\\varepsilon \\langle N\\rangle / 6 = \\text{SE}/\\delta$, giving $\\delta_{\\text{opt}} \\sim \\text{SE}^{1/3}$. But you don't know $\\partial^3 \\langle N\\rangle$ a priori — so in practice you run FD at several values of $\\delta$ and look for the plateau.\n\n**Common mistake:** Choosing $\\delta$ too small. When $\\delta \\ll \\text{SE}/\\delta^2$, the noise term $\\text{SE}/\\delta$ explodes and the FD estimate is worthless. Students often blame the score-function estimator when the FD reference is just noisy.\n\n### What \"3% Agreement\" Actually Tests\n\nThe source material specifies a sanity test:\n\n> *\"Sanity test: classical LJ in a small box, gradient of $\\langle N\\rangle$ w.r.t. $\\varepsilon$ matches FD to within 3%.\"*\n\nThis is the paper's **minimal confidence gate** — before any variance reduction, before CRN, before fractional-coordinate reparameterization. It tests that:\n\n1. The acceptance ratios are correctly implemented (wrong $z\\cdot V/(N+1)$ factor would shift $\\langle N\\rangle$ away from FD).\n2. The analytic $\\partial U/\\partial \\varepsilon$ is correctly computed (sign errors or double-counting would shift the covariance).\n3. The covariance accumulation is correctly combined (forgetting to divide by $M$ would scale the gradient).\n\nA 3% criterion is tight enough to catch all of these bugs. At $M = 10^5$ samples, the Monte Carlo standard error on the gradient is typically $\\sim 1$–$3\\%$ at the chain lengths used, so 3% agreement means you're within the estimator's intrinsic noise floor.\n\nIn Exercise 4, you'll implement this validation as a 4-row table:\n\n| Method | $\\delta$ | $\\partial\\langle N\\rangle/\\partial\\varepsilon$ estimate |\n|--------|----------|----------------------------------------------------------|\n| FD | $0.1 \\varepsilon_0$ | ... |\n| FD | $0.05 \\varepsilon_0$ | ... |\n| FD | $0.01 \\varepsilon_0$ | ... |\n| Score-function estimator | — | ... |\n\nThe criterion is that the smallest-noise FD estimate and the score-function estimator agree within 3%.\n\n[^4]: Why not use jax.grad through the entire GCMC chain to compute the gradient? Because the Metropolis accept/reject step involves `jnp.where(u < alpha, new_state, old_state)`, which has a zero gradient almost everywhere — the gradient flows only on the measure-zero set where $u = \\alpha$. This is the same reason you can't backprop through standard rejection sampling without a pathwise reparameterization trick. The score-function identity sidesteps this entirely.\n\n---\n\n## Analytical Questions\n\n### Question 1 — What Breaks if N Is Treated as Continuous?\n\nThe score-function identity $\\partial\\langle N\\rangle/\\partial\\theta = -\\beta \\cdot \\text{Cov}(N, \\partial_\\theta U)$ requires $N$ to be a random variable distributed according to the grand-canonical measure. In GCMC, $N$ is a non-negative integer that jumps by $\\pm 1$ at each step.\n\nSuppose instead we ran NVT-MD (constant-$N$ ensemble) at some fixed $N^*$ and tried to compute $\\partial N^* / \\partial \\theta$. Clearly $N^*$ is a constant, so its derivative is zero — no useful signal. This is why you **cannot** get working capacity gradients from a closed-ensemble simulation.\n\nNow consider a softer version: what if you ran GCMC but estimated $\\langle N \\rangle$ by the time-average of $N_t$, but estimated $\\partial_\\theta U$ not at the current configuration but at an *average* geometry? More precisely: what if you substituted $\\partial_\\theta U(\\bar{q})$ for $\\langle \\partial_\\theta U\\rangle$, where $\\bar{q} = \\langle q\\rangle$?\n\n**Analyze this.** Would the estimator be biased or unbiased? In which direction? Consider the fact that $\\text{Cov}(N, \\partial_\\theta U) = \\langle N \\cdot \\partial_\\theta U\\rangle - \\langle N\\rangle\\langle\\partial_\\theta U\\rangle$ and think about what happens when $\\partial_\\theta U$ is a nonlinear function of $q$.\n\n### Question 2 — The Score-Function Estimator vs a Naive Monte Carlo Ratio\n\nOne might propose a different gradient estimator: run GCMC at $\\varepsilon$ and $\\varepsilon + \\delta$ with $M$ steps each, then estimate:\n\n$$\\frac{\\partial\\langle N\\rangle}{\\partial\\varepsilon} \\approx \\frac{\\hat{\\langle N\\rangle}_{\\varepsilon+\\delta} - \\hat{\\langle N\\rangle}_{\\varepsilon}}{\\delta}$$\n\nThis is just finite differences. Compare this to the score-function estimator on two axes:\n\n**(a) Bias:** Both are asymptotically unbiased as $\\delta \\to 0$ and $M \\to \\infty$. But for finite $\\delta$ and $M$, the FD estimator has a truncation bias of order $\\delta^2$. The score-function estimator has zero truncation bias regardless of $M$ — it directly estimates the gradient, not a finite-difference approximation. **Verify:** Write out the O($\\delta^2$) term explicitly using a Taylor expansion of $\\langle N\\rangle_{\\varepsilon+\\delta}$.\n\n**(b) Variance:** The FD estimator's variance scales as $\\text{Var}(\\hat{N})/\\delta^2 \\propto 1/(M\\delta^2)$. The score-function estimator's variance scales as $\\text{Var}(N \\cdot \\partial_\\varepsilon U)/M \\propto 1/M$. **Determine:** At the optimal $\\delta$ for FD, how does the FD variance compare to the score-function variance in terms of $M$? Is the score-function estimator always better in variance?\n\n### Question 3 — When Does the Covariance Vanish and What Does That Mean?\n\nThe gradient $\\partial\\langle N\\rangle/\\partial\\varepsilon = -\\beta \\cdot \\text{Cov}(N, \\partial_\\varepsilon U)$ is zero when the covariance is zero. There are two physically distinct ways this can happen:\n\n**(a) Zero correlation:** $N$ and $\\partial_\\varepsilon U$ are statistically independent. Under what physical conditions would the number of adsorbed molecules be independent of the total LJ interaction energy? (Hint: consider the limit $\\varepsilon \\to 0$ and the limit $T \\to \\infty$.)\n\n**(b) Anticorrelation precisely cancels:** More subtle — $N$ and $\\partial_\\varepsilon U$ are each nonzero and correlated, but their covariance is exactly zero. Can you construct a potential energy function $U(q)$ for which $\\text{Cov}(N, U) = 0$ but $\\langle N\\rangle \\neq 0$ and $\\langle U\\rangle \\neq 0$? (Hint: think about a two-state model with $N \\in \\{0, 1\\}$.)\n\n**(c) Practical implication:** Near a capillary condensation phase transition, $\\langle N\\rangle$ has a sharp jump as a function of $\\mu$. The variance of $N$ diverges. What happens to $\\text{Cov}(N, \\partial_\\varepsilon U)$ in this regime? Is the estimator biased, or just high-variance? (The paper's \"Binder-cumulant detector\" addresses this — explain why a Binder cumulant can detect this regime.)\n\n### Question 4 — Why Is the (key, state) → state' Discipline Non-Negotiable for CRN?\n\nConsider an alternative implementation where the GCMC propagator is *not* stateless — instead, it maintains a global random number generator state (as in Python's `random` module) and draws from it as needed. The chain produces identical *marginal* distributions, so equilibrium averages are correct.\n\n**(a)** Explain why this implementation breaks Common Random Numbers (Module 2). Be specific: what property of the trajectory must be identical between the two ($\\mu_H$, $\\mu_L$) chains for CRN to reduce variance, and how does global mutable RNG state prevent this?\n\n**(b)** In JAX, `jax.lax.scan` traces the computation as a static graph. Inside a `jit`-compiled function, `jax.random.split` and `jax.random.uniform` are deterministic given the key. Argue that two calls to `gcmc_step(key, state)` with the same `key` but different `mu` values will use the same proposal positions. Where exactly in the acceptance probability does the $\\mu$ difference enter?\n\n**(c)** Consider this code: `key, subkey = jax.random.split(key)`. After this, `key` and `subkey` are different keys, but they are deterministic functions of the input `key`. If we run two chains with the same initial key and split the keys the same way, will the two chains always have synchronized random streams even under different accept/reject outcomes? (Hint: think about what happens when Chain_H accepts but Chain_L rejects at step $t$ — does the next key depend on the accept/reject decision?)\n\n---\n\n## Synthesis: What You Now Have and What Comes Next\n\nLet's take stock of what we've built and why each piece matters for the larger goal.\n\n**What you built:**\n\n1. A **minimal GCMC sampler** that correctly samples the $\\mu VT$ ensemble via insert/delete/translate moves with the right Jacobian factors. This is the foundational sampling engine for the entire course.\n\n2. A **classical sidecar** — analytic $\\partial U/\\partial \\varepsilon$ and $\\partial U/\\partial \\sigma$ for Lennard-Jones — that provides exact parameter gradients at any configuration, even if those configurations were sampled by an opaque black-box method (MLFF, learned proposal, etc.).\n\n3. An **online covariance accumulator** that wraps any propagator chain and computes the score-function gradient estimate with O(1) per-sample overhead. This is the `ObservableWithGradient` primitive the paper proposes as a first-class kUPS component.\n\n4. A **validation protocol** that confirms the implementation is correct before any further complexity is added.\n\n**Why the design choices matter:**\n\nThe `(key, state) → state'` discipline is not just stylistic hygiene. As you'll see in Module 2, it's what makes **Common Random Numbers** (CRN) work: running the two chains at $\\mu_H$ and $\\mu_L$ with identical key streams causes the proposal positions and accept-threshold uniforms to be shared, so $\\partial U/\\partial\\theta$ at matching steps differs only due to $\\mu$-dependent configuration differences. The variance of the gradient *difference* shrinks by 3–10× compared to independent streams.\n\nThe separation of \"sampler\" from \"gradient evaluator\" is equally fundamental. The source material reports **8× sample efficiency vs MBAR-5pt** at matched accuracy, and this is inherited by any propagator chain — classical GCMC gets it, a learned-proposal MCMC gets it, and a Boltzmann generator with importance weights gets it. The paper achieves this by committing early to the `ObservableWithGradient` decorator pattern.\n\nThe 49× throughput kUPS achieves over RASPA for $\\mu VT$ GCMC[^5] is largely a consequence of JAX's GPU-native batched execution and the absence of C++/Python boundary crossings. The gradient estimator adds O(1) overhead to this, so the net benefit is **49× raw sampling × 8× gradient sample efficiency vs MBAR-5pt** for the differentiable working-capacity objective.\n\n**What comes next:**\n\nModule 2 builds the two-state working-capacity objective $\\Delta N = \\langle N\\rangle_{\\mu_H} - \\langle N\\rangle_{\\mu_L}$. You'll implement CRN coupling between the two chains and the Rao-Blackwell control variate that subtract per-chain $\\langle N\\rangle$ before forming the covariance. Together these yield the headline variance reduction.\n\nModule 3 handles a more subtle problem: what happens when $\\theta$ is a *structural* parameter like the lattice constant $a$? Changing $a$ changes the support of the position distribution — molecules that were inside the box might be outside a shrunken box — and importance-weight variance diverges as $\\text{Var}(\\beta\\Delta U) \\propto V \\cdot (\\delta a / a)^2$. The fix is fractional-coordinate reparameterization: sample in $\\mathbf{s} \\in [0,1)^3$ and compute $\\mathbf{q} = h(a) \\cdot \\mathbf{s}$, so the sampling domain becomes $a$-invariant and $\\partial U/\\partial a$ enters analytically.\n\nModule 4 packages the full gradient estimator as a composable `ObservableWithGradient` propagator, shows how it connects to learned-proposal MCMC and Boltzmann generators, and closes with the CFG guidance head for discrete MOF generators.\n\n**The one insight to carry forward:** The score-function identity decouples sampling quality from gradient correctness. A poor sampler gives correct but high-variance gradients; a better sampler gives the same correct gradients with lower variance. This is why the estimator is truly sampler-agnostic — and why improving the sampler (going from classical LJ to MACE) is a pure variance-reduction move that doesn't change the gradient formula at all.\n\n---\n\n[^1]: The thermal de Broglie wavelength $\\Lambda = h/\\sqrt{2\\pi m k_B T}$ tracks momentum integration and cancels between the forward and reverse moves — you never need to compute it explicitly in acceptance ratios.\n\n[^2]: In NumPy-style imperative code, global random state would be mutated at different rates by the two chains (depending on different accept/reject branching), making key synchronization impossible. JAX's functional random number system sidesteps this entirely.\n\n[^3]: The minimum-image convention is valid only when the cutoff radius $r_c < L/2$. If molecules are large or the box is small, you need Ewald summation for the electrostatic part (Module 3 covers the cell-derivative version of this for lattice gradients).\n\n[^4]: Why not use `jax.grad` through the entire GCMC chain to compute the gradient? Because the Metropolis accept/reject step involves `jnp.where(u < alpha, new_state, old_state)`, which has a zero gradient almost everywhere — the gradient flows only on the measure-zero set where $u = \\alpha$. This is the same reason you can't backprop through standard rejection sampling without a pathwise reparameterization trick. The score-function identity sidesteps this entirely.\n\n[^5]: The 49× figure is measured on $\\mu VT$ CO₂ adsorption in a $3\\times3\\times3$ supercell of a 114-atom MOF (3,078 framework atoms, ~30 CO₂ molecules at average loading) on a single NVIDIA L4 GPU, compared to RASPA on a single CPU core. Batching multiple systems would increase performance further by saturating the GPU.\n", "exercises": [{"filename": "ex01_lj_energy_and_its_analytic_gradients_the_classical.py", "content": "\"\"\"\nExercise 1: LJ Energy and Its Analytic Gradients (The Classical Sidecar)\n=========================================================================\n\nIn this exercise you will implement the Lennard-Jones pair potential and its\nanalytic partial derivatives with respect to the force-field parameters ε and σ.\n\nWhy does this matter?\n  The score-function gradient estimator requires ∂U/∂θ evaluated at\n  configurations drawn from the GCMC chain. Crucially, θ = (ε, σ) are\n  force-field parameters — NOT particle positions. You never need forces\n  ∂U/∂q_i here. This separation is what makes the \"classical sidecar\" design\n  possible: sample with any black-box method (even a neural-network potential),\n  then evaluate the cheap analytic pair-sum gradient on those configurations.\n\nReference formulas from the lesson:\n  U_LJ(r; ε, σ) = 4ε [(σ/r)^12 - (σ/r)^6]\n  ∂U/∂ε          = U / ε   (linearity in ε)\n  ∂U/∂σ          = (4ε/σ) [12(σ/r)^12 - 6(σ/r)^6]  per pair, summed over i<j\n\nMilestone: max abs error (analytic vs jax.grad) < 1e-10 for BOTH ε and σ.\n           Prints \"classical sidecar derivatives verified\".\n\"\"\"\n\nimport os\nimport jax\nimport jax.numpy as jnp\nimport jax.random as jr\n\n# Use 64-bit floats so analytic vs jax.grad comparison is meaningful.\njax.config.update(\"jax_enable_x64\", True)\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED HELPER: minimum-image convention\n# ---------------------------------------------------------------------------\n\ndef minimum_image_distance(qi: jax.Array, qj: jax.Array, L: float) -> jax.Array:\n    \"\"\"Minimum-image displacement vector(s).\n\n    Works with arbitrary leading batch dimensions — the last axis is spatial (3).\n\n    Args:\n        qi: positions of particle(s) i, shape (..., 3)\n        qj: positions of particle(s) j, shape (..., 3)\n        L:  cubic box side length (same units as positions)\n\n    Returns:\n        dr: displacement qi - qj folded into [-L/2, L/2), shape (..., 3)\n    \"\"\"\n    dr = qi - qj\n    return dr - L * jnp.round(dr / L)\n\n\n# ---------------------------------------------------------------------------\n# TODO 1: Implement U_LJ — the total Lennard-Jones energy\n# ---------------------------------------------------------------------------\n\ndef U_LJ(q: jax.Array, L: float, eps: float, sigma: float) -> float:\n    \"\"\"Total Lennard-Jones energy for N molecules in a periodic cubic box.\n\n    Sums over ALL distinct pairs (i < j) using the minimum-image convention.\n    Pairs with i >= j are excluded by setting their distance to ∞.\n\n    Args:\n        q:     positions, shape (N, 3), in Angstroms\n        L:     box side length in Angstroms (cubic box)\n        eps:   LJ well depth, energy units (e.g., Kelvin × k_B)\n        sigma: LJ zero-crossing distance, Angstroms\n\n    Returns:\n        U_total: scalar, total potential energy in the same units as eps\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 10 lines                 #\n    #                                                         #\n    # Hints:                                                  #\n    #   1. Use broadcasting to build all (N, N) pair vectors: #\n    #        qi = q[:, None, :]   # (N, 1, 3)                 #\n    #        qj = q[None, :, :]   # (1, N, 3)                 #\n    #   2. Call minimum_image_distance(qi, qj, L) to get      #\n    #      displacement vectors of shape (N, N, 3).           #\n    #   3. Compute distances r = sqrt(sum(dr^2, axis=-1)),    #\n    #      shape (N, N).                                      #\n    #   4. Build a lower-triangular mask (i < j only):        #\n    #        mask = jnp.tril(jnp.ones((N,N), bool), k=-1)     #\n    #      Set r = jnp.where(mask, r, jnp.inf)               #\n    #      (inf entries give x=0 via σ/inf → 0, contributing  #\n    #       nothing to the sum.)                              #\n    #   5. Compute x = sigma / r, then sum 4*eps*(x**12-x**6)#\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2: Implement dU_depsilon — analytic ∂U/∂ε\n# ---------------------------------------------------------------------------\n\ndef dU_depsilon(q: jax.Array, L: float, eps: float, sigma: float) -> float:\n    \"\"\"Analytic partial derivative of total LJ energy with respect to ε.\n\n    Key insight: U_LJ is linear in ε, so ∂U/∂ε = U/ε.\n    This means you can re-use U_LJ almost directly — no new pair loop needed.\n\n    Args:\n        q:     positions, shape (N, 3), Angstroms\n        L:     box side length, Angstroms\n        eps:   LJ well depth\n        sigma: LJ zero-crossing distance, Angstroms\n\n    Returns:\n        dU_deps: scalar, ∂U_total/∂ε\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 8 lines                  #\n    #                                                         #\n    # Hints:                                                  #\n    #   Since U = 4ε·Σ_{i<j} [(σ/r)^12 - (σ/r)^6],         #\n    #   we have ∂U/∂ε = (1/ε)·U.                             #\n    #   You may call U_LJ(...) and divide by eps.             #\n    #   Alternatively, reproduce the pair loop but omit the   #\n    #   4*eps factor and only multiply by 4 at the end:       #\n    #       dU_pair = 4 * (x**12 - x**6)   (no eps here)     #\n    #   Both routes give the same answer.                     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3: Implement dU_dsigma — analytic ∂U/∂σ\n# ---------------------------------------------------------------------------\n\ndef dU_dsigma(q: jax.Array, L: float, eps: float, sigma: float) -> float:\n    \"\"\"Analytic partial derivative of total LJ energy with respect to σ.\n\n    Derivation (from the lesson):\n      Let x = σ/r.\n      U_pair = 4ε(x^12 - x^6)\n      ∂x/∂σ = 1/r\n      ∂U_pair/∂σ = 4ε (12 x^11·(1/r) - 6 x^5·(1/r))\n                 = (4ε/σ)(12 x^12 - 6 x^6)\n\n    Args:\n        q:     positions, shape (N, 3), Angstroms\n        L:     box side length, Angstroms\n        eps:   LJ well depth\n        sigma: LJ zero-crossing distance, Angstroms\n\n    Returns:\n        dU_dsig: scalar, ∂U_total/∂σ\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 10 lines                 #\n    #                                                         #\n    # Hints:                                                  #\n    #   1. Set up the same (N,N) distance matrix as in U_LJ   #\n    #      with the i<j mask (r=inf for i>=j).               #\n    #   2. Compute x = sigma / r  (shape (N,N)).              #\n    #   3. Apply the formula: (4*eps/sigma)*(12*x**12 - 6*x**6)#\n    #   4. Sum over all (i,j) — inf entries give x=0, safe.  #\n    #                                                         #\n    #   Common mistake: a factor-of-2 error from the power   #\n    #   rule. The correct exponent coefficients are 12 and 6, #\n    #   NOT 6 and 3.                                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 4: Validation block\n# ---------------------------------------------------------------------------\n\ndef validate_analytic_vs_jaxgrad(q, L, eps, sigma):\n    \"\"\"Compare analytic derivatives to jax.grad for both ε and σ.\n\n    Returns RELATIVE errors: |analytic - auto| / |analytic|.\n    This is the right metric because derivative magnitudes vary with system\n    size and energy scale; float64 can only guarantee ~1e-15 relative error.\n\n    Args:\n        q:     positions, shape (N, 3)\n        L:     box side length\n        eps:   LJ well depth\n        sigma: LJ zero-crossing distance\n\n    Returns:\n        err_eps:   relative error for ∂U/∂ε\n        err_sigma: relative error for ∂U/∂σ\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 8 lines                  #\n    #                                                         #\n    # Hint
