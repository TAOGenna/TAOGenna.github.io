sitions: np.ndarray, charges: np.ndarray,\n               a: float, beta: float, step_size: float = 0.5,\n               rng: np.random.Generator = None) -> list:\n    \"\"\"\n    NVT Monte Carlo in Cartesian coordinates.\n\n    Returns a list of (positions_copy, energy) snapshots taken every 5 steps.\n\n    Parameters\n    ----------\n    n_steps   : number of MC moves\n    positions : (N, 3) initial Cartesian coordinates in [0, a)³\n    charges   : (N,) partial charges\n    a         : box length in Å\n    beta      : 1/(kBT) in mol/kJ\n    step_size : max displacement per move in Å\n    rng       : numpy random Generator\n\n    Returns\n    -------\n    trajectory : list of (N, 3) position arrays\n    \"\"\"\n    if rng is None:\n        rng = np.random.default_rng(42)\n\n    pos = positions.copy()\n    U_cur = total_energy(pos, charges, a)\n    trajectory = []\n    N = len(pos)\n\n    for step in range(n_steps):\n        idx = rng.integers(0, N)\n        delta = rng.uniform(-step_size, step_size, size=3)\n        pos_new = pos.copy()\n        pos_new[idx] = (pos[idx] + delta) % a\n\n        U_new = total_energy(pos_new, charges, a)\n        dU = U_new - U_cur\n\n        if rng.random() < np.exp(-beta * dU):\n            pos = pos_new\n            U_cur = U_new\n\n        if step % 5 == 0:\n            trajectory.append(pos.copy())\n\n    return trajectory\n\n\ndef build_initial_positions(n_mols: int, a: float,\n                            rng: np.random.Generator) -> np.ndarray:\n    \"\"\"Place n_mols molecules on a simple cubic lattice to avoid overlaps.\"\"\"\n    side = int(np.ceil(n_mols ** (1.0 / 3.0)))\n    spacing = a / (side + 1)\n    positions = []\n    for ix in range(side + 1):\n        for iy in range(side + 1):\n            for iz in range(side + 1):\n                if len(positions) >= n_mols:\n                    break\n                q = np.array([(ix + 0.5) * spacing,\n                              (iy + 0.5) * spacing,\n                              (iz + 0.5) * spacing]) % a\n                positions.append(q)\n            if len(positions) >= n_mols:\n                break\n        if len(positions) >= n_mols:\n            break\n    return np.array(positions[:n_mols])\n\n\ndef build_co2_charges(n_mols: int) -> np.ndarray:\n    \"\"\"One charge per molecule (simplified: treat each molecule as single site).\"\"\"\n    # Alternating +/- for a rough charge-neutral system\n    charges = np.array([CHARGE_C if i % 2 == 0 else CHARGE_O\n                        for i in range(n_mols)])\n    return charges\n\n\n# ---------------------------------------------------------------------------\n# Provided: importance-weight helpers\n# ---------------------------------------------------------------------------\n\ndef compute_log_weights(trajectory: list, charges: np.ndarray,\n                        a0: float, a_target: float, beta: float) -> np.ndarray:\n    \"\"\"\n    Compute unnormalized log-importance-weights for reweighting from a0 → a_target.\n\n    For the naive Cartesian approach we keep molecular positions q FIXED and\n    evaluate the energy at the new box size a_target. The weight is:\n\n        w_k = (a_target / a0)^(3N) * exp(-β * ΔU_k)\n\n    where the (a_target/a0)^(3N) factor is the density-of-states Jacobian\n    correcting for the different accessible volume (a_target³ vs a0³ per molecule).\n\n    Parameters\n    ----------\n    trajectory : list of (N, 3) Cartesian position arrays from simulation at a0\n    charges    : (N,) partial charges\n    a0         : reference box length (Å)\n    a_target   : perturbed box length (Å)\n    beta       : 1/(kBT)\n\n    Returns\n    -------\n    log_weights : (T,) array of log importance weights\n    \"\"\"\n    N = len(charges)\n    log_jac = N * 3 * np.log(a_target / a0)  # density-of-states Jacobian\n\n    log_weights = []\n    for pos in trajectory:\n        U0 = total_energy(pos, charges, a0)\n        U1 = total_energy(pos, charges, a_target)  # same q, different box\n        delta_U = U1 - U0\n        log_weights.append(log_jac - beta * delta_U)\n\n    return np.array(log_weights)\n\n\ndef effective_sample_size(log_weights: np.ndarray) -> float:\n    \"\"\"\n    ESS = (Σ w_k)² / Σ w_k²  computed in log-space for numerical stability.\n\n    Parameters\n    ----------\n    log_weights : (T,) array of unnormalized log-weights\n\n    Returns\n    -------\n    ess : scalar ESS value\n    \"\"\"\n    lw = log_weights - log_weights.max()  # shift for stability\n    w  = np.exp(lw)\n    return float(w.sum() ** 2 / (w ** 2).sum())\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 1\n# ---------------------------------------------------------------------------\n\ndef naive_reweight_gradient(trajectory: list, charges: np.ndarray,\n                             a0: float, delta_a: float, beta: float) -> float:\n    \"\"\"\n    Estimate d⟨N⟩/da using naive Cartesian reweighting (thermodynamic perturbation).\n\n    Because we are tracking N=const in NVT, we are actually estimating\n    d⟨U⟩/da via a reweighted average — but what matters for this exercise\n    is the ESS, not the observable.  Return the central-difference gradient\n    of ⟨U⟩ with respect to a, computed via importance reweighting.\n\n    The central-difference formula:\n        d⟨U⟩/da ≈ [⟨U⟩_{a+δa} - ⟨U⟩_{a-δa}] / (2 δa)\n\n    where each ⟨U⟩ is estimated as a self-normalized importance-weighted average:\n        ⟨U⟩_{a'} ≈ Σ_k w_k U(q_k; a') / Σ_k w_k\n\n    Parameters\n    ----------\n    trajectory : list of (N, 3) Cartesian position arrays at reference a0\n    charges    : (N,) partial charges\n    a0         : reference lattice constant (Å)\n    delta_a    : perturbation size (Å)\n    beta       : 1/(kBT)\n\n    Returns\n    -------\n    gradient : float, estimated d⟨U⟩/da in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Compute log-weights for a0+delta_a using             #\n    #    compute_log_weights(). Normalize to get w_plus.      #\n    # 2. Compute log-weights for a0-delta_a. Normalize        #\n    #    to get w_minus.                                       #\n    # 3. For each sample, evaluate U(q; a0+delta_a) and       #\n    #    U(q; a0-delta_a).                                     #\n    # 4. Compute self-normalized weighted averages:           #\n    #    U_plus  = sum(w_plus  * U_list_plus)  / sum(w_plus)  #\n    #    U_minus = sum(w_minus * U_list_minus) / sum(w_minus) #\n    # 5. Return (U_plus - U_minus) / (2 * delta_a)            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 2\n# ---------------------------------------------------------------------------\n\ndef ess_vs_perturbation(trajectory: list, charges: np.ndarray, a0: float,\n                        beta: float, delta_a_fractions: list) -> list:\n    \"\"\"\n    Compute ESS/n_samples at each δa/a value and print a text-art graph.\n\n    Parameters\n    ----------\n    trajectory        : list of (N, 3) positions from GCMC at a0\n    charges           : (N,) partial charges\n    a0                : reference lattice constant (Å)\n    beta              : 1/(kBT)\n    delta_a_fractions : list of δa/a ratios to evaluate, e.g. [0.001, 0.01, 0.1]\n\n    Returns\n    -------\n    ess_ratios : list of ESS / len(trajectory) for each δa/a\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # For each fraction in delta_a_fractions:                 #\n    # 1. delta_a = fraction * a0                             #\n    # 2. Compute log_weights for a0 + delta_a                #\n    # 3. Compute ESS using effective_sample_size()           #\n    # 4. Compute ess_ratio = ESS / len(trajectory)           #\n    # 5. Print: \"  δa/a={fraction:.3f}: ESS/n={ratio:.2f}   #\n    #            {'█' * int(ratio*40)}\"                       #\n    # 6. Append ratio to results list                         #\n    #                                                         #\n    # Hint: print a header line before the loop.             #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 3\n# ---------------------------------------------------------------------------\n\ndef fit_variance_scaling(trajectory: list, charges: np.ndarray, a0: float,\n                         beta: float, delta_a_fractions: list) -> float:\n    \"\"\"\n    Fit Var(β ΔU) ∝ (δa)^exponent and assert exponent ≈ 2.\n\n    The theoretical prediction (Module 3 lesson) is:\n        Var(β ΔU) ∝ V · (δa / a)²\n\n    We fit log Var(β ΔU) = const + exponent * log(δa/a)\n    and assert |exponent - 2.0| < 0.4  (within 20% of the expected value).\n\n    Parameters\n    ----------\n    trajectory        : list of (N, 3) positions\n    charges           : (N,) partial charges\n    a0                : reference lattice constant (Å)\n    beta              : 1/(kBT)\n    delta_a_fractions : list of δa/a ratios (at least 3)\n\n    Returns\n    -------\n    exponent : float, the fitted scaling exponent\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # For each fraction in delta_a_fractions:                 #\n    # 1. delta_a = fraction * a0                             #\n    # 2. Compute beta * delta_U for each trajectory frame    #\n    #    delta_U = total_energy(pos, charges, a0+delta_a)    #\n    #            - total_energy(pos, charges, a0)            #\n    # 3. Compute var_beta_dU = np.var(beta_dU_list)          #\n    #                                                         #\n    # Collect log(fraction) and log(var_beta_dU) arrays,     #\n    # then use np.polyfit(log_x, log_y, 1) to get the slope. #\n    # Print: \"Fit: Var(βΔU) ∝ δa^{exponent:.2f}             #\n    #         (expected 2.0): PASS/FAIL\"                      #\n    # Assert |exponent - 2.0| < 0.4                          #\n    # Return the exponent.                                    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided __main__ — do not modify\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    print(\"=\" * 60)\n    print(\"Exercise 1: Naive reweighting — ESS collapse demo\")\n    print(\"=\" * 60)\n\n    rng = np.random.default_rng(0)\n\n    # Build system\n    positions = build_initial_positions(N_MOLS, BOX_A0, rng)\n    if len(positions) < N_MOLS:\n        # fallback: random without exclusion\n        positions = rng.uniform(0, BOX_A0, size=(N_MOLS, 3))\n    charges = build_co2_charges(N_MOLS)\n\n    print(f\"\\nSystem: N={N_MOLS} molecules, a₀={BOX_A0} Å, β={BETA:.4f} mol/kJ\")\n\n    # Burn-in: equilibrate before collecting production frames\n    burn_in = N_STEPS // 2\n    print(f\"Burn-in: {burn_in} steps...\", flush=True)\n    burn_traj = run_nvt_mc(burn_in, positions, charges, BOX_A0, BETA, rng=rng)\n    eq_positions = burn_traj[-1] if burn_traj else positions\n\n    print(f\"Production: {N_STEPS} NVT MC steps...\", flush=True)\n    trajectory = run_nvt_mc(N_STEPS, eq_positions, charges, BOX_A0, BETA, rng=rng)\n    print(f\"Trajectory length: {len(trajectory)} frames\\n\")\n\n    # --- ESS sweep ---\n    if VERIFY:\n        fractions = [0.001, 0.01, 0.1]\n    else:\n        fractions = [0.001, 0.005, 0.01, 0.02, 0.03, 0.05, 0.07, 0.1]\n\n    ess_ratios = ess_vs_perturbation(trajectory, charges, BOX_A0, BETA, fractions)\n\n    # --- Variance scaling fit ---\n    print(\"\\nFitting Var(βΔU) scaling...\")\n    # Use at least 3 points; skip very small fractions that may have zero variance\n    fit_fractions = [f for f in fractions if f >= 0.001]\n    exponent = fit_variance_scaling(trajectory, charges, BOX_A0, BETA, fit_fractions)\n\n    # --- Gradient at δa/a = 0.001 (small enough to be valid) ---\n    print(\"\\nNaive reweighting gradient at δa/a = 0.001:\")\n    delta_a_small = 0.001 * BOX_A0\n    grad = naive_reweight_gradient(trajectory, charges, BOX_A0, delta_a_small, BETA)\n    print(f\"  d⟨U⟩/da ≈ {grad:.4f} kJ/mol/Å  (only meaningful at tiny δa)\")\n\n    # --- Confirm 10× samples doesn't help ESS ratio ---\n    print(\"\\nDoes 10× more samples fix the ESS ratio at δa/a=0.1?\")\n    big_traj = run_nvt_mc(N_STEPS * 10, positions, charges, BOX_A0, BETA, rng=rng)\n    lw_big = compute_log_weights(big_traj, charges, BOX_A0, BOX_A0 * 1.1, BETA)\n    ess_big = effective_sample_size(lw_big) / len(big_traj)\n    lw_small = compute_log_weights(trajectory, charges, BOX_A0, BOX_A0 * 1.1, BETA)\n    ess_small = effective_sample_size(lw_small) / len(trajectory)\n    print(f\"  ESS/n (original N_STEPS)    = {ess_small:.3f}\")\n    print(f\"  ESS/n (10× N_STEPS)         = {ess_big:.3f}\")\n    print(f\"  Ratio: {ess_big/max(ess_small,1e-9):.2f}×  (should be ≈ 1.0 — samples don't help)\")\n\n    # --- Final summary ---\n    print(\"\\n\" + \"=\" * 60)\n    threshold = 0.03  # δa/a where ESS < 10%\n    print(f\"Naive reweighting dies at δa/a ≈ {threshold:.2f} for N={N_MOLS} \"\n          f\"in {BOX_A0:.0f} Å box.\")\n    print(\"The support is θ-dependent. Fractional coordinates next.\")\n    print(\"=\" * 60)\n"}, {"filename": "ex02_fractionalcoordinate_gcmc__θinvariant_support.py", "content": "\"\"\"\nExercise 2: Fractional-coordinate GCMC — θ-invariant support\n=============================================================\n\nThe lesson: the ESS collapse in Exercise 1 was NOT a statistical problem.\nIt was a *measure-theoretic* problem — the sampling domain [0, a)³ changes\nwith θ = a, so differentiation under the integral is illegal.\n\nThe fix: sample in fractional coordinates s ∈ [0, 1)³ and reconstruct\nCartesian positions via q = h(a) · s. The sampling domain is now ALWAYS\n[0,1)³, independent of a.\n\nThe key comparison (fixed N, NVT):\n  Cartesian reweight at δa/a=0.10: ESS/n ≈ 3%\n  Fractional reweight at δa/a=0.10: ESS/n ≈ 12%   (4× improvement)\n  At δa/a=0.01: Cart ≈ 20%, Frac ≈ 97%             (5× improvement)\n\nThe improvement is qualitative: in Cartesian coordinates, molecules near\nthe boundary produce huge ΔU when the box contracts. In fractional\ncoordinates, all molecules scale smoothly with the cell.\n\nAfter completing this exercise you will be able to:\n  - Implement fractional-coordinate NVT translation moves\n  - Implement GCMC insertion/deletion moves with correct det(h) acceptance\n  - Verify ESS improvement vs Exercise 1's Cartesian reweighting\n  - Explain the measure-theoretic reason (not numerical trick) for the fix\n\nRunning example: the same N=5 molecule, 12 Å cubic cell from Exercise 1.\n\"\"\"\n\nimport os\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# DISTILL_VERIFY fast-mode switch\n# ---------------------------------------------------------------------------\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_STEPS  = 300  if VERIFY else 5_000\nN_MOLS   = 5    if VERIFY else 30\nBOX_A0   = 12.0 if VERIFY else 20.0\nBETA     = 1.0 / (8.314e-3 * 298.0)    # 1/(kBT) at 298 K\n\n# TraPPE CO₂ parameters\nEPS_CC   = 28.1 * 8.314e-3   # kJ/mol\nSIG_CC   = 2.80               # Å\nCHARGE_C = +0.70\nCHARGE_O = -0.35\nKE       = 1389.35            # Å·kJ/mol/e²\n\n# Chemical potential: tuned for sparse loading (~3-5 molecules)\n# exp(beta_mu) ≈ N_target/V → beta_mu = log(4/1728) ≈ -6.1 for verify box\nBETA_MU  = -6.0  # dimensionless (β * μ)\n\n# ---------------------------------------------------------------------------\n# Provided: energy helpers (identical to Exercise 1)\n# ---------------------------------------------------------------------------\n\ndef minimum_image_distance(q1: np.ndarray, q2: np.ndarray, a: float) -> float:\n    delta = q1 - q2\n    delta -= a * np.round(delta / a)\n    return float(np.linalg.norm(delta))\n\n\ndef total_energy_cartesian(positions: np.ndarray, charges: np.ndarray,\n                           a: float) -> float:\n    \"\"\"LJ + Coulomb energy from Cartesian positions.\"\"\"\n    if len(positions) == 0:\n        return 0.0\n    cutoff = a / 2.0\n    N = len(positions)\n    U = 0.0\n    for i in range(N):\n        for j in range(i + 1, N):\n            r = minimum_image_distance(positions[i], positions[j], a)\n            if r < 1e-8 or r >= cutoff:\n                continue\n            sr6 = (SIG_CC / r) ** 6\n            U += 4.0 * EPS_CC * (sr6 ** 2 - sr6)\n            U += KE * charges[i] * charges[j] / r\n    return U\n\n\ndef energy_of_one_in_field(q_new: np.ndarray, q_others: np.ndarray,\n                            c_new: float, charges_others: np.ndarray,\n                            a: float) -> float:\n    \"\"\"Energy of a single particle q_new with all others.\"\"\"\n    if len(q_others) == 0:\n        return 0.0\n    cutoff = a / 2.0\n    U = 0.0\n    for j in range(len(q_others)):\n        r = minimum_image_distance(q_new, q_others[j], a)\n        if r < 1e-8 or r >= cutoff:\n            continue\n        sr6 = (SIG_CC / r) ** 6\n        U += 4.0 * EPS_CC * (sr6 ** 2 - sr6)\n        U += KE * c_new * charges_others[j] / r\n    return U\n\n\n# ---------------------------------------------------------------------------\n# Provided: cell-matrix helpers\n# ---------------------------------------------------------------------------\n\ndef make_h(a: float) -> np.ndarray:\n    \"\"\"Cell matrix h for cubic cell: h = a * I₃. Columns are lattice vectors.\"\"\"\n    return a * np.eye(3)\n\n\ndef det_h(h: np.ndarray) -> float:\n    \"\"\"Determinant of cell matrix = cell volume in Å³.\"\"\"\n    return float(np.linalg.det(h))\n\n\ndef s_to_q(s: np.ndarray, h: np.ndarray) -> np.ndarray:\n    \"\"\"\n    Convert fractional → Cartesian: q = h @ s (column-vector convention).\n\n    For a row of s values: q_row = s_row @ h.T\n    \"\"\"\n    return s @ h.T\n\n\ndef build_initial_positions(n_mols: int, a: float, rng) -> np.ndarray:\n    \"\"\"Grid-based placement to avoid overlaps.\"\"\"\n    side = int(np.ceil(n_mols ** (1.0 / 3.0)))\n    spacing = a / (side + 1)\n    positions = []\n    for ix in range(side + 1):\n        for iy in range(side + 1):\n            for iz in range(side + 1):\n                if len(positions) >= n_mols:\n                    break\n                q = np.array([(ix + 0.5) * spacing,\n                              (iy + 0.5) * spacing,\n                              (iz + 0.5) * spacing]) % a\n                positions.append(q)\n            if len(positions) >= n_mols:\n                break\n        if len(positions) >= n_mols:\n            break\n    return np.array(positions[:n_mols])\n\n\ndef build_co2_charges(n_mols: int) -> np.ndarray:\n    return np.array([CHARGE_C if i % 2 == 0 else CHARGE_O for i in range(n_mols)])\n\n\n# ---------------------------------------------------------------------------\n# Provided: reweighting ESS helpers\n# ---------------------------------------------------------------------------\n\ndef compute_cartesian_log_weights(trajectory: list, charges: np.ndarray,\n                                   a0: float, a_target: float, beta: float) -> np.ndarray:\n    \"\"\"Naive Cartesian reweight: hold q fixed, change box (from Exercise 1).\"\"\"\n    N = len(charges)\n    log_jac = N * 3 * np.log(a_target / a0)\n    log_weights = []\n    for pos in trajectory:\n        U0 = total_energy_cartesian(pos, charges, a0)\n        U1 = total_energy_cartesian(pos, charges, a_target)\n        log_weights.append(log_jac - beta * (U1 - U0))\n    return np.array(log_weights)\n\n\ndef compute_fractional_log_weights_fixed_N(s_trajectory: list, charges: np.ndarray,\n                                            a0: float, a_target: float,\n                                            beta: float) -> np.ndarray:\n    \"\"\"\n    Fractional-coordinate reweight for FIXED-N trajectory.\n\n    Hold s fixed; molecules move WITH the cell: q_new = a_target * s.\n    The Jacobian N*log(det(h')/det(h)) = N*3*log(a'/a) is CONSTANT for fixed N\n    and cancels in self-normalization. ESS is determined only by Var(β*ΔU).\n\n    Parameters\n    ----------\n    s_trajectory : list of (N, 3) fractional-coord snapshots at a0\n    charges      : (N,) partial charges (same N for every snapshot)\n    a0           : reference lattice constant (Å)\n    a_target     : perturbed lattice constant (Å)\n    beta         : 1/(kBT)\n\n    Returns\n    -------\n    log_weights : (T,) unnormalized log importance weights\n    \"\"\"\n    N      = len(charges)\n    h0     = make_h(a0)\n    h_targ = make_h(a_target)\n    log_jac = N * np.log(det_h(h_targ) / det_h(h0))   # constant for fixed N\n\n    log_weights = []\n    for s_snap in s_trajectory:\n        q0  = s_to_q(s_snap, h0)\n        q_t = s_to_q(s_snap, h_targ)\n        U0  = total_energy_cartesian(q0,  charges, a0)\n        U_t = total_energy_cartesian(q_t, charges, a_target)\n        log_weights.append(log_jac - beta * (U_t - U0))\n    return np.array(log_weights)\n\n\ndef effective_sample_size(log_weights: np.ndarray) -> float:\n    \"\"\"ESS = (Σw)² / Σw² in log-space for numerical stability.\"\"\"\n    lw = log_weights - log_weights.max()\n    w  = np.exp(lw)\n    return float(w.sum() ** 2 / (w ** 2).sum())\n\n\n# ---------------------------------------------------------------------------\n# Provided: NVT MC in Cartesian coordinates (from Exercise 1)\n# ---------------------------------------------------------------------------\n\ndef run_cartesian_nvt(n_steps: int, positions: np.ndarray, charges: np.ndarray,\n                      a: float, beta: float, step_size: float = 0.5,\n                      rng=None) -> list:\n    \"\"\"NVT MC in Cartesian coords — Exercise 1 baseline.\"\"\"\n    if rng is None:\n        rng = np.random.default_rng(42)\n    pos = positions.copy()\n    U_cur = total_energy_cartesian(pos, charges, a)\n    trajectory = []\n    N = len(pos)\n    for step in range(n_steps):\n        idx   = rng.integers(0, N)\n        delta = rng.uniform(-step_size, step_size, size=3)\n        pos_new = pos.copy()\n        pos_new[idx] = (pos[idx] + delta) % a\n        U_new = total_energy_cartesian(pos_new, charges, a)\n        dU    = U_new - U_cur\n        if rng.random() < min(1.0, np.exp(-beta * dU)):\n            pos   = pos_new\n            U_cur = U_new\n        if step % 5 == 0:\n            trajectory.append(pos.copy())\n    return trajectory\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 1\n# ---------------------------------------------------------------------------\n\ndef run_fractional_nvt(n_steps: int, s_initial: np.ndarray, charges: np.ndarray,\n                       h: np.ndarray, beta: float, step_size: float = 0.05,\n                       rng=None) -> list:\n    \"\"\"\n    NVT MC with positions tracked in fractional coordinates.\n\n    Translation: s_i' = (s_i + Δs) mod 1.0, where Δs ∈ [-step_size, +step_size]³.\n    The step_size is in FRACTIONAL units — it automatically scales with the cell.\n\n    Energy is evaluated in CARTESIAN space after converting q = h @ s.\n    Minimum-image distances must be computed in CARTESIAN space.\n\n    Parameters\n    ----------\n    n_steps   : number of MC moves\n    s_initial : (N, 3) initial fractional coordinates in [0,1)³\n    charges   : (N,) partial charges\n    h         : (3,3) cell matrix; for cubic, h = a*I\n    beta      : 1/(kBT)\n    step_size : max displacement in fractional units\n    rng       : numpy Generator\n\n    Returns\n    -------\n    s_trajectory : list of (N, 3) fractional-coord snapshots (every 5 steps)\n    \"\"\"\n    if rng is None:\n        rng = np.random.default_rng(42)\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. a = h[0, 0]  (cubic case)                           #\n    # 2. s = s_initial.copy()                                 #\n    # 3. q = s_to_q(s, h)                                    #\n    # 4. U_cur = total_energy_cartesian(q, charges, a)        #\n    # 5. trajectory = []                                      #\n    # 6. Loop n_steps:                                        #\n    #    a. idx = rng.integers(0, N)                         #\n    #    b. delta_s = rng.uniform(-step_size, +step_size, 3) #\n    #    c. s_new = s.copy(); s_new[idx] = (s[idx]+delta_s)%1#\n    #    d. q_new = s_to_q(s_new, h)                         #\n    #    e. U_new = total_energy_cartesian(q_new, charges, a) #\n    #    f. Metropolis accept/reject                          #\n    #    g. if step % 5 == 0: trajectory.append(s.copy())    #\n    # 7. return trajectory                                    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 2\n# ---------------------------------------------------------------------------\n\ndef fractional_reweight_gradient(s_trajectory: list, charges: np.ndarray,\n                                  a0: float, delta_a: float,\n                                  beta: float) -> float:\n    \"\"\"\n    d⟨U⟩/da via fractional-coordinate central-difference reweighting.\n\n    Central-difference formula:\n        d⟨U⟩/da ≈ [⟨U⟩_{a+δa} - ⟨U⟩_{a-δa}] / (2 * δa)\n\n    Each ⟨U⟩ computed via self-normalized importance weighting using\n    compute_fractional_log_weights_fixed_N.\n\n    Parameters\n    ----------\n    s_trajectory : list of (N, 3) fractional-coord snapshots at a0\n    charges      : (N,) partial charges (fixed N)\n    a0           : reference lattice constant (Å)\n    delta_a      : perturbation (Å)\n    beta         : 1/(kBT)\n\n    Returns\n    -------\n    gradient : float, d⟨U⟩/da in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # Steps (mirror naive_reweight_gradient from Ex 1):       #\n    # 1. Compute lw_plus for a0+delta_a using                 #\n    #    compute_fractional_log_weights_fixed_N               #\n    # 2. Compute lw_minus for a0-delta_a                      #\n    # 3. Self-normalize: w = exp(lw - lw.max()), w/=w.sum()  #\n    # 4. Evaluate U(h(a+δa)·s; a+δa) for each snapshot       #\n    #    using: total_energy_cartesian(s_to_q(s, make_h(a')), #\n    #                                  charges, a')           #\n    # 5. Weighted average of each, return (U_plus-U_minus)    #\n    #    / (2*delta_a)                                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 3\n# ---------------------------------------------------------------------------\n\ndef fractional_insert(key_tuple: tuple, state_s: list, state_charges: list,\n                      h: np.ndarray, beta_mu: float, beta: float,\n                      charge_new: float):\n    \"\"\"\n    Propose and possibly accept a grand-canonical insertion in fractional coords.\n\n    Insertion acceptance criterion:\n\n        acc = min(1, exp(β_mu) · det(h) / (N+1) · exp(-β ΔU))\n\n    The det(h) = a³ factor is the Jacobian: the fugacity z = exp(βμ)/Λ³ has\n    units 1/Å³, so z · d³q = z · det(h) · d³s. By absorbing Λ³ into β_mu,\n    the criterion becomes:  exp(β_mu) · det(h) / (N+1) · exp(-β ΔU).\n\n    Parameters\n    ----------\n    key_tuple     : (rng_pos, rng_acc)\n    state_s       : list of (3,) fractional arrays — current molecules\n    state_charges : list of floats — current charges\n    h             : (3,3) cell matrix\n    beta_mu       : dimensionless β·μ (chemical potential)\n    beta          : 1/(kBT)\n    charge_new    : partial charge of the molecule to insert\n\n    Returns\n    -------\n    (new_s_list, new_charges_list, accepted : bool)\n    \"\"\"\n    rng_pos, rng_acc = key_tuple\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # 1. s_new = rng_pos.uniform(0, 1, size=3)               #\n    # 2. q_new = s_to_q(s_new, h)                            #\n    # 3. a = h[0,0]                                          #\n    # 4. q_others = s_to_q(array(state_s), h)  if N > 0     #\n    # 5. dU = energy_of_one_in_field(q_new, q_others, ...)   #\n    # 6. V = det_h(h)                                        #\n    # 7. acc = min(1, exp(beta_mu) * V/(N+1) * exp(-beta*dU))#\n    # 8. if rng_acc.random() < acc:                          #\n    #       return state+[s_new], charges+[charge_new], True #\n    # 9. else return state unchanged, False                   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 4\n# ---------------------------------------------------------------------------\n\ndef fractional_delete(key_tuple: tuple, state_s: list, state_charges: list,\n                      h: np.ndarray, beta_mu: float, beta: float):\n    \"\"\"\n    Propose and possibly accept a grand-canonical deletion in fractional coords.\n\n    Deletion acceptance (inverse of insertion):\n\n        acc = min(1, N / (exp(β_mu) · det(h)) · exp(+β ΔU_insert))\n\n    where ΔU_insert is the energy gained if we were to INSERT the deleted\n    molecule back.\n\n    Parameters\n    ----------\n    key_tuple     : (rng_pick, rng_acc)\n    state_s       : list of (3,) fractional arrays\n    state_charges : list of floats\n    h             : (3,3) cell matrix\n    beta_mu, beta : chemical potential and inverse temperature\n\n    Returns\n    -------\n    (new_s_list, new_charges_list, accepted : bool)\n    \"\"\"\n    N = len(state_s)\n    if N == 0:\n        return list(state_s), list(state_charges), False\n    rng_pick, rng_acc = key_tuple\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # 1. idx = rng_pick.integers(0, N)                       #\n    # 2. a = h[0,0]                                          #\n    # 3. q_all = s_to_q(array(state_s), h)                  #\n    # 4. q_del = q_all[idx]                                  #\n    # 5. q_rest = q_all without row idx                      #\n    # 6. dU_insert = energy_of_one_in_field(q_del, q_rest,   #\n    #        state_charges[idx], charges_rest, a)            #\n    # 7. acc = min(1, N/(exp(beta_mu)*det_h(h))*exp(β*dU))  #\n    # 8. if rng_acc.random() < acc: remove idx, return True  #\n    # 9. else return unchanged, False                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: fractional NVT runner (for use in __main__)\n# ---------------------------------------------------------------------------\n\ndef run_fractional_nvt_helper(n_steps, s_eq, charges, h0, beta, rng):\n    \"\"\"Thin wrapper that catches NotImplementedError during verify.\"\"\"\n    try:\n        return run_fractional_nvt(n_steps, s_eq, charges, h0, beta, rng=rng)\n    except NotImplementedError:\n        raise\n\n\n# ---------------------------------------------------------------------------\n# Provided __main__ — do not modify\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    print(\"=\" * 65)\n    print(\"Exercise 2: Fractional-coordinate GCMC — θ-invariant support\")\n    print(\"=\" * 65)\n\n    rng = np.random.default_rng(1)\n    h0  = make_h(BOX_A0)\n    charges = build_co2_charges(N_MOLS)\n\n    # Build grid starting positions (well-separated)\n    q_init = build_initial_positions(N_MOLS, BOX_A0, rng)\n\n    # Burn-in in Cartesian (shared starting point)\n    burn = N_STEPS // 2\n    print(f\"\\nBurn-in: {burn} Cartesian NVT steps...\", flush=True)\n    burn_traj_q = run_cartesian_nvt(burn, q_init, charges, BOX_A0, BETA, rng=rng)\n    q_eq = burn_traj_q[-1] if burn_traj_q else q_init\n\n    # Convert to fractional for the fractional sampler\n    s_eq = q_eq / BOX_A0   # cubic: s = q/a\n\n    # Production trajectories (same RNG seed for both)\n    print(f\"Production ({N_STEPS} steps each)...\", flush=True)\n    rng_c = np.random.default_rng(99)\n    rng_f = np.random.default_rng(99)\n\n    traj_cartesian  = run_cartesian_nvt(\n        N_STEPS, q_eq,  charges, BOX_A0, BETA, rng=rng_c)\n    traj_fractional = run_fractional_nvt(\n        N_STEPS, s_eq, charges, h0, BETA, rng=rng_f)\n\n    print(f\"Cartesian frames:  {len(traj_cartesian)}\")\n    print(f\"Fractional frames: {len(traj_fractional)}\\n\")\n\n    # --- ESS comparison table ---\n    print(f\"{'δa/a':>8}  {'Cart ESS/n':>12}  {'Frac ESS/n':>12}  \"\n          f\"{'Improvement':>11}\")\n    print(\"-\" * 55)\n\n    fracs = [0.001, 0.01, 0.1] if VERIFY else [0.001, 0.005, 0.01, 0.02, 0.05, 0.1]\n    n = len(traj_cartesian)\n\n    for frac in fracs:\n        da = frac * BOX_A0\n        lw_c = compute_cartesian_log_weights(\n            traj_cartesian, charges, BOX_A0, BOX_A0 + da, BETA)\n        lw_f = compute_fractional_log_weights_fixed_N(\n            traj_fractional, charges, BOX_A0, BOX_A0 + da, BETA)\n        ess_c = effective_sample_size(lw_c) / n\n        ess_f = effective_sample_size(lw_f) / len(traj_fractional)\n        ratio = ess_f / max(ess_c, 1e-9)\n        print(f\"  {frac:>6.3f}  {ess_c:>12.2f}  {ess_f:>12.2f}  \"\n              f\"{'×' + str(round(ratio, 1)):>11}\")\n\n    # --- Core assertion: fractional must be better than Cartesian ---\n    print()\n    da_big  = 0.1 * BOX_A0\n    lw_c_10 = compute_cartesian_log_weights(\n        traj_cartesian, charges, BOX_A0, BOX_A0 + da_big, BETA)\n    lw_f_10 = compute_fractional_log_weights_fixed_N(\n        traj_fractional, charges, BOX_A0, BOX_A0 + da_big, BETA)\n    ess_c10 = effective_sample_size(lw_c_10) / n\n    ess_f10 = effective_sample_size(lw_f_10) / len(traj_fractional)\n    ratio10 = ess_f10 / max(ess_c10, 1e-9)\n\n    min_ratio = 1.5 if VERIFY else 3.0\n    if ratio10 >= min_ratio and ess_f10 > ess_c10:\n        print(f\"ESS/n at δa/a=0.10 — Cart: {ess_c10:.2f}, Frac: {ess_f10:.2f} \"\n              f\"(×{ratio10:.1f} improvement)  ✓\")\n        print()\n        print(\"Fractional sampling: support is θ-invariant.\")\n        print(\"ESS preserved under 10% lattice perturbation.\")\n    else:\n        print(f\"ESS/n at δa/a=0.10 — Cart: {ess_c10:.2f}, Frac: {ess_f10:.2f}\")\n        print(f\"  Expected fractional ≥ {min_ratio}× Cartesian; got {ratio10:.1f}×\")\n        print(\"  Check: is minimum-image done in CARTESIAN space, not s-space?\")\n\n    # --- Gradient demo ---\n    print()\n    da_demo = 0.001 * BOX_A0\n    grad_f = fractional_reweight_gradient(\n        traj_fractional, charges, BOX_A0, da_demo, BETA)\n    print(f\"Fractional d⟨U⟩/da at δa/a=0.001: {grad_f:.4f} kJ/mol/Å\")\n    print(\"=\" * 65)\n"}, {"filename": "ex03_ewald_cellderivative__ureca_by_hand.py", "content": "\"\"\"\nExercise 3: Ewald cell-derivative — ∂U_rec/∂a by hand\n======================================================\n\nIn the fractional-coordinate framework, differentiating U w.r.t. the lattice\nconstant a has TWO contributions (the lesson's \"Figure 3\"):\n\n  1. Position path (virial): ∂U/∂q_i · ∂q_i/∂a = ∂U/∂q_i · s_i\n     This is captured by any autodiff system.\n\n  2. G-lattice path: the reciprocal lattice G = 2π h⁻ᵀ n scales with 1/a,\n     changing the Ewald prefactor f_n(a) = exp(-π²|n|²/(α²a²)) / ((2π)³ a |n|²).\n     This is NOT captured if you only differentiate through q = h·s.\n\n     KEY RESULT: In fractional coordinates, |S(G)|² = |Σ_j q_j exp(2πi n·s_j)|²\n     is independent of a (the a in G and the a in q cancel). So:\n\n         ∂U_rec/∂a = Σ_{n≠0} (∂f_n/∂a) |S_n(s)|²\n\n     where ∂f_n/∂a = f_n(a) · [−1/a + 2π²|n|²/(α²a³)]\n\nMissing this term → sign disagreement with FD → \"Kill lattice phase\" failure.\n\nAfter completing this exercise you will be able to:\n  - Implement the full Ewald sum (real + reciprocal + self)\n  - Implement the analytic ∂U_rec/∂a via the G-lattice path\n  - Validate against jax.grad to < 1e-8 absolute error\n  - Explain why the structure factor |S(G)|² is a-independent in fractional coords\n\nSystem: 4-atom cell with charges ±1, cubic box, α = 0.3 Å⁻¹.\n\"\"\"\n\nimport os\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# If JAX is unavailable, fall back to finite-difference reference\ntry:\n    import jax\n    import jax.numpy as jnp\n    JAX_AVAILABLE = True\nexcept ImportError:\n    JAX_AVAILABLE = False\n    print(\"WARNING: JAX not found — using finite-difference reference instead\")\n\n# Ewald convergence parameters\nALPHA    = 0.3    # Å⁻¹   — Ewald splitting parameter\nN_MAX    = 3      # reciprocal lattice: |n_x|, |n_y|, |n_z| ≤ N_MAX\nKE       = 1389.35  # Å·kJ/mol/e²  (Coulomb constant in MD units)\n\n# ---------------------------------------------------------------------------\n# Provided: 4-atom test system\n# ---------------------------------------------------------------------------\n\ndef make_test_system(a: float = 8.0):\n    \"\"\"\n    A 4-atom system in a cubic cell with charges ±1.\n\n    Fractional coordinates are fixed; Cartesian positions depend on a.\n\n    Returns\n    -------\n    s : (4, 3) fractional coordinates\n    charges : (4,) charges in elementary-charge units\n    h : (3, 3) cell matrix = a * I₃\n    \"\"\"\n    s = np.array([\n        [0.00, 0.00, 0.00],   # corner\n        [0.50, 0.50, 0.50],   # body center\n        [0.25, 0.75, 0.25],   # face-ish\n        [0.75, 0.25, 0.75],   # face-ish\n    ])\n    charges = np.array([+1.0, -1.0, +1.0, -1.0])\n    h = a * np.eye(3)\n    return s, charges, h\n\n\ndef get_reciprocal_vectors(h: np.ndarray, n_max: int):\n    \"\"\"\n    Generate all reciprocal lattice vectors G = 2π h⁻ᵀ n, |n_α| ≤ n_max,\n    excluding n = (0,0,0).\n\n    Parameters\n    ----------\n    h     : (3,3) cell matrix (columns = real-space lattice vectors)\n    n_max : maximum Miller index along each axis\n\n    Returns\n    -------\n    G_vecs : (M, 3) array of G vectors in Å⁻¹\n    n_vecs : (M, 3) integer Miller indices\n    \"\"\"\n    h_inv_T = np.linalg.inv(h).T   # (h⁻ᵀ), so G = 2π * h⁻ᵀ @ n\n    G_list, n_list = [], []\n    for nx in range(-n_max, n_max + 1):\n        for ny in range(-n_max, n_max + 1):\n            for nz in range(-n_max, n_max + 1):\n                if nx == 0 and ny == 0 and nz == 0:\n                    continue\n                n_vec = np.array([nx, ny, nz], dtype=float)\n                G = 2 * np.pi * h_inv_T @ n_vec\n                G_list.append(G)\n                n_list.append(n_vec)\n    return np.array(G_list), np.array(n_list)\n\n\n# ---------------------------------------------------------------------------\n# Provided: Ewald real-space sum\n# ---------------------------------------------------------------------------\n\ndef U_real(s: np.ndarray, charges: np.ndarray, h: np.ndarray,\n           alpha: float, r_cut: float = None) -> float:\n    \"\"\"\n    Ewald real-space sum:\n\n        U_real = Σ_{i<j} q_i q_j * erfc(α r_ij) / r_ij   (in KE units)\n\n    Parameters\n    ----------\n    s       : (N, 3) fractional coordinates\n    charges : (N,) partial charges\n    h       : (3,3) cell matrix\n    alpha   : Ewald splitting parameter (Å⁻¹)\n    r_cut   : real-space cutoff (Å); defaults to half the smallest cell length\n\n    Returns\n    -------\n    energy in kJ/mol  (with Coulomb constant KE absorbed)\n    \"\"\"\n    from scipy.special import erfc as scipy_erfc\n\n    a = h[0, 0]\n    if r_cut is None:\n        r_cut = a / 2.0\n\n    q_cart = s @ h.T    # (N, 3) Cartesian\n    N      = len(charges)\n    U      = 0.0\n    for i in range(N):\n        for j in range(i + 1, N):\n            r_vec = q_cart[i] - q_cart[j]\n            r_vec -= a * np.round(r_vec / a)   # minimum image\n            r = np.linalg.norm(r_vec)\n            if r < 1e-8 or r > r_cut:\n                continue\n            U += KE * charges[i] * charges[j] * scipy_erfc(alpha * r) / r\n    return U\n\n\ndef U_self(charges: np.ndarray, alpha: float) -> float:\n    \"\"\"\n    Ewald self-energy correction:\n\n        U_self = -α / sqrt(π) * Σ_i q_i²   (in KE units)\n    \"\"\"\n    return -KE * alpha / np.sqrt(np.pi) * np.sum(charges ** 2)\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 1\n# ---------------------------------------------------------------------------\n\ndef U_rec(s: np.ndarray, charges: np.ndarray, h: np.ndarray,\n          alpha: float, n_max: int = N_MAX) -> float:\n    \"\"\"\n    Ewald reciprocal-space sum:\n\n        U_rec = (1 / 2π V) Σ_{G≠0} exp(-G²/4α²) / G² * |S(G)|²\n\n    where:\n        V = det(h)\n        G = 2π h⁻ᵀ n  (reciprocal lattice vector for integer triple n)\n        S(G) = Σ_j q_j exp(i G · q_j)   (structure factor)\n\n    KEY INSIGHT: In fractional coordinates, G·q = 2π n·s (a-independent),\n    so the structure factor can be computed directly from s without knowing a.\n\n    Parameters\n    ----------\n    s       : (N, 3) fractional coordinates\n    charges : (N,) partial charges\n    h       : (3,3) cell matrix\n    alpha   : Ewald splitting parameter (Å⁻¹)\n    n_max   : max |n| along each axis\n\n    Returns\n    -------\n    energy in kJ/mol  (KE absorbed)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. V = det_h(h)  (cell volume)                         #\n    # 2. prefactor = 1 / (2π * V)                            #\n    # 3. G_vecs, n_vecs = get_reciprocal_vectors(h, n_max)   #\n    # 4. For each G in G_vecs:                               #\n    #    a. G2 = |G|²                                        #\n    #    b. gauss = exp(-G2 / (4*alpha²))                    #\n    #    c. Structure factor: S = Σ_j charges[j] *           #\n    #         exp(1j * 2*pi * n_vecs[k] · s[j])              #\n    #       (use the fractional-space formula for efficiency) #\n    #    d. U += KE * prefactor * gauss / G2 * |S|²          #\n    # 5. return U                                             #\n    #                                                         #\n    # Hint: np.dot(n_vecs[k], s[j]) gives the phase angle    #\n    # divided by 2π in fractional coordinates.               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 2\n# ---------------------------------------------------------------------------\n\ndef dU_rec_da(s: np.ndarray, charges: np.ndarray, h: np.ndarray,\n              alpha: float, n_max: int = N_MAX) -> float:\n    \"\"\"\n    Analytic ∂U_rec/∂a for cubic cell h = a*I.\n\n    In fractional coordinates, |S(G)|² = |Σ_j q_j exp(2πi n·s_j)|² is\n    INDEPENDENT of a (the phases are 2π n·s, not G·q). So only the prefactor\n    f_n(a) depends on a:\n\n        f_n(a) = exp(-π²|n|²/(α²a²)) / ((2π)³ * a * |n|²)\n\n    Derivative:\n        ∂f_n/∂a = f_n(a) * [-1/a + 2π²|n|²/(α²a³)]\n\n    Therefore:\n        ∂U_rec/∂a = KE * Σ_{n≠0} (∂f_n/∂a) * |S_n(s)|²\n\n    Parameters\n    ----------\n    s       : (N, 3) fractional coordinates\n    charges : (N,) partial charges\n    h       : (3,3) cell matrix; must be cubic (h = a*I)\n    alpha   : Ewald splitting parameter (Å⁻¹)\n    n_max   : max |n| along each axis\n\n    Returns\n    -------\n    ∂U_rec/∂a  in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~20 lines (the key function)           #\n    #                                                         #\n    # Setup:                                                  #\n    # 1. a = h[0, 0]                                         #\n    # 2. _, n_vecs = get_reciprocal_vectors(h, n_max)        #\n    #    (we don't need G_vecs — we work in n-space)         #\n    # 3. n_uniq: de-duplicate by |n|² to avoid redundant     #\n    #    n and -n pairs (they give the same |S|²).           #\n    #    Simpler: just loop over all n_vecs (slight redundancy#\n    #    is ok, ∂U_rec/∂a sum will be exact).                #\n    #                                                         #\n    # Loop over each n_vec in n_vecs:                         #\n    # 4. n2 = |n_vec|² = dot(n_vec, n_vec)                   #\n    # 5. f_n = exp(-π²*n2/(α²*a²)) / ((2π)³ * a * n2)       #\n    # 6. df_n_da = f_n * (-1/a + 2*π²*n2/(α²*a³))           #\n    # 7. S_n = Σ_j charges[j] * exp(2πi * dot(n_vec, s[j]))  #\n    # 8. dU += KE * df_n_da * |S_n|²                         #\n    #                                                         #\n    # Return dU                                               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 3\n# ---------------------------------------------------------------------------\n\ndef dU_real_da(s: np.ndarray, charges: np.ndarray, h: np.ndarray,\n               alpha: float, r_cut: float = None) -> float:\n    \"\"\"\n    Analytic ∂U_real/∂a for cubic cell h = a*I, fractional coordinates.\n\n    In fractional coordinates, all pairwise distances scale as r = a * |s_ij|_min.\n    Differentiating the real-space erfc sum through r = a * r̂ (where r̂ is the\n    minimum-image separation in fractional units):\n\n        ∂U_real/∂a = Σ_{i<j} q_i q_j * ∂/∂a [erfc(α a r̂_ij) / (a r̂_ij)]\n\n    Let r = a * r̂. Then:\n        ∂/∂a [erfc(α r) / r] = [∂/∂r (erfc(α r) / r)] * r̂\n                              = [-erfc(α r)/r² - 2α exp(-α²r²)/(√π r)] * r̂\n                              = (-erfc(α r)/r - 2α r exp(-α²r²)/√π) * r̂/r\n\n    Parameters\n    ----------\n    s       : (N, 3) fractional coordinates\n    charges : (N,) partial charges\n    h       : (3,3) cell matrix; cubic h = a*I\n    alpha   : Ewald splitting parameter\n    r_cut   : cutoff in Å (defaults to a/2)\n\n    Returns\n    -------\n    ∂U_real/∂a in kJ/mol/Å\n    \"\"\"\n    from scipy.special import erfc as scipy_erfc\n\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # 1. a = h[0,0]; r_cut = r_cut or a/2                    #\n    # 2. q = s @ h.T  (Cartesian positions)                  #\n    # 3. For each i < j pair with r < r_cut:                 #\n    #    a. r_vec = q[i] - q[j]; apply min-image             #\n    #    b. r = norm(r_vec)                                   #\n    #    c. r_hat = |fractional distance| = r / a             #\n    #    d. dU_dr = KE * charges[i]*charges[j] *             #\n    #               (-erfc(alpha*r)/r²                       #\n    #                - 2*alpha*exp(-alpha²r²)/sqrt(π)/r)     #\n    #    e. dr_da = r / a  (because r = a * r_hat)            #\n    #    f. dU += dU_dr * dr_da                               #\n    # 4. Return dU                                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 4\n# ---------------------------------------------------------------------------\n\ndef dU_total_da(s: np.ndarray, charges: np.ndarray, h: np.ndarray,\n                alpha: float) -> float:\n    \"\"\"\n    Full analytic ∂U_Ewald/∂a = ∂U_real/∂a + ∂U_rec/∂a.\n\n    (The self-energy U_self = -KE * α/√π * Σ q_i² is independent of a,\n    so ∂U_self/∂a = 0.)\n\n    Parameters\n    ----------\n    s, charges, h, alpha : see dU_rec_da and dU_real_da\n\n    Returns\n    -------\n    ∂U_total/∂a in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 5 lines                                #\n    #                                                         #\n    # Simply:                                                  #\n    #   dU_rec_term  = dU_rec_da(s, charges, h, alpha)        #\n    #   dU_real_term = dU_real_da(s, charges, h, alpha)       #\n    #   return dU_rec_term + dU_real_term                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: reference via JAX autodiff or finite difference\n# ---------------------------------------------------------------------------\n\ndef U_ewald_total(s: np.ndarray, charges: np.ndarray, h: np.ndarray,\n                  alpha: float) -> float:\n    \"\"\"Full Ewald energy: U_real + U_rec + U_self.\"\"\"\n    return (U_real(s, charges, h, alpha)\n            + U_rec(s, charges, h, alpha)\n            + U_self(charges, alpha))\n\n\ndef reference_dU_da(s: np.ndarray, charges: np.ndarray, a: float,\n                    alpha: float, delta: float = 1e-5) -> float:\n    \"\"\"\n    Finite-difference reference for ∂U/∂a (central difference).\n\n    If JAX is available, uses jax.grad for machine-precision comparison.\n    Otherwise uses central finite differences with step delta.\n    \"\"\"\n    if JAX_AVAILABLE:\n        def U_of_a(a_val):\n            h_jax = jnp.array([[a_val, 0., 0.],\n                                [0., a_val, 0.],\n                                [0., 0., a_val]])\n            s_jax = jnp.array(s)\n            ch_jax = jnp.array(charges)\n            return (U_real_jax(s_jax, ch_jax, h_jax, alpha)\n                    + U_rec_jax(s_jax, ch_jax, h_jax, alpha)\n                    + U_self(charges, alpha))\n\n        # Fall back to FD if JAX U functions not implemented\n        try:\n            grad_fn = jax.grad(U_of_a)\n            return float(grad_fn(float(a)))\n        except Exception:\n            pass\n\n    # Finite-difference fallback\n    h_plus  = make_h_np(a + delta)\n    h_minus = make_h_np(a - delta)\n    U_plus  = U_ewald_total(s, charges, h_plus,  alpha)\n    U_minus = U_ewald_total(s, charges, h_minus, alpha)\n    return (U_plus - U_minus) / (2.0 * delta)\n\n\ndef make_h_np(a: float) -> np.ndarray:\n    return a * np.eye(3)\n\n\n# Minimal JAX versions for the reference (if JAX available)\nif JAX_AVAILABLE:\n    from functools import partial\n\n    def U_real_jax(s, charges, h, alpha):\n        \"\"\"JAX-compatible Ewald real-space sum.\"\"\"\n        from jax.scipy.special import erfc as jax_erfc\n        a = h[0, 0]\n        q = s @ h.T\n        N = len(charges)\n        U = jnp.array(0.0)\n        for i in range(N):\n            for j in range(i + 1, N):\n                r_vec = q[i] - q[j]\n                r_vec = r_vec - a * jnp.round(r_vec / a)\n                r = jnp.linalg.norm(r_vec)\n                U = U + KE * charges[i] * charges[j] * jax_erfc(alpha * r) / r\n        return U\n\n    def U_rec_jax(s, charges, h, alpha):\n        \"\"\"JAX-compatible Ewald reciprocal-space sum.\"\"\"\n        V = jnp.linalg.det(h)\n        pref = 1.0 / (2.0 * jnp.pi * V)\n        G_vecs, n_vecs = get_reciprocal_vectors(np.array(h), N_MAX)\n        U = jnp.array(0.0)\n        for k in range(len(G_vecs)):\n            G = jnp.array(G_vecs[k])\n            G2 = jnp.dot(G, G)\n            phase = 2.0 * jnp.pi * s @ n_vecs[k]\n            S = jnp.sum(charges * jnp.exp(1j * phase))\n            gauss = jnp.exp(-G2 / (4.0 * alpha ** 2))\n            U = U + KE * pref * gauss / G2 * (jnp.abs(S) ** 2).real\n        return U.real\n\n\n# ---------------------------------------------------------------------------\n# Provided __main__ — do not modify\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    print(\"=\" * 60)\n    print(\"Exercise 3: Ewald cell-derivative — ∂U_rec/∂a by hand\")\n    print(\"=\" * 60)\n\n    a_test = 8.0\n    s, charges, h = make_test_system(a_test)\n\n    print(f\"\\nTest system: 4 atoms, a={a_test} Å, charges ±1\")\n    print(f\"α={ALPHA} Å⁻¹, n_max={N_MAX}\")\n\n    # --- Verify U_rec first ---\n    U_r = U_real(s, charges, h, ALPHA)\n    U_rc = U_rec(s, charges, h, ALPHA)\n    U_s = U_self(charges, ALPHA)\n    U_tot = U_r + U_rc + U_s\n    print(f\"\\nEwald energy breakdown:\")\n    print(f\"  U_real = {U_r:.6f} kJ/mol\")\n    print(f\"  U_rec  = {U_rc:.6f} kJ/mol\")\n    print(f\"  U_self = {U_s:.6f} kJ/mol\")\n    print(f\"  U_tot  = {U_tot:.6f} kJ/mol\")\n\n    # --- Compute analytic ∂U/∂a ---\n    dU_rec_val  = dU_rec_da(s, charges, h, ALPHA)\n    dU_real_val = dU_real_da(s, charges, h, ALPHA)\n    dU_tot_val  = dU_total_da(s, charges, h, ALPHA)\n\n    print(f\"\\nAnalytic gradient breakdown:\")\n    print(f\"  ∂U_real/∂a = {dU_real_val:.8f} kJ/mol/Å\")\n    print(f\"  ∂U_rec/∂a  = {dU_rec_val:.8f} kJ/mol/Å\")\n    print(f\"  ∂U_tot/∂a  = {dU_tot_val:.8f} kJ/mol/Å\")\n\n    # --- Reference: finite-difference with tighter step ---\n    print(f\"\\nFinite-difference reference (δa = 1e-5 Å):\")\n    dU_ref = reference_dU_da(s, charges, a_test, ALPHA, delta=1e-5)\n    print(f\"  ∂U/∂a (ref) = {dU_ref:.8f} kJ/mol/Å\")\n\n    abs_err = abs(dU_tot_val - dU_ref)\n    print(f\"\\nMax abs error (analytic vs reference): {abs_err:.2e}\")\n\n    tol = 0.01  # 10 kJ/mol/Å absolute — FD has limited precision in numpy\n    if JAX_AVAILABLE:\n        tol = 1e-5   # tighter with JAX autograd reference\n\n    if abs_err < tol:\n        print(f\"  ✓  Error < {tol:.0e} kJ/mol/Å\")\n        print()\n        print(\"Ewald cell-derivative verified.\")\n        print(f\"  ∂U_rec/∂a = (prefactor term {dU_rec_val:.6f})\")\n        print(f\"            + (virial/real term {dU_real_val:.6f})\")\n        if JAX_AVAILABLE:\n            print(\"  [JAX autograd used as reference — machine precision]\")\n        else:\n            print(\"  [Finite-difference used as reference — 1e-5 Å step]\")\n    else:\n        print(f\"  ✗  Error {abs_err:.2e} ≥ {tol:.0e} kJ/mol/Å\")\n        print(\"  Check: did you include both G·q and ∂G/∂a terms?\")\n        print(\"  Hint: in fractional coords, |S(G)|² is a-independent —\")\n        print(\"        only the prefactor f_n(a) contributes to ∂U_rec/∂a.\")\n\n    print(\"=\" * 60)\n"}, {"filename": "ex04_endtoend_lattice_gradient_vs_finite_difference__th.py", "content": "\"\"\"\nExercise 4: End-to-end lattice gradient vs finite difference — the paper's 10% gate\n====================================================================================\n\nThis is the capstone exercise for Module 3. You will wire together:\n  - Fractional-coordinate GCMC sampling (Exercise 2)\n  - Analytic Ewald ∂U/∂a (Exercise 3)\n  - Score-function gradient estimator (Module 0: ∂⟨N⟩/∂a = −β Cov(N, ∂U/∂a))\n\nand validate the result against a two-point finite-difference reference.\n\nThe paper's binary kill/keep gate:\n  \"Fractional lattice gradient sign-disagrees with FD > 10%\n   → Chain-rule bug → Kill lattice phase\"\n\nA sign error means the optimizer would move the MOF in the WRONG direction.\nThis is not a statistical error — it's a systematic chain-rule bug. The most\ncommon cause: missing the Ewald G-lattice term (∂U_rec/∂a from Exercise 3).\n\nAfter completing this exercise you will be able to:\n  - Implement the complete score-function estimator for ∂⟨N⟩/∂a\n  - Run the FD reference correctly (fractional-sampling at each perturbed a)\n  - Check sign agreement and relative error\n  - Understand what \"Gate: PASS\" and \"Gate: FAIL\" mean physically\n\nSystem: 16 Å cubic cell, CO₂ at T=298K, moderate loading.\n(Uses a simple NVT proxy for GCMC — the gradient formula is identical.)\n\"\"\"\n\nimport os\nimport numpy as np\nfrom scipy.special import erfc\n\n# Import helpers from previous exercises\nimport sys, pathlib\nHERE = pathlib.Path(__file__).parent\nsys.path.insert(0, str(HERE))\n\n# We re-import the needed pieces inline to keep this file standalone\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_STEPS  = 400  if VERIFY else 8_000    # MC steps\nN_MOLS   = 5    if VERIFY else 25       # molecule count\nBOX_A0   = 12.0 if VERIFY else 16.0    # Å — reference lattice constant\nBETA     = 1.0 / (8.314e-3 * 298.0)   # 1/(kBT) at 298K\n\n# TraPPE CO₂ partial charges\nQ_C  = +0.70   # carbon\nQ_O  = -0.35   # oxygen\n\n# LJ parameters (C-C interaction for TraPPE CO₂ simplified to single site)\nEPS  = 28.1 * 8.314e-3   # kJ/mol\nSIG  = 2.80               # Å\nKE   = 1389.35            # Å·kJ/mol/e²\n\n# Ewald parameters\nALPHA = 0.3      # Å⁻¹\nN_MAX = 3        # reciprocal lattice truncation\n\n# Finite-difference step for reference\nDELTA_A_FD = 0.02  # Å  (δa/a ≈ 0.1% for 16Å cell)\n\n# ---------------------------------------------------------------------------\n# Provided: all energy and cell helpers (self-contained)\n# ---------------------------------------------------------------------------\n\ndef make_h(a):\n    return a * np.eye(3)\n\n\ndef s_to_q(s, h):\n    return s @ h.T\n\n\ndef minimum_image(r_vec, a):\n    return r_vec - a * np.round(r_vec / a)\n\n\ndef lj_coulomb_energy(q: np.ndarray, charges: np.ndarray, a: float) -> float:\n    \"\"\"LJ + Coulomb pairwise energy (no Ewald; for use in GCMC moves).\"\"\"\n    N = len(q)\n    U = 0.0\n    cutoff = a / 2.0\n    for i in range(N):\n        for j in range(i + 1, N):\n            r_vec = minimum_image(q[i] - q[j], a)\n            r = np.linalg.norm(r_vec)\n            if r < 1e-8 or r >= cutoff:\n                continue\n            sr6 = (SIG / r) ** 6\n            U += 4.0 * EPS * (sr6 ** 2 - sr6)\n            U += KE * charges[i] * charges[j] / r\n    return U\n\n\ndef get_n_vecs(n_max):\n    \"\"\"All non-zero integer triples n with |n_α| ≤ n_max.\"\"\"\n    n_list = []\n    for nx in range(-n_max, n_max + 1):\n        for ny in range(-n_max, n_max + 1):\n            for nz in range(-n_max, n_max + 1):\n                if nx == 0 and ny == 0 and nz == 0:\n                    continue\n                n_list.append([nx, ny, nz])\n    return np.array(n_list, dtype=float)\n\n\nN_VECS = get_n_vecs(N_MAX)   # precomputed once\n\n\ndef U_rec(s: np.ndarray, charges: np.ndarray, a: float) -> float:\n    \"\"\"Ewald reciprocal sum (cubic cell), fractional-space formula.\"\"\"\n    V    = a ** 3\n    pref = 1.0 / (2.0 * np.pi * V)\n    U = 0.0\n    for n_vec in N_VECS:\n        G_mag = 2.0 * np.pi * np.linalg.norm(n_vec) / a\n        G2    = G_mag ** 2\n        gauss = np.exp(-G2 / (4.0 * ALPHA ** 2))\n        # Structure factor — a-independent in fractional coords\n        phases = 2.0 * np.pi * (s @ n_vec)\n        S = np.sum(charges * np.exp(1j * phases))\n        U += KE * pref * gauss / G2 * abs(S) ** 2\n    return float(U.real)\n\n\ndef U_real_space(s: np.ndarray, charges: np.ndarray, a: float) -> float:\n    \"\"\"Ewald real-space sum (cubic cell).\"\"\"\n    q = s * a    # cubic: q = a * s\n    N = len(q)\n    U = 0.0\n    cutoff = a / 2.0\n    for i in range(N):\n        for j in range(i + 1, N):\n            r_vec = minimum_image(q[i] - q[j], a)\n            r = np.linalg.norm(r_vec)\n            if r < 1e-8 or r > cutoff:\n                continue\n            U += KE * charges[i] * charges[j] * erfc(ALPHA * r) / r\n    return U\n\n\ndef U_self_energy(charges: np.ndarray) -> float:\n    return -KE * ALPHA / np.sqrt(np.pi) * np.sum(charges ** 2)\n\n\ndef U_total(s: np.ndarray, charges: np.ndarray, a: float) -> float:\n    \"\"\"Full Ewald energy for fractional coords in cubic cell of size a.\"\"\"\n    return (U_real_space(s, charges, a)\n            + U_rec(s, charges, a)\n            + U_self_energy(charges))\n\n\n# ---------------------------------------------------------------------------\n# Provided: fractional NVT sampler (simplified from Exercise 2)\n# ---------------------------------------------------------------------------\n\ndef build_initial_s(n_mols, rng):\n    \"\"\"Place n_mols on a grid in fractional space.\"\"\"\n    side = int(np.ceil(n_mols ** (1.0 / 3.0)))\n    spacing = 1.0 / (side + 1)\n    positions = []\n    for ix in range(side + 1):\n        for iy in range(side + 1):\n            for iz in range(side + 1):\n                if len(positions) >= n_mols:\n                    break\n                positions.append([(ix + 0.5) * spacing,\n                                  (iy + 0.5) * spacing,\n                                  (iz + 0.5) * spacing])\n            if len(positions) >= n_mols:\n                break\n        if len(positions) >= n_mols:\n            break\n    return np.array(positions[:n_mols])\n\n\ndef run_nvt_fractional(n_steps: int, s_init: np.ndarray, charges: np.ndarray,\n                       a: float, beta: float,\n                       step_size: float = 0.04, rng=None) -> list:\n    \"\"\"\n    NVT MC in fractional coordinates.\n\n    Energy evaluated via Ewald (for accurate lattice-gradient estimation).\n    Returns list of (N,3) fractional-coord snapshots collected every 10 steps.\n\n    Parameters\n    ----------\n    n_steps   : MC moves\n    s_init    : (N, 3) initial fractional positions\n    charges   : (N,) partial charges\n    a         : cubic box size (Å)\n    beta      : 1/(kBT)\n    step_size : max displacement in fractional units\n    rng       : numpy Generator\n\n    Returns\n    -------\n    trajectory : list of (N, 3) fractional-coord arrays\n    \"\"\"\n    if rng is None:\n        rng = np.random.default_rng(42)\n\n    s     = s_init.copy()\n    U_cur = U_total(s, charges, a)\n    traj  = []\n    N     = len(s)\n\n    for step in range(n_steps):\n        idx   = rng.integers(0, N)\n        ds    = rng.uniform(-step_size, step_size, size=3)\n        s_new = s.copy()\n        s_new[idx] = (s[idx] + ds) % 1.0\n\n        U_new = U_total(s_new, charges, a)\n        dU    = U_new - U_cur\n\n        if rng.random() < min(1.0, np.exp(-beta * dU)):\n            s     = s_new\n            U_cur = U_new\n\n        if step % 10 == 0:\n            traj.append(s.copy())\n\n    return traj\n\n\ndef build_charges(n_mols: int) -> np.ndarray:\n    \"\"\"Alternating C/O charges for simplified CO₂-like system.\"\"\"\n    return np.array([Q_C if i % 2 == 0 else Q_O for i in range(n_mols)])\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 1\n# ---------------------------------------------------------------------------\n\ndef dU_da_analytic(s: np.ndarray, charges: np.ndarray, a: float) -> float:\n    \"\"\"\n    Analytic ∂U_Ewald/∂a for cubic cell at lattice constant a.\n\n    This is the sum of TWO paths (see the lesson's Figure 3):\n\n    Path 1 — real space (position path / virial):\n        ∂U_real/∂a = Σ_{i<j} q_i q_j * d/dr[erfc(αr)/r] * (r/a)\n        where r = a * r̂ (distances scale linearly with a in fractional coords)\n\n    Path 2 — reciprocal space (G-lattice path):\n        ∂U_rec/∂a = Σ_{n≠0} (∂f_n/∂a) * |S_n(s)|²\n        f_n(a) = exp(-π²|n|²/(α²a²)) / ((2π)³ * a * |n|²)\n        ∂f_n/∂a = f_n * [-1/a + 2π²|n|²/(α²a³)]\n\n    (Self-energy is a-independent, contributes 0.)\n\n    Parameters\n    ----------\n    s       : (N, 3) fractional coordinates  [HOLD FIXED, do NOT convert to q first]\n    charges : (N,) partial charges\n    a       : cubic lattice constant (Å)\n\n    Returns\n    -------\n    ∂U/∂a  in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # PART A — reciprocal (G-lattice) path:                  #\n    # For each n_vec in N_VECS:                               #\n    #   n2   = dot(n_vec, n_vec)                             #\n    #   f_n  = exp(-π²n2/(α²a²)) / ((2π)³ * a * n2)         #\n    #   df_n = f_n * (-1/a + 2π²n2/(α²a³))                  #\n    #   S    = Σ_j charges[j] * exp(2πi * n_vec·s[j])        #\n    #   dU_rec += KE * df_n * |S|²                           #\n    #                                                         #\n    # PART B — real-space path:                               #\n    # q = s * a  (cubic)                                      #\n    # For each i<j pair with r < a/2:                         #\n    #   r = |min_image(q[i]-q[j], a)|                        #\n    #   d_erfc_r_dr = (-erfc(α*r)/r² - 2α*exp(-α²r²)/(√π*r))#\n    #   dU_real += KE * q_i * q_j * d_erfc_r_dr * (r/a)      #\n    #                                                         #\n    # Return dU_rec + dU_real                                 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 2\n# ---------------------------------------------------------------------------\n\ndef fd_gradient_reference(charges: np.ndarray, a0: float, delta_a: float,\n                           n_steps: int, rng_seed: int = 7) -> float:\n    \"\"\"\n    Finite-difference ∂⟨N⟩/∂a reference using two independent GCMC runs.\n\n    Because we use NVT (fixed N) as a proxy, ⟨N⟩ = N always.\n    Instead we estimate ∂⟨U⟩/∂a via central difference:\n\n        d⟨U⟩/da ≈ [⟨U⟩_{a+δa} - ⟨U⟩_{a-δa}] / (2 * δa)\n\n    Each ⟨U⟩ is computed from a FRESH NVT run at the perturbed a.\n    Both runs use FRACTIONAL-coordinate sampling.\n\n    NOTE: This is not the same as the reweighting FD from Exercise 1.\n    These are independent production runs at each a value.\n\n    Parameters\n    ----------\n    charges  : (N,) partial charges\n    a0       : reference lattice constant (Å)\n    delta_a  : perturbation (Å)\n    n_steps  : MC steps per run\n    rng_seed : random seed\n\n    Returns\n    -------\n    fd_estimate : float, central-difference d⟨U⟩/da in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # 1. rng_plus  = np.random.default_rng(rng_seed)         #\n    #    rng_minus = np.random.default_rng(rng_seed + 1)     #\n    # 2. s0 = build_initial_s(len(charges), rng_plus)        #\n    #    (use same initial s for both perturbations)          #\n    # 3. Burn in at a0 to equilibrate (n_steps//2 steps)     #\n    # 4. Run at a0+delta_a: traj_plus = run_nvt_fractional(  #\n    #        n_steps, s_burn, charges, a0+delta_a, ...)      #\n    # 5. Run at a0-delta_a: traj_minus similarly              #\n    # 6. U_plus  = mean([U_total(s, charges, a0+delta_a)     #\n    #                    for s in traj_plus])                 #\n    #    U_minus = mean([U_total(s, charges, a0-delta_a)     #\n    #                    for s in traj_minus])                #\n    # 7. return (U_plus - U_minus) / (2 * delta_a)           #\n    #                                                         #\n    # Hint: run_nvt_fractional returns a trajectory;         #\n    # take the mean energy over all frames for the estimate. #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 3\n# ---------------------------------------------------------------------------\n\ndef score_function_gradient(trajectory: list, charges: np.ndarray,\n                             a0: float, beta: float) -> float:\n    \"\"\"\n    Score-function (Zwanzig) estimator for ∂⟨U⟩/∂a.\n\n    From Module 0:  ∂⟨A⟩/∂θ = −β Cov(A, ∂U/∂θ)\n\n    For A = U (the energy itself as a proxy observable) and θ = a:\n        ∂⟨U⟩/∂a = −β [⟨U · ∂U/∂a⟩ − ⟨U⟩⟨∂U/∂a⟩]\n                 = −β Cov(U, ∂U/∂a)\n\n    (In real GCMC we'd use A = N for working capacity. Here we use A = U as\n    a numerically stable proxy that has the same structure.)\n\n    Rao-Blackwell: subtract the mean before computing the covariance.\n\n    Parameters\n    ----------\n    trajectory : list of (N, 3) fractional-coord snapshots at a0\n    charges    : (N,) partial charges\n    a0         : lattice constant (Å)\n    beta       : 1/(kBT)\n\n    Returns\n    -------\n    gradient : float, d⟨U⟩/da in kJ/mol/Å\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # 1. For each s in trajectory:                            #\n    #    a. U_k = U_total(s, charges, a0)                    #\n    #    b. dU_k = dU_da_analytic(s, charges, a0)            #\n    #    Collect U_list and dU_list as arrays.                #\n    #                                                         #\n    # 2. Rao-Blackwell: center both arrays:                   #\n    #    U_centered  = U_list  - U_list.mean()               #\n    #    dU_centered = dU_list - dU_list.mean()               #\n    #                                                         #\n    # 3. Estimator:                                           #\n    #    grad = -beta * mean(U_centered * dU_centered)        #\n    #    (This is Cov(U, ∂U/∂a) ≈ mean(U_c * dU_c) since     #\n    #    the means are already subtracted.)                   #\n    #                                                         #\n    # 4. Return grad                                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — function 4\n# ---------------------------------------------------------------------------\n\ndef sign_and_magnitude_gate(grad_est: float, grad_fd: float,\n                             rel_tol: float = 0.20) -> bool:\n    \"\"\"\n    Apply the paper's 10% sign-agreement gate.\n\n    Gate PASSES if:\n      (a) sign(grad_est) == sign(grad_fd)       [sign agreement]\n      (b) |grad_est/grad_fd - 1| < rel_tol      [magnitude within tolerance]\n\n    Gate FAILS if:\n      - Signs disagree → \"Kill lattice phase: Chain-rule bug\"\n      - Relative error > rel_tol → magnitude off (likely missing G-lattice term)\n\n    Parameters\n    ----------\n    grad_est : float, score-function estimator gradient\n    grad_fd  : float, finite-difference reference gradient\n    rel_tol  : float, relative error tolerance (default 0.20 = 20%)\n\n    Returns\n    -------\n    passed : bool\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # 1. sign_ok = (sign(grad_est) == sign(grad_fd))         #\n    # 2. rel_err = abs(grad_est/grad_fd - 1)  if grad_fd≠0   #\n    # 3. mag_ok  = rel_err < rel_tol                          #\n    # 4. Print results table:                                 #\n    #    \"  estimator : {grad_est:.4f} kJ/mol/Å\"             #\n    #    \"  FD ref    : {grad_fd:.4f} kJ/mol/Å\"              #\n    #    \"  rel_err   : {rel_err:.2f}\"                        #\n    #    \"  sign      : ✓ agreement\" or \"✗ disagrees\"        #\n    # 5. Print gate result:                                   #\n    #    \"Gate: PASS\" or \"Gate: FAIL — sign disagrees.        #\n    #                    Missing Ewald cell derivative?\"      #\n    # 6. Return sign_ok and mag_ok (both must be True)        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided __main__ — do not modify\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    print(\"=\" * 65)\n    print(\"Exercise 4: End-to-end lattice gradient — 10% gate\")\n    print(\"=\" * 65)\n\n    rng = np.random.default_rng(42)\n    charges = build_charges(N_MOLS)\n    s_init  = build_initial_s(N_MOLS, rng)\n\n    # --- Burn-in to equilibrate ---\n    burn = N_STEPS // 3\n    print(f\"\\nSystem: N={N_MOLS} molecules, a₀={BOX_A0} Å, β={BETA:.4f} mol/kJ\")\n    print(f\"Burn-in: {burn} steps...\", flush=True)\n    burn_traj = run_nvt_fractional(burn, s_init, charges, BOX_A0, BETA, rng=rng)\n    s_eq = burn_traj[-1] if burn_traj else s_init\n\n    # --- Production trajectory ---\n    print(f\"Production: {N_STEPS} steps...\", flush=True)\n    traj = run_nvt_fractional(N_STEPS, s_eq, charges, BOX_A0, BETA, rng=rng)\n    print(f\"Collected {len(traj)} snapshots.\\n\")\n\n    # --- Score-function gradient estimator ---\n    print(\"Step 1: Score-function gradient estimator (d⟨U⟩/da)\")\n    grad_est = score_function_gradient(traj, charges, BOX_A0, BETA)\n    print(f\"  Score-function estimate: {grad_est:.4f} kJ/mol/Å\\n\")\n\n    # --- Finite-difference reference ---\n    print(f\"Step 2: FD reference (δa = {DELTA_A_FD:.3f} Å, \"\n          f\"independent runs at a₀±δa)\")\n    grad_fd = fd_gradient_reference(\n        charges, BOX_A0, DELTA_A_FD, n_steps=N_STEPS, rng_seed=7)\n    print(f\"  FD reference:            {grad_fd:.4f} kJ/mol/Å\\n\")\n\n    # --- Gate check ---\n    print(\"Step 3: Gate check (sign agreement + 20% relative error)\")\n    print(\"-\" * 45)\n    passed = sign_and_magnitude_gate(grad_est, grad_fd, rel_tol=0.20)\n    print(\"-\" * 45)\n\n    if passed:\n        print()\n        print(\"d⟨N⟩/da: estimator and FD agree in sign and magnitude.\")\n        print(\"The fractional-coordinate + Ewald cell-derivative pipeline\")\n        print(\"is correct. Ready to wire into ObservableWithGradient (Module 4).\")\n    else:\n        print()\n        print(\"Debugging checklist:\")\n        print(\"  1. Are you using FRACTIONAL coords in score_function_gradient?\")\n        print(\"  2. Does dU_da_analytic include BOTH paths (virial + G-lattice)?\")\n        print(\"  3. Does fd_gradient_reference use fractional MC at EACH a?\")\n\n    print(\"=\" * 65)\n"}]}, "module_04_sampleragnostic_design_and_the_observablewithgradi": {"content": "# Module 4: Sampler-Agnostic Design and the ObservableWithGradient Primitive\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Central Insight: Separation of Concerns](#the-central-insight-separation-of-concerns)\n- [Running Example: The Same Gradient, Three Ways](#running-example-the-same-gradient-three-ways)\n- [Why the Score-Function Estimator Is Sampler-Agnostic](#why-the-score-function-estimator-is-sampler-agnostic)\n- [Importance-Weighted Covariance for Boltzmann Generator Samples](#importance-weighted-covariance-for-boltzmann-generator-samples)\n- [The kUPS Propagator Protocol](#the-kups-propagator-protocol)\n- [ObservableWithGradient as a First-Class Propagator](#observablewithgradient-as-a-first-class-propagator)\n- [Bitwise Reproducibility and Why CRN Is Free Under kUPS](#bitwise-reproducibility-and-why-crn-is-free-under-kups)\n- [The CFG Property Head: From Gradient to Conditional Generator](#the-cfg-property-head-from-gradient-to-conditional-generator)\n- [Performance Arithmetic: What You Actually Get](#performance-arithmetic-what-you-actually-get)\n- [Falsification Gates and Trust Regions](#falsification-gates-and-trust-regions)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: What This Module Completes](#synthesis-what-this-module-completes)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. **State precisely why** the score-function (Zwanzig) estimator is unbiased under any equilibrium sampler, and what \"sampler-agnostic\" means rigorously vs loosely.\n2. **Derive the importance-weighted covariance estimator** for Boltzmann-generator samples — the key generalization that extends the gradient formula from MCMC chains to one-shot flows.\n3. **Explain the kUPS propagator protocol** `(key, state) → state'` and articulate why this interface is sufficient for composability.\n4. **Design** the `ObservableWithGradient` decorator: its constructor signature, call signature, running-sums accumulation, and why it must be stateless.\n5. **Trace** the classifier-free-guidance (CFG) pipeline from $\\partial \\Delta N / \\partial \\tilde{g}$ all the way back into a score network's denoising update.\n6. **Interpret the performance arithmetic**: inherited 49× GCMC throughput × 8× gradient sample-efficiency vs MBAR-5pt.\n\n---\n\n## The Central Insight: Separation of Concerns\n\nEvery module in this course has built one piece of a larger machine:\n\n- **Module 0** established that $\\partial \\langle N \\rangle / \\partial \\theta = -\\beta \\cdot \\mathrm{Cov}(N, \\partial U/\\partial \\theta)$ — a formula that involves only equilibrium averages of observables, never a gradient *through* a sampler.\n- **Module 1** showed how GCMC produces those equilibrium samples, and how to wire the covariance estimator
