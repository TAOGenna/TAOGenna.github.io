 on top.\n- **Module 2** built the two-state working capacity $\\Delta N$ objective and showed that Common Random Numbers (CRN) and Rao-Blackwellization collapse the variance by 3–10×.\n- **Module 3** fixed the lattice-gradient problem by reparameterizing into fractional coordinates so the sampling domain stays $\\theta$-invariant.\n\nThere is a thread running through all of this: **the gradient formula never cared what produced the samples.** It only requires that the samples are drawn from the correct equilibrium distribution $p(\\mathbf{q}, N; \\theta) \\propto e^{-\\beta U(\\mathbf{q};θ) + \\beta \\mu N}$.\n\nThis module makes that observation precise, turns it into an API, and attaches it to a downstream generator.\n\nThe punchline is a single Python class:\n\n```python\nclass ObservableWithGradient:\n    \"\"\"Decorates any kUPS propagator chain.\n\n    Usage:\n        grad_estimator = ObservableWithGradient(\n            base_propagator=gcmc_chain,\n            observable_fn=lambda state: state.n_molecules,\n            grad_fn=lambda state, theta: analytic_dU_dtheta(state, theta),\n            beta=beta,\n        )\n        # Then drive it identically whether base_propagator is:\n        #   - classical GCMC\n        #   - learned-proposal MCMC\n        #   - importance-weighted Boltzmann-generator\n        key, state = jax.random.split(key)\n        state_new, aux = grad_estimator(key, state)\n    ```\n\nThis is not a one-off script; it is a *first-class propagator* that snaps into the same interface as every other kUPS component.\n\n---\n\n## Running Example: The Same Gradient, Three Ways\n\nWe will carry a concrete scenario through the entire module. Consider a single-component LJ gas adsorbed into a small box (12 Å side length), modeled with a Lennard-Jones potential parameterized by $\\varepsilon$. We want $\\partial \\langle N \\rangle_{\\beta\\mu} / \\partial \\varepsilon$.\n\n**The target value** (which we'll validate against): for this toy system, the closed-form answer from the score-function identity is\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\varepsilon} = -\\beta \\cdot \\mathrm{Cov}\\!\\left(N,\\; \\frac{\\partial U_{\\mathrm{LJ}}}{\\partial \\varepsilon}\\right)$$\n\nwhere $U_{\\mathrm{LJ}} = 4\\varepsilon \\sum_{i<j} \\left[ (\\sigma/r_{ij})^{12} - (\\sigma/r_{ij})^6 \\right]$, so $\\partial U / \\partial \\varepsilon = U / \\varepsilon$ — a particularly clean case.\n\nWe will compute this gradient three ways:\n\n| Sampler | Produces | Weight | Estimator form |\n|---------|----------|--------|---------------|\n| Classical GCMC | Markov chain states $(N_k, \\mathbf{q}_k)$ | $w_k = 1$ (uniform) | Plain covariance average |\n| Learned-proposal MCMC | Markov chain with biased proposals, corrected by Hastings | $w_k = 1$ (after MH correction) | Plain covariance average |\n| Boltzmann generator | One-shot samples $(x_k, \\log q(x_k))$ | $w_k = e^{-\\beta U(x_k)} / q(x_k)$ | Importance-weighted covariance |\n\nThe claim of *sampler-agnostic design* is that all three produce the same expected gradient. Only the variance differs.\n\n---\n\n## Why the Score-Function Estimator Is Sampler-Agnostic\n\n### Stage 1 — Intuition\n\nThe score-function identity was derived in Module 0 by differentiating under the integral sign of the grand-canonical partition function. That derivation produced a formula for the gradient *in terms of an equilibrium average*:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\cdot \\mathbb{E}_{(\\mathbf{q},N) \\sim p_\\theta}\\!\\left[\\left(N - \\langle N \\rangle\\right) \\cdot \\frac{\\partial U(\\mathbf{q};\\theta)}{\\partial \\theta}\\right]$$\n\nNotice what is **not** in this formula:\n- No Metropolis acceptance probability\n- No transition kernel $T(\\mathbf{q}' | \\mathbf{q})$\n- No proposal distribution $q_{\\mathrm{prop}}(\\mathbf{q}')$\n\nThe formula is a statement about the *target distribution* $p_\\theta$, not about the mechanism used to sample from it.\n\n### Stage 2 — Notation\n\n| Symbol | Meaning | Type |\n|--------|---------|------|\n| $p_\\theta(\\mathbf{q}, N)$ | Grand-canonical equilibrium distribution | Probability measure |\n| $\\langle A \\rangle_\\theta$ | Ensemble average of $A$ under $p_\\theta$ | Scalar |\n| $\\mathrm{Cov}_\\theta(A, B)$ | $\\langle AB \\rangle_\\theta - \\langle A \\rangle_\\theta \\langle B \\rangle_\\theta$ | Scalar |\n| $K$ | Number of Monte Carlo samples | Integer |\n| $x_k = (\\mathbf{q}_k, N_k)$ | $k$-th sample | State tuple |\n| $w_k$ | Importance weight for sample $k$ | Scalar $> 0$ |\n\n### Stage 3 — The Formal Argument\n\nLet $\\nu$ be *any* probability measure over configurations such that $\\nu$ is absolutely continuous with respect to $p_\\theta$ — i.e., wherever $p_\\theta > 0$, $\\nu$ is also positive. Define importance weights $w(x) = p_\\theta(x) / \\nu(x)$.\n\nThen for any integrable function $f$:\n\n$$\\begin{aligned}\n\\mathbb{E}_{p_\\theta}[f(x)] &= \\int f(x)\\, p_\\theta(x)\\, dx & \\scriptstyle{\\text{definition}} \\\\\n&= \\int f(x)\\, \\frac{p_\\theta(x)}{\\nu(x)}\\, \\nu(x)\\, dx & \\scriptstyle{\\text{multiply and divide by } \\nu(x)} \\\\\n&= \\mathbb{E}_{\\nu}\\!\\left[f(x)\\, w(x)\\right] & \\scriptstyle{\\text{expectation under } \\nu} \\\\\n&\\approx \\frac{\\sum_k f(x_k)\\, w_k}{\\sum_k w_k} & \\scriptstyle{\\text{self-normalized MC estimate, } x_k \\sim \\nu}\n\\end{aligned}$$\n\nThe last line is the *self-normalized importance sampling estimator*, which is consistent (converges to the true expectation as $K \\to \\infty$) under only the support coverage assumption.\n\nApplying this to the score-function gradient formula:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\cdot \\mathbb{E}_{p_\\theta}\\!\\left[(N - \\langle N \\rangle) \\cdot \\frac{\\partial U}{\\partial \\theta}\\right]$$\n\nwe get an **importance-weighted covariance estimator** that is valid under any $\\nu$ covering the support of $p_\\theta$:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} \\approx -\\beta \\cdot \\widehat{\\mathrm{Cov}}_w\\!\\left(N, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\nwhere $\\widehat{\\mathrm{Cov}}_w$ denotes the importance-weighted sample covariance.\n\n**This is the load-bearing theorem.** The estimator is unbiased — in the sense that it converges to the correct answer — regardless of which distribution $\\nu$ produced the samples, as long as $\\nu$ covers the support of $p_\\theta$.\n\n**Check your understanding:** What happens if $\\nu = p_\\theta$ exactly? The weights become $w_k = 1$ for all $k$, and the formula reduces to the plain sample covariance from Module 1. Classical MCMC (after burn-in) draws from $p_\\theta$ by construction, so it is the special case $\\nu = p_\\theta$ with uniform weights. The formula unifies MCMC and importance-sampled methods in one equation.\n\n### Stage 4 — Interpretation\n\nThe three sampler regimes differ only in $\\nu$:\n\n1. **Classical GCMC:** $\\nu = p_\\theta$ (exactly). Weights $w_k = 1$. Estimator is the plain covariance from Module 1. Unbiased, variance $\\propto 1/K$.\n\n2. **Learned-proposal MCMC:** After the Metropolis-Hastings correction, the chain's stationary distribution is still $p_\\theta$. So again $\\nu = p_\\theta$, $w_k = 1$. The proposal affects *mixing time* (and hence variance for finite $K$), but not the target.\n\n3. **Boltzmann generators:** A normalizing flow $f_\\phi$ transforms a base measure $\\pi_0(z)$ to produce $x = f_\\phi(z)$. The pushforward distribution is $q_\\phi(x) = \\pi_0(f_\\phi^{-1}(x)) \\cdot |\\det J_{f_\\phi^{-1}}|$. This is not $p_\\theta$ in general, so $\\nu = q_\\phi \\neq p_\\theta$ and importance weights $w_k = e^{-\\beta U(x_k)} / q_\\phi(x_k)$ are required.\n\nThe variance across these three is different — potentially dramatically so. A well-trained BG with $q_\\phi \\approx p_\\theta$ produces weights near 1 with low variance. A poorly trained BG has high effective weight variance and poor ESS. But in all cases, the estimator's **expected value converges to the same number**.\n\n> This is exactly what the kUPS proposal sells as *\"sampler-agnostic design\"*: correctness is a property of the formula; variance is a property of the sampler. These are separate concerns.\n\n---\n\n## Importance-Weighted Covariance for Boltzmann Generator Samples\n\nNow let us be concrete about the third case, since it requires the most care.\n\n### The Boltzmann Generator Setup\n\nA Boltzmann generator[^1] is a learned invertible map $f_\\phi: \\mathbb{R}^d \\to \\mathbb{R}^d$ (a normalizing flow) trained to minimize\n\n$$D_{\\mathrm{KL}}(q_\\phi \\| p_\\theta) = \\mathbb{E}_{z \\sim \\pi_0}\\!\\left[\\log q_\\phi(f_\\phi(z)) - \\log p_\\theta(f_\\phi(z))\\right]$$\n\nAfter training, drawing $z \\sim \\pi_0$ and evaluating $x = f_\\phi(z)$ gives a *one-shot* approximate sample from $p_\\theta$. The key capability that distinguishes BGs from standard MCMC is that they do not require a burn-in period — each sample is independent.\n\n[^1]: Noé, Frank, et al. \"Boltzmann generators: Sampling equilibrium states of many-body systems with deep learning.\" *Science* 365.6457 (2019): eaaw1147. The key result is that an invertible network trained on free energy minimization produces one-shot equilibrium samples with tractable importance weights — unlike MCMC which requires $O(\\tau_{\\mathrm{mix}})$ steps to decorrelate.\n\nThe tractable log-density of the generator's distribution:\n\n$$\\log q_\\phi(x) = \\log \\pi_0(f_\\phi^{-1}(x)) + \\log \\left|\\det J_{f_\\phi^{-1}(x)}\\right|$$\n\ngives us the importance weights in log-space:\n\n$$\\log w(x) = \\log p_\\theta(x) - \\log q_\\phi(x) = -\\beta U(x) + \\beta \\mu N - \\log Z - \\log q_\\phi(x)$$\n\nSince $\\log Z$ is a constant that cancels in self-normalized estimation, we work with unnormalized log-weights:\n\n$$\\tilde{w}(x) = \\exp\\!\\left(-\\beta U(x) + \\beta \\mu N - \\log q_\\phi(x)\\right)$$\n\n### Stage 3 — The Weighted Covariance Formula\n\nLet $\\{(x_k, \\log \\tilde{w}_k)\\}_{k=1}^K$ be $K$ samples from the BG with their log-weights. The importance-weighted covariance estimator for the gradient is:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} \\approx -\\beta \\cdot \\widehat{\\mathrm{Cov}}_w\\!\\left(N, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\nwhere the weighted covariance is computed via three weighted running sums:\n\n$$\\begin{aligned}\n\\bar{N}_w &= \\frac{\\sum_k w_k N_k}{\\sum_k w_k} & \\scriptstyle{\\text{weighted mean of N}} \\\\\n\\overline{\\partial U}_w &= \\frac{\\sum_k w_k (\\partial U_k/\\partial\\theta)}{\\sum_k w_k} & \\scriptstyle{\\text{weighted mean of } \\partial U/\\partial\\theta} \\\\\n\\widehat{\\mathrm{Cov}}_w &= \\frac{\\sum_k w_k (N_k - \\bar{N}_w)(\\partial U_k/\\partial\\theta - \\overline{\\partial U}_w)}{\\sum_k w_k} & \\scriptstyle{\\text{weighted covariance}}\n\\end{aligned}$$\n\nIn code, always work in log-weight space to avoid numerical underflow:\n\n```python\nimport jax.numpy as jnp\n\ndef weighted_mean(values, log_weights):\n    \"\"\"Numerically stable weighted mean using log-sum-exp.\"\"\"\n    log_Z = jax.scipy.special.logsumexp(log_weights)\n    weights = jnp.exp(log_weights - log_Z)   # normalized, sum to 1\n    return jnp.sum(weights * values)\n\ndef weighted_covariance(A_vals, B_vals, log_weights):\n    \"\"\"Importance-weighted sample covariance of A and B.\"\"\"\n    A_mean = weighted_mean(A_vals, log_weights)\n    B_mean = weighted_mean(B_vals, log_weights)\n    log_Z = jax.scipy.special.logsumexp(log_weights)\n    weights = jnp.exp(log_weights - log_Z)\n    return jnp.sum(weights * (A_vals - A_mean) * (B_vals - B_mean))\n\ndef importance_weighted_gradient(samples, log_weights, N_vals, dU_vals, beta):\n    \"\"\"Score-function gradient estimator for BG samples.\"\"\"\n    cov = weighted_covariance(N_vals, dU_vals, log_weights)\n    return -beta * cov\n```\n\n**Check your understanding:** Why do we subtract the log-sum-exp before exponentiating? If raw log-weights span a range of 100 (e.g., $-50$ to $+50$), then $e^{50}$ overflows float32. Shifting by the maximum (or by the log-sum-exp) keeps all exponentiated values in $[0, 1]$, and the normalization cancels the shift exactly. This is standard log-sum-exp stabilization — the same trick used in attention softmax.\n\n**Common mistake:** Using unnormalized weights $\\tilde{w}_k$ directly in $\\sum_k \\tilde{w}_k N_k$ without dividing by $\\sum_k \\tilde{w}_k$. This gives an estimator proportional to the correct answer but scaled by $Z = \\sum_k \\tilde{w}_k$ — a biased estimator with a different magnitude. Always self-normalize.\n\n---\n\n## The kUPS Propagator Protocol\n\nTo understand why `ObservableWithGradient` is a *first-class* component (not an adapter or a script), we need to internalize the kUPS interface.\n\nkUPS abstracts every operation as a **propagator**: a stateless function with the signature\n\n$$\\text{Propagator}: (\\text{key}, \\text{state}) \\to \\text{state}'$$\n\n![The kUPS propagator interface: (Random Key, State) → Propagator → State′](images/kups_propagator_interface.png)\n\n*Figure: Every kUPS component — potential evaluation, Monte Carlo move, integrator step, thermostat, gradient estimator — shares this signature. The shared interface is what makes composition possible without glue code.*\n\nIn Python Protocol terms:\n\n```python\nfrom typing import Protocol, TypeVar\n\nState = TypeVar(\"State\")\n\nclass Propagator(Protocol[State]):\n    def __call__(self, key: jax.Array, state: State) -> State:\n        ...\n```\n\nThe design consequences are profound:\n\n1. **Bitwise reproducibility**: Given the same `key` and `state`, the propagator always returns the same `state'`. No hidden RNG state, no global mutation.\n2. **Composability**: Any two propagators with compatible state types compose by function application:\n   ```python\n   def compose(p1, p2):\n       def composed(key, state):\n           k1, k2 = jax.random.split(key)\n           state = p1(k1, state)\n           state = p2(k2, state)\n           return state\n       return composed\n   ```\n3. **Testability**: Feed any state, get a deterministic output. Unit tests are trivial.\n4. **JIT compatibility**: No Python-level side effects means `jax.jit` can trace through the whole chain.\n\n![kUPS composable propagators for NVE, NVT, and NPT ensembles](images/kups_composable_ensembles.png)\n\n*Figure: The same propagator building blocks (Potential, Integrator, Thermostat, Barostat) compose in different orders to produce different thermodynamic ensembles. Adding a gradient estimator is simply adding one more propagator to the chain.*\n\nThe key design insight from the kUPS blog post is the explicit statement: *\"any method can be combined with any other by construction.\"* This is not marketing — it is the algebraic consequence of the shared signature. A new potential works with every existing sampler. A new sampler works with every existing potential. **A new gradient estimator works with every existing chain.**\n\n**Figure 1: How the propagator chain assembles**\n\n```\nClassical GCMC chain:\n  ┌─────────────────────────────────────────────────┐\n  │  key   state                                    │\n  │   │      │                                      │\n  │   ▼      ▼                                      │\n  │  ┌──────────────┐   state_after_gcmc            │\n  │  │  GCMCMove    │ ─────────────────────────►    │\n  │  │(insert/del/  │                               │\n  │  │ translate)   │                               │\n  │  └──────────────┘                               │\n  └─────────────────────────────────────────────────┘\n\nWith ObservableWithGradient decorator:\n  ┌─────────────────────────────────────────────────┐\n  │  key   state                                    │\n  │   │      │                                      │\n  │   ▼      ▼                                      │\n  │  ┌──────────────┐   state'  ┌──────────────┐   │\n  │  │  GCMCMove    │ ─────────►│   Accumulate │   │\n  │  │  (any chain) │           │  N, ∂U/∂θ,   │   │\n  │  └──────────────┘           │  covariance  │   │\n  │                             └──────┬───────┘   │\n  │                                    │ state'     │\n  │                                    ▼            │\n  │                             state' = state with │\n  │                             running sums updated│\n  └─────────────────────────────────────────────────┘\n\nAfter K steps: call finalize() → gradient estimate\n```\n\n---\n\n## ObservableWithGradient as a First-Class Propagator\n\n### Design Requirements\n\nBefore writing any code, state the requirements:\n\n1. **Stateless call**: `__call__(key, state)` must return `(state', aux)` with no Python-level mutation. Running sums live *inside* the state.\n2. **Sampler-agnostic**: The constructor accepts a `base_propagator` argument — any callable satisfying the `Propagator` protocol.\n3. **Observable-agnostic**: The constructor accepts an `observable_fn` and a `grad_fn` — separate callables. This decouples the gradient primitive from any specific physical observable.\n4. **Importance-weight aware**: If the base propagator returns log-weights (BG case), use weighted estimator; otherwise use uniform weights.\n5. **JIT-compatible**: No Python-level branching on sample values. All accumulation in JAX arrays.\n\n### The Running-Sums Pattern\n\nThe key implementation idea is that you cannot `jit` a loop that grows a list. Instead, maintain **fixed-size running sums** that are updated in O(1) per step:\n\n```\nAfter K steps we need:\n    Σ_k w_k N_k          (for weighted mean of N)\n    Σ_k w_k              (normalization)\n    Σ_k w_k (∂U/∂θ)_k   (for weighted mean of ∂U/∂θ)\n    Σ_k w_k N_k (∂U/∂θ)_k  (for weighted cross-moment)\n\nEach is a scalar (or vector for vector θ).\nUpdate rule: sum_k ← sum_{k-1} + w_k * new_value_k\n```\n\nThis is O(1) per step, O(1) memory, and fully JIT-compatible.\n\n### Skeleton Implementation\n\n```python\nfrom dataclasses import dataclass\nimport jax\nimport jax.numpy as jnp\nfrom typing import Callable, Any, NamedTuple\n\nclass GradientState(NamedTuple):\n    \"\"\"Running sums for the gradient accumulator.\"\"\"\n    sum_w:    float   # Σ w_k\n    sum_wN:   float   # Σ w_k N_k\n    sum_wdU:  Any     # Σ w_k (∂U/∂θ)_k, same shape as θ\n    sum_wNdU: Any     # Σ w_k N_k (∂U/∂θ)_k\n\nclass ObservableWithGradient:\n    \"\"\"\n    Decorates any kUPS Propagator to accumulate gradient estimates.\n\n    The gradient of ⟨N⟩ w.r.t. θ is accumulated as a running\n    importance-weighted covariance. Any base_propagator works —\n    classical GCMC, learned-proposal MCMC, or Boltzmann-generator.\n\n    Args:\n        base_propagator: callable (key, state) → (state, aux)\n            where aux may optionally contain 'log_weight'\n        observable_fn:   callable state → float (N or any observable)\n        grad_fn:         callable (state, theta) → dU/dtheta\n        beta:            inverse temperature\n        theta:           current parameter vector (for grad_fn)\n    \"\"\"\n    def __init__(self, base_propagator, observable_fn, grad_fn, beta, theta):\n        self.base_propagator = base_propagator\n        self.observable_fn   = observable_fn\n        self.grad_fn         = grad_fn\n        self.beta            = beta\n        self.theta           = theta\n\n    def init_running_sums(self, theta_shape):\n        \"\"\"Return zero running sums with the right shapes.\"\"\"\n        return GradientState(\n            sum_w    = 0.0,\n            sum_wN   = 0.0,\n            sum_wdU  = jnp.zeros(theta_shape),\n            sum_wNdU = jnp.zeros(theta_shape),\n        )\n\n    def __call__(self, key, state_and_sums):\n        \"\"\"One propagator step: advance chain, update running sums.\"\"\"\n        state, sums = state_and_sums\n        key_prop, key_rest = jax.random.split(key)\n\n        # Step the underlying chain\n        new_state, aux = self.base_propagator(key_prop, state)\n\n        # Importance weight (log scale, default = 0.0 for uniform weights)\n        log_w = aux.get('log_weight', 0.0)\n        w = jnp.exp(log_w)\n\n        # Evaluate observable and gradient\n        N    = self.observable_fn(new_state)\n        dU   = self.grad_fn(new_state, self.theta)   # shape: theta_shape\n\n        # Update running sums (O(1) per step, O(1) memory)\n        new_sums = GradientState(\n            sum_w    = sums.sum_w    + w,\n            sum_wN   = sums.sum_wN   + w * N,\n            sum_wdU  = sums.sum_wdU  + w * dU,\n            sum_wNdU = sums.sum_wNdU + w * N * dU,\n        )\n        return (new_state, new_sums), {}\n\n    def finalize(self, sums):\n        \"\"\"Compute gradient estimate from accumulated running sums.\"\"\"\n        mean_N  = sums.sum_wN   / sums.sum_w\n        mean_dU = sums.sum_wdU  / sums.sum_w\n        mean_NdU = sums.sum_wNdU / sums.sum_w\n        cov     = mean_NdU - mean_N * mean_dU\n        return -self.beta * cov\n```\n\n**Check your understanding:** Why does `new_sums` use `+` (accumulate) rather than replacing the sums? Because we call `__call__` inside a `jax.lax.scan` loop — each call receives the current sums, adds one step's contribution, and returns the updated sums. After $K$ steps, `finalize` reads the total. This is the JAX-idiomatic way to write a recurrence that is fully JIT-compilable.\n\n**Common mistake:** Making `ObservableWithGradient` a stateful Python object that appends to a list. This works in eager mode but breaks under `jax.jit` because Python-side list append is a side effect that JAX cannot trace. The running-sums pattern avoids this entirely.\n\n---\n\n## Bitwise Reproducibility and Why CRN Is Free Under kUPS\n\n### The Stateless-Propagator + Key-Chain Story\n\nThe kUPS design blog highlights this explicitly: *\"Simulations are bitwise reproducible, because replaying the same sequence of keys from a given state always yields identical trajectories.\"*\n\nThis is a consequence of the `(key, state) → state'` design. There is no hidden global RNG. To replay a trajectory, you supply the same initial key and split it the same way at each step:\n\n```python\nfrom jax import random\n\ndef key_chain(seed):\n    \"\"\"Stateless key generator — identical to kUPS's key_chain.\"\"\"\n    key = random.PRNGKey(seed)\n    while True:\n        key, subkey = random.split(key)\n        yield subkey\n\n# Bitwise identical replays:\nchain_A = key_chain(42)\nchain_B = key_chain(42)\n# next(chain_A) == next(chain_B) always, even after 10^6 steps\n```\n\n### CRN as a Direct Consequence\n\nRecall from Module 2: Common Random Numbers (CRN) couples the two chemical-potential chains $(μ_H, μ_L)$ by running them with the same random-key stream. This cancels leading-order variance in the $\\Delta N$ gradient because $\\partial U / \\partial \\theta$ depends on configuration and $\\theta$ only, not on $\\mu$ — so identical proposals on both chains produce correlated $\\partial U / \\partial \\theta$ values that cancel in the difference.\n\nUnder the stateless-propagator design, CRN is literally free: feed the same key to both chains.\n\n```python\ndef crn_gradient_step(key, state_H, state_L, estimator_H, estimator_L):\n    \"\"\"Both chains advance with the SAME key → CRN coupling.\"\"\"\n    # No split needed: feed the same key to both propagators\n    (state_H_new, sums_H_new), _ = estimator_H(key, (state_H, sums_H))\n    (state_L_new, sums_L_new), _ = estimator_L(key, (state_L, sums_L))  # same key!\n    return state_H_new, state_L_new, sums_H_new, sums_L_new\n```\n\n**Figure 2: Why CRN reduces variance in ΔN gradient estimation**\n\n```\nWithout CRN (independent keys):\n  Chain H:  key₁ᴴ → move → N_H, ∂U/∂θ_H    (different proposal noise)\n  Chain L:  key₁ᴸ → move → N_L, ∂U/∂θ_L\n\n  Gradient: −β·[Cov_H(N,∂U) − Cov_L(N,∂U)]\n              ↑ leading-order noise in each term is INDEPENDENT\n              → Var(diff) = Var_H + Var_L   (additive!)\n\nWith CRN (same key):\n  Chain H:  key₁ → move with μ_H → N_H, config q\n  Chain L:  key₁ → move with μ_L → N_L, SAME config q (approx)\n\n  ∂U/∂θ at the same config q → nearly identical on both chains!\n  Gradient: −β·[Cov_H(N,∂U) − Cov_L(N,∂U)]\n              ↑ ∂U/∂θ terms CANCEL in the difference\n              → Var(diff) ≈ Var(N_H − N_L) only\n              → 3–10× variance reduction empirically\n```\n\nUnder `jax.jit`, this is also deterministic: the JIT-compiled function takes the key as a static input and produces a bitwise-identical output every time. This means CRN is not just a statistical technique — it is a *design property* that falls out naturally from the stateless interface.\n\n---\n\n## The CFG Property Head: From Gradient to Conditional Generator\n\nWe now have a gradient $\\partial \\Delta N / \\partial \\theta$ that is sampler-agnostic and efficient. The final step is attaching this gradient to a downstream generative model.\n\n### Setup: The MOF Diffusion Generator\n\nA discrete MOF diffusion generator (MOFDiff-style or CDVAE-style) learns a denoising score network $\\mathbf{s}_\\theta(\\tilde{g}, t)$ over continuous relaxations $\\tilde{g}$ of a discrete MOF graph $g$. At inference time, we sample by running a reverse diffusion ODE:\n\n$$d\\tilde{g} = \\left[-\\frac{1}{2} \\sigma^2(t) \\mathbf{s}_\\theta(\\tilde{g}, t)\\right] dt + \\sigma(t)\\, d\\mathbf{W}_t$$\n\nThis generates structures distributed according to the generator's learned prior — no condition on $\\Delta N$.\n\n### Classifier-Free Guidance\n\nThe key idea from diffusion guidance[^2] is that we can steer generation toward high-$\\Delta N$ samples by injecting a guidance gradient into the score:\n\n$$\\mathbf{s}_{\\text{guided}}(\\tilde{g}, t) = \\underbrace{\\mathbf{s}_\\theta(\\tilde{g}, t)}_{\\text{prior score}} + \\underbrace{w \\cdot \\nabla_{\\tilde{g}} \\log p(\\Delta N \\geq \\Delta N^*)}_{\\text{guidance signal}}$$\n\nIn full:\n\n$$\\boxed{s_{\\text{guided}} = s_\\theta(\\tilde{g}) + w \\cdot \\partial_{\\tilde{g}} \\log p(\\Delta N \\geq \\Delta N^*)}$$\n\n[^2]: This follows the classifier guidance formulation of Dhariwal & Nichol (NeurIPS 2021), applied here to a physical property head rather than a classifier. The key difference is that our \"classifier\" is not a neural network — it is the score-function gradient estimator, which is exact for the physical property.\n\nwhere $w$ is the guidance weight and $\\Delta N^*$ is the target working capacity.\n\n### Stage 2 — Notation\n\n| Symbol | Meaning |\n|--------|---------|\n| $\\tilde{g}$ | Continuous relaxation of a discrete MOF graph (positions, charges, unit cell) |\n| $\\mathbf{s}_\\theta(\\tilde{g}, t)$ | Score network: $\\nabla_{\\tilde{g}} \\log p_t(\\tilde{g})$ |\n| $\\Delta N(\\tilde{g})$ | Working capacity at operating conditions $(T, P_H, P_L)$ — computed by short GCMC |\n| $p(\\Delta N \\geq \\Delta N^*)$ | Probability that a generated sample exceeds the target |\n| $w$ | Guidance weight: higher $w$ = stronger steering |\n\n### Stage 3 — Computing the Guidance Gradient\n\nTo compute $\\nabla_{\\tilde{g}} \\log p(\\Delta N \\geq \\Delta N^*)$, we need to:\n\n1. Evaluate $\\Delta N(\\tilde{g})$ by running a short GCMC chain at $(μ_H, μ_L)$.\n2. Compute $\\partial \\Delta N / \\partial \\tilde{g}$ using the score-function estimator.\n3. Convert to $\\nabla_{\\tilde{g}} \\log p(\\Delta N \\geq \\Delta N^*)$ via a soft indicator.\n\nFor step 3: use a soft indicator $\\sigma(\\alpha(\\Delta N - \\Delta N^*))$ where $\\sigma$ is the sigmoid and $\\alpha$ controls sharpness. Then:\n\n$$\\nabla_{\\tilde{g}} \\log p(\\Delta N \\geq \\Delta N^*) \\approx \\frac{\\sigma'(\\alpha(\\Delta N - \\Delta N^*))}{\\sigma(\\alpha(\\Delta N - \\Delta N^*))} \\cdot \\alpha \\cdot \\frac{\\partial \\Delta N}{\\partial \\tilde{g}}$$\n\n**Common mistake:** Using a hard indicator $\\mathbf{1}[\\Delta N \\geq \\Delta N^*]$ (i.e., step function). The gradient is exactly zero almost everywhere, which gives zero guidance. The soft indicator is essential — it provides a non-zero gradient that points toward the target.\n\nIn code:\n\n```python\ndef compute_guidance_grad(g_tilde, target_dN, alpha=5.0):\n    \"\"\"\n    Compute ∇_{g̃} log p(ΔN ≥ target) using the score-function estimator.\n    \n    Args:\n        g_tilde: continuous MOF relaxation (positions, charges, cell)\n        target_dN: working capacity target (mmol/g)\n        alpha: sharpness of soft indicator\n    Returns:\n        guidance_grad: same shape as g_tilde\n    \"\"\"\n    # Step 1: compute ΔN via short GCMC\n    # (wrapped as ObservableWithGradient over g_tilde)\n    dN, dN_grad = observable_with_gradient(g_tilde)\n    # dN is a scalar, dN_grad = ∂ΔN/∂g̃ same shape as g_tilde\n\n    # Step 2: soft indicator and its derivative\n    u = alpha * (dN - target_dN)\n    soft_prob = jax.nn.sigmoid(u)\n    soft_deriv = soft_prob * (1 - soft_prob)  # sigmoid'(u)\n\n    # Step 3: chain rule → guidance gradient\n    log_p_grad = (alpha * soft_deriv / (soft_prob + 1e-8)) * dN_grad\n    return log_p_grad\n```\n\n### Stage 4 — The Key Claim: Condition-Free Generator\n\nThe crucial insight is that $\\Delta N^*$ and the operating conditions $(T, P_H, P_L)$ enter *only* through the guidance gradient at inference time. The score network $\\mathbf{s}_\\theta$ is trained once, unconditionally. To generate MOFs for a new operating condition, you change only the `target_dN` argument to `compute_guidance_grad`.\n\nThe baseline approach — train one property predictor per $(T, P_H, P_L)$ condition — costs $N_{\\mathrm{GPU-hours}} \\times K_{\\mathrm{conditions}}$. The gradient head costs $M_{\\mathrm{GPU-hours}}$ once. For 12 distinct operating conditions (as in the paper's experimental matrix), this is a $12\\times$ reduction in training compute.\n\n**Figure 3: CFG sampling pipeline**\n\n```\n         ┌─────────────────────────────────────────────────────┐\n         │    Reverse Diffusion (Euler-Maruyama, T steps)      │\n         │                                                      │\n         │  g̃_T (noise) → ... → g̃_t → g̃_{t-1} → ... → g̃_0  │\n         │                        │                            │\n         │             ┌──────────┴──────────────────┐        │\n         │             │  Score update at time t       │        │\n         │             │                               │        │\n         │             │  prior_score = s_θ(g̃_t, t)  │        │\n         │             │                               │        │\n         │             │  guide_score =               │        │\n         │             │    w · ∇_{g̃} log p(ΔN≥Δ*)   │        │\n         │             │       │                      │        │\n         │             │       └── short GCMC         │        │\n         │             │           at (μ_H, μ_L, T)  │        │\n         │             │           → ΔN, ∂ΔN/∂g̃      │        │\n         │             │                               │        │\n         │             │  g̃_{t-1} = g̃_t              │        │\n         │             │    + dt·(prior + guide)       │        │\n         │             │    + σ_t · noise              │        │\n         │             └───────────────────────────────┘        │\n         │                                                      │\n         │  Change w or target Δ* → different MOFs, no retraining │\n         └─────────────────────────────────────────────────────┘\n```\n\n**Check your understanding:** What happens as $w \\to \\infty$? The guidance term overwhelms the prior score, and the generator ignores the training data distribution. Samples may have high $\\Delta N$ but be chemically unphysical — extreme bond lengths, impossible coordination geometries. This is the same mode-seeking vs diversity trade-off that appears in image generation guidance. The trust region (cap guidance strength by ESS ≥ 50%) from Module 2 applies here too.\n\n---\n\n## Performance Arithmetic: What You Actually Get\n\nThe kUPS blog reports two headline numbers. Let us put them together.\n\n![kUPS throughput benchmark: 1.8× NVT vs ASE, 49× µVT vs RASPA](images/kups_throughput_benchmark.png)\n\n*Figure: kUPS achieves 49× throughput over RASPA for µVT GCMC on a 3×3×3 MOF supercell on a single NVIDIA L4 GPU. This is the raw sampling throughput that the gradient estimator inherits.*\n\nThe gradient estimator adds what overhead per sample?\n\n- Evaluate $\\partial U / \\partial \\theta$: analytic pair-sum derivative, O(N²) for LJ, same scaling as energy evaluation. Roughly 1× the cost of a single energy evaluation.\n- Update 4 running sums: O(1) operations, negligible.\n- Net overhead: approximately 2× the cost of a plain GCMC step (one energy eval + one gradient eval).\n\nThe MBAR-5pt baseline requires 5 separate simulation runs at perturbed $\\theta$ values to estimate one gradient component. The score-function estimator accumulates the gradient *while running*, needing approximately $1/8$th the samples to achieve the same accuracy.\n\n$$\\underbrace{49\\times}_{\\text{GCMC throughput over RASPA}} \\times \\underbrace{8\\times}_{\\text{gradient sample-efficiency over MBAR-5pt}} = 392\\times \\text{ effective gradient throughput}$$\n\n(with the ≈2× overhead of gradient evaluation absorbed into the 8× efficiency gain, leaving a net ≈196× combined advantage — still the headline result that lands a PR).\n\n**Check your understanding:** What would break this arithmetic? If $\\partial U / \\partial \\theta$ is not analytically available — for instance, if $\\theta$ lives entirely inside an MLFF with no exposed gradient interface. This is why the MLFF/classical decomposition from the source material is essential: sample with MACE (expensive, accurate), but only take $\\partial U / \\partial \\theta$ through the *classical* Coulomb + LJ sidecar (cheap, analytic). \"Expensive sampling, cheap exact gradient.\"\n\n---\n\n## Falsification Gates and Trust Regions\n\nNo research proposal is complete without explicit failure criteria. The source material lists five:\n\n| Gate | Failure condition | Consequence |\n|------|-------------------|-------------|\n| Accuracy vs MBAR | Relative error $> 20\\%$ at $N = 10^6$ samples | Do not ship |\n| CRN variance reduction | $< 2\\times$ on $\\geq 80\\%$ of components | Rewrite as \"tried, didn't help\" |\n| Fractional lattice gradient | Sign disagrees with FD $> 10\\%$ of time | Kill lattice phase |\n| DFT endpoint check | Gradient direction disagrees at optimization endpoint | Paper is wrong; stop |\n| Classical-only ablation | Classical LJ sampling misses something MLFF finds | Downgrade headline |\n\nThese are not optional. Pre-stating falsification criteria is what separates a research proposal from wishful thinking.\n\nThe **trust region on ESS** is a runtime safeguard. Effective sample size[^3]:\n\n$$\\mathrm{ESS} = \\frac{\\left(\\sum_k w_k\\right)^2}{\\sum_k w_k^2}$$\n\nmeasures how many \"equivalent independent samples\" the importance-weighted estimator provides. If $\\mathrm{ESS} / K < 0.5$ (fewer than 50% effective samples), the gradient variance is too high to trust. In that regime: refuse to take an optimizer step.\n\n[^3]: ESS is the standard metric for diagnosing importance-sampling degeneracy. When all weight concentrates on a single sample ($w_1 \\approx \\sum_k w_k$), ESS $\\approx 1$ regardless of $K$. This is the \"weight collapse\" failure mode of naive importance sampling with a mismatched proposal.\n\nThe **Binder cumulant detector** refuses gradients near capillary condensation. Near a phase transition, $\\mathrm{Cov}(N, \\partial U/\\partial\\theta)$ is dominated by fluctuations with diverging variance — the gradient estimate becomes unreliable regardless of sample size. The Binder cumulant $U_4 = 1 - \\langle N^4 \\rangle / (3 \\langle N^2 \\rangle^2)$ signals proximity to a transition; when $|U_4 - U_4^{\\mathrm{reference}}| > \\epsilon$, the estimator refuses to report.\n\n---\n\n## Analytical Questions\n\n### Question 1 — The Support Coverage Assumption\n\nThe sampler-agnosticism proof requires that $\\nu$ (the sampling distribution) is absolutely continuous with respect to $p_\\theta$ — i.e., $\\nu$ covers the full support of $p_\\theta$.\n\n(a) For classical GCMC, what is $\\nu$? Is the support-coverage assumption automatically satisfied? At what physical conditions might it fail?\n\n(b) For a Boltzmann generator trained at parameters $\\theta_0$, the generator's distribution $q_\\phi$ approximates $p_{\\theta_0}$. If we then change $\\theta$ to $\\theta_1$ (e.g., increase $\\varepsilon$), the support of $p_{\\theta_1}$ may differ from that of $q_\\phi \\approx p_{\\theta_0}$. When does this become a problem? Quantify the variance inflation in terms of $\\beta \\|U(\\cdot;\\theta_1) - U(\\cdot;\\theta_0)\\|_\\infty$.\n\n(c) The fractional-coordinate reparameterization from Module 3 was designed to ensure that the sampling domain is $\\theta$-invariant for lattice parameters $a$. Is this related to the support-coverage condition? Explain.\n\n### Question 2 — Variance Ordering Across Samplers\n\nLet $\\mathrm{Var}_{\\nu}(\\hat{g})$ denote the variance of the gradient estimator when samples come from distribution $\\nu$.\n\n(a) For classical GCMC with autocorrelation time $\\tau$, the effective sample size is approximately $K/(2\\tau + 1)$. Express $\\mathrm{Var}_{\\mathrm{GCMC}}(\\hat{g})$ in terms of $K$, $\\tau$, and $\\mathrm{Var}_{p_\\theta}(N \\cdot \\partial U/\\partial\\theta)$.\n\n(b) For a Boltzmann generator with $\\chi^2$ divergence $\\chi^2(p_\\theta \\| q_\\phi) = \\delta$, there is a theoretical upper bound $\\mathrm{Var}_{\\mathrm{BG}}(\\hat{g}) \\leq (1 + \\delta) \\cdot \\mathrm{Var}_{p_\\theta}(\\hat{g})$. Under what conditions does the BG outperform GCMC? Express the crossover condition in terms of $\\tau$ and $\\delta$.\n\n(c) The kUPS sampler-agnostic test requires that the three samplers agree \"within estimator noise.\" Given (a) and (b), derive the minimum sample count $K$ needed for a two-sigma overlap between GCMC and BG estimates, as a function of $\\tau$ and $\\delta$.\n\n### Question 3 — The API Shape as a Design Contribution\n\nThe source material states explicitly: *\"A 3kloc PR dropped cold is dead on arrival; an API-agreed extension lands — especially given the blog's explicit contributor-invitation posture.\"*\n\n(a) `ObservableWithGradient` as designed above has a `finalize` method that is called after $K$ steps. An alternative design would have the gradient automatically tracked inside `state` without a separate finalization step. What are the trade-offs? Which design is more compatible with `jax.lax.scan`?\n\n(b) The current design accumulates a single covariance (one observable, one gradient function). Generalize the design to accumulate $M$ observables simultaneously (e.g., $\\langle N \\rangle$, $\\langle N^2 \\rangle$, $\\langle U \\rangle$). What changes in the `GradientState` dataclass? What changes in `finalize`?\n\n(c) The Propagator Protocol above returns `State`. kUPS's actual signature is `(key, state) → (state, aux)` where `aux` is a dictionary of auxiliary outputs. How does this affect the `compose` function? If a propagator in the middle of a chain needs to pass information to `ObservableWithGradient` (e.g., the log-weight from a BG proposal), what interface should carry it?\n\n### Question 4 — CFG Guidance Weight Calibration\n\nThe guidance update is $s_{\\text{guided}} = s_\\theta(\\tilde{g}) + w \\cdot \\nabla_{\\tilde{g}} \\log p(\\Delta N \\geq \\Delta N^*)$.\n\n(a) For a pretrained generator with typical score magnitude $\\|\\mathbf{s}_\\theta\\|_2 \\approx 1.0$ (in normalized units), and a gradient estimator with $\\|\\nabla_{\\tilde{g}} \\Delta N\\|_2 \\approx 0.1$ mmol/g per Å, what guidance weight $w$ makes the guidance term equal in magnitude to the prior score? Express in terms of the soft-indicator slope $\\alpha$.\n\n(b) The guidance gradient $\\nabla_{\\tilde{g}} \\Delta N$ is estimated with Monte Carlo noise of standard deviation $\\sigma_{\\mathrm{MC}} = 0.05$ mmol/g per Å (typical for $K = 10^4$ steps). At what guidance weight $w$ does the noise in the guidance term become comparable to the signal in the prior score? Above this weight, what failure mode do you expect?\n\n(c) Propose a practical calibration procedure: how would you choose $w$ adaptively during a sampling run, based on quantities available at inference time?\n\n---\n\n## Synthesis: What This Module Completes\n\nWe have now assembled the full `ObservableWithGradient` primitive. Let us trace back through the course to see what each module contributed:\n\n| Module | Contribution to the final primitive |\n|--------|-------------------------------------|\n| 0 | The formula: $\\partial \\langle N \\rangle / \\partial \\theta = -\\beta \\cdot \\mathrm{Cov}(N, \\partial U/\\partial\\theta)$ |\n| 1 | The classical GCMC sampler that provides the samples; the running-sums accumulation pattern |\n| 2 | The two-state $\\Delta N$ objective; CRN coupling; Rao-Blackwellization control variate |\n| 3 | The fractional-coordinate reparameterization for lattice gradients |\n| 4 (this module) | Importance-weighted generalization to any sampler; the Propagator Protocol interface; the `ObservableWithGradient` decorator; the CFG property head |\n\nThe final result — the sentence the kUPS PR should be able to deliver truthfully — is:\n\n> *\"We get unbiased gradients of any equilibrium observable through any kUPS propagator chain — classical GCMC, learned-proposal MCMC, or Boltzmann-generator — with ~8× sample-efficiency over MBAR, inheriting the toolkit's 49× sampling throughput.\"*\n\n### What Makes This More Than a Methods Paper\n\nThe gradient formula is elegant but not surprising to a statistician. The variance-reduction stack (CRN + Rao-Blackwell + fractional reparameterization) is careful but incremental. What turns this into a paper is the **composability claim**: that the gradient primitive is not a parallel system but a *first-class component* of kUPS, snapping into the existing propagator chain interface with no modification to any existing code.\n\nThis is the same design philosophy that made JAX transformations (`jit`, `vmap`, `grad`) powerful: they compose freely with any function that follows the pure-function contract. A thermostat is a propagator. A Lennard-Jones potential is a propagator. A gradient estimator is a propagator. The user builds simulations by composing these, and every new component immediately works with every existing one.\n\nThe MOF working-capacity example and the CFG guidance head are **applications** of the primitive, not the primitive itself. The primitive is the claim that \"any method with any other by construction\" extends to include differentiable observable estimation.\n\n### What the Exercises Will Build\n\n- **Exercise 1** — You will derive and implement the importance-weighted covariance estimator from scratch, using a synthetic BG that generates from a tractable mixture-of-Gaussians. This grounds the sampler-agnosticism claim in code, not just math.\n- **Exercise 2** — You will run all three samplers (classical GCMC, biased-proposal MCMC, synthetic BG) through the same estimator and verify that they agree within noise. The headline message: variance differs, mean doesn't.\n- **Exercise 3** — You will package the estimator as a proper `ObservableWithGradient` propagator, satisfying the kUPS protocol, and demonstrate that the same decorator drives all three samplers without any code changes.\n- **Exercise 4** — You will sketch the CFG guidance head: wire `ObservableWithGradient` into a soft-indicator guidance gradient and observe the mean $\\Delta N$ of generated samples rise monotonically with guidance weight $w \\in \\{0, 1, 5, 20\\}$.\n\nAfter Exercise 4, you will have built — from the Zwanzig identity in Module 0 to the CFG head in Module 4 — the complete artifact the paper ships as `ObservableWithGradient`.\n\n---\n\n[^1]: Noé, Frank, et al. \"Boltzmann generators: Sampling equilibrium states of many-body systems with deep learning.\" *Science* 365.6457 (2019): eaaw1147. The key result is that an invertible network trained on free energy minimization produces one-shot equilibrium samples with tractable importance weights — unlike MCMC which requires $O(\\tau_{\\mathrm{mix}})$ steps to decorrelate.\n\n[^2]: This follows the classifier guidance formulation of Dhariwal & Nichol (NeurIPS 2021), applied here to a physical property head rather than a classifier. The key difference is that our \"classifier\" is not a neural network — it is the score-function gradient estimator, which is exact for the physical property.\n\n[^3]: ESS is the standard metric for diagnosing importance-sampling degeneracy. When all weight concentrates on a single sample ($w_1 \\approx \\sum_k w_k$), ESS $\\approx 1$ regardless of $K$. This is the \"weight collapse\" failure mode of naive importance sampling with a mismatched proposal.\n", "exercises": []}}}</script>
