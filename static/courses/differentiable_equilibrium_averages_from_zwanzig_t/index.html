    <script id="course-data" type="application/json">{"courseName": "differentiable_equilibrium_averages_from_zwanzig_t", "detail": {"title": "Differentiable Equilibrium Averages: From Zwanzig to Sampler-Agnostic Gradients for MOF Design", "description": "A research-paper-grade course that reconstructs the kUPS differentiable-μVT proposal from scratch. You will derive the score-function / Zwanzig identity ∂⟨N⟩/∂θ = −β·Cov(N, ∂U/∂θ) from the grand-canonical partition function, implement a minimal GCMC sampler in JAX, wire the gradient estimator on top, validate against finite differences and MBAR, build the two-state working-capacity objective ΔN with Common-Random-Numbers and Rao-Blackwell variance reduction, solve the lattice-gradient problem via fractional-coordinate reparameterization, and finally package the whole thing as a sampler-agnostic composable propagator that works for classical GCMC, learned-proposal MCMC, and importance-weighted Boltzmann-generator samples — the exact artifact the paper ships as `ObservableWithGradient`. The course leans on your condensed-matter stat-mech background (Boltzmann weights, fugacity, ensemble averages are assumed fluent) and uses JAX as the autodiff substrate so you build real intuition for stateless propagators + random-key reproducibility, which is what makes CRN work under jit.", "modules": [{"index": 0, "title": "The Score-Function Identity for Equilibrium Averages", "description": "Derive the Zwanzig / score-function gradient estimator for ensemble averages. Start in NVT to warm up (familiar Boltzmann weights), then promote to μVT so the N is a stochastic jump variable. End with a precise statement of when the identity fails and why pathwise/reparameterization gradients are structurally unavailable for GCMC — the single sentence that forces the entire paper's choice of estimator.", "dir_name": "module_00_the_scorefunction_identity_for_equilibrium_average", "exercises": ["ex01_derive_the_zwanzig_identity_in_nvt_from_first_prin.py", "ex02_promote_the_derivation_from_nvt_to_μvt__particle_n.py", "ex03_why_pathwise_gradients_fail_contrastive_against_a.py", "ex04_difftre_in_one_page_reweighting_for_nvt_forcefield.py"], "depends_on": []}, {"index": 1, "title": "Minimal GCMC Sampler and the Gradient Estimator On Top", "description": "Build a toy Grand-Canonical Monte Carlo sampler for a Lennard-Jones gas in a cubic box — insertion, deletion, translation moves with correct Metropolis acceptance — in JAX with stateless propagators and key-chain RNG. Wire the score-function estimator as an online covariance accumulator on top. Validate the sanity test the paper commits to: 'gradient of ⟨N⟩ w.r.t. ε matches finite difference to within 3%.'", "dir_name": "module_01_minimal_gcmc_sampler_and_the_gradient_estimator_on", "exercises": ["ex01_lj_energy_and_its_analytic_gradients_the_classical.py", "ex02_stateless_gcmc_propagator_with_insertdeletetransla.py", "ex03_online_covariance_accumulator__the_estimator_as_a.py", "ex04_finitedifference_validation__the_papers_3_sanity_t.py"], "depends_on": [0]}, {"index": 2, "title": "Working Capacity ΔN, Common Random Numbers, and Rao-Blackwell", "description": "Promote the single-state estimator to the two-state working-capacity objective ΔN = ⟨N⟩_H − ⟨N⟩_L. Run two coupled GCMC chains at (μ_H, μ_L) sharing a random-key stream (CRN). Measure the variance reduction against the uncoupled baseline and verify the paper's quantitative gate: ≥2× CRN variance reduction on ≥80% of components. Add Rao-Blackwellization and confirm the reductions compose multiplicatively.", "dir_name": "module_02_working_capacity_δn_common_random_numbers_and_raob", "exercises": ["ex01_twostate_δn_objective__uncoupled_baseline.py"], "depends_on": [0, 1]}, {"index": 3, "title": "Structural Parameters: Fractional-Coordinate Reparameterization and Lattice Gradients", "description": "The hardest technical piece. When θ is the lattice scale a, naively sampling positions q ∈ [0, a)³ makes the sampling support itself θ-dependent — ∂/∂a pulls under an integral with moving limits and the importance-weight variance blows up as V·(δa/a)². The fix is to sample fractional coordinates s ∈ [0,1)³ (support is θ-invariant) and evaluate q = h(a)·s at energy time. Then ∂U/∂a enters cleanly via chain rule through the cell matrix plus an Ewald reciprocal-space cell-derivative term. This module is why the paper can claim 'gradients w.r.t. structural parameters' beyond DiffTRe.", "dir_name": "module_03_structural_parameters_fractionalcoordinate_reparam", "exercises": ["ex01_naive_latticescale_gradient_watch_the_importance_w.py", "ex02_fractionalcoordinate_gcmc__θinvariant_support.py", "ex03_ewald_cellderivative__ureca_by_hand.py", "ex04_endtoend_lattice_gradient_vs_finite_difference__th.py"], "depends_on": [0, 1, 2]}, {"index": 4, "title": "Sampler-Agnostic Design and the ObservableWithGradient Primitive", "description": "The composability payoff. Show the same score-function estimator is unbiased under three different samplers — classical GCMC, a stubbed learned-proposal MCMC, and synthetic importance-weighted Boltzmann-generator samples — with agreement within estimator noise. Package the kernel as a first-class ObservableWithGradient propagator respecting the (key, state) → state' signature. End with a sketched CFG head that uses ∂ΔN/∂g̃ as guidance for a tiny continuous-MOF diffusion generator — not load-bearing for the kernel, but the conversion of 'we have a gradient' into 'we have a conditional generator.'", "dir_name": "module_04_sampleragnostic_design_and_the_observablewithgradi", "exercises": [], "depends_on": [0, 1, 2, 3]}]}, "modules": {"module_00_the_scorefunction_identity_for_equilibrium_average": {"content": "# Module 0: The Score-Function Identity for Equilibrium Averages\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Problem: Designing MOFs by Gradient Descent](#the-problem-designing-mofs-by-gradient-descent)\n- [The Grand-Canonical Ensemble: A Physicist's Warm-Up](#the-grand-canonical-ensemble-a-physicists-warm-up)\n- [Differentiating Under the Integral: The Core Maneuver](#differentiating-under-the-integral-the-core-maneuver)\n- [The Zwanzig Identity in Full](#the-zwanzig-identity-in-full)\n- [The Monte Carlo Gradient Estimator: Turning Math into Code](#the-monte-carlo-gradient-estimator-turning-math-into-code)\n- [Three Families of MC Gradients — and Why Two Fail Here](#three-families-of-mc-gradients--and-why-two-fail-here)\n- [DiffTRe: The NVT Ancestor](#difftre-the-nvt-ancestor)\n- [Computing ∂U/∂θ in Practice](#computing-u-in-practice)\n- [What the Estimator Does NOT Require](#what-the-estimator-does-not-require)\n- [The kUPS Platform and Where This Fits](#the-kups-platform-and-where-this-fits)\n- [Synthesis: The Course in One Identity](#synthesis-the-course-in-one-identity)\n- [Analytical Questions](#analytical-questions)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Derive $\\partial\\langle N\\rangle / \\partial\\theta = -\\beta \\cdot \\text{Cov}(N, \\partial U/\\partial\\theta)$ directly from the grand-canonical partition function by differentiating under the integral.\n2. Explain *why* the particle number $N$ in a μVT ensemble forces a score-function gradient estimator — and why pathwise (reparameterization) estimators are unavailable.\n3. Translate the identity into a Monte Carlo covariance estimator and identify the three common mistakes that produce wrong answers.\n4. Situate the Zwanzig identity within Mohamed et al.'s taxonomy of Monte Carlo gradient estimators.\n5. Recognize DiffTRe (Thaler & Zavadlav, Nat. Commun. 2021) as the NVT single-state precursor and articulate precisely what this course adds beyond it.\n\n---\n\n## The Problem: Designing MOFs by Gradient Descent\n\nMetal-organic frameworks (MOFs) are crystalline, nanoporous materials — essentially molecular scaffolding — that can selectively adsorb CO₂ from flue gas or from air. They're among the most promising sorbents for carbon capture. A practical MOF for Direct Air Capture (DAC) must have high *working capacity*: the difference in adsorbed CO₂ between adsorption conditions (high pressure) and regeneration conditions (low pressure).\n\nCall this working capacity $\\Delta N = \\langle N \\rangle_{\\mu_H} - \\langle N \\rangle_{\\mu_L}$, where $\\mu_H$ and $\\mu_L$ are the chemical potentials at high and low pressure, and $\\langle N \\rangle_\\mu$ is the average number of adsorbed CO₂ molecules at that chemical potential. We want to maximize $\\Delta N$ over the design parameters $\\theta$ — partial charges on the framework atoms, Lennard-Jones radii and well-depths, lattice constants. This is a materials optimization problem.\n\nThe standard workflow is: enumerate candidate MOFs from chemical intuition → simulate each via Grand-Canonical Monte Carlo (GCMC) → pick the best. This is embarrassingly parallel screening, and it works — but it's slow, it doesn't tell you which direction to perturb a good MOF to make it better, and it doesn't compose with a generative model that proposes new structures.\n\nWhat if we could compute $\\partial \\Delta N / \\partial \\theta$ — the gradient of working capacity with respect to the design parameters — and use it to steer an optimizer or a generator?\n\nThe obstacle is obvious to anyone who's thought about it: $\\langle N \\rangle$ is an equilibrium average computed by *Monte Carlo sampling*, which involves a discrete Metropolis accept/reject step. How do you differentiate through a step function?\n\n**This module derives the answer.** It turns out you don't differentiate *through* the sampler at all. Instead, you differentiate the *partition function* and swap the order of operations. The result is a formula that requires only samples and an analytic $\\partial U / \\partial \\theta$ — no backprop through Metropolis, no tricks, no approximations. Just a covariance.\n\n> **Running example throughout this module:** A single-site MOF lattice that can hold 0, 1, or 2 CO₂ molecules. The interaction energy is $U(q; \\theta) = \\theta \\cdot q^2$ where $q \\in \\{-1, 0, 1\\}$ is the position coordinate on the site and $\\theta > 0$ is a Lennard-Jones-style well depth. This toy model is analytically tractable, so we can verify every formula in closed form before trusting it on a real 3D framework.\n\n---\n\n## The Grand-Canonical Ensemble: A Physicist's Warm-Up\n\nWith your condensed-matter background, the grand-canonical ensemble is familiar ground. Let's set notation carefully because every symbol in the derivation carries weight.\n\nThe μVT (grand-canonical) ensemble fixes chemical potential $\\mu$, volume $V$, and temperature $T = 1/(k_B \\beta)$. The particle number $N$ fluctuates. The grand partition function is:\n\n$$\\Xi(\\theta) = \\sum_{N=0}^{\\infty} \\frac{1}{N!} \\, e^{\\beta \\mu N} \\int d\\mathbf{q}^N \\, e^{-\\beta U(\\mathbf{q}^N; \\theta)}$$\n\n| Symbol | Meaning |\n|--------|---------|\n| $N$ | Number of particles (fluctuating, integer-valued) |\n| $\\mathbf{q}^N$ | Joint position vector of all $N$ particles, $\\mathbf{q}^N \\in \\mathbb{R}^{3N}$ |\n| $U(\\mathbf{q}^N; \\theta)$ | Interaction potential energy, parameterized by $\\theta$ |\n| $\\theta$ | Design parameters (charges, LJ $\\varepsilon/\\sigma$, lattice constants) |\n| $\\beta$ | Inverse temperature $1/(k_B T)$ |\n| $\\mu$ | Chemical potential (controls average $N$) |\n| $z = e^{\\beta\\mu}$ | Fugacity — often cleaner to write than $\\mu$ |\n\nThe $1/N!$ is the classical indistinguishability correction (Gibbs factor). The $e^{\\beta \\mu N}$ term is the fugacity weight that makes insertion of a particle energetically favorable when $\\mu$ is large.\n\nThe probability of finding the system in a specific configuration $(N, \\mathbf{q}^N)$ is:\n\n$$p(N, \\mathbf{q}^N; \\theta) = \\frac{1}{\\Xi(\\theta)} \\cdot \\frac{1}{N!} \\, e^{\\beta \\mu N} \\, e^{-\\beta U(\\mathbf{q}^N; \\theta)}$$\n\nThe equilibrium average of any observable $A(N, \\mathbf{q}^N)$ is:\n\n$$\\langle A \\rangle_\\theta = \\sum_N \\int d\\mathbf{q}^N \\, A(N, \\mathbf{q}^N) \\, p(N, \\mathbf{q}^N; \\theta)$$\n\nFor our purposes, $A = N$ (particle count), but the identity we'll derive holds for any observable.\n\n**Check your understanding:** In the toy example, $N \\in \\{0, 1, 2\\}$ and $q \\in \\{-1, 0, 1\\}$. The partition function has $3 \\times 3 = 9$ terms (three occupation numbers × three positions, though $N=0$ has only one term). Write out $\\Xi(\\theta)$ explicitly. Which term dominates when $\\mu \\to -\\infty$? When $\\mu \\to +\\infty$?\n\n### Worked Example: The Toy Partition Function\n\nLet's compute $\\Xi(\\theta)$ for our toy model explicitly. With $N \\in \\{0, 1, 2\\}$ and single-particle positions $q \\in \\{-1, 0, 1\\}$ (each with measure 1), and $U(q; \\theta) = \\theta q^2$:\n\n$$\\begin{aligned}\nN=0 &: \\quad \\frac{1}{0!} e^{0} \\cdot 1 = 1 & \\scriptstyle{\\text{vacuum — one term}} \\\\\nN=1 &: \\quad \\frac{1}{1!} e^{\\beta\\mu} \\sum_{q \\in \\{-1,0,1\\}} e^{-\\beta\\theta q^2} = e^{\\beta\\mu} \\left(2e^{-\\beta\\theta} + 1\\right) & \\scriptstyle{\\text{three positions for one particle}} \\\\\nN=2 &: \\quad \\frac{1}{2!} e^{2\\beta\\mu} \\sum_{q_1} \\sum_{q_2} e^{-\\beta\\theta(q_1^2 + q_2^2)} = \\frac{e^{2\\beta\\mu}}{2} \\left(2e^{-\\beta\\theta} + 1\\right)^2 & \\scriptstyle{\\text{pairs of positions, indistinguishable}} \\\\\n\\end{aligned}$$\n\nAdding everything:\n\n$$\\Xi(\\theta) = 1 + e^{\\beta\\mu}\\left(2e^{-\\beta\\theta} + 1\\right) + \\frac{e^{2\\beta\\mu}}{2}\\left(2e^{-\\beta\\theta} + 1\\right)^2$$\n\nLet's call $Z_1(\\theta) = 2e^{-\\beta\\theta} + 1$ (the single-particle partition function). Then $\\Xi(\\theta) = 1 + e^{\\beta\\mu} Z_1 + \\frac{1}{2} e^{2\\beta\\mu} Z_1^2$.\n\nThe average particle number is $\\langle N \\rangle = e^{\\beta\\mu} Z_1 + e^{2\\beta\\mu} Z_1^2 / \\Xi(\\theta)$ (the numerator sums $N \\cdot (\\ldots)$ over the partition function terms).\n\nAnd now the gradient:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\cdot \\text{Cov}(N, \\partial U / \\partial \\theta) = -\\beta \\cdot \\text{Cov}(N, q^2)$$\n\nAt $\\theta = 1.0$, $\\beta = 1.0$, $\\mu = 0.5$: $Z_1 = 2e^{-1} + 1 \\approx 1.736$, $\\Xi \\approx 1 + 1.649 \\cdot 1.736 + \\frac{1}{2} \\cdot 2.718 \\cdot 1.736^2 \\approx 1 + 2.862 + 4.100 \\approx 7.962$.\n\n$\\langle N \\rangle \\approx (2.862 + 8.200)/7.962 \\approx 1.390$.\n\nYou can verify the gradient by finite differences: compute $\\langle N \\rangle$ at $\\theta + \\delta$ and $\\theta - \\delta$ and take $(⟨N⟩(\\theta+\\delta) - ⟨N⟩(\\theta-\\delta))/(2\\delta)$. In Exercise 2, you'll do exactly this and confirm agreement with the covariance estimator to within 1% on 50,000 samples.\n\nThe key insight to take away: **the derivative of a partition function sum is computable analytically at any parameterization, because each term $e^{-\\beta U(q;\\theta)}$ is smooth in $\\theta$.** The Monte Carlo estimator is just a way of computing this sum stochastically — instead of enumerating all $(N, q^N)$ combinations (exponential in $N$), we draw representative samples.\n\n---\n\n## Differentiating Under the Integral: The Core Maneuver\n\nHere is the central algebraic trick of this entire course, distilled to one page.\n\nWe want $\\partial \\langle N \\rangle / \\partial \\theta$. Let's compute it directly.\n\n**Stage 1 — Intuition:** The parameter $\\theta$ appears only inside $e^{-\\beta U(\\mathbf{q}^N;\\theta)}$. It does *not* appear in the fugacity weight $e^{\\beta \\mu N}$, the volume of integration $d\\mathbf{q}^N$, or the $1/N!$ factor. This means the derivative can pass directly through the sum and integral and land on the Boltzmann factor — which is a smooth exponential, not a step function.\n\n**Stage 2 — Notation check:** We write $\\langle N \\rangle = \\frac{1}{\\Xi} \\sum_N \\frac{e^{\\beta\\mu N}}{N!} \\int d\\mathbf{q}^N \\, N \\, e^{-\\beta U}$ and take $\\partial/\\partial\\theta$.\n\n**Stage 3 — Derivation:**\n\n$$\\begin{aligned}\n\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} &= \\frac{\\partial}{\\partial \\theta} \\left[ \\frac{1}{\\Xi} \\sum_N \\frac{e^{\\beta\\mu N}}{N!} \\int N \\, e^{-\\beta U} \\, d\\mathbf{q}^N \\right] & \\scriptstyle{\\text{expand } \\langle N \\rangle \\text{ as explicit integral}} \\\\[6pt]\n&= \\frac{1}{\\Xi} \\sum_N \\frac{e^{\\beta\\mu N}}{N!} \\int N \\left( -\\beta \\frac{\\partial U}{\\partial \\theta} \\right) e^{-\\beta U} \\, d\\mathbf{q}^N - \\frac{\\partial \\Xi^{-1}}{\\partial \\theta} \\cdot \\Xi \\langle N \\rangle & \\scriptstyle{\\text{product rule on } \\Xi^{-1} \\cdot (\\ldots)} \\\\[6pt]\n&= -\\beta \\left\\langle N \\frac{\\partial U}{\\partial \\theta} \\right\\rangle + \\frac{1}{\\Xi^2} \\frac{\\partial \\Xi}{\\partial \\theta} \\cdot \\Xi \\langle N \\rangle & \\scriptstyle{\\frac{\\partial}{\\partial\\theta}\\Xi^{-1} = -\\Xi^{-2} \\frac{\\partial \\Xi}{\\partial \\theta}} \\\\[6pt]\n&= -\\beta \\left\\langle N \\frac{\\partial U}{\\partial \\theta} \\right\\rangle + \\frac{\\partial \\log \\Xi}{\\partial \\theta} \\langle N \\rangle & \\scriptstyle{\\frac{1}{\\Xi}\\frac{\\partial \\Xi}{\\partial \\theta} = \\frac{\\partial \\log \\Xi}{\\partial \\theta}} \\\\[6pt]\n&= -\\beta \\left\\langle N \\frac{\\partial U}{\\partial \\theta} \\right\\rangle + \\beta \\left\\langle \\frac{\\partial U}{\\partial \\theta} \\right\\rangle \\langle N \\rangle & \\scriptstyle{\\text{apply same trick: } \\frac{\\partial \\log \\Xi}{\\partial \\theta} = -\\beta \\langle \\frac{\\partial U}{\\partial \\theta} \\rangle} \\\\[6pt]\n&= -\\beta \\left[ \\left\\langle N \\frac{\\partial U}{\\partial \\theta} \\right\\rangle - \\langle N \\rangle \\left\\langle \\frac{\\partial U}{\\partial \\theta} \\right\\rangle \\right] & \\scriptstyle{\\text{factor out } -\\beta} \\\\[6pt]\n&= \\color{red}{-\\beta \\cdot \\text{Cov}\\!\\left(N,\\, \\frac{\\partial U}{\\partial \\theta}\\right)} & \\scriptstyle{\\text{definition of covariance under } p_\\theta}\n\\end{aligned}$$\n\nLet's pause at step 5 and verify the claim that $\\partial \\log \\Xi / \\partial \\theta = -\\beta \\langle \\partial U / \\partial \\theta \\rangle$. Differentiating $\\log \\Xi$:\n\n$$\\frac{\\partial \\log \\Xi}{\\partial \\theta} = \\frac{1}{\\Xi} \\frac{\\partial \\Xi}{\\partial \\theta} = \\frac{1}{\\Xi} \\sum_N \\frac{e^{\\beta\\mu N}}{N!} \\int \\left(-\\beta \\frac{\\partial U}{\\partial \\theta}\\right) e^{-\\beta U} \\, d\\mathbf{q}^N = -\\beta \\left\\langle \\frac{\\partial U}{\\partial \\theta} \\right\\rangle$$\n\nYes — confirmed. $\\Xi$ is differentiable as a sum of smooth exponentials, and the derivative passes cleanly under the sum.\n\n**The result** (also known as the Zwanzig identity, or the score-function identity applied to the Boltzmann measure)[^1]:\n\n$$\\boxed{\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\cdot \\text{Cov}_\\theta\\!\\left(N,\\, \\frac{\\partial U}{\\partial \\theta}\\right)}$$\n\n[^1]: Robert Zwanzig derived this as a special case of his general fluctuation theory for classical statistical mechanics. In the machine-learning literature the same maneuver is called the \"score-function trick\" or REINFORCE — the name varies by community, but the algebra is identical. The Frenkel-Smit textbook (ch. 7) derives it as a tool for computing thermodynamic derivatives from simulation data.\n\n---\n\n## The Zwanzig Identity in Full\n\nLet's now read every piece of the identity carefully.\n\n$$\\underbrace{\\frac{\\partial \\langle N \\rangle}{\\partial \\theta}}_{\\text{gradient we want}} = \\underbrace{-\\beta}_{\\text{inverse temp}} \\cdot \\underbrace{\\text{Cov}_\\theta\\!\\!\\left(\\underbrace{N}_{\\text{observable}},\\; \\underbrace{\\frac{\\partial U}{\\partial \\theta}}_{\\text{force-like term}}\\right)}_{\\text{measured from samples}}$$\n\n**The observable $N$:** This is the particle count in a specific configuration. If you run GCMC and see a microstate with 12 CO₂ molecules, then $N = 12$ for that sample.\n\n**The force-like term $\\partial U / \\partial \\theta$:** This is the analytic derivative of the potential energy with respect to the design parameter. If $\\theta$ is the Lennard-Jones well depth $\\varepsilon$, then $\\partial U / \\partial \\varepsilon$ is a sum over pairs of the Lennard-Jones pair interaction evaluated at current separations. *This is computable analytically given a configuration — no GCMC sampling needed.*\n\n**The covariance:** $\\text{Cov}(N, \\partial U / \\partial \\theta) = \\langle N \\cdot \\partial U / \\partial \\theta \\rangle - \\langle N \\rangle \\langle \\partial U / \\partial \\theta \\rangle$. You compute it by:\n1. Running GCMC and collecting samples $(N_i, \\mathbf{q}_i^{N_i})$\n2. For each sample, computing $\\partial U(\\mathbf{q}_i^{N_i}; \\theta) / \\partial \\theta$ analytically\n3. Taking the sample covariance of $\\{N_i\\}$ and $\\{(\\partial U / \\partial \\theta)_i\\}$\n\n**The sign:** The minus sign is *physical*. If increasing $\\theta$ (deeper well depth) makes configurations with more particles more favorable, then $\\partial U / \\partial \\theta$ is negative when $N$ is large, making the covariance negative, and $\\partial \\langle N \\rangle / \\partial \\theta$ positive — deeper well, more adsorption. The physics is consistent.\n\n**Check your understanding:** In our toy model, $U(q; \\theta) = \\theta q^2$, so $\\partial U / \\partial \\theta = q^2$. What is the sign of $\\text{Cov}(N, q^2)$? Is $\\partial \\langle N \\rangle / \\partial \\theta$ positive or negative? What physical intuition does this give you about how $\\theta$ controls adsorption?\n\n---\n\n**Figure 1: Visualizing the Covariance Estimator on the Toy Model**\n\n```\nToy model: N ∈ {0,1,2}, q ∈ {-1, 0, 1}, U(q;θ) = θ·q²\nGCMC samples: (N, q) pairs drawn from p(N,q) ∝ exp(βμN - βθq²)\n\nSample stream at θ=1.0, β=1.0, μ=0.5 (first 8 samples shown):\n\n  i  │  Nᵢ  │  qᵢ  │  ∂U/∂θ = qᵢ²  │  Nᵢ × qᵢ²\n ────┼──────┼──────┼───────────────┼───────────\n  1  │   1  │  -1  │     1.00      │   1.00\n  2  │   2  │   1  │     1.00      │   2.00\n  3  │   0  │   0  │     0.00      │   0.00\n  4  │   1  │   0  │     0.00      │   0.00\n  5  │   2  │  -1  │     1.00      │   2.00\n  6  │   1  │   1  │     1.00      │   1.00\n  7  │   0  │  -1  │     1.00      │   0.00\n  8  │   2  │   0  │     0.00      │   0.00\n ────┼──────┼──────┼───────────────┼───────────\n avg │ 1.125│      │    0.625      │  0.750\n\nCov(N, ∂U/∂θ) = ⟨N · ∂U/∂θ⟩ - ⟨N⟩·⟨∂U/∂θ⟩\n              = 0.750 - (1.125)(0.625)\n              = 0.750 - 0.703\n              = 0.047\n\n∂⟨N⟩/∂θ = -β · 0.047 = -0.047  (β=1.0)\n\nInterpretation: increasing θ decreases ⟨N⟩.\nWhy? Deeper well depth at q≠0 costs more energy at\nlarge |q|, reducing insertion probability there.\n         (notice: 8 samples is nowhere near enough —\n          the derivation is exact; the estimator needs\n          ~10k samples to converge to <2% rel. error)\n```\n\n---\n\n### Connection to Familiar Physics: Thermodynamic Derivatives\n\nIf you've computed linear response in condensed matter, this derivation is an old friend wearing new clothes. The fluctuation-dissipation theorem, Kubo formulas, and thermodynamic susceptibilities all follow the same algebraic skeleton: *differentiate the partition function, get a correlation function.*\n\nThe specific relation $\\partial \\langle N \\rangle / \\partial \\mu = \\beta \\cdot \\text{Var}(N)$ (compressibility in terms of number fluctuations) is exactly the Zwanzig identity applied with $\\theta \\leftarrow \\mu$. And $\\partial \\langle E \\rangle / \\partial T = -\\beta^2 \\text{Var}(U)$ (heat capacity from energy fluctuations) is the same identity with $\\theta \\leftarrow T$.\n\nWhat's *new* here is applying this to a *design parameter* $\\theta$ that's not a thermodynamic field — not $T$, not $\\mu$, not $V$ — but a structural parameter of the Hamiltonian like a partial charge or a bond length. In condensed matter, you'd call this a *parametric susceptibility*: how sensitive is a thermodynamic observable to a perturbation of the microscopic Hamiltonian?[^5]\n\n[^5]: This perspective connects to perturbation theory for lattice models. In your Kitaev wire context: how sensitive is the topological gap to changes in hopping $t$ or pairing $\\Delta$? The analog there is $\\partial E_{\\text{gap}} / \\partial t = -\\beta \\cdot \\text{Cov}(E_{\\text{gap}}, \\partial H / \\partial t)$ at finite temperature — though in practice one works at $T=0$ and uses direct diagonalization. The challenge in the MOF context is that $T$ is never zero, $N$ is never fixed, and the configuration space is 3D continuous.\n\nThe language shift from \"thermodynamic susceptibility\" to \"Monte Carlo gradient estimator\" is entirely about *computing this object efficiently at large scale* — not about new mathematics. This is what makes the Zwanzig identity a natural bridge between condensed matter physics and differentiable programming.\n\n## The Monte Carlo Gradient Estimator: Turning Math into Code\n\nThe identity turns a calculus problem (derivative of an integral) into a statistics problem (covariance of two observables). Let's write it out as code immediately.\n\n```python\nimport jax.numpy as jnp\n\ndef zwanzig_gradient(N_samples, dU_dtheta_samples, beta):\n    \"\"\"\n    Compute ∂⟨N⟩/∂θ = -β · Cov(N, ∂U/∂θ) from GCMC samples.\n\n    Parameters\n    ----------\n    N_samples      : (S,) array of particle counts from S GCMC snapshots\n    dU_dtheta_samples : (S,) array of ∂U/∂θ evaluated at each snapshot\n    beta           : inverse temperature 1/(k_B T)\n\n    Returns\n    -------\n    grad : scalar estimate of ∂⟨N⟩/∂θ\n    \"\"\"\n    N_mean = jnp.mean(N_samples)\n    dU_mean = jnp.mean(dU_dtheta_samples)\n    cov = jnp.mean((N_samples - N_mean) * (dU_dtheta_samples - dU_mean))\n    return -beta * cov\n```\n\nThis is the complete gradient estimator. In ~5 lines. What it requires:\n- Samples $(N_i, \\mathbf{q}_i^{N_i})$ from the equilibrium distribution — provided by any GCMC sampler\n- The analytic gradient $\\partial U / \\partial \\theta$ evaluated at each sample configuration — a simple pair-sum derivative\n- Nothing else\n\nWhat it does **not** require:\n- Any backpropagation through the Metropolis accept/reject step\n- Any differentiable relaxation of the discrete sampling process\n- Any knowledge of how the samples were generated (classical GCMC, learned-proposal MCMC, or importance-weighted Boltzmann generator samples — the formula works identically)\n\n**Common mistake #1:** Forgetting the minus sign. The gradient is $-\\beta \\cdot \\text{Cov}$, not $+\\beta \\cdot \\text{Cov}$. Forgetting the minus flips the gradient direction and sends your optimizer maximizing when it should minimize.\n\n**Common mistake #2:** Using $\\langle N \\cdot \\partial U/\\partial\\theta \\rangle$ directly instead of the centered form $\\langle (N - \\langle N \\rangle)(\\partial U/\\partial\\theta - \\langle \\partial U/\\partial\\theta \\rangle) \\rangle$. Both are mathematically identical (the centering terms cancel), but the centered form has lower variance for finite sample sizes — this is Rao-Blackwellization in its simplest form, and it matters a lot in practice.\n\n**Common mistake #3:** Using the biased covariance $\\frac{1}{S}$ instead of the unbiased $\\frac{1}{S-1}$ when sample counts are small. At $S = 100$ this introduces a 1% bias; at $S = 10$ it's 10%. For the course exercises we use $S \\geq 10\\,000$.\n\n### The Score-Function Identity Connection\n\nIn machine learning, the same algebraic trick appears as the **REINFORCE** estimator (Williams, 1992) or the **score-function estimator**. In the notation of that literature:\n\n$$\\nabla_\\theta \\mathbb{E}_{p_\\theta(x)}[f(x)] = \\mathbb{E}_{p_\\theta(x)}\\!\\left[f(x) \\cdot \\nabla_\\theta \\log p_\\theta(x)\\right]$$\n\nIn our case, $p_\\theta(N, \\mathbf{q}^N) = \\frac{1}{\\Xi(\\theta)} \\cdot \\frac{e^{\\beta\\mu N}}{N!} \\cdot e^{-\\beta U(\\mathbf{q}^N;\\theta)}$, and the score is:\n\n$$\\nabla_\\theta \\log p_\\theta = \\nabla_\\theta \\left[-\\beta U(\\mathbf{q}^N; \\theta) - \\log \\Xi(\\theta)\\right] = -\\beta \\frac{\\partial U}{\\partial \\theta} - \\frac{\\partial \\log \\Xi}{\\partial \\theta}$$\n\nUsing $\\frac{\\partial \\log \\Xi}{\\partial \\theta} = -\\beta \\langle \\partial U / \\partial \\theta \\rangle$:\n\n$$\\nabla_\\theta \\log p_\\theta = -\\beta \\left(\\frac{\\partial U}{\\partial \\theta} - \\left\\langle \\frac{\\partial U}{\\partial \\theta} \\right\\rangle\\right)$$\n\nSubstituting into the REINFORCE formula with $f = N$:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = \\mathbb{E}\\!\\left[N \\cdot \\left(-\\beta\\right)\\left(\\frac{\\partial U}{\\partial \\theta} - \\left\\langle \\frac{\\partial U}{\\partial \\theta} \\right\\rangle\\right)\\right] = -\\beta \\cdot \\text{Cov}\\!\\left(N, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\nThis is exactly the same formula arrived at by two different algebraic routes — which is reassuring. The \"REINFORCE\" route makes it clear that the identity is really about the log-derivative of the unnormalized measure, while the \"differentiate the partition function\" route makes it clear that $\\Xi$ cancels cleanly.\n\n```python\n# The score-function route in code:\ndef score_function_gradient(N_samples, dU_dtheta_samples, beta):\n    \"\"\"\n    REINFORCE-style: grad = E[N * score_p]\n    where score_p = -β(∂U/∂θ - E[∂U/∂θ])\n    \"\"\"\n    dU_mean = jnp.mean(dU_dtheta_samples)\n    score = -beta * (dU_dtheta_samples - dU_mean)     # score of log p\n    return jnp.mean(N_samples * score)                 # E[N * score]\n    # Equivalently: -beta * Cov(N, dU_dtheta)\n```\n\nNotice that both implementations produce the same number. The centered form in `score_function_gradient` is marginally preferable because the subtraction of `dU_mean` slightly reduces the variance of the product — this is the Rao-Blackwell baseline subtraction in embryonic form, which we'll formalize in Module 2.\n\n---\n\n## Three Families of MC Gradients — and Why Two Fail Here\n\nMohamed et al.'s 2020 survey[^2] organizes Monte Carlo gradient estimators into three families. Understanding this taxonomy is essential because it explains why the score-function estimator is the *only* option here — not a design choice, but a mathematical necessity.\n\n[^2]: Mohamed, S., Rosca, M., Figurnov, M., & Mnih, A. (2020). Monte Carlo Gradient Estimation in Machine Learning. JMLR. This survey is the reference taxonomy for understanding which estimator applies to which problem structure.\n\n**Figure 2: The Three Families of MC Gradient Estimators**\n\n```\nThree paths from \"compute ∂E[f(x;θ)]/∂θ\" to an estimator:\n\n┌─────────────────────────────────────────────────────────────┐\n│  E[f(x;θ)] = ∫ f(x;θ) p(x;θ) dx                           │\n│                 Two places θ appears:                        │\n│              ↗ in f(x;θ)        ↗ in p(x;θ)                │\n└─────────────────────────────────────────────────────────────┘\n         │                                │\n         ▼                                ▼\n ┌────────────────┐              ┌─────────────────────┐\n │  PATH 1:       │              │  PATH 2:            │\n │  PATHWISE      │              │  SCORE-FUNCTION     │\n │  (Reparam)     │              │  (REINFORCE/Zwanzig)│\n └────────────────┘              └─────────────────────┘\n  Write x = g(ε; θ)               ∂/∂θ E[f] =\n  where ε ~ base dist              E[f · ∂logp/∂θ]\n  Then ∂/∂θ E[f] =                 = -β · Cov(f, ∂U/∂θ)\n   E[∂f/∂x · ∂g/∂θ]\n                                ┌──────────────────────┐\n  REQUIRES: continuous,         │  PATH 3:             │\n  invertible g(ε;θ)             │  MEASURE-VALUED      │\n                                │  (Pflug/Heidergott)  │\n  FAILS HERE: x=N is a          └──────────────────────┘\n  JUMP PROCESS — no             Kernel smoothing of\n  latent ε exists such          discontinuities — high\n  that N=g(ε;θ) is smooth       variance, complex impl.\n         │\n         ▼\n  Can Gumbel-softmax rescue it?\n  ─────────────────────────────\n  Categorical(p₁,...,pK) → Softmax(Gumbel + log p)/τ\n  As τ→0: converges to one-hot ✓\n  Gradient at τ→0: ∂/∂θ[Softmax/τ] → ∞ ✗\n\n  GCMC particle insertion is NOT categorical selection.\n  It's a jump process where N goes 0→1→2 via acceptance\n  of PROPOSED moves. There is no latent Gumbel variable\n  whose temperature can be annealed.\n         │\n         ▼\n  CONCLUSION: Score-function is the only viable path.\n  It's not a compromise — it's the exact gradient.\n```\n\n### Why Pathwise Fails: The Jump Process Argument\n\nThe reparameterization (pathwise) trick requires writing your random variable as a deterministic function of a base random variable: $x = g(\\varepsilon; \\theta)$ where $\\varepsilon$ has a fixed distribution. For a Gaussian, this is trivial: $x = \\mu + \\sigma \\varepsilon$, $\\varepsilon \\sim \\mathcal{N}(0,1)$.\n\nFor the particle count $N$ in GCMC, there is no such function. $N$ changes by ±1 with each accepted insertion/deletion move. It is a discrete-valued jump process. You cannot write $N = g(\\varepsilon; \\theta)$ where $g$ is differentiable in $\\theta$ because $N$ is an integer — any function from a continuous $\\varepsilon$ to an integer must have discontinuities, and $\\partial N / \\partial \\theta = 0$ almost everywhere, with undefined behavior at the discontinuities.\n\n**The Gumbel-softmax temptation:** In representation learning, we sometimes relax discrete variables (categorical distributions) to continuous approximations using the Gumbel-softmax trick at temperature $\\tau$. As $\\tau \\to 0$, the continuous approximation converges to the discrete one-hot in distribution. Could we do the same for $N$?\n\nNo — and the reason is fundamental. The Gumbel-softmax relaxes a *categorical* random variable: \"which of $K$ fixed outcomes did I pick?\" Particle insertion in GCMC is different: it's a jump process where the outcome *is* $N \\in \\{0, 1, 2, \\ldots\\}$, and the transition probabilities depend on the full configuration in a way that depends on $\\theta$ through the acceptance probability $\\min(1, e^{-\\beta \\Delta U})$. There is no underlying latent categorical variable to relax.[^3]\n\n[^3]: A more formal statement: the Gumbel-softmax gives a biased but consistent estimator as $\\tau \\to 0$ for categorical distributions because the limit recovers the correct argmax. For GCMC, the analog of \"taking $\\tau \\to 0$\" would require $e^{-\\beta \\Delta U / \\tau} \\to \\{0, 1\\}$ step function, i.e., going to zero temperature, which changes the equilibrium distribution entirely. There is no temperature you can anneal to recover the correct gradient at finite $T$.\n\nIn Exercise 3, you'll verify this empirically: pathwise bias stays at $O(1)$ regardless of temperature, while the score-function estimator's error is Monte Carlo noise that decays as $1/\\sqrt{S}$.\n\n---\n\n## DiffTRe: The NVT Ancestor\n\nBefore going further, it's important to understand what already existed and why this course goes beyond it.\n\n**Thaler & Zavadlav (2021)** introduced Differentiable Trajectory Reweighting (DiffTRe) in *Nature Communications*. The core idea: given samples from an NVT ensemble at reference parameters $\\theta_0$, compute gradients of $\\langle A \\rangle_\\theta$ at nearby $\\theta$ using importance reweighting — without re-running MD at every $\\theta$.\n\nThe DiffTRe gradient for $\\langle A \\rangle_\\theta = \\int A(x) p(x; \\theta) dx$ is:\n\n$$\\frac{\\partial \\langle A \\rangle_\\theta}{\\partial \\theta} = -\\beta \\cdot \\langle w(x; \\theta_0, \\theta) \\rangle_{\\theta_0}^{-1} \\cdot \\text{Cov}_{\\theta_0}\\!\\left(A \\cdot w,\\, \\frac{\\partial U}{\\partial \\theta}\\right)_{\\theta_0}$$\n\nwhere $w(x; \\theta_0, \\theta) = e^{-\\beta(U(x;\\theta) - U(x;\\theta_0))}$ are importance weights that reweight samples from $\\theta_0$ to $\\theta$.\n\nWhen $\\theta = \\theta_0$, the weights $w = 1$ uniformly and this reduces exactly to the Zwanzig identity $-\\beta \\cdot \\text{Cov}(A, \\partial U / \\partial \\theta)$. **DiffTRe is the Zwanzig identity evaluated under a reweighted distribution.**\n\nDiffTRe achieves ~2 orders of magnitude speedup over full trajectory backprop for fitting NVT potentials to experimental data. Impressive — but it has four limitations that this course addresses:\n\n| DiffTRe | This course's extension |\n|---------|------------------------|\n| Single thermodynamic state (one $T$, one $\\rho$) | Two-state μVT: $\\mu_H$ and $\\mu_L$ coupled via CRN |\n| NVT only: $N$ is fixed | μVT: $N$ fluctuates, is the observable of interest |\n| Force-field parameters $\\theta$ | Structural parameters: partial charges, lattice, linker |\n| No particle insertion | GCMC with insertion/deletion/translation |\n\nThe reweighted gradients approach is the immediate ancestor of the Zwanzig estimator we use. Exercise 4 asks you to implement DiffTRe for a 1D harmonic oscillator and observe where the importance-weight window breaks down — which motivates the fractional-coordinate reparameterization in Module 3.\n\n**Figure 4: The DiffTRe Importance-Weight Window**\n\n```\nDiffTRe: sample once at θ₀, estimate ⟨A⟩_θ for nearby θ via reweighting\n\n   Effective Sample Size (ESS) = (Σwᵢ)² / Σwᵢ²    (Kish approximation)\n   where wᵢ = exp(-β(U(xᵢ;θ) - U(xᵢ;θ₀)))\n\nESS as θ moves away from θ₀ (harmonic oscillator, β=1, S=1000):\n\nESS\n1.0 │▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓\n    │         ▓▓▓▓▓▓▓▓▓▓▓▓\n0.5 │                    ▓▓▓▓▓▓▓▓\n    │   ←── safe ──→│←── degrades ──→        ▓▓\n    │                               ░░░░░░░░░░░░░ ← ESS<10%\n0.0 │─────────────────────────────────────────────────────\n    0.5      1.0      1.5      2.0      2.5      3.0    θ\n             θ₀=1.0\n\n  |θ - θ₀| ≲ 0.3: ESS > 50%, gradient reliable      ← DiffTRe window\n  |θ - θ₀| > 0.5: ESS → 0, gradient untrustworthy\n\nFor GCMC with changing lattice constant a (θ=a):\n  Var(β(U(a) - U(a₀))) ∝ V · (δa/a)²\n  As V → large cell: window → δa/a → 0  ← CATASTROPHIC for lattice params!\n  Fix: sample in fractional coordinates s ∈ [0,1)³  ← Module 3\n```\n\nThe reweighting window problem is exactly why DiffTRe works for force-field fitting (small changes to $\\varepsilon$, $\\sigma$ near the reference) but would fail catastrophically for lattice-scale changes if applied naively. The fractional-coordinate reparameterization in Module 3 solves this by making the sampling domain $\\theta$-invariant.\n\n---\n\n## Computing ∂U/∂θ in Practice\n\nThe Zwanzig identity shifts the hard work from differentiating through the sampler to computing $\\partial U(\\mathbf{q}^N; \\theta) / \\partial \\theta$ analytically. Let's make this concrete for the parameters that actually appear in MOF design.\n\n### Lennard-Jones well depth $\\varepsilon$\n\nThe Lennard-Jones potential between a framework atom and a CO₂ molecule at distance $r$ is:\n\n$$U_{\\text{LJ}}(r; \\varepsilon, \\sigma) = 4\\varepsilon \\left[ \\left(\\frac{\\sigma}{r}\\right)^{12} - \\left(\\frac{\\sigma}{r}\\right)^{6} \\right]$$\n\nThe gradient w.r.t. $\\varepsilon$ for a full configuration of $N$ molecules is:\n\n$$\\frac{\\partial U}{\\partial \\varepsilon} = \\sum_{i=1}^{N} \\sum_{j \\in \\text{frame}} 4 \\left[ \\left(\\frac{\\sigma_{ij}}{r_{ij}}\\right)^{12} - \\left(\\frac{\\sigma_{ij}}{r_{ij}}\\right)^{6} \\right]$$\n\nThis is just the LJ energy evaluated without the $\\varepsilon$ prefactor — a double sum over molecule-framework atom pairs. **No autodiff needed.** It's analytically available at the cost of one forward pass through the pair summation.\n\n### Partial charge $q_i$ on a framework atom\n\nThe electrostatic energy contribution from a partial charge $q_i$ on framework atom $i$ interacting with CO₂ molecules is:\n\n$$U_{\\text{Coul}}(\\mathbf{q}^N; \\{q_k\\}) = \\sum_{m=1}^{N} \\sum_k \\frac{q_k \\cdot q_m^{\\text{CO}_2}}{4\\pi\\epsilon_0 \\, r_{mk}}$$\n\n(with Ewald summation in periodic boundary conditions). The gradient w.r.t. $q_i$ is simply:\n\n$$\\frac{\\partial U}{\\partial q_i} = \\sum_{m=1}^{N} \\frac{q_m^{\\text{CO}_2}}{4\\pi\\epsilon_0 \\, r_{mi}}$$\n\nAgain a simple sum over molecules — the Coulomb kernel evaluated with the CO₂ charge but unit framework charge at site $i$.\n\n### Why this matters architecturally\n\nThe potential $U$ splits cleanly into a *classical sidecar* (Coulomb + LJ) and possibly an *MLFF body* (MACE, UMA). The MLFF is used for *sampling accuracy* — it gives more realistic configurations. But the gradient parameters $\\theta = \\{q_i, \\varepsilon_i, \\sigma_i, a\\}$ live entirely in the classical sidecar, whose $\\partial U / \\partial \\theta$ is analytically tractable.\n\nThis is the \"expensive sampling, cheap exact gradient\" architecture:\n\n```\nConfiguration (Nᵢ, qᵢ) ← sampled by MLFF+classical GCMC\n                  │\n                  │ ← classical sidecar only\n                  ▼\n     ∂U_Coul/∂{qₖ}  and  ∂U_LJ/∂{εₖ,σₖ}   ← analytic pair sums\n                  │\n                  ▼\n     Zwanzig covariance: -β · Cov(N, ∂U/∂θ)\n```\n\nMLFFs like MACE don't expose $\\partial U / \\partial \\sigma_X$ (they have no LJ parameters). But that's fine — we only need $\\partial U_{\\text{total}} / \\partial \\theta$ for $\\theta$ living in the classical sidecar. The MLFF contribution to energy affects the *sampling distribution* (which configurations appear), but since the Zwanzig estimator is unbiased for any equilibrium sampler, we just need the classical-sidecar derivative evaluated at the MLFF-sampled configurations.\n\n**Check your understanding:** Suppose the MLFF gives better geometries (more accurate $r_{ij}$ distributions) than a pure LJ force field. Does using MLFF-sampled configurations make the Zwanzig gradient estimate more accurate, less accurate, or equally accurate? (Hint: the estimator is unbiased for *any* equilibrium distribution — but which equilibrium distribution is \"correct\"?)\n\n---\n\n## What the Estimator Does NOT Require\n\nLet's state this explicitly, because it's the source of the estimator's power.\n\n**It does not require differentiating through the Metropolis step.** The accept/reject step has the form $\\text{accept} = \\mathbf{1}[u < e^{-\\beta \\Delta U}]$ where $u \\sim \\text{Uniform}(0,1)$. This is a step function in $\\Delta U$, which depends on $\\theta$. Naively backpropagating through this gives $\\partial \\text{accept}/\\partial\\theta = 0$ everywhere except at the single discontinuity — useless.\n\nThe Zwanzig identity completely sidesteps this. We never differentiate through the accept/reject. We differentiate the *partition function*, which is a smooth integral of exponentials.\n\n**It does not require the sampler to be differentiable.** Any device that generates samples from the equilibrium distribution $p(N, \\mathbf{q}^N; \\theta)$ will work. This is the core of the *sampler-agnostic* design:\n\n```\nSampler A: classical GCMC (Frenkel-Smit moves)\n   ↓ produces equilibrium samples (Nᵢ, qᵢ)\n   ↓\nZwanzig estimator: -β · Cov(N, ∂U/∂θ)  ← same formula\n   ↑\nSampler B: learned-proposal MCMC (neural network proposals)\n   ↑ also produces equilibrium samples\n   \nSampler C: Boltzmann generator (importance-weighted)\n   ↑ produces weighted equilibrium samples\n   ↑ estimator uses importance-weighted covariance\n```\n\nThe variance of the gradient estimate depends on which sampler you use (better mixing → lower variance). But the *correctness* — the property that the estimate is unbiased for the true gradient — is a property of the identity, not the sampler.\n\n**It does not require evaluating $\\log Z$.** The normalization $\\Xi(\\theta)$ appears in the partition function but cancels out of the gradient formula. You never need to compute $\\Xi$ directly (which is exponentially hard by brute force).\n\n---\n\n## The kUPS Platform and Where This Fits\n\nThe course builds on top of kUPS (Cusp AI), a JAX-native molecular simulation engine. Before seeing where the gradient estimator fits in the kUPS architecture, let's understand the platform.\n\n![kUPS propagator interface: takes (Random Key, State) and returns State'](images/kups_propagator_interface.png)\n\nEvery operation in kUPS is a *propagator* with the signature `(key, state) → state'`. The random key makes every propagator stateless — given the same key and initial state, you get bitwise-identical output. This is not a cosmetic choice; it's what makes Common Random Numbers (CRN, covered in Module 2) algebraically clean: the two chemical-potential chains share the same key stream, so proposal noise cancels exactly.\n\n![kUPS ensemble composition: NVE, NVT, and NPT are all propagator chains](images/kups_ensemble_composition.png)\n\nDifferent ensembles are just different orderings of propagators. NVT wraps the NVE core with thermostats; NPT adds barostats. This composability is what lets us write the gradient estimator as a *decorator* over any propagator chain — it doesn't matter whether the chain inside is classical GCMC, learned-proposal MCMC, or a Boltzmann generator. The estimator sits outside and consumes samples.\n\nHere is the throughput context for why this matters:\n\n![kUPS achieves 49× throughput over RASPA for μVT Monte Carlo](images/kups_throughput_benchmark.png)\n\n*kUPS achieves 49× throughput over RASPA for μVT CO₂ adsorption (right panel). The gradient accumulator adds $O(1)$ work per sample — a running covariance sum. Net headline: 49× raw sampling speed × 8× fewer samples needed vs the MBAR-5pt baseline.*[^4]\n\n[^4]: The 49× figure is kUPS vs RASPA on GPU for μVT CO₂ gas adsorption in porous materials. The 8× sample-efficiency claim compares our estimator to the gold-standard MBAR 5-point finite-difference gradient on ~10 parameter components of Mg-MOF-74.\n\nThe gradient estimator we're building in this course becomes a first-class `ObservableWithGradient` propagator in kUPS. You'll package it in Module 4 following the kUPS composability contract: any propagator chain goes in, gradient-annotated samples come out.\n\n---\n\n## Synthesis: The Course in One Identity\n\nWe began with a materials science problem — maximize CO₂ working capacity $\\Delta N$ over MOF design parameters $\\theta$. We ended with a formula:\n\n$$\\frac{\\partial \\Delta N}{\\partial \\theta} = -\\beta \\left[ \\text{Cov}_{\\mu_H}\\!\\left(N, \\frac{\\partial U}{\\partial \\theta}\\right) - \\text{Cov}_{\\mu_L}\\!\\left(N, \\frac{\\partial U}{\\partial \\theta}\\right) \\right]$$\n\n**Figure 3: How the Full Course Builds on This Identity**\n\n```\nModule 0 (this module):\n  ∂⟨N⟩/∂θ = -β·Cov(N, ∂U/∂θ)    ← derive from scratch, verify in toy model\n       │\n       ▼\nModule 1: Minimal GCMC Sampler\n  Implement insertion/deletion/translation in JAX\n  Wire the estimator on top: running covariance accumulator\n  Validate: grad vs finite difference, tolerance < 3%\n       │\n       ▼\nModule 2: Two-State Objective ΔN and Variance Reduction\n  ΔN = ⟨N⟩_μH - ⟨N⟩_μL (two separate GCMC chains)\n  Common Random Numbers: same key stream → proposal noise cancels\n  Rao-Blackwell: subtract per-chain ⟨N⟩ before covariance\n  Target: 3-10× variance reduction, verified experimentally\n       │\n       ▼\nModule 3: Structural Parameters (Lattice Gradients)\n  θ = lattice scale a: positions q = h(a)·s (fractional coords)\n  Without reparameterization: Var(βΔU) ∝ V·(δa/a)² → diverges\n  With fractional coords: sampling domain is θ-invariant\n  Gradient enters analytically via chain rule through h(a)\n       │\n       ▼\nModule 4: Sampler-Agnostic Design\n  Same estimator works for: classical GCMC, learned-proposal MCMC,\n  importance-weighted Boltzmann generators (just add w_i)\n  Package as ObservableWithGradient propagator in kUPS\n  Any sampler chain → gradient-annotated samples, by construction\n```\n\nThe remarkable thing about the Zwanzig identity is how little it asks. It doesn't require the sampler to be differentiable. It doesn't require the observable to be continuous. It doesn't require a small perturbation around a reference state. It only requires:\n\n1. Equilibrium samples (from *any* sampler)\n2. An analytic $\\partial U / \\partial \\theta$ (a pair-sum derivative for classical potentials)\n3. Enough samples for the covariance estimate to converge\n\nThe rest of the course is engineering: making the variance small enough to be useful, extending to structural parameters, and packaging the whole thing as a composable primitive.\n\n---\n\n## Analytical Questions\n\n### Question 1 — What Makes the μVT Derivation Different from NVT?\n\nIn the NVT ensemble, the partition function is $Z_{\\text{NVT}}(\\theta) = \\int d\\mathbf{q}^N e^{-\\beta U(\\mathbf{q}^N; \\theta)}$ with $N$ fixed. The analogous identity for an NVT observable $\\langle A \\rangle$ gives:\n\n$$\\frac{\\partial \\langle A \\rangle_{\\text{NVT}}}{\\partial \\theta} = -\\beta \\cdot \\text{Cov}_{\\text{NVT}}\\!\\left(A,\\, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\n**(a)** Trace through the derivation in the \"Differentiating Under the Integral\" section step-by-step for this NVT case. At which step does the structure differ from the μVT case? What role does the $\\sum_N$ play in the μVT version that has no analog in NVT?\n\n**(b)** In the NVT case with $A = U$ (energy), the identity gives $\\partial \\langle U \\rangle / \\partial \\beta = -\\text{Var}(U)$ (the fluctuation-dissipation relation). Verify this by applying the identity with $\\theta \\leftarrow \\beta$ and $U \\leftarrow \\beta U$ — being careful about what the \"parameter\" is. What physical statement does this make about a system with rigid-harmonic fluctuations near zero temperature?\n\n**(c)** Why does the μVT identity for $\\partial \\langle N \\rangle / \\partial \\mu$ give $-\\beta \\cdot \\text{Var}(N)$ rather than $-\\beta \\cdot \\text{Cov}(N, \\partial U / \\partial \\mu)$? (Hint: $\\mu$ appears in the fugacity weight $e^{\\beta \\mu N}$, not in $U$.)\n\n---\n\n### Question 2 — Variance of the Gradient Estimator\n\nThe Zwanzig identity is an *unbiased* estimator: $\\mathbb{E}[\\hat{g}_S] = \\partial \\langle N \\rangle / \\partial \\theta$ for any $S \\geq 1$. But bias is only half the story. The *variance* of the estimator determines how many samples you need.\n\nThe variance of a sample covariance from $S$ i.i.d. draws is:\n\n$$\\text{Var}(\\widehat{\\text{Cov}}_S) \\approx \\frac{1}{S} \\left[ \\text{Var}(N) \\text{Var}\\!\\left(\\frac{\\partial U}{\\partial \\theta}\\right) + \\text{Cov}\\!\\left(N, \\frac{\\partial U}{\\partial \\theta}\\right)^2 \\right]$$\n\n**(a)** Near a first-order phase transition (capillary condensation), $\\text{Var}(N)$ diverges. What does this imply for the number of GCMC samples needed to achieve a given relative error in the gradient? What does this suggest about the operating regime of the estimator?\n\n**(b)** The source material states that Common Random Numbers (CRN) gives 3–10× variance reduction on the difference $\\partial \\Delta N / \\partial \\theta = \\partial \\langle N \\rangle_{\\mu_H} / \\partial \\theta - \\partial \\langle N \\rangle_{\\mu_L} / \\partial \\theta$. The variance of the difference of two estimators is $\\text{Var}(\\hat{g}_H - \\hat{g}_L) = \\text{Var}(\\hat{g}_H) + \\text{Var}(\\hat{g}_L) - 2\\text{Cov}(\\hat{g}_H, \\hat{g}_L)$. Under what condition on $\\text{Cov}(\\hat{g}_H, \\hat{g}_L)$ does CRN achieve its maximum variance reduction? When does it achieve *zero* reduction? (Think about what it means for $\\partial U / \\partial \\theta$ to depend on $\\mu$.)\n\n**(c)** Rao-Blackwellization uses the centered covariance $\\text{Cov}(N - \\langle N \\rangle, \\partial U / \\partial \\theta)$ instead of $\\text{Cov}(N, \\partial U / \\partial \\theta)$ (they're mathematically equal). Why does centering reduce variance in finite samples? (Hint: consider the variance decomposition of $\\widehat{\\langle N \\cdot \\partial U \\rangle}$ versus the variance of the centered estimator.)\n\n---\n\n### Question 3 — The MBAR-5pt Baseline and the 8× Efficiency Claim\n\nThe gold-standard baseline for computing $\\partial \\langle N \\rangle / \\partial \\theta$ is MBAR (Multistate Bennett Acceptance Ratio) with a 5-point finite-difference stencil: run simulations at $\\theta_0 \\pm 2\\delta$, $\\theta_0 \\pm \\delta$, $\\theta_0$ and combine via MBAR to estimate the derivative.\n\n**(a)** A 5-point central-difference stencil has truncation error $O(\\delta^4)$. How should you choose $\\delta$? What is the trade-off between statistical noise (shrink $\\delta$ → smaller signal) and systematic bias (shrink $\\delta$ → smaller truncation error)?\n\n**(b)** The source material claims 8× sample-efficiency over MBAR-5pt at matched accuracy ($r^2 \\approx 0.97$ on Mg-MOF-74). If MBAR-5pt requires $5S$ total GCMC samples to achieve some target variance, how many samples does the Zwanzig estimator require? What does this imply about the sample complexity of the two approaches as a function of the number of parameters $|\\theta|$?\n\n**(c)** MBAR-5pt runs 5 separate simulations (at 5 perturbed values of $\\theta$) for each gradient computation. The Zwanzig estimator runs one simulation (at the current $\\theta$). How does this difference compound when you run gradient descent for $T$ optimization steps? Write an expression for the total GCMC cost of each approach as a function of $S$, $T$, and $|\\theta|$.\n\n---\n\n### Question 4 — Extending to Arbitrary Observables\n\nThe derivation we did for $\\langle N \\rangle$ works for any observable $A(N, \\mathbf{q}^N)$. Consider the grand-canonical energy:\n\n$$\\langle E \\rangle = \\left\\langle U(\\mathbf{q}^N; \\theta) \\right\\rangle_{\\mu, \\theta}$$\n\n**(a)** Apply the Zwanzig identity to compute $\\partial \\langle E \\rangle / \\partial \\theta$. But $E$ itself depends on $\\theta$! So there are *two* contributions to $\\partial \\langle E \\rangle / \\partial \\theta$: a direct derivative of $U$ inside the expectation, plus the Zwanzig covariance term for the change in sampling distribution. Derive the full expression:\n\n$$\\frac{\\partial \\langle U \\rangle}{\\partial \\theta} = \\left\\langle \\frac{\\partial U}{\\partial \\theta} \\right\\rangle - \\beta \\cdot \\text{Cov}\\!\\left(U, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\n**(b)** When $\\theta$ appears only in a soft-core Lennard-Jones prefactor $\\varepsilon$ and $U = \\varepsilon \\cdot \\tilde{U}$ (where $\\tilde{U}$ is the geometric part), simplify both terms. Does the Zwanzig covariance term have a simple physical meaning in this case?\n\n**(c)** Now consider a *non-differentiable* observable: $A = \\mathbf{1}[N \\geq N_{\\text{target}}]$ — the probability that at least $N_{\\text{target}}$ molecules are adsorbed. Does the Zwanzig identity still give an unbiased gradient estimator? Why or why not? (Hint: re-examine which step of the derivation requires differentiability.)\n\n---\n\n## Exercises Ahead\n\nThis module established the mathematical foundation. The four exercises build it from scratch and stress-test every moving part:\n\n- **Exercise 1** (`ex01_...py`): Derive the Zwanzig identity for an NVT toy system — a Gaussian with known covariance — and verify that the estimator achieves <2% relative error on 10,000 samples. This is your ground truth for the algebra.\n\n- **Exercise 2** (`ex02_...py`): Promote to μVT: derive $\\partial \\langle N \\rangle / \\partial \\theta$ for the truncated toy model $(N \\in \\{0,1,2,3\\}$, $q \\in \\{-1,0,1\\})$ using all three paths — closed-form `jax.grad` on $\\log Z$, finite difference, and the covariance estimator — and verify they agree within 1% on 50,000 samples.\n\n- **Exercise 3** (`ex03_...py`): Contrastive experiment: implement the Gumbel-softmax pathwise gradient for a Bernoulli insertion process and show that its bias stays at $O(1)$ regardless of temperature, while the score-function estimator's error decays as $1/\\sqrt{S}$.\n\n- **Exercise 4** (`ex04_...py`): Implement DiffTRe (reweighted gradients) for an NVT harmonic oscillator, observe the importance-weight degeneracy outside the reweighting window, and print the diagnostic message that motivates fractional-coordinate sampling in Module 3.\n\nWhen you've completed all four exercises, you'll have verified the Zwanzig identity from six independent angles and developed a concrete intuition for where it works, where it fails, and what comes next.\n", "exercises": [{"filename": "ex01_derive_the_zwanzig_identity_in_nvt_from_first_prin.py", "content": "\"\"\"\nExercise 1: Derive the Zwanzig Identity in NVT from First Principles\n====================================================================\n\nThe Zwanzig / score-function identity says that for an NVT ensemble with\ndistribution p(x; θ) ∝ exp(-β U(x; θ)), the gradient of any equilibrium\naverage ⟨A⟩ with respect to a parameter θ is:\n\n    d⟨A⟩/dθ = -β · Cov(A, dU/dθ)\n\nwhere both A and dU/dθ are evaluated at samples drawn from p(x; θ).\n\nDerivation sketch (fill in the steps in code below):\n  1. Write ⟨A⟩ = (1/Z) ∫ A(x) exp(-β U(x;θ)) dx\n  2. Differentiate: d⟨A⟩/dθ = (1/Z) ∫ A(x) (-β dU/dθ) exp(-βU) dx\n                              - (dZ/dθ / Z²) · Z⟨A⟩\n  3. Note dZ/dθ = ∫ (-β dU/dθ) exp(-βU) dx  →  d log Z/dθ = -β⟨dU/dθ⟩\n  4. Combine: d⟨A⟩/dθ = -β⟨A · dU/dθ⟩ + β⟨dU/dθ⟩⟨A⟩\n                       = -β [⟨A · dU/dθ⟩ - ⟨A⟩⟨dU/dθ⟩]\n                       = -β Cov(A, dU/dθ)\n\nRunning example\n---------------\nToy distribution: p(x; θ) ∝ exp(-θ x² / 2), i.e. Gaussian with\n    variance σ² = 1/θ,  β = 1 (absorbed into θ).\n\nObservable: A(x) = x²\n\nClosed-form answers:\n    ⟨x²⟩  = 1/θ\n    d⟨x²⟩/dθ = -1/θ²\n\nThe Zwanzig estimator should match -1/θ² within 2% on 10 000 samples.\n\nYour task\n---------\nImplement three functions:\n  1. sample_mean(samples, f_vals)        — weighted average of f over samples\n  2. score_term(samples, dU_dtheta)      — naive (un-centered) version\n  3. covariance_estimator(A_vals, dU_vals, beta)  — unbiased centered Cov\n\"\"\"\n\nimport os\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# Provided: toy distribution and sampler\n# ---------------------------------------------------------------------------\n\nBETA = 1.0  # inverse temperature (absorbed into θ for this toy; set to 1)\n\n\ndef sample_gaussian(theta: float, n_samples: int, rng: np.random.Generator) -> np.ndarray:\n    \"\"\"\n    Draw n_samples from p(x; θ) ∝ exp(-θ x²/2), i.e. N(0, 1/θ).\n\n    Parameters\n    ----------\n    theta     : float, must be > 0\n    n_samples : int\n    rng       : numpy random Generator\n\n    Returns\n    -------\n    samples : (n_samples,) array of floats\n    \"\"\"\n    std = 1.0 / np.sqrt(theta)\n    return rng.normal(loc=0.0, scale=std, size=n_samples)\n\n\ndef observable_A(samples: np.ndarray) -> np.ndarray:\n    \"\"\"A(x) = x^2.  Returns same shape as samples.\"\"\"\n    return samples ** 2\n\n\ndef dU_dtheta(samples: np.ndarray) -> np.ndarray:\n    \"\"\"\n    Analytic ∂U/∂θ for U(x; θ) = θ x²/2.\n    ∂U/∂θ = x²/2.   Returns same shape as samples.\n    \"\"\"\n    return samples ** 2 / 2.0\n\n\ndef closed_form_mean_A(theta: float) -> float:\n    \"\"\"⟨x²⟩ = 1/θ for p ∝ exp(-θ x²/2).\"\"\"\n    return 1.0 / theta\n\n\ndef closed_form_grad(theta: float) -> float:\n    \"\"\"d⟨x²⟩/dθ = -1/θ².\"\"\"\n    return -1.0 / theta ** 2\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: sample mean\n# ---------------------------------------------------------------------------\n\ndef sample_mean(f_vals: np.ndarray) -> float:\n    \"\"\"\n    Return the empirical mean of an array of observable values.\n\n    Parameters\n    ----------\n    f_vals : (S,) array — values of some function evaluated at each sample\n\n    Returns\n    -------\n    mean : float\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~4 lines                               #\n    #                                                         #\n    # Hint: just numpy mean. This is a warm-up so you can    #\n    # verify the pieces separately before combining them.     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: naive (un-centered) score term\n# ---------------------------------------------------------------------------\n\ndef score_term(A_vals: np.ndarray, dU_vals: np.ndarray, beta: float) -> float:\n    \"\"\"\n    Compute the naive (un-centered) score-function gradient estimate:\n        -β · ⟨A · dU/dθ⟩\n\n    This is NOT the final estimator (it has higher variance than the\n    centered version), but it helps verify the algebra.\n\n    Parameters\n    ----------\n    A_vals  : (S,) array — observable A at each sample\n    dU_vals : (S,) array — ∂U/∂θ at each sample\n    beta    : float\n\n    Returns\n    -------\n    naive_estimate : float  (note: this is BIASED as an estimator of\n                    d⟨A⟩/dθ because it's missing the -β⟨A⟩⟨dU⟩ term)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~5 lines                               #\n    #                                                         #\n    # Hint: compute the mean of the product A * dU/dθ,       #\n    # then multiply by -β. Do NOT center here — that's       #\n    # the job of covariance_estimator below.                  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: centered covariance estimator (the actual Zwanzig grad)\n# ---------------------------------------------------------------------------\n\ndef covariance_estimator(A_vals: np.ndarray, dU_vals: np.ndarray, beta: float) -> float:\n    \"\"\"\n    Compute the Zwanzig gradient estimate using the centered covariance:\n        -β · Cov(A, dU/dθ)\n      = -β · [⟨A · dU/dθ⟩ - ⟨A⟩ · ⟨dU/dθ⟩]\n\n    This is the main estimator. It is UNBIASED for d⟨A⟩/dθ.\n\n    Parameters\n    ----------\n    A_vals  : (S,) array — observable values at each sample\n    dU_vals : (S,) array — ∂U/∂θ values at each sample\n    beta    : float — inverse temperature\n\n    Returns\n    -------\n    grad_estimate : float — unbiased estimate of d⟨A⟩/dθ\n\n    Notes\n    -----\n    Use ddof=1 (unbiased covariance, divides by S-1) to avoid systematic\n    underestimation on finite sample counts. With S=10000 the difference\n    is negligible, but it matters at S=100.\n\n    Common mistakes:\n    - Forgetting the minus sign on β\n    - Using E[A * dU] without subtracting E[A]*E[dU]  → biased by E[A]*E[dU]\n    - Using 1/S instead of 1/(S-1) → small bias on finite samples\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-10 lines                             #\n    #                                                         #\n    # Step 1: compute mean_A = ⟨A⟩ and mean_dU = ⟨dU/dθ⟩   #\n    # Step 2: compute centered products per sample:           #\n    #         centered_i = (A_i - mean_A) * (dU_i - mean_dU) #\n    # Step 3: sum and divide by (S - 1) for unbiased Cov      #\n    # Step 4: multiply by -β and return                       #\n    #                                                         #\n    # Or: use np.cov(A_vals, dU_vals)[0, 1] and multiply -β  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 4: main verification table\n# ---------------------------------------------------------------------------\n\ndef print_verification_table(theta: float, n_samples: int, rng: np.random.Generator) -> float:\n    \"\"\"\n    Draw samples, compute three quantities, and print a comparison table.\n\n    Prints:\n        Quantity         | Closed-form | Estimator  | Rel. error\n        ⟨A⟩ = ⟨x²⟩      | 1/θ         | sample avg | ...\n        d⟨A⟩/dθ         | -1/θ²       | cov est.   | ...\n\n    Returns\n    -------\n    rel_err : float — relative error of the gradient estimate\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-14 lines                            #\n    #                                                         #\n    # 1. Draw samples via sample_gaussian(theta, n_samples)   #\n    # 2. Compute A_vals = observable_A(samples)               #\n    # 3. Compute dU_vals = dU_dtheta(samples)                 #\n    # 4. Compute: (a) sample_mean(A_vals)                     #\n    #             (b) covariance_estimator(A_vals, dU_vals,β) #\n    # 5. Compare each to its closed-form value                 #\n    # 6. Print a 4-column table (label, closed-form,           #\n    #    estimator, rel_err)                                   #\n    # 7. Return |rel_err| for the gradient estimate           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: __main__ harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    import os\n\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    N_SAMPLES = 2_000 if VERIFY else 10_000\n    THETA = 2.0\n    SEED = 42\n\n    rng = np.random.default_rng(SEED)\n\n    print(\"=\" * 60)\n    print(\"Exercise 1: Zwanzig Identity in NVT\")\n    print(f\"  θ = {THETA},  β = {BETA},  S = {N_SAMPLES}\")\n    print(\"=\" * 60)\n\n    rel_err = print_verification_table(THETA, N_SAMPLES, rng)\n\n    threshold = 0.05 if VERIFY else 0.02  # 5% ok on tiny verify run\n    if rel_err < threshold:\n        print(f\"\\nZwanzig identity verified: rel_err = {rel_err:.4f}\")\n    else:\n        print(f\"\\nWARNING: rel_err = {rel_err:.4f} exceeds threshold {threshold:.2f}\")\n        print(\"Check: minus sign on β? Centered covariance?\")\n"}, {"filename": "ex02_promote_the_derivation_from_nvt_to_μvt__particle_n.py", "content": "\"\"\"\nExercise 2: Promote the Derivation from NVT to μVT — Particle Number as Observable\n====================================================================================\n\nIn the μVT (grand-canonical) ensemble the particle number N fluctuates.\nThe grand partition function is:\n\n    Ξ(θ) = Σ_{N=0}^{N_max} (1/N!) · exp(βμN) · Σ_{q configs} exp(-β U(q;θ))\n\nThe Zwanzig identity generalises directly:\n\n    d⟨N⟩/dθ = -β · Cov(N, dU/dθ)\n\nwhere the covariance is taken under the μVT distribution.\n\nKey insight\n-----------\nθ appears ONLY in U (via the Boltzmann weight), NOT in the fugacity weight\nexp(βμN). So ∂/∂θ passes through the Σ_N cleanly — the sum over N does\nnot add any new terms, it just means we weight configurations by their N.\nThe algebra is identical to NVT once you treat (N, q^N) as the joint sample.\n\nTruncated toy model\n-------------------\n  N ∈ {0, 1, 2, 3}   (three or fewer molecules on the site)\n  q ∈ {-1, 0, 1}     (position of each molecule; all positions equiprobable)\n  U(q; θ) = θ · q²   (Lennard-Jones-style well depth)\n  β = 1.0,  μ = 0.5  (fixed throughout)\n\nThe grand partition function has a simple factored form:\n    Z₁(θ) = Σ_{q∈{-1,0,1}} exp(-β θ q²) = 2·exp(-βθ) + 1\n    Ξ(θ)  = Σ_{N=0}^{3} (1/N!) · exp(βμN) · Z₁(θ)^N\n\n    ⟨N⟩ = Σ_N N · (1/N!) exp(βμN) Z₁^N  /  Ξ(θ)\n\nYou will compute d⟨N⟩/dθ three ways and verify they agree within 1%:\n  (A) Closed-form: jax.grad on log_Z_scalar(θ) · (-1/β)  [see docstring]\n  (B) Finite difference: (⟨N⟩(θ+δ) − ⟨N⟩(θ−δ)) / (2δ)\n  (C) Covariance estimator: −β · Cov(N, ∂U/∂θ) on 50 000 samples\n\nYour task\n---------\nImplement four functions:\n  1. log_Z(theta, mu, beta)              — log Ξ(θ), sum over N and q\n  2. mean_N(theta, mu, beta)             — ⟨N⟩ computed analytically\n  3. dN_dtheta_covariance(samples_N, samples_dU, beta)\n                                         — covariance estimator from samples\n  4. sample_muVT(theta, mu, beta, n_samples, rng)\n                                         — draw (N, q) from the joint μVT dist\n\"\"\"\n\nimport os\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# Provided: constants and helpers\n# ---------------------------------------------------------------------------\n\nBETA = 1.0\nMU   = 0.5\nN_MAX = 3                        # N ∈ {0, 1, 2, 3}\nQ_VALS = np.array([-1, 0, 1])   # discrete positions\nTHETA_REF = 1.0\n\n\ndef U(q: float, theta: float) -> float:\n    \"\"\"Interaction energy for one particle at position q.\"\"\"\n    return theta * q ** 2\n\n\ndef dU_dtheta_single(q: float) -> float:\n    \"\"\"∂U/∂θ = q² for U = θ q².\"\"\"\n    return q ** 2\n\n\ndef dU_config(q_arr: np.ndarray) -> float:\n    \"\"\"∂U_total/∂θ for a configuration of N particles at positions q_arr.\"\"\"\n    return float(np.sum(q_arr ** 2))\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: log grand-partition function\n# ---------------------------------------------------------------------------\n\ndef log_Z(theta: float, mu: float, beta: float) -> float:\n    \"\"\"\n    Compute log Ξ(θ) = log Σ_{N=0}^{N_MAX} (1/N!) exp(βμN) Z₁(θ)^N\n\n    where Z₁(θ) = Σ_{q∈{-1,0,1}} exp(-β θ q²) = 2 exp(-βθ) + 1\n\n    Parameters\n    ----------\n    theta : float — potential well depth\n    mu    : float — chemical potential\n    beta  : float — inverse temperature\n\n    Returns\n    -------\n    log_xi : float — natural log of the grand partition function\n\n    Hint: compute Z₁ first, then loop or vectorise over N ∈ {0,...,N_MAX},\n    computing each term (1/N!) exp(βμN) Z₁^N, sum them, and take log.\n    Use scipy.special.factorial or math.factorial for 1/N!.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-14 lines                            #\n    #                                                         #\n    # 1. Compute Z₁ = 2*exp(-beta*theta) + 1                 #\n    # 2. For N in range(N_MAX+1):                             #\n    #      term_N = (1/N!) * exp(beta*mu*N) * Z₁**N           #\n    # 3. xi = sum of all terms                                #\n    # 4. return log(xi)                                       #\n    #                                                         #\n    # Watch out: 0! = 1, Z₁^0 = 1, exp(0) = 1 → term_0 = 1  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: analytic ⟨N⟩\n# ---------------------------------------------------------------------------\n\ndef mean_N(theta: float, mu: float, beta: float) -> float:\n    \"\"\"\n    Compute ⟨N⟩ = Σ_N N · (1/N!) exp(βμN) Z₁^N  /  Ξ(θ)\n\n    Parameters\n    ----------\n    theta, mu, beta : same as log_Z\n\n    Returns\n    -------\n    avg_N : float\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-12 lines                            #\n    #                                                         #\n    # Same loop structure as log_Z, but accumulate two sums:  #\n    #   numerator   += N * (1/N!) exp(βμN) Z₁^N               #\n    #   denominator += (1/N!) exp(βμN) Z₁^N  (= Ξ)            #\n    # Return numerator / denominator                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: exact sampler (enumerate all (N, q^N) configurations)\n# ---------------------------------------------------------------------------\n\ndef sample_muVT(\n    theta: float,\n    mu: float,\n    beta: float,\n    n_samples: int,\n    rng: np.random.Generator,\n) -> tuple[np.ndarray, np.ndarray]:\n    \"\"\"\n    Draw (N, q_sum²) pairs from the truncated μVT distribution by\n    enumeration and categorical sampling.\n\n    Returns\n    -------\n    N_arr     : (n_samples,) int array — particle counts\n    dU_arr    : (n_samples,) float array — ∂U/∂θ = Σq² for that config\n    \"\"\"\n    # Enumerate all (N, positions) configurations and compute weights\n    configs = []   # (N, dU_val, weight)\n    for n in range(N_MAX + 1):\n        if n == 0:\n            w = np.exp(beta * mu * 0)  # = 1\n            configs.append((0, 0.0, w))\n        else:\n            # All ordered n-tuples of positions (overcounting by N! cancelled by 1/N! in weight)\n            from itertools import product as iproduct\n            import math\n            for qs in iproduct(Q_VALS, repeat=n):\n                qs_arr = np.array(qs, dtype=float)\n                u_val  = float(np.sum(qs_arr ** 2)) * theta\n                dU_val = float(np.sum(qs_arr ** 2))\n                w = (1.0 / math.factorial(n)) * np.exp(beta * mu * n - beta * u_val)\n                configs.append((n, dU_val, w))\n\n    ns   = np.array([c[0] for c in configs])\n    dus  = np.array([c[1] for c in configs])\n    ws   = np.array([c[2] for c in configs], dtype=float)\n    probs = ws / ws.sum()\n\n    idx = rng.choice(len(configs), size=n_samples, p=probs)\n    return ns[idx], dus[idx]\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: covariance estimator\n# ---------------------------------------------------------------------------\n\ndef dN_dtheta_covariance(\n    N_arr: np.ndarray,\n    dU_arr: np.ndarray,\n    beta: float,\n) -> float:\n    \"\"\"\n    Estimate d⟨N⟩/dθ = -β · Cov(N, ∂U/∂θ) from μVT samples.\n\n    Parameters\n    ----------\n    N_arr  : (S,) int array — particle counts from S μVT samples\n    dU_arr : (S,) float array — ∂U/∂θ = Σq² for each sample\n    beta   : float\n\n    Returns\n    -------\n    grad_estimate : float\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-10 lines                             #\n    #                                                         #\n    # Same pattern as Exercise 1's covariance_estimator.      #\n    # The only difference: N_arr is integer-valued, but       #\n    # np.cov handles mixed int/float arrays just fine.        #\n    # Use ddof=1 for unbiased covariance.                     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 4: finite-difference reference\n# ---------------------------------------------------------------------------\n\ndef dN_dtheta_finite_diff(theta: float, mu: float, beta: float, delta: float = 1e-4) -> float:\n    \"\"\"\n    Central finite difference: (⟨N⟩(θ+δ) − ⟨N⟩(θ−δ)) / (2δ)\n\n    Parameters\n    ----------\n    theta, mu, beta : as usual\n    delta           : float, perturbation size\n\n    Returns\n    -------\n    fd_grad : float\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~4 lines                               #\n    #                                                         #\n    # Call mean_N at (theta+delta) and (theta-delta),         #\n    # subtract, divide by 2*delta.                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: __main__ harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    N_SAMPLES = 5_000 if VERIFY else 50_000\n    SEED = 0\n\n    rng = np.random.default_rng(SEED)\n\n    print(\"=\" * 65)\n    print(\"Exercise 2: μVT Zwanzig Identity — Particle Number Observable\")\n    print(f\"  θ = {THETA_REF},  β = {BETA},  μ = {MU},  S = {N_SAMPLES}\")\n    print(\"=\" * 65)\n\n    # --- Three paths to d⟨N⟩/dθ ---\n\n    # Path A: autograd on log_Z\n    try:\n        import jax\n        import jax.numpy as jnp\n\n        def log_Z_jax(theta):\n            Z1 = 2.0 * jnp.exp(-BETA * theta) + 1.0\n            terms = []\n            import math\n            for n in range(N_MAX + 1):\n                terms.append(\n                    (1.0 / math.factorial(n)) * jnp.exp(BETA * MU * n) * Z1 ** n\n                )\n            xi = sum(terms)\n            return jnp.log(xi)\n\n        # d⟨N⟩/dθ via the thermodynamic identity:\n        # ⟨N⟩ = (1/β) · d log Ξ / d μ  (but here we differentiate w.r.t. θ)\n        # More directly: use jax.grad on mean_N\n        def mean_N_jax(theta):\n            Z1 = 2.0 * jnp.exp(-BETA * theta) + 1.0\n            import math\n            num = 0.0\n            den = 0.0\n            for n in range(N_MAX + 1):\n                term = (1.0 / math.factorial(n)) * jnp.exp(BETA * MU * n) * Z1 ** n\n                num += n * term\n                den += term\n            return num / den\n\n        grad_autograd = float(jax.grad(mean_N_jax)(THETA_REF))\n        jax_available = True\n    except ImportError:\n        grad_autograd = float(\"nan\")\n        jax_available = False\n        print(\"  (JAX not available — skipping autograd path)\")\n\n    # Path B: finite difference (uses student's mean_N)\n    grad_fd = dN_dtheta_finite_diff(THETA_REF, MU, BETA)\n\n    # Path C: covariance estimator on samples\n    N_arr, dU_arr = sample_muVT(THETA_REF, MU, BETA, N_SAMPLES, rng)\n    grad_cov = dN_dtheta_covariance(N_arr, dU_arr, BETA)\n\n    # --- Print results ---\n    print(f\"\\n{'Method':<28} | {'d<N>/dθ':>12}\")\n    print(\"-\" * 44)\n    if jax_available:\n        print(f\"{'(A) JAX autograd on ⟨N⟩':<28} | {grad_autograd:>12.6f}\")\n    print(f\"{'(B) Finite difference':<28} | {grad_fd:>12.6f}\")\n    print(f\"{'(C) Covariance estimator':<28} | {grad_cov:>12.6f}\")\n\n    # --- Verification ---\n    reference = grad_fd  # FD is the ground truth when JAX not available\n    if jax_available:\n        reference = grad_autograd\n\n    rel_err_cov = abs(grad_cov - reference) / abs(reference)\n    rel_err_fd  = abs(grad_fd  - reference) / abs(reference) if jax_available else 0.0\n\n    print(f\"\\nRelative errors vs {'autograd' if jax_available else 'FD'}:\")\n    if jax_available:\n        print(f\"  FD vs autograd:  {rel_err_fd:.4f}\")\n    print(f\"  Cov vs reference: {rel_err_cov:.4f}\")\n\n    threshold = 0.05 if VERIFY else 0.01\n    if rel_err
