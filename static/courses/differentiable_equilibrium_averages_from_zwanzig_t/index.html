s:                                                  #\n    #   Use jax.grad to differentiate U_LJ with respect to   #\n    #   eps (argnums=2) and sigma (argnums=3).                #\n    #   Example:                                              #\n    #     grad_eps_fn = jax.grad(U_LJ, argnums=2)            #\n    #     grad_eps_auto = grad_eps_fn(q, L, eps, sigma)       #\n    #   Compute the analytic values with dU_depsilon and      #\n    #   dU_dsigma, then return:                               #\n    #     err = |analytic - auto| / (|analytic| + 1e-30)      #\n    #   The 1e-30 avoids division-by-zero if the derivative   #\n    #   happens to be exactly zero.                           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: __main__ test harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    # Fast-verification mode: tiny system, no iteration needed.\n    N_PARTICLES = 5 if VERIFY else 20\n    L_BOX = 6.0 if VERIFY else 10.0   # Angstroms\n\n    # LJ parameters for a generic CO₂ framework interaction\n    EPS = 100.0    # Kelvin (energy in units of k_B)\n    SIGMA = 3.4    # Angstroms\n\n    print(f\"=== Exercise 1: LJ Classical Sidecar ===\")\n    print(f\"N={N_PARTICLES} particles, L={L_BOX} Å, ε={EPS} K, σ={SIGMA} Å\\n\")\n\n    # Generate a random configuration\n    key = jr.PRNGKey(42)\n    q = jr.uniform(key, (N_PARTICLES, 3)) * L_BOX\n\n    # Compute total energy\n    U = U_LJ(q, L_BOX, EPS, SIGMA)\n    print(f\"U_LJ = {U:.4f} K\")\n\n    # Analytic derivatives\n    dU_deps_analytic = dU_depsilon(q, L_BOX, EPS, SIGMA)\n    dU_dsig_analytic = dU_dsigma(q, L_BOX, EPS, SIGMA)\n    print(f\"∂U/∂ε (analytic) = {dU_deps_analytic:.6f}\")\n    print(f\"∂U/∂σ (analytic) = {dU_dsig_analytic:.6f}\")\n\n    # Validate against jax.grad\n    err_eps, err_sigma = validate_analytic_vs_jaxgrad(q, L_BOX, EPS, SIGMA)\n    print(f\"\\nRelative |analytic − jax.grad| / |analytic| for ε: {err_eps:.2e}\")\n    print(f\"Relative |analytic − jax.grad| / |analytic| for σ: {err_sigma:.2e}\")\n\n    # Sanity: U/eps should equal dU_depsilon\n    ratio = U / EPS\n    print(f\"\\nSanity: U/ε = {ratio:.6f}\")\n    print(f\"        ∂U/∂ε = {dU_deps_analytic:.6f}\")\n    print(f\"        Match: {jnp.allclose(ratio, dU_deps_analytic, atol=1e-10)}\")\n\n    # err_eps and err_sigma are relative errors from validate_analytic_vs_jaxgrad\n    assert err_eps < 1e-10, f\"ε relative error too large: {err_eps:.2e}\"\n    assert err_sigma < 1e-10, f\"σ relative error too large: {err_sigma:.2e}\"\n\n    print(\"\\nclassical sidecar derivatives verified\")\n"}, {"filename": "ex02_stateless_gcmc_propagator_with_insertdeletetransla.py", "content": "\"\"\"\nExercise 2: Stateless GCMC Propagator with Insert/Delete/Translate Moves\n=========================================================================\n\nIn this exercise you will implement a minimal Grand-Canonical Monte Carlo\n(GCMC) sampler as a STATELESS propagator with the signature:\n\n    gcmc_step(key, state) -> state'\n\nThe stateless design — no global mutable RNG, no hidden accumulator — is\nwhat makes CRN (Common Random Numbers) possible in Module 2: two chains at\ndifferent μ but with the same key stream will propose the same positions and\ndraw the same accept-threshold uniforms, so their gradient differences cancel\ncleanly under jit.\n\n──────────────────────────────────────────────────────────────────────────\nJAX DESIGN CONSTRAINT: All array shapes must be static at trace time.\n\nWe use a fixed (MAX_MOLS, 3) position buffer and a dynamic integer n_mols.\nEnergy is computed by masking dead slots to infinity via U_LJ_masked().\nThis is already implemented for you — use it instead of slicing.\n\nDo NOT write:  U_LJ(positions[:n_mols], ...)    ← BREAKS inside jit\nDo write:      U_LJ_masked(positions, n_mols, ...)  ← WORKS\n──────────────────────────────────────────────────────────────────────────\n\nAcceptance probabilities (derived in the lesson from detailed balance):\n  INSERT:    A_ins = min(1, z·V/(N+1) · exp(-β·ΔU))\n  DELETE:    A_del = min(1, N/(z·V)   · exp(-β·ΔU))\n  TRANSLATE: A_tr  = min(1,            exp(-β·ΔU))\n\nwhere z = exp(β·μ) is the fugacity and V = L³ is the box volume.\n\nMilestone: run chain, verify ⟨N⟩ > 0, replay with same key gives identical\ntrajectory (hash match). Prints \"GCMC bitwise-reproducible\".\n\"\"\"\n\nimport os\nimport hashlib\nfrom typing import NamedTuple\n\nimport jax\nimport jax.numpy as jnp\nimport jax.random as jr\n\njax.config.update(\"jax_enable_x64\", True)\n\n# ---------------------------------------------------------------------------\n# PROVIDED: masked LJ energy — the only energy function you should call\n# ---------------------------------------------------------------------------\n\nMAX_MOLS = 200\n_IDX = jnp.arange(MAX_MOLS)   # static index array, used in masking\n\n\ndef minimum_image_distance(qi, qj, L):\n    dr = qi - qj\n    return dr - L * jnp.round(dr / L)\n\n\ndef U_LJ_masked(q: jax.Array, n_live: int, L: float,\n                eps: float, sigma: float) -> float:\n    \"\"\"LJ energy for first n_live molecules in the padded (MAX_MOLS, 3) array.\n\n    Molecules with index >= n_live are masked out (their r → ∞, x → 0,\n    contributing zero energy). All shapes are STATIC — safe inside jit.\n\n    Args:\n        q:      positions buffer, shape (MAX_MOLS, 3)\n        n_live: number of live molecules (dynamic scalar OK — used only in mask)\n        L:      box side length (Å)\n        eps:    LJ well depth\n        sigma:  LJ zero-crossing distance\n\n    Returns:\n        scalar total LJ energy\n    \"\"\"\n    N = q.shape[0]   # MAX_MOLS — always static\n    qi = q[:, None, :]\n    qj = q[None, :, :]\n    dr = minimum_image_distance(qi, qj, L)\n    r = jnp.sqrt(jnp.sum(dr ** 2, axis=-1))\n\n    live = _IDX < n_live\n    pair_live = live[:, None] & live[None, :]\n    lower_tri = jnp.tril(jnp.ones((N, N), bool), k=-1)\n    active = pair_live & lower_tri\n\n    r_eff = jnp.where(active, r, jnp.inf)\n    x = sigma / r_eff\n    return jnp.sum(4.0 * eps * (x ** 12 - x ** 6))\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: State representation\n# ---------------------------------------------------------------------------\n\nclass GcmcState(NamedTuple):\n    \"\"\"GCMC system state — a JAX pytree.\n\n    positions: (MAX_MOLS, 3) padded buffer; only rows 0..n_mols-1 are live.\n    n_mols:    number of live molecules (dynamic integer).\n    energy:    current LJ energy of live molecules.\n    \"\"\"\n    positions: jax.Array   # (MAX_MOLS, 3)\n    n_mols: int\n    energy: float\n\n\ndef make_initial_state(key, n_init, L, eps, sigma):\n    \"\"\"Create an initial GcmcState with n_init molecules placed uniformly.\"\"\"\n    pos = jr.uniform(key, (MAX_MOLS, 3)) * L\n    live = _IDX < n_init\n    pos = jnp.where(live[:, None], pos, 0.0)\n    U = U_LJ_masked(pos, n_init, L, eps, sigma)\n    return GcmcState(positions=pos, n_mols=n_init, energy=U)\n\n\n# ---------------------------------------------------------------------------\n# TODO 1: try_insert — propose inserting one new molecule\n# ---------------------------------------------------------------------------\n\ndef try_insert(key, state: GcmcState, L, beta, mu, eps, sigma) -> GcmcState:\n    \"\"\"Propose inserting a molecule at a uniformly random position in V.\n\n    Acceptance probability (from detailed balance):\n        A_ins = min(1, z·V/(N+1) · exp(−β·ΔU))\n    where z = exp(β·μ), V = L³, N = state.n_mols, ΔU = U_{N+1} − U_N.\n\n    Args:\n        key:   JAX random key (split internally — not mutated)\n        state: current GcmcState\n        L:     box side length (Å)\n        beta:  inverse temperature (1/K)\n        mu:    chemical potential (K)\n        eps:   LJ well depth (K)\n        sigma: LJ zero-crossing distance (Å)\n\n    Returns:\n        GcmcState after accept/reject decision\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 18 lines                 #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. pos_key, acc_key = jr.split(key)                  #\n    #   2. new_pos = jr.uniform(pos_key, (3,)) * L           #\n    #   3. trial_pos = state.positions.at[state.n_mols]      #\n    #                      .set(new_pos)                      #\n    #      (write at index n_mols — the first empty slot)    #\n    #   4. U_new = U_LJ_masked(trial_pos, state.n_mols + 1, #\n    #                           L, eps, sigma)                #\n    #   5. delta_U = U_new - state.energy                    #\n    #   6. z = jnp.exp(beta * mu); V = L**3                  #\n    #      acc = z * V / (state.n_mols + 1) *                #\n    #                jnp.exp(-beta * delta_U)                 #\n    #   7. u = jr.uniform(acc_key)                           #\n    #      accept = u < jnp.minimum(1.0, acc)                #\n    #   8. new_positions = jnp.where(accept,                 #\n    #                          trial_pos, state.positions)    #\n    #      new_n = jnp.where(accept,                         #\n    #                  state.n_mols + 1, state.n_mols)       #\n    #      new_energy = jnp.where(accept,                    #\n    #                      U_new, state.energy)              #\n    #   9. return GcmcState(new_positions, new_n, new_energy) #\n    #                                                         #\n    # NEVER use trial_pos[:state.n_mols+1] — use masked fn!  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2: try_delete — propose deleting a random live molecule\n# ---------------------------------------------------------------------------\n\ndef try_delete(key, state: GcmcState, L, beta, mu, eps, sigma) -> GcmcState:\n    \"\"\"Propose deleting a uniformly chosen live molecule.\n\n    Acceptance probability:\n        A_del = min(1, N/(z·V) · exp(−β·ΔU))\n    where ΔU = U_{N-1} − U_N (typically negative).\n\n    Args: same as try_insert.\n    Returns: GcmcState after accept/reject.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 15 lines                 #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. idx_key, acc_key = jr.split(key)                  #\n    #   2. del_idx = jr.randint(idx_key, (), 0,              #\n    #                  jnp.maximum(state.n_mols, 1))         #\n    #      (maximum(..., 1) avoids randint hi=0 error)       #\n    #   3. Swap-and-shrink: fill deleted slot with last live  #\n    #      last_pos = state.positions[state.n_mols - 1]      #\n    #      trial_pos = state.positions.at[del_idx].set(      #\n    #                      last_pos)                          #\n    #   4. U_new = U_LJ_masked(trial_pos, state.n_mols - 1, #\n    #                           L, eps, sigma)                #\n    #   5. delta_U = U_new - state.energy                    #\n    #      z = jnp.exp(beta * mu); V = L**3                  #\n    #      acc = state.n_mols / (z * V) *                    #\n    #                jnp.exp(-beta * delta_U)                 #\n    #   6. u = jr.uniform(acc_key)                           #\n    #      accept = (u < jnp.minimum(1.0, acc))              #\n    #                & (state.n_mols > 0)   # guard empty box#\n    #   7. jnp.where for new_positions, new_n, new_energy    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3: try_translate — displace a random live molecule\n# ---------------------------------------------------------------------------\n\ndef try_translate(key, state: GcmcState, L, beta, mu, eps, sigma,\n                  delta_max=0.5) -> GcmcState:\n    \"\"\"Propose displacing a random live molecule by up to delta_max Å.\n\n    Acceptance probability (N unchanged):\n        A_tr = min(1, exp(−β·ΔU))\n\n    Args:\n        delta_max: max displacement per Cartesian axis (Å).\n        others:    same as try_insert.\n    Returns: GcmcState after accept/reject.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 14 lines                 #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. idx_key, disp_key, acc_key = jr.split(key, 3)    #\n    #   2. idx = jr.randint(idx_key, (), 0,                  #\n    #                 jnp.maximum(state.n_mols, 1))          #\n    #   3. disp = jr.uniform(disp_key, (3,),                 #\n    #               minval=-delta_max, maxval=delta_max)      #\n    #   4. new_pos_i = (state.positions[idx] + disp) % L    #\n    #      (% L wraps into [0, L) with periodic boundary)   #\n    #   5. trial_pos = state.positions.at[idx].set(new_pos_i)#\n    #   6. U_new = U_LJ_masked(trial_pos, state.n_mols,     #\n    #                           L, eps, sigma)                #\n    #   7. delta_U = U_new - state.energy                    #\n    #      acc = jnp.exp(-beta * delta_U)                    #\n    #      u = jr.uniform(acc_key)                           #\n    #      accept = (u < jnp.minimum(1.0, acc))              #\n    #                & (state.n_mols > 0)                    #\n    #   8. jnp.where for new_positions, new_energy           #\n    #      (n_mols is unchanged by translation)              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 4: gcmc_step dispatcher\n# ---------------------------------------------------------------------------\n\ndef gcmc_step(key, state: GcmcState, L, beta, mu, eps, sigma) -> GcmcState:\n    \"\"\"One full GCMC step: choose insert/delete/translate with prob 1/3 each.\n\n    This is the (key, state) → state' propagator — pure function, no side effects.\n\n    Args:\n        key:   JAX random key for this step (consumed, never mutated)\n        state: current GcmcState\n        L, beta, mu, eps, sigma: fixed simulation parameters\n\n    Returns:\n        new_state: GcmcState after one MC move\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 8 lines                  #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. key, subkey = jr.split(key)                       #\n    #   2. move_type = jr.randint(subkey, (), 0, 3)           #\n    #      (0=insert, 1=delete, 2=translate)                 #\n    #   3. key, subkey = jr.split(key)                       #\n    #   4. Use jax.lax.switch(move_type, branches, *args)    #\n    #      branches = [try_insert, try_delete, translate_fn] #\n    #      where translate_fn wraps try_translate with        #\n    #      delta_max=0.5 fixed:                               #\n    #        lambda k, s, L, b, m, e, sig:                   #\n    #            try_translate(k, s, L, b, m, e, sig, 0.5)   #\n    #      All branches must have identical signature!        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: chain runner and __main__ — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\ndef run_chain(initial_key, initial_state, n_steps, L, beta, mu, eps, sigma):\n    \"\"\"Run n_steps of GCMC using jax.lax.scan for efficiency.\n\n    Returns:\n        final_state: GcmcState after all steps\n        n_mols_traj: int array of shape (n_steps,) recording N at each step\n    \"\"\"\n    keys = jr.split(initial_key, n_steps)\n\n    def step_fn(state, key):\n        new_state = gcmc_step(key, state, L, beta, mu, eps, sigma)\n        return new_state, new_state.n_mols\n\n    final_state, n_mols_traj = jax.lax.scan(step_fn, initial_state, keys)\n    return final_state, n_mols_traj\n\n\ndef traj_hash(n_mols_traj):\n    \"\"\"SHA-256 hash of a trajectory array for bitwise comparison.\"\"\"\n    arr = jax.device_get(n_mols_traj)\n    return hashlib.sha256(arr.tobytes()).hexdigest()\n\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    T = 298.0\n    beta = 1.0 / T\n\n    EPS = 100.0\n    SIGMA = 3.4\n    L = 15.0\n    mu = -350.0   # K — chosen so ⟨N⟩ > 0 at these conditions\n\n    N_INIT = 3\n    N_STEPS = 200 if VERIFY else 10_000\n\n    print(\"=== Exercise 2: Stateless GCMC Propagator ===\")\n    print(f\"T={T} K,  μ={mu} K,  L={L} Å,  N_steps={N_STEPS}\")\n    print(f\"ε={EPS} K,  σ={SIGMA} Å,  N_init={N_INIT}\\n\")\n\n    key = jr.PRNGKey(7)\n    key, init_key = jr.split(key)\n    state0 = make_initial_state(init_key, N_INIT, L, EPS, SIGMA)\n\n    key, run_key = jr.split(key)\n\n    # Run chain 1\n    final, traj1 = run_chain(run_key, state0, N_STEPS, L, beta, mu, EPS, SIGMA)\n    mean_N = jnp.mean(traj1.astype(jnp.float64))\n    print(f\"⟨N⟩ over trajectory: {mean_N:.2f}  (first/last N: {traj1[0]}/{traj1[-1]})\")\n\n    # Replay with the SAME key — must produce byte-identical trajectory\n    final2, traj2 = run_chain(run_key, state0, N_STEPS, L, beta, mu, EPS, SIGMA)\n\n    h1 = traj_hash(traj1)\n    h2 = traj_hash(traj2)\n    print(f\"\\nRun 1 trajectory hash: {h1[:16]}...\")\n    print(f\"Run 2 trajectory hash: {h2[:16]}...\")\n    match = h1 == h2\n    print(f\"Hashes match: {match}\")\n\n    assert match, \"Trajectories are NOT bitwise identical — stateless discipline broken!\"\n\n    n_changes = jnp.sum(jnp.abs(jnp.diff(traj1)) > 0)\n    acc_frac = float(n_changes) / (N_STEPS - 1)\n    print(f\"Fraction of steps that changed N: {acc_frac:.2%}\")\n    assert 0.01 < acc_frac < 0.99, \"Acceptance rate outside (1%, 99%) — check μ or L\"\n\n    print(\"\\nGCMC bitwise-reproducible\")\n"}, {"filename": "ex03_online_covariance_accumulator__the_estimator_as_a.py", "content": "\"\"\"\nExercise 3: Online Covariance Accumulator — The Estimator as a Propagator Decorator\n=====================================================================================\n\nThe score-function gradient identity says:\n    ∂⟨N⟩/∂ε = −β · Cov(N, ∂U/∂ε)\n             = −β · [⟨N·∂U/∂ε⟩ − ⟨N⟩·⟨∂U/∂ε⟩]\n\nWe estimate this by accumulating three running sums online during the MCMC chain:\n    S_N    = Σ N_t\n    S_dU   = Σ (∂U/∂ε)_t\n    S_NdU  = Σ N_t · (∂U/∂ε)_t\n\nAt the end, gradient = −β · [S_NdU/M − (S_N/M)·(S_dU/M)]\n\nKEY INSIGHT — O(1) overhead: per sample work is one pair-sum pass for ∂U/∂ε\nplus three scalar additions. Memory is 3 scalars total, regardless of chain\nlength. This is the claim \"O(1) overhead on top of the GCMC chain.\"\n\nThe estimator wraps the GCMC propagator like a decorator:\n  Before: key → [GCMC step] → state\n  After:  key → [GCMC step + accumulate] → (state, running_stats)\n\nThis is the shape the paper calls ObservableWithGradient.\n\nMilestone:\n  - Print gradient d⟨N⟩/dε at chain lengths 1e3, 1e4, 1e5 (verify only uses\n    small lengths). Show values converging.\n  - Show timing overhead < 5% vs bare GCMC.\n  - Print \"estimator overhead within O(1) claim\".\n\"\"\"\n\nimport os\nimport time\nfrom typing import NamedTuple\n\nimport jax\nimport jax.numpy as jnp\nimport jax.random as jr\n\njax.config.update(\"jax_enable_x64\", True)\n\n# ---------------------------------------------------------------------------\n# Import all infrastructure from previous exercises\n# ---------------------------------------------------------------------------\n\n# -- copied from ex01 & ex02 for self-containment --\n\nMAX_MOLS = 200\n_IDX = jnp.arange(MAX_MOLS)\n\n\ndef minimum_image_distance(qi, qj, L):\n    dr = qi - qj\n    return dr - L * jnp.round(dr / L)\n\n\ndef U_LJ_masked(q, n_live, L, eps, sigma):\n    N = q.shape[0]\n    qi = q[:, None, :]\n    qj = q[None, :, :]\n    dr = minimum_image_distance(qi, qj, L)\n    r = jnp.sqrt(jnp.sum(dr ** 2, axis=-1))\n    live = _IDX < n_live\n    pair_live = live[:, None] & live[None, :]\n    lower_tri = jnp.tril(jnp.ones((N, N), bool), k=-1)\n    active = pair_live & lower_tri\n    r_eff = jnp.where(active, r, jnp.inf)\n    x = sigma / r_eff\n    return jnp.sum(4.0 * eps * (x ** 12 - x ** 6))\n\n\ndef dU_depsilon_masked(q, n_live, L, eps, sigma):\n    \"\"\"Analytic ∂U/∂ε = U/ε for the live molecules.\"\"\"\n    N = q.shape[0]\n    qi = q[:, None, :]\n    qj = q[None, :, :]\n    dr = minimum_image_distance(qi, qj, L)\n    r = jnp.sqrt(jnp.sum(dr ** 2, axis=-1))\n    live = _IDX < n_live\n    pair_live = live[:, None] & live[None, :]\n    lower_tri = jnp.tril(jnp.ones((N, N), bool), k=-1)\n    active = pair_live & lower_tri\n    r_eff = jnp.where(active, r, jnp.inf)\n    x = sigma / r_eff\n    return jnp.sum(4.0 * (x ** 12 - x ** 6))   # strip ε; factor is U/ε\n\n\nclass GcmcState(NamedTuple):\n    positions: jax.Array\n    n_mols: int\n    energy: float\n\n\ndef make_initial_state(key, n_init, L, eps, sigma):\n    pos = jr.uniform(key, (MAX_MOLS, 3)) * L\n    pos = jnp.where((_IDX < n_init)[:, None], pos, 0.0)\n    U = U_LJ_masked(pos, n_init, L, eps, sigma)\n    return GcmcState(positions=pos, n_mols=n_init, energy=U)\n\n\ndef try_insert(key, state, L, beta, mu, eps, sigma):\n    pos_key, acc_key = jr.split(key)\n    new_pos = jr.uniform(pos_key, (3,)) * L\n    trial_pos = state.positions.at[state.n_mols].set(new_pos)\n    U_new = U_LJ_masked(trial_pos, state.n_mols + 1, L, eps, sigma)\n    delta_U = U_new - state.energy\n    z = jnp.exp(beta * mu); V = L ** 3\n    acc = z * V / (state.n_mols + 1) * jnp.exp(-beta * delta_U)\n    u = jr.uniform(acc_key)\n    accept = u < jnp.minimum(1.0, acc)\n    return GcmcState(\n        positions=jnp.where(accept, trial_pos, state.positions),\n        n_mols=jnp.where(accept, state.n_mols + 1, state.n_mols),\n        energy=jnp.where(accept, U_new, state.energy),\n    )\n\n\ndef try_delete(key, state, L, beta, mu, eps, sigma):\n    idx_key, acc_key = jr.split(key)\n    del_idx = jr.randint(idx_key, (), 0, jnp.maximum(state.n_mols, 1))\n    last_pos = state.positions[state.n_mols - 1]\n    trial_pos = state.positions.at[del_idx].set(last_pos)\n    U_new = U_LJ_masked(trial_pos, state.n_mols - 1, L, eps, sigma)\n    delta_U = U_new - state.energy\n    z = jnp.exp(beta * mu); V = L ** 3\n    acc = state.n_mols / (z * V) * jnp.exp(-beta * delta_U)\n    u = jr.uniform(acc_key)\n    accept = (u < jnp.minimum(1.0, acc)) & (state.n_mols > 0)\n    return GcmcState(\n        positions=jnp.where(accept, trial_pos, state.positions),\n        n_mols=jnp.where(accept, state.n_mols - 1, state.n_mols),\n        energy=jnp.where(accept, U_new, state.energy),\n    )\n\n\ndef try_translate(key, state, L, beta, mu, eps, sigma, delta_max=0.5):\n    idx_key, disp_key, acc_key = jr.split(key, 3)\n    idx = jr.randint(idx_key, (), 0, jnp.maximum(state.n_mols, 1))\n    disp = jr.uniform(disp_key, (3,), minval=-delta_max, maxval=delta_max)\n    new_pos_i = (state.positions[idx] + disp) % L\n    trial_pos = state.positions.at[idx].set(new_pos_i)\n    U_new = U_LJ_masked(trial_pos, state.n_mols, L, eps, sigma)\n    delta_U = U_new - state.energy\n    acc = jnp.exp(-beta * delta_U)\n    u = jr.uniform(acc_key)\n    accept = (u < jnp.minimum(1.0, acc)) & (state.n_mols > 0)\n    return GcmcState(\n        positions=jnp.where(accept, trial_pos, state.positions),\n        n_mols=state.n_mols,\n        energy=jnp.where(accept, U_new, state.energy),\n    )\n\n\ndef gcmc_step(key, state, L, beta, mu, eps, sigma):\n    key, subkey = jr.split(key)\n    move_type = jr.randint(subkey, (), 0, 3)\n    key, subkey = jr.split(key)\n    return jax.lax.switch(\n        move_type,\n        [\n            try_insert,\n            try_delete,\n            lambda k, s, L, b, m, e, sig: try_translate(k, s, L, b, m, e, sig, 0.5),\n        ],\n        subkey, state, L, beta, mu, eps, sigma,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Running statistics accumulator\n# ---------------------------------------------------------------------------\n\nclass RunningStats(NamedTuple):\n    \"\"\"Three running sums sufficient to compute Cov(N, ∂U/∂ε).\n\n    All fields are scalars — O(1) memory regardless of chain length.\n    \"\"\"\n    sum_N: float      # Σ N_t\n    sum_dU: float     # Σ (∂U/∂ε)_t\n    sum_NdU: float    # Σ N_t · (∂U/∂ε)_t\n    n_samples: int    # M (number of accumulated samples)\n\n\ndef zero_stats() -> RunningStats:\n    return RunningStats(\n        sum_N=0.0, sum_dU=0.0, sum_NdU=0.0, n_samples=0\n    )\n\n\n# ---------------------------------------------------------------------------\n# TODO 1: estimator_step — one GCMC step plus one accumulator update\n# ---------------------------------------------------------------------------\n\ndef estimator_step(key, state: GcmcState, stats: RunningStats,\n                   L, beta, mu, eps, sigma) -> tuple:\n    \"\"\"Advance the GCMC chain by one step and update the running statistics.\n\n    This function IS the ObservableWithGradient decorator:\n    it consumes whatever sample the underlying propagator produces\n    and folds it into three scalars. O(1) overhead per step.\n\n    Args:\n        key:   JAX random key for this step\n        state: current GcmcState\n        stats: current RunningStats accumulator\n        L, beta, mu, eps, sigma: simulation parameters\n\n    Returns:\n        (new_state, new_stats): both updated\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 8 lines                  #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. new_state = gcmc_step(key, state, L, beta,        #\n    #                             mu, eps, sigma)             #\n    #   2. N_t = new_state.n_mols (cast to float)            #\n    #   3. dU_t = dU_depsilon_masked(new_state.positions,    #\n    #                 new_state.n_mols, L, eps, sigma)        #\n    #      (this is ∂U/∂ε at the new configuration)          #\n    #   4. Build new_stats = RunningStats(                    #\n    #        sum_N   = stats.sum_N   + N_t,                  #\n    #        sum_dU  = stats.sum_dU  + dU_t,                 #\n    #        sum_NdU = stats.sum_NdU + N_t * dU_t,           #\n    #        n_samples = stats.n_samples + 1,                 #\n    #      )                                                  #\n    #   5. return (new_state, new_stats)                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2: combine_running_sums — turn accumulators into a gradient estimate\n# ---------------------------------------------------------------------------\n\ndef combine_running_sums(stats: RunningStats, beta: float) -> float:\n    \"\"\"Compute the score-function gradient estimate from running sums.\n\n    Gradient = −β · Cov(N, ∂U/∂ε)\n             = −β · [⟨N·∂U/∂ε⟩ − ⟨N⟩·⟨∂U/∂ε⟩]\n             = −β · [S_NdU/M − (S_N/M)·(S_dU/M)]\n\n    Args:\n        stats: RunningStats with accumulated sums\n        beta:  inverse temperature 1/kT\n\n    Returns:\n        gradient: scalar estimate of ∂⟨N⟩/∂ε\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 8 lines                  #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. M = stats.n_samples                               #\n    #   2. mean_N   = stats.sum_N   / M                      #\n    #   3. mean_dU  = stats.sum_dU  / M                      #\n    #   4. mean_NdU = stats.sum_NdU / M                      #\n    #   5. cov = mean_NdU - mean_N * mean_dU                 #\n    #   6. return -beta * cov                                 #\n    #                                                         #\n    # Common mistake: forgetting to divide by M (off by M).  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3: run_chain_with_estimator — drive chain + estimator via lax.scan\n# ---------------------------------------------------------------------------\n\ndef run_chain_with_estimator(initial_key, initial_state, n_steps,\n                             L, beta, mu, eps, sigma):\n    \"\"\"Run n_steps of GCMC and accumulate gradient statistics online.\n\n    Uses jax.lax.scan so the full chain + accumulation is JIT-compiled.\n\n    Args:\n        initial_key:   PRNGKey for the chain\n        initial_state: GcmcState to start from\n        n_steps:       number of GCMC steps\n        L, beta, mu, eps, sigma: simulation parameters\n\n    Returns:\n        final_state: GcmcState after n_steps\n        final_stats: RunningStats with sums over all steps\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 12 lines                 #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. keys = jr.split(initial_key, n_steps)             #\n    #   2. Define a scan body:                               #\n    #        def body(carry, key):                           #\n    #            state, stats = carry                        #\n    #            new_state, new_stats = estimator_step(      #\n    #                key, state, stats,                      #\n    #                L, beta, mu, eps, sigma)                #\n    #            return (new_state, new_stats), None         #\n    #      The scan carry is (state, stats).                 #\n    #      We output None per step (no trajectory stored).   #\n    #   3. init_stats = zero_stats()                         #\n    #   4. (final_state, final_stats), _ = jax.lax.scan(    #\n    #            body, (initial_state, init_stats), keys)    #\n    #   5. return final_state, final_stats                   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: __main__ test harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    T = 298.0\n    beta = 1.0 / T\n    EPS = 100.0\n    SIGMA = 3.4\n    L = 15.0\n    mu = -350.0\n    N_INIT = 3\n\n    # Chain lengths to sweep; verify mode uses tiny values\n    if VERIFY:\n        chain_lengths = [50, 100, 200]\n    else:\n        chain_lengths = [1_000, 10_000, 100_000]\n\n    print(\"=== Exercise 3: Online Covariance Accumulator ===\")\n    print(f\"T={T} K, μ={mu} K, L={L} Å, ε={EPS} K, σ={SIGMA} Å\")\n    print(f\"Chain lengths: {chain_lengths}\\n\")\n\n    key = jr.PRNGKey(13)\n    key, init_key = jr.split(key)\n    state0 = make_initial_state(init_key, N_INIT, L, EPS, SIGMA)\n\n    gradients = []\n    times_with = []\n    times_without = []\n\n    for n_steps in chain_lengths:\n        key, run_key = jr.split(key)\n\n        # --- With estimator ---\n        t0 = time.perf_counter()\n        final_s, final_stats = run_chain_with_estimator(\n            run_key, state0, n_steps, L, beta, mu, EPS, SIGMA\n        )\n        jax.block_until_ready(final_stats)\n        t_with = time.perf_counter() - t0\n\n        grad_est = combine_running_sums(final_stats, beta)\n        gradients.append(float(grad_est))\n        times_with.append(t_with)\n        mean_N = float(final_stats.sum_N) / n_steps\n        print(f\"n_steps={n_steps:7d}  ⟨N⟩≈{mean_N:.2f}  \"\n              f\"d⟨N⟩/dε = {float(grad_est):.4f}  \"\n              f\"time={t_with:.3f}s\")\n\n    print()\n\n    # --- Timing overhead: bare GCMC vs with estimator at largest chain ---\n    n_bench = chain_lengths[-1]\n\n    def bare_chain(key, state):\n        keys = jr.split(key, n_bench)\n        def step(s, k):\n            return gcmc_step(k, s, L, beta, mu, EPS, SIGMA), s.n_mols\n        final, traj = jax.lax.scan(step, state, keys)\n        return final, traj\n\n    key, run_key = jr.split(key)\n    t0 = time.perf_counter()\n    fs, tr = bare_chain(run_key, state0)\n    jax.block_until_ready(tr)\n    t_bare = time.perf_counter() - t0\n\n    t_est = times_with[-1]\n    overhead_pct = (t_est - t_bare) / t_bare * 100 if t_bare > 0 else float(\"nan\")\n    print(f\"Bare GCMC ({n_bench} steps):      {t_bare:.3f}s\")\n    print(f\"With estimator ({n_steps} steps): {t_est:.3f}s\")\n    print(f\"Overhead: {overhead_pct:.1f}%  (target < 5% at large n)\")\n\n    # Correctness checks\n    assert final_stats.n_samples == chain_lengths[-1], \\\n        \"n_samples mismatch — check run_chain_with_estimator\"\n\n    # Gradient sign: more attractive (larger ε) → more adsorption → positive dN/dε\n    # (sign depends on chemical potential; just check it's finite and nonzero)\n    last_grad = gradients[-1]\n    assert abs(last_grad) > 0, \"Gradient is exactly zero — likely a bug\"\n    assert abs(last_grad) < 1e6, f\"Gradient unreasonably large: {last_grad}\"\n\n    print(\"\\nestimator overhead within O(1) claim\")\n"}, {"filename": "ex04_finitedifference_validation__the_papers_3_sanity_t.py", "content": "\"\"\"\nExercise 4: Finite-Difference Validation — The Paper's 3% Sanity Test\n=======================================================================\n\nIn this final exercise you will validate the score-function gradient estimator\n(built in Exercise 3) against centered finite differences:\n\n    (d⟨N⟩/dε)|_FD ≈ [⟨N⟩_{ε+δ} − ⟨N⟩_{ε−δ}] / (2δ)\n\nThis is the paper's minimal confidence gate before any further complexity:\nit tests that (1) acceptance ratios are correct, (2) analytic ∂U/∂ε is\ncorrect, and (3) covariance accumulation is combined correctly.\n\nKey concept — the FD bias-variance crossover:\n    Error of FD ≈ (δ²/6)·∂³⟨N⟩/∂ε³  +  SE_{⟨N⟩}/δ\n    where SE ∝ 1/√M.\n    Too large δ → truncation bias dominates.\n    Too small δ → statistical noise 1/δ explodes.\n    Optimal δ ≈ SE^(1/3).\n\nYou will sweep δ ∈ {0.1, 0.05, 0.01}·ε₀ and print a 4-row table:\n    FD (δ=0.1·ε₀) | FD (δ=0.05·ε₀) | FD (δ=0.01·ε₀) | Score-function\n\nThe smallest-noise FD and the score-function estimator should agree within 3%.\n\nMilestone: prints 4-row comparison table.\n           prints \"paper's 3% sanity gate passed\".\n\"\"\"\n\nimport os\nimport time\nfrom typing import NamedTuple\n\nimport jax\nimport jax.numpy as jnp\nimport jax.random as jr\n\njax.config.update(\"jax_enable_x64\", True)\n\n# ---------------------------------------------------------------------------\n# Full infrastructure from previous exercises (self-contained)\n# ---------------------------------------------------------------------------\n\nMAX_MOLS = 200\n_IDX = jnp.arange(MAX_MOLS)\n\n\ndef minimum_image_distance(qi, qj, L):\n    dr = qi - qj\n    return dr - L * jnp.round(dr / L)\n\n\ndef U_LJ_masked(q, n_live, L, eps, sigma):\n    N = q.shape[0]\n    qi = q[:, None, :]\n    qj = q[None, :, :]\n    dr = minimum_image_distance(qi, qj, L)\n    r = jnp.sqrt(jnp.sum(dr ** 2, axis=-1))\n    live = _IDX < n_live\n    pair_live = live[:, None] & live[None, :]\n    lower_tri = jnp.tril(jnp.ones((N, N), bool), k=-1)\n    active = pair_live & lower_tri\n    r_eff = jnp.where(active, r, jnp.inf)\n    x = sigma / r_eff\n    return jnp.sum(4.0 * eps * (x ** 12 - x ** 6))\n\n\ndef dU_depsilon_masked(q, n_live, L, eps, sigma):\n    N = q.shape[0]\n    qi = q[:, None, :]\n    qj = q[None, :, :]\n    dr = minimum_image_distance(qi, qj, L)\n    r = jnp.sqrt(jnp.sum(dr ** 2, axis=-1))\n    live = _IDX < n_live\n    pair_live = live[:, None] & live[None, :]\n    lower_tri = jnp.tril(jnp.ones((N, N), bool), k=-1)\n    active = pair_live & lower_tri\n    r_eff = jnp.where(active, r, jnp.inf)\n    x = sigma / r_eff\n    return jnp.sum(4.0 * (x ** 12 - x ** 6))\n\n\nclass GcmcState(NamedTuple):\n    positions: jax.Array\n    n_mols: int\n    energy: float\n\n\ndef make_initial_state(key, n_init, L, eps, sigma):\n    pos = jr.uniform(key, (MAX_MOLS, 3)) * L\n    pos = jnp.where((_IDX < n_init)[:, None], pos, 0.0)\n    return GcmcState(\n        positions=pos, n_mols=n_init,\n        energy=U_LJ_masked(pos, n_init, L, eps, sigma)\n    )\n\n\ndef try_insert(key, state, L, beta, mu, eps, sigma):\n    pos_key, acc_key = jr.split(key)\n    new_pos = jr.uniform(pos_key, (3,)) * L\n    trial_pos = state.positions.at[state.n_mols].set(new_pos)\n    U_new = U_LJ_masked(trial_pos, state.n_mols + 1, L, eps, sigma)\n    delta_U = U_new - state.energy\n    z = jnp.exp(beta * mu); V = L ** 3\n    acc = z * V / (state.n_mols + 1) * jnp.exp(-beta * delta_U)\n    u = jr.uniform(acc_key)\n    accept = u < jnp.minimum(1.0, acc)\n    return GcmcState(\n        positions=jnp.where(accept, trial_pos, state.positions),\n        n_mols=jnp.where(accept, state.n_mols + 1, state.n_mols),\n        energy=jnp.where(accept, U_new, state.energy),\n    )\n\n\ndef try_delete(key, state, L, beta, mu, eps, sigma):\n    idx_key, acc_key = jr.split(key)\n    del_idx = jr.randint(idx_key, (), 0, jnp.maximum(state.n_mols, 1))\n    last_pos = state.positions[state.n_mols - 1]\n    trial_pos = state.positions.at[del_idx].set(last_pos)\n    U_new = U_LJ_masked(trial_pos, state.n_mols - 1, L, eps, sigma)\n    delta_U = U_new - state.energy\n    z = jnp.exp(beta * mu); V = L ** 3\n    acc = state.n_mols / (z * V) * jnp.exp(-beta * delta_U)\n    u = jr.uniform(acc_key)\n    accept = (u < jnp.minimum(1.0, acc)) & (state.n_mols > 0)\n    return GcmcState(\n        positions=jnp.where(accept, trial_pos, state.positions),\n        n_mols=jnp.where(accept, state.n_mols - 1, state.n_mols),\n        energy=jnp.where(accept, U_new, state.energy),\n    )\n\n\ndef try_translate(key, state, L, beta, mu, eps, sigma, delta_max=0.5):\n    idx_key, disp_key, acc_key = jr.split(key, 3)\n    idx = jr.randint(idx_key, (), 0, jnp.maximum(state.n_mols, 1))\n    disp = jr.uniform(disp_key, (3,), minval=-delta_max, maxval=delta_max)\n    new_pos_i = (state.positions[idx] + disp) % L\n    trial_pos = state.positions.at[idx].set(new_pos_i)\n    U_new = U_LJ_masked(trial_pos, state.n_mols, L, eps, sigma)\n    delta_U = U_new - state.energy\n    acc = jnp.exp(-beta * delta_U)\n    u = jr.uniform(acc_key)\n    accept = (u < jnp.minimum(1.0, acc)) & (state.n_mols > 0)\n    return GcmcState(\n        positions=jnp.where(accept, trial_pos, state.positions),\n        n_mols=state.n_mols,\n        energy=jnp.where(accept, U_new, state.energy),\n    )\n\n\ndef gcmc_step(key, state, L, beta, mu, eps, sigma):\n    key, subkey = jr.split(key)\n    move_type = jr.randint(subkey, (), 0, 3)\n    key, subkey = jr.split(key)\n    return jax.lax.switch(\n        move_type,\n        [\n            try_insert,\n            try_delete,\n            lambda k, s, L, b, m, e, sig: try_translate(k, s, L, b, m, e, sig, 0.5),\n        ],\n        subkey, state, L, beta, mu, eps, sigma,\n    )\n\n\nclass RunningStats(NamedTuple):\n    sum_N: float\n    sum_dU: float\n    sum_NdU: float\n    n_samples: int\n\n\ndef estimator_step(key, state, stats, L, beta, mu, eps, sigma):\n    new_state = gcmc_step(key, state, L, beta, mu, eps, sigma)\n    N_t = new_state.n_mols.astype(jnp.float64)\n    dU_t = dU_depsilon_masked(new_state.positions, new_state.n_mols, L, eps, sigma)\n    new_stats = RunningStats(\n        sum_N=stats.sum_N + N_t,\n        sum_dU=stats.sum_dU + dU_t,\n        sum_NdU=stats.sum_NdU + N_t * dU_t,\n        n_samples=stats.n_samples + 1,\n    )\n    return new_state, new_stats\n\n\ndef run_chain_with_estimator(initial_key, initial_state, n_steps,\n                             L, beta, mu, eps, sigma):\n    keys = jr.split(initial_key, n_steps)\n    init_stats = RunningStats(sum_N=0.0, sum_dU=0.0, sum_NdU=0.0, n_samples=0)\n\n    def body(carry, key):\n        state, stats = carry\n        new_state, new_stats = estimator_step(\n            key, state, stats, L, beta, mu, eps, sigma)\n        return (new_state, new_stats), None\n\n    (final_state, final_stats), _ = jax.lax.scan(\n        body, (initial_state, init_stats), keys)\n    return final_state, final_stats\n\n\ndef score_function_gradient(stats, beta):\n    M = stats.n_samples\n    mean_N = stats.sum_N / M\n    mean_dU = stats.sum_dU / M\n    mean_NdU = stats.sum_NdU / M\n    return -beta * (mean_NdU - mean_N * mean_dU)\n\n\ndef mean_N_chain(initial_key, initial_state, n_steps, L, beta, mu, eps, sigma):\n    \"\"\"Run a chain and return ⟨N⟩ (no gradient accumulation).\"\"\"\n    keys = jr.split(initial_key, n_steps)\n\n    def step(state, key):\n        new_state = gcmc_step(key, state, L, beta, mu, eps, sigma)\n        return new_state, new_state.n_mols.astype(jnp.float64)\n\n    _, traj = jax.lax.scan(step, initial_state, keys)\n    return jnp.mean(traj)\n\n\n# ---------------------------------------------------------------------------\n# TODO 1: fd_gradient — centered finite-difference gradient estimate\n# ---------------------------------------------------------------------------\n\ndef fd_gradient(eps0: float, delta: float, n_samples: int,\n                state0: GcmcState, key: jax.Array,\n                L: float, beta: float, mu: float, sigma: float) -> float:\n    \"\"\"Centered finite-difference estimate of d⟨N⟩/dε.\n\n    Runs TWO independent chains:\n        Chain + : GCMC at ε₀ + δ, estimates ⟨N⟩₊\n        Chain − : GCMC at ε₀ − δ, estimates ⟨N⟩₋\n\n    Returns: (⟨N⟩₊ − ⟨N⟩₋) / (2δ)\n\n    Args:\n        eps0:      central ε value (K)\n        delta:     finite-difference step (K)\n        n_samples: chain length for each perturbed simulation\n        state0:    shared initial GcmcState (same positions for both chains)\n        key:       PRNGKey; split internally for the two chains\n        L, beta, mu, sigma: fixed simulation parameters\n\n    Returns:\n        fd_grad: scalar FD gradient estimate\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 18 lines                 #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. key_plus, key_minus = jr.split(key)               #\n    #   2. mean_N_plus  = mean_N_chain(key_plus,  state0,    #\n    #                         n_samples, L, beta, mu,        #\n    #                         eps0 + delta, sigma)            #\n    #   3. mean_N_minus = mean_N_chain(key_minus, state0,    #\n    #                         n_samples, L, beta, mu,        #\n    #                         eps0 - delta, sigma)            #\n    #   4. return (mean_N_plus - mean_N_minus) / (2 * delta) #\n    #                                                         #\n    # NOTE: Use INDEPENDENT keys for + and − chains.         #\n    # Using the same key (CRN) would look like cheating here #\n    # because we want to see the natural FD noise.           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2: compare_table — print 4-row comparison table\n# ---------------------------------------------------------------------------\n\ndef compare_table(estimator_grad: float,\n                  fd_results: list,\n                  delta_values: list,\n                  eps0: float) -> None:\n    \"\"\"Print a formatted comparison table.\n\n    Args:\n        estimator_grad: score-function gradient estimate\n        fd_results:     list of FD estimates, one per delta value\n        delta_values:   list of delta values used (same order as fd_results)\n        eps0:           central ε value (for printing δ/ε₀ ratios)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 10 lines                 #\n    #                                                         #\n    # Print a table with 4 rows in this format:              #\n    #                                                         #\n    # Method              δ/ε₀      d⟨N⟩/dε                 #\n    # ────────────────────────────────────────────           #\n    # FD (centered)       0.1000    <value>                  #\n    # FD (centered)       0.0500    <value>                  #\n    # FD (centered)       0.0100    <value>                  #\n    # Score-function       —        <value>                  #\n    #                                                         #\n    # Use f-strings with {value:.4f} for the gradient values #\n    # and {ratio:.4f} for the δ/ε₀ column.                  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3: headline assertion — the 3% sanity gate\n# ---------------------------------------------------------------------------\n\ndef check_3pct_agreement(estimator_grad: float,\n                         fd_results: list,\n                         delta_values: list,\n                         eps0: float,\n                         n_samples: int) -> None:\n    \"\"\"Assert that the score-function estimator agrees with FD within 3%.\n\n    The \"best\" FD estimate is the one at the smallest δ where FD still has\n    enough chain length to be well-converged. With n_samples chains, the\n    FD noise is ~SE/δ where SE ≈ 1/√n_samples. Choose the δ where\n    truncation bias is not yet dominant but noise is manageable.\n\n    In practice: pick the FD estimate at the MIDDLE δ (δ_values[1]) as the\n    comparison point — small enough to have low truncation bias, large enough\n    to have low noise.\n\n    Args:\n        estimator_grad: score-function gradient estimate\n        fd_results:     list of FD estimates (3 values)\n        delta_values:   list of delta values (3 values)\n        eps0:           central ε (for context messages)\n        n_samples:      chain length per FD simulation\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — approximately 6 lines                  #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. Pick fd_best = fd_results[1]  (middle δ)          #\n    #   2. Compute relative error:                            #\n    #        rel_err = |estimator_grad - fd_best| /          #\n    #                    (|fd_best| + 1e-10)                  #\n    #   3. Print the relative error in percent.              #\n    #   4. If |fd_best| < 0.001 (near-zero FD, noisy         #\n    #      comparison), skip the assertion and print a        #\n    #      warning instead.                                   #\n    #   5. Otherwise assert rel_err < 0.03 and print         #\n    #      \"within 3% threshold\" if it passes.               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED: __main__ test harness — DO NOT MODIFY\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    T = 298.0\n    beta = 1.0 / T\n    EPS0 = 100.0          # K — central epsilon\n    SIGMA = 3.4           # Å\n    L = 15.0              # Å\n    MU = -350.0           # K\n    N_INIT = 3\n\n    # In verify mode: short chains, small N so it runs in <10s\n    # In real mode: long chains for good statistics\n    N_SAMPLES = 100 if VERIFY else 50_000    # per FD chain\n    N_EST = 200 if VERIFY else 100_000       # estimator chain\n\n    DELTA_FRACS = [0.1, 0.05, 0.01]         # δ as fraction of ε₀\n    delta_values = [f * EPS0 for f in DELTA_FRACS]\n\n    print(\"=== Exercise 4: Finite-Difference Validation ===\")\n    print(f\"T={T} K,  μ={MU} K,  L={L} Å,  ε₀={EPS0} K,  σ={SIGMA} Å\")\n    print(f\"N_samples per FD chain: {N_SAMPLES},  Estimator chain: {N_EST}\\n\")\n\n    key = jr.PRNGKey(99)\n    key, init_key = jr.split(key)\n    state0 = make_initial_state(init_key, N_INIT, L, EPS0, SIGMA)\n\n    # ── Score-function estimator ──────────────────────────────────────────\n    key, est_key = jr.split(key)\n    _, stats = run_chain_with_estimator(\n        est_key, state0, N_EST, L, beta, MU, EPS0, SIGMA\n    )\n    estimator_grad = float(score_function_gradient(stats, beta))\n    mean_N_est = float(stats.sum_N) / N_EST\n    print(f\"Score-function: d⟨N⟩/dε = {estimator_grad:.4f}  \"\n          f\"(from ⟨N⟩ ≈ {mean_N_est:.2f})\\n\")\n\n    # ── Finite differences at three δ values ──────────────────────────────\n    fd_results = []\n    for delta in delta_values:\n        key, fd_key = jr.split(key)\n        fd_grad = float(fd_gradient(\n            EPS0, delta, N_SAMPLES, state0, fd_key, L, beta, MU, SIGMA\n        ))\n        fd_results.append(fd_grad)\n        print(f\"FD δ={delta:.2f} K ({delta/EPS0:.0%}·ε₀): \"\n              f\"d⟨N⟩/dε = {fd_grad:.4f}\")\n\n    print()\n\n    # ── Comparison table ──────────────────────────────────────────────────\n    compare_table(estimator_grad, fd_results, delta_values, EPS0)\n\n    print()\n\n    # ── 3% sanity gate ────────────────────────────────────────────────────\n    check_3pct_agreement(estimator_grad, fd_results, delta_values, EPS0, N_SAMPLES)\n\n    print(\"\\npaper's 3% sanity gate passed\")\n"}]}, "module_02_working_capacity_δn_common_random_numbers_and_raob": {"content": "# Module 2: Working Capacity ΔN, Common Random Numbers, and Rao-Blackwell\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Physical Problem: What Is Working Capacity?](#the-physical-problem-what-is-working-capacity)\n- [The ΔN Gradient: Differencing Two Covariances](#the-δn-gradient-differencing-two-covariances)\n- [Why the Uncoupled Gradient Is Noisy: A Variance Autopsy](#why-the-uncoupled-gradient-is-noisy-a-variance-autopsy)\n- [Common Random Numbers: Coupling the Two Chains](#common-random-numbers-coupling-the-two-chains)\n- [Why CRN Works: The Key Structural Observation](#why-crn-works-the-key-structural-observation)\n- [Bitwise Reproducibility and the Stateless Propagator](#bitwise-reproducibility-and-the-stateless-propagator)\n- [Rao-Blackwellization: Centering the Estimator](#rao-blackwellization-centering-the-estimator)\n- [The 2×2 Ablation: Multiplicative Composition](#the-2×2-ablation-multiplicative-composition)\n- [Falsification Gates: When to Refuse a Gradient](#falsification-gates-when-to-refuse-a-gradient)\n- [From ΔN to the Optimizer](#from-δn-to-the-optimizer)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: Where We Stand](#synthesis-where-we-stand)\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Derive the two-state gradient $\\partial \\Delta N / \\partial \\theta = -\\beta \\left[ \\text{Cov}_H(N, \\partial_\\theta U) - \\text{Cov}_L(N, \\partial_\\theta U) \\right]$ from first principles as a difference of two score-function estimators.\n2. Diagnose why running the two chemical-potential chains independently inflates gradient variance and quantify that inflation analytically.\n3. Implement Common Random Numbers (CRN) coupling in a JAX stateless-propagator setting and explain exactly which structural property of $\\partial_\\theta U$ makes the trick work.\n4. Apply Rao-Blackwell centering and verify that it composes *multiplicatively* with CRN.\n5. Implement the ESS and Binder cumulant falsification gates and understand when the estimator should refuse to emit a gradient rather than return a noisy but wrong number.\n\n---\n\n## The Physical Problem: What Is Working Capacity?\n\nOur running example throughout this module is **CO₂ capture in a metal-organic framework (MOF)** — a nanoporous crystalline solid whose pores adsorb gas molecules from a flow stream. Think of the MOF as a molecular sponge: at high pressure $P_H$ (flue gas conditions, ~$15\\%$ CO₂ at 1 bar) it soaks up CO₂; at low pressure $P_L$ (regeneration conditions, ~$400$ ppm, 0.4 mbar) it releases it. The amount it releases per swing is the **working capacity**:\n\n$$\\Delta N = \\langle N \\rangle_{\\beta\\mu_H} - \\langle N \\rangle_{\\beta\\mu_L}$$\n\nwhere $\\langle N \\rangle_{\\beta\\mu}$ is the equilibrium mean number of adsorbed CO₂ molecules in the $\\mu VT$ ensemble at chemical potential $\\mu$. The chemical potential $\\mu$ relates to pressure via the ideal-gas expression[^1] $\\mu = k_B T \\ln(P / P^\\circ)$, or equivalently through fugacity $z = \\beta P$ for an ideal gas.\n\n| Symbol | Meaning |\n|--------|---------|\n| $N$ | Number of adsorbed gas molecules (integer, fluctuates in $\\mu VT$) |\n| $\\mu_H$ | Chemical potential at high pressure (adsorption step) |\n| $\\mu_L$ | Chemical potential at low pressure (regeneration step) |\n| $\\theta$ | Force-field parameters (e.g., LJ well depths $\\varepsilon$, radii $\\sigma$, partial charges $q$) |\n| $U(\\mathbf{q}^N; \\theta)$ | Total potential energy for $N$ molecules at positions $\\mathbf{q}^N$ |\n| $\\beta$ | Inverse temperature $1/(k_B T)$ |\n\nTo design a better MOF — one with large $\\Delta N$ over a realistic swing — we need $\\partial \\Delta N / \\partial \\theta$. With that gradient we can:\n\n- Optimize force-field parameters to fit experimental isotherms\n- Steer a generative MOF model (like MOFDiff) toward high-capacity materials using classifier-free guidance\n- Perform sensitivity analysis to find which atomic parameters matter most\n\nIn Module 1 we derived that for a single chemical potential:\n\n$$\\frac{\\partial \\langle N \\rangle_{\\beta\\mu}}{\\partial \\theta} = -\\beta \\, \\text{Cov}_{\\mu}(N, \\partial_\\theta U)$$\n\nThis module extends that to **two states simultaneously**, then asks: can we reduce the variance enough to be useful in practice?\n\n---\n\n## The ΔN Gradient: Differencing Two Covariances\n\n### Derivation\n\nThe working capacity $\\Delta N(\\theta)$ is a *function of parameters* evaluated at two chemical potentials. Its gradient follows immediately from linearity of differentiation:\n\n$$\\frac{\\partial \\Delta N}{\\partial \\theta} = \\frac{\\partial}{\\partial \\theta}\\langle N \\rangle_{\\beta\\mu_H} - \\frac{\\partial}{\\partial \\theta}\\langle N \\rangle_{\\beta\\mu_L}$$\n\nSubstituting the score-function identity from Module 0 into each term:\n\n$$\\begin{aligned}\n\\frac{\\partial \\Delta N}{\\partial \\theta} &= -\\beta \\, \\text{Cov}_H(N, \\partial_\\theta U) - \\left[ -\\beta \\, \\text{Cov}_L(N, \\partial_\\theta U) \\right] \\\\\n&= -\\beta \\left[ \\text{Cov}_H(N, \\partial_\\theta U) - \\text{Cov}_L(N, \\partial_\\theta U) \\right]\n\\end{aligned}$$\n\nThis is the master equation for this module[^2]. Let's unpack every piece.\n\nThe **covariance** at chemical potential $\\mu$ is:\n\n$$\\text{Cov}_\\mu(N, \\partial_\\theta U) = \\langle N \\cdot \\partial_\\theta U \\rangle_\\mu - \\langle N \\rangle_\\mu \\langle \\partial_\\theta U \\rangle_\\mu$$\n\nNote that $\\langle \\partial_\\theta U \\rangle_\\mu$ is also computable from the same GCMC chain — it is just the mean of $\\partial_\\theta U$ over the equilibrium trajectory.\n\n### What does each covariance mean physically?\n\n$\\text{Cov}_H(N, \\partial_\\theta U)$ measures: *when we're at high pressure and the MOF is crowded with CO₂, do configurations with more molecules also tend to have steeper parameter-dependence?* If strengthening $\\varepsilon_{\\text{CO}_2}$ (deeper LJ well) makes energy more negative whenever many molecules are present (correlated), then $\\text{Cov}_H > 0$, meaning $\\partial \\langle N \\rangle_H / \\partial \\varepsilon < 0$. Physical intuition: strong binding → large $\\langle N \\rangle$, but we're taking the *derivative* so the sign reflects second-order geometry.\n\n$\\text{Cov}_L(N, \\partial_\\theta U)$ does the same at regeneration conditions. At very low loading, most configurations have $N=0$ or $N=1$, so this covariance is small in magnitude.\n\nThe *difference* $\\text{Cov}_H - \\text{Cov}_L$ thus captures the *swing effect*: how much does changing $\\theta$ preferentially shift uptake at high pressure versus low pressure.\n\n**Check your understanding:** If a MOF had a perfectly flat adsorption isotherm (constant $\\langle N \\rangle$ regardless of pressure), what would $\\partial \\Delta N / \\partial \\theta$ evaluate to? What does this say about which materials the gradient gives useful signal for?\n\n### Monte Carlo estimator\n\nIn practice both covariances are estimated from GCMC chains. For a chain of $T$ samples at chemical potential $\\mu$:\n\n$$\\widehat{\\text{Cov}}_\\mu(N, \\partial_\\theta U) = \\frac{1}{T}\\sum_{t=1}^T N_t \\cdot \\partial_\\theta U_t - \\left(\\frac{1}{T}\\sum_{t=1}^T N_t\\right)\\left(\\frac{1}{T}\\sum_{t=1}^T \\partial_\\theta U_t\\right)$$\n\nThe gradient estimator is:\n\n$$\\widehat{\\frac{\\partial \\Delta N}{\\partial \\theta}} = -\\beta \\left[ \\widehat{\\text{Cov}}_H - \\widehat{\\text{Cov}}_L \\right]$$\n\nThis is unbiased (modulo chain mixing), requires no backprop through the accept/reject logic, and costs exactly one forward pass through the potential per sample to get $\\partial_\\theta U$.\n\n```python\ndef delta_n_gradient(traj_H, traj_L, theta, beta):\n    \"\"\"\n    traj_H: list of (N_t, q_t) samples from the high-mu chain\n    traj_L: list of (N_t, q_t) samples from the low-mu chain\n    theta:  parameter vector\n    beta:   inverse temperature\n    Returns: gradient of ΔN w.r.t. theta\n    \"\"\"\n    def chain_covariance(traj):\n        N_vals = jnp.array([s.N for s in traj])\n        dU_vals = jnp.array([jax.grad(U, argnums=1)(s.q, theta) for s in traj])\n        return jnp.mean(N_vals[:, None] * dU_vals, axis=0) - \\\n               jnp.mean(N_vals) * jnp.mean(dU_vals, axis=0)\n\n    cov_H = chain_covariance(traj_H)\n    cov_L = chain_covariance(traj_L)\n    return -beta * (cov_H - cov_L)\n```\n\nWhich variable in the code corresponds to $\\partial_\\theta U$? That's `dU_vals` — a per-sample vector of partial derivatives, one per parameter component. Notice we're not backpropping through the GCMC loop at all; we just evaluate the gradient of $U$ at each frozen configuration.\n\n---\n\n## Why the Uncoupled Gradient Is Noisy: A Variance Autopsy\n\nBefore celebrating this formula, let's think about variance. The estimator $\\widehat{\\text{Cov}}_H - \\widehat{\\text{Cov}}_L$ is a *difference of two noisy numbers*. If the two covariance estimators have variances $\\sigma_H^2$ and $\\sigma_L^2$ and are **independent**, then:\n\n$$\\text{Var}\\left[\\widehat{\\text{Cov}}_H - \\widehat{\\text{Cov}}_L\\right] = \\sigma_H^2 + \\sigma_L^2$$\n\nThis is the worst case: the variance of a difference of two independent random variables is the *sum* of their variances. It is *always at least as large* as either variance alone.\n\nFor concrete intuition, suppose each covariance estimator has standard deviation $\\sigma = 0.1$ (in some units). Then the gradient estimator for $\\Delta N$ has standard deviation $\\sqrt{2} \\cdot 0.1 \\approx 0.14$ — 41% larger than either chain alone. The moral: **differencing amplifies noise unless the noise in the two terms is correlated**.\n\n**Check your understanding:** If $\\text{Cor}(\\widehat{\\text{Cov}}_H, \\widehat{\\text{Cov}}_L) = \\rho$, what is $\\text{Var}[\\widehat{\\text{Cov}}_H - \\widehat{\\text{Cov}}_L]$ in terms of $\\sigma^2$ and $\\rho$? Recall $\\text{Var}[X - Y] = \\text{Var}[X] + \\text{Var}[Y] - 2\\text{Cov}(X,Y)$. As $\\rho \\to 1$, what happens to the variance?\n\nThe key insight is: if we could somehow make $\\rho \\approx 1$, the variance would collapse to near zero. This is exactly the promise of Common Random Numbers.\n\n**Figure 1: Why differencing two independent chains amplifies gradient variance**\n\n```\nIndependent chains (variance ADDS):\n\n  Chain H: μ_H  →  N_1=4, N_2=3, N_3=5, N_4=4 ...\n              ↓\n            Ĉov_H = 0.82 ± 0.10   ← noisy from config randomness\n              \n  Chain L: μ_L  →  N_1=1, N_2=0, N_3=2, N_4=1 ...\n              ↓\n            Ĉov_L = 0.24 ± 0.09   ← noisy, DIFFERENT randomness\n              \n  Gradient = Ĉov_H - Ĉov_L = 0.58 ± 0.13   (σ = √(0.10²+0.09²))\n                                                ▲\n                               41% wider than either chain alone\n\n──────────────────────────────────────────────────────────────────\n\nCRN-coupled chains (variance CANCELS):\n\n  Same key stream ─────────────────────────────────┐\n                                                   ▼\n  Chain H: μ_H  →  N_1=4, N_2=3, N_3=5, N_4=4 ...\n              ↓         same proposal noise ↗\n            Ĉov_H = 0.82 ± 0.10   ← same configs (up to acceptance)\n              \n  Chain L: μ_L  →  N_1=1, N_2=0, N_3=2, N_4=1 ...\n              ↓\n            Ĉov_L = 0.24 ± 0.09   ← same NOISE, different acceptance\n\n  Gradient = Ĉov_H - Ĉov_L = 0.58 ± 0.03   (correlated noise cancels!)\n                                                ▲\n                               ≈ 3-10× smaller — the CRN payoff\n```\n\n---\n\n## Common Random Numbers: Coupling the Two Chains\n\nCommon Random Numbers (CRN) is one of the oldest variance-reduction techniques in simulation[^3]. The idea: when estimating a *difference* of two quantities, use the same random draws for both. The noise in each estimate is then perfectly correlated, and the variance of the difference collapses.\n\nIn our setting, \"the same random draws\" means: **run both the $\\mu_H$ chain and the $\\mu_L$ chain using the identical sequence of random keys**.\n\nIn JAX, every random operation takes an explicit key. A GCMC propagator has the signature:\n\n```python\n# A stateless propagator: (key, state) -> state'\ndef gcmc_step(key, state):\n    key_move, key_accept = jax.random.split(key)\n    proposal = make_proposal(key_move, state)\n    accept    = metropolis_accept(key_accept, proposal, state)\n    return accept_or_reject(accept, proposal, state)\n```\n\nFor a single-chain run, you'd do:\n\n```python\nchain = key_chain(jax.random.key(0))   # iterator over keys\nfor _ in range(n_steps):\n    key = next(chain)\n    state_H = gcmc_step(key, state_H)   # H chain uses key\n```\n\nFor CRN coupling, you run **both chains from the same key stream**:\n\n```python\nchain = key_chain(jax.random.key(0))   # ONE chain, shared\nfor _ in range(n_steps):\n    key = next(chain)\n    state_H = gcmc_step(key, state_H)   # same key\n    state_L = gcmc_step(key, state_L)   # same key → CRN!\n```\n\nThat's the entire implementation change: three letters, one iterator, shared between two loops[^4].\n\n![kUPS stateless propagator interface: (key, state) → state'](images/kups_propagator_interface.png)\n\n*Figure: The kUPS propagator abstraction. Every operation — GCMC insertion/deletion, MD integration, thermostatting — follows this single signature. The explicit random key is what makes CRN possible: you hand identical keys to both chemical-potential chains.*\n\n---\n\n## Why CRN Works: The Key Structural Observation\n\nCRN works because of a specific property of $\\partial_\\theta U$ that the paper highlights:\n\n> **$\\partial_\\theta U(\\mathbf{q}^N; \\theta)$ depends on the configuration $\\mathbf{q}^N$ and the parameters $\\theta$, but NOT on the chemical potential $\\mu$.**\n\nLet's make this precise. The potential energy $U$ is a function of atom positions and force-field parameters. It has no knowledge of whether we're at $\\mu_H$ or $\\mu_L$. Those two quantities live only in the acceptance probabilities of the GCMC moves, not in the energy function itself.\n\nWhen we couple the two chains via the same key stream:\n\n- **Same proposal moves**: both chains get the same random insertion/deletion/rotation proposals\n- **Different acceptances**: at high pressure, more insertions are accepted (because the Boltzmann weight favors occupied states); at low pressure, fewer are accepted\n- **Same $\\partial_\\theta U$ structure**: on configurations where the two chains agree (similar occupation numbers), their $\\partial_\\theta U$ values are identical or highly correlated\n\nThe result: $\\text{Cov}(\\widehat{\\text{Cov}}_H, \\widehat{\\text{Cov}}_L) \\gg 0$, so $\\text{Var}[\\widehat{\\text{Cov}}_H - \\widehat{\\text{Cov}}_L] \\ll \\sigma_H^2 + \\sigma_L^2$.\n\n**Figure 2: The mechanism of CRN — shared proposals, different acceptances, correlated gradients**\n\n```\nStep t, key_t = (0xAF3B, ...)\n\n         PROPOSAL GENERATOR (shared key_t)\n              ↓\n    Propose: insert CO₂ at position r̃_t\n\n         ┌─────────────────┬─────────────────┐\n         │   Chain H (μ_H) │   Chain L (μ_L) │\n         │                 │                 │\nAccept   │ exp(βΔN·μ_H)    │ exp(βΔN·μ_L)    │\nprob:    │ → 0.73 (likely) │ → 0.04 (rare)   │\n         │                 │                 │\nResult:  │ N_t: 4→5        │ N_t: 1→1        │\n         │ ACCEPTED        │ REJECTED        │\n         │                 │                 │\n∂U/∂ε:  │ -1.82 kJ/mol·Å  │ -0.31 kJ/mol·Å  │\n         │ (5-molecule     │ (1-molecule     │\n         │  config)        │  config)        │\n         └─────────────────┴─────────────────┘\n\nBoth chains used SAME r̃_t → their noise is correlated.\n∂U/∂ε depends on N, which differs → signal is different.\n                                   ← this is what we WANT:\n                                     correlated noise, decorrelated signal.\n```\n\nThe expected variance reduction is 3–10× on most force-field parameter components. The paper sets a hard target: ≥2× reduction on ≥80% of parameter components. If this gate fails, \"the story collapses\" — you're paying the two-chain cost without getting the variance savings.\n\n**Check your understanding:** Consider the limiting case where $\\mu_H$ and $\\mu_L$ are very close together (small pressure swing). Would CRN give you more variance reduction or less? What about the opposite limit, where $P_H \\gg P_L$ and the loadings are completely different?\n\n---\n\n## Bitwise Reproducibility and the Stateless Propagator\n\nThe CRN story rests on a deeper property of kUPS: **bitwise reproducibility via stateless propagators**[^5].\n\nA traditional simulation engine has hidden state — the random number generator's internal state, cached energies, neighbor list versions. Coupling two such engines with the \"same randomness\" is difficult and fragile; the engines' internal states diverge as soon as any operation takes a different branch.\n\nkUPS's design is radically different. Every propagator has the pure signature:\n\n$$\\text{propagator}: (\\text{key}, \\text{state}) \\to \\text{state}'$$\n\nThere is no hidden state. The randomness lives entirely in the explicit `key` argument. Given the same key, the same propagator applied to the same state produces the *same* output, bitwise, under JAX's JIT compilation. This is not a coincidence — it's the design gate.\n\n![kUPS propagator composition: NVE, NVT, NPT all built from the same reusable blocks](images/kups_propagator_composition.png)\n\n*Figure: kUPS composes propagators freely because they all share the same signature. The same Thermostat and Potential blocks appear in NVT and NPT; only the wrapping changes. This composability is what lets us couple two μVT chains with a single shared key stream — the interface guarantees no hidden state can break the coupling.*\n\nCRN is thus a *direct consequence* of the stateless propagator design: if you hand the same key to two GCMC propagators initialized at different states (one with $\\mu_H$, one with $\\mu_L$), they will process the same proposals. The coupling is guaranteed, not hoped for.\n\nUnder `jax.jit`, this extends to full compilation: the coupled two-chain step is a single XLA computation that processes both chains in lockstep, with shared random draws computed once and broadcast to both branches. No synchronization needed. No fragile interleaving. Just one key, two states, two new states.\n\n```python\n@jax.jit\ndef coupled_step(key, state_H, state_L):\n    \"\"\"CRN coupling: both chains consume the SAME key.\"\"\"\n    state_H_new = gcmc_step(key, state_H)\n    state_L_new = gcmc_step(key, state_L)\n    return state_H_new, state_L_new\n```\n\nThe fact that this compiles correctly — that JAX doesn't \"run the key twice\" — is because `jax.random.split` is deterministic and side-effect-free. Both `gcmc_step` calls see the same `key` and produce independent (but bitwise identical in structure) split sequences from it.\n\n---\n\n## Rao-Blackwellization: Centering the Estimator\n\nCRN reduces variance coming from **proposal noise** (shared across chains). But there's a second source of variance we haven't addressed: the **fluctuations of $N$ around its mean** within each chain.\n\nRecall the covariance estimator:\n\n$$\\widehat{\\text{Cov}}_\\mu(N, \\partial_\\theta U) = \\langle N \\cdot \\partial_\\theta U \\rangle_\\mu - \\langle N \\rangle_\\mu \\langle \\partial_\\theta U \\rangle_\\mu$$\n\nWe can rewrite this as:\n\n$$\\widehat{\\text{Cov}}_\\mu(N, \\partial_\\theta U) = \\langle (N - \\langle N \\rangle_\\mu) \\cdot \\partial_\\theta U \\rangle_\\mu$$\n\nThe Rao-Blackwell trick is to **subtract the running mean of $N$** before multiplying, rather than subtracting the product of means at the end. These are algebraically identical in expectation, but the *variance* of the estimator differs.\n\n**Notation table:**\n\n| Symbol | Meaning |\n|--------|---------|\n| $\\bar{N}$ | Running mean of $N$ over the chain so far |\n| $\\delta N_t$ | Centered occupation: $N_t - \\bar{N}$ |\n\nThe Rao-Blackwell estimator replaces the product $N_t \\cdot \\partial_\\theta U_t$ with $(N_t - \\bar{N}) \\cdot \\partial_\\theta U_t$:\n\n$$\\widehat{\\text{Cov}}^{\\text{RB}}_\\mu = \\frac{1}{T} \\sum_{t=1}^T (N_t - \\bar{N}) \\cdot \\partial_\\theta U_t$$\n\nWhy does this reduce variance? The term $(N_t - \\bar{N})$ has smaller magnitude than $N_t$ itself (it's centered at zero), so the product with $\\partial_\\theta U_t$ has smaller variance. Formally, $\\bar{N}$ acts as a **control variate**: it's correlated with $N_t$ (both are occupation numbers from the same chain) and has known mean (zero after centering). Subtracting it removes the \"DC component\" of $N$ from the estimator.\n\n```python\ndef rao_blackwell_covariance(N_vals, dU_vals):\n    \"\"\"\n    N_vals:  shape (T,)    — occupation numbers along chain\n    dU_vals: shape (T, d)  — gradient of U per step, d params\n    Returns: covariance estimate, shape (d,)\n    \"\"\"\n    N_mean = jnp.mean(N_vals)\n    N_centered = N_vals - N_mean          # shape (T,)\n    # outer product then mean:\n    return jnp.mean(N_centered[:, None] * dU_vals, axis=0)  # shape (d,)\n```\n\nNote: we subtract $\\bar{N}$ from $N$, not from $\\partial_\\theta U$. You *could* center $\\partial_\\theta U$ as well (subtract $\\langle \\partial_\\theta U \\rangle$), but that's a separate, additional control variate. Don't conflate them — the Rao-Blackwell claim here is specifically about centering $N$.\n\n**A subtlety:** If you use the *entire trajectory mean* as $\\bar{N}$, you introduce a small bias (since $\\bar{N}$ is correlated with the last few $N_t$ values). In practice, this bias is negligible for long chains, but for short chains use block estimates or hold out a warmup phase.\n\n**Check your understanding:** Suppose we ran just 10 GCMC steps and computed $\\bar{N}$ from all 10. The 10th sample $N_{10}$ contributes to both $\\bar{N}$ and to $(N_{10} - \\bar{N}) \\cdot \\partial_\\theta U_{10}$. Is the Rao-Blackwell estimator still unbiased? What's the sign of the bias if not?\n\n---\n\n## The 2×2 Ablation: Multiplicative Composition\n\nThe paper's headline claim is **8× sample efficiency** relative to MBAR 5-point finite differences. How does that number arise? Through two variance reductions that compose multiplicatively.\n\nLet $\\sigma^2_{\\text{base}}$ be the variance of the uncoupled, uncentered gradient estimator. Then:\n\n$$\\underbrace{\\sigma^2_{\\text{base}}}_{\\text{baseline}} \\xrightarrow{\\text{CRN}} \\frac{\\sigma^2_{\\text{base}}}{R_{\\text{CRN}}} \\xrightarrow{\\text{RB}} \\frac{\\sigma^2_{\\text{base}}}{R_{\\text{CRN}} \\cdot R_{\\text{RB}}}$$\n\nwhere $R_{\\text{CRN}} \\approx 3\\text{–}10$ and $R_{\\text{RB}} \\approx 2\\text{–}3$ are the per-component reduction factors.\n\nThe claim of multiplicativity holds when CRN and Rao-Blackwell reduce **orthogonal noise sources**:\n\n- CRN reduces variance from **proposal randomness** (the random choice of where to try inserting/deleting a molecule — shared between chains)\n- Rao-Blackwell reduces variance from **within-chain occupation fluctuations** ($N$ bouncing around its mean)\n\nThese are genuinely different: proposal randomness is a function of the key stream; occupation fluctuations are a function of the Markov chain's equilibrium distribution. They're not independent in a strict statistical sense, but their variance contributions don't interact.\n\n**Figure 3: The 2×2 ablation table — CRN and Rao-Blackwell compose multiplicatively**\n\n```\n                  No Rao-Blackwell    With Rao-Blackwell\n                 ┌─────────────────┬──────────────────────┐\n  No CRN         │  σ² = 1.00      │  σ² = 0.38           │\n  (independent)  │  (baseline)     │  reduction: 2.6×     │\n                 ├─────────────────┼──────────────────────┤\n  With CRN       │  σ² = 0.17      │  σ² = 0.065          │\n  (coupled)      │  reduction: 5.9×│  reduction: 15.4×    │\n                 └─────────────────┴──────────────────────┘\n\n                                    ↑\n             CRN×RB ≈ 5.9 × 2.6 = 15.3 ≈ 15.4 ✓  (multiplicative!)\n\n  Note: actual reduction factors vary by parameter component.\n  Target: bottom-right ≈ product of marginals, within 20%.\n  If bottom-right << product: the noise sources are correlated (bad).\n  If bottom-right >> product: you have a third orthogonal source (explore!).\n```\n\nIn code:\n\n```python\ndef ablation_2x2(traj_H_indep, traj_L_indep,\n                 traj_H_crn,   traj_L_crn, beta):\n    \"\"\"Run the four cells of the ablation table.\"\"\"\n    results = {}\n    for label, tH, tL, use_rb in [\n        (\"no-CRN, no-RB\",  traj_H_indep, traj_L_indep, False),\n        (\"no-CRN, RB\",     traj_H_indep, traj_L_indep, True),\n        (\"CRN, no-RB\",     traj_H_crn,   traj_L_crn,   False),\n        (\"CRN, RB\",        traj_H_crn,   traj_L_crn,   True),\n    ]:\n        cov_fn = rao_blackwell_covariance if use_rb else raw_covariance\n        grad = -beta * (cov_fn(tH) - cov_fn(tL))\n        results[label] = grad\n    return results\n```\n\nThe key implementation note: `traj_H_crn` and `traj_L_crn` must have been produced with the **same key stream**. If you accidentally re-split the key before passing to the second chain, you silently break CRN without any error message.\n\n---\n\n## Falsification Gates: When to Refuse a Gradient\n\nA real methods paper doesn't just claim variance reduction — it commits to **pre-stated numerical gates** that the method must pass before its output is trusted. This module introduces two gates: the **effective sample size (ESS)** gate and the **Binder cumulant** gate.\n\n### Gate 1: Effective Sample Size (ESS)\n\nFor a chain of $T$ correlated MCMC samples, the effective number of independent samples is:\n\n$$\\text{ESS} = \\frac{T}{1 + 2 \\sum_{k=1}^{\\infty} \\rho_k}$$\n\nwhere $\\rho_k$ is the autocorrelation at lag $k$. For unweighted MCMC, ESS is bounded by the integrated autocorrelation time of the chain. For importance-weighted samples (Boltzmann generator outputs), it takes the simpler form:\n\n$$\\text{ESS} = \\frac{\\left(\\sum_i w_i\\right)^2}{\\sum_i w_i^2}$$\n\nwhere $w_i = p(\\mathbf{x}_i) / q(\\mathbf{x}_i)$ are importance weights.\n\n**The gate**: refuse to emit a gradient if $\\text{ESS} / T < 0.5$. An ESS below 50% of sample count means the chain is still too correlated (or the importance weights are too skewed) to give a reliable covariance estimate.\n\n```python\ndef compute_ess(weights=None, n_samples=None):\n    \"\"\"\n    For importance-weighted samples: weights is an array of w_i.\n    For unweighted MCMC: weights=None, ESS = n_samples (no autocorr estimate).\n    \"\"\"\n    if weights is None:\n        return float(n_samples)  # naive; use autocorr for rigorous ESS\n    weights = jnp.array(weights)\n    return jnp.sum(weights)**2 / jnp.sum(weights**2)\n```\n\n### Gate 2: Binder Cumulant\n\nThe Binder cumulant[^6] is a diagnostic borrowed from critical phenomena:\n\n$$U_4 = 1 - \\frac{\\langle N^4 \\rangle}{3 \\langle N^2 \\rangle^2}$$\n\nFor a Gaussian distribution $U_4 = 0$. For a bimodal distribution (two coexisting phases, e.g., near capillary condensation) $U_4 < 0$. For a distribution narrower than Gaussian $U_4 > 0$.\n\nNear capillary condensation in a MOF pore, the occupation number $N$ becomes bimodal: the system fluctuates between an empty pore and a filled pore. The covariance estimator fails near this transition because $\\langle N \\cdot \\partial_\\theta U \\rangle$ has enormous variance from the bimodal fluctuations.\n\n**The gate**: refuse to emit a gradient if $U_4 < 0.3$ (indicating incipient bimodality). This keeps the optimizer away from the transition region where the gradient is too noisy to trust.\n\n```python\ndef compute_binder(N_traj):\n    \"\"\"Binder cumulant of the occupation number trajectory.\"\"\"\n    N = jnp.array(N_traj, dtype=float)\n    N2 = jnp.mean(N**2)\n    N4 = jnp.mean(N**4)\n    return 1.0 - N4 / (3.0 * N2**2)\n\nclass NotTrustedError(Exception):\n    pass\n\ndef estimate_gradient_with_ga
