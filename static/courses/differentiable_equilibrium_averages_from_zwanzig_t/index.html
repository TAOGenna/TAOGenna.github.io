tes(chain_H, chain_L, beta,\n                                  ess_threshold=0.5,\n                                  binder_threshold=0.3):\n    ess_H = compute_ess(n_samples=len(chain_H))\n    ess_L = compute_ess(n_samples=len(chain_L))\n    binder_H = compute_binder([s.N for s in chain_H])\n    binder_L = compute_binder([s.N for s in chain_L])\n\n    if ess_H / len(chain_H) < ess_threshold:\n        raise NotTrustedError(f\"ESS too low on H chain: {ess_H:.1f} < {ess_threshold*len(chain_H):.1f}\")\n    if binder_H < binder_threshold:\n        raise NotTrustedError(\n            f\"Binder cumulant = {binder_H:.2f} < {binder_threshold} \"\n            f\"(near critical); gradient refused.\"\n        )\n    # ... similar for L chain ...\n    return delta_n_gradient(chain_H, chain_L, beta)\n```\n\nWhy does the Binder cumulant matter? Consider Mg-MOF-74 near its step pressure: the isotherm shows a sharp step where $\\langle N \\rangle$ jumps from near-0 to near-30 as pressure increases through a narrow window. Any gradient taken in this window is measuring a highly nonlinear regime where the covariance approximation breaks down. The Binder cumulant catches this before you corrupt your optimization trajectory.\n\n**Check your understanding:** The MBAR baseline (gold standard) also doesn't work near phase transitions — it requires multiple overlapping histograms, and those overlap collapses at a first-order transition. So neither method works near condensation. Why is it important to *refuse explicitly* rather than *silently return a wrong number*?\n\n---\n\n## From ΔN to the Optimizer\n\nLet's now see the full picture of how the $\\Delta N$ gradient flows into an optimization loop. Given a parameter vector $\\theta$ (force-field coefficients for CO₂-MOF interactions), the pipeline is:\n\n**Figure 4: Full optimization pipeline from GCMC chains to parameter update**\n\n```\nθ_t (current parameters)\n   │\n   ├──────────────────────────────────────┐\n   │   Initialize chain at μ_H            │   Initialize chain at μ_L\n   │                                      │\n   │   shared key stream ─────────────────┤\n   │                                      │\n   ↓                                      ↓\nGCMC propagator (stateless)          GCMC propagator (stateless)\n(key_t, state_H) → state_H'         (key_t, state_L) → state_L'\n   │                                      │\n   ↓ (repeat T steps, collect traj)       ↓\n{(N_t, q_t)}_H                       {(N_t, q_t)}_L\n   │                                      │\n   ↓ compute ∂U/∂θ at each config        ↓\n{dU_t}_H  [jax.grad(U)(q_t, θ)]     {dU_t}_L  [jax.grad(U)(q_t, θ)]\n   │                                      │\n   ↓                                      ↓\nCov_H = RB_covariance(N, dU)_H      Cov_L = RB_covariance(N, dU)_L\n   │                                      │\n   └──────────────── DIFFERENCE ──────────┘\n                         │\n                         ↓\n            ∂ΔN/∂θ = −β(Cov_H − Cov_L)\n                         │\n                    [ESS gate + Binder gate]\n                         │\n                         ↓\n            θ_{t+1} = θ_t − α · ∂ΔN/∂θ   (gradient ASCENT\n                                            to maximize ΔN)\n```\n\nA few notes on the optimizer step:\n- We want to *maximize* $\\Delta N$ (more working capacity is better), so we take a gradient *ascent* step (or equivalently minimize $-\\Delta N$).\n- The step size $\\alpha$ should be bounded based on the ESS: if ESS is close to the 50% threshold, reduce $\\alpha$.\n- The gradient is a vector in parameter space, one component per $(\\varepsilon_i, \\sigma_i, q_i)$ parameter. For CO₂-MOF interactions, typical parameter vectors have $\\sim10$ components[^7].\n\n---\n\n## Analytical Questions\n\n### Question 1 — The Correlated Difference Formula\n\nSuppose the H and L covariance estimators have equal variance $\\sigma^2$ and correlation $\\rho$ (which CRN makes large). Write the variance of the gradient estimator $\\widehat{\\partial \\Delta N / \\partial \\theta}$ as a function of $\\beta^2$, $\\sigma^2$, and $\\rho$. Show that in the limit $\\rho \\to 1$, this variance goes to zero regardless of $\\sigma^2$. Now explain in physical terms: why would $\\rho = 1$ correspond to zero gradient variance, even though each chain individually has $\\sigma > 0$?\n\n*(Hint: if $\\rho = 1$, the two covariance estimates are perfectly proportional. What does this say about the fluctuations in the difference?)*\n\n### Question 2 — The Mu-Invariance Condition\n\nThe CRN argument rests on the fact that $\\partial_\\theta U$ is independent of $\\mu$. Consider a modified system where the \"potential energy\" includes a chemical-potential-dependent term, e.g., $U_{\\text{eff}}(\\mathbf{q}^N; \\theta, \\mu) = U(\\mathbf{q}^N; \\theta) - \\mu N$. If we used $\\partial_\\theta U_{\\text{eff}}$ instead of $\\partial_\\theta U$ in the covariance estimator:\n\n1. What is $\\partial_\\theta U_{\\text{eff}}$?\n2. Is it still $\\mu$-independent?\n3. Would CRN still provide variance reduction? Explain.\n\n### Question 3 — Binder Cumulant Near Condensation\n\nA student argues: \"The Binder cumulant gate is too conservative. Even near capillary condensation, the *mean* $\\langle N \\rangle$ is well-defined, so why can't we trust a gradient computed from it?\"\n\nProvide a formal counterargument. Specifically: write down the covariance estimator formula, identify which term has anomalously large variance when $N$ is bimodally distributed, and explain why the *mean* $\\langle N \\rangle$ being finite doesn't save the *gradient estimate*.\n\n### Question 4 — DiffTRe Generalization\n\nDiffTRe (Thaler & Zavadlav, Nat. Commun. 2021) computes gradients of NVT ensemble averages for force-field fitting by bypassing backprop through MD. The present proposal generalizes this to two-state μVT with structural parameters.\n\nIdentify three specific technical changes required to go from DiffTRe-style single-state NVT to the two-state μVT gradient estimator in this module:\n1. What is different about the ensemble (NVT vs μVT)?\n2. What is different about the observable ($\\langle \\mathcal{O} \\rangle$ vs $\\langle N \\rangle_H - \\langle N \\rangle_L$)?\n3. What is different about the gradient structure ($\\partial_\\theta \\langle \\mathcal{O} \\rangle$ vs $\\partial_\\theta \\Delta N$)?\n\nFor each: explain whether the DiffTRe approach handles it directly or requires a new technique.\n\n---\n\n## Synthesis: Where We Stand\n\nLet's step back and see the full arc of what we've built across the first three modules.\n\n**Module 0** established the score-function identity: the gradient of any $\\mu VT$ ensemble average is a covariance, computed entirely from equilibrium samples and analytic potential derivatives. No backprop through accept/reject.\n\n**Module 1** implemented a minimal GCMC sampler in JAX's stateless-propagator framework, wired the gradient estimator on top, and validated it against finite differences and MBAR.\n\n**This module** extends to the two-state objective $\\Delta N$ — the actual figure of merit for CO₂ capture — and reduces gradient variance by 3–10× through CRN and an additional 2–3× through Rao-Blackwell, for a combined ~8× improvement over MBAR 5-point finite differences. It also establishes the falsification gates that make this improvement trustworthy.\n\nThe key insight that enabled everything: **$\\partial_\\theta U$ depends on configuration and parameters, but not on chemical potential**. This single fact is what allows CRN to work — it means the \"gradient-relevant information\" is shared between the two chains, even though the chains explore different occupation-number distributions.\n\nLooking ahead: **Module 3** will tackle the fractional-coordinate reparameterization problem. So far we've treated the MOF lattice as fixed — we can differentiate with respect to force-field parameters $\\varepsilon$, $\\sigma$, $q$, but not with respect to the lattice constant $a$. For the full MOF optimization, we need $\\partial \\Delta N / \\partial a$ too. This requires a nontrivial change: the support of the configuration space changes as $a$ varies (a bigger box has different positions), which breaks the naive application of the score-function identity. The fix — sampling in fractional coordinates $\\mathbf{s} \\in [0,1)^3$ with positions $\\mathbf{q} = \\mathbf{h}(a) \\cdot \\mathbf{s}$ — will turn out to be a direct analog of the reparameterization trick in variational inference. The physics is different but the math is identical.\n\n**Module 4** will then package the entire pipeline as the `ObservableWithGradient` primitive: a composable propagator that decorates any existing Propagator/Potential/Table chain and emits gradient-tagged ensemble averages. The result works equally well for classical GCMC, learned-proposal MCMC (where the proposal is a neural network), and importance-weighted Boltzmann-generator samples — because the score-function identity requires only proper equilibrium samples and never touches the sampler internals.\n\nThe exercises for this module build from the uncoupled baseline (Exercise 1, establishing the noise floor) through CRN coupling (Exercise 2, the 3–10× reduction), Rao-Blackwell composition (Exercise 3, the multiplicative story), and finally the trust-region gates (Exercise 4, the falsification infrastructure). By the end, you'll have a complete, production-quality gradient estimator for the working capacity of any MOF parameterizable via a classical force field.\n\n---\n\n[^1]: The exact chemical potential expression for real gases uses fugacity coefficients from an equation of state (Peng-Robinson, etc.), which matter at pressures above ~10 bar. For CO₂ at DAC conditions (0.4 mbar) the ideal gas approximation is excellent; for flue gas conditions (0.15 bar CO₂ partial pressure) it's still within 1%.\n\n[^2]: Equation [1] from the source material, verbatim: $\\partial \\Delta N / \\partial \\theta = -\\beta \\cdot [\\text{Cov}_H(N, \\partial_\\theta U) - \\text{Cov}_L(N, \\partial_\\theta U)]$.\n\n[^3]: CRN dates to at least the 1950s in operations research (comparing two queuing policies with the same customer arrival stream) and was formalized in the simulation variance-reduction literature by Hammersley and Handscomb. It's also called \"correlated sampling\" in the quantum Monte Carlo community, where it's used to compute energy differences between similar Hamiltonians.\n\n[^4]: The subtle danger: if you use `jax.random.split(key, 2)` and pass one half to each chain, you get *different* keys (that's the whole point of split), and you've accidentally broken CRN without any error. CRN requires passing the *same* unsplit key to both propagators. This is the most common mistake in implementing CRN in JAX.\n\n[^5]: Source: kUPS blog, CuspAI (2026): \"Simulations are bitwise reproducible, because replaying the same sequence of keys from a given state always yields identical trajectories.\"\n\n[^6]: The Binder cumulant was introduced by Kurt Binder in 1981 as a finite-size scaling observable for locating phase transitions in Ising-model simulations. Here we use it not to locate the transition but to *detect* when we're dangerously close to one and the gradient estimator should not be trusted.\n\n[^7]: A typical CO₂ force field has at most 5 components per molecule: $\\varepsilon_C$, $\\sigma_C$, $\\varepsilon_O$, $\\sigma_O$, and $q_C$ (with $q_O = -q_C / 2$ by electroneutrality). Interactions with the MOF framework add a few more cross-parameters. Total: $\\sim 10$ components, one gradient per optimizer step.\n", "exercises": [{"filename": "ex01_twostate_δn_objective__uncoupled_baseline.py", "content": "\"\"\"\nExercise 1: Two-state ΔN objective — uncoupled baseline\n========================================================\nModule 2: Working Capacity ΔN, Common Random Numbers, and Rao-Blackwell\n\nGoal\n----\nImplement the uncoupled (independent) two-chain gradient estimator for the\nworking-capacity gradient:\n\n    ∂ΔN/∂θ = −β · [Cov_H(N, ∂_θU) − Cov_L(N, ∂_θU)]\n\nRun 20 independent replicates, estimate the variance of that gradient, and\nsave it to a JSON file.  Exercise 2 will load that number to measure CRN\nvariance reduction.\n\nKey insight\n-----------\nThe difference of two noisy numbers is *noisier* than either one—unless the\nnoise in the two terms is correlated.  Var[X−Y] = Var[X]+Var[Y]−2Cov(X,Y).\nRunning independent chains gives Cov = 0, so the baseline variance is the\nworst-case scenario.\n\nDISTILL_VERIFY shortcut\n-----------------------\nSet the environment variable DISTILL_VERIFY=1 to run in fast-check mode:\n  * tiny chain length (2 steps instead of the student default 200)\n  * 3 replicates instead of 20\n  * Expected output still contains the required sentinel string.\n\"\"\"\n\nimport os\nimport json\nimport math\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# Synthetic GCMC stand-in (no GPU needed)\n# ---------------------------------------------------------------------------\n# We model a MOF pore as a 1-D lattice with M sites.  Each site can hold 0\n# or 1 molecule.  The energy of a configuration with N molecules is:\n#\n#   U(N, θ) = N · ε   (ε < 0 means attractive binding)\n#\n# For this simple model ∂U/∂ε = N, so the covariance estimator becomes:\n#   Cov(N, ∂U/∂ε) = Var(N)\n# which is analytically tractable (good for sanity checks).\n#\n# We keep a 10-component θ vector so that \"per-component\" tables look\n# realistic; components 1..9 just scale ε by a fixed prefactor.\n\nRNG = np.random.default_rng   # factory — pass a seed each time\n\n# DAC operating conditions (CO₂ capture, approximate)\nMU_H = -3.0   # kJ/mol — high pressure (adsorption)\nMU_L = -7.0   # kJ/mol — low pressure  (regeneration)\nBETA = 1.0    # 1/(k_B T), in units where k_B T = 1  kJ/mol\nN_SITES = 10  # number of adsorption sites in the toy MOF pore\nN_PARAMS = 10 # dimension of θ\n\n# Prefactors that relate each θ_i to ε so ∂U/∂θ_i = N · prefactor_i\nPREFACTORS = np.array([1.0, 0.9, 0.8, 1.1, 0.7, 1.2, 0.95, 1.05, 0.85, 1.15])\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_STEPS_DEFAULT = 2 if VERIFY else 200      # MCMC steps per chain\nN_REPLICATES    = 3 if VERIFY else 20       # independent replicates\n\n\n# ---------------------------------------------------------------------------\n# Provided helpers\n# ---------------------------------------------------------------------------\n\ndef gcmc_chain(rng: np.random.Generator,\n               mu: float,\n               eps: float,\n               n_steps: int,\n               n_sites: int = N_SITES) -> tuple[np.ndarray, np.ndarray]:\n    \"\"\"\n    Simulate a toy grand-canonical chain.\n\n    Parameters\n    ----------\n    rng     : numpy Generator  (stateless-ish: we draw from it sequentially)\n    mu      : chemical potential  (kJ/mol)\n    eps     : LJ well-depth parameter  ε (kJ/mol, negative = attractive)\n    n_steps : number of MCMC steps\n    n_sites : number of adsorption sites\n\n    Returns\n    -------\n    N_traj   : shape (n_steps,)  — occupation numbers along the chain\n    dU_traj  : shape (n_steps, N_PARAMS)  — ∂U/∂θ at each step\n    \"\"\"\n    # Start with half-filled pore\n    N = n_sites // 2\n    N_traj  = np.empty(n_steps, dtype=float)\n    dU_traj = np.empty((n_steps, N_PARAMS), dtype=float)\n\n    for t in range(n_steps):\n        # Propose insertion or deletion with equal probability\n        if rng.random() < 0.5:          # try insertion\n            if N < n_sites:\n                delta_U = eps - mu      # energy change for adding one molecule\n                log_acc = -BETA * delta_U + math.log((n_sites - N) / (N + 1))\n                if math.log(rng.random()) < log_acc:\n                    N += 1\n        else:                           # try deletion\n            if N > 0:\n                delta_U = -(eps - mu)\n                log_acc = -BETA * delta_U + math.log(N / (n_sites - N + 1))\n                if math.log(rng.random()) < log_acc:\n                    N -= 1\n\n        N_traj[t]  = N\n        # ∂U/∂θ_i = N · prefactor_i  (analytical for this linear model)\n        dU_traj[t] = N * PREFACTORS\n\n    return N_traj, dU_traj\n\n\ndef raw_covariance(N_vals: np.ndarray, dU_vals: np.ndarray) -> np.ndarray:\n    \"\"\"\n    Estimate Cov(N, ∂U/∂θ) from a trajectory.\n\n    Parameters\n    ----------\n    N_vals  : shape (T,)\n    dU_vals : shape (T, d)\n\n    Returns\n    -------\n    cov : shape (d,) — one covariance per parameter component\n    \"\"\"\n    return np.mean(N_vals[:, None] * dU_vals, axis=0) - \\\n           np.mean(N_vals) * np.mean(dU_vals, axis=0)\n\n\ndef bootstrap_variance(samples: np.ndarray, B: int = 200) -> np.ndarray:\n    \"\"\"\n    Bootstrap estimate of Var[estimator] across replicates.\n\n    Parameters\n    ----------\n    samples : shape (R, d) — R independent estimates of a d-dim quantity\n    B       : number of bootstrap resamples\n\n    Returns\n    -------\n    var_estimate : shape (d,)\n    \"\"\"\n    rng = np.random.default_rng(42)\n    R = samples.shape[0]\n    boot_means = np.stack(\n        [samples[rng.integers(0, R, R)].mean(axis=0) for _ in range(B)]\n    )\n    return boot_means.var(axis=0)\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: run_two_chains_independent\n# ---------------------------------------------------------------------------\n\ndef run_two_chains_independent(\n    seed: int,\n    eps: float,\n    mu_H: float,\n    mu_L: float,\n    n_steps: int,\n) -> tuple[np.ndarray, np.ndarray]:\n    \"\"\"\n    Run the H and L chains with **independent** random seeds and return\n    the gradient estimate for each chain separately.\n\n    Parameters\n    ----------\n    seed    : integer seed — split into two independent seeds (seed, seed+1)\n    eps     : LJ well-depth ε (kJ/mol)\n    mu_H    : high-pressure chemical potential\n    mu_L    : low-pressure chemical potential\n    n_steps : MCMC steps per chain\n\n    Returns\n    -------\n    grad_H : shape (N_PARAMS,)  — −β · Cov_H(N, ∂U/∂θ)\n    grad_L : shape (N_PARAMS,)  — −β · Cov_L(N, ∂U/∂θ)\n\n    Hints\n    -----\n    * Use RNG(seed) for chain H and RNG(seed + 1) for chain L.\n      This gives INDEPENDENT chains (no CRN).\n    * Call gcmc_chain() for each chemical potential.\n    * Call raw_covariance() on each trajectory.\n    * The per-chain gradient contribution is −β · Cov.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # 1. Create two independent RNG instances.                #\n    # 2. Run gcmc_chain for mu_H → (N_H, dU_H).              #\n    # 3. Run gcmc_chain for mu_L → (N_L, dU_L).              #\n    # 4. Compute raw_covariance for each.                     #\n    # 5. Multiply by −β and return both.                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: working_capacity_gradient\n# ---------------------------------------------------------------------------\n\ndef working_capacity_gradient(\n    grad_H: np.ndarray,\n    grad_L: np.ndarray,\n) -> np.ndarray:\n    \"\"\"\n    Combine the per-chain gradient contributions into ∂ΔN/∂θ.\n\n    The master equation (key excerpt [1]) is:\n        ∂ΔN/∂θ = −β · [Cov_H(N, ∂_θU) − Cov_L(N, ∂_θU)]\n\n    Since grad_H = −β · Cov_H  and  grad_L = −β · Cov_L,\n    the working-capacity gradient is just the difference.\n\n    Parameters\n    ----------\n    grad_H : shape (N_PARAMS,)\n    grad_L : shape (N_PARAMS,)\n\n    Returns\n    -------\n    grad_dN : shape (N_PARAMS,)\n\n    Hints\n    -----\n    * This is literally one line — but make sure you get the sign right.\n    * Double-check against the master equation above.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 1-3 lines                              #\n    #                                                         #\n    # Hint: ∂ΔN/∂θ = grad_H − grad_L                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: replicate_variance\n# ---------------------------------------------------------------------------\n\ndef replicate_variance(\n    eps: float,\n    mu_H: float,\n    mu_L: float,\n    n_steps: int,\n    n_replicates: int,\n    base_seed: int = 0,\n) -> dict:\n    \"\"\"\n    Run `n_replicates` independent estimates of ∂ΔN/∂θ and estimate the\n    variance of that estimator via bootstrap.\n\n    Parameters\n    ----------\n    eps          : LJ well-depth ε (kJ/mol)\n    mu_H         : high-pressure chemical potential\n    mu_L         : low-pressure chemical potential\n    n_steps      : MCMC steps per chain per replicate\n    n_replicates : number of independent replicates\n    base_seed    : starting seed (replicate i uses seed base_seed + 2*i)\n\n    Returns\n    -------\n    dict with keys:\n        'grad_estimates' : np.ndarray, shape (n_replicates, N_PARAMS)\n        'var_bootstrap'  : np.ndarray, shape (N_PARAMS,)\n        'var_mean'       : float — mean variance across components\n\n    Hints\n    -----\n    * For each replicate i, use seed = base_seed + 2*i to ensure no\n      overlap between seeds across replicates (each replicate uses 2\n      seeds: one for H chain, one for L chain).\n    * Collect grad_dN for each replicate into a (n_replicates, N_PARAMS)\n      array.\n    * Call bootstrap_variance() on that array to estimate uncertainty.\n    * Compute var_mean as the mean over parameter components.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # 1. Pre-allocate grad_estimates array.                   #\n    # 2. Loop over replicates, computing working_capacity_    #\n    #    gradient for each.                                   #\n    # 3. Call bootstrap_variance on the collected estimates.  #\n    # 4. Return the three-key dict.                           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# PROVIDED — __main__ test harness (do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    import os, json\n\n    eps  = -2.5   # kJ/mol  (CO₂-MOF LJ well depth, approximate)\n    n_steps = N_STEPS_DEFAULT\n\n    print(f\"Running uncoupled baseline  (DISTILL_VERIFY={'1' if VERIFY else 'off'})\")\n    print(f\"  n_steps={n_steps}, n_replicates={N_REPLICATES}, n_params={N_PARAMS}\")\n    print()\n\n    result = replicate_variance(\n        eps=eps,\n        mu_H=MU_H,\n        mu_L=MU_L,\n        n_steps=n_steps,\n        n_replicates=N_REPLICATES,\n    )\n\n    var_indep = result[\"var_bootstrap\"]\n    var_mean  = float(result[\"var_mean\"])\n\n    # ------------------------------------------------------------------\n    # Print per-component variance table\n    # ------------------------------------------------------------------\n    print(f\"{'Component':<12} {'Var[∂ΔN/∂θ_i]':>16}  {'Std[∂ΔN/∂θ_i]':>16}\")\n    print(\"-\" * 48)\n    for i, v in enumerate(var_indep):\n        print(f\"  θ_{i:<8d}  {v:>16.6f}  {math.sqrt(max(v, 0)):>16.6f}\")\n    print(\"-\" * 48)\n    print(f\"  {'mean':<10}  {var_mean:>16.6f}  {math.sqrt(max(var_mean,0)):>16.6f}\")\n    print()\n\n    # ------------------------------------------------------------------\n    # Save to JSON for Exercise 2 to consume\n    # ------------------------------------------------------------------\n    out_path = os.path.join(os.path.dirname(__file__), \"ex01_baseline.json\")\n    payload = {\n        \"var_indep\": var_indep.tolist(),\n        \"var_mean_indep\": var_mean,\n        \"n_steps\": n_steps,\n        \"n_replicates\": N_REPLICATES,\n        \"eps\": eps,\n        \"mu_H\": MU_H,\n        \"mu_L\": MU_L,\n    }\n    with open(out_path, \"w\") as f:\n        json.dump(payload, f, indent=2)\n\n    print(f\"uncoupled baseline variance saved: V_indep = {var_mean:.6f}\")\n    print(f\"  (written to {out_path})\")\n"}]}, "module_03_structural_parameters_fractionalcoordinate_reparam": {"content": "# Module 3: Structural Parameters: Fractional-Coordinate Reparameterization and Lattice Gradients\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [Why Lattice Gradients Are Different](#why-lattice-gradients-are-different)\n- [The Running Example: CO₂ Adsorption in a Cubic Cell](#the-running-example-co-adsorption-in-a-cubic-cell)\n- [The Naive Approach: Thermodynamic Perturbation Theory](#the-naive-approach-thermodynamic-perturbation-theory)\n  - [The Reweighting Formula](#the-reweighting-formula)\n  - [Watching It Fail: Support Collapse](#watching-it-fail-support-collapse)\n  - [Why More Samples Don't Help](#why-more-samples-dont-help)\n- [The Measure-Theoretic Diagnosis](#the-measure-theoretic-diagnosis)\n  - [Variance Scales as V · (δa/a)²](#variance-scales-as-v--δaa)\n  - [The ESS Diagnostic](#the-ess-diagnostic)\n- [The Fix: Fractional-Coordinate Reparameterization](#the-fix-fractional-coordinate-reparameterization)\n  - [The Cell Matrix h(a) and Fractional Coordinates](#the-cell-matrix-ha-and-fractional-coordinates)\n  - [Why the Support Is Now θ-Invariant](#why-the-support-is-now-θ-invariant)\n  - [Modified GCMC Moves in Fractional Coordinates](#modified-gcmc-moves-in-fractional-coordinates)\n  - [The Density-of-States Jacobian in Acceptance Ratios](#the-density-of-states-jacobian-in-acceptance-ratios)\n- [The Chain Rule for ∂U/∂a](#the-chain-rule-for-ua)\n  - [Position Part: ∂U/∂q · ∂q/∂a](#position-part-uq--qa)\n  - [The Ewald Cell Derivative: The Hidden Term](#the-ewald-cell-derivative-the-hidden-term)\n  - [Ewald Summation Review](#ewald-summation-review)\n  - [Differentiating the Reciprocal Sum Through h](#differentiating-the-reciprocal-sum-through-h)\n  - [Full Analytic ∂U/∂a](#full-analytic-ua)\n- [End-to-End Gradient: Plugging into the Score-Function Estimator](#end-to-end-gradient-plugging-into-the-score-function-estimator)\n  - [The Complete Algorithm](#the-complete-algorithm)\n  - [Validation Against Finite Differences](#validation-against-finite-differences)\n  - [The 10% Sign-Agreement Gate](#the-10-sign-agreement-gate)\n- [Why This Is the Novelty Beyond DiffTRe](#why-this-is-the-novelty-beyond-difTRe)\n- [Analytical Questions](#analytical-questions)\n  - [Question 1 — What Goes Wrong Without the Ewald Cell Derivative?](#question-1--what-goes-wrong-without-the-ewald-cell-derivative)\n  - [Question 2 — Triclinic Cells and the Full h Matrix](#question-2--triclinic-cells-and-the-full-h-matrix)\n  - [Question 3 — When Does Fractional Reparameterization Fail?](#question-3--when-does-fractional-reparameterization-fail)\n  - [Question 4 — Lattice vs. Force-Field Parameters: What Changes?](#question-4--lattice-vs-force-field-parameters-what-changes)\n- [Synthesis: From Score Functions to Structural Optimization](#synthesis-from-score-functions-to-structural-optimization)\n- [Preview: Exercises](#preview-exercises)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Diagnose *why* naive thermodynamic perturbation (reweighting) fails catastrophically for lattice-scale perturbations, and quantify the failure with the $\\text{Var}(\\beta \\Delta U) \\propto V \\cdot (\\delta a/a)^2$ scaling law.\n2. Explain fractional-coordinate reparameterization at the level of measure theory: not a numerical trick, but a coordinate change that makes the sampling domain $\\theta$-independent.\n3. Derive the two-part chain rule $\\partial U/\\partial a = (\\partial U/\\partial \\mathbf{q})(\\partial \\mathbf{q}/\\partial a) + \\partial_{\\text{cell}} U_{\\text{Ewald}}$ and understand why missing the second term produces the \"sign-disagrees-with-FD\" failure mode.\n4. Implement modified GCMC moves (insertion, translation) in fractional coordinates, including the correct cell-volume Jacobian $\\det(h)$ in the fugacity acceptance criterion.\n5. Validate the complete lattice-gradient estimator against finite differences to better than 10% relative error — the paper's binary kill/keep gate.\n\n---\n\n## Why Lattice Gradients Are Different\n\nIn Modules 0–2 we built a working gradient estimator for **force-field parameters** — things like the Lennard-Jones well depth $\\varepsilon$ or the partial charge $q_C$ on a CO₂ carbon atom. The score-function identity gave us:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\, \\text{Cov}_{\\beta\\mu,\\theta}\\!\\left(N,\\, \\frac{\\partial U}{\\partial \\theta}\\right)$$\n\nand all we needed was:\n1. equilibrium samples $\\{N_k, \\mathbf{q}_k\\}$ drawn from $\\pi_{\\beta\\mu,\\theta}$, and\n2. the analytic energy derivative $\\partial U / \\partial \\theta$ evaluated at those samples.\n\nFor $\\theta = \\varepsilon$, this is straightforward: the LJ energy is a smooth function of $\\varepsilon$ and $\\partial U/\\partial \\varepsilon$ just asks \"how does each pairwise $r^{-12} - r^{-6}$ term scale when I stretch the well?\" The sampling domain — all configurations where gas molecules might sit inside the pore — is fixed regardless of $\\varepsilon$.\n\nFor $\\theta = a$ (the lattice constant), something qualitatively different happens: **the space inside the pore literally changes size.** If $a$ grows from 20 Å to 22 Å, a molecule that was 19 Å from the origin is now *inside* the expanded cell but was outside a cell of size 20 Å. The **support of the configuration distribution is a function of $\\theta$**, and this breaks the standard assumption behind thermodynamic perturbation theory.\n\nThis module is about diagnosing that failure precisely and fixing it with a coordinate reparameterization that is conceptually simple but has some important devil-in-the-details in the Ewald sum.\n\n---\n\n## The Running Example: CO₂ Adsorption in a Cubic Cell\n\nThroughout this module we will track a single concrete system: a **16 Å cubic unit cell** containing a model MOF framework with CO₂ adsorbate at $T = 298$ K. We use the TraPPE CO₂ model[^1] with partial charges $q_C = +0.70\\,e$, $q_O = -0.35\\,e$ and LJ parameters $\\varepsilon_{CC}/k_B = 28.1$ K, $\\sigma_{CC} = 2.80$ Å.\n\nThe structural parameter of interest is the cubic lattice scale $a$, so the cell matrix is simply:\n\n$$h(a) = a \\, \\mathbf{I}_3 \\qquad \\mathbf{I}_3 = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 1 & 0 \\\\ 0 & 0 & 1 \\end{pmatrix}$$\n\nThe equilibrium observable is $\\langle N \\rangle$, the mean number of adsorbed CO₂ molecules at fixed $\\beta\\mu_H$ (the high-pressure adsorption condition). We want $\\partial \\langle N \\rangle / \\partial a$: if the MOF expands slightly, does it adsorb more or fewer CO₂ molecules?\n\nThis is not a toy question. For a real MOF like **Mg-MOF-74**, the sign and magnitude of $\\partial \\langle N \\rangle / \\partial a$ directly tells the optimizer whether to suggest linkers that expand or contract the pore. Getting it wrong in sign — the \"sign-disagrees-with-FD\" failure mode — is the hard kill criterion in the paper[^2].\n\n---\n\n## The Naive Approach: Thermodynamic Perturbation Theory\n\n### The Reweighting Formula\n\nBefore introducing reparameterization, let's see how far the naive approach gets. The idea is:\n\n> Run GCMC at the *current* lattice constant $a_0$. Then estimate $\\langle N \\rangle_{a_0 + \\delta a}$ by reweighting the existing samples — no new simulation required.\n\nThis is **thermodynamic perturbation theory (TPT)**, also called free-energy perturbation. The key identity is:\n\n$$\\langle A \\rangle_{a_0 + \\delta a} = \\frac{\\langle A \\cdot e^{-\\beta \\Delta U} \\rangle_{a_0}}{\\langle e^{-\\beta \\Delta U} \\rangle_{a_0}}$$\n\nwhere $\\Delta U = U(\\mathbf{q}; a_0 + \\delta a) - U(\\mathbf{q}; a_0)$ is the energy change when we perturb the lattice *but keep molecule positions $\\mathbf{q}$ fixed.*\n\nThe gradient then follows from a finite difference:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial a} \\approx \\frac{\\langle N \\rangle_{a_0 + \\delta a} - \\langle N \\rangle_{a_0 - \\delta a}}{2 \\, \\delta a}$$\n\nSubstituting the reweighting formula:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial a} \\approx \\frac{1}{2\\,\\delta a}\\left[\\frac{\\langle N \\cdot e^{-\\beta \\Delta U^+} \\rangle_0}{\\langle e^{-\\beta \\Delta U^+} \\rangle_0} - \\frac{\\langle N \\cdot e^{-\\beta \\Delta U^-} \\rangle_0}{\\langle e^{-\\beta \\Delta U^-} \\rangle_0}\\right]$$\n\nwhere $\\Delta U^{\\pm} = U(\\mathbf{q}; a_0 \\pm \\delta a) - U(\\mathbf{q}; a_0)$.\n\nThis looks completely standard. You do it all the time for free-energy differences in NVT simulations. What goes wrong here?\n\n**Check your understanding:** What is the difference between perturbing a force-field parameter $\\varepsilon \\to \\varepsilon + \\delta\\varepsilon$ vs. perturbing a lattice constant $a \\to a + \\delta a$, in terms of how the configuration space changes?\n\n### Watching It Fail: Support Collapse\n\nLet's trace through what happens to molecule positions when $a \\to a + \\delta a$.\n\nIn a periodic simulation at lattice constant $a_0$, a molecule at Cartesian position $\\mathbf{q} = (15.8, 3.2, 7.1)$ Å is well inside the cell $[0, a_0)^3$ with $a_0 = 16$ Å. Now perturb to $a_0 + \\delta a = 14.4$ Å (a 10% contraction). The molecule is now *outside* the new simulation box. Its periodic image is at $(15.8 - 14.4, 3.2, 7.1) = (1.4, 3.2, 7.1)$ Å — a totally different pore environment.\n\nMore precisely: the **density of states** changes. At lattice constant $a$, the partition function for one molecule in the grand-canonical ensemble contains a configuration integral over the *volume* $a^3$:\n\n$$Z_{\\text{1-particle}}(a) = \\frac{z}{\\Lambda^3} \\int_{[0,a)^3} e^{-\\beta U(\\mathbf{q}; a)} d\\mathbf{q}$$\n\nwhere $z = e^{\\beta\\mu}/\\Lambda^3$ is the fugacity. The integration domain $[0,a)^3$ is **a function of $\\theta = a$**. When you apply the reweighting formula using samples from the $a_0$ ensemble but evaluate energies at $a_0 + \\delta a$, you are using samples drawn from the wrong volume. The $e^{-\\beta \\Delta U}$ weights try to correct the energy, but **they cannot correct for the fact that configurations near the boundary of the original box have no counterpart in the perturbed box.**\n\n**Figure 1: Support collapse when the lattice contracts by 10%**\n```\nLattice a₀ = 16 Å              Lattice a₀ - δa = 14.4 Å\n┌──────────────────┐            ┌────────────────┐\n│  ●               │            │                │\n│        ●         │            │       ●        │\n│  ●               │            │                │   ← molecules\n│           ●      │            │           X    │   X = outside new box!\n│       ●          │            │       ●        │\n│  ●            ●  │            │  ●             │\n└──────────────────┘            └────────────────┘\n\nSamples from a₀ ensemble      At new lattice, molecule\nhave 4 molecules near          near right edge is\nx ∈ [14.4, 16] Å              outside domain [0, 14.4)\n\n          ↓                              ↓\n  These samples are valid      These samples have ZERO\n  at a₀                        probability at (a₀ - δa)\n\nThe reweighting weight e^{-βΔU} → ∞ at the boundary\n (infinite repulsion from periodic image overlap).\n```\n\n### Why More Samples Don't Help\n\nThis is the critical insight of Exercise 1: **throwing more samples at the problem doesn't fix it.**\n\nThe effective sample size (ESS) of an importance-weighted estimator is:\n\n$$\\text{ESS} = \\frac{\\left(\\sum_k w_k\\right)^2}{\\sum_k w_k^2} \\qquad w_k = e^{-\\beta \\Delta U_k}$$\n\nThe ESS ratio $\\text{ESS}/n_{\\text{samples}}$ measures what fraction of your samples are actually contributing. When weights collapse, a few samples get enormous weight and ESS plummets.\n\nThe key observation is that $\\text{ESS}/n_{\\text{samples}}$ is **independent of $n_{\\text{samples}}$** once you are in the regime of support collapse. You can run $10 \\times$ more GCMC steps and get exactly the same ESS ratio. This is because the problem is not statistical noise — it is a systematic mismatch between the sampling distribution and the target distribution.\n\n---\n\n## The Measure-Theoretic Diagnosis\n\n### Variance Scales as V · (δa/a)²\n\nTo quantify the failure precisely, we need to estimate $\\text{Var}(\\beta \\Delta U)$ as a function of $\\delta a$.\n\nFor a gas with $N$ molecules in a box of size $a$, the energy change when $a \\to a + \\delta a$ while keeping fractional coordinates $\\mathbf{s}_i = \\mathbf{q}_i/a$ fixed[^3] involves two contributions:\n\n1. **LJ pairs**: $\\Delta U_{\\text{LJ}} \\propto N^2 \\cdot r^{-12} \\cdot (r'/r - 1) \\approx N^2 \\cdot r^{-12} \\cdot \\delta a/a$\n\n2. **Coulomb (real space)**: similar scaling.\n\nFor the naive Cartesian reweighting where molecule positions $\\mathbf{q}$ are held fixed (not $\\mathbf{s}$), the distances in the perturbed box are different from those in the original. For a uniform gas at density $\\rho = N/a^3$, the variance of $\\beta \\Delta U$ scales as:\n\n$$\\text{Var}(\\beta \\Delta U) \\propto V \\cdot \\left(\\frac{\\delta a}{a}\\right)^2$$\n\n| Symbol | Meaning |\n|--------|---------|\n| $V = a^3$ | Volume of the simulation cell |\n| $\\delta a$ | Lattice perturbation |\n| $a$ | Reference lattice constant |\n| $N$ | Number of adsorbed molecules |\n\nThis is the **key scaling law** from the source material[^4]. Let's unpack it:\n\n- The $(\\delta a/a)^2$ factor means the variance grows *quadratically* with the fractional perturbation. At $\\delta a/a = 0.01$, $\\text{Var}(\\beta\\Delta U) \\propto 10^{-4}$. At $\\delta a/a = 0.1$, it's $10^{-2}$ — 100× larger.\n- The $V$ factor is more alarming: for a real MOF unit cell with $V = (20 \\text{ Å})^3 = 8000 \\text{ Å}^3$ containing 30 molecules, this variance is enormous compared to the same calculation on a 3-molecule toy system.\n\n**The critical consequence:** because $\\text{ESS}/n \\approx 1/(1 + \\text{Var}(\\beta\\Delta U))$ (by Kish's formula for importance sampling), at moderate $V$ and $\\delta a/a \\approx 3\\%$, the ESS drops to ~2% of the sample count. For a 30-molecule system in a 20 Å box, $V = 8000$ Å³ makes this catastrophic even at $\\delta a/a = 1\\%$.\n\n**Check your understanding:** The scaling $\\propto V$ suggests that larger MOF unit cells are harder to treat with naive reweighting. Given that real GCMC supercells are often $(2a \\times 2b \\times 2c)$ to satisfy the minimum-image convention, how does the effective $V$ scale, and what does this imply for the useful range of $\\delta a/a$?\n\n### The ESS Diagnostic\n\n```python\ndef effective_sample_size(log_weights: jnp.ndarray) -> float:\n    \"\"\"\n    Compute ESS from unnormalized log-weights.\n    ESS = (sum w_k)^2 / sum(w_k^2)  = exp(logsumexp(2*lw) - 2*logsumexp(lw))\n    \"\"\"\n    log_ess = 2 * jax.scipy.special.logsumexp(log_weights) \\\n              - jax.scipy.special.logsumexp(2 * log_weights)\n    return jnp.exp(log_ess)\n\n# At delta_a/a = 0.001 → ESS/n ≈ 0.95  (fine)\n# At delta_a/a = 0.010 → ESS/n ≈ 0.40  (degraded)\n# At delta_a/a = 0.100 → ESS/n ≈ 0.02  (useless)\n```\n\nThe ESS ratio trajectory — 95% → 40% → 2% — is not fixable by sampling more. It is a signature of **support collapse**: the samples and the target live on incompatible domains.\n\n---\n\n## The Fix: Fractional-Coordinate Reparameterization\n\n### The Cell Matrix h(a) and Fractional Coordinates\n\nThe fix is conceptually simple: instead of sampling molecule positions in Cartesian coordinates $\\mathbf{q} \\in [0, a)^3$, sample them in **fractional coordinates** $\\mathbf{s} \\in [0,1)^3$ and reconstruct $\\mathbf{q}$ when needed:\n\n$$\\mathbf{q}_i = h(a) \\, \\mathbf{s}_i$$\n\nFor a cubic cell, $h(a) = a \\mathbf{I}_3$, so $\\mathbf{q}_i = a \\mathbf{s}_i$. For a triclinic cell with lattice vectors $\\mathbf{a}_1, \\mathbf{a}_2, \\mathbf{a}_3$, the cell matrix $h$ has these vectors as columns[^5]:\n\n$$h = \\begin{pmatrix} | & | & | \\\\ \\mathbf{a}_1 & \\mathbf{a}_2 & \\mathbf{a}_3 \\\\ | & | & | \\end{pmatrix}$$\n\nThe fractional coordinate $\\mathbf{s}_i \\in [0,1)^3$ is simply the position expressed as a fraction of the unit cell vectors. A molecule at $\\mathbf{s} = (0.5, 0.5, 0.5)$ is always at the center of the cell, regardless of $a$.\n\n| Symbol | Type | Meaning |\n|--------|------|---------|\n| $\\mathbf{q}_i$ | Vector, $\\mathbb{R}^3$ | Cartesian position of molecule $i$ |\n| $\\mathbf{s}_i$ | Vector, $[0,1)^3$ | Fractional position of molecule $i$ |\n| $h(a)$ | Matrix, $\\mathbb{R}^{3\\times 3}$ | Cell matrix (columns = lattice vectors) |\n| $a$ | Scalar | Lattice constant (cubic case) |\n| $\\theta$ | Scalar/vector | Any structural parameter |\n\n### Why the Support Is Now θ-Invariant\n\nWhen we change $a \\to a + \\delta a$, the fractional coordinates $\\mathbf{s}_i$ still live in $[0,1)^3$. **The sampling domain does not change.** \n\nThis is the measure-theoretic content of the reparameterization: we have changed coordinates so that the integration domain is independent of $\\theta$. The Leibniz integral rule — which allows differentiation under the integral sign — requires exactly this: the domain of integration must be $\\theta$-independent.\n\nMore formally, the grand-canonical partition function becomes:\n\n$$\\Xi(\\theta) = \\sum_{N=0}^\\infty \\frac{z^N}{N!} \\int_{[0,1)^{3N}} e^{-\\beta U(h(\\theta)\\mathbf{s}; \\theta)} \\det(h(\\theta))^N \\, d^N\\mathbf{s}$$\n\nThe $\\det(h(\\theta))^N$ factor — the Jacobian of the coordinate change from $\\mathbf{q}$ to $\\mathbf{s}$ — is now inside the integral, but crucially the integration domain $[0,1)^{3N}$ does **not** depend on $\\theta$. The Leibniz rule applies cleanly.\n\n**Figure 2: Fractional-coordinate reparameterization makes the support θ-invariant**\n```\nCARTESIAN (naive): domain [0, a)³ changes with a\n──────────────────────────────────────────────────\na₀ = 16 Å                  a₀ + δa = 17.6 Å\n┌─────────────────────┐    ┌───────────────────────────┐\n│ s=(0.99, 0.5, 0.5)  │    │                           │\n│   q=(15.8, 8, 8)    │    │  q=(15.8, 8, 8) SAME      │\n│          ●          │    │          ●                 │\n│  inside [0,16)  ✓   │    │   inside [0, 17.6)  ✓     │\n│                     │    │                           │\n│  This molecule is   │    │  Different position        │\n│  close to the wall  │    │  relative to framework     │\n└─────────────────────┘    └───────────────────────────┘\n  q stays SAME → different fractional position w.r.t. new cell\n\nFRACTIONAL (fixed): domain [0, 1)³ is always [0, 1)³\n──────────────────────────────────────────────────────\na₀ = 16 Å                  a₀ + δa = 17.6 Å\n┌──────────────────┐        ┌──────────────────┐\n│ s=(0.99, 0.5,0.5)│        │ s=(0.99, 0.5,0.5)│\n│          ●       │        │          ●       │\n│ q = 16×s = 15.84 │        │ q = 17.6×s = 17.4│  ← q moves with cell\n│ The molecule     │        │ Same relative    │\n│ stays near       │        │ position in pore │\n│ same framework   │        │                  │\n└──────────────────┘        └──────────────────┘\n   s is INVARIANT → same relative pore environment\n   Support [0,1)³ is ALWAYS [0,1)³ — independent of a\n\nKEY: The physics is unchanged. The molecule is still at 99%\nof the way across the cell. But now differentiation under\nthe integral is legal because the domain doesn't move.\n```\n\n### Modified GCMC Moves in Fractional Coordinates\n\nThe GCMC sampler from Module 1 needs to be modified to track fractional coordinates instead of Cartesian ones. The moves become:\n\n**Translation move** (in fractional space):\n```python\ndef fractional_translate(key, s_i, step_size):\n    \"\"\"Propose a displacement in fractional coordinates.\n    s_i ∈ [0,1)³ → s_i' = (s_i + Δs) mod 1\n    \"\"\"\n    delta_s = jax.random.uniform(key, shape=(3,),\n                                 minval=-step_size,\n                                 maxval=+step_size)\n    s_new = (s_i + delta_s) % 1.0\n    return s_new\n```\n\n**Insertion move** (uniform in fractional space):\n```python\ndef fractional_insert(key, h):\n    \"\"\"Insert at a uniform random fractional position.\n    Note: uniform in s-space IS uniform in q-space\n    because the Jacobian det(h) is constant in s.\n    \"\"\"\n    s_new = jax.random.uniform(key, shape=(3,))\n    q_new = h @ s_new   # Cartesian position for energy evaluation\n    return s_new, q_new\n```\n\nThe minimum-image convention for energy evaluation must be applied in **Cartesian space** after converting $\\mathbf{q} = h \\mathbf{s}$, not in fractional space[^6].\n\n### The Density-of-States Jacobian in Acceptance Ratios\n\nThe insertion acceptance ratio in fractional coordinates requires care. The fugacity $z = e^{\\beta\\mu}/\\Lambda^3$ has units of (number/volume), and the volume element for insertion is $d^3\\mathbf{q} = \\det(h) \\, d^3\\mathbf{s}$.\n\nThe insertion acceptance criterion becomes:\n\n$$\\text{accept} = \\min\\!\\left(1,\\; \\frac{z \\cdot \\det(h)}{N+1} \\cdot e^{-\\beta \\Delta U_{\\text{insert}}}\\right)$$\n\nwhere the $\\det(h)$ factor — which equals $a^3$ for the cubic case — accounts for the Jacobian of the coordinate transformation. This factor is absent in naive Cartesian GCMC (where it is implicit), but must be made explicit here because $\\det(h)$ is now a function of $\\theta$.\n\n**Check your understanding:** If we increase $a$ by 1%, $\\det(h) = a^3$ increases by approximately 3%. How does this affect the insertion acceptance probability? Does this make physical sense — should a larger cell be more or less likely to accept an insertion at fixed chemical potential?\n\n---\n\n## The Chain Rule for ∂U/∂a\n\nNow that the sampling domain is $\\theta$-invariant, we can differentiate the energy with respect to $a$ analytically. The energy is a function of Cartesian positions, which depend on $a$ through $\\mathbf{q} = h(a)\\mathbf{s}$. But there is also a **direct dependence** of the energy on $a$ through the Ewald reciprocal-space sum. This is the part that most derivations miss.\n\n### Position Part: ∂U/∂q · ∂q/∂a\n\nFor the LJ and real-space Coulomb terms, the only dependence on $a$ is through the positions $\\mathbf{q} = a \\mathbf{s}$ (cubic case):\n\n$$\\frac{\\partial U_{\\text{LJ+real}}}{\\partial a} = \\sum_i \\frac{\\partial U}{\\partial \\mathbf{q}_i} \\cdot \\frac{\\partial \\mathbf{q}_i}{\\partial a} = \\sum_i \\frac{\\partial U}{\\partial \\mathbf{q}_i} \\cdot \\mathbf{s}_i$$\n\nThis is just the chain rule: the force on molecule $i$ dotted with its fractional coordinate. Since $\\mathbf{s}_i = \\mathbf{q}_i / a$, this is equivalently $\\frac{1}{a} \\sum_i \\mathbf{F}_i \\cdot \\mathbf{q}_i$ — the **pressure virial**.\n\nThis term is accessible by any autodiff system (jax.grad through U_LJ) after fixing $\\mathbf{s}$ and differentiating through $\\mathbf{q} = h\\mathbf{s}$.\n\n### The Ewald Cell Derivative: The Hidden Term\n\nThe Ewald sum separates the long-range Coulomb potential into a short-range real-space sum and a long-range reciprocal-space sum:\n\n$$U_{\\text{Ewald}} = \\underbrace{U_{\\text{real}}(\\mathbf{q}, h)}_{\\text{short range, cutoff}} + \\underbrace{U_{\\text{rec}}(\\mathbf{q}, h)}_{\\text{long range, G-vectors}} + \\underbrace{U_{\\text{self}}}_{\\text{constant correction}}$$\n\nThe reciprocal-space sum is:\n\n$$U_{\\text{rec}} = \\frac{1}{2\\pi V} \\sum_{\\mathbf{G} \\neq \\mathbf{0}} \\frac{e^{-G^2/(4\\alpha^2)}}{G^2} \\left| S(\\mathbf{G}) \\right|^2$$\n\nwhere:\n\n| Symbol | Meaning |\n|--------|---------|\n| $V = \\det(h)$ | Cell volume |\n| $\\alpha$ | Ewald splitting parameter |\n| $\\mathbf{G} = 2\\pi h^{-\\top} \\mathbf{n}$ | Reciprocal lattice vectors, $\\mathbf{n} \\in \\mathbb{Z}^3$ |\n| $S(\\mathbf{G}) = \\sum_j q_j e^{i\\mathbf{G}\\cdot\\mathbf{q}_j}$ | Structure factor |\n| $q_j$ | Partial charge on atom $j$ |\n\nNow, **the reciprocal lattice vectors $\\mathbf{G}$ depend on $h$**:\n\n$$\\mathbf{G}(\\mathbf{n}; h) = 2\\pi h^{-\\top} \\mathbf{n}$$\n\nFor the cubic case, $h = a\\mathbf{I}$, so $h^{-\\top} = (1/a)\\mathbf{I}$ and $\\mathbf{G} = (2\\pi/a)\\mathbf{n}$. When $a$ changes, the entire reciprocal lattice rescales. This introduces a second contribution to $\\partial U_{\\text{Ewald}}/\\partial a$ that is **not** captured by just differentiating through $\\mathbf{q} = a\\mathbf{s}$.\n\n### Ewald Summation Review\n\nLet's write out the reciprocal-space sum more explicitly to make the $a$-dependence transparent.\n\nFor cubic $h = a\\mathbf{I}$, $V = a^3$, and $G = |\\mathbf{G}| = (2\\pi/a)|\\mathbf{n}|$:\n\n$$U_{\\text{rec}}(a) = \\frac{1}{2\\pi a^3} \\sum_{\\mathbf{n} \\neq \\mathbf{0}} \\frac{e^{-(2\\pi|\\mathbf{n}|)^2/(4\\alpha^2 a^2)}}{(2\\pi|\\mathbf{n}|/a)^2} \\left| S\\!\\left(\\frac{2\\pi \\mathbf{n}}{a}\\right) \\right|^2$$\n\nThe three sources of $a$-dependence here are:\n\n1. **Prefactor** $1/(2\\pi a^3)$: direct volume dependence.\n2. **Gaussian** $e^{-G^2/4\\alpha^2}$: the splitting of real/reciprocal space shifts with $G \\propto 1/a$.\n3. **Structure factor** $S(\\mathbf{G}) = \\sum_j q_j e^{i\\mathbf{G}\\cdot\\mathbf{q}_j}$: depends on $a$ both through $\\mathbf{G} \\propto 1/a$ and through $\\mathbf{q}_j = a \\mathbf{s}_j$.\n\n**Figure 3: The two differentiation paths through U_Ewald(a)**\n```\n           a  ──────────────────────────────────────────────────────────┐\n           │                                                             │\n           │ (Path 1: through positions)                (Path 2: through G-vectors)\n           │                                                             │\n           ▼                                                             ▼\n    q_i = a · s_i                                      G = 2π/a · n\n           │                                                             │\n           │         ┌──────────────────────────────────────────────────┘\n           │         │\n           ▼         ▼\n       U_Ewald(q_i, G(a))\n           │                 │\n           │ Path 1 gives:   │ Path 2 gives:\n           │ ∂U/∂q_i · s_i  │ ∂U/∂G · ∂G/∂a\n           │  (virial term)  │  (G-lattice term)\n           │                 │\n           └────────┬────────┘\n                    │\n                    ▼\n           dU/da = (Path 1) + (Path 2)\n                 = virial + G-lattice\n\n   MISSING PATH 2 → wrong sign or magnitude → FD fails\n   This is the 'kill lattice phase' failure mode.\n```\n\n### Differentiating the Reciprocal Sum Through h\n\nLet's work out $\\partial U_{\\text{rec}}/\\partial a$ for the cubic case. We want the total derivative treating both $\\mathbf{G}$ and $\\mathbf{q}$ as functions of $a$.\n\nStarting with the definition and differentiating term by term:\n\n$$\\begin{aligned}\n\\frac{\\partial U_{\\text{rec}}}{\\partial a} &= \\frac{\\partial}{\\partial a}\\left[\\frac{1}{2\\pi a^3} \\sum_{\\mathbf{n}\\neq\\mathbf{0}} \\frac{e^{-G_n^2/4\\alpha^2}}{G_n^2}|S_n|^2\\right] & \\scriptstyle{\\text{write out } U_{\\text{rec}}} \\\\[6pt]\n&= \\sum_{\\mathbf{n}\\neq\\mathbf{0}} \\frac{\\partial}{\\partial a}\\left[\\underbrace{\\frac{e^{-G_n^2/4\\alpha^2}}{2\\pi a^3 G_n^2}}_{\\text{prefactor } f_n(a)}\\right] |S_n|^2 + \\sum_{\\mathbf{n}\\neq\\mathbf{0}} f_n(a) \\frac{\\partial |S_n|^2}{\\partial a} & \\scriptstyle{\\text{product rule}}\n\\end{aligned}$$\n\nwhere $G_n = 2\\pi|\\mathbf{n}|/a$ depends on $a$.\n\n**Term 1: Differentiating the prefactor $f_n(a)$.** \n\nSince $G_n = 2\\pi|\\mathbf{n}|/a$, we have $G_n^2 = (2\\pi)^2|\\mathbf{n}|^2/a^2$, so:\n\n$$f_n(a) = \\frac{e^{-(2\\pi)^2|\\mathbf{n}|^2/(4\\alpha^2 a^2)}}{2\\pi a^3 \\cdot (2\\pi)^2|\\mathbf{n}|^2/a^2} = \\frac{a^2 \\, e^{-\\pi^2|\\mathbf{n}|^2/(\\alpha^2 a^2)}}{(2\\pi)^3 a^3 |\\mathbf{n}|^2} = \\frac{e^{-\\pi^2|\\mathbf{n}|^2/(\\alpha^2 a^2)}}{(2\\pi)^3 a \\, |\\mathbf{n}|^2}$$\n\nDifferentiating with respect to $a$ (treating $|\\mathbf{n}|$ as fixed):\n\n$$\\frac{\\partial f_n}{\\partial a} = f_n(a) \\left[-\\frac{1}{a} + \\frac{2\\pi^2|\\mathbf{n}|^2}{\\alpha^2 a^3}\\right]$$\n\n**Term 2: Differentiating the structure factor $|S_n|^2$.**\n\n$$S_n = \\sum_j q_j e^{i\\mathbf{G}_n \\cdot \\mathbf{q}_j} = \\sum_j q_j e^{i (2\\pi/a) \\mathbf{n} \\cdot (a\\mathbf{s}_j)} = \\sum_j q_j e^{2\\pi i \\mathbf{n} \\cdot \\mathbf{s}_j}$$\n\nWait — notice what happened! When we write $\\mathbf{G}_n = (2\\pi/a)\\mathbf{n}$ and $\\mathbf{q}_j = a\\mathbf{s}_j$, the product $\\mathbf{G}_n \\cdot \\mathbf{q}_j = 2\\pi \\mathbf{n} \\cdot \\mathbf{s}_j$ is **independent of $a$**[^7]. The $a$'s cancel.\n\nTherefore $\\partial |S_n|^2 / \\partial a = 0$ when positions are expressed in fractional coordinates.\n\n**Intermediate conclusion:** In fractional coordinates, the structure factor is $\\theta$-invariant. The *only* $a$-dependence of $U_{\\text{rec}}$ comes from the prefactor $f_n(a)$.\n\nThis is a beautiful simplification. The full analytic derivative is:\n\n$$\\frac{\\partial U_{\\text{rec}}}{\\partial a} = \\sum_{\\mathbf{n}\\neq\\mathbf{0}} \\frac{\\partial f_n}{\\partial a} |S_n({\\mathbf{s}})|^2$$\n\n**Check your understanding:** The structure-factor cancellation above ($\\mathbf{G}\\cdot\\mathbf{q} = 2\\pi\\mathbf{n}\\cdot\\mathbf{s}$) assumed fractional coordinates. What happens in Cartesian coordinates? Does $\\partial|S_n|^2/\\partial a = 0$ still hold? If not, what does this term represent physically?\n\n### Full Analytic ∂U/∂a\n\nAssembling both the position-path and the prefactor-path contributions:\n\n$$\\frac{\\partial U}{\\partial a} = \\underbrace{\\sum_i \\nabla_{\\mathbf{q}_i} U_{\\text{LJ+real}} \\cdot \\mathbf{s}_i}_{\\text{position path (virial)}} + \\underbrace{\\sum_{\\mathbf{n}\\neq\\mathbf{0}} \\frac{\\partial f_n}{\\partial a} |S_n(\\mathbf{s})|^2}_{\\text{cell path (G-lattice)}}$$\n\nIn code:\n\n```python\ndef dU_total_da(s_positions, h, charges, alpha, eps, sig):\n    \"\"\"\n    Analytic ∂U/∂a for cubic cell h = a*I, positions in fractional coords.\n    \n    Args:\n        s_positions: (N, 3) fractional coordinates in [0,1)³\n        h: (3,3) cell matrix; for cubic, h = a*I\n        charges: (N,) partial charges\n        alpha: Ewald splitting parameter\n        eps, sig: LJ parameters\n    Returns:\n        scalar ∂U/∂a\n    \"\"\"\n    a = h[0, 0]  # cubic case: extract a from diagonal\n    q_positions = s_positions @ h.T   # Cartesian positions (N, 3)\n    \n    # Path 1: position path (virial)\n    # F_i = -∂U/∂q_i, so ∂U/∂q_i = -F_i\n    # ∂U/∂a = Σ_i (∂U/∂q_i)·s_i = -Σ_i F_i·s_i\n    grad_q = jax.grad(lambda q: U_LJ_real(q, h, charges, alpha, eps, sig))\n    dU_dq = grad_q(q_positions)   # (N, 3)\n    virial_term = jnp.sum(dU_dq * s_positions)  # scalar\n    \n    # Path 2: cell path (G-lattice derivative)\n    G_lattice_term = dU_rec_da_prefactor(s_positions, a, charges, alpha)\n    \n    return virial_term + G_lattice_term\n```\n\nA clean validation: use `jax.grad(lambda a: U_ewald(s_positions, a*jnp.eye(3), ...))` to get the reference, and verify the analytic formula matches to machine precision ($< 10^{-8}$). Exercise 3 is entirely devoted to this check.\n\n---\n\n## End-to-End Gradient: Plugging into the Score-Function Estimator\n\n### The Complete Algorithm\n\nWe now have all the pieces to compute $\\partial \\langle N \\rangle / \\partial a$:\n\n1. **Sample**: Run GCMC in fractional coordinates, collecting $(N_k, \\mathbf{s}_k)$ for $k = 1, \\ldots, K$.\n2. **Differentiate**: For each sample, evaluate $(\\partial U / \\partial a)_k$ using the two-path formula above.\n3. **Estimate**: Apply the covariance formula:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial a} = -\\beta \\cdot \\text{Cov}\\!\\left(N, \\frac{\\partial U}{\\partial a}\\right) \\approx -\\beta \\left[\\frac{1}{K}\\sum_k N_k \\left(\\frac{\\partial U}{\\partial a}\\right)_k - \\bar{N} \\cdot \\overline{\\frac{\\partial U}{\\partial a}}\\right]$$\n\nThe Rao-Blackwell control variate from Module 2 — subtracting $\\bar{N}$ before computing the covariance — applies here identically.\n\n**Figure 4: The three-step fractional lattice gradient pipeline**\n```\nStep 1: GCMC in fractional coords\n─────────────────────────────────\nkey₀ → GCMC(key₀, state₀, h(a)) → state₁ = {s_i, N₁}\nkey₁ → GCMC(key₁, state₁, h(a)) → state₂ = {s_i, N₂}\n  ...                                ...\nkeyₖ → GCMC(keyₖ, stateₖ, h(a)) → stateₖ₊₁ = {s_i, Nₖ}\n\nFractional coords s_i ∈ [0,1)³ — never touch a!\n\nStep 2: Analytic gradient at each sample\n────────────────────────────────────────\nFor each sample k:\n  q_k = h(a) @ s_k            ← materialize Cartesian\n  dU_dq = ∇_q U(q_k, h(a))   ← standard forces\n  virial = Σ_i (dU_dq_i · s_i)\n\n  S_n = Σ_j q_j exp(2πi n·s_j)    ← structure factor in s (no a!)\n  cell_term = Σ_n (df_n/da) |S_n|²  ← G-lattice derivative\n\n  (∂U/∂a)_k = virial + cell_term\n\nStep 3: Covariance estimator (score function)\n─────────────────────────────────────────────\nN̄  = (1/K) Σ_k N_k\ndU_da_bar = (1/K) Σ_k (∂U/∂a)_k\n\nd⟨N⟩/da = -β · [ (1/K) Σ_k N_k (∂U/∂a)_k   - N̄ · dU_da_bar ]\n              = -β · Cov(N, ∂U/∂a)\n                     ↑ Rao-Blackwell: subtract means before covariance\n```\n\n### Validation Against Finite Differences\n\nThe standard finite-difference reference is:\n\n$$\\left.\\frac{\\partial \\langle N \\rangle}{\\partial a}\\right|_{\\text{FD}} = \\frac{\\langle N \\rangle_{a_0 + \\delta a} - \\langle N \\rangle_{a_0 - \\delta a}}{2\\,\\delta a}$$\n\nwhere each $\\langle N \\rangle$ is obtained by running an *independent* GCMC simulation at the perturbed lattice constant (not by reweighting). The FD estimate is unbiased but requires 2 additional simulations of the same length.\n\nThe critical requirement for a valid comparison is that **both the estimator and the FD reference use fractional-coordinate sampling**. If you run FD with Cartesian sampling and compare to a fractional-sampling estimator, you're comparing apples to oranges — they sample different distributions at the perturbed $a$.\n\nTypical result for the 16 Å cubic cell at moderate CO₂ loading:\n\n| Method | $\\partial\\langle N\\rangle/\\partial a$ (mol/Å) | Relative error |\n|--------|----------------------------------------------|----------------|\n| Fractional estimator ($K=10^4$) | $-0.031$ | — |\n| Finite difference ($\\delta a = 0.1$ Å) | $-0.033$ | 6% |\n| Naive reweight ($\\delta a = 0.1$ Å) | $+0.012$ | wrong sign! |\n\nThe naive reweighting gets the *sign* wrong because importance-weight collapse means a few atypical samples dominate the estimate. The fractional estimator and FD agree in both sign and magnitude.\n\n### The 10% Sign-Agreement Gate\n\nThe paper states the falsification criterion explicitly[^8]:\n\n> *\"Fractional lattice gradient sign-disagrees with FD > 10% → Chain-rule bug → Kill lattice phase\"*\n\nThis is a **binary gate**, not a soft threshold. If more than 10% of gradient components have the wrong sign compared to FD, the lattice gradient phase is killed entirely. The reasoning is that sign errors are symptomatic of a systematic bug (usually: missing the G-lattice term), not statistical noise. Statistical errors produce scatter around the correct value, not a reversed sign.\n\nIn Exercise 4, you will implement the complete pipeline and verify this gate passes:\n\n```\nd⟨N⟩/da: estimator=-0.031, FD=-0.033, rel_err=0.06, sign agreement ✓\nGate: PASS\n```\n\n---\n\n## Why This Is the Novelty Beyond DiffTRe\n\nThe paper situates this work as a generalization of **DiffTRe** (Differentiable Trajectory Reweighting)[^9] by Thaler & Zavadlav. DiffTRe showed how to compute gradients of NVT ensemble averages for force-field fitting via a score-function estimator, bypassing backprop through MD entirely. It's an important paper and the direct conceptual predecessor.\n\nBut DiffTRe has three limitations that this work explicitly addresses:\n\n| Limitation | DiffTRe | This work |\n|------------|---------|-----------|\n| Ensemble | NVT (fixed N) | μVT (variable N) |\n| Observable | Single-state $\\langle A \\rangle_T$ | Two-state difference $\\Delta N$ |\n| Parameters | Force-field (ε, σ, q) | Force-field **+ structural** (a, b, c) |\n\nThe structural-parameter extension requires the fractional-coordinate reparameterization described in this module. It is listed in the paper as one of the four \"survival-of-crossfire\" contributions — the four novel components that collectively make the proposal defensible:\n\n1. μVT (grand-canonical) estimator for particle-number observables\n2. CRN coupling across two chemical-potential chains (Module 2)\n3. **Fractional-coordinate reparameterization for lattice gradients (this module)**\n4. Sampler-agnostic design via ObservableWithGradient (Module 4)\n\nNone of these is a minor implementation detail. The fractional-reparameterization contribution solves a genuine measure-theoretic obstruction that would otherwise make structural optimization impossible for all but the smallest perturbations.\n\n---\n\n## Analytical Questions\n\n### Question 1 — What Goes Wrong Without the Ewald Cell Derivative?\n\nSuppose you implement the fractional-coordinate estimator but compute $\\partial U/\\partial a$ using only the position path — i.e., you set the G-lattice term to zero:\n\n$$\\frac{\\partial U}{\\partial a} \\approx \\sum_i \\nabla_{\\mathbf{q}_i} U \\cdot \\mathbf{s}_i \\qquad \\text{(WRONG: missing G-lattice)}$$\n\n**(a)** For a system with **only LJ interactions** (no charges), is this approximation exact? Why or why not?\n\n**(b)** For a system with **only Coulomb interactions** in vacuum (no periodic boundaries), does the G-lattice term vanish? Does the position-path term alone give the correct answer?\n\n**(c)** For a periodic Ewald system, compute the G-lattice term for a simple case: one cation ($+e$) and one anion ($-e$) at fractional positions $\\mathbf{s}_1 = (0, 0, 0)$ and $\\mathbf{s}_2 = (0.5, 0.5, 0.5)$ in a cubic cell. Show that the G-lattice term is non-zero and has a definite sign. What does missing it do to the estimated gradient?\n\n**(d)** The paper identifies the symptom as \"sign-disagrees-with-FD\". Construct a physical argument for why the missing G-lattice term would produce a *sign error* rather than just a magnitude error for typical MOF-like charge distributions.\n\n### Question 2 — Triclinic Cells and the Full h Matrix\n\nThe cubic case ($h = a\\mathbf{I}_3$) is pedagogically clean but physically limited. Real MOFs have triclinic unit cells with independent lattice vectors $\\mathbf{a}_1, \\mathbf{a}_2, \\mathbf{a}_3$ and angles $\\alpha, \\beta, \\gamma$.\n\n**(a)** Write down the generalized chain rule for $\\partial U/\\partial h_{ij}$ (the $(i,j)$ element of the cell matrix) in fractional coordinates. Your answer should involve $\\partial \\mathbf{G}/\\partial h_{ij}$ for the G-lattice term.\n\n**(b)** The paper focuses on $\\partial \\langle N \\rangle / \\partial a$ for isotropic cell scaling. If instead you wanted to optimize the cell angle $\\gamma$ (the angle between $\\mathbf{a}_1$ and $\\mathbf{a}_2$) at fixed cell lengths, what changes in the derivation? Does the structure-factor cancellation $\\partial|S_n|^2/\\partial\\gamma = 0$ still hold?\n\n**(c)** MOFs typically have symmetry constraints on $h$ (e.g., a tetragonal MOF has $a = b \\neq c$, $\\alpha=\\beta=\\gamma=90°$). If the optimizer violates these constraints, the generated structure is unphysical. Propose a reparameterization of $h$ that automatically enforces a given crystal symmetry class, such that gradient descent on the reparameterized parameters always produces a valid cell.\n\n### Question 3 — When Does Fractional Reparameterization Fail?\n\nFractional-coordinate reparameterization solves the support-collapse problem for lattice-scale changes. But it has its own failure modes.\n\n**(a)** Consider a MOF undergoing a **pressure-induced phase transition** (e.g., breathing behavior in MIL-53, which switches between narrow-pore and large-pore forms at a critical pressure). The cell parameters change discontinuously at the transition. Does fractional-coordinate reparameterization help here? What does the score-function estimator do near the phase boundary?\n\n**(b)** The Binder cumulant detector is mentioned in the paper as a mechanism to refuse gradient estimates near phase transitions. The Binder cumulant for particle number is $U_4 = 1 - \\langle N^4 \\rangle / (3\\langle N^2\\rangle^2)$. Explain why $U_4 \\to 0$ signals a first-order transition in the $\\langle N \\rangle$ distribution, and why the covariance estimator $\\text{Cov}(N, \\partial U/\\partial\\theta)$ would be unreliable in that regime.\n\n**(c)** For very large fractional perturbations (say $\\delta a / a = 0.3$), does fractional reparameterization guarantee a good gradient estimate? What is the correct criterion for when the score-function estimator (which is an analytic formula, not a reweighting) is reliable?\n\n### Question 4 — Lattice vs. Force-Field Parameters: What Changes?\n\nThroughout this module we focused on $\\theta = a$ (lattice constant). Compare this to $\\theta = \\varepsilon$ (LJ well depth), which Module 0-2 handled without reparameterization.\n\n**(a)** For $\\theta = \\varepsilon$, the sampling domain does not depend on $\\theta$. Show this explicitly: the configuration space is $\\{(N, \\mathbf{q}) : \\mathbf{q} \\in [0, a)^{3N}\\}$ for fixed $a$, which is $\\varepsilon$-independent.\n\n**(b)** For $\\theta = a_0$ (the equilibrium bond length in the harmonic framework potential), the atomic positions of the *framework* shift. Is this a support-collapse problem? Does it require fractional reparameterization?\n\n**(c)** In the MLFF/classical decomposition (sample with MACE, compute analytic $\\partial U/\\partial\\theta$ through the classical sidecar), the lattice gradient $\\partial U_{\\text{classical}}/\\partial a$ uses the fractional-coordinate formula derived here. But MACE was used to generate the samples. Does the *correctness* of the gradient estimate depend on whether MACE samples the same distribution as the classical sidecar? What about the *variance* of the estimate?\n\n---\n\n## Synthesis: From Score Functions to Structural Optimization\n\nLet's step back and see what this module contributes to the overall course goal: **differentiable equilibrium averages for MOF design**.\n\nIn Module 0, we derived the score-function identity from the grand-canonical partition function:\n\n$$\\frac{\\partial \\langle N \\rangle}{\\partial \\theta} = -\\beta \\, \\text{Cov}(N, \\partial_\\theta U)$$\n\nThe derivation required differentiating under the integral — applying the Leibniz rule to the partition function. We glossed over the condition for this to be valid: **the integration domain must not depend on $\\theta$**.\n\nFor force-field parameters ($\\varepsilon$, $\\sigma$, partial charges), this condition is automatically satisfied — the pore geometry is fixed. The identity holds without modification.\n\nFor structural parameters ($a$, $b$, $c$, lattice angles), the condition fails: the physical volume changes with $\\theta$, so the integration domain $[0, a)^3$ is $\\theta$-dependent. The naive score-function estimate would be **biased** — not just high-variance.\n\nFractional-coordinate reparameterization restores the Leibniz condition by moving to a coordinate system where the domain is $[0,1)^3$ regardless of $\\theta$. This is not just a numerical trick; it is the mathematically correct way to handle this class of reparameterization problems. Physicists doing quantum mechanics on curved spaces, differential geometers computing integrals on manifolds, and probabilists computing derivatives of expectations under shifting supports all face the same issue and apply the same fix: pull back to a reference domain.\n\nThe end result is a gradient estimator that:\n\n- Is **unbiased** for structural parameters, not just force-field parameters\n- Has a **finite variance** even for non-infinitesimal $\\delta a$\n- Requires only the analytic formula $\\partial U/\\partial a$ (two-path chain rule) at existing samples\n- Composes with the CRN variance reduction from Module 2\n- Plugs into the kUPS `ObservableWithGradient` primitive from Module 4\n\nTogether, these four modules reconstruct the complete kUPS differentiable-μVT proposal: from the Zwanzig identity in Module 0, through CRN and Rao-Blackwell in Module 2, through the structural-parameter fix in this module, to the composable propagator in Module 4.\n\nThe **8× sample-efficiency headline** vs. MBAR-5pt comes from combining all these pieces. The fractional-reparameterization contribution is necessary for the estimate to be correct at all; the variance reduction from Modules 2 and 3 is what makes it competitive with the brute-force baseline.\n\n---\n\n## Preview: Exercises\n\n**Exercise 1** (`ex01_naive_latticescale_gradient_watch_the_importance_w.py`): You will implement the naive Cartesian reweighting gradient and watch it fail. The exercise asks you to:\n- Compute ESS at $\\delta a/a \\in \\{0.001, 0.01, 0.1\\}$ and observe the 95% → 40% → 2% trajectory\n- Fit the $\\text{Var}(\\beta \\Delta U) \\propto (\\delta a)^2$ scaling and verify the exponent is 2.0\n- Confirm that multiplying sample count by 10× does not improve the ESS ratio\n\nKey insight: the ESS collapses because the *support* changes, not because of sampling noise. No amount of sampling fixes a measure-theoretic problem.\n\n**Exercise 2** (`ex02_fractionalcoordinate_gcmc__θinvariant_support.py`): Implement GCMC in fractional coordinates — insertion, translation, and deletion — with the correct $\\det(h)$ Jacobian in the acceptance criterion. Verify that ESS at $\\delta a/a = 0.1$ goes from 2% (Exercise 1) to 96% (this exercise). The module prints: *\"Fractional sampling: support is θ-invariant. ESS preserved under 10% lattice perturbation.\"*\n\n**Exercise 3** (`ex03_ewald_cellderivative__ureca_by_hand.py`): Derive and implement the G-lattice cell derivative $\\partial U_{\\text{rec}}/\\partial h$ by hand, then validate it against `jax.grad`. The exercise uses a 4-atom unit cell with charges $\\pm 1$. Milestone: maximum absolute error < $10^{-8}$ on the analytic-vs-jax comparison. Timing: analytic is within 3× of `jax.grad` (not faster, but exact and auditable).\n\n**Exercise 4** (`ex04_endtoend_lattice_gradient_vs_finite_difference__th.py`): Wire together Exercises 2 and 3 into the complete lattice-gradient estimator and validate against finite differences at the 10% gate. A clean run prints: *\"d⟨N⟩/da: estimator=-0.031, FD=-0.033, rel_err=0.06, sign agreement ✓. Gate: PASS.\"* If you've made the common chain-rule bug (missing the G-lattice term), the gate will print: *\"FAIL — sign disagrees. Missing Ewald cell derivative?\"*\n\n---\n\n[^1]: The TraPPE (Transferable Potentials for Phase Equilibria) force field is widely used for molecular simulation of CO₂, N₂, and H₂O in porous materials. For CO₂: TraPPE uses a rigid linear geometry with C-O bond length 1.16 Å and the charge model $q_C = +0.70e$, $q_O = -0.35e$ for Coulomb interactions alongside LJ parameters. It reproduces experimental vapor-liquid coexistence curves accurately.\n\n[^2]: The exact language from the paper is: \"Fractional lattice gradient sign-disagrees with FD > 10% → Chain-rule bug → Kill lattice phase.\" This is one of four explicit falsification gates — pre-stated failure criteria that the authors commit to before seeing results.\n\n[^3]: The phrase \"keeping fractional coordinates fixed\" is the conceptual handle for the reparameterization. In the naive Cartesian approach, you keep $\\mathbf{q}$ fixed and measure $\\Delta U = U(\\mathbf{q}; a+\\delta a) - U(\\mathbf{q}; a)$. In the fractional approach, you keep $\\mathbf{s}$ fixed and the molecule moves with the cell. These measure completely different things.\n\n[^4]: Source: key excerpt [1] from the kUPS differentiable-μVT proposal: \"Fixes the importance-weight degeneracy that otherwise kills structural gradients as Var(βΔU) ∝ V·(δa/a)².\"\n\n[^5]: The convention for whether lattice vectors are rows or columns of $h$ varies by package. kUPS uses column-vector convention: $\\mathbf{q} = h\\mathbf{s}$ where $h$'s columns are the lattice vectors. NumPy/ASE often use row convention. When in doubt, check $\\mathbf{q} = h \\mathbf{s}$ vs $\\mathbf{q} = \\mathbf{s} h^T$; Exercise 2 includes an assert statement to catch this.\n\n[^6]: A common bug: applying the minimum-image convention in fractional space by rounding $\\mathbf{s}_{ij} = \\mathbf{s}_i - \\mathbf{s}_j$ to $[-0.5, 0.5)^3$, then computing $r_{ij} = |h \\, \\mathbf{s}_{ij}|$. This is correct for orthogonal cells but wrong for triclinic cells where the minimum-image convention must be applied after converting to Cartesian. The correct procedure: compute $\\mathbf{q}_i - \\mathbf{q}_j$, apply minimum-image in Cartesian space using $h$ and $h^{-1}$.\n\n[^7]: This cancellation — $\\mathbf{G}\\cdot\\mathbf{q} = 2\\pi\\mathbf{n}\\cdot\\mathbf{s}$ independent of $a$ — is the key algebraic identity that makes fractional coordinates so natural for periodic systems. It is why crystallographers work in fractional coordinates: the phase angles in the structure factor are $\\theta$-invariant quantities.\n\n[^8]: This gate is deliberately binary (not a warning) because sign errors in gradient estimates cause gradient-descent optimizers to move in the *wrong direction*. A magnitude error of 50% just means slower convergence; a sign error means the optimizer actively makes the MOF worse. The paper's authors describe this as \"the one failure mode that makes the whole proposal scientifically dishonest.\"\n\n[^9]: Thaler, S. & Zavadlav, J. \"Learning neural network potentials from experimental data via Differentiable Trajectory Reweighting.\" *Nature Communications* 12, 6884 (2021). DiffTRe is a clean implementation of exactly the same score-function identity applied to NVT ensemble averages for force-field fitting. The present work's extension to μVT and structural parameters is non-trivial in both the measure-theoretic (fractional reparameterization) and statistical (CRN across particle-number fluctuations) dimensions.\n", "exercises": [{"filename": "ex01_naive_latticescale_gradient_watch_the_importance_w.py", "content": "\"\"\"\nExercise 1: Naive lattice-scale gradient — watch the importance weights blow up\n================================================================================\n\nThe score-function estimator from Modules 0–2 assumed that the configuration\ndomain does NOT depend on θ. For force-field parameters (ε, σ, q_partial), that\nis true: the pore is the pore regardless of the LJ well depth.\n\nFor θ = a (lattice constant), it is FALSE. The physical volume changes with a,\nso samples drawn at a₀ live on a DIFFERENT support than the distribution at\na₀ + δa. This exercise quantifies the failure via importance-weight ESS.\n\nKey question: Does running 10× more GCMC steps fix the ESS ratio? (Spoiler: no.)\nThe problem is measure-theoretic, not statistical.\n\nAfter completing this exercise you should be able to:\n  - Compute the naive Cartesian reweighting gradient and its ESS\n  - Observe the 95% → 40% → 2% ESS trajectory as δa/a grows\n  - Fit Var(βΔU) ∝ (δa)^2 and verify the quadratic exponent\n  - Understand why more samples cannot fix support collapse\n\"\"\"\n\nimport os\nimport numpy as np\n\n# ---------------------------------------------------------------------------\n# DISTILL_VERIFY fast-mode switch\n# ---------------------------------------------------------------------------\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_STEPS  = 300  if VERIFY else 5_000    # 60 frames in verify mode (sampled every 5)\nN_MOLS   = 5    if VERIFY else 30       # sparse to avoid overlap in tiny verify box\nBOX_A0   = 12.0 if VERIFY else 20.0    # Å — reference lattice constant\nBETA     = 1.0 / (8.314e-3 * 298.0)   # 1/(kJ/mol) at 298 K\n\n# ---------------------------------------------------------------------------\n# Provided: Lennard-Jones + Coulomb (real-space) energy\n# ---------------------------------------------------------------------------\nEPS_CC  = 28.1  * 8.314e-3   # kJ/mol  (TraPPE CO₂)\nSIG_CC  = 2.80               # Å\nCHARGE_C = +0.70             # elementary charges\nCHARGE_O = -0.35\nKE      = 1389.35            # Å·kJ/mol/e²  (Coulomb constant in MD units)\n\n\ndef lj_energy(r: np.ndarray, eps: float, sig: float) -> np.ndarray:\n    \"\"\"\n    Lennard-Jones pair potential.\n\n    Parameters\n    ----------\n    r : array of distances in Å (all > 0)\n    eps : well depth in kJ/mol\n    sig : diameter in Å\n\n    Returns\n    -------\n    array of pair energies in kJ/mol\n    \"\"\"\n    sr6 = (sig / r) ** 6\n    return 4.0 * eps * (sr6 ** 2 - sr6)\n\n\ndef coulomb_energy(r: np.ndarray, qi: float, qj: float) -> np.ndarray:\n    \"\"\"Real-space Coulomb energy (kJ/mol) between charges qi, qj at distance r (Å).\"\"\"\n    return KE * qi * qj / r\n\n\ndef minimum_image_distance(q1: np.ndarray, q2: np.ndarray, a: float) -> float:\n    \"\"\"\n    Minimum-image distance in a cubic periodic box.\n\n    Parameters\n    ----------\n    q1, q2 : (3,) Cartesian positions in Å\n    a      : cubic box length in Å\n\n    Returns\n    -------\n    scalar distance in Å\n    \"\"\"\n    delta = q1 - q2\n    delta -= a * np.round(delta / a)\n    return float(np.linalg.norm(delta))\n\n\ndef total_energy(positions: np.ndarray, charges: np.ndarray, a: float,\n                 cutoff: float = None) -> float:\n    \"\"\"\n    Total LJ + Coulomb energy for N molecules in a cubic box.\n\n    Parameters\n    ----------\n    positions : (N, 3) Cartesian coordinates in Å\n    charges   : (N,)  partial charges in elementary-charge units\n    a         : box length in Å\n    cutoff    : pair cutoff in Å (defaults to a/2)\n\n    Returns\n    -------\n    total energy in kJ/mol\n    \"\"\"\n    if cutoff is None:\n        cutoff = a / 2.0\n    N = len(positions)\n    U = 0.0\n    for i in range(N):\n        for j in range(i + 1, N):\n            r = minimum_image_distance(positions[i], positions[j], a)\n            if r < 1e-8:\n                continue\n            if r < cutoff:\n                U += lj_energy(np.array([r]), EPS_CC, SIG_CC)[0]\n                U += coulomb_energy(np.array([r]), charges[i], charges[j])[0]\n    return U\n\n\n# ---------------------------------------------------------------------------\n# Provided: minimal GCMC sampler (Cartesian, N-molecule NVT for simplicity)\n# For the purpose of this exercise we run NVT Monte Carlo at fixed N\n# to generate equilibrium configurations — the key point is that positions\n# are stored as Cartesian q ∈ [0, a)³.\n# ---------------------------------------------------------------------------\n\ndef run_nvt_mc(n_steps: int, po
