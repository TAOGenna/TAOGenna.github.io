(32) + ConvTranspose2d(32→32, k=5, s=2, p=2, op=1)   7→14\n      Stage 3 → IGDN(32) + ConvTranspose2d(32→ 1, k=5, s=2, p=2, op=1)  14→28\n    Then apply sigmoid to clamp output to [0, 1].\n\n    Key: output_padding differs per stage!  The rule:\n         output = (in-1)*stride - 2*padding + kernel - 1 + output_padding + 1\n         Stage 1: 4→7 needs op=0.  Stage 2: 7→14 needs op=1.  Stage 3: 14→28 needs op=1.\n         Using op=1 throughout (a common mistake) yields 4→8→16→32, not 4→7→14→28.\n\n    Args:\n        num_filters: intermediate channel width (default 32)\n        latent_ch:   bottleneck channel count   (default 16)\n    \"\"\"\n\n    def __init__(self, num_filters: int = N_FILTERS,\n                 latent_ch: int = LATENT_CH):\n        super().__init__()\n        ###########################################################\n        # YOUR CODE HERE — ~15 lines                              #\n        #                                                         #\n        # Create self.stage1, self.stage2, self.stage3 as        #\n        # nn.Sequential modules.  Each stage contains:            #\n        #   IGDN(in_ch)                                           #\n        #   nn.ConvTranspose2d(in_ch, out_ch, kernel_size=5,     #\n        #                      stride=2, padding=2,               #\n        #                      output_padding=<see note>)         #\n        #                                                         #\n        # CRITICAL — output_padding per stage:                   #\n        #   stage1:  4→7  → output_padding=0                     #\n        #   stage2:  7→14 → output_padding=1                     #\n        #   stage3: 14→28 → output_padding=1                     #\n        #                                                         #\n        # Channel sizes (reversed from analysis):                 #\n        #   stage1:  latent_ch → num_filters                     #\n        #   stage2:  num_filters → num_filters                   #\n        #   stage3:  num_filters → 1                             #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def forward(self, y_hat: torch.Tensor) -> torch.Tensor:\n        ###########################################################\n        # YOUR CODE HERE — 4 lines                               #\n        #                                                         #\n        # Chain: y_hat → stage1 → stage2 → stage3               #\n        # Apply torch.sigmoid() to final output.                 #\n        # Return the result.                                      #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (3/4): CompressionModel.forward\n# ===========================================================================\nclass CompressionModel(nn.Module):\n    \"\"\"Full compression autoencoder: encoder → quantiser → decoder.\n\n    The critical train/eval difference (uniform noise trick):\n      Training:   ỹ = g_a(x) + Δ,  Δ ~ U(-½, ½)   ← differentiable proxy\n      Evaluation: ŷ = round(g_a(x))                 ← actual quantisation\n\n    Args:\n        lam:        rate-distortion λ (stored; not used in forward)\n        num_filters: intermediate channel width\n        latent_ch:  bottleneck channel count\n    \"\"\"\n\n    def __init__(self, lam: float = LAM,\n                 num_filters: int = N_FILTERS,\n                 latent_ch: int = LATENT_CH):\n        super().__init__()\n        self.lam     = lam\n        self.encoder = AnalysisTransform(num_filters, latent_ch)\n        self.decoder = SynthesisTransform(num_filters, latent_ch)\n\n    def forward(self, x: torch.Tensor):\n        \"\"\"\n        Args:\n            x: images (B, 1, 28, 28) in [0, 1]\n        Returns:\n            x_hat:  reconstructions (B, 1, 28, 28)\n            y_out:  noisy latent (training) or quantised latent (eval)\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE — ~10 lines                              #\n        #                                                         #\n        # 1. y = self.encoder(x)                                 #\n        # 2. if self.training:                                    #\n        #       add uniform noise ∈ (-0.5, 0.5) to y             #\n        #       Hint: torch.empty_like(y).uniform_(-0.5, 0.5)    #\n        #    else:                                                #\n        #       round y to nearest integer                        #\n        #       Hint: torch.round(y)                              #\n        # 3. x_hat = self.decoder(y_out)                         #\n        # 4. return (x_hat, y_out)                               #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (4/4): rd_loss\n# ===========================================================================\ndef rd_loss(x: torch.Tensor, x_hat: torch.Tensor,\n            y_tilde: torch.Tensor, lam: float):\n    \"\"\"Rate-Distortion loss  L = R + λ·D.\n\n    Rate R  is the differential entropy of the noisy latent y_tilde,\n    converted from bits/element to bits/pixel.\n    Distortion D is mean pixel-level MSE.\n    Both terms are in [bits/pixel] scale so λ is unit-less.\n\n    Args:\n        x:       original images  (B, 1, 28, 28), values in [0, 1]\n        x_hat:   reconstructions  (B, 1, 28, 28)\n        y_tilde: noisy/quantised latents (B, LATENT_CH, 4, 4)\n        lam:     rate-distortion weight λ\n\n    Returns:\n        (loss, rate_bpp, distortion_mse)\n          loss:           combined L = R + λD  (scalar)\n          rate_bpp:       R in bits/pixel       (scalar, for logging)\n          distortion_mse: D = MSE(x, x̂)         (scalar, for logging)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~10 lines                              #\n    #                                                         #\n    # STEP 1 — rate in bits/pixel:                            #\n    #   rate_bpe = histogram_entropy(y_tilde)                 #\n    #       → bits per latent element                         #\n    #   latent elements per image = LATENT_CH * 4 * 4 = 256  #\n    #   image pixels               = 28 * 28        = 784    #\n    #   rate_bpp = rate_bpe * 256 / 784                       #\n    #                                                         #\n    # STEP 2 — distortion:                                    #\n    #   distortion = F.mse_loss(x_hat, x)                    #\n    #       → mean pixel squared error, scalar in [0, 1]     #\n    #                                                         #\n    # STEP 3 — combine:                                       #\n    #   loss = rate_bpp + lam * distortion                    #\n    #                                                         #\n    # STEP 4 — return (loss, rate_bpp, distortion)           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# PROVIDED: training loop — do not modify\n# ===========================================================================\ndef train_one_epoch(model, loader, optimizer):\n    model.train()\n    total_loss = 0.0\n    for x, _ in loader:\n        x = x.to(device)\n        optimizer.zero_grad()\n        x_hat, y_tilde = model(x)\n        x_hat = x_hat.clamp(0.0, 1.0)\n        loss, _rate, _dist = rd_loss(x, x_hat, y_tilde, model.lam)\n        loss.backward()\n        nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0)\n        optimizer.step()\n        total_loss += loss.item()\n    return total_loss / max(len(loader), 1)\n\n\n@torch.no_grad()\ndef evaluate(model, loader):\n    \"\"\"Return (mean_rate_bpp, mean_mse) on evaluation set.\"\"\"\n    model.eval()\n    total_rate, total_mse, n_batches = 0.0, 0.0, 0\n    for x, _ in loader:\n        x = x.to(device)\n        x_hat, y_hat = model(x)\n        x_hat = x_hat.clamp(0.0, 1.0)\n        _loss, rate, mse = rd_loss(x, x_hat, y_hat, model.lam)\n        total_rate += rate.item()\n        total_mse  += mse.item()\n        n_batches  += 1\n    return total_rate / max(n_batches, 1), total_mse / max(n_batches, 1)\n\n\n# ===========================================================================\n# PROVIDED: __main__ harness — do not modify\n# ===========================================================================\nif __name__ == \"__main__\":\n    print(f\"Device : {device}\")\n    print(f\"VERIFY : {bool(VERIFY)}  (fast CPU mode — no dataset download)\")\n    print(f\"Epochs : {N_EPOCHS}  |  Batch : {BATCH_SIZE}  |  λ = {LAM}\")\n\n    train_loader, test_loader = get_loaders(BATCH_SIZE)\n\n    model     = CompressionModel(lam=LAM).to(device)\n    n_params  = sum(p.numel() for p in model.parameters())\n    print(f\"Parameters: {n_params:,}\")\n\n    # Quick sanity-check: analysis → synthesis should preserve 28×28\n    with torch.no_grad():\n        dummy = torch.zeros(1, 1, 28, 28).to(device)\n        out, _ = model(dummy)\n        assert out.shape == (1, 1, 28, 28), \\\n            f\"Shape mismatch: expected (1,1,28,28), got {out.shape}\"\n    print(\"Shape check passed: g_a ∘ g_s preserves 28×28 ✓\")\n\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n    scheduler = torch.optim.lr_scheduler.StepLR(\n        optimizer, step_size=max(1, N_EPOCHS // 2), gamma=0.5)\n\n    for epoch in range(1, N_EPOCHS + 1):\n        train_loss = train_one_epoch(model, train_loader, optimizer)\n        scheduler.step()\n        if epoch % max(1, N_EPOCHS // 5) == 0 or epoch == 1:\n            print(f\"  Epoch {epoch:3d}/{N_EPOCHS}  train_loss={train_loss:.4f}\")\n\n    rate_bpp, mse = evaluate(model, test_loader)\n    psnr = 10 * math.log10(1.0 / max(mse, 1e-10))\n    print(f\"\\nFinal: rate={rate_bpp:.2f} bits/pixel, \"\n          f\"distortion(MSE)={mse:.4f}, λ={LAM:.3f}\")\n    print(f\"       PSNR = {psnr:.1f} dB\")\n\n    # Visualise 8 test images\n    model.eval()\n    with torch.no_grad():\n        x_batch, _ = next(iter(test_loader))\n        x_batch    = x_batch[:8].to(device)\n        x_hat_b, _ = model(x_batch)\n        x_hat_b    = x_hat_b.clamp(0, 1)\n\n    if not VERIFY:\n        plot_reconstruction_grid(\n            x_batch.cpu().numpy(),\n            x_hat_b.cpu().numpy(),\n            path=\"ex01_grid.png\",\n        )\n    print(\"Done.\")\n"}, {"filename": "ex02_mse_vs_msssim_loss_sidebyside_reconstructions.py", "content": "\"\"\"Exercise 2: MSE vs MS-SSIM Loss — Side-by-Side Reconstructions\n=================================================================\nModule 4: End-to-End Compression on MNIST\n\nThe R+λD framework is agnostic about the choice of distortion metric D.\nIn this exercise you train two identical compression models at the same λ:\n  - Model A: distortion D = MSE(x, x̂)                     (pixel L2 error)\n  - Model B: distortion D = 1 - SSIM(x, x̂)               (structural similarity)\n\nBoth are then evaluated on PSNR and MS-SSIM, letting you see:\n  ┌───────────────┬─────────────────────┬─────────────────────┐\n  │               │   MSE-trained       │   SSIM-trained      │\n  ├───────────────┼─────────────────────┼─────────────────────┤\n  │  PSNR (dB)    │  Higher             │  Lower              │\n  │  MS-SSIM      │  Lower              │  Higher             │\n  │  Appearance   │  Blurry but correct │  Sharp but noisy    │\n  └───────────────┴─────────────────────┴─────────────────────┘\n\nThe paper (Ballé et al. 2017) trains with MSE but still outperforms JPEG\non MS-SSIM — because GDN nonlinearities implicitly encourage structure\npreservation.  Explicitly optimising MS-SSIM takes this further.\n\nCompressionModel (g_a, g_s, GDN, IGDN, rd_loss) are PROVIDED below.\nYou write:\n  (1) mse_loss_fn        — MSE distortion           (~2 lines)\n  (2) ssim_loss_fn       — 1 − SSIM distortion       (~6 lines)\n  (3) train_model        — training loop with loss_fn (~10 lines)\n  (4) comparison_grid    — 3-column matplotlib grid   (~15 lines)\n  (5) metrics_table      — PSNR & MS-SSIM evaluation (~10 lines)\n\nExpected output:\n    \"MSE model: PSNR=XX.X dB, MS-SSIM=0.XXX\"\n    \"MS-SSIM model: PSNR=XX.X dB, MS-SSIM=0.XXX\"\n\"\"\"\n\nimport os\nimport math\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport torchvision\nimport torchvision.transforms as transforms\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom torch.utils.data import TensorDataset, DataLoader\nfrom pytorch_msssim import ssim as pt_ssim\n\n# ---------------------------------------------------------------------------\n# DISTILL_VERIFY: fast CPU mode (synthetic data, 2 training steps, <10 s)\n# ---------------------------------------------------------------------------\nVERIFY     = os.environ.get(\"DISTILL_VERIFY\")\nN_EPOCHS   = 2    if VERIFY else 15\nBATCH_SIZE = 8    if VERIFY else 128\nN_TRAIN    = 32   if VERIFY else 60_000\nLAM        = 1.0\nLATENT_CH  = 16\nN_FILTERS  = 32\ndevice     = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n\n\n# ===========================================================================\n# PROVIDED: GDN / IGDN / CompressionModel (identical to Exercise 1)\n# ===========================================================================\nclass GDN(nn.Module):\n    def __init__(self, num_channels: int, inverse: bool = False):\n        super().__init__()\n        self.inverse   = inverse\n        self.beta_hat  = nn.Parameter(torch.ones(num_channels))\n        self.gamma_hat = nn.Parameter(0.1 * torch.eye(num_channels))\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta    = self.beta_hat.pow(2) + 1e-6\n        gamma   = self.gamma_hat.pow(2)\n        x2      = x.pow(2).view(B, C, H * W)\n        norm_sq = torch.einsum(\"ij,bjk->bik\", gamma, x2)\n        norm_sq = norm_sq.view(B, C, H, W) + beta.view(1, C, 1, 1)\n        norm    = norm_sq.sqrt()\n        return x * norm if self.inverse else x / norm\n\n\ndef IGDN(num_channels: int) -> GDN:\n    return GDN(num_channels, inverse=True)\n\n\nclass AnalysisTransform(nn.Module):\n    def __init__(self, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            nn.Conv2d(1, num_filters, 5, stride=2, padding=2), GDN(num_filters))\n        self.stage2 = nn.Sequential(\n            nn.Conv2d(num_filters, num_filters, 5, stride=2, padding=2), GDN(num_filters))\n        self.stage3 = nn.Sequential(\n            nn.Conv2d(num_filters, latent_ch, 5, stride=2, padding=2), GDN(latent_ch))\n\n    def forward(self, x):\n        return self.stage3(self.stage2(self.stage1(x)))\n\n\nclass SynthesisTransform(nn.Module):\n    def __init__(self, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            IGDN(latent_ch),\n            nn.ConvTranspose2d(latent_ch, num_filters, 5, stride=2, padding=2, output_padding=0))\n        self.stage2 = nn.Sequential(\n            IGDN(num_filters),\n            nn.ConvTranspose2d(num_filters, num_filters, 5, stride=2, padding=2, output_padding=1))\n        self.stage3 = nn.Sequential(\n            IGDN(num_filters),\n            nn.ConvTranspose2d(num_filters, 1, 5, stride=2, padding=2, output_padding=1))\n\n    def forward(self, y_hat):\n        return torch.sigmoid(self.stage3(self.stage2(self.stage1(y_hat))))\n\n\nclass CompressionModel(nn.Module):\n    def __init__(self, lam=LAM, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.lam     = lam\n        self.encoder = AnalysisTransform(num_filters, latent_ch)\n        self.decoder = SynthesisTransform(num_filters, latent_ch)\n\n    def forward(self, x):\n        y = self.encoder(x)\n        if self.training:\n            y_out = y + torch.empty_like(y).uniform_(-0.5, 0.5)\n        else:\n            y_out = torch.round(y)\n        return self.decoder(y_out), y_out\n\n\ndef histogram_entropy(y, num_bins=100):\n    y_flat       = y.detach().reshape(-1).float()\n    y_min, y_max = float(y_flat.min()), float(y_flat.max())\n    with torch.no_grad():\n        counts  = torch.histc(y_flat, bins=num_bins, min=y_min-0.5, max=y_max+0.5)\n        pmf     = (counts / counts.sum()).clamp(min=1e-10)\n        entropy = -(pmf * torch.log2(pmf)).sum()\n    return entropy\n\n\ndef rate_bpp(y_tilde):\n    \"\"\"Return rate in bits/pixel for a batch of latents (B, 16, 4, 4).\"\"\"\n    return histogram_entropy(y_tilde) * (LATENT_CH * 4 * 4) / (28 * 28)\n\n\n# ===========================================================================\n# PROVIDED: data loading\n# ===========================================================================\ndef get_loaders(batch_size=BATCH_SIZE):\n    if VERIFY:\n        X_tr = torch.rand(N_TRAIN, 1, 28, 28)\n        y_tr = torch.randint(0, 10, (N_TRAIN,))\n        X_te = torch.rand(256, 1, 28, 28)\n        y_te = torch.randint(0, 10, (256,))\n        train_ds = TensorDataset(X_tr, y_tr)\n        test_ds  = TensorDataset(X_te, y_te)\n    else:\n        tf = transforms.ToTensor()\n        train_ds = torchvision.datasets.MNIST(\"./data\", True,  download=True, transform=tf)\n        test_ds  = torchvision.datasets.MNIST(\"./data\", False, download=True, transform=tf)\n\n    train_loader = DataLoader(train_ds, BATCH_SIZE, shuffle=True,  num_workers=0)\n    test_loader  = DataLoader(test_ds,  BATCH_SIZE, shuffle=False, num_workers=0)\n    return train_loader, test_loader\n\n\n# ===========================================================================\n# YOUR CODE (1/5): mse_loss_fn\n# ===========================================================================\ndef mse_loss_fn(x: torch.Tensor, x_hat: torch.Tensor) -> torch.Tensor:\n    \"\"\"MSE distortion: D = mean pixel squared error.\n\n    Args:\n        x:     original images (B, 1, 28, 28) in [0, 1]\n        x_hat: reconstructions (B, 1, 28, 28) in [0, 1]\n    Returns:\n        scalar MSE value ∈ [0, 1]\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 1-2 lines                              #\n    #                                                         #\n    # Use F.mse_loss(x_hat, x)                               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (2/5): ssim_loss_fn\n# ===========================================================================\ndef ssim_loss_fn(x: torch.Tensor, x_hat: torch.Tensor) -> torch.Tensor:\n    \"\"\"SSIM distortion: D = 1 − SSIM(x, x̂).\n\n    We use single-scale SSIM from pytorch_msssim instead of full MS-SSIM\n    because 28×28 images are too small for 5-scale MS-SSIM (minimum size\n    is ~160×160 for the default 11×11 Gaussian window at 5 scales).\n\n    SSIM ∈ [0, 1] where 1 = identical, so 1−SSIM ∈ [0, 1] is a valid\n    minimisation target (like MSE, lower is better).\n\n    Args:\n        x:     original images (B, 1, 28, 28) in [0, 1]\n        x_hat: reconstructions (B, 1, 28, 28) in [0, 1]\n    Returns:\n        scalar SSIM-distortion value ∈ [0, 1]\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 4-6 lines                              #\n    #                                                         #\n    # Call:  pt_ssim(x_hat, x, data_range=1.0,               #\n    #                size_average=True, win_size=7)           #\n    # Note: win_size=7 fits in 28×28 (default 11×11 is too   #\n    # large for very small images after SSIM window clipping).#\n    # Return 1.0 - ssim_val so it is a loss (lower = better).#\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (3/5): train_model\n# ===========================================================================\ndef train_model(loss_fn, lam: float = LAM, n_epochs: int = N_EPOCHS,\n                train_loader=None) -> CompressionModel:\n    \"\"\"Train one CompressionModel with the given distortion loss function.\n\n    The total loss is  L = rate_bpp + λ · loss_fn(x, x̂).\n    Uses Adam lr=1e-3 with StepLR halving.\n\n    Args:\n        loss_fn:      callable (x, x_hat) → scalar distortion\n        lam:          rate-distortion weight\n        n_epochs:     number of training epochs\n        train_loader: DataLoader (uses module-level default if None)\n    Returns:\n        trained CompressionModel in eval mode\n    \"\"\"\n    if train_loader is None:\n        train_loader, _ = get_loaders()\n\n    ###########################################################\n    # YOUR CODE HERE — ~15 lines                              #\n    #                                                         #\n    # 1. Build model = CompressionModel(lam=lam).to(device)  #\n    # 2. Build Adam optimizer (lr=1e-3)                       #\n    # 3. Build StepLR scheduler (step=max(1, n_epochs//2),   #\n    #    gamma=0.5)                                           #\n    # 4. For each epoch:                                      #\n    #      model.train()                                      #\n    #      for x, _ in train_loader:                         #\n    #        zero_grad, forward, compute loss, backward, step #\n    #        loss = rate_bpp(y_tilde) + lam * loss_fn(x, x̂) #\n    #        clip gradients with max_norm=1.0                 #\n    #      scheduler.step()                                   #\n    # 5. Return model.eval()                                  #\n    #                                                         #\n    # Hint: x_hat = x_hat.clamp(0, 1) after forward pass     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (4/5): comparison_grid\n# ===========================================================================\ndef comparison_grid(originals, mse_recons, ssim_recons,\n                    path=\"ex02_comparison.png\"):\n    \"\"\"Plot a 3-column grid: Original | MSE reconstruction | SSIM reconstruction.\n\n    Each row is one image.  Titles show which column is which.\n\n    Args:\n        originals:   list/array of (1, 28, 28) images in [0, 1]\n        mse_recons:  list/array of MSE-model reconstructions\n        ssim_recons: list/array of SSIM-model reconstructions\n        path:        output PNG file path\n    Returns:\n        None (saves figure to path)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~15 lines                              #\n    #                                                         #\n    # n = min(16, len(originals))                             #\n    # fig, axes = plt.subplots(n, 3, figsize=(6, n * 2))     #\n    # For each row i:                                         #\n    #   axes[i, 0] ← originals[i]   (cmap=\"gray\")            #\n    #   axes[i, 1] ← mse_recons[i]  (cmap=\"gray\")            #\n    #   axes[i, 2] ← ssim_recons[i] (cmap=\"gray\")            #\n    #   turn off axis ticks for all three                     #\n    # Set column titles (row 0 only):                         #\n    #   \"Original\", \"MSE reconstruction\", \"SSIM reconstruction\"#\n    # plt.tight_layout(); savefig; plt.close()                #\n    # Print \"Saved → {path}\"                                  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (5/5): metrics_table\n# ===========================================================================\n@torch.no_grad()\ndef metrics_table(mse_model, ssim_model, test_loader):\n    \"\"\"Compute PSNR and MS-SSIM for both models on the test set.\n\n    Args:\n        mse_model:  trained CompressionModel (MSE distortion)\n        ssim_model: trained CompressionModel (SSIM distortion)\n        test_loader: DataLoader\n    Returns:\n        dict with keys 'mse' and 'ssim', each a dict:\n          {'psnr': float, 'ms_ssim': float, 'rate_bpp': float}\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~20 lines                              #\n    #                                                         #\n    # For each model in [mse_model, ssim_model]:             #\n    #   model.eval()                                          #\n    #   Iterate test_loader:                                  #\n    #     x_hat, y_hat = model(x)                            #\n    #     x_hat = x_hat.clamp(0, 1)                          #\n    #     Accumulate: MSE, SSIM score, rate_bpp(y_hat)       #\n    #   Compute:                                              #\n    #     psnr = 10 * log10(1 / mean_mse)                    #\n    #     ms_ssim = mean SSIM score                          #\n    #     rate = mean rate_bpp                               #\n    #                                                         #\n    # Return {'mse': {...}, 'ssim': {...}}                    #\n    # Hint: use pt_ssim(x_hat, x, data_range=1.0,           #\n    #                   size_average=True, win_size=7)       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# PROVIDED: __main__ harness — do not modify\n# ===========================================================================\nif __name__ == \"__main__\":\n    print(f\"Device: {device}  |  VERIFY={bool(VERIFY)}  |  λ={LAM}\")\n    print(f\"Epochs: {N_EPOCHS}  |  Batch: {BATCH_SIZE}\")\n\n    train_loader, test_loader = get_loaders()\n\n    print(\"\\nTraining MSE model...\")\n    mse_model = train_model(mse_loss_fn, lam=LAM, n_epochs=N_EPOCHS,\n                            train_loader=train_loader)\n\n    print(\"Training SSIM model...\")\n    ssim_model = train_model(ssim_loss_fn, lam=LAM, n_epochs=N_EPOCHS,\n                             train_loader=train_loader)\n\n    print(\"\\nEvaluating both models on test set...\")\n    results = metrics_table(mse_model, ssim_model, test_loader)\n    r_mse  = results[\"mse\"]\n    r_ssim = results[\"ssim\"]\n    print(f\"MSE model:  PSNR={r_mse['psnr']:.1f} dB, \"\n          f\"MS-SSIM={r_mse['ms_ssim']:.3f}, \"\n          f\"rate={r_mse['rate_bpp']:.2f} bits/pixel\")\n    print(f\"SSIM model: PSNR={r_ssim['psnr']:.1f} dB, \"\n          f\"MS-SSIM={r_ssim['ms_ssim']:.3f}, \"\n          f\"rate={r_ssim['rate_bpp']:.2f} bits/pixel\")\n\n    # Collect images for grid\n    x_batch, _ = next(iter(test_loader))\n    x_batch = x_batch[:16].to(device)\n\n    mse_model.eval()\n    ssim_model.eval()\n    with torch.no_grad():\n        mse_out,  _ = mse_model(x_batch)\n        ssim_out, _ = ssim_model(x_batch)\n        mse_out  = mse_out.clamp(0, 1)\n        ssim_out = ssim_out.clamp(0, 1)\n\n    if not VERIFY:\n        comparison_grid(\n            x_batch.cpu().numpy(),\n            mse_out.cpu().numpy(),\n            ssim_out.cpu().numpy(),\n            path=\"ex02_comparison.png\",\n        )\n    print(\"Done.\")\n"}, {"filename": "ex03_visualizing_the_latent_space_with_tsne.py", "content": "\"\"\"Exercise 3: Visualizing the Latent Space with t-SNE\n=======================================================\nModule 4: End-to-End Compression on MNIST\n\nAfter training the analysis transform g_a, every MNIST test image maps to\na 256-dimensional latent vector y = g_a(x) ∈ ℝ^{16×4×4}.  t-SNE projects\nthese to 2D for visualization.\n\nThree diagnostic plots in a 1×3 figure:\n  ┌─────────────────────────────────────────────────────────────────┐\n  │  Left: t-SNE scatter — 10 colours for 10 digit classes          │\n  │         If the encoder is working, digits cluster by class      │\n  │  Mid:  Bar chart — unique quantized codewords per digit class   │\n  │         Simple digits (\"1\") use fewer codewords than \"8\"        │\n  │  Right: 2D histogram — joint distribution of two latent dims    │\n  │         Near-rectangular → dimensions are nearly independent    │\n  └─────────────────────────────────────────────────────────────────┘\n\nPrints:\n    \"Estimated MI between dim X and dim Y: X.XX nats\"\n\nThe entire compression pipeline (g_a, g_s, CompressionModel) is PROVIDED.\nYou write:\n  (1) encode_all                — batch-encode MNIST into latent space (~8 lines)\n  (2) tsne_plot                 — t-SNE scatter coloured by class    (~12 lines)\n  (3) codeword_histogram        — unique codewords per digit class   (~12 lines)\n  (4) marginal_independence_check — 2D joint histogram + MI estimate (~15 lines)\n\"\"\"\n\nimport os\nimport math\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport torchvision\nimport torchvision.transforms as transforms\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom torch.utils.data import TensorDataset, DataLoader\nfrom sklearn.manifold import TSNE\n\n# ---------------------------------------------------------------------------\n# DISTILL_VERIFY: fast CPU mode — synthetic data, tiny t-SNE\n# ---------------------------------------------------------------------------\nVERIFY     = os.environ.get(\"DISTILL_VERIFY\")\nN_EPOCHS   = 2    if VERIFY else 20      # training epochs\nBATCH_SIZE = 8    if VERIFY else 128\nN_TRAIN    = 64   if VERIFY else 60_000\nN_TSNE      = 60   if VERIFY else 3000    # samples fed to t-SNE\nN_ITER_TSNE = 250  if VERIFY else 1000   # t-SNE iterations (sklearn min = 250)\nLATENT_CH  = 16\nN_FILTERS  = 32\ndevice     = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n\n\n# ===========================================================================\n# PROVIDED: GDN / IGDN / CompressionModel (from Exercise 1)\n# ===========================================================================\nclass GDN(nn.Module):\n    def __init__(self, num_channels: int, inverse: bool = False):\n        super().__init__()\n        self.inverse   = inverse\n        self.beta_hat  = nn.Parameter(torch.ones(num_channels))\n        self.gamma_hat = nn.Parameter(0.1 * torch.eye(num_channels))\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta    = self.beta_hat.pow(2) + 1e-6\n        gamma   = self.gamma_hat.pow(2)\n        x2      = x.pow(2).view(B, C, H * W)\n        norm_sq = torch.einsum(\"ij,bjk->bik\", gamma, x2)\n        norm_sq = norm_sq.view(B, C, H, W) + beta.view(1, C, 1, 1)\n        norm    = norm_sq.sqrt()\n        return x * norm if self.inverse else x / norm\n\n\ndef IGDN(num_channels: int) -> GDN:\n    return GDN(num_channels, inverse=True)\n\n\nclass AnalysisTransform(nn.Module):\n    def __init__(self, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            nn.Conv2d(1, num_filters, 5, stride=2, padding=2), GDN(num_filters))\n        self.stage2 = nn.Sequential(\n            nn.Conv2d(num_filters, num_filters, 5, stride=2, padding=2), GDN(num_filters))\n        self.stage3 = nn.Sequential(\n            nn.Conv2d(num_filters, latent_ch, 5, stride=2, padding=2), GDN(latent_ch))\n\n    def forward(self, x):\n        return self.stage3(self.stage2(self.stage1(x)))\n\n\nclass SynthesisTransform(nn.Module):\n    def __init__(self, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            IGDN(latent_ch),\n            nn.ConvTranspose2d(latent_ch, num_filters, 5, stride=2, padding=2, output_padding=0))\n        self.stage2 = nn.Sequential(\n            IGDN(num_filters),\n            nn.ConvTranspose2d(num_filters, num_filters, 5, stride=2, padding=2, output_padding=1))\n        self.stage3 = nn.Sequential(\n            IGDN(num_filters),\n            nn.ConvTranspose2d(num_filters, 1, 5, stride=2, padding=2, output_padding=1))\n\n    def forward(self, y_hat):\n        return torch.sigmoid(self.stage3(self.stage2(self.stage1(y_hat))))\n\n\nclass CompressionModel(nn.Module):\n    def __init__(self, lam=0.5, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.lam     = lam\n        self.encoder = AnalysisTransform(num_filters, latent_ch)\n        self.decoder = SynthesisTransform(num_filters, latent_ch)\n\n    def forward(self, x):\n        y = self.encoder(x)\n        if self.training:\n            y_out = y + torch.empty_like(y).uniform_(-0.5, 0.5)\n        else:\n            y_out = torch.round(y)\n        return self.decoder(y_out), y_out\n\n\ndef histogram_entropy(y, num_bins=100):\n    y_flat       = y.detach().reshape(-1).float()\n    y_min, y_max = float(y_flat.min()), float(y_flat.max())\n    with torch.no_grad():\n        counts  = torch.histc(y_flat, bins=num_bins, min=y_min-0.5, max=y_max+0.5)\n        pmf     = (counts / counts.sum()).clamp(min=1e-10)\n        entropy = -(pmf * torch.log2(pmf)).sum()\n    return entropy\n\n\n# ===========================================================================\n# PROVIDED: data loading + quick training\n# ===========================================================================\ndef get_loaders(batch_size=BATCH_SIZE):\n    if VERIFY:\n        # Generate balanced synthetic data: 10 digits × N_TRAIN//10 each\n        n_per_class = max(1, N_TRAIN // 10)\n        X = torch.rand(n_per_class * 10, 1, 28, 28)\n        y = torch.repeat_interleave(torch.arange(10), n_per_class)\n        X_te = torch.rand(n_per_class * 10, 1, 28, 28)\n        y_te = torch.repeat_interleave(torch.arange(10), n_per_class)\n        train_ds = TensorDataset(X, y)\n        test_ds  = TensorDataset(X_te, y_te)\n    else:\n        tf = transforms.ToTensor()\n        train_ds = torchvision.datasets.MNIST(\"./data\", True,  download=True, transform=tf)\n        test_ds  = torchvision.datasets.MNIST(\"./data\", False, download=True, transform=tf)\n\n    train_loader = DataLoader(train_ds, BATCH_SIZE, shuffle=True,  num_workers=0)\n    test_loader  = DataLoader(test_ds,  BATCH_SIZE, shuffle=False, num_workers=0)\n    return train_loader, test_loader\n\n\ndef train_encoder(train_loader, lam=0.5, n_epochs=N_EPOCHS) -> CompressionModel:\n    \"\"\"Quick training to get a partially learned encoder for visualisation.\"\"\"\n    model     = CompressionModel(lam=lam).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n    model.train()\n    for epoch in range(n_epochs):\n        for x, _ in train_loader:\n            x = x.to(device)\n            optimizer.zero_grad()\n            x_hat, y_tilde = model(x)\n            x_hat = x_hat.clamp(0, 1)\n            rate_term = histogram_entropy(y_tilde) * (LATENT_CH * 4 * 4) / (28 * 28)\n            dist_term = F.mse_loss(x_hat, x)\n            loss = rate_term + lam * dist_term\n            loss.backward()\n            nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n    model.eval()\n    return model\n\n\n# ===========================================================================\n# YOUR CODE (1/4): encode_all\n# ===========================================================================\n@torch.no_grad()\ndef encode_all(model: CompressionModel, loader: DataLoader):\n    \"\"\"Encode all images in loader through the analysis transform g_a.\n\n    Returns raw (continuous) latents — NOT quantised.  This gives a\n    smoother latent space for t-SNE than rounding to integers.\n\n    Args:\n        model:  trained CompressionModel (encoder is model.encoder)\n        loader: DataLoader yielding (images, labels) pairs\n    Returns:\n        latents: (N, LATENT_CH*4*4) float tensor — one row per image\n        labels:  (N,) long tensor — digit class labels 0-9\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~10 lines                              #\n    #                                                         #\n    # model.eval()                                            #\n    # latents_list, labels_list = [], []                      #\n    # for x, y in loader:                                     #\n    #   z = model.encoder(x.to(device))  # (B, 16, 4, 4)    #\n    #   # reshape to (B, 256) for t-SNE                       #\n    #   latents_list.append(z.cpu().reshape(len(x), -1))      #\n    #   labels_list.append(y)                                 #\n    # return torch.cat(latents_list), torch.cat(labels_list)  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (2/4): tsne_plot\n# ===========================================================================\ndef tsne_plot(ax, latents: torch.Tensor, labels: torch.Tensor,\n              n_samples: int = N_TSNE, n_iter: int = N_ITER_TSNE):\n    \"\"\"Run t-SNE and plot a coloured scatter of the latent space.\n\n    Use tab10 colourmap so each of the 10 digit classes gets a distinct colour.\n\n    Important t-SNE caveats to include as a text annotation on the axes:\n      - Cluster membership is meaningful; distances are NOT.\n      - Subsample to n_samples for speed.\n\n    Args:\n        ax:       matplotlib Axes to plot on\n        latents:  (N, D) float tensor of latent vectors\n        labels:   (N,) long tensor of digit labels\n        n_samples: how many points to pass to t-SNE (subsample if N > n_samples)\n        n_iter:   number of t-SNE gradient steps\n    Returns:\n        None (draws into ax)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~12 lines                              #\n    #                                                         #\n    # 1. Subsample: pick min(n_samples, N) random indices    #\n    #    idx = torch.randperm(len(latents))[:n_samples]       #\n    #    z   = latents[idx].numpy()                           #\n    #    lbl = labels[idx].numpy()                            #\n    #                                                         #\n    # 2. Run t-SNE:                                           #\n    #    z2d = TSNE(n_components=2, perplexity=min(30, n//4),#\n    #               max_iter=n_iter,                          #\n    #               random_state=42).fit_transform(z)         #\n    #                                                         #\n    # 3. Scatter:                                             #\n    #    sc = ax.scatter(z2d[:,0], z2d[:,1], c=lbl,          #\n    #                    cmap='tab10', alpha=0.6, s=6,        #\n    #                    vmin=-0.5, vmax=9.5)                  #\n    #    plt.colorbar(sc, ax=ax, label=\"Digit class\",        #\n    #                 ticks=range(10))                        #\n    #                                                         #\n    # 4. ax.set_title(\"Latent space (t-SNE)\")                #\n    #    ax.set_xlabel(\"t-SNE dim 1\")                         #\n    #    ax.set_ylabel(\"t-SNE dim 2\")                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (3/4): codeword_histogram\n# ===========================================================================\ndef codeword_histogram(ax, model: CompressionModel, loader: DataLoader):\n    \"\"\"Count unique quantised codewords per digit class, plot as bar chart.\n\n    A codeword = round(g_a(x)) ∈ ℤ^{256}.  Classes with simpler structure\n    (\"1\", \"7\") use fewer unique codewords; complex ones (\"8\", \"9\") use more.\n\n    Args:\n        ax:     matplotlib Axes\n        model:  trained CompressionModel\n        loader: DataLoader\n    Returns:\n        None (draws into ax)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~15 lines                              #\n    #                                                         #\n    # model.eval()                                            #\n    # all_codes, all_labels = [], []                          #\n    # with torch.no_grad():                                   #\n    #   for x, y in loader:                                   #\n    #     q = torch.round(model.encoder(x.to(device)))       #\n    #     all_codes.append(q.cpu().reshape(len(x), -1))       #\n    #     all_labels.append(y)                                #\n    # codes  = torch.cat(all_codes)                           #\n    # labels = torch.cat(all_labels)                          #\n    #                                                         #\n    # For each digit 0..9:                                    #\n    #   mask = labels == digit                                #\n    #   n_unique = len(torch.unique(codes[mask], dim=0))      #\n    #                                                         #\n    # Plot: ax.bar(range(10), n_unique_per_digit)             #\n    # ax.set_xticks(range(10)); ax.set_xlabel(\"Digit class\") #\n    # ax.set_ylabel(\"Unique codewords\")                       #\n    # ax.set_title(\"Codeword diversity per digit\")            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (4/4): marginal_independence_check\n# ===========================================================================\ndef marginal_independence_check(ax, latents: torch.Tensor,\n                                dim1: int = 0, dim2: int = 1):\n    \"\"\"Plot 2D joint histogram of two latent dims; estimate mutual information.\n\n    The entropy model assumes latent channels are independent:\n        p(ŷ) = Π_i p(ŷ_i)\n    If this holds, the joint p(z_{d1}, z_{d2}) factorises and the 2D\n    histogram should look like the outer product of two marginals\n    (a rectangular cloud, not a tilted ellipse or banana).\n\n    Mutual information:\n        I(z_a ; z_b) = Σ p(z_a, z_b) log[p(z_a, z_b) / (p(z_a) p(z_b))]\n\n    Estimated from a 2D histogram.  If I ≈ 0, the pair is nearly independent.\n\n    Args:\n        ax:      matplotlib Axes\n        latents: (N, D) float tensor — use columns dim1 and dim2\n        dim1, dim2: which latent dimensions to compare\n    Returns:\n        mi_nats: float — estimated mutual information in nats\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~18 lines                              #\n    #                                                         #\n    # z1 = latents[:, dim1].numpy()                           #\n    # z2 = latents[:, dim2].numpy()                           #\n    #                                                         #\n    # 1. 2D histogram:                                        #\n    #    H, xe, ye = np.histogram2d(z1, z2, bins=20)         #\n    #    Show with ax.imshow(H.T, origin='lower', ...)        #\n    #    Set ax labels and title.                             #\n    #                                                         #\n    # 2. MI estimate from the histogram probabilities:        #\n    #    dx = xe[1]-xe[0];  dy = ye[1]-ye[0]                 #\n    #    joint = H / (H.sum() * dx * dy)   # joint density   #\n    #    px    = joint.sum(axis=1) * dy    # marginal p(z1)  #\n    #    py    = joint.sum(axis=0) * dx    # marginal p(z2)  #\n    #    prod  = np.outer(px, py)          # p(z1)*p(z2)     #\n    #    mask  = (joint > 0) & (prod > 0)                    #\n    #    mi    = (joint[mask] *                               #\n    #             np.log(joint[mask] / prod[mask])).sum()     #\n    #             * dx * dy     # nats                        #\n    #    mi    = float(max(0.0, mi))                          #\n    #                                                         #\n    # 3. Add text annotation: ax.set_title(f\"MI≈{mi:.3f} nats\")#\n    # 4. return mi                                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# PROVIDED: __main__ harness — do not modify\n# ===========================================================================\nif __name__ == \"__main__\":\n    print(f\"Device: {device}  |  VERIFY={bool(VERIFY)}\")\n    print(f\"Training {N_EPOCHS} epochs, t-SNE on {N_TSNE} points\")\n\n    train_loader, test_loader = get_loaders()\n\n    print(\"Training encoder...\")\n    model = train_encoder(train_loader, lam=0.5, n_epochs=N_EPOCHS)\n\n    print(\"Encoding test set...\")\n    latents, labels = encode_all(model, test_loader)\n    print(f\"  Latents shape: {latents.shape}  (N × {latents.shape[1]} dims)\")\n\n    # ── Three-panel figure ──────────────────────────────────────────────────\n    fig, axes = plt.subplots(1, 3, figsize=(15, 5))\n\n    print(\"Running t-SNE...\")\n    tsne_plot(axes[0], latents, labels)\n\n    print(\"Counting unique codewords...\")\n    codeword_histogram(axes[1], model, test_loader)\n\n    print(\"Checking marginal independence...\")\n    # Pick two latent dims (flattened): dim0 and dim1 of the 256-dim vector\n    d1, d2 = 0, 1\n    mi = marginal_independence_check(axes[2], latents, dim1=d1, dim2=d2)\n\n    plt.suptitle(\"Latent Space Analysis (Module 4, Exercise 3)\", fontsize=12)\n    plt.tight_layout()\n    if not VERIFY:\n        plt.savefig(\"ex03_latent_space.png\", dpi=120, bbox_inches=\"tight\")\n        print(\"Saved → ex03_latent_space.png\")\n    else:\n        plt.savefig(\"ex03_latent_space_verify.png\", dpi=80, bbox_inches=\"tight\")\n\n    print(f\"\\nEstimated MI between dim {d1} and dim {d2}: {mi:.3f} nats\")\n    print(\"Done.\")\n"}, {"filename": "ex04_sweeping_λ_the_ratedistortion_curve_on_mnist.py", "content": "\"\"\"Exercise 4: Sweeping λ — The Rate-Distortion Curve on MNIST\n================================================================\nModule 4: End-to-End Compression on MNIST\n\nEach value of λ in  L = R + λD  corresponds to a different operating\npoint on the rate-distortion curve.  In this exercise you:\n\n  1. Train one CompressionModel per λ (6 values, log-spaced)\n  2. Evaluate each model: rate (bits/pixel), PSNR, MS-SSIM\n  3. Compress the same images with JPEG (5 quality levels)\n  4. Plot both on a shared R-D axis  (Rate vs PSNR  |  Rate vs MS-SSIM)\n\nExpected milestone:\n  ┌───────────────────────────────────────────────────────────────┐\n  │  Two subplots: left = PSNR curve, right = MS-SSIM curve      │\n  │  Learned model (blue circles) should be above and to the     │\n  │  left of JPEG (red triangles), especially on MS-SSIM.        │\n  │  Note: learned-model rate is entropy-estimated (theoretical  │\n  │  lower bound); JPEG rate includes header overhead.            │\n  └───────────────────────────────────────────────────────────────┘\n\nPrinted:\n  \"λ=X.XXXX: rate=X.XX bits/pixel, PSNR=XX.X dB, MS-SSIM=0.XXX\"\n\nCompressionModel, training utilities and JPEG compression are PROVIDED.\nYou write:\n  (1) train_for_lambda     — train one model per λ             (~8 lines)\n  (2) evaluate_model       — return rate/PSNR/MS-SSIM dict     (~18 lines)\n  (3) jpeg_baseline        — PIL-based JPEG compression         (~20 lines)\n  (4) rd_curve_plot        — 1×2 subplot with both methods      (~20 lines)\n  (5) lambda_annotation    — annotate λ values next to points   (~8 lines)\n\"\"\"\n\nimport os\nimport io\nimport math\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport torchvision\nimport torchvision.transforms as transforms\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom PIL import Image\nfrom torch.utils.data import TensorDataset, DataLoader\nfrom pytorch_msssim import ssim as pt_ssim\n\n# ---------------------------------------------------------------------------\n# DISTILL_VERIFY: fast CPU mode\n# ---------------------------------------------------------------------------\nVERIFY     = os.environ.get(\"DISTILL_VERIFY\")\nN_EPOCHS   = 2    if VERIFY else 15       # epochs per lambda model\nBATCH_SIZE = 8    if VERIFY else 128\nN_TRAIN    = 32   if VERIFY else 60_000\n# Lambda sweep: 3 values in verify, 6 in full run\nLAMBDA_VALUES = [0.1, 1.0, 5.0] if VERIFY else [0.001, 0.01, 0.05, 0.1, 0.5, 1.0]\nJPEG_QUALITIES = [10, 25] if VERIFY else [5, 10, 25, 50, 75]\nN_JPEG_IMAGES  = 20   if VERIFY else 200   # images for JPEG rate estimation\nLATENT_CH  = 16\nN_FILTERS  = 32\ndevice     = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n\n\n# ===========================================================================\n# PROVIDED: GDN / IGDN / CompressionModel (from Exercise 1)\n# ===========================================================================\nclass GDN(nn.Module):\n    def __init__(self, num_channels: int, inverse: bool = False):\n        super().__init__()\n        self.inverse   = inverse\n        self.beta_hat  = nn.Parameter(torch.ones(num_channels))\n        self.gamma_hat = nn.Parameter(0.1 * torch.eye(num_channels))\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta    = self.beta_hat.pow(2) + 1e-6\n        gamma   = self.gamma_hat.pow(2)\n        x2      = x.pow(2).view(B, C, H * W)\n        norm_sq = torch.einsum(\"ij,bjk->bik\", gamma, x2)\n        norm_sq = norm_sq.view(B, C, H, W) + beta.view(1, C, 1, 1)\n        norm    = norm_sq.sqrt()\n        return x * norm if self.inverse else x / norm\n\n\ndef IGDN(num_channels: int) -> GDN:\n    return GDN(num_channels, inverse=True)\n\n\nclass AnalysisTransform(nn.Module):\n    def __init__(self, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            nn.Conv2d(1, num_filters, 5, stride=2, padding=2), GDN(num_filters))\n        self.stage2 = nn.Sequential(\n            nn.Conv2d(num_filters, num_filters, 5, stride=2, padding=2), GDN(num_filters))\n        self.stage3 = nn.Sequential(\n            nn.Conv2d(num_filters, latent_ch, 5, stride=2, padding=2), GDN(latent_ch))\n\n    def forward(self, x):\n        return self.stage3(self.stage2(self.stage1(x)))\n\n\nclass SynthesisTransform(nn.Module):\n    def __init__(self, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            IGDN(latent_ch),\n            nn.ConvTranspose2d(latent_ch, num_filters, 5, stride=2, padding=2, output_padding=0))\n        self.stage2 = nn.Sequential(\n            IGDN(num_filters),\n            nn.ConvTranspose2d(num_filters, num_filters, 5, stride=2, padding=2, output_padding=1))\n        self.stage3 = nn.Sequential(\n            IGDN(num_filters),\n            nn.ConvTranspose2d(num_filters, 1, 5, stride=2, padding=2, output_padding=1))\n\n    def forward(self, y_hat):\n        return torch.sigmoid(self.stage3(self.stage2(self.stage1(y_hat))))\n\n\nclass CompressionModel(nn.Module):\n    def __init__(self, lam=0.1, num_filters=N_FILTERS, latent_ch=LATENT_CH):\n        super().__init__()\n        self.lam     = lam\n        self.encoder = AnalysisTransform(num_filters, latent_ch)\n        self.decoder = SynthesisTransform(num_filters, latent_ch)\n\n    def forward(self, x):\n        y = self.encoder(x)\n        if self.training:\n            y_out = y + torch.empty_like(y).uniform_(-0.5, 0.5)\n        else:\n            y_out = torch.round(y)\n        return self.decoder(y_out), y_out\n\n\ndef histogram_entropy(y, num_bins=100):\n    y_flat       = y.detach().reshape(-1).float()\n    y_min, y_max = float(y_flat.min()), float(y_flat.max())\n    with torch.no_grad():\n        counts  = torch.histc(y_flat, bins=num_bins, min=y_min-0.5, max=y_max+0.5)\n        pmf     = (counts / counts.sum()).clamp(min=1e-10)\n        entropy = -(pmf * torch.log2(pmf)).sum()\n    return entropy\n\n\ndef rate_bpp(y_tilde):\n    \"\"\"Convert histogram entropy of latents → bits/pixel.\"\"\"\n    return histogram_entropy(y_tilde) * (LATENT_CH * 4 * 4) / (28 * 28)\n\n\n# ===========================================================================\n# PROVIDED: data loading\n# ===========================================================================\ndef get_loaders(batch_size=BATCH_SIZE):\n    if VERIFY:\n        X_tr = torch.rand(N_TRAIN, 1, 28, 28)\n        y_tr = torch.randint(0, 10, (N_TRAIN,))\n        X_te = torch.rand(200, 1, 28, 28)\n        y_te = torch.randint(0, 10, (200,))\n        train_ds = TensorDataset(X_tr, y_tr)\n        test_ds  = TensorDataset(X_te, y_te)\n    else:\n        tf = transforms.ToTensor()\n        train_ds = torchvision.datasets.MNIST(\"./data\", True,  download=True, transform=tf)\n        test_ds  = torchvision.datasets.MNIST(\"./data\", False, download=True, transform=tf)\n\n    train_loader = DataLoader(train_ds, BATCH_SIZE, shuffle=True,  num_workers=0)\n    test_loader  = DataLoader(test_ds,  BATCH_SIZE, shuffle=False, num_workers=0)\n    return train_loader, test_loader\n\n\n# ===========================================================================\n# YOUR CODE (1/5): train_for_lambda\n# ===========================================================================\ndef train_for_lambda(lam: float, train_loader,\n                     n_epochs: int = N_EPOCHS) -> CompressionModel:\n    \"\"\"Train one CompressionModel for a given λ value.\n\n    Training loop: Adam lr=1e-3, StepLR halving at n_epochs//2.\n    Loss: rate_bpp(y_tilde) + λ · MSE(x, x̂)\n\n    Args:\n        lam:          rate-distortion trade-off weight\n        train_loader: DataLoader\n        n_epochs:     number of training epochs\n    Returns:\n        trained CompressionModel in eval() mode\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~12 lines                              #\n    #                                                         #\n    # 1. model = CompressionModel(lam=lam).to(device)        #\n    # 2. optimizer = torch.optim.Adam(model.parameters(),    #\n    #                                  lr=1e-3)               #\n    # 3. scheduler = StepLR(step=max(1, n_epochs//2),        #\n    #                        gamma=0.5)                       #\n    # 4. for epoch in range(n_epochs):                       #\n    #       model.train()                                     #\n    #       for x, _ in train_loader:                        #\n    #         forward → loss = rate + lam * mse → backward   #\n    #         clip grad norm 1.0                             #\n    #         optimizer.step()                               #\n    #       scheduler.step()                                  #\n    # 5. return model.eval()                                  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (2/5): evaluate_model\n# ===========================================================================\n@torch.no_grad()\ndef evaluate_model(model: CompressionModel, test_loader) -> dict:\n    \"\"\"Evaluate a trained model on the test set.\n\n    Computes: mean rate (bits/pixel), mean MSE, PSNR, mean MS-SSIM.\n    Uses actual rounding (model.eval() mode), not uniform noise.\n\n    Args:\n        model:       trained CompressionModel in eval() mode\n        test_loader: DataLoader\n    Returns:\n        dict with keys:\n          'rate_bpp': float — mean bits per pixel (entropy estimate)\n          'mse':      float — mean pixel MSE ∈ [0, 1]\n          'psnr':     float — 10·log10(1/mse) dB\n          'ms_ssim':  float — mean SSIM score ∈ [0, 1]\n          'lam':      float — λ value (copy from model.lam)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~18 lines                              #\n    #                                                         #\n    # model.eval()                                            #\n    # tot_rate, tot_mse, tot_ssim, n = 0., 0., 0., 0         #\n    # for x, _ in test_loader:                               #\n    #   x = x.to(device)                                     #\n    #   x_hat, y_hat = model(x)                              #\n    #   x_hat = x_hat.clamp(0, 1)                            #\n    #   Accumulate:                                           #\n    #     tot_rate += rate_bpp(y_hat).item()                  #\n    #     tot_mse  += F.mse_loss(x_hat, x).item()            #\n    #     tot_ssim += pt_ssim(x_hat, x,                      #\n    #                   data_range=1.0,                       #\n    #                   size_average=True,                    #\n    #                   win_size=7).item()                    #\n    #     n += 1                                              #\n    # Compute means; PSNR = 10*log10(1/mean_mse)             #\n    # Return dict.                                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (3/5): jpeg_baseline\n# ===========================================================================\ndef jpeg_baseline(test_images: torch.Tensor,\n                  qualities=None) -> list:\n    \"\"\"Compress grayscale images with JPEG via PIL; measure rate and quality.\n\n    IMPORTANT: JPEG includes a fixed header (~300-600 bytes) that dominates\n    the file size for tiny 28×28 images.  The bits/pixel here is therefore\n    higher than for a dedicated stream-based codec.  This makes the learned\n    model look very good, but the comparison is common practice — learned\n    model rates are entropy-estimated lower bounds.\n\n    Args:\n        test_images: (N, 1, 28, 28) tensor in [0, 1]\n        qualities:   list of JPEG quality integers (1-95)\n    Returns:\n        list of dicts, one per quality level:\n          {'quality': int, 'rate_bpp': float, 'mse': float,\n           'psnr': float, 'ms_ssim': float}\n    \"\"\"\n    if qualities is None:\n        qualities = JPEG_QUALITIES\n\n    ###########################################################\n    # YOUR CODE HERE — ~25 lines                              #\n    #                                                         #\n    # results = []                                            #\n    # for quality in qualities:                               #\n    #   total_bits, total_mse, total_ssim, n = 0., 0., 0., 0 #\n    #   for img_tensor in test_images[:N_JPEG_IMAGES]:        #\n    #     # Convert (1,28,28) float → uint8 PIL image         #\n    #     img_np  = (img_tensor.squeeze().numpy() * 255)      #\n    #     img_pil = Image.fromarray(img_np.astype(np.uint8),  #\n    #                               mode='L')                 #\n    #                                                         #\n    #     # Compress to JPEG bytes via BytesIO                #\n    #     buf = io.BytesIO()                                  #\n    #     img_pil.save(buf, format='JPEG', quality=quality)  #\n    #     n_bytes = len(buf.getvalue())                       #\n    #                                                         #\n    #     # Decompress                                        #\n    #     buf.seek(0)                                         #\n    #     img_recon = np.array(Image.open(buf)) / 255.0      #\n    #                                                         #\n    #     # Metrics                                           #\n    #     orig = img_tensor.squeeze().numpy()                 #\n    #     mse  = float(((orig - img_recon)**2).mean())        #\n    #     total_bits += n_bytes * 8                           #\n    #     total_mse  += mse                                   #\n    #                                                         #\n    #     # SSIM (convert to tensor first)                   #\n    #     x_t = torch.tensor(orig).unsqueeze(0).unsqueeze(0).float()   #\n    #     r_t = torch.tensor(img_recon).unsqueeze(0).unsqueeze(0).float()#\n    #     total_ssim += pt_ssim(r_t, x_t, data_range=1.0,   #\n    #                           size_average=True,           #\n    #                           win_size=7).item()           #\n    #     n += 1                                              #\n    #                                                         #\n    #   mean_bpp  = (total_bits / n) / (28 * 28)             #\n    #   mean_mse  = total_mse / n                            #\n    #   mean_ssim = total_ssim / n                           #\n    #   results.append({                                      #\n    #     'quality':  quality,                               #\n    #     'rate_bpp': mean_bpp,                              #\n    #     'mse':      mean_mse,                              #\n    #     'psnr':     10*math.log10(1/max(mean_mse,1e-10)), #\n    #     'ms_ssim':  mean_ssim,                             #\n    #   })                                                   #\n    # return results                                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (4/5): rd_curve_plot\n# ===========================================================================\ndef rd_curve_plot(ax_psnr, ax_ssim,\n                  learned_results: list, jpeg_results: list):\n    \"\"\"Draw R-D curves for learned model and JPEG on two axes.\n\n    Convention: rate (bits/pixel) on x-axis, quality on y-axis.\n    Lower-left is worse; upper-left is better.\n\n    Args:\n        ax_psnr:         matplotlib Axes — Rate vs PSNR\n        ax_ssim:         matplotlib Axes — Rate vs MS-SSIM\n        learned_results: list of dicts from evaluate_model (one per λ)\n        jpeg_results:    list of dicts from jpeg_baseline (one per quality)\n    Returns:\n        None (draws into axes)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~20 lines                              #\n    #                                                         #\n    # Extract arrays:                                         #\n    #   l_rate  = [r['rate_bpp'] for r in learned_results]   #\n    #   l_psnr  = [r['psnr']     for r in learned_results]   #\n    #   l_ssim  = [r['ms_ssim']  for r in learned_results]   #\n    #   j_rate  = [r['rate_bpp'] for r in jpeg_results]      #\n    #   j_psnr  = [r['psnr']     for r in jpeg_results]      #\n    #   j_ssim  = [r['ms_ssim']  for r in jpeg_results]      #\n    #                                                         #\n    # PSNR axis:                                              #\n    #   ax_psnr.plot(l_rate, l_psnr, 'bo-', label='Learned') #\n    #   ax_psnr.plot(j_rate, j_psnr, 'r^--', label='JPEG')  #\n    #   ax_psnr.set_xlabel('Rate (bits/pixel)')               #\n    #   ax_psnr.set_ylabel('PSNR (dB)')                       #\n    #   ax_psnr.set_title('Rate-Distortion: PSNR')            #\n    #   ax_psnr.legend(); ax_psnr.grid(True, alpha=0.3)      #\n    #                                                         #\n    # Same pattern for MS-SSIM axis.                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (5/5): lambda_annotation\n# ===========================================================================\ndef lambda_annotation(ax, learned_results: list):\n    \"\"\"Add λ labels next to each learned-model point on an R-D axis.\n\n    Args:\n        ax:              matplotlib Axes containing the R-D scatter\n        learned_results: list of dicts, each with 'rate_bpp', 'psnr'/'ms_ssim', 'lam'\n    Returns:\n        None\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — ~8 lines                              #\n    #                                                         #\n    # Detect which metric is on the y-axis from ax.get_ylabel()#\n    # For each result r in learned_results:                   #\n    #   y_val = r['psnr'] or r['ms_ssim']                    #\n    #   ax.annotate(f\"λ={r['lam']:.3f}\",                     #\n    #               xy=(r['rate_bpp'], y_val),                #\n    #               xytext=(5, 0),                            #\n    #               textcoords='offset points',               #\n    #               fontsize=7, color='blue')                 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ===========================================================================\n# PROVIDED: __main__ harness — do not modify\n# ===========================================================================\nif __name__ == \"__main__\":\n    print(f\"Device: {device}  |  VERIFY={bool(VERIFY)}\")\n    print(f\"λ values: {LAMBDA_VALUES}\")\n    print(f\"JPEG qualities: {JPEG_QUALITIES}\")\n    print(f\"Epochs per model: {N_EPOCHS}\\n\")\n\n    train_loader, test_loader = get_loaders()\n\n    # 1) Train one model per lambda\n    learned_results = []\n    for lam in LAMBDA_VALUES:\n        print(f\"Training λ={lam:.4f}...\")\n        model  = train_for_lambda(lam, train_loader, n_epochs=N_EPOCHS)\n        result = evaluate_model(model, test_loader)\n        result[\"lam\"] = lam\n        learned_results.append(result)\n        print(f\"  λ={lam:.4f}: rate={result['rate_bpp']:.2f} bits/pixel, \"\n              f\"PSNR={result['psnr']:.1f} dB, MS-SSIM={result['ms_ssim']:.3f}\")\n\n    # 2) JPEG baseline\n    print(\"\\nRunning JPEG baseline...\")\n    # Collect test images for JPEG (CPU numpy only)\n    x_batch, _ = next(iter(test_loader))\n    jpeg_imgs  = x_batch[:N_JPEG_IMAGES]           # (N, 1, 28, 28)\n    jpeg_results = jpeg_baseline(jpeg_imgs, JPEG_QUALITIES)\n    for r in jpeg_results:\n        print(f\"  JPEG q={r['quality']:3d}: rate={r['rate_bpp']:.2f} bits/pixel, \"\n              f\"PSNR={r['psnr']:.1f} dB, MS-SSIM={r['ms_ssim']:.3f}\")\n\n    # 3) R-D curve plot\n    fig, (ax_psnr, ax_ssim) = plt.subplots(1, 2, figsize=(12, 5))\n    rd_curve_plot(ax_psnr, ax_ssim, learned_results, jpeg_results)\n    lambda_annotation(ax_psnr, learned_results)\n    lambda_annotation(ax_ssim, learned_results)\n    plt.suptitle(\"Rate-Distortion Curve on MNIST: Learned vs JPEG\", fontsize=12)\n    plt.tight_layout()\n\n    if not VERIFY:\n        plt.savefig(\"ex04_rd_curve.png\", dpi=120, bbox_inches=\"tight\")\n        print(\"\\nSaved → ex04_rd_curve.png\")\n    else:\n        plt.savefig(\"ex04_rd_curve_verify.png\", dpi=80, bbox_inches=\"tight\")\n\n    print(\"\\nSummary table:\")\n    print(f\"{'λ':>10}  {'Rate (bpp)':>10}  {'PSNR (dB)':>10}  {'MS-SSIM':>8}\")\n    for r in learned_results:\n        print(f\"{r['lam']:10.4f}  {r['rate_bpp']:10.3f}  \"\n              f\"{r['psnr']:10.1f}  {r['ms_ssim']:8.3f}\")\n    print(\"Done.\")\n"}]}}}</script>
