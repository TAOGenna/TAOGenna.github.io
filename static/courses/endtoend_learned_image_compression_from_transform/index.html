    <script id="course-data" type="application/json">{"courseName": "endtoend_learned_image_compression_from_transform", "detail": {"title": "End-to-End Learned Image Compression: From Transform Coding to Neural Codecs", "description": "A hands-on, matplotlib-heavy course that builds the mental models behind Ballé et al.'s 'End-to-End Optimized Image Compression' (ICLR 2017) — the paper that launched modern neural image compression. You'll start with JPEG's DCT to see why linear transforms produce blocking artifacts, then build a learned nonlinear transform coder piece by piece: the R+λD objective, the uniform-noise quantization trick, GDN/IGDN nonlinearities, and finally a full autoencoder trained on MNIST. Each exercise is a small, self-contained script that produces a plot or a table — one intuition at a time. Designed for ML practitioners new to compression who need the rate-distortion and encoder/latent/quantizer/decoder mental models for tasks like the comma.ai video compression challenge.", "modules": [{"index": 0, "title": "Transform Coding Intuition", "description": "Build visual intuition for why compression = transform + quantize + entropy code, and why nonlinear transforms beat linear ones on non-Gaussian data. No heavy math yet — just plots. You'll implement JPEG's DCT pipeline on a real image patch, then contrast a uniform lattice quantizer against a tiny learned nonlinear transform on a banana-shaped 2D distribution.", "dir_name": "module_00_transform_coding_intuition", "exercises": ["ex01_dct_basis_functions_and_jpeg_blocking_artifacts.py", "ex02_banana_distribution_lattice_vs_learned_nonlinear_q.py", "ex03_the_encodequantizedecode_pipeline.py"], "depends_on": []}, {"index": 1, "title": "Rate-Distortion Optimization", "description": "Formalize the intuition from Module 0 into the R + λD objective that drives all of learned compression. You'll derive entropy as a rate measure, implement the rate-distortion loss, sweep λ to trace an R-D curve, and compare PSNR vs MS-SSIM to see why pixel-level and perceptual metrics disagree. This module gives you the mathematical lens to reason about any compression system — including the comma.ai challenge's scoring formula (100×seg_distortion + 25×compression_rate + sqrt(10×pose_distortion)), which is itself a weighted rate-distortion objective.", "dir_name": "module_01_ratedistortion_optimization", "exercises": ["ex01_entropy_as_compression_rate.py", "ex02_the_r__λd_loss_function.py", "ex03_sweeping_λ_and_the_ratedistortion_curve.py", "ex04_psnr_vs_msssim_when_metrics_disagree.py"], "depends_on": [0]}, {"index": 2, "title": "Quantization and the Uniform Noise Trick", "description": "The central training trick of the paper: quantization (rounding) has zero gradients almost everywhere, so you can't backpropagate through it. The solution is to replace rounding with additive uniform noise during training. This module proves — both analytically and numerically — that the noise distribution matches the quantized distribution at integer points, making it a valid continuous proxy. You'll contrast this with the straight-through estimator (STE) and see why uniform noise produces more stable training.", "dir_name": "module_02_quantization_and_the_uniform_noise_trick", "exercises": ["ex01_why_round_kills_gradients_ste_vs_uniform_noise.py", "ex02_verifying_the_density_relaxation_property.py", "ex03_training_with_noise_evaluating_with_rounding.py"], "depends_on": [1]}, {"index": 3, "title": "GDN: The Key Nonlinearity", "description": "Generalized Divisive Normalization is the paper's architectural star — a biologically-inspired nonlinearity where each channel is divided by a weighted combination of squared neighbor activations. Unlike ReLU (pointwise) or BatchNorm (global), GDN implements local gain control that adapts spatially. This module implements GDN and IGDN from the equations, shows that GDN Gaussianizes image statistics far more efficiently than ReLU, and verifies that IGDN approximately inverts GDN.", "dir_name": "module_03_gdn_the_key_nonlinearity", "exercises": ["ex01_implementing_gdn_from_the_equation.py", "ex02_gdn_vs_relu_gaussianizing_image_statistics.py", "ex03_igdn_the_approximate_inverse.py"], "depends_on": [0]}, {"index": 4, "title": "End-to-End Compression on MNIST", "description": "Wire everything together: build the full analysis→quantize→synthesis autoencoder with GDN/IGDN, train it on MNIST with the R+λD loss, and explore the learned representation. This module includes the exercises you specifically wanted: MSE vs MS-SSIM loss comparison with side-by-side reconstructions, t-SNE visualization of the latent space, and sweeping λ to plot the R-D curve. The models are tiny (trains in minutes on your RTX A5500) but demonstrate every concept from the paper.", "dir_name": "module_04_endtoend_compression_on_mnist", "exercises": ["ex01_the_full_analysissynthesis_autoencoder.py", "ex02_mse_vs_msssim_loss_sidebyside_reconstructions.py", "ex03_visualizing_the_latent_space_with_tsne.py", "ex04_sweeping_λ_the_ratedistortion_curve_on_mnist.py"], "depends_on": [1, 2, 3]}]}, "modules": {"module_00_transform_coding_intuition": {"content": "# Module 0: Transform Coding Intuition\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Running Example: A Dashcam Frame](#the-running-example-a-dashcam-frame)\n- [What Is Transform Coding?](#what-is-transform-coding)\n- [JPEG: The Gold Standard Baseline](#jpeg-the-gold-standard-baseline)\n  - [Step 1 — Color Space Conversion](#step-1--color-space-conversion)\n  - [Step 2 — The DCT Basis Functions](#step-2--the-dct-basis-functions)\n  - [Step 3 — Quantization and Why Artifacts Appear](#step-3--quantization-and-why-artifacts-appear)\n  - [Step 4 — Entropy Coding](#step-4--entropy-coding)\n- [The Encode–Quantize–Decode Pipeline](#the-encodequantizedecode-pipeline)\n- [The Central Problem with Linear Transforms](#the-central-problem-with-linear-transforms)\n- [The Learned Answer: Warp the Space](#the-learned-answer-warp-the-space)\n  - [Lattice Quantizer vs. Nonlinear Transform](#lattice-quantizer-vs-nonlinear-transform)\n  - [What the Analysis Transform Actually Does](#what-the-analysis-transform-actually-does)\n- [From JPEG to Ballé et al.: A Side-by-Side](#from-jpeg-to-ballé-et-al-a-side-by-side)\n- [The State of Learned Compression](#the-state-of-learned-compression)\n- [Connecting to Your Comma.ai Challenge](#connecting-to-your-commaai-challenge)\n- [Analytical Questions](#analytical-questions)\n  - [Question 1 — The Optimal Basis](#question-1--the-optimal-basis)\n  - [Question 2 — Blocking Artifacts in Neural Codecs](#question-2--blocking-artifacts-in-neural-codecs)\n  - [Question 3 — Machine Perception vs. Human Perception](#question-3--machine-perception-vs-human-perception)\n  - [Question 4 — Rate-Distortion Geometry](#question-4--rate-distortion-geometry)\n- [Synthesis: The Mental Model You Now Have](#synthesis-the-mental-model-you-now-have)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Trace a signal through the **encode → quantize → decode** pipeline and identify where rate and distortion originate.\n2. Explain precisely *why* JPEG produces blocking artifacts at low quality — not just \"it loses data,\" but which geometric property of the linear transform causes the visual discontinuity.\n3. State the central thesis of Ballé et al. 2017 in one sentence: the nonlinear transform warps the code space so that uniform scalar quantization becomes approximately optimal.\n4. Distinguish classical transform coding (JPEG/JPEG 2000) from end-to-end learned coding across three axes: transform type, optimization criterion, and artifact character.\n5. Sketch the connection between this framework and your comma.ai challenge — why compression for machine perception requires a different operating point than compression for human eyes.\n\n---\n\n## The Running Example: A Dashcam Frame\n\nImagine a single grayscale frame from a dashcam recording a highway scene: a road stretching to the horizon, lane markings, a distant car, trees at the edge. The frame is $1280 \\times 720$ pixels. Stored raw, that is $921{,}600$ bytes — about 7.4 Mbits. A dashcam recording at 20 fps would produce **~1.8 GB per minute** of raw data. Clearly, compression is not optional.\n\nYour comma.ai scoring function is:\n\n$$\\text{Score} = 100 \\cdot D_{\\text{seg}} + 25 \\cdot R + \\sqrt{10 \\cdot D_{\\text{pose}}}$$\n\nwhere $R$ is bits per pixel and $D_{\\text{seg}}, D_{\\text{pose}}$ are distortion errors measured by *neural networks* (SegNet and PoseNet), not human eyes. This distinction matters enormously and we will return to it at the end. For now, hold it in mind as a design constraint: you want to minimize all three terms simultaneously.\n\nThroughout this module, we will follow this dashcam frame as it moves through the compression pipeline — first with JPEG's classical approach, then with the learned approach from Ballé et al. (ICLR 2017).\n\n---\n\n## What Is Transform Coding?\n\nBefore diving into specifics, let us understand the high-level strategy that every image compression algorithm uses.\n\n**The core observation:** Raw pixel values are highly redundant. Adjacent pixels in a natural image tend to have similar values — the road pixel next to another road pixel is nearly the same brightness. This redundancy means the raw representation wastes bits. If you could find a *different representation* where the information is concentrated in fewer numbers, you could quantize aggressively and still reconstruct well.\n\nThis is transform coding:\n\n> \"Most existing image compression methods operate by linearly transforming the data vector into a suitable continuous-valued representation, quantizing its elements independently, and then encoding the resulting discrete representation using a lossless entropy code.\"\n> — Ballé et al. (2017)\n\nThe three-stage recipe is universal:\n\n$$\\mathbf{x} \\xrightarrow{g_a} \\mathbf{y} \\xrightarrow{Q} \\hat{\\mathbf{y}} \\xrightarrow{g_s} \\hat{\\mathbf{x}}$$\n\n| Symbol | Meaning | Dimensions |\n|--------|---------|------------|\n| $\\mathbf{x}$ | Original image | $H \\times W$ |\n| $g_a$ | Analysis transform (encoder) | maps pixels → latent |\n| $\\mathbf{y}$ | Continuous latent representation | $H' \\times W' \\times C$ |\n| $Q$ | Quantizer | $\\mathbf{y} \\mapsto \\hat{\\mathbf{y}} = \\text{round}(\\mathbf{y})$ |\n| $\\hat{\\mathbf{y}}$ | Quantized latent (integers) | $H' \\times W' \\times C$ |\n| $g_s$ | Synthesis transform (decoder) | maps latent → pixels |\n| $\\hat{\\mathbf{x}}$ | Reconstructed image | $H \\times W$ |\n\nThe **rate** (bits used) comes from entropy-coding $\\hat{\\mathbf{y}}$. The **distortion** is $\\|\\mathbf{x} - \\hat{\\mathbf{x}}\\|^2$. The transform's job is to organize $\\mathbf{y}$ so that quantization is efficient.\n\n![The full compression pipeline: x → encoder g_a → y → quantizer Q → ŷ → entropy model → bitstream → g_s → x̂](images/compression_pipeline.png)\n\n*The universal compression architecture. Note that the entropy model sits between quantization and the synthesis transform — it converts the integer tensor $\\hat{\\mathbf{y}}$ into an actual bitstream using arithmetic coding.*\n\n---\n\n## JPEG: The Gold Standard Baseline\n\nJPEG is the dominant image codec on the web and a brilliant engineering achievement. Understanding it concretely gives you the vocabulary for everything that follows.\n\n> \"JPEG is a clever image compression algorithm that exploits a human perceptual bias and the structure of natural images. It makes a change of basis before encoding so that the rewritten image representation concentrates the signal that humans are most perceptive to.\"\n> — Sophie L. Wang\n\n### Step 1 — Color Space Conversion\n\nJPEG does not work in RGB. It first converts to $\\text{Y'CbCr}$:\n\n$$Y' = 0.299R + 0.587G + 0.114B$$\n$$C_b = 128 + (-0.168736R - 0.331264G + 0.5B)$$\n$$C_r = 128 + (0.5R - 0.418688G - 0.081312B)$$\n\nThe coefficient on Green in the $Y'$ equation (0.587) is the largest because the human visual system has peak sensitivity around 555 nm — squarely in green. The constant 128 shifts the chroma channels into the $[0, 255]$ range.\n\nAfter separation, JPEG applies **chroma subsampling** (typically 4:2:0): each $2 \\times 2$ block of pixels shares a single $C_b$ and $C_r$ value. This immediately removes half the color information — and is almost imperceptible to humans, because we are insensitive to fine color detail.[^1]\n\n**Check your understanding:** The dashcam frame is 1280×720. After 4:2:0 subsampling, how many $C_b$ values remain? How many $Y'$ values?[^2]\n\n### Step 2 — The DCT Basis Functions\n\nAfter chroma subsampling, each channel (Y', Cb, Cr) is divided into non-overlapping **8×8 pixel blocks**. Each block is transformed by the **Discrete Cosine Transform (DCT-II)**:\n\n$$C_{u,v} = \\alpha_u \\alpha_v \\sum_{x=0}^{7}\\sum_{y=0}^{7} p(x,y) \\cos\\!\\left(\\frac{(2x+1)u\\pi}{16}\\right)\\cos\\!\\left(\\frac{(2y+1)v\\pi}{16}\\right)$$\n\nwhere $\\alpha_0 = 1/\\sqrt{8}$ and $\\alpha_{u>0} = 1/2$ are normalization constants, $p(x,y)$ are the (mean-subtracted) pixel values, and $u, v \\in \\{0,\\ldots,7\\}$ index the frequency.\n\n**Intuition first:** Think of the 64 DCT basis functions as a complete set of cosine \"templates\" at different horizontal and vertical spatial frequencies. The coefficient $C_{u,v}$ tells you how much of template $(u,v)$ is present in your 8×8 block. The template $(0,0)$ is a flat gray patch (DC component — the block average). Templates with large $u$ oscillate rapidly left-to-right; templates with large $v$ oscillate top-to-bottom.\n\n**Why does this help?** Natural images are *locally smooth*. A patch of road has nearly constant brightness — it projects almost entirely onto the $(0,0)$ template. The high-frequency templates $(u\\geq 4, v\\geq 4)$ get near-zero coefficients. After the transform, most coefficients are close to zero and only a few carry the signal.\n\nFor a concrete example: a typical block in our dashcam frame (road surface) might produce:\n\n| Coefficient | Raw value | Physical meaning |\n|-------------|-----------|-----------------|\n| $C_{0,0}$ | $-151$ | Overall brightness (most energy!) |\n| $C_{1,0}$ | $67$ | Slow horizontal variation |\n| $C_{0,1}$ | $45$ | Slow vertical variation |\n| $C_{4,4}$ | $\\approx 0$ | Fine diagonal detail |\n| $C_{7,7}$ | $\\approx 0$ | Highest-freq detail |\n\nIn code:\n\n```python\nimport numpy as np\n\ndef dct2_basis(u, v):\n    \"\"\"Return the (u,v) DCT-II basis image for an 8x8 block.\"\"\"\n    x = np.arange(8)\n    y = np.arange(8)\n    X, Y = np.meshgrid(x, y)\n    au = (1/np.sqrt(8)) if u == 0 else 0.5\n    av = (1/np.sqrt(8)) if v == 0 else 0.5\n    return au * av * np.cos((2*X+1)*u*np.pi/16) * np.cos((2*Y+1)*v*np.pi/16)\n\ndef forward_dct(block):\n    \"\"\"Apply DCT-II to an 8x8 block (subtract 128 first, per JPEG spec).\"\"\"\n    b = block.astype(float) - 128\n    coeffs = np.zeros((8, 8))\n    for u in range(8):\n        for v in range(8):\n            coeffs[u, v] = np.sum(b * dct2_basis(u, v))\n    return coeffs\n```\n\n**Check your understanding:** What is the physical meaning of $C_{0,0}$ after subtracting 128 from pixel values? Why does JPEG subtract 128 before the DCT? (Hint: what happens to the DC coefficient if you don't?)\n\n**The energy compaction property — why DCT works:** For any $N \\times N$ block drawn from a stationary first-order Markov process with adjacent-pixel correlation $\\rho \\approx 0.95$ (typical for natural images), the DCT-II is provably near-optimal in concentrating signal energy into the first few coefficients. Formally, define the **energy compaction ratio** for keeping only the $k$ largest coefficients:\n\n$$\\text{ECR}(k) = \\frac{\\sum_{i=1}^{k} \\lambda_i}{\\sum_{i=1}^{N^2} \\lambda_i}$$\n\nwhere $\\lambda_i$ are the eigenvalues of the signal's covariance matrix, sorted decreasing. For typical natural images, $\\text{ECR}(10) \\approx 0.95$ using DCT — meaning 10 of 64 coefficients hold 95% of the signal energy. This is why JPEG works: most of the information is in the low-frequency corner, and you can aggressively discard the rest.\n\nThe DCT-II matrix $\\mathbf{D} \\in \\mathbb{R}^{8 \\times 8}$ is orthogonal ($\\mathbf{D}\\mathbf{D}^T = \\mathbf{I}$), so the transform is:\n\n$$\\mathbf{C} = \\mathbf{D} \\, \\mathbf{P} \\, \\mathbf{D}^T$$\n\nwhere $\\mathbf{P}$ is the 8×8 pixel block (centered by subtracting 128) and $\\mathbf{C}$ is the coefficient matrix. The inverse is $\\mathbf{P} = \\mathbf{D}^T \\mathbf{C} \\mathbf{D}$.\n\nThis matrix formulation is what makes DCT fast in practice: you can compute $\\mathbf{D}\\mathbf{P}\\mathbf{D}^T$ via two matrix multiplies with separability, reducing complexity from $O(N^4)$ to $O(N^3)$, and with the fast DCT algorithm to $O(N^2 \\log N)$.\n\n### Step 3 — Quantization and Why Artifacts Appear\n\nThis is the lossy step. JPEG divides each coefficient by an entry in the **luminance quantization table** $Q_{u,v}$ and rounds:\n\n$$\\hat{C}_{u,v} = \\text{round}\\!\\left(\\frac{C_{u,v}}{Q_{u,v}}\\right)$$\n\nThe standard JPEG luminance quantization table (at quality 50) looks like:\n\n$$Q = \\begin{pmatrix} 16 & 11 & 10 & 16 & 24 & 40 & 51 & 61 \\\\ 12 & 12 & 14 & 19 & 26 & 58 & 60 & 55 \\\\ 14 & 13 & 16 & 24 & 40 & 57 & 69 & 56 \\\\ \\vdots & & & & & & & \\vdots \\end{pmatrix}$$\n\nThe crucial observation: $Q_{u,v}$ grows as $u$ and $v$ grow. High-frequency coefficients are divided by *larger* numbers, making them more likely to round to zero. A coefficient of $C_{4,4} = 3.2$ divided by $Q_{4,4} = 41$ gives $0.078$, which rounds to zero — gone.\n\nFor a real block from the JPEG blog (quality 70):\n- 64 coefficients before quantization, but **47 of 64 coefficients are zero after quantization**\n- The remaining 17 coefficients carry essentially all reconstructed information\n\n**Why do blocking artifacts appear?**\n\n![Why JPEG blocking artifacts appear at 8x8 block boundaries](diagrams/jpeg_blocking_artifacts.svg)\n\nThe problem is subtle. Each 8×8 block is quantized **independently**. There is no communication between adjacent blocks. Consider two neighboring blocks of the dashcam road:\n\n- **Block A** (left): average brightness 120, $C_{0,0} = 960$. Quantized: $\\hat{C}_{0,0} = 60$.\n- **Block B** (right): average brightness 140, $C_{0,0} = 1120$. Quantized: $\\hat{C}_{0,0} = 70$.\n\nBoth blocks reconstruct their interiors perfectly well. But the rightmost column of Block A reconstructs to brightness ~120, while the leftmost column of Block B reconstructs to brightness ~140. There is a **sudden 20-unit jump** at the boundary — invisible in the original image, but created by the compression.\n\nAt low quality (large $Q$ values), these jumps are large and the 8×8 grid becomes visible. The DCT basis functions are each localized to their block, so *any error in their coefficients propagates only within the block* — which means the block structure leaks through to the reconstructed image.\n\n> \"As bit rate is reduced, JPEG and JPEG 2000 degrade their approximation of the original image by coarsening the precision of the coefficients of linear basis functions, thus **exposing the visual appearance of those basis functions**.\"\n> — Ballé et al. (2017, emphasis added)\n\nThis is the diagnostic phrase. When quality drops, you literally see the basis functions — 8×8 blocks in JPEG, horizontal/vertical streaks in JPEG 2000.\n\n### Step 4 — Entropy Coding\n\nAfter quantization, JPEG reads the 8×8 block of integers in a **zigzag order** (DC coefficient first, then increasing frequency diagonally) and applies Huffman coding. The DC coefficient is stored as a difference from the previous block's DC value (delta coding). AC coefficients are encoded as (run\\_length, value) pairs, with long runs of zeros represented very efficiently.\n\nA typical 8×8 block might compress from 136 bits (fixed-width encoding) to just **66 bits** (Huffman coded) — a 2× savings from entropy coding alone, on top of the quantization-driven savings.\n\n---\n\n## The Encode–Quantize–Decode Pipeline\n\nLet us now crystallize the universal structure. Whether it is JPEG, JPEG 2000, or a neural codec, **every** transform coder follows this pipeline:\n\n![The encode-quantize-decode pipeline with concrete numerical values](diagrams/transform_coding_pipeline.svg)\n\nThe pipeline has two roles:\n\n1. **The transform pair $(g_a, g_s)$** — their job is to find a representation $\\mathbf{y}$ where quantization is efficient.\n2. **The quantizer $Q$** — converts continuous $\\mathbf{y}$ to discrete $\\hat{\\mathbf{y}}$; this is the *only* irreversible step.\n\nThe rate $R$ (bits to transmit) depends entirely on how well the quantized latent $\\hat{\\mathbf{y}}$ concentrates information. If the transform is good, most $\\hat{y}_i = 0$ and you need very few bits. If the transform is bad, every coefficient is different and you need many bits.\n\nIn code, the pipeline is:\n\n```python\nimport torch\nimport torch.nn as nn\n\nclass TransformCoder(nn.Module):\n    def __init__(self, signal_dim, latent_dim):\n        super().__init__()\n        self.g_a = nn.Linear(signal_dim, latent_dim)  # analysis transform\n        self.g_s = nn.Linear(latent_dim, signal_dim)  # synthesis transform\n\n    def encode(self, x):\n        return self.g_a(x)\n\n    def quantize(self, y):\n        return torch.round(y)       # hard quantization — zero gradient!\n\n    def decode(self, y_hat):\n        return self.g_s(y_hat)\n\n    def forward(self, x):\n        y = self.encode(x)\n        y_hat = self.quantize(y)\n        x_hat = self.decode(y_hat)\n        return x_hat, y_hat\n\n    def rate_proxy(self, y_hat):\n        \"\"\"Approximate rate: count unique values used per dimension.\"\"\"\n        return y_hat.unique().numel()  # crude proxy; Module 1 gives the real version\n```\n\n**Why \"proxy\"?** The true rate is $-\\log_2 P(\\hat{\\mathbf{y}})$ — the negative log-probability under the entropy code. This requires a probability model for $\\hat{\\mathbf{y}}$. For now, counting unique values gives the intuition: if most $\\hat{y}_i = 0$, you use few bits; if $\\hat{y}_i$ is spread uniformly across a wide range, you need many bits. Module 1 replaces this crude proxy with the actual entropy formula.\n\n**Check your understanding:** In the code above, `torch.round()` has zero gradient almost everywhere. This means you cannot train this network end-to-end with gradient descent. What would you need to change? (We will solve this precisely in Module 2.)\n\n**Exercise 3 preview:** You will implement this exact pipeline on a sinusoidal signal. You will see that a linear transform concentrates energy into a few large coefficients, and measure the rate (unique levels used) vs. distortion (MSE) tradeoff directly.\n\n---\n\n## The Central Problem with Linear Transforms\n\nJPEG uses a fixed linear transform — the DCT. Its basis functions are pre-designed without any reference to the actual data being compressed. The DCT is an excellent choice for *typical* natural images (smooth regions, gradients), but it is not optimal for any specific image or any specific compression task.\n\nMore fundamentally, linear transforms have a geometric limitation. They can rotate, scale, and shear the data distribution — but they cannot *bend* it. If the data lives on a curved manifold (and natural images do), a linear transform can reduce its bounding box but cannot make it align perfectly with coordinate axes.\n\nThink about a 2D dataset shaped like a banana — a curved 1D manifold in 2D space. A linear transform (rotation/scaling) can tilt the banana to lie at a convenient angle, but it will always be curved. Any axis-aligned quantization grid will straddle the curve, assigning many grid cells to empty space.\n\nThe DCT is excellent because natural images mostly lie in a low-frequency subspace — a nearly-flat manifold. But at low bit rates, the approximation breaks down and the linear structure (block boundaries) becomes visible.\n\n**Check your understanding:** JPEG 2000 uses wavelets instead of the block DCT. Wavelets are still linear transforms, but they operate at multiple scales. What kind of artifact would you expect from a wavelet-based codec instead of 8×8 blocking? (Hint: think about what wavelet basis functions look like when they are \"exposed\" by aggressive quantization.)\n\n---\n\n## The Learned Answer: Warp the Space\n\nBallé et al. (2017) make a simple but radical observation:\n\n> \"We instead assume a **fixed uniform scalar quantizer** in the code space, and aim to have the nonlinear transformations **warp the space in an appropriate way**, effectively implementing a parametric form of vector quantization.\"\n\nThe insight is architectural. Instead of designing a clever quantizer to match the data distribution, they keep the dumbest possible quantizer (round to nearest integer) and instead *train neural transforms that make the data distribution compatible with this quantizer*.\n\n### Lattice Quantizer vs. Nonlinear Transform\n\nThe difference becomes vivid with a 2D example.\n\n![Lattice quantizer vs. learned nonlinear transform quantizer on banana-shaped data](diagrams/lattice_vs_learned_quantizer.svg)\n\n**Lattice quantizer (left):** Apply a uniform grid directly to the raw $(x_1, x_2)$ space. The data lives on a curved arc. Many grid cells cover both data and empty space — you're paying bits to represent all of them. MSE is high.\n\n**Learned transform + grid (right):** Train a small encoder MLP that maps the curved data to a near-horizontal line. Now apply the same uniform grid. Every grid cell the data passes through is actually used. MSE is 5–10× lower for the same number of grid cells used.\n\nIn Exercise 2, you will implement exactly this on a moon-shaped 2D dataset. You will see that the learned encoder achieves dramatically lower MSE than the lattice quantizer, and you will visualize how the quantization boundaries in the original space become curved, following the shape of the data.\n\n### What the Analysis Transform Actually Does\n\nThe Ballé et al. analysis transform $g_a$ has three stages, each consisting of:\n\n$$\\text{Affine convolution} \\to \\text{Downsampling} \\to \\text{GDN}$$\n\nThe convolutions learn to detect features (edges, textures, local patterns). The downsampling reduces spatial resolution — trading spatial for channel information. And GDN (Generalized Divisive Normalization, covered in Module 3) is a nonlinear activation specifically designed to *Gaussianize* the statistics of natural image patches — to make the latent distribution as close to a product of independent Gaussians as possible.[^3]\n\nWhy Gaussianize? Because a product of independent Gaussians is the ideal distribution for uniform scalar quantization — it means each coefficient can be quantized independently with no cross-coefficient waste.\n\nThe synthesis transform $g_s$ mirrors this structure in reverse:\n\n$$\\text{IGDN} \\to \\text{Upsample} \\to \\text{Affine convolution}$$\n\nThe result is a nonlinear encoder/decoder pair that has been jointly optimized to minimize $R + \\lambda D$ — rate plus $\\lambda$-weighted distortion. We will study this objective in detail in Module 1.\n\n**Concrete architectural numbers** from the paper: The analysis transform for grayscale images uses 128 filters of size $9\\times9$ in stage 1, then 128 filters of size $5\\times5$ in stages 2 and 3. Downsampling is by 4× in stage 1 and 2× in each subsequent stage, for a total 8× spatial reduction. The latent $\\mathbf{y}$ has dimensions $H/8 \\times W/8 \\times 128$. For a $256\\times256$ input, that is $32 \\times 32 \\times 128 = 131{,}072$ latent values — compared to $65{,}536$ input pixels. The total parameter count is approximately 855K for the grayscale model.\n\nThe net dimensionality changes *per image element* from $1$ (gray) to $128/64 = 2$ (the latent has 2× more channels than spatial pixels it represents). This might seem like the model is *expanding* the representation, but most of the 128 channels will be near-zero after quantization — the effective bottleneck is the number of non-zero entries, which is far smaller than 128.\n\n**Check your understanding:** The paper says the output has \"half the elements of input.\" Let us verify: input = $H \\times W \\times 1$ (grayscale). Latent = $H/8 \\times W/8 \\times 128$. What is the ratio of latent elements to input elements? Why does the paper say \"half\"?[^5]\n\n**The key comparison to JPEG:**\n\n| Property | JPEG | Ballé et al. |\n|----------|------|--------------|\n| Transform | Fixed DCT basis | Learned convolutional GDN |\n| Transform type | Linear | Nonlinear |\n| Block size | 8×8 | Whole image (128 filters, 9×9) |\n| Quantizer | Non-uniform (per-coefficient $Q_{u,v}$) | Uniform scalar |\n| Optimization | Separate per stage | Joint end-to-end |\n| Low-rate artifact | Blocking (DCT basis exposed) | Blurring/smoothing of contours |\n| Rate-distortion | Fixed | Adjustable via $\\lambda$ |\n\n---\n\n## From JPEG to Ballé et al.: A Side-by-Side\n\nLet us trace our dashcam frame through both pipelines to make the differences concrete.\n\n**JPEG at quality 10** (aggressive compression):\n1. Convert to Y'CbCr, apply 4:2:0 chroma subsampling\n2. Split into 8×8 blocks; DCT each block independently\n3. Divide by a large Q-table (quality 10 = very coarse)\n4. Most blocks: only DC coefficient survives\n5. Reconstruct: entire blocks become flat patches at their average brightness\n6. **Result**: road markings gone, block grid visible at every 8-pixel boundary, PSNR ≈ 25 dB\n\n**Ballé et al. at comparable bit rate:**\n1. Apply $g_a$ (conv + GDN) — 3 stages, 128 channels — whole-image transform\n2. Uniform rounding: most channels ≈ 0\n3. Entropy code with per-channel marginal distributions\n4. Apply $g_s$ (IGDN + upconv) — whole-image reconstruction\n5. **Result**: road markings preserved, contours slightly smoothed (no hard boundaries), PSNR ≈ 25 dB, but MS-SSIM dramatically better\n\nThe paper's key finding: although the learned model optimizes MSE, it **dramatically outperforms JPEG on MS-SSIM** (multi-scale structural similarity, a perceptual metric) across all test images and all bit rates. Why? Because the nonlinear transforms learn to preserve the things that MS-SSIM cares about — edges, textures, structural relationships — in ways that the fixed DCT cannot.\n\n> \"On the other hand, our method appears to progressively simplify contours and other image features, **effectively concealing the underlying quantization** of the representation.\"\n> — Ballé et al. (2017)\n\nThis is the elegant property of learned compression: when you run out of bits, the codec makes the image look simpler (like a sketch of the scene), rather than exposing the internal structure of the codec.\n\n---\n\n## The State of Learned Compression\n\nIt is worth knowing where Ballé et al. sits in the broader landscape before diving into the details.\n\n![Rate-Distortion curves comparing classical and learned codecs on the Kodak test dataset](images/rd_curves_kodak.png)\n\n*Rate-Distortion curves on the Kodak dataset. JPEG (bottom-right dotted) is outperformed by every learned codec. The 2017 Ballé model (bmshj2018-factorized, green dashed) already beats JPEG at all bit rates. Modern methods (elic2022, VTM) gain another 4–6 dB.*\n\nThis plot tells the story of the field:\n\n- **JPEG** (dotted blue, bottom right): requires ~2.0 bpp to reach 40 dB PSNR\n- **bmshj2018-factorized** (Ballé 2018 follow-up): reaches 40 dB at ~1.5 bpp — a 25% bit savings\n- **elic2022** (top): reaches 40 dB at ~1.0 bpp — a 50% bit savings over JPEG\n\nThe cost? Computational complexity. Neural codecs are **100–10,000× slower** than JPEG. Encoding a 1080p frame with a state-of-the-art neural codec takes ~2–10 seconds on a GPU; JPEG takes milliseconds. This is the main barrier to deployment and why research into low-complexity neural codecs is active.\n\nFor the comma.ai challenge, you are solving a specialized task where the \"decoder\" is a neural network — not a human eye and not a screen. This opens up possibilities (and requirements) that standard human-perception codecs do not address.[^4]\n\n---\n\n## Connecting to Your Comma.ai Challenge\n\nYour scoring function is:\n\n$$\\text{Score} = \\underbrace{100 \\cdot D_{\\text{seg}}}_{\\text{segmentation quality}} + \\underbrace{25 \\cdot R}_{\\text{compression rate}} + \\underbrace{\\sqrt{10 \\cdot D_{\\text{pose}}}}_{\\text{pose quality}}$$\n\nThis is *not* PSNR. It is not MS-SSIM. It is a combination of two neural network outputs. This changes the optimal compression strategy in a profound way:\n\n**What SegNet cares about:** Pixel-level semantic boundaries. Sharp edges between road, sky, cars, and pedestrians. Texture within each class is mostly irrelevant — SegNet needs to know \"where does road become car\" not \"what does the car's hood texture look like.\"\n\n**What PoseNet cares about:** Camera pose across time. Optical flow, vanishing points, large-scale scene geometry. Fine pixel detail is noise for this task.\n\n**Implication:** A codec optimized for MSE (which weights every pixel equally) is suboptimal. You want to compress in a way that preferentially preserves semantic boundaries for SegNet and global geometric features for PoseNet. This is exactly what \"coding for machines\" (CfM) research addresses — and it builds directly on the Ballé et al. framework.\n\nThe rate-distortion objective for your task is:\n\n$$\\mathcal{L}_{\\text{task}} = R + \\lambda_1 D_{\\text{seg}} + \\lambda_2 D_{\\text{pose}}$$\n\nwhere $\\lambda_1 = 100/25 = 4$ and $\\lambda_2 = \\sqrt{10/D_{\\text{pose}}} / 25$ (the effective weight depends on the operating point). You are optimizing a *different* $\\lambda$ landscape than standard image compression.\n\nAs you work through this course, keep asking: \"Would this change help SegNet? PoseNet? Both? Neither?\" The learned compression framework makes it possible to optimize for *any* differentiable downstream loss — including neural network outputs.\n\n---\n\n## Analytical Questions\n\n### Question 1 — The Optimal Basis\n\nThe DCT is known to approach the optimal (Karhunen-Loève) transform for stationary, first-order Markov signals with correlation coefficient near 1. Natural images approximately satisfy this model in smooth regions.\n\n**(a)** Suppose you have a dashcam video of a highway at night — mostly dark road, occasional headlights. How does the pixel correlation structure differ from typical daytime imagery? Would the DCT remain near-optimal, or would a different basis work better?\n\n**(b)** The Ballé et al. analysis transform uses 128 filters of size $9 \\times 9$ for the first stage. The DCT uses 64 basis functions of size $8 \\times 8$. Give one reason why the learned filters might differ substantially from DCT basis functions, even in smooth regions. (Consider that learned filters are optimized *jointly* with the decoder, not just for decorrelation.)\n\n**(c)** The DCT is a *separable* transform — it applies independent 1D transforms in horizontal and vertical directions. The learned convolutional filters are not necessarily separable. What kinds of image structure might benefit from non-separable filters?\n\n### Question 2 — Blocking Artifacts in Neural Codecs\n\nThe claim is that the learned method produces \"simplification of contours\" rather than blocking artifacts at low bit rates.\n\n**(a)** The Ballé et al. model uses whole-image convolutions (not block-based processing). Does this guarantee the absence of spatial artifacts? Or could there be other sources of grid-like patterns in the latent space?\n\n**(b)** The analysis transform downsamples by a total factor of 8 (the output is $1/8$ the spatial resolution of the input). When the quantized latent is decoded via the synthesis transform, does the upsampling introduce any artifact that has a spatial periodicity? What would that period be?\n\n**(c)** The paper trains separate models for each value of $\\lambda$. If you were to decode an image with the *wrong* model (e.g., encode with $\\lambda=0.01$, decode with $\\lambda=0.1$), what kind of artifacts would you expect? What does this tell you about the internal representation learned at different $\\lambda$ values?\n\n### Question 3 — Machine Perception vs. Human Perception\n\n**(a)** Human eyes are sensitive to the spatial frequency range of 2–4 cycles per degree of visual angle. JPEG's quantization table encodes this bias — high-frequency coefficients get coarser quantization. SegNet, however, is a convolutional neural network. At which spatial frequencies is SegNet most sensitive? (Consider its receptive field, the frequencies preserved through strided convolutions, and what edge-detection filters respond to.)\n\n**(b)** MS-SSIM (evaluated at multiple scales) is a better perceptual metric than PSNR because it matches human vision more closely. Would you expect MS-SSIM to correlate with SegNet segmentation quality? Give a concrete scenario where the two metrics diverge.\n\n**(c)** Suppose you were designing a \"SegNet-optimal\" quantization table analogous to JPEG's $Q$ matrix. What would guide your choice of which DCT coefficients to quantize aggressively vs. lightly? How would this table differ from the standard luminance table?\n\n### Question 4 — Rate-Distortion Geometry\n\nThe set of achievable $(R, D)$ points for any compression method forms a *convex* region (this follows from the theory of random coding). The boundary of this region is the rate-distortion function $D^*(R)$.\n\n**(a)** JPEG achieves different $(R, D)$ points by varying the quality factor (which scales the $Q$ matrix). Ballé et al. achieve different points by training separate models at different $\\lambda$ values. Both trace curves in $(R, D)$ space. Why might the Ballé et al. curve be *below* (i.e., better than) the JPEG curve at every bit rate?\n\n**(b)** The Lagrangian formulation minimizes $R + \\lambda D$ for a given $\\lambda$. Geometrically, this corresponds to finding the point on the $D^*(R)$ curve with slope $-1/\\lambda$. If the JPEG curve has a kink (non-smooth point) at some $(R_0, D_0)$, what does this imply about achievable operating points near that bit rate? How does the learned approach avoid this issue?\n\n**(c)** For your comma.ai problem, the \"distortion\" is the composite $100 D_{\\text{seg}} + \\sqrt{10 D_{\\text{pose}}}$. This is not a squared-error norm. Does the Lagrangian derivation still apply? What assumption breaks down, and how might it affect optimization?\n\n---\n\n## Synthesis: The Mental Model You Now Have\n\nYou now have the complete conceptual scaffolding for this course:\n\n**The pipeline:** $\\mathbf{x} \\to g_a \\to \\mathbf{y} \\to Q \\to \\hat{\\mathbf{y}} \\to g_s \\to \\hat{\\mathbf{x}}$. Every compression algorithm fits this template. The differences are all in the choice of $g_a$, $g_s$, and $Q$, and whether they are designed or learned.\n\n**The JPEG baseline:** Linear transform (DCT), fixed basis, per-block processing, non-uniform quantization, separate optimization. Excellent for smooth natural images at moderate bit rates. Degrades by exposing its internal structure (block grid) at low bit rates.\n\n**The learned advance:** Nonlinear transforms ($g_a, g_s$ with GDN), whole-image processing, uniform scalar quantization in the latent space, joint end-to-end optimization of $R + \\lambda D$. Degrades gracefully by simplifying the scene rather than exposing codec structure.\n\n**The central theorem of Ballé et al.:** Nonlinear transforms + uniform scalar quantization ≡ parametric vector quantization in image space. The transform warps the distribution so that the dumb quantizer is no longer dumb.\n\n**Your specific task:** The comma.ai challenge requires compression for *machine* perception, not human perception. SegNet needs edges and semantic boundaries. PoseNet needs global geometry. The learned compression framework is ideally suited to optimize for these downstream losses directly.\n\n**What comes next:**\n- **Module 1:** The $R + \\lambda D$ objective — how rate and distortion are formalized and how the tradeoff parameter $\\lambda$ controls the operating point on the R-D curve.\n- **Module 2:** The uniform noise trick — how to differentiate through the quantizer so you can train end-to-end.\n- **Module 3:** GDN — the nonlinearity that makes the latent distribution Gaussian-like, and why that matters.\n- **Module 4:** Full autoencoder on MNIST — bring it all together.\n\n---\n\n[^1]: The human visual system has roughly 4× fewer color-sensitive cones than brightness-sensitive cones, and the color-sensitive pathway has lower spatial resolution. This is why chroma subsampling is perceptually benign but luma subsampling is not.\n\n[^2]: After 4:2:0 subsampling: $Y'$ keeps all $1280 \\times 720 = 921{,}600$ values. $C_b$ and $C_r$ each keep $640 \\times 360 = 230{,}400$ values. Total: 1,382,400 values vs. 2,764,800 in full 4:4:4 — a 2× reduction just from subsampling.\n\n[^3]: GDN was introduced by Ballé et al. (2015) specifically for image compression. The name stands for Generalized Divisive Normalization. We cover its formula and rationale fully in Module 3. For now, think of it as \"a nonlinearity that removes statistical dependencies between neighboring coefficients more efficiently than ReLU.\"\n\n[^4]: This paradigm — compressing video for downstream neural network consumption rather than human viewing — is called \"Video Coding for Machines\" (VCM) and has become an active MPEG standardization track. The key insight is that neural networks care about different features than humans do, and a codec can exploit this to achieve much lower bit rates for machine tasks.\n\n[^5]: Ratio = $(H/8 \\times W/8 \\times 128) / (H \\times W \\times 1) = 128/64 = 2$. Wait — that is 2×, not 1/2×. The paper's statement \"half the elements\" may refer to a specific architectural variant or count in a different way. In practice, the latent has *more* elements but with sparsity from quantization providing the true compression. The architectural downsampling ensures the *spatial* resolution shrinks by 64×, but 128 channels partially compensate.\n", "exercises": [{"filename": "ex01_dct_basis_functions_and_jpeg_blocking_artifacts.py", "content": "\"\"\"\nExercise 1: DCT Basis Functions and JPEG Blocking Artifacts\n============================================================\nModule 0 — Transform Coding Intuition\n\nGoal: Implement the core JPEG pipeline from scratch — basis functions,\nforward DCT, quantization, and inverse DCT — and observe how blocking\nartifacts emerge at low quality settings.\n\nKey insight from Ballé et al. (2017):\n  \"As bit rate is reduced, JPEG and JPEG 2000 degrade their approximation\n   of the original image by coarsening the precision of the coefficients\n   of linear basis functions, thus exposing the visual appearance of those\n   basis functions.\"\n\nAfter completing this exercise you will be able to:\n  - Construct any of the 64 DCT-II basis images for an 8×8 block\n  - Apply the forward DCT and reconstruct a block at different quality levels\n  - Explain precisely why blocking artifacts appear at 8×8 block boundaries\n\nUsage:\n    python ex01_dct_basis_functions_and_jpeg_blocking_artifacts.py\n\n    To run verification (fast, no downloads, for grading):\n    DISTILL_VERIFY=1 python ex01_dct_basis_functions_and_jpeg_blocking_artifacts.py\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport matplotlib.patches as patches\nfrom matplotlib.gridspec import GridSpec\n\n# ---------------------------------------------------------------------------\n# Provided: Standard JPEG luminance quantization table (quality 50 baseline)\n# ---------------------------------------------------------------------------\nJPEG_Q50 = np.array([\n    [16, 11, 10, 16, 24,  40,  51,  61],\n    [12, 12, 14, 19, 26,  58,  60,  55],\n    [14, 13, 16, 24, 40,  57,  69,  56],\n    [14, 17, 22, 29, 51,  87,  80,  62],\n    [18, 22, 37, 56, 68, 109, 103,  77],\n    [24, 35, 55, 64, 81, 104, 113,  92],\n    [49, 64, 78, 87,103, 121, 120, 101],\n    [72, 92, 95, 98,112, 100, 103,  99],\n], dtype=float)\n\n\n# ---------------------------------------------------------------------------\n# Provided: Helper — display an 8×8 patch with pixel values annotated\n# ---------------------------------------------------------------------------\ndef show_patch(ax, patch, title, cmap=\"RdBu_r\", vmin=None, vmax=None, annotate=True):\n    \"\"\"Display an 8×8 numpy array on `ax` with optional value annotations.\n\n    Parameters\n    ----------\n    ax : matplotlib.axes.Axes\n    patch : np.ndarray, shape (8, 8)\n    title : str\n    cmap : str  colormap name\n    vmin, vmax : float or None  color scale limits\n    annotate : bool  whether to print numbers inside cells\n    \"\"\"\n    im = ax.imshow(patch, cmap=cmap, vmin=vmin, vmax=vmax, aspect=\"equal\")\n    ax.set_title(title, fontsize=8)\n    ax.set_xticks([]); ax.set_yticks([])\n    if annotate:\n        for i in range(8):\n            for j in range(8):\n                val = patch[i, j]\n                txt = f\"{val:.0f}\" if abs(val) >= 1 else f\"{val:.2f}\"\n                color = \"white\" if abs(val) > 0.5 * (patch.max() - patch.min()) + patch.min() else \"black\"\n                ax.text(j, i, txt, ha=\"center\", va=\"center\",\n                        fontsize=5, color=\"black\")\n    return im\n\n\n# ---------------------------------------------------------------------------\n# Provided: Quality → quantization table scaling (JPEG standard formula)\n# ---------------------------------------------------------------------------\ndef quality_to_scale(quality: int) -> float:\n    \"\"\"Convert JPEG quality (1-100) to Q-table scale factor.\n\n    JPEG standard formula:\n        if quality < 50: scale = 5000 / quality\n        else:            scale = 200 - 2 * quality\n    Then Q_scaled = clip(round(Q50 * scale / 100), 1, 255)\n\n    Parameters\n    ----------\n    quality : int  JPEG quality level (1 = worst, 100 = best)\n\n    Returns\n    -------\n    float  scale factor (multiply Q50 by this, then divide by 100)\n    \"\"\"\n    if quality < 50:\n        return 5000.0 / quality\n    else:\n        return 200.0 - 2.0 * quality\n\n\n# ---------------------------------------------------------------------------\n# TODO 1 — Implement the DCT-II basis function                    (8-10 lines)\n# ---------------------------------------------------------------------------\ndef dct2_basis(u: int, v: int) -> np.ndarray:\n    \"\"\"Return the (u, v) DCT-II basis image for an 8×8 block.\n\n    The basis function is:\n\n        B_{u,v}(x, y) = α_u · α_v · cos((2x+1)uπ/16) · cos((2y+1)vπ/16)\n\n    where:\n        α_0 = 1/√8  (DC normalization)\n        α_{k>0} = 1/2  (AC normalization)\n        x, y ∈ {0, 1, ..., 7}  (pixel coordinates)\n        u, v ∈ {0, 1, ..., 7}  (frequency indices)\n\n    Parameters\n    ----------\n    u : int  horizontal frequency index (0=DC, 7=highest)\n    v : int  vertical frequency index   (0=DC, 7=highest)\n\n    Returns\n    -------\n    np.ndarray, shape (8, 8)  basis image with float values in [-0.5, 0.5]\n\n    Hint: Use np.meshgrid to build X, Y coordinate grids over {0,...,7}.\n          Compute α_u and α_v separately. The formula is separable:\n          B = α_u * α_v * cos_u_term * cos_v_term where each cos term\n          depends on only one spatial dimension.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-10 lines                             #\n    #                                                         #\n    # Steps:                                                  #\n    #   1. Create 1D arrays x = [0..7] and y = [0..7]        #\n    #   2. Compute α_u: 1/√8 if u==0, else 1/2               #\n    #   3. Compute α_v: 1/√8 if v==0, else 1/2               #\n    #   4. Compute cos term for x dimension: cos((2x+1)uπ/16) #\n    #   5. Compute cos term for y dimension: cos((2y+1)vπ/16) #\n    #   6. Use outer product (np.outer) or meshgrid to combine #\n    #      and multiply by α_u * α_v                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2 — Implement the forward DCT                             (8-12 lines)\n# ---------------------------------------------------------------------------\ndef forward_dct(block: np.ndarray) -> np.ndarray:\n    \"\"\"Apply DCT-II to an 8×8 pixel block following the JPEG convention.\n\n    Algorithm:\n        1. Center pixel values: b = block.astype(float) - 128\n           (JPEG subtracts 128 to center the range before transform)\n        2. Compute coefficient C_{u,v} = sum over x,y of:\n               b(x,y) * B_{u,v}(x,y)\n           where B_{u,v} is the basis function from dct2_basis(u, v).\n        3. Equivalently, using the DCT matrix D:\n               C = D @ b @ D.T\n           where D[u, x] = α_u * cos((2x+1)uπ/16)\n\n    Parameters\n    ----------\n    block : np.ndarray, shape (8, 8), dtype uint8 or float\n        Input pixel block, values in [0, 255].\n\n    Returns\n    -------\n    np.ndarray, shape (8, 8), dtype float\n        DCT coefficients. C[0,0] is the DC coefficient (block mean × 8).\n\n    Hint: Build the DCT matrix D of shape (8,8) where D[u, x] represents\n          the contribution of pixel x to frequency u. Then use two matrix\n          multiplies: C = D @ centered_block @ D.T\n          Note: dct2_basis(u, v)[x, y] = D[u, x] * D[v, y] where\n          D[u, x] = alpha_u * cos((2*x+1)*u*pi/16).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # Approach A (explicit): loop over u, v and compute each  #\n    #   coefficient as np.sum(centered_block * dct2_basis(u,v))#\n    #   This is correct but slow (~64 calls to dct2_basis).   #\n    #                                                         #\n    # Approach B (matrix, preferred): build D[u, x] once,    #\n    #   then C = D @ centered_block @ D.T                     #\n    #                                                         #\n    # D[u, x] = alpha_u * cos((2*x+1)*u*pi/16)               #\n    # where alpha_0 = 1/sqrt(8), alpha_{u>0} = 1/2           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3 — Implement quantization                                (6-8 lines)\n# ---------------------------------------------------------------------------\ndef quantize(coeffs: np.ndarray, quality: int) -> np.ndarray:\n    \"\"\"Quantize DCT coefficients using the JPEG quantization table.\n\n    Formula:\n        scale = quality_to_scale(quality)\n        Q_scaled = clip(round(JPEG_Q50 * scale / 100), 1, 255)\n        quantized = round(coeffs / Q_scaled)\n\n    Parameters\n    ----------\n    coeffs : np.ndarray, shape (8, 8)\n        DCT coefficients from forward_dct().\n    quality : int\n        JPEG quality level, 1 (worst) to 100 (best).\n\n    Returns\n    -------\n    np.ndarray, shape (8, 8), dtype float\n        Quantized integer coefficients (still float for downstream math).\n\n    Hint: Use quality_to_scale() to get the scale factor, then build\n          Q_scaled = np.clip(np.round(JPEG_Q50 * scale / 100), 1, 255).\n          Finally divide and round.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-8 lines                             #\n    #                                                         #\n    # 1. Compute scale using quality_to_scale(quality)        #\n    # 2. Build Q_scaled from JPEG_Q50 (see docstring formula) #\n    # 3. Divide coeffs by Q_scaled, then np.round()           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 4 — Implement the inverse DCT (reconstruction)           (8-12 lines)\n# ---------------------------------------------------------------------------\ndef inverse_dct(quantized_coeffs: np.ndarray) -> np.ndarray:\n    \"\"\"Reconstruct an 8×8 pixel block from quantized DCT coefficients.\n\n    Algorithm:\n        1. Dequantize: C_hat = quantized_coeffs * Q_scaled\n           Wait — this function receives *already-dequantized* coefficients.\n           So: C_hat = quantized_coeffs (no further scaling needed here).\n        2. Apply inverse DCT: b_hat = D.T @ C_hat @ D\n           where D is the same DCT matrix as in forward_dct.\n        3. Undo the mean shift: pixel_hat = b_hat + 128\n        4. Clip to [0, 255] and return as float.\n\n    Parameters\n    ----------\n    quantized_coeffs : np.ndarray, shape (8, 8)\n        Already-scaled DCT coefficients (i.e., quantized * Q_scaled).\n        These are the dequantized coefficients ready for IDCT.\n\n    Returns\n    -------\n    np.ndarray, shape (8, 8), dtype float\n        Reconstructed pixel values clipped to [0, 255].\n\n    Note: This function does NOT receive the raw quantized integers.\n          The caller must first multiply quantized * Q_scaled, then\n          call this function. See the __main__ block for the full flow.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # 1. Build the same DCT matrix D as in forward_dct().     #\n    #    (Consider factoring this into a helper, or just       #\n    #    repeat the construction here.)                        #\n    # 2. Apply inverse: b_hat = D.T @ quantized_coeffs @ D    #\n    # 3. Add 128 to undo JPEG's centering                      #\n    # 4. Clip to [0, 255] and return                          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: PSNR helper\n# ---------------------------------------------------------------------------\ndef psnr(original: np.ndarray, reconstructed: np.ndarray) -> float:\n    \"\"\"Compute Peak Signal-to-Noise Ratio in dB.\n\n    PSNR = 10 * log10(255^2 / MSE)\n\n    Parameters\n    ----------\n    original, reconstructed : np.ndarray  float or uint8, any shape\n\n    Returns\n    -------\n    float  PSNR in dB. Higher is better. >40 dB is very good; <25 dB is poor.\n    \"\"\"\n    mse = np.mean((original.astype(float) - reconstructed.astype(float)) ** 2)\n    if mse == 0:\n        return float(\"inf\")\n    return 10.0 * np.log10(255.0 ** 2 / mse)\n\n\n# ---------------------------------------------------------------------------\n# Provided: Synthetic image patch generator (no downloads needed)\n# ---------------------------------------------------------------------------\ndef make_test_blocks(verify: bool = False):\n    \"\"\"Generate a set of test 8×8 blocks representing different image content.\n\n    Returns a dict mapping block_name -> np.ndarray of shape (8, 8), uint8.\n    In verify mode, returns just 2 blocks to keep things fast.\n    \"\"\"\n    rng = np.random.default_rng(42)\n\n    # Smooth gradient (like a road surface)\n    x = np.linspace(100, 160, 8)\n    smooth = np.outer(x, np.ones(8)).astype(np.uint8)\n\n    # High-frequency checkerboard (like a textured surface)\n    checker = np.indices((8, 8)).sum(axis=0) % 2  # 0 or 1\n    checker = (checker * 120 + 80).astype(np.uint8)\n\n    # Mixed content (diagonal edge, like a lane marking)\n    edge = np.zeros((8, 8), dtype=np.uint8)\n    for i in range(8):\n        for j in range(8):\n            edge[i, j] = 200 if j > i else 80\n\n    # Natural image-like: low-freq with some texture\n    natural = rng.integers(80, 180, (8, 8), dtype=np.uint8)\n    # Smooth it a bit\n    from scipy.ndimage import gaussian_filter\n    natural = np.clip(gaussian_filter(natural.astype(float), sigma=1.5), 0, 255).astype(np.uint8)\n\n    if verify:\n        return {\"smooth\": smooth, \"edge\": edge}\n    return {\"smooth\": smooth, \"checker\": checker, \"edge\": edge, \"natural\": natural}\n\n\n# ===========================================================================\n# __main__ — provided, do not modify\n# ===========================================================================\nif __name__ == \"__main__\":\n    import os\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    # Fast-mode params\n    QUALITIES = [10, 50, 90] if not VERIFY else [10, 50]\n    BLOCKS_TO_USE = [\"smooth\", \"edge\"] if VERIFY else [\"smooth\", \"edge\"]\n    BASIS_PAIRS = [(0, 0), (0, 3), (3, 0), (3, 3)] if not VERIFY else [(0, 0), (3, 3)]\n\n    print(\"=\" * 60)\n    print(\"Exercise 1: DCT Basis Functions & JPEG Blocking Artifacts\")\n    print(\"=\" * 60)\n\n    # --- Part A: Visualize DCT basis functions ---\n    print(\"\\n[Part A] Computing DCT basis functions...\")\n    n_basis = len(BASIS_PAIRS)\n    fig = plt.figure(figsize=(14, 10) if not VERIFY else (8, 4))\n    gs = GridSpec(3, 4, figure=fig, hspace=0.5, wspace=0.4)\n\n    # Row 0: basis images\n    for col, (u, v) in enumerate(BASIS_PAIRS):\n        ax = fig.add_subplot(gs[0, col])\n        basis = dct2_basis(u, v)\n        show_patch(ax, basis, f\"Basis ({u},{v})\\nu={u} horiz, v={v} vert\",\n                   cmap=\"RdBu_r\", vmin=-0.5, vmax=0.5, annotate=False)\n\n    # --- Part B: Forward DCT → Quantize at different qualities ---\n    print(\"[Part B] Forward DCT and quantization...\")\n    blocks = make_test_blocks(verify=bool(VERIFY))\n    block = blocks[\"smooth\"]   # use smooth block as running example\n\n    for row, quality in enumerate(QUALITIES):\n        if row >= 3:\n            break\n        ax = fig.add_subplot(gs[1, row])\n        coeffs = forward_dct(block)\n        q_coeffs = quantize(coeffs, quality)\n        # Show the quantized coefficient heatmap (log scale for visibility)\n        display = np.sign(q_coeffs) * np.log1p(np.abs(q_coeffs))\n        show_patch(ax, display,\n                   f\"Quantized coeffs\\nQ={quality}\\nNon-zero: {int(np.sum(q_coeffs != 0))}\",\n                   cmap=\"PuOr\", annotate=True)\n\n    # --- Part C: Reconstruction and PSNR ---\n    print(\"[Part C] Reconstruction and PSNR...\")\n    for col, quality in enumerate(QUALITIES):\n        ax = fig.add_subplot(gs[2, col])\n        coeffs = forward_dct(block)\n        q_int = quantize(coeffs, quality)         # integer quantized values\n\n        # Dequantize: multiply back by scaled Q-table\n        scale = quality_to_scale(quality)\n        Q_scaled = np.clip(np.round(JPEG_Q50 * scale / 100), 1, 255)\n        dequant = q_int * Q_scaled                # restore approximate magnitudes\n\n        reconstructed = inverse_dct(dequant)\n        p = psnr(block, reconstructed)\n        print(f\"  Quality {quality:3d}: PSNR = {p:.2f} dB, \"\n              f\"non-zero coefficients = {int(np.sum(q_int != 0))}/64\")\n\n        show_patch(ax, reconstructed,\n                   f\"Reconstructed Q={quality}\\nPSNR={p:.1f} dB\",\n                   cmap=\"gray\", vmin=0, vmax=255, annotate=False)\n\n    fig.suptitle(\n        \"DCT Basis Functions (top), Quantized Coefficients (middle), \"\n        \"Reconstructions (bottom)\",\n        fontsize=10, y=1.01\n    )\n\n    out_path = \"ex01_dct_basis.png\"\n    plt.savefig(out_path, bbox_inches=\"tight\", dpi=100)\n    plt.close()\n    print(f\"\\nFigure saved to {out_path}\")\n\n    # --- Part D: Blocking artifact demo on a larger synthetic image ---\n    if not VERIFY:\n        print(\"\\n[Part D] Blocking artifact demonstration on 32×32 synthetic image...\")\n        # Create a 32×32 image (4×4 blocks) with a smooth diagonal gradient\n        img32 = np.zeros((32, 32), dtype=np.uint8)\n        for i in range(32):\n            for j in range(32):\n                img32[i, j] = int(np.clip(80 + 3 * i + 2 * j, 0, 255))\n\n        fig2, axes = plt.subplots(1, 4, figsize=(14, 4))\n        axes[0].imshow(img32, cmap=\"gray\", vmin=0, vmax=255)\n        axes[0].set_title(\"Original 32×32\\n(smooth gradient)\", fontsize=9)\n        axes[0].axis(\"off\")\n\n        for ax_idx, quality in enumerate([10, 50, 90]):\n            recon32 = np.zeros_like(img32, dtype=float)\n            for bi in range(0, 32, 8):\n                for bj in range(0, 32, 8):\n                    blk = img32[bi:bi+8, bj:bj+8]\n                    c = forward_dct(blk)\n                    q = quantize(c, quality)\n                    scale = quality_to_scale(quality)\n                    Q_s = np.clip(np.round(JPEG_Q50 * scale / 100), 1, 255)\n                    deq = q * Q_s\n                    rec = inverse_dct(deq)\n                    recon32[bi:bi+8, bj:bj+8] = rec\n\n            axes[ax_idx + 1].imshow(recon32, cmap=\"gray\", vmin=0, vmax=255)\n            p = psnr(img32, recon32)\n            axes[ax_idx + 1].set_title(\n                f\"Quality={quality}\\nPSNR={p:.1f} dB\", fontsize=9)\n            axes[ax_idx + 1].axis(\"off\")\n            # Draw block grid\n            for line in range(0, 33, 8):\n                axes[ax_idx + 1].axhline(line - 0.5, color=\"red\", lw=0.5, alpha=0.7)\n                axes[ax_idx + 1].axvline(line - 0.5, color=\"red\", lw=0.5, alpha=0.7)\n\n        fig2.suptitle(\n            \"JPEG Blocking Artifacts: Red lines show 8×8 block boundaries\\n\"\n            \"(low quality exposes the block structure)\", fontsize=10\n        )\n        out_path2 = \"ex01_blocking_artifacts.png\"\n        plt.savefig(out_path2, bbox_inches=\"tight\", dpi=120)\n        plt.close()\n        print(f\"Blocking artifact figure saved to {out_path2}\")\n\n    print(\"\\nDone. Key takeaway: At low quality, blocking artifacts appear\")\n    print(\"because each 8×8 block is quantized independently — the 8×8 DCT\")\n    print(\"basis functions' visual appearance leaks through the reconstruction.\")\n"}, {"filename": "ex02_banana_distribution_lattice_vs_learned_nonlinear_q.py", "content": "\"\"\"\nExercise 2: Banana Distribution — Lattice vs. Learned Nonlinear Quantizer\n==========================================================================\nModule 0 — Transform Coding Intuition\n\nGoal: Compare a simple lattice quantizer against a learned nonlinear\ntransform coder on a 2D banana-shaped data distribution. Visualize how\nthe nonlinear transform warps the space so that a uniform grid becomes\nan efficient quantizer for curved data.\n\nKey insight from Ballé et al. (2017):\n  \"We instead assume a fixed uniform scalar quantizer in the code space,\n   and aim to have the nonlinear transformations warp the space in an\n   appropriate way, effectively implementing a parametric form of vector\n   quantization.\"\n\nThis exercise makes that warp VISIBLE in 2D.\n\nAfter completing this exercise you will be able to:\n  - Explain why a lattice quantizer is suboptimal for non-Gaussian data\n  - Describe how a learned encoder \"straightens\" curved distributions\n  - Connect uniform noise during training to the rounding used at inference\n\nUsage:\n    python ex02_banana_distribution_lattice_vs_learned_nonlinear_q.py\n\n    Verification mode (fast, CPU, no downloads):\n    DISTILL_VERIFY=1 python ex02_banana_distribution_lattice_vs_learned_nonlinear_q.py\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\n\n# ---------------------------------------------------------------------------\n# Provided: Banana distribution generator\n# ---------------------------------------------------------------------------\ndef make_banana(n_samples: int = 2000, noise: float = 0.15,\n                seed: int = 42) -> np.ndarray:\n    \"\"\"Generate a 2D banana (moon-shaped) distribution.\n\n    Uses a parametric curve: x = cos(t), y = sin(t) + x^2/2 - 0.25\n    scaled to fill roughly [-2, 2] x [-1, 1.5].\n\n    Parameters\n    ----------\n    n_samples : int   number of points\n    noise : float     std of Gaussian noise added to each point\n    seed : int        random seed\n\n    Returns\n    -------\n    np.ndarray, shape (n_samples, 2)  float32\n    \"\"\"\n    rng = np.random.default_rng(seed)\n    t = rng.uniform(-np.pi * 0.8, np.pi * 0.8, n_samples)\n    x1 = np.cos(t) * 2.0\n    x2 = np.sin(t) * 1.2 + (x1 / 2.0) ** 2 - 0.8\n    x1 += rng.normal(0, noise, n_samples)\n    x2 += rng.normal(0, noise, n_samples)\n    return np.column_stack([x1, x2]).astype(np.float32)\n\n\n# ---------------------------------------------------------------------------\n# Provided: Lattice quantizer\n# ---------------------------------------------------------------------------\ndef lattice_quantize(X: np.ndarray, step: float = 0.5) -> np.ndarray:\n    \"\"\"Apply uniform scalar lattice quantization to 2D points.\n\n    Maps each point (x1, x2) → (round(x1/step)*step, round(x2/step)*step).\n    This is a rectangular lattice in the original data space.\n\n    Parameters\n    ----------\n    X : np.ndarray, shape (N, 2)\n    step : float   quantization step size (bin width)\n\n    Returns\n    -------\n    np.ndarray, shape (N, 2)   reconstructed points at bin centers\n    \"\"\"\n    return np.round(X / step) * step\n\n\n# ---------------------------------------------------------------------------\n# Provided: Assign color index based on quantization bin\n# ---------------------------------------------------------------------------\ndef bin_colors(X_quantized: np.ndarray) -> np.ndarray:\n    \"\"\"Assign an integer color index to each unique quantization bin.\n\n    Parameters\n    ----------\n    X_quantized : np.ndarray, shape (N, 2)   quantized points (bin centers)\n\n    Returns\n    -------\n    np.ndarray, shape (N,)   integer color index per point\n    \"\"\"\n    # Round to 3 decimal places to handle floating point noise\n    rounded = np.round(X_quantized, 3)\n    # Get unique rows and their inverse mapping\n    _, inv = np.unique(rounded, axis=0, return_inverse=True)\n    return inv\n\n\n# ---------------------------------------------------------------------------\n# Provided: MSE helper\n# ---------------------------------------------------------------------------\ndef compute_mse(original: np.ndarray, reconstructed: np.ndarray) -> float:\n    \"\"\"Mean squared error between two arrays.\"\"\"\n    return float(np.mean((original - reconstructed) ** 2))\n\n\n# ---------------------------------------------------------------------------\n# TODO 1 — Implement the Encoder MLP                            (8-10 lines)\n# ---------------------------------------------------------------------------\nclass Encoder(nn.Module):\n    \"\"\"Nonlinear analysis transform: maps 2D data → 2D latent space.\n\n    Architecture: Linear(2→16) → ReLU → Linear(16→2)\n\n    The encoder's job is to \"straighten\" the banana into an axis-aligned\n    distribution that a uniform grid can quantize efficiently. With only\n    2D input and 2D output, we can visualize what the transform does.\n\n    Parameters\n    ----------\n    hidden_dim : int   number of hidden units (default 16)\n    \"\"\"\n\n    def __init__(self, hidden_dim: int = 16):\n        super().__init__()\n        ###########################################################\n        # YOUR CODE HERE - 4-6 lines                             #\n        #                                                         #\n        # Define:                                                 #\n        #   self.fc1 : nn.Linear(2, hidden_dim)                   #\n        #   self.fc2 : nn.Linear(hidden_dim, 2)                   #\n        # Note: the activation (ReLU) is typically applied in     #\n        # forward(), not stored as a module.                      #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"Forward pass: x (N,2) → latent (N,2).\n\n        Parameters\n        ----------\n        x : torch.Tensor, shape (N, 2)\n\n        Returns\n        -------\n        torch.Tensor, shape (N, 2)\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - 3-4 lines                             #\n        #                                                         #\n        # Apply: fc1 → ReLU → fc2                                 #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2 — Implement the Decoder MLP                            (8-10 lines)\n# ---------------------------------------------------------------------------\nclass Decoder(nn.Module):\n    \"\"\"Nonlinear synthesis transform: maps 2D latent → 2D reconstructed data.\n\n    Architecture: Linear(2→16) → ReLU → Linear(16→2)\n\n    This is the inverse of the Encoder. Because the transforms are learned\n    jointly, the encoder and decoder adapt to each other.\n\n    Parameters\n    ----------\n    hidden_dim : int   number of hidden units (default 16)\n    \"\"\"\n\n    def __init__(self, hidden_dim: int = 16):\n        super().__init__()\n        ###########################################################\n        # YOUR CODE HERE - 4-6 lines                             #\n        #                                                         #\n        # Mirror the Encoder: define fc1 and fc2.                 #\n        # Input dim = 2 (latent), output dim = 2 (data space).    #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def forward(self, z: torch.Tensor) -> torch.Tensor:\n        \"\"\"Forward pass: latent (N,2) → reconstructed (N,2).\n\n        Parameters\n        ----------\n        z : torch.Tensor, shape (N, 2)\n\n        Returns\n        -------\n        torch.Tensor, shape (N, 2)\n        \"\"\"\n        ###########################################################\n        # YOUR CODE HERE - 3-4 lines                             #\n        #                                                         #\n        # Apply: fc1 → ReLU → fc2                                 #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3 — Implement the training loop                          (15-20 lines)\n# ---------------------------------------------------------------------------\ndef train_nonlinear_coder(\n    X: np.ndarray,\n    encoder: Encoder,\n    decoder: Decoder,\n    n_steps: int = 3000,\n    lr: float = 3e-3,\n    quant_step: float = 0.5,\n    batch_size: int = 256,\n    seed: int = 0,\n) -> list:\n    \"\"\"Train encoder+decoder to minimize MSE through uniform noise quantization.\n\n    The quantization trick (Ballé et al. Section 3):\n        - During training: replace rounding with UNIFORM NOISE\n            y_hat = encode(x) + Uniform(-quant_step/2, +quant_step/2)\n          This gives gradients through the quantizer.\n        - During inference: use actual rounding\n            y_hat = round(encode(x) / quant_step) * quant_step\n\n    Objective: minimize MSE( decode(y_hat), x )\n\n    Parameters\n    ----------\n    X : np.ndarray, shape (N, 2), float32   training data\n    encoder : Encoder\n    decoder : Decoder\n    n_steps : int   number of gradient steps\n    lr : float   learning rate\n    quant_step : float   quantization bin width (= 0.5 means integer rounding\n                         after dividing by 0.5 and multiplying by 0.5)\n    batch_size : int   mini-batch size\n    seed : int   for reproducibility\n\n    Returns\n    -------\n    list of float   training loss per step\n    \"\"\"\n    torch.manual_seed(seed)\n    optimizer = optim.Adam(\n        list(encoder.parameters()) + list(decoder.parameters()), lr=lr\n    )\n    X_t = torch.from_numpy(X)\n    N = len(X_t)\n    losses = []\n\n    ###########################################################\n    # YOUR CODE HERE - 15-20 lines                            #\n    #                                                         #\n    # Training loop structure:                                #\n    #   for step in range(n_steps):                           #\n    #     1. Sample a random mini-batch of size batch_size    #\n    #        indices: torch.randint(N, (batch_size,))         #\n    #        batch: X_t[indices]                              #\n    #     2. Encode: y = encoder(batch)                       #\n    #     3. Add uniform noise instead of rounding:           #\n    #        noise = torch.zeros_like(y).uniform_(           #\n    #            -quant_step/2, +quant_step/2)                #\n    #        y_hat = y + noise                                #\n    #     4. Decode: x_hat = decoder(y_hat)                   #\n    #     5. MSE loss: ((batch - x_hat)**2).mean()            #\n    #     6. optimizer.zero_grad(), loss.backward(),          #\n    #        optimizer.step()                                 #\n    #     7. Append loss.item() to losses                     #\n    #                                                         #\n    # Hint: No need for model.train() — they are always in    #\n    # training mode by default.                               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n    return losses\n\n\n# ---------------------------------------------------------------------------\n# TODO 4 — Evaluate with actual rounding                        (8-12 lines)\n# ---------------------------------------------------------------------------\ndef evaluate_learned(\n    X: np.ndarray,\n    encoder: Encoder,\n    decoder: Decoder,\n    quant_step: float = 0.5,\n) -> tuple:\n    \"\"\"Evaluate the trained model using actual rounding (not noise).\n\n    At inference time, we switch from uniform noise to hard rounding:\n        y_hat = round(encode(x) / quant_step) * quant_step\n\n    This is the actual codec behavior used when compressing images.\n\n    Parameters\n    ----------\n    X : np.ndarray, shape (N, 2), float32\n    encoder : Encoder\n    decoder : Decoder\n    quant_step : float\n\n    Returns\n    -------\n    latents : np.ndarray, shape (N, 2)   encoded points y = encoder(x)\n    quantized_latents : np.ndarray, shape (N, 2  --- Generate data ---\n    X = make_banana(n_samples=N_SAMPLES)\n    print(f\"\\nData: {X.shape[0]} banana samples, \"\n          f\"x1 in [{X[:,0].min():.2f}, {X[:,0].max():.2f}], \"\n          f\"x2 in [{X[:,1].min():.2f}, {X[:,1].max():.2f}]\")\n\n    # --- Lattice quantizer ---\n    X_lattice = lattice_quantize(X, step=QUANT_STEP)\n    lattice_mse = compute_mse(X, X_lattice)\n    print(f\"\\nLattice quantizer MSE:  {lattice_mse:.4f}\")\n\n    # --- Learned nonlinear coder ---\n    torch.manual_seed(42)\n    encoder = Encoder(hidden_dim=16)\n    decoder = Decoder(hidden_dim=16)\n\n    print(f\"\\nTraining nonlinear coder for {N_STEPS} steps...\")\n    losses = train_nonlinear_coder(\n        X, encoder, decoder,\n        n_steps=N_STEPS, lr=LR,\n        quant_step=QUANT_STEP, batch_size=BATCH_SIZE\n    )\n\n    latents, q_latents, X_learned, learned_mse = evaluate_learned(\n        X, encoder, decoder, quant_step=QUANT_STEP\n    )\n    print(f\"Learned MSE:            {learned_mse:.4f}\")\n    print(f\"Improvement ratio:      {lattice_mse / learned_mse:.2f}× lower MSE with learned transform\")\n\n    # --- Visualization: 2×3 grid ---\n    fig, axes = plt.subplots(2, 3, figsize=(14, 9) if not VERIFY else (10, 6))\n\n    # Color by quantization bin\n    lattice_colors = bin_colors(X_lattice)\n    learned_colors = bin_colors(q_latents)\n\n    # Row 0: Lattice quantizer\n    # Col 0: original samples colored by lattice bin\n    axes[0, 0].scatter(X[:, 0], X[:, 1], c=lattice_colors, cmap=\"tab20\",\n                       s=8, alpha=0.6)\n    # Draw lattice grid\n    for v in np.arange(-3, 3, QUANT_STEP):\n        axes[0, 0].axvline(v, color=\"gray\", lw=0.4, alpha=0.4)\n        axes[0, 0].axhline(v, color=\"gray\", lw=0.4, alpha=0.4)\n    axes[0, 0].set_title(\"Lattice: data space\\n(colors = quantization bins)\", fontsize=9)\n    axes[0, 0].set_xlim(-3, 3); axes[0, 0].set_ylim(-2, 2.5)\n\n    # Col 1: reconstructions (lattice bin centers)\n    axes[0, 1].scatter(X_lattice[:, 0], X_lattice[:, 1],\n                       c=lattice_colors, cmap=\"tab20\", s=8, alpha=0.6)\n    axes[0, 1].set_title(\"Lattice: reconstructions\\n(bin centers)\", fontsize=9)\n    axes[0, 1].set_xlim(-3, 3); axes[0, 1].set_ylim(-2, 2.5)\n\n    # Col 2: MSE histogram\n    errors_lattice = np.sum((X - X_lattice) ** 2, axis=1)\n    axes[0, 2].hist(errors_lattice, bins=30, color=\"steelblue\", edgecolor=\"white\",\n                    lw=0.5)\n    axes[0, 2].axvline(lattice_mse, color=\"red\", lw=2,\n                       label=f\"Mean={lattice_mse:.3f}\")\n    axes[0, 2].set_xlabel(\"Per-point MSE\"); axes[0, 2].set_ylabel(\"Count\")\n    axes[0, 2].set_title(\"Lattice: per-point MSE\\ndistribution\", fontsize=9)\n    axes[0, 2].legend(fontsize=8)\n\n    # Row 1: Learned nonlinear coder\n    # Col 0: latent space colored by learned quantization bin\n    axes[1, 0].scatter(latents[:, 0], latents[:, 1], c=learned_colors,\n                       cmap=\"tab20\", s=8, alpha=0.6)\n    # Draw latent-space grid\n    for v in np.arange(latents.min() - 1, latents.max() + 1, QUANT_STEP):\n        axes[1, 0].axvline(v, color=\"gray\", lw=0.4, alpha=0.4)\n        axes[1, 0].axhline(v, color=\"gray\", lw=0.4, alpha=0.4)\n    axes[1, 0].set_title(\"Learned: latent space\\n(encoder has warped the banana)\", fontsize=9)\n\n    # Col 1: reconstructions (learned)\n    axes[1, 1].scatter(X_learned[:, 0], X_learned[:, 1], c=learned_colors,\n                       cmap=\"tab20\", s=8, alpha=0.6)\n    axes[1, 1].set_title(\"Learned: reconstructions\\n(follow banana shape)\", fontsize=9)\n    axes[1, 1].set_xlim(-3, 3); axes[1, 1].set_ylim(-2, 2.5)\n\n    # Col 2: MSE histogram\n    errors_learned = np.sum((X - X_learned) ** 2, axis=1)\n    axes[1, 2].hist(errors_learned, bins=30, color=\"darkorange\", edgecolor=\"white\",\n                    lw=0.5)\n    axes[1, 2].axvline(learned_mse, color=\"red\", lw=2,\n                       label=f\"Mean={learned_mse:.3f}\")\n    axes[
