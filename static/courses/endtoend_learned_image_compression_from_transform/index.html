\n\n    Notes\n    -----\n    We use padding=2 so that spatial dimensions are preserved (no downsampling\n    here — we just want to compare the activation distributions).\n    Random weights are used so the comparison is fair: neither pipeline has\n    been trained to produce Gaussian outputs.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — build Conv → ReLU pipeline             #\n    # (~5 lines)                                              #\n    #                                                         #\n    # Use nn.Sequential with:                                 #\n    #   1. nn.Conv2d(in_channels, out_channels,               #\n    #               kernel_size=5, padding=2, bias=False)     #\n    #   2. nn.ReLU()                                          #\n    #                                                         #\n    # Set requires_grad=False on all parameters so we don't   #\n    # accidentally train anything. Call .eval() at the end.   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef build_gdn_pipeline(in_channels: int, out_channels: int) -> nn.Sequential:\n    \"\"\"\n    Build a single-stage Conv → GDN feature extractor with random weights.\n\n    Parameters\n    ----------\n    in_channels : int\n        Number of input channels (1 for grayscale patches).\n    out_channels : int\n        Number of output feature channels C.\n\n    Returns\n    -------\n    nn.Sequential\n        A two-layer pipeline: Conv2d(in_channels, out_channels, kernel_size=5,\n        padding=2) followed by GDN(out_channels).\n\n    Notes\n    -----\n    IMPORTANT: Use the SAME convolutional weights as build_relu_pipeline so\n    the comparison is purely about the nonlinearity, not random initialization.\n    In the __main__ block we set the conv weights explicitly after building.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — build Conv → GDN pipeline              #\n    # (~5 lines)                                              #\n    #                                                         #\n    # Same structure as build_relu_pipeline but replace       #\n    # nn.ReLU() with GDN(out_channels).                       #\n    # Again, set requires_grad=False and call .eval().        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef collect_activations(pipeline: nn.Sequential,\n                        patches: torch.Tensor) -> np.ndarray:\n    \"\"\"\n    Run patches through the pipeline and collect per-channel activations.\n\n    Parameters\n    ----------\n    pipeline : nn.Sequential\n        A built (and .eval()'d) feature extraction pipeline.\n    patches : torch.Tensor, shape (N, 1, H, W)\n        Grayscale image patches to process.\n\n    Returns\n    -------\n    np.ndarray, shape (C, N*H*W)\n        For each of the C output channels, all spatial activations across all\n        patches concatenated into a 1-D array.\n        Channel c is: output[:, c, :, :].flatten()\n\n    Notes\n    -----\n    Run under torch.no_grad() to skip gradient computation.\n    Use .detach().cpu().numpy() to convert tensors to numpy arrays.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — collect per-channel activations        #\n    # (~10 lines)                                             #\n    #                                                         #\n    # 1. Run pipeline(patches) under torch.no_grad()          #\n    # 2. output shape: (N, C, H, W)                           #\n    # 3. Permute to (C, N, H, W) then reshape to (C, N*H*W)  #\n    # 4. Convert to numpy and return                          #\n    #                                                         #\n    # Pitfall: make sure you run ALL patches in one call      #\n    # (not one patch at a time) to get consistent statistics. #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compute_kurtosis_table(relu_acts: np.ndarray,\n                           gdn_acts: np.ndarray,\n                           n_channels_to_show: int = 6) -> tuple:\n    \"\"\"\n    Compute excess kurtosis for each channel and print a comparison table.\n\n    Parameters\n    ----------\n    relu_acts : np.ndarray, shape (C, N*H*W)\n        Per-channel activations from the ReLU pipeline.\n    gdn_acts : np.ndarray, shape (C, N*H*W)\n        Per-channel activations from the GDN pipeline.\n    n_channels_to_show : int\n        How many channels to include in the printed table.\n\n    Returns\n    -------\n    (float, float)\n        (avg_abs_kurtosis_relu, avg_abs_kurtosis_gdn)\n        Average |excess kurtosis| across all channels for each pipeline.\n\n    Notes\n    -----\n    scipy.stats.kurtosis returns EXCESS kurtosis (Gaussian = 0).\n    A Gaussian has kurtosis 0; Laplacian has kurtosis 3; super-Gaussian > 3.\n    Natural image filter responses typically show kurtosis 8-15.\n    Smaller |kurtosis| means more Gaussian → cheaper to entropy-code.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — kurtosis table                         #\n    # (~14 lines)                                             #\n    #                                                         #\n    # For each of the first n_channels_to_show channels:     #\n    #   - Compute excess kurtosis with scipy.stats.kurtosis() #\n    #   - Print a row: \"  ch %2d | ReLU: %+6.2f | GDN: %+6.2f\"#\n    #                                                         #\n    # Then compute avg |kurtosis| over ALL channels and       #\n    # print the summary line:                                 #\n    #   \"Avg |kurtosis|: ReLU=X.XX, GDN=X.XX\"               #\n    #                                                         #\n    # Return (avg_relu, avg_gdn) as a tuple of floats.        #\n    #                                                         #\n    # Note: ReLU zeroes out negative values, giving a         #\n    # half-rectified distribution. Expect its kurtosis to    #\n    # differ significantly from 0. GDN preserves signs and   #\n    # compresses magnitudes → closer to Gaussian.            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef plot_qq_comparison(relu_acts: np.ndarray,\n                       gdn_acts: np.ndarray,\n                       channels_to_plot: list,\n                       out_path: str) -> None:\n    \"\"\"\n    Create a 2×len(channels_to_plot) grid of QQ-plots.\n\n    Top row: ReLU channels — expected to show heavy tails / asymmetry.\n    Bottom row: GDN channels — expected to lie closer to the diagonal.\n\n    Parameters\n    ----------\n    relu_acts : np.ndarray, shape (C, N*H*W)\n    gdn_acts  : np.ndarray, shape (C, N*H*W)\n    channels_to_plot : list of int\n        Which channel indices to visualize (e.g., [0, 4, 8]).\n    out_path : str\n        File path to save the figure (e.g., \"ex02_qq_comparison.png\").\n\n    Notes\n    -----\n    Use scipy.stats.probplot(data, dist='norm', plot=ax) for each subplot.\n    Title each subplot with \"ReLU ch {c}\" or \"GDN ch {c}\".\n    Color ReLU subplots in coral / red tones, GDN subplots in teal / blue.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — QQ-plot figure                         #\n    # (~18 lines)                                             #\n    #                                                         #\n    # 1. Create fig, axes = plt.subplots(2, len(channels),    #\n    #      figsize=(4*len(channels), 8))                      #\n    # 2. For each column c_idx, c in enumerate(channels):    #\n    #      Top row (row=0): stats.probplot(relu_acts[c],      #\n    #          dist='norm', plot=axes[0, c_idx])              #\n    #      Style the axes[0] subplot (title, color)           #\n    #      Bottom row (row=1): same for gdn_acts[c]           #\n    # 3. Add a suptitle, tight_layout, savefig                #\n    #                                                         #\n    # The diagonal line in a QQ-plot is the Gaussian reference#\n    # A perfect Gaussian distribution lies exactly on it.     #\n    # Deviation at the extremes indicates heavy tails.        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── Main Harness ────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    torch.manual_seed(42)\n    np.random.seed(42)\n\n    C          = 8   if VERIFY else 16    # output channels\n    N_PATCHES  = 16  if VERIFY else 200   # number of patches to process\n    PATCH_SIZE = 16  if VERIFY else 32    # spatial size of each patch\n    N_CHANNELS_SHOW = 3 if VERIFY else 6  # channels in QQ-plot\n\n    print(\"=\" * 60)\n    print(\"Exercise 2: GDN vs ReLU — Gaussianizing Image Statistics\")\n    print(\"=\" * 60)\n    print(f\"Config: C={C}, N_PATCHES={N_PATCHES}, PATCH_SIZE={PATCH_SIZE}\")\n    print()\n\n    # ── Build both pipelines ──────────────────────────────────────\n    relu_pipeline = build_relu_pipeline(in_channels=1, out_channels=C)\n    gdn_pipeline  = build_gdn_pipeline(in_channels=1, out_channels=C)\n\n    # Copy the SAME conv weights into both pipelines for a fair comparison.\n    # Only the nonlinearity differs.\n    with torch.no_grad():\n        shared_weight = torch.randn(C, 1, 5, 5) * 0.1\n        relu_pipeline[0].weight.copy_(shared_weight)\n        gdn_pipeline[0].weight.copy_(shared_weight)\n\n    print(\"Pipelines built. Shared conv weights copied.\")\n\n    # ── Generate synthetic image patches ─────────────────────────\n    # Use synthetic Laplacian-like patches (heavy-tailed, like natural images)\n    # rather than downloading CIFAR-10 (requires network + torchvision).\n    # A mixture of Gaussian blobs mimics the edge-heavy statistics of real images.\n    patches_raw = torch.randn(N_PATCHES, 1, PATCH_SIZE, PATCH_SIZE)\n    # Add some heavy-tailed structure: random sparse \"edges\"\n    spikes = (torch.rand_like(patches_raw) > 0.95).float() * torch.randn_like(patches_raw) * 3\n    patches = patches_raw + spikes\n    patches = (patches - patches.mean()) / (patches.std() + 1e-8)\n    print(f\"Input patches: shape={tuple(patches.shape)}, \"\n          f\"mean={patches.mean():.3f}, std={patches.std():.3f}\")\n    print(f\"Input kurtosis (should be >3, heavy-tailed): \"\n          f\"{stats.kurtosis(patches.numpy().flatten()):.2f}\")\n    print()\n\n    # ── Collect activations ───────────────────────────────────────\n    relu_acts = collect_activations(relu_pipeline, patches)\n    gdn_acts  = collect_activations(gdn_pipeline,  patches)\n    print(f\"ReLU activations: shape={relu_acts.shape}\")\n    print(f\"GDN  activations: shape={gdn_acts.shape}\")\n    print()\n\n    # ── Kurtosis table ────────────────────────────────────────────\n    print(f\"{'Channel':>8} | {'ReLU kurtosis':>14} | {'GDN kurtosis':>13}\")\n    print(\"-\" * 44)\n    avg_relu_k, avg_gdn_k = compute_kurtosis_table(\n        relu_acts, gdn_acts, n_channels_to_show=N_CHANNELS_SHOW\n    )\n    print()\n\n    # ── QQ-plot figure ────────────────────────────────────────────\n    channels_to_plot = list(range(min(N_CHANNELS_SHOW, C)))\n    out_path = \"ex02_qq_comparison.png\"\n    plot_qq_comparison(relu_acts, gdn_acts, channels_to_plot, out_path)\n    print(f\"QQ-plot saved to: {out_path}\")\n    print()\n\n    # ── Summary ───────────────────────────────────────────────────\n    print(\"=\" * 60)\n    print(\"SUMMARY\")\n    print(\"=\" * 60)\n    print(f\"Avg |kurtosis|: ReLU={avg_relu_k:.2f}, GDN={avg_gdn_k:.2f}\")\n    print()\n    if avg_gdn_k < avg_relu_k:\n        print(\"✓ GDN produces more Gaussian (lower |kurtosis|) latents.\")\n        print(\"  More Gaussian → entropy model wastes fewer bits → better R-D.\")\n    else:\n        print(\"Note: ReLU happened to win on this random seed / config.\")\n        print(\"Try with more patches or larger C for a more robust comparison.\")\n    print()\n    print(\"Connection to paper:\")\n    print(\"  The analysis transform g_a applies [Conv → GDN] × 3 stages.\")\n    print(\"  Three GDN stages compound the Gaussianization: each stage\")\n    print(\"  removes another layer of statistical dependency from the latents.\")\n"}, {"filename": "ex03_igdn_the_approximate_inverse.py", "content": "\"\"\"\nExercise 3: IGDN — The Approximate Inverse\n===========================================\nModule 3 — GDN: The Key Nonlinearity\n\nThe synthesis transform g_s needs to UNDO what g_a did. After the analysis\ntransform maps pixels → latents via [Conv → GDN], the synthesis transform\nmaps latents → pixels via [IGDN → ConvTranspose]. To close the loop you need\nan approximate inverse for GDN.\n\nFrom the paper (Section 4):\n  \"The approximate inverse consists of one iteration, but with a separate set\n  of parameters from the forward transform, which are constrained in the same\n  way, but trained separately. We refer to this nonlinear transform as inverse\n  GDN (IGDN).\"\n\nThe key word is SEPARATE. IGDN does NOT derive its parameters from GDN's β\nand γ. Instead it is free to learn a complementary mapping. This gives the\nsynthesis transform freedom to compensate for quantization errors that occur\nbetween g_a and g_s.\n\nIGDN formula (multiplicative form):\n    v_i(m,n) = u_i(m,n) · sqrt(β_i + Σ_j γ_ij · u_j(m,n)²)\n\nCompare to GDN:\n    u_i(m,n) = w_i(m,n) / sqrt(β_i + Σ_j γ_ij · w_j(m,n)²)\n\nIGDN multiplies by the same normalization factor that GDN divides by.\nIf both had the SAME parameters, applying IGDN(GDN(x)) would give back x\nexactly (proof: cancel numerator and denominator). But since they have\nSEPARATE parameters, IGDN can only approximate the inverse.\n\nIn this exercise you:\n  1. Implement IGDN.forward() (the multiplicative form)\n  2. Implement the round-trip error: ||IGDN(GDN(x)) - x||²\n  3. Optimize IGDN parameters to minimize round-trip MSE given fixed GDN\n  4. Visualize the round-trip reconstruction before and after optimization\n\nLearning objectives for this exercise:\n  - Understand why IGDN uses multiplication instead of division\n  - See that IGDN parameters are completely separate from GDN\n  - Experience the optimization that makes IGDN approximate the inverse\n  - Build the mental model for how g_a and g_s are paired\n\"\"\"\n\nimport os\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\n\n# ─── GDN from Exercise 1 (self-contained copy) ───────────────────────────────\n\nclass GDN(nn.Module):\n    \"\"\"Generalized Divisive Normalization (Ballé et al., ICLR 2017).\"\"\"\n\n    def __init__(self, num_channels: int):\n        super().__init__()\n        C = num_channels\n        self.beta_prime  = nn.Parameter(torch.ones(C))\n        self.gamma_prime = nn.Parameter(torch.eye(C) * 0.1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta      = self.beta_prime ** 2\n        gamma_raw = self.gamma_prime ** 2\n        gamma     = (gamma_raw + gamma_raw.T) / 2\n        x_sq      = x ** 2\n        norm      = torch.einsum('ij,bjmn->bimn', gamma, x_sq)\n        norm      = (norm + beta[None, :, None, None]).sqrt()\n        return x / norm\n\n\n# ─── IGDN Module ─────────────────────────────────────────────────────────────\n\nclass IGDN(nn.Module):\n    \"\"\"\n    Inverse Generalized Divisive Normalization (Ballé et al., ICLR 2017).\n\n    Implements the multiplicative approximate inverse of GDN:\n        v_i(m,n) = u_i(m,n) · sqrt(β_i + Σ_j γ_ij · u_j(m,n)²)\n\n    Parameters are SEPARATE from any GDN instance — they are trained\n    independently to minimize round-trip reconstruction error.\n\n    Parameters\n    ----------\n    num_channels : int\n        Number of feature-map channels C.\n\n    Attributes\n    ----------\n    beta_prime : nn.Parameter, shape (C,)\n        Raw bias parameters. β = (β')². Same reparameterization as GDN.\n    gamma_prime : nn.Parameter, shape (C, C)\n        Raw interaction matrix. γ = symmetrize((γ')²).\n    \"\"\"\n\n    def __init__(self, num_channels: int):\n        super().__init__()\n        C = num_channels\n        # Same initialization as GDN: beta ≈ 1, small diagonal gamma\n        self.beta_prime  = nn.Parameter(torch.ones(C))\n        self.gamma_prime = nn.Parameter(torch.eye(C) * 0.1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"\n        Apply IGDN to a batch of feature maps.\n\n        Parameters\n        ----------\n        x : torch.Tensor, shape (B, C, H, W)\n            Input feature maps (e.g., GDN outputs from the analysis transform).\n\n        Returns\n        -------\n        torch.Tensor, shape (B, C, H, W)\n            IGDN-expanded feature maps. Same shape as input.\n\n        Notes\n        -----\n        IGDN is GDN \"flipped\": instead of dividing by the normalization factor,\n        we MULTIPLY by it. This inverts the gain-control effect:\n          - GDN: u = w / sqrt(β + Σ γ w²)      (divide → compress magnitudes)\n          - IGDN: v = u · sqrt(β + Σ γ u²)     (multiply → expand magnitudes)\n        If β and γ are identical to GDN's, IGDN(GDN(x)) = x exactly.\n        With separate trained parameters, it approximates the inverse.\n        \"\"\"\n        B, C, H, W = x.shape\n        assert C == self.beta_prime.shape[0], (\n            f\"Channel mismatch: x has {C} channels but IGDN was built for \"\n            f\"{self.beta_prime.shape[0]} channels.\"\n        )\n\n        ###########################################################\n        # YOUR CODE HERE — IGDN forward pass                      #\n        # (~8 lines)                                              #\n        #                                                         #\n        # Mirror the GDN forward pass EXACTLY, except the last   #\n        # line should MULTIPLY instead of DIVIDE:                 #\n        #   return x * norm     (not x / norm)                   #\n        #                                                         #\n        # Steps:                                                  #\n        #   1. beta  = beta_prime ** 2           (C,)             #\n        #   2. gamma_raw = gamma_prime ** 2      (C, C)           #\n        #   3. gamma = (gamma_raw + gamma_raw.T) / 2  (symmetrize)#\n        #   4. x_sq = x ** 2                    (B, C, H, W)     #\n        #   5. norm = einsum('ij,bjmn->bimn', gamma, x_sq)       #\n        #   6. norm = (norm + beta[None,:,None,None]).sqrt()      #\n        #   7. return x * norm                                    #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ─── Round-trip error ────────────────────────────────────────────────────────\n\ndef round_trip_mse(gdn: GDN, igdn: IGDN, x: torch.Tensor) -> torch.Tensor:\n    \"\"\"\n    Compute the round-trip mean squared error: ||IGDN(GDN(x)) - x||².\n\n    Parameters\n    ----------\n    gdn : GDN\n        Fixed analysis nonlinearity (parameters frozen).\n    igdn : IGDN\n        Synthesis nonlinearity being optimized.\n    x : torch.Tensor, shape (B, C, H, W)\n        Input feature maps.\n\n    Returns\n    -------\n    torch.Tensor (scalar)\n        Mean squared error averaged over all elements of the tensor.\n\n    Notes\n    -----\n    The GDN parameters should be frozen (requires_grad=False) during this call\n    so that only IGDN parameters receive gradients when .backward() is called.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — round-trip MSE                         #\n    # (~5 lines)                                              #\n    #                                                         #\n    # 1. Apply GDN to x: y = gdn(x)                          #\n    # 2. Apply IGDN to y: x_hat = igdn(y)                    #\n    # 3. Compute MSE: ((x_hat - x) ** 2).mean()              #\n    # 4. Return the scalar MSE tensor                         #\n    #                                                         #\n    # This MSE measures how well IGDN inverts GDN.            #\n    # Goal: minimize this by optimizing igdn.parameters().   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef optimize_igdn(gdn: GDN, igdn: IGDN, x_train: torch.Tensor,\n                  n_steps: int = 500, lr: float = 1e-2) -> list:\n    \"\"\"\n    Optimize IGDN parameters to minimize round-trip MSE given fixed GDN.\n\n    Parameters\n    ----------\n    gdn : GDN\n        Fixed analysis nonlinearity. Its parameters must NOT be updated.\n    igdn : IGDN\n        The IGDN module whose parameters we will optimize.\n    x_train : torch.Tensor, shape (B, C, H, W)\n        Training data for the round-trip optimization.\n    n_steps : int\n        Number of optimization steps.\n    lr : float\n        Learning rate for Adam optimizer.\n\n    Returns\n    -------\n    list of float\n        MSE loss at each optimization step (for plotting the learning curve).\n\n    Notes\n    -----\n    CRITICAL: Freeze GDN parameters before starting the optimizer.\n    Use gdn.requires_grad_(False) to ensure GDN does not receive gradients.\n    Only igdn.parameters() should be passed to the optimizer.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — optimization loop                      #\n    # (~14 lines)                                             #\n    #                                                         #\n    # 1. Freeze GDN: gdn.requires_grad_(False)                #\n    # 2. Create optimizer: optim.Adam(igdn.parameters(), lr)  #\n    # 3. Loop for n_steps:                                    #\n    #      a. optimizer.zero_grad()                           #\n    #      b. loss = round_trip_mse(gdn, igdn, x_train)       #\n    #      c. loss.backward()                                 #\n    #      d. optimizer.step()                                #\n    #      e. Append loss.item() to a list                    #\n    #      f. Print progress every n_steps // 5 steps         #\n    # 4. Return the list of losses                            #\n    #                                                         #\n    # Print format:                                           #\n    #   \"  step {step:4d}: MSE = {loss:.6f}\"                 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef plot_roundtrip(x: torch.Tensor, gdn: GDN, igdn: IGDN,\n                   losses: list, out_path: str) -> None:\n    \"\"\"\n    Create a 1×4 visualization: input | GDN output | IGDN(GDN(input)) | loss curve.\n\n    Parameters\n    ----------\n    x : torch.Tensor, shape (1, C, H, W)\n        A single example to visualize (use x[0:1]).\n    gdn : GDN\n        The fixed analysis transform.\n    igdn : IGDN\n        The optimized synthesis transform.\n    losses : list of float\n        MSE loss at each optimization step.\n    out_path : str\n        File path to save the figure.\n\n    Notes\n    -----\n    For the spatial images, show channel 0 only (x[0, 0, :, :]).\n    Use imshow with cmap='gray', interpolation='nearest'.\n    The fourth subplot should be a semilogy plot of the loss curve.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — visualization                          #\n    # (~18 lines)                                             #\n    #                                                         #\n    # 1. Forward pass under no_grad:                          #\n    #      y     = gdn(x)                                     #\n    #      x_hat = igdn(y)                                    #\n    # 2. Extract channel 0 as numpy: arr[0, 0].detach().numpy()#\n    # 3. Create fig, axes = plt.subplots(1, 4, figsize=(14,4))#\n    # 4. axes[0]: imshow(x_ch0),     title \"Input\"            #\n    # 5. axes[1]: imshow(y_ch0),     title \"GDN Output\"       #\n    # 6. axes[2]: imshow(xhat_ch0),  title \"IGDN(GDN(x))\"    #\n    # 7. axes[3]: semilogy(losses),  title \"Round-trip MSE\",  #\n    #             xlabel \"Optimization step\"                  #\n    # 8. suptitle, tight_layout, savefig(out_path, dpi=100)  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── Main Harness ────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    torch.manual_seed(0)\n\n    # Use small C and H for fast execution in verify mode\n    B = 4  if VERIFY else 16\n    C = 8  if VERIFY else 16\n    H = 8  if VERIFY else 16\n    W = H\n    N_STEPS = 30  if VERIFY else 500   # full: 500 steps converges well\n    LR = 1e-2\n\n    print(\"=\" * 60)\n    print(\"Exercise 3: IGDN — The Approximate Inverse\")\n    print(\"=\" * 60)\n    print(f\"Config: B={B}, C={C}, H={H}×{W}, N_STEPS={N_STEPS}\")\n    print()\n\n    # ── Set up GDN and IGDN ───────────────────────────────────────\n    gdn  = GDN(num_channels=C)\n    igdn = IGDN(num_channels=C)\n\n    # Give GDN *random* non-default parameters to simulate a trained GDN.\n    # With default initialization (beta=1, diag gamma=0.01), GDN and IGDN\n    # happen to nearly cancel each other, making the task trivial.\n    # We randomize GDN's params so IGDN must genuinely learn the inverse.\n    with torch.no_grad():\n        gdn.beta_prime.data  = torch.rand(C) * 1.5 + 0.5  # uniform in [0.5, 2.0]\n        gdn.gamma_prime.data = torch.rand(C, C) * 0.5     # random interaction\n    gdn.requires_grad_(False)   # GDN is fixed — only IGDN will be optimized\n\n    # Training data: random feature maps (as if produced by a conv layer)\n    x_train = torch.randn(B, C, H, W)\n\n    # ── Measure round-trip MSE BEFORE optimization ────────────────\n    with torch.no_grad():\n        mse_before = round_trip_mse(gdn, igdn, x_train).item()\n    print(f\"Round-trip MSE BEFORE optimization: {mse_before:.6f}\")\n    print()\n\n    # ── Optimize IGDN to minimize round-trip error ────────────────\n    print(f\"Optimizing IGDN for {N_STEPS} steps (lr={LR})...\")\n    losses = optimize_igdn(gdn, igdn, x_train, n_steps=N_STEPS, lr=LR)\n    print()\n\n    # ── Measure round-trip MSE AFTER optimization ─────────────────\n    with torch.no_grad():\n        mse_after = round_trip_mse(gdn, igdn, x_train).item()\n    print(f\"Round-trip MSE AFTER optimization:  {mse_after:.6f}\")\n    print()\n\n    # ── Report ────────────────────────────────────────────────────\n    improvement = mse_before / (mse_after + 1e-12)\n    print(f\"Round-trip MSE: before={mse_before:.4f}, after={mse_after:.4f}\")\n    print(f\"Improvement: {improvement:.1f}× reduction in MSE\")\n    print()\n\n    if mse_after < mse_before:\n        print(\"✓ IGDN successfully learned to approximate the inverse of GDN.\")\n    else:\n        print(\"⚠ IGDN did not improve. Try more steps or a different learning rate.\")\n\n    # ── Visualization ─────────────────────────────────────────────\n    out_path = \"ex03_igdn_roundtrip.png\"\n    # Use a fresh single example for the plot\n    x_vis = torch.randn(1, C, H, W)\n    with torch.no_grad():\n        plot_roundtrip(x_vis, gdn, igdn, losses, out_path)\n    print(f\"Visualization saved to: {out_path}\")\n    print()\n    print(\"Key insight from the paper:\")\n    print(\"  IGDN parameters are trained SEPARATELY from GDN parameters.\")\n    print(\"  In the full model, GDN lives in g_a and IGDN lives in g_s.\")\n    print(\"  They are optimized jointly as part of the end-to-end R+λD loss.\")\n    print(\"  The separation gives g_s freedom to compensate for quantization error.\")\n"}]}, "module_04_endtoend_compression_on_mnist": {"content": "# Module 4: End-to-End Compression on MNIST\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [Wiring Everything Together](#wiring-everything-together)\n- [The MNIST Compression Pipeline](#the-mnist-compression-pipeline)\n- [Analysis and Synthesis Transforms: The Full Design](#analysis-and-synthesis-transforms-the-full-design)\n- [Training End-to-End with R + λD](#training-end-to-end-with-r--d)\n- [The Train/Eval Mode Switch on MNIST](#the-traineval-mode-switch-on-mnist)\n- [MSE vs MS-SSIM: Two Objectives, Two Behaviors](#mse-vs-ms-ssim-two-objectives-two-behaviors)\n- [The Latent Space as a Structured Representation](#the-latent-space-as-a-structured-representation)\n- [Sweeping λ: Tracing the Rate-Distortion Frontier](#sweeping--tracing-the-rate-distortion-frontier)\n- [Comparing Against JPEG](#comparing-against-jpeg)\n- [Connection to Variational Autoencoders](#connection-to-variational-autoencoders)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: Connecting Module 4 to the Comma.ai Challenge](#synthesis-connecting-module-4-to-the-commaai-challenge)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Build a complete 3-stage analysis transform (Conv→Downsample→GDN) and matching synthesis transform (IGDN→Upsample→Conv), correctly wiring the tensor shapes through each stage\n2. Train the autoencoder end-to-end with the $R + \\lambda D$ loss using uniform noise during training and rounding during evaluation\n3. Compare MSE vs MS-SSIM as training distortion terms and articulate *why* they produce qualitatively different reconstructions\n4. Produce a t-SNE visualization of the learned latent space on MNIST and interpret the cluster structure in terms of rate and class complexity\n5. Sweep $\\lambda$ across 6 logarithmically spaced values, train a separate model for each, and assemble a complete R-D curve that you can compare against JPEG\n\n---\n\n## Wiring Everything Together\n\nModules 1–3 gave you the three components of learned image compression:\n\n| Module | Component | What it does |\n|--------|-----------|--------------|\n| 1 | $R + \\lambda D$ objective | Formalizes the rate–distortion trade-off |\n| 2 | Uniform noise trick | Makes quantization differentiable for training |\n| 3 | GDN / IGDN | Gaussianizes latent statistics for efficient entropy coding |\n\nThis module assembles those three components into a single end-to-end model, trains it on MNIST, and measures the result against JPEG. The MNIST images are tiny (28×28) but the pipeline is identical to what runs on Kodak photos — just with smaller convolutions and fewer channels.\n\n**Why MNIST?** Not because it is realistic — it isn't. A natural-image codec needs much larger models and more data. MNIST is chosen because:\n\n1. Training takes **minutes**, not hours, on a modern GPU (RTX A5500).\n2. The latent space is low-dimensional enough to **visualize with t-SNE** in a way that remains interpretable.\n3. The 10 digit classes create a natural **ground truth for latent organization** — you can check whether the encoder separates them without any classification loss.\n4. JPEG performs visibly worse on 28×28 grayscale digits than on photographic images, making the comparison dramatic.\n\n---\n\n## The MNIST Compression Pipeline\n\nLet's trace a single MNIST digit through the full pipeline.\n\n**Input:** A 28×28 grayscale image $\\mathbf{x} \\in [0, 1]^{1 \\times 28 \\times 28}$ — say, the digit \"3\" from the test set.\n\n**Stage 1 — Analysis transform $g_a$:** Three stages of (Conv2d → GDN), each using `stride=2` to downsample spatially.\n\n$$\\mathbf{y} = g_a(\\mathbf{x};\\, \\phi) \\in \\mathbb{R}^{16 \\times 4 \\times 4}$$\n\nThe spatial dimensions shrink: $28 \\to 14 \\to 7 \\to 4$ (with padding). Channel depth grows: $1 \\to 32 \\to 32 \\to 16$.\n\n**Stage 2 — Quantization (train/eval switch):**\n\nDuring training:\n$$\\tilde{\\mathbf{y}} = \\mathbf{y} + \\boldsymbol{\\Delta}, \\quad \\boldsymbol{\\Delta} \\sim \\mathcal{U}\\!\\left(-\\tfrac{1}{2}, \\tfrac{1}{2}\\right)^{16 \\times 4 \\times 4}$$\n\nDuring evaluation:\n$$\\hat{\\mathbf{y}} = \\text{round}(\\mathbf{y})$$\n\n**Stage 3 — Rate estimation (training only):**\n\nThe rate is estimated from the histogram of $\\tilde{\\mathbf{y}}$:\n$$R \\approx -\\frac{1}{|\\mathbf{y}|}\\sum_{i} \\log_2 p_{\\tilde{y}_i}(\\tilde{y}_i)$$\n\n**Stage 4 — Synthesis transform $g_s$:** Three stages of (IGDN → ConvTranspose2d), upsample back to $28 \\times 28$.\n\n$$\\hat{\\mathbf{x}} = g_s(\\hat{\\mathbf{y}};\\, \\theta) \\in [0, 1]^{1 \\times 28 \\times 28}$$\n\n**Stage 5 — Loss:**\n$$\\mathcal{L} = R + \\lambda D = \\underbrace{h[\\tilde{\\mathbf{y}}]}_{\\text{rate proxy}} + \\lambda \\underbrace{\\|\\mathbf{x} - \\hat{\\mathbf{x}}\\|^2}_{\\text{MSE distortion}}$$\n\n![Compression pipeline: analysis transform encodes x to y, quantizer produces ŷ, synthesis transform decodes to x̂](images/compression_pipeline.png)\n\n*Figure: The full pipeline on a single MNIST digit. The latent $\\mathbf{y}$ has $16 \\times 4 \\times 4 = 256$ real-valued coefficients — one quarter the pixel count — but these survive quantization much more efficiently than raw pixel values because $g_a$ has learned to pack digit information into a compact, near-Gaussian distribution.*\n\n---\n\n## Analysis and Synthesis Transforms: The Full Design\n\n### Tensor Shape Walkthrough for 28×28 MNIST\n\n| Stage | Layer | Input shape | Output shape | Notes |\n|-------|-------|-------------|--------------|-------|\n| $g_a$ stage 1 | Conv2d(1→32, k=5, s=2, p=2) | (B, 1, 28, 28) | (B, 32, 14, 14) | stride 2 downsamples |\n| $g_a$ stage 1 | GDN(32) | (B, 32, 14, 14) | (B, 32, 14, 14) | no shape change |\n| $g_a$ stage 2 | Conv2d(32→32, k=5, s=2, p=2) | (B, 32, 14, 14) | (B, 32, 7, 7) | |\n| $g_a$ stage 2 | GDN(32) | (B, 32, 7, 7) | (B, 32, 7, 7) | |\n| $g_a$ stage 3 | Conv2d(32→16, k=5, s=2, p=2) | (B, 32, 7, 7) | (B, 16, 4, 4) | 7→4 with s=2, p=2 |\n| $g_a$ stage 3 | GDN(16) | (B, 16, 4, 4) | (B, 16, 4, 4) | latent $\\mathbf{y}$ |\n| Quantizer | noise or round | (B, 16, 4, 4) | (B, 16, 4, 4) | $\\tilde{\\mathbf{y}}$ / $\\hat{\\mathbf{y}}$ |\n| $g_s$ stage 1 | IGDN(16) | (B, 16, 4, 4) | (B, 16, 4, 4) | IGDN *before* deconv |\n| $g_s$ stage 1 | ConvTranspose2d(16→32, k=5, s=2, p=2, op=1) | (B, 16, 4, 4) | (B, 32, 7, 7) | |\n| $g_s$ stage 2 | IGDN(32) | (B, 32, 7, 7) | (B, 32, 7, 7) | |\n| $g_s$ stage 2 | ConvTranspose2d(32→32, k=5, s=2, p=2, op=1) | (B, 32, 7, 7) | (B, 32, 14, 14) | |\n| $g_s$ stage 3 | IGDN(32) | (B, 32, 14, 14) | (B, 32, 14, 14) | |\n| $g_s$ stage 3 | ConvTranspose2d(32→1, k=5, s=2, p=2, op=1) | (B, 32, 14, 14) | (B, 1, 28, 28) | reconstruction $\\hat{\\mathbf{x}}$ |\n\n**Important implementation note on `output_padding`:** `ConvTranspose2d` with `stride=2` needs `output_padding=1` when the input spatial dimension is even — without it, the output size is $(2 \\times \\text{input} - 1)$ instead of $(2 \\times \\text{input})$. This is the most common shape mismatch bug. Always verify that $g_a$ followed by $g_s$ preserves the input shape before training.\n\n```python\nimport torch\nimport torch.nn as nn\n\nclass AnalysisTransform(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            nn.Conv2d(1, 32, kernel_size=5, stride=2, padding=2),\n            GDN(32),\n        )\n        self.stage2 = nn.Sequential(\n            nn.Conv2d(32, 32, kernel_size=5, stride=2, padding=2),\n            GDN(32),\n        )\n        self.stage3 = nn.Sequential(\n            nn.Conv2d(32, 16, kernel_size=5, stride=2, padding=2),\n            GDN(16),\n        )\n\n    def forward(self, x):\n        return self.stage3(self.stage2(self.stage1(x)))\n\n\nclass SynthesisTransform(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.stage1 = nn.Sequential(\n            IGDN(16),\n            nn.ConvTranspose2d(16, 32, kernel_size=5, stride=2,\n                               padding=2, output_padding=1),\n        )\n        self.stage2 = nn.Sequential(\n            IGDN(32),\n            nn.ConvTranspose2d(32, 32, kernel_size=5, stride=2,\n                               padding=2, output_padding=1),\n        )\n        self.stage3 = nn.Sequential(\n            IGDN(32),\n            nn.ConvTranspose2d(32, 1, kernel_size=5, stride=2,\n                               padding=2, output_padding=1),\n        )\n\n    def forward(self, y_hat):\n        return torch.sigmoid(self.stage3(self.stage2(self.stage1(y_hat))))\n```\n\n**Check your understanding:** In the synthesis transform, IGDN comes *before* the transposed convolution at each stage, but in the analysis transform, GDN comes *after* the convolution. Why this order reversal? (Think about what the analysis transform is inverting.)\n\n<details>\n<summary>Answer<\/summary>\nThe analysis transform applies Conv then GDN: the convolution changes the representation, then GDN normalizes it. The synthesis transform reverses this: first IGDN un-normalizes, then the transposed convolution reconstructs the previous scale. If you applied IGDN after the transposed convolution, you'd be normalizing after expanding — the wrong order to invert the encoder.\n<\/details>\n\n### Why This MNIST Architecture Differs from the Paper\n\nThe paper's architecture uses 128 channels and 9×9 or 5×5 filters on 256×256 natural images. For 28×28 MNIST:\n\n- **Fewer channels (16–32 instead of 128):** MNIST digits are structurally simple — strokes on a blank background. The paper's 128-channel bottleneck encodes the rich spatial complexity of natural images. 16 channels suffice for MNIST digit structure.\n- **Smaller kernels (5×5 instead of 9×9):** A 9×9 kernel on a 28×28 image would have a receptive field covering nearly one-third of the image in the first stage — too coarse. 5×5 is more appropriate.\n- **Three stride-2 stages instead of stride-4 + two stride-2:** The paper's first stage uses stride 4 (encoding at quarter resolution). For MNIST, three stride-2 stages give the same 8× spatial reduction but more gently, fitting the small input size.\n\n---\n\n## Training End-to-End with R + λD\n\n### The Rate Term: Histogram-Based Entropy Estimation\n\nDuring training we need to compute $h[\\tilde{\\mathbf{y}}]$ — the differential entropy of the noisy latent — as a differentiable function of the network parameters. The simplest approach: treat the current-batch distribution of $\\tilde{\\mathbf{y}}$ as a smooth histogram and compute the entropy of that histogram.\n\n```python\ndef histogram_entropy(y_tilde: torch.Tensor, num_bins: int = 100) -> torch.Tensor:\n    \"\"\"\n    Estimate differential entropy of y_tilde via differentiable histogram.\n    \n    Args:\n        y_tilde: noisy latent (B, C, H, W)\n        num_bins: number of histogram bins\n    Returns:\n        entropy estimate in bits per element\n    \"\"\"\n    y_flat = y_tilde.reshape(-1)          # flatten all elements\n    y_min, y_max = y_flat.min(), y_flat.max()\n    bin_edges = torch.linspace(y_min - 0.5, y_max + 0.5, num_bins + 1,\n                               device=y_tilde.device)\n    bin_width = bin_edges[1] - bin_edges[0]\n\n    # Soft assignment to bins (differentiable via triangle kernel)\n    # simpler: use hard assignment with no-grad and compute cross-entropy\n    with torch.no_grad():\n        counts = torch.histc(y_flat, bins=num_bins,\n                             min=float(y_min - 0.5),\n                             max=float(y_max + 0.5))\n        pmf = counts / counts.sum()\n        pmf = pmf.clamp(min=1e-10)\n        entropy = -(pmf * torch.log2(pmf)).sum()\n    return entropy\n```\n\n**Note:** The hard-histogram approach above doesn't propagate gradients through the rate term — the entropy estimate is computed with `no_grad`. A common simplification for small models: use the entropy estimate as a monitoring scalar and minimize only the distortion term during early training, then anneal the rate weight in later epochs. For the full treatment, use a learned factorized entropy model (Module 1) that is differentiable.\n\n### The Distortion Term\n\nFor MSE distortion:\n\n```python\ndef rd_loss(x: torch.Tensor, x_hat: torch.Tensor,\n            y_tilde: torch.Tensor, lam: float) -> torch.Tensor:\n    \"\"\"\n    R + λD loss. Rate is estimated from y_tilde entropy.\n    Distortion is pixel-level MSE.\n    \"\"\"\n    N = x.numel()\n    rate = histogram_entropy(y_tilde)          # bits per element\n    distortion = F.mse_loss(x_hat, x)         # mean over all pixels\n    return rate + lam * distortion * N        # scale distortion to match rate units\n```\n\n**Fill in the step:** Why does the distortion need to be multiplied by `N` (total number of pixels) to match the rate units? The rate is in bits-per-element summed over the latent; the MSE is a mean over pixels. The two terms live in different scales unless we either (a) convert rate to bits-per-pixel by dividing by $N_{\\text{pixels}}$, or (b) multiply MSE by $N_{\\text{pixels}}$. Which choice you make doesn't affect optimization — only the absolute value of $\\lambda$ needed to achieve a given operating point.\n\n### Training Loop\n\n```python\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\nscheduler = torch.optim.lr_scheduler.StepLR(optimizer, step_size=10, gamma=0.5)\n\nfor epoch in range(n_epochs):\n    model.train()\n    for x, _ in train_loader:\n        x = x.to(device)\n        optimizer.zero_grad()\n\n        # Forward pass (adds noise inside model.forward() when training=True)\n        x_hat, y_tilde = model(x)\n        x_hat = x_hat.clamp(0.0, 1.0)\n\n        loss = rd_loss(x, x_hat, y_tilde, lam)\n        loss.backward()\n        optimizer.step()\n\n    scheduler.step()\n```\n\n---\n\n## The Train/Eval Mode Switch on MNIST\n\nThe uniform noise trick requires a mode switch between training and evaluation. At training time:\n\n$$\\tilde{\\mathbf{y}} = g_a(\\mathbf{x}) + \\boldsymbol{\\Delta}, \\quad \\boldsymbol{\\Delta} \\sim \\mathcal{U}\\!\\left(-\\tfrac{1}{2}, \\tfrac{1}{2}\\right)$$\n\nAt evaluation time:\n\n$$\\hat{\\mathbf{y}} = \\text{round}(g_a(\\mathbf{x}))$$\n\nThis switch must be implemented in `CompressionModel.forward()`:\n\n```python\nclass CompressionModel(nn.Module):\n    def __init__(self, lam: float = 0.01):\n        super().__init__()\n        self.encoder = AnalysisTransform()\n        self.decoder = SynthesisTransform()\n        self.lam = lam\n\n    def forward(self, x: torch.Tensor):\n        y = self.encoder(x)                          # (B, 16, 4, 4)\n\n        if self.training:\n            # Uniform noise: differentiable proxy for quantization\n            delta = torch.empty_like(y).uniform_(-0.5, 0.5)\n            y_out = y + delta\n        else:\n            # Actual rounding: discrete, non-differentiable\n            y_out = torch.round(y)\n\n        x_hat = self.decoder(y_out)\n        return x_hat, y_out\n```\n\n**The key question:** How close are the training and evaluation outputs? On MNIST with well-trained models, the MSE between `model.train()(x)` and `model.eval()(x)` for the same image is typically **less than 0.001** — far smaller than the reconstruction MSE from the underlying compression. The noise perturbation (std ≈ 0.29 per element) is small relative to the typical signal magnitude in the latent.\n\n![Noise (training) vs rounding (evaluation): the two pipelines produce nearly identical outputs](diagrams/noise_vs_round.svg)\n\n*Figure: The training pipeline (adding uniform noise, left) and evaluation pipeline (rounding, right). The reconstructions are nearly identical because the noise magnitude is small relative to the latent signal — one of the key properties that makes the noise trick work as a training proxy.*\n\n**Check your understanding:** Suppose a latent value $y = 2.73$. At evaluation time, $\\hat{y} = 3$. What is the decoder's input in training? In evaluation? What is the maximum possible difference between them?\n\n<details>\n<summary>Answer<\/summary>\nAt evaluation: decoder input is $\\hat{y} = 3.0$. At training: decoder input is $y + \\Delta = 2.73 + \\Delta$ where $\\Delta \\in (-0.5, 0.5)$, so the training input ranges in $(2.23, 3.23)$. The maximum difference from the eval value of 3.0 is 0.77 (if $\\Delta = -0.5$ and $y = 2.23$). In the high-signal regime, quantization error (rounding error) has the same maximum of $\\pm 0.5$ — so the noise matches quantization in spread. This is not a coincidence: the noise was designed to have exactly the same width as the quantization bins.\n<\/details>\n\n---\n\n## MSE vs MS-SSIM: Two Objectives, Two Behaviors\n\n### Why the Choice of Distortion Metric Matters\n\nThe $R + \\lambda D$ framework is agnostic about the distortion measure $D$. Ballé et al. (2017) use MSE, but any differentiable measure works. The metric choice fundamentally shapes what the codec learns to preserve.\n\n**MSE (Mean Squared Error):**\n$$D_{\\text{MSE}}(\\mathbf{x}, \\hat{\\mathbf{x}}) = \\frac{1}{N}\\sum_{i} (x_i - \\hat{x}_i)^2$$\n\nMSE is the $L^2$ distance in pixel space. It treats all pixels equally, regardless of whether the error occurs on a sharp edge, a smooth background, or a fine texture. The gradient $\\partial D / \\partial \\hat{x}_i = 2(x_i - \\hat{x}_i)/N$ — the decoder receives the strongest signal to correct large pixel differences, regardless of their perceptual importance.\n\n**MS-SSIM (Multi-Scale Structural Similarity):**\n$$D_{\\text{MS-SSIM}}(\\mathbf{x}, \\hat{\\mathbf{x}}) = 1 - \\text{MS-SSIM}(\\mathbf{x}, \\hat{\\mathbf{x}})$$\n\nMS-SSIM compares luminance, contrast, and structure across 5 spatial scales. It weights errors by local structure: an error on a sharp edge (high structure) matters more than the same-magnitude error on a blank background (low structure).\n\n### What You'll Observe on MNIST\n\nTraining two identical compression models — one with MSE distortion, one with MS-SSIM distortion — at the same $\\lambda$ and comparing their reconstructions:\n\n| Property | MSE-trained model | MS-SSIM-trained model |\n|----------|------------------|-----------------------|\n| Stroke sharpness | Blurry — averages over position uncertainty | Sharp — preserves edge contrast |\n| Background noise | Low — MSE penalizes any pixel that's non-zero | Sometimes slightly noisy — structure is elsewhere |\n| PSNR (dB) | Higher (MSE was optimized) | Lower (MSE not optimized) |\n| MS-SSIM score | Lower | Higher |\n| Perceptual quality | \"Blurry but correct\" | \"Sharp but sometimes noisy\" |\n\nThe paper notes this exact phenomenon at the natural image scale: \"although we used MSE as a distortion metric for training, the appearance of compressed images is both qualitatively different and substantially improved, compared to JPEG and JPEG 2000.\"[^1] The nonlinear GDN transform makes MSE-trained models already somewhat perceptually superior — but explicitly optimizing for MS-SSIM takes this further.\n\n[^1]: Ballé et al., ICLR 2017. The paper trains with MSE but evaluates on both PSNR and MS-SSIM on Kodak images, finding dramatic improvements on MS-SSIM over JPEG even without explicitly targeting it.\n\n### MS-SSIM on Small Images: A Critical Implementation Note\n\nThe default `pytorch-msssim` implementation uses 5 scales, requiring images of at least $160 \\times 160$ pixels. For 28×28 MNIST images, you must reduce the number of scales:\n\n```python\nfrom pytorch_msssim import ms_ssim, ssim\n\ndef ms_ssim_loss_fn(x: torch.Tensor, x_hat: torch.Tensor) -> torch.Tensor:\n    \"\"\"\n    MS-SSIM loss adapted for 28×28 MNIST images.\n    Default 5 scales won't work on 28×28; use ssim (1 scale) or ms_ssim with weights.\n    \"\"\"\n    # Option 1: Single-scale SSIM (works on any size >= ~11×11)\n    return 1.0 - ssim(x, x_hat, data_range=1.0, size_average=True)\n\n    # Option 2: 2-scale MS-SSIM (minimum viable for 28×28)\n    # weights = (0.5, 0.5) for 2 scales, normalized\n    # return 1.0 - ms_ssim(x, x_hat, data_range=1.0,\n    #                       weights=[0.5, 0.5], size_average=True)\n```\n\n**Common mistake:** Using the default 5-scale MS-SSIM on 28×28 images raises a runtime error because the third-scale downsampling produces a 3×3 feature map that is too small for the default 11×11 window. Always check image size compatibility with `ssim`'s window size.\n\n---\n\n## The Latent Space as a Structured Representation\n\n### What t-SNE Can (and Cannot) Tell You\n\nAfter training, encode all 10,000 MNIST test images through the analysis transform. Each image produces a latent $\\mathbf{y} \\in \\mathbb{R}^{16 \\times 4 \\times 4}$ — a 256-dimensional vector. t-SNE projects these 256-dimensional vectors to 2D for visualization.\n\n**What t-SNE reveals:**\n\n- **Cluster membership:** If similar-looking digits (e.g., all \"1\"s) cluster together, the encoder has organized the latent space by visual structure, not just by compression efficiency. This happens naturally from the $R + \\lambda D$ objective — digits with similar structure map to similar latent codes, which share codewords, which reduces the total bit count.\n- **Cluster spread:** A wide cluster (e.g., \"8\"s) indicates high visual diversity — the encoder needs many distinct codewords to represent all variants, increasing the rate for that class.\n- **Between-cluster structure:** Classes that look similar (e.g., \"1\" and \"7\", or \"4\" and \"9\") often have adjacent clusters — the encoder has learned visual similarity implicitly.\n\n**What t-SNE cannot tell you:**\n\n- **Absolute distances** between clusters are meaningless — t-SNE preserves local neighborhoods, not global distances.\n- **Metric structure** within clusters — proximity within a t-SNE cluster does not imply small latent distance.\n- **Number of bits** needed for a specific digit — this depends on the local codeword density, not the t-SNE position.\n\n```python\nfrom sklearn.manifold import TSNE\nimport matplotlib.pyplot as plt\n\ndef encode_all(model, loader, device):\n    model.eval()\n    latents, labels = [], []\n    with torch.no_grad():\n        for x, y in loader:\n            z = model.encoder(x.to(device))          # (B, 16, 4, 4)\n            latents.append(z.cpu().reshape(len(x), -1))  # (B, 256)\n            labels.append(y)\n    return torch.cat(latents), torch.cat(labels)\n\ndef tsne_plot(latents, labels, title=\"Latent Space (t-SNE)\"):\n    # Subsample for speed (t-SNE on 10K points takes ~60s)\n    idx = torch.randperm(len(latents))[:5000]\n    z_sub = latents[idx].numpy()\n    l_sub = labels[idx].numpy()\n\n    z_2d = TSNE(n_components=2, perplexity=30, n_iter=1000).fit_transform(z_sub)\n\n    plt.figure(figsize=(8, 7))\n    scatter = plt.scatter(z_2d[:, 0], z_2d[:, 1], c=l_sub,\n                          cmap='tab10', alpha=0.5, s=5)\n    plt.colorbar(scatter, label=\"Digit class\")\n    plt.title(title)\n    plt.tight_layout()\n```\n\n### Codeword Histograms: Rate by Digit Class\n\nAfter encoding and quantizing all test images, count the number of unique codewords per digit class. A \"codeword\" is one realization of $\\hat{\\mathbf{y}} = \\text{round}(g_a(\\mathbf{x})) \\in \\mathbb{Z}^{16 \\times 4 \\times 4}$.\n\nDigits with simpler structure (\"1\", \"7\") need fewer unique codewords than digits with complex or variable structure (\"8\", \"9\"). This is the compression system implicitly learning a **variable-rate code** without ever being told about digit classes.\n\n### The Independence Assumption in the Latent Space\n\nThe entropy model in Module 1 assumes that latent channels are **independent**: the probability of the full latent factorizes as:\n\n$$p(\\hat{\\mathbf{y}}) = \\prod_{i} p_{\\hat{y}_i}(\\hat{y}_i)$$\n\nYou can check this empirically for two chosen dimensions by plotting their joint histogram. If the joint looks like the product of two marginals (a rectangular blob rather than a tilted ellipse or a banana), the independence assumption holds.\n\nWhere it fails: low-$\\lambda$ models (high bit rate) tend to preserve more fine structure, and the latent channels may retain correlations. High-$\\lambda$ models (low bit rate) are forced to compress aggressively, which often produces more independent channels as the transform learns to decorrelate.\n\n---\n\n## Sweeping λ: Tracing the Rate-Distortion Frontier\n\n### What Changing λ Does\n\nRecall the training objective:\n$$\\mathcal{L} = R + \\lambda D$$\n\n- **High $\\lambda$** (e.g., $\\lambda = 1.0$): Distortion dominates. The model strongly penalizes reconstruction error, trading away bits to achieve high fidelity. Result: **high rate, low distortion**, top-right of the R-D curve.\n- **Low $\\lambda$** (e.g., $\\lambda = 0.0001$): Rate dominates. The model aggressively compresses, allowing large reconstruction errors. Result: **low rate, high distortion**, bottom-left of the R-D curve.\n\nSweeping $\\lambda$ traces the **Pareto frontier** of achievable (R, D) pairs — the set of points where you cannot reduce distortion without increasing rate, and cannot reduce rate without increasing distortion.\n\n![Rate-distortion frontier for MNIST at 6 λ values, compared against JPEG](diagrams/rd_frontier.svg)\n\n*Figure: Each point on the learned model's curve corresponds to one value of $\\lambda$. The JPEG baseline (red triangles) is evaluated at 5 quality settings (10, 25, 50, 75, 95). The learned model dominates JPEG especially at low bit rates and on MS-SSIM — consistent with the paper's findings on natural images.*\n\n### Why a Separate Model per λ\n\nThe paper trains a completely separate model for each $\\lambda$ value. This is wasteful (6 training runs instead of 1), but it produces the best R-D performance at each operating point. Later work introduces **conditional compression** (a single model conditioned on $\\lambda$), but with some performance penalty.\n\nFor the comma.ai challenge, you would likely want a single model at a fixed $\\lambda$ calibrated to minimize the challenge score function $100 D_{\\text{seg}} + 25 R + \\sqrt{10 D_{\\text{pose}}}$. This is itself a rate-distortion objective — with non-MSE distortion and a non-unit weight on rate.\n\n### Training for λ Sweep in Practice\n\n```python\nimport numpy as np\n\nlambda_values = np.logspace(-4, 0, 6)   # [0.0001, 0.000464, ..., 1.0]\nresults = {}\n\nfor lam in lambda_values:\n    model = CompressionModel().to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n    # Train for 15 epochs (enough for convergence on MNIST)\n    for epoch in range(15):\n        for x, _ in train_loader:\n            x = x.to(device)\n            optimizer.zero_grad()\n            x_hat, y_tilde = model(x)\n            x_hat = x_hat.clamp(0, 1)\n            loss = rd_loss(x, x_hat, y_tilde, lam)\n            loss.backward()\n            optimizer.step()\n\n    results[lam] = evaluate_model(model, test_loader)\n    print(f\"λ={lam:.4f}: rate={results[lam]['rate']:.3f} bpp, \"\n          f\"PSNR={results[lam]['psnr']:.2f} dB\")\n```\n\n**Common mistake:** Not training long enough at high $\\lambda$. High-fidelity models must learn fine details and may need 2–3× more epochs to converge. A practical check: monitor the validation loss; stop when it plateaus for 3+ epochs.\n\n---\n\n## Comparing Against JPEG\n\n### The JPEG Baseline on MNIST\n\nJPEG is disadvantaged on 28×28 images compared to natural images:\n\n1. **Block boundaries are prominent.** JPEG's 8×8 DCT blocks are large relative to a 28×28 image — there are only $\\lfloor 28/8 \\rfloor^2 = 9$ full blocks, and the remainder must be padded. Block boundaries can cut through digit strokes.\n2. **No cross-block optimization.** JPEG quantizes each 8×8 block independently. Digit strokes that span block boundaries are encoded redundantly.\n3. **Chromatic assumptions.** JPEG's luminance quantization table is designed for photographic images with gradual luminance variation. MNIST's sharp black-on-white strokes are the worst case for this assumption.\n\n```python\nimport io\nfrom PIL import Image\nimport numpy as np\n\ndef jpeg_compress_mnist(image_tensor, quality):\n    \"\"\"\n    Compress a single MNIST image (28×28, [0,1]) with JPEG at given quality.\n    Returns (compressed_bytes, reconstructed_tensor).\n    \"\"\"\n    # Convert to uint8 PIL image\n    img = Image.fromarray((image_tensor.squeeze().numpy() * 255).astype(np.uint8))\n    \n    # Compress to JPEG bytes\n    buf = io.BytesIO()\n    img.save(buf, format='JPEG', quality=quality)\n    n_bytes = buf.tell()\n    \n    # Decode\n    buf.seek(0)\n    recon = Image.open(buf).convert('L')\n    recon_tensor = torch.from_numpy(np.array(recon)).float() / 255.0\n    \n    # Bits per pixel (subtract JPEG header overhead ~600 bytes)\n    bpp = max(0, (n_bytes - 600) * 8) / (28 * 28)\n    return bpp, recon_tensor\n\ndef jpeg_baseline(test_loader, qualities=[10, 25, 50, 75, 95]):\n    results = {}\n    for q in qualities:\n        bpps, psnrs, ssims = [], [], []\n        for x, _ in test_loader:\n            for img in x:\n                bpp, recon = jpeg_compress_mnist(img, q)\n                mse = F.mse_loss(recon, img.squeeze()).item()\n                psnr = -10 * np.log10(mse + 1e-10)\n                bpps.append(bpp)\n                psnrs.append(psnr)\n        results[q] = {'rate': np.mean(bpps), 'psnr': np.mean(psnrs)}\n    return results\n```\n\n**Important:** The JPEG header overhead is about 600 bytes (quantization tables, Huffman tables, SOI/EOI markers). For a 28×28 image at quality 50, the payload may be only 200–500 bytes. Subtracting the header gives a more accurate \"data bits per pixel\" — without this correction, JPEG appears much worse than it is.\n\n![JPEG vs learned compression: flower image at matched bit rate](images/flower_original.png)\n\n*Figure: Reference comparison on a natural image. Left: original. Middle: JPEG compressed. Right: learned model compressed. At matched bit rate, the learned model eliminates blocking artifacts, producing smooth simplification of fine detail rather than block-boundary artifacts.*\n\n---\n\n## Connection to Variational Autoencoders\n\nThe relaxed compression objective (from Module 2) is the negative ELBO of a specific VAE:\n\n$$\\mathcal{L}_{\\text{VAE}} = \\underbrace{\\mathbb{E}_{q_\\phi(\\tilde{\\mathbf{y}}|\\mathbf{x})}[\\log p_\\theta(\\mathbf{x}|\\tilde{\\mathbf{y}})]}_{\\text{reconstruction}} - \\underbrace{D_{\\text{KL}}(q_\\phi(\\tilde{\\mathbf{y}}|\\mathbf{x}) \\,\\|\\, p(\\tilde{\\mathbf{y}}))}_{\\text{rate}}$$\n\nWith the correspondences:\n- **Encoder $q_\\phi$:** The analysis transform plus uniform noise — a deterministic function that adds $\\mathcal{U}(-1/2, 1/2)$ noise to the latent, equivalent to a box-shaped approximate posterior\n- **Decoder $p_\\theta$:** The synthesis transform plus a Gaussian observation model $\\mathcal{N}(\\hat{\\mathbf{x}};\\, g_s(\\tilde{\\mathbf{y}}),\\, (2\\lambda)^{-1}\\mathbf{I})$\n- **Prior $p$:** The learned factorized marginals $\\prod_i p_{\\tilde{y}_i}$\n\nDespite this structural equivalence, there are critical differences from a standard VAE:\n\n**Difference 1: The prior is learned, not fixed.** Standard VAEs use a fixed $\\mathcal{N}(0, \\mathbf{I})$ prior. The compression model learns the prior distribution $p_{\\tilde{y}_i}$ from data. This learned prior is more flexible — it can adapt to the actual shape of the latent distribution.\n\n**Difference 2: The \"posterior\" is deterministic given the noise.** Unlike a VAE where the encoder outputs mean and variance, the compression encoder is deterministic — it outputs a single point $y = g_a(x)$, then adds fixed-width noise $\\Delta$. The \"variance\" is always $1/12$ (from the uniform distribution), not learned.\n\n**Difference 3: Evaluation is discrete, not continuous.** At test time, the compression model replaces $\\tilde{\\mathbf{y}}$ with $\\hat{\\mathbf{y}} = \\text{round}(\\mathbf{y})$ — actual integer codes. A VAE would sample from the posterior at test time. The compression model doesn't sample — it makes a deterministic, reproducible encoding that the receiver can decode exactly.\n\n**Difference 4: Multi-rate operation.** A VAE is trained at one operating point. The compression model is trained once per $\\lambda$, giving a separate model for each rate-distortion trade-off. As the paper states: \"the relaxed rate-distortion optimization problem bears some resemblance to those encountered in fitting generative models of images, and can more specifically be cast in the context of variational autoencoders. Despite the similarity, it is worth noting several fundamental differences.\"[^2]\n\n[^2]: Ballé et al., ICLR 2017. Section 3, discussion after equation 5.\n\n---\n\n## Analytical Questions\n\n### Question 1 — Multi-Rate Models\n\nThe paper trains completely separate models for each $\\lambda$. If you wanted to build a practical codec that supports multiple quality levels (like JPEG's quality parameter), what would you do differently?\n\nConsider three approaches:\n\n**(a)** **Quality-conditioned model:** Add a scalar $\\lambda$ (or a quality embedding) as an additional input to both encoder and decoder. How would you modify the architecture? What is the risk of quality-conditioned models compared to separate models?\n\n**(b)** **Gain units:** After the GDN layers, scale the latent channels by a learned, $\\lambda$-dependent gain vector before quantization. The gain modifies how coarsely each channel is quantized without retraining. What trade-off does this make?\n\n**(c)** **Progressive models:** Train a model that can be \"truncated\" at different latent sizes — a full-resolution latent gives high quality, using only the first $K$ channels gives lower quality. What does this require of the training objective?\n\n*For the comma.ai challenge:* You'd probably want a single model at a fixed $\\lambda$ calibrated to minimize $100 D_{\\text{seg}} + 25 R + \\sqrt{10 D_{\\text{pose}}}$. What is the optimal $\\lambda$ for this scoring function? (Hint: it's not a standard MSE model — what distortion measure should you optimize?)\n\n---\n\n### Question 2 — VAE Connection and the Role of λ\n\nThe paper notes that the relaxed optimization is equivalent to training a VAE. But compression must work at finite $\\lambda$, while a generative VAE often explores $\\lambda \\to \\infty$ (perfect reconstruction).\n\n**(a)** In a VAE, the KL term $D_{\\text{KL}}(q_\\phi \\| p)$ acts as a regularizer that pushes the posterior toward the prior. In compression, the same term is the **rate** — the actual bits needed. What happens as $\\lambda \\to 0$? What does the learned latent look like?\n\n**(b)** In a VAE, the \"posterior collapse\" phenomenon occurs when the decoder ignores the latent and the encoder maps everything to the prior. In compression terms, what is the analogous failure mode? At what $\\lambda$ would you expect it?\n\n**(c)** A VAE's latent space supports interpolation: $g_s(\\alpha \\mathbf{z}_1 + (1 - \\alpha) \\mathbf{z}_2)$ produces a smooth blend between two images. Would the compression autoencoder also support smooth interpolation? Does the quantization step affect this?\n\n---\n\n### Question 3 — Latent Structure and Rate by Class\n\nLooking at your t-SNE plot, some digit classes cluster tightly while others spread out. This has direct implications for the rate needed to encode different digits.\n\n**(a)** Digit \"1\" is visually simpler than digit \"8\" — thinner strokes, less variation between instances. If you compute the empirical entropy $H[\\hat{\\mathbf{y}} | \\text{class}]$ for each class, what do you expect the ordering to be? Which digit needs the most bits per image?\n\n**(b)** The entropy model assumes independence: $p(\\hat{\\mathbf{y}}) = \\prod_i p(\\hat{y}_i)$. But the latent values for a single image are *not* independent — they all came from the same digit. How does this affect the actual compression performance? Is the independence assumption too conservative (wastes bits) or too aggressive (underestimates rate)?\n\n**(c)** Some pairs of digits are visually similar but have different labels (e.g., \"1\" and \"7\" in some handwriting styles; \"3\" and \"8\"). If these pairs cluster together in latent space, what does this imply for a compression + classification pipeline? Would a codec trained with a classification loss in addition to R+λD separate them better or worse?\n\n---\n\n## Synthesis: Connecting Module 4 to the Comma.ai Challenge\n\nYou now have all the pieces of Ballé et al. (2017). Let's connect each piece to the comma.ai video compression challenge.\n\n**The pipeline:** The comma.ai challenge asks you to compress dashcam frames so that a SegNet (segmentation) and PoseNet (temporal pose) applied to the **reconstruction** score well. The scoring formula:\n\n$$\\text{score} = 100 \\times D_{\\text{seg}} + 25 \\times R + \\sqrt{10 \\times D_{\\text{pose}}}$$\n\nThis is a rate-distortion objective with:\n- **Rate term:** $25 \\times R$ — you want compression, but rate is weighted 25× (vs. 100× for segmentation)\n- **Distortion terms:** $100 D_{\\text{seg}} + \\sqrt{10 D_{\\text{pose}}}$ — not pixel MSE, but outputs of two neural networks\n\n**What Module 4 teaches you about the challenge:**\n\n**Lesson 1: Replace MSE with task distortion.** The exercises show that changing the distortion metric (MSE → MS-SSIM) changes what the codec learns to preserve. For the challenge, your distortion metric is $D_{\\text{seg}} + \\text{const} \\cdot D_{\\text{pose}}$. Train the codec with a differentiable surrogate of these — e.g., the L2 difference in SegNet feature maps (perceptual loss) or the PoseNet output difference.\n\n**Lesson 2: Choose λ to minimize the score, not the distortion.** From your R-D curve, you can read off the trade-off between rate and quality. The optimal $\\lambda$ is the one that minimizes $25 R + 100 D_{\\text{seg}} + \\sqrt{10 D_{\\text{pose}}}$, not the one that minimizes $R + \\lambda D_{\\text{MSE}}$.\n\n**Lesson 3: The latent space structure affects downstream tasks.** If your analysis transform organizes the latent space so that \"semantically similar\" frames (same road geometry, same scene type) cluster together, the entropy coder can assign them short codes — and these short codes still decode to images where SegNet performs well. The t-SNE analysis from Exercise 3 applies here: structure in the latent space is not just aesthetically interesting, it is rate-efficient structure.\n\n**Lesson 4: The VAE connection gives you a generative model for free.** If you need to handle missing or corrupted frames in the dashcam feed, the compression autoencoder can be repurposed as a generative model — sample $\\hat{\\mathbf{y}} \\sim p(\\hat{\\mathbf{y}})$ (the entropy model) and decode. This gives plausible frame \"hallucinations\" that SegNet and PoseNet may handle better than black frames.\n\nThe full compression pipeline developed across all four modules:\n\n$$\\mathbf{x} \\xrightarrow{g_a\\text{ (Conv+GDN)}^3} \\mathbf{y} \\xrightarrow{+\\Delta \\text{ or round}} \\hat{\\mathbf{y}} \\xrightarrow{\\text{entropy code}} \\text{bitstream} \\xrightarrow{\\text{entropy decode}} \\hat{\\mathbf{y}} \\xrightarrow{g_s\\text{ (IGDN+Deconv)}^3} \\hat{\\mathbf{x}}$$\n\nIn Exercise 1, you'll build and train this complete pipeline on MNIST. In Exercise 2, you'll compare MSE and MS-SSIM training losses side-by-side on 16 test images. In Exercise 3, you'll visualize the latent space with t-SNE and examine the independence assumption. In Exercise 4, you'll sweep $\\lambda$ across 6 values to produce a complete R-D curve and compare against JPEG.\n\n---\n\n*This module covers Sections 3–5 of Ballé et al., ICLR 2017, specifically the full autoencoder architecture, the R-D curve experiments on Kodak, and the MS-SSIM evaluation. The MNIST-scale exercises reproduce the qualitative findings of the paper (learned > JPEG on MS-SSIM, MSE training ≠ optimal perceptual quality) at a scale that trains in minutes.*\n\n*Previous module: [Module 3: GDN — The Key Nonlinearity](../module_03_gdn_the_key_nonlinearity/README.md)*\n", "exercises": [{"filename": "ex01_the_full_analysissynthesis_autoencoder.py", "content": "\"\"\"Exercise 1: The Full Analysis-Synthesis Autoencoder\n======================================================\nModule 4: End-to-End Compression on MNIST\n\nAssemble the complete compression pipeline from Ballé et al. (ICLR 2017):\n\n    x ──[g_a]──► y ──[quantiser]──► ŷ ──[g_s]──► x̂\n                                                    │\n                      R + λD ◄────────────────────┘\n\nThe rate-distortion loss is:\n    L = R + λD  where  R = h[ỹ]  (entropy of noisy latent, bits/pixel)\n                 and   D = MSE(x, x̂)\n\nGDN / IGDN, data-loading, training loop, and plotting utilities are PROVIDED.\nYou write:\n  (1) AnalysisTransform  — 3 Conv2d+GDN stages    (~18 lines)\n  (2) SynthesisTransform — 3 IGDN+ConvTranspose2d stages (~18 lines)\n  (3) CompressionModel.forward() — noise vs. round switch  (~10 lines)\n  (4) rd_loss() — entropy-estimated rate + λ·MSE            (~10 lines)\n\nExpected milestone output:\n    \"Final: rate=X.XX bits/pixel, distortion(MSE)=X.XXXX, λ=X.XXX\"\n\nTensor shape reference (see README Table):\n  Input        : (B,  1, 28, 28)\n  After stage1 : (B, 32, 14, 14)\n  After stage2 : (B, 32,  7,  7)\n  After stage3 : (B, 16,  4,  4)  ← latent y\n\"\"\"\n\nimport os\nimport math\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport torchvision\nimport torchvision.transforms as transforms\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nfrom torch.utils.data import TensorDataset, DataLoader\n\n# ---------------------------------------------------------------------------\n# DISTILL_VERIFY: fast CPU verification (2 steps, synthetic data, <10 s)\n# Remove or unset this env var for a real training run.\n# ---------------------------------------------------------------------------\nVERIFY     = os.environ.get(\"DISTILL_VERIFY\")\nN_EPOCHS   = 2    if VERIFY else 20\nBATCH_SIZE = 8    if VERIFY else 128\nN_TRAIN    = 32   if VERIFY else 60_000\nLAM        = 1.0          # rate-distortion trade-off (default)\nLATENT_CH  = 16           # bottleneck channels\nN_FILTERS  = 32           # intermediate channels\ndevice     = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\n\n\n# ===========================================================================\n# PROVIDED: GDN / IGDN  (from Module 3)\n# ===========================================================================\nclass GDN(nn.Module):\n    \"\"\"Generalized Divisive Normalization (Ballé et al., 2016).\n\n    Forward:  y_i = x_i / sqrt(β_i + Σ_j γ_ij · x_j²)\n    Inverse:  y_i = x_i * sqrt(β_i + Σ_j γ_ij · x_j²)   (IGDN)\n\n    Parameters are reparameterised: true β = β̂² + ε, true γ = Γ̂²,\n    guaranteeing positivity without constrained optimisation.\n\n    Args:\n        num_channels: number of feature-map channels C\n        inverse:      if True, behaves as IGDN (synthesis transform)\n    \"\"\"\n\n    def __init__(self, num_channels: int, inverse: bool = False):\n        super().__init__()\n        self.inverse = inverse\n        self.beta_hat  = nn.Parameter(torch.ones(num_channels))\n        self.gamma_hat = nn.Parameter(0.1 * torch.eye(num_channels))\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta  = self.beta_hat.pow(2) + 1e-6          # (C,)  positive\n        gamma = self.gamma_hat.pow(2)                 # (C,C) non-negative\n\n        x2      = x.pow(2).view(B, C, H * W)         # (B, C, H*W)\n        norm_sq = torch.einsum(\"ij,bjk->bik\", gamma, x2)  # (B, C, H*W)\n        norm_sq = norm_sq.view(B, C, H, W) + beta.view(1, C, 1, 1)\n        norm    = norm_sq.sqrt()\n\n        return x * norm if self.inverse else x / norm\n\n\ndef IGDN(num_channels: int) -> GDN:\n    \"\"\"Convenience constructor for the inverse GDN used in synthesis.\"\"\"\n    return GDN(num_channels, inverse=True)\n\n\n# ===========================================================================\n# PROVIDED: histogram-based entropy estimator  (rate proxy, no gradient)\n# ===========================================================================\ndef histogram_entropy(y: torch.Tensor, num_bins: int = 100) -> torch.Tensor:\n    \"\"\"Estimate differential entropy of y in bits-per-element.\n\n    Uses a hard histogram with torch.no_grad — the rate term is a monitoring\n    scalar; gradients flow only through the distortion.  The encoder is\n    indirectly shaped toward compactness because compact codes have lower\n    distortion at any given rate.\n\n    Args:\n        y:        latent tensor of any shape\n        num_bins: number of histogram bins (more bins → finer estimate)\n    Returns:\n        scalar tensor — bits per latent element (no gradient)\n    \"\"\"\n    y_flat        = y.detach().reshape(-1).float()\n    y_min, y_max  = float(y_flat.min()), float(y_flat.max())\n    lo, hi        = y_min - 0.5, y_max + 0.5\n    with torch.no_grad():\n        counts = torch.histc(y_flat, bins=num_bins, min=lo, max=hi)\n        pmf    = (counts / counts.sum()).clamp(min=1e-10)\n        entropy = -(pmf * torch.log2(pmf)).sum()\n    return entropy   # scalar, bits per element\n\n\n# ===========================================================================\n# PROVIDED: data loading (real MNIST or fast synthetic fallback)\n# ===========================================================================\ndef get_loaders(batch_size: int = BATCH_SIZE):\n    \"\"\"Return (train_loader, test_loader) for MNIST or synthetic data.\"\"\"\n    if VERIFY:\n        X_tr = torch.rand(N_TRAIN, 1, 28, 28)\n        y_tr = torch.randint(0, 10, (N_TRAIN,))\n        X_te = torch.rand(256, 1, 28, 28)\n        y_te = torch.randint(0, 10, (256,))\n        train_ds = TensorDataset(X_tr, y_tr)\n        test_ds  = TensorDataset(X_te, y_te)\n    else:\n        tf = transforms.ToTensor()\n        train_ds = torchvision.datasets.MNIST(\n            \"./data\", train=True,  download=True, transform=tf)\n        test_ds  = torchvision.datasets.MNIST(\n            \"./data\", train=False, download=True, transform=tf)\n\n    train_loader = DataLoader(train_ds, batch_size=batch_size,\n                              shuffle=True,  num_workers=0, pin_memory=False)\n    test_loader  = DataLoader(test_ds,  batch_size=batch_size,\n                              shuffle=False, num_workers=0, pin_memory=False)\n    return train_loader, test_loader\n\n\n# ===========================================================================\n# PROVIDED: visualisation helper\n# ===========================================================================\ndef plot_reconstruction_grid(originals, reconstructions,\n                             path=\"ex01_grid.png\", n_cols=8):\n    \"\"\"Top row = originals, bottom row = reconstructions.\"\"\"\n    n = min(n_cols, len(originals))\n    fig, axes = plt.subplots(2, n, figsize=(n * 1.4, 3))\n    for i in range(n):\n        axes[0, i].imshow(originals[i].squeeze(), cmap=\"gray\", vmin=0, vmax=1)\n        axes[0, i].axis(\"off\")\n        axes[1, i].imshow(reconstructions[i].squeeze(), cmap=\"gray\", vmin=0, vmax=1)\n        axes[1, i].axis(\"off\")\n    axes[0, 0].set_ylabel(\"Original\",      fontsize=8)\n    axes[1, 0].set_ylabel(\"Reconstructed\", fontsize=8)\n    plt.suptitle(\"Analysis-Synthesis Autoencoder on MNIST\", fontsize=10)\n    plt.tight_layout()\n    plt.savefig(path, dpi=120, bbox_inches=\"tight\")\n    plt.close()\n    print(f\"Saved reconstruction grid → {path}\")\n\n\n# ===========================================================================\n# YOUR CODE (1/4): AnalysisTransform\n# ===========================================================================\nclass AnalysisTransform(nn.Module):\n    \"\"\"Three-stage analysis transform  g_a : x → y.\n\n    Architecture (each stage: Conv2d with stride=2, then GDN):\n      Stage 1 → Conv2d( 1→32, k=5, s=2, p=2) + GDN(32)    28×28 → 14×14\n      Stage 2 → Conv2d(32→32, k=5, s=2, p=2) + GDN(32)    14×14 →  7× 7\n      Stage 3 → Conv2d(32→16, k=5, s=2, p=2) + GDN(16)     7× 7 →  4× 4\n\n    Output: latent y  ∈  ℝ^{B × 16 × 4 × 4}  — note spatial shrinkage\n    uses padding=2 so stride-2 maps 28→14→7→4 correctly.\n\n    Args:\n        num_filters: intermediate channel width (default 32)\n        latent_ch:   bottleneck channel count   (default 16)\n    \"\"\"\n\n    def __init__(self, num_filters: int = N_FILTERS,\n                 latent_ch: int = LATENT_CH):\n        super().__init__()\n        ###########################################################\n        # YOUR CODE HERE — ~15 lines                              #\n        #                                                         #\n        # Create self.stage1, self.stage2, self.stage3 as        #\n        # nn.Sequential modules.  Each contains:                  #\n        #   nn.Conv2d(in_ch, out_ch, kernel_size=5,              #\n        #             stride=2, padding=2)                        #\n        #   GDN(out_ch)                                           #\n        #                                                         #\n        # Channel sizes:                                          #\n        #   stage1:  1 → num_filters                             #\n        #   stage2:  num_filters → num_filters                   #\n        #   stage3:  num_filters → latent_ch                     #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        ###########################################################\n        # YOUR CODE HERE — 3 lines                               #\n        #                                                         #\n        # Chain: x → stage1 → stage2 → stage3 → return          #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\n# ===========================================================================\n# YOUR CODE (2/4): SynthesisTransform\n# ===========================================================================\nclass SynthesisTransform(nn.Module):\n    \"\"\"Three-stage synthesis transform  g_s : ŷ → x̂  (mirror of g_a).\n\n    Architecture (each stage: IGDN first, then ConvTranspose2d):\n      Stage 1 → IGDN(16) + ConvTranspose2d(16→32, k=5, s=2, p=2, op=0)   4→ 7\n      Stage 2 → IGDN
