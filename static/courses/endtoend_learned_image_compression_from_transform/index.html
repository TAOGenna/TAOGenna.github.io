--------------\n    - Concatenate all gradient tensors into a single 1-D numpy array.\n      Use torch.cat(grad_snapshots).numpy().ravel()\n    - Use ax.hist(grads, bins=60, color=color, alpha=0.8, edgecolor='none')\n    - Add a vertical line at x=0: ax.axvline(0, color='black', lw=1, ls='--')\n    - Label axes: ax.set_xlabel(\"Gradient at encoder output\") and\n      ax.set_ylabel(\"Count\")\n    - Set the title and add a text annotation with the std:\n      std = np.std(grads); ax.set_title(f\"{title}\\nstd={std:.3f}\")\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 8-12 lines                             #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: evaluation, reconstruction scatter, and __main__\n# ---------------------------------------------------------------------------\n\ndef evaluate(model: TinyAE, data: torch.Tensor, method: str) -> float:\n    \"\"\"Evaluate the model with TRUE ROUNDING (not noise).\n\n    Parameters\n    ----------\n    model : TinyAE\n    data  : torch.Tensor  Shape (N, 1)\n    method : str  (unused — kept for labelling symmetry)\n\n    Returns\n    -------\n    float  MSE averaged over the dataset.\n    \"\"\"\n    model.eval()\n    with torch.no_grad():\n        y = model.encode(data)\n        q = torch.round(y)          # always round at eval time\n        x_hat = model.decode(q)\n        mse = ((x_hat - data) ** 2).mean().item()\n    model.train()\n    return mse\n\n\ndef plot_reconstructions(ax: plt.Axes, model: TinyAE, data: torch.Tensor, title: str) -> None:\n    \"\"\"Scatter plot: true x vs reconstructed x̂ (eval mode with rounding).\"\"\"\n    model.eval()\n    with torch.no_grad():\n        y = model.encode(data)\n        q = torch.round(y)\n        x_hat = model.decode(q).numpy()\n    x_np = data.numpy()\n    ax.scatter(x_np[:200], x_hat[:200], alpha=0.35, s=10, color=\"steelblue\")\n    lo = min(x_np.min(), x_hat.min()) - 0.3\n    hi = max(x_np.max(), x_hat.max()) + 0.3\n    ax.plot([lo, hi], [lo, hi], 'r--', lw=1.2, label=\"perfect\")\n    ax.set_xlabel(\"True x\")\n    ax.set_ylabel(\"Reconstructed x̂\")\n    ax.set_title(title)\n    ax.legend(fontsize=8)\n    model.train()\n\n\nif __name__ == \"__main__\":\n    # --- data ---\n    data = make_data(N_SAMPLES)\n\n    # --- train both methods ---\n    print(\"Training STE method...\")\n    losses_ste, grads_ste, model_ste = train_one_method(\"ste\",   data, N_STEPS, BATCH, LR)\n    print(\"Training Noise method...\")\n    losses_noise, grads_noise, model_noise = train_one_method(\"noise\", data, N_STEPS, BATCH, LR)\n\n    # --- evaluate with actual rounding ---\n    mse_ste   = evaluate(model_ste,   data, \"ste\")\n    mse_noise = evaluate(model_noise, data, \"noise\")\n    print(f\"\\nFinal MSE  STE: {mse_ste:.4f}  |  Noise: {mse_noise:.4f}\")\n\n    # --- figure: 2 rows × 3 cols ---\n    # Row 0: STE  — [loss curve | grad histogram | reconstruction scatter]\n    # Row 1: Noise— [loss curve | grad histogram | reconstruction scatter]\n    fig = plt.figure(figsize=(15, 8))\n    gs  = gridspec.GridSpec(2, 3, figure=fig, hspace=0.45, wspace=0.38)\n\n    for row, (losses, grads, model, label, color) in enumerate([\n        (losses_ste,   grads_ste,   model_ste,   \"STE\",          \"steelblue\"),\n        (losses_noise, grads_noise, model_noise, \"Uniform Noise\", \"darkorange\"),\n    ]):\n        # ---- loss curve ----\n        ax_loss = fig.add_subplot(gs[row, 0])\n        # smooth with a running average for readability\n        window = max(1, len(losses) // 40)\n        smoothed = np.convolve(losses, np.ones(window) / window, mode=\"valid\")\n        ax_loss.plot(smoothed, color=color, lw=1.4)\n        ax_loss.set_xlabel(\"Step\")\n        ax_loss.set_ylabel(\"MSE loss\")\n        ax_loss.set_title(f\"{label} — Loss curve\")\n\n        # ---- gradient histogram ----\n        ax_hist = fig.add_subplot(gs[row, 1])\n        plot_gradient_histogram(ax_hist, grads, color, f\"{label} — Grad histogram\")\n\n        # ---- reconstruction scatter ----\n        ax_rec = fig.add_subplot(gs[row, 2])\n        plot_reconstructions(ax_rec, model, data, f\"{label} — Reconstructions\\n(eval w/ rounding, MSE={evaluate(model, data, label):.4f})\")\n\n    fig.suptitle(\"STE vs Uniform Noise: gradient quality and reconstruction\", fontsize=13, fontweight=\"bold\")\n    out_path = \"ex01_ste_vs_noise.png\"\n    plt.savefig(out_path, dpi=130, bbox_inches=\"tight\")\n    print(f\"Saved: {out_path}\")\n"}, {"filename": "ex02_verifying_the_density_relaxation_property.py", "content": "\"\"\"\nExercise 2: Verifying the Density Relaxation Property\n======================================================\nModule 2 of \"End-to-End Learned Image Compression\"\n\nThe Mathematical Claim (Ballé et al. 2017)\n------------------------------------------\nIf  q  = round(y)  and  ỹ = y + Δy  with  Δy ~ U(-0.5, 0.5),  then:\n\n    p_ỹ(n) = P_q(n)   for all n ∈ Z\n\nThat is, the density of ỹ evaluated at any INTEGER equals the probability\nmass of the discrete variable q at that integer.\n\nWhy does this matter?\n---------------------\nMinimizing h[ỹ] (differential entropy) ≈ minimizing H[q] (discrete entropy).\nThe rate term in the objective can therefore be made differentiable by\nsubstituting ỹ for q — gradient flows freely through y + Δy.\n\nThis exercise verifies the property empirically for three distributions:\n  1. Gaussian y ~ N(0, 1.5)\n  2. Laplace  y ~ Laplace(0, 1.0)\n  3. Bimodal  y ~ 0.5·N(-2, 0.5) + 0.5·N(+2, 0.5)\n\nFor each distribution you will:\n  - Compute the PMF of q = round(y) from samples (bar chart)\n  - Compute the density of ỹ = y + Δy via KDE, evaluated at integers (line)\n  - Overlay them and compute the max absolute error\n\nRun\n---\n    python ex02_verifying_the_density_relaxation_property.py\n\nExpected output\n---------------\n    [Gaussian] Max |p_ỹ(n) - P_q(n)| = 0.00X\n    [Laplace]  Max |p_ỹ(n) - P_q(n)| = 0.00X\n    [Bimodal]  Max |p_ỹ(n) - P_q(n)| = 0.00X\n    Density relaxation verified: True\n    Saved: ex02_density_relaxation.png\n\"\"\"\n\nimport os\nimport numpy as np\nimport scipy.stats\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n# Need ≥50K samples for KDE to be accurate; use tiny count for CI verification\nN_SAMPLES = 512 if VERIFY else 80_000\n\nnp.random.seed(42)\n\n\n# ---------------------------------------------------------------------------\n# Distribution samplers (PROVIDED)\n# ---------------------------------------------------------------------------\n\ndef sample_gaussian(n: int) -> np.ndarray:\n    \"\"\"y ~ N(0, 1.5), shape (n,).\"\"\"\n    return np.random.normal(0, 1.5, size=n)\n\n\ndef sample_laplace(n: int) -> np.ndarray:\n    \"\"\"y ~ Laplace(0, 1.0), shape (n,).\"\"\"\n    return np.random.laplace(0, 1.0, size=n)\n\n\ndef sample_bimodal(n: int) -> np.ndarray:\n    \"\"\"y ~ 0.5·N(-2, 0.5) + 0.5·N(+2, 0.5), shape (n,).\"\"\"\n    mask = np.random.rand(n) < 0.5\n    out  = np.where(mask,\n                    np.random.normal(-2.0, 0.5, size=n),\n                    np.random.normal(+2.0, 0.5, size=n))\n    return out\n\n\nDISTRIBUTIONS = [\n    (\"Gaussian\", sample_gaussian),\n    (\"Laplace\",  sample_laplace),\n    (\"Bimodal\",  sample_bimodal),\n]\n\n\n# ---------------------------------------------------------------------------\n# Provided helper: find the integer grid to evaluate on\n# ---------------------------------------------------------------------------\n\ndef integer_grid(y_samples: np.ndarray, margin: int = 1) -> np.ndarray:\n    \"\"\"Return the integers from floor(min(y))-margin to ceil(max(y))+margin.\n\n    Parameters\n    ----------\n    y_samples : np.ndarray\n        Samples of the continuous variable y.\n    margin : int\n        How many extra integers to include on each side.\n\n    Returns\n    -------\n    np.ndarray\n        1-D array of integers, dtype int.\n    \"\"\"\n    lo = int(np.floor(y_samples.min())) - margin\n    hi = int(np.ceil(y_samples.max()))  + margin\n    return np.arange(lo, hi + 1)\n\n\n# ---------------------------------------------------------------------------\n# TODO 1 of 3 — Compute the quantized PMF\n# ---------------------------------------------------------------------------\n\ndef compute_quantized_pmf(y_samples: np.ndarray, integers: np.ndarray) -> np.ndarray:\n    \"\"\"Estimate P_q(n) for each n in `integers` from y samples.\n\n    The PMF is:\n        P_q(n) = fraction of samples where round(y) == n\n\n    Parameters\n    ----------\n    y_samples : np.ndarray\n        Shape (N,). Continuous latent samples.\n    integers : np.ndarray\n        Shape (K,). The integer values at which to evaluate the PMF.\n\n    Returns\n    -------\n    pmf : np.ndarray\n        Shape (K,). pmf[i] = P_q(integers[i]).  Sums to ≈1.\n\n    Implementation notes\n    --------------------\n    - Round y_samples to nearest integer: q = np.round(y_samples).astype(int)\n    - For each n in integers, count how many q values equal n.\n    - Divide by total sample count to get probabilities.\n    - Hint: np.sum(q == n) gives the count for integer n.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 6-9 lines                              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2 of 3 — Compute the density of ỹ = y + Δy at integer points\n# ---------------------------------------------------------------------------\n\ndef compute_noisy_density(y_samples: np.ndarray, integers: np.ndarray) -> np.ndarray:\n    \"\"\"Estimate p_ỹ(n) for each n in `integers` using KDE.\n\n    Steps:\n      1. Add uniform noise: ỹ_i = y_i + Δy_i,  Δy_i ~ U(-0.5, 0.5)\n      2. Fit a KDE to the noisy samples using scipy.stats.gaussian_kde.\n      3. Evaluate the KDE at the integer grid.\n\n    Parameters\n    ----------\n    y_samples : np.ndarray\n        Shape (N,). Continuous latent samples.\n    integers : np.ndarray\n        Shape (K,). Integer evaluation points.\n\n    Returns\n    -------\n    density_at_integers : np.ndarray\n        Shape (K,). p_ỹ(n) for each n.\n\n    Implementation notes\n    --------------------\n    - noise = np.random.uniform(-0.5, 0.5, size=y_samples.shape)\n    - y_tilde = y_samples + noise\n    - kde = scipy.stats.gaussian_kde(y_tilde)\n    - kde(integers) returns the density at those points\n    - With bandwidth='scott' (the default), KDE smooths slightly across\n      integers — this is fine; the match at integers is still excellent.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 5-8 lines                              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3 of 3 — Overlay plot + max-error check\n# ---------------------------------------------------------------------------\n\ndef verification_plot(\n    ax: plt.Axes,\n    pmf: np.ndarray,\n    density: np.ndarray,\n    integers: np.ndarray,\n    title: str,\n) -> float:\n    \"\"\"Overlay bar chart (PMF of q) and line plot (density of ỹ) on `ax`.\n\n    Parameters\n    ----------\n    ax : plt.Axes\n        Axis to draw on.\n    pmf : np.ndarray\n        Shape (K,). P_q(n) at each integer.\n    density : np.ndarray\n        Shape (K,). p_ỹ(n) at each integer.\n    integers : np.ndarray\n        Shape (K,). The integer values (x-axis).\n    title : str\n        Axis title string.\n\n    Returns\n    -------\n    max_error : float\n        max |p_ỹ(n) - P_q(n)| over all integers.\n\n    Implementation notes\n    --------------------\n    Bars  : ax.bar(integers, pmf, width=0.7, alpha=0.55, color='steelblue',\n                   label='P_q(n) — PMF of q')\n    Line  : ax.plot(integers, density, 'o-', color='darkorange', lw=1.8,\n                    ms=4, label='p_ỹ(n) — density of ỹ at integers')\n    - Add ax.legend(), ax.set_xlabel(\"n\"), ax.set_ylabel(\"Probability / Density\")\n    - Set ax.set_title(title)\n    - Compute max_error = np.max(np.abs(density - pmf))\n    - Add a text annotation: ax.text(0.05, 0.92,\n          f'max |error| = {max_error:.4f}', transform=ax.transAxes, fontsize=9)\n    - Return max_error.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 10-15 lines                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: __main__ harness\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    fig, axes = plt.subplots(1, 3, figsize=(15, 4))\n    fig.suptitle(\n        r\"Density Relaxation: $p_{\\tilde{y}}(n) = P_q(n)$ verified empirically\",\n        fontsize=12, fontweight=\"bold\",\n    )\n\n    all_errors: list[float] = []\n    for ax, (name, sampler) in zip(axes, DISTRIBUTIONS):\n        y = sampler(N_SAMPLES)\n        ns = integer_grid(y)\n\n        pmf     = compute_quantized_pmf(y, ns)\n        density = compute_noisy_density(y, ns)\n\n        max_err = verification_plot(ax, pmf, density, ns, name)\n        all_errors.append(max_err)\n        print(f\"[{name:8s}] Max |p_ỹ(n) - P_q(n)| = {max_err:.4f}\")\n\n    # VERIFY mode uses only 512 samples — KDE less accurate, relax threshold\n    threshold = 0.15 if VERIFY else 0.02\n    passed = all(e < threshold for e in all_errors)\n    print(f\"Density relaxation verified: {passed}\")\n\n    plt.tight_layout()\n    out_path = \"ex02_density_relaxation.png\"\n    plt.savefig(out_path, dpi=130, bbox_inches=\"tight\")\n    print(f\"Saved: {out_path}\")\n"}, {"filename": "ex03_training_with_noise_evaluating_with_rounding.py", "content": "\"\"\"\nExercise 3: Training with Noise, Evaluating with Rounding\n==========================================================\nModule 2 of \"End-to-End Learned Image Compression\"\n\nThe Core Claim\n--------------\nWe train with  ỹ = y + Δy  (smooth, differentiable proxy).\nAt test time we use  q = round(y)  (actual discrete symbols).\n\nThe paper (Ballé et al. 2017) states:\n    \"The relaxed distortion term appears to be mostly unbiased,\n     and exhibits a relatively small variance.\"\n\nThis exercise MEASURES the gap. You will train a small autoencoder on a\n2-D concentric-rings dataset and, at regular intervals during training,\nevaluate BOTH the noise-proxy loss and the true rounding loss. The scatter\nplot of proxy vs. actual should cluster on the diagonal — confirming that\nwe are optimizing the right thing.\n\nMetrics tracked at each checkpoint\n-----------------------------------\n- continuous_rate(ỹ)  : differential entropy estimated from noisy latents\n- discrete_rate(q)    : actual discrete entropy estimated from rounded latents\n- continuous_distortion: MSE with noisy decoder input  (training mode)\n- discrete_distortion : MSE with rounded decoder input (eval mode)\n\nRun\n---\n    python ex03_training_with_noise_evaluating_with_rounding.py\n\nExpected output\n---------------\n    Step XXXX | Train proxy: R=X.XX D=X.XX | Eval actual: R=X.XX D=X.XX\n    ...\n    Saved: ex03_train_vs_eval.png\n\"\"\"\n\nimport os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport torch.optim as optim\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_STEPS    = 3      if VERIFY else 2_000\nN_SAMPLES  = 64     if VERIFY else 8_000\nBATCH      = 32     if VERIFY else 256\nLR         = 5e-4\nLAMBDA_RD  = 0.1    # rate-distortion trade-off weight (R + λD)\nLOG_EVERY  = 1      if VERIFY else 100   # checkpoint interval\n\ntorch.manual_seed(0)\nnp.random.seed(0)\n\n\n# ---------------------------------------------------------------------------\n# Data: 2-D concentric rings\n# ---------------------------------------------------------------------------\n\ndef make_rings(n: int, noise: float = 0.08) -> torch.Tensor:\n    \"\"\"Return n points drawn from three concentric rings in R^2.\n\n    Parameters\n    ----------\n    n : int\n        Total number of points.\n    noise : float\n        Gaussian noise added to radii.\n\n    Returns\n    -------\n    torch.Tensor\n        Shape (n, 2), values roughly in [-4, 4].\n    \"\"\"\n    radii = [1.0, 2.2, 3.4]\n    pts = []\n    per_ring = n // len(radii)\n    for r in radii:\n        angles = 2 * np.pi * np.random.rand(per_ring)\n        rx = r + np.random.randn(per_ring) * noise\n        x  = np.stack([rx * np.cos(angles), rx * np.sin(angles)], axis=1)\n        pts.append(x)\n    data = np.concatenate(pts, axis=0)\n    np.random.shuffle(data)\n    return torch.tensor(data, dtype=torch.float32)\n\n\n# ---------------------------------------------------------------------------\n# Model: 2-D → bottleneck(4) → 2-D autoencoder\n# ---------------------------------------------------------------------------\n\nclass RingsAE(nn.Module):\n    \"\"\"Autoencoder for the 2-D rings dataset.\n\n    Architecture\n    ------------\n    Encoder: Linear(2→32) → ReLU → Linear(32→4)\n    Decoder: Linear(4→32) → ReLU → Linear(32→2)\n\n    Bottleneck has 4 dimensions — enough to capture ring structure.\n    Quantization acts on the 4-D latent vector.\n    \"\"\"\n\n    def __init__(self, bottleneck: int = 4):\n        super().__init__()\n        self.encoder = nn.Sequential(\n            nn.Linear(2, 32), nn.ReLU(),\n            nn.Linear(32, bottleneck),\n        )\n        self.decoder = nn.Sequential(\n            nn.Linear(bottleneck, 32), nn.ReLU(),\n            nn.Linear(32, 2),\n        )\n\n    def encode(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"Maps input x ∈ R^2 to continuous latent y ∈ R^bottleneck.\"\"\"\n        return self.encoder(x)\n\n    def decode(self, z: torch.Tensor) -> torch.Tensor:\n        \"\"\"Maps latent z ∈ R^bottleneck to reconstruction x̂ ∈ R^2.\"\"\"\n        return self.decoder(z)\n\n\n# ---------------------------------------------------------------------------\n# TODO 1 of 4 — Training forward pass (noise mode)\n# ---------------------------------------------------------------------------\n\ndef forward_train(model: RingsAE, x: torch.Tensor):\n    \"\"\"Encode → add uniform noise → decode.\n\n    Used during TRAINING. The noise makes the bottleneck differentiable.\n\n    Parameters\n    ----------\n    model : RingsAE\n    x : torch.Tensor\n        Shape (B, 2). Mini-batch inputs.\n\n    Returns\n    -------\n    x_hat : torch.Tensor\n        Shape (B, 2). Reconstructions.\n    y_tilde : torch.Tensor\n        Shape (B, bottleneck). Noisy latents ỹ = y + Δy.\n\n    Implementation notes\n    --------------------\n    1. y = model.encode(x)\n    2. noise = torch.empty_like(y).uniform_(-0.5, 0.5)\n    3. y_tilde = y + noise\n    4. x_hat = model.decode(y_tilde)\n    5. Return (x_hat, y_tilde)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 6-8 lines                              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 2 of 4 — Evaluation forward pass (rounding mode)\n# ---------------------------------------------------------------------------\n\ndef forward_eval(model: RingsAE, x: torch.Tensor):\n    \"\"\"Encode → round → decode.\n\n    Used during EVALUATION. Returns actual discrete symbols.\n\n    Parameters\n    ----------\n    model : RingsAE\n    x : torch.Tensor\n        Shape (B, 2). Inputs.\n\n    Returns\n    -------\n    x_hat : torch.Tensor\n        Shape (B, 2). Reconstructions from ROUNDED latents.\n    q : torch.Tensor\n        Shape (B, bottleneck). Integer-valued quantized latents.\n\n    Implementation notes\n    --------------------\n    Use torch.no_grad() to skip gradient computation.\n    Round y to nearest integer: q = torch.round(y).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 6-8 lines                              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3 of 4 — Entropy estimators\n# ---------------------------------------------------------------------------\n\ndef continuous_rate(y_tilde: torch.Tensor) -> torch.Tensor:\n    \"\"\"Estimate differential entropy of ỹ using a histogram.\n\n    This approximates H[q] via h[ỹ]. The better the approximation, the more\n    reliable our proxy is during training.\n\n    Parameters\n    ----------\n    y_tilde : torch.Tensor\n        Shape (B, C). Noisy continuous latents.\n\n    Returns\n    -------\n    rate : torch.Tensor\n        Scalar. Sum of per-dimension entropy estimates (in nats).\n\n    Implementation notes\n    --------------------\n    For each of the C channels independently:\n      1. Detach and flatten to numpy: vals = y_tilde[:, c].detach().numpy()\n      2. Build a histogram with 32 bins: counts, _ = np.histogram(vals, bins=32)\n      3. Convert to probabilities: probs = counts / counts.sum()\n      4. Compute entropy (in nats): H = -sum(p * log(p + 1e-10)) for p > 0\n         Equivalently: H = scipy.stats.entropy(probs)  [uses nats]\n      5. Accumulate across all C channels.\n    Return as a Python float wrapped in torch.tensor(...).\n    Hint: import scipy.stats at the top of the function if needed, or use\n    the manual formula.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 12-18 lines                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef discrete_rate(q: torch.Tensor) -> torch.Tensor:\n    \"\"\"Compute the true discrete entropy of quantized latents q.\n\n    Parameters\n    ----------\n    q : torch.Tensor\n        Shape (B, C). Integer-valued quantized latents (from torch.round).\n\n    Returns\n    -------\n    rate : torch.Tensor\n        Scalar. Sum of per-dimension discrete entropy estimates (in nats).\n\n    Implementation notes\n    --------------------\n    For each channel c independently:\n      1. Flatten: vals = q[:, c].detach().numpy().astype(int)\n      2. Find unique values and their counts:\n         unique, counts = np.unique(vals, return_counts=True)\n      3. Normalize to PMF: probs = counts / counts.sum()\n      4. Compute entropy: H = -np.sum(probs * np.log(probs + 1e-10))\n      5. Accumulate.\n    This is the REAL entropy of q — what an optimal entropy coder would need.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 10-15 lines                            #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 4 of 4 — Training loop with checkpointing\n# ---------------------------------------------------------------------------\n\ndef train_and_checkpoint(\n    model: RingsAE,\n    data: torch.Tensor,\n    n_steps: int,\n    batch_size: int,\n    lr: float,\n    lam: float,\n    log_every: int,\n) -> list[dict]:\n    \"\"\"Train model and collect proxy vs. actual metrics every `log_every` steps.\n\n    Parameters\n    ----------\n    model : RingsAE\n    data : torch.Tensor  Shape (N, 2)\n    n_steps : int\n    batch_size : int\n    lr : float\n    lam : float          λ in  L = R + λD\n    log_every : int      How often (in steps) to run eval and log.\n\n    Returns\n    -------\n    checkpoints : list[dict]\n        Each dict has keys:\n          'step', 'train_R', 'train_D', 'eval_R', 'eval_D'\n\n    Implementation notes\n    --------------------\n    Training step:\n      1. Sample a random mini-batch.\n      2. x_hat, y_tilde = forward_train(model, x_batch)\n      3. distortion = F.mse_loss(x_hat, x_batch)\n      4. rate = continuous_rate(y_tilde)\n      5. loss = rate + lam * distortion\n      6. optimizer.zero_grad(); loss.backward(); optimizer.step()\n\n    Checkpoint (every log_every steps):\n      1. x_hat_noise, y_tilde = forward_train(model, data[:batch_size])\n         train_R = continuous_rate(y_tilde).item()\n         train_D = F.mse_loss(x_hat_noise, data[:batch_size]).item()\n      2. x_hat_round, q = forward_eval(model, data[:batch_size])\n         eval_R = discrete_rate(q).item()\n         eval_D = F.mse_loss(x_hat_round, data[:batch_size]).item()\n      3. Print the checkpoint and append to the list.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 28-40 lines                            #\n    #                                                         #\n    # Skeleton:                                               #\n    # optimizer = optim.Adam(model.parameters(), lr=lr)       #\n    # checkpoints = []                                        #\n    # n = data.shape[0]                                       #\n    # for step in range(1, n_steps + 1):                      #\n    #     idx = torch.randint(0, n, (batch_size,))            #\n    #     x_batch = data[idx]                                 #\n    #     ... training step (see above) ...                   #\n    #     if step % log_every == 0:                           #\n    #         ... eval checkpoint (see above) ...             #\n    #         print(f\"Step {step:4d} | Train proxy: \"        #\n    #               f\"R={train_R:.2f} D={train_D:.4f} | \"    #\n    #               f\"Eval actual: R={eval_R:.2f} \"          #\n    #               f\"D={eval_D:.4f}\")                        #\n    #         checkpoints.append({...})                       #\n    # return checkpoints                                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Provided: plotting and __main__\n# ---------------------------------------------------------------------------\n\ndef plot_results(checkpoints: list[dict]) -> None:\n    \"\"\"Two-panel figure: training curves + proxy-vs-actual scatter.\"\"\"\n    if not checkpoints:\n        print(\"[warning] no checkpoints to plot\")\n        return\n\n    steps   = [c[\"step\"]    for c in checkpoints]\n    train_R = [c[\"train_R\"] for c in checkpoints]\n    train_D = [c[\"train_D\"] for c in checkpoints]\n    eval_R  = [c[\"eval_R\"]  for c in checkpoints]\n    eval_D  = [c[\"eval_D\"]  for c in checkpoints]\n\n    fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(13, 5))\n    fig.suptitle(\n        \"Training with noise ↔ Evaluating with rounding\\n\"\n        r\"Proxy loss $\\approx$ actual loss throughout training\",\n        fontsize=12, fontweight=\"bold\",\n    )\n\n    # --- Left: training curves ---\n    ax1.plot(steps, train_R,  label=\"Train R (noise proxy)\", color=\"steelblue\",   lw=1.5)\n    ax1.plot(steps, eval_R,   label=\"Eval  R (rounding)\",    color=\"steelblue\",   lw=1.5, ls=\"--\")\n    ax1.plot(steps, [lam * d for d in train_D],\n             label=rf\"Train λD (noise proxy)\", color=\"darkorange\", lw=1.5)\n    ax1.plot(steps, [lam * d for d in eval_D],\n             label=rf\"Eval  λD (rounding)\",    color=\"darkorange\", lw=1.5, ls=\"--\")\n    ax1.set_xlabel(\"Training step\")\n    ax1.set_ylabel(\"Loss component\")\n    ax1.set_title(\"Loss components over time\\n(solid=proxy, dashed=actual)\")\n    ax1.legend(fontsize=8)\n\n    # --- Right: proxy vs actual scatter ---\n    ax2.scatter(train_R, eval_R,  alpha=0.7, s=20, color=\"steelblue\",\n                label=\"Rate: proxy vs actual\")\n    ax2.scatter([lam * d for d in train_D], [lam * d for d in eval_D],\n                alpha=0.7, s=20, color=\"darkorange\", label=\"λ·Distortion: proxy vs actual\")\n    # Identity line\n    all_vals = train_R + eval_R + [lam * d for d in train_D + eval_D]\n    lo, hi = min(all_vals) * 0.9, max(all_vals) * 1.1\n    ax2.plot([lo, hi], [lo, hi], 'k--', lw=1.2, alpha=0.5, label=\"y = x (perfect proxy)\")\n    ax2.set_xlabel(\"Proxy (noise)\")\n    ax2.set_ylabel(\"Actual (rounding)\")\n    ax2.set_title(\"Proxy vs actual at each checkpoint\\n(close to diagonal → proxy is valid)\")\n    ax2.legend(fontsize=8)\n    ax2.set_xlim(lo, hi)\n    ax2.set_ylim(lo, hi)\n\n    plt.tight_layout()\n    out_path = \"ex03_train_vs_eval.png\"\n    plt.savefig(out_path, dpi=130, bbox_inches=\"tight\")\n    print(f\"Saved: {out_path}\")\n\n\nlam = LAMBDA_RD  # make accessible in plot_results\n\nif __name__ == \"__main__\":\n    data  = make_rings(N_SAMPLES)\n    model = RingsAE(bottleneck=4)\n\n    checkpoints = train_and_checkpoint(\n        model, data, N_STEPS, BATCH, LR, LAMBDA_RD, LOG_EVERY\n    )\n\n    plot_results(checkpoints)\n"}]}, "module_03_gdn_the_key_nonlinearity": {"content": "# Module 3: GDN: The Key Nonlinearity\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Problem: Why Nonlinearity Matters for Compression](#the-problem-why-nonlinearity-matters-for-compression)\n- [Natural Image Statistics: The Root Cause](#natural-image-statistics-the-root-cause)\n- [The GDN Equation: A Complete Dissection](#the-gdn-equation-a-complete-dissection)\n- [From Equation to Code](#from-equation-to-code)\n- [Why Not Just Use ReLU?](#why-not-just-use-relu)\n- [GDN vs Batch Normalization](#gdn-vs-batch-normalization)\n- [Where GDN Lives in the Architecture](#where-gdn-lives-in-the-architecture)\n- [IGDN: The Approximate Inverse](#igdn-the-approximate-inverse)\n- [Parameter Constraints: Keeping GDN Stable](#parameter-constraints-keeping-gdn-stable)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: Connecting GDN to the Comma.ai Challenge](#synthesis-connecting-gdn-to-the-commaai-challenge)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Write the GDN forward pass from scratch given the equation, including the $\\beta$/$\\gamma$ reparameterization and symmetry constraint\n2. Explain intuitively why divisive normalization Gaussianizes heavy-tailed filter responses — and why that matters for rate-distortion performance\n3. Distinguish GDN from pointwise nonlinearities (ReLU) and from batch normalization — two comparisons the paper makes explicitly\n4. Implement IGDN and understand why it is a *separate* learned approximation, not a closed-form inverse\n5. Trace a pixel value through all three stages of $g_a$ and $g_s$, naming the tensor shape at each step\n\n---\n\n## The Problem: Why Nonlinearity Matters for Compression\n\nIn Module 0 you saw JPEG use a fixed linear transform (the DCT) to decorrelate pixel values before quantizing them. In Module 2 you saw why we need to be able to quantize: integers are cheap to store, real numbers are not. Here's the question that motivates this entire module:\n\n**If we have a learned convolution — a linear transform with learned weights — why isn't that enough? Why does Ballé et al. add a joint nonlinear activation (GDN) after every convolutional layer?**\n\nThe answer has three parts, and we'll develop all three in this module:\n\n1. **Linear transforms alone cannot Gaussianize natural image statistics.** Even a perfectly learned convolutional layer produces filter responses with heavy-tailed, non-Gaussian distributions. GDN is a specific nonlinearity proven to fix this efficiently.\n2. **Entropy coding is cheapest on Gaussian-like distributions.** The entropy model in Module 2 models each latent channel independently. If latents look Gaussian, that model is accurate and we pay close to the information-theoretic minimum. If they look like a Laplacian or super-Gaussian, we waste bits.\n3. **Cross-channel dependencies matter.** A pointwise nonlinearity like ReLU treats each channel independently at each spatial location. GDN couples all 128 channels together at each pixel location — capturing the exact structure that makes natural image filter responses non-Gaussian.\n\nLet's trace our running example through the argument. Take a $256 \\times 256$ grayscale image — let's say a street scene from a dashcam (relevant to your comma.ai challenge). Apply a learned $9 \\times 9$ convolutional layer with 128 filters. At any spatial location $(m, n)$, you now have a 128-dimensional vector of filter responses: $\\mathbf{w}^{(1)}(m, n) \\in \\mathbb{R}^{128}$. What does the distribution of these 128 numbers look like?\n\n---\n\n## Natural Image Statistics: The Root Cause\n\nThe response of a linear filter (edge detector, Gabor wavelet, DCT basis function) applied to a natural image patch is famously **leptokurtic**: it has a sharp spike near zero and heavy tails far from zero. This is not an artifact of any particular filter — it is a fundamental property of natural images. The excess kurtosis of linear filter responses on natural images typically falls in the range of 8–15 (recall: a Gaussian has excess kurtosis 0, a Laplacian has excess kurtosis 3).\n\nWhat does this mean practically? Consider your entropy model from Module 2. You're modeling each latent channel $\\tilde{y}_i$ with a distribution $p_{\\tilde{y}_i}$. The rate cost assigned to a latent value $\\hat{y}$ is:\n\n$$R_i(\\hat{y}) = -\\log_2 p_{\\tilde{y}_i}(\\hat{y})$$\n\nIf you fit a Gaussian to a distribution that is actually Laplacian (excess kurtosis $\\approx 3$), the Gaussian will be too narrow at the tails. Your model says those tail values have very low probability — so you assign them **long codes**. But those values actually occur quite often. You're wasting bits.\n\n**The transform's job is to make the latent distributions look as Gaussian as possible, so the entropy model's independent-Gaussian assumption wastes the fewest bits.**\n\nThis is the core motivation for GDN. It is not used because it is convenient or because it improves gradient flow (that's ReLU's selling point). It is used because it is \"highly efficient in Gaussianizing the local joint statistics of natural images, much more so than cascades of linear transforms followed by pointwise nonlinearities.\"[^1]\n\n![Distribution before and after GDN: heavy-tailed raw filter responses become Gaussian-like](diagrams/gaussianization_before_after.svg)\n\n*Figure: Left — raw linear filter responses on natural images have a characteristic \"spike-and-tail\" shape with kurtosis 8–15. Right — GDN outputs have near-Gaussian distributions with kurtosis close to 0. This difference directly translates to fewer wasted bits in the entropy coder.*\n\n[^1]: Quote from Ballé et al., ICLR 2017. The paper cites earlier neuroscience work by Schwartz & Simoncelli (2001) which showed divisive normalization can reduce statistical dependencies in natural images better than ICA alone.\n\n---\n\n## The GDN Equation: A Complete Dissection\n\n### Stage 1 — Intuition First\n\nBefore we write a single symbol: what is GDN *doing*, physically?\n\nImagine you're a neuron in V1 (primary visual cortex). You're an edge detector tuned to 45° orientations. Your firing rate depends not just on how strongly your preferred stimulus is present — it also depends on how active *all your neighboring neurons* are. If everything is active (high-contrast, noisy scene), you turn down your gain. If the neighborhood is quiet, you amplify your signal. This is called **contrast normalization** or **divisive normalization**, and it was observed in biological neurons long before neural networks were fashionable.\n\nGDN mathematizes this idea: divide each filter response by a data-dependent normalization factor that pools across all filter channels at that location. The result is that responses are \"normalized\" relative to the local image energy, producing outputs that are more uniformly distributed — and thus cheaper to entropy-code.\n\n### Stage 2 — Notation\n\nBefore stating the equation, let's define every symbol:\n\n| Symbol | Meaning | Type / Dimensions |\n|--------|---------|-------------------|\n| $w_i^{(k)}(m,n)$ | Input to GDN at stage $k$, channel $i$, location $(m,n)$ | scalar |\n| $u_i^{(k+1)}(m,n)$ | Output of GDN (input to next stage) | scalar |\n| $\\beta_{k,i}$ | Bias for channel $i$ at stage $k$ | scalar, $\\geq 2^{-5}$ |\n| $\\gamma_{k,ij}$ | Interaction weight between channels $i$ and $j$ at stage $k$ | scalar, $\\geq 0$, symmetric |\n| $C$ | Number of channels (128 in all three stages) | integer |\n| $K$ | Number of GDN stages (3 in the analysis transform) | integer |\n\n### Stage 3 — The Equation With Inline Annotations\n\nFrom the paper (equation 3):\n\n$$\\boxed{u_i^{(k+1)}(m,n) = \\frac{w_i^{(k)}(m,n)}{\\left(\\beta_{k,i} + \\sum_{j=1}^{C} \\gamma_{k,ij} \\left(w_j^{(k)}(m,n)\\right)^2\\right)^{1/2}}}$$\n\nLet's decompose the denominator piece by piece:\n\n$$\\begin{aligned}\n\\text{denominator}_i &= \\left(\\beta_{k,i} + \\sum_{j} \\gamma_{k,ij}\\, w_j^2\\right)^{1/2} \\\\\n&= \\sqrt{\\underbrace{\\beta_{k,i}}_{\\text{prevents ÷0}} + \\underbrace{\\sum_{j} \\gamma_{k,ij}\\, w_j^2}_{\\text{weighted sum of squared responses across ALL channels}}}\n\\end{aligned}$$\n\nUsing the concrete numbers from our running example at one location — with $\\beta_1 = 1.0$ and learned weights $\\gamma_{11} = 0.4$, $\\gamma_{12} = 0.1$, $\\gamma_{13} = 0.3$, and filter responses $w_1 = 2.3$, $w_2 = -1.8$, $w_3 = 3.1$:\n\n$$\\begin{aligned}\n\\sum_j \\gamma_{1j} w_j^2 &= 0.4 \\cdot (2.3)^2 + 0.1 \\cdot (-1.8)^2 + 0.3 \\cdot (3.1)^2 + \\ldots \\\\\n&= 0.4 \\cdot 5.29 + 0.1 \\cdot 3.24 + 0.3 \\cdot 9.61 + \\ldots \\\\\n&\\approx 2.116 + 0.324 + 2.883 + \\ldots \\approx 6.8\n\\end{aligned}$$\n\n$$\\text{denominator}_1 = \\sqrt{1.0 + 6.8} = \\sqrt{7.8} \\approx 2.79$$\n\n$$u_1 = \\frac{w_1}{\\text{denominator}_1} = \\frac{2.3}{2.79} \\approx 0.82$$\n\n![Step-by-step GDN computation showing all 4 stages: channel inputs, cross-channel sum, sqrt bias, division](diagrams/gdn_mechanism_walkthrough.svg)\n\n*Figure: A complete walkthrough of one GDN computation at location (m,n). Note that channels 1, 2, and 3 (blue, green, red) all contribute to channel 1's denominator — this cross-channel coupling is what separates GDN from any pointwise nonlinearity.*\n\n### Stage 4 — Interpretation\n\nThree key properties to internalize:\n\n**Property 1: The denominator pools squared responses.** The $w_j^2$ terms mean that both large positive and large negative responses contribute to suppression. A strongly negative filter response (say $w_2 = -1.8$) still contributes positively to the denominator via $w_2^2 = 3.24$. Unlike ReLU, GDN doesn't kill negative activations — it retains their sign but reduces their magnitude when the neighborhood is energetic.\n\n**Property 2: It's spatially local but channel-global.** The sum runs over all $C = 128$ channels at the **same spatial location** $(m, n)$. There's no spatial pooling (no average-pooling over neighboring pixels). Each pixel location is normalized independently. This means GDN is **spatially adaptive**: a high-contrast patch gets suppressed more than a smooth patch.\n\n**Property 3: The $\\gamma$ matrix couples channels.** If $\\gamma_{ij} > 0$, channel $j$'s energy suppresses channel $i$'s output. The matrix $\\gamma$ is constrained to be **symmetric** ($\\gamma_{ij} = \\gamma_{ji}$), which means channel $j$ suppresses $i$ just as much as $i$ suppresses $j$. This symmetry is a design choice that halves the parameter count and makes the suppression bidirectional.[^2]\n\n**Check your understanding:** In our example, $w_2 = -1.8$ is negative. After GDN, what sign does $u_2$ have? Does GDN zero out negative values like ReLU would?\n\n<details>\n<summary>Answer<\/summary>\nGDN preserves the sign: $u_2 = w_2 / \\text{denominator}_2 = -1.8 / (\\sqrt{\\beta_2 + \\sum_j \\gamma_{2j} w_j^2}) < 0$. The denominator is always positive (it's a square root of a sum of non-negative terms plus $\\beta > 0$), so the sign of $u_i$ is always the same as the sign of $w_i$. GDN does *not* zero out negative values — this is one important difference from ReLU.\n<\/details>\n\n[^2]: Symmetry also has a neat consequence: $\\gamma$ can be stored as a triangle matrix. In practice this halves the memory for the $C \\times C$ interaction matrix from $128 \\times 128 = 16{,}384$ floats to $128 \\times 129 / 2 = 8{,}256$ floats per stage.\n\n### Stage 5 — Active Questions\n\n**Check your understanding:** If all 128 filter responses at location $(m, n)$ double in magnitude (say the image has twice the contrast), how does the GDN output change? Compute the ratio $u_i^{\\text{new}} / u_i^{\\text{old}}$ algebraically.\n\n$$u_i^{\\text{new}} = \\frac{2w_i}{\\left(\\beta_i + \\sum_j \\gamma_{ij}(2w_j)^2\\right)^{1/2}} = \\frac{2w_i}{\\left(\\beta_i + 4\\sum_j \\gamma_{ij} w_j^2\\right)^{1/2}}$$\n\nWhen $\\sum_j \\gamma_{ij} w_j^2 \\gg \\beta_i$ (strong signal, small bias), this simplifies:\n\n$$u_i^{\\text{new}} \\approx \\frac{2w_i}{\\left(4\\sum_j \\gamma_{ij} w_j^2\\right)^{1/2}} = \\frac{2w_i}{2\\left(\\sum_j \\gamma_{ij} w_j^2\\right)^{1/2}} = u_i^{\\text{old}}$$\n\nThis is **approximate gain invariance**: in high-contrast regions, doubling the image contrast barely changes the GDN output. This is exactly the behavior observed in biological visual neurons — responses saturate at high contrast. It's also exactly what Gaussianizes the distribution: large-magnitude inputs get compressed toward smaller outputs, reducing the heavy tail.\n\n**Fill in the step:** When the signal is weak ($\\sum_j \\gamma_{ij} w_j^2 \\ll \\beta_i$), GDN reduces to what familiar function? (Hint: expand for small signal.)\n\n---\n\n## From Equation to Code\n\nHere is the minimal PyTorch implementation of GDN that directly mirrors the equation:\n\n```python\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\n\nclass GDN(nn.Module):\n    \"\"\"\n    Generalized Divisive Normalization (Ballé et al., 2017).\n    \n    For each spatial location (m, n) and channel i:\n        u_i = w_i / sqrt(beta_i + sum_j(gamma_ij * w_j^2))\n    \n    Parameters beta and gamma are reparameterized to ensure non-negativity.\n    \"\"\"\n    def __init__(self, num_channels: int):\n        super().__init__()\n        C = num_channels\n        # Reparameterize: beta = (beta_prime)^2 - 2^{-10}\n        # gamma = (gamma_prime)^2 with symmetrization\n        # This ensures beta >= -2^{-10} (projected to >= 2^{-5}) and gamma >= 0\n        self.beta_prime = nn.Parameter(torch.ones(C))\n        self.gamma_prime = nn.Parameter(torch.eye(C) * 0.1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        # x shape: (B, C, H, W)\n        B, C, H, W = x.shape\n        \n        # Step 1: recover non-negative parameters\n        beta = self.beta_prime ** 2                          # (C,)\n        gamma_raw = self.gamma_prime ** 2                    # (C, C)\n        gamma = (gamma_raw + gamma_raw.T) / 2               # symmetrize: (C, C)\n        \n        # Step 2: compute sum_j(gamma_ij * w_j^2) for all i simultaneously\n        # x^2 has shape (B, C, H, W)\n        # gamma has shape (C, C) — treat as a 1x1 conv with C input/output channels\n        x_sq = x ** 2                                        # (B, C, H, W)\n        # einsum: for each (b,i,m,n): sum_j gamma[i,j] * x_sq[b,j,m,n]\n        norm = torch.einsum('ij,bjmn->bimn', gamma, x_sq)   # (B, C, H, W)\n        \n        # Step 3: add bias and take sqrt\n        norm = (norm + beta[None, :, None, None]).sqrt()     # (B, C, H, W)\n        \n        # Step 4: divide\n        return x / norm\n```\n\n**Which variable in the code corresponds to $\\sum_j \\gamma_{ij} w_j^2$ in the equation?** It's `norm` before the `.sqrt()` call. The `einsum` computes this for all channels simultaneously using the $\\gamma$ matrix as a learned mixing matrix. You can also implement this as a `F.conv2d` with $1 \\times 1$ kernels:\n\n```python\n# Equivalent implementation using conv2d (often faster on GPU)\nnorm = F.conv2d(x_sq, gamma.unsqueeze(-1).unsqueeze(-1))  # shape (B, C, H, W)\n```\n\n**Quick check:** How many parameters does a single GDN layer with $C = 128$ channels have? You have $\\beta' \\in \\mathbb{R}^C$ (128 params) and $\\gamma' \\in \\mathbb{R}^{C \\times C}$ (16,384 params), for a total of 16,512 per stage. With 3 stages in $g_a$ and 3 in $g_s$, that's $6 \\times 16{,}512 = 99{,}072$ parameters devoted to GDN/IGDN — about 12% of the total ~855K parameter budget for the grayscale model.\n\n---\n\n## Why Not Just Use ReLU?\n\nThis comparison appears explicitly in the Ballé et al. paper and is worth understanding deeply, because it directly answers the question \"couldn't you just train a deeper ReLU network?\"\n\nConsider the same input at location $(m, n)$: channels $w_1 = 2.3$, $w_2 = -1.8$, $w_3 = 3.1$.\n\n**ReLU:**\n\n$$u_i^{\\text{ReLU}} = \\max(0, w_i) \\implies u_1 = 2.3,\\quad u_2 = 0.0,\\quad u_3 = 3.1$$\n\nThree problems:\n\n1. **Channel 2 is killed.** A negative response $w_2 = -1.8$ carries information (this filter is anti-activated — the feature it detects is absent). ReLU discards this information entirely. GDN preserves it as $u_2 = -1.8 / \\text{denom}_2 \\approx -0.44$.\n\n2. **No gain control.** Channel 3's response $u_3 = 3.1$ is unaffected by channels 1 and 2. If you now double all inputs, $u_3^{\\text{ReLU}} = 6.2$ — the distribution of outputs has the same shape as the input distribution, just scaled. Heavy tails remain heavy.\n\n3. **Statistics don't Gaussianize.** Because ReLU is a pointwise threshold, the output distribution is a half-rectified version of the input distribution. Natural image filter responses are approximately Laplacian (super-Gaussian), and half-rectifying a Laplacian does not produce a Gaussian.\n\nThe paper's conclusion is direct: \"even though rectified linear units generally require a substantially larger number of model parameters/stages to achieve the same rate-distortion performance as the GDN/IGDN nonlinearities. This suggests that GDN/IGDN transforms are more efficient for compression.\"\n\n**Check your understanding:** Suppose you remove GDN from $g_a$ and replace it with ReLU. The latent channels $\\hat{y}_i$ now have heavier-tailed distributions. What happens to the rate $R$ in the $R + \\lambda D$ objective? What happens to the achievable compression ratio?\n\n<details>\n<summary>Answer<\/summary>\nThe entropy model $p_{\\tilde{y}_i}$ (learned from the training distribution) will need to assign probability mass to more extreme values. The average negative log probability $-\\mathbb{E}[\\log p_{\\tilde{y}_i}(\\hat{y}_i)]$ — which is the rate — increases. For the same distortion $D$, you need more bits. The R-D curve shifts to the right (worse performance at every quality level).\n<\/details>\n\n---\n\n## GDN vs Batch Normalization\n\nThe paper draws an explicit comparison to batch normalization that is worth quoting in full:\n\n> \"batch normalization, rescaling the responses of linear filters in the network so as to keep it in a reasonable operating range. This type of normalization is different from local gain control in that the rescaling factor is identical across all spatial locations. Moreover, once the training is completed, the scaling parameters are typically fixed, which turns the normalization into an affine transformation with respect to the data — unlike GDN, which is spatially adaptive and can be highly nonlinear.\"[^3]\n\nLet's formalize this comparison:\n\n**Batch Normalization:**\n$$\\text{BN}(w_i(m,n)) = \\frac{w_i(m,n) - \\mu_i}{\\sigma_i} \\cdot \\gamma_i^{\\text{BN}} + \\beta_i^{\\text{BN}}$$\n\nwhere $\\mu_i$ and $\\sigma_i$ are statistics computed over the **batch**, and $\\gamma_i^{\\text{BN}}$, $\\beta_i^{\\text{BN}}$ are learned **scalar** parameters applied uniformly at all $(m, n)$.\n\n**GDN:**\n$$\\text{GDN}(w_i(m,n)) = \\frac{w_i(m,n)}{\\sqrt{\\beta_i + \\sum_j \\gamma_{ij}\\, w_j^2(m,n)}}$$\n\nwhere the denominator **varies with $(m,n)$** through the $w_j^2(m,n)$ terms.\n\nThe crucial difference: after training, BN's denominator is a fixed scalar $\\hat{\\sigma}_i$. It no longer depends on the actual data — it's been baked into the weights. At inference, BN is just an affine transformation. GDN, in contrast, remains **nonlinear and spatially adaptive at inference**: a smooth sky region gets normalized differently from a sharp edge. This adaptive gain control is precisely what compresses the tails of the distribution.\n\n[^3]: This quote also explains why you can't just insert BN layers in place of GDN in a learned image compression model. BN would \"normalize\" the latents uniformly across space, but image structure is inherently spatially non-uniform — edges are rare, smooth regions are common. GDN's spatial adaptivity allows it to treat them differently.\n\n---\n\n## Where GDN Lives in the Architecture\n\nThe analysis transform $g_a$ consists of three stages, each performing: affine convolution → downsampling (via strided convolution) → GDN. The synthesis transform $g_s$ mirrors this in reverse: IGDN → transposed convolution with upsampling.\n\n![Full analysis and synthesis transforms showing GDN/IGDN placement, tensor shapes, and parameter counts](diagrams/analysis_synthesis_architecture.svg)\n\n*Figure: The full codec architecture. Blue boxes are convolutions (analysis) or transposed convolutions (synthesis); purple boxes are GDN; green boxes are IGDN. The quantizer (orange) sits at the bottleneck. Note that the synthesis transform processes in right-to-left order — IGDN always precedes the convolution, the reverse of the analysis transform.*\n\nThe tensor shapes at each stage (for a 256×256 grayscale input):\n\n| Stage | Operation | Input shape | Output shape | Notes |\n|-------|-----------|-------------|--------------|-------|\n| $g_a$ Stage 1 | Conv 9×9, stride 4 | (1, 1, 256, 256) | (1, 128, 64, 64) | 128 filters on DCT basis |\n| $g_a$ Stage 1 | GDN #1 | (1, 128, 64, 64) | (1, 128, 64, 64) | no shape change |\n| $g_a$ Stage 2 | Conv 5×5, stride 2 | (1, 128, 64, 64) | (1, 128, 32, 32) | |\n| $g_a$ Stage 2 | GDN #2 | (1, 128, 32, 32) | (1, 128, 32, 32) | |\n| $g_a$ Stage 3 | Conv 5×5, stride 2 | (1, 128, 32, 32) | (1, 128, 16, 16) | |\n| $g_a$ Stage 3 | GDN #3 | (1, 128, 16, 16) | (1, 128, 16, 16) | latent $\\mathbf{y}$ |\n| Quantize | $\\text{round}$ | (1, 128, 16, 16) | (1, 128, 16, 16) | $\\hat{\\mathbf{y}}$, discrete |\n| $g_s$ Stage 1 | IGDN #1 | (1, 128, 16, 16) | (1, 128, 16, 16) | first, before deconv |\n| $g_s$ Stage 1 | Deconv 5×5, up 2 | (1, 128, 16, 16) | (1, 128, 32, 32) | |\n| $g_s$ Stage 2 | IGDN #2 | (1, 128, 32, 32) | (1, 128, 32, 32) | |\n| $g_s$ Stage 2 | Deconv 5×5, up 2 | (1, 128, 32, 32) | (1, 128, 64, 64) | |\n| $g_s$ Stage 3 | IGDN #3 | (1, 128, 64, 64) | (1, 128, 64, 64) | |\n| $g_s$ Stage 3 | Deconv 9×9, up 4 | (1, 128, 64, 64) | (1, 1, 256, 256) | reconstruction $\\hat{\\mathbf{x}}$ |\n\nThe total reduction: the latent $\\hat{\\mathbf{y}}$ has $128 \\times 16 \\times 16 = 32{,}768$ elements versus $256 \\times 256 = 65{,}536$ input pixels — about half. But the latent values are discrete (quantized integers), while the input is 8-bit integers. The compression comes from the fact that entropy-coding the quantized latent requires far fewer bits than entropy-coding the original image — because GDN has made the distribution much tighter.\n\n---\n\n## IGDN: The Approximate Inverse\n\nThe synthesis transform $g_s$ needs to invert what $g_a$ did. Given the quantized latent $\\hat{\\mathbf{y}}$, it must reconstruct $\\hat{\\mathbf{x}} \\approx \\mathbf{x}$.\n\nIf we had trained $g_a$ and $g_s$ as exact inverses, we'd need to invert GDN. What is the exact inverse of GDN? Setting $u_i = w_i / \\text{denom}$ and solving for $w_i$ given $u_i$:\n\n$$w_i = u_i \\cdot \\sqrt{\\beta_i + \\sum_j \\gamma_{ij} w_j^2}$$\n\nThis is an **implicit equation** — $w_i$ appears on both sides under the square root. The exact solution requires a fixed-point iteration or root-finding. That's expensive.\n\nThe IGDN approximation uses a single iteration with **separate, independently learned parameters** $\\hat{\\beta}$ and $\\hat{\\gamma}$:\n\n$$\\hat{w}_i^{(k-1)}(m,n) = \\hat{u}_i^{(k)}(m,n) \\cdot \\left(\\hat{\\beta}_{k,i} + \\sum_j \\hat{\\gamma}_{k,ij} \\left(\\hat{u}_j^{(k)}(m,n)\\right)^2\\right)^{1/2}$$\n\nComparing with GDN:\n\n$$\\underbrace{u_i = \\frac{w_i}{\\sqrt{\\beta_i + \\sum_j \\gamma_{ij} w_j^2}}}_{\\text{GDN: divide by normalized factor}} \\qquad \\underbrace{\\hat{w}_i = \\hat{u}_i \\cdot \\sqrt{\\hat{\\beta}_i + \\sum_j \\hat{\\gamma}_{ij} \\hat{u}_j^2}}_{\\text{IGDN: multiply by normalized factor}}$$\n\nIGDN is structurally identical to GDN but with multiplication replacing division. The key point from the paper: \"The approximate inverse consists of one iteration, but with **a separate set of parameters from the forward transform**, which are constrained in the same way, but **trained separately**.\"[^4]\n\nWhy separate parameters? Because $g_s$ is not merely trying to invert $g_a$ — it's trying to recover the original image from a **quantized** version of the latent. Quantization introduces error, and IGDN's separately trained parameters can absorb and compensate for systematic quantization artifacts that a strict inverse would propagate faithfully. The synthesis transform has extra freedom to \"undo\" both the nonlinear transform and the quantization error.\n\n```python\nclass IGDN(nn.Module):\n    \"\"\"\n    Inverse Generalized Divisive Normalization.\n    \n    Same structure as GDN but MULTIPLIES instead of DIVIDES.\n    Parameters are learned independently from GDN — not derived from them.\n    \n    w_i = u_i * sqrt(beta_i + sum_j(gamma_ij * u_j^2))\n    \"\"\"\n    def __init__(self, num_channels: int):\n        super().__init__()\n        C = num_channels\n        self.beta_prime = nn.Parameter(torch.ones(C))\n        self.gamma_prime = nn.Parameter(torch.eye(C) * 0.1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta = self.beta_prime ** 2\n        gamma_raw = self.gamma_prime ** 2\n        gamma = (gamma_raw + gamma_raw.T) / 2\n\n        x_sq = x ** 2\n        norm = torch.einsum('ij,bjmn->bimn', gamma, x_sq)\n        norm = (norm + beta[None, :, None, None]).sqrt()\n        \n        return x * norm   # <-- multiply, not divide\n```\n\n**Check your understanding:** Consider the composed function IGDN(GDN(x)). If IGDN were an exact inverse, what would you expect the round-trip MSE $\\|\\text{IGDN}(\\text{GDN}(\\mathbf{x})) - \\mathbf{x}\\|^2$ to be? What do you expect it to be in practice with randomly initialized parameters?\n\n<details>\n<summary>Answer<\/summary>\nAn exact inverse would give MSE = 0. With random parameters, the round-trip is essentially garbage — MSE will be on the order of the variance of the input (often ~1–10 for normalized inputs). In Exercise 3, you'll optimize IGDN's parameters to minimize this round-trip MSE given fixed GDN parameters, and watch it fall from ~0.1–1.0 to below 0.01 over ~500 gradient steps.\n<\/details>\n\n[^4]: The \"one iteration\" phrasing is a reference to LISTA (Learned ISTA), an approach that approximates iterative algorithms with a single unrolled step with learned parameters. For GDN inversion, one iteration with learned parameters turns out to work well in practice — the residual approximation error after training is negligible compared to quantization error.\n\n---\n\n## Parameter Constraints: Keeping GDN Stable\n\nThe GDN equation requires that the denominator never be zero or negative. Two constraints ensure this:\n\n**Constraint 1: $\\beta_i \\geq 2^{-5}$** (positivity of bias)\n\nThe bias $\\beta_i$ prevents division by zero when all filter responses are exactly zero. In practice, the paper reparameterizes:\n\n$$\\beta_i = (\\beta'_i)^2 - 2^{-10}$$\n\nand projects $\\beta_i$ onto $[2^{-5}, \\infty)$ after each gradient step. In PyTorch, the simplest approach is:\n\n```python\nbeta = self.beta_prime ** 2  # beta >= 0 automatically\n# then clamp: beta = beta.clamp(min=2**-5)\n```\n\n**Constraint 2: $\\gamma_{ij} \\geq 0$** (non-negativity of interaction weights)\n\nThe squared responses $w_j^2$ are non-negative, so for the denominator to grow (rather than shrink) with signal energy, we need $\\gamma_{ij} \\geq 0$. The reparameterization $\\gamma_{ij} = (\\gamma'_{ij})^2$ ensures this automatically.\n\n**Constraint 3: Symmetry $\\gamma_{ij} = \\gamma_{ji}$**\n\nAfter squaring the parameter matrix $\\gamma'$, symmetry is enforced by:\n\n```python\ngamma = (gamma_raw + gamma_raw.T) / 2\n```\n\nThis is applied at every forward pass, not just at initialization. The paper enforces it \"after each gradient step\" — equivalent in practice.\n\n**Constraint 4: Filter renormalization**\n\nThe convolutional filters and GDN parameters are coupled: if you scale the filters by $\\alpha$ and $\\gamma$ by $\\alpha^2$ (and $\\beta$ by $\\alpha^2$), the GDN outputs are unchanged. This ambiguity can cause training instability. The paper removes it by renormalizing the filters after each step to have unit $L^2$ norm. This is not always implemented in practice but matters for faithful reproduction of training dynamics.\n\n---\n\n## Analytical Questions\n\n### Question 1 — The Gain-Invariant Regime\n\nConsider a 1D version of GDN with a single channel and bias $\\beta$:\n\n$$u = \\frac{w}{\\sqrt{\\beta + \\gamma w^2}}$$\n\n(a) Show that as $w \\to \\infty$, $u \\to 1/\\sqrt{\\gamma}$ (a constant). What does this imply about very large filter responses?\n\n(b) Show that as $w \\to 0$, $u \\approx w / \\sqrt{\\beta}$ (linear behavior). What does this imply about very small filter responses?\n\n(c) The transition between the linear regime and the saturating regime occurs at roughly what value of $w$? Express your answer in terms of $\\beta$ and $\\gamma$.\n\n(d) In the compression context: why is it desirable for GDN to be approximately linear for small signals? (Hint: think about what happens if small differences in input are erased by the nonlinearity.)\n\n### Question 2 — Why Does Joint Normalization Gaussianize?\n\nSuppose filter responses $(w_1, w_2)$ have a joint distribution that is a radially symmetric super-Gaussian — the marginals have excess kurtosis $k > 0$ and the joint density has the form:\n\n$$p(w_1, w_2) \\propto \\exp\\left(-\\frac{(w_1^2 + w_2^2)^{p/2}}{2\\sigma^p}\\right) \\quad \\text{for } p < 2$$\n\n(a) Show that the marginal $p(w_1) = \\int p(w_1, w_2)\\, dw_2$ has heavier tails than a Gaussian.\n\n(b) Now apply the simplified 2D GDN with $\\beta \\to 0$ and $\\gamma_{12} = \\gamma_{21} = 1$, $\\gamma_{11} = \\gamma_{22} = 1$:\n$$u_1 = \\frac{w_1}{\\sqrt{w_1^2 + w_2^2}}, \\qquad u_2 = \\frac{w_2}{\\sqrt{w_1^2 + w_2^2}}$$\n\nShow that $(u_1, u_2)$ lies on the unit circle for all $(w_1, w_2) \\neq (0, 0)$.\n\n(c) What distribution does $u_1 = \\cos\\theta$ follow if $\\theta$ is uniformly distributed on $[0, 2\\pi)$? Is this Gaussian? Why is this a useful property for entropy coding?\n\n### Question 3 — Comparing Computational Cost\n\nFor a batch of $B = 8$ images, each $256 \\times 256$ grayscale, at the second GDN stage (after first downsampling to $32 \\times 32$ with 128 channels):\n\n(a) Count the number of multiply-add (MAC) operations for the `einsum` in the GDN forward pass.\n\n(b) For comparison: how many MACs does the $5 \\times 5 \\times 128 \\to 128$ convolution at the same stage require?\n\n(c) What fraction of the stage's total compute is GDN? Does this change how you think about the \"efficiency\" claim?\n\n### Question 4 — IGDN and Quantization Error\n\nThe paper trains GDN and IGDN jointly end-to-end with the quantization noise substitution from Module 2 (uniform noise during training, rounding during inference).\n\n(a) During training, the synthesis transform sees $\\tilde{\\mathbf{y}} = \\mathbf{y} + \\boldsymbol{\\Delta}$ where $\\boldsymbol{\\Delta} \\sim \\mathcal{U}(-\\frac{1}{2}, \\frac{1}{2})^{128 \\times 16 \\times 16}$. How does this affect what IGDN learns compared to training with exact latents (no noise)?\n\n(b) Why is it critical that IGDN's parameters are *separate* from GDN's (rather than derived from them) when quantization is present? Give a specific example of a systematic quantization error that separate parameters could learn to compensate for.\n\n(c) Sketch the loss landscape for IGDN's $\\hat{\\gamma}$ parameter when optimizing the reconstruction MSE. Would you expect this landscape to be convex? Smooth? Why?\n\n---\n\n## Synthesis: Connecting GDN to the Comma.ai Challenge\n\nYou're building a codec for dashcam video where the score isn't pixel MSE — it's what two neural networks (SegNet for segmentation, PoseNet for pose) think about the reconstructed frames. GDN teaches you three transferable principles:\n\n**Principle 1: The transform shapes what the quantizer sees.** GDN doesn't improve reconstruction quality directly. It reshapes the latent distribution so the entropy coder assigns short codes to common patterns and long codes to rare ones. For your comma.ai codec, the equivalent question is: *what transform makes the latents look simple to your entropy model?* If SegNet is mostly sensitive to low-frequency semantic structure and PoseNet to motion vectors, you might want your transform to concentrate that information in a few latent channels that you protect with fine quantization, while coarsely quantizing the rest.\n\n**Principle 2: Cross-channel coupling is not free — but it's worth paying for.** GDN's $\\gamma$ matrix couples all 128 channels at each location. This costs ~16K parameters per stage but is responsible for the Gaussianization that makes the entropy model work. In learned video compression, the analogous operation is the inter-frame motion model: coupling the current frame's latent to the previous frame's latent. The \"gain control\" idea generalizes: you want to normalize features by their predicted magnitude.\n\n**Principle 3: The decoder should not be a mirror image of the encoder.** IGDN has separate parameters from GDN because the decoder faces a different task — it must undo not just the nonlinear transform but also the quantization error. For dashcam video, this means your synthesis transform should be given the freedom to \"hallucinate\" plausible textures when bits are scarce, rather than faithfully reconstructing a blurry, quantized version of the encoder's output. This is the same insight behind recent video codecs that use separate encoder and decoder networks rather than tied weights.\n\n**What's coming in Module 4:** With GDN/IGDN in hand, you now have all the building blocks of the full codec: the $R + \\lambda D$ objective (Module 1), the quantization trick (Module 2), and the GDN nonlinearity (this module). In Module 4, you'll assemble these into a complete autoencoder trained end-to-end on MNIST, sweep $\\lambda$ to trace the rate-distortion curve, and visualize the latent space with t-SNE. You'll see exactly how the GDN-shaped latent distribution enables competitive compression even on a tiny dataset.\n\nThe compression pipeline diagram we saw in this module:\n\n$$\\mathbf{x} \\xrightarrow{g_a\\text{ (conv+GDN)}} \\mathbf{y} \\xrightarrow{\\text{quantize}} \\hat{\\mathbf{y}} \\xrightarrow{\\text{entropy code}} \\text{bitstream} \\xrightarrow{\\text{entropy decode}} \\hat{\\mathbf{y}} \\xrightarrow{g_s\\text{ (IGDN+deconv)}} \\hat{\\mathbf{x}}$$\n\n![Simple compression architecture: x → g_a → y → Q → entropy model → g_s → x̂](images/compression_architecture.png)\n\n*Figure: The standard learned image compression pipeline from Ballé et al. Each of the blocks $g_a$ and $g_s$ contains three interleaved convolution + GDN/IGDN stages. The entropy model uses the non-parametric marginals discussed in Module 2.*\n\nIn Exercise 1, you'll implement GDN from scratch and verify it with `torch.autograd.gradcheck`. In Exercise 2, you'll measure how GDN changes the kurtosis of CIFAR-10 filter responses compared to ReLU — and see the difference quantitatively. In Exercise 3, you'll implement IGDN and optimize it to approximate GDN's inverse, watching the round-trip error fall from ~0.1 to below 0.01.\n\n---\n\n*This module covers Section 3 (\"Transform Coding Framework\") and Appendix A of Ballé et al., ICLR 2017, specifically equations 3 (GDN) and 4 (IGDN) and their surrounding discussion.*\n", "exercises": [{"filename": "ex01_implementing_gdn_from_the_equation.py", "content": "\"\"\"\nExercise 1: Implementing GDN from the Equation\n===============================================\nModule 3 — GDN: The Key Nonlinearity\n\nIn this exercise you will implement the Generalized Divisive Normalization (GDN)\nnonlinearity exactly as stated in Ballé et al. (ICLR 2017), equation 3:\n\n    u_i(m,n) = w_i(m,n) / sqrt(β_i + Σ_j γ_ij · w_j(m,n)²)\n\nThe key engineering challenge is the parameter reparameterization:\n  - β = (β')²          ensures β ≥ 0 everywhere\n  - γ = (γ')²          ensures γ_ij ≥ 0 elementwise\n  - γ = (γ + γᵀ) / 2   enforces the symmetry constraint γ_ij = γ_ji\n\nYou will implement forward(), verify the output shape, run torch.autograd.gradcheck,\nand count the parameters. Read the README's \"From Equation to Code\" section first.\n\nLearning objectives for this exercise:\n  - Translate the paper's equation directly to PyTorch operations\n  - Understand the einsum that pools squared responses across channels\n  - Confirm GDN is differentiable end-to-end (needed for joint training)\n  - Count the parameter budget: C + C² per GDN layer\n\"\"\"\n\nimport os\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.autograd import gradcheck\n\n\n# ─── GDN Module ──────────────────────────────────────────────────────────────\n\nclass GDN(nn.Module):\n    \"\"\"\n    Generalized Divisive Normalization (Ballé et al., ICLR 2017).\n\n    For each spatial location (m, n) and channel i:\n        u_i(m,n) = w_i(m,n) / sqrt(β_i + Σ_j γ_ij · w_j(m,n)²)\n\n    Parameters β and γ are reparameterized via squaring to enforce non-negativity.\n    γ is additionally symmetrized so that γ_ij = γ_ji.\n\n    Parameters\n    ----------\n    num_channels : int\n        Number of feature-map channels C (128 in the paper's analysis transform).\n\n    Attributes\n    ----------\n    beta_prime : nn.Parameter, shape (C,)\n        Raw (unconstrained) bias parameters. β = (β')².\n    gamma_prime : nn.Parameter, shape (C, C)\n        Raw (unconstrained) interaction matrix. γ = symmetrize((γ')²).\n    \"\"\"\n\n    def __init__(self, num_channels: int):\n        super().__init__()\n        C = num_channels\n        # Initialize beta_prime to 1.0 → beta ≈ 1.0 at init (stable denominator)\n        self.beta_prime = nn.Parameter(torch.ones(C))\n        # Initialize gamma_prime to 0.1 * I → small interaction at init\n        self.gamma_prime = nn.Parameter(torch.eye(C) * 0.1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        \"\"\"\n        Apply GDN to a batch of feature maps.\n\n        Parameters\n        ----------\n        x : torch.Tensor, shape (B, C, H, W)\n            Input feature maps from the preceding convolutional layer.\n\n        Returns\n        -------\n        torch.Tensor, shape (B, C, H, W)\n            GDN-normalized feature maps. Same shape as input.\n        \"\"\"\n        B, C, H, W = x.shape\n        assert C == self.beta_prime.shape[0], (\n            f\"Channel mismatch: x has {C} channels but GDN was built for \"\n            f\"{self.beta_prime.shape[0]} channels.\"\n        )\n\n        ###########################################################\n        # YOUR CODE HERE — STEP 1: recover constrained parameters  #\n        # (~4 lines)                                               #\n        #                                                          #\n        # Compute:                                                 #\n        #   beta  : shape (C,)     — square beta_prime            #\n        #   gamma : shape (C, C)   — square gamma_prime, then     #\n        #           symmetrize: (gamma_raw + gamma_raw.T) / 2     #\n        #                                                          #\n        # Why squaring? It maps any real number to a non-negative  #\n        # value, so the denominator never has negative terms.      #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n        ###########################################################\n        # YOUR CODE HERE — STEP 2: channel-pooled squared norm    #\n        # (~5 lines)                                               #\n        #                                                          #\n        # Compute x_sq = x ** 2, shape (B, C, H, W)              #\n        #                                                          #\n        # Then compute for every (b, i, m, n):                    #\n        #   norm[b,i,m,n] = Σ_j  gamma[i,j] * x_sq[b,j,m,n]    #\n        #                                                          #\n        # Use torch.einsum with signature 'ij,bjmn->bimn'.        #\n        # This is the cross-channel pooling that makes GDN        #\n        # fundamentally different from pointwise nonlinearities.  #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n        ###########################################################\n        # YOUR CODE HERE — STEP 3: add bias, sqrt, divide         #\n        # (~4 lines)                                               #\n        #                                                          #\n        # 1. Add beta: norm = norm + beta reshaped to (1, C, 1, 1)#\n        # 2. Take square root: norm = norm.sqrt()                  #\n        # 3. Return x / norm                                       #\n        #                                                          #\n        # Note: beta ensures the denominator is always > 0, even  #\n        # when all filter responses happen to be zero.             #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\ndef count_gdn_parameters(gdn: GDN) -> dict:\n    \"\"\"\n    Count and categorize the learnable parameters in a GDN module.\n\n    Parameters\n    ----------\n    gdn : GDN\n        An instantiated GDN module.\n\n    Returns\n    -------\n    dict with keys:\n        'beta'  : int — number of β' parameters\n        'gamma' : int — number of γ' parameters\n        'total' : int — sum of the above\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — parameter count                        #\n    # (~5 lines)                                              #\n    #                                                         #\n    # Use .numel() to get the number of elements in a tensor.#\n    # Return a dict with keys 'beta', 'gamma', 'total'.      #\n    #                                                         #\n    # For C channels:                                         #\n    #   beta_prime has C elements                             #\n    #   gamma_prime has C*C elements                          #\n    # A 3-stage analysis transform with C=128 has:           #\n    #   3 * (128 + 128*128) = 3 * 16_512 = 49_536 GDN params #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─── Main Test Harness ───────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    import os\n\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n    C = 8 if VERIFY else 32    # small C for fast gradcheck\n    B, H, W = 2, 4, 4\n\n    print(\"=\" * 60)\n    print(\"Exercise 1: Implementing GDN from the Equation\")\n    print(\"=\" * 60)\n\n    # ── 1. Shape check ────────────────────────────────────────────\n    gdn = GDN(num_channels=C)\n    x_test = torch.randn(B, C, H, W)\n    y_test = gdn(x_test)\n\n    expected_shape = (B, C, H, W)\n    assert y_test.shape == expected_shape, (\n        f\"Shape mismatch: expected {expected_shape}, got {y_test.shape}\"\n    )\n    print(f\"GDN forward shape: OK {tuple(y_test.shape)}\")\n\n    # ── 2. Gradient check (confirms differentiability) ────────────\n    # gradcheck requires float64 and small inputs to avoid numerical issues.\n    # We use a fresh GDN with double precision parameters.\n    gdn_64 = GDN(num_channels=C).double()\n    x_gc = torch.randn(2, C, 2, 2, dtype=torch.float64, requires_grad=True)\n\n    # gradcheck tolerances: rtol=1e-4 is typical for well-conditioned functions\n    passed = gradcheck(gdn_64, (x_gc,), eps=1e-6, rtol=1e-4, atol=1e-5, raise_exception=False)\n    status = \"PASSED\" if passed else \"FAILED\"\n    print(f\"Gradient check: {status}\")\n    if not passed:\n        print(\"  → Check your einsum and sqrt for numerical stability.\")\n\n    # ── 3. Parameter count ────────────────────────────────────────\n    counts = count_gdn_parameters(gdn)\n    expected_beta  = C\n    expected_gamma = C * C\n    expected_total = C + C * C\n\n    assert counts['beta']  == expected_beta,  f\"β count: expected {expected_beta}, got {counts['beta']}\"\n    assert counts['gamma'] == expected_gamma, f\"γ count: expected {expected_gamma}, got {counts['gamma']}\"\n    assert counts['total'] == expected_total, f\"total count: expected {expected_total}, got {counts['total']}\"\n    print(f\"Parameter count: β'={counts['beta']}, γ'={counts['gamma']}, total={counts['total']}\")\n\n    if not VERIFY:\n        # Full-scale parameter count for the paper's C=128 architecture\n        gdn_128 = GDN(num_channels=128)\n        counts_128 = count_gdn_parameters(gdn_128)\n        print(f\"\\nPaper scale (C=128):\")\n        print(f\"  β' params per stage : {counts_128['beta']:>7,}\")\n        print(f\"  γ' params per stage : {counts_128['gamma']:>7,}\")\n        print(f\"  Total per stage     : {counts_128['total']:>7,}\")\n        print(f\"  3 g_a stages total  : {3 * counts_128['total']:>7,}\")\n        print(f\"  6 g_a+g_s stages    : {6 * counts_128['total']:>7,}\")\n        print(f\"  (~12%% of 855K total model params)\")\n\n    # ── 4. Sanity: GDN compresses dynamic range ───────────────────\n    # High-contrast input (large magnitude) should produce smaller outputs\n    # than equivalent low-contrast input (via approximate gain invariance).\n    with torch.no_grad():\n        x_low  = torch.randn(1, C, 4, 4) * 0.5\n        x_high = x_low * 4.0             # 8× more energy\n        y_low  = gdn(x_low)\n        y_high = gdn(x_high)\n        ratio_in  = (x_high.std() / x_low.std()).item()\n        ratio_out = (y_high.std() / y_low.std()).item()\n        print(f\"\\nGain control check:\")\n        print(f\"  Input std ratio  (high/low): {ratio_in:.2f}×\")\n        print(f\"  Output std ratio (high/low): {ratio_out:.2f}× (< input ratio → gain compression)\")\n\n    print(\"\\n✓ All checks complete.\")\n"}, {"filename": "ex02_gdn_vs_relu_gaussianizing_image_statistics.py", "content": "\"\"\"\nExercise 2: GDN vs ReLU — Gaussianizing Image Statistics\n=========================================================\nModule 3 — GDN: The Key Nonlinearity\n\nThe paper claims GDN is \"highly efficient in Gaussianizing the local joint\nstatistics of natural images, much more so than cascades of linear transforms\nfollowed by pointwise nonlinearities.\" This exercise lets you see that claim\nempirically.\n\nYou will:\n  1. Build a Conv → ReLU pipeline and a Conv → GDN pipeline (same random weights)\n  2. Push CIFAR-10 grayscale patches through both pipelines\n  3. Compare the output distributions via QQ-plots and kurtosis measurements\n  4. Print a table showing which nonlinearity produces more Gaussian latents\n\nWhy this matters for compression:\n  The entropy model in Module 2 assumes each latent channel is independent and\n  fits a distribution to each separately. If latents are Gaussian, the entropy\n  model wastes zero bits on modeling distribution shape — all the model capacity\n  goes to modeling the mean and scale. Heavy-tailed (super-Gaussian) latents\n  force the entropy model to assign long codes to tail events, wasting bits.\n\nRunning example connection:\n  In Exercise 1 you built a GDN module and verified its gradients. Here you use\n  that same module to see WHY the paper chose GDN over ReLU — the kurtosis\n  numbers tell the story directly.\n\"\"\"\n\nimport os\nimport torch\nimport torch.nn as nn\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")  # non-interactive backend\nimport matplotlib.pyplot as plt\n\n# We use scipy for kurtosis and QQ-plots\nfrom scipy import stats\n\n\n# ─── GDN from Exercise 1 (copy-paste so this file is self-contained) ────────\n\nclass GDN(nn.Module):\n    \"\"\"Generalized Divisive Normalization (Ballé et al., ICLR 2017).\"\"\"\n\n    def __init__(self, num_channels: int):\n        super().__init__()\n        C = num_channels\n        self.beta_prime  = nn.Parameter(torch.ones(C))\n        self.gamma_prime = nn.Parameter(torch.eye(C) * 0.1)\n\n    def forward(self, x: torch.Tensor) -> torch.Tensor:\n        B, C, H, W = x.shape\n        beta      = self.beta_prime ** 2\n        gamma_raw = self.gamma_prime ** 2\n        gamma     = (gamma_raw + gamma_raw.T) / 2\n        x_sq      = x ** 2\n        norm      = torch.einsum('ij,bjmn->bimn', gamma, x_sq)\n        norm      = (norm + beta[None, :, None, None]).sqrt()\n        return x / norm\n\n\n# ─── Pipeline builders ───────────────────────────────────────────────────────\n\ndef build_relu_pipeline(in_channels: int, out_channels: int) -> nn.Sequential:\n    \"\"\"\n    Build a single-stage Conv → ReLU feature extractor with random weights.\n\n    Parameters\n    ----------\n    in_channels : int\n        Number of input channels (1 for grayscale patches).\n    out_channels : int\n        Number of output feature channels C.\n\n    Returns\n    -------\n    nn.Sequential\n        A two-layer pipeline: Conv2d(in_channels, out_channels, kernel_size=5,\n        padding=2) followed by nn.ReLU().
