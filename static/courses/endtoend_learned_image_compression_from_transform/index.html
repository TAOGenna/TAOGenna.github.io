────────────────────────────\n# PROVIDED: Reuse data generator and autoencoder from Exercise 2\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef make_dataset(n_samples: int = 2000, dim: int = 8, seed: int = 0) -> torch.Tensor:\n    \"\"\"Correlated Gaussian data — same as Exercise 2.\"\"\"\n    rng = np.random.default_rng(seed)\n    cov = np.eye(dim)\n    for i in range(0, dim - 1, 2):\n        cov[i, i + 1] = 0.9\n        cov[i + 1, i] = 0.9\n    L = np.linalg.cholesky(cov)\n    z = rng.standard_normal((n_samples, dim))\n    x = z @ L.T\n    return torch.from_numpy(x.astype(np.float32))\n\n\nclass TinyAutoencoder(nn.Module):\n    \"\"\"Linear autoencoder with Tanh bottleneck — same as Exercise 2.\"\"\"\n\n    def __init__(self, dim: int = 8, hidden: int = 16, latent_dim: int = 4):\n        super().__init__()\n        self.encoder = nn.Sequential(\n            nn.Linear(dim, hidden), nn.Tanh(), nn.Linear(hidden, latent_dim)\n        )\n        self.decoder = nn.Sequential(\n            nn.Linear(latent_dim, hidden), nn.Tanh(), nn.Linear(hidden, dim)\n        )\n\n    def forward(self, x):\n        y = self.encoder(x)\n        y_noisy = y + torch.rand_like(y) - 0.5\n        return self.decoder(y_noisy), y_noisy\n\n\ndef estimate_rate(y_noisy: torch.Tensor, num_bins: int = 50) -> float:\n    \"\"\"Average per-channel histogram entropy of the (noisy) latent.\"\"\"\n    latent_dim = y_noisy.shape[1]\n    total = 0.0\n    for c in range(latent_dim):\n        vals = y_noisy[:, c].detach().cpu().numpy()\n        counts, _ = np.histogram(vals, bins=num_bins)\n        pos = counts[counts > 0]\n        if pos.sum() == 0:\n            continue\n        pmf = pos / pos.sum()\n        total += -np.sum(pmf * np.log2(pmf))\n    return total / latent_dim\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: Training helper (wraps Exercise 2 logic)\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef _train_model(\n    lam: float,\n    data: torch.Tensor,\n    n_epochs: int,\n    batch_size: int,\n    lr: float = 1e-3,\n    dim: int = 8,\n    latent_dim: int = 4,\n) -> TinyAutoencoder:\n    \"\"\"Train one TinyAutoencoder for the given λ. Returns the trained model.\"\"\"\n    model = TinyAutoencoder(dim=dim, latent_dim=latent_dim)\n    opt   = optim.Adam(model.parameters(), lr=lr)\n    n = data.shape[0]\n\n    for _ in range(n_epochs):\n        perm = torch.randperm(n)\n        for start in range(0, n, batch_size):\n            x = data[perm[start : start + batch_size]]\n            if x.shape[0] < 2:\n                continue\n            opt.zero_grad()\n            x_hat, y_noisy = model(x)\n            D = torch.mean((x - x_hat) ** 2)\n            R = estimate_rate(y_noisy)\n            loss = R + lam * D\n            loss.backward()\n            opt.step()\n\n    return model\n\n\ndef _evaluate(\n    model: TinyAutoencoder,\n    data: torch.Tensor,\n    batch_size: int = 256,\n) -> tuple[float, float]:\n    \"\"\"Return (mean_rate, mean_distortion) on data.\"\"\"\n    model.eval()\n    total_R, total_D, n_batches = 0.0, 0.0, 0\n    with torch.no_grad():\n        for start in range(0, data.shape[0], batch_size):\n            x = data[start : start + batch_size]\n            # At inference, use actual rounding (not noise).\n            y  = model.encoder(x)\n            y_q = torch.round(y).float()\n            x_hat = model.decoder(y_q)\n            D = torch.mean((x - x_hat) ** 2).item()\n            # Rate from rounded latent distribution.\n            R = estimate_rate(y_q)\n            total_R += R\n            total_D += D\n            n_batches += 1\n    return total_R / n_batches, total_D / n_batches\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (1 of 4): Train and evaluate across λ sweep\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef sweep_lambda(\n    lambdas: list[float],\n    data: torch.Tensor,\n    n_epochs: int,\n    batch_size: int,\n) -> list[tuple[float, float, float]]:\n    \"\"\"\n    Train one model per λ value, evaluate on the same data, and collect\n    the resulting (λ, R, D) triples.\n\n    Parameters\n    ----------\n    lambdas    : list of float — λ values to sweep (e.g. 8 log-spaced values)\n    data       : torch.Tensor (n_samples, dim)\n    n_epochs   : int — number of training epochs per model\n    batch_size : int\n\n    Returns\n    -------\n    list of (lam, R, D) tuples — one entry per λ value, sorted by R ascending.\n\n    Note: Call _train_model(lam, data, n_epochs, batch_size) then\n    _evaluate(model, data) for each λ.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # For each lam in lambdas:                                #\n    #   1. model = _train_model(lam, data, n_epochs, batch_size)\n    #   2. R, D  = _evaluate(model, data)                     #\n    #   3. Append (lam, R, D) to a results list.              #\n    # Return sorted(results, key=lambda t: t[1]) to order by R#\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (2 of 4): Plot the R-D scatter with λ annotations\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef plot_rd_curve(\n    results: list[tuple[float, float, float]],\n    ax: plt.Axes,\n) -> None:\n    \"\"\"\n    Scatter-plot the (R, D) operating points from each λ model, annotating\n    each point with its λ value.\n\n    Convention (from the paper): R on the x-axis, D on the y-axis.\n    High-λ models (low D, high R) appear in the upper-right.\n    Low-λ models (high D, low R) appear in the lower-left.\n\n    Parameters\n    ----------\n    results : list of (lam, R, D) — from sweep_lambda()\n    ax      : matplotlib Axes to draw on\n\n    Visual requirements:\n      • Scatter points coloured by λ value (use a colormap such as 'plasma').\n      • Each point annotated with 'λ=X.XXXX' at a small offset.\n      • x-label: 'Rate R (bits per channel)'\n      • y-label: 'Distortion D (MSE)'\n      • Title: 'Rate-Distortion Curve (8 models)'\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 10-15 lines                            #\n    #                                                         #\n    # Hint:                                                   #\n    #   lams = [t[0] for t in results]                        #\n    #   Rs   = [t[1] for t in results]                        #\n    #   Ds   = [t[2] for t in results]                        #\n    #   sc = ax.scatter(Rs, Ds, c=np.log10(lams), cmap='plasma', s=80, zorder=5)\n    #   plt.colorbar(sc, ax=ax, label='log₁₀(λ)')            #\n    #   for lam, R, D in results:                             #\n    #       ax.annotate(f'λ={lam:.4f}', (R, D), ...)         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (3 of 4): Draw the convex hull\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef draw_convex_hull(\n    results: list[tuple[float, float, float]],\n    ax: plt.Axes,\n) -> None:\n    \"\"\"\n    Overlay the convex hull of the (R, D) point cloud as a dashed line.\n\n    The convex hull traces the Pareto frontier of achievable compression\n    performance. Points *on* the hull are Pareto-optimal; points strictly\n    *inside* are dominated by some hull combination.\n\n    Parameters\n    ----------\n    results : list of (lam, R, D)\n    ax      : matplotlib Axes\n\n    Implementation note: scipy.spatial.ConvexHull works in 2-D. After\n    computing the hull, extract the hull vertices in order and close the\n    loop. Plot only the lower-left boundary (the Pareto frontier).\n\n    Hint: from scipy.spatial import ConvexHull\n          points = np.array([(R, D) for _, R, D in results])\n          hull = ConvexHull(points)\n          # hull.vertices gives indices into points; hull.simplices gives edges\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-10 lines                             #\n    #                                                         #\n    # 1. Build points array: shape (N, 2) where col0=R, col1=D.\n    # 2. ConvexHull(points) — may raise if < 3 distinct points.#\n    # 3. Extract vertices in hull order:                      #\n    #    v = hull.vertices; pts = points[v]                   #\n    # 4. Close the loop: append pts[0] to pts.                #\n    # 5. ax.plot(closed_R, closed_D, 'k--', alpha=0.4, ...)   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (4 of 4): Draw tangent lines of slope -1/λ\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef draw_tangent(\n    R: float,\n    D: float,\n    lam: float,\n    ax: plt.Axes,\n    x_range: tuple[float, float],\n) -> None:\n    \"\"\"\n    Draw the tangent line to the R-D curve at operating point (R, D) for\n    a model trained with trade-off parameter λ.\n\n    The line passes through (R, D) with slope -1/λ:\n        D(R') = D - (1/λ) × (R' - R)\n\n    This is the geometric statement that minimising R + λD is equivalent\n    to finding where a line of slope -1/λ is tangent to the R-D curve.\n\n    Parameters\n    ----------\n    R       : float — rate at the operating point\n    D       : float — distortion at the operating point\n    lam     : float — λ value (determines slope)\n    ax      : matplotlib Axes\n    x_range : (x_min, x_max) — horizontal extent for the tangent line\n\n    Requirements:\n      • Draw a thin line through (R, D) with slope -1/lam.\n      • Label it 'slope=-1/λ=X.X' in the legend.\n      • Use a distinct colour (e.g. 'firebrick' and 'darkorange') for two\n        selected tangent lines so they are visually distinguishable.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-12 lines                             #\n    #                                                         #\n    # 1. Build x_vals = np.linspace(x_range[0], x_range[1], 100)\n    # 2. y_vals = D - (1.0 / lam) * (x_vals - R)             #\n    # 3. ax.plot(x_vals, y_vals, linestyle='--', linewidth=1, #\n    #            label=f'tangent λ={lam}, slope=-1/λ={-1/lam:.1f}')\n    # 4. ax.scatter([R], [D], marker='*', s=200, zorder=6)    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: __main__ — test harness (do not modify)\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    # Parameters — fast in VERIFY mode, real-scale otherwise.\n    N_SAMPLES  = 256  if VERIFY else 4000\n    N_EPOCHS   = 2    if VERIFY else 250\n    BATCH_SIZE = 32   if VERIFY else 128\n\n    # 8 λ values log-spaced from 0.0005 to 0.5 (matching the lesson's description)\n    LAMBDAS = list(np.logspace(np.log10(0.0005), np.log10(0.5), num=8))\n\n    data = make_dataset(n_samples=N_SAMPLES, dim=8)\n\n    # ── Sweep ─────────────────────────────────────────────────────────────\n    results = sweep_lambda(LAMBDAS, data, N_EPOCHS, BATCH_SIZE)\n\n    # ── Print summary ─────────────────────────────────────────────────────\n    print(f\"\\n{'λ':>10}  {'R (bits/ch)':>14}  {'D (MSE)':>10}\")\n    print(\"─\" * 40)\n    for lam, R, D in results:\n        print(f\"{lam:>10.4f}  {R:>14.4f}  {D:>10.6f}\")\n\n    print(f\"\\nRate-Distortion Curve (8 models) — sweep complete\")\n\n    # ── Plot ──────────────────────────────────────────────────────────────\n    if not VERIFY:\n        fig, ax = plt.subplots(figsize=(9, 6))\n\n        plot_rd_curve(results, ax)\n        draw_convex_hull(results, ax)\n\n        # Draw tangent lines at the lowest and highest λ models.\n        sorted_by_lam = sorted(results, key=lambda t: t[0])\n        low_lam_result  = sorted_by_lam[0]\n        high_lam_result = sorted_by_lam[-1]\n\n        all_R = [t[1] for t in results]\n        x_range = (min(all_R) - 0.2, max(all_R) + 0.2)\n\n        draw_tangent(*low_lam_result[1:], lam=low_lam_result[0], ax=ax, x_range=x_range)\n        draw_tangent(*high_lam_result[1:], lam=high_lam_result[0], ax=ax, x_range=x_range)\n\n        ax.legend(fontsize=8)\n        plt.tight_layout()\n        out = \"ex03_rd_curve.png\"\n        plt.savefig(out, dpi=120)\n        print(f\"Figure saved → {out}\")\n        plt.show()\n"}, {"filename": "ex04_psnr_vs_msssim_when_metrics_disagree.py", "content": "\"\"\"\nExercise 4: PSNR vs MS-SSIM — When Metrics Disagree\n=====================================================\nModule 1 — Rate-Distortion Optimization\n\nPSNR (peak signal-to-noise ratio) measures pixel-level MSE. MS-SSIM (multi-\nscale structural similarity) captures perceptual quality: edge sharpness,\ntexture, and local contrast across multiple spatial scales.\n\nThey often disagree — and Exercise 4 produces a concrete case:\n  • Gaussian blur reduces average pixel error (high PSNR) but destroys\n    edges and textures (low MS-SSIM).\n  • JPEG preserves local structure within 8×8 blocks (decent MS-SSIM)\n    but introduces blocking artifacts (lower PSNR at high compression).\n\nThis \"blur paradox\" matters directly for your comma.ai challenge: SegNet\nand PoseNet care about semantic structure, not average pixel error. A model\noptimised for MSE/PSNR might produce blurry reconstructions that score\npoorly on the neural-network distortion metrics.\n\nAfter Exercise 3 you saw that R and D can be traded off by sweeping λ.\nHere you see that the *choice* of D metric dramatically changes what the\noptimiser will learn to preserve.\n\"\"\"\n\nimport io\nimport os\n\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport numpy as np\nimport torch\nfrom PIL import Image\nfrom pytorch_msssim import ms_ssim\nfrom scipy.ndimage import gaussian_filter\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: Image loading utility\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef load_or_synthesize(path: str | None, size: int = 256) -> np.ndarray:\n    \"\"\"\n    Load an image from `path` (resizing to size×size), or synthesise a\n    structured test image if path is None or the file is missing.\n\n    The synthetic image has smooth gradients, sharp edges, and fine texture\n    so that JPEG and blur artifacts are visually distinct.\n\n    Parameters\n    ----------\n    path : str | None — path to a PNG/JPEG image, or None for synthetic.\n    size : int        — output size (square)\n\n    Returns\n    -------\n    np.ndarray, shape (size, size, 3), dtype uint8\n    \"\"\"\n    if path is not None:\n        try:\n            img = Image.open(path).convert(\"RGB\").resize((size, size), Image.LANCZOS)\n            return np.array(img)\n        except Exception:\n            pass  # fall through to synthetic\n\n    # Synthetic: combine a gradient background, checkerboard texture, and\n    # a sharp circular edge — this gives all three components that SSIM tests.\n    rng = np.random.default_rng(7)\n    canvas = np.zeros((size, size, 3), dtype=np.uint8)\n\n    # Smooth background gradient\n    x = np.linspace(0, 1, size)\n    grad = (x[None, :] * 200 + x[:, None] * 55).astype(np.uint8)\n    canvas[:, :, 0] = grad\n    canvas[:, :, 1] = (255 - grad).astype(np.uint8)\n    canvas[:, :, 2] = 128\n\n    # Fine checkerboard texture (8×8 tiles)\n    for r in range(0, size, 8):\n        for c in range(0, size, 8):\n            if (r // 8 + c // 8) % 2 == 0:\n                canvas[r:r+8, c:c+8, :] = np.clip(\n                    canvas[r:r+8, c:c+8, :].astype(int) + 40, 0, 255\n                ).astype(np.uint8)\n\n    # Sharp circular mask\n    cx, cy, radius = size // 2, size // 2, size // 4\n    for r in range(size):\n        for c in range(size):\n            if (r - cy) ** 2 + (c - cx) ** 2 < radius ** 2:\n                canvas[r, c, :] = np.clip(\n                    canvas[r, c, :].astype(int) + rng.integers(-20, 60, 3), 0, 255\n                ).astype(np.uint8)\n\n    return canvas\n\n\ndef image_to_bpp(n_bits: int, image: np.ndarray) -> float:\n    \"\"\"Convert file size in bits to bits-per-pixel (bpp).\"\"\"\n    h, w = image.shape[:2]\n    return n_bits / (h * w)\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (1 of 4): PSNR\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef compute_psnr(original: np.ndarray, compressed: np.ndarray) -> float:\n    \"\"\"\n    Peak Signal-to-Noise Ratio in decibels (dB).\n\n    Formula:\n        MSE  = mean((original - compressed)²)\n        PSNR = 10 × log₁₀(255² / MSE)\n\n    Parameters\n    ----------\n    original   : np.ndarray — original image, uint8 or float, shape (H, W, C)\n    compressed : np.ndarray — reconstructed/compressed image, same shape\n\n    Returns\n    -------\n    float — PSNR in dB. Returns float('inf') if MSE == 0 (perfect match).\n\n    Common mistake: computing MSE in uint8 space can cause integer overflow\n    on some platforms. Cast to float first.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 5-7 lines                              #\n    #                                                         #\n    # 1. Cast both arrays to float.                           #\n    # 2. Compute MSE = np.mean((orig - comp) ** 2).           #\n    # 3. Guard: if MSE == 0, return float('inf').              #\n    # 4. Return 10 * np.log10(255.0 ** 2 / MSE).              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (2 of 4): MS-SSIM\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef compute_ms_ssim(original: np.ndarray, compressed: np.ndarray) -> float:\n    \"\"\"\n    Multi-Scale Structural Similarity (MS-SSIM) score.\n\n    MS-SSIM compares luminance, contrast, and structure at multiple Gaussian\n    pyramid scales. Values in [0, 1]; higher = more perceptually similar.\n\n    Parameters\n    ----------\n    original   : np.ndarray — uint8 image, shape (H, W, C)\n    compressed : np.ndarray — uint8 image, same shape\n\n    Returns\n    -------\n    float — MS-SSIM score in [0, 1].\n\n    Implementation notes:\n      • pytorch_msssim.ms_ssim expects tensors of shape (N, C, H, W) in [0, 1].\n      • Convert with: x = torch.from_numpy(arr).float().permute(2,0,1).unsqueeze(0) / 255.0\n      • Call ms_ssim(x, y, data_range=1.0) — returns a scalar tensor; use .item().\n      • MS-SSIM requires image size ≥ 160×160 for 5-scale computation.\n        If the image is smaller, use win_size=3 to reduce the scale requirement.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 5-7 lines                              #\n    #                                                         #\n    # 1. Convert original  to float tensor (N=1, C, H, W)/255 #\n    # 2. Convert compressed to float tensor the same way.     #\n    # 3. Return ms_ssim(x, y, data_range=1.0).item()          #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (3 of 4): Compress-and-measure pipeline\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef compress_and_measure(\n    image: np.ndarray,\n    method: str,\n    param: float | int,\n) -> tuple[float, float, float]:\n    \"\"\"\n    Compress or degrade an image, then measure file size, PSNR, and MS-SSIM.\n\n    Parameters\n    ----------\n    image  : np.ndarray — uint8 (H, W, C) original image\n    method : str        — 'jpeg' or 'blur'\n    param  : float|int  — JPEG quality (1-95) or Gaussian sigma for blur\n\n    Returns\n    -------\n    (bpp, psnr, ms_ssim_score) — bits-per-pixel, PSNR (dB), MS-SSIM [0,1]\n\n    For 'jpeg':\n      1. Save the PIL image to a BytesIO buffer at the given quality.\n      2. File size in bits = buffer.tell() * 8.\n      3. Re-open the buffer and convert back to numpy for metrics.\n\n    For 'blur':\n      1. Apply gaussian_filter(image, sigma=[param, param, 0]) to blur\n         each channel independently (sigma=0 on the channel axis).\n      2. For \"file size\" of blur: estimate by JPEG-compressing the *blurred*\n         image at quality=95 — this approximates the bits needed to encode it.\n      3. Compute PSNR and MS-SSIM against the original.\n\n    Common mistake: forgetting to rewind the BytesIO buffer (buf.seek(0))\n    before re-opening it with PIL.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 12-18 lines                            #\n    #                                                         #\n    # JPEG branch:                                            #\n    #   buf = io.BytesIO()                                    #\n    #   Image.fromarray(image).save(buf, format='JPEG',       #\n    #                               quality=int(param))       #\n    #   n_bits = buf.tell() * 8                               #\n    #   buf.seek(0)                                           #\n    #   compressed = np.array(Image.open(buf))                #\n    #                                                         #\n    # BLUR branch:                                            #\n    #   blurred = gaussian_filter(image.astype(float),        #\n    #                             sigma=[param, param, 0])    #\n    #   blurred = np.clip(blurred, 0, 255).astype(np.uint8)   #\n    #   (then JPEG-encode blurred at q=95 for file size)      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# STUDENT TODO (4 of 4): PSNR vs MS-SSIM scatter plot\n# ──────────────────────────────────────────────────────────────────────────────\n\ndef plot_psnr_vs_msssim(\n    jpeg_results: list[tuple[float, float, float]],\n    blur_results: list[tuple[float, float, float]],\n    jpeg_params: list,\n    blur_params: list,\n    axes: list[plt.Axes],\n) -> None:\n    \"\"\"\n    Produce a 3-panel figure:\n      axes[0]: bits/pixel vs PSNR (JPEG=blue, blur=orange)\n      axes[1]: bits/pixel vs MS-SSIM (JPEG=blue, blur=orange)\n      axes[2]: PSNR vs MS-SSIM scatter with each point labelled by method+param\n\n    Parameters\n    ----------\n    jpeg_results : list of (bpp, psnr, ms_ssim) from compress_and_measure(..., 'jpeg', ...)\n    blur_results : list of (bpp, psnr, ms_ssim) from compress_and_measure(..., 'blur', ...)\n    jpeg_params  : list of JPEG quality values (for annotation)\n    blur_params  : list of blur sigma values (for annotation)\n    axes         : list of 3 matplotlib Axes\n\n    Visual requirements:\n      • axes[0]: x='bits/pixel', y='PSNR (dB)', lines for JPEG and blur\n      • axes[1]: x='bits/pixel', y='MS-SSIM', lines for JPEG and blur\n      • axes[2]: scatter; annotate each point with 'JPEG q=N' or 'blur σ=X'\n      • All axes: legend, grid\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 15-22 lines                            #\n    #                                                         #\n    # Unpack results:                                         #\n    #   j_bpp, j_psnr, j_ssim = zip(*jpeg_results)           #\n    #   b_bpp, b_psnr, b_ssim = zip(*blur_results)           #\n    #                                                         #\n    # axes[0] — bpp vs PSNR:                                  #\n    #   ax.plot(j_bpp, j_psnr, 'o-', color='steelblue', ...)  #\n    #   ax.plot(b_bpp, b_psnr, 's--', color='coral', ...)     #\n    #                                                         #\n    # axes[1] — bpp vs MS-SSIM: same pattern.                 #\n    #                                                         #\n    # axes[2] — PSNR vs MS-SSIM scatter:                      #\n    #   annotate each JPEG point: f'q={q}'                    #\n    #   annotate each blur point: f'σ={σ:.1f}'                #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ──────────────────────────────────────────────────────────────────────────────\n# PROVIDED: __main__ — test harness (do not modify)\n# ──────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    # In VERIFY mode: use synthetic image, fewer quality levels, no display.\n    # In normal mode: same synthetic image but more quality levels + plot.\n    IMAGE_PATH = None   # set to a local image path to use a real photo\n\n    image = load_or_synthesize(IMAGE_PATH, size=256)\n\n    if VERIFY:\n        JPEG_QUALITIES = [10, 50]\n        BLUR_SIGMAS    = [1.0, 3.0]\n    else:\n        JPEG_QUALITIES = [5, 15, 30, 50, 80]\n        BLUR_SIGMAS    = [0.5, 1.0, 2.0, 3.0, 5.0]\n\n    # ── Measure all operating points ──────────────────────────────────────\n    jpeg_results = [compress_and_measure(image, \"jpeg\", q) for q in JPEG_QUALITIES]\n    blur_results = [compress_and_measure(image, \"blur\", s) for s in BLUR_SIGMAS]\n\n    # ── Print table ───────────────────────────────────────────────────────\n    print(f\"\\n{'Method':<14} {'Param':>6}  {'bpp':>6}  {'PSNR (dB)':>10}  {'MS-SSIM':>8}\")\n    print(\"─\" * 52)\n    for q, (bpp, psnr, ssim) in zip(JPEG_QUALITIES, jpeg_results):\n        print(f\"{'JPEG':<14} {q:>6}  {bpp:>6.3f}  {psnr:>10.2f}  {ssim:>8.4f}\")\n    for s, (bpp, psnr, ssim) in zip(BLUR_SIGMAS, blur_results):\n        print(f\"{'Blur':<14} {s:>6.1f}  {bpp:>6.3f}  {psnr:>10.2f}  {ssim:>8.4f}\")\n\n    # Check the \"blur paradox\": find at least one blur point that has higher\n    # PSNR than some JPEG point, but lower MS-SSIM.\n    all_jpeg_psnr = [r[1] for r in jpeg_results]\n    all_blur_data = list(zip(BLUR_SIGMAS, blur_results))\n    paradox_found = any(\n        b_psnr > min(all_jpeg_psnr) and b_ssim < max(r[2] for r in jpeg_results)\n        for _, (_, b_psnr, b_ssim) in all_blur_data\n    )\n    print(f\"\\nBlur-paradox observed (blur PSNR > worst JPEG PSNR, but lower MS-SSIM): {paradox_found}\")\n\n    # ── Plot ──────────────────────────────────────────────────────────────\n    if not VERIFY:\n        fig, axes = plt.subplots(1, 3, figsize=(16, 5))\n        fig.suptitle(\n            \"PSNR vs MS-SSIM: When Metrics Disagree\\n(Module 1 — Rate-Distortion Optimization)\",\n            fontsize=12,\n        )\n        plot_psnr_vs_msssim(jpeg_results, blur_results, JPEG_QUALITIES, BLUR_SIGMAS, axes)\n        plt.tight_layout()\n        out = \"ex04_metrics.png\"\n        plt.savefig(out, dpi=120)\n        print(f\"\\nFigure saved → {out}\")\n        plt.show()\n"}]}, "module_02_quantization_and_the_uniform_noise_trick": {"content": "# Module 2: Quantization and the Uniform Noise Trick\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Running Example: One Latent Coefficient](#the-running-example-one-latent-coefficient)\n- [Recap: Where Quantization Lives in the Pipeline](#recap-where-quantization-lives-in-the-pipeline)\n- [Why Quantization Breaks Gradient Descent](#why-quantization-breaks-gradient-descent)\n- [The Staircase Problem: A 1D Deep Dive](#the-staircase-problem-a-1d-deep-dive)\n- [The Straight-Through Estimator: A Common But Biased Fix](#the-straight-through-estimator-a-common-but-biased-fix)\n- [The Uniform Noise Trick](#the-uniform-noise-trick)\n- [The Density Relaxation Property](#the-density-relaxation-property)\n- [Proof: Why p_tilde_y(n) = P_q(n)](#proof-why-p_tilde_yn--p_qn)\n- [The Full Relaxed Objective](#the-full-relaxed-objective)\n- [Training vs Evaluation: The Mode Switch](#training-vs-evaluation-the-mode-switch)\n- [The Entropy Model: Non-Parametric Marginals](#the-entropy-model-non-parametric-marginals)\n- [Bias Analysis: When Does the Approximation Break Down?](#bias-analysis-when-does-the-approximation-break-down)\n- [Connection to Variational Autoencoders](#connection-to-variational-autoencoders)\n- [Implications for Your comma.ai Challenge](#implications-for-your-commaai-challenge)\n- [Question 1 — The Noise Width](#question-1--the-noise-width)\n- [Question 2 — Rate Bias at Coarse Quantization](#question-2--rate-bias-at-coarse-quantization)\n- [Question 3 — STE vs Noise in Gradient Variance](#question-3--ste-vs-noise-in-gradient-variance)\n- [Question 4 — Non-Unit Quantization Steps](#question-4--non-unit-quantization-steps)\n- [Synthesis: The Trick That Launched Neural Compression](#synthesis-the-trick-that-launched-neural-compression)\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Explain precisely why the `round()` function makes end-to-end gradient-based optimization impossible, and why this is not fixable with careful initialization.\n2. Derive the density relaxation property $p_{\\tilde{y}}(n) = P_q(n)$ from first principles using convolution, and explain what it implies for the rate term.\n3. Implement both STE (Straight-Through Estimator) and uniform noise quantization in PyTorch, and articulate why their gradient distributions differ.\n4. Describe the training/evaluation mode switch — noise during training, rounding at inference — and explain why the outputs are nearly identical.\n5. Explain why the rate approximation has a slight positive bias at coarse quantization, and when this bias vanishes.\n\n---\n\n## The Running Example: One Latent Coefficient\n\nTo make everything concrete, we will track a single scalar latent value $y$ through every operation in this module. Imagine your analysis transform $g_a$ has processed a dashcam video frame (for the comma.ai challenge), producing a latent tensor $\\mathbf{y} \\in \\mathbb{R}^{128 \\times H/8 \\times W/8}$. We zoom in on one coefficient:\n\n$$y = 2.73$$\n\nThis is the output of a linear convolution followed by a GDN nonlinearity — a real-valued number sitting somewhere between integer grid points. To transmit it as bits, we must map it to a discrete symbol. The obvious choice: round it.\n\n$$q = \\text{round}(2.73) = 3$$\n\nSimple enough. But the moment we introduce this rounding step into a neural network and try to optimize it with gradient descent, everything breaks. Understanding exactly how it breaks — and the elegant fix — is the whole point of this module.\n\n---\n\n## Recap: Where Quantization Lives in the Pipeline\n\nBefore diving into the math, let's anchor the quantizer in the full compression pipeline.\n\n![Simple compression architecture: x → g_a → y → Q → ŷ → entropy model → ŷ → g_s → x̂](images/compression_pipeline.png)\n\n*Figure: The full compression pipeline. The quantizer Q sits between the encoder $g_a$ and the entropy model. The entropy model assigns a probability (and thus a bit cost) to each quantized symbol $\\hat{y}_i$. The decoder $g_s$ reconstructs $\\hat{x}$ from the quantized latents.*\n\nThe optimization objective from Module 1 is:\n\n$$\\mathcal{L} = \\underbrace{R}_{\\text{bit rate}} + \\lambda \\underbrace{D}_{\\text{distortion}} = \\underbrace{H[\\mathbf{q}]}_{\\substack{\\text{expected bits} \\\\ \\text{per symbol}}} + \\lambda \\underbrace{\\mathbb{E}\\left[\\|\\mathbf{x} - g_s(\\mathbf{q}; \\theta)\\|^2\\right]}_{\\text{MSE reconstruction error}}$$\n\nBoth terms depend on $\\mathbf{q} = \\text{round}(\\mathbf{y})$. The distortion $D$ depends on $\\mathbf{q}$ because we decode $\\mathbf{q}$, not $\\mathbf{y}$. The rate $R$ depends on $\\mathbf{q}$ because it is the entropy of $\\mathbf{q}$. And herein lies the problem.\n\n---\n\n## Why Quantization Breaks Gradient Descent\n\nThe gradient descent update rule requires computing $\\frac{\\partial \\mathcal{L}}{\\partial \\phi}$ where $\\phi$ are the encoder parameters. By the chain rule:\n\n$$\\frac{\\partial \\mathcal{L}}{\\partial \\phi} = \\frac{\\partial \\mathcal{L}}{\\partial \\mathbf{q}} \\cdot \\frac{\\partial \\mathbf{q}}{\\partial \\mathbf{y}} \\cdot \\frac{\\partial \\mathbf{y}}{\\partial \\phi}$$\n\nThe last term $\\frac{\\partial \\mathbf{y}}{\\partial \\phi}$ is fine — the encoder is a differentiable neural network. The middle term is the disaster:\n\n$$\\frac{\\partial q}{\\partial y} = \\frac{d}{dy}\\text{round}(y) = 0 \\quad \\text{almost everywhere}$$\n\nThe `round()` function is piecewise constant — it is flat between integers, with unit jumps at half-integers. Its derivative is zero everywhere it is defined, and undefined (a Dirac delta) at the jump points. In practice, PyTorch's autograd computes a gradient of exactly zero for `round()` at any floating-point input[^1].\n\nThis means the gradient signal from the rate term and from the distortion term (which also goes through $\\mathbf{q}$) is completely zeroed out before it ever reaches the encoder parameters $\\phi$. The optimizer sees a flat loss landscape and makes no progress. As the paper states:\n\n> *\"both terms depend on the quantized values, and the derivatives of the quantization function are zero almost everywhere, rendering gradient descent ineffective.\"*\n\n[^1]: PyTorch implements `torch.round().backward()` with a zero gradient in the backward pass. This is technically a \"subgradient\" choice (the subgradient of a convex piecewise-linear function at a kink can be anything in the subdifferential), but all choices give zero at the flat regions, which cover all but measure-zero of the inputs.\n\n![The gradient catastrophe: round(y) produces zero gradients everywhere (left), while y + Δy passes unit gradients (right)](diagrams/gradient_catastrophe.svg)\n\n*Figure: Left: The staircase function round(y) has zero gradient everywhere — the optimizer is blind. Right: Adding uniform noise ỹ = y + Δy produces a smoothly differentiable proxy with unit gradient, enabling learning.*\n\n**Check your understanding:** If the gradient is zero, why can't we just use a very small learning rate and hope that the discrete jumps somehow help? Think about this before reading on. (The answer: no learning rate rescues a zero gradient. Multiplication by any nonzero constant still gives zero. The optimizer is not \"confused\" — it has literally no information about which direction to move $\\phi$.)\n\n---\n\n## The Staircase Problem: A 1D Deep Dive\n\nLet's trace our running example carefully. Suppose the encoder produces $y = 2.73$ and we compute the distortion loss as:\n\n$$D = (x - g_s(\\text{round}(y)))^2$$\n\nFor $y \\in (2.5, 3.5)$, $\\text{round}(y) = 3$ and $g_s(3)$ is a fixed reconstruction value. So $D$ is constant as a function of $y$ over this entire interval. Changing $y$ from 2.73 to 2.74 to 2.80 makes no difference to the loss — $q$ stays at 3. The gradient $\\partial D / \\partial y = 0$.\n\nNow suppose $y$ moves to $3.50$ and tips over to $q = 4$. Suddenly $D$ changes discontinuously. But this discontinuity carries no gradient information either — the derivative at a jump is undefined (or infinite), not a useful training signal.\n\nMathematically, for any differentiable function $f$:\n\n$$\\frac{d}{dy} f(\\text{round}(y)) = f'(\\text{round}(y)) \\cdot \\underbrace{\\frac{d}{dy}\\text{round}(y)}_{=\\, 0 \\text{ a.e.}} = 0$$\n\nThe chain rule zeros out whatever gradient $f'$ would have provided. This is sometimes called the **vanishing gradient through quantization** — but unlike the vanishing gradient problem in deep networks (where gradients are merely small), here the gradient is precisely and permanently zero.\n\n```python\nimport torch\n\ny = torch.tensor([2.73], requires_grad=True)\nq = torch.round(y)           # forward: q = 3.0\nloss = (q - 1.0) ** 2        # some differentiable loss on q\nloss.backward()\nprint(y.grad)                # → tensor([0.]) — completely zero!\n```\n\nThe encoder parameters $\\phi$ control $y = g_a(x; \\phi)$, so $\\frac{\\partial y}{\\partial \\phi}$ is non-zero. But it is pre-multiplied by $\\frac{\\partial q}{\\partial y} = 0$, which annihilates everything. The encoder receives no training signal at all.\n\n---\n\n## The Straight-Through Estimator: A Common But Biased Fix\n\nBefore the noise trick, practitioners often used the **Straight-Through Estimator (STE)**, first popularized by Bengio et al. (2013). The idea is brutally pragmatic: in the forward pass, use the true rounded value; in the backward pass, pretend rounding is the identity and let gradients flow through unchanged.\n\n| Pass | STE behavior |\n|------|-------------|\n| Forward | $q = \\text{round}(y)$ — actual discrete values |\n| Backward | $\\partial q / \\partial y \\approx 1$ — pretend no rounding happened |\n\nIn PyTorch:\n\n```python\nclass QuantizeSTE(torch.autograd.Function):\n    @staticmethod\n    def forward(ctx, y):\n        return torch.round(y)          # actual rounding\n\n    @staticmethod\n    def backward(ctx, grad_output):\n        return grad_output             # identity: pass gradient through unchanged\n\n# Equivalent one-liner using the detach() trick:\ndef quantize_ste(y):\n    return y + (torch.round(y) - y).detach()\n    # Forward: y + (round(y) - y) = round(y)  ✓\n    # Backward: dy/dy = 1, detach stops gradient through (round(y) - y)  ✓\n```\n\nSTE works in practice for many quantization-aware training scenarios (e.g., training 8-bit neural network weights). But it has a subtle bias problem when used for compression:\n\n**The STE gradient is biased.** The true gradient of the loss with respect to the continuous latent $y$ involves $\\partial q / \\partial y$, which oscillates between 0 (within bins) and undefined (at bin boundaries). STE replaces this with 1. The discrepancy means that STE is not optimizing the actual loss — it's optimizing a surrogate with a different geometry. For applications where you need to precisely minimize $\\mathcal{L} = H[q] + \\lambda D$, this bias matters.\n\n**Check your understanding:** In the STE backward pass, what does the gradient $\\partial D / \\partial y$ actually tell the encoder? Is it computing the true gradient of $D$ with respect to $y$? (Hint: $D$ depends on $q$, not on $y$ directly. The STE pretends otherwise.)\n\nExercise 1 (`ex01_why_round_kills_gradients_ste_vs_uniform_noise.py`) will let you directly observe the difference: STE produces a bimodal gradient histogram (because gradients are sometimes large, sometimes forced through discontinuities), while the noise trick produces a clean, unimodal distribution.\n\n---\n\n## The Uniform Noise Trick\n\nThe approach in Ballé et al. (2017) takes a different route: instead of hacking the backward pass, replace quantization entirely with a fundamentally different operation that is differentiable everywhere and has the same information-theoretic properties.\n\n**The substitution:** Replace $q = \\text{round}(y)$ with $\\tilde{y} = y + \\Delta y$, where:\n\n$$\\Delta y \\sim \\mathcal{U}\\!\\left(-\\tfrac{1}{2}, \\tfrac{1}{2}\\right) \\quad \\text{(uniform noise, width 1, centered at zero)}$$\n\n| Symbol | Meaning | Type |\n|--------|---------|------|\n| $y$ | Pre-quantization continuous latent | scalar or vector |\n| $\\Delta y$ | i.i.d. additive uniform noise | same shape as $y$ |\n| $\\tilde{y}$ | Noisy continuous proxy for $q$ | same shape as $y$ |\n| $q$ | Quantized integer value $= \\text{round}(y)$ | integer-valued |\n| $p_{\\tilde{y}}$ | Density function of $\\tilde{y}$ | continuous function |\n| $P_q$ | Probability mass function of $q$ | discrete distribution |\n\nThe key facts about this substitution:\n\n**Fact 1 — Differentiability.** $\\tilde{y} = y + \\Delta y$ has gradient $\\partial \\tilde{y} / \\partial y = 1$ everywhere. The optimizer can now flow gradients back through the quantizer step.\n\n**Fact 2 — Density-PMF equivalence.** The density function of $\\tilde{y}$ evaluated at any integer $n$ equals the probability mass of $q$ at that integer:\n\n$$p_{\\tilde{y}}(n) = P_q(n) \\quad \\text{for all } n \\in \\mathbb{Z}$$\n\nThis second fact is non-obvious and is the mathematical heart of the trick. It implies that the differential entropy of $\\tilde{y}$ approximates the discrete entropy of $q$:\n\n$$h[\\tilde{y}] \\approx H[q]$$\n\nSo when we minimize the differential entropy of $\\tilde{y}$ during training, we are (approximately) minimizing the number of bits needed to transmit $q$ at inference time. Let's prove it.\n\n---\n\n## The Density Relaxation Property\n\n![Density relaxation: PMF bars (gray) for q = round(y) and continuous density (blue) for ỹ = y + Δy overlap exactly at integers (red dots)](diagrams/density_relaxation.svg)\n\n*Figure: For a Gaussian latent $y \\sim \\mathcal{N}(0, 1.2)$, the PMF of $q = \\text{round}(y)$ (gray bars) and the density of $\\tilde{y} = y + \\Delta y$ (blue curve) match exactly at every integer. The red dots mark the match points.*\n\n**Intuition first.** Think about what $P_q(n)$ means: it is the probability that $y$ falls in the bin $[n - 0.5, n + 0.5)$ — the \"catchment area\" of integer $n$ under rounding. Now think about $p_{\\tilde{y}}(n)$: it is the density of $\\tilde{y} = y + \\Delta y$ at exactly the point $n$. If you look at where $\\tilde{y}$ can equal $n$, it must be that $y = n - \\Delta y$, meaning $y$ is within $[-0.5, 0.5]$ of $n$. In other words, $y$ must be in the exact same interval that maps to $q = n$. The convolution with uniform noise has \"spread\" the probability mass of each bin into a unit-width plateau, and the height of that plateau at integer $n$ equals the bin's probability mass. The plateau height is exactly $P_q(n)$.\n\n---\n\n## Proof: Why $p_{\\tilde{y}}(n) = P_q(n)$\n\n### Stage 1 — Notation\n\n| Symbol | Meaning |\n|--------|---------|\n| $p_y$ | Density of the pre-quantization latent $y$ |\n| $P_q(n)$ | PMF of $q = \\text{round}(y)$: $P_q(n) = \\int_{n-1/2}^{n+1/2} p_y(t)\\, dt$ |\n| $p_{\\tilde{y}}$ | Density of $\\tilde{y} = y + \\Delta y$ |\n| $\\mathbf{1}_{[-1/2, 1/2]}$ | Indicator function (the uniform density on $[-1/2, 1/2]$) |\n\n### Stage 2 — Derivation\n\nThe density of a sum of independent random variables is the convolution of their densities[^2]:\n\n$$\\begin{aligned}\np_{\\tilde{y}}(t) &= (p_y * p_{\\Delta y})(t) & \\scriptstyle{\\text{convolution theorem for sums}} \\\\\n&= \\int_{-\\infty}^{\\infty} p_y(s) \\cdot p_{\\Delta y}(t - s)\\, ds & \\scriptstyle{\\text{definition of convolution}} \\\\\n&= \\int_{-\\infty}^{\\infty} p_y(s) \\cdot \\mathbf{1}_{[-1/2, 1/2]}(t - s)\\, ds & \\scriptstyle{p_{\\Delta y}(u) = \\mathbf{1}_{[-1/2, 1/2]}(u)} \\\\\n&= \\int_{t - 1/2}^{t + 1/2} p_y(s)\\, ds & \\scriptstyle{\\text{indicator selects interval}}\n\\end{aligned}$$\n\nNow evaluate at an integer $t = n \\in \\mathbb{Z}$:\n\n$$\\begin{aligned}\np_{\\tilde{y}}(n) &= \\int_{n - 1/2}^{n + 1/2} p_y(s)\\, ds\n\\end{aligned}$$\n\nBut the right-hand side is exactly $P_q(n)$ — the probability that $y$ falls in the interval $[n - 1/2, n + 1/2)$, which is the event $\\{\\text{round}(y) = n\\}$. Therefore:\n\n$$\\boxed{p_{\\tilde{y}}(n) = P_q(n) \\quad \\text{for all } n \\in \\mathbb{Z}}$$\n\n[^2]: This requires $y$ and $\\Delta y$ to be independent, which holds by construction since $\\Delta y$ is sampled fresh from $\\mathcal{U}(-1/2, 1/2)$ and is not a function of $y$.\n\n### Stage 3 — What this implies for entropy\n\nThe discrete entropy of $q$ is:\n\n$$H[q] = -\\sum_{n \\in \\mathbb{Z}} P_q(n) \\log_2 P_q(n)$$\n\nThe differential entropy of $\\tilde{y}$ is:\n\n$$h[\\tilde{y}] = -\\int_{-\\infty}^{\\infty} p_{\\tilde{y}}(t) \\log_2 p_{\\tilde{y}}(t)\\, dt$$\n\nThese are not the same integral (one is a sum, one is an integral), but they are closely related. It can be shown that:\n\n$$h[\\tilde{y}] = H[q] + \\underbrace{h[\\Delta y]}_{=\\, \\log_2(1) = 0 \\text{ bits}}$$\n\nWait — why zero? Because $\\Delta y \\sim \\mathcal{U}(-1/2, 1/2)$ has differential entropy $h[\\Delta y] = \\log_2(1) = 0$ bits (a uniform distribution over an interval of width 1 has differential entropy equal to $\\log_2$ of the width). This means:\n\n$$h[\\tilde{y}] = H[q]$$\n\n**Exactly!** (In the limit of fine quantization; we will discuss the approximation quality shortly.)\n\nThis is the key result. By minimizing $h[\\tilde{y}]$ — a differentiable quantity with respect to the encoder parameters — we are simultaneously minimizing $H[q]$ — the actual bit rate we care about.\n\n**Fill in the step:** We used the fact that $h[\\Delta y] = 0$ bits. But the entropy of a uniform distribution over $[-1/2, 1/2]$ is $\\log_2(1) = 0$ bits — can you verify this? (Hint: the differential entropy of $\\mathcal{U}(a, b)$ is $\\log_2(b - a)$. What happens when $b - a = 1$?)\n\n---\n\n## The Full Relaxed Objective\n\nWith the noise substitution in place, the full training objective becomes:\n\n$$\\mathcal{L}_{\\text{train}} = \\underbrace{h[\\tilde{\\mathbf{y}}]}_{\\substack{\\text{rate proxy} \\\\ \\approx H[\\mathbf{q}]}} + \\lambda \\underbrace{\\|\\mathbf{x} - g_s(\\tilde{\\mathbf{y}}; \\theta)\\|^2}_{\\text{distortion}}$$\n\nwhere $\\tilde{\\mathbf{y}} = g_a(\\mathbf{x}; \\phi) + \\Delta\\mathbf{y}$ and $\\Delta\\mathbf{y} \\sim \\mathcal{U}(-\\tfrac{1}{2}, \\tfrac{1}{2})^M$ is drawn fresh for each training example.\n\nAt evaluation time, the actual objective being measured is:\n\n$$\\mathcal{L}_{\\text{eval}} = H[\\mathbf{q}] + \\lambda \\|\\mathbf{x} - g_s(\\mathbf{q}; \\theta)\\|^2$$\n\nwhere $\\mathbf{q} = \\text{round}(g_a(\\mathbf{x}; \\phi))$ — actual rounding, no noise.\n\nThe connection between the two: we just showed that $h[\\tilde{\\mathbf{y}}] = H[\\mathbf{q}]$ (approximately), and the distortion term differs only by the noise $\\Delta\\mathbf{y}$ on the input to the decoder. Since $\\|\\Delta\\mathbf{y}\\|$ has standard deviation $\\frac{1}{\\sqrt{12}} \\approx 0.289$ in each dimension, the distortion proxy is very close to the actual distortion[^3].\n\n[^3]: More precisely, the paper notes: \"The relaxed distortion term appears to be mostly unbiased, and exhibits a relatively small variance.\" At high bit rates (fine quantization), the quantization error $q - y$ is itself uniform-like, so the noise is a good approximation.\n\nLet's write this in code:\n\n```python\nimport torch\nimport torch.nn as nn\n\nclass CompressorWithNoise(nn.Module):\n    def __init__(self, encoder, decoder):\n        super().__init__()\n        self.encoder = encoder\n        self.decoder = decoder\n\n    def forward(self, x):\n        y = self.encoder(x)          # continuous latent, shape (B, M, H, W)\n\n        if self.training:\n            # Training: add uniform noise as quantization proxy\n            noise = torch.zeros_like(y).uniform_(-0.5, 0.5)\n            y_tilde = y + noise      # noisy proxy, still continuous\n        else:\n            # Evaluation: actual rounding to integer grid\n            y_tilde = torch.round(y) # integer-valued\n\n        x_hat = self.decoder(y_tilde)\n        return x_hat, y_tilde\n```\n\n**Check your understanding:** In the `else` branch above, we use `torch.round(y)`. Why not `y + (torch.round(y) - y).detach()` (the STE approach)? At evaluation time, we are not computing gradients, so the gradient trick doesn't matter. But more importantly: we want to measure the actual system performance — the real discrete values going through the real decoder. Using `torch.round(y)` directly gives us the true inference behavior.\n\n---\n\n## Training vs Evaluation: The Mode Switch\n\nOne of the most common bugs when implementing learned compression is forgetting to switch between noise (training) and rounding (evaluation). PyTorch's `model.train()` and `model.eval()` mode flag should control this:\n\n```python\n# Training step\nmodel.train()\nx_hat, y_tilde = model(x)\nrate = estimate_entropy(y_tilde)     # differential entropy (smooth proxy)\ndistortion = F.mse_loss(x_hat, x)\nloss = rate + lambda_ * distortion\nloss.backward()\noptimizer.step()\n\n# Evaluation step\nmodel.eval()\nwith torch.no_grad():\n    x_hat, q = model(x)             # q is now rounded integers\n    rate = compute_entropy(q)        # actual discrete entropy (true bits)\n    distortion = F.mse_loss(x_hat, x).item()\n```\n\n![Training vs evaluation pipelines side-by-side: orange training uses + Δy, blue eval uses round(y), shared weights φ and θ](diagrams/train_vs_eval_pipeline.svg)\n\n*Figure: The training pipeline (orange) uses additive noise as a differentiable quantization proxy. The evaluation pipeline (blue) uses actual rounding. Both share the same encoder and decoder weights — only the quantizer step differs.*\n\nThe paper empirically validates that this mode switch does not create a significant gap: the continuous proxy loss tracks the discrete evaluation loss closely throughout training. This is the whole point — if the proxy were a poor surrogate, the model would optimize the wrong thing and fail at inference.\n\n**Critical implementation detail:** The noise must be independent of $y$. If you accidentally correlate the noise with $y$ — for example, by reusing a fixed noise tensor across training steps — the density relaxation property breaks and $p_{\\tilde{y}}(n) \\neq P_q(n)$ at the integers.\n\n---\n\n## The Entropy Model: Non-Parametric Marginals\n\nSo far we have been hand-wavy about how we actually compute $h[\\tilde{\\mathbf{y}}]$ during training. This requires knowing the density $p_{\\tilde{y}}$, which depends on the distribution of the latent $\\mathbf{y}$ — which itself changes as the encoder parameters $\\phi$ evolve during training.\n\nThe paper's solution: model each channel's marginal density $p_{\\tilde{y}_i}$ non-parametrically as a **piecewise linear (linear spline) function** with 10 sampling points per unit interval. These density models are jointly optimized with the encoder and decoder via SGD.\n\n![Fully factorized entropy model: each channel of the latent tensor has its own learned distribution, used to compute the rate cost](images/factorized_entropy_model.png)\n\n*Figure: In the fully factorized model, all spatial positions within each channel $i$ share the same learned marginal $p_{\\tilde{y}_i}$. The rate cost for a given latent value $\\hat{y}_i$ at any spatial position is $-\\log_2 p_{\\hat{y}_i}(\\hat{y}_i)$ bits.*\n\n![Encoding distribution for a single latent element: the highlighted bin height gives the probability, and thus the bit cost](images/encoding_distribution.png)\n\n*Figure: For a single quantized element $\\hat{y}_i$, the bit cost is $-\\log_2 p_{\\hat{y}_i}(\\hat{y}_i)$, i.e., the negative log of the highlighted bin height. Rare values (low probability, short bar) cost more bits.*\n\nWhy non-parametric? A parametric model (e.g., Gaussian) would introduce model error. Since the density $p_{\\tilde{y}_i} = p_{y_i} * \\mathcal{U}(-1/2, 1/2)$ is a smoothed version of the latent marginal, a piecewise linear function can fit it to arbitrary precision given enough sampling points. The paper uses 10 points per unit interval, which is fine enough that model error is negligible.\n\nThe key structural assumption — which the paper makes for tractability — is **independent marginals**:\n\n$$p_{\\tilde{\\mathbf{y}}}(\\tilde{\\mathbf{y}}) = \\prod_{i=1}^{M} p_{\\tilde{y}_i}(\\tilde{y}_i)$$\n\nNo cross-channel or spatial correlations are modeled. This is a simplification — latent channels are often correlated — but it dramatically simplifies both the entropy model and the entropy code. Later papers (Module 4 and beyond in this course) add hyperpriors and autoregressive models to capture these correlations.\n\nFor our running example with $y = 2.73$ and channel $i$ having a learned marginal approximating $\\mathcal{N}(0, 1.5)$:\n\n$$-\\log_2 P_q(3) = -\\log_2 \\left(\\Phi\\!\\left(\\frac{3.5}{1.5}\\right) - \\Phi\\!\\left(\\frac{2.5}{1.5}\\right)\\right) \\approx -\\log_2(0.189) \\approx 2.4 \\text{ bits}$$\n\nwhere $\\Phi$ is the standard normal CDF. This coefficient alone costs 2.4 bits to transmit — one of 128 × (H/8) × (W/8) coefficients in the latent tensor.\n\n---\n\n## Bias Analysis: When Does the Approximation Break Down?\n\nWe claimed $h[\\tilde{\\mathbf{y}}] \\approx H[\\mathbf{q}]$. Now let's be precise about when this approximation is good and when it fails.\n\nThe relationship between differential entropy of the noisy signal and discrete entropy of the quantized signal is:\n\n$$h[\\tilde{y}] = H[q] + h[\\Delta y | q]$$\n\nwhere $h[\\Delta y | q]$ is the conditional differential entropy of the noise given the quantized value. For the noise trick to give an exact equality $h[\\tilde{y}] = H[q]$, we need $h[\\Delta y | q] = 0$, which requires the noise and the quantized value to be maximally correlated — i.e., knowing $q$ gives you complete information about $\\Delta y$.\n\nIn reality, $h[\\Delta y | q] \\geq 0$ (conditional entropy is non-negative), so we always have:\n\n$$h[\\tilde{y}] \\geq H[q]$$\n\nThe differential entropy is a **slightly positively biased** estimate of the discrete entropy. The paper confirms this empirically:\n\n> *\"The relaxed (differential) entropy provides a somewhat positively biased estimate of the discrete entropy for the coarser quantization regime, but the bias disappears for finer quantization, as expected.\"*\n\n**When does the bias vanish?**\n\nAt **fine quantization** (large bit rate, small $\\lambda$), the quantization bins are narrow relative to the distribution's variation. The density $p_y$ is nearly constant within each bin of width 1, so knowing $q$ (which bin you're in) tells you very little about $y$, and therefore very little about $\\Delta y = \\tilde{y} - y$. The conditional entropy $h[\\Delta y | q]$ is close to $h[\\Delta y] = 0$, and the bias vanishes.\n\nAt **coarse quantization** (small bit rate, large $\\lambda$), the bins are wide relative to the distribution. The density $p_y$ varies significantly within each bin, so knowing $q$ (which wide bin you're in) does tell you something about where in the bin $y$ probably is, and therefore something about $\\Delta y$. The conditional entropy is positive, and the bias is non-negligible.\n\n**Practical implication for comma.ai:** You are working at a challenging compression ratio where bit rate is precious. Coarse quantization (few bits per coefficient) is likely. The rate approximation may be slightly optimistic — the model thinks it is using fewer bits than it actually is. Monitor the gap between training proxy loss and actual eval entropy to detect this.\n\n```python\n# Checking the bias empirically\nimport numpy as np\n\ndef discrete_entropy(samples, min_val=-10, max_val=10):\n    \"\"\"True entropy of quantized samples.\"\"\"\n    q = np.round(samples).astype(int)\n    counts = np.bincount(q - min_val, minlength=max_val-min_val)\n    pmf = counts / counts.sum()\n    pmf = pmf[pmf > 0]\n    return -np.sum(pmf * np.log2(pmf))\n\ndef proxy_entropy_at_integers(samples):\n    \"\"\"Proxy: evaluate KDE of noisy samples at integers.\"\"\"\n    from scipy.stats import gaussian_kde\n    noise = np.random.uniform(-0.5, 0.5, size=samples.shape)\n    y_tilde = samples + noise\n    kde = gaussian_kde(y_tilde)\n    integers = np.arange(-10, 11)\n    pmf_approx = kde(integers)\n    pmf_approx = pmf_approx / pmf_approx.sum()\n    return -np.sum(pmf_approx * np.log2(pmf_approx + 1e-12))\n\n# For Gaussian latents with varying spread\nfor sigma in [0.5, 1.0, 2.0, 4.0]:   # smaller sigma = coarser quantization\n    y = np.random.randn(100_000) * sigma\n    H = discrete_entropy(y)\n    h_approx = proxy_entropy_at_integers(y)\n    print(f\"sigma={sigma:.1f}: H[q]={H:.3f}, h[ỹ]≈{h_approx:.3f}, bias={h_approx-H:.3f}\")\n```\n\nYou'll see something like:\n\n```\nsigma=0.5: H[q]=0.842, h[ỹ]≈0.961, bias=+0.119   # coarse: noticeable bias\nsigma=1.0: H[q]=1.823, h[ỹ]≈1.891, bias=+0.068\nsigma=2.0: H[q]=2.695, h[ỹ]≈2.718, bias=+0.023\nsigma=4.0: H[q]=3.567, h[ỹ]≈3.571, bias=+0.004   # fine: bias vanishes\n```\n\n**Quick check:** At $\\sigma = 4.0$, almost all probability mass falls in many distinct bins, and the distribution is fine relative to the bin width of 1. The bias is 0.004 bits — essentially negligible for practical purposes.\n\n---\n\n## Connection to Variational Autoencoders\n\nThe relaxed compression objective is structurally equivalent to the ELBO (Evidence Lower BOund) optimized in Variational Autoencoders (VAEs). This connection, noted in the paper, is illuminating.\n\nIn a VAE, the ELBO decomposes as:\n\n$$\\mathcal{L}_{\\text{VAE}} = \\underbrace{\\mathbb{E}_{q_\\phi(\\mathbf{z}|\\mathbf{x})}[\\log p_\\theta(\\mathbf{x}|\\mathbf{z})]}_{\\text{reconstruction term}} - \\underbrace{D_{\\text{KL}}(q_\\phi(\\mathbf{z}|\\mathbf{x}) \\| p(\\mathbf{z}))}_{\\text{regularization (rate)}}$$\n\nIn the compression framework, define:\n- **Generative model:** $p_\\theta(\\mathbf{x}|\\tilde{\\mathbf{y}}) = \\mathcal{N}(\\mathbf{x};\\, g_s(\\tilde{\\mathbf{y}}; \\theta),\\, (2\\lambda)^{-1}\\mathbf{I})$ — a Gaussian decoder with precision proportional to $\\lambda$\n- **Prior:** $p(\\tilde{\\mathbf{y}}) = \\prod_i p_{\\tilde{y}_i}(\\tilde{y}_i)$ — the learned factorized marginals\n- **Approximate posterior:** $q_\\phi(\\tilde{\\mathbf{y}}|\\mathbf{x}) = \\prod_i \\mathcal{U}(\\tilde{y}_i;\\, y_i - 1/2,\\, y_i + 1/2)$ — deterministic encoder followed by uniform noise\n\nUnder these definitions, the KL term becomes:\n\n$$D_{\\text{KL}}(q_\\phi \\| p) = \\sum_i \\log \\frac{1}{p_{\\tilde{y}_i}(\\tilde{y}_i)} = -\\log p_{\\tilde{\\mathbf{y}}}(\\tilde{\\mathbf{y}}) \\approx h[\\tilde{\\mathbf{y}}]$$\n\nAnd the reconstruction term becomes $-\\lambda \\|\\mathbf{x} - g_s(\\tilde{\\mathbf{y}})\\|^2$ (up to constants). So the relaxed compression objective $h[\\tilde{\\mathbf{y}}] + \\lambda D$ is literally the negative ELBO of this particular VAE.\n\n**Key differences from standard VAEs:**\n\n1. **Multi-rate operation.** A VAE is trained at one $\\lambda$ (or equivalently one operating point on the R-D curve). A compression model must be evaluated at measured bit rates, not just during training. Separate models are trained for each $\\lambda$ value.\n\n2. **Evaluation metric.** VAEs use the ELBO itself as the metric. Compression uses actual bits — you must transmit the integer codes $\\mathbf{q}$ losslessly, and the bit count is $\\sum_i -\\log_2 P_{q_i}(q_i)$, not the differential entropy.\n\n3. **Non-MSE metrics.** MS-SSIM or perceptual losses may not correspond to normalizable probability densities, so the VAE interpretation breaks down. Ballé et al. (2017) optimize for MSE but note that their model dramatically outperforms JPEG on MS-SSIM anyway — an interesting side effect of the nonlinear transform.\n\n---\n\n## Implications for Your comma.ai Challenge\n\nYou are compressing dashcam video evaluated by SegNet (segmentation) and PoseNet (temporal pose), not by a human. The score function is:\n\n$$\\text{score} = 100 \\times D_{\\text{seg}} + 25 \\times R_{\\text{compression}} + \\sqrt{10 \\times D_{\\text{pose}}}$$\n\nThis changes how you should think about the noise trick:\n\n**Rate term:** The compression rate $R$ appears linearly with weight 25. This is the $h[\\tilde{\\mathbf{y}}]$ term during training. You want to minimize it, but not at the expense of SegNet or PoseNet performance.\n\n**Distortion term:** You are not minimizing pixel-level MSE — you are minimizing $D_{\\text{seg}}$ and $D_{\\text{pose}}$, which are outputs of neural networks evaluated on the reconstructed frames. The noise trick is still valid here: you can replace the distortion term with any differentiable loss, including the outputs of these downstream networks. The rate approximation via uniform noise is orthogonal to the choice of distortion metric.\n\n**Coarse quantization regime:** Video compression at high compression ratios is firmly in the coarse quantization regime. The positive bias in $h[\\tilde{\\mathbf{y}}]$ means your training loss will be slightly optimistic about the rate. Build in a calibration step: train with the noise proxy, then measure the actual gap between $h[\\tilde{\\mathbf{y}}]$ and $H[\\mathbf{q}]$ on a validation set, and account for it.\n\n---\n\n## Question 1 — The Noise Width\n\n### Question 1 — The Noise Width\n\nThe uniform noise has width 1, matching the quantization bin width. What would happen if you used noise of width 2 (i.e., $\\Delta y \\sim \\mathcal{U}(-1, 1)$)?\n\nSpecifically:\n1. Would the density relaxation property $p_{\\tilde{y}}(n) = P_q(n)$ still hold?\n2. Would the differential entropy $h[\\tilde{y}]$ still approximate the discrete entropy $H[q]$?\n3. What practical problem would this cause during training?\n\n*Hint: Rederive the convolution argument. The integral of $p_{\\tilde{y}}$ at integer $n$ becomes $\\int_{n-1}^{n+1} p_y(s) ds$, which is the probability of $y$ being within two bins of $n$, not one. This breaks the one-to-one correspondence between density values and PMF values.*\n\n---\n\n## Question 2 — Rate Bias at Coarse Quantization\n\n### Question 2 — Rate Bias at Coarse Quantization\n\nConsider a latent $y \\sim \\mathcal{N}(0, 0.3)$. With quantization bin width 1, this is an extreme coarse quantization scenario — nearly all probability mass falls in just three bins: $q \\in \\{-1, 0, 1\\}$.\n\n1. Compute $P_q(0)$, $P_q(\\pm 1)$, and $P_q(\\pm 2)$ analytically using the Gaussian CDF.\n2. Compute $H[q]$ from these probabilities.\n3. Now estimate $h[\\tilde{y}]$ by sampling: draw 100K samples from $y$, add noise $\\Delta y \\sim \\mathcal{U}(-0.5, 0.5)$, and compute the differential entropy empirically.\n4. Verify that the bias $h[\\tilde{y}] - H[q] > 0$. Is it larger or smaller than the bias at $\\sigma = 1.0$?\n5. Explain intuitively: why does extreme concentration of $y$ near zero cause a large bias?\n\n---\n\n## Question 3 — STE vs Noise in Gradient Variance\n\n### Question 3 — STE vs Noise in Gradient Variance\n\nExercise 1 shows that the STE produces a bimodal gradient histogram and the noise trick produces a unimodal one. This isn't just cosmetic — it affects optimization.\n\n1. For the STE, the gradient $\\frac{\\partial \\mathcal{L}}{\\partial y}$ is computed treating round$(y)$ as $y$. If $y = 2.73$ and the downstream loss is $\\mathcal{L} = (\\hat{y} - 3)^2$ where $\\hat{y} = \\text{round}(y) = 3$, what does STE say $\\frac{\\partial \\mathcal{L}}{\\partial y}$ is? What is the *true* gradient?\n\n2. For the noise trick, if $\\tilde{y} = y + \\Delta y = 2.73 + 0.12 = 2.85$, and $\\mathcal{L} = (\\tilde{y} - 3)^2$, what is $\\frac{\\partial \\mathcal{L}}{\\partial y}$? Is this the true gradient of the original discrete loss?\n\n3. The noise trick's gradient is not the true gradient of $H[q] + \\lambda D$ either. But it has an important statistical property that STE lacks. What is it? (Hint: consider what happens when you average the noise-trick gradient over many noise samples $\\Delta y$.)\n\n---\n\n## Question 4 — Non-Unit Quantization Steps\n\n### Question 4 — Non-Unit Quantization Steps\n\nBallé et al. (2017) use a quantization step size of 1 (the integers). But in some compression systems, you might want a step size of $\\Delta > 1$ (coarser quantization, fewer bits) or $\\Delta < 1$ (finer quantization, more bits).\n\nHow does the uniform noise trick generalize?\n\n1. If the quantizer is $q = \\Delta \\cdot \\text{round}(y / \\Delta)$, what should the noise distribution be?\n2. Rederive the density relaxation property for this generalized quantizer.\n3. What does the differential entropy $h[\\tilde{y}]$ equal in terms of $H[q]$ for this generalized case? Does it still equal $H[q]$, or is there an offset?\n\n*Hint: The differential entropy of $\\mathcal{U}(-\\Delta/2, \\Delta/2)$ is $\\log_2(\\Delta)$ bits, not zero.*\n\n---\n\n## Synthesis: The Trick That Launched Neural Compression\n\nLet's step back and appreciate what the uniform noise trick achieves:\n\n**The problem** was fundamental. Quantization is discrete; gradient descent requires continuity. These seem incompatible. The naive approach — just ignore the problem and use STE — introduces systematic bias. The correct approach — the noise trick — is both principled and elegant.\n\n**The key insight** is that adding noise of exactly the right width creates a continuous proxy that has a provably correct relationship to the discrete system at integer evaluation points. This is not an approximation hack — it is a consequence of the convolution theorem applied to probability densities.\n\n**What the noise trick enables:**\n\n1. **End-to-end optimization.** The encoder $g_a$, decoder $g_s$, and entropy model $p_{\\tilde{y}}$ are all jointly optimized via a single differentiable loss. No hand-tuning of transform, quantizer, and entropy code separately (as in JPEG/JPEG 2000).\n\n2. **Rate-distortion trade-off.** By varying $\\lambda$, you sweep the operating point on the R-D curve. Each $\\lambda$ value corresponds to a different model, trained end-to-end for that specific compression ratio.\n\n3. **Scalability to complex transforms.** Once the quantizer is differentiable (via noise), you can use arbitrarily complex encoders and decoders — deep convolutional networks, attention mechanisms, GDN nonlinearities (Module 3) — and the gradient flows through correctly.\n\n**What the noise trick does not solve:**\n\n- It does not eliminate the positive bias at coarse quantization (though this is small in practice).\n- It does not handle correlations between latent channels (addressed by hyperpriors in later work).\n- It does not automatically select the quantization step size — this is fixed at 1 in Ballé et al. (2017).\n\nThe noise trick is one piece of a three-piece puzzle. The full Ballé 2017 system requires:\n1. ✅ **Quantization proxy** — the uniform noise trick (this module)\n2. 🔜 **Nonlinear transform** — GDN/IGDN (Module 3)\n3. 🔜 **Full autoencoder** — training on real images (Module 4)\n\nIn the exercises for this module, you will implement all three aspects of the noise trick from scratch: observe why STE fails (Exercise 1), verify the density relaxation property empirically (Exercise 2), and train a small autoencoder with the train/eval mode switch (Exercise 3).\n\nBy the time you complete Exercise 3, you will have seen the key number that validates the theory: the training proxy loss and the evaluation actual loss track each other throughout training — the scatter plot of (proxy rate, actual rate) clusters tightly around the diagonal. That is the noise trick working as designed.\n\n---\n\n*Next module: [Module 3: GDN — The Key Nonlinearity](../module_03_gdn_the_key_nonlinearity/README.md), where we examine why standard activations (ReLU, tanh) leave statistical redundancy in the latent space, and how GDN achieves Gaussianization through local divisive normalization.*\n", "exercises": [{"filename": "ex01_why_round_kills_gradients_ste_vs_uniform_noise.py", "content": "\"\"\"\nExercise 1: Why Round() Kills Gradients — STE vs Uniform Noise\n==============================================================\nModule 2 of \"End-to-End Learned Image Compression\"\n\nMotivation\n----------\nThe R+λD training objective depends on q = round(y). But round() has zero\nderivative almost everywhere, so gradient descent cannot update the encoder.\nTwo fixes exist:\n  (A) Straight-Through Estimator (STE): forward pass uses round(), backward\n      pass pretends it is the identity.\n  (B) Uniform Noise: replace round(y) with ỹ = y + Δy, Δy ~ U(-0.5, 0.5).\n\nThis exercise trains a tiny autoencoder on 1-D synthetic data with BOTH\napproaches and compares:\n  - Loss curves (how smooth is convergence?)\n  - Gradient histograms at the bottleneck (what shape?)\n  - Final reconstructions (how good is each?)\n\nThe key insight: STE produces biased gradients — the backward pass computes\n∂L/∂y as if rounding never happened, which misattributes credit. Uniform noise\nproduces UNBIASED gradients with respect to the smoothed objective, and its\ngradient histogram is unimodal and clean.\n\nRun\n---\n    python ex01_why_round_kills_gradients_ste_vs_uniform_noise.py\n\nExpected output\n---------------\n    Final MSE  STE: X.XXXX  |  Noise: X.XXXX\n    Saved: ex01_ste_vs_noise.png\n\"\"\"\n\nimport os\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.optim as optim\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\nimport matplotlib.gridspec as gridspec\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\nN_STEPS   = 3      if VERIFY else 3_000\nN_SAMPLES = 64     if VERIFY else 4_096\nBATCH     = 32     if VERIFY else 128\nLR        = 1e-3\n\ntorch.manual_seed(42)\n\n\n# ---------------------------------------------------------------------------\n# Data: 1-D mixture of Gaussians (a simple latent distribution to quantize)\n# ---------------------------------------------------------------------------\n\ndef make_data(n: int) -> torch.Tensor:\n    \"\"\"Return n samples from a 3-component Gaussian mixture on R^1.\n\n    Parameters\n    ----------\n    n : int\n        Number of samples.\n\n    Returns\n    -------\n    torch.Tensor\n        Shape (n, 1).  Values roughly in [-4, 4].\n    \"\"\"\n    centers = torch.tensor([-2.5, 0.0, 2.5])\n    idx = torch.randint(0, 3, (n,))\n    x = centers[idx] + 0.6 * torch.randn(n)\n    return x.unsqueeze(1)\n\n\n# ---------------------------------------------------------------------------\n# Model: tiny encoder-bottleneck-decoder for 1-D data\n# ---------------------------------------------------------------------------\n\nclass TinyAE(nn.Module):\n    \"\"\"Single-latent autoencoder for 1-D input.\n\n    Architecture\n    ------------\n    Encoder: Linear(1→16) → ReLU → Linear(16→1)\n    Decoder: Linear(1→16) → ReLU → Linear(16→1)\n\n    The bottleneck is one scalar — the quantizer acts on it.\n    \"\"\"\n\n    def __init__(self):\n        super().__init__()\n        self.encoder = nn.Sequential(\n            nn.Linear(1, 16), nn.ReLU(),\n            nn.Linear(16, 1),\n        )\n        self.decoder = nn.Sequential(\n            nn.Linear(1, 16), nn.ReLU(),\n            nn.Linear(16, 1),\n        )\n\n    def encode(self, x: torch.Tensor) -> torch.Tensor:\n        return self.encoder(x)\n\n    def decode(self, z: torch.Tensor) -> torch.Tensor:\n        return self.decoder(z)\n\n\n# ---------------------------------------------------------------------------\n# TODO 1 of 4 — Implement the Straight-Through Estimator\n# ---------------------------------------------------------------------------\n\nclass QuantizeSTE(torch.autograd.Function):\n    \"\"\"Quantizer with Straight-Through gradient estimator.\n\n    Forward pass : returns round(y).\n    Backward pass: passes gradient through unchanged (identity).\n\n    This is the \"hack\": the backward pass pretends round() never happened.\n    The gradient is biased because it ignores the staircase discontinuities.\n    \"\"\"\n\n    @staticmethod\n    def forward(ctx, y: torch.Tensor) -> torch.Tensor:\n        ###########################################################\n        # YOUR CODE HERE — 2-4 lines                              #\n        #                                                         #\n        # Apply rounding in the forward pass.                     #\n        # Hint: torch.round(y)                                    #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n    @staticmethod\n    def backward(ctx, grad_output: torch.Tensor) -> torch.Tensor:\n        ###########################################################\n        # YOUR CODE HERE — 1-2 lines                              #\n        #                                                         #\n        # Pass the gradient through unchanged (straight-through). #\n        # Hint: just return grad_output directly.                 #\n        ###########################################################\n        raise NotImplementedError(\"YOUR CODE HERE\")\n        ###########################################################\n\n\ndef quantize_ste(y: torch.Tensor) -> torch.Tensor:\n    \"\"\"Apply STE quantization.\n\n    Parameters\n    ----------\n    y : torch.Tensor\n        Continuous latent, any shape.\n\n    Returns\n    -------\n    torch.Tensor\n        Integer-valued tensor (same shape as y) in the FORWARD pass;\n        straight-through gradient in the backward pass.\n    \"\"\"\n    return QuantizeSTE.apply(y)\n\n\n# ---------------------------------------------------------------------------\n# TODO 2 of 4 — Implement the Uniform Noise quantization proxy\n# ---------------------------------------------------------------------------\n\ndef quantize_noise(y: torch.Tensor, training: bool = True) -> torch.Tensor:\n    \"\"\"Quantization proxy using additive uniform noise.\n\n    During TRAINING  : returns ỹ = y + Δy where Δy ~ U(-0.5, 0.5).\n                       Gradient ∂ỹ/∂y = 1 — fully differentiable.\n    During EVALUATION: returns round(y) — actual discrete symbols.\n\n    Parameters\n    ----------\n    y : torch.Tensor\n        Continuous latent, any shape.\n    training : bool\n        If True, add noise; if False, round.\n\n    Returns\n    -------\n    torch.Tensor\n        Noisy proxy (training) or rounded integer values (eval).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 5-8 lines                              #\n    #                                                         #\n    # Training branch:                                        #\n    #   Sample Δy ~ U(-0.5, 0.5) with the same shape as y.   #\n    #   Use torch.empty_like(y).uniform_(-0.5, 0.5) or       #\n    #   torch.rand_like(y) - 0.5                              #\n    #   Return y + noise.                                     #\n    #                                                         #\n    # Evaluation branch:                                      #\n    #   Return torch.round(y).                                #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 3 of 4 — Training loops for STE and Noise\n# ---------------------------------------------------------------------------\n\ndef train_one_method(\n    method: str,\n    data: torch.Tensor,\n    n_steps: int,\n    batch_size: int,\n    lr: float,\n) -> tuple[list[float], list[torch.Tensor], TinyAE]:\n    \"\"\"Train a TinyAE with either 'ste' or 'noise' quantization.\n\n    Parameters\n    ----------\n    method : str\n        Either 'ste' or 'noise'.\n    data : torch.Tensor\n        Shape (N, 1) — training data.\n    n_steps : int\n        Number of gradient steps.\n    batch_size : int\n        Mini-batch size.\n    lr : float\n        Learning rate.\n\n    Returns\n    -------\n    losses : list[float]\n        MSE loss at each step.\n    grad_snapshots : list[torch.Tensor]\n        Gradients of the encoder output (pre-quantizer) collected at every\n        step — used for the histogram.\n    model : TinyAE\n        The trained model.\n\n    Implementation notes\n    --------------------\n    - Instantiate TinyAE and Adam optimizer inside this function (fresh model\n      for each method).\n    - For 'ste':   z = quantize_ste(model.encode(x))\n    - For 'noise': z = quantize_noise(model.encode(x), training=True)\n    - Loss = MSE(model.decode(z), x)\n    - To capture gradients at the encoder output y = model.encode(x), register\n      a hook: y.register_hook(lambda g: grad_snapshots.append(g.detach().clone()))\n    - Call loss.backward() then optimizer.step() as usual.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — 20-28 lines                            #\n    #                                                         #\n    # Skeleton:                                               #\n    # model = TinyAE()                                        #\n    # optimizer = optim.Adam(model.parameters(), lr=lr)       #\n    # losses = []                                             #\n    # grad_snapshots = []                                     #\n    # for step in range(n_steps):                             #\n    #     ... sample mini-batch ...                           #\n    #     y = model.encode(x_batch)                          #\n    #     y.retain_grad()                                     #\n    #     y.register_hook(lambda g: ...)  # capture grad     #\n    #     z = quantize_ste(y) or quantize_noise(y, True)      #\n    #     x_hat = model.decode(z)                             #\n    #     loss = F.mse_loss(x_hat, x_batch)                   #\n    #     optimizer.zero_grad()                               #\n    #     loss.backward()                                     #\n    #     optimizer.step()                                    #\n    #     losses.append(loss.item())                          #\n    # return losses, grad_snapshots, model                    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# TODO 4 of 4 — Gradient histogram plotting\n# ---------------------------------------------------------------------------\n\ndef plot_gradient_histogram(ax: plt.Axes, grad_snapshots: list[torch.Tensor], color: str, title: str) -> None:\n    \"\"\"Plot a histogram of all recorded encoder-output gradients.\n\n    Parameters\n    ----------\n    ax : plt.Axes\n        Axis to draw on.\n    grad_snapshots : list[torch.Tensor]\n        List of gradient tensors collected during training (see train_one_method).\n    color : str\n        Bar color (e.g., 'steelblue' or 'darkorange').\n    title : str\n        Axis title.\n\n    Implementation notes\n    ------
