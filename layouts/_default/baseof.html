<!DOCTYPE html>
<html lang="en">

<head>
    {{ partial "head.html" }}

    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else if .Title }}{{ .Title }} | {{ .Site.Title }}{{ else }}{{ .Site.Title }}{{ end }}</title>
    <link rel="canonical" href="{{ .Permalink }}" />

    <meta property="og:url" content="{{ .Permalink }}" />
    <meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}" />
    <meta property="og:description" content="{{ .Summary }}" />
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
    <meta name="twitter:description" content="{{ .Summary }}">

    {{ if .Params.Image }}
    <meta property="og:image" content="{{ .Site.BaseURL }}/Files/{{ .Params.Image }}" />
    <meta name="twitter:image" content="{{ .Site.BaseURL }}/Files/{{ .Params.Image }}" />
    {{ end }}
</head>

<body>
    {{ partial "header.html" }}
    <main>
        {{ block "main" . }}
        {{ end }}
    </main>
    {{ partial "footer.html" }}
</body>

</html>
