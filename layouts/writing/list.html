{{ define "main" }}

<section>
    <h1>{{ .Title }}</h1>
</section>

<div class="blog-list">
    {{ range .Pages.ByDate.Reverse }}
    <a class="post" href="{{ .RelPermalink }}">
        <span class="title">{{ .Title }}</span>
        <span class="hline"></span>
        <span class="publishDate">{{ .Date.Format "Jan '06" }}</span>
    </a>
    {{ end }}
</div>


{{ end }}
