<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 1220 601" width="800" height="394" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1e1e1e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <rect x="30" y="30" width="520" height="480" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="0.15" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="70" y="66.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">round(y)  —  the staircase</text>
  <text x="70" y="84.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">gradient = 0 almost everywhere</text>
  <rect x="650" y="30" width="520" height="480" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="0.15" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="685" y="66.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">y + Δy  —  the smooth proxy</text>
  <text x="685" y="84.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">gradient flows freely everywhere</text>
  <text x="570" y="241.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">replace</text>
  <text x="570" y="263.2" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">   with</text>
  <path d="M 565.0 260.0 L 665.0 260.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <path d="M 80.0 420.0 L 180.0 420.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
