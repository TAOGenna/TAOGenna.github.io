  <path d="M 410.0 140.0 L 510.0 140.0" fill="none" stroke="#e03131" stroke-width="3" filter="url(#handdrawn)"/>
  <text x="140" y="405.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#e03131" text-anchor="start">∂q/∂y = 0</text>
  <text x="210" y="345.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#e03131" text-anchor="start">∂q/∂y = 0</text>
  <text x="280" y="285.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#e03131" text-anchor="start">∂q/∂y = 0</text>
  <rect x="130" y="450" width="380" height="46" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="155" y="478.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">⚠  Optimizer is BLIND — no learning signal</text>
  <path d="M 700.0 420.0 L 800.0 420.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <path d="M 720.0 440.0 L 820.0 440.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <text x="1080" y="449.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">y</text>
  <text x="680" y="106.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">ỹ =</text>
  <text x="680" y="123.6" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">y + Δy</text>
  <path d="M 750.0 390.0 L 850.0 390.0" fill="none" stroke="#2f9e44" stroke-width="3" filter="url(#handdrawn)"/>
  <text x="780" y="355.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">∂ỹ/∂y = 1</text>
  <text x="870" y="295.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">∂ỹ/∂y = 1</text>
  <text x="960" y="235.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">∂ỹ/∂y = 1</text>
  <text x="720" y="130.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Δy ~ U(−0.5, 0.5)</text>
  <text x="720" y="146.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">small random perturbation</text>
  <text x="720" y="161.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">centered at zero</text>
  <rect x="750" y="450" width="380" height="46" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="770" y="478.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">✓  Gradients flow — optimizer learns!</text>
  <text x="200" y="548.0" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Key insight: at INTEGER points, the density of ỹ = the PMF of q  →  same entropy, smooth gradients</text>
</svg>
