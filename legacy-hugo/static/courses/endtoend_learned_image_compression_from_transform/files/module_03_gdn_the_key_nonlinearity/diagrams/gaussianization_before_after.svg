      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-e03131" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131"/>
    </marker>
  </defs>
  <text x="280" y="41.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Why GDN Gaussianizes: Natural Image Statistics</text>
  <text x="30" y="73.0" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">BEFORE GDN: raw filter responses (natural images)</text>
  <rect x="30" y="78" width="380" height="220" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="40" y="102.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Histogram of filter response magnitudes</text>
  <rect x="50" y="100" width="3" height="170" rx="0" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="50" y="268" width="340" height="3" rx="0" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="53" y="108" width="20" height="162" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="78" y="153" width="20" height="117" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="103" y="198" width="20" height="72" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="128" y="228" width="20" height="42" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="153" y="248" width="20" height="22" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="178" y="258" width="20" height="12" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="203" y="262" width="20" height="8" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="228" y="264" width="20" height="6" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="253" y="265" width="20" height="5" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="278" y="265" width="20" height="4" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="303" y="266" width="60" height="4" rx="0" fill="#e03131" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="170" y="291.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">response value  →</text>
  <text x="250" y="243.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">heavy tail!</text>
  <text x="250" y="256.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">(kurtosis &gt;&gt; 0)</text>
  <path d="M 280.0 252.0 L 330.0 240.0" fill="none" stroke="#e03131" stroke-width="2" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <text x="55" y="115.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">spike at</text>
  <text x="55" y="128.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">zero</text>
  <text x="40" y="196.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">kurtosis ≈ 8-15</text>
  <text x="40" y="210.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">(Gaussian=0)</text>
  <text x="430" y="73.0" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">AFTER GDN: Gaussianized responses</text>
  <rect x="430" y="78" width="380" height="220" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="440" y="102.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Histogram of GDN output values</text>
  <rect x="450" y="100" width="3" height="170" rx="0" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="450" y="268" width="340" height="3" rx="0" fill="#1e1e1e" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="453" y="223" width="20" height="47" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="478" y="195" width="20" height="75" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="503" y="160" width="20" height="110" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="528" y="130" width="20" height="140" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="553" y="115" width="20" height="155" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="578" y="130" width="20" height="140" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="603" y="160" width="20" height="110" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="628" y="195" width="20" height="75" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="653" y="223" width="20" height="47" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="678" y="248" width="20" height="22" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="703" y="258" width="20" height="12" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="728" y="263" width="20" height="7" rx="0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="570" y="291.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">response value  →</text>
  <text x="558" y="114.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">bell curve!</text>
  <text x="558" y="128.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">(kurtosis ≈ 0)</text>
  <text x="450" y="214.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">kurtosis ≈ 0.1</text>
  <text x="450" y="228.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">(much closer</text>
  <text x="450" y="243.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">to Gaussian)</text>
  <rect x="30" y="320" width="780" height="140" rx="0" fill="#f8f9fa" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="40" y="349.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">WHY does Gaussianizing matter for compression?</text>
  <text x="50" y="370.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Step 1: Entropy model</text>
  <text x="50" y="388.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">We model each latent channel independently with</text>
  <text x="50" y="402.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">p̃ᵢ ≈ Gaussian. This works well ONLY if each</text>
  <text x="50" y="417.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">channel's distribution is actually Gaussian-shaped.</text>
  <text x="295" y="370.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">Step 2: Rate cost</text>
  <text x="295" y="388.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Rate = -log p̃(ŷ). If our model is a poor fit,</text>
  <text x="295" y="402.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">we overestimate entropy → waste bits. A Gaussian</text>
  <text x="295" y="417.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">fit to a heavy-tailed dist wastes ~2× the bits.</text>
  <text x="540" y="370.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Step 3: The payoff</text>
  <text x="540" y="388.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">GDN-Gaussianized latents allow the entropy model</text>
  <text x="540" y="402.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">to assign tight (low-entropy) codes. Same quality</text>
  <text x="540" y="417.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">image, fewer bits. That's the compression gain.</text>
  <rect x="30" y="476" width="780" height="70" rx="0" fill="#e7f5ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="40" y="502.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Biological origin:</text>
  <text x="40" y="520.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">GDN models neurons in visual cortex: each V1 neuron's firing rate is divided by pooled activity of its neighbors.</text>
  <text x="40" y="534.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">This 'contrast normalization' removes redundancies across orientations and spatial frequencies — the same redundancies</text>
  <text x="40" y="549.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">that make natural image patches non-Gaussian.</text>
</svg>
