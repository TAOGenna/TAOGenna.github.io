  <ellipse cx="166.0" cy="184.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="178.0" cy="198.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
