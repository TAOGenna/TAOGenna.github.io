  <ellipse cx="704.0" cy="257.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="730.0" cy="257.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="756.0" cy="258.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="782.0" cy="258.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="808.0" cy="257.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="834.0" cy="256.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="860.0" cy="255.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="886.0" cy="254.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="912.0" cy="252.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="580" y="414.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">encoder 'straightens' the banana</text>
  <text x="580" y="428.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">data lies on a near-horizontal line</text>
  <text x="580" y="451.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">every grid cell that the line passes</text>
  <text x="580" y="465.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">through captures real data</text>
  <text x="580" y="477.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">MSE ≈ 0.015  (10× lower distortion!)</text>
  <text x="200" y="565.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">KEY INSIGHT (Ballé et al.):</text>
  <text x="200" y="581.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">'We assume a fixed uniform scalar quantizer in the code space, and aim to have the nonlinear</text>
  <text x="200" y="596.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">transformations warp the space in an appropriate way, effectively implementing a parametric</text>
  <text x="200" y="612.4" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">form of vector quantization.'</text>
</svg>
