  <ellipse cx="251.0" cy="236.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="284.0" cy="241.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="316.0" cy="234.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="344.0" cy="221.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="366.0" cy="203.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="381.0" cy="182.0" rx="6.0" ry="6.0" fill="#1971c2" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="40" y="414.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">banana-shaped data</text>
  <text x="40" y="434.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">grid cells that straddle the curve</text>
  <text x="40" y="448.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">waste bits on empty space</text>
  <text x="40" y="470.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">MSE ≈ 0.12  (HIGH distortion)</text>
  <rect x="560" y="50" width="500" height="480" rx="0" fill="#f0fff4" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="570" y="86.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">LEARNED: Nonlinear Transform + Grid</text>
  <text x="570" y="104.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Encoder f(x) maps banana → line, then grid quantizes</text>
  <rect x="575" y="115" width="470" height="280" rx="0" fill="#ffffff" stroke="#1e1e1e" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <path d="M 810.0 115.0 L 910.0 115.0" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 575.0 255.0 L 675.0 255.0" fill="none" stroke="#cccccc" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 693.0 115.0 L 793.0 115.0" fill="none" stroke="#dddddd" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 925.0 115.0 L 1025.0 115.0" fill="none" stroke="#dddddd" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 575.0 162.0 L 675.0 162.0" fill="none" stroke="#dddddd" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 575.0 348.0 L 675.0 348.0" fill="none" stroke="#dddddd" stroke-width="1" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <ellipse cx="626.0" cy="250.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="652.0" cy="254.0" rx="6.0" ry="6.0" fill="#2f9e44" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
