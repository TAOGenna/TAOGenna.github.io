  <text x="30" y="86.6" font-size="18" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">NAIVE: Lattice (grid) Quantizer</text>
  <text x="30" y="104.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Apply uniform grid directly to raw (x1, x2) data</text>
