  <text x="200" y="465.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">LONG edges (orange) — from early visited nodes, far from I</text>
  <text x="200" y="490.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">SHORT edges (green) — from late visited nodes, close to I</text>
  <text x="30" y="525.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Key insight: The traversal path naturally spans all distances.</text>
  <text x="30" y="541.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">No hierarchy needed — early nodes are always far, late nodes are always close.</text>
