<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 -20 1054 560" width="800" height="425" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1e1e1e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <marker id="ah-e03131" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131"/>
    </marker>
  </defs>
  <text x="180" y="46.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">The Density Relaxation Property: p_ỹ(n) = P_q(n) for all integers n</text>
  <text x="280" y="66.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Adding unit-width uniform noise ỹ = y + Δy makes the density equal the PMF at every integer</text>
  <path d="M 130.0 400.0 L 230.0 400.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <path d="M 160.0 420.0 L 260.0 420.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <text x="90" y="136.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">probability /</text>
  <text x="90" y="153.6" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">density</text>
  <text x="440" y="426.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">value  (integers = quantization levels)</text>
  <text x="222" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">−3</text>
  <text x="292" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">−2</text>
  <text x="362" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">−1</text>
  <text x="438" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">0</text>
  <text x="508" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">1</text>
  <text x="578" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">2</text>
  <text x="648" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">3</text>
  <text x="718" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">4</text>
  <text x="152" y="423.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">−4</text>
  <rect x="213" y="385" width="50" height="-15" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="283" y="400" width="50" height="-68" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="353" y="400" width="50" height="-165" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="423" y="400" width="50" height="-225" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="493" y="400" width="50" height="-165" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="563" y="400" width="50" height="-68" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="633" y="400" width="50" height="-15" rx="0" fill="#dee2e6" stroke="#adb5bd" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="730" y="345.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#6c757d" text-anchor="start">P_q(n)</text>
  <text x="730" y="361.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#6c757d" text-anchor="start">= PMF of</text>
  <text x="730" y="376.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#6c757d" text-anchor="start">  q = round(y)</text>
  <text x="730" y="392.4" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#6c757d" text-anchor="start">(gray bars)</text>
  <path d="M 185.0 398.0 L 285.0 398.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 185.0 398.0 L 285.0 398.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 265.0 388.0 L 365.0 388.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 335.0 328.0 L 435.0 328.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 425.0 171.0 L 525.0 171.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 515.0 330.0 L 615.0 330.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 585.0 390.0 L 685.0 390.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <path d="M 665.0 398.0 L 765.0 398.0" fill="none" stroke="#1971c2" stroke-width="3" filter="url(#handdrawn)"/>
  <text x="730" y="175.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">p_ỹ(n)</text>
  <text x="730" y="191.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">= density of</text>
  <text x="730" y="206.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">  ỹ = y + Δy</text>
  <text x="730" y="222.4" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(blue curve)</text>
  <ellipse cx="308.0" cy="333.0" rx="9.0" ry="9.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="378.0" cy="235.0" rx="9.0" ry="9.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="448.0" cy="175.0" rx="9.0" ry="9.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="518.0" cy="235.0" rx="9.0" ry="9.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="588.0" cy="333.0" rx="9.0" ry="9.0" fill="#e03131" stroke="#e03131" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="730" y="255.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">●  match points</text>
  <text x="730" y="271.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   p_ỹ(n) = P_q(n)</text>
  <text x="730" y="286.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   (red dots)</text>
  <path d="M 450.0 150.0 L 550.0 150.0" fill="none" stroke="#e03131" stroke-width="2" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <text x="455" y="110.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">density = PMF here!</text>
  <text x="455" y="126.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">p_ỹ(0) = P_q(0) ≈ 0.32</text>
  <rect x="150" y="430" width="560" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="0.3" filter="url(#handdrawn)"/>
  <text x="165" y="466.6" font-size="18" font-family="Cascadia Code, Fira Code, monospace" fill="#1971c2" text-anchor="start">p_ỹ(n) = P_q(n)  for all n ∈ ℤ</text>
  <text x="165" y="485.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">→ optimizing differential entropy of ỹ  ≈  optimizing discrete entropy of q</text>
  <rect x="750" y="420" width="300" height="80" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="1" opacity="0.4" filter="url(#handdrawn)"/>
  <text x="760" y="444.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Why? Convolution theorem:</text>
  <text x="760" y="458.8" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">p_ỹ = p_y ⊛ U(−0.5, 0.5)</text>
  <text x="760" y="473.2" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">At integers: integral over</text>
  <text x="760" y="487.6" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">[n−0.5, n+0.5] = P_q(n) ✓</text>
</svg>
