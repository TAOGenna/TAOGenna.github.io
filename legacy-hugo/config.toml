baseURL = 'https://taogenna.github.io/'
languageCode = 'en-us'
title = 'Kenyi Takagui-Perez'

publishDir = 'docs'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]
  [markup.highlight]
    codeFences = true
    noClasses = true
    style = "pygments"
    guessSyntax = true
