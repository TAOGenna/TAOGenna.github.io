<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -20 1122 556" width="800" height="396" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="300" y="46.4" font-size="22" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Product Quantization: From Full Vector to Compressed Code</text>
  <text x="10" y="98.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Original 128D float32 vector</text>
  <rect x="10" y="100" width="50" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="13" y="126.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">0.73</text>
  <rect x="60" y="100" width="50" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="63" y="126.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">-0.21</text>
  <rect x="110" y="100" width="50" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="113" y="126.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">1.14</text>
  <rect x="160" y="100" width="50" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="163" y="126.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">0.09</text>
  <text x="215" y="126.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#888888" text-anchor="start">... (128 floats total) ...</text>
  <rect x="360" y="100" width="50" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="363" y="126.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">-0.55</text>
  <text x="440" y="127.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">= 512 bytes (float32)</text>
  <text x="10" y="183.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Step 1: Split into M=8 subspaces (16 dims each)</text>
  <rect x="10" y="190" width="80" height="55" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="15" y="211.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Sub 0</text>
  <text x="15" y="225.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 0-15</text>
  <text x="15" y="240.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">[0.73,-0.21,</text>
  <text x="15" y="250.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">1.14,...]</text>
  <rect x="100" y="190" width="80" height="55" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="105" y="211.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">Sub 1</text>
  <text x="105" y="225.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 16-31</text>
  <text x="105" y="240.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">[0.42, 0.88,</text>
  <text x="105" y="250.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">-0.31,...]</text>
  <rect x="190" y="190" width="80" height="55" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="195" y="211.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Sub 2</text>
  <text x="195" y="225.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">dims 32-47</text>
  <text x="195" y="240.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">[−0.9, 0.11,</text>
  <text x="195" y="250.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">0.67,...]</text>
  <text x="285" y="224.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#888888" text-anchor="start">Sub 3 ... Sub 7</text>
  <text x="10" y="283.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Step 2: k-means on each subspace → 256 centroids each</text>
  <rect x="10" y="290" width="80" height="55" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="15" y="310.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Codebook 0</text>
  <text x="15" y="326.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">256 centroids</text>
  <text x="15" y="341.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">each 16D</text>
  <rect x="100" y="290" width="80" height="55" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="105" y="310.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">Codebook 1</text>
  <text x="105" y="326.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">256 centroids</text>
  <text x="105" y="341.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">each 16D</text>
  <rect x="190" y="290" width="80" height="55" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="195" y="310.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Codebook 2</text>
  <text x="195" y="326.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">256 centroids</text>
  <text x="195" y="341.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">each 16D</text>
  <text x="285" y="324.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#888888" text-anchor="start">... 5 more codebooks ...</text>
  <text x="10" y="383.0" font-size="15" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Step 3: Assign each subvector to its nearest centroid → 1 byte index</text>
  <rect x="10" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="22" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">47</text>
  <text x="10" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 0</text>
  <rect x="70" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="82" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">193</text>
  <text x="70" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 1</text>
  <rect x="130" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="142" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">88</text>
  <text x="130" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 2</text>
  <rect x="190" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="202" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">211</text>
  <text x="190" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 3</text>
  <rect x="250" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="262" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">5</text>
  <text x="250" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 4</text>
  <rect x="310" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="322" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">128</text>
  <text x="310" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 5</text>
  <rect x="370" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="382" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">77</text>
  <text x="370" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 6</text>
  <rect x="430" y="390" width="50" height="40" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="442" y="418.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">244</text>
  <text x="430" y="446.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Sub 7</text>
  <text x="490" y="417.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">= 8 bytes (uint8)</text>
  <text x="490" y="435.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">64x compression!</text>
  <text x="10" y="475.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">KEY: 256 possible values per subspace fit in 1 byte (uint8 max=255). 8 bytes encode 256^8 ≈ 10^19 combinations.</text>
  <text x="10" y="493.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#555555" text-anchor="start">Real-world embeddings cluster semantically → centroids land where data lives → low reconstruction error.</text>
</svg>
