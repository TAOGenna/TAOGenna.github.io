<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 1030 515" width="800" height="400" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1971c2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="ah-adb5bd" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adb5bd"/>
    </marker>
    <marker id="ah-f08c00" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f08c00"/>
    </marker>
  </defs>
  <text x="280" y="41.4" font-size="22" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Beam Search: Expanding the Frontier vs. Greedy</text>
  <text x="30" y="74.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">GREEDY SEARCH (beam_width=1)</text>
  <text x="30" y="89.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Single candidate — fast but fragile</text>
  <ellipse cx="62.0" cy="132.0" rx="22.0" ry="22.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="53" y="142.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">E</text>
  <ellipse cx="152.0" cy="112.0" rx="22.0" ry="22.0" fill="#ffec99" stroke="#f08c00" stroke-width="1.5" filter="url(#handdrawn)"/>
  <text x="143" y="122.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">A</text>
  <ellipse cx="162.0" cy="187.0" rx="22.0" ry="22.0" fill="#ffc9c9" stroke="#e03131" stroke-width="1.5" filter="url(#handdrawn)"/>
  <text x="153" y="197.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">B</text>
  <ellipse cx="262.0" cy="102.0" rx="22.0" ry="22.0" fill="#ffc9c9" stroke="#e03131" stroke-width="1.5" filter="url(#handdrawn)"/>
  <text x="253" y="112.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">C</text>
  <text x="248" y="75.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">wrong!</text>
  <ellipse cx="262.0" cy="182.0" rx="22.0" ry="22.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="253" y="192.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">D</text>
  <text x="245" y="224.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">TRUE NN</text>
  <path d="M 91.3 125.5 L 122.7 118.5" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 88.3 146.5 L 135.7 172.5" fill="none" stroke="#adb5bd" stroke-width="1" marker-end="url(#ah-adb5bd)" filter="url(#handdrawn)"/>
  <path d="M 181.9 109.3 L 232.1 104.7" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 177.3 128.1 L 236.7 165.9" fill="none" stroke="#adb5bd" stroke-width="1" marker-end="url(#ah-adb5bd)" filter="url(#handdrawn)"/>
  <text x="40" y="253.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Greedily took E→A (nearest neighbor)</text>
  <text x="40" y="266.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">then A→C (nearest from A)</text>
  <text x="40" y="279.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">But D was reachable via B!</text>
  <text x="40" y="292.8" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Beam_width=1 gets stuck at C.</text>
  <text x="400" y="74.2" font-size="16" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">BEAM SEARCH (beam_width=3)</text>
  <text x="400" y="89.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">3 candidates maintained — finds the true NN!</text>
  <ellipse cx="432.0" cy="132.0" rx="22.0" ry="22.0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="423" y="142.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">E</text>
  <ellipse cx="522.0" cy="112.0" rx="22.0" ry="22.0" fill="#ffec99" stroke="#f08c00" stroke-width="1.5" filter="url(#handdrawn)"/>
  <text x="513" y="122.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">A</text>
  <ellipse cx="532.0" cy="187.0" rx="22.0" ry="22.0" fill="#ffec99" stroke="#f08c00" stroke-width="1.5" filter="url(#handdrawn)"/>
  <text x="523" y="197.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">B</text>
  <ellipse cx="632.0" cy="102.0" rx="22.0" ry="22.0" fill="#ffc9c9" stroke="#e03131" stroke-width="1.5" filter="url(#handdrawn)"/>
  <text x="623" y="112.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">C</text>
  <ellipse cx="632.0" cy="182.0" rx="22.0" ry="22.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="3" filter="url(#handdrawn)"/>
  <text x="623" y="192.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">D</text>
  <text x="615" y="224.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">TRUE NN ✓</text>
  <path d="M 461.3 125.5 L 492.7 118.5" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 458.3 146.5 L 505.7 172.5" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 551.9 109.3 L 602.1 104.7" fill="none" stroke="#f08c00" stroke-width="1.5" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <path d="M 547.3 128.1 L 606.7 165.9" fill="none" stroke="#f08c00" stroke-width="1.5" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <path d="M 562.0 185.5 L 602.0 183.5" fill="none" stroke="#f08c00" stroke-width="1.5" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <text x="400" y="253.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Beam = {A, B} kept both E’s neighbors.</text>
  <text x="400" y="266.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Expanded A: added C, D to beam.</text>
  <text x="400" y="279.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Expanded B: also found D!</text>
  <text x="400" y="292.8" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">D confirmed via 2 paths → returned. ✓</text>
  <rect x="20" y="320" width="950" height="130" rx="0" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="30" y="346.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">BEAM WIDTH vs. RECALL@10 (empirical, 5K vectors, d=64, M=10)</text>
  <text x="40" y="370.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">beam_width=  1  |  10  |  25  |  50  | 100  | 200</text>
  <text x="40" y="395.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">recall@10 = 0.50 | 0.68 | 0.78 | 0.85 | 0.91 | 0.95</text>
  <text x="40" y="420.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">nodes_vis =  12  |  45  |  95  | 175  | 320  | 580  (out of 5,000 total = 11.6% max!)</text>
  <text x="40" y="445.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">↑ The key insight: even beam_width=200 visits only 11.6% of nodes. Sublinear by design.</text>
  <text x="500" y="345.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">Production ANN systems expose beam_width as the</text>
  <text x="500" y="361.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">primary latency-recall knob (ef_search in HNSW,</text>
  <text x="500" y="376.8" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">L in DiskANN). Increase for more accuracy,</text>
  <text x="500" y="392.4" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">decrease for lower latency.</text>
</svg>
