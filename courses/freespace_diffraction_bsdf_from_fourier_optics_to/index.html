a few wavelengths thinner. In practice, since diffraction only occurs right at the edges of objects (where both $A^\\perp$ and $\\bar{A}^\\perp$ are non-empty), the bias is localized to narrow edge regions and is small.\n\nThe paper quantifies this: the approximation error is at most $\\sim \\hat{P}/P_\\text{total}$, which is a small fraction for typical geometry (edges subtend tiny solid angles). Figure 9 in the paper validates this with a 30° tilted double-slit, showing excellent agreement with numerically integrated Fraunhofer diffraction.\n\n**In the renderer:** When a ray hits geometry, the system either (a) continues as a direct ray through the aperture (probability $\\propto d$), or (b) evaluates the diffraction BSDF $\\hat{w}$ (probability $\\propto \\hat{w}$). The energy lent to case (b) is taken from the obstacle's albedo — the material BSDF of the screen material is scaled down by the ratio $\\hat{P} / P_{A^\\perp}$.\n\n---\n\n## The Clamped Diffracted Term\n\nThe paper implements clamping not by clamping $w$ directly, but by working at the level of the individual edge-diffracted waves $\\psi_j$ (which we will derive in Module 2). Each edge-diffracted wave $\\psi_j$ has its central lobe removed via a **Gaussian modulator**:\n\n$$\\chi(\\boldsymbol{\\zeta}) = \\exp\\!\\left(-\\frac{\\|\\boldsymbol{\\zeta}\\|^2}{2\\sigma_\\zeta^2}\\right), \\qquad \\sigma_\\zeta = \\sqrt{3}. \\tag{29}$$\n\nHere $\\boldsymbol{\\zeta} = \\Xi_j^{-T} \\hat{\\boldsymbol{\\xi}}$ is the direction $\\hat{\\boldsymbol{\\xi}}$ expressed in edge-local coordinates (we will see the transform $\\Xi_j$ in Module 2). The edge-diffracted wave with its central lobe removed is:\n\n$$\\hat{\\psi}_j = \\sqrt{1 - \\chi(\\Xi_j^{-T}\\hat{\\boldsymbol{\\xi}})}\\cdot \\psi_j(\\hat{\\boldsymbol{\\xi}}). \\tag{28}$$\n\nNote: the modulator is applied to the *amplitude* $\\psi_j$, not the intensity $|\\psi_j|^2$. The factor $\\sqrt{1-\\chi}$ suppresses the amplitude near $\\hat{\\boldsymbol{\\xi}} = 0$ and is 1 far from the central lobe. Squaring gives $|\\hat{\\psi}_j|^2 = (1-\\chi)|\\psi_j|^2$, which is the intensity with the central lobe removed.\n\nThe clamped diffracted term is then:\n\n$$\\hat{w}(\\hat{\\boldsymbol{\\xi}}) = \\sum_j |\\hat{\\psi}_j(\\hat{\\boldsymbol{\\xi}})|^2. \\tag{30}$$\n\nThis is a sum of intensities (non-negative), so $\\hat{w} \\geq 0$ everywhere.\n\n**Why $\\sigma_\\zeta = \\sqrt{3}$?** This specific value is chosen to remove the \"tightest central lobe that can be physically resolved.\" The value $\\sqrt{3}$ appears from the analysis of the edge-diffracted wave's spatial structure — it corresponds to a Gaussian that has the same width as the narrowest resolvable lobe for a beam with Gaussian profile $\\sigma = 25\\lambda$. The paper details this in Section S2.1 of the supplemental.\n\n**Why $\\sqrt{1-\\chi}$ not $(1-\\chi)$?** Because we want to remove the central lobe from the *amplitude* and then square. If we applied $(1-\\chi)$ to the intensity $|\\psi_j|^2$, we'd get the correct result for a single edge, but the sum $\\sum_j (1-\\chi)|\\psi_j|^2$ would not equal the correct formula for interference between edges (when working with amplitudes). By operating on amplitudes and then squaring, we preserve the correct per-edge interference structure.\n\nIn code for the 1D case (where $\\Xi_j$ is just the identity for a horizontal edge):\n\n```python\ndef chi_modulator(xi, sigma_zeta=np.sqrt(3)):\n    \"\"\"Gaussian central-lobe modulator.\n    \n    Parameters\n    ----------\n    xi : array_like\n        Direction grid (in units where edge length = 1).\n    sigma_zeta : float\n        Width of the Gaussian. Paper uses sqrt(3).\n    \n    Returns\n    -------\n    chi : ndarray, values in [0, 1]\n    \"\"\"\n    return np.exp(-xi**2 / (2 * sigma_zeta**2))\n\ndef remove_central_lobe(psi_j, xi, sigma_zeta=np.sqrt(3)):\n    \"\"\"Remove central lobe from edge-diffracted amplitude.\n    \n    Returns psi_hat_j = sqrt(1 - chi(xi)) * psi_j\n    \"\"\"\n    chi = chi_modulator(xi, sigma_zeta)\n    return np.sqrt(1.0 - chi) * psi_j\n\ndef clamped_diffracted_term(psi_hat_list):\n    \"\"\"w_hat = sum_j |psi_hat_j|^2\"\"\"\n    return sum(np.abs(psi_hat)**2 for psi_hat in psi_hat_list)\n```\n\nThe key properties of $\\hat{w}$ to verify numerically:\n\n1. **Non-negativity:** $\\hat{w}(\\hat{\\boldsymbol{\\xi}}) \\geq 0$ everywhere (it's a sum of squares).\n2. **Agreement outside central lobe:** $\\hat{w}(\\hat{\\boldsymbol{\\xi}}) \\approx w(\\hat{\\boldsymbol{\\xi}})$ for $|\\hat{\\boldsymbol{\\xi}}| \\gg \\sigma_\\xi$ (the central lobe width in $\\xi$-space).\n3. **Positive total power:** $\\int \\hat{w}\\, d^2\\hat{\\boldsymbol{\\xi}} > 0$ (no longer zero — this is the \"borrowed\" power).\n\nProperty 2 is important: **the diffraction fringes are preserved exactly**. The only difference between $w$ and $\\hat{w}$ is in the central lobe, which is handled by the direct term anyway.\n\n**Check your understanding:** The modulator is $\\chi = e^{-\\zeta^2/(2\\cdot 3)}$ with $\\sigma_\\zeta^2 = 3$, not $\\sigma_\\zeta = 3$. If you accidentally used $\\sigma_\\zeta = 3$ instead of $\\sigma_\\zeta = \\sqrt{3}$, what would happen to $\\hat{w}$? Would it still be non-negative?\n\n*Answer:* Using $\\sigma_\\zeta = 3$ (too wide) would suppress the amplitude over a larger region, removing more of $\\psi_j$ near the center. Since $|\\hat{\\psi}_j|^2 = (1-\\chi)|\\psi_j|^2$ and $(1-\\chi) \\geq 0$, $\\hat{w}$ would still be non-negative (it's a sum of squares). But it would over-suppress the central region, removing some genuine diffraction signal near the boundary of the central lobe. The agreement with $w$ outside the lobe would fail over a wider region.\n\n---\n\n## Why This Decomposition Matters for Rendering\n\nLet's step back and appreciate what we've achieved.\n\n**The problem we started with:** Fraunhofer diffraction requires integrating over the aperture $A^\\perp$ (the opening), but in a renderer we interact with rays that hit the obstacle $\\bar{A}^\\perp$ (the screen material). These are geometrically complementary regions.\n\n**The solution:** Via Babinet's principle, we rewrote the aperture intensity $|\\psi|^2$ as $d + w$, where $w$ is driven by $\\bar{\\psi}$ — diffraction by the *complement* (the screen). Now:\n\n- The **direct term** $d$ is handled by ray tracing as usual: rays that pass through the aperture continue forward.\n- The **diffracted term** $\\hat{w}$ is a BSDF evaluated when a ray hits the screen material.\n\nThis is a clean architectural split. The path tracer doesn't need to change its fundamental structure — it just evaluates a different BSDF at geometry intersections. There's no interference between rays (which is what makes UTD so expensive), no phase tracking, no sub-wavelength sampling requirements. \n\n**Comparison with UTD (Uniform Theory of Diffraction):** The competing approach, UTD, propagates rays with complex phases that interfere. This means:\n- Each ray must carry phase information $e^{ikr}$ where $r$ is path length.\n- Two rays reaching the same destination must be added *coherently*, with phases.\n- This requires sub-wavelength accuracy in path length — extremely sensitive to geometry.\n- The result is high-frequency noise at low sample counts (the paper shows UTD needs ~2000 spp vs. ~8 spp for the new method at comparable quality).\n\nOur decomposition achieves linearity: $|\\psi|^2 = d + w$ is an incoherent sum. The rendering equation $L = \\int f(\\omega_i, \\omega_o) L_i \\cos\\theta_i\\, d\\omega_i$ remains linear. Monte Carlo integration works directly.\n\n![Rendering architecture: direct vs diffracted paths](diagrams/rendering_architecture.svg)\n\n---\n\n## Analytical Questions\n\n### Question 1 — Babinet and the Obstacle vs. Aperture Duality\n\nThe paper chooses to evaluate diffraction using $\\bar{\\psi}$ (the complement field, driven by the obstacle $\\bar{A}^\\perp$) rather than $\\psi$ (the aperture field). From a numerical standpoint, when is this choice advantageous? Consider two scenarios: (a) a tiny pinhole in an infinite screen ($A^\\perp$ is small), and (b) a thin wire in open space ($\\bar{A}^\\perp$ is small). Which representation is cheaper to compute in each case, and why?\n\n**Discussion:** In case (a), $A^\\perp$ is small, so the aperture integral has few sample points. Computing $\\psi$ directly is cheap; computing $\\bar{\\psi}$ requires integrating over the entire infinite plane minus the pinhole, which is expensive. In case (b), the obstacle $\\bar{A}^\\perp$ is small (a wire), so $\\bar{\\psi}$ requires integrating over a compact support — cheap. The paper's choice of obstacle-based diffraction ($\\bar{\\psi}$) is efficient precisely when the diffracting objects (buildings, leaves, edges) are small relative to the surrounding open space. The boundary $\\delta A^\\perp$ is finite, enabling the O(perimeter) edge-integral in Module 2.\n\n### Question 2 — Total Power in the Clamped Term\n\nLet $\\hat{P} = \\int \\hat{w}\\, d^2\\hat{\\boldsymbol{\\xi}}$ be the total power in the clamped diffracted term. Show that $\\hat{P} > 0$, and give a bound relating $\\hat{P}$ to the power contained in the negative part of $w$. What does $\\hat{P}$ converge to in the limit where the aperture becomes much larger than the beam width ($a \\gg \\sigma$)?\n\n**Discussion:** $\\hat{P} > 0$ because $\\hat{w} = \\max(w, 0) + (\\hat{w} - \\max(w,0))$; since $\\hat{w} \\geq 0$ and the original negative-power region is replaced by zero, we have $\\hat{P} = \\int \\max(w,0)\\, d^2\\hat{\\boldsymbol{\\xi}} > 0$. Since $\\int w\\, d^2\\hat{\\boldsymbol{\\xi}} = 0$, we can write $\\int \\max(w,0) = -\\int \\min(w,0) = |$ negative part$|$. So $\\hat{P}$ equals the absolute power in the negative region of $w$. As $a \\gg \\sigma$, almost all the beam passes through the aperture, $P_{A^\\perp} \\approx P_\\text{total}$, and $\\bar{\\psi}$ integrates over an almost-empty complement — so $|\\bar{\\psi}|^2 \\approx 0$ and $w \\approx 0$ everywhere. Thus $\\hat{P} \\to 0$: a large aperture diffracts negligibly and borrows almost no energy.\n\n### Question 3 — Reciprocity of the Diffraction BSDF\n\nA classical BSDF must be reciprocal: $f(\\omega_i, \\omega_o) = f(\\omega_o, \\omega_i)$. The paper states that the diffraction BSDF $\\hat{f}(\\omega_o) = R^2 / (P_{A^\\perp} \\cos\\theta) \\cdot \\hat{w}(\\hat{\\boldsymbol{\\xi}})$ is *not* reciprocal in general. Why not? What physical asymmetry breaks reciprocity?\n\n**Discussion:** The BSDF depends on the aperture construction, which depends on the incident direction $\\hat{\\mathbf{z}}$: we project all front-facing triangles onto a virtual screen orthogonal to $-\\hat{\\mathbf{z}}$ through the intersection point. If we reverse the incident direction, a different set of triangles is front-facing, a different virtual screen is constructed, and the aperture complement $\\bar{A}^\\perp$ is different. So $\\hat{w}$ at direction $\\hat{\\boldsymbol{\\xi}}$ with incident $\\hat{\\mathbf{z}}$ is generally not equal to $\\hat{w}$ at direction $-\\hat{\\mathbf{z}}$ with incident $\\hat{\\boldsymbol{\\xi}}$. This is a fundamental consequence of the construction process — the BSDF is asymmetric because the diffracting obstacle's shape (as seen from the two directions) is different. This is physically correct: a wedge diffracts differently depending on which face the light hits.\n\n### Question 4 — The Energy Audit at a Geometry Edge\n\nConsider a ray hitting the edge of a triangle. The aperture $A^\\perp$ is the half-plane on one side, and $\\bar{A}^\\perp$ is the half-plane on the other. The incident beam has total power $P_\\text{total}$. Half hits the aperture ($P_{A^\\perp} = P_\\text{total}/2$) and half hits the obstacle ($P_{\\bar{A}^\\perp} = P_\\text{total}/2$). How much power can the diffraction BSDF at most redirect, and what fraction of $P_\\text{total}$ does this represent? What determines whether the rendering algorithm over- or under-estimates the energy at that edge?\n\n**Discussion:** The clamped power $\\hat{P}$ comes from the negative region of $w$. In the half-plane case, $\\bar{\\psi}$ is a semi-infinite integral of the Gaussian beam — roughly half the total field. The negative region of $w$ in the central lobe has power bounded by $P_{\\bar{A}^\\perp} = P_\\text{total}/2$ (since $\\int |w| \\leq \\int |\\bar{\\psi}|^2 + |\\tilde{\\varphi}|^2 = P_{\\bar{A}^\\perp} + P_\\text{total}$, but the practical bound is much smaller). For a Gaussian beam with $\\sigma = 25\\lambda$, the central lobe power is a small fraction of $P_\\text{total}$. The renderer under-estimates energy when the obstacle is larger than the coherence region (the borrowed power is larger than the actual diffracted energy), and over-estimates when the obstacle is smaller. In practice, the approximation error scales with the fraction of beam power incident on edges.\n\n---\n\n## Synthesis: Connecting to the Course Goal\n\nThis module established the **architectural foundation** for the rest of the course. Let's trace the logic:\n\n1. **Module 0** showed that Fraunhofer diffraction = Fourier transform. This gives us the forward model.\n\n2. **This module** showed that by using Babinet's principle, we can decompose $|\\psi|^2 = d + \\hat{w}$ such that:\n   - $d$ is handled by ray tracing (no new code needed in the path tracer)\n   - $\\hat{w}$ is a proper, non-negative BSDF driven by the obstacle geometry\n\n3. **Module 2** will derive the *closed form* for $\\hat{w}$ via the divergence theorem, converting the 2D integral over $\\bar{A}^\\perp$ into a 1D sum over boundary edges $\\delta A^\\perp$. Each edge contributes a term expressed in closed form using the auxiliary functions $\\alpha_1$ and $\\alpha_2$.\n\n4. **Module 3** will assemble the BSDF: construct $\\bar{A}^\\perp$ by projecting front-facing triangles onto the virtual screen, compute per-edge contributions, and evaluate $\\hat{f}(\\omega_o) = R^2/(P_{A^\\perp}\\cos\\theta)\\cdot\\hat{w}(\\hat{\\boldsymbol{\\xi}})$.\n\n5. **Module 4** will importance-sample this BSDF using precomputed iCDF tables for $\\alpha_1$ and $\\alpha_2$, reducing the variance to the point where 8 samples per pixel suffice (vs. ~2000 for UTD).\n\nThe key insight that makes all of this work is the incoherent decomposition: by accepting that $\\hat{w}$ is an approximation to $w$ in the central lobe (and exact outside it), we can maintain the linear rendering equation and avoid the exponential difficulty of coherent path tracing.\n\n**The numbers:** For $\\sigma = 25\\lambda$ (the beam profile used throughout the paper), the central lobe has a half-angle of $\\sim 0.3°$. The borrowed energy from clamping is typically less than 1% of the total diffracted power for typical architectural geometry. This makes the approximation extremely accurate for practical scenes — as validated by Figure 9 in the paper, which shows essentially perfect agreement between the method and numerically integrated Fraunhofer diffraction for non-planar double slits with 30° tilt and 45λ depth offset.\n\n**In the next module:** We will take the field $\\bar{\\psi}(\\hat{\\boldsymbol{\\xi}}) = \\int_{\\bar{A}^\\perp} \\varphi(\\mathbf{q})\\,e^{-ik\\hat{\\boldsymbol{\\xi}}\\cdot\\mathbf{q}}\\,d^2q$ and apply the divergence theorem to convert it to a sum over the boundary edges of $\\bar{A}^\\perp$. This is where the PLA (piecewise-linear approximation) of $\\varphi$ enters, and where the closed-form auxiliary functions $\\alpha_1$ and $\\alpha_2$ emerge.\n", "exercises": [{"filename": "ex01_babinets_principle_complementary_apertures.py", "content": "\"\"\"\nExercise 1: Babinet's Principle — Complementary Apertures\n==========================================================\nModule 1: Babinet's Principle and the Direct/Diffracted Decomposition\n\nIn this exercise you will verify Babinet's identity numerically:\n\n    psi(xi) + psi_bar(xi) = phi_tilde(xi)\n\nwhere:\n  - psi      = field diffracted by aperture A⊥ (the opening)\n  - psi_bar  = field diffracted by complement Ā⊥ (the obstacle)\n  - phi_tilde = full-plane Fourier transform of incident beam phi\n\nYou will also verify the key consequence: outside the central lobe of phi_tilde,\nthe two diffraction patterns |psi|² and |psi_bar|² are essentially identical.\n\nKey insight: Babinet's principle lets us compute diffraction around an obstacle\n(the screen) by computing diffraction through its complement (the aperture),\nand vice versa. This is the foundation for the paper's approach where rays that\nhit geometry (the obstacle) evaluate the complement's BSDF.\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Grid parameters  (fast in VERIFY mode)\n# ---------------------------------------------------------------------------\nN      = 512  if VERIFY else 8192   # number of spatial samples\nsigma  = 25.0                        # Gaussian beam width in units of lambda\na      = 5.0                         # half-slit width in units of lambda\nL      = 15.0 * sigma                # spatial domain half-extent\n\n# Spatial grid\nq   = np.linspace(-L, L, N, endpoint=False)\ndq  = q[1] - q[0]\n\n# Frequency (xi) grid matching FFT conventions\nxi_freq = np.fft.fftfreq(N, d=dq)          # cycles per unit-lambda\nxi      = np.fft.fftshift(xi_freq)          # shifted for display\n\n# ---------------------------------------------------------------------------\n# Incident Gaussian beam and aperture masks\n# ---------------------------------------------------------------------------\nphi = np.exp(-q**2 / (2.0 * sigma**2))      # Gaussian beam phi(q)\n\naperture_mask    = (np.abs(q) <= a).astype(float)   # 1 inside slit, 0 outside\ncomplement_mask  = 1.0 - aperture_mask              # 1 on obstacle, 0 in slit\n\n\ndef fraunhofer_1d(field, dq):\n    \"\"\"Compute 1-D Fraunhofer diffraction via FFT.\n\n    Applies the standard FFT shift convention so that the output is ordered\n    from most-negative to most-positive spatial frequency.\n\n    Parameters\n    ----------\n    field : ndarray, shape (N,)\n        Incident field restricted to some region (aperture or complement).\n    dq : float\n        Spatial sampling interval (in units of lambda).\n\n    Returns\n    -------\n    psi : ndarray, shape (N,), complex\n        Diffracted amplitude, proportional to the Fourier transform of `field`.\n        The overall normalization constant (ike^{ikR} / 2piR) is absorbed into `dq`.\n    \"\"\"\n    return np.fft.fftshift(np.fft.fft(np.fft.ifftshift(field))) * dq\n\n\n# ---------------------------------------------------------------------------\n# ── STUDENT CODE SECTION ────────────────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\ndef compute_complement_field(phi, complement_mask, dq):\n    \"\"\"Compute the field diffracted by the complement aperture Ā⊥.\n\n    The complement aperture Ā⊥ is the *obstacle* (the screen material).\n    Diffraction by Ā⊥ is computed by restricting phi to the complement region\n    and taking the Fraunhofer transform.\n\n    Parameters\n    ----------\n    phi : ndarray, shape (N,)\n        Incident Gaussian beam over the full spatial grid.\n    complement_mask : ndarray, shape (N,)\n        Binary mask: 1 where the obstacle is, 0 where the aperture opening is.\n    dq : float\n        Spatial sampling interval.\n\n    Returns\n    -------\n    psi_bar : ndarray, shape (N,), complex\n        Field diffracted by the complement Ā⊥.\n\n    Hints\n    -----\n    - Multiply phi by complement_mask to restrict to the obstacle region.\n    - Then apply fraunhofer_1d to the restricted field.\n    - This is the ψ̄ term in Babinet's identity ψ + ψ̄ = φ̃.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 3–4 lines                        #\n    #                                                         #\n    # Hint: phi_complement = phi * complement_mask            #\n    # Then: psi_bar = fraunhofer_1d(phi_complement, dq)       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compute_unobstructed_field(phi, dq):\n    \"\"\"Compute φ̃, the full-plane Fourier transform of the incident beam.\n\n    This is the field that would propagate in free space if there were no screen\n    at all — the \"unobstructed\" reference.  Babinet's identity states:\n        psi + psi_bar = phi_tilde   (pointwise, for all xi)\n\n    Parameters\n    ----------\n    phi : ndarray, shape (N,)\n        Incident Gaussian beam over the full spatial grid.\n    dq : float\n        Spatial sampling interval.\n\n    Returns\n    -------\n    phi_tilde : ndarray, shape (N,), complex\n        Fourier transform of phi, representing free-space propagation.\n\n    Hints\n    -----\n    - Do NOT apply any mask — integrate phi over the entire domain.\n    - fraunhofer_1d already handles the FFT shifts.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 2–3 lines                        #\n    #                                                         #\n    # Hint: phi_tilde = fraunhofer_1d(phi, dq)               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef verify_babinet(psi, psi_bar, phi_tilde):\n    \"\"\"Check that ψ + ψ̄ = φ̃ holds pointwise to near machine precision.\n\n    Parameters\n    ----------\n    psi : ndarray, complex\n        Field from aperture A⊥.\n    psi_bar : ndarray, complex\n        Field from complement Ā⊥.\n    phi_tilde : ndarray, complex\n        Full-plane FT of the incident beam.\n\n    Returns\n    -------\n    max_rel_error : float\n        Maximum relative error: max|ψ + ψ̄ − φ̃| / max|φ̃|.\n        Should be < 1e-6 (limited by float64 precision).\n\n    Hints\n    -----\n    - Compute the residual: residual = psi + psi_bar - phi_tilde\n    - Normalise by max|phi_tilde| so the error is dimensionless.\n    - Use np.max(np.abs(...)) for the sup-norm.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 5–7 lines                        #\n    #                                                         #\n    # Hint: residual = psi + psi_bar - phi_tilde              #\n    # max_rel_error = np.max(np.abs(residual)) /              #\n    #                 np.max(np.abs(phi_tilde))               #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compare_outside_central_lobe(psi, psi_bar, phi_tilde, xi):\n    \"\"\"Show |ψ|² ≈ |ψ̄|² outside the central lobe of φ̃.\n\n    Babinet's principle says that in directions where |φ̃(ξ)| ≈ 0 (outside the\n    forward beam), the two intensity patterns are identical.\n\n    Parameters\n    ----------\n    psi : ndarray, complex\n    psi_bar : ndarray, complex\n    phi_tilde : ndarray, complex\n    xi : ndarray, float\n        Spatial-frequency (direction) grid.\n\n    Returns\n    -------\n    max_rel_error_outside : float\n        max | |ψ|² − |ψ̄|² | / max(|ψ̄|²) evaluated OUTSIDE the central lobe.\n\n    Hints\n    -----\n    - Define the central lobe as directions where |phi_tilde| > threshold,\n      e.g. threshold = 0.01 * np.max(np.abs(phi_tilde)).\n    - The \"outside\" mask is where |phi_tilde| <= threshold.\n    - Compute |psi|^2 and |psi_bar|^2, then find the max relative difference\n      outside the lobe.\n    - The relative error should be small (< 1e-3 for our grid size).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 10–14 lines                      #\n    #                                                         #\n    # Hint:                                                   #\n    # threshold = 0.01 * np.max(np.abs(phi_tilde))           #\n    # outside_lobe = np.abs(phi_tilde) <= threshold           #\n    # intensity_psi     = np.abs(psi)**2                      #\n    # intensity_psi_bar = np.abs(psi_bar)**2                  #\n    # diff = np.abs(intensity_psi[outside_lobe] -             #\n    #               intensity_psi_bar[outside_lobe])          #\n    # normalise by max(intensity_psi_bar[outside_lobe])       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# ── PROVIDED: __main__ test harness (do not modify) ─────────────────────────\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    # ------------------------------------------------------------------\n    # Compute all fields\n    # ------------------------------------------------------------------\n    psi      = fraunhofer_1d(phi * aperture_mask, dq)   # aperture field\n    psi_bar  = compute_complement_field(phi, complement_mask, dq)\n    phi_tilde = compute_unobstructed_field(phi, dq)\n\n    # ------------------------------------------------------------------\n    # Test 1: Babinet identity\n    # ------------------------------------------------------------------\n    max_rel_err = verify_babinet(psi, psi_bar, phi_tilde)\n    status = \"PASSED\" if max_rel_err < 1e-6 else \"FAILED\"\n    print(f\"Babinet identity max relative error: {max_rel_err:.3e} < 1e-6  [{status}]\")\n\n    # ------------------------------------------------------------------\n    # Test 2: Identical patterns outside central lobe\n    # ------------------------------------------------------------------\n    max_rel_err_out = compare_outside_central_lobe(psi, psi_bar, phi_tilde, xi)\n    print(f\"Outside central lobe, max ||ψ|²−|ψ̄|²| relative error: {max_rel_err_out:.3e}\")\n\n    # ------------------------------------------------------------------\n    # Sanity: power check\n    # ------------------------------------------------------------------\n    dxi = xi[1] - xi[0]\n    P_aperture   = np.sum(np.abs(psi)**2)     * dxi\n    P_complement = np.sum(np.abs(psi_bar)**2) * dxi\n    P_total      = np.sum(np.abs(phi_tilde)**2) * dxi\n    print(f\"Power aperture   = {P_aperture:.4f}\")\n    print(f\"Power complement = {P_complement:.4f}\")\n    print(f\"Power total      = {P_total:.4f}\")\n    print(f\"(Aperture + Complement contributions, NOT their sum — \"\n          f\"Babinet is for FIELDS not intensities)\")\n\n    # ------------------------------------------------------------------\n    # Plot (skipped in VERIFY mode for speed)\n    # ------------------------------------------------------------------\n    if not VERIFY:\n        fig, axes = plt.subplots(2, 1, figsize=(10, 7))\n        I_psi     = np.abs(psi)**2\n        I_psi_bar = np.abs(psi_bar)**2\n        I_total   = np.abs(phi_tilde)**2\n\n        ax = axes[0]\n        ax.semilogy(xi, I_psi + 1e-30,     label=r\"$|\\psi|^2$ (aperture)\", color=\"#1971c2\")\n        ax.semilogy(xi, I_psi_bar + 1e-30, label=r\"$|\\bar\\psi|^2$ (complement)\", color=\"#e03131\")\n        ax.semilogy(xi, I_total + 1e-30,   label=r\"$|\\tilde\\varphi|^2$ (unobstructed)\", color=\"#2f9e44\",\n                    linestyle=\"--\")\n        ax.set_xlim(-0.5, 0.5)\n        ax.set_xlabel(r\"$\\xi$ (cycles / $\\lambda$)\")\n        ax.set_ylabel(\"Intensity (log scale)\")\n        ax.set_title(\"Babinet's principle: aperture vs complement\")\n        ax.legend()\n\n        ax2 = axes[1]\n        ax2.plot(xi, I_psi,     label=r\"$|\\psi|^2$\", color=\"#1971c2\")\n        ax2.plot(xi, I_psi_bar, label=r\"$|\\bar\\psi|^2$\", color=\"#e03131\", linestyle=\"--\")\n        ax2.set_xlim(0.02, 0.3)\n        ax2.set_xlabel(r\"$\\xi$ (cycles / $\\lambda$)\")\n        ax2.set_ylabel(\"Intensity\")\n        ax2.set_title(\"Outside central lobe: |ψ|² ≈ |ψ̄|² (diffraction fringes match)\")\n        ax2.legend()\n\n        plt.tight_layout()\n        plt.savefig(\"ex01_babinet.png\", dpi=100)\n        print(\"Plot saved to ex01_babinet.png\")\n"}, {"filename": "ex02_direct_and_diffracted_term_decomposition.py", "content": "\"\"\"\nExercise 2: Direct and Diffracted Term Decomposition\n=====================================================\nModule 1: Babinet's Principle and the Direct/Diffracted Decomposition\n\nIn this exercise you implement the exact decomposition from the paper (Eqs. 11–12):\n\n    |ψ(ξ)|² = d(ξ) + w(ξ)\n\nwhere:\n    d(ξ) ≜ |φ̃|²  − Re[ψ̄ φ̃*]        (direct term — ray-optical)\n    w(ξ) ≜ |ψ̄|²  − Re[ψ̄ φ̃*]        (diffracted term — wave-optical)\n\nKey insights to discover:\n  1. The decomposition is EXACT: |ψ|² = d + w to machine precision.\n  2. The direct term d contains ALL of P_A⊥ (total power through the aperture).\n  3. The diffracted term w integrates to ZERO (positive fringes cancel negative center).\n  4. w < 0 in the central lobe — this is expected, not a bug.\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Grid and beam parameters\n# ---------------------------------------------------------------------------\nN     = 512  if VERIFY else 8192\nsigma = 25.0\na     = 5.0\nL     = 15.0 * sigma\n\nq   = np.linspace(-L, L, N, endpoint=False)\ndq  = q[1] - q[0]\nxi  = np.fft.fftshift(np.fft.fftfreq(N, d=dq))\ndxi = xi[1] - xi[0]\n\nphi              = np.exp(-q**2 / (2.0 * sigma**2))\naperture_mask    = (np.abs(q) <= a).astype(float)\ncomplement_mask  = 1.0 - aperture_mask\n\n\ndef fraunhofer_1d(field, dq):\n    \"\"\"1-D Fraunhofer diffraction via FFT (provided).\"\"\"\n    return np.fft.fftshift(np.fft.fft(np.fft.ifftshift(field))) * dq\n\n\n# Pre-compute the three fields (provided — same as Exercise 1)\npsi       = fraunhofer_1d(phi * aperture_mask,   dq)   # aperture field ψ\npsi_bar   = fraunhofer_1d(phi * complement_mask, dq)   # complement field ψ̄\nphi_tilde = fraunhofer_1d(phi,                   dq)   # unobstructed φ̃\n\n\n# ---------------------------------------------------------------------------\n# ── STUDENT CODE SECTION ────────────────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\ndef compute_direct_term(phi_tilde, psi_bar):\n    \"\"\"Compute the direct term d = |φ̃|² − Re[ψ̄ φ̃*].\n\n    The direct term captures ray-optical propagation through the aperture.\n    It is concentrated in the central lobe and contains P_A⊥ total power.\n\n    Parameters\n    ----------\n    phi_tilde : ndarray, complex, shape (N,)\n        Full-plane FT of incident beam (unobstructed field).\n    psi_bar : ndarray, complex, shape (N,)\n        Field diffracted by the complement Ā⊥.\n\n    Returns\n    -------\n    d : ndarray, float, shape (N,)\n        Direct term. Should be non-negative in most of its support (except\n        possibly small oscillations from discretization).\n\n    Common mistakes\n    ---------------\n    - Writing Re[ψ̄ * φ̃] instead of Re[ψ̄ * φ̃*].\n      The formula has phi_tilde CONJUGATED: np.conj(phi_tilde), not np.conj(psi_bar).\n    - Returning a complex array — the result must be real (use np.real or\n      np.real(psi_bar * np.conj(phi_tilde)) not just psi_bar * np.conj(phi_tilde)).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 4–6 lines                        #\n    #                                                         #\n    # Formula: d = |phi_tilde|^2 - Re[psi_bar * conj(phi_tilde)]\n    # Step 1: cross_term = np.real(psi_bar * np.conj(phi_tilde))\n    # Step 2: d = np.abs(phi_tilde)**2 - cross_term\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compute_diffracted_term(psi_bar, phi_tilde):\n    \"\"\"Compute the diffracted term w = |ψ̄|² − Re[ψ̄ φ̃*].\n\n    The diffracted term captures wave-optical scattering into directions\n    outside the central lobe.  IMPORTANT: w can be NEGATIVE in the central\n    lobe — this is mathematically correct, not a bug.  Its total power is 0.\n\n    Parameters\n    ----------\n    psi_bar : ndarray, complex, shape (N,)\n        Field diffracted by the complement Ā⊥.\n    phi_tilde : ndarray, complex, shape (N,)\n        Full-plane FT of incident beam.\n\n    Returns\n    -------\n    w : ndarray, float, shape (N,)\n        Diffracted term. Will contain negative values near ξ=0.\n\n    Hints\n    -----\n    - Same cross-term as in compute_direct_term.\n    - Note: w = |psi_bar|^2 - cross_term.\n      Compare with d = |phi_tilde|^2 - cross_term. They share the cross-term!\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 4–6 lines                        #\n    #                                                         #\n    # Formula: w = |psi_bar|^2 - Re[psi_bar * conj(phi_tilde)]\n    # Step 1: cross_term = np.real(psi_bar * np.conj(phi_tilde))\n    # Step 2: w = np.abs(psi_bar)**2 - cross_term\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef verify_decomposition(psi_sq, d, w):\n    \"\"\"Check that |ψ|² = d + w pointwise.\n\n    Parameters\n    ----------\n    psi_sq : ndarray, float\n        True aperture intensity |ψ(ξ)|².\n    d : ndarray, float\n        Direct term.\n    w : ndarray, float\n        Diffracted term.\n\n    Returns\n    -------\n    max_rel_error : float\n        max|psi_sq − (d + w)| / max|psi_sq|. Should be < 1e-10.\n\n    Hints\n    -----\n    - Compute residual = psi_sq - (d + w)\n    - Normalize by max(psi_sq)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 4–5 lines                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef compute_term_powers(d, w, dxi, q, phi, aperture_mask, dq):\n    \"\"\"Integrate total power in each term and compare to theoretical values.\n\n    Expected results (paper Eqs. 13–14):\n      - Power in d  ≈  P_A⊥  = ∫_{A⊥} |φ(q)|² dq\n      - Power in w  ≈  0     (exactly zero by construction)\n\n    Parameters\n    ----------\n    d : ndarray, float\n        Direct term over xi grid.\n    w : ndarray, float\n        Diffracted term over xi grid.\n    dxi : float\n        Spatial-frequency sampling interval.\n    q : ndarray, float\n        Spatial grid.\n    phi : ndarray, float\n        Incident beam.\n    aperture_mask : ndarray, float\n        Binary mask for aperture A⊥.\n    dq : float\n        Spatial sampling interval.\n\n    Returns\n    -------\n    power_d : float\n        Total power in direct term d.\n    power_w : float\n        Total power in diffracted term w (should be ≈ 0).\n    P_aperture : float\n        Theoretical power through aperture: ∫_{A⊥} |φ|² dq.\n\n    Hints\n    -----\n    - power_d = np.sum(d) * dxi\n    - power_w = np.sum(w) * dxi\n    - P_aperture = np.sum(np.abs(phi * aperture_mask)**2) * dq\n    - The ratio power_d / P_aperture should be very close to 1.0\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 6–8 lines                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# ── PROVIDED: __main__ test harness ─────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    # ------------------------------------------------------------------\n    # Compute decomposition\n    # ------------------------------------------------------------------\n    d = compute_direct_term(phi_tilde, psi_bar)\n    w = compute_diffracted_term(psi_bar, phi_tilde)\n    psi_sq = np.abs(psi)**2\n\n    # ------------------------------------------------------------------\n    # Test 1: Exact decomposition\n    # ------------------------------------------------------------------\n    max_rel_err = verify_decomposition(psi_sq, d, w)\n    status = \"PASSED\" if max_rel_err < 1e-10 else \"FAILED\"\n    print(f\"|ψ|² = d + w max relative error: {max_rel_err:.3e}  [{status}]\")\n\n    # ------------------------------------------------------------------\n    # Test 2: Power accounting\n    # ------------------------------------------------------------------\n    power_d, power_w, P_aperture = compute_term_powers(d, w, dxi, q, phi,\n                                                        aperture_mask, dq)\n    ratio = power_d / P_aperture if P_aperture > 0 else float('nan')\n    status2 = \"PASSED\" if abs(ratio - 1.0) < 0.01 else \"FAILED\"\n    print(f\"Power in direct term:      {power_d:.4f}\")\n    print(f\"Power through aperture P_A⊥: {P_aperture:.4f}  (ratio = {ratio:.4f})  [{status2}]\")\n\n    status3 = \"PASSED\" if abs(power_w) < 1e-6 * P_aperture else \"FAILED\"\n    print(f\"Power in diffracted term w: {power_w:.3e} ≈ 0  [{status3}]\")\n\n    # ------------------------------------------------------------------\n    # Test 3: w is negative in the central lobe\n    # ------------------------------------------------------------------\n    threshold = 0.01 * np.max(np.abs(phi_tilde))\n    central_lobe = np.abs(phi_tilde) > threshold\n    n_neg_in_lobe = np.sum(w[central_lobe] < 0)\n    n_lobe_total  = np.sum(central_lobe)\n    print(f\"w < 0 in {n_neg_in_lobe}/{n_lobe_total} central-lobe points \"\n          f\"({100*n_neg_in_lobe/max(n_lobe_total,1):.0f}%) — expected behaviour\")\n\n    # ------------------------------------------------------------------\n    # Plot\n    # ------------------------------------------------------------------\n    if not VERIFY:\n        fig, axes = plt.subplots(2, 1, figsize=(10, 7))\n\n        ax = axes[0]\n        ax.plot(xi, psi_sq,  label=r\"$|\\psi|^2$\", color=\"#9c36b5\", lw=2)\n        ax.plot(xi, d,       label=r\"$d$ (direct)\", color=\"#1971c2\", lw=1.5)\n        ax.plot(xi, w,       label=r\"$w$ (diffracted)\", color=\"#e03131\", lw=1.5)\n        ax.axhline(0, color=\"gray\", lw=0.8, linestyle=\"--\")\n        ax.set_xlim(-0.15, 0.15)\n        ax.set_xlabel(r\"$\\xi$ (cycles/$\\lambda$)\")\n        ax.set_ylabel(\"Intensity\")\n        ax.set_title(r\"$|\\psi|^2 = d + w$  (central region)\")\n        ax.legend()\n\n        ax2 = axes[1]\n        ax2.plot(xi, psi_sq,  color=\"#9c36b5\", lw=2,   label=r\"$|\\psi|^2$\")\n        ax2.plot(xi, d,       color=\"#1971c2\", lw=1.5,  label=r\"$d$\")\n        ax2.plot(xi, w,       color=\"#e03131\", lw=1.5,  label=r\"$w$\")\n        ax2.axhline(0, color=\"gray\", lw=0.8, linestyle=\"--\")\n        ax2.set_xlim(0.01, 0.3)\n        ax2.set_xlabel(r\"$\\xi$ (cycles/$\\lambda$)\")\n        ax2.set_ylabel(\"Intensity\")\n        ax2.set_title(\"Diffraction fringes: d≈0, w=|ψ|²\")\n        ax2.legend()\n\n        plt.tight_layout()\n        plt.savefig(\"ex02_decomposition.png\", dpi=100)\n        print(\"Plot saved to ex02_decomposition.png\")\n"}, {"filename": "ex03_why_clamping_is_needed_energy_accounting.py", "content": "\"\"\"\nExercise 3: Why Clamping Is Needed — Energy Accounting\n=======================================================\nModule 1: Babinet's Principle and the Direct/Diffracted Decomposition\n\nThis is a DEBUGGING exercise.  A naive BSDF implementation uses w directly.\nYou will diagnose the two fundamental bugs this causes and explain why\nclamping w to ≥ 0 is the correct fix.\n\nThe two bugs:\n  BUG 1: w has NEGATIVE values — a BSDF must be non-negative (it's a ratio\n          of radiance to irradiance, both physical quantities ≥ 0).\n  BUG 2: w integrates to ZERO — you cannot normalize a function with zero\n          total power into a probability density function (PDF).\n\nYour tasks:\n  1. diagnose_negative_values  — find where w < 0 and report statistics.\n  2. explain_zero_power        — confirm ∫w dξ = 0 and why this breaks PDFs.\n  3. propose_fix               — explain in words why clamping resolves both.\n  4. verify_central_lobe_negativity — show w < 0 precisely where |φ̃| is large.\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Grid, beam, and pre-computed fields  (identical to Ex02 — provided)\n# ---------------------------------------------------------------------------\nN     = 512  if VERIFY else 8192\nsigma = 25.0\na     = 5.0\nL     = 15.0 * sigma\n\nq   = np.linspace(-L, L, N, endpoint=False)\ndq  = q[1] - q[0]\nxi  = np.fft.fftshift(np.fft.fftfreq(N, d=dq))\ndxi = xi[1] - xi[0]\n\nphi             = np.exp(-q**2 / (2.0 * sigma**2))\naperture_mask   = (np.abs(q) <= a).astype(float)\ncomplement_mask = 1.0 - aperture_mask\n\n\ndef fraunhofer_1d(field, dq):\n    return np.fft.fftshift(np.fft.fft(np.fft.ifftshift(field))) * dq\n\n\npsi       = fraunhofer_1d(phi * aperture_mask,   dq)\npsi_bar   = fraunhofer_1d(phi * complement_mask, dq)\nphi_tilde = fraunhofer_1d(phi,                   dq)\n\n# Compute the diffracted term w  (correct, from Ex02)\ncross_term = np.real(psi_bar * np.conj(phi_tilde))\nw = np.abs(psi_bar)**2 - cross_term\n\n\n# ---------------------------------------------------------------------------\n# NaiveDiffractionBSDF: the broken implementation (provided for reference)\n# ---------------------------------------------------------------------------\n\nclass NaiveDiffractionBSDF:\n    \"\"\"Broken BSDF that directly uses the raw diffracted term w.\n\n    This class intentionally contains bugs to motivate clamping.\n    Do NOT modify this class.\n    \"\"\"\n\n    def __init__(self, w, dxi):\n        self.w    = w\n        self.dxi  = dxi\n        self._total_power = np.sum(w) * dxi\n\n    def evaluate(self, xi_query):\n        \"\"\"Return w(xi) — will be negative for some xi (BUG 1).\"\"\"\n        idx = np.argmin(np.abs(xi_query - np.linspace(xi[0], xi[-1], len(self.w))))\n        return float(self.w[idx])\n\n    def try_normalize(self):\n        \"\"\"Attempt to produce a PDF — fails because total power = 0 (BUG 2).\"\"\"\n        if abs(self._total_power) < 1e-12:\n            raise ValueError(\n                f\"Cannot normalize: total power = {self._total_power:.3e} ≈ 0\"\n            )\n        return self.w / self._total_power\n\n\n# ---------------------------------------------------------------------------\n# ── STUDENT CODE SECTION ────────────────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\ndef diagnose_negative_values(w, xi):\n    \"\"\"Find and report where w < 0 in the diffracted term.\n\n    Parameters\n    ----------\n    w : ndarray, float\n        Diffracted term over xi grid.\n    xi : ndarray, float\n        Direction grid.\n\n    Returns\n    -------\n    n_negative : int\n        Number of grid points where w < 0.\n    frac_negative : float\n        Fraction of grid points where w < 0 (as a value in [0, 1]).\n    xi_range_negative : tuple(float, float)\n        (min_xi, max_xi) of the region where w < 0.\n\n    Hints\n    -----\n    - negative_mask = w < 0\n    - n_negative = np.sum(negative_mask)\n    - frac_negative = n_negative / len(w)\n    - For the range: xi[negative_mask].min() and xi[negative_mask].max()\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 8–10 lines                       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef explain_zero_power(w, dxi):\n    \"\"\"Compute total power in w and explain why it prevents PDF normalization.\n\n    Parameters\n    ----------\n    w : ndarray, float\n        Diffracted term.\n    dxi : float\n        Frequency-domain sampling interval.\n\n    Returns\n    -------\n    total_power : float\n        ∫ w(ξ) dξ — should be ≈ 0.\n    positive_power : float\n        ∫ max(w, 0) dξ — power in the positive (fringe) region.\n    negative_power : float\n        ∫ min(w, 0) dξ — power in the negative (central lobe) region.\n\n    Hints\n    -----\n    - total_power    = np.sum(w) * dxi\n    - positive_power = np.sum(np.maximum(w, 0)) * dxi\n    - negative_power = np.sum(np.minimum(w, 0)) * dxi\n    - Note: positive_power + negative_power == total_power (approximately)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 5–7 lines                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef propose_fix():\n    \"\"\"Return a string explaining why clamping w to ≥ 0 resolves both bugs.\n\n    Your explanation should address:\n      - Why clamp(w) ≥ 0 fixes BUG 1 (negative BSDF values).\n      - Why clamp(w) has positive total power, fixing BUG 2 (normalization).\n      - What the physical cost of clamping is (where does the extra power come from?).\n\n    Returns\n    -------\n    explanation : str\n        A 2–4 sentence explanation.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — write 2–4 sentences as a string        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef verify_central_lobe_negativity(w, phi_tilde, xi):\n    \"\"\"Show that w < 0 precisely where |φ̃| is non-negligible.\n\n    This function verifies the structural claim: the diffracted term is\n    negative IN THE CENTRAL LOBE (where the beam has power) and positive\n    OUTSIDE the central lobe (the diffraction fringes).\n\n    Parameters\n    ----------\n    w : ndarray, float\n    phi_tilde : ndarray, complex\n    xi : ndarray, float\n\n    Returns\n    -------\n    frac_negative_inside_lobe : float\n        Fraction of central-lobe points where w < 0. Should be close to 1.0.\n    frac_positive_outside_lobe : float\n        Fraction of out-of-lobe points where w > 0. Should be close to 1.0.\n\n    Hints\n    -----\n    - Define central lobe as: |phi_tilde| > threshold,\n      where threshold = 0.01 * np.max(np.abs(phi_tilde))\n    - inside_lobe  = np.abs(phi_tilde) >  threshold\n    - outside_lobe = np.abs(phi_tilde) <= threshold\n    - frac_negative_inside  = np.sum(w[inside_lobe]  < 0) / np.sum(inside_lobe)\n    - frac_positive_outside = np.sum(w[outside_lobe] > 0) / np.sum(outside_lobe)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 8–12 lines                       #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# ── PROVIDED: __main__ test harness ─────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    # ------------------------------------------------------------------\n    # Demonstrate the naive BSDF breaking\n    # ------------------------------------------------------------------\n    bsdf = NaiveDiffractionBSDF(w, dxi)\n    print(\"=== NaiveDiffractionBSDF diagnostics ===\")\n    try:\n        _ = bsdf.try_normalize()\n        print(\"Normalization succeeded (unexpected!)\")\n    except ValueError as e:\n        print(f\"BUG 2 confirmed: {e}\")\n\n    # ------------------------------------------------------------------\n    # Test 1: Negative values diagnosis\n    # ------------------------------------------------------------------\n    n_neg, frac_neg, xi_range = diagnose_negative_values(w, xi)\n    status1 = \"PASSED\" if n_neg > 0 else \"FAILED\"\n    print(f\"\\nBUG 1: w has negative values at N={n_neg} points \"\n          f\"({100*frac_neg:.1f}% of domain)  [{status1}]\")\n    print(f\"  Negative region spans xi in [{xi_range[0]:.4f}, {xi_range[1]:.4f}]\")\n\n    # ------------------------------------------------------------------\n    # Test 2: Zero power\n    # ------------------------------------------------------------------\n    total_pwr, pos_pwr, neg_pwr = explain_zero_power(w, dxi)\n    status2 = \"PASSED\" if abs(total_pwr) < 1e-10 else \"FAILED\"\n    print(f\"\\nBUG 2: total power of w = {total_pwr:.3e} ≈ 0, \"\n          f\"cannot normalize  [{status2}]\")\n    print(f\"  Positive (fringe) power:  {pos_pwr:.4f}\")\n    print(f\"  Negative (lobe) power:   {neg_pwr:.4f}\")\n    print(f\"  Sum check: {pos_pwr + neg_pwr:.3e}  (should equal total_pwr)\")\n\n    # ------------------------------------------------------------------\n    # Test 3: Fix explanation\n    # ------------------------------------------------------------------\n    explanation = propose_fix()\n    print(f\"\\nProposed fix:\\n  {explanation}\")\n    status3 = \"PASSED\" if isinstance(explanation, str) and len(explanation) > 50 else \"FAILED\"\n    print(f\"  [{status3}]\")\n\n    # ------------------------------------------------------------------\n    # Test 4: Central lobe structure\n    # ------------------------------------------------------------------\n    frac_neg_in, frac_pos_out = verify_central_lobe_negativity(w, phi_tilde, xi)\n    status4a = \"PASSED\" if frac_neg_in  > 0.5 else \"FAILED\"\n    status4b = \"PASSED\" if frac_pos_out > 0.8 else \"FAILED\"\n    print(f\"\\nNegative values occur inside central lobe: \"\n          f\"{100*frac_neg_in:.0f}% of lobe is negative  [{status4a}]\")\n    print(f\"Positive values outside lobe: \"\n          f\"{100*frac_pos_out:.0f}% of fringes are positive  [{status4b}]\")\n\n    # Overall pass\n    all_passed = all(s == \"PASSED\" for s in [status1, status2, status3, status4a, status4b])\n    print(f\"\\n{'All diagnostic checks PASSED' if all_passed else 'Some checks FAILED'}\")\n\n    # ------------------------------------------------------------------\n    # Plot\n    # ------------------------------------------------------------------\n    if not VERIFY:\n        fig, ax = plt.subplots(figsize=(10, 4))\n        ax.plot(xi, w, color=\"#e03131\", lw=1.5, label=r\"$w(\\xi)$\")\n        threshold = 0.01 * np.max(np.abs(phi_tilde))\n        ax.fill_between(xi, w, 0, where=(w < 0), alpha=0.3, color=\"#e03131\",\n                        label=\"w < 0 (bug)\")\n        ax.fill_between(xi, w, 0, where=(w > 0), alpha=0.3, color=\"#2f9e44\",\n                        label=\"w > 0 (fringes)\")\n        ax.axhline(0, color=\"gray\", lw=0.8)\n        ax.set_xlim(-0.2, 0.2)\n        ax.set_xlabel(r\"$\\xi$ (cycles/$\\lambda$)\")\n        ax.set_ylabel(r\"$w(\\xi)$\")\n        ax.set_title(\"Diffracted term w: negative in central lobe, positive in fringes\")\n        ax.legend()\n        plt.tight_layout()\n        plt.savefig(\"ex03_clamping_needed.png\", dpi=100)\n        print(\"Plot saved to ex03_clamping_needed.png\")\n"}, {"filename": "ex04_the_clamped_diffracted_term.py", "content": "\"\"\"\nExercise 4: The Clamped Diffracted Term\n========================================\nModule 1: Babinet's Principle and the Direct/Diffracted Decomposition\n\nIn this exercise you implement the Gaussian central-lobe modulator and\ncompute the clamped diffracted term ŵ from the paper (Eqs. 28–30):\n\n    χ(ζ) = exp(−‖ζ‖² / (2σ_ζ²)),   σ_ζ = √3\n\n    ψ̂_j = √(1 − χ(Ξ_j^{-T} ξ)) · ψ_j        (central lobe removed)\n\n    ŵ(ξ) = Σ_j |ψ̂_j(ξ)|²                     (clamped diffracted term)\n\nProperties of ŵ to verify:\n  1. ŵ(ξ) ≥ 0 everywhere (non-negative — ready for BSDF use)\n  2. ŵ(ξ) = w(ξ) outside the central lobe (fringes preserved)\n  3. Total power in ŵ is positive (can be normalised as a PDF)\n\nIn this 1-D exercise, Ξ_j is the identity transform (a horizontal edge),\nso Ξ_j^{-T} ξ = ξ.  In Module 2–3 you will see the full 2-D transform.\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib\nmatplotlib.use(\"Agg\")\nimport matplotlib.pyplot as plt\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Grid and fields  (provided)\n# ---------------------------------------------------------------------------\nN     = 512  if VERIFY else 8192\nsigma = 25.0\na     = 5.0\nL     = 15.0 * sigma\n\nq   = np.linspace(-L, L, N, endpoint=False)\ndq  = q[1] - q[0]\nxi  = np.fft.fftshift(np.fft.fftfreq(N, d=dq))\ndxi = xi[1] - xi[0]\n\nphi             = np.exp(-q**2 / (2.0 * sigma**2))\naperture_mask   = (np.abs(q) <= a).astype(float)\ncomplement_mask = 1.0 - aperture_mask\n\n\ndef fraunhofer_1d(field, dq):\n    return np.fft.fftshift(np.fft.fft(np.fft.ifftshift(field))) * dq\n\n\npsi       = fraunhofer_1d(phi * aperture_mask,   dq)\npsi_bar   = fraunhofer_1d(phi * complement_mask, dq)\nphi_tilde = fraunhofer_1d(phi,                   dq)\n\n# Diffracted term w from Ex02  (provided)\ncross_term = np.real(psi_bar * np.conj(phi_tilde))\nw = np.abs(psi_bar)**2 - cross_term\n\n# In 1-D, the single edge-diffracted wave is just psi_bar itself\n# (In Module 2-3 you will split this into per-edge contributions)\npsi_j_list = [psi_bar]   # list of edge-diffracted amplitudes\n\n# Edge length in units of λ (needed for the Ξ_j^{-T} transform in the exercise)\n# In the paper: ζ = Ξ_j^{-T} ξ scales by edge geometry.  For a 1-D slit with\n# half-width a, the boundary \"edge\" has effective length e = 2a.\ne_length = 2.0 * a   # = 10λ\n\n\n# ---------------------------------------------------------------------------\n# ── STUDENT CODE SECTION ────────────────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\ndef chi_modulator(xi, sigma_zeta=np.sqrt(3)):\n    \"\"\"Gaussian central-lobe modulator χ(ζ) = exp(−ζ²/(2σ_ζ²)).\n\n    This function suppresses the central lobe (small ξ) and equals 1\n    far from the center, so √(1−χ) ≈ 0 at ξ=0 and √(1−χ) ≈ 1 in the fringes.\n\n    Parameters\n    ----------\n    xi : ndarray, float\n        Direction grid (or ζ in edge-local coordinates).\n    sigma_zeta : float\n        Width of the Gaussian.  Paper uses σ_ζ = √3.\n        IMPORTANT: this is σ_ζ = sqrt(3) ≈ 1.732, NOT σ_ζ = 3.\n\n    Returns\n    -------\n    chi : ndarray, float, values in [0, 1]\n\n    Hints\n    -----\n    - chi = np.exp(-xi**2 / (2 * sigma_zeta**2))\n    - At xi=0: chi = 1 → √(1-chi) = 0  (central lobe fully suppressed)\n    - At large |xi|: chi ≈ 0 → √(1-chi) ≈ 1  (fringes untouched)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 2–3 lines                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef remove_central_lobe(psi_j, xi, Xi_inv_T=None, sigma_zeta=np.sqrt(3)):\n    \"\"\"Remove central lobe from an edge-diffracted amplitude.\n\n    Computes ψ̂_j = √(1 − χ(Ξ_j^{-T} ξ)) · ψ_j\n\n    The modulator is applied to the AMPLITUDE (not intensity) so that\n    squaring gives (1−χ)|ψ_j|², which is the intensity with lobe removed.\n\n    Parameters\n    ----------\n    psi_j : ndarray, complex, shape (N,)\n        Edge-diffracted amplitude for one edge.\n    xi : ndarray, float, shape (N,)\n        Direction grid.\n    Xi_inv_T : None or callable\n        If None, treat as identity transform (1-D case: ζ = ξ).\n        If callable, apply Xi_inv_T(xi) to convert to edge-local coordinates.\n    sigma_zeta : float\n        Width parameter for χ. Default = √3.\n\n    Returns\n    -------\n    psi_hat_j : ndarray, complex, shape (N,)\n        Edge-diffracted amplitude with central lobe removed.\n\n    Common mistakes\n    ---------------\n    - Applying χ to the INTENSITY |ψ_j|² instead of the amplitude ψ_j.\n      Correct: psi_hat = sqrt(1-chi) * psi_j\n      Wrong:   psi_hat = (1-chi) * np.abs(psi_j)**2  ← applies to intensity\n\n    Hints\n    -----\n    - If Xi_inv_T is None: zeta = xi  (identity)\n    - Else: zeta = Xi_inv_T(xi)\n    - chi = chi_modulator(zeta, sigma_zeta)\n    - psi_hat_j = np.sqrt(1.0 - chi) * psi_j\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 5–7 lines                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef clamped_diffracted_term(psi_hat_list):\n    \"\"\"Compute ŵ = Σ_j |ψ̂_j|².\n\n    The clamped diffracted term is a sum of intensity contributions from each\n    edge.  Because it is a sum of squared magnitudes, ŵ ≥ 0 everywhere.\n\n    Parameters\n    ----------\n    psi_hat_list : list of ndarray, complex\n        List of edge-diffracted amplitudes with central lobe removed.\n\n    Returns\n    -------\n    w_hat : ndarray, float\n        Clamped diffracted term.  Always ≥ 0.\n\n    Hints\n    -----\n    - w_hat = sum(np.abs(psi_hat)**2 for psi_hat in psi_hat_list)\n    - Initialise with zeros_like to handle an empty list gracefully.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 3–5 lines                        #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\ndef verify_clamped_properties(w_hat, w, phi_tilde, xi, dxi):\n    \"\"\"Verify the three key properties of ŵ.\n\n    Returns a dict with:\n      'min_value'           : minimum value of ŵ  (should be ≥ 0)\n      'max_outside_error'   : max|ŵ − w| outside central lobe (should be small)\n      'total_power'         : ∫ ŵ dξ  (should be > 0)\n      'w_power_outside'     : ∫ w[outside] dξ (should ≈ ∫ ŵ[outside] dξ)\n\n    Parameters\n    ----------\n    w_hat : ndarray, float\n    w : ndarray, float\n    phi_tilde : ndarray, complex\n    xi : ndarray, float\n    dxi : float\n\n    Returns a dict with keys:\n      'min_value'           : float, minimum of ŵ (should be ≥ 0)\n      'total_power'         : float, ∫ ŵ dξ (should be > 0)\n      'w_power_outside'     : float, ∫ w[outside_lobe] dξ\n      'what_power_outside'  : float, ∫ ŵ[outside_lobe] dξ\n\n    Hints\n    -----\n    - Define central lobe as: |phi_tilde| > 0.01 * max|phi_tilde|\n    - outside_lobe = ~central_lobe  (boolean mask)\n    - min_value = float(np.min(w_hat))\n    - total_power = float(np.sum(w_hat) * dxi)\n    - Use outside_lobe to compute the out-of-lobe powers\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE — about 10–14 lines                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# ── PROVIDED: __main__ test harness ─────────────────────────────────────────\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    # ------------------------------------------------------------------\n    # Compute ψ̂_j for each edge and build ŵ\n    # Apply edge-length scaling: ζ = e_length * ξ  (Ξ_j^{-T} in 1-D)\n    # ------------------------------------------------------------------\n    Xi_inv_T = lambda xi_arr: xi_arr * e_length\n    psi_hat_list = [remove_central_lobe(psi_j, xi, Xi_inv_T=Xi_inv_T)\n                    for psi_j in psi_j_list]\n    w_hat = clamped_diffracted_term(psi_hat_list)\n\n    # ------------------------------------------------------------------\n    # Verify properties\n    # ------------------------------------------------------------------\n    props = verify_clamped_properties(w_hat, w, phi_tilde, xi, dxi)\n\n    # Test 1: non-negativity\n    status1 = \"PASSED\" if props['min_value'] >= -1e-14 else \"FAILED\"\n    print(f\"ŵ minimum value: {props['min_value']:.3e} ≥ 0  [{status1}]\")\n\n    # Test 2: central lobe suppression — ŵ(ξ=0) should be ≪ max(ŵ)\n    idx_zero = np.argmin(np.abs(xi))\n    w_hat_at_zero = float(w_hat[idx_zero])\n    w_hat_max     = float(np.max(w_hat))\n    suppression_ratio = w_hat_at_zero / (w_hat_max + 1e-30)\n    status2 = \"PASSED\" if suppression_ratio < 0.01 else \"FAILED\"\n    print(f\"ŵ central lobe suppression: ŵ(0)/max(ŵ) = {suppression_ratio:.3e} < 0.01  [{status2}]\")\n\n    # Test 3: positive total power\n    status3 = \"PASSED\" if props['total_power'] > 0 else \"FAILED\"\n    print(f\"Total power in ŵ: {props['total_power']:.4f} (positive, \"\n          f\"ready for BSDF normalization)  [{status3}]\")\n\n    print(f\"Total power in w:  {np.sum(w)*dxi:.3e}  (was zero before clamping)\")\n    print(f\"ŵ range: [{np.min(w_hat):.3e}, {np.max(w_hat):.3e}]\")\n\n    all_passed = all(s == \"PASSED\" for s in [status1, status2, status3])\n    print(f\"\\n{'All checks PASSED' if all_passed else 'Some checks FAILED'}\")\n\n    # ------------------------------------------------------------------\n    # Plot\n    # ------------------------------------------------------------------\n    if not VERIFY:\n        fig, axes = plt.subplots(2, 1, figsize=(10, 7))\n\n        ax = axes[0]\n        ax.plot(xi, w,     label=r\"$w$ (diffracted, has negatives)\", color=\"#e03131\", lw=1.5)\n        ax.plot(xi, w_hat, label=r\"$\\hat{w}$ (clamped, $\\geq 0$)\", color=\"#2f9e44\",  lw=1.5,\n                linestyle=\"--\")\n        ax.axhline(0, color=\"gray\", lw=0.8)\n        ax.set_xlim(-0.15, 0.15)\n        ax.set_xlabel(r\"$\\xi$\")\n        ax.set_ylabel(\"Intensity\")\n        ax.set_title(\"Central lobe region: w vs ŵ\")\n        ax.legend()\n\n        ax2 = axes[1]\n        ax2.plot(xi, w,     color=\"#e03131\", lw=1.5, label=r\"$w$\")\n        ax2.plot(xi, w_hat, color=\"#2f9e44\", lw=1.5, linestyle=\"--\", label=r\"$\\hat{w}$\")\n        ax2.set_xlim(0.02, 0.3)\n        ax2.set_xlabel(r\"$\\xi$\")\n        ax2.set_ylabel(\"Intensity\")\n        ax2.set_title(\"Fringes: w ≈ ŵ (preserved exactly outside lobe)\")\n        ax2.legend()\n\n        plt.tight_layout()\n        plt.savefig(\"ex04_clamped_term.png\", dpi=100)\n        print(\"Plot saved to ex04_clamped_term.png\")\n"}]}, "module_02_edgebased_diffraction_the_core_formulation": {"content": "# Module 2: Edge-Based Diffraction: The Core Formulation\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [Running Example: The Single Slit Revisited](#running-example-the-single-slit-revisited)\n- [The Divergence Theorem: From Area to Boundary](#the-divergence-theorem-from-area-to-boundary)\n- [Edge Geometry: Midpoints, Directions, and Outward Normals](#edge-geometry-midpoints-directions-and-outward-normals)\n- [The Piecewise-Linear Approximation of the Incident Beam](#the-piecewise-linear-approximation-of-the-incident-beam)\n- [The Linear Transform Ξ: Normalizing Edge Geometry](#the-linear-transform-ξ-normalizing-edge-geometry)\n- [The Auxiliary Functions α₁ and α₂](#the-auxiliary-functions-α₁-and-α₂)\n- [The Edge-Diffracted Wave ψⱼ: Putting It All Together](#the-edge-diffracted-wave-ψⱼ-putting-it-all-together)\n- [Why Opposing Edges Cancel: The Symmetry Argument](#why-opposing-edges-cancel-the-symmetry-argument)\n- [Superposing Edge Waves: Single Slit and Double Slit](#superposing-edge-waves-single-slit-and-double-slit)\n- [The Clamped Diffracted Term](#the-clamped-diffracted-term)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: What This Enables](#synthesis-what-this-enables)\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. Apply the divergence theorem to convert the 2D Fraunhofer integral over a polygon into a 1D boundary integral — and explain *why* this dimensional reduction is the key enabling step.\n2. Understand the piecewise-linear approximation (PLA) of the incident beam, including the role of the depth phasor $e^{-ikz}$ for non-planar apertures.\n3. Define the linear transform $\\Xi_j$ for each boundary edge, and explain what it encodes about edge geometry.\n4. Implement and use the auxiliary functions $\\alpha_1(\\zeta)$ and $\\alpha_2(\\zeta)$, including their numerical stability requirements.\n5. Compute the edge-diffracted wave $\\psi_j$ for a single edge in closed form.\n6. Explain why opposing edges of interior triangles cancel exactly, and why only boundary edges $\\delta A^\\perp$ contribute.\n7. Reproduce the single-slit and double-slit diffraction patterns by superposing edge-diffracted waves.\n\n---\n\n## Running Example: The Single Slit Revisited\n\nIn Module 0 we computed single-slit diffraction using the FFT. In Module 1 we saw that Babinet's principle lets us replace the aperture integral with its complement. Now in Module 2 we'll take the central step: converting that 2D integral over a polygon into a *sum of 1D integrals over edges*, each one having a closed-form solution.\n\nOur running example will be a single slit of width $2a$ illuminated by a Gaussian beam with spatial standard deviation $\\sigma = 25\\lambda$. The slit is defined by two boundary edges — one at $x = +a$ and one at $x = -a$. By the end of this module, we'll show that summing just these two closed-form edge contributions exactly reproduces the Fraunhofer diffraction pattern.\n\nLet's fix units: wavelength $\\lambda = 1$ (dimensionless), so wavenumber $k = 2\\pi$, slit half-width $a = 3\\lambda = 3$. Observation direction $\\xi$ corresponds to scattering angle $\\theta = \\arcsin(\\xi)$.\n\n---\n\n## The Divergence Theorem: From Area to Boundary\n\n### Starting Point: The 2D Integral Over the Complement\n\nRecall from Module 1 that the diffracted field comes from integrating over the aperture *complement* $A^\\perp$ (the obstacle):\n\n$$\\bar{\\psi}(\\boldsymbol{\\xi}) \\approx \\frac{k}{2\\pi R} \\iint_{A^\\perp} d^2\\boldsymbol{q}^\\perp \\, \\varphi^{PL}(\\boldsymbol{q}^\\perp) \\, e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{q}^\\perp} \\tag{21}$$\n\nHere $\\boldsymbol{\\xi}$ is the 2D scattering direction (projected onto the screen plane), $\\varphi^{PL}$ is the piecewise-linear approximation of the incident beam, and $R$ is the observation distance (which will drop out).\n\nFor a triangular mesh, $A^\\perp$ is a union of projected triangles. Computing this 2D integral numerically requires $O(\\text{area})$ quadrature points — an $O(N^2)$ problem if we discretize at wavelength scale. The paper's key move is to convert this to a *1D* problem.\n\n### Applying the Divergence Theorem\n\nThe divergence theorem in 2D says: for any vector field $\\mathbf{F}$,\n\n$$\\iint_\\Omega \\nabla \\cdot \\mathbf{F} \\, dA = \\oint_{\\partial\\Omega} \\mathbf{F} \\cdot \\hat{n} \\, ds$$\n\nThe paper exploits this by writing the integrand $f(\\boldsymbol{q}) = \\varphi^{PL}(\\boldsymbol{q}) e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{q}}$ as a divergence. Because $\\varphi^{PL}$ is piecewise linear, we can express it as the divergence of a vector field whose boundary integral has a closed form. The result (derived in the paper's supplemental Section S2) is:\n\n$$\\bar{\\psi}(\\boldsymbol{\\xi}) \\approx \\frac{i}{2\\pi R \\xi^2} \\oint_{\\delta A^\\perp} ds \\, (\\hat{m} \\cdot \\boldsymbol{\\xi}) \\, \\varphi^{PL}(\\boldsymbol{q}^\\perp) \\, e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{q}^\\perp} \\tag{22}$$\n\nwhere $\\xi = |\\boldsymbol{\\xi}|$ and $\\hat{m}$ is the outward-pointing normal of the boundary $\\delta A^\\perp$.[^1]\n\n**What changed?**\n- The 2D domain integral $\\iint_{A^\\perp}$ became a 1D boundary integral $\\oint_{\\delta A^\\perp}$.\n- We picked up a factor $i/(2\\pi R\\xi^2)$ — this is the fingerprint of the integration-by-parts step.\n- The integrand still involves $\\varphi^{PL}$ and the phase factor $e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{q}}$, but only along the boundary.\n- The boundary $\\delta A^\\perp$ is composed of *edges* — specifically, edges that belong to exactly one front-facing triangle.\n\n**Why this is profound.** For a triangular mesh with $N$ triangles, $A^\\perp$ has $O(N)$ area but $\\delta A^\\perp$ has only $O(\\sqrt{N})$ perimeter. More importantly: *each edge's contribution has a closed-form solution*, so we need no numerical integration at all.\n\n![Divergence theorem: area integral to boundary integral](diagrams/divergence_theorem.svg)\n\n**Check your understanding:** What happens to Eq. (22) as $\\boldsymbol{\\xi} \\to 0$? The $1/\\xi^2$ factor seems to blow up. Yet physically the integral should be finite (it's just a rescaled version of the aperture area). How is this resolved? *(Hint: look at the factor $\\hat{m}\\cdot\\boldsymbol{\\xi}$ in the numerator. At $\\boldsymbol{\\xi}\\to 0$, this goes to zero — and there's a cancellation from opposite edges. You'll verify this numerically in Exercise 1.)*\n\n[^1]: The outward normal $\\hat{m}$ points *into* the aperture $A^\\perp$ — away from the obstacle interior. Getting this direction wrong is the most common bug in implementations.\n\n---\n\n## Edge Geometry: Midpoints, Directions, and Outward Normals\n\nEach boundary edge $j$ is parameterized by three quantities:\n\n- **Midpoint** $\\boldsymbol{v}_j \\in \\mathbb{R}^2$: the center of the edge\n- **Edge vector** $\\boldsymbol{e}_j \\in \\mathbb{R}^2$: points from one endpoint to the other, with $e_j = |\\boldsymbol{e}_j|$\n- **Outward normal** $\\hat{m}_j$: perpendicular to $\\boldsymbol{e}_j$, pointing into the aperture $A^\\perp$\n\nThe edge's two endpoints are then $\\boldsymbol{v}_j \\mp \\frac{1}{2}\\boldsymbol{e}_j$.[^2]\n\nFor a triangle with vertices $\\boldsymbol{u}_1, \\boldsymbol{u}_2, \\boldsymbol{u}_3$ (counterclockwise winding), the $j$-th edge is:\n\n$$\\boldsymbol{e}_{t,j} = \\boldsymbol{u}_{t,j-1} - \\boldsymbol{u}_{t,j+1}, \\qquad \\hat{m}_{t,j} = \\pm \\frac{\\boldsymbol{e}_{t,j} \\times \\hat{z}}{|\\boldsymbol{e}_{t,j} \\times \\hat{z}|} \\tag{18}$$\n\n(indices mod 3). The $\\times \\hat{z}$ rotates by 90°; the sign depends on winding.[^2]\n\nIn Python:\n```python\ndef compute_edge_params(u1, u2, u3):\n    \"\"\"Returns (v, e, m_hat) for each of the 3 edges of a CCW triangle.\"\"\"\n    verts = np.array([u1, u2, u3])\n    edges = []\n    for j in range(3):\n        # Edge j connects u_{j-1} and u_{j+1} (mod 3)\n        e_j = verts[(j-1) % 3] - verts[(j+1) % 3]\n        v_j = 0.5 * (verts[(j-1) % 3] + verts[(j+1) % 3])\n        # Outward normal: rotate e_j by +90 degrees (CCW winding)\n        m_hat = np.array([-e_j[1], e_j[0]])\n        m_hat /= np.linalg.norm(m_hat)\n        edges.append((v_j, e_j, m_hat))\n    return edges\n```\n\n[^2]: The convention $a_j, b_j$ at endpoints $\\boldsymbol{v}_j - \\frac{1}{2}\\boldsymbol{e}_j$ and $\\boldsymbol{v}_j + \\frac{1}{2}\\boldsymbol{e}_j$ respectively is fixed by the paper. If you swap $a_j \\leftrightarrow b_j$, you get the wrong sign on $\\alpha_1$.\n\n---\n\n## The Piecewise-Linear Approximation of the Incident Beam\n\nThe incident beam $\\varphi$ is a smooth, spatially-localized field (e.g., Gaussian). To make the integral in Eq. (22) analytically tractable, the paper approximates $\\varphi$ by interpolating it linearly over each triangle:\n\n$$\\varphi^{PL}(\\boldsymbol{q}^\\perp) \\triangleq \\begin{cases} \\sum_j \\gamma_{t,j} \\, \\varphi_{t,j} & \\text{if } \\boldsymbol{q}^\\perp \\in T^\\perp_t \\text{ for some } t \\\\ 0 & \\text{otherwise} \\end{cases} \\tag{19}$$\n\nwith vertex values:\n\n$$\\varphi_{t,j} \\triangleq \\varphi(\\boldsymbol{u}_{t,j}) \\, e^{-ikz(\\boldsymbol{u}_{t,j})} \\tag{20}$$\n\nHere $\\gamma_{t,j}$ are barycentric coordinates, and $z(\\boldsymbol{u})$ is the depth of vertex $\\boldsymbol{u}$ before projection onto the virtual screen (with $z=0$ at the screen, $z>0$ behind it).\n\n### The Depth Phasor\n\nThe factor $e^{-ikz(\\boldsymbol{u})}$ is crucial for non-planar apertures. When a triangle is not perfectly in the plane of the screen, different parts of it are at different depths. A wave traveling distance $z$ extra picks up a phase $e^{-ikz}$. Ignoring this would give wrong fringe positions for slanted or curved apertures.\n\nFor our simple 2D examples (everything in the $z=0$ plane), this factor is 1. But in Exercise 4 we'll see it enter via the vertex field values $a_j, b_j$.\n\n### When is the PLA Accurate?\n\nThe PLA replaces $\\varphi$ with its linear interpolant over each triangle. This is accurate when $\\varphi$ doesn't vary much over a triangle — i.e., when triangle edge lengths don't exceed the beam's spatial standard deviation. For $\\sigma = 25\\lambda$, edges up to $\\sim 25\\lambda$ are fine. If triangles are coarser, the paper says to tessellate them on-the-fly.\n\n**Check your understanding:** Suppose the incident beam has $\\sigma = 5\\lambda$, but the mesh triangles have edges of length $20\\lambda$. The PLA would be inaccurate. What would the symptom look like in the diffraction pattern?\n\n---\n\n## The Linear Transform Ξ: Normalizing Edge Geometry\n\nEach edge $j$ defines a 2×2 linear transform $\\Xi_j$ that \"normalizes\" the edge so that $\\alpha_1, \\alpha_2$ can be universal, edge-independent functions. The *inverse* transform is defined directly:\n\n$$\\Xi_j^{-1} \\triangleq \\frac{k}{2} \\begin{pmatrix} \\hat{e}_j^\\top \\\\ \\hat{m}_j^\\top \\end{pmatrix} \\cdot e_j = \\frac{k}{2} \\begin{pmatrix} \\boldsymbol{e}_j^\\top / e_j \\\\ \\hat{m}_j^\\top \\end{pmatrix} \\cdot e_j \\tag{25}$$\n\nWait, let me write this more carefully. Eq. (25) in the paper reads:\n\n$$\\Xi_j^{-1} \\triangleq k \\begin{pmatrix} \\boldsymbol{e}_j^\\top \\\\ e_j \\hat{m}_j^\\top \\end{pmatrix}$$\n\nSo $\\Xi_j^{-1}$ is a 2×2 matrix whose rows are:\n- Row 1: $k \\boldsymbol{e}_j^\\top$ (the edge vector scaled by $k$)\n- Row 2: $k e_j \\hat{m}_j^\\top$ (the edge normal scaled by $k \\cdot e_j$)\n\nThe columns of $\\Xi_j^{-1}$ act on $\\boldsymbol{\\xi} \\in \\mathbb{R}^2$ to produce $\\boldsymbol{\\zeta} = \\Xi_j^{-T} \\boldsymbol{\\xi} \\in \\mathbb{R}^2$.\n\nActually, re-reading the paper: Eq. (25) says $\\Xi_j^{-1}$ has rows $\\boldsymbol{e}_j/e_j$ and $\\hat{m}_j$, both scaled by $k/2 \\cdot e_j$:\n\n$$\\Xi_j^{-1} = \\frac{k}{2}\\begin{pmatrix} \\boldsymbol{e}_j^\\top \\\\ e_j \\hat{m}_j^\\top \\end{pmatrix}$$\n\nLet's work out what this does. Given $\\boldsymbol{\\xi} = (\\xi_x, \\xi_y)$, the argument passed to $\\alpha_{1,2}$ is:\n\n$$\\boldsymbol{\\zeta} = \\Xi_j^{-T} \\boldsymbol{\\xi} = \\frac{k}{2}\\begin{pmatrix} \\boldsymbol{e}_j \\cdot \\boldsymbol{\\xi} \\\\ e_j (\\hat{m}_j \\cdot \\boldsymbol{\\xi}) \\end{pmatrix}$$\n\nSo:\n- $\\zeta_x = \\frac{k}{2} (\\boldsymbol{e}_j \\cdot \\boldsymbol{\\xi})$: the projection of $\\boldsymbol{\\xi}$ onto the edge direction, scaled by $k e_j / 2$\n- $\\zeta_y = \\frac{k}{2} e_j (\\hat{m}_j \\cdot \\boldsymbol{\\xi})$: the projection of $\\boldsymbol{\\xi}$ onto the edge normal, scaled by $k e_j / 2$\n\n**Physical interpretation:** $\\zeta_x/\\pi$ is the edge length measured in units of $1/(k\\xi_\\parallel)$, where $\\xi_\\parallel$ is the component of $\\boldsymbol{\\xi}$ along the edge. This normalized coordinate is exactly what makes $\\alpha_1, \\alpha_2$ universal: they don't know about the edge length or wavenumber; that information is absorbed into $\\boldsymbol{\\zeta}$.\n\n**The determinant** $|\\Xi_j| = 1/|\\Xi_j^{-1}| = 2/(k e_j)$. This is the factor that correctly weights each edge's contribution: longer edges contribute more power (proportional to $e_j$), shorter edges less.[^3]\n\n![Edge geometry and the Ξ transform](diagrams/xi_transform.svg)\n\nIn code:\n\n```python\ndef compute_xi_transform(e_vec, m_hat, k):\n    \"\"\"\n    e_vec: 2D edge vector (not unit-normalized)\n    m_hat: unit outward normal\n    k: wavenumber\n    Returns: Xi_inv (2x2), Xi_inv_T (2x2), det_Xi (scalar)\n    \"\"\"\n    e_len = np.linalg.norm(e_vec)\n    # Rows of Xi_inv: [e_vec^T, e_len * m_hat^T] * k/2\n    Xi_inv = (k / 2) * np.array([e_vec, e_len * m_hat])  # shape (2, 2)\n    Xi_inv_T = Xi_inv.T\n    det_Xi_inv = np.linalg.det(Xi_inv)\n    det_Xi = 1.0 / det_Xi_inv  # = 2 / (k * e_len)\n    return Xi_inv, Xi_inv_T, det_Xi\n```\n\n[^3]: Why is $|\\Xi_j| = 2/(ke_j)$? The matrix $\\Xi_j^{-1} = \\frac{k}{2}[\\boldsymbol{e}_j; e_j\\hat{m}_j]$ has determinant $\\frac{k^2}{4} e_j^2 (\\hat{e}_j \\times \\hat{m}_j)$. Since $\\hat{e}_j \\perp \\hat{m}_j$ we get $\\hat{e}_j \\times \\hat{m}_j = 1$, so $|\\Xi_j^{-1}| = k^2 e_j^2/4$ and $|\\Xi_j| = 4/(k^2 e_j^2)$... hmm let me recalculate. Actually $\\Xi_j^{-1}$ has rows $[ke_j^x/2, ke_j^y/2]$ and $[ke_j m_x^j/2, ke_j m_y^j/2]$. Det = $(k/2)(ke_j/2)(e_j^x m_y^j - e_j^y m_x^j) = k^2 e_j/4 \\cdot e_j \\sin(90°) = k^2 e_j^2/4$. So $|\\Xi_j| = 4/(k^2e_j^2)$. But the paper says $k/|\\Xi_j|$ appears — so effectively the normalization works out to $k \\cdot |\\Xi_j| = 4/(ke_j^2)$ scaled by $e_j$ from the integration measure. The key point is that $|\\Xi_j|$ encodes the Jacobian of the coordinate change, and the product $k/|\\Xi_j|$ gives the overall normalization that makes $\\psi_j$ have the right units.\n\n---\n\n## The Auxiliary Functions α₁ and α₂\n\nThese are the two universal functions at the heart of the edge-diffraction formula:\n\n$$\\alpha_1(\\boldsymbol{\\zeta}) \\triangleq \\frac{\\zeta_y}{2\\pi \\zeta^2 \\zeta_x} \\left(\\cos\\frac{\\zeta_x}{2} - \\mathrm{sinc}\\frac{\\zeta_x}{2}\\right) \\tag{26}$$\n\n$$\\alpha_2(\\boldsymbol{\\zeta}) \\triangleq \\frac{\\zeta_y}{2\\pi \\zeta^2} \\, \\mathrm{sinc}\\frac{\\zeta_x}{2} \\tag{27}$$\n\nwhere $\\mathrm{sinc}(x) \\triangleq \\sin(x)/x$ (the *unnormalized* sinc), $\\zeta^2 = \\zeta_x^2 + \\zeta_y^2$, and the $\\zeta_x \\to 0$ limit is taken by L'Hôpital.[^4]\n\n### Where Do These Come From?\n\nThe derivation (in Section S2 of the paper's supplemental) works as follows. For a single edge $j$ with the PLA, the boundary integral in Eq. (22) along the edge parameterized by arc length $s \\in [-e_j/2, +e_j/2]$ is:\n\n$$\\psi_j(\\boldsymbol{\\xi}) \\propto \\int_{-e_j/2}^{+e_j/2} ds \\, (\\hat{m}_j \\cdot \\boldsymbol{\\xi}) \\, \\left[a_j \\frac{e_j/2 - s}{e_j} + b_j \\frac{e_j/2 + s}{e_j}\\right] e^{-ik\\boldsymbol{\\xi}\\cdot(\\boldsymbol{v}_j + s\\hat{e}_j)}$$\n\nThe PLA makes the integrand *linear* in $s$, which means we can evaluate the integral exactly. After substituting $\\boldsymbol{\\zeta} = \\X
