    <script id="course-data" type="application/json">{"courseName": "freespace_diffraction_bsdf_from_fourier_optics_to", "detail": {"title": "Free-Space Diffraction BSDF: From Fourier Optics to Path-Tracer-Ready Scattering", "description": "A hands-on course that rebuilds, from scratch, the free-space diffraction BSDF of Steinberg et al. (SIGGRAPH 2024). Starting from the Fourier-transform formulation of Fraunhofer diffraction—territory familiar to any physicist—we progressively derive and implement the edge-based closed-form diffraction formula, construct the BSDF, and build an importance sampling strategy. Every exercise produces a runnable Python script that validates its output against known diffraction patterns (single slit, double slit, polygonal apertures). By the final module you will have a complete, importance-sampled diffraction BSDF that reproduces the paper's key results, all without touching a full renderer.", "modules": [{"index": 0, "title": "Fraunhofer Diffraction as a Fourier Transform", "description": "Bridge from your physics background to the computational optics setting of the paper. We implement 1D and 2D Fraunhofer diffraction as discrete Fourier transforms, validate against analytic sinc patterns, and introduce the Gaussian beam model that the paper uses throughout. This module also establishes the energy-conservation identity (Parseval's theorem) that underpins every later derivation.", "dir_name": "module_00_fraunhofer_diffraction_as_a_fourier_transform", "exercises": ["ex01_1d_singleslit_fraunhofer_diffraction.py", "ex02_2d_rectangular_and_circular_aperture_diffraction.py"], "depends_on": []}, {"index": 1, "title": "Babinet's Principle and the Direct/Diffracted Decomposition", "description": "Implement the paper's key architectural insight: using Babinet's principle to decompose the diffracted field into a ray-optical direct term (handled by standard path tracing) and a wave-optical diffracted term (the new BSDF). This decomposition is what makes the method compatible with linear path tracers. We verify the decomposition numerically, understand why the diffracted term has zero total power, and implement the clamping strategy that makes it physical.", "dir_name": "module_01_babinets_principle_and_the_directdiffracted_decomp", "exercises": ["ex01_babinets_principle_complementary_apertures.py", "ex02_direct_and_diffracted_term_decomposition.py", "ex03_why_clamping_is_needed_energy_accounting.py", "ex04_the_clamped_diffracted_term.py"], "depends_on": [0]}, {"index": 2, "title": "Edge-Based Diffraction: The Core Formulation", "description": "Implement the paper's primary mathematical contribution: converting the 2D Fraunhofer diffraction integral into a sum of closed-form edge-diffracted waves via the divergence theorem. We build up the auxiliary functions α₁ and α₂, the linear transform Ξ that encodes edge geometry, and the full edge-diffracted wave ψ_j. We validate against the FFT-based Fraunhofer result from Module 0, reproducing the paper's Fig. 4.", "dir_name": "module_02_edgebased_diffraction_the_core_formulation", "exercises": ["ex01_divergence_theorem_area_integral_to_boundary_integ.py", "ex02_auxiliary_functions_α₁_and_α₂.py", "ex03_edge_geometry_the_linear_transform_ξ.py", "ex04_the_edgediffracted_wave_ψj.py"], "depends_on": [0, 1]}, {"index": 3, "title": "Aperture Construction and BSDF Evaluation", "description": "Build the geometric pipeline that converts a triangular mesh into the diffraction problem (Algorithm 1), then formulate and evaluate the complete free-space diffraction BSDF (Algorithm 2). This module covers virtual-screen projection, boundary-edge detection, per-triangle and per-edge power computations, and the final BSDF formula f(ω_o) = R²/(P_{A⊥} cos θ) · ŵ(ξ).", "dir_name": "module_03_aperture_construction_and_bsdf_evaluation", "exercises": [], "depends_on": [1, 2]}, {"index": 4, "title": "Importance Sampling and Monte Carlo Validation", "description": "Build the importance sampling strategy (Algorithm 3) that makes the BSDF practical for path tracing. We construct precomputed iCDF lookup tables for the (1−χ)|α₁|² and (1−χ)|α₂|² lobes, implement per-edge power-proportional selection, and validate the full sampling pipeline via Monte Carlo integration. The final exercise renders a complete diffraction pattern using importance-sampled BSDF evaluation, demonstrating the paper's key result: converged patterns at low sample counts.", "dir_name": "module_04_importance_sampling_and_monte_carlo_validation", "exercises": [], "depends_on": [2, 3]}]}, "modules": {"module_00_fraunhofer_diffraction_as_a_fourier_transform": {"content": "# Module 0: Fraunhofer Diffraction as a Fourier Transform\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [Why This Module Exists: The Physics That Path Tracers Get Wrong](#why-this-module-exists-the-physics-that-path-tracers-get-wrong)\n- [The Running Example: A Single Slit](#the-running-example-a-single-slit)\n- [The Fraunhofer Approximation: When Far-Field Is Far Enough](#the-fraunhofer-approximation-when-far-field-is-far-enough)\n- [Fraunhofer Diffraction Is a Fourier Transform](#fraunhofer-diffraction-is-a-fourier-transform)\n- [From Formula to Code: The DFT as a Diffraction Engine](#from-formula-to-code-the-dft-as-a-diffraction-engine)\n- [Energy Conservation and Parseval's Theorem](#energy-conservation-and-parsevals-theorem)\n- [Extending to 2D: Rectangular and Circular Apertures](#extending-to-2d-rectangular-and-circular-apertures)\n- [Ray Optics vs Wave Optics: Why Diffraction Matters](#ray-optics-vs-wave-optics-why-diffraction-matters)\n- [The Gaussian Beam and the Search Radius](#the-gaussian-beam-and-the-search-radius)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: Where This Leads](#synthesis-where-this-leads)\n\n---\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. State the Fraunhofer diffraction integral and explain what every symbol means physically.\n2. Recognize that Fraunhofer diffraction *is* a 2D Fourier transform—scaled by $k/(2\\pi R)$—and implement it numerically via the DFT.\n3. Derive the analytic single-slit and rectangular-aperture diffraction patterns from the FT of the aperture transmission function.\n4. Verify energy conservation via Parseval's theorem in both continuous and discrete settings.\n5. Quantify the regime where ray optics fails and wave optics (diffraction) is essential.\n6. Explain why a Gaussian beam—not a plane wave—is the correct illumination model for an aperture-based BSDF, and compute the resulting \"search radius\" used in the paper.\n\n---\n\n## Why This Module Exists: The Physics That Path Tracers Get Wrong\n\nModern path tracers are extremely good at simulating the geometric propagation of light—reflections, refractions, shadows. But they operate in the *ray-optics* regime: light travels in straight lines, and what falls in a geometric shadow receives zero energy. That model breaks down badly when wavelength is comparable to the scale of the diffracting object.\n\nConsider two scenes from the Steinberg et al. (SIGGRAPH 2024) paper that launched this course:\n\n- **Visible light through a 160 μm aperture** inside a Cornell box. The aperture is \"large\" compared to $\\lambda \\approx 500\\,\\text{nm}$—the ratio is $w/\\lambda \\approx 320$—yet the diffraction pattern on the back wall is vividly colorful and extends far outside the geometric shadow cone. Ray optics would paint a sharp-edged white rectangle.\n\n- **Cellular radiation ($\\lambda = 10\\,\\text{cm}$) through city buildings**. The ratio $w/\\lambda$ for a doorway is around 25. Diffraction bends gigahertz waves around concrete corners and into corridors—the dominant effect governing signal coverage. A path tracer using ray optics gets the answer *qualitatively* wrong.\n\nThe free-space diffraction BSDF of Steinberg et al. is an efficient, path-tracer-compatible solution. The entire paper's machinery rests on a single foundational fact: **in the far field, diffraction is a Fourier transform**. Everything else—the edge-based formulation, the Babinet decomposition, the importance sampling strategy—is downstream engineering built on top of that fact.\n\nThis module builds the foundation.\n\n---\n\n## The Running Example: A Single Slit\n\nThroughout this module we will use a **1D single slit** as our concrete running example. The setup is:\n\n- A thin, opaque conductive screen with a single opening (the *aperture*) of width $w$, centered at the origin.\n- Light of wavelength $\\lambda$ and wavenumber $k = 2\\pi/\\lambda$ is incident from the left along the $z$-axis.\n- We observe the diffracted light on a screen far away, at distance $R$ along $z$, parameterized by the transverse coordinate $\\xi$ (the angle from the $z$-axis in the small-angle approximation).\n\nThe aperture's transmission function is simply a rectangle:\n\n$$\\varphi(q) = \\begin{cases} 1 & |q| \\leq w/2 \\\\ 0 & \\text{otherwise} \\end{cases}$$\n\nThis is our ground truth. We know the exact diffraction pattern (we will derive it shortly), and we will use it to validate our numerical implementation.\n\n![Single-slit geometry and far-field diffraction pattern](diagrams/single_slit_geometry.svg)\n\n---\n\n## The Fraunhofer Approximation: When Far-Field Is Far Enough\n\nThe full wave-optical problem of diffraction is described by the Huygens-Fresnel principle: every point in the aperture is a secondary source of spherical waves. The exact integral is:\n\n$$\\psi(\\xi) = \\frac{-ik}{2\\pi} \\int_{A_\\perp} dq \\; \\varphi(q) \\; \\frac{e^{ikr}}{r}$$\n\nwhere $r = \\sqrt{R^2 + (\\xi - q)^2}$ is the distance from aperture point $q$ to observation point $\\xi$.\n\nThe **Fraunhofer approximation** (far-field limit) simplifies this. When $R \\gg w^2/\\lambda$ (the Fraunhofer condition[^1]), we can expand $r$ to first order:\n\n$$r \\approx R + \\frac{(\\xi - q)^2}{2R} \\approx R - q\\xi/R + \\text{const}$$\n\nand the quadratic phase term $e^{ikq^2/(2R)}$ in the Fresnel integral becomes negligible (it varies by much less than $2\\pi$ across the aperture). Dropping it gives:\n\n$$\\psi(\\xi) = \\frac{k}{2\\pi R} \\int_{A_\\perp} dq \\; \\varphi(q) \\; e^{-ik\\xi q/R}$$\n\nwhich, crucially, is a **Fourier transform** of $\\varphi(q)$ evaluated at spatial frequency $k\\xi/R$.[^2]\n\n**Checking the condition for our running example:** For $w = 10\\lambda$ and $\\lambda = 500\\,\\text{nm}$, the Fraunhofer condition $R \\gg w^2/\\lambda$ requires $R \\gg 50\\mu\\text{m}$. For $w = 1\\,\\text{mm}$ and $\\lambda = 500\\,\\text{nm}$, we need $R \\gg 2\\,\\text{m}$. The condition is easily satisfied for macroscopic observation distances.\n\n[^1]: The Fraunhofer condition is sometimes stated as $R \\gg \\pi w^2 / \\lambda$, depending on what phase error is deemed acceptable. For the single slit, this translates to a maximum phase error of $\\pi/8$ across the aperture.\n\n[^2]: We discard a global phase factor $e^{ikR}$ that carries no observable information—it cancels in all intensity measurements. Steinberg et al. explicitly note this (\"we discard an irrelevant phase term\").\n\n---\n\n## Fraunhofer Diffraction Is a Fourier Transform\n\nLet us write the Fraunhofer diffraction formula as it appears in Steinberg et al. (Eq. 1) for the 2D case:\n\n$$\\psi(\\boldsymbol{\\xi}) \\triangleq \\frac{k}{2\\pi R} \\int_{A_\\perp} d^2\\mathbf{q}_\\perp \\; \\varphi(\\mathbf{q}_\\perp) \\; e^{-ik\\boldsymbol{\\xi} \\cdot \\mathbf{q}_\\perp} \\tag{1}$$\n\nwhere:\n- $\\boldsymbol{\\xi} \\in \\mathbb{R}^2$ is the 2D angular coordinate at the observation plane (for small angles, $\\xi_x \\approx \\sin\\theta_x$, $\\xi_y \\approx \\sin\\theta_y$)\n- $\\mathbf{q}_\\perp \\in \\mathbb{R}^2$ is the position in the aperture plane\n- $\\varphi(\\mathbf{q}_\\perp)$ is the complex amplitude of the incident field on the aperture\n- $R$ is the distance to the observation plane\n\n**This is exactly the 2D Fourier transform of $\\varphi$, evaluated at spatial frequency $\\mathbf{f} = k\\boldsymbol{\\xi}/(2\\pi) = \\boldsymbol{\\xi}/\\lambda$.**\n\nConcretely: if we define the 2D Fourier transform as\n\n$$\\hat{g}(\\mathbf{f}) = \\int_{\\mathbb{R}^2} d^2\\mathbf{q} \\; g(\\mathbf{q}) \\; e^{-2\\pi i \\mathbf{f} \\cdot \\mathbf{q}}$$\n\nthen Eq. (1) becomes:\n\n$$\\psi(\\boldsymbol{\\xi}) = \\frac{k}{2\\pi R} \\hat{\\varphi}\\!\\left(\\frac{k\\boldsymbol{\\xi}}{2\\pi}\\right) = \\frac{1}{\\lambda R} \\hat{\\varphi}\\!\\left(\\frac{\\boldsymbol{\\xi}}{\\lambda}\\right) \\tag{2}$$\n\nThe identification is clean: the diffraction pattern amplitude is the Fourier transform of the aperture field, sampled at spatial frequency $\\boldsymbol{\\xi}/\\lambda$.\n\n### Applying to the Single Slit\n\nFor $\\varphi(q) = \\text{rect}(q/w) = \\mathbf{1}_{|q| \\leq w/2}$, the 1D Fourier transform is:\n\n$$\\hat{\\varphi}(f) = \\int_{-w/2}^{w/2} e^{-2\\pi i f q} dq = w \\cdot \\text{sinc}(fw) = w \\cdot \\frac{\\sin(\\pi fw)}{\\pi fw}$$\n\nSubstituting $f = \\xi/\\lambda = k\\xi/(2\\pi)$:\n\n$$\\psi(\\xi) = \\frac{k}{2\\pi R} \\cdot w \\cdot \\text{sinc}\\!\\left(\\frac{w\\xi}{\\lambda}\\right) = \\frac{kw}{2\\pi R} \\cdot \\text{sinc}\\!\\left(\\frac{kw\\xi}{2\\pi}\\right)$$\n\nThe **intensity** (observable quantity) is:\n\n$$I(\\xi) = R^2|\\psi(\\xi)|^2 = \\left(\\frac{kw}{2\\pi}\\right)^2 \\text{sinc}^2\\!\\left(\\frac{kw\\xi}{2\\pi}\\right) \\tag{3}$$\n\nNote that $R$ drops out of the intensity.[^3] The first zeros of the sinc occur at $kw\\xi/(2\\pi) = \\pm 1$, i.e., at $\\xi = \\pm\\lambda/w$. For $w = 10\\lambda$, the central lobe half-angle is $\\xi_0 = 0.1\\,\\text{rad} \\approx 5.7°$.\n\n[^3]: This is a general feature of the Fraunhofer BSDF: the distance $R$ drops out everywhere, so the BSDF only depends on incident and outgoing directions, not on the propagation distance. Steinberg et al. explicitly flag this: \"knowledge of the distance to the point of observation is not needed in practice (the reader may assume $R = 1$).\"\n\n**Check your understanding:** The first zero of $\\text{sinc}(kw\\xi/2\\pi)$ occurs at $\\xi = \\lambda/w$. What happens to the diffraction pattern as $w \\to \\infty$ (very wide slit)? What about $w \\to 0$ (infinitesimally narrow slit)? Do these limits make physical sense?\n\n---\n\n## From Formula to Code: The DFT as a Diffraction Engine\n\nThe Fourier transform in Eq. (1) is exactly what the DFT (and its fast implementation, the FFT) computes. Let's make the mapping explicit.\n\nSuppose we discretize the aperture into $N$ equally-spaced samples with spacing $\\Delta q$. The aperture extends from $-N\\Delta q/2$ to $N\\Delta q/2$. The DFT is:\n\n$$\\Psi[m] = \\sum_{n=0}^{N-1} \\varphi[n] \\cdot e^{-2\\pi i mn/N}$$\n\nThis corresponds to sampling the Fourier transform at spatial frequencies $f_m = m/(N\\Delta q)$ for $m = 0, 1, \\ldots, N-1$.\n\nTranslating back to the physical $\\xi$ coordinate via $f = \\xi/\\lambda$:\n\n$$\\xi_m = \\frac{m\\lambda}{N\\Delta q} \\quad \\text{(with wrap-around: } m \\mapsto m - N \\text{ for } m > N/2\\text{)}$$\n\nThe spacing in $\\xi$-space is $\\Delta\\xi = \\lambda/(N\\Delta q)$.\n\nTo recover the physical diffraction amplitude $\\psi(\\xi)$ from $\\Psi[m]$, we multiply by the prefactor:\n\n$$\\psi(\\xi_m) = \\frac{k}{2\\pi R} \\cdot \\Delta q \\cdot \\Psi[m]$$\n\nThe $\\Delta q$ factor converts the sum (DFT) to an integral approximation. Setting $R=1$ (since it drops out of intensities):\n\n```python\nimport numpy as np\n\ndef fraunhofer_1d(phi: np.ndarray, k: float, xi_grid: np.ndarray) -> np.ndarray:\n    \"\"\"\n    Compute the 1D Fraunhofer diffraction pattern via DFT.\n    \n    Parameters\n    ----------\n    phi : array of shape (N,) — aperture field samples on a uniform grid\n    k   : float — wavenumber 2π/λ  \n    xi_grid : array — observation angles (same units as aperture grid spacing)\n    \n    Returns\n    -------\n    psi : complex array of shape (len(xi_grid),) — diffracted field amplitudes\n    \"\"\"\n    N = len(phi)\n    # The DFT gives us Psi at N frequencies; we need to interpolate to xi_grid\n    # For now, assume xi_grid matches the DFT output frequencies\n    Psi = np.fft.fftshift(np.fft.fft(phi))\n    dq = ...  # need aperture spacing\n    psi = (k / (2 * np.pi)) * dq * Psi  # R=1\n    return psi\n```\n\nThe exercises flesh this out completely. The key subtleties are:\n1. **`fftshift`**: NumPy's FFT outputs frequencies $[0, 1, \\ldots, N/2-1, -N/2, \\ldots, -1] \\cdot \\Delta f$. We need `fftshift` to center the zero-frequency component.\n2. **Normalization**: NumPy's `fft` has no $1/N$ prefactor (inverse has $1/N$). This is the \"engineering\" convention. The factor $\\Delta q$ converts the sum to an integral.\n3. **`np.sinc`**: NumPy defines `sinc(x) = sin(πx)/(πx)`, not `sin(x)/x`. The analytic formula for the single slit is `sinc(kw*xi / (2*pi))`, which in NumPy is `np.sinc(w*xi / lambda_)`.\n\n![DFT-to-diffraction mapping: from aperture samples to far-field pattern](diagrams/dft_diffraction_mapping.svg)\n\n---\n\n## Energy Conservation and Parseval's Theorem\n\nEnergy conservation is the central sanity check for any diffraction calculation. The paper states (following Eq. 1–3):\n\n$$\\int_{\\mathbb{R}^2} d^2\\boldsymbol{\\xi} \\; R^2 |\\psi(\\boldsymbol{\\xi})|^2 = P_{A_\\perp} \\triangleq \\int_{A_\\perp} d^2\\mathbf{q}_\\perp \\; |\\varphi(\\mathbf{q}_\\perp)|^2 \\tag{4}$$\n\nThis is **Parseval's theorem** for the Fourier transform, decorated with the physical prefactor $k/(2\\pi R)$ that defines $\\psi$.\n\nLet's verify it for our single-slit example:\n- Left side: $\\int R^2|\\psi(\\xi)|^2 d\\xi = (kw/2\\pi)^2 \\int \\text{sinc}^2(kw\\xi/2\\pi) d\\xi$\n\n  Let $u = kw\\xi/(2\\pi)$, so $d\\xi = 2\\pi du/(kw)$:\n\n  $= (kw/2\\pi)^2 \\cdot (2\\pi/kw) \\int_{-\\infty}^\\infty \\text{sinc}^2(u) du = (kw/2\\pi) \\cdot 1 \\cdot 1$\n\n  Wait—$\\int_{-\\infty}^\\infty \\text{sinc}^2(u)du = 1$? Yes, since $\\int|\\hat{f}|^2 = \\int|f|^2$ by Parseval and $\\int \\text{rect}^2 = 1$ for a unit-width rectangle.\n\n  Actually: $P_{A_\\perp} = \\int_{-w/2}^{w/2}|\\varphi(q)|^2 dq = w$ (for $|\\varphi| = 1$). So the right side is $w$.\n\n  Left side: $(kw/(2\\pi))^2 \\cdot (2\\pi/(kw)) \\cdot 1 = kw/(2\\pi) = w/\\lambda$?\n\nThis doesn't match! The discrepancy is because the $R$ that appears in the intensity integral and the Parseval statement is doing work as a conversion factor between $\\xi$ (dimensionless angle) and physical length on the observation screen. Let's be careful:\n\nIf $\\xi$ is a dimensionless angle and the observation screen is at distance $R$, then a point at angle $\\xi$ is at physical position $x = R\\xi$ on the screen. The area element $d^2x = R^2 d^2\\xi$. So:\n\n$$\\int d^2x \\; |\\psi|^2 = R^2 \\int d^2\\xi \\; |\\psi(\\xi)|^2$$\n\nand Parseval in the standard form says $\\int d^2x \\; |\\psi|^2 = \\int d^2q \\; |\\varphi|^2$, which becomes:\n\n$$R^2 \\int d^2\\xi \\; |\\psi(\\xi)|^2 = \\int_{A_\\perp} d^2q \\; |\\varphi(q)|^2 = P_{A_\\perp}$$\n\nThis is exactly Eq. (4). The $R^2$ factor is essential: it converts the dimensionless angle integral to a physical area integral.[^4]\n\n[^4]: In the BSDF context, $\\xi$ is really $\\sin\\theta$ for large-angle directions. For small angles $\\xi \\approx \\theta$, and $d\\xi \\approx d\\theta$. The BSDF formulation uses $R^2|\\psi|^2$ as the \"intensity per steradian\" contribution, which is why energy conservation looks like $\\int d\\Omega \\; R^2|\\psi|^2 = P_{A_\\perp}$.\n\nIn discrete form (Parseval for DFT): if the DFT $\\Psi = \\text{FFT}(\\varphi)$, then $\\sum_m |\\Psi[m]|^2 = N \\sum_n |\\varphi[n]|^2$. Converting sums to integrals with spacings $\\Delta q$ and $\\Delta\\xi$:\n\n$$\\Delta\\xi \\sum_m |\\psi_m|^2 \\approx \\Delta q \\sum_n |\\varphi_n|^2$$\n\nThis is what `verify_parseval` in Exercise 1 checks.\n\n**Check your understanding:** The Parseval check computes $\\int |\\psi|^2 d\\xi$ (no $R^2$) and compares to $\\int |\\varphi|^2 dq$. If these are equal, does that mean we've correctly verified energy conservation? What are we actually checking?\n\n---\n\n## Extending to 2D: Rectangular and Circular Apertures\n\nThe 2D generalization is straightforward. The aperture is now a 2D region $A_\\perp \\subset \\mathbb{R}^2$, and $\\psi(\\boldsymbol{\\xi})$ is a 2D Fourier transform.\n\n### Rectangular Aperture\n\nFor a rectangle of width $w_x$ in $x$ and $w_y$ in $y$:\n\n$$\\varphi(q_x, q_y) = \\text{rect}(q_x/w_x) \\cdot \\text{rect}(q_y/w_y)$$\n\nSince $\\varphi$ is *separable*, the 2D FT is a product of 1D FTs:\n\n$$\\psi(\\xi_x, \\xi_y) = \\frac{k}{2\\pi R} \\cdot w_x w_y \\cdot \\text{sinc}\\!\\left(\\frac{w_x \\xi_x}{\\lambda}\\right) \\cdot \\text{sinc}\\!\\left(\\frac{w_y \\xi_y}{\\lambda}\\right) \\tag{5}$$\n\nThe intensity is $R^2|\\psi|^2 \\propto \\text{sinc}^2 \\cdot \\text{sinc}^2$, producing the characteristic \"cross-shaped\" diffraction pattern with zeros along lines $\\xi_x = n\\lambda/w_x$ and $\\xi_y = m\\lambda/w_y$.\n\n### Circular Aperture (Airy Pattern)\n\nFor a circular aperture of radius $a$, by rotational symmetry the 2D FT reduces to a Hankel transform:\n\n$$\\psi(\\xi) = \\frac{k}{2\\pi R} \\cdot 2\\pi \\int_0^a r J_0(kr\\xi) dr = \\frac{k}{2\\pi R} \\cdot \\frac{\\pi a^2 J_1(ka\\xi)}{ka\\xi/2} \\cdot \\frac{1}{2}$$\n\nThe exact form is:\n\n$$\\psi(\\xi) = \\frac{k a^2}{2R} \\cdot \\frac{2 J_1(ka\\xi)}{ka\\xi} \\tag{6}$$\n\nThe intensity $R^2|\\psi|^2 \\propto [2J_1(ka\\xi)/(ka\\xi)]^2$ is the **Airy pattern**. The first zero is at $ka\\xi = 1.22\\pi$, i.e., $\\xi_0 = 0.61\\lambda/a$ (Abbe diffraction limit). For a telescope aperture of $a = 0.1\\,\\text{m}$ at $\\lambda = 500\\,\\text{nm}$: $\\xi_0 = 3\\,\\mu\\text{rad} \\approx 0.0002°$, the angular resolution limit.\n\n**In code** using `scipy.special.j1`:\n\n```python\nfrom scipy.special import j1\n\ndef analytic_circle(radius, k, xi_grid):\n    \"\"\"Airy pattern for circular aperture of given radius.\"\"\"\n    u = k * radius * xi_grid\n    # Handle u=0 carefully: lim_{u->0} J1(u)/u = 1/2\n    result = np.where(np.abs(u) < 1e-10,\n                      k * radius**2 / 2,          # u=0 limit\n                      (k * radius**2 / 2) * 2 * j1(u) / u)\n    return result\n```\n\n**Check your understanding:** The Airy pattern has $I(0) \\propto (ka^2/2)^2 \\propto (a/\\lambda)^2 \\cdot a^2$. How does the peak intensity scale with aperture radius $a$ and wavelength $\\lambda$? Does it make intuitive sense that a larger aperture at shorter wavelength produces a brighter, more concentrated central peak?\n\n---\n\n## Ray Optics vs Wave Optics: Why Diffraction Matters\n\nThe ratio $w/\\lambda$ (aperture size to wavelength) is the single most important parameter governing whether diffraction matters.\n\n### The Geometric Shadow\n\nIn ray optics, the field on the observation screen is exactly:\n\n$$I_\\text{ray}(\\xi) = I_0 \\cdot \\mathbf{1}\\!\\left[|\\xi| \\leq w/(2R)\\right]$$\n\na sharp rectangle. No energy outside the geometric shadow cone.\n\nIn wave optics, the field is the sinc-squared pattern. Two things differ:\n1. **Fringes** inside the illuminated region (oscillations around the ray-optics prediction)\n2. **Energy outside the shadow**: the sinc has tails that never truly reach zero—diffraction bends light around the edge into the shadow.\n\nThe fraction of energy in the shadow region is:\n\n$$\\eta = \\frac{\\int_{\\xi > w/(2R)} I(\\xi) d\\xi}{\\int_{-\\infty}^\\infty I(\\xi) d\\xi}$$\n\nFor large $w/\\lambda$, this fraction is small (shadow is sharp). For $w/\\lambda \\approx 1$, a significant fraction of total power is in the \"shadow\".\n\n![Ray optics vs wave optics: four ratios w/λ = 2, 10, 50, 200](diagrams/ray_vs_wave_optics.svg)\n\n### Practical Implications\n\n| Application | $\\lambda$ | Typical aperture | $w/\\lambda$ | Diffraction matters? |\n|---|---|---|---|---|\n| Human eye / camera | 500 nm | 5 mm | 10,000 | Barely (sharp PSF) |\n| Laser through 10 μm slit | 500 nm | 10 μm | 20 | Significantly |\n| WiFi (2.4 GHz) around doorway | 12.5 cm | 1 m | 8 | Strongly |\n| Cellular (700 MHz) around building | 43 cm | 10 m | 23 | Strongly |\n| RADAR (3 GHz) around pedestrian | 10 cm | 0.5 m | 5 | Dominantly |\n\nThis table explains why the paper's signal-coverage simulation shows qualitatively different results from ray optics. For cellular frequencies and urban geometry, *diffraction is the physics*, not a correction to it.\n\n---\n\n## The Gaussian Beam and the Search Radius\n\n### Why Not a Plane Wave?\n\nA plane wave illuminates *all of space* with equal amplitude. If we want to limit the diffracting aperture to a small region around a ray intersection point (as required for a path tracer), we must somehow \"clip\" the plane wave to that region. But clipping creates artificial hard edges, which themselves diffract and produce spurious lobes.\n\nThe paper's solution is to use a **Gaussian beam** as the illumination model instead:\n\n$$\\varphi(q) = E_0 \\exp\\!\\left(-\\frac{|q|^2}{2\\sigma^2}\\right) \\tag{7}$$\n\nThe Gaussian decays smoothly and has no hard edges. The Fourier transform of a Gaussian is another Gaussian:\n\n$$\\hat{\\varphi}(f) = E_0 \\sqrt{2\\pi}\\,\\sigma \\exp\\!\\left(-2\\pi^2\\sigma^2 f^2\\right)$$\n\nSo the far-field diffraction pattern of a pure Gaussian beam is also Gaussian—a concentrated spot, the **central lobe** of the beam. Steinberg et al. quote (Eq. S1.1 in supplemental): for $\\sigma = 25\\lambda$:\n\n> \"its full width at half maximum subtends a cone with a tiny half-angle of about 0.3°.\"\n\nLet's verify. The FWHM of $\\exp(-f^2/(2\\sigma_f^2))$ is $2\\sqrt{2\\ln 2}\\,\\sigma_f$. In angle space, $f = \\xi/\\lambda$, so $\\xi_\\text{FWHM}/2 = \\sqrt{2\\ln 2}\\,\\lambda/(2\\pi\\sigma)$. Wait—let me redo this carefully.\n\nThe far-field amplitude is $\\psi(\\xi) \\propto \\exp(-2\\pi^2\\sigma^2\\xi^2/\\lambda^2)$. The intensity is $I(\\xi) \\propto \\exp(-4\\pi^2\\sigma^2\\xi^2/\\lambda^2)$. The FWHM in $\\xi$ satisfies:\n\n$$\\exp\\!\\left(-4\\pi^2\\sigma^2\\xi_{\\text{FWHM}/2}^2/\\lambda^2\\right) = \\frac{1}{2}$$\n\n$$\\xi_{\\text{FWHM}/2} = \\frac{\\sqrt{\\ln 2}}{2\\pi}\\frac{\\lambda}{\\sigma} = \\frac{\\sqrt{\\ln 2}}{2\\pi \\cdot 25} \\approx \\frac{0.833}{50\\pi} \\approx 5.3 \\times 10^{-3}\\,\\text{rad} \\approx 0.30°$$\n\nThis confirms the paper's value. For $\\sigma = 25\\lambda$, the beam's far-field FWHM half-angle is $\\approx 0.3°$—a very narrow pencil beam.\n\n### The Search Radius\n\nThe Gaussian beam has effectively zero amplitude beyond $3\\sigma = 75\\lambda$ from its center. When a ray intersects geometry at a point $\\mathbf{p}$, the diffracting aperture is all geometry within the *search radius* $r_\\text{search} = 3\\sigma = 75\\lambda$ of $\\mathbf{p}$ (projected onto the virtual screen perpendicular to the incident direction).\n\nIn code:\n\n```python\ndef compute_search_radius(sigma: float, n_sigma: int = 3) -> float:\n    \"\"\"\n    Returns the search radius in the same units as sigma.\n    Geometry beyond this radius contributes < e^{-n_sigma^2/2} of peak amplitude.\n    \"\"\"\n    return n_sigma * sigma\n```\n\nFor $\\sigma = 25\\lambda$, `compute_search_radius(25 * lambda_)` returns `75 * lambda_`.\n\n**Why 3σ?** The Gaussian amplitude at $|q| = 3\\sigma$ is $e^{-9/2} \\approx 0.011$ of the peak. The intensity contribution is $e^{-9} \\approx 1.2 \\times 10^{-4}$—negligible. Using $n=4$ would be more accurate but increases the search area by $78\\%$ for a $0.01\\%$ improvement. Three sigma is the standard engineering compromise.[^5]\n\n[^5]: In the Physical Light Transport (PLT) framework referenced by the paper (Steinberg et al. 2022, 2023), the search radius is determined rigorously by the spatial coherence width of the light beam. For the simplified implementation in this course, we follow the paper's ad-hoc choice of $\\sigma = 25\\lambda$, $r_\\text{search} = 3\\sigma$.\n\n### Gaussian-Illuminated Slit\n\nWhen a Gaussian beam illuminates a slit, the aperture field is:\n\n$$\\varphi(q) = E_0 \\exp\\!\\left(-\\frac{q^2}{2\\sigma^2}\\right) \\cdot \\text{rect}(q/w)$$\n\nThe diffraction pattern is the FT of this product—a convolution in frequency space:\n\n$$\\psi(\\xi) \\propto \\hat{\\varphi}_\\text{Gauss}(\\xi/\\lambda) * \\hat{\\varphi}_\\text{rect}(\\xi/\\lambda)$$\n\nFor $w \\gg \\sigma$ (beam narrower than slit), the result is essentially the pure Gaussian FT—the slit doesn't matter. For $w \\ll \\sigma$ (slit narrower than beam), the result is essentially the sinc pattern. The interesting intermediate regime produces smoothly-tapered sinc lobes—no sharp discontinuities, no spurious sidelobes from truncation.\n\nThis is why a Gaussian beam illumination is essential: it produces a physically meaningful, truncation-artifact-free diffraction pattern that can be localized to a region around the intersection point.\n\n---\n\n## Analytical Questions\n\n### Question 1 — Parseval's Theorem and the BSDF\n\nThe paper states that the BSDF satisfies energy conservation: integrating the BSDF over all outgoing directions recovers the aperture-incident power $P_{A_\\perp}$. Starting from Parseval's theorem for the Fourier transform, derive the energy conservation equation (Eq. 4) step by step. What assumptions are made about the aperture field $\\varphi$? Does this hold for complex-valued $\\varphi$ (e.g., a field with a spatially varying phase)?\n\n### Question 2 — The Fraunhofer Condition in a Path Tracer\n\nIn a path tracer, rays interact with scene geometry at various distances. The Fraunhofer condition $R \\gg w^2/\\lambda$ must be satisfied at the observation point. For a cellular system with $\\lambda = 10\\,\\text{cm}$ and a building aperture of $w = 10\\,\\text{m}$, compute the minimum $R$ for Fraunhofer validity. Is this condition ever violated in a realistic urban scene? What happens to the diffraction pattern in the Fresnel regime (when the condition is violated)? Why does the paper state that \"the distance $R$ will drop out\" despite this apparent constraint?\n\n### Question 3 — Separability and the Edge-Based Formulation\n\nA rectangular aperture has a separable transmission function, making its 2D FT a product of 1D FTs. An arbitrary polygonal aperture is not separable. However, in Module 2 you will see that the divergence theorem converts the 2D aperture integral into a 1D sum over boundary edges—an entirely different form of \"separability.\" Explain conceptually how the divergence theorem achieves this dimensional reduction, and why this is particularly advantageous for triangular meshes.\n\n### Question 4 — Gaussian Beam and Phase Coherence\n\nThe Gaussian beam model (Eq. 7) uses a real-valued amplitude profile. A real wavefront has zero spatially-varying phase: all points on the aperture are in phase (a plane wavefront). For a physical laser beam propagating along $z$, the aperture field at the waist (focus) is indeed real and Gaussian. But what happens at a distance $z$ from the waist? How does the complex Gaussian field profile change? The paper uses a complex phasor $e^{-ikz}$ in the vertex field values (Eq. 20). Explain what this accounts for physically and when it becomes important.\n\n---\n\n## Synthesis: Where This Leads\n\nWe have established the foundation: **Fraunhofer diffraction is a 2D Fourier transform of the aperture field, scaled by $k/(2\\pi R)$, with $R$ dropping out of all observables.** The diffraction pattern is the squared magnitude of this FT.\n\nThis foundational fact enables the entire edifice of the free-space diffraction BSDF:\n\n1. **Module 1** uses Babinet's principle to decompose the total diffracted field into a \"direct\" term $\\tilde\\varphi$ (the unobstructed beam, handled by ray tracing) and a \"diffracted\" term $\\bar\\psi$ (the deviation due to the obstacle, handled by the new BSDF). This decomposition is essential for path tracer compatibility: the direct term is already there; we add the BSDF for the diffracted term.\n\n2. **Module 2** applies the divergence theorem to convert the 2D integral over the aperture (computationally expensive for arbitrary geometry) into a 1D sum over boundary edges. Each edge contributes an \"edge-diffracted wave\" expressed in closed form via auxiliary functions $\\alpha_1$ and $\\alpha_2$. This is where the Gaussian beam enters: the smooth spatial decay of $\\varphi$ is what makes the edge integrals converge to closed form.\n\n3. **Module 3** constructs the complete BSDF from these edge-diffracted waves, establishes energy conservation, and shows that the Gaussian central lobe must be carefully removed to keep the BSDF non-negative.\n\n4. **Module 4** builds an importance sampling strategy by precomputing inverse-CDF tables for the $|\\alpha_1|^2$ and $|\\alpha_2|^2$ distributions—the per-edge diffraction lobes.\n\nThe remarkable result: a path tracer that knows nothing about wave optics, modified only by attaching a new BSDF evaluation at geometry intersections, can reproduce accurate diffraction patterns at 8 samples per pixel—compared to the ~2000 samples per pixel required by the state-of-the-art UTD approach.\n\nThe key is that the Fourier-transform nature of Fraunhofer diffraction makes everything linear in intensity: the BSDF is a classical scattering function that obeys the standard (linear) rendering equation. No phase-carrying rays, no interference between different paths, no sub-wavelength sampling. Just a Fourier transform, expressed edge by edge, summed incoherently.\n\nThat is the elegance of starting from first principles.\n\n---\n\n*Proceed to the exercises: implement Fraunhofer diffraction numerically, validate against analytic formulas, and develop intuition for when wave optics is essential.*\n", "exercises": [{"filename": "ex01_1d_singleslit_fraunhofer_diffraction.py", "content": "\"\"\"\nExercise 1: 1D Single-Slit Fraunhofer Diffraction\n==================================================\nModule 0 — Fraunhofer Diffraction as a Fourier Transform\n\nIn the Fraunhofer (far-field) regime, the diffraction pattern of an aperture\nis the squared magnitude of the Fourier transform of the aperture's transmission\nfunction, scaled by k/(2πR):\n\n    ψ(ξ) = k/(2πR) ∫_{A⊥} dq φ(q) e^{-ikξq}     [Steinberg et al., Eq. 1]\n\nFor a single slit of width w, φ(q) = rect(q/w), and the analytic result is:\n\n    ψ(ξ) = kw/(2πR) · sinc(kwξ / 2π)\n\nwhere sinc(x) = sin(πx)/(πx)  [NumPy convention].\n\nYour task: implement the DFT-based computation and validate it against the\nclosed-form result. Then verify Parseval's theorem (energy conservation).\n\nKey pitfalls to avoid:\n  - np.sinc(x) = sin(πx)/(πx), NOT sin(x)/x\n  - fftshift is required to center the zero-frequency component\n  - The Δq factor converts the DFT sum to an integral approximation\n  - Parseval: ∫R²|ψ(ξ)|²dξ = ∫|φ(q)|²dq  (the R² matters for true energy)\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy.integrate import cumulative_trapezoid\n\n# ── Physical constants ────────────────────────────────────────────────────────\nLAMBDA = 1.0          # wavelength [arbitrary units — we set λ=1 for clarity]\nK = 2 * np.pi / LAMBDA  # wavenumber\nSLIT_WIDTH = 10.0 * LAMBDA  # w = 10λ\nR = 1.0               # observation distance; drops out of intensities\n\n# ── Aperture grid ─────────────────────────────────────────────────────────────\nN = 4096              # number of aperture samples (power of 2 for FFT speed)\nAPERTURE_HALF_WIDTH = 4 * SLIT_WIDTH   # sample ±4w around slit\ndq = 2 * APERTURE_HALF_WIDTH / N       # grid spacing in aperture plane\nq_grid = np.linspace(-APERTURE_HALF_WIDTH, APERTURE_HALF_WIDTH, N, endpoint=False)\n\n# ── Observation (ξ) grid — derived from DFT frequency axis ───────────────────\n# After fftshift: ξ_m = m · λ/(N·Δq), spacing Δξ = λ/(N·Δq)\nd_xi = LAMBDA / (N * dq)\nxi_grid = np.fft.fftshift(np.fft.fftfreq(N, d=dq / LAMBDA))  # in [rad]\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# FUNCTION 1: DFT-based Fraunhofer diffraction\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef fraunhofer_1d(phi: np.ndarray, k: float, dq: float, R: float = 1.0) -> np.ndarray:\n    \"\"\"\n    Compute the 1D Fraunhofer diffraction amplitude via DFT.\n\n    Implements ψ(ξ) = k/(2πR) · Δq · FFT[φ](ξ/λ), after fftshift.\n    The xi_grid corresponding to the output is the module-level xi_grid.\n\n    Parameters\n    ----------\n    phi  : np.ndarray, shape (N,) — complex aperture field samples on q_grid\n    k    : float — wavenumber 2π/λ\n    dq   : float — aperture grid spacing (same units as λ)\n    R    : float — propagation distance (defaults to 1; R cancels in |ψ|²)\n\n    Returns\n    -------\n    psi : np.ndarray, shape (N,), complex — diffracted field amplitude ψ(ξ)\n          corresponding to xi_grid (already fftshifted, zero-freq at center)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-10 lines                             #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Compute the DFT of phi using np.fft.fft              #\n    # 2. Apply fftshift to center the zero-frequency          #\n    # 3. Multiply by the physical prefactor k/(2πR) * dq     #\n    #    (dq converts the sum to an integral approximation)   #\n    # Hint: The result is already aligned with xi_grid above  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# FUNCTION 2: Analytic single-slit diffraction pattern\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef analytic_single_slit(w: float, k: float, xi_grid: np.ndarray, R: float = 1.0) -> np.ndarray:\n    \"\"\"\n    Closed-form Fraunhofer diffraction amplitude for a single slit of width w.\n\n    ψ(ξ) = kw/(2πR) · sinc(wξ/λ)\n\n    where sinc(x) = sin(πx)/(πx)  [NumPy convention: np.sinc(x) = sin(πx)/(πx)]\n\n    Parameters\n    ----------\n    w        : float — slit width (same units as λ)\n    k        : float — wavenumber 2π/λ\n    xi_grid  : np.ndarray — observation angles ξ [rad]\n    R        : float — propagation distance (defaults to 1)\n\n    Returns\n    -------\n    psi_analytic : np.ndarray, complex — closed-form diffraction amplitude\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 5-7 lines                              #\n    #                                                         #\n    # Key formula: ψ(ξ) = kw/(2πR) · sinc(wξ/λ)             #\n    # where λ = 2π/k                                         #\n    # Careful: np.sinc(x) = sin(πx)/(πx), argument is NOT   #\n    # the same as in the physics formula using sin(x)/x.      #\n    # The slit argument: sinc(wξ/λ) in NumPy = np.sinc(w*xi/(lambda))  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# FUNCTION 3: Parseval energy conservation check\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef verify_parseval(phi: np.ndarray, psi: np.ndarray, dq: float, d_xi: float) -> float:\n    \"\"\"\n    Check Parseval's theorem for the Fraunhofer diffraction:\n\n        ∫|φ(q)|² dq  ≈  ∫R²|ψ(ξ)|² dξ\n\n    Since R=1 in our setup, this simplifies to checking:\n        power_in = Σ|φ[n]|² · dq\n        power_out = Σ|ψ[m]|² · dξ     (with R=1, R² factor = 1)\n    and returning their ratio power_out / power_in.\n\n    For exact energy conservation this ratio should be 1.0.\n    In our discrete approximation it will be very close to 1.0.\n\n    Parameters\n    ----------\n    phi   : np.ndarray — aperture field samples\n    psi   : np.ndarray — diffracted field samples (from fraunhofer_1d)\n    dq    : float — aperture grid spacing\n    d_xi  : float — observation angle grid spacing\n\n    Returns\n    -------\n    ratio : float — power_out / power_in (should be ≈ 1.0)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-8 lines                              #\n    #                                                         #\n    # 1. Compute power_in = sum(|phi|^2) * dq                 #\n    # 2. Compute power_out = sum(|psi|^2) * d_xi              #\n    #    (R=1 so R² = 1; for R≠1 you'd multiply psi by R)    #\n    # 3. Print both values for inspection                      #\n    # 4. Return ratio = power_out / power_in                   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# Helper: build the aperture field for a single slit\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef make_single_slit_aperture(q_grid: np.ndarray, slit_width: float) -> np.ndarray:\n    \"\"\"Return φ(q) = 1 inside slit of given width, 0 outside.\"\"\"\n    return (np.abs(q_grid) <= slit_width / 2).astype(complex)\n\n\ndef make_gaussian_aperture(q_grid: np.ndarray, sigma: float) -> np.ndarray:\n    \"\"\"Return φ(q) = exp(-q²/(2σ²)). Smooth — FT is also a Gaussian.\"\"\"\n    return np.exp(-(q_grid ** 2) / (2 * sigma ** 2)).astype(complex)\n\n\ndef analytic_gaussian(sigma: float, k: float, xi_grid: np.ndarray, R: float = 1.0) -> np.ndarray:\n    \"\"\"\n    Analytic FT of a Gaussian aperture exp(-q²/(2σ²)).\n\n    FT{e^{-q²/2σ²}}(f) = √(2π) σ e^{-2π²σ²f²}   with f = ξ/λ\n\n    So ψ(ξ) = k/(2πR) · √(2π)σ · e^{-2π²σ²(ξ/λ)²}\n    \"\"\"\n    lambda_ = 2 * np.pi / k\n    psi = (k / (2 * np.pi * R)) * np.sqrt(2 * np.pi) * sigma * np.exp(\n        -2 * np.pi ** 2 * sigma ** 2 * (xi_grid / lambda_) ** 2\n    )\n    return psi.astype(complex)\n\n\ndef plot_results(xi_grid, psi_numerical, psi_analytic, title=\"Single Slit Diffraction\"):\n    \"\"\"Plot numerical vs analytic intensity patterns.\"\"\"\n    I_num = np.abs(psi_numerical) ** 2\n    I_ana = np.abs(psi_analytic) ** 2\n\n    # Normalize to peak for visual comparison\n    I_num_norm = I_num / I_num.max()\n    I_ana_norm = I_ana / I_ana.max()\n\n    fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(14, 5))\n\n    # Full pattern\n    ax1.plot(xi_grid, I_num_norm, \"b-\", lw=1.5, label=\"Numerical (DFT)\", alpha=0.8)\n    ax1.plot(xi_grid, I_ana_norm, \"r--\", lw=2, label=\"Analytic sinc²\", alpha=0.8)\n    ax1.set_xlim(-0.5, 0.5)\n    ax1.set_xlabel(\"ξ (angle) [rad]\")\n    ax1.set_ylabel(\"Normalized Intensity\")\n    ax1.set_title(f\"{title} — w/λ = {SLIT_WIDTH/LAMBDA:.0f}\")\n    ax1.legend()\n    ax1.grid(True, alpha=0.3)\n    ax1.axvline(LAMBDA / SLIT_WIDTH, color=\"k\", ls=\":\", alpha=0.5, label=\"First zero ξ₀=λ/w\")\n    ax1.axvline(-LAMBDA / SLIT_WIDTH, color=\"k\", ls=\":\", alpha=0.5)\n\n    # Relative error\n    mask = I_ana > 1e-6 * I_ana.max()\n    rel_err = np.zeros_like(I_ana)\n    rel_err[mask] = np.abs(I_num[mask] - I_ana[mask]) / I_ana[mask]\n    ax2.semilogy(xi_grid[mask], rel_err[mask] + 1e-10, \"g-\", lw=1)\n    ax2.set_xlim(-0.5, 0.5)\n    ax2.set_xlabel(\"ξ [rad]\")\n    ax2.set_ylabel(\"Relative Error |I_num - I_ana| / I_ana\")\n    ax2.set_title(\"Numerical vs Analytic Relative Error\")\n    ax2.axhline(1e-4, color=\"r\", ls=\"--\", label=\"1e-4 threshold\")\n    ax2.legend()\n    ax2.grid(True, alpha=0.3)\n\n    plt.tight_layout()\n    plt.savefig(\"ex01_singleslit_diffraction.png\", dpi=120)\n    print(\"Plot saved to ex01_singleslit_diffraction.png\")\n    plt.close()\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# Main test harness\n# ─────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    print(\"=\" * 60)\n    print(\"Exercise 1: 1D Single-Slit Fraunhofer Diffraction\")\n    print(\"=\" * 60)\n    print(f\"  λ = {LAMBDA}, k = {K:.4f}, w = {SLIT_WIDTH}λ = {SLIT_WIDTH}\")\n    print(f\"  N = {N} samples, Δq = {dq:.5f}, Δξ = {d_xi:.6f}\")\n    print(f\"  First zero at ξ₀ = λ/w = {LAMBDA/SLIT_WIDTH:.3f} rad\")\n    print()\n\n    # ── Test 1: Rectangular slit — Parseval (energy conservation) ────────────\n    print(\"  --- Test 1: Rectangular Slit — Parseval Energy Conservation ---\")\n    phi_rect = make_single_slit_aperture(q_grid, SLIT_WIDTH)\n    psi_rect = fraunhofer_1d(phi_rect, K, dq, R)\n    psi_rect_ana = analytic_single_slit(SLIT_WIDTH, K, xi_grid, R)\n\n    print(f\"  Slit samples: {int(phi_rect.real.sum())} \"\n          f\"(expected ≈ {SLIT_WIDTH/dq:.0f})\")\n    print(f\"  ψ(0) numerical = {psi_rect[N//2].real:.6f}\")\n    print(f\"  ψ(0) analytic  = {psi_rect_ana[N//2].real:.6f}\")\n\n    ratio = verify_parseval(phi_rect, psi_rect, dq, d_xi)\n    print(f\"  Parseval check: ratio = {ratio:.6f}\")\n    parseval_ok = abs(ratio - 1.0) < 0.01\n\n    # Peak value check: ψ(0) should match analytic within 1%\n    peak_num = psi_rect[N // 2].real\n    peak_ana = psi_rect_ana[N // 2].real\n    peak_err = abs(peak_num - peak_ana) / abs(peak_ana)\n    print(f\"  Peak (ξ=0): numerical = {peak_num:.5f}, analytic = {peak_ana:.5f}, \"\n          f\"relative error = {peak_err:.4f}\")\n    peak_ok = peak_err < 0.01  # within 1%\n\n    print(f\"  Parseval within 1%: {'✓ YES' if parseval_ok else '✗ NO'}\")\n    print(f\"  Peak value within 1%: {'✓ YES' if peak_ok else '✗ NO'}\")\n\n    # ── Test 2: Gaussian aperture — pointwise accuracy < 1e-4 ────────────────\n    print()\n    print(\"  --- Test 2: Gaussian Aperture — Pointwise Accuracy ---\")\n    print(\"  (Smooth apertures have exponentially-convergent DFT approximation)\")\n    sigma_gauss = SLIT_WIDTH / 3.0   # σ = w/3, beam confined within slit\n    phi_gauss = make_gaussian_aperture(q_grid, sigma_gauss)\n    psi_gauss_num = fraunhofer_1d(phi_gauss, K, dq, R)\n    psi_gauss_ana = analytic_gaussian(sigma_gauss, K, xi_grid, R)\n\n    I_gauss_num = np.abs(psi_gauss_num) ** 2\n    I_gauss_ana = np.abs(psi_gauss_ana) ** 2\n    mask = I_gauss_ana > 1e-6 * I_gauss_ana.max()\n    rel_err = np.abs(I_gauss_num[mask] - I_gauss_ana[mask]) / I_gauss_ana[mask]\n    max_rel_err = rel_err.max()\n    print(f\"  Gaussian σ = {sigma_gauss:.2f}λ, σ/w = {sigma_gauss/SLIT_WIDTH:.2f}\")\n    print(f\"  Max relative error vs analytic: {max_rel_err:.3e}\")\n    error_ok = max_rel_err < 1e-4\n    print(f\"  Error < 1e-4: {'✓ YES' if error_ok else '✗ NO'}\")\n\n    # Plot (skipped in verify mode)\n    if not VERIFY:\n        plot_results(xi_grid, psi_rect, psi_rect_ana)\n\n    # ── Summary ───────────────────────────────────────────────────────────────\n    print()\n    all_ok = parseval_ok and peak_ok and error_ok\n    if all_ok:\n        print(\"  PASSED ✓\")\n    else:\n        print(\"  FAILED ✗\")\n        if not parseval_ok:\n            print(f\"    Parseval ratio {ratio:.4f} not within 1% of 1.0\")\n        if not peak_ok:\n            print(f\"    Peak relative error {peak_err:.4f} > 1%\")\n        if not error_ok:\n            print(f\"    Gaussian aperture max relative error {max_rel_err:.3e} > 1e-4\")\n        raise AssertionError(\"Exercise 1 validation failed\")\n"}, {"filename": "ex02_2d_rectangular_and_circular_aperture_diffraction.py", "content": "\"\"\"\nExercise 2: 2D Rectangular and Circular Aperture Diffraction\n=============================================================\nModule 0 — Fraunhofer Diffraction as a Fourier Transform\n\nA 2D aperture's Fraunhofer diffraction pattern is the 2D Fourier transform\nof its transmission function:\n\n    ψ(ξ_x, ξ_y) = k/(2πR) ∫∫_{A⊥} dq_x dq_y φ(q_x, q_y) e^{-ik(ξ_x q_x + ξ_y q_y)}\n\nFor a rectangular aperture of width w_x × w_y, the 2D FT separates into a\nproduct of 1D sincs:\n\n    ψ(ξ_x, ξ_y) = kw_x w_y / (2πR) · sinc(w_x ξ_x/λ) · sinc(w_y ξ_y/λ)\n\nFor a circular aperture of radius a, the pattern is the Airy disk:\n\n    ψ(ξ) = ka²/(2R) · 2J₁(kaξ)/(kaξ)   where ξ = sqrt(ξ_x² + ξ_y²)\n\nKey pitfalls:\n  - Must apply fft2 + fftshift2 to center the pattern\n  - Square the magnitude to get intensity (not just magnitude)\n  - For the circular aperture, handle the ξ=0 singularity (use np.where)\n  - The 2D Parseval check requires the 2D grid spacing Δq_x × Δq_y\n\"\"\"\n\nimport os\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy.special import j1\n\n# ── Physical constants ────────────────────────────────────────────────────────\nLAMBDA = 1.0\nK = 2 * np.pi / LAMBDA\nR = 1.0\n\n# ── 2D aperture grid ──────────────────────────────────────────────────────────\nN = 512                       # grid size (N×N) — fast for 2D\nAPERTURE_HALF = 20.0 * LAMBDA  # sample ±20λ around aperture center\ndq = 2 * APERTURE_HALF / N    # grid spacing\n\nq_1d = np.linspace(-APERTURE_HALF, APERTURE_HALF, N, endpoint=False)\nq_x, q_y = np.meshgrid(q_1d, q_1d)  # (N, N) grids\n\n# ── 2D observation (ξ) grid — from 2D DFT frequency axes ─────────────────────\nd_xi = LAMBDA / (N * dq)\nxi_1d = np.fft.fftshift(np.fft.fftfreq(N, d=dq / LAMBDA))\nxi_x, xi_y = np.meshgrid(xi_1d, xi_1d)\n\n# Rectangular aperture parameters\nW_X = 8.0 * LAMBDA    # width in x: 8λ\nW_Y = 4.0 * LAMBDA    # width in y: 4λ\n\n# Circular aperture parameters\nRADIUS = 5.0 * LAMBDA  # radius: 5λ\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# FUNCTION 1: 2D DFT-based Fraunhofer diffraction\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef fraunhofer_2d(phi_2d: np.ndarray, k: float, dq: float, R: float = 1.0) -> np.ndarray:\n    \"\"\"\n    Compute the 2D Fraunhofer diffraction amplitude via 2D DFT.\n\n    ψ(ξ_x, ξ_y) = k/(2πR) · Δq² · FFT2[φ](ξ_x/λ, ξ_y/λ)\n\n    Parameters\n    ----------\n    phi_2d : np.ndarray, shape (N, N) — 2D aperture field\n    k      : float — wavenumber 2π/λ\n    dq     : float — aperture grid spacing (same in both dimensions)\n    R      : float — propagation distance (defaults to 1)\n\n    Returns\n    -------\n    psi_2d : np.ndarray, shape (N, N), complex — diffracted field amplitude\n             fftshift2-ed so that ξ=(0,0) is at the array center\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-10 lines                             #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Compute 2D DFT using np.fft.fft2(phi_2d)            #\n    # 2. Apply np.fft.fftshift() to center the zero-freq      #\n    # 3. Multiply by physical prefactor k/(2πR) · Δq²        #\n    #    (Δq² because we have a 2D integral approximation)    #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# FUNCTION 2: Analytic rectangular aperture diffraction pattern\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef analytic_rect(w_x: float, w_y: float, k: float, xi_x: np.ndarray,\n                  xi_y: np.ndarray, R: float = 1.0) -> np.ndarray:\n    \"\"\"\n    Analytic 2D Fraunhofer pattern for a rectangular aperture w_x × w_y.\n\n    ψ(ξ_x, ξ_y) = kw_x w_y/(2πR) · sinc(w_x ξ_x/λ) · sinc(w_y ξ_y/λ)\n\n    This uses the separability of the rectangular aperture:\n      FT{rect(q_x/w_x) · rect(q_y/w_y)} = w_x sinc(w_x f_x) · w_y sinc(w_y f_y)\n\n    Parameters\n    ----------\n    w_x, w_y : float — slit widths in x and y\n    k        : float — wavenumber\n    xi_x, xi_y : np.ndarray (2D meshgrid) — observation angles\n    R        : float — propagation distance\n\n    Returns\n    -------\n    psi_rect : np.ndarray (N, N), complex — analytic diffraction amplitude\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 6-8 lines                             #\n    #                                                         #\n    # Hint: the prefactor is k*w_x*w_y/(2*pi*R)              #\n    # Hint: np.sinc(x) = sin(πx)/(πx), so                   #\n    #   sinc(w_x * xi_x / lambda_) = np.sinc(w_x*xi_x/lam)  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# FUNCTION 3: Analytic circular aperture (Airy pattern)\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef analytic_circle(radius: float, k: float, xi_x: np.ndarray, xi_y: np.ndarray,\n                    R: float = 1.0) -> np.ndarray:\n    \"\"\"\n    Analytic 2D Fraunhofer pattern for a circular aperture of given radius.\n\n    The Hankel transform gives the Airy pattern:\n        ψ(ξ) = ka²/(2R) · 2J₁(kaξ)/(kaξ)   [where ξ = sqrt(ξ_x²+ξ_y²)]\n\n    At ξ=0: L'Hôpital gives ψ(0) = ka²/(2R)\n    First zero at kaξ = 1.22π, i.e., ξ = 0.61λ/a\n\n    Parameters\n    ----------\n    radius   : float — aperture radius\n    k        : float — wavenumber\n    xi_x, xi_y : np.ndarray (2D) — observation angle meshgrids\n    R        : float — propagation distance\n\n    Returns\n    -------\n    psi_circle : np.ndarray (N, N), complex — Airy pattern amplitude\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - 8-10 lines                             #\n    #                                                         #\n    # 1. Compute radial angle ξ = sqrt(ξ_x² + ξ_y²)         #\n    # 2. Compute u = k * radius * xi (the Airy argument)      #\n    # 3. Compute 2J₁(u)/u using scipy.special.j1              #\n    #    Handle u=0: use np.where(np.abs(u) < 1e-8, 1.0, ...) #\n    # 4. Multiply by prefactor k*radius²/(2*R)                #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# Helpers: build aperture masks and plotting\n# ─────────────────────────────────────────────────────────────────────────────\n\ndef make_rect_aperture(q_x: np.ndarray, q_y: np.ndarray,\n                       w_x: float, w_y: float) -> np.ndarray:\n    \"\"\"Returns 1 inside rectangle w_x × w_y, 0 outside.\"\"\"\n    return ((np.abs(q_x) <= w_x / 2) & (np.abs(q_y) <= w_y / 2)).astype(complex)\n\n\ndef make_circle_aperture(q_x: np.ndarray, q_y: np.ndarray,\n                         radius: float) -> np.ndarray:\n    \"\"\"Returns 1 inside circle of given radius, 0 outside.\"\"\"\n    return (np.sqrt(q_x**2 + q_y**2) <= radius).astype(complex)\n\n\ndef plot_2d_patterns(psi_num, psi_ana, xi_x, xi_y, title=\"\"):\n    \"\"\"Side-by-side 2D intensity plots.\"\"\"\n    I_num = np.abs(psi_num) ** 2\n    I_ana = np.abs(psi_ana) ** 2\n\n    # Clip for visualization\n    vmax = np.percentile(I_ana, 99.5)\n\n    fig, axes = plt.subplots(1, 2, figsize=(12, 5))\n    for ax, I, label in zip(axes, [I_num, I_ana], [\"Numerical (DFT)\", \"Analytic\"]):\n        xi_extent = [xi_x.min(), xi_x.max(), xi_y.min(), xi_y.max()]\n        im = ax.imshow(I, extent=xi_extent, origin=\"lower\",\n                       vmin=0, vmax=vmax, cmap=\"inferno\")\n        ax.set_title(f\"{title} — {label}\")\n        ax.set_xlabel(\"ξ_x [rad]\")\n        ax.set_ylabel(\"ξ_y [rad]\")\n        ax.set_xlim(-1.0, 1.0)\n        ax.set_ylim(-1.0, 1.0)\n        plt.colorbar(im, ax=ax)\n\n    plt.tight_layout()\n    return fig\n\n\n# ─────────────────────────────────────────────────────────────────────────────\n# Main test harness\n# ─────────────────────────────────────────────────────────────────────────────\n\nif __name__ == \"__main__\":\n    VERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n    print(\"=\" * 60)\n    print(\"Exercise 2: 2D Rectangular and Circular Aperture Diffraction\")\n    print(\"=\" * 60)\n    print(f\"  λ={LAMBDA}, N={N}×{N}, Δq={dq:.4f}, Δξ={d_xi:.4f}\")\n    print(f\"  Rect: {W_X/LAMBDA:.0f}λ × {W_Y/LAMBDA:.0f}λ, \"\n          f\"Circle: radius={RADIUS/LAMBDA:.0f}λ\")\n    print()\n\n    # ── Test 1: Rectangular aperture ─────────────────────────────────────────\n    print(\"  --- Test 1: Rectangular Aperture ---\")\n    phi_rect = make_rect_aperture(q_x, q_y, W_X, W_Y)\n    psi_rect_num = fraunhofer_2d(phi_rect, K, dq, R)\n    psi_rect_ana = analytic_rect(W_X, W_Y, K, xi_x, xi_y, R)\n\n    I_rect_num = np.abs(psi_rect_num) ** 2\n    I_rect_ana = np.abs(psi_rect_ana) ** 2\n\n    # Compare at main peak (ξ=0, center of array)\n    cx, cy = N // 2, N // 2\n    print(f\"  ψ(0,0) numerical = {psi_rect_num[cy, cx].real:.4f}\")\n    print(f\"  ψ(0,0) analytic  = {psi_rect_ana[cy, cx].real:.4f}\")\n\n    # Relative error in main lobe\n    # Peak value check: relative error at ξ=(0,0)\n    peak_num_rect = psi_rect_num[cy, cx].real\n    peak_ana_rect = psi_rect_ana[cy, cx].real\n    peak_err_rect = abs(peak_num_rect - peak_ana_rect) / abs(peak_ana_rect)\n    print(f\"  Peak relative error: {peak_err_rect:.4f}\")\n    rect_ok = peak_err_rect < 0.02  # within 2%\n\n    # Parseval check (2D version)\n    power_in_rect = np.sum(np.abs(phi_rect)**2) * dq**2\n    power_out_rect = np.sum(np.abs(psi_rect_num)**2) * d_xi**2\n    parseval_rect = power_out_rect / power_in_rect\n    print(f\"  Parseval ratio: {parseval_rect:.6f}\")\n    parseval_rect_ok = abs(parseval_rect - 1.0) < 0.01\n\n    print(f\"  Peak error < 2%: {'✓ YES' if rect_ok else '✗ NO'}\")\n    print(f\"  Parseval within 1%: {'✓ YES' if parseval_rect_ok else '✗ NO'}\")\n\n    # ── Test 2: Circular aperture (Airy pattern) ──────────────────────────────\n    print()\n    print(\"  --- Test 2: Circular Aperture (Airy Pattern) ---\")\n    phi_circ = make_circle_aperture(q_x, q_y, RADIUS)\n    psi_circ_num = fraunhofer_2d(phi_circ, K, dq, R)\n    psi_circ_ana = analytic_circle(RADIUS, K, xi_x, xi_y, R)\n\n    I_circ_num = np.abs(psi_circ_num) ** 2\n    I_circ_ana = np.abs(psi_circ_ana) ** 2\n\n    print(f\"  ψ(0,0) numerical = {psi_circ_num[cy, cx].real:.4f}\")\n    print(f\"  ψ(0,0) analytic  = {psi_circ_ana[cy, cx].real:.4f}\")\n\n    # Compare in main Airy disk\n    # Peak value check\n    peak_num_circ = psi_circ_num[cy, cx].real\n    peak_ana_circ = psi_circ_ana[cy, cx].real\n    peak_err_circ = abs(peak_num_circ - peak_ana_circ) / abs(peak_ana_circ)\n    print(f\"  Peak relative error: {peak_err_circ:.4f}\")\n    circ_ok = peak_err_circ < 0.02  # within 2%\n\n    xi_zero_expected = 0.61 * LAMBDA / RADIUS\n    print(f\"  Expected first Airy zero: ξ₀ = 0.61λ/a = {xi_zero_expected:.4f} rad\")\n\n    # Parseval\n    power_in_circ = np.sum(np.abs(phi_circ)**2) * dq**2\n    power_out_circ = np.sum(np.abs(psi_circ_num)**2) * d_xi**2\n    parseval_circ = power_out_circ / power_in_circ\n    print(f\"  Parseval ratio: {parseval_circ:.6f}\")\n    parseval_circ_ok = abs(parseval_circ - 1.0) < 0.01\n\n    print(f\"  Peak error < 2%: {'✓ YES' if circ_ok else '✗ NO'}\")\n    print(f\"  Parseval within 1%: {'✓ YES' if parseval_circ_ok else '✗ NO'}\")\n\n    # Plot (skipped in verify mode)\n    if not VERIFY:\n        fig1 = plot_2d_patterns(psi_rect_num, psi_rect_ana, xi_x, xi_y,\n                                title=f\"Rect {W_X/LAMBDA:.0f}λ×{W_Y/LAMBDA:.0f}λ\")\n        fig1.savefig(\"ex02_rect_diffraction.png\", dpi=120)\n        plt.close()\n        fig2 = plot_2d_patterns(psi_circ_num, psi_circ_ana, xi_x, xi_y,\n                                title=f\"Circle r={RADIUS/LAMBDA:.0f}λ\")\n        fig2.savefig(\"ex02_circle_diffraction.png\", dpi=120)\n        plt.close()\n        print(\"  Plots saved: ex02_rect_diffraction.png, ex02_circle_diffraction.png\")\n\n    # ── Summary ───────────────────────────────────────────────────────────────\n    print()\n    all_ok = rect_ok and parseval_rect_ok and circ_ok and parseval_circ_ok\n    if all_ok:\n        print(\"  PASSED ✓\")\n    else:\n        print(\"  FAILED ✗\")\n        if not rect_ok:\n            print(f\"    Rect peak error {peak_err_rect:.4f} > 2%\")\n        if not parseval_rect_ok:\n            print(f\"    Rect Parseval {parseval_rect:.4f} not within 1%\")\n        if not circ_ok:\n            print(f\"    Circle peak error {peak_err_circ:.4f} > 2%\")\n        if not parseval_circ_ok:\n            print(f\"    Circle Parseval {parseval_circ:.4f} not within 1%\")\n        raise AssertionError(\"Exercise 2 validation failed\")\n"}]}, "module_01_babinets_principle_and_the_directdiffracted_decomp": {"content": "# Module 1: Babinet's Principle and the Direct/Diffracted Decomposition\n\n## Table of Contents\n\n- [Learning Objectives](#learning-objectives)\n- [The Setup: What Module 0 Left Us With](#the-setup-what-module-0-left-us-with)\n- [Babinet's Principle: The Symmetry of Absence](#babinets-principle-the-symmetry-of-absence)\n- [Running Example: Single Slit vs. Single Wire](#running-example-single-slit-vs-single-wire)\n- [The Key Decomposition: Direct and Diffracted Terms](#the-key-decomposition-direct-and-diffracted-terms)\n- [What the Direct Term Actually Is](#what-the-direct-term-actually-is)\n- [What the Diffracted Term Actually Is](#what-the-diffracted-term-actually-is)\n- [The Problem: w Takes Negative Values](#the-problem-w-takes-negative-values)\n- [The Fix: Clamping and Energy Borrowing](#the-fix-clamping-and-energy-borrowing)\n- [The Clamped Diffracted Term](#the-clamped-diffracted-term)\n- [Why This Decomposition Matters for Rendering](#why-this-decomposition-matters-for-rendering)\n- [Analytical Questions](#analytical-questions)\n- [Synthesis: Connecting to the Course Goal](#synthesis-connecting-to-the-course-goal)\n\n## Learning Objectives\n\nBy the end of this module you will be able to:\n\n1. State Babinet's principle precisely and use it to relate diffraction by a screen to diffraction by an aperture.\n2. Derive the direct/diffracted decomposition $|\\psi|^2 = d + w$ from the Babinet identity.\n3. Explain why the diffracted term $w$ necessarily takes negative values in the central lobe and why its total power is zero.\n4. Implement the Gaussian central-lobe modulator $\\chi(\\zeta)$ with $\\sigma_\\zeta = \\sqrt{3}$ and compute the clamped diffracted term $\\hat{w}$.\n5. Account for the \"borrowed\" energy in clamping and explain what physical approximation is being made.\n\n---\n\n## The Setup: What Module 0 Left Us With\n\nIn Module 0 we established that Fraunhofer diffraction is literally a Fourier transform. If $\\varphi(\\mathbf{q})$ is the incident field over the aperture plane at positions $\\mathbf{q} = (q_x, q_y)$, then the far-field diffracted amplitude is\n\n$$\\psi(\\hat{\\boldsymbol{\\xi}}) = \\frac{ike^{ikR}}{2\\pi R} \\int_{A^\\perp} \\varphi(\\mathbf{q})\\, e^{-ik\\hat{\\boldsymbol{\\xi}}\\cdot\\mathbf{q}}\\, d^2q, \\tag{1}$$\n\nwhere $A^\\perp$ is the aperture (the opening), $\\hat{\\boldsymbol{\\xi}} = (\\xi_x, \\xi_y)$ parameterizes the diffraction direction, $k = 2\\pi/\\lambda$ is the wavenumber, and $R$ is the screen-to-observation distance. The phase factor $e^{ikR}$ out front is a global phase that drops out when we compute intensities $|\\psi|^2$.\n\nThe proportionality constant $\\frac{ike^{ikR}}{2\\pi R}$ is just a prefactor — when we write $\\tilde{\\varphi}(\\hat{\\boldsymbol{\\xi}})$ for the full-plane Fourier transform of $\\varphi$, we have $\\psi \\propto \\tilde{\\varphi}$ restricted to the aperture $A^\\perp$. In the exercises we will often absorb this constant and work with normalized fields.\n\n**The lingering problem from Module 0:** Equation (1) requires us to integrate $\\varphi$ over the aperture $A^\\perp$ — the *opening* through which light passes. But in a renderer, when a ray hits geometry, it hits the *obstacle* (the screen), not the opening. Babinet's principle is what lets us flip this around.\n\n---\n\n## Babinet's Principle: The Symmetry of Absence\n\nLet $A^\\perp$ be the aperture (opening) and $\\bar{A}^\\perp$ be its complement (the obstacle / screen material), so that\n\n$$A^\\perp \\cup \\bar{A}^\\perp = \\mathbb{R}^2, \\qquad A^\\perp \\cap \\bar{A}^\\perp = \\emptyset. \\tag{4}$$\n\nDefine three fields:\n- $\\psi$ — field diffracted by the aperture $A^\\perp$ (Eq. 1)\n- $\\bar{\\psi}$ — field diffracted by the complement $\\bar{A}^\\perp$ (same formula, integration over $\\bar{A}^\\perp$)\n- $\\tilde{\\varphi}$ — the full-plane Fourier transform of $\\varphi$, i.e., integration over all of $\\mathbb{R}^2$\n\nBecause integration is linear, and $A^\\perp \\cup \\bar{A}^\\perp = \\mathbb{R}^2$:\n\n$$\\psi(\\hat{\\boldsymbol{\\xi}}) + \\bar{\\psi}(\\hat{\\boldsymbol{\\xi}}) = \\tilde{\\varphi}(\\hat{\\boldsymbol{\\xi}}). \\tag{8}$$\n\nThis is **Babinet's identity**.[^1] Taking complex magnitudes:\n\n$$|\\psi + \\bar{\\psi}|^2 = |\\tilde{\\varphi}|^2.$$\n\nExpanding:\n\n$$|\\psi|^2 + |\\bar{\\psi}|^2 + 2\\,\\mathrm{Re}[\\psi \\bar{\\psi}^\\star] = |\\tilde{\\varphi}|^2.$$\n\n[^1]: Babinet's principle can be rigorously formulated under full electrodynamics (Zangwill 2013), not just scalar diffraction. The scalar version we derive here is sufficient for the BSDF construction.\n\nNow the crucial observation: outside the central lobe of $\\tilde{\\varphi}$ — that is, in directions $\\hat{\\boldsymbol{\\xi}}$ where $|\\tilde{\\varphi}(\\hat{\\boldsymbol{\\xi}})| \\approx 0$ — we have $|\\tilde{\\varphi}|^2 \\approx 0$, so the identity forces:\n\n$$|\\psi|^2 \\approx |\\bar{\\psi}|^2 \\qquad \\text{(outside the central lobe)}.$$\n\n**This is the \"identical diffraction pattern\" statement of Babinet's principle:** outside the forward beam, diffraction by an aperture and diffraction by its complement produce *identical intensities*. It's a deep symmetry — the screen's shadow and the aperture's illuminated region are mirror images of each other in the far field.\n\n![Babinet's principle: aperture vs complement fields](diagrams/babinet_symmetry.svg)\n\n**Check your understanding:** Babinet's identity says $\\psi + \\bar{\\psi} = \\tilde{\\varphi}$. If the aperture were the entire plane (no screen at all), what would $\\bar{\\psi}$ be? What would $\\psi$ be?\n\n*Answer:* If $A^\\perp = \\mathbb{R}^2$ then $\\psi = \\tilde{\\varphi}$ (integral over all of $\\mathbb{R}^2$) and $\\bar{\\psi} = 0$ (integral over the empty set). The identity $\\psi + \\bar{\\psi} = \\tilde{\\varphi}$ holds trivially.\n\n---\n\n## Running Example: Single Slit vs. Single Wire\n\nWe will carry a concrete example through the entire module. Consider a 1D problem (everything in the $x$-direction only):\n\n- **Incident beam:** $\\varphi(q) = e^{-q^2/(2\\sigma^2)}$ — a Gaussian with $\\sigma = 25\\lambda$.\n- **Aperture $A^\\perp$:** a single slit of width $2a = 10\\lambda$, centered at $q=0$. So $A^\\perp = [-a, a]$.\n- **Obstacle $\\bar{A}^\\perp$:** the complementary wire of the same width, $\\bar{A}^\\perp = (-\\infty, -a] \\cup [a, +\\infty)$.\n\nThe unobstructed field is the Fourier transform of the full Gaussian:\n\n$$\\tilde{\\varphi}(\\xi) = \\sigma\\sqrt{2\\pi}\\, e^{-2\\pi^2 \\sigma^2 \\xi^2}.$$\n\nThis is another Gaussian in $\\xi$-space, narrow because $\\sigma$ is large. At $\\sigma = 25\\lambda$, the FWHM of $|\\tilde{\\varphi}|^2$ subtends about $0.3°$ — essentially a laser-like forward beam.\n\nThe aperture diffraction field is:\n\n$$\\psi(\\xi) = \\frac{ike^{ikR}}{2\\pi R} \\int_{-a}^{a} e^{-q^2/(2\\sigma^2)} e^{-ik\\xi q}\\, dq.$$\n\nThe complement field $\\bar{\\psi}$ is the same with the integration range flipped to $(-\\infty,-a]\\cup[a,+\\infty)$. By Babinet's identity, $\\psi + \\bar{\\psi} = \\tilde{\\varphi}$.\n\nIn code:\n\n```python\nimport numpy as np\n\nsigma = 25.0      # in units of wavelength lambda\na = 5.0           # half-slit width, in units of lambda\nN = 4096          # number of spatial samples\nq = np.linspace(-200*sigma/25, 200*sigma/25, N)  # spatial grid\ndq = q[1] - q[0]\n\n# Gaussian beam\nphi = np.exp(-q**2 / (2 * sigma**2))\n\n# Aperture and complement masks\naperture_mask = (np.abs(q) <= a).astype(float)\ncomplement_mask = 1.0 - aperture_mask\n\n# Fields restricted to aperture and complement\nphi_aperture = phi * aperture_mask\nphi_complement = phi * complement_mask\n\n# Fraunhofer diffraction = Fourier transform\npsi = np.fft.fftshift(np.fft.fft(np.fft.ifftshift(phi_aperture))) * dq\npsi_bar = np.fft.fftshift(np.fft.fft(np.fft.ifftshift(phi_complement))) * dq\nphi_tilde = np.fft.fftshift(np.fft.fft(np.fft.ifftshift(phi))) * dq\n\n# Verify Babinet\nerror = np.max(np.abs(psi + psi_bar - phi_tilde))\nprint(f\"Babinet max error: {error:.2e}\")  # Should be ~1e-12 (machine precision)\n```\n\nThe error is at floating-point machine precision — Babinet's identity is exact, not approximate. This gives us a clean numerical test for Exercise 1.\n\n---\n\n## The Key Decomposition: Direct and Diffracted Terms\n\nNow comes the central conceptual move of the paper. Start from Babinet:\n\n$$\\psi = \\tilde{\\varphi} - \\bar{\\psi}. \\tag{from Eq. 8}$$\n\nCompute the intensity of the aperture diffraction:\n\n$$|\\psi|^2 = |\\tilde{\\varphi} - \\bar{\\psi}|^2 = |\\tilde{\\varphi}|^2 - 2\\,\\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star] + |\\bar{\\psi}|^2.$$\n\nNow group these three terms into two physically meaningful pieces:\n\n$$|\\psi|^2 = \\underbrace{\\left(|\\tilde{\\varphi}|^2 - \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]\\right)}_{d} + \\underbrace{\\left(|\\bar{\\psi}|^2 - \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]\\right)}_{w}. \\tag{11-12}$$\n\nDefining:\n\n$$d \\triangleq |\\tilde{\\varphi}|^2 - \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star], \\tag{direct term}$$\n\n$$w \\triangleq |\\bar{\\psi}|^2 - \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]. \\tag{diffracted term}$$\n\nWe have $|\\psi|^2 = d + w$ exactly. Note this is a sum of two *real-valued* functions of direction $\\hat{\\boldsymbol{\\xi}}$, with no complex phases — it's an incoherent decomposition.[^2]\n\n[^2]: \"Incoherent\" here means no cross-terms with complex phases remain. Both $d$ and $w$ are real-valued and their sum gives the true intensity $|\\psi|^2$. This is different from an incoherent *sum of intensities* — the decomposition is algebraically exact.\n\nIn code this is direct:\n\n```python\n# Exact decomposition |psi|^2 = d + w\nd = np.abs(phi_tilde)**2 - np.real(psi_bar * np.conj(phi_tilde))\nw = np.abs(psi_bar)**2 - np.real(psi_bar * np.conj(phi_tilde))\n\n# Verify\npsi_sq = np.abs(psi)**2\nerror = np.max(np.abs(psi_sq - (d + w)))\nprint(f\"|psi|^2 = d + w max error: {error:.2e}\")  # machine precision\n```\n\n**Common mistake:** writing `np.real(psi_bar * phi_tilde)` instead of `np.real(psi_bar * np.conj(phi_tilde))`. The formula has $\\bar{\\psi}\\,\\tilde{\\varphi}^\\star$ — conjugate of $\\tilde{\\varphi}$, not of $\\bar{\\psi}$. The cross-term is $\\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]$, which is real-valued. Getting the conjugation wrong breaks the decomposition.\n\n![Direct and diffracted term decomposition](diagrams/direct_diffracted_decomposition.svg)\n\n---\n\n## What the Direct Term Actually Is\n\nLet's compute the total power in the direct term. Integrating over all directions $\\hat{\\boldsymbol{\\xi}}$:\n\n$$\\int d(\\hat{\\boldsymbol{\\xi}})\\, d^2\\hat{\\boldsymbol{\\xi}} = \\int |\\tilde{\\varphi}|^2\\, d^2\\hat{\\boldsymbol{\\xi}} - \\int \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]\\, d^2\\hat{\\boldsymbol{\\xi}}.$$\n\nBy Parseval's theorem, $\\int |\\tilde{\\varphi}|^2 = \\int |\\varphi|^2 = P_{\\text{total}}$ (total incident power). The cross-term can be evaluated using the convolution/Parseval machinery. After working through the algebra (which the paper does in full detail), one arrives at:\n\n$$\\int d(\\hat{\\boldsymbol{\\xi}})\\, d^2\\hat{\\boldsymbol{\\xi}} = P_{A^\\perp}, \\tag{14}$$\n\nwhere $P_{A^\\perp} = \\int_{A^\\perp} |\\varphi(\\mathbf{q})|^2\\, d^2q$ is the power incident on the *opening* $A^\\perp$.\n\nThis is a beautiful result: **the direct term carries exactly the power that falls on the aperture opening, nothing more and nothing less.** Moreover, the direct term is concentrated in the central lobe — in directions where $|\\tilde{\\varphi}|$ is small, the cross-term almost exactly cancels $|\\tilde{\\varphi}|^2$, leaving $d \\approx 0$. Specifically:\n\n$$d(\\hat{\\boldsymbol{\\xi}}) \\approx 0 \\quad \\text{when } |\\tilde{\\varphi}(\\hat{\\boldsymbol{\\xi}})| \\approx 0. \\tag{15}$$\n\n**Physical interpretation:** $d$ describes the light that passes through the aperture and continues forward without bending — pure geometric optics. A ray that passes through the opening goes straight. This is handled perfectly by standard ray tracing: the ray continues forward, and the radiance is unchanged. No BSDF needed for this term.\n\nFor our single-slit example with $\\sigma = 25\\lambda$ and slit half-width $a = 5\\lambda$:\n\n$$P_{A^\\perp} = \\int_{-a}^{a} e^{-q^2/\\sigma^2}\\, dq = \\sigma\\sqrt{\\pi}\\,\\mathrm{erf}(a/\\sigma) \\approx \\sigma\\sqrt{\\pi} \\cdot \\mathrm{erf}(0.2) \\approx 0.351 \\,[\\text{in units of }\\sigma].$$\n\nAbout 35% of the beam's power passes through the slit — most of the beam is blocked by the wire.\n\n**Check your understanding:** Suppose the aperture $A^\\perp$ covers the entire plane (no screen). What is $P_{A^\\perp}$? What is $P_{\\bar{A}^\\perp}$? What does the direct term become?\n\n*Answer:* $P_{A^\\perp} = P_\\text{total}$, $P_{\\bar{A}^\\perp} = 0$. The complement field $\\bar{\\psi} = 0$ (integral over the empty set), so $d = |\\tilde{\\varphi}|^2$ and $w = 0$. The direct term is the entire intensity — as expected for unobstructed propagation.\n\n---\n\n## What the Diffracted Term Actually Is\n\nNow consider the diffracted term $w$. Its total power:\n\n$$\\int w(\\hat{\\boldsymbol{\\xi}})\\, d^2\\hat{\\boldsymbol{\\xi}} = \\int |\\bar{\\psi}|^2\\, d^2\\hat{\\boldsymbol{\\xi}} - \\int \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]\\, d^2\\hat{\\boldsymbol{\\xi}}.$$\n\nBy Parseval, $\\int |\\bar{\\psi}|^2 = \\int_{\\bar{A}^\\perp} |\\varphi|^2 = P_{\\bar{A}^\\perp}$ (power on the obstacle). By a similar Parseval argument for the cross-term (which integrates $\\varphi^\\star \\cdot (\\bar{\\varphi})$ where $\\bar{\\varphi} = \\varphi \\cdot \\mathbf{1}_{\\bar{A}^\\perp}$), we find:\n\n$$\\int \\mathrm{Re}[\\bar{\\psi}\\,\\tilde{\\varphi}^\\star]\\, d^2\\hat{\\boldsymbol{\\xi}} = P_{\\bar{A}^\\perp}.$$\n\nTherefore:\n\n$$\\int w(\\hat{\\boldsymbol{\\xi}})\\, d^2\\hat{\\boldsymbol{\\xi}} = P_{\\bar{A}^\\perp} - P_{\\bar{A}^\\perp} = 0. \\tag{total power of w}$$\n\n**The total power in the diffracted term is exactly zero.** This is not a numerical accident or a sign of error — it's an algebraic identity. The diffracted lobes outside the central beam carry positive power; this must be balanced by negative values of $w$ somewhere. Where? Precisely in the central lobe, where $|\\tilde{\\varphi}|$ is non-negligible.\n\nYou can verify this numerically in our running example:\n\n```python\ndxi = xi[1] - xi[0]\ntotal_power_w = np.sum(w) * dxi\nprint(f\"Total power in w: {total_power_w:.2e}\")  # ≈ 0 (up to boundary effects)\n\n# w is negative in the central lobe\ncentral_lobe = np.abs(xi) < 3 * (1 / (2 * np.pi * sigma))  # 3 sigma in xi-space\nprint(f\"w < 0 in central lobe: {np.all(w[central_lobe] < 0)}\")  # True\nprint(f\"w > 0 outside central lobe: {np.all(w[~central_lobe] > 0)}\")  # True (mostly)\n```\n\nThe diffracted term has a beautiful structure: **negative in the center (where geometric optics dominates), positive in the wings (the diffraction fringes)**. This is the wave-optical correction to geometric optics.\n\n---\n\n## The Problem: w Takes Negative Values\n\nHere is the fundamental issue for rendering: a BSDF must be non-negative. It is a ratio of radiance to irradiance, and radiance is always $\\geq 0$. We cannot use $w$ directly as a BSDF.\n\nCould we just take $\\max(w, 0)$? In principle yes, but then we lose energy conservation. The positive lobes (diffraction fringes) must be paid for somehow.\n\nLet's diagnose the problem more carefully. The direct term $d$ is concentrated in the central lobe (forward direction). Outside the lobe, $d \\approx 0$. The full aperture intensity $|\\psi|^2$ outside the lobe equals the diffraction fringes. But $|\\psi|^2 = d + w$ and $d \\approx 0$ there, so $w \\approx |\\psi|^2 \\geq 0$ outside the lobe — correct.\n\nInside the central lobe, $|\\psi|^2 = d + w$. We know $d \\geq 0$ and $|\\psi|^2 \\geq 0$, but $d$ already *exceeds* $|\\psi|^2$ in the central lobe (because $d$ accounts for all the power that passes through the aperture, while the actual diffraction pattern has some of that power spread to the wings). Therefore $w = |\\psi|^2 - d < 0$ in the central lobe.\n\nQuantitatively, for our slit example with $a = 5\\lambda$, the negative region of $w$ covers the directions within roughly $\\pm 1/(2a) = \\pm 0.1/\\lambda$ of the forward direction. For $\\sigma = 25\\lambda$, the central lobe has half-width $\\sim 1/(2\\pi\\sigma) \\approx 0.006/\\lambda$ — about 16 times narrower. So the negative part of $w$ is limited to a small central region, but it's exactly where the beam is most intense.\n\n![Why w must be negative: power accounting](diagrams/why_w_negative.svg)\n\n**Check your understanding:** The total power in $w$ is zero. We know $w > 0$ in the diffraction fringes. Does this mean the diffraction fringes \"get their energy for free\"? Where does their energy come from?\n\n*Answer:* No, energy is not free. The positive diffraction fringes are balanced by the negative central lobe of $w$. The decomposition is: total aperture intensity $|\\psi|^2 = d + w$. The direct term $d$ contains all the power $P_{A^\\perp}$. So if $w$ has total power zero, and $d$ has total power $P_{A^\\perp}$, then $|\\psi|^2$ has total power $P_{A^\\perp}$ — which is correct by energy conservation. The fringes come at the expense of the central lobe peak being reduced below what $d$ alone would predict.\n\n---\n\n## The Fix: Clamping and Energy Borrowing\n\nThe paper's approach is clean and honest about the approximation it makes:\n\n**Step 1: Clamp $w$ to zero.** Define $\\hat{w}(\\hat{\\boldsymbol{\\xi}}) = \\max(w(\\hat{\\boldsymbol{\\xi}}), 0)$. This is non-negative everywhere, so it can serve as a BSDF numerator.\n\n**Step 2: Acknowledge the borrowed power.** After clamping, $\\hat{w}$ has positive total power $\\hat{P} > 0$. Where does this power come from? We take it from the energy incident on the *obstacle* $\\bar{A}^\\perp$. Recall that $P_{\\bar{A}^\\perp}$ is the power that hits the screen material. Normally this power would be absorbed or back-scattered. By \"lending\" $\\hat{P}$ of it to the diffracted lobes, we slightly redirect light from the obstacle into the diffraction pattern.\n\n**What approximation is being made?** Physically, the exact result is that diffraction fringes and the central lobe together conserve $P_{A^\\perp}$. By clamping, we shift some power from the obstacle to the fringes. This effectively makes the geometry slightly smaller — objects act as if their edges are
