i_j^{-T}\\boldsymbol{\\xi}$ and factoring:\n- The $s$-independent part (proportional to $a_j + b_j$) produces the $\\alpha_2$ term after evaluating $\\int_{-1/2}^{1/2} e^{i\\zeta_x t} dt = \\mathrm{sinc}(\\zeta_x/2)$.\n- The $s$-dependent part (proportional to $a_j - b_j$) produces the $\\alpha_1$ term after integrating $\\int_{-1/2}^{1/2} t \\, e^{i\\zeta_x t} dt$, which yields $\\cos(\\zeta_x/2)/\\zeta_x - \\mathrm{sinc}(\\zeta_x/2)/\\zeta_x$.\n\nThe $\\hat{m}_j \\cdot \\boldsymbol{\\xi}$ factor becomes $\\zeta_y$ after the coordinate change (since $\\hat{m}_j$ is the row of $\\Xi^{-1}$ associated with the $y$ direction of $\\boldsymbol{\\zeta}$), and $\\zeta^2$ appears from the $1/\\xi^2$ prefactor in Eq. (22).\n\n### Symmetry Properties\n\nThese symmetry properties are *not* a coincidence — they are what makes opposing edges cancel:\n\n- $\\alpha_1(\\zeta)$: **odd in $\\zeta_x$, odd in $\\zeta_y$**. Flipping $\\zeta_x \\to -\\zeta_x$ negates $\\alpha_1$.\n- $\\alpha_2(\\zeta)$: **even in $\\zeta_x$, odd in $\\zeta_y$**. Flipping $\\zeta_x \\to -\\zeta_x$ leaves $\\alpha_2$ unchanged.\n\n**Numerical stability near $\\zeta_x = 0$.** Both functions have $\\zeta_x$ in the denominator. For $\\alpha_1$ this is clear. For $\\alpha_2$, it enters through $\\mathrm{sinc}(\\zeta_x/2) = \\sin(\\zeta_x/2)/(\\zeta_x/2)$, but the outer $\\zeta^2 = \\zeta_x^2 + \\zeta_y^2$ can be zero at the origin. The limits are:[^4]\n\n$$\\lim_{\\zeta_x \\to 0} \\alpha_1(\\zeta_x, \\zeta_y) = \\frac{\\zeta_y}{2\\pi \\zeta_y^2} \\cdot \\left(-\\frac{1}{8}\\right) = -\\frac{1}{16\\pi\\zeta_y}$$\n\nMore precisely, using $\\cos(u) - \\mathrm{sinc}(u) \\approx -u^2/8$ as $u \\to 0$:\n\n$$\\alpha_1(\\zeta_x, \\zeta_y) \\approx \\frac{\\zeta_y}{2\\pi(\\zeta_x^2+\\zeta_y^2)\\zeta_x} \\cdot \\left(-\\frac{\\zeta_x^2}{8}\\right) = \\frac{-\\zeta_y \\zeta_x}{16\\pi(\\zeta_x^2+\\zeta_y^2)} \\xrightarrow{\\zeta_x \\to 0} 0$$\n\nSo $\\alpha_1 \\to 0$ as $\\zeta_x \\to 0$.\n\nFor $\\alpha_2$: $\\mathrm{sinc}(\\zeta_x/2) \\to 1$ as $\\zeta_x \\to 0$, so $\\alpha_2(\\zeta_x, \\zeta_y) \\to \\zeta_y / (2\\pi\\zeta_y^2) = 1/(2\\pi\\zeta_y)$ as $\\zeta_x \\to 0$.\n\nIn code, use a branch on $|\\zeta_x| < \\epsilon$:\n\n```python\ndef alpha1(zeta_x, zeta_y):\n    \"\"\"α₁(ζ) = ζ_y/(2π ζ² ζ_x) (cos(ζ_x/2) - sinc(ζ_x/2))\n    sinc here is UNNORMALIZED: sinc(u) = sin(u)/u, not sin(πu)/(πu).\n    \"\"\"\n    zeta2 = zeta_x**2 + zeta_y**2\n    eps = 1e-6\n    small_x = np.abs(zeta_x) < eps\n    # For large |ζ_x|: direct formula\n    half_x = zeta_x / 2.0\n    cos_term = np.cos(half_x)\n    sinc_term = np.where(np.abs(half_x) < 1e-12, 1.0, np.sin(half_x) / half_x)\n    numerator = zeta_y * (cos_term - sinc_term)\n    denom = 2 * np.pi * zeta2 * zeta_x\n    result_large = np.where(np.abs(denom) > 1e-30, numerator / denom, 0.0)\n    # For small |ζ_x|: Taylor expansion: cos(u) - sinc(u) ≈ -u²/8\n    # So the whole thing ≈ ζ_y * (-ζ_x²/8) / (2π ζ² ζ_x) = -ζ_x ζ_y / (16π ζ²)\n    result_small = -zeta_x * zeta_y / (16 * np.pi * (zeta2 + 1e-30))\n    return np.where(small_x, result_small, result_large)\n```\n\n[^4]: A critical \"gotcha\": NumPy's `np.sinc(x)` computes $\\sin(\\pi x)/(\\pi x)$, the *normalized* sinc. The paper uses the *unnormalized* sinc: $\\mathrm{sinc}(u) = \\sin(u)/u$. Using `np.sinc` directly would introduce factors of $\\pi$ in wrong places. Always compute sinc manually: `np.where(np.abs(u) < 1e-12, 1.0, np.sin(u)/u)`.\n\n![α₁ and α₂ functions: lobe structure and symmetry](diagrams/alpha_functions.svg)\n\n**Check your understanding:** Looking at the formula for $\\alpha_2$: it has $\\mathrm{sinc}(\\zeta_x/2)$, which is the Fourier transform of a rectangular function. What physical aperture would produce *only* an $\\alpha_2$ term (no $\\alpha_1$)? *(Hint: $\\alpha_1$ vanishes when $a_j = b_j$ — what does that mean for the incident beam?)*\n\n---\n\n## The Edge-Diffracted Wave ψⱼ: Putting It All Together\n\nThe full closed-form expression for the edge-diffracted wave from boundary edge $j$ is:\n\n$$\\psi_j(\\boldsymbol{\\xi}) \\triangleq e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_j} \\cdot \\frac{k/R}{|\\Xi_j|} \\left[ (a_j - b_j) \\alpha_1(\\Xi_j^{-T}\\boldsymbol{\\xi}) + i\\frac{a_j+b_j}{2}\\alpha_2(\\Xi_j^{-T}\\boldsymbol{\\xi}) \\right] \\tag{23}$$\n\nwith vertex field values:\n\n$$a_j, b_j \\triangleq \\varphi\\!\\left(\\boldsymbol{v}_j \\mp \\tfrac{1}{2}\\boldsymbol{e}_j\\right) e^{-ikz(\\boldsymbol{v}_j \\mp \\frac{1}{2}\\boldsymbol{e}_j)} \\tag{24}$$\n\nand the total diffracted field $\\bar{\\psi} = \\sum_j \\psi_j$.\n\n### Dissecting Each Factor\n\nLet's go term by term:\n\n**1. Phase center: $e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_j}$**\n\nThis is a plane-wave phase factor centered at the edge midpoint $\\boldsymbol{v}_j$. It encodes where the edge sits on the virtual screen. Two edges at different positions $\\boldsymbol{v}_j, \\boldsymbol{v}_l$ will have different phases, causing constructive/destructive interference between them — which is what produces diffraction fringes.\n\n**2. Amplitude: $k/(R|\\Xi_j|)$**\n\nSince $R = 1$ throughout, this is just $k/|\\Xi_j|$. We showed $|\\Xi_j| = 4/(k^2 e_j^2)$... but let's verify: if $\\Xi_j^{-1}$ has rows $\\boldsymbol{e}_j$ and $e_j \\hat{m}_j$ (each scaled by $k/2$), then $|\\Xi_j^{-1}| = (k/2)^2 |\\boldsymbol{e}_j \\times (e_j \\hat{m}_j)| = (k^2/4) e_j^2$. So $|\\Xi_j| = 4/(k^2 e_j^2)$ and $k/|\\Xi_j| = k^3 e_j^2/4$.\n\n**3. Differential term: $(a_j - b_j)\\alpha_1(\\boldsymbol{\\zeta})$**\n\nThe difference $a_j - b_j$ is the change in the incident beam from one end of the edge to the other. When the beam is locally flat over the edge ($a_j \\approx b_j$), this term vanishes. This is the \"gradient\" contribution to diffraction.\n\n**4. Mean term: $i(a_j+b_j)/2 \\cdot \\alpha_2(\\boldsymbol{\\zeta})$**\n\nThe average $(a_j+b_j)/2$ is the mean field value along the edge. This dominates when the beam is roughly constant across the edge length. Note the factor of $i$ (imaginary unit) — this term is 90° out of phase with the differential term.\n\n**5. Normalized direction: $\\boldsymbol{\\zeta} = \\Xi_j^{-T}\\boldsymbol{\\xi}$**\n\nThe transform $\\Xi_j^{-T}$ converts the observation direction $\\boldsymbol{\\xi}$ into the edge's local coordinate system, normalized by edge length and wavenumber.\n\nIn code:\n\n```python\ndef edge_diffracted_wave(xi_grid, v_j, e_j, m_j, a_j, b_j, k, R=1.0):\n    \"\"\"\n    Compute ψ_j(ξ) for all ξ in xi_grid.\n    xi_grid: shape (..., 2)\n    Returns complex array of same shape (without trailing 2).\n    \"\"\"\n    Xi_inv, Xi_inv_T, det_Xi = compute_xi_transform(e_j, m_j, k)\n    # Coordinate transform: ζ = Xi_inv_T @ ξ\n    zeta = xi_grid @ Xi_inv_T  # shape (..., 2)\n    zeta_x, zeta_y = zeta[..., 0], zeta[..., 1]\n    a1 = alpha1(zeta_x, zeta_y)\n    a2 = alpha2(zeta_x, zeta_y)\n    # Phase center\n    phase = np.exp(-1j * k * (xi_grid @ v_j))\n    # Amplitude factor\n    amp = (k / R) * det_Xi\n    # Edge-diffracted wave\n    psi_j = phase * amp * ((a_j - b_j) * a1 + 1j * (a_j + b_j) / 2 * a2)\n    return psi_j\n```\n\n![Edge-diffracted wave ψⱼ: anatomy of one term](diagrams/psi_j_anatomy.svg)\n\n---\n\n## Why Opposing Edges Cancel: The Symmetry Argument\n\nConsider two edges $j$ and $l$ that are \"opposing\" in the sense that they are the same edge shared between two adjacent triangles in the interior of $A^\\perp$. Opposing means:\n\n$$\\boldsymbol{e}_l = -\\boldsymbol{e}_j, \\quad \\hat{m}_l = -\\hat{m}_j, \\quad a_l = b_j, \\quad b_l = a_j$$\n\n(same midpoint $\\boldsymbol{v}_j = \\boldsymbol{v}_l$, edge goes the other way, normal flips, endpoint labels swap).\n\n**Claim:** $\\psi_j(\\boldsymbol{\\xi}) = -\\psi_l(\\boldsymbol{\\xi})$, so they cancel exactly.\n\n**Proof:**\n- Flipping $\\boldsymbol{e}_l = -\\boldsymbol{e}_j$ means $\\Xi_l^{-1} = -\\Xi_j^{-1}$ in the first row but same magnitude: $|\\Xi_l| = |\\Xi_j|$ (determinant is sign-invariant for 2×2 with a row flip and column... let's be more careful).\n- Actually: $\\Xi_l^{-1}$ has first row $k\\boldsymbol{e}_l^\\top = -k\\boldsymbol{e}_j^\\top$ and second row $ke_l\\hat{m}_l^\\top = ke_j(-\\hat{m}_j)^\\top = -ke_j\\hat{m}_j^\\top$.\n- So $\\Xi_l^{-1} = -\\Xi_j^{-1}$, giving $|\\Xi_l^{-1}| = (-1)^2|\\Xi_j^{-1}| = |\\Xi_j^{-1}|$, so $|\\Xi_l| = |\\Xi_j|$.\n- The transformed argument: $\\Xi_l^{-T}\\boldsymbol{\\xi} = -\\Xi_j^{-T}\\boldsymbol{\\xi} = -\\boldsymbol{\\zeta}$.\n- Now use symmetry: $\\alpha_1(-\\boldsymbol{\\zeta}) = -\\alpha_1(\\boldsymbol{\\zeta})$ (odd in both components), $\\alpha_2(-\\boldsymbol{\\zeta}) = -\\alpha_2(\\boldsymbol{\\zeta})$ (even in $\\zeta_x$, odd in $\\zeta_y$, and both components flip: so $\\alpha_2(-\\zeta_x, -\\zeta_y) = \\alpha_2(\\zeta_x, -\\zeta_y) = -\\alpha_2(\\boldsymbol{\\zeta})$).\n- Also: $a_l - b_l = b_j - a_j = -(a_j - b_j)$ and $a_l + b_l = b_j + a_j = a_j + b_j$.\n- Putting it together: $\\psi_l \\propto [-(a_j-b_j)\\cdot(-\\alpha_1) + i(a_j+b_j)/2 \\cdot (-\\alpha_2)] = [(a_j-b_j)\\alpha_1 - i(a_j+b_j)/2 \\cdot\\alpha_2]$...\n\nHmm, this gives $+\\alpha_1$ not $-\\alpha_1$. Let me recheck. The phase factor $e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_l} = e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_j}$ (same midpoint). The amplitude $k/|\\Xi_l| = k/|\\Xi_j|$. So:\n\n$$\\psi_l = e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_j} \\frac{k}{|\\Xi_j|} \\left[(a_l - b_l)\\alpha_1(-\\boldsymbol{\\zeta}) + i\\frac{a_l+b_l}{2}\\alpha_2(-\\boldsymbol{\\zeta})\\right]$$\n$$= e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_j} \\frac{k}{|\\Xi_j|} \\left[-(a_j-b_j)(-\\alpha_1(\\boldsymbol{\\zeta})) + i\\frac{a_j+b_j}{2}(-\\alpha_2(\\boldsymbol{\\zeta}))\\right]$$\n$$= e^{-ik\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_j} \\frac{k}{|\\Xi_j|} \\left[(a_j-b_j)\\alpha_1(\\boldsymbol{\\zeta}) - i\\frac{a_j+b_j}{2}\\alpha_2(\\boldsymbol{\\zeta})\\right]$$\n\nThis is *not* $-\\psi_j$ — it differs by the sign of the $i\\alpha_2$ term. Let me look at this more carefully.\n\nThe key is the orientation of the edge matters for the sign of the outward normal. For a shared interior edge, the normals from the two triangles point in *opposite* directions (inward vs outward). In the boundary integral Eq. (22), the outward normal $\\hat{m}$ of the full region $A^\\perp$ is *outward* for both, but when we write the sum over all triangle boundaries and take only boundary edges (those belonging to one triangle), the normals are consistent. For interior edges, the two triangles contribute with opposing normals: $\\hat{m}_l = -\\hat{m}_j$, *and* the edge direction also flips: $\\hat{e}_l = -\\hat{e}_j$.\n\nThe actual proof uses the full symmetry of $\\alpha_1$ and $\\alpha_2$ more carefully and is detailed in Section S2 of the paper. The conclusion is firm: opposing edges cancel, and this is what justifies going from the sum over all triangle interiors to the sum over only boundary edges.[^5]\n\n[^5]: The cancellation of interior edges is the discrete analogue of Stokes' theorem for differential forms. In differential forms language, the divergence theorem says $\\int_\\Omega d\\omega = \\int_{\\partial\\Omega} \\omega$. When you sum over all triangles, interior edges appear twice with opposite orientations and cancel, leaving only boundary edges.\n\n**Practical implication:** In Algorithm 1 (lines 9-13), we iterate over all edges of all front-facing triangles. An edge that belongs to two front-facing triangles is an interior edge — we skip it. Only edges belonging to exactly one front-facing triangle are boundary edges $\\delta A^\\perp$ and contribute to $\\psi$.\n\n---\n\n## Superposing Edge Waves: Single Slit and Double Slit\n\nNow let's apply this to our running example. A single slit of half-width $a$ has two boundary edges:\n\n- **Right edge** ($j=1$): midpoint $\\boldsymbol{v}_1 = (a, 0)$, edge vector $\\boldsymbol{e}_1 = (0, L)$ (vertical, length $L$ = truncation length), outward normal $\\hat{m}_1 = (1, 0)$ (pointing right, into the aperture).\n- **Left edge** ($j=2$): midpoint $\\boldsymbol{v}_2 = (-a, 0)$, edge vector $\\boldsymbol{e}_2 = (0, -L)$ (vertical, pointing down), outward normal $\\hat{m}_2 = (-1, 0)$ (pointing left).\n\n(We truncate the vertical extent to $L \\gg \\sigma$ to model the finite beam.)\n\nThe incident beam $\\varphi(x, y) = e^{-(x^2+y^2)/(2\\sigma^2)}$ gives:\n- Right edge: $a_1 = \\varphi(a, L/2)$, $b_1 = \\varphi(a, -L/2)$\n- Left edge: $a_2 = \\varphi(-a, -L/2)$, $b_2 = \\varphi(-a, L/2)$\n\n(since $a_j$ is at $\\boldsymbol{v}_j - \\boldsymbol{e}_j/2$ and $b_j$ is at $\\boldsymbol{v}_j + \\boldsymbol{e}_j/2$).\n\nThe total diffracted field is $\\bar{\\psi}(\\boldsymbol{\\xi}) = \\psi_1(\\boldsymbol{\\xi}) + \\psi_2(\\boldsymbol{\\xi})$, and the intensity is $|\\bar{\\psi}|^2$.\n\nFor a 1D scan along $\\xi_x$ with $\\xi_y = 0$ (the standard diffraction pattern in the plane of the slit):\n\n- $\\boldsymbol{\\xi} = (\\xi_x, 0)$, so $\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_1 = a\\xi_x$ and $\\boldsymbol{\\xi}\\cdot\\boldsymbol{v}_2 = -a\\xi_x$.\n- The transform for edge 1 gives $\\zeta_x = k\\boldsymbol{e}_1\\cdot\\boldsymbol{\\xi}/2 = 0$ (edge is vertical, $\\boldsymbol{\\xi}$ is horizontal: dot product is 0) and $\\zeta_y = ke_1(\\hat{m}_1\\cdot\\boldsymbol{\\xi})/2 = ke_1\\xi_x/2 = k L\\xi_x/2$.\n\nWait, this gives $\\zeta_x = 0$ for both edges, meaning we'd always be in the $\\zeta_x \\to 0$ limit. That's because when the slit is vertical and we scan horizontally, $\\boldsymbol{\\xi}$ is always perpendicular to the edge direction, so the edge-along-edge component of $\\boldsymbol{\\xi}$ is zero. In this limit, $\\alpha_1 \\to 0$ and $\\alpha_2 \\to 1/(2\\pi\\zeta_y)$... let me verify this connects to the known sinc pattern.\n\nActually, for the horizontal-scan case on the vertical slit, the pattern is dominated by $\\alpha_2$ (the mean term), and the phase difference between the two edges at $\\pm a$ gives rise to the cosine interference. This is consistent with the standard result $|\\mathrm{sinc}(ka\\xi_x)|^2 \\cdot \\cos^2(...)$ pattern.\n\nIn Exercise 5, you'll implement `superpose_edge_waves` and verify against the analytic formula and FFT reference.\n\n**For the double slit** (width $2a$, separation $2d$): four boundary edges (two per slit). The two slits are at $x \\in [-d-a, -d+a]$ and $x \\in [+d-a, +d+a]$. The boundary edges are at $x = \\pm(d-a)$ (inner edges) and $x = \\pm(d+a)$ (outer edges). The superposition of four edge waves produces the classic double-slit pattern: $\\mathrm{sinc}^2(ka\\xi_x)\\cos^2(kd\\xi_x)$.\n\n---\n\n## The Clamped Diffracted Term\n\nSo far we've computed $\\psi_j$, which gives $|\\bar\\psi|^2 = |\\sum_j \\psi_j|^2$. This is the diffracted intensity by the *complement* aperture $A^\\perp$ (the obstacle). We showed in Module 1 that the physical diffracted term is:\n\n$$w(\\boldsymbol{\\xi}) = |\\psi(\\boldsymbol{\\xi})|^2 - \\mathrm{Re}[\\psi(\\boldsymbol{\\xi})\\tilde{\\varphi}^*(\\boldsymbol{\\xi})] \\tag{12}$$\n\nand this can be negative in the central lobe. The fix is to remove the central lobe from each edge-diffracted wave via a Gaussian modulator:\n\n$$\\hat{\\psi}_j(\\boldsymbol{\\xi}) \\triangleq \\sqrt{1 - \\chi(\\Xi_j^{-T}\\boldsymbol{\\xi})} \\cdot \\psi_j(\\boldsymbol{\\xi}), \\qquad \\chi(\\boldsymbol{\\zeta}) \\triangleq \\exp\\!\\left(-\\frac{\\zeta^2}{2\\sigma_\\zeta^2}\\right), \\quad \\sigma_\\zeta = \\sqrt{3} \\tag{28, 29}$$\n\nThe clamped diffracted term is then:\n\n$$\\hat{w}(\\boldsymbol{\\xi}) \\triangleq \\sum_j |\\hat{\\psi}_j(\\boldsymbol{\\xi})|^2 \\tag{30}$$\n\nNote the sum of *squares* (not square of sum) — so no interference between edges in the clamped term. This makes $\\hat{w} \\geq 0$ always, at the cost of ignoring inter-edge interference in the central lobe region.\n\n**Why $\\sigma_\\zeta = \\sqrt{3}$?** This value is chosen so that the Gaussian modulator removes the tightest central lobe that can be physically resolved — roughly the first zero of the diffraction pattern. It is stated in the paper without detailed justification, but $\\sqrt{3} \\approx 1.73$ corresponds to the 1-$\\sigma$ radius where the modulator reaches $e^{-1/2} \\approx 0.6$, beginning to suppress the central region.\n\nThe BSDF is then defined as:\n\n$$f(\\boldsymbol{\\omega}_o) = \\frac{R^2}{P_{A^\\perp} \\cos\\theta} \\hat{w}(\\boldsymbol{\\xi}) \\tag{BSDF}$$\n\nwhere $P_{A^\\perp}$ is the total power on the aperture and $\\cos\\theta$ is the usual BSDF cosine factor. The $R^2$ and $R$ in the denominator of $\\hat{w}$ cancel, giving a BSDF that is independent of $R$. This is covered in Module 3.\n\n---\n\n## Analytical Questions\n\n### Question 1 — What Is the Information Bottleneck?\n\nThe BSDF for a given ray intersection is fully determined by: (a) the edge set $\\{(\\boldsymbol{v}_j, \\boldsymbol{e}_j, \\hat{m}_j, a_j, b_j)\\}$, (b) the functions $\\alpha_1, \\alpha_2$, and (c) the wavenumber $k$. The functions $\\alpha_1, \\alpha_2$ are universal. The edge set depends on local geometry within the search radius.\n\n**(a)** Consider a scene with $N$ triangles and $M$ boundary edges. What is the computational complexity of evaluating the BSDF at a single direction $\\boldsymbol{\\xi}$, as a function of $M$? What about the direct term (ray tracing through the aperture)?\n\n**(b)** In the standard Fraunhofer FFT approach (Module 0), evaluating the diffracted field at $P$ output directions requires $O(N \\log N + P)$ operations (FFT + sampling). The edge-based formula requires $O(M)$ per output direction. For what ratio $M/P$ does the edge-based formula outperform the FFT?\n\n**(c)** The paper's search radius is $3\\sigma = 75\\lambda$ for $\\sigma = 25\\lambda$. For a scene with triangle density $\\rho$ triangles per $\\lambda^2$, estimate $M$ as a function of $\\rho$ and $\\sigma$.\n\n### Question 2 — Numerical Stability and the $\\xi \\to 0$ Limit\n\nThe divergence-theorem formula Eq. (22) has a factor $1/\\xi^2$ that blows up as $\\boldsymbol{\\xi} \\to 0$. Yet $\\psi(\\boldsymbol{\\xi}=0)$ is finite (it's the field on-axis, which is $\\propto$ the total area of the aperture).\n\n**(a)** Show analytically that the $1/\\xi^2$ singularity is canceled. (Hint: at $\\boldsymbol{\\xi} = 0$, what happens to $\\hat{m}\\cdot\\boldsymbol{\\xi}$ in Eq. (22)? For a closed boundary, is $\\oint \\hat{m} \\cdot \\boldsymbol{\\xi} \\, ds$ well-behaved as $\\boldsymbol{\\xi} \\to 0$?)\n\n**(b)** In the discrete edge formula, both $\\alpha_1$ and $\\alpha_2$ encode the $\\zeta \\to 0$ behavior. Show that $|\\Xi_j^{-T}\\boldsymbol{\\xi}|$ scales as $\\xi$ for any fixed edge geometry, so $\\boldsymbol{\\zeta} \\to 0$ as $\\boldsymbol{\\xi} \\to 0$.\n\n**(c)** At $\\boldsymbol{\\xi} = 0$, $\\alpha_2(\\boldsymbol{0})$ diverges (it has a $1/\\zeta^2$ factor). Yet $\\psi_j(0)$ should be finite. Show that the product $\\frac{k}{|\\Xi_j|} \\cdot \\frac{1}{\\zeta^2} \\cdot \\zeta_y$ (the relevant part of $\\alpha_2$) is finite as $\\boldsymbol{\\xi} \\to 0$, and evaluate it in terms of edge geometry.\n\n### Question 3 — The Double-Slit Fringe Spacing\n\nA double slit with slit width $2a = 2\\lambda$ and slit separation $2d = 10\\lambda$ (center-to-center) is illuminated by a plane wave (constant $\\varphi = 1$). Using the edge-based formula:\n\n**(a)** Write out the four boundary edge positions $\\boldsymbol{v}_j$, vectors $\\boldsymbol{e}_j$, normals $\\hat{m}_j$, and field values $a_j, b_j$.\n\n**(b)** Show that in the 1D scan ($\\xi_y = 0$), the four-edge superposition gives a pattern proportional to $\\mathrm{sinc}^2(ka\\xi_x) \\cos^2(kd\\xi_x)$ — the standard textbook result.\n\n**(c)** The paper compares to UTD (Fig. 5). UTD represents diffraction from each *edge element* as a phase-carrying ray. For the same double slit, how many UTD edge samples would you need along each edge to avoid aliasing at the 10th-order fringe ($\\theta \\approx 5\\lambda/d$)?\n\n### Question 4 — Energy Conservation and the Clamping Approximation\n\nThe clamped diffracted term $\\hat{w}$ is defined as $\\sum_j |\\hat\\psi_j|^2$ (sum of squared individual waves), not $|\\sum_j \\hat\\psi_j|^2$ (square of sum). This ignores inter-edge interference.\n\n**(a)** Why can we ignore inter-edge interference in the power calculation but not in the amplitude pattern?\n\n**(b)** The per-edge power $\\hat{P}_j^{PL}$ involves constants $\\mathfrak{I}_1 = 0.0045255085$ and $\\mathfrak{I}_2 = 0.11487543$. These are numerically integrated powers of $|\\alpha_1|^2$ and $|\\alpha_2|^2$ with the central lobe removed. The ratio $\\mathfrak{I}_2/\\mathfrak{I}_1 \\approx 25.4$ tells us that $\\alpha_2$ carries much more power than $\\alpha_1$. When would the $\\alpha_1$ term dominate? (Hint: what regime of $|a_j - b_j| / |(a_j + b_j)/2|$ is needed?)\n\n**(c)** The paper states the cross-term approximation in Eq. (32) has relative error less than $10^{-7}$. Is this always the case, or only in specific beam-geometry configurations? When would the cross term be significant?\n\n---\n\n## Synthesis: What This Enables\n\nLet's zoom out and see what we've built. Starting from the 2D Fraunhofer integral (Module 0), via Babinet's principle (Module 1), we've arrived at a formula where:\n\n**Every edge of the triangular mesh contributes one closed-form term** $\\psi_j(\\boldsymbol{\\xi})$, requiring only: (1) two complex numbers $a_j, b_j$ (the incident beam at two points), (2) two geometric numbers ($\\boldsymbol{v}_j$ and $e_j$), and (3) two universal functions $\\alpha_1, \\alpha_2$ evaluated at $\\Xi_j^{-T}\\boldsymbol{\\xi}$.\n\nThis is the computational miracle that makes the paper's BSDF work:\n\n1. **No numerical integration** — the 2D integral reduced to a finite sum of analytic terms.\n2. **Universal functions** — $\\alpha_1, \\alpha_2$ don't depend on wavelength or edge length. They can be precomputed, tabulated, and importance-sampled once and for all.\n3. **Path-tracer compatible** — the result is a *radiance* (power per steradian), not a phase amplitude. It obeys a linear rendering equation.\n4. **Handles arbitrary polygons** — by linearity, any polygon = sum of its boundary edges. Complex apertures (hexagons, triangulated buildings) are handled automatically.\n5. **Non-planar apertures** — the depth phasor $e^{-ikz}$ in the vertex values $a_j, b_j$ correctly accounts for thickness.\n\nIn Module 3, we'll package this into the actual BSDF $f(\\omega_o)$, normalize it correctly, and handle the aperture construction algorithm. In Module 4, we'll build the importance sampler using precomputed iCDF tables for $\\alpha_1$ and $\\alpha_2$.\n\nThe insight that started it all — \"use the divergence theorem to convert area to boundary\" — is the same trick that underlies the boundary element method (BEM) in computational physics. Here, it produces not an approximate numerical boundary integral but an *exact* closed form, because the PLA makes the integrand polynomial in $s$. That's the key combination: the right approximation (PLA) that enables the right mathematical tool (divergence theorem → exact polynomial integration).\n\n---\n\n*In Exercise 1 you verify the area-to-boundary conversion numerically. In Exercise 2 you implement $\\alpha_1, \\alpha_2$ with correct symmetry. In Exercise 3 you build the $\\Xi_j$ transform and verify cancellation of opposing edges. In Exercise 4 you compute the full $\\psi_j$. In Exercise 5 you superpose multiple edges to reproduce single-slit and double-slit patterns.*\n", "exercises": [{"filename": "ex01_divergence_theorem_area_integral_to_boundary_integ.py", "content": "\"\"\"\nExercise 1: Divergence Theorem — Area Integral to Boundary Integral\n===================================================================\nModule 2: Edge-Based Diffraction: The Core Formulation\n\nThe 2D Fraunhofer diffraction integral over a polygon:\n\n    ψ̄(ξ) ∝ ∬_{A⊥} φ(q) e^{-ikξ·q} d²q          (Eq. 21)\n\ncan be converted into a 1D boundary integral via the divergence theorem:\n\n    ψ̄(ξ) ≈ i/(2πRξ²) ∮_{∂A⊥} (m̂·ξ) φ(q) e^{-ikξ·q} ds   (Eq. 22)\n\nFor CONSTANT φ, the divergence theorem is EXACT (error at machine precision).\nFor piecewise-linear φ (PLA), the formula is approximate: the gradient term\n∇φ·ξ/(kξ²) is dropped, valid when kσ ≫ 1 (large beam or high frequency).\n\nYour task: implement both integrals and verify they agree numerically.\n\nKey insight: The divergence theorem reduces O(area) quadrature to O(perimeter)\nline integrals — and with a PLA incident beam, each segment has a closed form.\nThis is what makes the edge-based BSDF practical.\n\nCommon mistakes:\n  - Outward normal m̂ must point INTO the aperture (away from triangle interior)\n  - Sign of the i/(2πRξ²) prefactor in the boundary integral\n  - Using the wrong 'sinc' — NumPy's sinc is normalized! Use sin(u)/u manually.\n\"\"\"\n\nimport os\nimport numpy as np\nfrom scipy import integrate\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Provided helpers\n# ---------------------------------------------------------------------------\n\ndef gaussian_beam(q, sigma=25.0):\n    \"\"\"Gaussian incident beam: φ(q) = exp(-|q|²/(2σ²)).\n\n    Parameters\n    ----------\n    q : ndarray, shape (..., 2)\n        2D positions on the screen plane.\n    sigma : float\n        Spatial standard deviation in same units as q (default: 25λ).\n\n    Returns\n    -------\n    ndarray, shape (...)\n        Real beam amplitude.\n    \"\"\"\n    return np.exp(-np.sum(q**2, axis=-1) / (2 * sigma**2))\n\n\ndef constant_beam(q):\n    \"\"\"Constant beam φ=1. Divergence theorem formula is EXACT for this.\"\"\"\n    if hasattr(q, 'shape') and q.ndim > 1:\n        return np.ones(q.shape[:-1])\n    return 1.0\n\n\ndef triangle_edges(verts):\n    \"\"\"Extract edge parameters for a CCW triangle.\n\n    Parameters\n    ----------\n    verts : ndarray, shape (3, 2)\n        Triangle vertices in CCW order.\n\n    Returns\n    -------\n    list of tuples (v_mid, e_vec, m_hat)\n        v_mid : shape (2,) — edge midpoint\n        e_vec : shape (2,) — edge vector\n        m_hat : shape (2,) — outward unit normal (pointing away from interior)\n    \"\"\"\n    edges = []\n    for j in range(3):\n        p0 = verts[(j - 1) % 3]\n        p1 = verts[(j + 1) % 3]\n        e_vec = p1 - p0\n        v_mid = 0.5 * (p0 + p1)\n        m_hat = np.array([e_vec[1], -e_vec[0]])\n        m_hat /= np.linalg.norm(m_hat)\n        opp = verts[j]\n        if np.dot(m_hat, v_mid - opp) < 0:\n            m_hat = -m_hat\n        edges.append((v_mid, e_vec, m_hat))\n    return edges\n\n\ndef gauss_legendre_triangle(f, verts, n_pts=20):\n    \"\"\"2D Gaussian quadrature over a triangle.\n\n    Parameters\n    ----------\n    f : callable\n        f(q) where q has shape (2,).\n    verts : ndarray, shape (3, 2)\n    n_pts : int\n\n    Returns\n    -------\n    complex or float\n    \"\"\"\n    pts_1d, wts_1d = np.polynomial.legendre.leggauss(n_pts)\n    u = (pts_1d + 1) / 2\n    w = wts_1d / 2\n    total = 0.0\n    v01 = verts[1] - verts[0]\n    v02 = verts[2] - verts[0]\n    area = 0.5 * abs(v01[0] * v02[1] - v01[1] * v02[0])\n    for ui, wi in zip(u, w):\n        for uj, wj in zip(u, w):\n            lam1 = ui\n            lam2 = uj * (1 - ui)\n            lam3 = 1 - lam1 - lam2\n            if lam3 < 0:\n                continue\n            q = lam1 * verts[0] + lam2 * verts[1] + lam3 * verts[2]\n            jac = 2 * area * (1 - ui)\n            total += wi * wj * f(q) * jac\n    return total\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: Area integrand  (~5 lines)\n# ---------------------------------------------------------------------------\n\ndef area_integrand_constant(q, k, xi):\n    \"\"\"Fraunhofer integrand for constant φ=1: exp(-ik ξ·q).\n\n    Parameters\n    ----------\n    q : ndarray, shape (2,)\n        Position on screen.\n    k : float\n        Wavenumber.\n    xi : ndarray, shape (2,)\n        2D scattering direction vector ξ.\n\n    Returns\n    -------\n    complex\n        exp(-ik ξ·q)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~3 lines                               #\n    #                                                         #\n    # Simply return the plane-wave phase factor at position q #\n    # (for constant beam, φ=1 so it drops out).              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: Boundary integrand  (~8 lines)\n# ---------------------------------------------------------------------------\n\ndef boundary_integrand_constant(s, v_mid, e_vec, m_hat, k, xi):\n    \"\"\"Divergence-theorem boundary integrand for one edge, constant φ=1.\n\n    The point on the edge at arc-length s ∈ [-e/2, +e/2] is:\n        q(s) = v_mid + s * ê    where ê = e_vec / |e_vec|\n\n    Return: (m̂·ξ) * exp(-ik ξ·q(s))    [φ=1 so it drops out]\n    Note: prefactor i/(2πξ²) is applied OUTSIDE this function.\n\n    Parameters\n    ----------\n    s : float\n        Arc-length along edge.\n    v_mid : ndarray, shape (2,)\n    e_vec : ndarray, shape (2,)\n    m_hat : ndarray, shape (2,)  outward unit normal\n    k : float\n    xi : ndarray, shape (2,)\n\n    Returns\n    -------\n    complex\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~6 lines                               #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. e_hat = e_vec / |e_vec|                              #\n    # 2. q = v_mid + s * e_hat                               #\n    # 3. return dot(m_hat, xi) * exp(-1j * k * dot(xi, q))   #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: Area integral over a triangle  (~8 lines)\n# ---------------------------------------------------------------------------\n\ndef integrate_area(triangle_verts, k, xi, n_pts=20):\n    \"\"\"Integrate exp(-ikξ·q) over the triangle (constant beam φ=1).\n\n    Returns ∬_triangle exp(-ikξ·q) d²q  (no k/(2πR) prefactor).\n\n    Parameters\n    ----------\n    triangle_verts : ndarray, shape (3, 2)\n    k : float\n    xi : ndarray, shape (2,)\n    n_pts : int\n\n    Returns\n    -------\n    complex\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~5 lines                               #\n    #                                                         #\n    # Use gauss_legendre_triangle with a lambda that calls    #\n    # area_integrand_constant(q, k, xi).                      #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 4: Boundary integral (Eq. 22) over all edges  (~12 lines)\n# ---------------------------------------------------------------------------\n\ndef integrate_boundary(edges, k, xi, R=1.0):\n    \"\"\"Compute the boundary integral (Eq. 22) for a closed polygon, φ=1.\n\n    Result: i/(2πRξ²) * ∮ (m̂·ξ) exp(-ikξ·q) ds\n\n    This is EXACT for constant φ by the divergence theorem.\n\n    Parameters\n    ----------\n    edges : list of (v_mid, e_vec, m_hat)\n    k : float\n    xi : ndarray, shape (2,)\n    R : float\n\n    Returns\n    -------\n    complex\n        Boundary integral approximating k/(2πR) * ∬ φ e^{-ikξ·q} d²q.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # Algorithm:                                              #\n    # 1. xi_mag = |xi|; if < 1e-10 return 0+0j              #\n    # 2. prefactor = 1j / (2π R xi_mag²)                     #\n    # 3. For each (v_mid, e_vec, m_hat):                      #\n    #    a. e_len = |e_vec|, half = e_len/2                   #\n    #    b. Integrate boundary_integrand_constant over        #\n    #       s in [-half, half] — use scipy.integrate.quad,   #\n    #       integrating real and imag parts separately.       #\n    #    c. total += prefactor * (re + 1j*im)                 #\n    # 4. Return total                                         #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Main harness (provided — do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    import sys\n\n    verts = np.array([\n        [0.5,  0.0],\n        [2.0,  0.5],\n        [1.0,  2.0],\n    ])\n\n    k = 2 * np.pi  # λ = 1\n    R = 1.0\n\n    if VERIFY:\n        xi_mags = [0.10, 0.25]\n        angles = [np.pi / 4]\n        n_pts = 15\n    else:\n        xi_mags = [0.10, 0.20, 0.35, 0.50]\n        angles = [np.pi / 6, np.pi / 3, 5 * np.pi / 8]\n        n_pts = 25\n\n    tol = 1e-5   # should be near machine precision for constant φ\n\n    edges = triangle_edges(verts)\n    all_passed = True\n    max_rel_err = 0.0\n\n    print(\"--- Constant beam φ=1: Divergence Theorem is EXACT ---\")\n    for xi_mag in xi_mags:\n        for angle in angles:\n            xi = xi_mag * np.array([np.cos(angle), np.sin(angle)])\n\n            # Area integral (without k/2πR prefactor), then scale\n            area_val = integrate_area(verts, k, xi, n_pts=n_pts)\n            area_psi = (k / (2 * np.pi * R)) * area_val\n\n            # Boundary integral (already includes i/2πRξ²)\n            bnd_psi = integrate_boundary(edges, k, xi, R=R)\n\n            denom = max(abs(area_psi), 1e-15)\n            rel_err = abs(area_psi - bnd_psi) / denom\n            max_rel_err = max(max_rel_err, rel_err)\n\n            status = \"OK\" if rel_err < tol else \"FAIL\"\n            print(f\"  |ξ|={xi_mag:.2f}, θ={angle:.2f}: \"\n                  f\"area_ψ={area_psi:.5f}, bnd_ψ={bnd_psi:.5f}, \"\n                  f\"rel_err={rel_err:.2e}  [{status}]\")\n\n            if rel_err >= tol:\n                all_passed = False\n\n    print()\n    print(f\"Area integral vs boundary integral max relative error: \"\n          f\"{max_rel_err:.2e} (tol={tol})\")\n    print()\n    print(\"Insight: For constant φ, the DT is exact (machine precision).\")\n    print(\"For Gaussian φ (σ=25λ), gradient correction ≈ 1/(kσ) ≈ 0.6%\")\n    print()\n\n    if all_passed:\n        print(\"PASSED\")\n    else:\n        print(\"FAILED — check outward normal direction and i/(2πRξ²) prefactor\")\n        sys.exit(1)\n"}, {"filename": "ex02_auxiliary_functions_α₁_and_α₂.py", "content": "\"\"\"\nExercise 2: Auxiliary Functions α₁ and α₂\n==========================================\nModule 2: Edge-Based Diffraction: The Core Formulation\n\nThe auxiliary functions (Eqs. 26-27) are the universal building blocks of\nedge-diffracted waves. They do NOT depend on edge geometry or wavelength —\nonly on the normalized coordinate ζ = Ξ_j^{-T} ξ.\n\n    α₁(ζ) = ζ_y / (2π ζ² ζ_x) · (cos(ζ_x/2) − sinc(ζ_x/2))    [Eq. 26]\n    α₂(ζ) = ζ_y / (2π ζ²) · sinc(ζ_x/2)                          [Eq. 27]\n\nwhere sinc(u) = sin(u)/u  (UNNORMALIZED — not NumPy's sinc!), ζ² = ζ_x² + ζ_y².\n\nSymmetry properties (critical for opposing-edge cancellation):\n    α₁: odd in both ζ_x and ζ_y   → α₁(-ζ_x, ζ_y) = -α₁(ζ_x, ζ_y)\n                                       α₁(ζ_x, -ζ_y) = -α₁(ζ_x, ζ_y)\n    α₂: even in ζ_x, odd in ζ_y   → α₂(-ζ_x, ζ_y) =  α₂(ζ_x, ζ_y)\n                                       α₂(ζ_x, -ζ_y) = -α₂(ζ_x, ζ_y)\n\nCOMMON MISTAKE: np.sinc(x) = sin(πx)/(πx) — WRONG! Use sin(u)/u manually.\nCOMMON MISTAKE: Division by zero at ζ_x=0 or ζ=(0,0) — use Taylor expansions.\n\"\"\"\n\nimport os\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: α₁ function  (~18 lines)\n# ---------------------------------------------------------------------------\n\ndef alpha1(zeta_x, zeta_y):\n    \"\"\"Auxiliary function α₁(ζ) = ζ_y/(2π ζ² ζ_x) · (cos(ζ_x/2) − sinc(ζ_x/2)).\n\n    sinc(u) here is UNNORMALIZED: sinc(u) = sin(u)/u, NOT sin(πu)/(πu).\n\n    Must handle:\n      - ζ_x → 0: use Taylor expansion cos(u) - sinc(u) ≈ -u²/8 + u⁴/192\n                  so α₁ → -ζ_x ζ_y / (16π ζ²)\n      - ζ → (0,0): α₁ → 0 (finite limit)\n\n    Parameters\n    ----------\n    zeta_x, zeta_y : float or ndarray\n        Cartesian components of ζ. May be scalar or broadcastable arrays.\n\n    Returns\n    -------\n    float or ndarray\n        α₁(ζ_x, ζ_y), same shape as inputs.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~18 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Compute zeta2 = zeta_x**2 + zeta_y**2               #\n    # 2. Define eps = 1e-5 for the small-|ζ_x| branch        #\n    # 3. For large |ζ_x|:                                     #\n    #    a. half_x = zeta_x / 2                              #\n    #    b. cos_val = cos(half_x)                             #\n    #    c. sinc_val = sin(half_x) / half_x  (handle 0/0!)   #\n    #    d. numerator = zeta_y * (cos_val - sinc_val)        #\n    #    e. denom = 2π * zeta2 * zeta_x                      #\n    #    f. result_large = numerator / denom (guard denom=0)  #\n    # 4. For small |ζ_x| (Taylor expansion):                  #\n    #    cos(u) - sinc(u) ≈ -u²/8 + u⁴/192                  #\n    #    α₁ ≈ ζ_y/ζ²  *  (-ζ_x/2²)/8 / (2π)               #\n    #        = -ζ_x * ζ_y / (16π ζ²)                         #\n    # 5. Combine with np.where; handle ζ=(0,0) with ζ²>1e-30 #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: α₂ function  (~12 lines)\n# ---------------------------------------------------------------------------\n\ndef alpha2(zeta_x, zeta_y):\n    \"\"\"Auxiliary function α₂(ζ) = ζ_y/(2π ζ²) · sinc(ζ_x/2).\n\n    sinc(u) = sin(u)/u  (UNNORMALIZED).\n\n    Must handle:\n      - ζ_x → 0: sinc(ζ_x/2) → 1, so α₂ → ζ_y/(2π ζ_y²) = 1/(2πζ_y)\n      - ζ → (0,0): singular (but ψ_j stays finite due to prefactor)\n\n    Parameters\n    ----------\n    zeta_x, zeta_y : float or ndarray\n\n    Returns\n    -------\n    float or ndarray\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~12 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. zeta2 = zeta_x**2 + zeta_y**2                       #\n    # 2. half_x = zeta_x / 2                                 #\n    # 3. sinc_val = where(|half_x|<1e-12, 1.0, sin/half_x)  #\n    # 4. numerator = zeta_y * sinc_val                       #\n    # 5. denom = 2π * zeta2  (guard with +1e-30)             #\n    # 6. return numerator / denom                             #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: Symmetry verification  (~14 lines)\n# ---------------------------------------------------------------------------\n\ndef verify_symmetry(alpha_func, zeta_x, zeta_y, name, is_odd_x, is_odd_y):\n    \"\"\"Numerically verify the symmetry of an alpha function.\n\n    Parameters\n    ----------\n    alpha_func : callable\n        alpha1 or alpha2.\n    zeta_x, zeta_y : ndarray\n        Grid arrays (exclude ζ=0 to avoid singularities).\n    name : str\n        Function name for printing.\n    is_odd_x : bool\n        True if the function should be odd in ζ_x.\n    is_odd_y : bool\n        True if the function should be odd in ζ_y (both functions are odd in y).\n\n    Returns\n    -------\n    bool\n        True if all symmetry checks pass (max error < 1e-10).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~14 lines                              #\n    #                                                         #\n    # For each symmetry to check:                             #\n    # 1. Compute f_pos = alpha_func(zeta_x, zeta_y)           #\n    # 2. Compute f_neg_x = alpha_func(-zeta_x, zeta_y)       #\n    # 3. If is_odd_x: error_x = max|f_pos + f_neg_x|         #\n    #    else:        error_x = max|f_pos - f_neg_x|          #\n    # 4. Same for y: f_neg_y = alpha_func(zeta_x, -zeta_y)   #\n    # 5. Print result and return whether all pass tol=1e-10   #\n    #                                                         #\n    # Hint: create a 2D meshgrid of zeta_x, zeta_y values.   #\n    # Avoid the origin (singular). Use zx != 0 and zy != 0.  #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Main harness (provided — do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    import sys\n\n    if VERIFY:\n        zeta_vals = np.linspace(0.3, 3.0, 8)\n    else:\n        zeta_vals = np.linspace(0.1, 6.0, 30)\n\n    # Exclude zero to avoid singularities in the symmetry test\n    zx_grid, zy_grid = np.meshgrid(zeta_vals, zeta_vals)\n    # Also test negative values\n    zx_full = np.concatenate([zeta_vals, -zeta_vals])\n    zy_full = np.concatenate([zeta_vals, -zeta_vals])\n    zx_g, zy_g = np.meshgrid(zx_full, zy_full)\n\n    all_passed = True\n\n    # Test α₁ symmetry\n    ok1 = verify_symmetry(alpha1, zx_g, zy_g, \"α₁\", is_odd_x=True, is_odd_y=True)\n    all_passed &= ok1\n\n    # Test α₂ symmetry\n    ok2 = verify_symmetry(alpha2, zx_g, zy_g, \"α₂\", is_odd_x=False, is_odd_y=True)\n    all_passed &= ok2\n\n    # Spot-check values\n    print()\n    print(\"Spot checks at specific ζ values:\")\n    # At ζ = (1.0, 1.0): α₂ = 1/(2π·2) · sinc(0.5) = sinc(0.5)/(4π)\n    # sinc(0.5) = sin(0.5)/0.5 = 0.9589/0.5 = 1.9179... wait\n    # α₂(1,1) = ζ_y/(2π ζ²) sinc(ζ_x/2) = 1/(2π·2) · sin(0.5)/0.5\n    zx_t, zy_t = 1.0, 1.0\n    a2_val = alpha2(zx_t, zy_t)\n    a2_expected = zy_t / (2 * np.pi * (zx_t**2 + zy_t**2)) * (np.sin(zx_t / 2) / (zx_t / 2))\n    err_a2 = abs(a2_val - a2_expected)\n    print(f\"  α₂(1,1) = {a2_val:.8f}, expected {a2_expected:.8f}, err={err_a2:.2e}\")\n    if err_a2 > 1e-12:\n        all_passed = False\n        print(\"  FAIL: α₂ spot check\")\n\n    # At ζ_x → 0: α₁(0.0001, 1.0) ≈ -0.0001 * 1.0 / (16π * (0.0001²+1²))\n    zx_small = 1e-4\n    a1_small = alpha1(zx_small, 1.0)\n    a1_taylor = -zx_small * 1.0 / (16 * np.pi * (zx_small**2 + 1.0))\n    err_a1 = abs(a1_small - a1_taylor)\n    print(f\"  α₁(1e-4,1) = {a1_small:.8e}, Taylor = {a1_taylor:.8e}, err={err_a1:.2e}\")\n    if err_a1 > 1e-8:\n        all_passed = False\n        print(\"  FAIL: α₁ small-ζ_x spot check\")\n\n    # Power integrals: ∫∫ |α₁|² dζ ≈ ℑ₁, ∫∫ |α₂|² dζ ≈ ℑ₂\n    # These are approximate due to finite integration range\n    if not VERIFY:\n        zeta_range = np.linspace(-20, 20, 400)\n        dz = zeta_range[1] - zeta_range[0]\n        ZX, ZY = np.meshgrid(zeta_range, zeta_range)\n        # Avoid exact zero\n        mask = (np.abs(ZX) > 0.01) & (np.abs(ZY) > 0.01)\n        A1 = np.where(mask, alpha1(ZX, ZY)**2, 0.0)\n        A2 = np.where(mask, alpha2(ZX, ZY)**2, 0.0)\n        I1_num = np.sum(A1) * dz**2\n        I2_num = np.sum(A2) * dz**2\n        I1_paper = 0.0045255085\n        I2_paper = 0.11487543\n        print()\n        print(f\"  ℑ₁ (numerical) = {I1_num:.6f}, paper = {I1_paper:.7f}\")\n        print(f\"  ℑ₂ (numerical) = {I2_num:.6f}, paper = {I2_paper:.7f}\")\n        print(f\"  Ratio ℑ₂/ℑ₁ = {I2_num/I1_num:.1f} (should be ≈25.4)\")\n\n    print()\n    if all_passed:\n        print(\"PASSED\")\n    else:\n        print(\"FAILED\")\n        sys.exit(1)\n"}, {"filename": "ex03_edge_geometry_the_linear_transform_ξ.py", "content": "\"\"\"\nExercise 3: Edge Geometry — The Linear Transform Ξⱼ\n====================================================\nModule 2: Edge-Based Diffraction: The Core Formulation\n\nThe linear transform Ξⱼ normalizes each edge so that α₁, α₂ are universal.\n\nFrom Eq. (25), the INVERSE transform is defined as:\n\n    Ξⱼ⁻¹ = (k/2) · [[eⱼᵀ     ],\n                      [eⱼ m̂ⱼᵀ ]]\n\nwhere eⱼ is the edge vector, eⱼ = |eⱼ|, m̂ⱼ is the outward unit normal.\n\nThe normalized direction is: ζ = Ξⱼ⁻ᵀ ξ\n\nThen:\n  ζ_x = (k/2) eⱼ · ξ         (projection along edge, scaled)\n  ζ_y = (k/2) eⱼ (m̂ⱼ · ξ)   (projection along normal, scaled)\n\n|Ξⱼ| = 1/|Ξⱼ⁻¹|  (the Jacobian, encodes edge weight)\n\nKey insight: opposing edges (same edge between two triangles) have\nΞₗ⁻¹ = -Ξⱼ⁻¹, so ζₗ = -ζⱼ. Combined with α₁(-ζ)=-α₁(ζ) and\nα₂(-ζ)=-α₂(ζ), the edge-diffracted waves cancel: ψⱼ + ψₗ = 0.\n\"\"\"\n\nimport os\nimport numpy as np\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Provided: alpha functions from Exercise 2\n# ---------------------------------------------------------------------------\n\ndef alpha1(zeta_x, zeta_y):\n    zeta_x = np.asarray(zeta_x, dtype=float)\n    zeta_y = np.asarray(zeta_y, dtype=float)\n    zeta2 = zeta_x**2 + zeta_y**2\n    eps = 1e-5\n    small_x = np.abs(zeta_x) < eps\n    half_x = zeta_x / 2.0\n    cos_val = np.cos(half_x)\n    sinc_val = np.where(np.abs(half_x) < 1e-12, 1.0, np.sin(half_x) / half_x)\n    num_large = zeta_y * (cos_val - sinc_val)\n    den_large = 2 * np.pi * (zeta2 + 1e-60) * zeta_x\n    result_large = np.where(np.abs(den_large) > 1e-30, num_large / den_large, 0.0)\n    result_small = -zeta_x * zeta_y / (24 * np.pi * (zeta2 + 1e-60))\n    return np.where(small_x, result_small, result_large)\n\n\ndef alpha2(zeta_x, zeta_y):\n    zeta_x = np.asarray(zeta_x, dtype=float)\n    zeta_y = np.asarray(zeta_y, dtype=float)\n    zeta2 = zeta_x**2 + zeta_y**2\n    half_x = zeta_x / 2.0\n    sinc_val = np.where(np.abs(half_x) < 1e-12, 1.0, np.sin(half_x) / half_x)\n    return zeta_y * sinc_val / (2 * np.pi * (zeta2 + 1e-60))\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: Compute Ξⱼ transform  (~12 lines)\n# ---------------------------------------------------------------------------\n\ndef compute_xi_transform(e_vec, m_hat, k):\n    \"\"\"Build the Ξⱼ transform from edge geometry.\n\n    From Eq. (25):\n        Ξⱼ⁻¹ = (k/2) · [[eⱼᵀ    ],\n                          [eⱼ m̂ⱼᵀ]]\n\n    where eⱼ = e_vec (NOT unit-normalized) and eⱼ = |e_vec|.\n\n    Returns Ξⱼ, Ξⱼ⁻¹, Ξⱼ⁻ᵀ, and |Ξⱼ|.\n\n    Parameters\n    ----------\n    e_vec : ndarray, shape (2,)\n        Edge vector (from one endpoint to the other, not unit-normalized).\n    m_hat : ndarray, shape (2,)\n        Outward unit normal to the edge.\n    k : float\n        Wavenumber.\n\n    Returns\n    -------\n    Xi : ndarray, shape (2, 2)\n        The transform Ξⱼ.\n    Xi_inv : ndarray, shape (2, 2)\n        The inverse Ξⱼ⁻¹.\n    Xi_inv_T : ndarray, shape (2, 2)\n        The transpose-inverse Ξⱼ⁻ᵀ (used to transform ξ → ζ).\n    det_Xi : float\n        The determinant |Ξⱼ| (= 1/|Ξⱼ⁻¹|).\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. e_len = |e_vec|                                      #\n    # 2. Xi_inv: 2x2 matrix with rows:                        #\n    #      row 0: (k/2) * e_vec          (scaled edge vector) #\n    #      row 1: (k/2) * e_len * m_hat  (scaled normal)      #\n    # 3. Xi_inv_T = Xi_inv.T                                  #\n    # 4. Xi = np.linalg.inv(Xi_inv)                           #\n    # 5. det_Xi = 1.0 / np.linalg.det(Xi_inv)                #\n    # 6. Return Xi, Xi_inv, Xi_inv_T, det_Xi                  #\n    #                                                         #\n    # Note: the paper defines Ξ⁻¹ directly, so INVERT to get Ξ #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: Transform ξ to ζ  (~6 lines)\n# ---------------------------------------------------------------------------\n\ndef transform_xi_to_zeta(xi_grid, Xi_inv_T):\n    \"\"\"Apply the transform ζ = Ξⱼ⁻ᵀ ξ to a grid of directions.\n\n    Parameters\n    ----------\n    xi_grid : ndarray, shape (..., 2)\n        Array of 2D scattering direction vectors ξ.\n    Xi_inv_T : ndarray, shape (2, 2)\n        The matrix Ξⱼ⁻ᵀ.\n\n    Returns\n    -------\n    ndarray, shape (..., 2)\n        Normalized coordinates ζ for each ξ in xi_grid.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~3 lines                               #\n    #                                                         #\n    # Hint: use xi_grid @ Xi_inv_T (matrix multiply).        #\n    # This is equivalent to applying Xi_inv_T to each ξ.     #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 3: Verify opposing-edge cancellation  (~15 lines)\n# ---------------------------------------------------------------------------\n\ndef opposing_edge_psi(v_j, e_j, m_j, a_j, b_j, xi, k, R=1.0):\n    \"\"\"Compute ψⱼ(ξ) for a SINGLE edge (simplified, no alpha_func needed here).\n\n    Uses: ψⱼ(ξ) = e^{-ikξ·vⱼ} · (k/R)/|Ξⱼ| · [(aⱼ-bⱼ)α₁(ζ) + i(aⱼ+bⱼ)/2 α₂(ζ)]\n\n    Parameters\n    ----------\n    v_j : shape (2,) — edge midpoint\n    e_j : shape (2,) — edge vector\n    m_j : shape (2,) — outward unit normal\n    a_j, b_j : complex — incident field at endpoints\n    xi : shape (2,) — scattering direction\n    k : float — wavenumber\n    R : float — observation distance\n\n    Returns\n    -------\n    complex — ψⱼ(ξ)\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Xi, Xi_inv, Xi_inv_T, det_Xi = compute_xi_transform #\n    # 2. zeta = Xi_inv_T @ xi  (shape (2,))                  #\n    # 3. a1 = alpha1(zeta[0], zeta[1])                       #\n    # 4. a2 = alpha2(zeta[0], zeta[1])                       #\n    # 5. phase = exp(-1j * k * dot(xi, v_j))                 #\n    # 6. amp = (k / R) * det_Xi                              #\n    # 7. return phase * amp * ((a_j-b_j)*a1 + 1j*(a_j+b_j)/2*a2) #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Main harness (provided — do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    import sys\n\n    k = 2 * np.pi\n\n    # Define a single edge: horizontal, length 3.0, outward normal points up\n    e_vec = np.array([3.0, 0.0])\n    m_hat = np.array([0.0, 1.0])   # outward normal\n\n    print(\"=== Part 1: Ξ transform properties ===\")\n    Xi, Xi_inv, Xi_inv_T, det_Xi = compute_xi_transform(e_vec, m_hat, k)\n    e_len = np.linalg.norm(e_vec)\n    det_Xi_inv = np.linalg.det(Xi_inv)\n    print(f\"  Xi_inv (rows = [k/2·e, k/2·eLen·m]):\")\n    print(f\"    row 0: {Xi_inv[0]}\")\n    print(f\"    row 1: {Xi_inv[1]}\")\n    print(f\"  |Xi_inv| = {det_Xi_inv:.6f}, |Xi| = {det_Xi:.6f}\")\n    print(f\"  Expected |Xi_inv| = (k*e_len/2)² = {(k*e_len/2)**2:.6f}\")\n\n    det_check = abs(det_Xi - 1.0 / det_Xi_inv)\n    print(f\"  det consistency error: {det_check:.2e}\")\n    if det_check > 1e-12:\n        print(\"  FAIL: det_Xi inconsistent\")\n        sys.exit(1)\n    print(\"  det check PASSED\")\n\n    print()\n    print(\"=== Part 2: ξ → ζ transformation ===\")\n    if VERIFY:\n        xi_test = np.array([[0.1, 0.0], [0.0, 0.2], [0.1, 0.1]])\n    else:\n        xi_test = np.array([[0.1, 0.0], [0.0, 0.2], [0.1, 0.1], [0.3, -0.2]])\n    zeta_test = transform_xi_to_zeta(xi_test, Xi_inv_T)\n    print(f\"  ξ → ζ:\")\n    for xi_i, zeta_i in zip(xi_test, zeta_test):\n        # Manual: ζ_x = k/2 * dot(e, xi), ζ_y = k/2 * e_len * dot(m, xi)\n        zx_manual = k / 2 * np.dot(e_vec, xi_i)\n        zy_manual = k / 2 * e_len * np.dot(m_hat, xi_i)\n        err = np.max(np.abs(zeta_i - np.array([zx_manual, zy_manual])))\n        print(f\"    ξ={xi_i} → ζ={zeta_i} (manual=[{zx_manual:.4f},{zy_manual:.4f}]) err={err:.2e}\")\n        if err > 1e-12:\n            print(\"  FAIL: transform mismatch\")\n            sys.exit(1)\n    print(\"  Transform PASSED\")\n\n    print()\n    print(\"=== Part 3: Opposing-edge cancellation ===\")\n    # Edge j and opposing edge l (same midpoint, reversed direction and normal)\n    v_j = np.array([1.5, 0.0])\n    a_j, b_j = 0.8 + 0.2j, 0.6 - 0.1j  # incident field at endpoints\n\n    # Opposing edge l: e_l = -e_j, m_l = -m_j, a_l = b_j, b_l = a_j\n    e_l = -e_vec\n    m_l = -m_hat\n    a_l, b_l = b_j, a_j\n\n    if VERIFY:\n        xi_test2 = np.array([[0.1, 0.3], [0.2, -0.1]])\n    else:\n        xi_test2 = np.array([[0.1, 0.3], [0.2, -0.1], [-0.15, 0.25], [0.05, 0.5]])\n\n    all_passed = True\n    for xi_i in xi_test2:\n        psi_j = opposing_edge_psi(v_j, e_vec, m_hat, a_j, b_j, xi_i, k)\n        psi_l = opposing_edge_psi(v_j, e_l, m_l, a_l, b_l, xi_i, k)\n        total = abs(psi_j + psi_l)\n        status = \"OK\" if total < 1e-10 else \"FAIL\"\n        print(f\"  ξ={xi_i}: |ψⱼ|={abs(psi_j):.4e}, |ψₗ|={abs(psi_l):.4e}, \"\n              f\"|ψⱼ+ψₗ|={total:.2e}  [{status}]\")\n        if total >= 1e-10:\n            all_passed = False\n\n    print()\n    if all_passed:\n        print(\"PASSED\")\n    else:\n        print(\"FAILED — check Xi_inv_T orientation and alpha symmetry\")\n        sys.exit(1)\n"}, {"filename": "ex04_the_edgediffracted_wave_ψj.py", "content": "\"\"\"\nExercise 4: The Edge-Diffracted Wave ψⱼ\n=========================================\nModule 2: Edge-Based Diffraction: The Core Formulation\n\nThe edge-diffracted wave for boundary edge j is (Eq. 23):\n\n    ψⱼ(ξ) = e^{-ikξ·vⱼ} · (k/R)/|Ξⱼ| · [(aⱼ-bⱼ)α₁(Ξⱼ⁻ᵀξ) + i(aⱼ+bⱼ)/2 · α₂(Ξⱼ⁻ᵀξ)]\n\nwith vertex field values (Eq. 24):\n    aⱼ = φ(vⱼ - eⱼ/2) · e^{-ikz(vⱼ - eⱼ/2)}\n    bⱼ = φ(vⱼ + eⱼ/2) · e^{-ikz(vⱼ + eⱼ/2)}\n\nThis is a CLOSED-FORM solution — no numerical integration needed.\n\nYour task: implement ψⱼ and validate against a numerical 1D boundary integral.\n\nCommon mistakes:\n  - Swapping aⱼ and bⱼ (aⱼ is at vⱼ - eⱼ/2, bⱼ at vⱼ + eⱼ/2)\n  - Forgetting the factor of i before (aⱼ+bⱼ)/2 · α₂\n  - Using the wrong sign in the phase: e^{-ikξ·vⱼ} (negative!)\n\"\"\"\n\nimport os\nimport numpy as np\nfrom scipy import integrate as sci_integrate\n\nVERIFY = os.environ.get(\"DISTILL_VERIFY\")\n\n# ---------------------------------------------------------------------------\n# Provided: all prior functions (complete)\n# ---------------------------------------------------------------------------\n\ndef alpha1(zeta_x, zeta_y):\n    zeta_x = np.asarray(zeta_x, dtype=float)\n    zeta_y = np.asarray(zeta_y, dtype=float)\n    zeta2 = zeta_x**2 + zeta_y**2\n    small_x = np.abs(zeta_x) < 1e-5\n    half_x = zeta_x / 2.0\n    cos_val = np.cos(half_x)\n    sinc_val = np.where(np.abs(half_x) < 1e-12, 1.0, np.sin(half_x) / half_x)\n    num_l = zeta_y * (cos_val - sinc_val)\n    den_l = 2 * np.pi * (zeta2 + 1e-60) * zeta_x\n    r_l = np.where(np.abs(den_l) > 1e-30, num_l / den_l, 0.0)\n    r_s = -zeta_x * zeta_y / (24 * np.pi * (zeta2 + 1e-60))\n    return np.where(small_x, r_s, r_l)\n\n\ndef alpha2(zeta_x, zeta_y):\n    zeta_x = np.asarray(zeta_x, dtype=float)\n    zeta_y = np.asarray(zeta_y, dtype=float)\n    zeta2 = zeta_x**2 + zeta_y**2\n    half_x = zeta_x / 2.0\n    sinc_val = np.where(np.abs(half_x) < 1e-12, 1.0, np.sin(half_x) / half_x)\n    return zeta_y * sinc_val / (2 * np.pi * (zeta2 + 1e-60))\n\n\ndef compute_xi_transform(e_vec, m_hat, k):\n    e_len = np.linalg.norm(e_vec)\n    Xi_inv = (k / 2) * np.array([e_vec, e_len * m_hat])\n    Xi_inv_T = Xi_inv.T\n    Xi = np.linalg.inv(Xi_inv)\n    det_Xi = 1.0 / np.linalg.det(Xi_inv)\n    return Xi, Xi_inv, Xi_inv_T, det_Xi\n\n\ndef gaussian_beam(q, sigma=25.0):\n    return np.exp(-np.sum(q**2, axis=-1) / (2 * sigma**2))\n\n\n# ---------------------------------------------------------------------------\n# Provided: numerical reference integral for one edge\n# ---------------------------------------------------------------------------\n\ndef numerical_edge_integral(v_j, e_vec, m_hat, phi_func, k, xi, R=1.0, n_pts=100):\n    \"\"\"Numerical 1D boundary integral for one edge (reference).\n\n    Computes: i/(2πRξ²) * ∫_{-e/2}^{e/2} (m̂·ξ) φ(q(s)) e^{-ikξ·q(s)} ds\n\n    This is the left-hand side of the DT formula, BEFORE taking the closed form.\n    \"\"\"\n    xi_mag = np.linalg.norm(xi)\n    if xi_mag < 1e-10:\n        return 0.0 + 0j\n    prefactor = 1j / (2 * np.pi * R * xi_mag**2)\n    e_len = np.linalg.norm(e_vec)\n    e_hat = e_vec / e_len\n    half = e_len / 2.0\n    m_dot_xi = np.dot(m_hat, xi)\n\n    def re_f(s):\n        q = v_j + s * e_hat\n        phi = float(phi_func(q[np.newaxis, :])[0])\n        return np.real(m_dot_xi * phi * np.exp(-1j * k * np.dot(xi, q)))\n\n    def im_f(s):\n        q = v_j + s * e_hat\n        phi = float(phi_func(q[np.newaxis, :])[0])\n        return np.imag(m_dot_xi * phi * np.exp(-1j * k * np.dot(xi, q)))\n\n    rv, _ = sci_integrate.quad(re_f, -half, half, limit=200)\n    iv, _ = sci_integrate.quad(im_f, -half, half, limit=200)\n    return prefactor * (rv + 1j * iv)\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 1: Compute vertex field values aⱼ, bⱼ  (~10 lines)\n# ---------------------------------------------------------------------------\n\ndef compute_vertex_fields(v_j, e_vec, phi_func, z_func=None):\n    \"\"\"Compute incident field values aⱼ, bⱼ at edge endpoints.\n\n    From Eq. (24):\n        aⱼ = φ(vⱼ - eⱼ/2) · exp(-ik z(vⱼ - eⱼ/2))\n        bⱼ = φ(vⱼ + eⱼ/2) · exp(-ik z(vⱼ + eⱼ/2))\n\n    For planar apertures (z=0 everywhere), the phasor is 1.\n\n    Parameters\n    ----------\n    v_j : ndarray, shape (2,)\n        Edge midpoint.\n    e_vec : ndarray, shape (2,)\n        Edge vector.\n    phi_func : callable\n        Incident beam φ(q) where q has shape (..., 2).\n    z_func : callable or None\n        z(q) depth function. If None, use z=0 everywhere.\n\n    Returns\n    -------\n    a_j, b_j : complex\n        Incident field at the two edge endpoints.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~10 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. p_a = v_j - e_vec/2   (endpoint for aⱼ)            #\n    # 2. p_b = v_j + e_vec/2   (endpoint for bⱼ)            #\n    # 3. phi_a = phi_func(p_a[None,:])[0]                    #\n    # 4. phi_b = phi_func(p_b[None,:])[0]                    #\n    # 5. z_a, z_b = z_func(p_a), z_func(p_b) if z_func else 0.0 #\n    # 6. phasor_a = exp(-1j * k * z_a) (need k from caller!) #\n    #    NOTE: k is not passed in — set phasors = 1 for now  #\n    #    (planar aperture, z=0)                               #\n    # 7. a_j = phi_a * phasor_a                              #\n    # 8. b_j = phi_b * phasor_b                              #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# YOUR CODE — Part 2: Full edge-diffracted wave ψⱼ over a grid  (~18 lines)\n# ---------------------------------------------------------------------------\n\ndef edge_diffracted_wave(xi_grid, v_j, e_vec, m_hat, a_j, b_j, k, R=1.0):\n    \"\"\"Compute ψⱼ(ξ) for all ξ in xi_grid using the closed-form Eq. (23).\n\n    ψⱼ(ξ) = e^{-ikξ·vⱼ} · (k/R)/|Ξⱼ| · [(aⱼ-bⱼ)α₁(ζ) + i(aⱼ+bⱼ)/2 α₂(ζ)]\n    where ζ = Ξⱼ⁻ᵀ ξ.\n\n    Parameters\n    ----------\n    xi_grid : ndarray, shape (N, 2)\n        Array of 2D scattering direction vectors.\n    v_j : ndarray, shape (2,)\n        Edge midpoint.\n    e_vec : ndarray, shape (2,)\n        Edge vector (not unit-normalized).\n    m_hat : ndarray, shape (2,)\n        Outward unit normal.\n    a_j, b_j : complex\n        Incident field at the edge endpoints (from compute_vertex_fields).\n    k : float\n        Wavenumber.\n    R : float\n        Observation distance.\n\n    Returns\n    -------\n    ndarray, shape (N,), complex\n        ψⱼ(ξ) for each ξ in xi_grid.\n    \"\"\"\n    ###########################################################\n    # YOUR CODE HERE - ~15 lines                              #\n    #                                                         #\n    # Steps:                                                  #\n    # 1. Xi, Xi_inv, Xi_inv_T, det_Xi = compute_xi_transform #\n    # 2. zeta = xi_grid @ Xi_inv_T  (shape (N,2))            #\n    # 3. zeta_x, zeta_y = zeta[:,0], zeta[:,1]              #\n    # 4. a1 = alpha1(zeta_x, zeta_y)  (shape (N,))          #\n    # 5. a2 = alpha2(zeta_x, zeta_y)  (shape (N,))          #\n    # 6. phase = exp(-1j * k * xi_grid @ v_j)  (shape (N,)) #\n    # 7. amp = (k / R) * det_Xi                              #\n    # 8. psi = phase * amp * ((a_j-b_j)*a1 + 1j*(a_j+b_j)/2*a2) #\n    # 9. return psi                                           #\n    ###########################################################\n    raise NotImplementedError(\"YOUR CODE HERE\")\n    ###########################################################\n\n\n# ---------------------------------------------------------------------------\n# Main harness (provided — do not modify)\n# ---------------------------------------------------------------------------\n\nif __name__ == \"__main__\":\n    import sys\n\n    k = 2 * np.pi\n    R = 1.0\n\n    # Edge: tilted, midpoint at (1, 0.5), length 2, incident Gaussian beam\n    v_j = np.array([1.0, 0.5])\n    e_vec = np.array([1.5, 1.0])  # tilted edge, length = sqrt(1.5²+1²)\n    e_len = np.linalg.norm(e_vec)\n    # Outward normal: rotate e_vec by +90° (CCW)\n    m_hat = np.array([-e_vec[1], e_vec[0]]) / e_len\n\n    phi_func = lambda q: gaussian_beam(q, sigma=25.0)\n\n    # Compute vertex field values\n    a_j, b_j = compute_vertex_fields(v_j, e_vec, phi_func)\n    print(f\"Vertex fields: aⱼ = {a_j:.6f}, bⱼ = {b_j:.6f}\")\n    print(f\"  Endpoints: p_a = {v_j - e_vec/2}, p_b = {v_j + e_vec/2}\")\n    print(f\"  Gaussian values at endpoints:\")\n    print(f\"    φ(p_a) = {float(phi_func((v_j - e_vec/2)[None,:])[0]):.6f}\")\n    print(f\"    φ(p_b) = {float(phi_func((v_j + e_vec/2)[None,:])[0]):.6f}\")\n\n    # Grid of xi values\n    if VERIFY:\n        xi_1d = np.linspace(-0.3, 0.3, 8)\n    else:\n        xi_1d = np.linspace(-0.5, 0.5, 30)\n\n    # 1D scan: xi = (xi_x, 0.2) to be off-axis\n    xi_grid = np.column_stack([xi_1d, 0.2 * np.ones_like(xi_1d)])\n\n    # Closed-form ψⱼ\n    psi_closed = edge_diffracted_wave(xi_grid, v_j, e_vec, m_hat, a_j, b_j, k, R)\n\n    # Numerical reference (slow but exact up to quadrature error)\n    psi_numerical = np.array([\n        numerical_edge_integral(v_j, e_vec, m_hat, phi_func, k, xi, R)\n        for xi in xi_grid\n    ])\n\n    # Compute errors\n    denom = np.maximum(np.abs(psi_numerical), 1e-12)\n    rel_errors = np.abs(psi_closed - psi_numerical) / denom\n    max_rel_err = np.max(rel_errors)\n\n    print()\n    print(f\"Closed-form vs numerical edge integral:\")\n    print(f\"  Max relative error: {max_rel_err:.2e}\")\n    print(f\"  Mean relative error: {np.mean(rel_errors):.2e}\")\n\n    # Show sample comparisons\n    print()\n    print(\"  Sample ξ comparisons:\")\n    indices = [0, len(xi_1d)//4, len(xi_1d)//2, -1]\n    for i in indices:\n        print(f\"    ξ_x={xi_grid[i,0]:.2f}: closed={psi_closed[i]:.4f}, \"\n              f\"num={psi_numerical[i]:.4f}, rel_err={rel_errors[i]:.2e}\")\n\n    print()\n    tol = 1e-3  # Divergence-theorem approximation: ~1/(kσ) correction\n    if max_rel_err < tol:\n        print(f\"Closed-form vs numerical max relative error: {max_rel_err:.2e} < {tol} PASSED\")\n    else:\n        print(f\"FAILED: max error {max_rel_err:.2e} > {tol}\")\n        sys.exit(1)\n"}]}, "module_03_aperture_construction_and_bsdf_evaluation": {"content": "", "exercises": []}, "module_04_importance_sampling_and_monte_carlo_validation": {"content": "", "exercises": []}}}</script>
