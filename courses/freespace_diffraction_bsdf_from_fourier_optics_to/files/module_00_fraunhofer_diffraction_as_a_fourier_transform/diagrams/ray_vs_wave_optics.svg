<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -25 912 538" width="800" height="472" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="250" y="39.0" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Ray Optics vs Wave Optics: Four Aperture Ratios w/λ</text>
  <text x="60" y="65.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">w/λ = 2</text>
  <text x="60" y="81.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">(diffraction</text>
  <text x="60" y="96.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">dominates)</text>
  <text x="260" y="65.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">w/λ = 10</text>
  <text x="260" y="81.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">(strong</text>
  <text x="260" y="96.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">fringes)</text>
  <text x="460" y="65.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">w/λ = 50</text>
  <text x="460" y="81.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">(moderate</text>
  <text x="460" y="96.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">fringes)</text>
  <text x="660" y="65.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">w/λ = 200</text>
  <text x="660" y="81.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">(sharp,</text>
  <text x="660" y="96.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">near ray-optics)</text>
  <rect x="30" y="110" width="190" height="200" rx="0" fill="#f8f8f8" stroke="#aaaaaa" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="230" y="110" width="190" height="200" rx="0" fill="#f8f8f8" stroke="#aaaaaa" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="430" y="110" width="190" height="200" rx="0" fill="#f8f8f8" stroke="#aaaaaa" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="630" y="110" width="190" height="200" rx="0" fill="#f8f8f8" stroke="#aaaaaa" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <path d="M 125.0 300.0 L 225.0 300.0" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 325.0 300.0 L 425.0 300.0" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 525.0 300.0 L 625.0 300.0" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 725.0 300.0 L 825.0 300.0" fill="none" stroke="#1e1e1e" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="40" y="328.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Ray optics (dashed): sharp box</text>
  <text x="40" y="341.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Wave optics (solid): broad sinc²</text>
  <text x="40" y="354.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">Shadow fraction: ~35%</text>
  <text x="40" y="367.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start"></text>
  <text x="40" y="381.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">ξ₀ = λ/w = 0.5 rad (28°!)</text>
  <text x="240" y="328.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">Ray optics: sharp box</text>
  <text x="240" y="341.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">Wave optics: visible fringes</text>
  <text x="240" y="354.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">Shadow fraction: ~8%</text>
  <text x="240" y="367.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start"></text>
  <text x="240" y="381.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">ξ₀ = λ/w = 0.1 rad (5.7°)</text>
  <text x="440" y="328.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Ray optics: sharp box</text>
  <text x="440" y="341.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Wave optics: weak fringes</text>
  <text x="440" y="354.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Shadow fraction: ~1.6%</text>
  <text x="440" y="367.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start"></text>
  <text x="440" y="381.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">ξ₀ = λ/w = 0.02 rad (1.1°)</text>
  <text x="640" y="328.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Ray optics ≈ Wave optics</text>
  <text x="640" y="341.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Tiny fringes at edges</text>
  <text x="640" y="354.6" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Shadow fraction: ~0.4%</text>
  <text x="640" y="367.8" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start"></text>
  <text x="640" y="381.0" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">ξ₀ = λ/w = 0.005 rad (0.3°)</text>
  <path d="M 30.0 200.0 L 130.0 200.0" fill="none" stroke="#e03131" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 30.0 260.0 L 130.0 260.0" fill="none" stroke="#e03131" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 170.0 260.0 L 270.0 260.0" fill="none" stroke="#e03131" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 230.0 195.0 L 330.0 195.0" fill="none" stroke="#f08c00" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 230.0 260.0 L 330.0 260.0" fill="none" stroke="#f08c00" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 360.0 260.0 L 460.0 260.0" fill="none" stroke="#f08c00" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 430.0 193.0 L 530.0 193.0" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 430.0 260.0 L 530.0 260.0" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 550.0 260.0 L 650.0 260.0" fill="none" stroke="#2f9e44" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 630.0 191.0 L 730.0 191.0" fill="none" stroke="#1971c2" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 630.0 260.0 L 730.0 260.0" fill="none" stroke="#1971c2" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <path d="M 745.0 260.0 L 845.0 260.0" fill="none" stroke="#1971c2" stroke-width="2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="90" y="133.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">wave</text>
  <text x="90" y="146.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">optics</text>
  <text x="290" y="133.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">wave</text>
  <text x="290" y="146.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">optics</text>
  <text x="490" y="133.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">wave</text>
  <text x="490" y="146.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">optics</text>
  <text x="690" y="133.2" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">wave</text>
  <text x="690" y="146.4" font-size="11" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">optics</text>
  <text x="50" y="436.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Key insight: As w/λ → ∞, wave optics → ray optics. But for w/λ &lt; 50,</text>
  <text x="50" y="453.6" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">diffraction bends significant energy into the geometric shadow.</text>
  <text x="50" y="470.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">WiFi doorway: w/λ ≈ 8     Cellular + buildings: w/λ ≈ 23     Visible + 10μm slit: w/λ ≈ 20</text>
</svg>
