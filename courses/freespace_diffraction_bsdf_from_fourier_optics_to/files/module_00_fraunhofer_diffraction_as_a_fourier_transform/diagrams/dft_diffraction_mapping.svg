<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -25 1116 645" width="800" height="462" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-f08c00" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f08c00"/>
    </marker>
  </defs>
  <text x="300" y="39.0" font-size="20" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">DFT as Diffraction Engine: Aperture Samples → Far-Field Pattern</text>
  <text x="30" y="78.0" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">Step 1: Sample aperture φ(q)</text>
  <rect x="30" y="85" width="40" height="50" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="75" y="85" width="40" height="50" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="120" y="85" width="40" height="50" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="165" y="65" width="40" height="70" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="210" y="65" width="40" height="70" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="255" y="85" width="40" height="50" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="300" y="85" width="40" height="50" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="35" y="157.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">0</text>
  <text x="80" y="157.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">0</text>
  <text x="125" y="157.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">0</text>
  <text x="170" y="144.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">1</text>
  <text x="215" y="144.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">1</text>
  <text x="260" y="157.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">0</text>
  <text x="305" y="157.4" font-size="12" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">0</text>
  <text x="80" y="168.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#1971c2" text-anchor="start">q:  -3Δq  -2Δq  -Δq    0    +Δq  +2Δq  +3Δq</text>
  <text x="30" y="189.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">rect(q/w): outside slit=0, inside slit=1; N=7 samples, spacing Δq</text>
  <path d="M 185.0 210.0 L 285.0 210.0" fill="none" stroke="#f08c00" stroke-width="2" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <text x="200" y="240.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">np.fft.fft(φ)</text>
  <text x="200" y="256.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">then fftshift</text>
  <text x="30" y="303.0" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">Step 2: DFT gives Ψ[m] at N frequencies</text>
  <rect x="30" y="310" width="40" height="70" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="75" y="345" width="40" height="35" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="120" y="355" width="40" height="25" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="165" y="365" width="40" height="15" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="210" y="368" width="40" height="12" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="255" y="370" width="40" height="10" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="300" y="370" width="40" height="10" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="80" y="403.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">f:  -3/NΔq  -2/NΔq  -1/NΔq   0   +1/NΔq  ...</text>
  <text x="30" y="419.4" font-size="12" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">fftshift centers the zero frequency; magnitude ≈ sinc shape</text>
  <path d="M 185.0 435.0 L 285.0 435.0" fill="none" stroke="#f08c00" stroke-width="2" marker-end="url(#ah-f08c00)" filter="url(#handdrawn)"/>
  <text x="200" y="463.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">multiply by (k/2π)·Δq</text>
  <text x="200" y="479.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">(R=1, converts sum→integral)</text>
  <text x="30" y="518.0" font-size="15" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Step 3: Physical diffraction amplitude ψ(ξ)</text>
  <text x="30" y="538.8" font-size="14" font-family="Cascadia Code, Fira Code, monospace" fill="#9c36b5" text-anchor="start">ψ(ξ_m) = (k/2π)·Δq·Ψ[m]     where ξ_m = m·λ/(N·Δq)</text>
  <rect x="20" y="510" width="440" height="30" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="0.2" filter="url(#handdrawn)"/>
  <text x="30" y="563.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Observable: intensity I(ξ) = R²|ψ(ξ)|²  (R drops out when R=1)</text>
  <rect x="500" y="60" width="420" height="520" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="0.2" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="510" y="89.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#f08c00" text-anchor="start">⚠  Common Mistakes</text>
  <text x="510" y="115.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">1. No fftshift → pattern centered at corner,</text>
  <text x="510" y="131.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   not at ξ=0</text>
  <text x="510" y="163.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">2. Forget Δq factor → amplitude off by N</text>
  <text x="510" y="179.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   (DFT sum ≠ integral without grid spacing)</text>
  <text x="510" y="215.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">3. np.sinc(x) = sin(πx)/(πx)</text>
  <text x="510" y="231.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   NOT sin(x)/x !</text>
  <text x="510" y="246.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   Analytic sinc for slit: np.sinc(w*ξ/λ)</text>
  <text x="510" y="280.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">4. Parseval check: need R² factor for</text>
  <text x="510" y="296.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   true energy conservation</text>
  <text x="510" y="311.8" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#e03131" text-anchor="start">   ∫R²|ψ(ξ)|²dξ = ∫|φ(q)|²dq = P_A</text>
  <text x="510" y="345.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">✓ Correct frequency-to-angle mapping:</text>
  <text x="510" y="367.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">   f_m = m / (N·Δq)   [spatial freq, 1/length]</text>
  <text x="510" y="383.2" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">   ξ_m = λ·f_m        [angle, dimensionless]</text>
  <text x="510" y="398.8" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">   Δξ  = λ / (N·Δq)   [angle spacing]</text>
  <text x="510" y="430.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">✓ NumPy FFT convention: no 1/N prefactor</text>
  <text x="510" y="446.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">   (1/N appears only in ifft)</text>
  <text x="510" y="475.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">✓ For R≠1: multiply I by 1 (R cancels)</text>
  <text x="510" y="491.2" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">   The BSDF property! Distance independent.</text>
</svg>
