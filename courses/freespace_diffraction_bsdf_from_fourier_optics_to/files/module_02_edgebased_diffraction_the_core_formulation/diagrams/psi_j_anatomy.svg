<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -30 1241 558" width="800" height="360" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="300" y="36.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Edge-Diffracted Wave ψⱼ: Anatomy and Concrete Example</text>
  <rect x="30" y="50" width="500" height="340" rx="0" fill="#f8f9fa" stroke="#1e1e1e" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="40" y="74.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Virtual Screen (k=2π, slit half-width a=3)</text>
  <rect x="60" y="100" width="160" height="200" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="300" y="100" width="160" height="200" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="220" y="100" width="80" height="200" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="230" y="204.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">Aperture</text>
  <text x="230" y="218.8" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">A⊥</text>
  <text x="230" y="233.2" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">(opening)</text>
  <rect x="218" y="98" width="8" height="204" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="218" y="98" width="8" height="204" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="115" y="205.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Obstacle</text>
  <text x="115" y="221.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">A⊥</text>
  <text x="340" y="205.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Obstacle</text>
  <text x="340" y="221.2" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">A⊥</text>
  <text x="55" y="333.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">aⱼ = φ(vⱼ - eⱼ/2)·e^{-ikz}</text>
  <text x="55" y="351.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">= φ(-3, y_top) = e^{-9/(2σ²)}</text>
  <text x="55" y="369.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#9c36b5" text-anchor="start">bⱼ = φ(vⱼ + eⱼ/2)·e^{-ikz}</text>
  <text x="55" y="387.2" font-size="11" font-family="Cascadia Code, Fira Code, monospace" fill="#9c36b5" text-anchor="start">= φ(-3, y_bot) = e^{-9/(2σ²)}</text>
  <ellipse cx="217.0" cy="103.0" rx="9.0" ry="9.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="195" y="95.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">aⱼ</text>
  <ellipse cx="217.0" cy="299.0" rx="9.0" ry="9.0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="195" y="325.6" font-size="13" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">bⱼ</text>
  <ellipse cx="304.0" cy="103.0" rx="9.0" ry="9.0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" filter="url(#handdrawn)"/>
  <ellipse cx="304.0" cy="299.0" rx="9.0" ry="9.0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" filter="url(#handdrawn)"/>
  <text x="208" y="213.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">vⱼ</text>
  <text x="208" y="226.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">=(-3,0)</text>
  <text x="301" y="213.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">vⱼ</text>
  <text x="301" y="226.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">=(+3,0)</text>
  <rect x="560" y="50" width="580" height="340" rx="0" fill="#fff9db" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="575" y="84.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Closed-Form Formula: ψⱼ(ξ)</text>
  <text x="575" y="116.8" font-size="14" font-family="Cascadia Code, Fira Code, monospace" fill="#1e1e1e" text-anchor="start">ψⱼ(ξ) = e^{-ikξ·vⱼ} · (k/|Ξⱼ|) · [term1 + term2]</text>
  <rect x="575" y="130" width="550" height="60" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="585" y="155.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#e03131" text-anchor="start">DIFFERENTIAL TERM:  (aⱼ - bⱼ) · α₁(Ξⱼ^{-T}ξ)</text>
  <text x="585" y="176.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">→ nonzero when beam varies across edge  (odd in both ζ_x, ζ_y)</text>
  <rect x="575" y="200" width="550" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="585" y="225.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#1971c2" text-anchor="start">MEAN TERM:  i(aⱼ+bⱼ)/2 · α₂(Ξⱼ^{-T}ξ)</text>
  <text x="585" y="246.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">→ dominant when beam  ≈ constant over edge  (even in ζ_x, odd in ζ_y)</text>
  <rect x="575" y="270" width="550" height="50" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="1" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="585" y="295.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#f08c00" text-anchor="start">PHASE CENTER: e^{-ikξ·vⱼ}</text>
  <text x="585" y="314.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">→ edges at different positions vⱼ produce fringes via phase difference!</text>
  <text x="575" y="355.6" font-size="13" font-family="Cascadia Code, Fira Code, monospace" fill="#9c36b5" text-anchor="start">Normalized direction:  ζ = Ξⱼ^{-T}ξ  where  Ξⱼ^{-1} = (k/2)[[eⱼ^T], [eⱼ m̂ⱼ^T]]</text>
  <text x="575" y="374.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">|Ξⱼ| = 2/(k·eⱼ) absorbs edge-length scaling; longer edges → larger amplitude</text>
  <text x="40" y="416.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Total diffracted field:  ψ̅(ξ) = Σⱼ ψⱼ(ξ)   [boundary edges only, interior edges cancel]</text>
  <text x="40" y="445.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Single slit example (a=3λ, k=2π): two edges at x=±3, both vertical.</text>
  <text x="40" y="465.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Edge contributions have OPPOSITE phase centers: e^{-ikξ·(+3,0)} vs e^{-ikξ·(-3,0)}</text>
  <text x="40" y="485.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">→ their sum produces sinc pattern: |ψ̅|^2 ∝ sinc^2(k·a·ξ_x) (classic single-slit result!)</text>
</svg>
