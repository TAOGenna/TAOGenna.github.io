<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -20 1140 598" width="800" height="420" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-9c36b5" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c36b5"/>
    </marker>
    <marker id="ah-e03131" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131"/>
    </marker>
  </defs>
  <text x="350" y="46.4" font-size="22" font-family="Helvetica, Arial, sans-serif" fill="#1e1e1e" text-anchor="start">Divergence Theorem: Area Integral → Boundary Integral</text>
  <text x="80" y="89.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#1971c2" text-anchor="start">BEFORE: 2D area integral over A⊥</text>
  <text x="650" y="89.2" font-size="16" font-family="Helvetica, Arial, sans-serif" fill="#2f9e44" text-anchor="start">AFTER: 1D boundary integral over δA⊥</text>
  <rect x="40" y="100" width="480" height="420" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="620" y="100" width="480" height="420" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="80" y="180" width="120" height="100" rx="0" fill="#ffc9c9" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="200" y="180" width="120" height="100" rx="0" fill="#ffc9c9" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="140" y="280" width="120" height="100" rx="0" fill="#ffc9c9" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="260" y="230" width="100" height="120" rx="0" fill="#ffc9c9" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="100" y="231.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">T₁⊥</text>
  <text x="220" y="231.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">T₂⊥</text>
  <text x="165" y="336.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">T₃⊥</text>
  <text x="285" y="296.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">T₄⊥</text>
  <text x="85" y="388.0" font-size="15" font-family="Cascadia Code, Fira Code, monospace" fill="#1971c2" text-anchor="start">∫∫ φ(q) e^{-ikξ·q} d²q</text>
  <text x="85" y="415.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">over ALL triangles → O(area) cost</text>
  <text x="85" y="445.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">N²  quadrature points needed</text>
  <text x="85" y="470.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">No closed form — numerical only</text>
  <text x="90" y="159.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">Interior edges cancel</text>
  <text x="190" y="157.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">ψⱼ + ψₗ = 0  ✓</text>
  <rect x="660" y="180" width="120" height="100" rx="0" fill="#ffec99" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="780" y="180" width="120" height="100" rx="0" fill="#ffec99" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="720" y="280" width="120" height="100" rx="0" fill="#ffec99" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="840" y="230" width="100" height="120" rx="0" fill="#ffec99" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="657" y="178" width="8" height="102" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="657" y="278" width="8" height="102" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="718" y="378" width="122" height="8" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="938" y="230" width="8" height="120" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <rect x="840" y="178" width="100" height="8" rx="0" fill="#e03131" stroke="#e03131" stroke-width="3" opacity="1.0" filter="url(#handdrawn)"/>
  <path d="M 620.0 200.0 L 720.0 200.0" fill="none" stroke="#e03131" stroke-width="2" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <text x="635" y="173.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">m̂₁ →</text>
  <text x="635" y="188.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">outward</text>
  <text x="665" y="388.0" font-size="15" font-family="Cascadia Code, Fira Code, monospace" fill="#2f9e44" text-anchor="start">∮ (m̂·ξ) φ(q) e^{-ikξ·q} ds</text>
  <text x="665" y="415.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">only BOUNDARY edges → O(perimeter)</text>
  <text x="665" y="445.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">M edges, each closed form  ✓</text>
  <text x="665" y="470.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Factor i/(2πRξ²) in front</text>
  <text x="665" y="159.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Boundary edges only (red)</text>
  <path d="M 530.0 310.0 L 630.0 310.0" fill="none" stroke="#9c36b5" stroke-width="3" marker-end="url(#ah-9c36b5)" filter="url(#handdrawn)"/>
  <text x="535" y="301.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Divergence</text>
  <text x="533" y="321.8" font-size="14" font-family="Helvetica, Arial, sans-serif" fill="#9c36b5" text-anchor="start">Theorem</text>
  <text x="80" y="515.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Key insight: interior edges of adjacent triangles carry opposite normals → contributions cancel.</text>
  <text x="80" y="535.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Only boundary edges δA⊥ survive. This reduces O(area) work to O(perimeter), and each edge has a closed form!</text>
</svg>
