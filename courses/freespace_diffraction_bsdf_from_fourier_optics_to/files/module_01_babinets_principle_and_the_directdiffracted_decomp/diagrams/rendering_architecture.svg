<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -30 877 435" width="800" height="397" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1971c2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1971c2"/>
    </marker>
    <marker id="ah-1e1e1e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
    <marker id="ah-2f9e44" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9e44"/>
    </marker>
    <marker id="ah-e03131" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e03131"/>
    </marker>
  </defs>
  <text x="200" y="32.8" font-size="19" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Rendering Architecture: How d and w Map to Path Tracing</text>
  <rect x="30" y="60" width="100" height="40" rx="0" fill="#ffec99" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="42" y="85.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Light source</text>
  <text x="42" y="98.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">(beam φ)</text>
  <path d="M 130.0 80.0 L 210.0 80.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <rect x="215" y="55" width="120" height="50" rx="0" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="225" y="79.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Geometry edge</text>
  <text x="225" y="92.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">(ray hits mesh)</text>
  <text x="350" y="59.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Ray hits?</text>
  <path d="M 335.0 80.0 L 415.0 50.0" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#ah-2f9e44)" filter="url(#handdrawn)"/>
  <text x="370" y="50.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">NO (passes</text>
  <text x="370" y="62.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">through aperture)</text>
  <rect x="420" y="30" width="160" height="60" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="430" y="51.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Direct term d</text>
  <text x="430" y="64.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">RAY TRACING</text>
  <text x="430" y="77.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Ray continues forward</text>
  <path d="M 335.0 80.0 L 415.0 130.0" fill="none" stroke="#e03131" stroke-width="2" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <text x="355" y="120.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">YES (hits</text>
  <text x="355" y="132.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">obstacle Ā⊥)</text>
  <rect x="420" y="120" width="160" height="70" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="430" y="141.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Diffraction BSDF ŵ</text>
  <text x="430" y="154.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Eval: ŵ(ξ) / P_A⊥</text>
  <text x="430" y="167.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Sample: iCDF tables</text>
  <path d="M 580.0 60.0 L 680.0 60.0" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah-1971c2)" filter="url(#handdrawn)"/>
  <path d="M 580.0 155.0 L 680.0 155.0" fill="none" stroke="#e03131" stroke-width="2" marker-end="url(#ah-e03131)" filter="url(#handdrawn)"/>
  <rect x="685" y="40" width="100" height="135" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="695" y="73.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">Sensor</text>
  <text x="695" y="86.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">(accumulate</text>
  <text x="695" y="99.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">radiance</text>
  <text x="695" y="112.8" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#9c36b5" text-anchor="start">L = d + ŵ)</text>
  <text x="30" y="215.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Key insight: both paths use STANDARD path tracing framework</text>
  <text x="30" y="236.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Direct term d:  rays that pass through aperture A⊥ — handled by existing tracer, zero code changes</text>
  <text x="30" y="256.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Diffracted term ŵ:  rays hitting obstacle Ā⊥ — evaluate new BSDF, move ray origin into aperture</text>
  <rect x="30" y="275" width="380" height="90" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" stroke-dasharray="8 4" filter="url(#handdrawn)"/>
  <text x="40" y="295.6" font-size="13" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">UTD (old approach) vs. This method:</text>
  <text x="40" y="313.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">UTD: rays carry phase e^{ikr}, must interfere → non-linear, ~2000 spp</text>
  <text x="40" y="331.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">This: incoherent sum d + ŵ, rendering eq. stays LINEAR, ~8 spp</text>
  <text x="40" y="349.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Both: same physical diffraction pattern in the wings</text>
</svg>
