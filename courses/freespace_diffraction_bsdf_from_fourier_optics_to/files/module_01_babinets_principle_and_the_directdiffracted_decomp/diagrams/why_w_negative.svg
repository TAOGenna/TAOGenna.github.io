<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -30 901 495" width="800" height="440" style="background: white;">
  <defs>
    <filter id="handdrawn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3"
                    result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="ah-1e1e1e" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <text x="300" y="34.0" font-size="20" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Why w Must Be Negative: Power Accounting</text>
  <text x="20" y="71.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">BEFORE CLAMPING</text>
  <text x="600" y="71.8" font-size="14" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">AFTER CLAMPING</text>
  <rect x="20" y="80" width="240" height="60" rx="0" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="30" y="106.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Total power in |ψ|²</text>
  <text x="30" y="119.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">= P_A⊥ (power through aperture)</text>
  <rect x="20" y="160" width="240" height="55" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="30" y="183.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Power in direct term d</text>
  <text x="30" y="196.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">= P_A⊥  (all of it!)</text>
  <rect x="20" y="230" width="240" height="55" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="30" y="253.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">Power in diffracted term w</text>
  <text x="30" y="266.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">= 0 exactly (always!)</text>
  <text x="30" y="308.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">So w must have negative parts:</text>
  <text x="30" y="321.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">positive fringes + negative center = 0</text>
  <text x="30" y="334.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">fringe power ~ |negative center power|</text>
  <rect x="600" y="80" width="240" height="60" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="610" y="103.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Clamped term ŵ = max(w, 0)</text>
  <text x="610" y="116.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Power P_hat &gt; 0  (now positive)</text>
  <rect x="600" y="160" width="240" height="55" rx="0" fill="#ffec99" stroke="#f08c00" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="610" y="183.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">'Borrowed' power P_hat</text>
  <text x="610" y="196.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#f08c00" text-anchor="start">taken from obstacle Ā⊥ absorption</text>
  <text x="610" y="243.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Where is the borrowed power?</text>
  <text x="610" y="256.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">Only at GEOMETRY EDGES where</text>
  <text x="610" y="269.6" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">both A⊥ and Ā⊥ are non-empty.</text>
  <text x="610" y="282.8" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">~makes objects slightly smaller</text>
  <rect x="600" y="300" width="240" height="50" rx="0" fill="#99e9f2" stroke="#0c8599" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="610" y="323.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">Approximation error &lt; 1% in</text>
  <text x="610" y="336.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#0c8599" text-anchor="start">practice. Validated in paper Fig. 9</text>
  <text x="290" y="143.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">d has all</text>
  <text x="290" y="156.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">the power</text>
  <text x="290" y="268.2" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">w has zero</text>
  <text x="290" y="281.4" font-size="11" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">total power</text>
  <path d="M 270.0 190.0 L 310.0 190.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <path d="M 270.0 260.0 L 310.0 260.0" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah-1e1e1e)" filter="url(#handdrawn)"/>
  <text x="20" y="379.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1971c2" text-anchor="start">Central lobe (ξ ≈ 0)</text>
  <rect x="20" y="385" width="115" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="25" y="407.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">d high (all beam</text>
  <text x="25" y="419.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">power is here)</text>
  <rect x="145" y="385" width="115" height="40" rx="0" fill="#ffc9c9" stroke="#e03131" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="150" y="407.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">w &lt; 0 (must be</text>
  <text x="150" y="419.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#e03131" text-anchor="start">negative here!)</text>
  <text x="280" y="379.4" font-size="12" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">Far fringes (|ξ| large)</text>
  <rect x="280" y="385" width="115" height="40" rx="0" fill="#a5d8ff" stroke="#1971c2" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="285" y="407.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">d ≈ 0 (beam</text>
  <text x="285" y="419.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#1e1e1e" text-anchor="start">gone here)</text>
  <rect x="405" y="385" width="115" height="40" rx="0" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2" opacity="1.0" filter="url(#handdrawn)"/>
  <text x="410" y="407.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">w &gt; 0 (diffraction</text>
  <text x="410" y="419.0" font-size="10" font-family="Virgil, Segoe Print, Comic Sans MS, cursive" fill="#2f9e44" text-anchor="start">fringes)</text>
</svg>
